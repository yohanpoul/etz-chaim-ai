# ─── 12 SIMPLES — 12 arêtes (gvulei alakhson) ─────────────────
# SY 5:1-4 : "Douze simples [...] douze limites diagonales."
# Chaque simple gouverne : un sens, un signe zodiacal, un mois,
# une tribu d'Israël, et un organe directeur du corps.
#
# TRIBUS : attribution GRA via Kaplan. Les 12 tribus incluent
# Ephraim et Menashe (fils de Joseph) à la place de Joseph et Levi.
# Divergences fréquentes entre recensions.
#
# ORGANES : les 12 se divisent en 6 paires externes (droite/gauche)
# et 6 organes internes.

simples:
  heh:
    letter: "ה"
    gematria: 5
    mouth_position: gorge
    mouth_depth: 5
    type: edge
    direction: nord-est
    coordinates: [1, 1, 0]
    zodiac: bélier            # Taleh (Aries)
    month: nisan
    sense: vue                # re'iyah — perception directe
    tribe: yehudah            # Judah — la tribu royale
    organ: main_droite        # yad yemin
    sy_ref: "SY 5:3"

  vav:
    letter: "ו"
    gematria: 6
    mouth_position: levres
    mouth_depth: 1
    type: edge
    direction: sud-est
    coordinates: [1, -1, 0]
    zodiac: taureau           # Shor (Taurus)
    month: iyyar
