    day: dimanche             # Yom Rishon — 1er jour
    gate: oeil_droit          # porte de la vision droite
    opposites:
      dagesh: sagesse         # chokhmah
      rafeh: folie            # ivvelet
    sy_ref: "SY 4:2"

  gimel:
    letter: "ג"
    gematria: 3
    mouth_position: palais
    mouth_depth: 4
    type: face
    direction: bas
    coordinates: [0, 0, -1]
    planet: jupiter           # Tzedek
    day: lundi                # Yom Sheni — 2ème jour
    gate: oeil_gauche
    opposites:
      dagesh: richesse        # osher
      rafeh: pauvreté         # oni
