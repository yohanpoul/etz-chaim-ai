apiVersion: 1

datasources:
  - name: Etz Chaim
    type: grafana-postgresql-datasource
    uid: etz-chaim-pg
    url: ${DB_HOST:-localhost}:${DB_PORT:-5432}
    database: ${DB_NAME:-etz_chaim}
    user: ${DB_USER:-etz}
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600  # PostgreSQL 16
      timescaledb: true
    isDefault: true
    editable: true
