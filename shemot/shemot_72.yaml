# ══════════════════════════════════════════════════════════════
# שֵׁם הַמְפֹרָשׁ — Les 72 Noms : Attributs Sacrés Traditionnels
# ══════════════════════════════════════════════════════════════
#
# Sources croisées :
#   - Reuchlin, De Arte Cabalistica (1517) — noms angéliques, suffixes
#   - Lenain, La Science Cabalistique (1823) — dates, zodiaque, psaumes
#   - Ambelain, La Kabbale Pratique (1951) — chœurs, éléments
#   - Kircher, Oedipus Aegyptiacus (1652) — correspondances
#
# Système zodiacal : Bélier (0° = équinoxe, tradition Lenain/Ambelain)
# Suffixes : tels que transmis par Reuchlin (pas la règle simplifiée 1-36=El, 37-72=Yah)
#
# Champs :
#   number        — Position 1-72
#   trigram       — 3 lettres hébraïques (racine d'Exode 14:19-21)
#   transliteration — Translittération latine de la triade
#   suffix        — "El" (אל) ou "Yah" (יה)
#   angel_name    — Nom complet de l'ange
#   choir         — Chœur angélique (9 chœurs × 8 anges)
#   sephirah      — Sephirah d'appartenance (selon chœur)
#   zodiac_sign   — Signe zodiacal
#   zodiac_degrees — Quinaire (5°)
#   element       — Feu / Terre / Air / Eau (selon signe)
#   calendar_start — Début de la période calendaire (JJ mois)
#   calendar_end   — Fin de la période calendaire (JJ mois)
#   psalm_verse   — Verset de psaume associé

