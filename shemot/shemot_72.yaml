# ══════════════════════════════════════════════════════════
# Notes méthodologiques
# ══════════════════════════════════════════════════════════
#
# 1. SUFFIXES : La règle simplifiée "1-36=El, 37-72=Yah" (Lenain 1823) ne
#    correspond PAS aux noms transmis par Reuchlin (1517). Les suffixes ici
#    suivent l'analyse morphologique des noms tels que transmis.
#
# 2. SEPHIROT par chœur (9 chœurs × 8 anges = 72) :
#    Séraphim→Keter, Chérubim→Hokhmah, Trônes→Binah,
#    Dominations→Hesed, Puissances→Gevurah, Vertus→Tiferet,
#    Principautés→Netzah, Archanges→Hod, Anges→Yesod
#    (Malkuth n'a pas de chœur propre — elle est le réceptacle)
#
# 3. ZODIAQUE : Système Bélier (Lenain/Ambelain), 0°=équinoxe de printemps.
#    Le système Golden Dawn (0°=Lion) n'est PAS utilisé ici.
#
# 4. Le 70e nom (Yabamiah) est associé à Genèse 1:1, pas à un psaume —
#    cas unique dans les 72.
