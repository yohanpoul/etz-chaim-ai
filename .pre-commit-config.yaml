repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-id-uniqueness
        name: Sifrei Yesod ID uniqueness
        entry: python scripts/check_id_uniqueness.py sifrei_yesod/sefarim/ --strict
        language: system
        pass_filenames: false
        files: ^sifrei_yesod/sefarim/.*\.yaml$
