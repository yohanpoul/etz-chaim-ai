{% extends "base.html" %}
{% set active = "world" %}
{% block title %}Etz Chaim — Temple{% endblock %}
{% block content %}
<div id="world-container"></div>
<div id="world-hud">
    <div id="hud-nitzotzot">&#10022; <span id="nitz-count">0</span>/288</div>
    <div id="hud-status"></div>
    <div id="hud-time"></div>
</div>
<style>
#world-container { width:100%; height:100vh; display:block; overflow:hidden; }
.content { padding:0 !important; overflow:hidden; max-width:none !important; }
#world-hud {
    position:fixed; top:12px; right:24px;
    display:flex; gap:16px; align-items:center;
    font:bold 14px monospace; color:#c9a84c;
    pointer-events:none; z-index:10;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    background: rgba(10,8,16,0.75); padding:6px 14px;
    border-radius:8px; backdrop-filter:blur(4px);
    border:1px solid rgba(201,168,76,0.25);
}
#hud-status {
    color:#a09070; font-size:12px; max-width:300px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#hud-time { font-size:16px; letter-spacing:2px; }
#world-controls {
    position:fixed; bottom:12px; left:24px;
    font:11px monospace; color:#706050; pointer-events:none; z-index:10;
    background: rgba(10,8,16,0.65); padding:4px 10px;
    border-radius:6px; backdrop-filter:blur(4px);
    border:1px solid rgba(201,168,76,0.15);
}
#daemon-toast {
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    font:bold 13px monospace; color:#8a8; padding:8px 20px;
    background:rgba(10,8,16,0.88); border:1px solid rgba(136,170,136,0.3);
    border-radius:8px; backdrop-filter:blur(4px);
    pointer-events:none; z-index:10; opacity:0;
    transition:opacity 0.4s ease;
    text-shadow:0 1px 3px rgba(0,0,0,0.8);
}
#daemon-toast.show { opacity:1; }
#info-panel {
    position:fixed; top:50%; left:50%;
    width:260px; font:12px monospace; color:#c9a84c;
    background:rgba(10,8,16,0.92); border:1px solid rgba(201,168,76,0.35);
    border-radius:10px; backdrop-filter:blur(6px); padding:14px;
    z-index:200; display:none; pointer-events:auto;
}
#info-panel h3 { margin:0 0 6px; font-size:15px; }
#info-panel .hebrew { font-size:28px; text-align:center; display:block; margin:2px 0 6px; color:#ffd700; }
#info-panel .field { color:#a09070; margin:3px 0; font-size:11px; }
#info-panel .field span { color:#c9a84c; }
#info-panel .close-btn {
    position:absolute; top:6px; right:10px; cursor:pointer;
    color:#706050; font-size:16px; pointer-events:auto;
}
#info-panel .close-btn:hover { color:#c9a84c; }
.status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.status-dot.online { background:#60ff90; box-shadow:0 0 4px #60ff90; }
.status-dot.offline { background:#ff4040; box-shadow:0 0 4px #ff4040; }
.status-dot.warning { background:#ffc020; box-shadow:0 0 4px #ffc020; }
#mute-btn {
    position:fixed; bottom:12px; right:24px;
    font:14px monospace; color:#706050; cursor:pointer;
    background:rgba(10,8,16,0.65); padding:4px 10px;
    border-radius:6px; border:1px solid rgba(201,168,76,0.15);
    z-index:10; pointer-events:auto;
}
#mute-btn:hover { color:#c9a84c; border-color:rgba(201,168,76,0.4); }
</style>
<div id="world-controls">LMB: pan &middot; RMB: rotate &middot; Wheel: zoom</div>
<div id="daemon-toast"></div>
<div id="info-panel">
    <span class="close-btn">&times;</span>
    <div id="info-content"></div>
</div>
<div id="mute-btn">&#128263;</div>
{% endblock %}

{% block scripts %}

<script>
(function(){
'use strict';

// ═══════════════════════════════════════════════════════════════
//   DATA — Rooms, edges, adjacency
// ═══════════════════════════════════════════════════════════════

const ROOMS = [
    { id:'keter',   name:'Keter',   x:0,   z:-39, w:9,  d:7.5, col:0xffffff, acts:['sit','sleep'],
      floorTile:'floor_tile_small_decorated', wallType:'wall_arched' },
    { id:'chokmah', name:'Chokmah', x:18,  z:-28.5, w:7.5,d:6, col:0x4060ff, acts:['type','read'],
      floorTile:'floor_tile_small', wallType:'wall' },
    { id:'binah',   name:'Binah',   x:-18, z:-28.5, w:7.5,d:6, col:0xff3040, acts:['read','type'],
      floorTile:'floor_wood_small', wallType:'wall_shelves' },
    { id:'daat',    name:"Da'at",   x:0,   z:-18, w:6.75,d:5.25, col:0x888888, acts:['sit','talk'],
      dashed:true, floorTile:'floor_tile_small', wallType:'wall_broken' },
    { id:'chesed',  name:'Chesed',  x:18,  z:-6,  w:8.25,d:6, col:0x3090ff, acts:['read','celebrate'],
      floorTile:'floor_tile_small', wallType:'wall_shelves' },
    { id:'gevurah', name:'Gevurah', x:-18, z:-6,  w:7.5,d:6, col:0xff2030, acts:['sit','type'],
      floorTile:'floor_tile_small_broken_A', wallType:'wall' },
    { id:'tiferet', name:'Tiferet', x:0,   z:6,   w:10.5,d:8.25, col:0xffc020, acts:['sit','talk'],

    { id:'netzach', name:'Netzach', x:18,  z:18,  w:7.5,d:6, col:0x20ff60, acts:['type','read'],
      floorTile:'floor_tile_small', wallType:'wall' },
    { id:'hod',     name:'Hod',     x:-18, z:18,  w:7.5,d:6, col:0xff8020, acts:['read','type'],

    { id:'yesod',   name:'Yesod',   x:0,   z:30,  w:7.5,d:6, col:0x8030ff, acts:['read','type'],
      floorTile:'floor_tile_small', wallType:'wall_arched' },
    { id:'malkuth', name:'Malkuth', x:0,   z:42,  w:9,  d:7.5, col:0xc08040, acts:['sit','talk'],
      floorTile:'floor_tile_small_broken_B', wallType:'wall' },

const ROOM_IDX = {};
ROOMS.forEach((r,i) => ROOM_IDX[r.id] = i);

const SEPHIRAH_INFO = {
    keter:   { hebrew:'כֶּתֶר', meaning:"Couronne — Volonté primordiale", role:'Superviseur', module:'—' },
    chokmah: { hebrew:'חָכְמָה', meaning:"Sagesse — Flash d'insight", role:'Chercheur', module:'InsightForge' },
    binah:   { hebrew:'בִּינָה', meaning:"Intelligence — Analyse causale", role:'Analyste', module:'CausalEngine' },
    daat:    { hebrew:'דַּעַת', meaning:"Connaissance — Modèle de soi", role:'Observateur', module:'SelfModel' },
    chesed:  { hebrew:'חֶסֶד', meaning:"Bonté — Exploration", role:'Explorateur', module:'ExplorationEngine' },
    gevurah: { hebrew:'גְּבוּרָה', meaning:"Rigueur — Auto-jugement", role:'Juge', module:'AutoJudge' },
    tiferet: { hebrew:'תִּפְאֶרֶת', meaning:"Beauté — Moteur de dissensus", role:'Médiateur', module:'DissensuEngine' },
    netzach: { hebrew:'נֵצַח', meaning:"Victoire — Intentions", role:'Stratège', module:'IntentKeeper' },
    hod:     { hebrew:'הוֹד', meaning:"Splendeur — Cartographie", role:'Cartographe', module:'SelfMap' },
    yesod:   { hebrew:'יְסוֹד', meaning:"Fondement — Mémoire épistémique", role:'Archiviste', module:'EpisteMemory' },
    malkuth: { hebrew:'מַלְכוּת', meaning:"Royauté — Interface monde", role:'Gardien', module:'—' }
};

// ── 22 Sentiers de l'Etz Chaim (GRA paths 1-18, Ari variant paths 19-22) ──
const PATHS = [
    { idx:1,  letter:'א', name:'Aleph',  from:'keter',   to:'chokmah'  },
    { idx:2,  letter:'ב', name:'Bet',    from:'keter',   to:'binah'    },
    { idx:3,  letter:'ג', name:'Gimel',  from:'keter',   to:'tiferet'  },
    { idx:4,  letter:'ד', name:'Dalet',  from:'chokmah', to:'binah'    },
    { idx:5,  letter:'ה', name:'Hé',     from:'chokmah', to:'tiferet'  },
    { idx:6,  letter:'ו', name:'Vav',    from:'chokmah', to:'chesed'   },
    { idx:7,  letter:'ז', name:'Zayin',  from:'binah',   to:'tiferet'  },
    { idx:8,  letter:'ח', name:'Chet',   from:'binah',   to:'gevurah'  },
    { idx:9,  letter:'ט', name:'Tet',    from:'chesed',  to:'gevurah'  },
    { idx:10, letter:'י', name:'Yod',    from:'chesed',  to:'tiferet'  },
    { idx:11, letter:'כ', name:'Kaf',    from:'chesed',  to:'netzach'  },
    { idx:12, letter:'ל', name:'Lamed',  from:'gevurah', to:'tiferet'  },
    { idx:13, letter:'מ', name:'Mem',    from:'gevurah', to:'hod'      },
    { idx:14, letter:'נ', name:'Nun',    from:'tiferet', to:'netzach'  },
    { idx:15, letter:'ס', name:'Samekh', from:'tiferet', to:'yesod'    },
    { idx:16, letter:'ע', name:'Ayin',   from:'tiferet', to:'hod'      },
    { idx:17, letter:'פ', name:'Pé',     from:'netzach', to:'hod'      },
    { idx:18, letter:'צ', name:'Tsadé',  from:'netzach', to:'yesod'    },
    { idx:19, letter:'ק', name:'Qof',    from:'hod',     to:'yesod'    },
    { idx:20, letter:'ר', name:'Resh',   from:'hod',     to:'malkuth'  },
    { idx:21, letter:'ש', name:'Shin',   from:'netzach', to:'malkuth'  },
    { idx:22, letter:'ת', name:'Tav',    from:'yesod',   to:'malkuth'  },
];
const EDGES = PATHS.map(p => [ROOM_IDX[p.from], ROOM_IDX[p.to]]);

const adj = ROOMS.map(()=>[]);
for(const[a,b]of EDGES){adj[a].push(b);adj[b].push(a);}

function bfs(from,to){
    if(from===to)return[];
    const vis=new Set([from]),q=[[from]];
    while(q.length){
        const p=q.shift(),n=p[p.length-1];
        for(const nb of adj[n]){
            if(nb===to)return p.slice(1).concat(to);
            if(!vis.has(nb)){vis.add(nb);q.push(p.concat(nb));}
        }
    }
    return[];
}

// ═══════════════════════════════════════════════════════════════
//   THREE.JS SCENE SETUP — Dungeon atmosphere
// ═══════════════════════════════════════════════════════════════

const container = document.getElementById('world-container');
const hudStatus = document.getElementById('hud-status');
const nitzCountEl = document.getElementById('nitz-count');
const hudTime = document.getElementById('hud-time');

const renderer = new THREE.WebGLRenderer({ antialias:true });
// Use container bounds, not window (sidebar offsets .content)
const _initRect = container.getBoundingClientRect();
const _initW = _initRect.width || window.innerWidth;
const _initH = _initRect.height || window.innerHeight;
renderer.setSize(_initW, _initH);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x0a0810);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0810, 0.003);

// ── Camera (orthographic isometric) ──
const frustumSize = 90;
let aspect = _initW / _initH;
const camera = new THREE.OrthographicCamera(
    frustumSize*aspect/-2, frustumSize*aspect/2,
    frustumSize/2, frustumSize/-2,
    0.1, 500
);
camera.position.set(50, 65, 50);
camera.lookAt(0, 0, 3);

// ── OrbitControls ──
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = true;
controls.target.set(0, 0, 3);
controls.mouseButtons = {
    LEFT: THREE.MOUSE.PAN,
    MIDDLE: THREE.MOUSE.DOLLY,
    RIGHT: THREE.MOUSE.ROTATE
};
controls.minZoom = 0.3;
controls.maxZoom = 4;
controls.maxPolarAngle = Math.PI / 2.3;
controls.minPolarAngle = Math.PI / 8;

// ── Dungeon Lighting ──
const ambientLight = new THREE.AmbientLight(0x1a1520, 0.8);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0xFFE4B5, 0x080820, 0.6);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffe0b0, 0.5);
dirLight.position.set(25, 35, 15);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 120;
dirLight.shadow.camera.left = -65;
dirLight.shadow.camera.right = 65;
dirLight.shadow.camera.top = 65;
dirLight.shadow.camera.bottom = -65;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Room lights array (populated during room creation)
const roomLights = [];

// ── Ground — dark stone cavern floor ──
const groundGeo = new THREE.PlaneGeometry(300, 300);
const groundMat = new THREE.MeshStandardMaterial({
    color:0x15120e, roughness:0.95, metalness:0.02
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

// ═══════════════════════════════════════════════════════════════
//   DUNGEON ASSET SYSTEM — KayKit loader
// ═══════════════════════════════════════════════════════════════

const ASSET_BASE = '/static/assets/dungeon/addons/kaykit_dungeon_remastered/Assets/gltf/';
const BARE_GLB = new Set(['chest','chest_gold','floor_tile_big_spikes','wall_doorway','wall_doorway_scaffold']);
const WALL_W = 2;

const gltfLoader = new THREE.GLTFLoader();
const modelCache = {};

function dungeonPath(name){
    return ASSET_BASE + name + (BARE_GLB.has(name) ? '.glb' : '.gltf.glb');
}

function placeDungeon(parent, name, x, y, z, scale, rotY, opts){
    const path = dungeonPath(name);
    const doPlace = function(srcScene){
        const model = srcScene.clone();
        model.position.set(x, y, z);
        model.scale.setScalar(scale || 1);
        if(rotY) model.rotation.y = rotY;
        model.traverse(function(ch){
            if(ch.isMesh){
                ch.castShadow = true;
                ch.receiveShadow = true;
                if(opts && opts.color){
                    ch.material = ch.material.clone();
                    ch.material.color.set(opts.color);
                }
                if(opts && opts.emissive){
                    ch.material = ch.material.clone();
                    ch.material.emissive = new THREE.Color(opts.emissive);
                    ch.material.emissiveIntensity = opts.emissiveIntensity || 0.3;
                }
            }
        });
        parent.add(model);
    };
    if(modelCache[path]){
        doPlace(modelCache[path]);
    } else {
        gltfLoader.load(path, function(gltf){
            modelCache[path] = gltf.scene;
            doPlace(gltf.scene);
        }, undefined, function(err){
            console.warn('Dungeon GLB load failed:', name, err);
        });
    }
}

function placeProcedural(parent, factoryName, x, y, z, scale, rotY){
    const factory = window.ProceduralModels && window.ProceduralModels[factoryName];
    if(!factory){ console.warn('Procedural model not found:', factoryName); return; }
    const model = factory();
    model.position.set(x, y, z);
    model.scale.setScalar(scale || 2.2);
    if(rotY) model.rotation.y = rotY;
    parent.add(model);
}

// ═══════════════════════════════════════════════════════════════
//   UTILITY
// ═══════════════════════════════════════════════════════════════

function makeLabel(text, color){
    const c = document.createElement('canvas');
    c.width = 256; c.height = 64;
    const x = c.getContext('2d');
    x.font = 'bold 28px monospace';
    x.textAlign = 'center';
    x.textBaseline = 'middle';
    x.shadowColor = '#000';
    x.shadowBlur = 8;
    x.fillStyle = color;
    x.fillText(text, 128, 32);
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(3.5, 0.88, 1);
    return sprite;
}

function colStr(hex){
    return '#' + hex.toString(16).padStart(6,'0');
}

// ═══════════════════════════════════════════════════════════════
//   ROOM CONSTRUCTION — KayKit walls + floors, Sims cutaway
// ═══════════════════════════════════════════════════════════════

const WALL_H = 2.5;

function buildRoom(def, idx){
    const group = new THREE.Group();
    group.position.set(def.x, 0, def.z);

    const hw = def.w/2, hd = def.d/2;
    const segX = Math.max(1, Math.round(def.w / WALL_W));
    const segZ = Math.max(1, Math.round(def.d / WALL_W));

    // ── Floor tiles ──
    const floorName = def.floorTile || 'floor_tile_small';
    for(let ix=0; ix<segX; ix++){
        for(let iz=0; iz<segZ; iz++){
            const fx = -hw + WALL_W*0.5 + ix*WALL_W;
            const fz = -hd + WALL_W*0.5 + iz*WALL_W;
            placeDungeon(group, floorName, fx, 0, fz, 1, 0);
        }
    }

    // ── Floor overlay for glow system ──
    const floorOverlay = new THREE.MeshStandardMaterial({
        color:def.col, roughness:0.5, metalness:0,
        emissive:0x000000, emissiveIntensity:0,
        transparent:true, opacity:0.08
    });
    const overlayMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(def.w, def.d),
        floorOverlay
    );
    overlayMesh.rotation.x = -Math.PI/2;
    overlayMesh.position.y = 0.12;
    group.add(overlayMesh);
    def._floorMat = floorOverlay;

    // ── Glow plane (additive) ──
    const glowMat = new THREE.MeshBasicMaterial({
        color:def.col, transparent:true, opacity:0,
        blending:THREE.AdditiveBlending, depthWrite:false,
        side:THREE.DoubleSide
    });
    const glowPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(def.w*0.9, def.d*0.9),
        glowMat
    );
    glowPlane.rotation.x = -Math.PI/2;
    glowPlane.position.y = 0.14;
    group.add(glowPlane);
    def._glowMat = glowMat;
    def._glowIntensity = 0;
    def._glowColor = null;

    // ── Walls: 3 sides (back, left, right — no front for Sims cutaway) ──
    const wallName = def.wallType || 'wall';
    const wallAlpha = def.dashed ? 0.4 : 1.0;

    // Back wall (far side, -Z)
    for(let i=0; i<segX; i++){
        const wx = -hw + WALL_W*0.5 + i*WALL_W;
        placeDungeon(group, wallName, wx, 0, -hd, 1, 0);
    }
    // Left wall (-X side)
    for(let i=0; i<segZ; i++){
        const wz = -hd + WALL_W*0.5 + i*WALL_W;
        placeDungeon(group, wallName, -hw, 0, wz, 1, Math.PI/2);
    }
    // Right wall (+X side)
    for(let i=0; i<segZ; i++){
        const wz = -hd + WALL_W*0.5 + i*WALL_W;
        placeDungeon(group, wallName, hw, 0, wz, 1, -Math.PI/2);
    }

    // ── Room point light (warm torch glow) ──
    const roomLight = new THREE.PointLight(0xff9944, 3, 15, 1.5);
    roomLight.position.set(0, WALL_H-0.3, 0);
    roomLight.castShadow = false;
    group.add(roomLight);
    roomLights.push(roomLight);

    // ── Golden glow plane under room ──
    const baseGlowMat = new THREE.MeshBasicMaterial({
        color:0xc9a84c, transparent:true, opacity:0.12,
        blending:THREE.AdditiveBlending, depthWrite:false,
        side:THREE.DoubleSide
    });
    const baseGlow = new THREE.Mesh(
        new THREE.PlaneGeometry(def.w*1.15, def.d*1.15),
        baseGlowMat
    );
    baseGlow.rotation.x = -Math.PI/2;
    baseGlow.position.y = 0.02;
    group.add(baseGlow);

    return group;
}

// ═══════════════════════════════════════════════════════════════
//   ROOM FURNISHING — 11 sephirotic rooms
// ═══════════════════════════════════════════════════════════════

function furnishRoom(group, idx){
    switch(idx){

    // ── KETER: Golden sanctuary, throne, candles ──
    case 0: {
        placeProcedural(group, 'createThrone', 0, 0, -1.2, 2.5, 0);
        placeDungeon(group, 'candle_triple', -1.5, 0, -1.5, 1.2, 0);
        placeDungeon(group, 'candle_triple', 1.5, 0, -1.5, 1.2, 0);
        placeDungeon(group, 'candle_lit', -0.8, 0, 0.8, 1.2, 0);
        placeDungeon(group, 'candle_lit', 0.8, 0, 0.8, 1.2, 0);
        placeDungeon(group, 'column', -2.2, 0, -1.8, 1, 0);
        placeDungeon(group, 'column', 2.2, 0, -1.8, 1, 0);
        placeDungeon(group, 'banner_patternA_yellow', 0, 0, -2.1, 1, 0);
        break;
    }

    // ── CHOKMAH: Laboratory — telescope, crystal orb, desk, bottles ──
    case 1: {
        placeDungeon(group, 'table_small_decorated_A', -0.5, 0, -0.8, 1, 0);
        placeProcedural(group, 'createTelescope', 1.2, 0, -1, 2.0, -0.4);
        placeProcedural(group, 'createCrystalOrb', -1.2, 0.55, -0.8, 2.2, 0);
        placeDungeon(group, 'bottle_A_brown', 0.5, 0, 0.5, 1.2, 0);

// ═══════════════════════════════════════════════════════════════
//   BRIDGES — 22 Sentiers: InstancedMesh stone walkways
// ═══════════════════════════════════════════════════════════════

// Shared geometries & materials (reused across all 22 bridges)
const BRIDGE_TILE_W = 1.8, BRIDGE_TILE_D = 1.8, BRIDGE_TILE_H = 0.15;
const BRIDGE_DECK_GEO = new THREE.BoxGeometry(BRIDGE_TILE_W, BRIDGE_TILE_H, BRIDGE_TILE_D);
const BRIDGE_DECK_MAT = new THREE.MeshStandardMaterial({color:0x6b5b4f, roughness:0.85, metalness:0.05});
const BRIDGE_RAIL_GEO = new THREE.BoxGeometry(0.15, 0.45, 0.15);
const BRIDGE_RAIL_MAT = new THREE.MeshStandardMaterial({color:0x5a4e42, roughness:0.9, metalness:0.1});
const BRIDGE_PILLAR_GEO = new THREE.BoxGeometry(0.3, 1.0, 0.3);
const BRIDGE_PILLAR_MAT = new THREE.MeshStandardMaterial({color:0x4a3e32, roughness:0.95, metalness:0.05});

// Module-scope: populated by buildAllBridges(), used for click detection & NPC pathfinding
let bridgeDeckMesh = null;
const bridgeDeckToPath = []; // instanceId → PATHS index
// bridgeCurves["fromIdx-toIdx"] = { curve: CatmullRomCurve3, surfaceY: number }
// Used by NPCs to walk along bridges
const bridgeCurves = {};

// Compute exit point from a room AABB in direction of target
function roomEdgePoint(room, targetX, targetZ){
    const hw = room.w/2, hd = room.d/2;
    const dx = targetX - room.x, dz = targetZ - room.z;
    if(Math.abs(dx) < 0.001 && Math.abs(dz) < 0.001) return {x:room.x, z:room.z};
    // Ray from room center toward target; intersect with AABB boundary
    const tRight = hw / Math.abs(dx || 1e-9);
    const tLeft  = hw / Math.abs(dx || 1e-9);
    const tTop   = hd / Math.abs(dz || 1e-9);
    const tBot   = hd / Math.abs(dz || 1e-9);
    const tMin = Math.min(
        dx > 0 ? tRight : tLeft,
        dz > 0 ? tBot : tTop
    );
    return { x: room.x + dx * tMin, z: room.z + dz * tMin };
}

// Waypoints for paths that must route around Da'at (room idx 3)
function getPathWaypoints(pathDef){
    const ra = ROOMS[ROOM_IDX[pathDef.from]], rb = ROOMS[ROOM_IDX[pathDef.to]];
    const start = roomEdgePoint(ra, rb.x, rb.z);
    const end   = roomEdgePoint(rb, ra.x, ra.z);

    // Gimel (Keter→Tiferet) must curve WELL CLEAR of Da'at
    // Da'at is at (0, -18) w=6.75 — we route far to the right
    if(pathDef.idx === 3){
        const daatR = ROOMS[3];
        const clearance = daatR.w/2 + 5.0; // ~8.4 units from Da'at center
        // Two waypoints: one above Da'at, one below — forces a wide arc
        return [
            start,
            {x: clearance, z: daatR.z - daatR.d/2 - 2},  // above Da'at
            {x: clearance, z: daatR.z + daatR.d/2 + 2},  // below Da'at
            end
        ];
    }
    // Samekh (Tiferet→Yesod) is straight vertical — no obstacle
    return [start, end];
}

// Build smooth curve from waypoints
function computeBridgePoints(waypoints, segmentsPerUnit){
    if(waypoints.length === 2){
        // Straight path: just lerp
        const [a, b] = waypoints;
        const dx = b.x-a.x, dz = b.z-a.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        const n = Math.max(2, Math.round(dist / BRIDGE_TILE_W));
        const pts = [];
        for(let i=0; i<=n; i++){
            const t = i/n;
            pts.push({x: a.x+dx*t, z: a.z+dz*t});
        }
        return pts;
    }
    // Curved path via CatmullRomCurve3
    const v3pts = waypoints.map(w => new THREE.Vector3(w.x, 0, w.z));
    const curve = new THREE.CatmullRomCurve3(v3pts, false, 'centripetal', 0.25);
    const totalLen = curve.getLength();
    const n = Math.max(3, Math.round(totalLen / BRIDGE_TILE_W));
    const pts = [];
    for(let i=0; i<=n; i++){
        const p = curve.getPointAt(i/n);
        pts.push({x: p.x, z: p.z});
    }
    return pts;
}

// Direction vector at point index along bridge
function bridgeDirAt(pts, i){
    const a = (i > 0) ? pts[i-1] : pts[0];
    const b = (i < pts.length-1) ? pts[i+1] : pts[pts.length-1];
    const dx = b.x-a.x, dz = b.z-a.z;
    const len = Math.sqrt(dx*dx+dz*dz) || 1;
    return {x:dx/len, z:dz/len};
}

// Normal (perpendicular) at point
function bridgeNormAt(pts, i){
    const d = bridgeDirAt(pts, i);
    return {x: -d.z, z: d.x};
}

// Hebrew letter stele (Sprite) at bridge midpoint
function makePathStele(pathDef){
    const c = document.createElement('canvas');
    c.width = 128; c.height = 192;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,128,192);
    // Stone slab background
    ctx.fillStyle = 'rgba(60,50,40,0.7)';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(10,10,108,172,8);
    else ctx.rect(10,10,108,172);
    ctx.fill();
    // Hebrew letter
    ctx.font = 'bold 80px "Arial","Noto Sans Hebrew",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(201,168,76,0.6)'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#c9a84c';
    ctx.fillText(pathDef.letter, 64, 80);
    // Index number
    ctx.shadowBlur = 0;
    ctx.font = '24px sans-serif';
    ctx.fillStyle = 'rgba(201,168,76,0.7)';
    ctx.fillText(pathDef.idx.toString(), 64, 155);
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false});
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(1.0, 1.5, 1);
    sprite.userData = {
        type:'sentier', letter:pathDef.letter, name:pathDef.name,
        from:pathDef.from, to:pathDef.to, index:pathDef.idx
    };
    return sprite;
}

// ── Main builder: creates all 22 bridges with InstancedMesh ──
function buildAllBridges(){
    // Phase 1: compute all bridge point arrays, count total tiles/rails/pillars
    const allBridgeData = [];
    let totalTiles = 0, totalRails = 0, totalPillars = 0;

    PATHS.forEach((p, pi) => {
        const waypoints = getPathWaypoints(p);
        const pts = computeBridgePoints(waypoints);
        const nTiles = pts.length;
        const nRails = nTiles * 2;          // left + right rail per tile
        const nPillars = 2 * 2;             // 2 pillars at each end (4 total)
        allBridgeData.push({pathDef:p, pts, nTiles, nRails, nPillars, pathIdx:pi});
        totalTiles += nTiles;
        totalRails += nRails;
        totalPillars += nPillars;
    });

    // Phase 2: create InstancedMeshes
    bridgeDeckMesh = new THREE.InstancedMesh(BRIDGE_DECK_GEO, BRIDGE_DECK_MAT, totalTiles);
    bridgeDeckMesh.name = 'bridgeDeck';
    const railMesh = new THREE.InstancedMesh(BRIDGE_RAIL_GEO, BRIDGE_RAIL_MAT, totalRails);
    railMesh.name = 'bridgeRails';
    const pillarMesh = new THREE.InstancedMesh(BRIDGE_PILLAR_GEO, BRIDGE_PILLAR_MAT, totalPillars);
    pillarMesh.name = 'bridgePillars';

    let tileIdx = 0, railIdx = 0, pillarIdx = 0;
    const dummy = new THREE.Object3D();
    const torchPositions = [];
    const bridgeSteles = [];

    allBridgeData.forEach(({pathDef, pts, nTiles, pathIdx}) => {
        // Build navigation curve for NPC pathfinding
        const fromIdx = ROOM_IDX[pathDef.from], toIdx = ROOM_IDX[pathDef.to];
        const navPts = pts.map(p => new THREE.Vector3(p.x, BRIDGE_TILE_H, p.z));
        const navCurve = new THREE.CatmullRomCurve3(navPts, false, 'centripetal', 0.3);
        bridgeCurves[fromIdx+'-'+toIdx] = { curve: navCurve, surfaceY: BRIDGE_TILE_H };
        bridgeCurves[toIdx+'-'+fromIdx] = { curve: navCurve, surfaceY: BRIDGE_TILE_H, reversed: true };

        const railOffset = 0.85; // distance from center to rail

        // Deck tiles
        for(let i=0; i<pts.length; i++){
            const pt = pts[i];
            const dir = bridgeDirAt(pts, i);
            const angle = Math.atan2(dir.x, dir.z);
            dummy.position.set(pt.x, BRIDGE_TILE_H/2, pt.z);
            dummy.rotation.set(0, angle, 0);
            dummy.scale.set(1,1,1);
            dummy.updateMatrix();
            bridgeDeckMesh.setMatrixAt(tileIdx, dummy.matrix);
            bridgeDeckToPath.push(pathIdx);
            tileIdx++;

            // Rails (left + right)
            const norm = bridgeNormAt(pts, i);
            for(const side of [-1, 1]){
                dummy.position.set(
                    pt.x + norm.x * railOffset * side,
                    BRIDGE_TILE_H + 0.225,
                    pt.z + norm.z * railOffset * side
                );
                dummy.rotation.set(0, angle, 0);
                dummy.updateMatrix();
                railMesh.setMatrixAt(railIdx++, dummy.matrix);
            }
        }

        // Pillars at start and end (2 per end, left+right)
        const ends = [pts[0], pts[pts.length-1]];
        ends.forEach((pt, ei) => {
            const dir = bridgeDirAt(pts, ei === 0 ? 0 : pts.length-1);
            const norm = bridgeNormAt(pts, ei === 0 ? 0 : pts.length-1);
            for(const side of [-1, 1]){
                dummy.position.set(
                    pt.x + norm.x * railOffset * side,
                    0.5,
                    pt.z + norm.z * railOffset * side
                );
                dummy.rotation.set(0, 0, 0);
                dummy.scale.set(1,1,1);
                dummy.updateMatrix();
                pillarMesh.setMatrixAt(pillarIdx++, dummy.matrix);
            }
        });

        // Torch positions at each end of bridge
        ends.forEach((pt, ei) => {
            const norm = bridgeNormAt(pts, ei === 0 ? 0 : pts.length-1);
            torchPositions.push({x: pt.x + norm.x * 1.2, z: pt.z + norm.z * 1.2});
        });

        // Hebrew stele at midpoint
        const mid = pts[Math.floor(pts.length/2)];
        const stele = makePathStele(pathDef);
        stele.position.set(mid.x, 2.2, mid.z);
        bridgeSteles.push(stele);

        // Hebrew floor glyph at midpoint
        const floorGlyph = makeHebrewFloorMesh(pathDef.letter);
        const dir = bridgeDirAt(pts, Math.floor(pts.length/2));
        floorGlyph.position.set(mid.x, BRIDGE_TILE_H + 0.02, mid.z);
        floorGlyph.rotation.z = -Math.atan2(dir.x, dir.z);
        scene.add(floorGlyph);

        // Warm light at midpoint
        const bLight = new THREE.PointLight(0xff8833, 1.2, 8, 1.5);
        bLight.position.set(mid.x, 1.5, mid.z);
        scene.add(bLight);
    });

    // Finalize InstancedMeshes
    bridgeDeckMesh.instanceMatrix.needsUpdate = true;
    railMesh.instanceMatrix.needsUpdate = true;
    pillarMesh.instanceMatrix.needsUpdate = true;
    scene.add(bridgeDeckMesh);
    scene.add(railMesh);
    scene.add(pillarMesh);
    bridgeSteles.forEach(s => scene.add(s));

    // Console verification
    console.log(`[BRIDGES] 22 sentiers built: ${totalTiles} tiles, ${totalRails} rails, ${totalPillars} pillars (3 draw calls)`);
    PATHS.forEach(p => {
        console.log(`  [SENTIER ${p.idx}] ${p.letter} ${p.name}: ${p.from} → ${p.to}`);
    });

    return { torchPositions };
}

function createCharacter(col){
    const group = new THREE.Group();

    // ── Torso ──
    const bodyMat = new THREE.MeshStandardMaterial({ color:col, roughness:0.6, metalness:0.05 });
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.28, 0.14), bodyMat);
    torso.position.y = 0.50;
    torso.castShadow = true;
    group.add(torso);

    // ── Head ──
    const skinTone = new THREE.Color(0xf5deb3);
    const headCol = new THREE.Color(col).lerp(skinTone, 0.35);
    const headMat = new THREE.MeshStandardMaterial({ color:headCol, roughness:0.5, metalness:0.02 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 10), headMat);
    head.position.y = 0.76;
    head.castShadow = true;
    group.add(head);

    // ── Hair (small cap) ──
    const hairMat = new THREE.MeshStandardMaterial({ color:new THREE.Color(col).multiplyScalar(0.4), roughness:0.8 });
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 4, 0, Math.PI*2, 0, Math.PI/2), hairMat);
    hair.position.y = 0.80;
    hair.rotation.x = -0.1;
    group.add(hair);

    // ── Arms (with pivots at shoulder) ──
    const armMat = new THREE.MeshStandardMaterial({ color:col, roughness:0.6 });

// ── Da'at material transparency tracker ──
let daatMatsReady = false;
const daatWallMats = [];

function updateDaatEffects(dt, t){
    const el = t / 1000;

    // Process Da'at GLTF materials once loaded (async)
    if(!daatMatsReady){
        let mc = 0;
        daatGroup.traverse(function(ch){
            if(ch.isMesh){
                mc++;
                if(!ch.material._daatDone){
                    ch.material = ch.material.clone();
                    ch.material.transparent = true;
                    ch.material.opacity = 0.4;
                    ch.material.color.lerp(new THREE.Color(0x6644aa), 0.3);
                    ch.material._daatDone = true;
                    daatWallMats.push(ch.material);
                }
            }
        });
        if(mc > 5) daatMatsReady = true;
    }

    // Pulse wall opacity: 6s cycle, range [0.25, 0.55]
    const pulse = Math.sin(el * Math.PI * 2 / 6);
    const wallOp = 0.40 + pulse * 0.15;
    for(const m of daatWallMats) m.opacity = wallOp;

    // Light pulses inversely (bright when walls fade)
    daatLight.intensity = 0.8 - pulse * 0.5;

    // Rotate mist sprites slowly
    for(const mist of daatMistSprites){
        const a = mist.baseAngle + el * 0.1;
        const r = 2.5 + Math.sin(el * 0.3 + mist.baseAngle) * 0.5;
        mist.sprite.position.x = daatRoom.x + Math.cos(a) * r;
        mist.sprite.position.z = daatRoom.z + Math.sin(a) * r;
        mist.sprite.position.y = 1.2 + Math.sin(el * 0.2 + mist.baseAngle * 2) * 0.3;
        mist.mat.opacity = 0.35 + Math.sin(el * 0.5 + mist.baseAngle) * 0.15;
    }

    // Brownian motion for floating particles
    const pp = daatParticles.geometry.attributes.position.array;
    const hw = daatRoom.w * 0.35, hd = daatRoom.d * 0.35;
    for(let i = 0; i < DAAT_PARTICLE_COUNT; i++){
        pp[i*3]   += (Math.random()-0.5) * dt * 0.4;
        pp[i*3+1] += (Math.random()-0.5) * dt * 0.3;
        pp[i*3+2] += (Math.random()-0.5) * dt * 0.4;
        // Clamp within room bounds
        pp[i*3]   = Math.max(daatRoom.x - hw, Math.min(daatRoom.x + hw, pp[i*3]));
        pp[i*3+1] = Math.max(0.3, Math.min(2.3, pp[i*3+1]));
        pp[i*3+2] = Math.max(daatRoom.z - hd, Math.min(daatRoom.z + hd, pp[i*3+2]));
    }
    daatParticles.geometry.attributes.position.needsUpdate = true;
    daatPMat.opacity = 0.5 + Math.sin(el * 2) * 0.25;

    // Rotate icosahedron on all 3 axes + float
    daatIco.rotation.x += 0.005;
    daatIco.rotation.y += 0.005;
    daatIco.rotation.z += 0.005;
    daatIco.position.y = 1.8 + Math.sin(el * 0.7) * 0.15;
    icoMat.opacity = 0.6 + Math.sin(el * 1.5) * 0.2;
}

// ── Olamot particle animation ──
function updateOlamotParticles(dt, t){
    var el = t / 1000;
    for(var si = 0; si < olamotParticleSys.length; si++){
        var sys = olamotParticleSys[si];
        var pp = sys.points.geometry.attributes.position.array;
        var depth = sys.olam.zMax - sys.olam.zMin;
        var hw = OLAM_W * 0.35;
        for(var i = 0; i < sys.n; i++){
            var i3 = i * 3;
            if(sys.type === 'descend'){
                // Golden dust descending slowly
                pp[i3]   += (Math.random() - 0.5) * dt * 0.3;
                pp[i3+1] -= dt * 0.15;
                pp[i3+2] += (Math.random() - 0.5) * dt * 0.3;
                if(pp[i3+1] < 0.3){
                    pp[i3+1] = 3.5 + Math.random();
                    pp[i3]   = (Math.random() - 0.5) * OLAM_W * 0.7;
                    pp[i3+2] = sys.olam.zMin + Math.random() * depth;
                }
            } else if(sys.type === 'drift'){
                // Blue particles drifting horizontally
                pp[i3]   += dt * 0.2;
                pp[i3+1] += (Math.random() - 0.5) * dt * 0.1;
                pp[i3+2] += (Math.random() - 0.5) * dt * 0.15;
                if(pp[i3] > hw){
                    pp[i3] = -hw;
                    pp[i3+2] = sys.olam.zMin + Math.random() * depth;
                }
                pp[i3+1] = Math.max(0.5, Math.min(4.0, pp[i3+1]));
            } else if(sys.type === 'firefly'){
                // Green fireflies bobbing up and down
                pp[i3]   += (Math.random() - 0.5) * dt * 0.25;
                pp[i3+1] += Math.sin(el * 2 + i * 0.7) * dt * 0.3;
                pp[i3+2] += (Math.random() - 0.5) * dt * 0.25;
                pp[i3]   = Math.max(-hw, Math.min(hw, pp[i3]));
                pp[i3+1] = Math.max(0.5, Math.min(3.5, pp[i3+1]));
                pp[i3+2] = Math.max(sys.olam.zMin, Math.min(sys.olam.zMax, pp[i3+2]));
            }
        }
        sys.points.geometry.attributes.position.needsUpdate = true;
        sys.mat.opacity = 0.5 + Math.sin(el * 1.5 + si * 2.1) * 0.2;
    }
}

var shefaParticles = [];
var shefaPositions = new Float32Array(SHEFA_TOTAL * 3);
var shefaAColors   = new Float32Array(SHEFA_TOTAL * 3);
var shefaASizes    = new Float32Array(SHEFA_TOTAL);
var shefaBoosts    = {};

PATHS.forEach(function(p, pi){
    var fromIdx = ROOM_IDX[p.from], toIdx = ROOM_IDX[p.to];
    var ck = fromIdx + '-' + toIdx;
    if(!bridgeCurves[ck]) return;
    var baseSize = OLAM_PSIZE[SEPH_OLAM[p.to] || 'yetzirah'];
    for(var j = 0; j < SHEFA_PER_PATH; j++){
        var desc = j < Math.ceil(SHEFA_PER_PATH * 0.6);
        var bi   = (pi * SHEFA_PER_PATH + j) * SHEFA_TRAIL;
        shefaParticles.push({
            pi: pi, ck: ck,
            t: (j / SHEFA_PER_PATH + Math.random() * 0.15) % 1,
            spd: 4 + Math.random() * 2,
            desc: desc, bi: bi
        });
        var col = desc ? COL_YASHAR : COL_CHOZER;
        var tM = [1.0, 0.5, 0.25];
        var sM = [1.0, 0.7, 0.4];
        for(var k = 0; k < SHEFA_TRAIL; k++){
            var ci = (bi + k) * 3;
            shefaAColors[ci]   = col.r * tM[k];
            shefaAColors[ci+1] = col.g * tM[k];
            shefaAColors[ci+2] = col.b * tM[k];
            shefaASizes[bi + k] = baseSize * sM[k];
        }
    }
});

var _shC = document.createElement('canvas');
_shC.width = 32; _shC.height = 32;
var _shX = _shC.getContext('2d');
var _shG = _shX.createRadialGradient(16,16,0, 16,16,16);
_shG.addColorStop(0, 'rgba(255,255,255,1)');
_shG.addColorStop(0.4, 'rgba(255,255,255,0.5)');
_shG.addColorStop(1, 'rgba(255,255,255,0)');
_shX.fillStyle = _shG;
_shX.fillRect(0,0,32,32);
var shefaTex = new THREE.CanvasTexture(_shC);

var shefaGeo = new THREE.BufferGeometry();
shefaGeo.setAttribute('position', new THREE.BufferAttribute(shefaPositions, 3));
shefaGeo.setAttribute('aColor',   new THREE.BufferAttribute(shefaAColors, 3));
shefaGeo.setAttribute('aSize',    new THREE.BufferAttribute(shefaASizes, 1));

var shefaMat = new THREE.ShaderMaterial({
    uniforms: { uTex: {value: shefaTex} },
    vertexShader: [
        'attribute float aSize;',
        'attribute vec3 aColor;',
        'varying vec3 vCol;',
        'void main(){',
        '    vCol = aColor;',
        '    gl_PointSize = aSize;',
        '    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
        '}'
    ].join('\n'),
    fragmentShader: [
        'uniform sampler2D uTex;',
        'varying vec3 vCol;',
        'void main(){',
        '    vec4 tx = texture2D(uTex, gl_PointCoord);',
        '    gl_FragColor = vec4(vCol, tx.a);',
        '}'
    ].join('\n'),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

var shefaPoints = new THREE.Points(shefaGeo, shefaMat);
scene.add(shefaPoints);

function shefaBoostSeph(sephId, ts){
    for(var i = 0; i < PATHS.length; i++){
        if(PATHS[i].from === sephId || PATHS[i].to === sephId)
            shefaBoosts[i] = ts + 2000;
    }
}

var _shGap = 0.04;

function updateShefa(dt, t){
    if(!shefaEnabled) return;
    for(var i = 0; i < shefaParticles.length; i++){
        var sp = shefaParticles[i];
        var cd = bridgeCurves[sp.ck];
        if(!cd) continue;
        var boost = (shefaBoosts[sp.pi] && shefaBoosts[sp.pi] > t) ? 3.0 : 1.0;
        sp.t += (dt / sp.spd) * boost;
        if(sp.t >= 1) sp.t -= 1;
        var curve = cd.curve;
        for(var k = 0; k < SHEFA_TRAIL; k++){
            var ct = sp.t - k * _shGap;
            if(ct < 0) ct = sp.t;
            var cT = sp.desc ? ct : (1 - ct);
            cT = Math.max(0.001, Math.min(0.999, cT));
            var pos = curve.getPointAt(cT);
            var i3 = (sp.bi + k) * 3;
            shefaPositions[i3]   = pos.x;
            shefaPositions[i3+1] = pos.y + 0.35;
            shefaPositions[i3+2] = pos.z;
        }
    }
    shefaGeo.attributes.position.needsUpdate = true;
}

};

// ═══════════════════════════════════════════════════════════════
//   CLICK SYSTEM — pointerdown/pointerup to bypass OrbitControls
//   (OrbitControls calls preventDefault on pointerdown, killing click events)
// ═══════════════════════════════════════════════════════════════

let worldStatus = {}, memoryStats = {};

const raycaster = new THREE.Raycaster();
const clickMouse = new THREE.Vector2();
let _ptrDownPos = new THREE.Vector2();
let _ptrDownTime = 0;
let lastClickPos = {x:0, y:0};

// Walk parent chain to find an ancestor with given userData key
function findAncestorData(obj, key){
    let cur = obj;
    while(cur){
        if(cur.userData && cur.userData[key] !== undefined) return cur;
        cur = cur.parent;
    }
    return null;
}

renderer.domElement.addEventListener('pointerdown', function(e){
    _ptrDownPos.set(e.clientX, e.clientY);
    _ptrDownTime = performance.now();
}, true);  // capture phase — fires BEFORE OrbitControls

renderer.domElement.addEventListener('pointerup', function(e){
    const dx = e.clientX - _ptrDownPos.x;
    const dy = e.clientY - _ptrDownPos.y;
    const dt = performance.now() - _ptrDownTime;

    // Drag or long press → not a click
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4 || dt > 500) return;

    console.log('[CLICK DETECTED]', e.clientX, e.clientY, 'dt='+dt.toFixed(0)+'ms');

    // NDC coords relative to canvas bounds (sidebar offsets the canvas)
    const rect = renderer.domElement.getBoundingClientRect();
    clickMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    clickMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(clickMouse, camera);

    lastClickPos = {x:e.clientX, y:e.clientY};

    // Raycast ALL scene children recursively
    const allHits = raycaster.intersectObjects(scene.children, true);

    // Debug log
    const firstHit = allHits[0];
    console.log('[RAYCAST]', {
        ndc: {x: clickMouse.x.toFixed(3), y: clickMouse.y.toFixed(3)},
        hits: allHits.length,
        firstObj: firstHit ? (firstHit.object.name || firstHit.object.type) : 'none',
        firstUserData: firstHit ? firstHit.object.userData : {},
        firstParentData: firstHit ? (firstHit.object.parent?.userData || {}) : {}
    });

    // Walk through hits: check sentier bridges, then characters, then rooms
    for(const hit of allHits){
        // Check bridge sentier (InstancedMesh click)
        if(hit.object === bridgeDeckMesh && hit.instanceId !== undefined){
            const pathIdx = bridgeDeckToPath[hit.instanceId];
            if(pathIdx !== undefined){
                console.log('[HIT] Sentier:', PATHS[pathIdx]);
                showInfoPanel('sentier', pathIdx, e);
                return;
            }
        }
        // Check stele sprites
        if(hit.object.userData && hit.object.userData.type === 'sentier'){
            const idx = hit.object.userData.index - 1;
            console.log('[HIT] Stele:', PATHS[idx]);
            showInfoPanel('sentier', idx, e);
            return;
        }
        // Check Shem HaMephorash
        if(hit.object.userData && (hit.object.userData.type === 'shem' || hit.object.userData.type === 'shem_special')){
            console.log('[HIT] Shem:', hit.object.userData);
            showInfoPanel(hit.object.userData.type, hit.object.userData, e);
            return;
        }
        // Check character first (more specific)
        const charAncestor = findAncestorData(hit.object, 'charIdx');
        if(charAncestor){
            console.log('[HIT] Character:', charAncestor.userData);
            showInfoPanel('char', charAncestor.userData.charIdx, e);
            return;
        }
        // Check room
        const roomAncestor = findAncestorData(hit.object, 'roomIdx');
        if(roomAncestor){
            console.log('[HIT] Room:', roomAncestor.userData);
            showInfoPanel('room', roomAncestor.userData.roomIdx, e);
            return;
        }
    }

    // Click elsewhere: close panel
    document.getElementById('info-panel').style.display = 'none';
}, true);  // capture phase

    }

// ═══════════════════════════════════════════════════════════════
//   AUDIO AMBIANCE — wind + fire crackle via Web Audio API
// ═══════════════════════════════════════════════════════════════

let audioCtx = null, audioMuted = true, masterGain = null;

function initAudio(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    // Brown noise → lowpass → wind
    const bufSize = 2 * audioCtx.sampleRate;
    const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    let last = 0;
    for(let i=0; i<bufSize; i++){
        const white = Math.random()*2-1;
        last = (last + 0.02*white) / 1.02;
        d[i] = last * 3.5;
    }
    const noiseSrc = audioCtx.createBufferSource();
    noiseSrc.buffer = noiseBuf;
    noiseSrc.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 180;
    noiseSrc.connect(lp);
    lp.connect(masterGain);
    noiseSrc.start();

    // Fire crackle — sparse random clicks via bandpass
    const crackBuf = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
    const cd = crackBuf.getChannelData(0);
    for(let i=0; i<cd.length; i++){
        cd[i] = Math.random() < 0.003 ? (Math.random()*2-1) : 0;
    }
    const crackSrc = audioCtx.createBufferSource();
    crackSrc.buffer = crackBuf;
    crackSrc.loop = true;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2500;
    bp.Q.value = 0.5;
    const crackGain = audioCtx.createGain();
    crackGain.gain.value = 2.5;
    crackSrc.connect(bp);
    bp.connect(crackGain);
    crackGain.connect(masterGain);
    crackSrc.start();
}

document.getElementById('mute-btn').addEventListener('click', () => {
    if(!audioCtx) initAudio();
    audioMuted = !audioMuted;
    masterGain.gain.setTargetAtTime(audioMuted ? 0 : 0.06, audioCtx.currentTime, 0.3);
    document.getElementById('mute-btn').innerHTML = audioMuted ? '&#128263;' : '&#128266;';
});

// ═══════════════════════════════════════════════════════════════
//   KATNUT — darken offline rooms, character sleeps
// ═══════════════════════════════════════════════════════════════

const katnutRooms = new Set();

function applyKatnut(sephId){
    const idx = ROOM_IDX[sephId];
    if(idx === undefined) return;
    katnutRooms.add(idx);
    const r = ROOMS[idx];
    r._glowMat.color.set(0x222233);
    r._glowMat.opacity = 0.15;
    r._glowIntensity = 0; // prevent updateChars from overwriting
    r._floorMat.emissive.set(0x222233);
    r._floorMat.emissiveIntensity = 0.03;
    if(roomLights[idx]) roomLights[idx].intensity = 0.5;
    const c = chars[idx];
    if(c && c.state !== 'sleep'){
        c.state = 'sleep';
        c.timer = 9999;
    }
}

// ═══════════════════════════════════════════════════════════════
//   CHARACTER UPDATE — with limb animations
// ═══════════════════════════════════════════════════════════════

function updateChars(dt, t){
    for(let _ci=0; _ci<chars.length; _ci++){
    const c = chars[_ci];
        c.ft += dt;

        // Decay glow
        if(c.glow>0) c.glow = Math.max(0, c.glow-dt*0.3);

        // Decay room glow (skip katnut rooms — they stay dimmed)
        const rr = ROOMS[c.home];
        if(rr._glowIntensity>0 && !katnutRooms.has(c.home)){
            rr._glowIntensity = Math.max(0, rr._glowIntensity-dt*0.25);
            rr._glowMat.opacity = rr._glowIntensity * 0.4;
        }

        switch(c.state){
        case 'idle':
            c.timer -= dt;
            if(c.timer<=0){
                const roll = Math.random();
                if(roll < 0.3){
                    // Walk to a neighboring room via bridge (30%)
                    const neighbors = adj[c.room];
                    if(neighbors.length > 0){
                        let target;
                        if(Math.random()<0.4 && c.room!==c.home && neighbors.includes(c.home)){
                            target = c.home; // prefer going home
                        } else {
                            target = neighbors[Math.floor(Math.random()*neighbors.length)];
                        }
                        // Find bridge curve for this edge
                        const curveKey = c.room+'-'+target;
                        const bridge = bridgeCurves[curveKey];
                        if(bridge){
                            c._bridgeCurve = bridge.curve;
                            c._bridgeReversed = !!bridge.reversed;
                            c._bridgeSurfaceY = bridge.surfaceY;
                            c._bridgeT = 0;
                            c._bridgeTarget = target;
                            c._bridgeDuration = 6 + Math.random()*4; // 6-10 seconds
                            c.state='walk'; c.frame=0;
                            break;
                        }
                        // Fallback: multi-hop via BFS, walk hop by hop
                        const path = bfs(c.room, target);
                        if(path.length){
                            c.path=path; c.pi=0;
                            // Start first hop
                            const firstHop = path[0];
                            const ck = c.room+'-'+firstHop;
                            const br = bridgeCurves[ck];
                            if(br){
                                c._bridgeCurve = br.curve;
                                c._bridgeReversed = !!br.reversed;
                                c._bridgeSurfaceY = br.surfaceY;
                                c._bridgeT = 0;
                                c._bridgeTarget = firstHop;
                                c._bridgeDuration = 6 + Math.random()*4;
                                c.state='walk'; c.frame=0;
                                break;
                            }
                        }
                    }
                } else if(roll < 0.5){
                    // Wander within room (20%)
                    const rm = ROOMS[c.room];
                    c._wanderTarget = {
                        x: rm.x + (Math.random()-0.5)*(rm.w*0.55),
                        z: rm.z + (Math.random()-0.5)*(rm.d*0.55)
                    };
                    c.state='wander'; c.timer=3+Math.random()*3;
                    c.frame=0;
                    break;
                }
                const acts = ROOMS[c.room].acts;
                c.state = acts[Math.floor(Math.random()*acts.length)];
                c.timer = 3+Math.random()*6;
                c.frame = 0;
                const rm = ROOMS[c.room];
                c.x = rm.x + (Math.random()-0.5)*(rm.w*0.4);
                c.z = rm.z + (Math.random()-0.5)*(rm.d*0.4);
            }
            break;
        case 'wander': {
            const wt = c._wanderTarget;
            if(wt){
                const dx = wt.x-c.x, dz = wt.z-c.z;
                const d = Math.sqrt(dx*dx+dz*dz);
                const spd = 2.5; // slower than corridor
                if(d < spd*dt+0.1){
                    c.x=wt.x; c.z=wt.z;
                    c.state='idle'; c.timer=2+Math.random()*4;
                    c._wanderTarget=null;
                } else {
                    c.x += (dx/d)*spd*dt;
                    c.z += (dz/d)*spd*dt;
                    c.mesh.rotation.y = Math.atan2(dx, dz);
                }
            } else {
                c.state='idle'; c.timer=1;
            }
            if(c.ft>0.2){c.frame=(c.frame+1)%4;c.ft=0;}
            break;
        }
        case 'walk': {
            if(c._bridgeCurve){
                // ── Follow bridge curve ──
                c._bridgeT += dt / c._bridgeDuration;
                if(c._bridgeT >= 1.0){
                    // Arrived at destination room
                    c._bridgeT = 1.0;
                    c.room = c._bridgeTarget;
                    const destR = ROOMS[c.room];
                    c.x = destR.x; c.z = destR.z;
                    // Parcel delivery
                    if(c.carrying==='parcel'){
                        placeProcedural(destR._group, 'createBookStack',
                            (Math.random()-0.5)*2, 0, (Math.random()-0.5)*1.5,
                            2.0, Math.random()*3);
                        addEffect('activation_ring', {
                            x:destR.x, z:destR.z, color:0x60ff90, duration:1.5
                        });
                        c.carrying=null;
                    }
                    // Check if multi-hop path continues
                    if(c.path && c.path.length && c.pi < c.path.length-1){
                        c.pi++;
                        const nextHop = c.path[c.pi];
                        const ck = c.room+'-'+nextHop;
                        const br = bridgeCurves[ck];
                        if(br){
                            c._bridgeCurve = br.curve;
                            c._bridgeReversed = !!br.reversed;
                            c._bridgeSurfaceY = br.surfaceY;
                            c._bridgeT = 0;
                            c._bridgeTarget = nextHop;
                            c._bridgeDuration = 6 + Math.random()*4;
                        } else {
                            c._bridgeCurve = null;
                            c.state='idle'; c.timer=15+Math.random()*10;
                        }
                    } else {
                        c._bridgeCurve = null;
                        c.path=[]; c.pi=0;
                        c.state='idle'; c.timer=15+Math.random()*10;
                    }
                } else {
                    // Interpolate along curve
                    const tEval = c._bridgeReversed ? (1.0 - c._bridgeT) : c._bridgeT;
                    const pos = c._bridgeCurve.getPointAt(Math.max(0, Math.min(1, tEval)));
                    c.x = pos.x;
                    c.z = pos.z;
                    // Face direction of travel
                    const tLook = Math.max(0, Math.min(1, tEval + (c._bridgeReversed ? -0.02 : 0.02)));
                    const lookPos = c._bridgeCurve.getPointAt(tLook);
                    const faceDx = lookPos.x - pos.x, faceDz = lookPos.z - pos.z;
                    if(Math.abs(faceDx)>0.001 || Math.abs(faceDz)>0.001){
                        c.mesh.rotation.y = Math.atan2(faceDx, faceDz);
                    }
                }
            } else {
                // Fallback: linear walk (legacy / API-driven walks)
                const tr = ROOMS[c.path[c.pi] !== undefined ? c.path[c.pi] : c.room];
                const dx = tr.x-c.x, dz = tr.z-c.z;
                const d = Math.sqrt(dx*dx+dz*dz);
                const spd = 6;
                if(d<spd*dt+0.15){
                    c.x=tr.x; c.z=tr.z; c.room=c.path[c.pi];
                    if(++c.pi>=c.path.length){
                        c.state='idle'; c.timer=15+Math.random()*10;
                        if(c.carrying==='parcel'){
                            const destR = ROOMS[c.room];
                            placeProcedural(destR._group, 'createBookStack',
                                (Math.random()-0.5)*2, 0, (Math.random()-0.5)*1.5,
                                2.0, Math.random()*3);
                            addEffect('activation_ring', {
                                x:destR.x, z:destR.z, color:0x60ff90, duration:1.5
                            });
                        }
                        c.carrying=null;
                    }
                }else{
                    c.x += (dx/d)*spd*dt;
                    c.z += (dz/d)*spd*dt;
                    c.mesh.rotation.y = Math.atan2(dx, dz);
                }
            }
            if(c.ft>0.15){c.frame=(c.frame+1)%4;c.ft=0;}
            break;
        }
        default:
            // Katnut rooms: character stays asleep indefinitely
            if(katnutRooms.has(c.home) && c.state==='sleep'){
                c.timer = 9999;
            } else {
                c.timer -= dt;
                if(c.timer<=0){c.state='idle';c.timer=2+Math.random()*4;}
            }
            if(c.ft>0.35){c.frame=(c.frame+1)%2;c.ft=0;}
            break;
        }

        // ── Update mesh position ──
        c.mesh.position.x = c.x;
        c.mesh.position.z = c.z;

        // ── Carry mesh follows character ──
        if(c._carryMesh){
            c._carryMesh.visible = !!c.carrying;
            if(c.carrying){
                c._carryMesh.position.set(c.x, 1.15, c.z);
                c._carryMesh.rotation.y += dt*2;
            }
        }

        const el = t/1000;
        const ud = c.mesh.userData;

        // ── Limb animations per state ──
        switch(c.state){
        case 'idle':
            c.mesh.position.y = 0.15 + Math.sin(el*1.5+c.home)*0.02;
            c.mesh.rotation.x = 0;
            c.mesh.rotation.z = Math.sin(el*0.7+c.home*2)*0.025;
            // Gentle look-around via body rotation
            c.mesh.rotation.y += Math.sin(el*0.5+c.home*3)*0.004;
            ud.leftArm.rotation.x = Math.sin(el*0.8+c.home)*0.1;
            ud.rightArm.rotation.x = Math.sin(el*0.8+c.home+1)*0.1;
            ud.leftArm.rotation.z = 0.06 + Math.sin(el*0.6+c.home)*0.04;
            ud.rightArm.rotation.z = -0.06 - Math.sin(el*0.6+c.home+2)*0.04;
            ud.leftLeg.rotation.x = 0;
            ud.rightLeg.rotation.x = 0;
            break;

        case 'wander': {
            const wc = el * 5;
            c.mesh.position.y = 0.15 + Math.abs(Math.sin(wc))*0.02;
            c.mesh.rotation.x = -0.02; c.mesh.rotation.z = 0;
            const ls = Math.sin(wc)*0.35;
            ud.leftLeg.rotation.x = ls;
            ud.rightLeg.rotation.x = -ls;
            ud.leftArm.rotation.x = -ls*0.3;
            ud.rightArm.rotation.x = ls*0.3;
            ud.leftArm.rotation.z = 0.06;
            ud.rightArm.rotation.z = -0.06;
            break;
        }

        case 'walk': {
            const walkCycle = el * 8;
            // Y position: on bridge surface if following a curve, else ground
            const baseY = c._bridgeCurve ? (c._bridgeSurfaceY + 0.1) : 0.1;
            c.mesh.position.y = baseY + Math.abs(Math.sin(walkCycle))*0.04;
            c.mesh.rotation.x = -0.03; c.mesh.rotation.z = 0;
            const legSwing = Math.sin(walkCycle) * 0.55;
            ud.leftLeg.rotation.x = legSwing;
            ud.rightLeg.rotation.x = -legSwing;
            ud.leftArm.rotation.x = -legSwing * 0.4;
            ud.rightArm.rotation.x = legSwing * 0.4;
            ud.leftArm.rotation.z = 0.08;
            ud.rightArm.rotation.z = -0.08;
            break;
        }

        case 'type':
            c.mesh.position.y = 0.1;
            c.mesh.rotation.x = -0.08; c.mesh.rotation.z = 0;
            ud.leftArm.rotation.x = -0.5 + Math.sin(el*12)*0.15;
            ud.rightArm.rotation.x = -0.5 + Math.sin(el*12+1.5)*0.15;
            ud.leftArm.rotation.z = 0.2;
            ud.rightArm.rotation.z = -0.2;
            ud.leftLeg.rotation.x = 0;
            ud.rightLeg.rotation.x = 0;
            break;

        case 'read':
            c.mesh.position.y = 0.1;
            c.mesh.rotation.x = -0.12; c.mesh.rotation.z = 0;
            ud.leftArm.rotation.x = -0.7;
            ud.rightArm.rotation.x = -0.7;
            ud.leftArm.rotation.z = 0.15;
            ud.rightArm.rotation.z = -0.15;
            ud.leftLeg.rotation.x = 0;
            ud.rightLeg.rotation.x = 0;
            break;

        case 'celebrate': {
            const bounce = Math.abs(Math.sin(el*5));
            c.mesh.position.y = 0.1 + bounce*0.3;
            c.mesh.rotation.z = Math.sin(el*3)*0.1;
            c.mesh.rotation.x = 0;
            ud.leftArm.rotation.x = -2.5 + Math.sin(el*6)*0.3;
            ud.rightArm.rotation.x = -2.5 + Math.sin(el*6+1)*0.3;
            ud.leftArm.rotation.z = 0.3;
            ud.rightArm.rotation.z = -0.3;
            ud.leftLeg.rotation.x = Math.sin(el*6)*0.4;
            ud.rightLeg.rotation.x = Math.sin(el*6+1.5)*0.4;
            break;
        }

        case 'talk':
            c.mesh.position.y = 0.1;
            c.mesh.rotation.y += Math.sin(el*2)*0.006;
            c.mesh.rotation.x = 0; c.mesh.rotation.z = 0;
            ud.leftArm.rotation.x = -0.3 + Math.sin(el*3)*0.25;
            ud.rightArm.rotation.x = -0.3 + Math.sin(el*3+2)*0.25;
            ud.leftArm.rotation.z = 0.3 + Math.sin(el*2)*0.1;
            ud.rightArm.rotation.z = -0.3 - Math.sin(el*2+1)*0.1;
            ud.leftLeg.rotation.x = 0;
            ud.rightLeg.rotation.x = 0;
            break;

        case 'sleep':
            c.mesh.position.y = 0.06;
            c.mesh.rotation.z = 0.3;
            c.mesh.rotation.x = 0;
            ud.leftArm.rotation.x = -0.3;
            ud.rightArm.rotation.x = -0.3;
            ud.leftArm.rotation.z = 0.4;
            ud.rightArm.rotation.z = -0.1;
            ud.leftLeg.rotation.x = 0.2;
            ud.rightLeg.rotation.x = 0.15;
            break;

        case 'sit':
            c.mesh.position.y = 0.04;
            c.mesh.rotation.x = 0; c.mesh.rotation.z = 0;
            ud.leftArm.rotation.x = -0.4;
            ud.rightArm.rotation.x = -0.4;
            ud.leftArm.rotation.z = 0.15;
            ud.rightArm.rotation.z = -0.15;
            ud.leftLeg.rotation.x = -0.8;
            ud.rightLeg.rotation.x = -0.8;
            break;

        default:
            c.mesh.position.y = 0.1;
            ud.leftArm.rotation.x = 0; ud.rightArm.rotation.x = 0;
            ud.leftArm.rotation.z = 0.05; ud.rightArm.rotation.z = -0.05;
            ud.leftLeg.rotation.x = 0; ud.rightLeg.rotation.x = 0;
        }

        // Speech bubble
        ud.bubble.visible = (c.state==='talk');

        // Emissive glow
        if(c.glow > 0.01){
            const gc = c.glowColor || new THREE.Color(ROOMS[c.home].col);
            ud.bodyMat.emissive.copy(gc);
            ud.bodyMat.emissiveIntensity = c.glow*0.6;
            ud.headMat.emissive.copy(gc);
            ud.headMat.emissiveIntensity = c.glow*0.5;
        } else {
            ud.bodyMat.emissiveIntensity = 0;
            ud.headMat.emissiveIntensity = 0;
        }

        // Room floor glow (skip katnut rooms)
        const rm = ROOMS[c.home];
        if(!katnutRooms.has(c.home)){
            if(rm._glowIntensity > 0.01){
                rm._floorMat.emissive.copy(rm._glowColor || new THREE.Color(rm.col));
                rm._floorMat.emissiveIntensity = rm._glowIntensity * 0.4;
            } else {
                rm._floorMat.emissiveIntensity = 0;
            }
        }
    }
}

const effects = [];

function addEffect(type, data){
    const eff = { type, startT:performance.now(), ...data };

    switch(type){

    // ── Expanding ring on room activation ──
    case 'activation_ring': {
        const geo = new THREE.RingGeometry(0.8, 1.0, 32);
        const mat = new THREE.MeshBasicMaterial({
            color:data.color||0xffffff, transparent:true, opacity:0.6,
            side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI/2;
        mesh.position.set(data.x, 0.15, data.z);
        scene.add(mesh);
        eff.mesh=mesh; eff.mat=mat; eff.duration=data.duration||1.2;
        break;
    }

    // ── Vertical light ray — Or Yashar (descending) / Or Chozer (ascending) ──
    case 'ohr_ray': {
        const h = 10;
        const geo = new THREE.CylinderGeometry(0.1, 0.3, h, 8);
        const mat = new THREE.MeshBasicMaterial({
            color:data.color||0xffd700, transparent:true, opacity:0,
            blending:THREE.AdditiveBlending, depthWrite:false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(data.x, data.up ? -2 : 14, data.z);
        scene.add(mesh);
        // Inner bright core
        const coreGeo = new THREE.CylinderGeometry(0.04, 0.12, h*0.9, 6);
        const coreMat = new THREE.MeshBasicMaterial({
            color:0xffffff, transparent:true, opacity:0,
            blending:THREE.AdditiveBlending, depthWrite:false
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        mesh.add(core);
        eff.mesh=mesh; eff.mat=mat; eff.coreMat=coreMat;
        eff.duration=data.duration||2.5;
        eff.ascending=!!data.up;
        break;
    }

    // ── Nitzutz star with sparkle particles ──
    case 'nitzutz_star': {
        const group = new THREE.Group();
        // Main golden star
        const starGeo = new THREE.OctahedronGeometry(0.22, 0);
        const starMat = new THREE.MeshBasicMaterial({
            color:0xffd700, transparent:true, opacity:1,
            blending:THREE.AdditiveBlending
        });
        const star = new THREE.Mesh(starGeo, starMat);
        group.add(star);
        // 6 orbiting sparkle particles
        const sparkles = [];
        for(let s=0; s<6; s++){
            const spGeo = new THREE.OctahedronGeometry(0.06, 0);
            const spMat = new THREE.MeshBasicMaterial({
                color:0xffffff, transparent:true, opacity:0.8,
                blending:THREE.AdditiveBlending
            });
            const sp = new THREE.Mesh(spGeo, spMat);
            sparkles.push({mesh:sp, mat:spMat, angle:(s/6)*Math.PI*2});
            group.add(sp);
        }
        // Glow halo
        const haloGeo = new THREE.RingGeometry(0.15, 0.45, 16);
        const haloMat = new THREE.MeshBasicMaterial({
            color:0xffd700, transparent:true, opacity:0.4,
            side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
        });
        const halo = new THREE.Mesh(haloGeo, haloMat);
        group.add(halo);
        group.position.set(data.x, 0.8, data.z);
        scene.add(group);
        eff.group=group; eff.star=star; eff.starMat=starMat;
        eff.haloMat=haloMat; eff.sparkles=sparkles;
        eff.duration=3.5; eff.baseX=data.x; eff.baseZ=data.z;
        break;
    }

    // ── Beam between two sephirotic rooms ──
    case 'zivug_beam': {
        const start = new THREE.Vector3(data.x, 1.2, data.z);
        const end = new THREE.Vector3(data.x2, 1.2, data.z2);
        const dir = new THREE.Vector3().subVectors(end, start);
        const len = dir.length();
        const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
        const geo = new THREE.CylinderGeometry(0.08, 0.08, len, 8);
        const mat = new THREE.MeshBasicMaterial({
            color:data.color||0xffd700, transparent:true, opacity:0.6,
            blending:THREE.AdditiveBlending, depthWrite:false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(mid);
        dir.normalize();
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
        scene.add(mesh);
        eff.mesh=mesh; eff.mat=mat; eff.duration=data.duration||3;
        break;
    }

    // ── Glowing halo at zivug meeting point ──
    case 'zivug_halo': {
        const geo = new THREE.TorusGeometry(1.8, 0.1, 8, 32);
        const mat = new THREE.MeshBasicMaterial({
            color:data.color||0xffd700, transparent:true, opacity:0.5,
            blending:THREE.AdditiveBlending, depthWrite:false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI/2;
        mesh.position.set(data.x, 0.3, data.z);
        scene.add(mesh);
        eff.mesh=mesh; eff.mat=mat; eff.duration=data.duration||4;
        break;
    }

    // ── Particle traveling along a beam (zivug) ──
    case 'beam_particle': {
        const bpGeo = new THREE.SphereGeometry(0.12, 6, 6);
        const bpMat = new THREE.MeshBasicMaterial({
            color:data.color||0xffd700, transparent:true, opacity:0.9,
            blending:THREE.AdditiveBlending, depthWrite:false
        });
        const bpMesh = new THREE.Mesh(bpGeo, bpMat);
        bpMesh.position.set(data.x, 1.2, data.z);
        scene.add(bpMesh);
        eff.mesh=bpMesh; eff.mat=bpMat;
        eff.duration=data.duration||2;
        eff.sx=data.x; eff.sz=data.z; eff.ex=data.x2; eff.ez=data.z2;
        break;
    }

    // ── Golden particle radiating outward from nitzutz ──
    case 'golden_particle': {
        const gpGeo = new THREE.OctahedronGeometry(0.08, 0);
        const gpMat = new THREE.MeshBasicMaterial({
            color:0xffd700, transparent:true, opacity:0.9,
            blending:THREE.AdditiveBlending, depthWrite:false
        });
        const gpMesh = new THREE.Mesh(gpGeo, gpMat);
        gpMesh.position.set(data.x, 0.8, data.z);
        scene.add(gpMesh);
        eff.mesh=gpMesh; eff.mat=gpMat;
        eff.duration=data.duration||1.5;
        eff.originX=data.x; eff.originZ=data.z;
        eff.angle=data.angle||0; eff.speed=data.speed||3;
        break;
    }

    // ── Nitzutz Points particle system (50 particles, fall + explode) ──
    case 'nitzutz_points': {
        const npCount = 50;
        const npPos = new Float32Array(npCount * 3);
        const npVels = [];
        for(let i=0; i<npCount; i++){
            npPos[i*3]   = data.x;
            npPos[i*3+1] = 12;
            npPos[i*3+2] = data.z;
            const a = Math.random()*Math.PI*2;
            const sp = 1.5+Math.random()*3;
            npVels.push({vx:Math.cos(a)*sp, vy:1+Math.random()*3, vz:Math.sin(a)*sp});
        }
        const npGeo = new THREE.BufferGeometry();
        npGeo.setAttribute('position', new THREE.BufferAttribute(npPos, 3));
        const npMat = new THREE.PointsMaterial({
            color:0xffd700, size:0.35, transparent:true, opacity:1,
            blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
        });
        const pts = new THREE.Points(npGeo, npMat);
        scene.add(pts);
        eff.points=pts; eff.geo=npGeo; eff.mat=npMat;
        eff.vels=npVels; eff.count=npCount;
        eff.tx=data.x; eff.tz=data.z;
        eff.phase='fall'; eff.duration=data.duration||2.5;
        break;
    }

    // ── Ask: expanding white-gold circular wave ──
    case 'ask_wave': {
        const awGeo = new THREE.RingGeometry(0.3, 0.6, 48);
        const awMat = new THREE.MeshBasicMaterial({
            color:data.color||0xffeedd, transparent:true, opacity:0.7,
            side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
        });
        const awMesh = new THREE.Mesh(awGeo, awMat);
        awMesh.rotation.x = -Math.PI/2;
        awMesh.position.set(data.x, 0.2, data.z);
        scene.add(awMesh);
        eff.mesh=awMesh; eff.mat=awMat; eff.duration=data.duration||2;
        break;
    }

    // ── Golden parcel falling from sky at Malkuth gate ──
    case 'import_parcel': {
        const geo = new THREE.BoxGeometry(0.5, 0.35, 0.4);
        const mat = new THREE.MeshStandardMaterial({
            color:0xc9a84c, roughness:0.35, metalness:0.4,
            emissive:0xc9a84c, emissiveIntensity:0.3
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(data.x, 5, data.z);
        mesh.castShadow = true;
        scene.add(mesh);
        // Glow ring under parcel
        const ringGeo = new THREE.RingGeometry(0.2, 0.5, 16);
        const ringMat = new THREE.MeshBasicMaterial({
            color:0xffd700, transparent:true, opacity:0.4,
            side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI/2;
        ring.position.set(data.x, 0.1, data.z);
        scene.add(ring);
        eff.mesh=mesh; eff.mat=mat; eff.ring=ring; eff.ringMat=ringMat;
        eff.duration=data.duration||3;
        break;
    }
    }

    effects.push(eff);
}

function cleanupEffect(e){
    if(e.points){
        scene.remove(e.points);
        if(e.geo) e.geo.dispose();
        if(e.mat) e.mat.dispose();
    } else if(e.group){
        scene.remove(e.group);
        e.group.traverse(function(ch){
            if(ch.geometry) ch.geometry.dispose();
            if(ch.material) ch.material.dispose();
        });
    } else {
        scene.remove(e.mesh);
        if(e.mesh && e.mesh.geometry) e.mesh.geometry.dispose();
        if(e.mat) e.mat.dispose();
    }
    if(e.ring){
        scene.remove(e.ring);
        e.ring.geometry.dispose();
        e.ringMat.dispose();
    }
    if(e.coreMat) e.coreMat.dispose();
}

function updateEffects(t){
    for(let i=effects.length-1;i>=0;i--){
        const e = effects[i];
        const age = (t-e.startT)/1000;
        if(age > e.duration){
            cleanupEffect(e);
            effects.splice(i,1);
            continue;
        }
        const p = age/e.duration;

        switch(e.type){

        case 'activation_ring':
            e.mesh.scale.set(1+p*5, 1+p*5, 1);
            e.mat.opacity = (1-p)*0.5;
            break;

        case 'ohr_ray': {
            // Descend or ascend
            if(e.ascending) e.mesh.position.y = -2 + p*8;
            else             e.mesh.position.y = 14 - p*10;
            // Fade in → hold → fade out
            const oFade = p<0.2 ? p/0.2 : p>0.75 ? (1-p)/0.25 : 1;
            e.mat.opacity = oFade*0.65;
            e.coreMat.opacity = oFade*0.5;
            // Pulse width
            const oPulse = 1+Math.sin(p*25)*0.2;
            e.mesh.scale.x = oPulse;
            e.mesh.scale.z = oPulse;
            break;
        }

        case 'nitzutz_star': {
            const rise = p<0.6 ? p/0.6 : 1;
            const fade = p>0.5 ? (p-0.5)/0.5 : 0;
            // Rise and arc slightly right
            e.group.position.y = 0.8 + rise*7;
            e.group.position.x = e.baseX + Math.sin(p*8)*0.6;
            e.group.position.z = e.baseZ + Math.cos(p*6)*0.35;
            // Spin main star
            e.star.rotation.y = p*16;
            e.star.rotation.x = p*11;
            const sc = Math.max(0.05, 1+Math.sin(p*14)*0.3-fade*0.9);
            e.star.scale.setScalar(sc);
            e.starMat.opacity = Math.max(0,1-fade);
            e.haloMat.opacity = Math.max(0,(1-fade)*0.4);
            // Sparkles orbit
            for(const sp of e.sparkles){
                const a = sp.angle + p*14;
                const r = 0.45+Math.sin(p*10)*0.15;
                sp.mesh.position.set(Math.cos(a)*r, Math.sin(a*1.5)*0.3, Math.sin(a)*r);
                sp.mesh.rotation.y = p*22;
                sp.mat.opacity = Math.max(0,(1-fade)*0.8);
                sp.mesh.scale.setScalar(Math.max(0.05,0.8-fade*0.7));
            }
            break;
        }

        case 'zivug_beam': {
            e.mat.opacity = Math.sin(p*Math.PI)*0.7;
            const bPulse = 1+Math.sin(p*14)*0.3;
            e.mesh.scale.x = bPulse;
            e.mesh.scale.z = bPulse;
            if(e.rainbow) e.mat.color.setHSL((p*2)%1, 1, 0.6);
            break;
        }

        case 'zivug_halo':
            e.mat.opacity = Math.sin(p*Math.PI)*0.5;
            e.mesh.scale.set(1+Math.sin(p*7)*0.15, 1+Math.sin(p*7)*0.15, 1);
            e.mesh.rotation.z = p*2;
            break;

        case 'beam_particle': {
            const bp = Math.min(1, age/e.duration * 1.2); // arrive early, linger
            e.mesh.position.x = e.sx + (e.ex-e.sx)*bp;
            e.mesh.position.z = e.sz + (e.ez-e.sz)*bp;
            e.mesh.position.y = 1.2 + Math.sin(bp*Math.PI)*1.5; // arc upward
            e.mat.opacity = Math.sin(Math.min(1,p)*Math.PI)*0.9;
            const bps = 0.6+Math.sin(age*10)*0.3;
            e.mesh.scale.setScalar(bps);
            break;
        }

        case 'golden_particle': {
            const dist = e.speed * age;
            e.mesh.position.x = e.originX + Math.cos(e.angle)*dist;
            e.mesh.position.z = e.originZ + Math.sin(e.angle)*dist;
            e.mesh.position.y = 0.8 + Math.sin(age*4)*0.5 + age*1.5;
            e.mat.opacity = Math.max(0, 0.9*(1-p));
            e.mesh.scale.setScalar(Math.max(0.05, 1-p*0.7));
            e.mesh.rotation.y = age*12;
            break;
        }

        case 'nitzutz_points': {
            const npos = e.geo.attributes.position;
            if(e.phase==='fall' && age<0.7){
                const fp = age/0.7;
                const ny = 12*(1-fp*fp);
                for(let i=0;i<e.count;i++){
                    npos.array[i*3]   = e.tx+(Math.random()-0.5)*0.15;
                    npos.array[i*3+1] = ny;
                    npos.array[i*3+2] = e.tz+(Math.random()-0.5)*0.15;
                }
                e.mat.size = 0.4+Math.sin(age*20)*0.1;
            } else {
                if(e.phase==='fall') e.phase='explode';
                const ea = age-0.7;
                const ep = Math.min(1, ea/(e.duration-0.7));
                for(let i=0;i<e.count;i++){
                    const v = e.vels[i];
                    npos.array[i*3]   = e.tx + v.vx*ea;
                    npos.array[i*3+1] = 0.5 + v.vy*ea - 4.9*ea*ea;
                    npos.array[i*3+2] = e.tz + v.vz*ea;
                }
                e.mat.opacity = Math.max(0, 1-ep);
                e.mat.size = 0.35*(1-ep*0.5);
            }
            npos.needsUpdate = true;
            break;
        }

        case 'ask_wave':
            e.mesh.scale.set(1+p*10, 1+p*10, 1);
            e.mat.opacity = Math.sin(p*Math.PI)*0.6;
            break;

        case 'import_parcel': {
            // Fall from sky, land, pulse, fade
            if(p<0.25){
                e.mesh.position.y = 5-(p/0.25)*4.7; // 5→0.3
            } else {
                e.mesh.position.y = 0.3+Math.sin((p-0.25)*12)*0.08;
            }
            e.mesh.rotation.y = p*3;
            if(p>0.7) e.mat.opacity = Math.max(0,(1-p)/0.3);
            // Ring pulses
            if(e.ring){
                e.ringMat.opacity = p<0.25 ? (p/0.25)*0.4 : Math.max(0,(1-p)*0.5);
                const rs = 1+Math.sin(p*10)*0.2;
                e.ring.scale.set(rs,rs,1);
            }
            break;
        }
        }
    }
}
