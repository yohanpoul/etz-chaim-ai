const YASHAR_ORDER = ['keter','chokmah','binah','daat','chesed','gevurah',
                      'tiferet','netzach','hod','yesod','malkuth'];
const CHOZER_ORDER = ['malkuth','yesod','hod','netzach','tiferet',
                      'gevurah','chesed','daat','binah','chokmah','keter'];

function activateSephirah(id, activity, glowColor, duration){
    const idx = ROOM_IDX[id];
    if(idx===undefined) return;
    if(katnutRooms.has(idx)) return; // room is offline, skip activation
    const c = chars[idx];
    const r = ROOMS[idx];
    c.glow = 1.0;
    c.glowColor = new THREE.Color(glowColor || r.col);
    if(activity){ c.state=activity; c.timer=duration||3; c.frame=0; }
    r._glowIntensity = 0.8;
    r._glowColor = new THREE.Color(glowColor || r.col);
    r._glowMat.color.set(glowColor || r.col);
    addEffect('activation_ring', {x:r.x, z:r.z, color:glowColor||r.col, duration:1.2});
    // Flash the room PointLight brightly then decay
    const rl = roomLights[idx];
    if(rl){
        const flashCol = new THREE.Color(glowColor || r.col);
        rl.color.copy(flashCol);
        rl.intensity = 12;
        const decayInterval = setInterval(()=>{
            rl.intensity = Math.max(3, rl.intensity - 0.5);
            if(rl.intensity <= 3){ rl.color.set(0xff9944); clearInterval(decayInterval); }
        }, 50);
        setTimeout(()=>{ clearInterval(decayInterval); rl.color.set(0xff9944); rl.intensity=3; }, 3000);
    }
    shefaBoostSeph(id, performance.now());
}

function sendCharTo(fromId, toId, activity, carrying){
    const fi=ROOM_IDX[fromId], ti=ROOM_IDX[toId];
    if(fi===undefined||ti===undefined) return;
    const c = chars[fi];
    const path = bfs(c.room, ti);
    if(path.length){
        c.path=path; c.pi=0; c.state='walk'; c.frame=0;
        if(carrying) c.carrying=carrying;
        // Initialize bridge curve for first hop
        const firstHop = path[0];
        const ck = c.room+'-'+firstHop;
        const br = bridgeCurves[ck];
        if(br){
            c._bridgeCurve = br.curve;
            c._bridgeReversed = !!br.reversed;
            c._bridgeSurfaceY = br.surfaceY;
            c._bridgeT = 0;
            c._bridgeTarget = firstHop;
            c._bridgeDuration = 6 + Math.random()*4;
        } else {
            c._bridgeCurve = null;
        }
    }
    if(activity){
        const check = setInterval(()=>{
            if(c.room===ti && c.state!=='walk'){
                clearInterval(check);
                c.state=activity; c.timer=4; c.frame=0;
                c.glow=1.0; c.glowColor=new THREE.Color(ROOMS[ti].col);
            }
        },200);
        setTimeout(()=>clearInterval(check),15000);
    }
}

function showDaemonToast(msg){
    const el = document.getElementById('daemon-toast');
    if(!el) return;
    el.textContent = '⚙ ' + msg;
    el.classList.add('show');
    clearTimeout(el._tid);
    el._tid = setTimeout(()=>el.classList.remove('show'), 4000);
}

function handleWorldEvent(data){
    const t = data.type;
    hudStatus.textContent = t.replace(/_/g,' ');

    // ── 1. Import: golden parcel falls at Malkuth → char carries to Yesod → book spawns ──
    if(t==='import_start'){
        hudStatus.textContent = '📦 Import: '+(data.title||'?')+' ('+data.total+' chunks)';
        // Yesod violet pulse
        const yr = ROOMS[ROOM_IDX.yesod];
        activateSephirah('yesod','type','#a060ff',3);
        addEffect('activation_ring', {x:yr.x, z:yr.z, color:0xa060ff, duration:1.5});
        // Violet particles travel from Yesod up to Tiferet
        const tr = ROOMS[ROOM_IDX.tiferet];
        for(let bp=0; bp<4; bp++){
            setTimeout(()=>{
                addEffect('beam_particle', {x:yr.x, z:yr.z, x2:tr.x, z2:tr.z, color:0xa060ff, duration:2});
            }, bp*400);
        }
        addEffect('zivug_beam', {x:yr.x, z:yr.z, x2:tr.x, z2:tr.z, color:0xa060ff, duration:3});
        // Golden parcel at Malkuth gate
        const rm = ROOMS[ROOM_IDX.malkuth];
        const gateZ = rm.z + rm.d/2 + 1.5;
        addEffect('import_parcel', {x:rm.x, z:gateZ, duration:3});
        activateSephirah('malkuth','celebrate','#c9a84c',3);
        setTimeout(()=>{ sendCharTo('malkuth','yesod','type','parcel'); }, 2500);
    }
    else if(t==='import_chunk'){
        const yi = ROOM_IDX.yesod;
        const c = chars[yi];
        if(c.state!=='type'){
            c.state='type'; c.timer=2; c.frame=0;
            c.glow=0.5; c.glowColor=new THREE.Color(0xa060ff);
        }
        if(data.index%5===0){
            addEffect('activation_ring', {x:ROOMS[yi].x, z:ROOMS[yi].z, color:0xa060ff, duration:0.6});
        }
    }
    else if(t==='import_done'){
        activateSephirah('yesod','celebrate','#60ff90',3);
        hudStatus.textContent = '✓ Import: '+data.imported+' imported';
        // Spawn a book on the shelf in Yesod
        const yr = ROOMS[ROOM_IDX.yesod];
        if(window.ProceduralModels && window.ProceduralModels.createBookStack){
            const book = window.ProceduralModels.createBookStack();
            book.scale.setScalar(0.6);
            book.position.set(yr.x + (Math.random()-0.5)*2, 0.4, yr.z + (Math.random()-0.5)*2);
            scene.add(book);
        }
    }

    // ── 2. Or Yashar: golden light ray descends Keter→Malkuth ──
    else if(t==='ohr_yashar_step'){
        const seph = data.sephirah;
        const idx = ROOM_IDX[seph];
        if(idx===undefined) return;
        const r = ROOMS[idx];
        hudStatus.textContent = '↓ Or Yashar: '+seph;
        // Golden descending ray
        addEffect('ohr_ray', {x:r.x, z:r.z, color:0xffd700, up:false, duration:2.5});
        // Beam from previous sephirah
        const yIdx = YASHAR_ORDER.indexOf(seph);
        if(yIdx>0){
            const prevR = ROOMS[ROOM_IDX[YASHAR_ORDER[yIdx-1]]];
            if(prevR) addEffect('zivug_beam', {x:prevR.x, z:prevR.z, x2:r.x, z2:r.z, color:0xffd700, duration:2});
        }
        activateSephirah(seph, 'type', '#ffd700', 3);
    }

    // ── 3. Or Chozer: silver-blue light ray ascends Malkuth→Keter ──
    else if(t==='ohr_chozer_step'){
        const seph = data.sephirah;
        const idx = ROOM_IDX[seph];
        if(idx===undefined) return;
        const r = ROOMS[idx];
        hudStatus.textContent = '↑ Or Chozer: '+seph;
        // Silver-blue ascending ray
        addEffect('ohr_ray', {x:r.x, z:r.z, color:0x88aaff, up:true, duration:2.5});
        // Beam from previous sephirah in ascending order
        const cIdx = CHOZER_ORDER.indexOf(seph);
        if(cIdx>0){
            const prevR = ROOMS[ROOM_IDX[CHOZER_ORDER[cIdx-1]]];
            if(prevR) addEffect('zivug_beam', {x:prevR.x, z:prevR.z, x2:r.x, z2:r.z, color:0x88aaff, duration:2});
        }
        activateSephirah(seph, 'read', '#88aaff', 3);
    }

    // ── 4. Nitzutz: spark falls from sky → explodes in 50 particles (Points+BufferGeometry) ──
    else if(t==='nitzutz'){
        nitzuzotCount = data.spark || nitzuzotCount+1;
        nitzCountEl.textContent = nitzuzotCount;
        nitzCountEl.parentElement.style.transform = 'scale(1.4)';
        setTimeout(()=>{ nitzCountEl.parentElement.style.transform = 'scale(1)'; }, 400);
        const sourceMap = {tiferet:ROOM_IDX.tiferet, chokmah:ROOM_IDX.chokmah, lamed:ROOM_IDX.hod};
        const srcIdx = sourceMap[data.source] ?? ROOM_IDX.tiferet;
        const sr = ROOMS[srcIdx];
        addEffect('nitzutz_points', {x:sr.x, z:sr.z, duration:2.5});
        activateSephirah(sr.id, 'celebrate', '#ffd700', 2);
    }

    // ── 4b. Ask: white-gold illumination + circular wave ──
    else if(t==='ask'){
        const askSeph = data.sephirah || 'tiferet';
        const askIdx = ROOM_IDX[askSeph];
        if(askIdx !== undefined){
            const ar = ROOMS[askIdx];
            hudStatus.textContent = '✦ Ask: '+askSeph;
            activateSephirah(askSeph, 'read', '#ffeedd', 3);
            addEffect('ask_wave', {x:ar.x, z:ar.z, color:0xffeedd, duration:2});
            addEffect('ohr_ray', {x:ar.x, z:ar.z, color:0xffeedd, up:false, duration:2});
        }
    }

    // ── 5. Zivug: both characters walk toward each other, halo at meeting point ──
    else if(t==='zivug'){
        const ai=ROOM_IDX[data.sephirah_a], bi=ROOM_IDX[data.sephirah_b];
        if(ai!==undefined && bi!==undefined){
            const ra=ROOMS[ai], rb=ROOMS[bi];
            hudStatus.textContent = '♢ Zivug: '+data.sephirah_a+' ↔ '+data.sephirah_b;
            // Both characters walk toward each other
            sendCharTo(data.sephirah_a, data.sephirah_b, 'talk');
            sendCharTo(data.sephirah_b, data.sephirah_a, 'talk');
            // Beam connecting the two rooms
            addEffect('zivug_beam', {x:ra.x, z:ra.z, x2:rb.x, z2:rb.z, color:0xff4444, duration:3, rainbow:true});
            // Traveling particles along the beam (both directions)
            for(let zp=0; zp<5; zp++){
                const delay = zp*0.3;
                setTimeout(()=>{
                    addEffect('beam_particle', {x:ra.x, z:ra.z, x2:rb.x, z2:rb.z, color:0xffd700, duration:2});
                    addEffect('beam_particle', {x:rb.x, z:rb.z, x2:ra.x, z2:ra.z, color:0xffd700, duration:2});
                }, delay*1000);
            }
            // Flash both rooms
            activateSephirah(data.sephirah_a, null, '#ffd700', 4);
            activateSephirah(data.sephirah_b, null, '#ffd700', 4);
            // Glowing halo at midpoint
            const mx = (ra.x+rb.x)/2, mz = (ra.z+rb.z)/2;
            addEffect('zivug_halo', {x:mx, z:mz, color:0xffd700, duration:4});
        }
    }

    // ── 6. Daemon: toast notification + room activation ──
    else if(t==='daemon_task'){
        showDaemonToast(data.task + (data.detail ? ' — '+data.detail : ''));
        hudStatus.textContent = '⚙ Daemon: '+data.task;
        // Subtle green glow on ALL sephiroth simultaneously for 1 second
        ROOMS.forEach((r,i)=>{
            if(!katnutRooms.has(i)) activateSephirah(r.id, null, '#44bb66', 1);
        });
    }
}

// ═══ Animation API (accessible depuis la console) ═══

function triggerAnimation(type, data){
    data = data || {};
    data.type = type;
    handleWorldEvent(data);
}

function testAnimation(type){
    const presets = {
        import_start: {type:'import_start', title:'Test Document', total:10},
        import_chunk: {type:'import_chunk', index:0},
        import_done: {type:'import_done', imported:10},
        ask: {type:'ask', sephirah:'tiferet'},
        nitzutz: {type:'nitzutz', source:'tiferet', spark:1},
        zivug: {type:'zivug', sephirah_a:'chesed', sephirah_b:'gevurah'},
        daemon_task: {type:'daemon_task', task:'gc', detail:'test run'},
        ohr_yashar_step: {type:'ohr_yashar_step', sephirah:'tiferet'},
        ohr_chozer_step: {type:'ohr_chozer_step', sephirah:'yesod'}
    };
    const d = presets[type];
    if(!d){
        console.warn('[testAnimation] Type inconnu: "'+type+'"');
        console.log('Types disponibles:', Object.keys(presets).join(', '));
        return;
    }
    console.log('[TEST ANIMATION]', type, d);
    handleWorldEvent(d);
}

window.triggerAnimation = triggerAnimation;
window.testAnimation = testAnimation;

// ═══ SSE Connection (auto-reconnect 3s) ═══
function connectSSE(){
    const es = new EventSource('/api/world/events');

    es.addEventListener('world', function(e){
        try{
            const parsed = JSON.parse(e.data);
            console.log('[SSE]', parsed.type, parsed);
            handleWorldEvent(parsed);
        }
        catch(err){ console.warn('SSE parse error:', err); }
    });

    es.onopen = function(){
        hudStatus.textContent = 'connected';
        console.log('[SSE] Connected');
        setTimeout(()=>{ if(hudStatus.textContent==='connected') hudStatus.textContent=''; },2000);
    };

    es.onerror = function(){
        es.close();
        hudStatus.textContent = 'reconnecting...';
        console.log('[SSE] Disconnected, reconnecting in 3s...');
        setTimeout(connectSSE, 3000);
    };
}
connectSSE();

// ═══════════════════════════════════════════════════════════════
//   DAY / NIGHT CYCLE — Dungeon torchlight variation
// ═══════════════════════════════════════════════════════════════

const DAY_CYCLE_S = 120;

function updateDayNight(t){
    const phase = (t/1000/DAY_CYCLE_S) % 1;
    const dayness = Math.cos(phase*Math.PI*2)*0.5+0.5;

    // Dungeon: warm ambient shifts, luminous overall
    const voidDay = new THREE.Color(0x1a1525);
    const voidNight = new THREE.Color(0x0a080f);
    const voidCol = voidDay.clone().lerp(voidNight, 1-dayness);
    renderer.setClearColor(voidCol);
    scene.fog.color.copy(voidCol);

    ambientLight.intensity = 0.6 + dayness*0.3;
    hemiLight.intensity = 0.4 + dayness*0.25;
    dirLight.intensity = 0.35 + dayness*0.25;

    scene.fog.density = 0.002 + (1-dayness)*0.002;
    renderer.toneMappingExposure = 1.0 + dayness*0.3;

    // Torch lights — always strong, flicker at "night" (skip katnut rooms)
    const torchBoost = 2.0 + (1-dayness)*1.5;
    for(let ri=0; ri<roomLights.length; ri++){
        if(!katnutRooms.has(ri)) roomLights[ri].intensity = torchBoost;
    }

    // Ground subtly shifts
    const gBright = 0.1 + dayness*0.06;
    ground.material.color.setHSL(0.07, 0.15, gBright);

    if(dayness>0.6) hudTime.textContent = 'DAY';
    else if(dayness>0.3) hudTime.textContent = (phase<0.5?'DAWN':'DUSK');
    else hudTime.textContent = 'NIGHT';
}

// ═══════════════════════════════════════════════════════════════
//   RESIZE
// ═══════════════════════════════════════════════════════════════

function onResize(){
    const rect = container.getBoundingClientRect();
    const w = rect.width || window.innerWidth;
    const h = rect.height || window.innerHeight;
    aspect = w/h;
    camera.left = frustumSize*aspect/-2;
    camera.right = frustumSize*aspect/2;
    camera.top = frustumSize/2;
    camera.bottom = frustumSize/-2;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ═══════════════════════════════════════════════════════════════
//   MAIN LOOP
// ═══════════════════════════════════════════════════════════════

let lastTime = 0;

function loop(t){
    requestAnimationFrame(loop);

    const dt = Math.min((t-lastTime)/1000, 0.1);
    lastTime = t;

    updateChars(dt, t);
    updateEffects(t);
    updateDayNight(t);
    updateWorldDecorations(dt, t);

    controls.update();
    renderer.render(scene, camera);
}

requestAnimationFrame(loop);

})();
</script>
