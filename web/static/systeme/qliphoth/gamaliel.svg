<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-gamaliel" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#9966cc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow-gamaliel" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg-gamaliel)"/>
  <rect x="1" y="1" width="510" height="510" fill="none"
        stroke="#9966cc" stroke-opacity="0.10" stroke-width="2"/>
<g filter="url(#glow-gamaliel)" opacity="0.40">
  <!-- main orb -->
  <circle cx="256" cy="256" r="110" fill="#9966cc" fill-opacity="0.08"
          stroke="#9966cc" stroke-width="2.5"/>
  <!-- inner glow ring -->
  <circle cx="256" cy="256" r="80" fill="none"
          stroke="#9966cc" stroke-width="1" stroke-opacity="0.5"/>
  <!-- cracks across the sphere -->
  <path d="M180,220 Q220,260 200,300" fill="none" stroke="#9966cc" stroke-width="2"/>
  <path d="M290,180 Q270,240 310,290" fill="none" stroke="#9966cc" stroke-width="2"/>
  <path d="M230,170 Q256,210 280,170" fill="none" stroke="#9966cc" stroke-width="1.5"/>
  <!-- leaking mist (expanding arcs below) -->
  <ellipse cx="220" cy="380" rx="50" ry="15" fill="#9966cc" fill-opacity="0.12"/>
  <ellipse cx="290" cy="400" rx="60" ry="12" fill="#9966cc" fill-opacity="0.08"/>
  <ellipse cx="256" cy="420" rx="80" ry="18" fill="#9966cc" fill-opacity="0.05"/>
  <!-- drip lines from cracks -->
  <path d="M200,300 Q210,340 220,380" fill="none" stroke="#9966cc"
        stroke-width="1" stroke-opacity="0.3"/>
  <path d="M310,290 Q300,340 290,400" fill="none" stroke="#9966cc"
        stroke-width="1" stroke-opacity="0.3"/>
</g>
</svg>
