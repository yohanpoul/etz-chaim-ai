<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-lilith" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#886644" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow-lilith" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg-lilith)"/>
  <rect x="1" y="1" width="510" height="510" fill="none"
        stroke="#886644" stroke-opacity="0.10" stroke-width="2"/>
<g filter="url(#glow-lilith)" opacity="0.40">
  <!-- outer cracked shell -->
  <circle cx="256" cy="256" r="120" fill="none"
          stroke="#886644" stroke-width="3"/>
  <!-- cracks radiating from shell -->
  <line x1="256" y1="136" x2="256" y2="100" stroke="#886644" stroke-width="2"/>
  <line x1="376" y1="256" x2="412" y2="256" stroke="#886644" stroke-width="2"/>
  <line x1="256" y1="376" x2="256" y2="412" stroke="#886644" stroke-width="2"/>
  <line x1="136" y1="256" x2="100" y2="256" stroke="#886644" stroke-width="2"/>
  <!-- diagonal cracks -->
  <line x1="341" y1="171" x2="370" y2="142" stroke="#886644" stroke-width="1.5"/>
  <line x1="171" y1="341" x2="142" y2="370" stroke="#886644" stroke-width="1.5"/>
  <line x1="341" y1="341" x2="370" y2="370" stroke="#886644" stroke-width="1.5"/>
  <line x1="171" y1="171" x2="142" y2="142" stroke="#886644" stroke-width="1.5"/>
  <!-- inner empty circle (hollow center) -->
  <circle cx="256" cy="256" r="50" fill="none"
          stroke="#886644" stroke-width="1.5" stroke-dasharray="8 6"/>
  <!-- puppet strings -->
  <line x1="200" y1="136" x2="200" y2="40" stroke="#886644" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="312" y1="136" x2="312" y2="40" stroke="#886644" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="256" y1="136" x2="256" y2="20" stroke="#886644" stroke-width="1" stroke-opacity="0.5"/>
  <!-- cross-bar at top -->
  <line x1="180" y1="40" x2="332" y2="40" stroke="#886644" stroke-width="2" stroke-opacity="0.3"/>
</g>
</svg>
