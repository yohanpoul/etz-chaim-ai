<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-hatehom" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#555555" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow-hatehom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg-hatehom)"/>
  <rect x="1" y="1" width="510" height="510" fill="none"
        stroke="#555555" stroke-opacity="0.10" stroke-width="2"/>
<g filter="url(#glow-hatehom)" opacity="0.45">
  <!-- left cliff face -->
  <path d="M0,0 L230,0 L220,80 L235,200 L215,320 L225,440 L210,512 L0,512 Z"
        fill="#555555" fill-opacity="0.06" stroke="none"/>
  <path d="M230,0 L220,80 L235,200 L215,320 L225,440 L210,512"
        fill="none" stroke="#555555" stroke-width="2.5"/>
  <!-- right cliff face -->
  <path d="M512,0 L282,0 L292,80 L278,200 L298,320 L288,440 L302,512 L512,512 Z"
        fill="#555555" fill-opacity="0.06" stroke="none"/>
  <path d="M282,0 L292,80 L278,200 L298,320 L288,440 L302,512"
        fill="none" stroke="#555555" stroke-width="2.5"/>
  <!-- depth mist rising from below -->
  <ellipse cx="256" cy="480" rx="60" ry="20" fill="#555555" fill-opacity="0.08"/>
  <ellipse cx="250" cy="440" rx="40" ry="12" fill="#555555" fill-opacity="0.06"/>
  <ellipse cx="260" cy="400" rx="30" ry="8" fill="#555555" fill-opacity="0.04"/>
  <!-- broken bridge planks -->
  <rect x="210" y="248" width="30" height="6" fill="#555555" fill-opacity="0.25"
        transform="rotate(-8 225 251)"/>
  <rect x="272" y="246" width="30" height="6" fill="#555555" fill-opacity="0.25"
        transform="rotate(5 287 249)"/>
  <!-- hanging rope from left -->
  <path d="M225,251 Q245,270 250,300" fill="none"
        stroke="#555555" stroke-width="1" stroke-opacity="0.3"/>
  <!-- hanging rope from right -->
  <path d="M272,249 Q265,268 262,300" fill="none"
        stroke="#555555" stroke-width="1" stroke-opacity="0.3"/>
</g>
</svg>
