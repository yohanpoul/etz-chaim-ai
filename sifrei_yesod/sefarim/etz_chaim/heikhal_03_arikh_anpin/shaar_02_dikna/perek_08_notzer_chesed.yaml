  # ─── ASSERTION 1 : Vital énumère les 13 mots-attributs DE MIKHA ───

  - id: "EC-H3S2-T08-001"
    source_he: "אמנם פי' י\"ג מדות בסוד י\"ג ת\"ד דא\"א נבאר מקום הי\"ג תיקונים היכן הם בדיקנא ואמנם נמנה תחלה התיבות איך הם י\"ג א' מי אל כמוך ב' נושא עון ג' ועובר על פשע ד' לשארית נחלתו ה' לא החזיק לעד אפו ו' כי חפץ חסד הוא ז' ישוב ירחמנו ח' יכבוש עונותינו ט' ותשליך במצולות ים כל חטאתם י' תתן אמת ליעקב י\"א חסד לאברהם י\"ב אשר נשבעת לאבותינו י\"ג מימי קדם."
    source_edition: "Sefaria Sefer Etz Chaim 13:9 (CC-BY 3.0, cache local) — édition Warsaw 1891 / Ashlag HaSulam"
    source_ref: "Etz Chaim, Sha'ar Arikh Anpin (Shaar 13), perek 9"
    translation_fr: |
      Voici l'explication des 13 ATTRIBUTS dans le secret des 13 Tikkunim
      de la Dikna d'A"A. Nous allons comprendre où sont les 13 Tikkunim
      dans la barbe. Mais comptons d'abord les MOTS qui les nomment :
      (1) מי אל כמוך — Qui est Dieu comme toi
      (2) נושא עון — qui supporte l'iniquité
      (3) ועובר על פשע — et pardonne la transgression
      (4) לשארית נחלתו — pour le reste de son héritage
      (5) לא החזיק לעד אפו — il ne garde pas sa colère pour toujours
      (6) כי חפץ חסד הוא — car il désire la bonté
      (7) ישוב ירחמנו — il reviendra nous faire grâce
      (8) יכבוש עונותינו — il subjuguera nos iniquités
      (9) ותשליך במצולות ים כל חטאתם — et tu jetteras au fond des mers...
      (10) תתן אמת ליעקב — tu donneras la vérité à Yaakov
      (11) חסד לאברהם — grâce à Avraham
      (12) אשר נשבעת לאבותינו — que tu as juré à nos pères
      (13) מימי קדם — depuis les jours anciens
    assertion: |
      VITAL ÉNUMÈRE LES 13 TIKKUNIM PAR LES MOTS DE **MIKHA 7:18-20**,
      PAS D'EXODE 34:6-7. Ceci confirme la découverte philologique :
      le texte-source profond (shefa penimit) des 13 Tikkunim est
      le passage de MIKHA (proclamation des 13 Middot de miséricorde
      selon Rabbenu Tam et la tradition ashkénaze). La liste exacte :
      1-Mi El kamokha / 2-Noseh avon / 3-Ve-over al pesha / ... /
      8-**Yikhbosh avonoteinu** / ... / 13-Mi-yemey kedem.
      Tikkun 8 chez Vital = "yikhbosh avonoteinu" — ce qui correspond
      EXACTEMENT au Zohar Idra Rabba section 18 qui cite Mikha 7:19
      comme scripture du Tikkun 8. La cohérence Zohar ↔ Vital est forte
      sur le TEXTE-SOURCE (Mikha 7) mais divergente sur le NOM DU TIKKUN
      (Vital lie T8 aux "cheveux" = attributs d'Exode Ki Tisa, voir
      assertion EC-H3S2-T08-002).
