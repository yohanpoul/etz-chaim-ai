  # ─── ASSERTION 2 : Les CHEVEUX (canaux-vases) = 13 attributs d'Exode Ki Tisa ───

  - id: "EC-H3S2-T08-002"
    source_he: "אך שערות הזקן עצמו שהם הצינורות וכלים ומעברים שיריק המשחתא קדישא בהם הם י\"ג מדות שנזכרו בתורה בפרשה כי תשא והם כמו י\"ג דז\"א כי כבר ידעת שאין בז\"א רק ט' והם של פ' שלח לך וכשמאירין בו י\"ג אלו אז נקרא בשמם והם ע\"ז הסדר אל א' רחום ב' וחנון ג' ארך ד' אפים ה' לפי שארך אפים מורה על ב' מדות יחד ולזה לא אמר ארך אף אלא אפים ורב חסד ו' ואמת ז' נוצר חסד ח' לאלפים ט' נושא עון י' ופשע י\"א וחטאה י\"ב ונקה י\"ג."
    source_edition: "Sefaria Sefer Etz Chaim 13:9 (CC-BY)"
    source_ref: "Etz Chaim Sha'ar Arikh Anpin perek 9, mi-section"
    translation_fr: |
      Mais LES CHEVEUX DE LA BARBE eux-mêmes, qui sont les CANAUX, les
      VASES et les PASSAGES par lesquels s'écoule la MÉSIHATA KADDISHA
      (l'onction sainte), sont les 13 ATTRIBUTS mentionnés dans la
      TORAH, dans la parasha KI TISA (Exode 34:6-7). Ils sont comme
      les 13 de Z"A (car il faut savoir qu'en Z"A il n'y a que 9,
      qui sont ceux de la parasha Shelakh Lekha, et quand les 13 y
      brillent ils sont nommés par ces noms). Voici l'ordre :
      (1) אל A'el / (2) רחום Rachum / (3) וחנון Ve-Chanun /
      (4) ארך Arekh / (5) אפים Apayim (car "Erekh Apayim" indique
      DEUX attributs ensemble, c'est pourquoi il ne dit pas "Erekh Af"
      mais "Apayim") / (6) ורב חסד Ve-Rav Chesed / (7) ואמת Ve-Emet /
      (8) **נוצר חסד Notzer Chesed** / (9) לאלפים La-alafim /
      (10) נושא עון Noseh Avon / (11) **ופשע U-Fesha** /
      (12) וחטאה Ve-Chata'a / (13) ונקה Ve-Nakeh.
    assertion: |
      VITAL DISTINGUE 2 COUCHES ONTOLOGIQUES DES 13 TIKKUNIM :
      (a) **Shefa penimit (flux intérieur)** = 13 attributs de MIKHA 7
      (b) **Sha'arot (cheveux-canaux-vases)** = 13 attributs d'EXODE 34
      Les cheveux sont les CONDUITS par lesquels coule l'onction sainte
      (mesihata kaddisha). Ils sont nommés selon Exode Ki Tisa :
      Tikkun 1=A'el, ..., **Tikkun 8 = Notzer Chesed**, ...,
      **Tikkun 11 = U-Fesha (!! — absent de Sefaria Zohar Mantua)**, ...,
      Tikkun 13 = Ve-Nakeh. VITAL CONFIRME T11 = U-FESHA — cela résout
      partiellement la dette philologique (T11 missing in Sefaria Mantua).
      Différence avec Z"A : Z"A n'a que 9 attributs (parasha Shelakh Lekha,
      Nombres 14:18) ; A"A a 13 — les 13 d'A"A illuminent Z"A pour qu'il
      reçoive leurs noms.
