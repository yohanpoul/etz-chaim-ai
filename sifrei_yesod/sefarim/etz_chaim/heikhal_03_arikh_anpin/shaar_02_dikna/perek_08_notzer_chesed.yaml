  # ─── ASSERTION 4 : Notzer Chesed = Binah de Chokhma + Yesod de Keter ───

  - id: "EC-H3S2-T08-004"
    source_he: "והטעם כי שם למעלה אין פירוד בין דכורא שהוא הכתר ונוקבא שהיא חכמה בשום פנים לכן יסוד דכתר לעולם הוא דבוק בג\"ר דחכמה ולפי שאינו ניכר בהם רק הבינה לבד לכן אנו מחברים אותו עם הבינה"
    source_edition: "Sefaria Sefer Etz Chaim 13:10 (CC-BY)"
    source_ref: "Etz Chaim Sha'ar Arikh Anpin perek 10, mi-section"
    translation_fr: |
      Et la raison : car là-haut il n'y a AUCUNE SÉPARATION entre
      le MASCULIN (Keter) et le FÉMININ (Chokhma) en aucune manière.
      C'est pourquoi le YESOD DE KETER est toujours ATTACHÉ aux
      3 premières de Chokhma, et parce qu'il ne se manifeste en elles
      qu'à travers BINAH seulement, nous l'associons avec BINAH.
    assertion: |
      NOTZER CHESED = BINAH DE CHOKHMA **+** YESOD DE KETER (unité duelle).
      Explication doctrinale : au niveau supérieur (Keter-Chokhma), il
      n'y a pas de séparation entre masculin (Keter) et féminin (Chokhma).
      Le Yesod de Keter est donc **toujours collé** aux 3 premières
      Sephirot de Chokhma (Keter-Chokhma-Binah de Chokhma), mais seule
      sa manifestation dans BINAH est reconnaissable. Donc on associe
      Yesod de Keter avec Binah de Chokhma — **les deux ensemble
      constituent le 8e Tikkun = Notzer Chesed = Mazal Elyon**.
      Étymologie : NOTZER = préservation + BINAH (sagesse active) ;
      CHESED = bonté + YESOD (canal producteur). Le couple Notzer-Chesed
      est l'UNION de la Sagesse préservatrice (Binah) et du Flux
      miséricordieux (Chesed/Yesod) — canal vers Abba Ila'ah.
    type: derivation_lurianique_sod
    epistemic_level: E1
