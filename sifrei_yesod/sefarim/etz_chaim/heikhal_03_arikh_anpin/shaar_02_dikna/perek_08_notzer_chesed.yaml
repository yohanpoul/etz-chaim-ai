  # ─── ASSERTION 3 : Appariement Tikkunim ↔ Sephirot Chokhma+Keter ───

  - id: "EC-H3S2-T08-003"
    source_he: "ועתה נבאר שמות הספי' בי\"ג ת\"ד והוא כי הלא ח' ת\"ד קדמאין הם ח' ספי' דחכמה והם ממלכות עד הבינה כי הכתר וחכמה של מ\"ס לא נתגלו כלל כי לא היה יכולת בתחתונים לקבל הארתן אף על פי שיתגלו למטה וסדר מקומם וסדרן כך א\"ל מלכות רחום יסוד וחנון הוד ארך נצח אפים ת\"ת ורב חסד גבורה ואמת חסד נוצר חסד בינה הרי ח' תקונים דחכמה כי ב' הראשונים לא נתגלו כלל וה' תקונים [אחרים] (עלאין) הם ה' קצוות הכתר כיצד לאלפים הוד נושא עון נצח ופשע ת\"ת וחטאה גבורה ונקה חסד הרי נשלמו י\"ג ת\"ד."
    source_edition: "Sefaria Sefer Etz Chaim 13:10 (CC-BY)"
    source_ref: "Etz Chaim Sha'ar Arikh Anpin perek 10, début"
    translation_fr: |
      Maintenant expliquons les NOMS DES SEPHIROT dans les 13 Tikkunim.
      Les 8 PREMIERS Tikkunim sont les 8 Sephirot de CHOKHMA, allant
      de MALKHUT jusqu'à BINAH (car le Keter et la Chokhma de Mochin
      Stimaim ne se sont pas du tout révélés — les inférieurs n'ont
      pu en recevoir la lumière). L'ordre est :
      A'el=Malkhut / Rachum=Yesod / Ve-Chanun=Hod / Arekh=Netzach /
      Apayim=Tiferet / Ve-Rav Chesed=Gevurah / Ve-Emet=Chesed /
      **Notzer Chesed=Binah** — voici les 8 Tikkunim de Chokhma.
      Les 5 autres Tikkunim (5-13) sont les 5 EXTRÉMITÉS DU KETER :
      La-alafim=Hod / Noseh Avon=Netzach / U-Fesha=Tiferet /
      Ve-Chata'a=Gevurah / **Ve-Nakeh=Chesed** — et les 13 sont complets.
    assertion: |
      MAPPING DOCTRINAL DES 13 TIKKUNIM AUX SEPHIROT :

      Couche 1 — Tikkunim 1-8 = 8 Sephirot de CHOKHMA (bas en haut) :
      - 1=A'el → Malkhut de Chokhma
      - 2=Rachum → Yesod
      - 3=Ve-Chanun → Hod
      - 4=Arekh → Netzach
      - 5=Apayim → Tiferet
      - 6=Ve-Rav Chesed → Gevurah
      - 7=Ve-Emet → Chesed
      - **8=Notzer Chesed → BINAH de Chokhma**

      Couche 2 — Tikkunim 9-13 = 5 Extrémités de KETER :
      - 9=La-alafim → Hod de Keter
      - 10=Noseh Avon → Netzach de Keter
      - 11=U-Fesha → Tiferet de Keter
      - 12=Ve-Chata'a → Gevurah de Keter
      - **13=Ve-Nakeh → Chesed de Keter**

      Raison de l'absence de Keter-Chokhma-Binah de Mochin Stimaim :
      ils ne se sont pas révélés (les inférieurs ne peuvent recevoir
      leur lumière). Raison de Notzer Chesed = Binah de Chokhma :
      c'est le point où Chokhma "devient" Binah — le Mazal Elyon comme
      **source de la sagesse conceptualisée** qui alimente Abba.
    type: derivation_lurianique_sephirot
