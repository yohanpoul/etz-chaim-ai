  - id: "EC-H3S2-T13-001"
    source_he: "ועתה נבאר שמות הספי' בי\"ג ת\"ד והוא כי הלא ח' ת\"ד קדמאין הם ח' ספי' דחכמה ... וה' תקונים [אחרים] (עלאין) הם ה' קצוות הכתר כיצד לאלפים הוד נושא עון נצח ופשע ת\"ת וחטאה גבורה ונקה חסד הרי נשלמו י\"ג ת\"ד."
    source_edition: "Sefaria Sefer Etz Chaim 13:10 (CC-BY 3.0, cache local)"
    source_ref: "Etz Chaim, Sha'ar Arikh Anpin (Shaar 13), perek 10"
    translation_fr: |
      Maintenant expliquons les noms des Sephirot dans les 13 Tikkunim.
      Les 8 premiers Tikkunim sont les 8 Sephirot de CHOKHMA
      (Malkhut→Binah). Les 5 AUTRES Tikkunim (9-13) sont les
      5 EXTRÉMITÉS DU KETER : La-alafim=Hod, Noseh Avon=Netzach,
      U-Fesha=Tiferet, Ve-Chata'a=Gevurah, **Ve-Nakeh=Chesed**.
      Et les 13 sont complets.
    assertion: |
      T13 = VE-NAKEH = CHESED DE KETER D'A"A (lecture Vital).
      Dans la structure Sephirotique de Vital, les 5 derniers Tikkunim
      (9-13) correspondent aux 5 EXTRÉMITÉS du Keter d'A"A. Ve-Nakeh
      est la plus haute des 5 — **CHESED DE KETER**. C'est le point
      le plus noble du Keter manifesté, la source ultime de la
      miséricorde dans la Dikna. Ve-Nakeh = Mazal Tahton qui alimente
      IMMA ILA'AH (Sha'ar HaKlalim 5:1 confirme).
