  - id: "EC-H3S2-T13-002"
    source_he: "ופי' הענין הוא כי ז\"א יצא ממצפ\"ץ הימיני ונוקבא ממצפ\"ץ השמאלי ואלו הם שורש ב' המאורות הגדולים ... מצד ימין דראש שמשם ה\"ח עטרא דדכורא יצא פאה א' שממנה יונק ז\"א ... וה\"ג דשמאל יצאה פאה שמאלי שממנה יונקת נוקבא דיליה"
    source_edition: "Sefaria Sefer Etz Chaim 13:11 (CC-BY 3.0)"
    source_ref: "Etz Chaim, Sha'ar Arikh Anpin (Shaar 13), perek 11"
    translation_fr: |
      Le sens : Z"A est sorti du METZAFETZ de droite (מצפ"ץ), et NUKVA
      est sortie du METZAFETZ de gauche. Ceux-ci sont la racine des
      DEUX GRANDS LUMINAIRES. Du côté droit de la tête, où se trouvent
      les 5 Chasadim (couronne du masculin), est sortie UNE PEAH de
      laquelle ALLAITE Z"A (car les cheveux sont les restes du cerveau,
      "motrei mocha").  Et les 5 Gevurot de gauche ont fait sortir la
      PEAH GAUCHE de laquelle ALLAITE SA NUKVA.
    assertion: |
      DOCTRINE COMPLÈTE DU FLUX T13 VIA LES 2 PEOT (bords de cuir chevelu
      d'A"A). Vital explique qu'avant les 13 Middot il y a 2 Noms "YHWH
      YHWH" (Exode 34:6 : "va-yaavor YHWH YHWH"). Ces 2 Noms sont la
      racine des "2 luminaires" (Z"A et sa Nukva).
      - Métzafetz DROITE (A"TBa"Ch permutation de YHWH) → Z"A
      - Métzafetz GAUCHE → Nukva de Z"A
      La PEAH DROITE (5 Chasadim, couronne du masculin) alimente Z"A.
      La PEAH GAUCHE (5 Gevurot) alimente Nukva.
      T13 = Ve-Nakeh = Chesed de Keter participe de cette structure en
      tant que source ultime du flux vers Imma, qui alimente ensuite
      Nukva de Z"A (via la paeh gauche). La chaîne doctrinale complète :
      **T13 (Chesed Keter A"A) → Mazal Tahton → Imma → Nukva de Z"A**.
