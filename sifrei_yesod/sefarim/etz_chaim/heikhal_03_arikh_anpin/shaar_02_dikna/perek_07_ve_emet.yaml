    source_ref: "Etz Chaim, Sha'ar Arikh Anpin (Shaar 13), perek 10, mid-section"
    translation_fr: |
      « ET-VÉRITÉ » (Ve-Emet) = CHESED. « Notzer Chesed » = BINAH.
      Voici les 8 Tikkunim de CHOKHMA.
    assertion: |
      VITAL : T7 = VE-EMET = CHESED DE CHOKHMA.
      Dans la structure Sephirotique Vital (perek 10), T7 est le point
      le plus haut des 8 Tikkunim de Chokhma (qui vont de Malkhut à
      Chesed, dans l'ordre : Malkhut=A'el, Yesod=Rachum, Hod=Chanun,
      Netzach=Arekh, Tiferet=Apayim, Gevurah=Ve-Rav Chesed,
      **Chesed=Ve-Emet (T7)**).
      Vital note la tension : le 7ème "monte" vers Chesed avant que le
      8ème (Notzer Chesed) monte dans BINAH — inversion ordre-topographie
      vs ordre-Sephirotique qui révèle l'architecture cachée.
      CORRESPONDANCE avec Zohar : T7 chez Zohar = "2 pommes" (centre
      anatomique, inclut les 6 précédents). Le centre anatomique (Zohar)
      et le sommet de Chokhma (Vital) sont cohérents :
      T7 = pivot structural.
