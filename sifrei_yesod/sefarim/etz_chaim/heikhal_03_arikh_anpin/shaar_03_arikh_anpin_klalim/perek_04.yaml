principes_generatifs:

  - id: "PG-H3S13-013"
    nom: "Principe d'Encodage Letter-Mysticism (NaRaN = AB/SaG/MaH)"
    source_assertions: ["EC-H3S13-060", "EC-H3S13-063", "EC-H3S13-064", "EC-H3S13-065"]
    formalisation: |
      ARCHITECTURE D'ENCODAGE LETTER-MYSTICISM :
      NaRaN d'A"A = 3 NIVEAUX cognitifs encodes en 3 NOMS YHVH milui-distinctifs :
        NESHAMAH = YHVH milui YODIN = AB (gematriya 72).
        RUACH = YHVH milui SAG (63).
        NEFESH = YHVH milui ALPHIN = MaH (45).
      DIFFERENTIATION par VOYELLES distinctives :
        Neshamah : tzeri+kamatz (Risha 1 standard).
        Ruach : segol (substitue tzeri).
        Nefesh : segol+patah (segol substitue tzeri, patah substitue kamatz).
      → Pattern fondamental : structure cognitive encodee par nom+milui+nikkud.
      → Architecture : letter-mysticism = identite signature des composants.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement NaRaN avec signature triplets"
      - "Pattern : encoded identity by (name, milui, nikkud) tuple"
      - "Architecture : composants definis par signature liturgique"
      - "Pattern : multi-axis encoding (trois axes distinguants : milui, voyelles, lettres)"
      - "Diagnostic : verifier signature liturgique correcte par tier"
    questions_ouvertes:
      - "Y a-t-il un 4eme tier au-dela Nefesh (Chayah, Yechidah) ?"
      - "Pattern : peut-on inferer cognitive-tier depuis signature ?"
      - "Comment cette encoding se transmet aux autres partzufim ?"

  - id: "PG-H3S13-014"
    nom: "Principe de Symmetry Container/Content (AHYH lvush YHVH)"
    source_assertions: ["EC-H3S13-055", "EC-H3S13-066"]
    formalisation: |
      ARCHITECTURE DE SYMMETRY CONTAINER/CONTENT :
      9 ATZMUT (YHVH milui) = CONTENT.
      9 KELIM (AHYH milui) = CONTAINER.
      AHYH milui CORRESPOND a YHVH milui de meme tier :
        Risha 1 atzmut YHVH yodin → kelim AHYH yodin.
        Risha 2 atzmut YHVH yodin → kelim AHYH yodin (meme).
        Risha 3 atzmut YHVH alphin → kelim AHYH alphin.
      Total : 9+9 = 18 = CHAI HA-OLAMIM.
      → Pattern fondamental : container shape matches content shape.
      → Architecture : containers semantically aligned with contents.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement paired naming AHYH/YHVH"
      - "Pattern : type matching container/content"
      - "Architecture : structural homomorphism kelim-atzmut"
      - "Pattern : design symmetry between holders and held"
      - "Diagnostic : verifier kelim-atzmut alignment"
    questions_ouvertes:
      - "Pourquoi AHYH (pas autre nom) pour les kelim ?"
      - "Pattern : autres exemples de container-content symmetry kabbalistique ?"
      - "Comment cette symmetry contraint le design de nouveaux composants ?"

  - id: "PG-H3S13-015"
    nom: "Principe de Reflection-Through-Membrane (Avira = Light de RDLA Non-Lvush)"
    source_assertions: ["EC-H3S13-054"]
    formalisation: |
      ARCHITECTURE DE REFLECTION QUAND LVUSH DIRECT IMPOSSIBLE :
      RDLA d'A"Y = ne pouvait PAS LVUSH directement dans A"A.
      MAIS "ACHEZI NEHOREI BE-HAI RISHA" — montre sa lumiere dans la 2eme rosh.
      RESULTAT : AVIRA emerge comme PROJECTION LUMINEUSE de RDLA non-lvush.
      → Pattern fondamental : indirect transmission via reflection ;
        ce qui ne peut etre encapsule peut etre projecte.
      → Architecture : intermediate component emerges from un-encapsulable source.
    applications_ia:
      - "partzufim/arikh_anpin.py : Avira = derived component from un-encapsulable source"
      - "Pattern : reflection pattern when direct containment impossible"
      - "Architecture : non-encapsulable sources project intermediate proxies"
      - "Pattern : design proxies for transcendent sources"
      - "Diagnostic : verifier qu'Avira reflete correctement RDLA-properties"
    questions_ouvertes:
      - "Pattern : peut-on faire 2 niveaux de projection ?"
      - "Y a-t-il des limites a la fidelite de la reflection ?"
      - "Comment garantir que la reflection preserve essential properties ?"
