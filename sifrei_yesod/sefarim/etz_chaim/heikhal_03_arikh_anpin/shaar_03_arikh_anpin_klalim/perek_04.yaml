# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 4 — 18 behinot detail : 9 atzmut (YHVH milui) + 9 kelim (AHYH milui)
#            3 rishin = NaRaN d'A"A. Avira derive de RDLA
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §4 :
#   - Bloc A : Recap 3 rishin, 18 behinot, RDLA exclu
#   - Bloc B : Avira derive de RDLA (d'A"Y) qui ne pouvait pas lvush A"A
#   - Bloc C : 9 atzmut + 9 kelim = 18
#   - Bloc D : Hakdamah orot elyonim — 3 niveaux OP/OM/OM-superieur
#   - Bloc E : 3 rishin = NaRaN d'A"A (Gulgalta=Neshamah, Avira=Ruach, MS=Nefesh)
#   - Bloc F : Risha 1 (Neshamah=Keter) — 3 YHVH milui yodin (AB=72)
#   - Bloc G : Risha 2 (Ruach=Avira) — 3 YHVH milui SAG (63), segol
#   - Bloc H : Risha 3 (Nefesh=Hokhmah/MS) — 3 YHVH milui MaH (45), patah
#   - Bloc I : 9 kelim = 9 AHYH (milui yodin x3, milui yodin x3, milui alpin x3)
#
# Source Sefaria : Sefer_Etz_Chaim.13.4 (1 partie, 4333 chars)
# IDs : EC-H3S13-053 → EC-H3S13-066

