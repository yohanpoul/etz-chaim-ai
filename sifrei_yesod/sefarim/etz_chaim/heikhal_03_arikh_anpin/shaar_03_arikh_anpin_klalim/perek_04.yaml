  - id: "EC-H3S13-057"
    source_he: "והנה ג' בחי' אלו הם ג' רישין הנ\"ל כי רישא עלאה דעתיקא שהוא כתר הנקרא גולגלתא דא\"א הוא מקיף עליון הגדול מכולם ותחתיו יש רישא תניינא הנקרא אוירא והוא מוחא בערך הגולגלתא הנ\"ל וגם הוא נעשה גולגלתא בערך רישא תליתאי הנקרא חכמה כנ\"ל וזו הרישא תניינא הנקרא אוירא הוא מקיף קטן שהוא מקיף לאו\"פ ותחתיו יש רישא תליתאי הנקרא מ\"ס דא\"א הנקרא חכמה דא\"א והוא סוד או\"פ"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      MAPPING 3 rishin → 3 behinot ohr :
        Risha ELYONAH (Keter=Gulgalta) = OM gadol (encerclant tout).
        Risha TENINA (Avira) = OM katan (encerclant l'OP).
