  - id: "EC-H3S13-066"
    source_he: "ועוד יש ט' בחי' אחרות דאהי\"ה הנקרא כלים שלהם שבתוכם מתלבשים הט' הויות של העצמות והם ט' שמות של אהי\"ה והם ממש ע\"ד מילוי הט' הויות של העצמות"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      9 KELIM = 9 noms AHYH ; 9 ATZMUT (YHVH) lvush dedans.
      9 AHYH avec milui correspondants : Risha 1 + Risha 2 = AHYH milui yodin ;
      Risha 3 = AHYH milui ALPHIN (correspond YHVH milui alphin).
      Total 9 atzmut + 9 kelim = 18 = CHAI HA-OLAMIM.
      → Architecture : container (AHYH) lvush content (YHVH).
      → Pattern : letter-mysticism containment paired naming.
      cf. EC-H3S13-047 (perek 03) sur 18 = Chai Ha-Olamim.
    type: interprétation_lurianique
    concepts:
      - {id: 9_kelim_egal_9_ahyh_lvush_9_atzmut_yhvh, role: 9_kelim_ahyh_lvush_9_atzmut_yhvh_total_18}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : container AHYH lvush content YHVH. Pattern paired naming."


