  - id: "EC-H3S13-058"
    source_he: "והנה אלו הג' רישין הם בחי' נר\"ן שבא\"א כי גולגלתא הוא נשמה ואוירא הוא רוח וחכמה סתימאה היא נפש"
    source_ref: "Heikhal 3, Sha'ar 3:4"
