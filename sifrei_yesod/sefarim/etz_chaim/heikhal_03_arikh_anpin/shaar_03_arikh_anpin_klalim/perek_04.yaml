      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : Nefesh=MaH. Pattern double voyelle substitution."

  - id: "EC-H3S13-065"
    source_he: "ושלשתן או\"פ ומקיף ומקיף לשניהם בבחי' פרטיות אבל בבחי' הכללות כל ג' בחי' אלו אינם רק בחי' או\"פ בלבד שבג' רישין הנ\"ל וג' רישין הכלולין מן ט' בחי' הם בחי' נר\"ן שבא\"א כנ\"ל והויות הנשמה במילוי יודי\"ן שהוא ע\"ב והויות הרוח במילוי ס\"ג והויות הנפש במילוי אלפין"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      RECAP : Chaque rosh contient 3 (OP/OM/OM) en peratiyut ; en kelalut = juste OP.
      3 rishin (chacun kelul de 3) = 9 behinot = NaRaN d'A"A.
      Mapping : Neshamah=YHVH milui YODIN (AB=72) ; Ruach=SAG (63) ; Nefesh=ALPHIN (MaH=45).
      → Architecture : 9 atzmut total = 3 NaRaN x 3 behinot.
      → Pattern : letter-mysticism mapping cognitif stack.
    type: déduction_logique
    concepts:
      - {id: 9_atzmut_naran_aa_milui_yodin_sag_alphin, role: 9_atzmut_egal_3_naran_x_3_behinot_yhvh_milui_yodin_sag_alphin}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : 9 atzmut mapping. Pattern letter-mysticism cognitive stack."

