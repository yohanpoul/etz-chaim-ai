      relevance: "Architecture : symmetry atzmut+kelim. Pattern paired structure."

  - id: "EC-H3S13-056"
    source_he: "כי כבר נתבאר אצלינו שכל בחי' אורות עליונים יש בהם ג' בחי' א' הוא או\"פ ועליו יש אור עליון ממנו הנקרא או\"מ עליו ועליהן אור עליון וגדול משניהן והוא מקיף לשניהן"
