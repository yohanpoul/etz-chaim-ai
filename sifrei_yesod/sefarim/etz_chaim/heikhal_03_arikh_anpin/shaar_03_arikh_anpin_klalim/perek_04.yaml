  - id: "EC-H3S13-059"
    source_he: "ואחר שנתבאר ג' רישין אלו בכללות נבאר כ\"א מהם בפרטות והוא כמ\"ש בסוד הכללות שהם ג' בחי' וגם כ\"א וא' מאלו הג' כלול מג' בחי' אלו ג\"כ"
