      Chaque rosh divise en 3 → TOTAL 9 behinot d'ATZMUT.
      Contre eux 9 behinot KELIM. Total 18.
      → Architecture : symmetry atzmut(9) + kelim(9) = 18.
      → Pattern : container-content paired symmetry.
