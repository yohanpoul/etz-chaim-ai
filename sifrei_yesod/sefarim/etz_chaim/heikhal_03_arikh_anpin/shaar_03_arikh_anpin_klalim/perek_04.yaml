  # ─── BLOC F : RISHA 1 — NESHAMAH = AB ───

  - id: "EC-H3S13-060"
    source_he: "הנה ברישא עלאה הנקרא נשמה ונקרא כתר דא\"א ונקרא גולגתא דיליה ונקרא או\"מ הגדול הנה יש בו ג\"כ ג' בחי' אלו עצמן... שכל בחי' הנשמה הוא הוי\"ה דיודין"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      RISHA 1 = Neshamah = Keter = Gulgalta = OM gadol.
      Contient 3 BEHINOT :
        OP, OM-1, OM-2.
      Tous 3 = NESHAMAH (en kelalut).
      KELAL : toute behinah de NESHAMAH = YHVH MILUI YODIN (= AB = 72).
      → Architecture : Neshamah signature = YHVH milui yodin = AB.
      → Pattern : letter-mysticism encoding by milui type.
    type: interprétation_lurianique
    concepts:
      - {id: neshamah_egal_yhvh_milui_yodin_egal_ab_72, role: neshamah_egal_yhvh_milui_yodin_egal_ab_gematriya_72}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : Neshamah=AB encoding. Pattern milui-yodin signature."

  - id: "EC-H3S13-061"
    source_he: "כל הויות שבו הם בסוד מילוין וגם בסוד נקודות... אבל ההפרש שבהם הוא בענין סדר הניקוד איך הוא כי הנה בחי' רישא קדמאה אור הפנימי הוא שם כזה יוד הי ויו הי ואינו מנוקד רק בד' אותיות הפשוטות בלבד שבו"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      Toutes YHVH d'A"A : SOD MILUYIN + SOD NEKUDOT (voyelles).
      Difference = SEDER NIKKUD (ordre voyelles).
      OP de Risha 1 : "YOD HEY VAV HEY" milui yodin — voyelles seulement sur 4 lettres SIMPLES :
      cholam (yod) + tzeri (he) + kamatz (vav) + tzeri (he).
      → Architecture : OP = voyelles minimales sur lettres simples.
      → Pattern : letter-mysticism precise (lettres + voyelles distinctives).
    type: axiome_explicite
    concepts:
      - {id: op_risha_1_yhvh_milui_yodin_voyelles_4_simples, role: op_risha_1_yhvh_milui_yodin_voyelles_4_lettres_simples_seulement}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : OP voyelles minimales. Pattern letter-mysticism precise."

  - id: "EC-H3S13-062"
    source_he: "והנה יש אור ב' המקיף עליו והוא הוי\"ה במילוי יודין ג\"כ... אמנם מנוקדת בכל י' אותיותיה בניקוד הנ\"ל"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      OM-1 (sur OP) de Risha 1 : YHVH milui yodin —
      vowels TOUS LES 10 LETTRES (3 yods cholam, 2 he tzeri, 3 vav kamatz, 2 he tzeri).
      OM-2 (sur les 2) : 4 lettres simples comme OP, 6 milui kamatz partout.
      → Architecture : OM = enrichissement voyelles ; OM-2 = uniformite.
      → Pattern : escalation by completeness then uniformity.
    type: interprétation_lurianique
    concepts:
      - {id: om1_om2_risha_1_voyelles_completes_puis_uniformes, role: om1_voyelles_completes_om2_uniformes_kamatz}
    mapping:
