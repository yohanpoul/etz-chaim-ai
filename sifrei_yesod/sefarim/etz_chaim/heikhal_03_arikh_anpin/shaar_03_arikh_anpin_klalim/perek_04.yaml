    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      Au seder de lvush RDLA (=A"Y) DANS — Variante (Nusah Aher) : "BE-EREKH" (vis-a-vis) —
      Risha A"A : sera explique comment AVIRA (Risha tenina) sur Moha Setima
