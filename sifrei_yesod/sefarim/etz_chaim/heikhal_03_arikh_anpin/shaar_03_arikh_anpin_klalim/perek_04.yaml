      partzufim: ["arikh_anpin"]
      relevance: "Architecture : Ruach=SaG segol. Pattern voyelle substitution."

  # ─── BLOC H : RISHA 3 — NEFESH = MaH ───

  - id: "EC-H3S13-064"
    source_he: "רישא תליתאי והוא הנקרא חכמה מ\"ס דא\"א ויש בה ג\"כ ג' הויות אחרות כזה יוד הא ואו הא... במילוי מ\"ה דאלפי\"ן בנקודת הנ\"ל של רישא תנינא שהם סגול במקום ציר\"י ועוד נוסף באלו שינוי ב' והוא כי גם במקום ניקוד קמץ הם באלו ניקוד פתח תמורת הקמץ"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      RISHA 3 = MS = HOKHMAH d'A"A = NEFESH = OP.
      3 YHVH MILUI MaH (= 45) en ALPHIN.
      Voyelles Risha 2 (segol au lieu tzeri) +
      EN PLUS : PATAH au lieu de KAMATZ (2eme substitution).
      → Architecture : Nefesh signature = MaH ; voyelles patah+segol vs kamatz+tzeri.
      → Pattern : tier 3 = doubled voyelle substitution.
    type: interprétation_lurianique
    concepts:
