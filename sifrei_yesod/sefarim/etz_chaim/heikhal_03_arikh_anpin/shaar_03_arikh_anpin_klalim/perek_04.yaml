      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : escalation completeness/uniformity. Pattern letter-mysticism."

  # ─── BLOC G : RISHA 2 — RUACH = SAG ───

  - id: "EC-H3S13-063"
    source_he: "רישא תניינא והוא הנקרא אוירא יש בו ג\"כ ג' הויות של שם ס\"ג גם כן על דרך הנ\"ל ממש ובנקודים הנ\"ל... אלא שבמקום כל נקודת ציר\"י יש נקודת סגול תמורתן"
    source_ref: "Heikhal 3, Sha'ar 3:4"
    assertion: |
      RISHA 2 = AVIRA = RUACH = OM-petit.
      3 noms YHVH MILUI SAG (= 63) — meme schema OP/OM1/OM2 que Risha 1.
      DIFFERENCE : la ou Risha 1 avait TZERI — Risha 2 a SEGOL (tmurat tzeri).
      → Architecture : Ruach signature = SaG ; voyelle distinctive segol vs tzeri.
      → Pattern : tier-distinctive encoding by voyelle substitution.
    type: interprétation_lurianique
    concepts:
      - {id: ruach_egal_yhvh_milui_sag_segol_vs_tzeri, role: ruach_egal_yhvh_milui_sag_63_segol_substitue_tzeri}
