# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 10 — Noms sefirot 13 t"d. 8 d'Hokhmah + 5 d'Keter.
#             Mapping pnimi (Bina→Mlk) vs makif (Mlk→Bina) inverse
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §10 :
#   - Bloc A : 8 t"d kadma'in = 8 sefirot d'Hokhmah (Mlk → Bina)
#   - Bloc B : 5 t"d acharonim = 5 ketzavot d'Keter (Hod → Chesed)
#   - Bloc C : G"R d'Keter pas reveles ; 2 first d'Hokhmah pas reveles
#   - Bloc D : Bina d'Hokhmah revealed (lower than Keter)
#   - Bloc E : Mlk d'Keter pas revealed ; Mlk d'Hokhmah revealed (= nukvah)
#   - Bloc F : T8 = Yesod d'Keter + Bina d'Hokhmah (combines, dvukut)
#   - Bloc G : Pnimi mapping inverse de makif (Bina→Mlk vs Mlk→Bina)
#   - Bloc H : 5 acharonim pnimi = Chesed→Yesod d'Keter
#   - Bloc I : Safek alignement pnimi/makif
#
# Source Sefaria : Sefer_Etz_Chaim.13.10 (1 perek, 2504 chars)
# IDs : EC-H3S13-146 → EC-H3S13-159

meta:
  sefer: etz_chaim
  heikhal: 3
  shaar: 3
  shaar_name_he: "שער אריך אנפין"
  perek: 10
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Noms sefirot dans 13 t\"d. 8 t\"d kadma'in = 8 sefirot d'Hokhmah (T1=Mlk → T8=Bina) ; 5 acharonim = 5 ketzavot Keter (T9=Hod → T13=Chesed). G\"R Keter+2 first d'Hokhmah pas reveles. T8 = Yesod Keter+Bina Hokhmah combines (dvukut). Pnimi mapping inverse makif."

