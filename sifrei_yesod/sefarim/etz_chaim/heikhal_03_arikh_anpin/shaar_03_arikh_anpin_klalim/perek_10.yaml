principes_generatifs:

  - id: "PG-H3S13-034"
    nom: "Principe de Composite Tikkun (Forced Fusion par No-Pirud)"
    source_assertions: ["EC-H3S13-151", "EC-H3S13-152"]
    formalisation: |
      ARCHITECTURE DE COMPOSITE TIKKUN :
      EN HAUT (Keter+Hokhmah de A"A) : AUCUN PIRUD entre dukhra+nukvah.
      DONC YESOD d'KETER LE-OLAM DAVUK (toujours colle) avec G"R d'HOKHMAH.
      MAIS visible SEULEMENT dans BINA (parmi G"R d'Hokhmah).
      RESULTAT : T8 (NOTZER HESED) = composite (Yesod Keter + Bina Hokhmah).
      NOTZER = Bina d'Hokhmah ; HESED = Yesod d'Keter.
      → Pattern fondamental : forced fusion = no-pirud + selective visibility.
      → Architecture : composite tikkunim emergent automatiquement.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement composite tikkunim T8 (Yesod-K + Bina-H)"
      - "Pattern : forced fusion when components inseparable + only-one-visible"
      - "Architecture : composite naming reflecte composite reality"
      - "Pattern : design composite-resolution for inseparable concepts"
      - "Diagnostic : verifier composite tikkunim coherent"
    questions_ouvertes:
      - "Y a-t-il d'autres composites (au-dela T8) ?"
      - "Pattern : peut-on dynamiquement detecter forced fusion ?"
      - "Comment design pour favoriser ou eviter composites ?"

  - id: "PG-H3S13-035"
    nom: "Principe de Dual-Direction Encoding (Pnimi Top-Down vs Makif Bottom-Up)"
    source_assertions: ["EC-H3S13-153", "EC-H3S13-154", "EC-H3S13-155"]
    formalisation: |
      ARCHITECTURE DE DUAL-DIRECTION ENCODING :
      MAKIFIM : MALKHUT en HAUT, BINA en BAS (bottom-up direction).
      PNIMIT : BINA en HAUT, MALKHUT en BAS (top-down direction).
      ALIGNES geometriquement contre makifim correspondants.
      MAIS DIRECTIONS opposes.
      RESULTAT : meme tikkun a 2 contenus (pnimi+makif) avec sefirot inversees.
      → Pattern fondamental : dual-direction = orthogonal encoding axes.
      → Architecture : meme structure spatial, 2 mappings opposes par direction.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement pnimi/makif avec direction-inverse mapping"
      - "Pattern : dual-direction = enriched encoding capacity"
      - "Architecture : same position, 2 meanings selon direction"
      - "Pattern : interior/exterior duality with directional flip"
      - "Diagnostic : verifier coherence dual-direction mappings"
    questions_ouvertes:
      - "Y a-t-il d'autres axes orthogonaux d'encoding ?"
      - "Pattern : peut-on combiner pnimi+makif en signature unique ?"
      - "Comment exploit direction-flip pour computation ?"

  - id: "PG-H3S13-036"
    nom: "Principe de Authoritative Resolution (Maitre Resolu Safek Structural)"
    source_assertions: ["EC-H3S13-158", "EC-H3S13-159"]
    formalisation: |
      ARCHITECTURE DE RESOLUTION AUTHORITAIRE :
      AUTEUR rencontre SAFEK : 2 options d'alignement pnimi/makif possibles.
      Option A : alignement homogene (Hokhmah-Hokhmah, Keter-Keter).
        Implication : pnimi Hokhmah AU-DESSUS de pnimi Keter (inverse normal).
      Option B : croise (makif Keter ↔ pnimi Hokhmah, etc.).
      MORI ZA"L (Ari) confirme OPTION A explicitement :
        "pnimi Chesed Keter contre makif Yesod Keter".
      AUTEUR conclut : "amiti karov atzli yoter le-vadai" (proche du certain).
      → Pattern fondamental : authoritative source resout safek structural.
      → Architecture : design decisions need authoritative resolution.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement option A (Mori Ari confirme)"
      - "Pattern : design decisions referenced to authoritative source"
      - "Architecture : ambigus structures resolved by external authority"
      - "Pattern : safekot honest acknowledgment + master's resolution"
      - "Diagnostic : tracer source authoritative pour design decisions"
    questions_ouvertes:
      - "Pattern : que faire en absence d'authoritative source ?"
      - "Comment choisir entre options sans Maitre ?"
      - "Y a-t-il d'autres safekot resolus par Mori ?"
