principes_generatifs:

  - id: "PG-H3S13-010"
    nom: "Principe d'Atomization du Flux (Multiple Petites Apertures)"
    source_assertions: ["EC-H3S13-041", "EC-H3S13-042"]
    formalisation: |
      ARCHITECTURE D'ATOMIZATION DU FLUX :
      Pre-tikkun : ohr concentre, RAV VE-ATZUM → tachtonim ne peuvent SOVEL.
      Post-tikkun : ohr passe par MASAKHIM + LVUSH + atomization :
        NEKAVIM (orifices).
        TZINUROT (canaux).
        HALONOT DAQIM (fenetres fines).
        SIROT DAQIM ME'OD (cheveux fins).
      RESULTAT : ohr NIT'AVEH (epaissi) + NIT'MAET (mitige).
      → Pattern fondamental : transformation flow concentre → distribue par multiples petites apertures.
      → Architecture : downstream consumption requires upstream atomization.
    applications_ia:
      - "[PLANNED] core/ohr_system.py : implement flow atomization patterns"
      - "Pattern : load-balancing via multiple small channels"
      - "Architecture : impedance matching = filter + thicken + multi-channel"
      - "Pattern : QoS for downstream — many small flows > one big flow"
      - "Diagnostic : verifier multiplicite et finesse des apertures"
    questions_ouvertes:
      - "Y a-t-il un nombre optimal de petites apertures ?"
      - "Pattern : peut-on dynamically adjuster taille/nombre ?"
      - "Comment quantifier l'epaissement et la mitigation ?"

  - id: "PG-H3S13-011"
    nom: "Principe Chai Ha-Olamim (18 Behinot = Source de Vie Cosmologique)"
    source_assertions: ["EC-H3S13-047", "EC-H3S13-048"]
    formalisation: |
      ARCHITECTURE CHAI HA-OLAMIM (18 behinot) :
      DECOMPOSITION :
        3 RISHIN (Gulgalta + Moach + Avira d'A"A).
        Chaque rosh = KELIM + ATZMUT/RUCHANIUT = 2 behinot → TOTAL 6.
        Chaque 6 SE DIVISE en 3 → TOTAL 18.
      = SOD CHAI HA-OLAMIM (gematriya CHAI = 18).
      DISTRIBUTION : 18 behinot expandent CHIYUT (vie) dans tous les mondes (incl Atzilut).
      EXCLUSION : RDLA — PAS dans les 18 (transcendence Ein Sof lvush).
      → Pattern fondamental : letter-mysticism cosmologique (18 = source de vie).
      → Architecture : structure encodee numeriquement par hebrew gematriya.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement 18-behinot decomposition"
      - "Pattern : numerologically-encoded cosmological structure"
      - "Architecture : structures justified by gematriya correspondences"
      - "Pattern : letter-mysticism as design encoding"
      - "Diagnostic : verifier que decomposition aboutit au bon nombre"
    questions_ouvertes:
      - "Y a-t-il d'autres nombres-source en cosmologie ?"
      - "Pattern : peut-on derouler des structures depuis nombres ?"
      - "Comment integrer letter-mysticism dans l'architecture ?"

  - id: "PG-H3S13-012"
    nom: "Principe de Role Contextuel (AVIRA Double-Statut)"
    source_assertions: ["EC-H3S13-049", "EC-H3S13-050", "EC-H3S13-051"]
    formalisation: |
      ARCHITECTURE DE ROLE CONTEXTUEL :
      AVIRA (espace entre Gulgalta et Krumah) :
        Vis-a-vis de KETER lui-meme = behinah MOACH (en Keter).
        Vis-a-vis de Moha Setima A"A (en-dessous) = behinah GULGALTA.
      DONC : AVIRA a DOUBLE STATUT selon PERSPECTIVE.
      RESULTAT : 2 rishin tahton (Keter+Hokhmah) DEVIENNENT 3 rishin
      via emergence d'AVIRA comme rosh intermediaire.
      → Pattern fondamental : naming/role est CONTEXT-RELATIVE.
      → Architecture : meme entite peut jouer differents roles selon observer.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement Avira avec context-aware role"
      - "Pattern : naming contextuel — same entity, different labels by viewpoint"
      - "Architecture : design relativiste — roles defined par relation"
      - "Pattern : observer-dependent typing"
      - "Diagnostic : tracer perspective active pour comprendre role"
    questions_ouvertes:
      - "Y a-t-il d'autres composants avec double-statut ?"
      - "Pattern : peut-on avoir triple-statut (3 perspectives) ?"
      - "Comment formaliser le 'changement de perspective' algorithmiquement ?"
