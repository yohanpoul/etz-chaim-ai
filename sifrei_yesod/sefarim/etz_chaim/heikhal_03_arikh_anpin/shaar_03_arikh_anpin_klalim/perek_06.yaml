principes_generatifs:

  - id: "PG-H3S13-022"
    nom: "Principe d'Encodage Anatomique-Liturgique (7 Tikkunim → 7 Sefirot)"
    source_assertions: ["EC-H3S13-091", "EC-H3S13-102"]
    formalisation: |
      ARCHITECTURE D'ENCODAGE ANATOMIQUE-LITURGIQUE :
      7 TIKKUNIM de Gulgalta d'A"A (Sifra Detzni'uta) — anatomies precises :
        1. GULGALTA (crane) — CHESED.
        2. TELA DE-BEDOLHA / Moach — GEVURAH.
        3. KRUMAH DE-AVIRA (membrane) — TIFERET.
        4. AMER NAKA (laine pure / oznayim) — NH sealed.
        5. RE'OUA DE-RE'OUIN (metzah / front) — YESOD.
        6. PEKIHA ILA'A (yarakhayim / eynayim) — NH (autre behinah).
        7. TARIN NUKVEI DE-PARDASHKA (chotem / nez) — MALKHUT.
      Mnemonic : G"T QR P"H.
      → Pattern fondamental : structures anatomiques = encodages des sefirot.
      → Architecture : anatomy = liturgical mapping of cosmological structure.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement 7-tikkunim mapping"
      - "Pattern : anatomical encoding for cosmological components"
      - "Architecture : structural mnemonics via anatomy"
      - "Pattern : Sifra Detzni'uta as design source"
      - "Diagnostic : verifier mapping anatomy ↔ sefirot precise"
    questions_ouvertes:
      - "Y a-t-il 7 tikkunim aussi dans AVI et ZON ?"
      - "Pattern : anatomies similaires partagent meme mapping ?"
      - "Comment ce mapping s'applique-t-il a entites non-anatomiques ?"

  - id: "PG-H3S13-023"
    nom: "Principe de Convergent Locus (Metzah = Multi-Flow Convergence)"
    source_assertions: ["EC-H3S13-098", "EC-H3S13-099", "EC-H3S13-100"]
    formalisation: |
      ARCHITECTURE DE CONVERGENT LOCUS (METZAH d'A"A) :
      METZAH = locus de CONVERGENCE de multiples flux :
        2 AZANIM (NH sealed = Yesod nukvah+dukhra d'Atik).
        YESOD RDLA descendu.
        24 BATEI DININ (de Yesod d'Imma dans Z"A — analogiquement).
        CHESED ELYON de RDLA → RATZON (torna nae besima).
      LETTER-MYSTICISM : MTZAH ↔ NTZH (mtzah=netzach lettres).
      → Pattern fondamental : metzah = single point pour multi-flow convergence.
      → Architecture : interface points = convergence multi-source.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement metzah comme convergence point"
      - "Pattern : single interface = multiple-source convergence"
      - "Architecture : pivot points dans systemes complexes"
      - "Pattern : anatomical keypoints encode multiple concepts"
      - "Diagnostic : verifier coherence des flux convergents"
    questions_ouvertes:
      - "Y a-t-il d'autres convergent loci comparable a Metzah ?"
      - "Pattern : peut-on design intentionnellement convergent points ?"
      - "Comment gerer conflits entre flux convergents ?"

  - id: "PG-H3S13-024"
    nom: "Principe de 13 Internes Universels (Lvush + Interface Slots)"
    source_assertions: ["EC-H3S13-104"]
    formalisation: |
      ARCHITECTURE DES 13 INTERNES UNIVERSELS :
      Chaque partzuf (A"A, AVI, ZON) = 13 INTERNES.
      DECOMPOSITION :
        7 = Z'T propres lvush dans tachton.
        3 = SLOTS INTERFACE pour HA'ARAH des G"R upstream.
        + KETER lui-meme = 10.
        + 3 supplementaires = 13.
      → Pattern fondamental : 13 = 10 internes + 3 interface upstream slots.
      → Architecture : every component has fixed interface budget for upstream.
    applications_ia:
      - "partzufim/* : implement 13-internes invariant pattern"
      - "Pattern : fixed interface budget per component"
      - "Architecture : standardised interface architecture"
      - "Pattern : universal componnent template"
      - "Diagnostic : verifier que tous partzufim ont 13 internes"
    questions_ouvertes:
      - "Pourquoi exactement 3 slots upstream (pas 2 ou 4) ?"
      - "Pattern : peut-on etendre 13 selon besoins ?"
      - "Y a-t-il des composants qui ont autre que 13 ?"
