# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 6 — 7 tikkunei gulgalta d'A"A (G"T QR P"H). Z'T de RDLA lvush.
#            Da'at ganiz be-puma. 13 internes par rosh.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §6 :
#   - Bloc A : 7 tikkunei gulgalta (Sifra Detzni'uta) mnemonic G"T QR P"H
#   - Bloc B : Z'T RDLA lvush dans 2 rishin tahton (Chesed=Gulgalta, Gevurah=Moach)
#   - Bloc C : Keter rachamim, Hokhmah dinim nikhpin
#   - Bloc D : Tiferet → Krumah de-Avira (rakia bein mayim)
#   - Bloc E : NH = 2 azanim d'Atika (sealed) — pas mentionnees Adra
#   - Bloc F : Cheveux = ohr chozer bottom-up de NH
#   - Bloc G : 2 azanim + yesod tous au METZAH ; 24 batei dinim
#   - Bloc H : Re'oua de-Re'ouin (metzah) — chesed elyon RDLA
#   - Bloc I : Adra Zuta — torna nae au metzah
#   - Bloc J : Malkhut mekorah CHOTEM
#   - Bloc K : Mapping 7 tikkunim → sefirot
#   - Bloc L : Da'at RDLA ganiz be-puma
#   - Bloc M : 13 internes par rosh
#
# Source Sefaria : Sefer_Etz_Chaim.13.6 (1 partie, 5907 chars)
# IDs : EC-H3S13-091 → EC-H3S13-104

meta:
  sefer: etz_chaim
  heikhal: 3
  shaar: 3
  shaar_name_he: "שער אריך אנפין"
  perek: 6
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "7 tikkunei gulgalta d'A\"A (Sifra Detzni'uta) : Gulgalta+Tela+Krumah+Amer Naka+Re'oua+Pekiha+Nukvei (mnemonic G\"T QR P\"H). Z'T de RDLA lvush 2 rishin tahton. Mapping sefirot : Chesed=Gulgalta, Gevurah=Moach, Tiferet=Krumah, NH=Amer Naka+Pekiha, Yesod=Re'oua, Malkhut=Nukvei. Da'at RDLA ganiz be-puma. Chaque rosh kelul de 13 internes."

