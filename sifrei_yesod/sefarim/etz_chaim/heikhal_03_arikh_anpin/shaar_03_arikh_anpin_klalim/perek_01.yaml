assertions:

  - id: "EC-H3S13-001"
    source_he: "שער שני שער א\"א ובו י\"ד פרקים"
    source_ref: "Heikhal 3, Sha'ar 3 (introduction)"
    assertion: |
      SHA'AR 2 (du Heikhal Ha-Ketarim) = SHA'AR A"A (Arikh Anpin).
      Contient 14 PERAKIM.
      → Architecture : sha'ar dedie au partzuf A"A.
      → Pattern : organisation hierarchique = apres Atik vient A"A.
      cf. EC-H3S12-002 (perek 01a Atik) sur sha'ar 1 = Atik.
    type: axiome_explicite
    concepts:
      - {id: shaar_a_a_14_perakim, role: shaar_a_a_avec_14_perakim}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : sha'ar A\"A. Pattern hierarchique post-Atik."

  - id: "EC-H3S13-002"
    source_he: "ונבאר תיקון א\"א אשר נתקן אחר עתיק יומין הנה נת\"ל שנעשה מבחי' חכמה דמ\"ה שהם בחי' נקודות דמ\"ה ומן ה' אחרונות דכתר דב\"ן והוא כולל זכר ונקבה מ\"ה בימינו וב\"ן בשמאלו"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      Tikkun A"A vient APRES Atik.
      A"A = HOKHMAH de MaH (= NEKUDOT de MaH) + 5 ACHARONOT de Keter BaN.
      KOLEL ZAKHAR ET NEKEVAH : MaH a DROITE, BaN a GAUCHE.
      → Architecture : A"A = composition bipartite cote-droit/gauche.
      → Pattern : 1 partzuf avec 2 polarites laterales.
      cf. EC-H3S12-038 (perek 01a Atik) sur A"A = 1 partzuf MaH-droit/BaN-gauche.
    type: axiome_explicite
    concepts:
      - {id: aa_hokhmah_mah_plus_5_acharonot_keter_ban_lateral, role: aa_hokhmah_mah_plus_5_acharonot_keter_ban_lateral_gauche_droite}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : A\"A bipartite lateral. Pattern composition gauche/droite."

  - id: "EC-H3S13-003"
    source_he: "והנה הוא מלביש לע\"י באופן זה כי הנה ג\"ר דעתיק אי אפשר שיתלבשו תוך א\"א וגם אי אפשר לקבל אורם ולכן נשארין מגולים והם עומדין לבחי' מקיף אל א\"א"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      A"A REVETIT Atik :
      G"R d'Atik IMPOSSIBLE de revetir dans A"A — et IMPOSSIBLE de RECEVOIR leur ohr.
      DONC restent MEGULIM (exposes) — STAND comme MAKIF (encerclant) pour A"A.
      → Architecture : G"R d'Atik = transcendant non-encapsulable, devient enveloppe.
      → Pattern : top-tier exposed as outer protection.
      cf. EC-H3S12-219 (perek 01b) sur G"R d'Atik exposes (RDLA).
    type: axiome_explicite
    concepts:
      - {id: gr_atik_makif_sur_aa_non_revetus, role: gr_atik_makif_sur_aa_non_revetable_dans_aa}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : G\"R Atik = enveloppe externe. Pattern top-tier exposed."

  - id: "EC-H3S13-004"
    source_he: "והז\"ת דעתיק לבדם מתלבשין תוך א\"א באופן זה כי כח\"ב דא\"א מלבישין לחג\"ת דע\"י וז\"ת דא\"א מלבישין לנה\"י דעתיק"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      Z'T d'Atik SEUL revetit dans A"A :
        KCB d'A"A REVET CGT d'Atik (Chesed-Gevurah-Tiferet).
        Z'T d'A"A REVET NHY d'Atik (Netzach-Hod-Yesod).
      → Architecture : revetement par alignement KCB↔CGT et Z'T↔NHY.
      → Pattern : niveau-superieur d'A"A = niveau-moyen d'Atik.
    type: axiome_explicite
    concepts:
      - {id: kcb_aa_revet_cgt_atik, role: kcb_aa_revet_cgt_atik}
      - {id: zt_aa_revet_nhy_atik, role: zt_aa_revet_nhy_atik}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : alignment revetement par positions. Pattern level-shift mapping."

  - id: "EC-H3S13-005"
    source_he: "כי הנה ג' פרקין יש בנצח דעתיק וב\"פ קדמאין מתלבשים תוך חסד ונצח דא\"א וכן ב\"פ קדמאין דהוד דעתיק מתלבשין תוך גבורה והוד דא\"א ונשארו פרק תחתון דנצח דעתיק ופ\"ת דהוד דעתיק מגולין בלתי התלבשות"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      DETAILS : 3 PRAKIM dans Netzach d'Atik :
        2 PRAKIM SUPERIEURS revetus dans Chesed+Netzach d'A"A.
        1 PRAK INFERIEUR (PT = perak tahton) MEGULAH (expose) — pas revetu.
      Idem pour Hod d'Atik :
        2 prakim superieurs dans Gevurah+Hod d'A"A.
        1 perak tahton de Hod d'Atik MEGULAH.
      → Architecture : revetement partiel ; perakim inferieurs exposes.
      → Pattern : top-coverage avec bottom-leak design.
    type: axiome_explicite
    concepts:
      - {id: netzach_hod_atik_3_prakim_2_revetus_1_megulah, role: netzach_hod_atik_3_prakim_2_revetus_1_megulah_perak_tahton}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : revetement partiel. Pattern top-coverage bottom-leak."

  - id: "EC-H3S13-006"
    source_he: "ואלו נשארו למטה בבריאה תחת האצילות כדי להאיר שם לעולם הבריאה ואלו הם כדמיון ב' דדי בהמה שעומדין שם אצל הרגלים"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      Ces perakim inferieurs RESTENT EN BAS dans BERIAH sous Atzilut.
      OBJECTIF : ME'IR (illuminer) la-bas pour OLAM HA-BERIAH.
      Sont KE-DEMION (comme l'image) de B' DADEI BEHEMAH (2 mamelles d'animal)
      qui se tiennent pres des REGLAYIM (pieds).
      → Architecture : interface vers Beriah via "mamelles" (interface nutritionnelle).
      → Pattern : leaks intentionnels = nourrissage downstream.
    type: déduction_scripturaire
    concepts:
      - {id: nhy_atik_megulim_dans_beriah_dadei_behemah, role: nhy_atik_megulim_dans_beriah_egal_dadei_behemah}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : interface nutritionnelle Beriah. Pattern intentional leak downstream."

  - id: "EC-H3S13-007"
    source_he: "אשר כל אלו הבחי' של א\"א ואו\"א וזו\"נ כשנתקנו (נ\"א שהם נתקנו) בעת שנאצלו היו למטה שם בבריאה והתחילו לעלות וינקו תחלה מב' בחי' דדי בהמה ואחר כך הגדילו יותר וינקו מדדי אדם"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      A"A, AVI, ZON — quand TIKKUN-ES (Variante Nusah Aher : SHE-HEM NIT'TAKNU) :
      Etaient EN BAS dans BERIAH.
      COMMENCERENT a MONTER : YANIKU (tetent) d'abord des 2 DADEI BEHEMAH
      (mamelles d'animal).
      Apres GADELU (grandissent) plus, et tetent des DADEI ADAM (mamelles humaines).
      → Architecture : developpement multi-stage (animal → humain).
      → Pattern : maturation progressive avec sources alimentaires successives.
      cf. EC-H2S11-243 (perek 09) sur sod chalav yenikah.
    type: interprétation_lurianique
    concepts:
      - {id: yenikah_dadei_behemah_puis_dadei_adam_progression, role: yenikah_dadei_behemah_puis_dadei_adam_developpement_progression}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : developpement multi-stage. Pattern Nusah Aher capture (she-hem nit'taknu)."

  - id: "EC-H3S13-008"
    source_he: "והנה יסוד של עתיק מתלבש תוך ת\"ת דא\"א עד החזה ושם הוא מסתיים"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      YESOD d'Atik REVETIT dans T"T (Tiferet) d'A"A — JUSQU'AU CHAZEH.
      La il MISTAYEM (se termine).
      → Architecture : Yesod Atik a une portee anatomique definie (jusqu'au chazeh).
      → Pattern : revetement avec terminaison precise.
    type: axiome_explicite
    concepts:
      - {id: yesod_atik_revet_tiferet_aa_jusqu_chazeh, role: yesod_atik_revet_tiferet_aa_jusqu_au_chazeh_termination}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : Yesod Atik anatomique. Pattern revetement terminaison."

  - id: "EC-H3S13-009"
    source_he: "ודע כי ביסוד דע\"י יש שם ה\"ח וה\"ג ואע\"פ שעתיק הוא זו\"נ שהם מ\"ה וב\"ן כנ\"ל וא\"כ היה מן הראוי שיהיה בו ה\"ח וה\"ג מצד הזכר וכן מצד הנוקבא"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      Yesod d'Atik a 5 CHASADIM (H"CH) + 5 GEVUROT (H"G).
      ATTENTION : Atik = ZON = MaH+BaN — devrait avoir 5+5 du cote zakhar
      ET 5+5 du cote nukvah.
      → Question : pourquoi Atik a 5+5 SEULEMENT (pas 10+10) ?
      → Architecture : asymetrie quantitative inattendue.
    type: déduction_logique
    concepts:
      - {id: yesod_atik_5_chasadim_5_gevurot_seulement, role: yesod_atik_5_chasadim_5_gevurot_seulement_pas_10_10}
      - {id: question_pourquoi_atik_5_5_pas_10_10, role: question_pourquoi_atik_5_5_pas_10_10}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : asymetrie quantitative. Pattern unexpected reduction."

  - id: "EC-H3S13-010"
    source_he: "ע\"ד שיש באו\"א וזו\"נ כמ\"ש במקומו אבל לפי ששם הזכר והנקבה הם פרצופים חלוקים לכן יש שם חו\"ג בכ\"א מהן אבל כאן שהזכר והנוקבא דעתיק הם פרצוף א' מחוברים כנ\"ל לכן לא היה בו רק ה\"ח וה\"ג בלבד"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      Comme dans AVI et ZON — zakhar+nukvah = PARTZUFIM CHALUKIM (separes).
      Donc dans CHACUN il y a 5+5 (= 10+10 total).
      MAIS ICI (Atik) — zakhar+nukvah = 1 PARTZUF MEHUBARIM.
      DONC seulement 5+5 (pas double).
      → Architecture : composition unite (Atik) → reduction quantite (1 set 5+5).
      → Pattern : merged components share resources, not duplicate.
      cf. EC-H3S12-038 (perek 01a Atik) sur Atik 1 partzuf bipartite.
    type: déduction_logique
    concepts:
      - {id: atik_1_partzuf_share_5_5_pas_double, role: atik_1_partzuf_mehubarim_share_5_5_pas_double}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : merged components share. Pattern resource economy."

  - id: "EC-H3S13-011"
    source_he: "ואלו ה\"ח וה\"ג יוצאין ומתגלין מתוך פי יסוד דעתיק הנעלם ומתלבש תוך א\"א ומתפשטין ה\"ח בקו ימין דא\"א מבפנים וה\"ג בקו שמאל"
    source_ref: "Heikhal 3, Sha'ar 3:1"
    assertion: |
      Ces 5 CHASADIM + 5 GEVUROT YOTZIN (sortent) et MIT'GALIN (revelent)
      du PI YESOD d'Atik (qui est NE'ELAM = cache, revetu dans A"A).
      MIT'PASHTIN :
        5 CHASADIM dans KAV YEMINI (kav droit) d'A"A — me-bifnim (de l'interieur).
        5 GEVUROT dans KAV SEMALI (kav gauche).
      → Architecture : flow chasadim/gevurot par axes anatomiques d'A"A.
      → Pattern : distribution lateral selon polarite (chesed=droite, gevurah=gauche).
    type: interprétation_lurianique
    concepts:
      - {id: yesod_atik_5_chasadim_kav_droit_5_gevurot_kav_gauche, role: yesod_atik_distribution_chasadim_kav_droit_gevurot_kav_gauche_aa}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : flow par axes anatomiques. Pattern distribution lateral."

  # ─── BLOC FINAL ───

  - id: "EC-H3S13-012"
    source_he: "כמ\"ש בע\"ה לקמן בענין או\"א"
    source_ref: "Heikhal 3, Sha'ar 3:1 (cloture)"
    assertion: |
      Comme sera explique BE-EZRAT HASHEM plus loin dans le sujet d'AVI.
      → Architecture : annonce du plan — explication detaillee dans Sha'ar AVI.
      → Pattern : forward reference inter-sha'ar.
