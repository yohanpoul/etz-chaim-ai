# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 1 — A"A revetit Z'T d'Atik. KCB d'A"A revet CGT d'Atik.
#            Z'T d'A"A revet NHY d'Atik. Dadei behemah/adam.
#            Yesod d'Atik 5 chasadim+5 gevurot
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §1 :
#   - Bloc A : Header sha'ar 2, A"A, 14 perakim
#   - Bloc B : A"A composition (Hokhmah MaH + 5 acharonot Keter BaN, zakhar+nukvah)
#   - Bloc C : G"R d'Atik impossible a revetir → restent makif sur A"A
#   - Bloc D : KCB d'A"A revet CGT d'Atik ; Z'T d'A"A revet NHY d'Atik
#   - Bloc E : 3 prakim de Netzach Atik distribution
#   - Bloc F : NHY exposes dans Beriah = dadei behemah/adam
#   - Bloc G : Yesod d'Atik = 5 chasadim+5 gevurot (1 partzuf, pas zakhar+nukvah separes)
#
# Source Sefaria : Sefer_Etz_Chaim.13.1 (1 perek, 1461 chars total)
# IDs : EC-H3S13-001 → EC-H3S13-012

