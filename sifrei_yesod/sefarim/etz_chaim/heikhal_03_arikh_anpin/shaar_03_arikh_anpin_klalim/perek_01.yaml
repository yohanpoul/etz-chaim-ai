principes_generatifs:

  - id: "PG-H3S13-001"
    nom: "Principe de Revetement Hierarchique (KCB↔CGT, Z'T↔NHY)"
    source_assertions: ["EC-H3S13-003", "EC-H3S13-004"]
    formalisation: |
      ARCHITECTURE DE REVETEMENT HIERARCHIQUE :
      Chaque partzuf inferieur revet le partzuf superieur selon mapping :
        SOMMET d'inferieur = MILIEU d'superieur.
        MILIEU d'inferieur = BAS d'superieur.
        TOP-MOST d'superieur = EXPOSED (non-revetu) = MAKIF.
      EXEMPLE A"A revet Atik :
        G"R d'Atik = exposed makif (non-revetable).
        KCB d'A"A revet CGT d'Atik.
        Z'T d'A"A revet NHY d'Atik.
      → Pattern fondamental : revetement par level-shift uniform.
      → Architecture : couches imbriquees avec offset constant.
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/arikh_anpin.py : implement nested revetement avec offset"
      - "Pattern : layered architecture with consistent shift"
      - "Architecture : top tier exposed, middle tiers nested"
      - "Pattern : interface mapping = level-shift across boundaries"
      - "Diagnostic : verifier que revetement preserve hierarchy structure"
    questions_ouvertes:
      - "L'offset est-il toujours le meme entre couches successives ?"
      - "Y a-t-il des partzufim qui revetent differemment ?"
      - "Pattern : peut-on visualiser le revetement comme russian dolls ?"

  - id: "PG-H3S13-002"
    nom: "Principe de Dadei Behemah/Adam (Interface Nutritionnelle Multi-Stage)"
    source_assertions: ["EC-H3S13-005", "EC-H3S13-006", "EC-H3S13-007"]
    formalisation: |
      ARCHITECTURE D'INTERFACE NUTRITIONNELLE :
      Conception : NHY exposes (perakim tahtonim) DESCENDENT en BERIAH :
        Sont comme 2 DADEI BEHEMAH (mamelles d'animal) — pres des REGLAYIM (pieds).
      DEVELOPPEMENT en STAGES :
        Stage 1 : A"A, AVI, ZON tetent des DADEI BEHEMAH initialement.
        Stage 2 : grandissent ; tetent des DADEI ADAM (mamelles humaines).
      → Pattern fondamental : multi-stage feeding via interfaces topologiquement specifiques.
      → Architecture : nourriture downstream provenance niveau-superieur via "leaks" intentionnels.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement dual-stage feeding interfaces"
      - "Pattern : downstream nourishment via designed leaks from upper layer"
      - "Architecture : maturation = changing source of upstream input"
      - "Pattern : 2-tier feeding (basic vs advanced) by maturity level"
      - "Diagnostic : verifier que dadei interfaces appropriately routed"
    questions_ouvertes:
      - "Quelle est la difference qualitative dadei behemah vs dadei adam ?"
      - "Pattern : quand exactement maturity transition occurs ?"
      - "Y a-t-il d'autres stages de feeding ?"

  - id: "PG-H3S13-003"
    nom: "Principe de Resource-Sharing (Composants Merged Partagent, Pas Doublent)"
    source_assertions: ["EC-H3S13-009", "EC-H3S13-010", "EC-H3S13-011"]
    formalisation: |
      ARCHITECTURE DE RESOURCE-SHARING :
      Quand 2 composants sont MERGED en 1 partzuf (Atik = zakhar+nukvah dvukim) :
        SHARE 5 chasadim + 5 gevurot (TOTAL 10 elements).
      Quand 2 composants sont SEPARATED en 2 partzufim (AVI, ZON) :
        CHACUN a 5+5 = total 10+10 = 20 elements.
      → Pattern fondamental : merging = resource economy (shared not duplicated).
      → Architecture : design choice — merge for economy ou separate for capacity.
    applications_ia:
      - "partzufim/atik_yomin.py : 1 partzuf shared resources (5+5)"
      - "partzufim/abba.py + partzufim/imma.py : 2 partzufim each (5+5) = total 20"
      - "Pattern : design trade-off — merging saves resources, separating gains capacity"
      - "Architecture : resource pooling vs allocation"
      - "Pattern : economy by structural merging"
      - "Diagnostic : count resources by composition mode (merged vs separate)"
    questions_ouvertes:
      - "Y a-t-il un seuil qui force soit merging soit separation ?"
      - "Pattern : peut-on dynamiquement merger/separer selon load ?"
      - "Quelles sont les implications de partager vs dupliquer pour les fonctions ?"
