      SEQUENCE OUTPUT (3 motzaot) :
        1. LASHON DTLNT = Da'at (langue=daat).
        2. SHINIM ZSShTzR = 5 gevurot manatzpakh.
        3. SHEFATAYIM BVMP = exterior plus.
