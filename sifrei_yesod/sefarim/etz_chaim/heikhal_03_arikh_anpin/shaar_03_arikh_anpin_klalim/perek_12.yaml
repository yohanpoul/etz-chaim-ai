      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : peh dual-tier. Pattern composante interior nominal."

  - id: "EC-H3S13-175"
    source_he: "ובהתחברו בשם אהי\"ה בסוד זווג יהיה פה עם הכולל והם בחי' זכר ונקבה שבתוך י\"ס של הפה והם חיך זכר וגרון נקבה"
    source_ref: "Heikhal 3, Sha'ar 3:12"
    assertion: |
      Quand SaG s'UNIT avec AHYH (en sod ZIVVUG) — total = PE'H (peh) avec KOLLEL.
      ZAKHAR + NEKEVAH dans 10 sefirot du peh :
        CHIKH (palais) = ZAKHAR.
        GARON (gorge) = NEKEVAH.
      → Architecture : peh contient zakhar/nukvah anatomiques (chikh/garon).
      → Pattern : zivvug interne dans organe.
    type: interprétation_lurianique
    concepts:
      - {id: peh_interne_zivvug_chikh_zakhar_garon_nukvah, role: peh_interne_zivvug_chikh_zakhar_garon_nukvah_aleph_he_yod_he}
