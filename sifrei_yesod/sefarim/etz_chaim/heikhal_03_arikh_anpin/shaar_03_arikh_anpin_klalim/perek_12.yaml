# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 12 — CHOTEM + PEH d'A"A. SaG interior. 22 lettres motzaot.
#             Hevels eveillent zivvug AVI + ZON
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §12 :
#   - Bloc A : Peh d'A"A — interior + exterior
#   - Bloc B : Interior peh = SaG ; chikh+garon = zakhar+nukvah
#   - Bloc C : 22 lettres de zivvug — motzaot lashon/shinim/shefatayim
#   - Bloc D : 3 YHV = 3 motzaot, gematria SaG chacun
#   - Bloc E : Peh exterieur = ahor MaH (130-45=85=PEH)
#   - Bloc F : Chotem d'A"A — interior=SaG (gematria), exterior=3 AHYH
#   - Bloc G : Hevels chotem+peh = ohrs makif vers ZON
#   - Bloc H : Adra Zuta — 2 nakv pardashka (HY+HY+VAV kotel)
#   - Bloc I : YOD SaG divisee (Y simple droite, V+D gauche)
#   - Bloc J : Hevels eveillent zivvug AVI + ZON
#
