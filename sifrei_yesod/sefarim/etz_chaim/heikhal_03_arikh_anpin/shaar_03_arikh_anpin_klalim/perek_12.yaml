  - id: "EC-H3S13-176"
    source_he: "אז יוצאין שאר הכ\"ב אותיות מזווג זה כי אחע\"ה הם מ\"ן דנוקבא שהוא בגרון גי' פ\"ד וגיכ\"ק אותיות החיך מ\"ד ומתחברים יחד אחע\"ה וגיכ\"ק"
    source_ref: "Heikhal 3, Sha'ar 3:12"
    assertion: |
      Du ZIVVUG sortent les 22 LETTRES de l'alphabet :
      AHEB (=AHV"H = gutturales) = MN NUKVAH dans GARON, gematria 84.
      GIKHQ = lettres CHIKH (palais), gematria 44.
      MIT'HABRIM (s'unissent) AHEB + GIKHQ.
      → Architecture : 22 lettres emergent du zivvug interne du peh.
      → Pattern : alphabet generation par anatomical zivvug.
    type: déduction_logique
    concepts:
      - {id: 22_lettres_de_zivvug_aheb_garon_gikhq_chikh, role: 22_lettres_emergent_zivvug_aheb_garon_84_gikhq_chikh_44}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : alphabet via zivvug. Pattern emergence linguistique."

  - id: "EC-H3S13-177"
    source_he: "אז יוצאין תחלה אותיות הלשון דטלנ\"ת שהוא בחי' הדעת הנקרא לשון אח\"כ יוצאין אותיות השיניים שהם זסשר\"ץ (והם ה\"ג מנצפ\"ך) אח\"כ יוצאין אותיות שפתיים שהוא יותר חיצוניות והם בומ\"ף"
    source_ref: "Heikhal 3, Sha'ar 3:12"
    assertion: |
      SEQUENCE :
      1. LASHON (langue) DTLNT = behinah DA'AT (langue=daat).
      2. SHINIM (dents) ZSShTzR = 5 GEVUROT MANATZPAKH.
      3. SHEFATAYIM (levres) BVMP = plus EXTERIOR.
      → Architecture : 3 motzaot (lashon/shinim/shefatayim) en sequence interior→exterior.
      → Pattern : layered output progression depth → surface.
    type: axiome_explicite
    concepts:
      - {id: 3_motzaot_lashon_shinim_shefatayim_sequence_interior_exterior, role: 3_motzaot_lashon_dtlnt_shinim_zsshtzr_shefatayim_bvmp}
