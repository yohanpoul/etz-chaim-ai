assertions:

  - id: "EC-H3S13-174"
    source_he: "ועתה נבאר מציאות החוטם והפה דא\"א דע כי בפה דא\"א יש בו חיצוניות ופנימיות והפנימית הוא שם ס\"ג שהוא פנימית רוחא שבפה זה"
    source_ref: "Heikhal 3, Sha'ar 3:12"
    assertion: |
      Maintenant CHOTEM (nez) + PEH (bouche) d'A"A.
      PEH d'A"A : CHITZONIYUT (exterieur) + PNIMIYUT (interieur).
      PNIMIT = SHEM SaG (= 63) = PNIMIT RUCHA (souffle interieur) du peh.
      → Architecture : peh = double-tier (interior SaG + exterior).
      → Pattern : composantes anatomiques avec interior nominal.
      cf. EC-H3S13-101 (perek 06) sur Malkhut mekorah Chotem.
      Variante (Nusah Aher) : "DE-HAVAYAH" (de YHVH).
      cf. EC-H3S13-103 (perek 06) sur Da'at RDLA ganiz be-puma.
    type: axiome_explicite
    concepts:
