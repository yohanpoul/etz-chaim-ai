# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 14 — SH"A nehorin multi-route. Or Paniel/Chashmal/Ash.
#             ZA=150 rivva, Imma=150, A"A=AReKh (220). Cloture sha'ar
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §14 :
#   - Bloc A : SH"A nehorin = 4 routes calcul
#   - Bloc B : 6 SaG panim = 378 (SHE"H-CHET) ; +8 hivara = 378
#   - Bloc C : SH"A descendent Hekhal 6 (Etzem Ha-Shamayim)
#   - Bloc D : Or Paniel (Pekudei 246) = 378 = Chashmal
#   - Bloc E : Kelipah miroir : ASH (370) "ke-veged yokhlem ash"
#   - Bloc F : 5+1000 = Yesod ; total 370 rivva
#   - Bloc G : ZA 150 rivva (chatzi T"T+NHY)
#   - Bloc H : Imma 150 rivva quand zivvug bas (revitsah)
#   - Bloc I : 370 - 150 = 220 (AREKH) = nom ARIKH ANPIN
#   - Bloc J : ZA 150 via Imma=AVIRA DAKHYA
#   - Bloc K : Avot 4:20 "ke-kn ke-kn"
#
# Source Sefaria : Sefer_Etz_Chaim.13.14 (1 perek, 4203 chars, dernier Sefer 13)
# IDs : EC-H3S13-204 → EC-H3S13-217

