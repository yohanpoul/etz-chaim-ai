      - "Pattern : peut-on design extras protectives systematiquement ?"
      - "Comment identifier les 8-hivara analogues dans systemes ?"

  - id: "PG-H3S13-048"
    nom: "Principe de Provenance-Distinguishes-Equivalents (150 Imma vs 150 ZA)"
    source_assertions: ["EC-H3S13-217"]
    formalisation: |
      ARCHITECTURE DE PROVENANCE-DISTINGUISHES :
      Imma et ZA recoivent CHACUN 150 RIVVA (egal numeriquement).
      MAIS DIFFERENCE :
        IMMA : recoit DIRECT d'A"A (proche, encore dvuk).
        ZA : TROP LOIN d'A"A panim ; recoit VIA IMMA (= AVIRA DAKHYA).
      Sod Avot 4:20 : "AL TISTAKEL BE-KN KN ELA BE-MAH SHE-YESH BO".
      2 KN KN = 2× 150 (Imma+ZA) — meme contenant, contenu different.
      → Pattern fondamental : meme quantite, provenance distingue.
      → Architecture : data provenance > data value seul.
    applications_ia:
      - "partzufim/imma.py + partzufim/zeir_anpin.py : track provenance separately"
      - "Pattern : provenance metadata > value metadata"
      - "Architecture : equivalent values can differ ontologically by source"
      - "Pattern : source tracing pour qualifier semantique"
      - "Diagnostic : verifier provenance bien tracee"
    questions_ouvertes:
      - "Pattern : combien de niveaux de provenance utiles ?"
      - "Comment encoder provenance compactement ?"
      - "Y a-t-il provenance perdue acceptablement ?"
