assertions:

  - id: "EC-H3S13-105"
    source_he: "והנה כבר נתבאר כי ז\"ת דעתיק הנה הם מתגלין בז' דגלגלתא דא\"א והוא סוד הנזכר בזוהר עתיק יומין פי' שאין מתגלה רק בחי' יומין שהם ז' ימי בראשית ז\"ת דיליה ובכ\"מ פי' עתיק יומין הם ז\"ת המתגלין בז' דגלגלתא"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      Z'T d'Atik MITGALIN dans 7 de GULGALTA d'A"A.
      C'est le SOD du nom "ATIK YOMIN" (Daniel 7:9) :
      "YOMIN" = 7 YEMEI BERESHIT = Z'T.
      "Atik Yomin" PARTOUT = Z'T MITGALIN dans 7 d'A"A's gulgalta.
      → Architecture : nom revele structure — Atik Yomin = Z'T-revelation.
      → Pattern : naming encodes which tier reveals.
      cf. EC-H3S13-091 (perek 06) sur 7 tikkunim gulgalta.
    type: déduction_scripturaire
    concepts:
      - {id: atik_yomin_egal_zt_atik_dans_7_gulgalta, role: atik_yomin_egal_zt_atik_mitgalin_dans_7_gulgalta_aa}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : nom revele tier. Pattern naming encodes revelation."

  - id: "EC-H3S13-106"
    source_he: "ובערך שהוא מתלבש בא\"א כתיב ביה ושער רישיה כעמר נקא"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      Vis-a-vis du LVUSH dans A"A : ecrit "U-SE'AR REISHEH KE-AMER NAKA"
      (les cheveux de sa tete comme laine pure, Daniel 7:9).
      → Architecture : verset Daniel encode lvush A"A's tete.
      → Pattern : letter-mysticism scriptural.
    type: déduction_scripturaire
    concepts:
      - {id: usear_reisheh_keamer_naka_aa_lvush, role: daniel_7_9_usear_reisheh_keamer_naka_egal_aa_lvush}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : verset Daniel = lvush A\"A. Pattern liturgique."

  - id: "EC-H3S13-107"
    source_he: "ודע כי אע\"פ שכל אלו הם שערות בסוד שורש הדנין עכ\"ז הנה הם יותר רחמים מרחמי ז\"א ולכן מאלו השערות נמשך השפעה לז\"א ואינן מגיעין רק עד רישא דז\"א ולא יותר ושאר כללות הז\"א הוא חלק וז\"ס ואנכי איש חלק"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      Bien que cheveux = SHORESH HA-DININ — sont YOTER RACHAMIM que rachamim ZA.
      DONC d'eux : SHEFA → ZA. Atteignent SEUL rosh ZA, pas plus.
      Reste de ZA = HALAK (lisse, sans cheveux).
      Sod : "VE-ANOKHI ISH HALAK" (Bereshit 27:11 — Yaakov "homme lisse").
      → Architecture : transmission upstream surclasse local quality.
      → Pattern : provenance > local nature.
      cf. EC-H3S13-084 (perek 05b) sur cheveux d'A"A dinim mais rachamim+grands.
    type: déduction_scripturaire
    concepts:
      - {id: cheveux_aa_dinim_mais_rachamim_yoter_que_za_anokhi_ish_halak, role: cheveux_aa_yoter_rachamim_za_halak_anokhi_ish_halak_yaakov}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : provenance > local. Pattern source-quality cascading."

  - id: "EC-H3S13-108"
    source_he: "(ז\"א מאירין בו כמה מיני אורות במוחין דיליה א הוא שמתפשטת הארה מהחסד העליון שמתלבש בכתר דא\"א ומשם מתפשטת עד מזל הי\"ג דאריך ומשם מתפשט עוד הארה ההיא עד הדעת שבין או\"א ומיחד אותן ואז בכח הזה נעשה מוחין דז\"א המתלבשין בנה\"י אמא"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      MOHIN de ZA recoivent 3 SOURCES d'illumination :
      SOURCE 1 : Chesed Elyon (RDLA) lvush dans Keter A"A → ME'IR jusqu'au
      MAZLA HA-13 d'Arikh → DA'AT entre AVI → MEYACHED (unifie) AVI →
      par cette force = MOHIN ZA dans NHY d'Imma.
      → Architecture : source 1 = chemin Chesed elyon → mazal → Da'at AVI → ZA.
      → Pattern : multi-step pathway pour mohin generation.
    type: interprétation_lurianique
    concepts:
      - {id: source_1_mohin_za_chesed_elyon_mazal_13_daat_avi, role: source_1_mohin_za_chesed_elyon_keter_aa_mazal_13_daat_avi}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin"]
      relevance: "Architecture : multi-step mohin pathway. Pattern source 1 RDLA-cascade."

  - id: "EC-H3S13-109"
    source_he: "ב' הארה נמשכת ממ\"ס דא\"א ויורדת דרך שערות דרישא ודרך שערות דדיקנא דא\"א ג\"כ ונמשכין עד דיקנא דז\"א ומאירין במוחין דיליה"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      SOURCE 2 : HA'ARAH NIMSHEKHET (s'etend) de MOHA SETIMA d'A"A.
      Descend par cheveux ROSH et cheveux DIKNA d'A"A.
      Atteint dikna de Z"A → ME'IR dans MOHIN.
      → Architecture : source 2 = chemin Hokhmah A"A → cheveux → mohin ZA.
      → Pattern : capillary transmission.
    type: interprétation_lurianique
    concepts:
      - {id: source_2_mohin_za_ms_aa_par_cheveux_rosh_dikna, role: source_2_mohin_za_ms_aa_par_cheveux_rosh_et_dikna_aa}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : capillary transmission. Pattern source 2."

  - id: "EC-H3S13-110"
    source_he: "ג' הארה יוצאת מיסוד דעתיק אשר תוכו (מ\"ס פנימים) מוחא דדעת דא\"א ובוקע מצח דא\"א ויוצא הארה עד מצחא דז\"א ומאיר במצחא דיליה בפנים של המוחין בתוך מצחא דיליה ואז מתבטלין כל הדינין שבמצח (נ\"א שבמוחין) דז\"א"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      SOURCE 3 : YOTZET (sort) du YESOD d'Atik —
      dont l'INTERIEUR (Variante : "MS PNIMIM") = MOHA d'DA'AT d'A"A.
      BOKE'A (perce) METZAH d'A"A → ME'IR jusqu'au METZAH ZA.
      Annule tous les DININ dans METZAH — Variante (Nusah Aher) : "BA-MOHIN" (mohin) — d'ZA.
      → Architecture : source 3 = chemin yesod Atik → bokea metzah → annule dinim ZA.
      → Pattern : dinim cancellation via deep upstream flow.
      cf. EC-H3S13-098 (perek 06) sur 24 batei dinim metzah ZA.
    type: interprétation_lurianique
    concepts:
      - {id: source_3_mohin_za_yesod_atik_metzah_annule_dinim, role: source_3_mohin_za_yesod_atik_bokea_metzah_aa_annule_dinim_metzah_za}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : dinim cancellation via deep flow. 2 Nusah Aher captures."

  - id: "EC-H3S13-111"
    source_he: "אחורי הראש הם נמשכין עם י\"ג נימין דשערי דרישא הנמשכין אחורי הראש עד רישא דז\"א ומשם יורד השפע לרישא דז\"א הנה א\"כ כי או\"א מושפעים מסוד מזלא דע\"ק כי הם נמשכין ממ\"ס חכמה דכתר והז\"א מושפע יותר מלמעלה מכתר דא\"א שמשם נמשכין י\"ג חוורתא ומפאת בחי' זו הוא יותר מעולה הז\"א לפעמים מאו\"א"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      4 hivara ahor + 13 nimin shaarei rosh ahor → atteignent rosh Z"A.
      AVI = MUSHPA-IM (irrigues) du SOD MAZLA d'A"K (= MS d'A"A's chokhmah).
      Z"A = MUSHPA YOTER me-LAMA'ALAH (de plus haut) — du KETER d'A"A
      (d'ou viennent 13 hivara).
      DONC parfois ZA est PLUS ELEVE qu'AVI (par cette behinah).
      → Architecture : ZA recoit du Keter ; AVI du Hokhmah → ZA peut surclasser AVI.
      → Pattern : downstream component peut depasser intermediate via upstream-superieur.
    type: interprétation_lurianique
    concepts:
      - {id: za_mushpa_keter_aa_avi_mushpa_ms_aa_za_parfois_superieur_avi, role: za_mushpa_de_keter_aa_via_hivara_avi_mushpa_de_ms_aa_via_mazla_za_parfois_plus_eleve}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin"]
      relevance: "Architecture : downstream peut surclasser intermediate. Pattern bypass."

  - id: "EC-H3S13-112"
    source_he: "וז\"ס הנרמז באדר\"ז רצ\"ב או\"א מהאי מוחא נפקי ז\"א בעתיקא תליא ואחיד"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      Sod Adra Zuta 292 : "AVI ME-HAI MOHA NAFKI, ZA BE-ATIKA TELIA VE-ACHID"
      (AVI sortent de cette MOHA [d'A"A], ZA est suspendu et attache a Atika).
      → Architecture : ZA depend directement Atika ; AVI seulement via Moha (intermediaire).
      → Pattern : direct dependency vs mediated.
    type: déduction_scripturaire
    concepts:
      - {id: adra_zuta_292_avi_de_moha_za_be_atika_telia_achid, role: adra_zuta_292_avi_me_hai_moha_nafki_za_be_atika_telia_ve_achid}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "atik_yomin"]
      relevance: "Architecture : direct vs mediated dependency. Source Adra Zuta 292."

  - id: "EC-H3S13-113"
    source_he: "כי הוא אחיד שם ממש בנה\"י אך בערך אלו י\"ג תקוני חוורתא כנז' ע\"ז אמר תלייא כי בהם נתלה ז\"א ולא אחיד ובערך ב' בחי' אלו אמר אחיד ותליא"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      "TELIA" + "ACHID" = 2 RELATIONS distinctes :
      ACHID = attache REELLEMENT dans NHY d'A"A (revetement direct).
      TELIA = SUSPENDU (lien moins direct) aux 13 hivara.
      → Architecture : 2 modes de connexion (firm attachment vs hanging).
      → Pattern : multiple binding strengths entre composants.
    type: interprétation_lurianique
    concepts:
      - {id: achid_attachement_ferme_telia_suspension_2_modes_connexion, role: achid_attachement_ferme_nhy_telia_suspension_hivara_2_modes_connexion}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/arikh_anpin.py", "partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "arikh_anpin", "atik_yomin"]
      relevance: "Architecture : 2 modes connexion. Pattern binding strengths."

  - id: "EC-H3S13-114"
    source_he: "א\"א מתלבש בכל אצילות כולו אך ראשו אינו מתלבש כי אין העליון מתלבש בתחתון אם לא בז\"ת כי הג\"ר נשארים בסוד מקיף וז\"ס הנרמז באדר\"ז ודאי בהאי עתיקא לא אתגלייא אלא רישא בלחודוי"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      A"A REVET tout ATZILUT — sauf son ROSH (pas revetu).
      Principe : superieur lvush dans tachton SEUL Z'T ; G"R restent MAKIF.
      Sod Adra Zuta : "BE-HAI ATIKA LO ATGALYA ELA RISHA BIL'HUDOI"
      (dans cet Atika ne se revele que la rosh seule).
      → Architecture : visible part = rosh seule ; le reste lvush.
      → Pattern : visibility limited to top-tier.
      cf. EC-H3S13-045 (perek 03) sur principe ELYON LVUSH TACHTON.
    type: déduction_scripturaire
    concepts:
      - {id: aa_lvush_tout_atzilut_sauf_rosh_visible, role: aa_lvush_tout_atzilut_sauf_rosh_visible_adra_zuta}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : visibility limited top-tier. Pattern revelation reserve."

  - id: "EC-H3S13-115"
    source_he: "מתחלת הגרון עד טבורא דלבא דא\"א שם מציאת או\"א כי עד שם מלבישין אותו ומשם ולמטה מלבישו ז\"א וז\"ס הת\"ת שנקרא לב והבן זה ומטבורא דלבא שהוא חצי ת\"ת שלו מתחיל משם סוד רישא דז\"א"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      Du GARON jusqu'au TABURA DE-LEIBA d'A"A : MITZIUT d'AVI (revetent A"A jusque la).
      De la-bas et en bas : ZA REVETIT A"A.
      Sod : T"T = LEV (coeur) ; tabura de-leiba = MI-T"T.
      Du tabura = ROSH d'Z"A commence.
      → Architecture : 2 zones revetement (haute=AVI, basse=ZA).
      → Pattern : sectional coverage par tier.
      cf. EC-H3S13-082 (perek 05b) sur tabura de-leiba=mi-T"T A"A.
    type: axiome_explicite
    concepts:
      - {id: 2_zones_revetement_avi_garon_a_tabura_za_tabura_a_bas, role: 2_zones_revetement_aa_par_avi_haut_et_za_bas}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin"]
      relevance: "Architecture : sectional coverage par tier. Pattern partitioned wrapping."

  - id: "EC-H3S13-116"
    source_he: "ואם תדקדק תמצא כי תמיד ת\"ת נעשה ממנו הכתר שהוא גלגלתא כי ת\"ת דעתיק תמן גלגלתא דאו\"א שהוא סוד בינה דא\"א ומת\"ת [נ\"א וכן ת\"ת] דא\"א נעשה כתר וגלגלתא דז\"א וכן מת\"ת דז\"א נעשה כתר וגלגלתא דנוקבא"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      PATTERN : T"T (Tiferet) → KETER du tier suivant.
      T"T d'Atik → Gulgalta d'AVI (= Bina d'A"A).
      Variante (Nusah Aher) : "ve-khen T"T" (et de meme T"T).
      T"T d'A"A → Keter+Gulgalta d'Z"A.
      T"T d'Z"A → Keter+Gulgalta d'Nukvah.
      → Architecture : recursive cascade Tiferet→Keter (next).
      → Pattern : middle becomes top of next.
    type: axiome_explicite
    concepts:
      - {id: tiferet_devient_keter_du_tier_suivant_recursif, role: tiferet_devient_keter_gulgalta_du_tier_suivant_recursif}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : recursive cascade. Pattern middle→top next."

  - id: "EC-H3S13-117"
    source_he: "סוד ת\"ת דא\"א נחלק לב' חצאין חציו למציאת או\"א לצורך גופם וחציו לכתר ז\"א הרי כי או\"א וז\"א הם ב' מלכים משתמשין בכתר א'"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      T"T d'A"A se DIVISE en 2 CHATZAYIM (moities) :
      Moitie pour MITZIUT d'AVI (leur guf).
      Moitie pour KETER de Z"A.
      Comparaison : 2 ROIS partagent 1 KETER.
      Idem : T"T de Z"A → moitie Z"A guf, moitie Keter de Nukvah.
      → Architecture : Tiferet partagee = ressource commune entre tier+tier-suivant.
      → Pattern : resource sharing between adjacent tiers.
    type: interprétation_lurianique
    concepts:
      - {id: tiferet_partage_2_chatzayim_2_rois_un_keter, role: tiferet_partage_2_chatzayim_2_rois_partagent_un_keter}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin", "nukva"]
      relevance: "Architecture : resource sharing between tiers. Pattern shared crown."

  - id: "EC-H3S13-118"
    source_he: "סוד הוד זקן [נ\"א הוא זקן דא\"א] הנזכר באדרא גם דדיקנא (כי גם בו נכלל ההוא כי הדיקנא) אינו אלא בחי' יסוד לכן הנשים [והסריס] אין להם זקן"
    source_ref: "Heikhal 3, Sha'ar 3:7"
    assertion: |
      Sod : HOD = ZAKEN (barbe).
      Variante (Nusah Aher) : "HU ZAKEN d'A"A".
      Adra : meme DIKNA = behinah YESOD (kelul HOD aussi).
      DONC NASHIM (femmes) — Variante (Nusah Aher) : "VE-HASARIS" (eunuques) —
      n'ont PAS de zaken (manquent yesod fonctionnel).
      → Architecture : zaken = manifestation Yesod ; absence = manque Yesod.
      → Pattern : surface signature reveals reproductive function.
    type: déduction_scripturaire
    concepts:
      - {id: hod_egal_zaken_yesod_femmes_pas_de_zaken, role: hod_egal_zaken_dikna_yesod_femmes_et_saris_pas_de_zaken}
