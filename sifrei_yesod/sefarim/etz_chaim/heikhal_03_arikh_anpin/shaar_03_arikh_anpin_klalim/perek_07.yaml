# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 7 — Z'T d'Atik dans 7 gulgalta. ZA telia ba'Atika. Mohin ZA via 3 sources
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §7 :
#   - Bloc A : "Atik Yomin" = pi yomin (7 jours/Z'T mitgalin gulgalta)
#   - Bloc B : Cheveux dinim mais yoter rachamim que ZA
#   - Bloc C : 3 sources d'illumination mohin ZA
#   - Bloc D : Avi mi-mazla ; ZA mushpa de Keter A"A
#   - Bloc E : Adra Zuta — ZA telia ve-achid be-Atika
#   - Bloc F : A"A revet tout Atzilut sauf rosh
#   - Bloc G : Tiferet partage chaque tier
#   - Bloc H : 2 rishin lvush kechada (comme AVI)
#   - Bloc I : Hod = zaken (femmes/saris)
#
# Source Sefaria : Sefer_Etz_Chaim.13.7 (1 perek)
# IDs : EC-H3S13-105 → EC-H3S13-118

meta:
  sefer: etz_chaim
  heikhal: 3
  shaar: 3
  shaar_name_he: "שער אריך אנפין"
  perek: 7
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Z'T d'Atik mitgalin dans 7 gulgalta d'A\"A — sod 'Atik Yomin'. ZA telia ve-achid be-Atika (Adra Zuta 292). 3 sources mohin ZA : Chesed elyon Keter A\"A → mazal → Da'at AVI ; Hokhmah MS A\"A → cheveux+dikna ; Yesod Atik → metzah. A\"A revet tout Atzilut sauf rosh. Tiferet partage entre tier+tier suivant. Hod=zaken (femmes/saris pas de zaken)."

