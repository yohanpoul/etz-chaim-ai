principes_generatifs:

  - id: "PG-H3S13-025"
    nom: "Principe de Multi-Source Mohin (3 Chemins Convergents)"
    source_assertions: ["EC-H3S13-108", "EC-H3S13-109", "EC-H3S13-110"]
    formalisation: |
      ARCHITECTURE DE MULTI-SOURCE MOHIN (ZA) :
      ZA recoit MOHIN de 3 SOURCES distinctes :
      SOURCE 1 — CHESED ELYON pathway :
        Chesed RDLA → lvush Keter A"A → Mazla 13 → Da'at entre AVI →
        unifie AVI → MOHIN ZA (lvush NHY Imma).
      SOURCE 2 — HOKHMAH MS pathway :
        Moha Setima A"A → cheveux ROSH + DIKNA d'A"A →
        atteint dikna ZA → ME'IR mohin.
      SOURCE 3 — YESOD ATIK pathway :
        Yesod Atik (interieur = Da'at A"A) → BOKEA METZAH A"A →
        atteint METZAH ZA → annule DININ.
      → Pattern fondamental : composante critique recoit de multiples sources.
      → Architecture : redundancy + complementarity in flow paths.
    applications_ia:
      - "partzufim/zeir_anpin.py : implement 3-source mohin reception"
      - "Pattern : critical component fed by multiple paths for redundancy"
      - "Architecture : multi-path delivery for high-priority components"
      - "Pattern : functional specialization per path (chesed/hokhmah/yesod sources)"
      - "Diagnostic : verifier les 3 sources sont actives"
    questions_ouvertes:
      - "Y a-t-il une priorite entre les 3 sources ?"
      - "Pattern : peut-on operer avec 2 sources si 1 fail ?"
      - "Comment combiner les 3 contributions sans conflit ?"

  - id: "PG-H3S13-026"
    nom: "Principe de Bypass Hierarchique (ZA peut Surclasser AVI via Direct Source)"
    source_assertions: ["EC-H3S13-111", "EC-H3S13-112", "EC-H3S13-113"]
    formalisation: |
      ARCHITECTURE DE BYPASS HIERARCHIQUE :
      AVI = MUSHPA-IM par MAZLA d'A"K (= MS d'A"A).
      ZA = MUSHPA YOTER ME-LAMA'ALAH (de plus haut) — du KETER d'A"A
      (d'ou viennent 13 hivara).
      DONC parfois ZA SURCLASSE AVI structurellement.
      Adra Zuta 292 : "AVI me-hai moha nafki ; ZA be-Atika telia ve-achid".
      2 modes connexion : ACHID (ferme dans NHY) + TELIA (suspendu via hivara).
      → Pattern fondamental : downstream peut bypasser intermediate via upstream-superieur.
      → Architecture : non-linear hierarchy avec direct connections.
    applications_ia:
      - "partzufim/zeir_anpin.py : implement direct connection to A\"A bypassing AVI"
      - "Pattern : non-linear hierarchy with bypass paths"
      - "Architecture : downstream can have superior provenance"
      - "Pattern : multiple connection modes (firm vs suspended)"
      - "Diagnostic : tracer paths effectives, pas seulement hierarchy nominale"
    questions_ouvertes:
      - "Y a-t-il limites au bypass ?"
      - "Pattern : peut-on dynamiquement basculer ACHID/TELIA ?"
      - "Comment design pour permettre bypass legitime ?"

  - id: "PG-H3S13-027"
    nom: "Principe de Tiferet Cascade (Middle Becomes Top of Next)"
    source_assertions: ["EC-H3S13-116", "EC-H3S13-117"]
    formalisation: |
      ARCHITECTURE DE CASCADE TIFERET → KETER :
      PATTERN RECURSIF :
        T"T d'Atik → Keter (Gulgalta) d'AVI (= Bina d'A"A).
        T"T d'A"A → Keter d'Z"A.
        T"T d'Z"A → Keter d'Nukvah.
      RESOURCE-SHARING :
        T"T se DIVISE en 2 CHATZAYIM :
          Moitie pour le partzuf actuel (guf).
          Moitie pour le Keter du partzuf suivant.
        = 2 ROIS partagent 1 KETER.
      → Pattern fondamental : middle = top du next ; ressource partagee.
      → Architecture : cascading hierarchy with resource sharing.
    applications_ia:
      - "partzufim/* : implement T\"T → Keter recursive cascade"
      - "Pattern : middle-of-current = top-of-next pour cascade design"
      - "Architecture : resource sharing entre tiers adjacents"
      - "Pattern : 2-rois-1-keter = shared crown abstraction"
      - "Diagnostic : verifier coherence cascade T\"T → Keter"
    questions_ouvertes:
      - "Y a-t-il limites a la cascade (combien de tiers max) ?"
      - "Pattern : peut-on partager d'autres composantes que T\"T ?"
      - "Comment gerer conflits dans 2-rois-1-keter ?"
