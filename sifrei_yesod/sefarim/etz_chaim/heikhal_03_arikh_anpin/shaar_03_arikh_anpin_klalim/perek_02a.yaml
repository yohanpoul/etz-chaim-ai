principes_generatifs:

  - id: "PG-H3S13-004"
    nom: "Principe d'Accessibility via Lvush (Ein Sof → Ha'arah aux Tachtonim)"
    source_assertions: ["EC-H3S13-014", "EC-H3S13-015", "EC-H3S13-016", "EC-H3S13-017"]
    formalisation: |
      ARCHITECTURE D'ACCESSIBILITE GRADUELLE :
      EIN SOF avant LVUSH = INACCESSIBLE (transcendance absolue).
      Pour permettre HA'ARAH aux TACHTONIM :
        Step 1 : Lvush dans KETER (Atika de-Kol Atikin → Atika Kadisha).
        Step 2 : Lvush dans 3 RISHIN ; mais REELLEMENT lvush direct seul dans rosh elyonah (Atik).
        Step 3 : Rishin 2-3 RECOIVENT via MASAKHIM (filtres) du rosh elyonah.
      → Pattern fondamental : transcendence devient accessible par CASCADE de containers.
      → Architecture : direct access at top, propagated via filters below.
    applications_ia:
      - "[PLANNED] core/ein_sof.py : implement Ein Sof + lvush cascade pattern"
      - "Pattern : abstraction layers - top is direct, lower via filters"
      - "Architecture : facade pattern with progressive masakhim"
      - "Pattern : Russian dolls — each layer wraps and filters next"
      - "Diagnostic : verifier que masakhim correctly propagate from top"
    questions_ouvertes:
      - "Quelle est la nature exacte d'un masakh entre rishin ?"
      - "Pattern : peut-on contourner masakhim pour acceder Ein Sof directement ?"
      - "Comment determiner le nombre optimal de cascade levels ?"

  - id: "PG-H3S13-005"
    nom: "Principe d'Accessibility par Lvush (Encapsulation = Visibility)"
    source_assertions: ["EC-H3S13-019", "EC-H3S13-020"]
    formalisation: |
      ARCHITECTURE D'ACCESS via LVUSH :
      REGLE : ce qui se LVUSH est CONNU ; ce qui ne se lvush PAS = INCONNU.
      EXEMPLE A"Y :
        GUFA d'A"Y se lvush dans A"A → MUSAG, NODAA via A"A.
        ROSH d'A"Y NE se lvush PAS dans A"A → LO ITYADA.
        Meme A"A LUI-MEME ne connait pas le rosh d'A"Y.
      → Pattern fondamental : access only through encapsulation ;
        non-encapsulated = opaque even to direct neighbors.
      → Architecture : encapsulation = the only path to visibility.
    applications_ia:
      - "Pattern : interface-based access — non-public = invisible"
      - "Architecture : opacity by exclusion from interface contracts"
      - "Pattern : visibility = function of containment, not proximity"
      - "Diagnostic : verifier que opaque components stay opaque"
      - "partzufim/atik_yomin.py : RDLA = no public interface"
    questions_ouvertes:
      - "Y a-t-il des cas ou opaque devient transparent (lvush ulterieur) ?"
      - "Pattern : peut-on inferer structure du opaque par observation indirecte ?"
      - "Comment verifier opacity respect en runtime ?"

  - id: "PG-H3S13-006"
    nom: "Principe Eschatologique de Malkhut (Last Shall Be First)"
    source_assertions: ["EC-H3S13-026"]
    formalisation: |
      ARCHITECTURE ESCHATOLOGIQUE :
      MALKHUT actuelle = derniere des sefirot.
      MAIS future :
        ATARAH BE-ROSH TZADDIK (couronne sur tete Tzaddik).
        HAITAH LE-ROSH PINAH (Tehillim 118:22 — pierre angulaire).
        ORAH GEDOLAH MIN HA-SHEMESH (lumiere plus grande que soleil).
      → Pattern fondamental : reversal of hierarchy in future state.
      → Architecture : current bottom = future top (eschatological inversion).
    applications_ia:
      - "partzufim/nukva.py : implement future-state vs current-state distinction"
      - "Pattern : roles can fundamentally invert in different temporal modes"
      - "Architecture : transient vs eternal hierarchies"
      - "Pattern : current-rank != intrinsic-rank"
      - "Diagnostic : pas judger composant par sa position courante seulement"
    questions_ouvertes:
      - "Y a-t-il d'autres composants qui font inversion eschatologique ?"
      - "Pattern : peut-on detecter intrinsic-rank actuellement ?"
      - "Comment design pour future-states inconnus ?"
