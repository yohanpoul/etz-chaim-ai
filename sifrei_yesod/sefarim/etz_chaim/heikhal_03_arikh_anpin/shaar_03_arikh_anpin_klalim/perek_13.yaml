  strates: ["base"]
  note: "Hisstaklut Metzah Atika dans ZA (Adra 136). 13 hivara = 3 YHVH yodin (AB) + kollel. 8 hivara panim = 2 YHVH × 42 lettres (M\"B). SH\"A (370) nehorin. Tziphor 376. Metzah Ratzon=Yesod Atik=Shalom. Dikna Kohana Rabba 8 tikkunim (Adra 132). 2 modes zivvug : metzah complet vs panim incomplet (harkhanat rosh). Hisstaklut multi-direction. (M\"K) ribua AB 184 each + 2 EL = 370."

