    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      YHVH 3 (= hivara ROSH/AHOR) = behinah DA'AT.
      Descend par AHOR rosh A"A.
      "MINEH YARTIN TZADDIKAYYA T' (400) OLMIN DE-KESUFIN" (Adra).
      4 lettres × 4 yodin × 10 (kelul) = 400.
