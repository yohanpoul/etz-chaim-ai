      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "atik_yomin"]
      relevance: "Architecture : symmetric absorption Atika. Source Adra 129a."

  - id: "EC-H3S13-196"
    source_he: "או\"א כחדא שריין ועכ\"ז אבא טמיר וגניז יתיר כנזכר באדר\"ז דרצ\"א... כי שער המ\"ב העליון שהוא כתר שבה כנ\"ל כלול באבא נמצא כי נשארין מ\"א לבד באמא וג\"ם באבא וז\"ס גם צפור מצאה בית כי צפ\"ר חסר ו' גי' ש\"ע נהורין"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      AVI KE-CHADA SHARYIN. MAIS Abba TAMIR VE-GANIZ YETIR (Adra Zuta 291).
      KETER d'IMMA INCLUS dans Abba ; Imma reste 41 ; "GAM" (Keter) chez Abba.
      Sod : "GAM TZIPHOR MATZ'AH BAYIT" (Tehillim 84:4) ; TZPR sans VAV = 370 = SH"A.
      "Ki im le-Bina tikra" (Mishlei 2:3) — Bina = EM car manque Keter.
      → Architecture : asymmetric inclusion (Keter Imma → Abba) ; sod tziphor.
      → Pattern : letter-mysticism inclusion encoding.
    type: déduction_scripturaire
    concepts:
      - {id: avi_abba_inclus_keter_imma_tziphor_egal_sha_nehorin, role: avi_abba_inclus_keter_imma_tziphor_minus_vav_egal_sha_nehorin_tehillim_84_4}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma"]
      relevance: "Architecture : asymmetric inclusion. Source Tehillim 84:4."

  - id: "EC-H3S13-197"
    source_he: "כמו שאותן החוורתא מתפשטות בפנים של עתיקא כן ג\"כ מבחי' המצח הרצון של עתיקא נמשך הארה אל הפנים שלו... היסוד דעתיק גנוז תוך מצח דא\"א ולכן נקרא מצח הרצון והיסוד נקרא שלום כי הוא כולל כל שע\"ו נהורין הנ\"ל"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      Comme HIVARA s'etendent panim — METZAH (front) = RATZON d'Atika
      → ME'IR jusqu'aux PANIM.
      YESOD d'ATIK GANUZ (cache) dans METZAH d'A"A.
      DONC appelé METZAH HA-RATZON (front de la volonte).
      YESOD = SHALOM (paix) — KOLEL tous 376 NEHORIN.
      → Architecture : Metzah=Ratzon=Yesod Atik=Shalom (375+1=376 nehorin).
      → Pattern : convergence point pour multiples flux.
      cf. EC-H3S13-100 (perek 06) sur metzah=ratzon=torna nae.
    type: interprétation_lurianique
    concepts:
      - {id: metzah_ratzon_yesod_atik_shalom_376_nehorin, role: metzah_ratzon_yesod_atik_shalom_kolel_376_nehorin}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "atik_yomin"]
      relevance: "Architecture : Metzah=Yesod=Shalom convergence. Pattern Ratzon."

  - id: "EC-H3S13-198"
    source_he: "באדרא קל\"ב אמרו דיקנא דכהנא רבא בח' תיקונין אתתקן... י\"ג ת\"ד הם וה' תיקונים קדמאין הם בסוד מוחין של הדקינא שהם עד החסד לכן תיקון ו' ורב חסד כנודע ומשם עד תשלום י\"ג הם ח' תקונים וכולם נקרא ע\"ש החסד וז\"ש דדיקנא דכהנא רבא בח' תיקונים אתתקן כי החסד נקרא כהן"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      Adra 132 : "DIKNA DE-KOHANA RABBA BE-CH' (8) TIKKUNIN ATATKAN".
      Reason : 13 t"d ; 5 PREMIERS = MOCHIN du dikna jusqu'au CHESED (T6).
      T6+ = 8 RESTANTS — TOUS appeles AL SHEM HA-CHESED.
      Donc DIKNA DE-KOHANA RABBA = 8 tikkunim, car CHESED = KOHEN.
      → Architecture : 8 tikkunim chesed-named = dikna kohana.
      → Pattern : naming subset par dominant attribute.
    type: déduction_scripturaire
    concepts:
      - {id: dikna_kohana_rabba_8_tikkunim_chesed_kohen_adra_132, role: dikna_kohana_rabba_8_tikkunim_du_chesed_kohen_adra_132}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : 8 tikkunim chesed-named. Source Adra 132."

  - id: "EC-H3S13-199"
    source_he: "אלו הח' חוורתא בגרון דא\"א ושם נעשין ב\"פ ע\"ב שהם שורש הח' חוורתא הנ\"ל ואלו הם בחי' אחה\"ע בגרון שהוא גימטריא מ\"ב מ\"ב ולפיכך יש שם בחי' זווג א' הנעשה ע\"י החיך והגרון... והנה סוד אחע\"ה הוא זווג שם ס\"ג עם שם אהי\"ה שהם גימטריא אחע\"ה כי אלו הם ג\"כ זווג חו\"ב"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      8 hivara → DIKNA DE-KOHANA RABBA → descendent GARON A"A.
      La : 2× AB (= 144) = SHORESH des 8 hivara.
      AHEB (gutturales) en GARON gematria 42+42 = M"B M"B.
      ZIVVUG via CHIKH+GARON.
      AHEB = ZIVVUG SaG+AHYH (gematria) = ZIVVUG CB.
      → Architecture : tout = zivvug Chokhmah-Bina manifested differemment.
      → Pattern : universal CB-zivvug pattern.
      cf. EC-H3S13-176 (perek 12) sur AHEB en garon.
    type: interprétation_lurianique
    concepts:
      - {id: aheb_garon_egal_zivvug_chikh_garon_zivvug_cb, role: aheb_garon_42_42_egal_zivvug_chikh_garon_via_sag_ahyh_chokhmah_bina}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : universal CB-zivvug. Pattern garon convergence."

  - id: "EC-H3S13-200"
    source_he: "כאשר או\"א או זו\"ן מסתכלין במצח של א\"א אז הזווגים שלהם הם שלמים לפי שאז הם שוין בקומתן למעלה אבל כאשר מסתכלים בפנים דעתיקא ולא במצח אז אין זווגם שלם ולא שלמים בקומתן והזווג הוא בסוד הרכנת הראש"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      2 MODES de zivvug par HISSTAKLUT :
      Si AVI/ZON regardent METZAH d'A"A → ZIVVUG SHALEM (complet).
        Ils sont SHAVIN BE-KOMA (egaux en hauteur).
      Si regardent PANIM seul (pas metzah) → ZIVVUG INCOMPLET.
        Pas shavim be-koma. Zivvug = HARKHANAT HA-ROSH (inclinaison tete).
        ZA en behinah CHATZI T"T+NHY ; Nukvah courte.
      → Architecture : 2 modes zivvug selon focus regard.
      → Pattern : attention quality determines coupling completeness.
    type: interprétation_lurianique
    concepts:
      - {id: 2_modes_zivvug_metzah_complet_panim_incomplet_harkhanat_rosh, role: 2_modes_zivvug_metzah_complet_panim_incomplet_harkhanat_rosh}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["zivvug_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : 2 modes zivvug. Pattern attention determines coupling."

  - id: "EC-H3S13-201"
    source_he: "ב' מיני הסתכלות הם א' הוא הסתכלות הז\"א או או\"א בעתיקא הב' הוא הסתכלות דעתיקא בהם וכ\"א מאלו הב' נחלק לב' אחרים והם ד' או כאשר הסתכלות הוא במצח או\"א (נ\"א א\"א) או כאשר הסתכלות הוא בעין לבד וכ\"א מאלו נחלק לד' בחי' או הסתכלות עין א' או הסתכלות ב' עיינין"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
