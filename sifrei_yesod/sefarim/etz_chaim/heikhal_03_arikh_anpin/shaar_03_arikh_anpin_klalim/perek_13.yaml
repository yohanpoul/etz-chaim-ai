  - id: "EC-H3S13-190"
    source_he: "ב' הויות אחרות שהם בחי' ב' מוחין חו\"ב אשר בכתר שיש בהם ח' אותיות ובהם ח' יודין הם נמשכין כנגד הפנים והם מתפשטין בבחי' הפנים דעתיקא ששם מאירין אלו הח' חוורתי והרי בין הכל י\"ב חוורתי ועוד יש חד חוור הכולל כל י\"ב חוורתי שעמו נקרא כולם י\"ג חוורתי דרישא וזהו החוור הי\"ג נשאר למעלה ברישא דגלגלתא"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      2 autres YHVH = 2 MOCHIN CHOKHMAH-BINAH du Keter.
      8 lettres + 8 yodin → descendent vers PANIM = 8 HIVARA.
      Total 12 hivara + 1 HIVARA KOLEL (englobant) = 13.
      Le 13eme HIVAR reste LE-MA'ALAH dans rosh GULGALTA.
      → Architecture : 8 hivara panim + 4 ahor + 1 kollel = 13.
      → Pattern : decomposition hierarchique 8+4+1.
    type: axiome_explicite
    concepts:
