  - id: "EC-H3S13-191"
    source_he: "כל אחד מאלו הויות יש בהם מ\"ב אותיות שהם ד' אותיות הפשוט וי' אותיות המילוי הרי י\"ד וכ\"ח אותיות דמילוי המילוי הרי מ\"ב אותיות בפן א', ומ\"ב אותיות בפן הב'"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      Chaque YHVH : 42 LETTRES :
        4 LETTRES SIMPLES (pashut).
        10 LETTRES MILUI = 14.
        28 LETTRES MILUI-DU-MILUI = 42.
      42 lettres dans PAN 1 + 42 lettres dans PAN 2.
      → Architecture : letter-recursion (pashut + milui + milui-du-milui).
      → Pattern : 3-tier letter expansion.
    type: axiome_explicite
    concepts:
      - {id: yhvh_42_lettres_pashut_milui_milui_du_milui, role: yhvh_42_lettres_pashut_4_milui_10_milui_du_milui_28}
    mapping:
