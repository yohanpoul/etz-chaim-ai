    source_he: "ואלו קפ\"ד דאחוריים של ע\"ב דיודין הם שורש לש\"ע נהורין אחרים שיש בפנים ג\"כ והם ב' א\"ל במלואם בב' צדדי הפנים ימין ושמאל וא\"ל במילואו גימטריא קפ\"ה ושניהם גימטריא ש\"ע ויש א\"ל ג' גם כן בחוטם שהוא בין ב' עינים וא\"ל זה יוצא מן ייא\"י דס\"ג שהוא גימטריא א\"ל"
