# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 13 — Hisstaklut Metzah Atika→Z"A. SH"A nehorin panim. 2 modes zivvug
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §13 :
#   - Bloc A : 13 hivara = 3 YHVH (chacun AB) + 1 kollel global
#   - Bloc B : 8 hivara descendent panim ; 4 ahor (rosh)
#   - Bloc C : 2 YHVH milui yodin = 42 lettres chacune (Mem-Bet)
#   - Bloc D : 50 shaarei Bina = 7 noms + 7×6 + kollel
#   - Bloc E : SH"A (370) nehorin = 9×41 + kollel
#   - Bloc F : Adra Zuta — 2 panim comptees comme 1 (kola yamina)
#   - Bloc G : Tziphor=376 ; "ki im le-Bina tikra"
#   - Bloc H : Metzah Ratzon = Yesod Atik dans metzah = SHALOM
#   - Bloc I : Dikna de Kohana Rabba 8 tikkunim (Adra 132)
#   - Bloc J : 2 modes zivvug : metzah=complet, panim=incomplet (harkhanat rosh)
#   - Bloc K : 4+ types hisstaklut combinaisons
#   - Bloc L : (M"K) ribua AB 184 droite+gauche=370 ; 2 EL milui ; EL chotem
#
# Source Sefaria : Sefer_Etz_Chaim.13.13 (Part 1 + Part 2 M"K)
# IDs : EC-H3S13-188 → EC-H3S13-203

meta:
  sefer: etz_chaim
  heikhal: 3
  shaar: 3
  shaar_name_he: "שער אריך אנפין"
  perek: 13
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
