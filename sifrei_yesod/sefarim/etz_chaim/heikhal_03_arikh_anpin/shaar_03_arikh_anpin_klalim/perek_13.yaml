      relevance: "Architecture : 3-tier letter expansion. Pattern letter-recursion."

  - id: "EC-H3S13-192"
    source_he: "בחי' הפנים הוא תיקון ז' דת\"ד דא\"א... והוא תיקון תרין תפוחין קדישין... כל פן ופן משניהם כולל י\"ס"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      PANIM = TIKKUN 7 des t"d d'A"A = TARIN TAPUHIN KADISHIN (2 pommes saintes).
      Chaque PAN (cote) KOLEL 10 SEFIROT.
      → Architecture : panim = T7 ; chaque cote = sefirot completes.
      → Pattern : surface area divisee en sefirot calculables.
      cf. EC-H3S13-140 (perek 09) sur T7=Ve-Emet=2 tapuhin.
    type: axiome_explicite
    concepts:
      - {id: panim_egal_t7_tapuhin_chaque_pan_10_sefirot, role: panim_egal_t7_tapuhin_chaque_pan_10_sefirot_chacun}
    mapping:
