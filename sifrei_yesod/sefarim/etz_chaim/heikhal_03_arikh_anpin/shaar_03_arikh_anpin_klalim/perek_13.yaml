      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : T7 = panim avec sefirot. Pattern surface decomposition."

  - id: "EC-H3S13-193"
    source_he: "נ' שערים שיש בבינה לפי שהוא ענין מ\"ב הנ\"ל שיש בבינה ולפי שהוא ז' שמות שבהם מ\"ב אותיות ועם ז' שמות עצמן הרי מ\"ט ויש שער ן' הכולל כל המ\"ט והוא כתר עליון שבהם הרי ן' שערי בינה כנזכר תיקון כ\"ב"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      50 SHAAREI BINAH (Tikkun 22) = inyan M"B (42) :
        7 NOMS × 42 lettres = 42.
        + 7 noms eux-memes = 49.
        + SHAAR 50 (KOLEL tous 49) = KETER ELYON.
      → Architecture : 50 = 7×7+1 (Bina shaarim).
      → Pattern : nested counting with kollel-pivot.
    type: déduction_scripturaire
    concepts:
      - {id: 50_shaarei_bina_7_noms_42_lettres_plus_kollel, role: 50_shaarei_bina_7_noms_42_lettres_plus_7_noms_plus_kollel_egal_50}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "imma"]
      relevance: "Architecture : 50 shaarim Bina decomposition. Pattern nested + kollel."

  - id: "EC-H3S13-194"
    source_he: "אלו הם בט\"ס של הפן א' ט\"פ מ\"א והם גימטריא שס\"ט ועם כללותם הם ש\"ע שערים אבל הכתר שלהם הוא כולל כולן... והוא ג\"כ גי' ש\"ע"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      Pan 1 = 9 sefirot tahtonot × 41 shaarim = SHAS-TET (369).
      Avec KOLLEL = SH"A (370) shaarim.
      KETER (shaar 42 lui-meme) KOLEL TOUS — gematria SH"A = 370 aussi.
      → Architecture : 9×41+1 = 370 ; Keter aussi 370 (gematria).
      → Pattern : numerical convergence (counts = gematria).
    type: déduction_logique
    concepts:
      - {id: sha_egal_9_x_41_plus_kollel_egal_keter_shaar_42, role: sha_370_egal_9_x_41_plus_kollel_egal_keter_shaar_42_par_gematria}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : numerical convergence. Pattern count=gematria."

  - id: "EC-H3S13-195"
    source_he: "שם בעתיק לית שמאלא כי כולא ימינא כנזכר באדרא דקכ\"ט וב' הפנים נחשבין כא' וז\"ש... דקכ\"ח דעתיקא נתפשטו אנפוי לש\"ע רבוא עלמין"
    source_ref: "Heikhal 3, Sha'ar 3:13"
    assertion: |
      Adra 129a : "LEIT SEMALA BE-ATIKA, KOLA YAMINA" (pas gauche dans Atika, tout droite).
      2 PANIM consideres comme UN.
      Adra 128 : "DE-ATIKA NIT'PASHTU ANPOY LE-SH"A RIBVA OLAMIN"
      (les panim d'Atika s'etendent vers 370 myriades de mondes).
      → Architecture : Adra confirme symetrie (kola yamina) ; 2 cotes = 1.
      → Pattern : symmetric absorption pour Atika.
      cf. EC-H3S12-040 (perek 02 Atik) sur leit semala be-Atika.
    type: déduction_scripturaire
    concepts:
      - {id: adra_129_kola_yamina_2_panim_egal_un_sha_olamin, role: adra_129_kola_yamina_2_panim_egal_un_sh_a_ribva_olamin}
    mapping:
