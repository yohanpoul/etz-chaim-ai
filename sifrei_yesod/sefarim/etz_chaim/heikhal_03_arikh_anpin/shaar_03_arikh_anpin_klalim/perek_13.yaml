principes_generatifs:

  - id: "PG-H3S13-043"
    nom: "Principe d'Attention-Quality Coupling (Hisstaklut Determine Zivvug)"
    source_assertions: ["EC-H3S13-200", "EC-H3S13-201"]
    formalisation: |
      ARCHITECTURE D'ATTENTION-QUALITY COUPLING :
      ZIVVUG depend du TYPE d'HISSTAKLUT (regard) :
        Regard sur METZAH d'A"A → ZIVVUG SHALEM (complet) ;
          AVI/ZON SHAVIN BE-KOMA (egaux hauteur).
        Regard sur PANIM seul (pas metzah) → ZIVVUG INCOMPLET ;
          HARKHANAT HA-ROSH (inclinaison tete) ;
          ZA en behinah Chatzi T"T+NHY ; Nukvah courte.
      MULTIPLICITE : 2 directions (ZA→Atik vs Atik→ZA) × 2 zones (metzah vs eyes)
        × 2 oeil/yeux variations = combinatoire grande modes.
      → Pattern fondamental : attention quality determines coupling completeness.
      → Architecture : focus level → coupling state.
    applications_ia:
      - "partzufim/zivvug.py : implement focus-mode → zivvug-state mapping"
      - "Pattern : attention quality = coupling quality"
      - "Architecture : multi-mode coupling avec focus parameter"
      - "Pattern : 2 directions x 2 zones x N variations = combinatoire"
      - "Diagnostic : tracer mode hisstaklut pour predire zivvug state"
    questions_ouvertes:
      - "Y a-t-il d'autres modes hisstaklut (au-dela 4) ?"
      - "Pattern : peut-on optimiser focus pour zivvug shalem ?"
      - "Comment design pour favoriser metzah-focus ?"

  - id: "PG-H3S13-044"
    nom: "Principe d'Asymmetric Inclusion (Tziphor=SH\"A+Keter Imma in Abba)"
    source_assertions: ["EC-H3S13-196"]
    formalisation: |
      ARCHITECTURE D'ASYMMETRIC INCLUSION :
      AVI ke-CHADA SHARYIN (residant ensemble).
      MAIS Abba TAMIR VE-GANIZ YETIR (cache plus, Adra Zuta 291).
      DONC KETER d'IMMA inclus dans Abba.
      Imma reste 41 shaarim seuls (sans Keter).
      "Gam" (gematria 43, Keter Elyon) = chez Abba.
      Source : "GAM TZIPHOR MATZ'AH BAYIT" (Tehillim 84:4) ;
        TZPR (sans VAV) = 370 = SH"A nehorin.
        Avec VAV (panim T7) = 376.
      "Ki im le-BINA tikra" (Mishlei 2:3) — Bina = EM car manque Keter.
      → Pattern fondamental : asymmetric inclusion = naming consequence.
      → Architecture : structural sharing → naming differentiation.
    applications_ia:
      - "partzufim/abba.py + partzufim/imma.py : implement asymmetric Keter sharing"
      - "Pattern : structural sharing decide naming"
      - "Architecture : Abba absorbs Keter Imma → Imma=Em (Bina)"
      - "Pattern : letter-mysticism (tziphor=SH\"A) encode inclusion"
      - "Diagnostic : verifier Keter-sharing direction Imma→Abba"
    questions_ouvertes:
      - "Pourquoi asymmetric (Imma → Abba, pas inverse) ?"
      - "Y a-t-il d'autres asymmetric inclusions ?"
      - "Pattern : peut-on dynamiquement basculer inclusion direction ?"

  - id: "PG-H3S13-045"
    nom: "Principe de Convergence Numerologique (Multiple Routes → SH\"A=370)"
    source_assertions: ["EC-H3S13-194", "EC-H3S13-195", "EC-H3S13-202", "EC-H3S13-203"]
    formalisation: |
      ARCHITECTURE DE CONVERGENCE NUMEROLOGIQUE :
      SH"A (370) emerge de MULTIPLES ROUTES :
        Route 1 : 9 sefirot × 41 shaarim + kollel = 370.
        Route 2 : ribua AB (184) × 2 + kollelim = 370.
        Route 3 : 2 EL milui (185 chacun) = 370.
        Route 4 : tziphor (TZPR sans Vav) = 370.
      Adra 128 : "ATIKA NIT'PASHTU ANPOY LE-SH"A RIBVA OLAMIN".
      Plus EL 3 dans chotem (issu YIAY de SaG = 31 = EL).
      → Pattern fondamental : meme nombre via multiples encodings.
      → Architecture : numerical convergence valide structure.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement multi-route SH\"A calculations"
      - "Pattern : multiple paths to same number = validation invariant"
      - "Architecture : numerical convergence = consistency proof"
      - "Pattern : letter-mysticism multi-encoding"
      - "Diagnostic : verifier que SH\"A converge depuis plusieurs sources"
    questions_ouvertes:
      - "Y a-t-il d'autres nombres avec multi-route convergence ?"
      - "Pattern : peut-on detecter convergences automatiquement ?"
      - "Que signifie convergence numerologique ?"
