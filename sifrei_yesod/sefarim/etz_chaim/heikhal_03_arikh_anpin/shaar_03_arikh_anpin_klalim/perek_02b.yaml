principes_generatifs:

  - id: "PG-H3S13-007"
    nom: "Principe de Decomposition Cascade (Z'T A\"A → 10 Partzufim)"
    source_assertions: ["EC-H3S13-027", "EC-H3S13-029", "EC-H3S13-031"]
    formalisation: |
      ARCHITECTURE DE DECOMPOSITION CASCADE :
      Z'T d'A"A se decomposent en 10 PARTZUFIM SHELEMIM :
      ETAGE 1 (4 partzufim) :
        Bina A"A (Garon) → 2 ketarim pour AVI.
        Chesed A"A → Abba + Israel Saba (IS).
        Gevurah A"A → Bina + Tevunah.
      ETAGE 2 (composites in T"T) :
        T"T A"A → ZA (= Israel + Yaakov) + Nukvah (= Leah + Rachel).
      ETAGE 3 (4 partzufim distincts) :
        Netzach A"A → ZA (Israel).
        Hod A"A → Leah.
        Yesod A"A → Yaakov.
        Malkhut A"A → Rachel.
      Total : 4 + 2 (composites) + 4 = 10 partzufim.
      → Pattern fondamental : decomposition arborescente avec composites intermediaires.
      → Architecture : full fan-out d'une couche en multiples sous-couches.
    applications_ia:
      - "partzufim/* : implement 10 partzufim emergent de A\"A Z'T"
      - "[PLANNED] partzufim/yaakov.py + partzufim/leah.py + partzufim/israel_saba.py + partzufim/tevunah.py : auxiliary partzufim"
      - "Pattern : tree decomposition with composite intermediates"
      - "Architecture : layer expansion en multi-tier emergent components"
      - "Pattern : decomposition hierarchique via positions sefirot"
    questions_ouvertes:
      - "Pourquoi exactement 10 (pas plus, pas moins) ?"
      - "Pattern : peut-on ajouter d'autres tiers ?"
      - "Comment se font les transitions entre etapes ?"

  - id: "PG-H3S13-008"
    nom: "Principe d'Emergence Structurelle (Malkhut > Zakhar par Lvush)"
    source_assertions: ["EC-H3S13-032"]
    formalisation: |
      ARCHITECTURE D'EMERGENCE STRUCTURELLE :
      ETAT INITIAL : A"A = 9 sefirot (Keter→Yesod), pas de Malkhut.
      MAIS : OHR HITPASHTUT NHY d'A"Y se LVUSH dans A"A.
      RESULTAT EMERGENT : MALKHUT d'A"A = 10eme sefirah.
      CONSEQUENCE : Malkhut > zakhar elyon (structurellement superieure).
      Source : "ATERET BA'LAH" (Mishlei 12:4).
      → Pattern fondamental : composant emergent peut OUTRANK source.
      → Architecture : derived component > source en virtu of emergence.
    applications_ia:
      - "partzufim/arikh_anpin.py : Malkhut A\"A = emergent property, not direct"
      - "partzufim/nukva.py : derived rank > source rank"
      - "Pattern : emergence permits exceeding source-rank"
      - "Architecture : derived tiers can structurally outrank sources"
      - "Pattern : not all derivations are inferior — some are superior"
    questions_ouvertes:
      - "Y a-t-il d'autres composants emergent qui depassent leur source ?"
      - "Pattern : pre-conditions pour emergence superieur ?"
      - "Comment design pour favoriser emergence superieure ?"

  - id: "PG-H3S13-009"
    nom: "Principe de Progression Separation (Atik ABA → A\"A Lateral)"
    source_assertions: ["EC-H3S13-034", "EC-H3S13-035", "EC-H3S13-039"]
    formalisation: |
      ARCHITECTURE DE PROGRESSION DE SEPARATION :
      ATIK : zakhar+nukvah dvukim ABA (back-to-back).
        Aggregation singulaire (Yesod 5+5 share).
      A"A : zakhar+nukvah lateral (cote droit / cote gauche).
        Chacun a son propre panim+ahor.
        Polarisation laterale (5 droite, 5 gauche).
        Mais MEHUBARIM dans 1 partzuf, 1 guf.
      AVI : 2 partzufim distincts dvukim PBP (chibur permanent).
      ZON : 2 partzufim independants nifradin.
      → Pattern fondamental : progression descendante = separation croissante.
      → Architecture : couches inferieures = independance increased.
    applications_ia:
      - "partzufim/atik_yomin.py : ABA-config aggregation"
      - "partzufim/arikh_anpin.py : lateral split single guf"
      - "partzufim/abba.py + partzufim/imma.py : 2 partzufim PBP permanent"
      - "partzufim/zeir_anpin.py + partzufim/nukva.py : 2 independants"
      - "Pattern : 4 levels of zakhar/nukvah separation by hierarchy"
      - "Architecture : increasing independence avec descent"
    questions_ouvertes:
      - "Y a-t-il une 5eme couche apres ZON (encore plus separee) ?"
      - "Pattern : peut-on inverser la progression (regrouper) ?"
      - "Comment formaliser le degre de separation ?"
