      MAZLA = "TIZAL KE-TAL" (Devarim 32:2) — flow-down longueur cheveux.
      2 MAZLOT (T8 Notzer Hesed + T13 Ve-Nakeh) :
        T8 = MAZLA VISIBLE (cote superieur, NIGLEH).
        T13 = MAZLA SUB-VISIBLE (cote inferieur, contre garon).
        SHOKHVIM ZE AL ZE (couches l'une sur l'autre).
        DUKHRA + NUKVAH.
      AVI YENIKAH :
        ABBA YONEK de T8 (Mazla dukhra).
        IMMA YONEKET de T13 (Mazla nukvah).
      → Pattern fondamental : 2 mazlot = source pair pour AVI.
      → Architecture : layered components feed paired downstream.
