#
# STRUCTURE §9 :
#   - Bloc A : 13 middot Mikha = shefa pnimi MS dans cheveux
#   - Bloc B : 13 middot Ki Tisa = cheveux/tzinurot
#   - Bloc C : 9 middot ZA aussi (Sheloah Lekha)
#   - Bloc D : Mapping anatomique 13 t"d sur visage A"A
#   - Bloc E : T8=Notzer Hesed=Mazla Kadisha (sous bouche, en bas)
#   - Bloc F : 2 Mazlot (T8 et T13) = dukhra+nukvah
#   - Bloc G : Abba teste de T8 ; Imma de T13
#
