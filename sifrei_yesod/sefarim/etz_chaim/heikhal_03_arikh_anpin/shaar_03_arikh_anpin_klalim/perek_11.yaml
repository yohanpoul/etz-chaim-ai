assertions:

  - id: "EC-H3S13-160"
    source_he: "ועתה נבאר ב' שמות י\"ג ת\"ד דהיינו יהו\"ה יהו\"ה שקודם להם בתורה"
    source_ref: "Heikhal 3, Sha'ar 3:11"
    assertion: |
      Maintenant 2 SHEMOT precedant 13 T"D dans Torah = YHVH YHVH (Shemot 34:6).
      → Architecture : 2 noms YHVH precedent enumeration 13 middot Ki Tisa.
      → Pattern : preludes liturgiques aux structures.
      cf. EC-H3S13-135 (perek 09) sur 13 middot Ki Tisa = cheveux/tzinurot.
