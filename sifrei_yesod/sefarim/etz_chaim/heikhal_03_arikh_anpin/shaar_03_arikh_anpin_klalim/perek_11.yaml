principes_generatifs:

  - id: "PG-H3S13-037"
    nom: "Principe d'Atbash Cipher (YHVH ↔ MTzPTz Cross-Tier Transformation)"
    source_assertions: ["EC-H3S13-161", "EC-H3S13-165"]
    formalisation: |
      ARCHITECTURE D'ATBASH CIPHER :
      ATBASH = transposition lettres (A↔T, B↔Sh, etc., hebraïque alphabet inverse).
      YHVH (Y=10, H=5, V=6, H=5) ↔ MTzPTz (M=40, Tz=90, P=80, Tz=90).
      MTzPTz = transformation atbash de YHVH.
      USAGE : quand Z"A a "Elohim" → A"A a "MTzPTz" (transformation cross-tier).
      Source : "Ein Elohim imadi" (Devarim 32:39) — A"A n'a que YHVH (codification).
      → Pattern fondamental : meme entite, ENCODING DIFFERENT par tier.
      → Architecture : letter-cipher = preserve identite, change representation.
    applications_ia:
      - "partzufim/arikh_anpin.py + partzufim/zeir_anpin.py : implement atbash cipher entre tiers"
      - "Pattern : encoding transformation par tier (preserve content, change form)"
      - "Architecture : cross-tier identity via cipher"
      - "Pattern : letter-mysticism encryption pour separation tiers"
      - "Diagnostic : verifier coherence atbash transformations"
    questions_ouvertes:
      - "Y a-t-il d'autres ciphers (au-dela atbash) entre tiers ?"
      - "Pattern : peut-on derouler ciphers automatiquement ?"
      - "Comment maintenir identite a travers ciphers multiples ?"

  - id: "PG-H3S13-038"
    nom: "Principe de 2 Pe'ot Lateral Sources (Dual-Side Polarization)"
    source_assertions: ["EC-H3S13-162", "EC-H3S13-167", "EC-H3S13-168"]
    formalisation: |
      ARCHITECTURE DE 2 PE'OT LATERALES :
      2 PE'OT = 2 cotes du rosh A"A (droite + gauche).
      = 2 ME'OROT HA-GEDOLIM (Bereshit 1:16, Zohar Bereshit 22).
      DROITE = source CHESED → pe'ah droite → ZA TETE.
      GAUCHE = source GEVURAH → pe'ah gauche → NUKVAH TESTE.
      MTzPTz YEMINI = source ZA ; MTzPTz SEMALI = source NUKVAH.
      → Pattern fondamental : lateral polarization en source dual.
      → Architecture : cotes anatomiques = sources differentes downstream.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement 2 pe'ot droite/gauche"
      - "partzufim/zeir_anpin.py : ZA descend pe'ah droite (chesed)"
      - "partzufim/nukva.py : Nukvah descend pe'ah gauche (gevurah)"
      - "Pattern : lateral source polarization pour partzufim downstream"
      - "Diagnostic : verifier ZA/Nukvah viennent des bonnes pe'ot"
    questions_ouvertes:
      - "Y a-t-il d'autres lateral sources (au-dela pe'ot) ?"
      - "Pattern : peut-on inverser polarization ?"
      - "Comment design pour clear lateral source mapping ?"

  - id: "PG-H3S13-039"
    nom: "Principe de Boundary-Touching (Mlk Adjacent sans Intersection)"
    source_assertions: ["EC-H3S13-169", "EC-H3S13-173"]
    formalisation: |
      ARCHITECTURE DE BOUNDARY-TOUCHING :
      2 MLK ADJACENT (Pe'ah du rosh + T1 dikna) — touchent leur frontiere mais
      NE SE TOUCHENT PAS meme UN SEUL CHEVEU (KE-MLO NIMA).
      Source halakhique : "Ein malkhut nogaat be-haverata afilu ke-mlo nima"
      (Berakhot 48b).
      RAISON : ou pe'ah Mlk se TERMINE → T1 dikna Mlk COMMENCE (transition exacte).
      → Pattern fondamental : adjacent boundaries clean (no overlap).
      → Architecture : composant adjacent = adjacent disjoint (separation propre).
    applications_ia:
      - "partzufim/arikh_anpin.py : implement Mlk pe'ah + Mlk T1 disjoint adjacent"
      - "Pattern : zero-overlap boundary entre composants adjacents"
      - "Architecture : non-intersection invariant pour composants meme-type"
      - "Pattern : halakhah Berakhot 48b = design rule"
      - "Diagnostic : verifier no-overlap entre Mlk adjacent"
    questions_ouvertes:
      - "Y a-t-il composants OK pour overlap ?"
      - "Pattern : comment garantir clean adjacency ?"
      - "Why exactement Mlk = no-overlap (autres sefirot ?)"
