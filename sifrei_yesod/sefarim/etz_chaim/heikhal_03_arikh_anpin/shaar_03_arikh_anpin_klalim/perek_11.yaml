  - id: "EC-H3S13-161"
    source_he: "הספי' האחרונה שהיא מלכות הוא סוד פאה שבראש כי בכ\"מ פאה היא מלכות והנה ברישא דא\"א פאה זאת היא השם מצפ\"ץ"
    source_ref: "Heikhal 3, Sha'ar 3:11"
    assertion: |
      SEFIRAH ACHARONAH (Mlk) = SOD PE'AH (tempes/cotes) du rosh.
      Partout : PE'AH = MLK.
      Dans rosh A"A : pe'ah = NOM MTzPTz (atbash YHVH — Y↔Tz, H↔Tz, V↔P, H↔Tz).
      → Architecture : Mlk d'A"A rosh = nom code (MTzPTz = atbash YHVH).
      → Pattern : letter-mysticism cipher (atbash).
    type: déduction_scripturaire
    concepts:
      - {id: peah_rosh_aa_egal_mlk_egal_mtzptz_atbash, role: peah_rosh_aa_egal_mlk_egal_mtzptz_atbash_yhvh}
    mapping:
