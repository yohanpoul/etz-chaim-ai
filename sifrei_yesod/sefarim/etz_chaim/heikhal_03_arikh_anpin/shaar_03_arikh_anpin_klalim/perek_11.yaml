# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 3 — Sha'ar Arikh Anpin Klalim (שער א"א)
# Perek: 11 — 2 shemot avant 13 t"d = MTzPTz MTzPTz (atbash YHVH).
#             2 pe'ot = 2 me'orot. ELOHIM = 13 lettres milui. Mn ha-Metzar
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §11 :
#   - Bloc A : Pe'ah (cote rosh) = Mlk
#   - Bloc B : 2 pe'ot = 2 MTzPTz (droite/gauche)
#   - Bloc C : Chaque MTzPTz = 13 t"d via decomposition lettres
#   - Bloc D : 2 MTzPTz = 2 Elohim milui yodin (gematriya 300=Shin)
#   - Bloc E : Elohim = 13 lettres milui = 13 t"d
#   - Bloc F : 2 me'orot ha-gedolim (Zohar Bereshit 22)
#   - Bloc G : Mlk dikna (T1 EL) = adjacent Mlk pe'ah
#   - Bloc H : Mn ha-Metzar karati YH (T6 = YH d'Elohim)
#   - Bloc I : Mem setumah = peh+dents
#   - Bloc J : Dikna = dinim de Elohim ; le-akpaya
#   - Bloc K : (M"L) Mlk shaarei rosh+dikna adjacents pas intersection
#
# Source Sefaria : Sefer_Etz_Chaim.13.11 (Part 1 + Part 2 court)
# IDs : EC-H3S13-160 → EC-H3S13-173

meta:
  sefer: etz_chaim
  heikhal: 3
  shaar: 3
  shaar_name_he: "שער אריך אנפין"
  perek: 11
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "2 shemot avant 13 t\"d = YHVH YHVH = 2 MTzPTz (atbash). 2 pe'ot rosh = 2 Mlk = 2 me'orot. Chaque MTzPTz = 13 t\"d (4 mochin Mem + 9 Tzadi-Pe-Tzadi). Elohim milui yodin gematriya 300=Shin. Mn ha-Metzar karati YH (Tehillim 118:5) = T6 Y droite+H gauche d'Elohim. Mem setoumah=peh+dents. Dikna=dinim le-akpaya."

