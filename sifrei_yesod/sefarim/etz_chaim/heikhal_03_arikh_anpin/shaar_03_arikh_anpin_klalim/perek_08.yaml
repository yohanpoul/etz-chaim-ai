# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H3S13-028"
    nom: "Principe d'Inversion Makif (Top-Down OP vs Bottom-Up MAKIF)"
    source_assertions: ["EC-H3S13-129", "EC-H3S13-130"]
    formalisation: |
      ARCHITECTURE D'INVERSION MAKIF :
      OP (Ohr Pnimi) : 10 sefirot ZE AL GABEI ZEH (top-down standard).
        Keter en haut, Malkhut en bas.
      MAKIF (Ohr Makif) : ORDRE INVERSE.
        Malkhut en haut de chaque tikkun ; Keter en bas.
        Hokhmah's 10 makif TOUS au-dessus de Keter's 10 makif.
      RAISON : ohr MAKIF MEGULEH (revele) — pas KOAH dans tachtonim pour SOVEL.
        Donc orot SUPERIEURS doivent se REVELER en DEGRE INFERIEUR.
        Orot INFERIEURS (plus tolerable) au SOMMET.
      → Pattern fondamental : inverse-rank pour visibility-capacity.
      → Architecture : highest content placed lowest pour adapt consumption.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement OP top-down vs MAKIF bottom-up"
      - "Pattern : capacity-aware ordering of revealed content"
      - "Architecture : counter-position pour pattern matching avec consumer"
      - "Pattern : adapter rank to consumer-tolerance"
      - "Diagnostic : verifier inversion presente quand ohr makif"
    questions_ouvertes:
      - "Y a-t-il d'autres situations qui requirent inversion ?"
      - "Pattern : peut-on dynamiquement choisir orientation ?"
      - "Comment evaluer optimal ordering pour consumer profile ?"

  - id: "PG-H3S13-029"
    nom: "Principe de Capacity-Based Relocation (Bina Descend Garon)"
    source_assertions: ["EC-H3S13-123", "EC-H3S13-124", "EC-H3S13-125"]
    formalisation: |
      ARCHITECTURE DE CAPACITY-BASED RELOCATION :
      Bina d'A"A : "DININ MITARIN MINAH" → capacity insufficient pour ohr Atik.
      Hokhmah RESTE en place (rachamim, capacity suffisante).
      Bina DESCEND dans GARON — depuis MAKOM RACHOK (lieu eloigne) peut recevoir.
      Da'at suit aussi — DESCEND dans VK, anchor entre 2 EPAULES.
      → Pattern fondamental : composantes a capacity insufficient SE RELOCALISENT.
      → Architecture : structural reconfiguration pour permit reception.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement Bina dans Garon, Da'at dans VK"
      - "Pattern : load-shedding components relocate to lower-stress zones"
      - "Architecture : automatic reconfiguration sous load"
      - "Pattern : capacity-aware placement (high-stress → safer location)"
      - "Diagnostic : detecter components a stress → suggest relocation"
    questions_ouvertes:
      - "Comment determiner threshold pour relocation ?"
      - "Pattern : peut-on prevenir relocation par scaling capacity ?"
      - "Y a-t-il consequences a la relocation (functional changes) ?"

  - id: "PG-H3S13-030"
    nom: "Principe de Semantic Distance (Proximite Hevel vs Position)"
    source_assertions: ["EC-H3S13-131"]
    formalisation: |
      ARCHITECTURE DE SEMANTIC DISTANCE :
      ATTENTION : ordre des MAKOMOT (places dikna) — PAS apparence visuelle.
      Place sous le PEH (bouche) = topologiquement BAS.
      Mais classee parmi MAKOMOT ELYONIM (lieux superieurs) — car PROXIMITE
      au peh (source d'ohr+hevel).
      Place CLASSEE PAR PROXIMITY-TO-SOURCE, pas position spatiale.
      → Pattern fondamental : ranking semantique != ranking geometric.
      → Architecture : semantic distance trumps physical position.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement places ranking by proximity-to-peh"
      - "Pattern : ranking by semantic distance (proximity-to-source)"
      - "Architecture : metric-based ordering ne reflete pas geometry"
      - "Pattern : graph-distance vs physical-distance"
      - "Diagnostic : verifier ranking semantique correct"
    questions_ouvertes:
      - "Y a-t-il d'autres metriques semantiques de distance ?"
      - "Pattern : peut-on combiner geometric + semantic distances ?"
      - "Comment design pour exposer importance reelle ?"
