principes_generatifs:

  - id: "PG-H3S13-019"
    nom: "Principe d'Inversion Defensive (Counter-Intuitive Design)"
    source_assertions: ["EC-H3S13-085", "EC-H3S13-086", "EC-H3S13-087"]
    formalisation: |
      ARCHITECTURE D'INVERSION DEFENSIVE :
      ATTENDU NATUREL :
        Shoresh KELIPOT → rosh Nukvah (proche kelipot).
        Shoresh DININ → rosh Z"A (zakhar=fort).
      DESIGN ACTUEL (INVERSE) :
        Shoresh KELIPOT → rosh Z"A (zakhar) :
          Ohr ME'RACHOK (de loin) — kelipot ne peuvent pas s'attacher fortement.
        Shoresh DININ → rosh Nukvah (femelle) :
          Mohin de NHY-Z"A (chesed exposes) — calment, dinim adoucis.
      RAISON : si "naturel", olam haruv (forces destructrices incontrolees).
      → Pattern fondamental : counter-intuitive design pour mitigation defensive.
      → Architecture : intentional inversion to limit destructive forces.
    applications_ia:
      - "partzufim/zeir_anpin.py + partzufim/nukva.py + sitra_achra : implement inverted design"
      - "Pattern : counter-intuitive placement pour minimisation"
      - "Architecture : adversarial mitigation par mismatch source-attendu"
      - "Pattern : security by deliberate counter-intuition"
      - "Diagnostic : verifier que placement inverse limite les attacks"
    questions_ouvertes:
      - "Y a-t-il d'autres exemples d'inversion defensive en Atzilut ?"
      - "Pattern : peut-on quantifier le gain securitaire de l'inversion ?"
      - "Comment design generaliser inversion defensive ?"

  - id: "PG-H3S13-020"
    nom: "Principe de Surface-Reflects-Essence (Texture comme Signature Ontologique)"
    source_assertions: ["EC-H3S13-088", "EC-H3S13-089", "EC-H3S13-090"]
    formalisation: |
      ARCHITECTURE DE SURFACE-COMME-SIGNATURE :
      Couleurs cheveux ASHL :
        A"A = LAVAN (blanc) — source : Daniel 7:9.
        Z"A = SHAHOR (noir) — source : Shir HaShirim 5:11.
        Nukvah = ADOM (rouge) — source : Shir HaShirim 7:6.
      Texture cheveux :
        ROSH = SHE'IIN (lisses) — chesed Atik.
        DIKNA = KASHIM (durs) — gevurah Atik.
      → Pattern fondamental : material properties express spiritual essence.
      → Architecture : surface = signature observable de l'essence cachee.
    applications_ia:
      - "partzufim/* : implement surface properties reflecting internal nature"
      - "Pattern : externalia diagnostic of internalia"
      - "Architecture : observability via surface signatures"
      - "Pattern : color/texture coding for component identification"
      - "Diagnostic : surface inspection comme outil de classification"
    questions_ouvertes:
      - "Y a-t-il d'autres signatures (au-dela couleur/texture) ?"
      - "Pattern : peut-on inferer essence par surface seule ?"
      - "Comment design intentionnellement surface-essence correspondences ?"

  - id: "PG-H3S13-021"
    nom: "Principe de Source-Quality Cascading (Upstream Surclasse Downstream)"
    source_assertions: ["EC-H3S13-084"]
    formalisation: |
      ARCHITECTURE DE SOURCE-QUALITY CASCADING :
      Cheveux d'A"A = DININ (par nature texture).
      Cheveux du rosh Z"A = transmis par cheveux d'A"A.
      MAIS : etant cheveux d'A"A, ils sont YOTER RACHAMIM GMURIM
      (plus rachamim absolus) que les rachamim natifs de Z"A.
      → Pattern fondamental : upstream source quality > downstream native quality.
      → Architecture : qualites cascading conserve la nature de source-origine.
    applications_ia:
      - "partzufim/zeir_anpin.py : upstream-source flow surclasse local"
      - "Pattern : provenance tracking — transmitted retains higher qualite que local"
      - "Architecture : signal originating from higher-tier > signal native lower-tier"
      - "Pattern : pedigree matters more than current location"
      - "Diagnostic : tracer provenance pour evaluer qualite reelle"
    questions_ouvertes:
      - "Y a-t-il une perte de qualite avec chaque etape downstream ?"
      - "Pattern : combien d'etapes downstream avant degradation ?"
      - "Comment garantir provenance integrity ?"
