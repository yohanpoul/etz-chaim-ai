  - id: "EC-H3S12-044"
    source_he: "הנה נתבאר שאין לך שום אור שאין בו ב' בחי' פנימי ומקיף ונמצא כי בשם ב\"ן יש פנימי ומקיף וכן בשם מ\"ה"
    source_ref: "Heikhal 3, Sha'ar 1:3"
    assertion: |
      HAKDAMAH : aucune OHR ne manque les 2 behinot — PNIMI (interne) + MAKIF (encerclant).
      DONC en BaN il y a Pnimi+Makif ; et en MaH aussi.
      → Architecture : tout ohr = (interior + envelope).
      → Pattern : container/contain pattern universel pour orot.
    type: axiome_explicite
    concepts:
