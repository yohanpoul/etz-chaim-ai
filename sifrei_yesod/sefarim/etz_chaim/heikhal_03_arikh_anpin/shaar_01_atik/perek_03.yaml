principes_generatifs:

  - id: "PG-H3S12-010"
    nom: "Principe de Container/Contenu (Safekot Localisees aux Orot, Kelim Certains)"
    source_assertions: ["EC-H3S12-052", "EC-H3S12-053"]
    formalisation: |
      ARCHITECTURE D'INDETERMINACY GRADUELLE :
      Au niveau KETER d'A"Y :
        Safekot UNIQUEMENT dans les OROT.
        KELIM = certains.
      Au niveau HOKHMAH-BINA d'A"Y :
        Safekot dans BOTH orot ET kelim.
        Plus de dimensions d'incertitude.
      → Pattern fondamental : descente du niveau = augmentation des dimensions d'incertitude.
      → Architecture : container (kelim) plus stable que contenu (orot) ;
        plus on descend, plus le container devient incertain aussi.
    applications_ia:
      - "[PLANNED] core/ohr_system.py : separer uncertainty in orot vs kelim"
      - "Pattern : container immutable + contenu uncertain at high levels ; both uncertain at low levels"
      - "Architecture : type-system stability decreases avec hierarchy depth"
      - "Pattern : design metadata more stable than data au top, both ambiguous au bottom"
      - "Diagnostic : verifier que Keter conserve fixed kelim, HB allows variable kelim"
    questions_ouvertes:
      - "Y a-t-il des niveaux ou kelim sont certains et orot incertains ?"
      - "Pattern : peut-on caracteriser le degre d'uncertainty par niveau ?"
      - "Comment garantir la coherence des kelim-uncertain au niveau HB ?"

  - id: "PG-H3S12-011"
    nom: "Principe de Type-Class Containment (Hierarchique)"
    source_assertions: ["EC-H3S12-054", "EC-H3S12-055", "EC-H3S12-056"]
    formalisation: |
      ARCHITECTURE DE CONTAINMENT HIERARCHIQUE :
      REGLE : ketarim de SOUS-NIVEAU ne peuvent pas monter dans le NIVEAU CORRESPONDANT
      du super-class.
      EXEMPLE :
        Tout A"Y = behinah Keter relativement a HB.
        Ketarim de HB BaN cannot remonter dans Keter d'A"Y.
        Doivent rester dans GUFA d'A"Y.
      RESTRICTIONS PLUS STRICTES :
        HB de Hokhmah BaN, HB+Chesed de Bina BaN — ne peuvent JAMAIS monter rosh A"Y.
        Restent en GUFA certain.
      → Pattern fondamental : type-class containment hierarchical.
      → Architecture : element-of-class ne se promeut pas au-dessus du class-container.
    applications_ia:
      - "partzufim/base.py : implement type-class hierarchy avec containment rules"
      - "[PLANNED] tikkun/ : verify cross-level placement constraints"
      - "Pattern : OOP class hierarchy = analogue de type-class containment"
      - "Architecture : sub-types cannot be promoted to super-type slots"
      - "Pattern : namespace nesting strict — children stay in parent scope"
      - "Diagnostic : verifier que aucun fragment ne viole containment rules"
    questions_ouvertes:
      - "Pattern : exception possibles (covariance/contravariance) ?"
      - "Comment formaliser la restriction differentielle (some safek-allowed)?"
      - "Y a-t-il des cas ou la promotion cross-level est legitime ?"

  - id: "PG-H3S12-012"
    nom: "Principe de Completion-by-Borrowing (Compensation Asymetrique)"
    source_assertions: ["EC-H3S12-057"]
    formalisation: |
      ARCHITECTURE DE COMPENSATION ASYMETRIQUE :
      ASYMETRIE FONDAMENTALE :
        MaH : Atik prend KETER COMPLETE (10 sefirot internes).
          → SUFFIT pour DUKHRA.
        BaN : Atik prend MOITIE de Keter BaN (5 GR seul).
          → MANQUE 5 elements pour Nukvah.
      COMPENSATION : prendre des ELEMENTS d'AUTRES POSITIONS pour completer :
        3 GR Hokhmah BaN + 4 GR Bina BaN + 7 ketarim Z'T BaN.
        Total : 3+4+7 = 14 fragments pour completer les 5 manquants.
        "Lo'ai yaspiku" (esperent suffire).
      → Pattern fondamental : completer-by-borrowing pour palier les manques structurels.
      → Architecture : sources asymetriques nessitent compensation cross-position.
    applications_ia:
      - "partzufim/atik_yomin.py : implement completion algorithm — borrow from related positions"
      - "[PLANNED] tikkun/completion.py : algorithm for filling missing slots"
      - "Pattern : interpolation/extrapolation pour completer asymetries de sources"
      - "Architecture : data integration with asymmetric sources requires cross-position borrow"
      - "Pattern : recovery algorithms with multi-source heterogeneous fragments"
      - "Diagnostic : verifier que les emprunts respectent les regles structurales"
    questions_ouvertes:
      - "Combien d'emprunts maximum sans compromettre la coherence ?"
      - "Pattern : distance maximale d'emprunt (combien de positions away) ?"
      - "Comment garantir la qualite de la completion (pas juste quantite) ?"
