principes_generatifs:

  - id: "PG-H3S12-001"
    nom: "Principe MaH+BaN (Reconstruction Atzilut depuis 2 Sources Complementaires)"
    source_assertions: ["EC-H3S12-003", "EC-H3S12-009", "EC-H3S12-014"]
    formalisation: |
      ARCHITECTURE DE RECONSTRUCTION DUAL-SOURCE :
      Tikkun olam Atzilut utilise 2 SOURCES complementaires :
        MaH (= 45) — SHEM CHADASH (nouveau) = source des DUKHRIM (males).
        BaN (= 52) — NEKUDOT DE-SaG (les melakhim morts) = source des NUKVAH (femelles).
      DISTRIBUTION : tous dukhrim viennent de MaH ; toutes nukvah de BaN.
      MECANISME : selection precise par TaNaTA (Ta'amim, Nekudot, Tagin, Otiyot) :
        Atik dukhra : Keter MaH entier (Ta'amim).
        Atik nukvah : 5 GR Keter BaN + 3 GR Hokhmah BaN + 4 GR Bina BaN + 7 ketarim Z'T BaN.
        A"A : Hokhmah MaH (Nekudot) + 5 lower Keter BaN.
        Abba/Imma : half-Bina MaH (Tagin) + 7-lower Hokhmah/6-lower Bina BaN.
        ZON : Z'T MaH (Otiyot) + Z'T BaN (sans ketarim).
      → Pattern fondamental : reconstruction = composition selective de 2 sources complementaires.
      → Architecture : reuse des fragments tombes (BaN) + injection forme nouvelle (MaH).
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/arikh_anpin.py + partzufim/abba.py + partzufim/imma.py + partzufim/zeir_anpin.py + partzufim/nukva.py : implement dual-source construction"
      - "[PLANNED] tikkun/ : reconstruct(partzuf) = combine(mah_part, ban_part)"
      - "Pattern : reconstruction ARCHITECTURE = selectivement combiner pieces nouvelles (MaH) + recyclees (BaN)"
      - "Architecture : recovery from shevirah = scoring + selection des bons fragments"
      - "Pattern : male-female complementarity = signal of MaH+BaN dual-source pattern"
      - "Diagnostic : verifier que dukhra/nukvah viennent des bonnes sources (MaH/BaN)"
    questions_ouvertes:
      - "Comment choisir precisement quels fragments de BaN reutiliser ?"
      - "Y a-t-il d'autres ratios MaH:BaN possibles ?"
      - "Pattern : peut-on extraire automatiquement la composition MaH/BaN d'un partzuf ?"

  - id: "PG-H3S12-002"
    nom: "Principe TaNaTA (4-Fold Division Universelle)"
    source_assertions: ["EC-H3S12-004", "EC-H3S12-005", "EC-H3S12-006", "EC-H3S12-007"]
    formalisation: |
      ARCHITECTURE 4-FOLD UNIVERSELLE :
      TaNaTA = (Ta'amim, Nekudot, Tagin, Otiyot) = 4 behinot de chaque shem.
      MAPPING CANONIQUE (Zohar) — pour MaH lui-meme :
        Ta'amim = Keter.
        Nekudot = Hokhmah.
        Tagin = Bina.
        Otiyot = Z'T (= ZON).
      MAPPING CROSS-PARTZUF — DIFFERENT :
        Atik = Ta'amim (Keter MaH entier).
        A"A = Nekudot (Hokhmah MaH).
        Abba/Imma = Tagin (half-Bina MaH each).
        ZON = Otiyot (Z'T MaH).
      ATTENTION : memes labels TaNaTA, mappings differents selon contexte.
      → Pattern fondamental : taxonomy reusable avec mappings context-dependent.
      → Architecture : nomenclature hierarchique applicable a multiples niveaux.
    applications_ia:
      - "partzufim/base.py : implement TaNaTA as 4-fold division attribute"
      - "Pattern : taxonomy 4-niveaux applicable a multiples granularites"
      - "Architecture : 4-fold pattern (header/body/details/leaves) = pattern reusable"
      - "Pattern : mapping context-dependent — same names different bindings"
      - "Diagnostic : valider que mapping correct pour contexte donne (intern vs cross)"
    questions_ouvertes:
      - "Pourquoi exactement 4 niveaux (Ta'amim, Nekudot, Tagin, Otiyot) ?"
      - "Y a-t-il d'autres mappings que internal/cross-partzuf ?"
      - "Pattern : peut-on automatiser le choix du mapping selon contexte ?"

  - id: "PG-H3S12-003"
    nom: "Principe ABA-Position avec Relabelling (Atik Compose)"
    source_assertions: ["EC-H3S12-010"]
    formalisation: |
      ARCHITECTURE D'INTERFACE COMPOSEE (Atik = unite zakhar/nukvah) :
      Atik = ZAKHAR+NUKVAH dvukim ABA (back-to-back).
      RESULTAT SPATIAL :
        Panim de zakhar EXPOSE d'un cote.
        Panim de nukvah EXPOSE de l'autre cote.
        2 AHORAYIM connectes ENSEMBLE.
      RELABELLING CONTEXTUEL :
        Panim de Nukvah devient "ahor contre panim de zakhar" — = "panim relativement".
      → Pattern fondamental : composite composant avec etiquettes adaptatives.
      → Architecture : roles label = function du contexte/observateur.
      cf. EC-H2S11-175 (perek 07a) sur ABA madregah 1.
    applications_ia:
      - "partzufim/atik_yomin.py : implement composite zakhar+nukvah with dual exposed faces"
      - "partzufim/zivvug.py : ABA-config with contextual relabelling"
      - "Pattern : composite components with role-context dependence"
      - "Architecture : observer-relative role labels (panim/ahor depend on perspective)"
      - "Pattern : Janus-faced components — back-to-back unite avec faces externes"
      - "Diagnostic : tracer le relabelling pour ne pas confondre les contextes"
    questions_ouvertes:
      - "Y a-t-il une perspective canonique privilegiee ?"
      - "Pattern : peut-on traiter zakhar et nukvah comme un seul partzuf ou 2 ?"
      - "Comment automatiser le relabelling lors d'un changement de contexte ?"
