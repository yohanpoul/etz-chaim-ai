  # ─── BLOC C : RESOLUTION — TOUS ONT DUKHRA+NUKVAH DIFFEREMMENT ───

  - id: "EC-H3S12-033"
    source_he: "והנה ליישב המאמרים אלו צריך שתדע כי בודאי שבכל הי\"ס יש דכר ונוקבא אלא שיש חילוק במציאותן איך הם"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      RESOLUTION des contradictions : il faut SAVOIR :
      Toutes les 10 sefirot ONT dukhra+nukvah —
      MAIS il y a CHILUK (distinction) dans leur MITZIUT (mode d'existence).
      → Architecture : 4 modes differents de dukhra+nukvah selon le partzuf.
      → Pattern : meme distinction nominale, modes operationnels distincts.
    type: déduction_logique
    concepts:
      - {id: tous_partzufim_dukhra_nukvah_modes_differents, role: tous_partzufim_ont_dukhra_nukvah_dans_des_modes_differents}
