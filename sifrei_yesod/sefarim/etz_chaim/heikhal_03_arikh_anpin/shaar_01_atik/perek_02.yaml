  # ─── BLOC D : ZON — PARTZUFIM NIFRADIN ───

  - id: "EC-H3S12-034"
    source_he: "כי הנה זו\"ן אשר בהם עיקר המיתה כי [הרי] בהם היו ענין ז' המלכים שמתו ולכן יש בהם בחי' זכר ונקבה בפרצופים נפרדין א' מחבירו ומה שתמצא לפעמים שהם מחוברין אינן אלא בהיותן אב\"א כי אז אחוריהם דבוקים יחד וכותל א' משמש לשניהן וצריך נסירה באחור להפרידם"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      ZON ont OIKAR HA-MITAH (essence de la mort) — 7 melakhim morts en eux.
      Variante (Nusah Aher) : "HARI" (en effet).
      DONC ont zakhar+nukvah en PARTZUFIM NIFRADIN (separes l'un de l'autre).
      Quand parfois "MEHUBARIM" — c'est seulement en ABA (back-to-back) :
        Ahorayim DVUKIM, KOTEL EHAD partage, NESIRAH (separation) en ahor pour les separer.
      → Architecture : ZON = partzufim independants, ABA temporaire avec kotel separable.
      → Pattern : interface = entites separees avec contact lateral.
    type: axiome_explicite
    concepts:
      - {id: zon_partzufim_nifradin_kotel_separable, role: zon_partzufim_nifradin_avec_kotel_separable}
      - {id: zon_oikar_ha_mitah_7_melakhim, role: zon_oikar_ha_mitah_7_melakhim_morts}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py", "partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture : ZON = entites separees, kotel separable. Nusah Aher capture (hari)."

  # ─── BLOC E : AVI — 2 PARTZUFIM PBP TOUJOURS ATTACHES ───

  - id: "EC-H3S12-035"
    source_he: "ואמנם או\"א אשר היה בהם ביטול ולא היה בהם מיתה בפועל כמו שהיה בזו\"נ כנ\"ל. לכן היה בהם ג\"כ בחי' זכר ונקבה כל א' בפ\"ע פי' בבחי' ב' פרצופים כדמיון זו\"ן אבל נתוסף בהם חיבור עצום והוא שהם דבוקים יחד פב\"פ תמיד בכותל א' בלבד משמשת לשניהן ואין ביניהן פירוד כלל"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      AVI ont eu BITUL (annulation) — pas MITAH be-PO'AL comme ZON.
      Donc ont aussi zakhar+nukvah CHACUN BI-FNEI ATZMO (separe) — comme 2 partzufim.
      MAIS NIT'OSEF CHIBUR ATZUM (ajoute = chibur enorme) :
        DVUKIM YACHAD PBP TAMID (toujours face a face).
        KOTEL EHAD partage pour les 2.
        EIN PIRUD KLAL (pas de separation possible).
      → Architecture : AVI = couple permanent PBP avec kotel partage.
      → Pattern : zivvug permanent = no separation by design.
    type: interprétation_lurianique
    concepts:
      - {id: avi_2_partzufim_pbp_tamid, role: avi_2_partzufim_dvukim_pbp_toujours}
      - {id: avi_kotel_ehad_pas_pirud, role: avi_kotel_ehad_partage_pas_pirud}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : AVI = zivvug permanent PBP. Pattern no-separation by design."

  - id: "EC-H3S12-036"
    source_he: "לא כמו זו\"ן שבהיותן אב\"א מתחברים ובהיותן פב\"פ נפרדין. וזהו הטעם שאמרו בהרבה מקומות בס\"ה פ' אחרי דס\"א ובאדר\"ז דר\"צ אבל או\"א לא מפסיק רעותא דתרוייהו לעלמין כחדא נפקין כחדא שריין לא אפסוק דא מן דא ולכן זווגייהו תדיר דלא פסיק"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      INVERSE de ZON : ZON ABA → mehubarim ; PBP → nifradin.
      AVI : LO MAFSIK RE'UTA DE-TARWEIHU LE-ALEMIN (jamais l'amour des 2 cesse) —
      KE-CHADA NAFKIN (ensemble sortent), KE-CHADA SHARIYIN (ensemble residant).
      LO AFSEK DA MIN DA. Sources : Zohar Acharei 61, AdR Zuta 290.
      DONC ZIVVUGAIHU TADIR DE-LO PASSIK (zivvug constant sans rupture).
      → Architecture : AVI = zivvug permanent, ZON = zivvug intermittent.
      → Pattern : couches superieures = persistant ; interface = transient.
    type: déduction_scripturaire
    concepts:
      - {id: avi_zivvug_tadir_dla_passik, role: avi_zivvug_constant_sans_rupture}
      - {id: zon_zivvug_intermittent_inverse_avi, role: zon_zivvug_intermittent_inverse_de_avi}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : AVI permanent / ZON intermittent. Sources Zohar Acharei 61, AdR Zuta 290."

  # ─── BLOC F : A"A — 5 ACHARONOT KETER, 1 PARTZUF ───

  - id: "EC-H3S12-037"
    source_he: "ואמנם א\"א שהוא מבחי' הכתר של הנקודות לא היה בו אפילו ביטול וכנ\"ל ואמנם הוא מן ה' אחרונות של הכתר דב\"ן כנ\"ל. ונודע כי בנה\"י של הכתר דנקודים היה קצת ביטול כאשר ירדו להעשות (כלים) מוחין לאו\"א ולכן גם בו היה בחי' זו\"ן"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      A"A = du Keter de Nikudim — pas de BITUL.
      Mais des 5 ACHARONOT du Keter de BaN.
      Dans NHY du Keter de Nikudim il y eut KETZAT BITUL (un peu d'annulation)
      quand descendirent pour devenir KELIM/MOHIN d'AVI.
      DONC A"A aussi a behinah ZON.
      → Architecture : A"A = mode mixte (no bitul global, ketzat bitul NHY).
      → Pattern : niveau intermediaire entre Atik (pure) et AVI (bitul).
    type: axiome_explicite
    concepts:
      - {id: aa_5_acharonot_keter_ketzat_bitul_nhy, role: aa_5_acharonot_keter_ketzat_bitul_nhy_seulement}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : A\"A mode mixte. Pattern intermediaire."

  - id: "EC-H3S12-038"
    source_he: "אלא שנתוסף להם תיקון וחיבור נוסף והוא ששניהן היו פרצוף אחד הזכר ונקבה שבו באופן זה כי בחי' שם מ\"ה שבו נתון בכל צד ימין ובחי' שם ב\"ן שבו היה בצד שמאלי שבו ושניהם דבוקים יחד בבחי' פרצוף א'"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      MAIS NIT'OSEF TIKKUN VE-CHIBUR NOSAF (ajoute tikkun et chibur supplementaire) :
      Les 2 = UN SEUL PARTZUF — zakhar+nukvah en lui :
        Behinah MaH = a TOUT le COTE DROIT.
        Behinah BaN = au COTE GAUCHE.
      DVUKIM YACHAD en behinah de PARTZUF EHAD.
      → Architecture cle : A"A = 1 partzuf bipartite (MaH-droit, BaN-gauche).
      → Pattern : composant unique avec 2 polarites laterales (left/right).
    type: interprétation_lurianique
    concepts:
      - {id: aa_un_partzuf_mah_droit_ban_gauche, role: aa_un_partzuf_mah_a_droite_ban_a_gauche}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture cle : A\"A = 1 partzuf MaH-droit/BaN-gauche. Pattern bipartite lateral."

  - id: "EC-H3S12-039"
    source_he: "וזהו ענין מ\"ש בזוהר שהכתר הוא זכר לחוד בלי נוקבא ר\"ל בלי נוקבא נפרדת ממנו ומה שאנו אומרים שיש זכר ונוקבא הוא היות נמצאים בו ב' בחי' אלו של מ\"ה וב\"ן בימינו ובשמאלו אשר הם בחי' זכר ונקבה בכ\"מ אבל לא שיש בו זו\"ן נפרדין בב' פרצופים"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      DONC ce que dit Zohar : "Keter = ZAKHAR LEVAD BLI NUKVAH" —
      signifie BLI NUKVAH NIFRADET (sans nukvah separee).
      Nukvah n'est pas absente, mais EXISTE comme MaH+BaN dans gauche/droite.
      → Architecture : Keter "zakhar seul" = pas de zon nifradin (pas separation).
      → Pattern : interpretation correcte = absence pirud, presence inseparable.
    type: déduction_scripturaire
    concepts:
      - {id: keter_zakhar_levad_egal_pas_nifradin, role: keter_zakhar_levad_egal_pas_pirud_pas_separes}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : interpretation correcte du Zohar. Pattern absence pirud."

  # ─── BLOC G : A"Y — MaH+BaN MELANGES, PAS DE GAUCHE/DROITE ───

  - id: "EC-H3S12-040"
    source_he: "ואמנם בע\"י שהוא מבחי' ה\"ר של כתר של הנקודים ששם לא היה שום ביטול כלל מעולם לכן בחי' זכר ונקבה שבו שהם מ\"ה וב\"ן נתערבו יחד לגמרי ושניהן מעורבים יחד זב\"ז בימין בפ\"ע וכן בשמאלו ואינם כמו א\"א וז\"ש באד\"ר דקכ\"ט ע\"א לית שמאל' בהאי עתיקא סתימאה כולא ימינא"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      A"Y = des 5 GR du Keter — JAMAIS de BITUL.
      DONC zakhar+nukvah (MaH+BaN) ENTIEREMENT MELANGES dans droite ET gauche.
      Pas comme A"A.
      Source AdRaba 129a : "LEIT SEMALA BE-HAI ATIKA SETIMA'A, KOLA YAMINA"
      (pas de gauche dans cet Atika cache, tout est droite).
      → Architecture : A"Y = symetrie absolue gauche=droite (rachamim total).
      → Pattern : niveau supreme = sans differentiation laterale.
      cf. EC-H3S12-038 sur A"A bipartite gauche/droite.
    type: déduction_scripturaire
    concepts:
      - {id: ay_mah_ban_melanges_droite_gauche, role: ay_mah_ban_completement_melanges_dans_les_2_cotes}
      - {id: ay_kola_yamina_pas_de_gauche, role: ay_kola_yamina_tout_est_droite_adraba_129a}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : A\"Y symetrie absolue. Pattern niveau supreme = pas differentiation."

  # ─── BLOC H : A"Y PANIM/AHOR = MaH/BaN ───

  - id: "EC-H3S12-041"
    source_he: "אמנם בחי' הנקבה והזכר שבו הוא באופן אחר והוא שהם ב' בחי' פנים ואחור פי' כי בין צד ימינו ובין צד שמאלו יש בו בחי' מ\"ה מצד פנים ובחי' ב\"ן מצד אחור ובזה הוא חיבור נפלא גדול מאד"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      Zakhar/nukvah en A"Y = AUTRE OFAN :
      2 BEHINOT PANIM+AHOR.
      Sur droite ET gauche : MaH du COTE PANIM, BaN du COTE AHOR.
      Et c'est CHIBUR NIFLA GADOL ME'OD (chibur magnifique tres grand).
      → Architecture : A"Y = MaH/BaN sur axe panim/ahor (pas droite/gauche).
      → Pattern : axe orthogonal de differentiation (depth instead of width).
    type: interprétation_lurianique
    concepts:
      - {id: ay_mah_panim_ban_ahor, role: ay_mah_au_panim_ban_au_ahor_axe_orthogonal}
      - {id: ay_chibur_nifla_gadol, role: ay_chibur_nifla_gadol_meod}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : A\"Y = axe orthogonal panim/ahor. Pattern depth-axis differentiation."

  - id: "EC-H3S12-042"
    source_he: "ובזה תבין כי לא תמצא שיש בעתיק פנים ואחור כו שיש בכל השאר ממנו ולמטה והענין כי העתיק מצד א' יש לו מ\"ה ומצד השני יש ב\"ן... והאחוריים דשניהם דמ\"ה וב\"ן מכוסים זה לזה מבפנים תוך ב' בחי' פנים א\"כ אין מתגלה בעתיק בחי' אחור כלל ולכן כולו נקרא פנים"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      DONC : pas de PANIM+AHOR distinct en A"Y comme dans le reste.
      RAISON : A"Y un cote MaH (panim+ahor), autre cote BaN (panim+ahor).
      AHORAYIM des 2 (MaH+BaN) sont COUVERTS l'un contre l'autre BE-PNIM
      ENTRE les 2 PANIM exposes.
      AHOR n'est PAS REVELE en A"Y. KULO NIKRA PANIM (tout est appele panim).
      → Architecture : A"Y = config Janus, ahor caches dedans, faces externes panim.
      → Pattern : opposite faces externalized, backs internalized = "all panim".
      cf. EC-H3S12-010 (perek 01a) sur Atik dvukim ABA + relabelling.
    type: interprétation_lurianique
    concepts:
      - {id: ay_kulo_panim_ahor_caches_dedans, role: ay_kulo_panim_avec_ahor_caches_au_dedans}
      - {id: ay_config_janus_double_panim_externe, role: ay_config_janus_panim_externes_ahor_internes}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : A\"Y = Janus, all panim. Pattern faces externalized + backs internalized."


