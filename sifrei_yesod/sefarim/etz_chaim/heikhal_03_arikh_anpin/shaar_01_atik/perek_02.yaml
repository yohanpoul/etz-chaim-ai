  # ─── BLOC A : QUESTION SUR NUKVOT EN ATIK+A"A ───

  - id: "EC-H3S12-028"
    source_he: "ותחלת כל צריך שטרם שנבאר הספיקות האלו נבאר תחלה ענין אלו הנקבות שיש בעולם האצילות הן בע\"י הן בא\"א וכו'"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      Pre-question avant les SAFEKOT : expliquer d'abord les NUKVOT dans Atzilut —
      en A"Y, en A"A, etc.
      → Architecture : pre-question hermeneutique sur la nature des nukvot upper-layer.
      → Pattern : disambiguation pre-requise.
    type: axiome_explicite
    concepts:
      - {id: pre_question_nukvot_dans_atzilut, role: pre_question_nature_des_nukvot_dans_atzilut}
