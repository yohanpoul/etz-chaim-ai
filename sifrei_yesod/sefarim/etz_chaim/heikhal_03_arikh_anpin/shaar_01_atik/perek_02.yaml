      relevance: "Architecture : pre-question hermeneutique. Pattern disambiguation prerequise."

  - id: "EC-H3S12-029"
    source_he: "והענין הוא כי הנה הודעתיך לעיל שיש בחי' עתיק ונוקבא וא\"א ונוקבא ואו\"א וזו\"ן. אמנם יש חילוק בענין הנקבות הנ\"ל והוא כי הנה הנקבה היא דינין והוא מבחי' בירור המלכים ואיך יצדק שם נקבה בעתיק וא\"א שהם תכלית הרחמים"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      OBJECTION : il y a Atik+nukvah, A"A+nukvah, AVI, ZON.
      MAIS NUKVAH = DININ — issue du BERUR HA-MELAKHIM.
      Comment le terme NUKVAH peut-il s'appliquer a Atik et A"A
      qui sont TAKHLIT HA-RACHAMIM (sommet de la misericorde) ?
      → Architecture : tension ontologique — nukvah=din vs Atik/A"A=rachamim.
      → Pattern : terme semble incompatible avec la nature.
      cf. EC-H3S12-014 (perek 01a) sur dukhrim de MaH, nukvah de BaN.
    type: déduction_logique
    concepts:
      - {id: nukvah_egal_dinin_de_berur_melakhim, role: nukvah_egal_dinin_issu_de_berur_melakhim}
      - {id: contradiction_nukvah_din_vs_atik_aa_rachamim, role: contradiction_nukvah_din_vs_atik_aa_rachamim}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : tension ontologique nukvah=din vs Atik/A\"A=rachamim. Pattern contradiction apparente."

  - id: "EC-H3S12-030"
    source_he: "ועוד כי הנה היות בחי' זכר ונקבה מורה על מיעוט ופירוד ואין אחדות גמור כמו בהיות הזכר לבדו"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      Et de plus : ZAKHAR+NUKVAH indique MEI'UT (diminution) + PIRUD (separation).
      Pas EHAD GAMUR (unite complete) comme zakhar SEUL.
      → Architecture : zivvug = compromis ontologique vs unite pure.
      → Pattern : pluralite = degradation par rapport a singularite.
    type: déduction_logique
    concepts:
      - {id: zakhar_nukvah_egal_meiut_pirud, role: zakhar_nukvah_indique_diminution_separation}
    mapping:
      modules: ["partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: []
      relevance: "Architecture : zivvug = compromis. Pattern pluralite = degradation."

  # ─── BLOC B : SOURCES CONTRADICTOIRES ───

  - id: "EC-H3S12-031"
    source_he: "והנה מצינו ראינו בהרבה מקומות בזוהר ובאד\"ר דקמ\"א ע\"ב בהאי דיוקנא דאדם שארי ותקין כללא דכר ונוק' מה שאין כך בעתיקא"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      Source 1 : AdRaba 141b — "BE-HAI DIUKNA DE-ADAM SHARI VE-TIKKUN KELALA
      DUKHRA VE-NUKVA, MAH SHE-EIN KEN BE-ATIKA"
      (dans cette diukna d'Adam — kelala dukhra+nukva ; pas dans Atika).
      → Architecture : Zohar dit explicitement Atika n'a PAS dukhra+nukva (klal).
      → Pattern : citation source = problem-statement.
    type: déduction_scripturaire
    concepts:
      - {id: adraba_141b_atika_pas_dukhra_nukva, role: adraba_141b_dit_atika_pas_dukhra_nukva}
