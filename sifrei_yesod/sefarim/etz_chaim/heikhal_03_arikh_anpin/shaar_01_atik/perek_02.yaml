      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Source AdRaba 141b — problem-statement contre nukvah en Atika."

  - id: "EC-H3S12-032"
    source_he: "וכן בהרבה מקומות מצינו שלא התחיל בחי' זכר ונקבה אלא מאו\"א ולמטה כנזכר באדר\"ז דר\"ץ ע\"א האי חכמתא אתפשט ואשתכח דו\"נ שהוא חכמה אב בינה אם ובגינייהו כולא אתקיים בדו\"נ"
    source_ref: "Heikhal 3, Sha'ar 1:2"
    assertion: |
      Source 2 : AdR Zuta 290a — "HAI CHOKHMATA ITPASHT VE-ISHTEKHAH DUKHRA VE-NUKVA"
      (cette Hokhmah s'etend et se trouve dukhra+nukva = Hokhmah Av, Bina Em.
      Et BIGINEIHU KOLA ITKAYEM BE-DUKHRA VE-NUKVA (par eux tout existe en dukhra+nukvah).
      → Lecture : zakhar+nukva COMMENCE seulement a partir d'AVI (pas plus haut).
      → Pattern : 2eme source confirme — pas de nukvah au-dessus d'AVI.
    type: déduction_scripturaire
    concepts:
      - {id: adr_zuta_290a_dukhra_nukva_commence_avi, role: adr_zuta_290a_dukhra_nukva_commence_avi}
