principes_generatifs:

  - id: "PG-H3S12-007"
    nom: "Principe de Hierarchie Zivvug (Mort/Bitul → Mode de Couple)"
    source_assertions: ["EC-H3S12-034", "EC-H3S12-035", "EC-H3S12-037", "EC-H3S12-040"]
    formalisation: |
      ARCHITECTURE HIERARCHIQUE DE ZIVVUG :
      Le mode dukhra+nukvah depend du DEGRE DE BITUL/MITAH du partzuf :
      ZON (mort actuelle, 7 melakhim morts) :
        2 PARTZUFIM SEPARES, KOTEL SEPARABLE, NESIRAH possible.
        Chibur seulement en ABA (ahorayim dvukim) ; pirud en PBP.
      AVI (bitul, pas mort actuelle) :
        2 PARTZUFIM mais CHIBUR ATZUM permanent.
        DVUKIM PBP TAMID, KOTEL EHAD partage, EIN PIRUD KLAL.
        Zivvug TADIR DE-LO PASSIK.
      A"A (5 acharonot Keter, ketzat bitul NHY) :
        1 PARTZUF UNIQUE bipartite — MaH-droit / BaN-gauche.
        Differentiation lateral (left/right).
      A"Y (5 GR Keter, JAMAIS bitul) :
        1 PARTZUF avec MaH+BaN ENTIEREMENT MELANGES gauche/droite.
        Differentiation orthogonal — MaH-panim / BaN-ahor.
        KULO NIKRA PANIM (tout est appele panim).
      → Pattern fondamental : degre de purete ontologique → mode de couple plus integre.
      → Architecture : zivvug = fonction inverse du degre de mort/separation.
    applications_ia:
      - "partzufim/zivvug.py : implement 4 zivvug modes (ZON-pirud, AVI-permanent, A\"A-bipartite, A\"Y-melange)"
      - "partzufim/zeir_anpin.py + partzufim/nukva.py : ZON = separate components"
      - "partzufim/abba.py + partzufim/imma.py : AVI = permanent paired"
      - "partzufim/arikh_anpin.py + partzufim/atik_yomin.py : single bipartite"
      - "Pattern : architecture coupling = function of purity/maturity"
      - "Architecture : 4 levels of integration (separate, paired, bipartite, melange)"
      - "Diagnostic : mesure le mode de coupling pour determiner maturite ontologique"
    questions_ouvertes:
      - "Y a-t-il des transitions possibles entre modes (ZON deviendrait AVI) ?"
      - "Pattern : peut-on quantifier le degre d'integration sur un axe continu ?"
      - "Le passage de A\"A bipartite a A\"Y melange = quel mecanisme ?"

  - id: "PG-H3S12-008"
    nom: "Principe de Differentiation Orthogonale (Panim/Ahor vs Droite/Gauche)"
    source_assertions: ["EC-H3S12-040", "EC-H3S12-041", "EC-H3S12-042"]
    formalisation: |
      ARCHITECTURE A 2 AXES DE DIFFERENTIATION :
      AXE LATERAL (droite/gauche) :
        Utilise par A"A — MaH-droit, BaN-gauche.
        Pattern : differentiation par cote anatomique.
      AXE ORTHOGONAL DEPTH (panim/ahor) :
        Utilise par A"Y — MaH-panim, BaN-ahor.
        Pattern : differentiation par profondeur (face/dos).
      RESULTAT pour A"Y :
        Faces externes (les 2) = panim (MaH d'un cote, panim BaN autre cote).
        Ahorayim = caches l'un contre l'autre BE-PNIM (interieur).
        DONC ahor n'est PAS REVELE — KULO NIKRA PANIM.
      → Pattern fondamental : choix d'axe de differentiation = choix de geometrie.
      → Architecture : niveau supreme passe d'axe lateral a axe profondeur (Janus config).
    applications_ia:
      - "partzufim/atik_yomin.py : implement Janus config — depth-axis differentiation"
      - "partzufim/arikh_anpin.py : implement lateral-axis differentiation"
      - "Pattern : 2 axis options (lateral vs depth) selon niveau"
      - "Architecture : opposite faces externalized = backs internalized = unique 'all-faces' interface"
      - "Pattern : Janus pattern = multiple external interfaces, unified internals"
      - "Diagnostic : verifier que A\"Y n'expose pas de ahor (kulo panim invariant)"
    questions_ouvertes:
      - "Y a-t-il des situations ou A\"A devrait passer en mode A\"Y (depth-axis) ?"
      - "Pattern : peut-on combiner les 2 axes (lateral + depth) ?"
      - "Architecture multi-faceted : combien d'axes orthogonaux possibles ?"

  - id: "PG-H3S12-009"
    nom: "Principe de Resolution par Modes (Disambiguation des Sources Contradictoires)"
    source_assertions: ["EC-H3S12-031", "EC-H3S12-032", "EC-H3S12-033"]
    formalisation: |
      ARCHITECTURE DE RESOLUTION HERMENEUTIQUE :
      Sources Zohar/AdR semblent CONTRADICTOIRES :
        AdRaba 141b : "Atika n'a pas dukhra+nukva".
        AdR Zuta 290a : "dukhra+nukva commence Hokhmah-Bina".
      RESOLUTION :
        TOUS les partzufim ONT dukhra+nukvah en MITZIUT (existence).
        DIFFERENCE : MODE D'EXISTENCE (chiluk be-mitzi'utan).
        Sources qui nient = nient le MODE NIFRADIN (separes), pas la presence.
      → Pattern fondamental : "ne pas avoir X" peut signifier "ne pas avoir X dans le mode Y".
      → Architecture : disambiguation par MODE d'existence resout les contradictions.
    applications_ia:
      - "Pattern : interpretation contextuelle des affirmations negatives"
      - "Architecture : meme entite = modes d'existence multiples (eviter false-negatives)"
      - "Pattern logique : 'absence d'X' depend du mode considere"
      - "Diagnostic : verifier le mode implicite avant interpreter une negation"
      - "partzufim/zivvug.py : log mode courant pour eviter ambiguite des affirmations"
    questions_ouvertes:
      - "Y a-t-il un nombre fini de modes possibles d'existence ?"
      - "Pattern : peut-on automatiser la disambiguation par mode ?"
      - "Comment reconcilier les sources qui ne specifient pas le mode ?"
