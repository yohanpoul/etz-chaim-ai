sujet_principal: "Sha'ar Atik (Heikhal 3 = Heikhal Ha-Ketarim, premier de 2 sha'arim). Tikkun olam Atzilut depuis MaH (45) et BaN (52). Atik = dukhra (de Keter MaH) + nukvah (de partial KCB ChG d'Atzilut BaN). 3 rishin d'Idra Zuta (Risha Ila'ah, Keter A\"A, Hokhmah Elyonah). Distinction Atik (zakhar) vs Atik (nukvah) chez Idra Zuta. 4 behinot TaNaTA (Ta'amim, Nekudot, Tagin, Otiyot). Place spatiale d'Atik dans Atzilut."
