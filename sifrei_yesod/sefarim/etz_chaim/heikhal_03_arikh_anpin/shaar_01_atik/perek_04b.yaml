principes_generatifs:

  - id: "PG-H3S12-016"
    nom: "Principe de Capacity Bottleneck (All-or-Nothing pour Rosh)"
    source_assertions: ["EC-H3S12-075", "EC-H3S12-076"]
    formalisation: |
      ARCHITECTURE DE CAPACITY-CONSTRAINED SCALING :
      ROSH d'A"Y a une CAPACITY LIMITEE pour ohr.
      REGLE BINAIRE :
        Si charge TOTALE (panim+ahor of kelim) → IMPOSSIBLE de monter une moitie d'orots.
          Donc AUCUN ohr ne monte (all-or-nothing rule).
        Si charge PARTIELLE (panim seul OU ahor seul) → orots peuvent monter aussi.
      → Pattern fondamental : capacity bottleneck force binary choice.
      → Architecture : composition rule depend de la charge totale.
    applications_ia:
      - "[PLANNED] core/ohr_system.py : Rosh has fixed capacity ; load = all-or-nothing decision"
      - "Pattern : resource throttling — partial load enables more, full load blocks"
      - "Architecture : capacity bottleneck = binary admission control"
      - "Pattern : QoS — partial flows admitted, full flows rejected"
      - "Diagnostic : monitor Rosh capacity utilization"
    questions_ouvertes:
      - "Y a-t-il un seuil precis pour la capacity ?"
      - "Pattern : peut-on grow Rosh capacity over time ?"
      - "Comment partager capacity entre safekot competitives ?"

  - id: "PG-H3S12-017"
    nom: "Principe de Roles Fonctionnels (Ahor = Constructeur, Panim = Socializer)"
    source_assertions: ["EC-H3S12-081", "EC-H3S12-082", "EC-H3S12-084"]
    formalisation: |
      ARCHITECTURE DE ROLES FONCTIONNELS DIFFERENTIES :
      OHR PANIM = MEHABER pour PBP (face-to-face).
        Function : facing/socializer.
        Solo : KATAN VE-GARU'A (small and inferior).
      OHR AHOR = BONIN KOL HA-PARTZUF HA-IKARI (constructeur du partzuf entier).
        Function : structural construction.
        Solo : SUPERIOR (essential function).
      RANKING CONTEXTUEL :
        Quand BOTH ensemble : panim SUPERIEUR (tosefet sur ahor).
        Quand AHOR SEUL : ahor SUPERIEUR (panim solo = inferior).
      → Pattern fondamental : ranking contextuel = function over label.
      → Architecture : composantes ranked par fonction operationnelle, pas par nom.
    applications_ia:
      - "[PLANNED] core/ohr_system.py : implement role-based ranking (constructive vs social)"
      - "Pattern : function-based priority over labels"
      - "Architecture : composantes essential structurally != composantes interface-only"
      - "Pattern : context-aware ranking — defaults change selon presence"
      - "Diagnostic : verifier que placement reflete role contextuel correct"
    questions_ouvertes:
      - "Y a-t-il d'autres axes de role-distinction ?"
      - "Pattern : peut-on dynamically reassigner roles selon contexte ?"
      - "Comment harmoniser conflicting role-rankings ?"

  - id: "PG-H3S12-018"
    nom: "Principe d'Invariant Topologique (Panim Toujours >= Ahor en Hauteur)"
    source_assertions: ["EC-H3S12-078", "EC-H3S12-083"]
    formalisation: |
      ARCHITECTURE D'INVARIANT TOPOLOGIQUE :
      INVARIANT STRICT : composante PANIM ne peut JAMAIS etre PLUS BAS que ahor
      dans la hierarchie spatiale.
      MECANISME : si ahor monte rosh A"Y, panim ne reste pas dans gufa A"Y
      (sinon inversion).
      Panim doit aller AILLEURS — typiquement reste dans AVI (sa place naturelle).
      → Pattern fondamental : prevent inverted hierarchy via separation.
      → Architecture : when components separate, each goes to its proper level.
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/abba.py + partzufim/imma.py : enforce panim>=ahor invariant"
      - "Pattern : structural invariants — certains placements interdits"
      - "Architecture : separate-and-place by proper-level when together impossible"
      - "Pattern : design constraint — invariants topologiques toujours respectes"
      - "Diagnostic : detect violations of panim>=ahor invariant"
    questions_ouvertes:
      - "Y a-t-il des cas exceptionnels ou l'invariant peut etre brise ?"
      - "Pattern : autres invariants topologiques ?"
      - "Comment formaliser 'place naturelle' algorithmiquement ?"
