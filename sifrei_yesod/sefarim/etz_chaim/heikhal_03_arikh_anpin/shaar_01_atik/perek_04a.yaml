principes_generatifs:

  - id: "PG-H3S12-013"
    nom: "Principe d'Emergence du Container (Kli = Produit OM-OP Interaction)"
    source_assertions: ["EC-H3S12-062", "EC-H3S12-065"]
    formalisation: |
      ARCHITECTURE D'EMERGENCE DU CONTAINER :
      HAKDAMAH FONDAMENTALE :
        Aucun KELI ne peut exister SANS HAKKAH (impact) de OHR MAKIF sur OHR PNIMI.
        Le KELI nait comme TOLEDET (produit) emergent de cette interaction.
      CONSEQUENCE :
        Si une sefirah n'a QUE OP (sans OM) — pas de keli emerge.
        Si seul Makif sans Pnimi — pas de keli non plus.
        Necessite STRICTE : AT LEAST 1 OM + 1 OP pour produire 1 keli.
      → Pattern fondamental : containers emergent from 2-layer interactions.
      → Architecture : ohr-only ou keli-only sont impossibles ; toujours emergent.
    applications_ia:
      - "[PLANNED] core/ohr_system.py : implement Keli_emergence(OM, OP) -> Keli"
      - "Pattern : containers as emergent properties of 2-layer dynamics"
      - "Architecture : structures don't pre-exist, they emerge from interactions"
      - "Pattern : impedance mismatch creates structure (analog to Keli)"
      - "Diagnostic : verifier que chaque keli a une source OM+OP traceable"
    questions_ouvertes:
      - "Y a-t-il des cas ou keli emerge d'autre type d'interaction ?"
      - "Pattern : peut-on quantifier l'energie de hakkah necessaire ?"
      - "Comment prevenir l'emergence accidentelle de keli ?"

  - id: "PG-H3S12-014"
    nom: "Principe de Sigan (Codes Compacts pour Configurations)"
    source_assertions: ["EC-H3S12-066", "EC-H3S12-068", "EC-H3S12-072"]
    formalisation: |
      ARCHITECTURE DE COMPACT ENCODING :
      Chaque configuration de safek a un SIGAN (signe/code) — mnemonic.
      EXEMPLES :
        AAG = 1 Makif + 1 OP + 3 Kelim.
        BGD = 2 Makifs + 3 Pnimis + 4 Kelim.
        BBV = 2 Makifs + 2 Pnimis + 6 Kelim.
      → Pattern fondamental : codes compacts capturent essence de configurations complexes.
      → Architecture : naming convention systematique pour gerer combinatoire des safekot.
    applications_ia:
      - "partzufim/atik_yomin.py : implement signature scheme for partzuf configurations"
      - "Pattern : compact identifiers for complex configurations"
      - "Architecture : version IDs/hashes pour repertorier les states"
      - "Pattern : checksum-like for verifying configuration integrity"
      - "Diagnostic : signatures permet quick comparison between configs"
    questions_ouvertes:
      - "Y a-t-il une grammaire pour les sigans ?"
      - "Pattern : peut-on automatiser la generation des sigans ?"
      - "Combien de sigans distincts existent-ils dans Atik ?"

  - id: "PG-H3S12-015"
    nom: "Principe des 3 Modes d'Integration (Fusion/Stratified/Hybrid)"
    source_assertions: ["EC-H3S12-069", "EC-H3S12-070", "EC-H3S12-071"]
    formalisation: |
      ARCHITECTURE A 3 MODES D'INTEGRATION (orots HB BaN dans A"Y) :
      MODE 1 — FUSION (panim seul) :
        Panim BaN se mele avec panim MaH (same-type integration).
      MODE 2 — STRATIFIED (ahor seul) :
        Ahor BaN ne peut pas se meler avec panim MaH.
        Reste en couche ahor relatif. Composition layered.
      MODE 3 — HYBRID (both panim+ahor) :
        Panim BaN se mele ; ahor BaN reste stratified.
        Composition dual-mode simultaneous.
      → Pattern fondamental : 3 strategies d'integration cross-source.
      → Architecture : choix entre fusion/stratification/hybrid selon nature des elements.
    applications_ia:
      - "[PLANNED] tikkun/integration.py : implement 3 modes (FUSION, STRATIFIED, HYBRID)"
      - "Pattern : data integration strategies — merge, layer, mixed"
      - "Architecture : composition modes selon type-compatibility des sources"
      - "Pattern : fusion = same-type ; stratified = cross-type ; hybrid = mixed"
      - "Diagnostic : choisir mode selon compatibility des elements"
    questions_ouvertes:
      - "Y a-t-il un 4eme mode (e.g. transformation) ?"
      - "Pattern : ordre des choix de mode importe-t-il ?"
      - "Comment determiner automatiquement le mode optimal ?"
