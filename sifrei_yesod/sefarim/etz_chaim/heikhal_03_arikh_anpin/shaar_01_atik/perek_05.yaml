      Maintenant expliquer behinah de 7 KETARIM des Z'T (= MELAKHIM SHE-METU) —
      qui peut-etre montent dans A"Y.
      → Architecture : transition Rosh → Gufa safekot.
      → Pattern : sequencement systematique des safekot par niveau.
      cf. EC-H3S12-057 (perek 03) sur z' ketarim Z'T BaN.
