      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : reverse flow direction. Pattern adaptive illumination direction."

  # ─── BLOC D : CAS 3 SIGAN BBV ───

  - id: "EC-H3S12-092"
    source_he: "והבחי' הב' כפי הספק הא' שסימנו בב\"ו הנה אז האורות דכתרים דחו\"ב דב\"ן נשארו למטה בגופא דעתיק בחי' פנים ובחי' אחור... ועתה אינן צריכין להאיר ממטה למעלה בכלים שלהן אשר עלו ברישא דעתיק לפי שכבר יש למעלה ב' אורות פנימים ומספיק להם וכיון שכן הוא יש להם הארה גדולה וכח גדול להאיר בז' הכתרים ולקבצם עמהם ג\"ר בחסד דעתיק וד\"ת בנצח דעתיק"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      CAS 3 (Behinah 2, sigan BBV) :
      Orots ketarim HB BaN (panim+ahor) RESTENT gufa A"Y, distributes Chesed/Netzach.
      Pas besoin d'eclairer up to kelim (kelim ont 2 OP en rosh).
      DONC HARAH GEDOLAH (grande illumination) + KOAH GADOL pour les 7 ketarim.
      KABBATZIM (regroupent) : 3 GR de 7 → Chesed Atik ; 4 derniers → Netzach Atik.
      Comme HB BaN orots themselves : Chesed eclair 3 amtza'iyot, Netzach eclair 4 derniers.
      → Architecture : excess capacity → strong regroupement (3+4).
      → Pattern : abundance enables aggregation patterns.
    type: interprétation_lurianique
    concepts:
      - {id: cas_3_bbv_kabbatzim_3_4_forts, role: cas_3_bbv_kabbatzim_3_4_forts_par_excess_capacity}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : abundance enables aggregation. Pattern strong regroupement."

  # ─── BLOC E : CAS 4 SIGAN BDD PANIM ───

  - id: "EC-H3S12-093"
    source_he: "וכפי הספק הב' שסימנו בד\"ד שאז האורות שלהם דחו\"ב דב\"ן דפנים עלו ברישא דעתיק והאורות שלהם דאחור נשארו למטה בגופא דעתיק... ואז אור הפנים שעלו בראש עתיק הנה הוא מתפשט דרך קוין עד למטה באופן זה כיצד חכמה מתפשט בדרך קו ימין ומאיר דרך הקו בבחי' התפשטות עצמה ממש ואינה הארה בעלמא ממקומה לבד"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      CAS 4 (sigan BDD panim) :
      Orots panim HB BaN MONTENT Rosh ; orots ahor RESTENT gufa.
      Ohr panim haut MITPASHET (s'etend) par KAVIM jusqu'en bas :
        Hokhmah s'etend par kav DROIT (extension reelle, pas just irradiation).
        Bina s'etend par kav GAUCHE.
        Keter SaG + MaH s'etend par kav CENTRAL.
      → Architecture : extension par kavim = ohr veut MAMASH descend tout en bas.
      → Pattern : flow direct vs indirect — kavim = direct extension transport.
    type: interprétation_lurianique
    concepts:
      - {id: cas_4_bdd_panim_extension_par_kavim_directe, role: cas_4_bdd_panim_extension_par_kavim_directe_pas_irradiation}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : extension directe vs irradiation. Pattern direct flow channels."

  - id: "EC-H3S12-094"
    source_he: "וכפי זה נמצא ג' ספיקות בז' כתרים הא' הוא אם נאמר שהם עומדין כל אחד ואחד במקומו בז\"ת דעתיק או אם עומדין הג' שבהם בחסד דעתיק והד' אחרונות בנצח דעתיק... או אם נאמר כיון שמתפשט אור הפנים שלהם ממש למטה כנ\"ל א\"כ אין צריכין להתחבר עם האחוריים ולכן כל אחד עומד במקומו"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      Cas 4 a 3 SOUS-SAFEKOT pour 7 ketarim :
      A) Chacun reste a sa place (1-1 distribution).
      B) 3 GR dans Chesed, 4 derniers dans Netzach (regroupement).
      C) Puisque ohr panim s'etend mamash → pas besoin d'attache ahor → chacun a sa place.
      → Architecture : multiple resolution paths selon position panim.
      → Pattern : safekot proliferent dans configurations expansives.
    type: déduction_logique
    concepts:
      - {id: cas_4_3_sous_safekot_7_ketarim, role: cas_4_3_sous_safekot_pour_7_ketarim_distribution}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : multiple resolution paths. Pattern safekot prolification."

  # ─── BLOC F : CAS 5 SIGAN BDD AHOR ───

  - id: "EC-H3S12-095"
    source_he: "וכפי הספק הג' שסימנו ג\"כ בד\"ד אשר אז האורות של האחור דחו\"ב עלו למעלה בראש דעתיק אך אורות הפנים הם למטה באו\"א... אלא חכמה מאירה ממקומה בג' אמצעית ובינה מאירה ממקומה בד\"ת והנה עתה יש ב' הפסדות א' הוא שהאורות אינם למטה ועוד שאפי' הם למעלה אינם מאירין בדרך קוין"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      CAS 5 (sigan BDD ahor) : orots ahor HB BaN MONTENT Rosh ; panim restent AVI.
      Ahor de leur place (rosh) eclairent direct les Z'T :
        Hokhmah eclair 3 amtza'iyot ; Bina eclair 4 derniers.
        PAS par KAVIM (just direct radiation).
      2 HEFSEDOT (deficiences) : (1) orots pas en gufa ; (2) pas par kavim.
      Donc weak kabbatzim — 7 ketarim eclairent UN-PAR-UN, pas par kavim.
      → Architecture : minimum resource case = atomic 1-by-1 illumination.
      → Pattern : low abundance = no aggregation possible.
    type: interprétation_lurianique
    concepts:
      - {id: cas_5_bdd_ahor_radiation_directe_pas_kavim, role: cas_5_bdd_ahor_radiation_directe_atomique_pas_kavim}
      - {id: cas_5_2_hefsedot_pas_gufa_pas_kavim, role: cas_5_2_deficiencies_pas_orots_gufa_pas_par_kavim}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : minimum resource case. Pattern atomic illumination low-abundance."

  # ─── BLOC G : CONCLUSION RISHA DE-LO ITYADA ───

  - id: "EC-H3S12-096"
    source_he: "כלל העולה מכל זה שלסיבת כל אלו הספיקות נקרא עתיק יומין רישא דלא אתיידע כי אין נודע מה בחי' יש בו"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      KELAL HA-OLE (cle generale) : a cause de TOUTES ces SAFEKOT —
      ATIK YOMIN appele RISHA DE-LO ITYADA (rosh non-connaissable).
      Car NON CONNU quelle behinah il a en lui.
      → Architecture cle : Atik = inherently uncertain composition.
      → Pattern : meta-affirmation — l'incertitude est categorique.
      cf. EC-H3S12-026 (perek 01b) sur DLA ITYADA contenu.
    type: déduction_logique
    concepts:
