      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : Atik categorically uncertain. Pattern meta-affirmation."

  # ─── BLOC H : YESHAYAHU TZACH ───

  - id: "EC-H3S12-097"
    source_he: "והנה ישעי' הנביא ע\"ה נסתפק גם הוא באלו הספיקות ואליהם רמז והשביע בצחצחות נפשך ודרשו בזוהר פ' ויחי צח חד צחות תרין"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      Yeshayahu HA-NAVI 'ALEHA HA-SHALOM s'est lui aussi DOUTE de ces SAFEKOT.
      Source : "VE-HISHBI'A BE-TZACHZECHOT NAFSHEKHA" (Yeshayahu 58:11 —
      assouvi ton ame dans les eclat).
      Drashot Zohar Vayhi 98 : "TZACH HAD TZACHOT TARIN"
      (1 tzach ou 2 tzachot — eclair ou eclats).
      → Architecture : safek prophetique sur la composition d'Atik.
      → Pattern : letter-mysticism — tzach = signature gematriya.
    type: déduction_scripturaire
    concepts:
      - {id: yeshayahu_58_11_tzachzehot_safek_atik, role: yeshayahu_58_11_tzachzehot_zohar_vayhi_98_tzach_chad_o_trin}
