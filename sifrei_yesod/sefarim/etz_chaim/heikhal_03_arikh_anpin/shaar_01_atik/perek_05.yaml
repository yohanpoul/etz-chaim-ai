principes_generatifs:

  - id: "PG-H3S12-019"
    nom: "Principe de Conservation Rosh-Gufa (Complement Determine)"
    source_assertions: ["EC-H3S12-087"]
    formalisation: |
      ARCHITECTURE DE CONSERVATION :
      Composition de GUFA d'A"Y = COMPLEMENT de la composition de Rosh.
      Si X monte au Rosh, X' = Total - X reste en Gufa.
      MECANISME : safekot du Rosh determinent les safekot du Gufa.
      → Pattern fondamental : conservation law cross-niveau.
      → Architecture : decisions au niveau superieur propagent contraintes au niveau inferieur.
    applications_ia:
      - "partzufim/atik_yomin.py : implement Rosh+Gufa = total invariant"
      - "Pattern : conservation laws across levels"
      - "Architecture : top-level decisions cascade as constraints below"
      - "Pattern : complement = derivative knowledge from positive specification"
      - "Diagnostic : verifier coherence Rosh+Gufa = total connu"
    questions_ouvertes:
      - "Y a-t-il des invariants supplementaires entre Rosh et Gufa ?"
      - "Pattern : peut-on calculer dynamically le complement ?"
      - "Comment gerer les ambiguites dues aux safekot du Rosh ?"

  - id: "PG-H3S12-020"
    nom: "Principe de Distribution selon Abundance (1-1 vs Regroupement)"
    source_assertions: ["EC-H3S12-088", "EC-H3S12-089", "EC-H3S12-092", "EC-H3S12-094"]
    formalisation: |
      ARCHITECTURE DE DISTRIBUTION ADAPTATIVE :
      ABUNDANCE LIMITEE (cas AAG, BGD) :
        Distribution 1-1 — chaque keter a sa propre place.
        Pas de regroupement (irradiation par kavim seul).
      ABUNDANCE FORTE (cas BBV) :
        Regroupement 3+4 — 3 GR dans Chesed Atik, 4 derniers dans Netzach Atik.
        Forte illumination permet aggregation.
      ABUNDANCE INTERMEDIAIRE (cas BDD panim) :
        3 SOUS-SAFEKOT — distribution incertaine (chacun ou regroupe).
      MINIMUM (cas BDD ahor) :
        Radiation directe atomique, no kavim, no regroupement.
      → Pattern fondamental : strategy de distribution = function de la quantite de ressources.
      → Architecture : adaptive distribution based on resource budget.
    applications_ia:
      - "partzufim/atik_yomin.py : implement adaptive distribution policy"
      - "Pattern : load-balancing strategies — 1-1 (light), aggregated (heavy), atomic (minimal)"
      - "Architecture : resource budget determines distribution algorithm"
      - "Pattern : abundance-aware composition"
      - "Diagnostic : measure resource budget before deciding distribution"
    questions_ouvertes:
      - "Y a-t-il un threshold precis entre les modes ?"
      - "Pattern : peut-on dynamically migrate entre modes ?"
      - "Comment optimiser distribution sous contraintes mixed ?"

  - id: "PG-H3S12-021"
    nom: "Principe de Risha De-Lo Ityada (Categorical Uncertainty)"
    source_assertions: ["EC-H3S12-096", "EC-H3S12-097", "EC-H3S12-098"]
    formalisation: |
      ARCHITECTURE D'INCERTITUDE CATEGORIQUE :
      A cause de TOUTES les SAFEKOT — Atik = RISHA DE-LO ITYADA.
      Non connu QUOI il y a en lui.
      Source prophetique : Yeshayahu 58:11 "TZACHZECHOT" (eclats).
      Zohar Vayhi 98 : "TZACH HAD O TZACHOT TARIN" (1 ou 2 tzachot).
      Gematriya Atik = 98 (TZ"CH = MaH 45 + BaN 52 + kollel 1).
      → Pattern fondamental : uncertainty categorical (pas accidentelle).
      → Architecture : top-level component intentionally opaque.
    applications_ia:
      - "partzufim/atik_yomin.py : Atik instantiated avec uncertainty=true"
      - "Pattern : black-box at top of hierarchy by design"
      - "Architecture : not all components must be transparent"
      - "Pattern : letter-mysticism comme signature de l'identite"
      - "Diagnostic : ne pas force expand uncertainty si categorical"
    questions_ouvertes:
      - "Pattern : peut-on tolerer uncertainty au top mais require transparency below ?"
      - "Comment specifier 'categorical uncertainty' sans hardcoder ?"
      - "Y a-t-il analogues dans systems complexity theory ?"
