# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 3 — Heikhal Ha-Ketarim (היכל הכתרים)
# Sha'ar: 1 — Sha'ar Atik (שער עתיק)
# Perek: 5 — 7 ketarim des Z'T BaN dans Atik. Distribution+irradiation
#            par kavim. Yeshayahu tzach a/o trin. Cloture sha'ar
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §5 :
#   - Bloc A : Resume safekot Rosh ; expliquer 7 ketarim Z'T BaN
#   - Bloc B : Cas 1 (sigan AAG) — orots HB BaN restent gufa, distribution 1-1
#   - Bloc C : Cas 2 (sigan BGD) — orots HB ahor montent rosh, illuminate top-down
#   - Bloc D : Cas 3 (sigan BBV) — orots HB BaN gufa, kabbatzim 3+4 forts
#   - Bloc E : Cas 4 (sigan BDD panim) — extension par kavim ; 3 sub-safekot
#   - Bloc F : Cas 5 (sigan BDD ahor) — radiations directes, pas kavim
#   - Bloc G : Conclusion : pourquoi Atik appele "Risha de-Lo Itya da"
#   - Bloc H : Yeshayahu 58:11 + Zohar Vayhi 98 — safek 1 tzach ou 2 tzach
#   - Bloc I : M"K addendum — orots AVI dans Rosh
#
