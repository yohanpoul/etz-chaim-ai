      partzufim: ["atik_yomin"]
      relevance: "Architecture : transition Rosh-Gufa. Pattern sequencement systematique."

  - id: "EC-H3S12-087"
    source_he: "ואמנם בחי' גופא דעתיק כפי מה שיהיו הספיקות בענין רישא דעתיק ימשך ממנו מה שנשאר למטה בגופא דיליה מבחי' חו\"ב דב\"ן כי כפי מה שעלו ברישא דעתיק עד\"ז יודע [נ\"א יוודע] מה שנשאר למטה בגופא דיליה מבחי' חו\"ב דב\"ן"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      GUFA d'A"Y depend des SAFEKOT du Rosh.
      Selon ce qui MONTE en Rosh — on YODA (sait) ce qui RESTE en Gufa de HB BaN.
      Variante (Nusah Aher) : "yivada" (sera connu).
      → Architecture : Gufa = complement de Rosh (conservation).
      → Pattern : conservation law — ce qui monte determine ce qui reste.
    type: déduction_logique
    concepts:
      - {id: gufa_ay_complement_rosh_conservation, role: gufa_ay_complement_du_rosh_par_conservation}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : conservation law. Pattern complement par contrainte."

  # ─── BLOC B : CAS 1 SIGAN AAG ───

  - id: "EC-H3S12-088"
    source_he: "והנה כפי הבחי' הא' וספק א' שסימנו אא\"ג הנה אז נשארו (האורות דאחור דחו\"ב דב\"ן) למטה בגופא דעתיק שהם ז\"ת ואור הפנים נשאר באו\"א... ואלו הכתרים של ז\"ת דב\"ן הם מתחלקים בז\"ת דעתיק הא' בחסד שבו והב' בגבורה שבו וכן בכולם עד\"ז"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      CAS 1 (Behinah 1 + safek 1, sigan AAG) :
      Orots ahor HB BaN RESTENT en gufa A"Y (z'T = chesed/netzach).
      Orots panim restent AVI.
      7 KETARIM Z'T BaN distributes 1-1 dans 7 sefirot d'Atik :
        Keter 1 → Chesed Atik ; Keter 2 → Gevurah ; ... ; Keter 7 → Malkhut.
      → Architecture : distribution sequentielle (pas regroupement).
      → Pattern : 1-to-1 mapping par position.
      cf. EC-H3S12-066 (perek 04a) sur sigan AAG.
    type: déduction_logique
    concepts:
      - {id: cas_1_aag_distribution_1_1_7_ketarim, role: cas_1_aag_distribution_1_1_7_ketarim_zt_dans_7_sefirot_atik}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : distribution 1-1. Pattern position-mapping."

  - id: "EC-H3S12-089"
    source_he: "ולא נתחלקו על סדר חילוק חו\"ב דב\"ן להיות ג\"ר שבהם עם חכמה דב\"ן בחסד דעתיק וד\"ת שלהם עם בינה דב\"ן בנצח דעתיק והטעם הוא לפי שהאורות דכתרים חו\"ב דב\"ן הם מאירים מלמטה למעלה בכלים שלה שעלו ברישא דעתיק"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      Pas regroupes en 3+4 (comme orots HB BaN).
      RAISON : orots ketarim HB BaN ECLAIRENT BOTTOM-UP vers leurs kelim
      qui sont en Rosh A"Y.
      Si 7 ketarim regroupes aussi → leur ohr aussi monterait → ohr manquerait gufa.
      → Architecture : distribution 1-1 force par contrainte upward illumination.
      → Pattern : flow direction determine la distribution structurale.
    type: interprétation_lurianique
    concepts:
      - {id: orots_hb_ban_eclairent_bottom_up, role: orots_hb_ban_eclairent_bottom_up_vers_kelim_rosh}
      - {id: distribution_1_1_force_par_upward_illumination, role: distribution_1_1_contrainte_upward_illumination}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : flow direction → distribution. Pattern direction-aware structure."

  - id: "EC-H3S12-090"
    source_he: "ודע כי ז' כתרים אלו כ\"א מאיר לחבירו הקטן ממנו ובדרך הקוין כיצד החסד מאיר אל הנצח וגבורה מאיר אל ההוד וכעד\"ז השאר"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      7 ketarim ECLAIRENT l'un l'autre via KAVIM (lignes/colonnes) :
        Chesed → Netzach (kav droit).
        Gevurah → Hod (kav gauche).
        Tiferet → Yesod (kav central).
        Etc.
      → Architecture : irradiation par axes structurels (3 kavim).
      → Pattern : illumination network par axes definis.
      cf. EC-H2S11-191 (perek 07b) sur 3 kelilan be-3.
    type: axiome_explicite
    concepts:
      - {id: 7_ketarim_eclairent_par_kavim_droit_gauche_centre, role: 7_ketarim_eclairent_par_3_kavim_droit_gauche_centre}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states", "sefirot_hierarchy"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : irradiation par 3 axes. Pattern illumination network."

  # ─── BLOC C : CAS 2 SIGAN BGD ───

  - id: "EC-H3S12-091"
    source_he: "וכפי הספק הב' שסימנו בג\"ד הנה אז עלו האורות דאחור דכתרים דחו\"ב דב\"ן למעלה ברישא דעתיק ועכ\"ז המה מאירין מלמעלה (ממנו) למטה בדרך קוין בגופא דעתיק"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      CAS 2 (sigan BGD) : orots ahor HB BaN MONTENT en Rosh A"Y.
      MAIS continuent ECLAIRER TOP-DOWN par KAVIM dans gufa A"Y.
      7 ketarim restent distributed 1-1 ; eclairent l'un l'autre par kavim.
      → Architecture : reverse flow direction quand orots montent.
      → Pattern : illumination direction adapt to source position.
    type: axiome_explicite
    concepts:
