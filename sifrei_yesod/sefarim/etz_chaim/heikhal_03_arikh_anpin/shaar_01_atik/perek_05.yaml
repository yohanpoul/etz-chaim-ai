      partzufim: ["atik_yomin"]
      relevance: "Architecture : safek prophetique. Source Yeshayahu+Zohar Vayhi 98."

  - id: "EC-H3S12-098"
    source_he: "והנה יש ספק אם לקח צח א' או ב' צחות והענין הוא כי כבר בארנו שעתיק מורכב מב' בחי' שהם מ\"ה וב\"ן שהם גימטריא צ\"ח עם הכולל"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      Safek : 1 TZACH ou 2 TZACHOT ?
      Atik = MaH+BaN qui est GEMATRIYA TZ"CH (98) avec KOLLEL.
      MaH (45) + BaN (52) + 1 (kollel) = 98 = TZACH.
      → Architecture : Atik = composition gematriya 98.
      → Pattern : letter-mysticism = identity du partzuf.
    type: déduction_logique
    concepts:
      - {id: atik_egal_98_mah_plus_ban_plus_kollel, role: atik_gematriya_98_tzach_mah_plus_ban_plus_kollel}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : Atik = gematriya 98. Pattern letter-mysticism identity."

  - id: "EC-H3S12-099"
    source_he: "והיה אפשר לומר שאין ברישא דעתיק רק כתר דב\"ן וכתר דמ\"ה והרי צח א' או אם נאמר שג\"כ עולין חו\"ב דב\"ן והם מתחברים עם חו\"ב דכתר דמ\"ה והרי צח א' והם ב' צחין ובענין א\"א ואו\"א יתבאר ענין עתיק יותר"
    source_ref: "Heikhal 3, Sha'ar 1:5"
    assertion: |
      OPTIONS :
      A) Rosh A"Y = seulement Keter BaN + Keter MaH = 1 TZACH.
      B) Aussi HB BaN + HB MaH = 1 second tzach → 2 TZACHIN.
      Ce sera plus expliqué dans Sha'ar A"A et Sha'ar AVI.
      → Architecture : 2 hypotheses sur structure interne d'Atik (1 vs 2 tzachot).
      → Pattern : safek persistant inter-perek inter-sha'ar.
      cf. EC-H3S12-085 (perek 04b) sur M"K author safek similar.
