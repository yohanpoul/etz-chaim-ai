assertions:

  # ─── BLOC A : RESUME ───

  - id: "EC-H3S12-086"
    source_he: "והרי נתבאר הספיקות שיש ברישא דעתיק ועתה נבאר בחי' ז' כתרים של ז\"ת שהם מלכים שמתו ואמרנו לעיל שאפשר שעלו בעתיק"
