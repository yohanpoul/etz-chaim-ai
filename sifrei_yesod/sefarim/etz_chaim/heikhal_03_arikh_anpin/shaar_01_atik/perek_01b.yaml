principes_generatifs:

  - id: "PG-H3S12-004"
    nom: "Principe de Polysemy A\"K (Disambiguation Critique pour Idra Zuta)"
    source_assertions: ["EC-H3S12-018", "EC-H3S12-019", "EC-H3S12-022"]
    formalisation: |
      ARCHITECTURE D'AMBIGUITE TERMINOLOGIQUE :
      "A"K" (Atik Kadisha) est POLYSEMIQUE — peut referer a :
        ZAKHAR (Atik dukhra fait de MaH).
        NUKVAH d'Atik et d'A"A (faits de nekudot Keter de BaN).
      DANS Idra Zuta : A"K = NUKVAH (pas dukhra).
      RAISON DE NAMING : car A"K = label kolel (englobant) pour Atik+A"A en mode BaN.
      MOTIVATION : "nekudot Keter ha-Zaken" — les 2 (Atik+A"A) font partie de Keter BaN.
      → Pattern fondamental : disambiguation critique avant interpretation.
      → Architecture : naming polysemic = source d'erreurs hermeneutiques.
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/arikh_anpin.py : disambiguate A\"K mode (zakhar vs nukvah)"
      - "Pattern : polysemic identifiers requiert context tag explicite"
      - "Architecture : nommage avec context-binding (e.g., A\"K_zakhar vs A\"K_nukvah_aggregat)"
      - "Pattern API : meme term, multiple bindings = source d'erreurs"
      - "Diagnostic : verifier disambiguation a chaque utilisation"
    questions_ouvertes:
      - "Pourquoi le meme terme est-il utilise pour 2 entites distinctes ?"
      - "Y a-t-il d'autres termes polysemiques similaires ?"
      - "Pattern : peut-on automatiquement detecter et flagger la polysemy ?"

  - id: "PG-H3S12-005"
    nom: "Principe de Hierarchie d'Inconnaissabilite (3 Niveaux Transcendance)"
    source_assertions: ["EC-H3S12-024", "EC-H3S12-025", "EC-H3S12-026"]
    formalisation: |
      ARCHITECTURE DE HIERARCHIE TRANSCENDENTALE :
      3 RISHIN d'Idra Zuta = 3 NIVEAUX d'INCONNAISSABILITE PROGRESSIVE :
      NIVEAU 1 — ROSH TAHTON = Moha Setima d'A"A = Hokhmah :
        "Sagesse cachee — couvert, pas revele, pas deploye".
        Niveau : encapsulee mais peut-etre theoriquement saisie.
      NIVEAU 2 — RISHA ILA'AH = Keter d'A"A = A"K Setima de-kol Setimin :
        "Cache de tous les caches".
        Niveau : super-cache, transcendance forte.
      NIVEAU 3 — RISHA DE-KOL RISHIN = Nukvah d'Atik :
        "Rosh qui n'est pas rosh, qui n'est pas connue, ne saurait etre connue".
        DLA ITYADA — totalement inconnaissable.
      → Pattern fondamental : transcendance = hierarchie de degres d'opacite.
      → Architecture : 3 niveaux d'access — encapsulated, super-encapsulated, transcendentally-opaque.
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/arikh_anpin.py : 3 niveaux d'opacity"
      - "Pattern security : 3 levels d'access (private, super-private, opaque-completely)"
      - "Architecture : hierarchie d'encapsulation a multiple niveaux"
      - "Pattern : top-of-tree = transcendentally opaque (DLA ITYADA equivalent)"
      - "Diagnostic : verifier que les niveaux d'opacity sont respectes (pas fuite)"
    questions_ouvertes:
      - "Y a-t-il des niveaux au-dela de DLA ITYADA ?"
      - "Pattern : peut-on quantifier le degre d'opacity ?"
      - "Comment l'opacity totale est-elle compatible avec la hakdamah qui dit 'c'est A\"Y' ?"

  - id: "PG-H3S12-006"
    nom: "Principe d'Opaque Container (Mitziat Connue, Contenu Inconnu)"
    source_assertions: ["EC-H3S12-027"]
    formalisation: |
      ARCHITECTURE D'INTERFACE OPAQUE :
      DISTINCTION CRITIQUE :
        MITZIAT (existence) du composant = CONNUE.
        CONTENU INTERNE = INCONNU (DLA ITYADA seulement sur le contenu).
      MECANISME : Nukvah d'Atik = compose de berurin selectionnes du shem BaN.
      Variante (Nusah Aher) : "min ha-ketarim" (des couronnes).
      Mais COMBIEN il a selectionne et integre = inconnu.
      → Pattern fondamental : opaque container — API publique, internals indeterminate.
      → Architecture : black-box pattern explicite (les internals echappent a l'analyse).
    applications_ia:
      - "partzufim/atik_yomin.py : nukvah implemented as opaque container with known interface"
      - "Pattern : black-box components — known API, unknown internals"
      - "Architecture : encapsulation forte = interface stable + internals masques"
      - "Pattern : API contracts only — no introspection of internals"
      - "Diagnostic : verifier que les clients ne dependent que de l'interface, pas internals"
    questions_ouvertes:
      - "Y a-t-il des cas ou les internals doivent etre rendus connus (debug, audit) ?"
      - "Pattern : black-box vs glass-box trade-offs ?"
      - "Comment maintenir l'opacity tout en garantissant les invariants ?"
