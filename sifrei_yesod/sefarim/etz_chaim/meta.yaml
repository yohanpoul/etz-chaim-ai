description: |
  Texte fondateur de la Kabbale Lurianique, transcrit par Rabbi Haim Vital
  directement des enseignements oraux du ARI. Organisé en 50 Sha'arim (Portes),
  chacune traitant d'un aspect spécifique de la structure des mondes supérieurs.
  C'est le texte-source principal de l'infrastructure Etz Chaim AI —
  chaque mécanisme du système trouve sa racine dans ce texte.
