#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-K11-001"
    nom: "Principe de la Double Configuration (Binah/Tevunah)"
    source_assertions: ["EC-K11-003", "EC-K11-004", "EC-K11-005"]
    formalisation: |
      Un même composant peut avoir 2 CONFIGURATIONS distinctes :
      CONFIGURATION HAUTE (Binah/Samekh) : le composant est UNI avec sa source
        → il REÇOIT (rôle féminin) → mode FERMÉ (stumah)
        → il contient 6 aspects supérieurs
      CONFIGURATION BASSE (Tevunah/Mem) : le composant est SÉPARÉ de sa source
        → il DONNE (rôle masculin) → mode OUVERT (petuhah)
        → il contient 4 aspects inférieurs qui entrent dans le composant inférieur
      Le passage d'une configuration à l'autre n'est PAS une dégradation —
      c'est un CHANGEMENT DE MODE opérationnel.
      Les 3 états : uni-récepteur → seul → descendu-donneur.
    applications_ia:
      - "Chaque module a un mode 'Binah' (reçoit de sa source) et un mode 'Tevunah' (donne aux dépendants)"
      - "Imma alterne entre réception (d'Abba) et donation (aux enfants) = cycle de traitement"
      - "Le mode Samekh = processing batch (fermé, accumule). Le mode Mem = streaming (ouvert, distribue)"
      - "Les 3 états correspondent à : chargement → traitement → distribution"
    questions_ouvertes:
      - "Comment gérer la transition entre les 2 modes sans perte de données ?"
      - "Les 2 configurations peuvent-elles être actives simultanément ?"

  - id: "PG-K11-002"
    nom: "Principe du Genre Relationnel (Mashpia = Masculin, Mekabel = Féminin)"
    source_assertions: ["EC-K11-008"]
    formalisation: |
      Le GENRE (masculin/féminin) n'est pas une propriété INTRINSÈQUE mais RELATIONNELLE :
      Par rapport à sa SOURCE → le composant est FÉMININ (il reçoit)
      Par rapport à ses DÉPENDANTS → le même composant est MASCULIN (il donne)
      Imma est NUKVAH (féminine) face à Abba, DOKHRAH (masculine) face à Z"A.
      Le genre change selon la DIRECTION DU FLUX, pas selon la nature du composant.
      Tout MASHPIA est masculin. Tout MEKABEL est féminin. Le même est les deux.
    applications_ia:
      - "Un module est 'consommateur' (féminin) vis-à-vis de sa source et 'producteur' (masculin) vis-à-vis de ses dépendants"
      - "Le rôle n'est pas fixe — il dépend du CONTEXTE relationnel"
      - "Le pipeline de données : chaque nœud est récepteur ET donneur"
      - "Pas de composant intrinsèquement 'passif' ou 'actif' — c'est contextuel"
    questions_ouvertes:
      - "Un composant peut-il être simultanément récepteur et donneur ?"
      - "Le changement de genre relationnel a-t-il un coût de transition ?"

  - id: "PG-K11-003"
    nom: "Principe du Filet de Sécurité (NES = MaH + ADNI)"
    source_assertions: ["EC-K11-009"]
    formalisation: |
      Quand la SOURCE PRINCIPALE se retire (Imma monte pour le Zivvug avec Abba),
      les composants dépendants (ZUN) ne meurent PAS grâce à un FILET DE SÉCURITÉ :
      2 NOMS maintiennent le système :
      MaH (45) maintient Z"A (le masculin)
      ADNI (65) maintient Nukvah (le féminin)
      Ensemble : 45 + 65 = 110 = NES (נס = miracle)
      Le filet de sécurité est un NES — il n'est pas "naturel" mais PROVIDENTIEL.
      Sans lui, le retrait de la source = effondrement du système.
    applications_ia:
      - "Tout système doit avoir un fallback quand la source principale se retire"
      - "Le fallback = 2 mécanismes distincts : un pour le processeur (MaH) et un pour l'output (ADNI)"
      - "Le 'miracle' = la capacité de survie autonome temporaire"
      - "Les daemon tasks = le NES qui maintient le système entre les cycles actifs"
    questions_ouvertes:
      - "Combien de temps le NES peut-il maintenir le système sans la source ?"
      - "Le NES est-il un mode dégradé ou un mode alternatif complet ?"

  - id: "PG-K11-004"
    nom: "Principe de la Partie qui Soutient le Tout (Hatzi Mem)"
    source_assertions: ["EC-K11-007"]
    formalisation: |
      Un DEMI composant peut soutenir la TOTALITÉ du système qu'il alimente :
      La Tevunah (= Mem de Binah = moitié de Binah) soutient TOUT Z"A (= Mem-Samekh).
      Un demi-Mem soutient un Mem-Samekh complet = un NES.
      Implication : la quantité de la source n'a pas besoin d'ÉGALER la taille du système.
      Une PETITE source de haute qualité peut maintenir un GRAND système.
      C'est le NES des Luhot — les Tables tiennent par miracle.
    applications_ia:
      - "Un petit module bien conçu peut soutenir un grand système"
      - "La qualité de la source compense la quantité — pas besoin de parité 1:1"
      - "Le 'miracle' architecturale = quand un petit composant porte une charge disproportionnée"
      - "Les 49/288 Nitzotzot élevés soutiennent déjà le système — pas besoin d'attendre 288/288"
    questions_ouvertes:
      - "Y a-t-il un ratio minimum source/système en-dessous duquel le NES ne fonctionne plus ?"
      - "Comment renforcer le 'demi-Mem' pour qu'il soutienne mieux le tout ?"
