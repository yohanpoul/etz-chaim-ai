relations:

  - id: "REL-K12-001"
    type: causal
    from: malkhut_tevunah
    to: leah
    nature: "Leah sort de la Haarah de Malkhut de Tevunah dans le Da'at de Z\"A"
    assertions_source: ["EC-K12-001"]

  - id: "REL-K12-002"
    type: contenance
    from: leah_ad_hazeh
    to: rachel_me_hazeh
    nature: "Leah du Da'at à la Hazeh, Rachel de la Hazeh vers le bas — sans chevauchement"
    assertions_source: ["EC-K12-004"]

  - id: "REL-K12-003"
    type: causal
    from: hakaat_nimin
    to: arba_batim
    nature: "Les Nimin de A\"A frappent la tête de Z\"A → les 4 Mohin sortent comme Tefillin"
    assertions_source: ["EC-K12-003"]

  - id: "REL-K12-004"
    type: dualité_structurelle
    paire: [leah_from_hgt, rachel_from_nhy]
    nature: "Leah = de CHaGaT de Z\"A (Hassadim couverts), Rachel = de NHY (Hassadim découverts)"
    assertions_source: ["EC-K12-006", "EC-K12-008"]

  - id: "REL-K12-005"
    type: séquentiel
    from: zivvug_leah_nuit
    to: zivvug_rachel_jour
    nature: "La nuit = Zivvug avec Leah, le jour = Zivvug avec Rachel — alternance cyclique"
    assertions_source: ["EC-K12-007"]

  - id: "REL-K12-006"
    type: transformation
    from: tefillin_lamed
    to: tefillin_tzadi
    nature: "Les Tefillin passent du niveau Lamed (au-dessus) au niveau Tzadi (sur la tête)"
    assertions_source: ["EC-K12-009"]

  - id: "REL-K12-007"
    type: transformation
    from: makif_to_pnimi
    to: shabbat_no_tefillin
    nature: "Le Shabbat les Mohin Makif deviennent Pnimim → plus besoin de Tefillin physiques"
    assertions_source: ["EC-K12-010"]

  - id: "REL-K12-008"
    type: flux
    from: rachel_from_leah
    to: tefillin_yad
    nature: "Rachel prend ses Mohin de Leah à minuit → les Tefillin Shel Yad sont posés en premier"
    assertions_source: ["EC-K12-011"]


# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-K12-001"
    nom: "Principe des 2 Nukvot Complémentaires (Leah/Rachel)"
    source_assertions: ["EC-K12-004", "EC-K12-006", "EC-K12-008"]
    formalisation: |
      Un système masculin (Z"A) peut avoir 2 COMPOSANTS FÉMININS complémentaires :
      NUKVAH SUPÉRIEURE (Leah) : formée des parties COUVERTES de Z"A (CHaGaT)
        → plus de DINIM (non adoucis) → nécessite un Zivvug spécial pour adoucir
        → "Humilité" — elle est cachée
      NUKVAH INFÉRIEURE (Rachel) : formée des parties DÉCOUVERTES de Z"A (NHY)
        → Dinim ADOUCIS par les Hassadim découverts
        → "Crainte" — elle est visible
      "Ein Malkhut noga'at" — elles ne se CHEVAUCHENT JAMAIS.
      Le TALON de la supérieure = la COURONNE de l'inférieure — continuité parfaite.
    applications_ia:
      - "Un module peut avoir 2 interfaces : une interne (Leah, cachée) et une externe (Rachel, visible)"
      - "L'interface interne a plus de 'Dinim' (contraintes strictes) que l'externe"
      - "Les 2 interfaces ne se chevauchent pas — séparation nette à la Hazeh"
      - "Leah = backend (couvert), Rachel = frontend (découvert)"
    questions_ouvertes:
      - "Tous les modules ont-ils besoin de 2 interfaces ?"
      - "La frontière (Hazeh) entre les 2 est-elle fixe ou mobile ?"

  - id: "PG-K12-002"
    nom: "Principe du Cycle Jour/Nuit (Alternance des Zivvugim)"
    source_assertions: ["EC-K12-007"]
    formalisation: |
      Le système fonctionne par ALTERNANCE CYCLIQUE entre 2 modes de Zivvug :
      MODE NUIT (Arvit) : Zivvug avec le composant INTERNE (Leah)
        → adoucissement des Dinim internes
        → traitement des aspects cachés/couverts
      MODE JOUR (Shaharit+Minhah) : Zivvug avec le composant EXTERNE (Rachel)
        → interaction avec le monde visible
        → production d'output
      L'alternance est NÉCESSAIRE — les 2 modes ne sont pas interchangeables.
      Après une crise (Hurban) → le mode nuit devient OBLIGATOIRE (plus de Dinim).
    applications_ia:
      - "Le système doit alterner entre traitement interne (nuit/batch) et production externe (jour/live)"
      - "Les daemon tasks de nuit = Zivvug avec Leah (maintenance, adoucissement)"
      - "Les processus de jour = Zivvug avec Rachel (output, interaction)"
      - "Après un incident (Hurban) → augmenter le traitement nocturne"
    questions_ouvertes:
      - "Le ratio nuit/jour optimal est-il 50/50 ou variable ?"
      - "Comment détecter qu'un 'Hurban' a eu lieu et qu'Arvit doit devenir obligatoire ?"

  - id: "PG-K12-003"
    nom: "Principe de la Transition Makif→Pnimi (Le Shabbat du Système)"
    source_assertions: ["EC-K12-009", "EC-K12-010"]
    formalisation: |
      Les éléments qui sont MAKIF (extérieurs/environnants) en mode opérationnel
      peuvent devenir PNIMI (intérieurs/intégrés) en mode de repos/renouvellement.
      En SEMAINE : les Mohin du Lamed restent AU-DESSUS de la tête (Makif)
        → ils servent de Tefillin (structure externe)
      Le SHABBAT : ces Mohin DESCENDENT dans la tête (Pnimi)
        → "Panim Hadashot" = faces nouvelles
        → les Tefillin externes ne sont plus nécessaires
      Le "Shabbat" d'un système = le moment où les structures externes sont INTÉRIORISÉES.
      Ce qui était scaffolding devient infrastructure.
    applications_ia:
      - "Le 'Shabbat' du système = le moment où les outils externes sont intégrés en features natifs"
      - "Les Makifim (wrappers, adaptateurs) deviennent Pnimim (code natif intégré)"
      - "Le refactoring périodique = intérioriser les Makifim"
      - "Les 'Panim Hadashot' du Shabbat = les nouvelles capacités après intériorisation"
    questions_ouvertes:
      - "À quelle fréquence le système devrait-il avoir un 'Shabbat' (intériorisation) ?"
      - "L'intériorisation est-elle irréversible ?"
