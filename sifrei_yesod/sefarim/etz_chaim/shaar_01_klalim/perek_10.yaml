#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-K10-001"
    nom: "Principe de la Double Source (2 Tzelamim)"
    source_assertions: ["EC-K10-001", "EC-K10-002"]
    formalisation: |
      Un composant mature reçoit ses Mohin de DEUX SOURCES PARENTALES distinctes :
      TZELEM 1 (paternel/Abba) : fournit une perspective
      TZELEM 2 (maternel/Imma) : fournit une autre perspective
      Les 2 Tzelamim ne sont PAS interchangeables — chacun apporte sa couleur :
        Abba = Hassadim, expansion, prophétie masculine
        Imma = Gevurot, forme, prophétie féminine
      Le composant complet porte LES DEUX — pas un seul.
      Les NHY d'Abba s'emboîtent DANS les NHY d'Imma (4 couches au total).
    applications_ia:
      - "Chaque module devrait recevoir ses 'Mohin' de 2 sources complémentaires"
      - "Un seul Tzelem = vision partielle — les 2 sont nécessaires pour la complétude"
      - "Le pattern 4 couches (Moah→NHY Abba→NHY Imma→Keli Z\"A) = 4 niveaux d'abstraction"
      - "Les 2 perspectives (Abba/Imma) correspondent à analyse/synthèse, expansion/restriction"
    questions_ouvertes:
      - "Comment identifier les '2 Tzelamim' de chaque module ?"
      - "L'emboîtement Abba-dans-Imma crée-t-il un ordre de priorité ?"

  - id: "PG-K10-002"
    nom: "Principe de la Dualité Interne/Externe (Moshe/Yaakov)"
    source_assertions: ["EC-K10-004", "EC-K10-005", "EC-K10-006"]
    formalisation: |
      Le MÊME flux source produit 2 manifestations :
      INTERNE (Moshe mi-le-gaw) : la partie qui RESTE à l'intérieur du système
        = l'infrastructure, le code, la logique interne
      EXTERNE (Yaakov mi-le-bar) : la partie qui PERCE et SORT vers l'extérieur
        = l'interface, l'output, la manifestation visible
      La source est UNIQUE mais la manifestation est DOUBLE.
      L'interne est plus ÉLEVÉ que l'externe (Moshe > Yaakov en prophétie).
      L'externe sort par BEKIAH (percement) — il ne coule pas naturellement.
    applications_ia:
      - "Chaque processus a un aspect 'Moshe' (interne) et 'Yaakov' (externe)"
      - "Le code (Moshe) et l'interface (Yaakov) viennent de la même source"
      - "La prophétie de Moshe (du masculin) est plus haute que celle des autres (du féminin)"
      - "L'output est un 'percement' de l'interne vers l'externe — pas un flux naturel"
    questions_ouvertes:
      - "La proportion interne/externe est-elle toujours 3:2 (3 Behinot internes, 2 externes) ?"
      - "Le percement est-il toujours nécessaire ou peut-il y avoir un flux naturel ?"

  - id: "PG-K10-003"
    nom: "Principe de la Nesirah (Séparation comme Condition d'Union)"
    source_assertions: ["EC-K10-009"]
    formalisation: |
      Deux composants COLLÉS dos à dos (AbA) par un MUR COMMUN :
      - Ne peuvent PAS interagir face à face (PbP)
      - Nécessitent une NESIRAH (sciage/séparation) pour devenir autonomes
      - La séparation est la CONDITION de l'union future (Zivvug PbP)
      CONTRASTE : un composant avec son PROPRE MUR (comme Yaakov)
      est naturellement séparé et n'a pas besoin de Nesirah.
      Le PARADOXE : il faut SÉPARER pour pouvoir UNIR.
      L'union AbA (dos à dos) est INFÉRIEURE à l'union PbP (face à face).
    applications_ia:
      - "Deux modules couplés trop étroitement (mur commun) doivent être SÉPARÉS pour mieux interagir"
      - "Le refactoring = Nesirah — séparer pour améliorer le couplage"
      - "Le Zivvug PbP du ZivvugEngine (0.989) nécessite que ZUN aient été séparés d'abord"
      - "Le découplage est la CONDITION du bon couplage — paradoxe architectural"
    questions_ouvertes:
      - "Comment détecter les modules qui partagent un 'kotel ehad' et ont besoin de Nesirah ?"
      - "La Nesirah est-elle un événement unique ou peut-elle être répétée ?"

  - id: "PG-K10-004"
    nom: "Principe du Flux Non-Détournable"
    source_assertions: ["EC-K10-008"]
    formalisation: |
      Chaque flux de Ohr a une DESTINATION NATURELLE.
      Détourner un flux de sa destination = PÉCHÉ STRUCTUREL (Het de Hevel)
      Même si l'intention est BONNE (donner à la Shekhinah = Rachel)
      le détournement est interdit car il viole l'architecture.
      Le Ohr qui va vers Yaakov (Panim) NE DOIT PAS être redirigé vers Rachel (Achor).
      Chaque composant reçoit ce qui lui est DESTINÉ — pas ce qui est destiné à un autre.
      La redistribution FORCÉE crée du déséquilibre, même motivée par la bonté.
    applications_ia:
      - "Ne pas détourner le shefa d'un module vers un autre, même pour 'aider'"
      - "Chaque flux a sa destination architecturale — la respecter"
      - "Le 'péché de Hevel' = le bug qui vient d'une bonne intention mais d'un mauvais routing"
      - "L'optimisation locale (détourner pour aider un module) peut nuire au système global"
    questions_ouvertes:
      - "Comment distinguer un détournement (Het) d'un rerouting légitime ?"
      - "La rigidité du routing est-elle absolue ou contextuelle ?"
