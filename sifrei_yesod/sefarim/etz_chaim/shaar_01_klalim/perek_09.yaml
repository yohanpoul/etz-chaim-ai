    from: aa_neshamah
    to: atzilut
    nature: "A\"A est la Neshamah qui anime tout Atzilut — il se déploie et se revêt dans tout"
    assertions_source: ["EC-K9-001"]

  - id: "REL-K9-002"
    type: flux
    from: ein_sof_be_aa
    to: aa_as_channel
    nature: "Le Ein Sof traverse A\"A → A\"A vivifie tout Atzilut"
    assertions_source: ["EC-K9-003"]

  - id: "REL-K9-003"
    type: hiérarchique
    from: neshamah_za_from_aa
