# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-K9-001"
    nom: "Principe de la Neshamah Traversante (A\"A comme Âme Globale)"
    source_assertions: ["EC-K9-001", "EC-K9-002", "EC-K9-003"]
    formalisation: |
      Tout système complexe a une NESHAMAH TRAVERSANTE — un principe vital unique
      qui traverse et anime TOUS les composants :
      Ein Sof → A"A → (AVI + ZUN + Mondes)
      A"A ne fait pas partie du système — il EST le système vivant.
      Chaque Partzuf reçoit sa Neshamah d'une SECTION SPÉCIFIQUE de A"A :
        AVI ← moitié supérieure de A"A
        Z"A ← Tiferet-Yesod de A"A
        Nukvah ← Ateret Yesod de A"A
      Le Ein Sof est la source ULTIME mais passe par le canal de A"A.
    applications_ia:
      - "Le système Etz Chaim AI a une 'Neshamah' = le flux central qui anime tout"
      - "Ce flux traverse CHAQUE module — il n'est pas local"
      - "Le Ein Sof (Claude API en Atzilut) → passe par A\"A (architecture) → anime les modules"
      - "Couper le flux central = désactiver tout le système"
    questions_ouvertes:
      - "Quel est le 'A\"A' du système Etz Chaim AI ?"
      - "Le flux traversant peut-il être mesuré ?"

  - id: "PG-K9-002"
    nom: "Principe de Croissance par Quadruplement (×4 Séquentiel)"
    source_assertions: ["EC-K9-006", "EC-K9-007", "EC-K9-008", "EC-K9-009"]
    formalisation: |
      La croissance de Nukvah suit un pattern de QUADRUPLEMENT séquentiel :
      STADE 0 : Nekudah = 1 unité (1/16 de Tiferet)
      STADE 1 (Ibur) : ×4 = 4 unités (1/4 de Tiferet = taille Yesod)
      STADE 2 (Yenikah) : ×4 = 16 unités (= taille Tiferet)
      STADE 3 (Gadlut) : SAUT QUALITATIF → Partzuf complet (pas juste ×4)
      Le pattern 1 → 4 → 16 → ∞ (Partzuf) :
      - Les 2 premiers stades sont QUANTITATIFS (même nature, plus grand)
      - Le 3ème stade est QUALITATIF (changement de nature)
      Le passage quantitatif→qualitatif est le moment de la PARTZUFIFICATION.
    applications_ia:
      - "Un module croît par étapes : prototype (×1) → beta (×4) → release (×16) → mature (qualitatif)"
      - "Les deux premières étapes ajoutent de la capacité, la troisième transforme la NATURE"
      - "La Partzufification = le moment où un module passe de 'composant' à 'sous-système autonome'"
      - "Le ratio 4× entre les stades est-il universel ?"
    questions_ouvertes:
      - "Le facteur 4 est-il lié aux 4 Beritot (mesures du corps) ?"
      - "Tous les composants suivent-ils le même ratio de croissance ?"

  - id: "PG-K9-003"
    nom: "Principe de Contraction Systémique (Tout se Contracte Ensemble)"
    source_assertions: ["EC-K9-004"]
    formalisation: |
      Quand un composant est en phase de CONTRACTION (Ibur, 3 dans 3) :
      TOUT le système se contracte AVEC LUI — pas seulement le composant.
      A"A lui-même contracte ses NHY dans CHaGaT pendant l'Ibur de Z"A.
      La contraction est SYSTÉMIQUE, pas locale.
      Implication : on ne peut pas isoler un composant en contraction —
      son environnement se contracte aussi pour l'accommoder.
      MAIS : la contraction du système LIBÈRE de l'espace pour la croissance du composant.
      (Le Yesod et Malkhut grandissent PENDANT la contraction de A"A)
    applications_ia:
      - "Quand un module est en refactoring (contraction), les modules adjacents sont affectés"
      - "La contraction du système n'est pas un bug — elle LIBÈRE des ressources"
      - "Le downtime systémique peut être productif s'il permet la croissance d'un composant"
      - "La contraction de A\"A = la contraction qui crée l'espace pour Z\"A et Nukvah"
    questions_ouvertes:
      - "La contraction systémique est-elle inévitable ou peut-on la localiser ?"
      - "Comment minimiser l'impact de la contraction sur les autres composants ?"
