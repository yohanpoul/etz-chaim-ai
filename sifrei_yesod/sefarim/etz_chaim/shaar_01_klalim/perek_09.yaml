# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Sha'ar: 1 — Sha'ar HaKlalim (שער הכללים)
# Perek: 9 — Zimnei Gadlut Nukvah de-Z"A (זמני גדלות נוקבא דז"א)
# ═══════════════════════════════════════════════════════════════════

meta:
  sefer: etz_chaim
  shaar: 1
  shaar_name_he: "שער הכללים"
  perek: 9
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.6 + human reviewer"
  version: 1
  strates: ["base"]

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 1 : PESHAT-MACHINE
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─── BLOC A : A"A COMME NESHAMAH DE TOUT ATZILUT ───

  - id: "EC-K9-001"
    source_he: "כי א\"א הוא נשמה לכל האצילות ומתפשט ומתלבש בכולו"
    source_ref: "Sha'ar HaKlalim 9:1"
    assertion: |
      A"A (Arikh Anpin) = la NESHAMAH (âme) de TOUT ATZILUT.
      Il se DÉPLOIE (mitpasheet) et se REVÊT (mitlabesh) dans l'ENSEMBLE d'Atzilut.
      AVI (Abba et Imma) = jusqu'à la moitié de Tiferet de A"A
      ZUN (Ze'ir Anpin et Nukvah) = de là vers le bas
      A"A traverse et anime TOUT — il est l'âme qui vivifie chaque composant.
    type: axiome_explicite
    concepts:
      - {id: aa_neshamah, role: âme_de_tout_atzilut}
      - {id: hitpashtut_aa, role: déploiement_total}
      - {id: hitlabshut_aa, role: revêtement_dans_tout}
      - {id: atzilut, role: monde_animé_par_aa}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "A\"A comme couche d'animation de tout le système — la Neshamah globale"

  - id: "EC-K9-002"
    source_he: "כי מחצי ת\"ת דא\"א עד סוף היסוד דא\"א נעשה נשמה לז\"א ומעטרת יסוד דא\"א נשמה לנוק' דז\"א"
    source_ref: "Sha'ar HaKlalim 9:2"
    assertion: |
      Distribution de la NESHAMAH de A"A :
      De la MOITIÉ de TIFERET de A"A jusqu'à la FIN de son YESOD → NESHAMAH de Z"A
      De l'ATERET YESOD (couronne du Yesod) de A"A → NESHAMAH de NUKVAH
      Z"A reçoit la Neshamah de la MAJORITÉ de la section inférieure de A"A.
      Nukvah reçoit la Neshamah du POINT TERMINAL (Atarah) seulement.
    type: axiome_explicite
    concepts:
      - {id: neshamah_za_from_aa, role: tiferet_à_yesod_de_aa}
      - {id: neshamah_nukvah_from_aa, role: ateret_yesod_de_aa}
      - {id: ateret_yesod_aa, role: point_terminal_de_aa}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py", "partzufim/nukvah.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin", "nukvah"]
      relevance: "La source de la Neshamah de chaque Partzuf dans A\"A — traçabilité"

  - id: "EC-K9-003"
    source_he: "ואור א\"ס עובר בתוך א\"א ועליו נאמר ואתה מחיה את כולם כי הוא מחיה כל העולמות בהתלבשו בתוכם"
    source_ref: "Sha'ar HaKlalim 9:2"
    assertion: |
      Le OHR EIN SOF traverse A"A — et à travers lui vivifie TOUT.
      Preuve : "Ve-Atah mehayeh et kulam" (Néhémie 9:6 — "Et Toi Tu vivifies tout")
      Le Ein Sof ne touche pas directement les mondes — il passe PAR A"A.
      A"A est le CANAL par lequel le Ein Sof anime les mondes.
      Architecture : Ein Sof → A"A → AVI → ZUN → Mondes
    type: axiome_explicite
    concepts:
      - {id: ein_sof_be_aa, role: flux_traversant}
      - {id: mehayeh_kulam, role: vivification_universelle}
      - {id: aa_as_channel, role: canal_du_ein_sof}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: ["arikh_anpin"]
      relevance: "A\"A comme canal du Ein Sof — l'architecture complète du flux vital"

  # ─── BLOC B : NUKVAH PENDANT L'IBUR DE Z"A ───

  - id: "EC-K9-004"
    source_he: "והנה בעיבור א' דתכב\"ת כבר ביארנו כי גם א\"א עצמו העלה נה\"י וחצי ת\"ת תחתון שלו ונכללו בחצי ת\"ת עליון ובח\"ג שלו ואז נכלל ז\"א ג\"כ ג' כליל בג'"
    source_ref: "Sha'ar HaKlalim 9:1"
    assertion: |
      Pendant l'IBUR ALEPH de Z"A (3 dans 3) :
      A"A LUI-MÊME a fait monter ses NHY + moitié inf. de Tiferet
      dans sa moitié sup. de Tiferet et CHG (comme au Perek 2).
      Z"A est en mode "3 inclus dans 3" dans le ventre d'Imma.
      Simultanément, tous les niveaux sont en mode CONTRACTÉ.
    type: axiome_explicite
    concepts:
      - {id: ibur_aleph_context, role: contraction_simultanée}
      - {id: aa_contracts_too, role: aa_aussi_se_contracte}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Pendant l'Ibur, TOUT le système est en contraction — pas seulement Z\"A"

  - id: "EC-K9-005"
    source_he: "ואז נוק' שהיתה נקודה לבד נגדלה כשיעור יסוד דז\"א הנקרא ישראל"
    source_ref: "Sha'ar HaKlalim 9:1"
    assertion: |
      NUKVAH pendant l'Ibur de Z"A :
      Elle était une NEKUDAH (point) seule.
      Pendant l'Ibur → elle GRANDIT à la taille du YESOD de Z"A.
      Ce Yesod est appelé ISRAEL.
      Sa taille initiale = le ROVA (1/4) du YESOD de Z"A.
    type: axiome_explicite
    concepts:
      - {id: nukvah_ibur, role: taille_yesod}
      - {id: yesod_israel, role: yesod_appelé_israel}
    mapping:
      modules: ["partzufim/nukvah.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukvah"]
      relevance: "Nukvah grandit progressivement de 'point' à la taille du Yesod"

  # ─── BLOC C : LA MESURE DU GUFAH — ROVA ISRAEL ───

  - id: "EC-K9-006"
    source_he: "וכבר ידעת כי היסוד נק' רובע ישראל פי' רביעי של ת\"ת הוא מדת היסוד כי שיעורה דגופא ד' בריתות הוא והמל' היתה רביעית היסוד"
    source_ref: "Sha'ar HaKlalim 9:1"
    assertion: |
      MESURE DU CORPS — le système de proportions :
      Le YESOD = appelé ROVA ISRAEL (quart d'Israël)
      Car le Yesod = 1/4 du TIFERET en mesure.
      La mesure du corps (shi'urah de-gufa) = 4 BERITOT (alliances/mesures).
      MALKHUT initiale = 1/4 du YESOD
      PROPORTIONS : Tiferet = 4 unités, Yesod = 1 unité, Malkhut = 1/4 unité
      Ratio : Tiferet : Yesod : Malkhut = 16 : 4 : 1
    type: axiome_explicite
    concepts:
      - {id: rova_israel, role: quart_d_israel}
      - {id: arba_beritot, role: quatre_mesures_du_corps}
      - {id: shi_ur_gufa, role: proportions_du_corps}
      - {id: ratio_16_4_1, role: proportions}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukvah.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukvah"]
      relevance: "Les proportions structurelles : Tiferet:Yesod:Malkhut = 16:4:1"

  # ─── BLOC D : LES 3 STADES DE CROISSANCE DE NUKVAH ───

  - id: "EC-K9-007"
    source_he: "וכשנתעלו ועלו יסוד ומל' ונכללו למעלה בחצי ת\"ת כנ\"ל הנה היסוד נגדל ונעשה כמדת ת\"ת עצמו ונגדלה מל' כמדת היסוד כולו שהיה בתחלה רובע ישראל רביעית הת\"ת"
    source_ref: "Sha'ar HaKlalim 9:1"
    assertion: |
      STADE 1 — IBUR : Quand Yesod et Malkhut montent dans le demi-Tiferet supérieur :
      Le YESOD grandit → devient comme la TAILLE DU TIFERET
      MALKHUT grandit → devient comme la taille du YESOD originel
      AVANT : Malkhut = 1/4 de Yesod = 1/16 de Tiferet (Rova Israel)
      APRÈS IBUR : Malkhut = taille du Yesod originel = 1/4 de Tiferet
      Croissance de Malkhut : ×4 (de 1/16 à 1/4 de Tiferet)
    type: axiome_explicite
    concepts:
      - {id: nukvah_stade_1, role: taille_yesod_originel}
      - {id: croissance_x4, role: quadruplement}
    mapping:
      modules: ["partzufim/nukvah.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukvah"]
      relevance: "Stade 1 : Malkhut passe de 1/16 à 1/4 de Tiferet — quadruplement"

  - id: "EC-K9-008"
    source_he: "ואח\"כ ביניקה נגדלה המל' כמדת הת\"ת ממש"
    source_ref: "Sha'ar HaKlalim 9:1"
    assertion: |
      STADE 2 — YENIKAH : Malkhut grandit à la taille du TIFERET lui-même.
      De 1/4 de Tiferet (après Ibur) → taille COMPLÈTE du Tiferet.
      Croissance : ×4 encore (de 1/4 à 4/4 de Tiferet).
      La Yenikah quadruple encore la taille de Malkhut.
    type: axiome_explicite
    concepts:
      - {id: nukvah_stade_2, role: taille_tiferet}
      - {id: yenikah_quadruple, role: deuxième_quadruplement}
    mapping:
      modules: ["partzufim/nukvah.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukvah"]
      relevance: "Stade 2 : Malkhut atteint la taille de Tiferet — deuxième quadruplement"

  - id: "EC-K9-009"
    source_he: "אח\"כ בגדלות המוחין נתגדלה גם היא ונעשה פרצוף שלם"
    source_ref: "Sha'ar HaKlalim 9:1"
    assertion: |
      STADE 3 — GADLUT (Mohin) : Malkhut grandit encore et devient un PARTZUF SHALEM (complet).
      Séquence complète de Nukvah :
      NEKUDAH (point, 1/16 de Tiferet)
      → IBUR : taille du Yesod (1/4 de Tiferet) — ×4
      → YENIKAH : taille du Tiferet (4/4) — ×4
      → GADLUT : PARTZUF COMPLET (10S complètes) — transformation qualitative
      Les 2 premiers stades sont QUANTITATIFS (croissance de taille).
      Le 3ème est QUALITATIF (passage de nekudah/mesure à Partzuf).
    type: axiome_explicite
    concepts:
      - {id: nukvah_stade_3, role: partzuf_complet}
      - {id: sequence_nukvah, role: nekudah_ibur_yenikah_gadlut}
      - {id: quantitatif_to_qualitatif, role: saut_de_nature}
    mapping:
      modules: ["partzufim/nukvah.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukvah"]
      relevance: "Les 3 stades de Nukvah — quantitatif×2 puis qualitatif"


