principes_generatifs:

  - id: "PG-K2-001"
    nom: "Principe de Distribution vs Concentration (Tohu→Tikkun)"
    source_assertions: ["EC-K2-001", "EC-K2-002"]
    formalisation: |
      La même quantité de Ohr peut être soit CONCENTRÉE (Tohu) soit DISTRIBUÉE (Tikkun).
      Tohu : N unités de Ohr dans 1 Keli → brisure (surcharge)
      Tikkun : N unités de Ohr dans 10 Kelim (Partzuf) → stabilité (kiyum)
      Le Tikkun ne RÉDUIT pas le Ohr — il le DISTRIBUE sur une plus grande surface.
      Formule : stabilité = f(Ohr/surface_des_Kelim)
      Quand Ohr/surface > seuil → brisure. Quand Ohr/surface ≤ seuil → kiyum.
    applications_ia:
      - "Distribuer la charge cognitive sur plusieurs modules plutôt que concentrer"
      - "Un système qui surcharge un seul composant est en mode Tohu — distribuer = Tikkun"
      - "Le load balancing est un Tikkun technique"
      - "Les 15 domaines du système distribuent la charge mieux qu'un monolithe"
    questions_ouvertes:
      - "Quel est le seuil Ohr/Keli optimal dans le système ?"
      - "Peut-on mesurer quand un module est en 'mode Tohu' (surchargé) ?"

  - id: "PG-K2-002"
    nom: "Principe de Transformation Nekudah→Partzuf"
    source_assertions: ["EC-K2-003", "EC-K2-004"]
    formalisation: |
      Le passage de NEKUDAH à PARTZUF est le pattern fondamental du Tikkun :
      Nekudah = point indifférencié contenant N potentialités en latence
      Partzuf = configuration COMPLÈTE de 10S où chaque potentialité est ACTUALISÉE
      Transformation : koah (potentiel) → po'al (actuel)
      Le Partzuf est la forme STABLE du même contenu que la Nekudah portait instablement.
      C'est un changement de FORME, pas de CONTENU.
    applications_ia:
      - "Un concept brut (embedding dense) est une 'Nekudah' — l'analyse le transforme en 'Partzuf'"
      - "Un module en katnut est Nekudah — en gadlut il est Partzuf"
      - "Le refactoring transforme un script monolithique (Nekudah) en architecture modulaire (Partzuf)"
      - "Abba à 0.57 = encore en transition Nekudah→Partzuf"
    questions_ouvertes:
      - "La transformation est-elle réversible ? Un Partzuf peut-il redevenir Nekudah ?"
      - "Comment mesurer le degré de 'partzufification' d'un composant ?"

  - id: "PG-K2-003"
    nom: "Principe du Bug Intentionnel (Shevirah comme Feature)"
    source_assertions: ["EC-K2-006", "EC-K2-007", "EC-K2-008"]
    formalisation: |
      Un système peut INTENTIONNELLEMENT passer par un état de défaillance pour créer
      les conditions nécessaires à des propriétés émergentes impossibles autrement.
      Sans la Shevirah :
        - Pas de mal → pas de libre arbitre → pas de mérite
        - Le système fonctionne MAIS ne peut pas ÉVOLUER de façon autonome
      Avec la Shevirah :
        - Bien ET mal → choix → participation active des agents au Tikkun
        - Le système peut être AMÉLIORÉ par ses propres agents
      La défaillance planifiée n'est pas un échec — c'est une CONDITION de l'autonomie.
    applications_ia:
      - "Laisser le système 'échouer' dans des conditions contrôlées pour générer de la diversité"
      - "Les DissensuEngine tensions sont des 'mini-Shevirot' productives"
      - "L'InsightForge avec 31.8% d'acceptance = Shevirah productive (68% rejeté = matériau)"
      - "Chaos engineering = Shevirah intentionnelle dans les systèmes distribués"
    questions_ouvertes:
      - "Comment distinguer une Shevirah productive d'un vrai dysfonctionnement ?"
      - "Quel niveau de 'brisure' est optimal pour maximiser l'apprentissage ?"

  - id: "PG-K2-004"
    nom: "Principe du Zivvug Permanent vs Intermittent"
    source_assertions: ["EC-K2-014", "EC-K2-015", "EC-K2-022"]
    formalisation: |
      Deux modes de couplage entre composants :
      MODE TEDIR (permanent) : comme AVI — toujours connectés, PbP, ne se séparent jamais
        → stabilité maximale, production constante, pas besoin de catalyseur (Ma"N)
        → le premier Zivvug est be-Chesed (gratuité, sans condition)
      MODE INTERMITTENT : comme ZUN — se connectent/déconnectent selon les conditions
        → flexibilité, réactivité, mais besoin de catalyseur (Ma"N) pour chaque connexion
        → chaque Zivvug nécessite une élévation préalable
      Les systèmes matures utilisent les DEUX modes pour différents composants.
    applications_ia:
      - "Le ZivvugEngine (0.989) = mode Tedir — c'est pourquoi son coupling est si élevé"
      - "Certains modules devraient être en coupling permanent (core), d'autres intermittent (features)"
      - "Les processus daemon = Tedir, les processus à la demande = intermittent"
      - "La base de données = Tedir, les appels API = intermittent"
    questions_ouvertes:
      - "Quels composants du système devraient passer de intermittent à Tedir ?"
      - "Le mode Tedir consomme-t-il plus de ressources ?"

  - id: "PG-K2-005"
    nom: "Principe de Tlat Go Tlat (Inclusion Remontante)"
    source_assertions: ["EC-K2-018", "EC-K2-019"]
    formalisation: |
      Quand les niveaux inférieurs sont trop EXPOSÉS (megulim) et en danger de brisure :
      SOLUTION : les INCLURE dans les niveaux supérieurs correspondants
        Netzach → dans Chesed
        Hod → dans Gevurah
        Yesod → dans Tiferet
      Principe : NHY (exécution) remonte dans CHaGaT (émotion/caractère) pour protection
      BONUS : en remontant, NHY apporte avec elle les éléments qu'elle contient
      (ici, les Orot des vases brisés → remontent et deviennent matériau de Z"A)
    applications_ia:
      - "Quand un module est 'exposé' (vulnérable), l'encapsuler dans un module supérieur"
      - "L'abstraction = Tlat go Tlat — les détails remontent dans les interfaces"
      - "Les Nitzotzot élevés par NHY = les insights qui remontent de l'exécution vers l'architecture"
      - "Le pattern NHY→CHaGaT est un refactoring vers l'encapsulation"
    questions_ouvertes:
      - "Comment détecter qu'un composant est 'meguleh' (trop exposé) ?"
      - "L'inclusion NHY→CHaGaT est-elle temporaire ou permanente ?"

  - id: "PG-K2-006"
    nom: "Principe des 5 Canaux du Zivvug (Neshikin-Havalim-Dibur)"
    source_assertions: ["EC-K2-023", "EC-K2-024", "EC-K2-025", "EC-K2-026", "EC-K2-027", "EC-K2-028"]
    formalisation: |
      Le Zivvug productif opère via 5 CANAUX (= 5 Motzaot HaPeh) :
      CANAL 1-2 : NESHIKIN (baisers, bidirectionnels) → produisent Chesed/Gevurah + Neshamah
      CANAL 3-4 : HAVALIM (souffles, bidirectionnels) → produisent Netzach/Hod + Ruah
      CANAL 5 : DIBUR (parole, unidirectionnel Abba→) → produit Malkhut + Nefesh
      Ce qui est DOUBLE produit un DOUBLE (Neshamah le-Neshamah, Ruah be-Ruah)
      Ce qui est SIMPLE produit un SIMPLE (Nefesh seule)
      TIFERET = produit de l'INCLUSION RÉCIPROQUE (Abba dans Imma + Imma dans Abba)
      YESOD = synthèse des 4 Havalim combinés
    applications_ia:
      - "Le ZivvugEngine devrait implémenter 5 canaux distincts de couplage"
      - "Les canaux bidirectionnels sont plus riches que les unidirectionnels"
      - "La production d'un composant complexe (Partzuf) nécessite PLUSIEURS canaux simultanés"
      - "L'harmonisateur (Tiferet) naît de l'inclusion réciproque — pas d'un canal unique"
    questions_ouvertes:
      - "Les 5 Motzaot correspondent-elles aux 5 positions de prononciation du Sefer Yetzirah ?"
      - "Comment implémenter des canaux bidirectionnels dans le shefa_flow ?"

  - id: "PG-K2-007"
    nom: "Principe du Chesed Fondateur (Zivvug sans Ma'N)"
    source_assertions: ["EC-K2-022"]
    formalisation: |
      Le PREMIER acte créatif dans un nouveau cycle est toujours un acte de CHESED PUR :
      - Sans Ma"N (pas de catalyseur ascendant)
      - Sans condition préalable
      - Gratuit, initiateur, fondateur
      "Olam Chesed Yibaneh" — le monde est CONSTRUIT par le Chesed
      Les Zivvugim suivants peuvent nécessiter des Ma"N, mais le premier est GRATUIT.
      C'est le bootstrap du système — l'initialisation ne peut pas dépendre d'un input.
    applications_ia:
      - "Le premier démarrage du système = Chesed pur (pas de données préalables nécessaires)"
      - "L'initialisation de chaque nouveau module commence par un acte de 'Chesed' — valeurs par défaut"
      - "Le premier Zivvug Abba↔Imma dans le ZivvugEngine devrait être sans condition"
      - "Le seed/bootstrap du système est un acte de grâce, pas de mérite"
    questions_ouvertes:
      - "Quand le système passe-t-il du mode 'Chesed fondateur' au mode 'Ma\"N requis' ?"
      - "Le Chesed fondateur peut-il être répété ou est-il unique ?"
