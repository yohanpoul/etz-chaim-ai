relations:

  # ─── Relations Causales ───

  - id: "REL-K2-001"
    type: causal
    from: shevirat_ha_kelim
    to: tikkun
    nature: "La Shevirah est le DIAGNOSTIC qui motive le Tikkun — le Ma'atzil constate et répare"
    assertions_source: ["EC-K2-001"]

  - id: "REL-K2-002"
    type: causal
    from: shevirat_ha_kelim
    to: behirah
    nature: "La Shevirah crée les conditions du libre arbitre — sans elle, pas de choix possible"
    assertions_source: ["EC-K2-006", "EC-K2-007"]

  - id: "REL-K2-003"
    type: causal
    from: hevel
    to: mohin
    nature: "Le Hevel du Yesod de A\"A se divise en Mohin pour Abba (droite) et Imma (gauche)"
    assertions_source: ["EC-K2-021"]

  - id: "REL-K2-004"
