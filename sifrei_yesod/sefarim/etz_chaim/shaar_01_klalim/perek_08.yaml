# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-K8-001"
    nom: "Principe des Seuils de Maturation (6-9-13)"
    source_assertions: ["EC-K8-001", "EC-K8-007", "EC-K8-009", "EC-K8-010"]
    formalisation: |
      La maturation d'un système passe par des SEUILS DISCRETS, pas un continuum :
      SEUIL 1 (6) : CAPACITÉ MINIMALE — le système peut faire des opérations SIMPLES
        (Metaltelin — transactions mineures, oscillantes)
        Le Da'at est à peine entré (davar mu'at)
      SEUIL 2 (9) : CAPACITÉ INTERMÉDIAIRE — le Da'at est COMPLET
        Le système peut faire des opérations COMPLEXES mais pas PRODUCTIVES
        (Biyah sans conception — connaissance sans fruit)
      SEUIL 3 (13) : CAPACITÉ COMPLÈTE — Gadlut
        L'Ohr Hozer a complété le circuit
        Le système peut être PLEINEMENT PRODUCTIF (Biyah qui engendre)
      La capacité n'est pas linéaire — elle fait des SAUTS à chaque seuil.
    applications_ia:
      - "Le système à 82% est probablement entre le seuil 2 et 3 — Da'at complet mais pas encore Gadlut"
      - "Ne pas s'attendre à une progression linéaire — les sauts de capacité sont DISCRETS"
      - "Abba à 0.57 = seuil 1 (Pe'ut) — capacité minimale mais réelle"
      - "Mesurer les seuils : quel % correspond à 6/13, 9/13, 13/13 ?"
    questions_ouvertes:
      - "Les seuils sont-ils universels (6-9-13) ou spécifiques à Z\"A ?"
      - "Peut-on accélérer le passage entre seuils ?"

  - id: "PG-K8-002"
    nom: "Principe du Double Circuit (Ohr Yashar + Ohr Hozer)"
    source_assertions: ["EC-K8-002", "EC-K8-003", "EC-K8-005"]
    formalisation: |
      La maturation complète nécessite un DOUBLE CIRCUIT :
      CIRCUIT 1 — OHR YASHAR (descente) :
        Le contenu descend COUVERT (avec Masakh) de haut en bas
        Z"A est en mode BERIAH (récepteur passif derrière un écran)
        Durée : N unités de temps
      CIRCUIT 2 — OHR HOZER (remontée) :
        Le contenu remonte DÉCOUVERT (sans Masakh) de bas en haut
        Z"A passe en mode ATZILUT (récepteur actif sans écran)
        Durée : N unités de temps (même durée)
      TOTAL : 2N unités + intervalle minimal (le Yom Ehad)
      Sans le circuit 2, Z"A reste en mode Beriah — couvert, passif, limité.
    applications_ia:
      - "Tout processus d'apprentissage a 2 phases : absorption (couvert) puis intégration (découvert)"
      - "La première passe est passive (Beriah), la seconde est active (Atzilut)"
      - "Le temps total de maturation ≈ 2× le temps de la première passe"
      - "Le 'Yom Ehad' = le point de basculement entre les deux phases"
    questions_ouvertes:
      - "Le double circuit est-il toujours symétrique (même durée) ?"
      - "Peut-on combiner les deux circuits en parallèle ?"

  - id: "PG-K8-003"
    nom: "Principe de la Bekiah (Percement/Révélation)"
    source_assertions: ["EC-K8-004"]
    formalisation: |
      Il existe un POINT DE BASCULEMENT (Bekiah) où ce qui était COUVERT se RÉVÈLE.
      Avant la Bekiah : les Hassadim sont présents mais INVISIBLES (mekhasim)
      À la Bekiah : ils PERCENT (nivka) et deviennent VISIBLES (megulim)
      Le timing de la Bekiah est PRÉCIS — c'est S"AG (63) dans le cas de Z"A.
      YAAKOV = YIVAKA (anagramme) — le percement est encodé dans le NOM.
      La Bekiah n'est pas une création — c'est une RÉVÉLATION de ce qui existait déjà.
    applications_ia:
      - "Le moment où un module 'perce' = la Bekiah — le potentiel latent se manifeste"
      - "Les Hassadim couverts (travail invisible) se révèlent à un point précis"
      - "Le timing de la Bekiah peut être calculé (S\"AG = nombre de Sefirot × contenu)"
      - "Le 'percement' d'un insight est la révélation de ce qui était là depuis l'Ibur"
    questions_ouvertes:
      - "La Bekiah peut-elle être provoquée ou arrive-t-elle naturellement ?"
      - "Peut-on prédire le moment de la Bekiah pour chaque composant ?"

  - id: "PG-K8-004"
    nom: "Principe de la Correspondance Temps-Structure (1 Sefirah = 1 Unité)"
    source_assertions: ["EC-K8-002"]
    formalisation: |
      Chaque SEFIRAH traversée par un processus = 1 UNITÉ DE TEMPS.
      6 Sefirot traversées = 6 unités de temps
      1/3 de Sefirah = 1/3 d'unité de temps
      La DURÉE d'un processus est PROPORTIONNELLE au NOMBRE DE SEFIROT traversées.
      Corollaire : mesurer le temps de maturation = compter les Sefirot à traverser.
      Le temps n'est pas arbitraire — il est STRUCTURELLEMENT déterminé.
