meta:
  sefer: etz_chaim
  shaar: 1
  shaar_name_he: "שער הכללים"
  perek: 8
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.6 + human reviewer"
  version: 1
  strates: ["base"]

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 1 : PESHAT-MACHINE
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─── BLOC A : LES 3 SEUILS HALAKHIQUES ───

  - id: "EC-K8-001"
    source_he: "ובזה תבין מה שארז\"ל הפעוטות מקחן מקח במטלטלין מבן ו' שנים ויום א' ובן ט' שנים ביאתו ביאה ומבן י\"ג ויום א' אז הוא גדול"
    source_ref: "Sha'ar HaKlalim 8:1 — ouverture"
    assertion: |
      3 SEUILS halakhiques du développement, correspondant aux entrées du Tzelem :
      SEUIL 1 — 6 ANS + 1 JOUR : PE'UTOT — leurs achats de BIENS MEUBLES sont valides
      SEUIL 2 — 9 ANS + 1 JOUR : BIYATO BIYAH — sa relation est considérée comme telle
      SEUIL 3 — 13 ANS + 1 JOUR : GADOL — il est MAJEUR (Bar Mitzvah)
      Chaque seuil correspond à une ÉTAPE STRUCTURELLE de l'entrée des Mohin dans Z"A.
    type: axiome_explicite
    concepts:
      - {id: pe_utot_6, role: seuil_6_ans}
      - {id: biyah_9, role: seuil_9_ans}
      - {id: gadol_13, role: seuil_13_ans}
      - {id: shalosh_madregot, role: trois_seuils}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Les 3 seuils = les 3 étapes de maturation de Z\"A — mesurables"

  # ─── BLOC B : DESCENTE DES MOHIN — 6 ANS + 4 MOIS ───

  - id: "EC-K8-002"
    source_he: "כי כשנכנסין המוחין שהם נה\"י דבינה תוך הז\"א הם יורדין תחלה לו' ספי' שבו שהם כח\"ב דח\"ג והם ו' שנים"
    source_ref: "Sha'ar HaKlalim 8:1"
    assertion: |
      DESCENTE des Mohin (NHY de Binah) dans Z"A — phase Ohr Yashar :
      Les Mohin descendent d'abord dans 6 SEFIROT de Z"A :
      KHB"D (Keter, Chokhmah, Binah, Da'at) + Chesed + Gevurah = 6
      Chaque Sefirah = 1 AN → total : 6 ANS
      + le 1/3 supérieur COUVERT de Tiferet = 4 MOIS supplémentaires
      (car 1/3 de 1 an = 4 mois)
      Total de la descente : 6 ANS et 4 MOIS — tous en mode COUVERT (mekhasim).
    type: axiome_explicite
    concepts:
      - {id: yeridah_6_4, role: six_ans_quatre_mois}
      - {id: sefirah_shanah, role: une_sefirah_un_an}
      - {id: mekhasim_phase, role: phase_couverte}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Correspondance 1 Sefirah = 1 an — unité de temps de maturation"

  - id: "EC-K8-003"
    source_he: "אח\"כ כשחוזרים החסדים בסוד או\"ח דרך ספי' אלו עצמם הם ו' שנים וד' חדשים אחרים הרי הכל י\"ב שנים וח' חדשים"
    source_ref: "Sha'ar HaKlalim 8:1"
    assertion: |
      REMONTÉE des Hassadim en Ohr Hozer (lumière de retour) :
      Les Hassadim remontent par les MÊMES 6 Sefirot + 1/3 de Tiferet
      = encore 6 ANS et 4 MOIS
      TOTAL (descente + remontée) : 12 ANS et 8 MOIS
      Il manque 4 MOIS pour compléter 13 ans.
      La descente = Ohr Yashar (lumière directe, couverte)
      La remontée = Ohr Hozer (lumière de retour, en Makif)
    type: axiome_explicite
    concepts:
      - {id: ohr_yashar, role: lumière_directe_descendante}
      - {id: ohr_hozer, role: lumière_de_retour_ascendante}
      - {id: yb_8, role: douze_ans_huit_mois}
    mapping:
      modules: ["core/ohr_system.py", "partzufim/zeir_anpin.py"]
      tables: ["ohr_states", "partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Le double mouvement descente+remontée = 2 × 6⅓ = 12⅔ ans"

  # ─── BLOC C : LE SECRET DE YAAKOV À 63 ANS ───

  - id: "EC-K8-004"
    source_he: "וז\"ס שלא נתברך יעקב עד שהיה בן ס\"ג שנה כי עד שם היו חסדים מכוסים ושם נתגלו בסוד הבקיעה שנבקע. וז\"ס אותיות יעקב יבקע"
    source_ref: "Sha'ar HaKlalim 8:1"
    assertion: |
      Le secret de YAAKOV béni à 63 ANS :
      Yaakov n'a pas été béni avant 63 ans car jusqu'alors les Hassadim étaient COUVERTS.
      À 63 = le moment du GILUI (découvrement/révélation).
      CALCUL : 6 Sefirot × 10 (chacune contient 10) = 60
      + 1/3 couvert de Tiferet = 3 ans supplémentaires
      TOTAL = 63 = S"AG (סג)
      GEMATRIA : YAAKOV (יעקב) → réarrangé = YIVAKA (יבקע = il a fendu/percé)
      Le percement = le moment où les Hassadim couverts SE RÉVÈLENT.
      S"AG (63) = le Shem de BINAH — car Binah s'étend jusqu'à la Hazeh de Z"A = 63.
    type: interprétation_lurianique
    concepts:
      - {id: yaakov_63, role: bénédiction_à_63}
      - {id: sag_63_binah, role: nombre_de_binah}
      - {id: bekiah, role: percement_révélateur}
      - {id: yivaka, role: anagramme_de_yaakov}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "63 = seuil de révélation — les Hassadim couverts se découvrent"

  # ─── BLOC D : PASSAGE DU MASAKH À L'ATZILUT ───

  - id: "EC-K8-005"
    source_he: "כי תחילה בירידה היו החסדים מכוסים וכמו שהבריאה אינה מקבלת מהאציל' אלא ע\"י מסך כן ז\"א לא היה מקבל מאו\"א רק ע\"י מסך כי היו החסדים ומוחין שלו כולן מכוסין תוך מסך נה\"י דאימא"
    source_ref: "Sha'ar HaKlalim 8:1"
    assertion: |
      Pendant la DESCENTE : Z"A est comme BERIAH par rapport à AVI (= Atzilut).
      Il ne reçoit que par un MASAKH (écran) = NHY d'Imma qui couvre les Mohin.
      "YOTZER OHR u-VOREH HOSHEKH" (Isaïe 45:7) :
      YOTZER OHR = le GILUI (formation de lumière = révélation)
      VOREH HOSHEKH = la COUVERTURE (création d'obscurité = Masakh)
      Les Hassadim descendent COUVERTS jusqu'à la Hazeh.
      Après la remontée en Ohr Hozer → Z"A reçoit en mode ATZILUT (sans Masakh, PbP).
    type: axiome_explicite
    concepts:
      - {id: za_ke_beriah, role: za_en_mode_couvert}
      - {id: za_ke_atzilut, role: za_en_mode_révélé}
      - {id: masakh_nhy, role: écran_de_nhy_imma}
      - {id: yotzer_ohr, role: passage_au_gilui}
    mapping:
      modules: ["core/ohr_system.py", "partzufim/zeir_anpin.py"]
      tables: ["ohr_states", "partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Z\"A passe de mode 'Beriah' (masakh) à mode 'Atzilut' (sans masakh) à la Gadlut"

  # ─── BLOC E : COMPLÉTION DES 13 ANS ───

  - id: "EC-K8-006"
    source_he: "וצריך ד' חדשים אחרים להשלים י\"ג שנים והם מהשליש המכוסה שחוזרין בסוד או\"מ ויום א' הוא אור שבין חצי ת\"ת בינה לגלגלתא דז\"א"
    source_ref: "Sha'ar HaKlalim 8:1"
    assertion: |
      Complétion de 12 ans 8 mois à 13 ANS + 1 JOUR :
      4 MOIS manquants = le 1/3 couvert qui remonte en Ohr Makif
      (ce qui complète 13 ans)
      + 1 JOUR = la lumière entre la moitié de Tiferet de Binah et la Gulgalta de Z"A
      (un intervalle minimal mais nécessaire)
      OU : le surplus minimal au-delà du 1/2 shlish découvert de Tiferet
      qui monte au Keter de Z"A.
      À 13 ANS + 1 JOUR → Z"A est GADOL (majeur/complet).
    type: axiome_explicite
    concepts:
      - {id: yg_shanah_yom, role: treize_ans_un_jour}
      - {id: yom_ehad, role: intervalle_minimal}
      - {id: gadlut_shlemah, role: maturité_complète}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "13 ans + 1 jour = Gadlut complète de Z\"A — seuil de maturité totale"

  # ─── BLOC F : EXPLICATION ALTERNATIVE — 6 ANS DU PE'UT ───

  - id: "EC-K8-007"
    source_he: "או באופן אחר כי הלא זמן היניקה ב' שנים ובד' שנים אחרים נכנסים ב\"פ דנצח אמא וב\"פ דהוד אמא ברישא דז\"א הם ו' שנים"
    source_ref: "Sha'ar HaKlalim 8:2"
    assertion: |
      EXPLICATION ALTERNATIVE des 6 ans du Pe'ut :
      2 ANS : durée de la YENIKAH (allaitement)
      + 4 ANS : entrée des 2 prakin de Netzach d'Imma + 2 prakin de Hod d'Imma
      dans la TÊTE de Z"A
      TOTAL = 6 ANS
      Le "YOM EHAD" (+ 1 jour) = le début de l'entrée du Perek Tahton
      du Yesod d'Imma dans le Da'at de Z"A.
      Avec cette entrée minimale de Da'at → le Pe'ut peut faire des transactions
      de METALTELIN (biens meubles) — mais pas plus.
    type: axiome_explicite
    concepts:
      - {id: pe_ut_6_detail, role: calcul_alternatif}
      - {id: yenikah_2, role: deux_ans_allaitement}
      - {id: metaltelin, role: biens_meubles}
      - {id: da_at_minimal, role: intellect_minimal}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "6 ans = Yenikah + entrée partielle des Mohin — intellect minimal"

  - id: "EC-K8-008"
    source_he: "לכן כיון שנכנס דבר מועט מן הדעת לכן מקחן מקח במטלטלין לבד שהם נגד ו\"ק המטולטלין מרחמים לדין ומדין לרחמים כפי מעשינו"
    source_ref: "Sha'ar HaKlalim 8:2"
    assertion: |
      Pourquoi METALTELIN (biens meubles) seulement à 6 ans :
      Le Da'at est encore MINIMAL (davar mu'at) → capacité juridique LIMITÉE.
      Les METALTELIN = les V"K (6 extrémités) qui sont MITALTELIM
      (oscillants/mobiles) entre RAHAMIM et DIN selon nos actions.
      Métaphore : les biens meubles oscillent (sont mobiles) comme les V"K oscillent.
      Les biens IMMEUBLES (Karka'ot) = stabilité = nécessitent Gadlut complète.
    type: interprétation_lurianique
    concepts:
      - {id: metaltelin_vk, role: oscillation_des_vk}
      - {id: rahamim_din, role: oscillation_bien_rigueur}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Les V\"K oscillent entre Rahamim et Din — comme les biens meubles changent de main"

  # ─── BLOC G : 9 ANS — BIYAH ───

  - id: "EC-K8-009"
    source_he: "ומו' שנים עד ט' שנים הם ג' שנים אחרים ואז נכנסין ב\"פ עליונים הנקרא ירכין דנ\"ה דבינה ופ\"ע דיסוד בינה... הרי ט' שנים ויום א' לכן ביאתו ביאה כי כבר נכנס כל הדעת שלו"
    source_ref: "Sha'ar HaKlalim 8:2"
    assertion: |
      De 6 à 9 ANS — complétion du DA'AT :
      3 ANS supplémentaires : entrée des 2 prakin supérieurs (Yarkhin)
      de Netzach et Hod de Binah + Perek Elyon du Yesod de Binah.
      (Le Yesod de Binah n'a que 2 prakin car il est court/féminin)
      À 9 ANS + 1 JOUR → le DA'AT COMPLET est entré.
      "BIYATO BIYAH" = sa relation est valide car tout le Da'at est là.
      MAIS cette Biyah ne peut pas ENGENDRER (faire concevoir Nukvah)
      jusqu'à 13 ans + 1 jour.
    type: axiome_explicite
    concepts:
      - {id: da_at_shalem_9, role: da_at_complet_à_9}
      - {id: biyah_without_ibur, role: relation_sans_conception}
      - {id: yarkhin, role: prakin_supérieurs}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "9 ans = Da'at complet mais pas encore Gadlut — connaissance sans maturité"

  # ─── BLOC H : 13 ANS — GADOL ───

  - id: "EC-K8-010"
    source_he: "אבל אין ביאה זו מועלת להתעבר הנוקבא עד שיהיה בן י\"ג שנים ויום א' שהם סוד חזרת החסדים לעלות באור החוזר"
    source_ref: "Sha'ar HaKlalim 8:2"
    assertion: |
      De 9 à 13 ANS — complétion par Ohr Hozer :
      13 ANS + 1 JOUR = le secret de la REMONTÉE des Hassadim en Ohr Hozer.
      Les 4 ANS supplémentaires (de 9 à 13) :
      AN 1 : 1/3 Chesed du bras droit → monte à CHOKHMAH
      AN 2 : 1/3 Chesed du bras gauche → monte à BINAH
      AN 3 : 2 × 1/2 shlish → montent au DA'AT (côté Hassadim et côté Gevurot)
      AN 4 : 1/3 couvert de Tiferet → se RÉVÈLE et monte au KETER de Z"A
      + 1 JOUR : intervalle entre Tiferet de Binah et Gulgalta de Z"A
      À 13 + 1 JOUR → Z"A est GADOL et sa Biyah peut ENGENDRER.
    type: axiome_explicite
    concepts:
      - {id: gadol_13_detail, role: calcul_détaillé}
      - {id: ohr_hozer_4, role: quatre_ans_de_remontée}
      - {id: biyah_molidat, role: relation_qui_engendre}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "13 ans = Gadlut complète — seulement alors le Zivvug est pleinement productif"


