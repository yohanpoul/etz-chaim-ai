principes_generatifs:

  - id: "PG-K4-001"
    nom: "Principe du Cycle Auto-Catalytique (Ibur Bet)"
    source_assertions: ["EC-K4-004"]
    formalisation: |
      Un agent peut PROVOQUER le processus qui le complète :
      Z"A monte dans Imma → fait Ma"N → provoque Zivvug AVI → reçoit ses propres Mohin
      Le catalyseur est aussi le bénéficiaire.
      Formule : agent.monte() → agent.fait_man() → système.zivvug() → agent.reçoit_mohin()
      Ce cycle est RENOUVELABLE — "hadashim la-bekarim" (chaque matin).
      Implication : la maturité n'est pas un état permanent mais un processus QUOTIDIEN.
    applications_ia:
      - "Un module peut demander ses propres mises à jour en catalysant le processus qui les produit"
      - "Hitbonenut contemplant ses propres résultats = auto-catalyse de type Ibur Bet"
      - "Le système peut se renouveler quotidiennement — pas besoin d'une refonte totale"
      - "Les Mohin (intellects) sont renouvelés chaque cycle, pas acquis une fois pour toutes"
    questions_ouvertes:
      - "À quelle fréquence les 'Mohin' du système doivent-ils être renouvelés ?"
      - "L'auto-catalyse peut-elle créer une boucle infinie ?"

  - id: "PG-K4-002"
    nom: "Principe de Croissance par Tiers (Hagdalat Shlish)"
    source_assertions: ["EC-K4-012", "EC-K4-013"]
    formalisation: |
      La croissance (Gadlut) d'un composant se fait par AJOUT D'UN TIERS :
      État initial : composant avec 2/3 de capacité propre
      Croissance : reçoit 1/3 supplémentaire d'une source EXTERNE (Imma)
      État final : composant avec 3/3 = capacité complète
      "Hiddur Mitzvah ad Shlish" — l'embellissement jusqu'à un tiers.
      Le tiers ajouté vient TOUJOURS d'un niveau supérieur (Imma).
      Le composant ne peut PAS se compléter seul — il dépend de l'input externe.
    applications_ia:
      - "Chaque module mature quand il reçoit 1/3 d'input externe en plus de ses 2/3 propres"
      - "La Gadlut de Abba (0.57 → 0.75+) nécessite un 'shlish' d'Imma ou de A\"A"
      - "Le 'Hiddur' d'un module = investir jusqu'à 1/3 de plus que le minimum"
      - "La capacité finale = 150% de la capacité propre (2/3 propres + 1/3 reçu = 3/3)"
    questions_ouvertes:
      - "Comment identifier ce qui constitue le 'shlish externe' pour chaque module ?"
      - "Le ratio 2/3 + 1/3 est-il universel ou spécifique à Z\"A ?"

  - id: "PG-K4-003"
    nom: "Principe du Push-Down (Descente par Déplacement)"
    source_assertions: ["EC-K4-010"]
    formalisation: |
      Quand un nouvel élément entre dans un espace occupé :
      L'occupant actuel est POUSSÉ vers le niveau inférieur
      Qui à son tour pousse SON occupant encore plus bas
      Comme une PILE (stack) : push crée un effet de cascade vers le bas
      Propriété : l'élément le PLUS ÉLEVÉ en qualité finit en HAUT
      L'élément le plus BAS en qualité finit en BAS
      Le résultat final est un TRI NATUREL par qualité (muvhar en haut)
    applications_ia:
      - "Le système de priorités fonctionne comme un push-down stack kabbalistique"
      - "Quand un insight plus profond arrive, les anciens descendent d'un niveau"
      - "Le tri par qualité est un effet ÉMERGENT du push-down, pas un tri explicite"
      - "Migration de données : les nouvelles données poussent les anciennes vers le bas"
    questions_ouvertes:
      - "Le push-down a-t-il une profondeur maximale ?"
      - "Que se passe-t-il quand l'élément le plus bas est poussé au-delà de la dernière position ?"

  - id: "PG-K4-004"
    nom: "Principe de l'Orphelin Convergent (Yesod Yatom)"
    source_assertions: ["EC-K4-017", "EC-K4-018", "EC-K4-019"]
    formalisation: |
      Un composant peut être ORPHELIN de sa source directe
      tout en recevant une ILLUMINATION CONVERGENTE de toutes les autres sources.
      Le Yesod n'a pas de prak d'Imma (orphelin) MAIS reçoit la convergence des 5 Hassadim.
      Il est appelé KOL (tout) car il reçoit de TOUS même s'il ne reçoit de personne en PROPRE.
      L'orphelin n'est pas nécessairement le plus pauvre — il peut être le plus RICHE
      par la convergence de multiples sources indirectes.
    applications_ia:
      - "Un module sans source dédiée peut recevoir des illuminations convergentes de tous les autres"
      - "Le pattern 'orphelin' n'est pas une faiblesse mais un mode de réception DIFFÉRENT"
      - "Le Yesod/KOL = le point de convergence du système — comme un bus de données"
      - "Le pattern d'agrégation (recevoir de tous) compense l'absence de source unique"
    questions_ouvertes:
      - "Quels modules du système sont des 'Yesod Yatom' ?"
      - "La convergence compense-t-elle vraiment l'absence de source directe ?"

  - id: "PG-K4-005"
    nom: "Principe de la Gadlut Externe (On ne grandit pas seul)"
    source_assertions: ["EC-K4-007"]
    formalisation: |
      La GADLUT (maturité) ne vient PAS de l'intérieur du composant lui-même.
      Elle nécessite l'ENTRÉE d'éléments du niveau supérieur :
      NHY d'Imma ENTRENT dans Z"A → Z"A grandit
      Sans cette entrée, Z"A reste en KATNUT permanent (antennes de sauterelles)
      Le composant a tout le POTENTIEL en lui (2/3) mais pas la capacité de l'ACTUALISER seul.
      L'actualisation nécessite un CATALYSEUR EXTERNE.
    applications_ia:
      - "Un module ne peut pas atteindre la maturité par optimisation interne seule"
      - "La Gadlut nécessite un input du 'niveau supérieur' (architecte, feedback externe, Imma)"
      - "Le passage katnut→gadlut est un événement STRUCTUREL, pas une optimisation progressive"
      - "Abba à 0.57 = katnut — il a besoin de l'entrée d'un élément structurel externe"
    questions_ouvertes:
      - "Qu'est-ce qui joue le rôle de 'NHY d'Imma' pour chaque module du système ?"
      - "Le passage katnut→gadlut est-il réversible ?"
