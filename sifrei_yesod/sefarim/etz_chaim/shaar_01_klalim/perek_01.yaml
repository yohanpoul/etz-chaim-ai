  # ─── BLOC I : SHEVIRAT HA-KELIM — LA BRISURE DES VASES ───

  - id: "EC-K1-022"
    source_he: "והנה כשיצא אח\"כ אור מבינה לו\"ק תחלה יצא הדעת ואח\"כ נתבטל וזהו המלך הראשון שהוא בלע בן בעור"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Début de la SHEVIRAT HA-KELIM (brisure des vases) :
      Quand le Ohr sort de Binah vers les V"K :
      PREMIER à sortir : DA'AT — puis il est ANNULÉ (nitbatel)
      Da'at = le premier ROI : Bela ben Be'or (Genèse 36:32)
      La brisure commence par Da'at, pas par Chesed.
      Da'at est le PONT entre G"R et Z"T — il brise le premier.
    type: axiome_explicite
    concepts:
      - {id: shevirat_ha_kelim, role: processus_de_brisure}
      - {id: da_at, role: premier_brisé}
      - {id: bela_ben_beor, role: correspondance_biblique}
      - {id: shivat_melakhim, role: cadre_narratif}
    mapping:
      modules: ["shevirah/shevirah_engine.py", "tikkun/tikkun_scheduler.py"]
      tables: ["shevirah_states"]
      partzufim: []
      relevance: "Début du processus Shevirah — Da'at comme pont fragile entre Mohin et Middot"

  - id: "EC-K1-023"
    source_he: "אח\"כ יצא חסד וגם הוא לא היה יכול לסבול האור ונשבר הכלי שלו ג\"כ וירד למטה ואח\"כ יצא גבורה וכן כל הז'. ואלו הם ז' מלכים שמתו"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Les 7 MELAKHIM (rois) qui sont MORTS :
      Après Da'at : CHESED sort → ne peut supporter → son Keli se BRISE et tombe
      Puis GEVURAH → même chose. Et ainsi les 7.
      Les 7 = Da'at, Chesed, Gevurah, Tiferet, Netzach, Hod, Yesod (+ Malkhut partiellement)
      Correspondance : les 7 rois d'Édom (Genèse 36) — "il régna puis mourut" (וימלוך... וימת)
      D'abord ils RÈGNENT (existence momentanée), PUIS ils meurent (brisure).
    type: axiome_explicite
    concepts:
      - {id: shivat_melakhim, role: les_7_rois_brisés}
      - {id: shevirat_keli, role: brisure_du_contenant}
      - {id: nefilah, role: chute_vers_le_bas}
      - {id: malkhei_edom, role: correspondance_biblique}
    mapping:
      modules: ["shevirah/shevirah_engine.py"]
      tables: ["shevirah_states"]
      partzufim: []
      relevance: "Les 7 rois = les 7 étapes de la Shevirah — chaque brisure génère du matériau pour le Tikkun"

  - id: "EC-K1-024"
    source_he: "שלא היה בהם יכולת לסבול האור המתפשט בהם מספירה לספירה אע\"פ שבחסד כבר נתבטל א' עכ\"ז לא הניח האור מלהתפשט בכל ז\"ת לראות אולי אינו ימות ויוכל לסבול מחמת ריחוק"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      RAISON de la brisure : les Kelim n'avaient pas la CAPACITÉ (yokhelet) de supporter
      le Ohr se propageant de Sefirah en Sefirah.
      PARADOXE : Même après la brisure de Chesed, le Ohr CONTINUE à se propager
      "pour voir si peut-être il ne mourra pas et pourra supporter grâce à la distance"
      HYPOTHÈSE TESTÉE : plus la Sefirah est ÉLOIGNÉE, plus elle pourrait supporter
      RÉSULTAT : ÉCHEC — car chaque Keli inférieur est aussi PLUS PETIT
      La distance aide, mais la petitesse du Keli annule cet avantage.
    type: axiome_explicite
    concepts:
      - {id: koah_ha_sevil, role: capacité_insuffisante}
      - {id: rihuk, role: facteur_atténuant}
      - {id: kotan_keli, role: facteur_aggravant}
    mapping:
      modules: ["shevirah/shevirah_engine.py", "tzimtzum/regulator.py"]
      tables: ["shevirah_states"]
      partzufim: []
      relevance: "L'équilibre distance/taille du Keli — le Tzimtzum Regulator gère exactement ce calcul"

  # ─── BLOC J : YESOD SPÉCIAL ET MALKHUT PARTIELLE ───

  - id: "EC-K1-025"
    source_he: "והנה כשהגיע האור אל היסוד באו ב' אורות א' שלו וא' לתת אל המל' והחלק שלו להיותו גדול לא היה יכול לסובלו ונתבטל כמו האחרים אבל חלק המל' שקבל הוא נשאר בו ולא נתבטל וז\"ס בן ישי חי על האדמה ולכן נקרא יסוד חי"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      EXCEPTION DE YESOD — double charge :
      Quand le Ohr atteint Yesod, il porte DEUX lumières :
      LUMIÈRE 1 : Sa propre part → TROP GRANDE → Yesod se brise comme les autres
      LUMIÈRE 2 : La part destinée à Malkhut → reste en lui, NON annulée
      La part de Malkhut SURVIT dans Yesod même après sa brisure.
      Preuve : "Ben Yishai Hai al ha-Adamah" (I Samuel 20:31) — Yesod = le VIVANT (Hai)
      Yesod est appelé HAI car quelque chose en lui SURVIT à la brisure.
    type: axiome_explicite
    concepts:
      - {id: yesod, role: porteur_double}
      - {id: yesod_hai, role: survivant_partiel}
      - {id: helek_malkhut, role: part_préservée}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states", "shevirah_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Yesod a un statut spécial — il porte la semence de la reconstruction (Malkhut)"

  - id: "EC-K1-026"
    source_he: "וכשנתן אח\"כ היסוד חלק המל' לה אלו היה נותן דרך צנור היה כח במל' לקבלה אבל עתה כשנשבר היסוד נתגלה האור ובא האור מהיסוד בגילוי ובחוזק אל המל' ולכן גם היא נשברה. ולא לגמרי כמו הראשון"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      La brisure de MALKHUT — partielle et spéciale :
      SI Yesod avait transmis par un TZINOR (canal intact) → Malkhut aurait pu recevoir
      MAIS Yesod étant BRISÉ → le Ohr arrive EXPOSÉ (be-gilui) et avec FORCE (be-hozek)
      Résultat : Malkhut se brise AUSSI, mais PAS COMPLÈTEMENT (lo le-gamrei)
      Après le Tikkun, Malkhut mérite de devenir un PARTZUF COMPLET
      Alors que les V"K (6) ne méritent pas chacun de devenir un Partzuf individuel.
      PARADOXE : Malkhut, la plus basse, obtient le statut le plus complet après Tikkun.
    type: axiome_explicite
    concepts:
      - {id: malkhut, role: brisure_partielle}
      - {id: tzinor, role: canal_intact_hypothétique}
      - {id: gilui, role: exposition_directe}
      - {id: partzuf_shalem, role: résultat_post_tikkun}
    mapping:
      modules: ["partzufim/nukvah.py", "shevirah/shevirah_engine.py"]
      tables: ["shevirah_states", "partzufim_states"]
      partzufim: ["nukvah"]
      relevance: "Malkhut/Nukvah comme Partzuf complet — son statut spécial post-Shevirah"

  # ─── BLOC K : NITZOTZOT ET TIKKUN ───

  - id: "EC-K1-027"
    source_he: "ופי' מה שאמרנו שנשברו המלכים פי' כי האורות נסתלקו למעלה למקומן ועכ\"ז עדיין נשארו קצת ניצוצי קדושה בכלים ונפלו באלו מאנין תבירי למטה ומהם נתהוו שורש הקלי'"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      MÉCANISME de la Shevirah en détail :
      1. Les OROT (lumières) remontent (nistalkeu) vers le haut, à leur place
      2. Des NITZOTZEI KEDUSHAH (étincelles de sainteté) RESTENT dans les Kelim
      3. Les Kelim brisés (ma'anin tevirin) TOMBENT vers le bas
      4. De ces fragments + étincelles se forme la RACINE des KELIPOT (שורש הקליפות)
      La Kelipah n'est pas une création ex nihilo — c'est un RÉSIDU de la Shevirah.
      Les Nitzotzot sont PIÉGÉS dans les Kelipot — c'est le matériau du Tikkun.
    type: axiome_explicite
    concepts:
      - {id: nitzotzot, role: étincelles_piégées}
      - {id: kelipot, role: résidu_de_shevirah}
      - {id: orot_nistalkeu, role: lumières_remontées}
      - {id: ma_anin_tevirin, role: vases_brisés}
    mapping:
      modules: ["shevirah/shevirah_engine.py", "nitzotzot/nitzotzot_tracker.py", "qliphoth/qliphoth_system.py"]
      tables: ["shevirah_states", "nitzotzot_states", "qliphoth_states"]
      partzufim: []
      relevance: "Fondement du système de Nitzotzot — 49/288 déjà trackés dans le système"

  - id: "EC-K1-028"
    source_he: "וזהו מה שנשאר לנו לתקן ע\"י תפלה ומע\"ט וכן ע\"י נשמת הצדיקים כשהם נפטרים מעוה\"ז עוברים בעולם העשיה ומעלין מהם ניצוצי קדושה שבקליפה ליצירה וכן עד\"ז בעלותם מיצירה לבריאה ומבריאה לאצילות ומחזירין האור הגדול למקומם"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Le TIKKUN — processus de réparation :
      Ce qui reste à RÉPARER (letaken) = les Nitzotzot piégés dans les Kelipot
      MOYENS du Tikkun :
      1. TEFILAH (prière)
      2. MA'ASIM TOVIM (bonnes actions)
      3. NESHAMOT HA-TZADDIKIM (âmes des justes à leur mort)
      PROCESSUS D'ÉLÉVATION : Asiyah → Yetzirah → Beriah → Atzilut
      Les Nitzotzot sont élevés NIVEAU PAR NIVEAU à travers les 4 mondes.
      Résultat final : "Retourner la grande lumière à sa place" (mahazirin ha-ohr ha-gadol le-mekomam)
    type: axiome_explicite
    concepts:
      - {id: tikkun, role: processus_de_réparation}
      - {id: tefilah, role: moyen_de_tikkun}
      - {id: ma_asim_tovim, role: moyen_de_tikkun}
      - {id: aliyat_nitzotzot, role: élévation_par_niveaux}
      - {id: abya, role: échelle_d_élévation}
    mapping:
      modules: ["tikkun/tikkun_scheduler.py", "nitzotzot/nitzotzot_tracker.py"]
      tables: ["tikkun_actions", "nitzotzot_states"]
      partzufim: []
      relevance: "Architecture du Tikkun — élévation progressive des Nitzotzot à travers les 4 Olamot"

  - id: "EC-K1-029"
    source_he: "וז\"ס מ\"ן"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Les Nitzotzot élevés = MAYIN NUKVIN (מ"ן — eaux féminines)
      Les Nitzotzot ne sont pas simplement "récupérés" — ils deviennent
      le CATALYSEUR du Zivvug (union) supérieur.
      Les Ma"N sont la force motrice ascendante qui provoque le Zivvug descendant.
      Sans Ma"N, pas de Zivvug. Sans Zivvug, pas de nouvel Ohr.
    type: axiome_explicite
    concepts:
      - {id: mayin_nukvin, role: eaux_féminines_ascendantes}
      - {id: nitzotzot_as_man, role: catalyseur_de_zivvug}
      - {id: zivvug, role: union_provoquée}
    mapping:
      modules: ["core/zivvug_engine.py", "nitzotzot/nitzotzot_tracker.py"]
      tables: ["zivvug_states", "nitzotzot_states"]
      partzufim: []
      relevance: "Le lien Nitzotzot → Ma\"N → Zivvug est au cœur du cycle de Tikkun"

  # ─── BLOC L : LES 10 MARTYRS ET LE TIKKUN COSMIQUE ───

  - id: "EC-K1-030"
    source_he: "וז\"ס עשרה הרוגי מלוכה שהיו בזמן החרבן והעונות גרמו שאז גברה הקליפה ולא היה כח להעלות מ\"ן שהם הניצוצין ההם"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Application historique : les 10 MARTYRS (Asarah Harugei Malkhut)
      CONTEXTE : Au temps de la destruction (du Temple), les péchés ont causé
      le renforcement de la Kelipah → pas de force pour élever les Ma"N (Nitzotzot)
      SOLUTION EXTRÊME : Les 10 justes donnent leur CORPS comme Ma"N à Malkhut,
      tandis que leurs ÂMES élèvent les Nitzotzot comme Ma"N pour Abba et Imma.
      Le sacrifice physique nourrit Malkhut, le sacrifice spirituel nourrit le Zivvug supérieur.
    type: interprétation_lurianique
    concepts:
      - {id: asarah_harugei_malkhut, role: application_historique}
      - {id: hurban, role: contexte_de_crise}
      - {id: mesirat_nefesh, role: sacrifice_comme_tikkun}
    mapping:
      modules: ["tikkun/tikkun_scheduler.py"]
      tables: []
      partzufim: []
      relevance: "Le Tikkun en situation de crise — quand les voies normales sont bloquées"

  - id: "EC-K1-031"
    source_he: "וז\"ס כך עלה במחשבה לפני הנז' אצל ר\"ע וז\"ס ג\"כ סבת המלכים שמלכו ומתו וז\"ס בונה עולמות ומחריבן"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Triple correspondance du même PATTERN :
      1. "Ainsi est montée la pensée devant Moi" — dit à Rabbi Akiva (Brakhot 61b)
      2. Les rois qui régnèrent et moururent (Shevirah)
      3. "Il construit des mondes et les détruit" (Bereshit Rabbah 3:7)
      CES TROIS sont le MÊME SECRET : la destruction est INTÉGRÉE au plan.
      La Shevirah n'est pas un accident — c'est "montée dans la pensée" (alah be-mahshavah).
      La destruction est la CONDITION de la construction finale.
    type: interprétation_lurianique
    concepts:
      - {id: alah_be_mahshavah, role: intentionnalité_divine}
      - {id: boneh_olamot, role: pattern_construction_destruction}
      - {id: shevirah_intentionnelle, role: doctrine}
    mapping:
      modules: ["shevirah/shevirah_engine.py"]
      tables: []
      partzufim: []
      relevance: "La Shevirah comme pattern intentionnel — les 'erreurs' du système sont productives"

  # ─── BLOC M : TIKKUN DE CHOKHMAH ET BINAH ───

  - id: "EC-K1-032"
    source_he: "הנה חו\"ב ג\"כ הוצרכו תיקון כי הלא בינה היתה תחלה מקלת האור אב\"א כי לא היתה יכולה לסבול פב\"פ ואז נקטן ונתמעט הכלי שלה וזה המיעוט נפל למטה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Le Tikkun ne concerne PAS seulement les 7 rois — CHOKHMAH et BINAH aussi :
      BINAH : recevait AbA (pas PbP) → son Keli a RÉTRÉCI (niktam ve-nitma'et)
      Le DIMINUEMENT (mi'ut) de son Keli est TOMBÉ vers le bas.
      Ce qui tombe = les ACHORAYIM (aspects arrière) de Abba et Imma
      De ces Achorayim tombés se forment YAAKOV et LEAH.
      Implication : même les G"R ont besoin de Tikkun.
    type: axiome_explicite
    concepts:
      - {id: tikkun_hb, role: tikkun_des_supérieurs}
      - {id: achorayim, role: aspects_tombés}
      - {id: yaakov, role: formé_des_achorayim}
      - {id: leah, role: formée_des_achorayim}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "tikkun/tikkun_scheduler.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "yaakov", "leah"]
      relevance: "Abba à 0.57 (transitional) dans le système — les Achorayim expliquent pourquoi il n'est pas encore gadlut"

  - id: "EC-K1-033"
    source_he: "וכן חכמה מאחר שהבינה לא יכלה לקבל האור הנ\"ל גם חכמה לא קיבל האור הראוי לה אם היתה משפעת פב\"פ לבינה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      EFFET RÉTROACTIF sur Chokhmah :
      Puisque Binah ne peut pas recevoir PbP de Chokhmah,
      Chokhmah ELLE-MÊME ne reçoit pas tout le Ohr qu'elle DEVRAIT recevoir.
      Si Binah pouvait recevoir PbP → Chokhmah recevrait PLUS de Keter.
      Le récepteur LIMITE le donneur. L'incapacité de recevoir REMONTE en amont.
      PRINCIPE : La capacité de réception du niveau inférieur conditionne la réception du supérieur.
    type: déduction_logique
    concepts:
      - {id: hashpa'ah_retroactive, role: effet_remontant}
      - {id: mekabel_magbil_mashpia, role: principe}
    mapping:
      modules: ["core/shefa_flow.py", "partzufim/abba.py"]
      tables: ["shefa_flows"]
      partzufim: ["abba", "imma"]
      relevance: "PRINCIPE CRITIQUE : le récepteur limite le donneur — feedback loop dans le shefa_flow"

  # ─── BLOC N : NOBLOT — LES RETOMBÉES CRÉATIVES ───

  - id: "EC-K1-034"
    source_he: "וז\"ס שארז\"ל נובלות חכמה שלמעלה תורה ונובלות בינה שלמעלה שכינה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Doctrine des NOBLOT (נובלות — fruits tombés/retombées) :
      "Les Noblot de la Chokhmah supérieure = la TORAH" (Bereshit Rabbah 17:5)
      "Les Noblot de la Binah supérieure = la SHEKHINAH"
      Le Ohr qui TOMBE de Chokhmah (Abba) → forme ZEIR ANPIN (= Torah)
      Le Ohr qui TOMBE de Binah (Imma) → forme NUKVAH (= Shekhinah)
      Z"A et Nukvah ne sont pas des émanations directes — ils sont des RETOMBÉES (noblot)
      des niveaux supérieurs. Leur substance est du Ohr "perdu" par Chokhmah et Binah.
    type: axiome_explicite
    concepts:
      - {id: noblot, role: retombées_créatives}
      - {id: noblot_chokhmah, role: source_de_za}
      - {id: noblot_binah, role: source_de_nukvah}
      - {id: zeir_anpin, role: formé_des_noblot_chokhmah}
      - {id: nukvah, role: formée_des_noblot_binah}
      - {id: torah_as_za, role: identification}
      - {id: shekhinah_as_nukvah, role: identification}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukvah.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukvah"]
      relevance: "Z\"A et Nukvah formés des Noblot — leur 'substance' vient des chutes de HB"

  # ─── BLOC O : CYCLE COMPLET DES MA"N ───

  - id: "EC-K1-035"
    source_he: "כי כמו שנשמת הצדיקים מעלין מ\"ן לצורך זווג זו\"ן כן זו\"נ מעלין מ\"ן לצורך זווג או\"א מן אותן הנובלות שנפלו מהם למטה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      CYCLE COMPLET des Ma"N — deux niveaux parallèles :
      NIVEAU 1 : Neshamot Tzaddikim → élèvent Ma"N → provoquent Zivvug de Z"A et Nukvah
      NIVEAU 2 : Z"A et Nukvah → élèvent Ma"N (= les Noblot) → provoquent Zivvug de Abba et Imma
      Le MÊME PATTERN se répète à chaque niveau :
      élévation_de_ma_n(niveau_inférieur) → zivvug(niveau_supérieur) → hashpa'ah(vers_le_bas)
      La structure est FRACTALE — le micro reproduit le macro.
    type: axiome_explicite
    concepts:
      - {id: man_tzaddikim, role: force_ascendante_des_justes}
      - {id: man_cycle, role: cycle_ascendant}
      - {id: zivvug_zun, role: union_niveau_1}
      - {id: zivvug_avi, role: union_niveau_2}
      - {id: fractalité, role: pattern_récurrent}
    mapping:
      modules: ["core/zivvug_engine.py", "nitzotzot/nitzotzot_tracker.py"]
      tables: ["zivvug_states", "nitzotzot_states"]
      partzufim: ["zeir_anpin", "nukvah", "abba", "imma"]
      relevance: "Architecture complète du cycle Ma\"N → Zivvug — le ZivvugEngine doit implémenter les deux niveaux"

  - id: "EC-K1-036"
    source_he: "ופי' הדברים כי מ\"ן של רחל הוא שאנו מוסרין נפשותינו למיתה ע\"י נפילת אפים ועם אותה העלאה של נפשותינו אנו מעלין שם מן ניצוצי הקדושה שבתוך הקליפות אל רחל"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Application concrète — Nefilat Apayim (prostration dans la prière) :
      Les Ma"N de RACHEL = notre surrender de l'âme à la mort (mesirut nefesh symbolique)
      Par la NEFILAT APAYIM (chute du visage dans la prière)
      Avec cette élévation de nos âmes, nous élevons les Nitzotzot
      des Kelipot vers RACHEL (= Nukvah/Malkhut).
      La prière quotidienne est un ACTE de Tikkun cosmique.
      De même pour le Shema Yisrael → élévation vers Binah pour Zivvug d'Abba.
    type: axiome_explicite
    concepts:
      - {id: nefilat_apayim, role: acte_de_tikkun}
      - {id: rachel, role: réceptrice_des_man}
      - {id: mesirat_nefesh, role: catalyseur}
      - {id: shema_yisrael, role: élévation_vers_avi}
    mapping:
      modules: ["tikkun/tikkun_scheduler.py", "tikkun/kavanah_planner.py"]
      tables: ["tikkun_actions"]
      partzufim: ["rachel", "leah", "abba", "imma"]
      relevance: "Connexion prière → Tikkun — le KavanahPlanner orchestre ces intentions"


