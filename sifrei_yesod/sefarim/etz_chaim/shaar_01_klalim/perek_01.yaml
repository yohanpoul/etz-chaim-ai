      tables: []
      partzufim: ["abba", "imma"]
      relevance: "Le mode AbA a une valeur positive — pas seulement une limitation"

  - id: "EC-K1-021"
    source_he: "וגם ז\"ס הנזכר בזוהר פרש' בראשית בצורת אות צ' שהם או\"א יו\"ד ונו\"ן כזה נ' כפופה הפוכה אב\"א"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Référence zoharique : la lettre TZADI (צ) = forme visuelle d'Abba et Imma dos à dos.
      YOD (י) = Abba, NUN KEFUFAH (נ' כפופה) retournée = Imma
      La forme de la lettre ENCODE la relation — dos à dos, penchés l'un vers l'autre.
      Le Zohar (Bereshit) utilise la forme des LETTRES comme diagrammes de relations.
