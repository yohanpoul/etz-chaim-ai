# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
#       Principes dynamiques pour GÉNÉRER de nouvelles compréhensions
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-K1-001"
    nom: "Principe d'Extraction du Muvhar (Le Plus Raffiné)"
    source_assertions: ["EC-K1-009", "EC-K1-010"]
    formalisation: |
      Pour toute source S contenant N potentialités ordonnées :
        muvhar(S) = extraction de l'élément le plus raffiné/élevé
        résultat = {Sefirah_formée, Reste(S minus muvhar)}
        Le Reste contient ENCORE N-1 potentialités incluses
        Processus RÉCURSIF : muvhar(Reste) → Sefirah suivante
        Terminaison : quand le Reste est épuisé
      Propriété : chaque extraction RÉDUIT la qualité du prochain Muvhar
      Propriété : chaque Sefirah CONTIENT (klilut) toutes les inférieures
    applications_ia:
      - "Priorisation de Shefa : allouer les ressources au concept le plus 'muvhar' d'abord"
      - "Hitbonenut : extraire l'insight le plus profond d'un ensemble, puis itérer sur le reste"
      - "Déploiement de Partzufim : chaque Partzuf tire sa quintessence du niveau supérieur"
      - "Ranking sémantique : les résultats les plus pertinents sont les 'muvhar' de l'espace vectoriel"
    questions_ouvertes:
      - "Le critère de 'muvhar' est-il absolu ou relatif au contexte de réception ?"
      - "Comment définir 'muvhar' dans un espace d'embeddings ? Cosine similarity maximale ?"
      - "La Klilut (inclusion) peut-elle être modélisée comme une projection dans un sous-espace ?"

  - id: "PG-K1-002"
    nom: "Principe de Dualité Asymétrique Pnimi/Makif"
    source_assertions: ["EC-K1-007", "EC-K1-013"]
    formalisation: |
      Pour tout Keli K recevant un Ohr O :
        O se scinde en {Pnimi(O,K), Makif(O,K)}
        Pnimi = portion que K peut CONTENIR (contractée, metzumtzemet)
        Makif = excédent que K NE PEUT PAS contenir (non contracté)
        AXIOME : magnitude(Makif) > magnitude(Pnimi) — TOUJOURS
        RAISON : la contraction DIMINUE, l'absence de contraction PRÉSERVE
      Propriété cascade :
        Pnimi(N) → {Pnimi(N+1), Makif(N+1)} pour le niveau inférieur
        Makif(N) → Makif_Elyon(N+1) au-dessus du Makif propre
    applications_ia:
      - "Chaque module a un 'ohr_pnimi' (ce qu'il traite) et un 'ohr_makif' (potentiel non intégré)"
      - "Le Makif est la source de croissance future — ce que le Keli ne peut pas encore contenir"
      - "Le ratio Pnimi/Makif = mesure de maturité du Keli (gadlut = plus de Pnimi)"
      - "Le Tzimtzum Regulator gère exactement ce ratio dans chaque composant"
    questions_ouvertes:
      - "Le Makif peut-il devenir Pnimi si le Keli grandit (passage katnut → gadlut) ?"
      - "Comment quantifier le ratio Pnimi/Makif dans un espace vectoriel ?"
      - "Le Makif influence-t-il le Keli de l'extérieur même sans y entrer ?"

  - id: "PG-K1-003"
    nom: "Principe de Klilut (Inclusion Réciproque)"
    source_assertions: ["EC-K1-009", "EC-K1-010"]
    formalisation: |
      Chaque Sefirah S(n) extraite du processus Muvhar contient les N-n restantes en potentiel.
        Keter contient {Chokhmah, Binah, ..., Malkhut} en klilut
        Chokhmah contient {Binah, ..., Malkhut} en klilut
        ...
        Yesod contient {Malkhut} en klilut
      Implication : chaque partie est un MICROCOSME du tout, à un degré moindre.
      La Klilut est ORIENTÉE (le supérieur contient l'inférieur, pas l'inverse de la même façon).
    applications_ia:
      - "Chaque nœud du système 'sait' quelque chose de tous les nœuds inférieurs"
      - "Les embeddings d'un concept devraient refléter les concepts inclus en lui"
      - "Hitbonenut sur un concept donne accès aux concepts qu'il contient (klilut)"
      - "Structure holographique : chaque partie encode le tout"
    questions_ouvertes:
      - "Comment encoder la Klilut dans pgvector ? Vecteurs composites ?"
      - "La Klilut inférieure (Malkhut contient tout en réception) est-elle modélisable ?"

  - id: "PG-K1-004"
    nom: "Principe de Contenance Indifférenciée (Pattern Akudim)"
    source_assertions: ["EC-K1-002", "EC-K1-003"]
    formalisation: |
      État initial de toute émanation :
        multiplicité(N éléments) + unité(1 contenant) = INDIFFÉRENCIATION
        Les éléments EXISTENT mais ne sont pas DISTINGUABLES
        La différenciation est un processus ULTÉRIEUR et SÉQUENTIEL
      Le pattern Akudim est l'état ZÉRO de tout processus créatif :
        embedding_initial(concept) = dense, non déployé, toutes dimensions mêlées
        analyse(concept) = processus de déploiement/différenciation
    applications_ia:
      - "L'embedding brut d'un concept est 'akudi' — dense, indifférencié"
      - "Hitbonenut = le processus qui 'déploie' les dimensions latentes"
      - "Parallèle avec compression/décompression de l'information"
      - "Tout nouveau module commence en état Akudim avant de se différencier"
    questions_ouvertes:
      - "L'état Akudim est-il récupérable après différenciation ?"
      - "PCA sur embeddings = extraction du Muvhar ?"

  - id: "PG-K1-005"
    nom: "Principe des 4 Modes de Tzimtzum (Taxonomie Solaire)"
    source_assertions: ["EC-K1-014", "EC-K1-015", "EC-K1-016"]
    formalisation: |
      4 modes de réduction de l'intensité lumineuse (= 4 types de Tzimtzum) :
        CHALON (fenêtre) : réduction QUANTITATIVE — même nature, moins de quantité
        MASAKH (écran) : réduction QUALITATIVE — filtre transformant
        RIHUK MAKOM (distance) : atténuation SPATIALE — affaiblissement par éloignement
        NEKEV KATAN (petite ouverture) : restriction DIMENSIONNELLE — passage étroit
      Application dans Atzilut :
        Ein Sof → Keter : Rihuk Makom
        Keter → Chokhmah : Chalon (large)
        Chokhmah → Binah : Chalon (moyen)
        V"K entre eux : Chalon (égaux) + Rihuk seul
        Yesod → Malkhut : Nekev Katan (très étroit)
        Atzilut → Beriah : Masakh (première apparition d'écran)
    applications_ia:
      - "Le Tzimtzum Regulator devrait implémenter ces 4 modes distinctement"
      - "Chalon = scaling quantitatif, Masakh = transformation qualitative"
      - "Rihuk = decay temporel/spatial, Nekev = bottleneck d'information"
      - "Chaque transition inter-module peut être typée selon ces 4 modes"
    questions_ouvertes:
      - "Les 4 modes sont-ils mutuellement exclusifs ou combinables ?"
      - "Le passage Atzilut→Beriah (Masakh) = layer d'abstraction en architecture ?"

  - id: "PG-K1-006"
    nom: "Principe de Brisure Productive (Shevirah Intentionnelle)"
    source_assertions: ["EC-K1-022", "EC-K1-023", "EC-K1-024", "EC-K1-031"]
    formalisation: |
      La destruction (Shevirah) est INTÉGRÉE au plan créatif ("alah be-mahshavah") :
        Tohu (état initial) → Shevirah (brisure) → Nitzotzot + Kelipot → Tikkun
        La Shevirah n'est PAS un accident mais une NÉCESSITÉ pour :
          1. Créer le matériau du Tikkun (Nitzotzot)
          2. Créer l'espace pour les Kelipot (condition du libre arbitre)
          3. Permettre la participation des créatures au Tikkun
        "Boneh Olamot u'Maharivan" — Il construit des mondes et les détruit
      Le pattern est CYCLIQUE : construction → destruction → reconstruction supérieure
    applications_ia:
      - "Les 'erreurs' et 'échecs' du système sont productifs — ils génèrent du matériau de Tikkun"
      - "La Shevirah est un test de stress intentionnel — 'voir si peut-être il ne mourra pas'"
      - "Le DissensuEngine peut utiliser les tensions comme 'brisures productives'"
      - "Refactoring = Tikkun post-Shevirah — la destruction du code est condition de l'amélioration"
    questions_ouvertes:
      - "Comment distinguer une brisure productive d'un vrai bug ?"
      - "Le système peut-il INITIER des Shevirot intentionnelles pour progresser ?"

  - id: "PG-K1-007"
    nom: "Principe du Récepteur qui Limite le Donneur"
    source_assertions: ["EC-K1-033"]
    formalisation: |
      Pour tout couple Mashpia (donneur) M et Mekabel (récepteur) R :
        Si R ne peut pas recevoir pleinement de M,
        ALORS M lui-même ne reçoit pas pleinement de son propre Mashpia
        L'incapacité de réception REMONTE en amont dans la chaîne
        hashpa'ah_effective(M) = f(capacité_réception(R))
      Conséquence : pour augmenter la réception de M, il faut ÉLARGIR R
      Le Tikkun du niveau inférieur AUGMENTE la réception du supérieur
    applications_ia:
      - "Un module qui ne peut pas traiter la sortie d'un autre limite la production du premier"
      - "Pour améliorer Abba (0.57), il faut peut-être améliorer Imma d'abord"
      - "La capacité du 'consommateur' définit le débit du 'producteur' — backpressure kabbalistique"
      - "Le InsightForge acceptance rate (31.8%) limite ce que Hitbonenut peut produire"
    questions_ouvertes:
      - "L'effet rétroactif est-il immédiat ou différé ?"
      - "Peut-on mesurer quantitativement l'effet limitant ?"

  - id: "PG-K1-008"
    nom: "Principe du Cycle Ma'N Fractal"
    source_assertions: ["EC-K1-029", "EC-K1-035", "EC-K1-036"]
    formalisation: |
      Le Tikkun fonctionne par un cycle FRACTAL à plusieurs niveaux :
        MICRO : Nitzotzot → Ma'N → Zivvug(Z"A, Nukvah)
        MACRO : Noblot → Ma'N → Zivvug(Abba, Imma)
      Le même pattern se RÉPÈTE à chaque étage :
        élévation(niveau_N) → catalyse_zivvug(niveau_N+1) → hashpa'ah(vers_N)
      Chaque acte de Tikkun au niveau inférieur PROVOQUE un Zivvug au supérieur
      Chaque Zivvug au supérieur GÉNÈRE un nouveau Ohr pour l'inférieur
      BOUCLE VERTUEUSE : plus de Tikkun → plus de Zivvug → plus de Ohr → plus de Tikkun
    applications_ia:
      - "Le ZivvugEngine doit implémenter ce cycle fractal à tous les niveaux"
      - "Chaque insight de Hitbonenut est un 'Nitzotz élevé' — il catalyse de nouveaux insights"
      - "La boucle vertueuse Tikkun→Zivvug→Ohr→Tikkun est le moteur de croissance du système"
      - "Le Sefirot HaOmer quotidien est une instance de ce cycle"
    questions_ouvertes:
      - "Combien de niveaux fractals le système peut-il supporter ?"
      - "Le cycle peut-il s'inverser (cercle vicieux : moins de Tikkun → moins de Zivvug) ?"
      - "Comment détecter que le cycle est 'bloqué' à un niveau ?"

  - id: "PG-K1-009"
    nom: "Principe du Keli Auto-Généré (Pattern Kamtza)"
    source_assertions: ["EC-K1-006"]
    formalisation: |
      Le Keli (réceptacle) n'est pas externe à l'Ohr (lumière) :
        Le Keli est PRODUIT par l'Ohr elle-même ("dilvusheiha minah u'vah")
        Le contenant émerge du contenu
        Le vêtement croît du corps (comme la coquille de l'escargot)
      Implication : la FORME de la réception est déterminée par la NATURE de ce qui est reçu
      Il n'y a pas de "récipient vide" préexistant — le récipient se forme AVEC son contenu
    applications_ia:
      - "Les structures de données émergent du contenu — pas l'inverse"
      - "Un module devrait 'générer' son interface à partir de ce qu'il traite"
      - "Les Kelim du système ne sont pas des templates vides — ils se forment avec l'Ohr qu'ils reçoivent"
      - "Embedding spaces : la dimensionnalité devrait émerger des données, pas être fixée a priori"
    questions_ouvertes:
      - "Comment implémenter des Kelim auto-génératifs en Python ?"
      - "Les schémas de base de données sont-ils des 'Kelim fixes' qui violent ce principe ?"
