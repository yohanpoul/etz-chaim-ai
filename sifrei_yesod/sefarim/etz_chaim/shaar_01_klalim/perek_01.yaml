# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 1 : PESHAT-MACHINE
#            Ce que le texte AFFIRME — assertions formelles
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─── BLOC A : CAUSE ET PREMIER ACTE D'ÉMANATION ───

  - id: "EC-K1-001"
    source_he: "כשעלה ברצונו יתברך שמו לברוא את העולם כדי להיטיב לברואיו ויכירו גדולתו ויזכו להיות מרכבה למעלה להדבק בו ית'"
    source_ref: "Sha'ar HaKlalim 1:1 — ouverture"
    assertion: |
      La création a une CAUSE et une FINALITÉ triple ordonnée :
      CAUSE : Ratzon Elyon (volonté supérieure) — "כשעלה ברצונו"
      FINALITÉ 1 : Hatavah — bienfaisance envers les créatures ("להיטיב לברואיו")
      FINALITÉ 2 : Hakarat Gadluto — qu'elles reconnaissent Sa grandeur ("ויכירו גדולתו")
      FINALITÉ 3 : Merkavah + Devekut — devenir véhicule et adhérer à Lui ("להיות מרכבה למעלה להדבק בו")
      L'ordre est significatif : bienfaisance → reconnaissance → adhésion.
      La création est un acte de BONTÉ, pas de nécessité.
    type: axiome_explicite
    concepts:
      - {id: ratzon_elyon, role: cause_première}
      - {id: hatavah, role: finalité_primaire}
      - {id: hakarat_gadluto, role: finalité_secondaire}
      - {id: devekut, role: finalité_ultime}
      - {id: merkavah, role: moyen_vers_devekut}
    mapping:
      modules: ["core/ratzon.py", "tikkun/kavanah_planner.py"]
      tables: ["kavanah_intentions"]
      partzufim: []
      relevance: "Définit le 'pourquoi' absolu du système — chaque opération de Tikkun vise ces trois finalités"

  - id: "EC-K1-002"
    source_he: "האציל נקודה א' הכלולה מי' (והם י\"ס של העקודים שהיו בכלי א') ולא היו נראים"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Premier acte d'émanation (ha'atzil) :
      - UNE Nekudah (point) unique est émanée
      - Elle CONTIENT (kelulah) les 10 Sefirot
      - Ces 10S sont identifiées comme les Sefirot des AKUDIM (עקודים)
      - Elles existaient dans UN SEUL Keli (כלי א')
      - Elles n'étaient PAS VISIBLES individuellement (לא היו נראים)
      État : multiplicité latente dans unité manifeste.
    type: axiome_explicite
    concepts:
      - {id: nekudah_rishonah, role: première_émanation}
      - {id: akudim, role: état_ontologique}
      - {id: keli_ehad, role: contenant_unifié}
      - {id: eser_sefirot, role: contenu_latent}
    mapping:
      modules: ["core/sefirot.py", "olamot/akudim.py"]
      tables: ["sefirot_states", "olamot_config"]
      partzufim: ["adam_kadmon"]
      relevance: "État initial de toute émanation — pattern Akudim applicable à chaque nouveau processus"

  - id: "EC-K1-003"
    source_he: "דרך משל האדם מורכב מד' יסודות ואינם ניכרים בו כל א' וא' בפ\"ע"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      MASHAL (analogie) : L'homme est composé (murkav) de 4 éléments (yesodot)
      mais aucun n'est distinguable (nikarim) individuellement (be-fney atzmo).
      NIMSHAL : De même la Nekudah contient 10S sans qu'aucune soit distinguable.
      PRINCIPE SOUS-JACENT : La composition n'implique pas la distinction visible.
      L'unité peut contenir la multiplicité sans la manifester.
    type: analogie_explicative
    concepts:
      - {id: arba_yesodot, role: mashal}
      - {id: nekudah_rishonah, role: nimshal}
      - {id: herkev_bilti_nikar, role: pattern}
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: "Pattern universel : composition sans distinction — applicable aux embeddings denses"

  # ─── BLOC B : POSITION ONTOLOGIQUE DE LA NEKUDAH ───

  - id: "EC-K1-004"
    source_he: "נקודה זו היתה כלולה מעשר בתחלת אצילותה וזו היא למעלה מן הכתר [שהוא] עתה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Position hiérarchique de la Nekudah :
      - Contient 10 dès le DÉBUT de son émanation (be-tehilat atzilutah)
      - Elle est AU-DESSUS (le-ma'alah min) du Keter ACTUEL (she-hu atah)
      - Distinction temporelle implicite : le Keter "actuel" est postérieur
      - La Nekudah est la SOURCE dont Keter dérive
      Hiérarchie : Ma'atzil → Nekudah Rishonah → Keter → Chokhmah → ...
    type: axiome_explicite
    concepts:
      - {id: nekudah_rishonah, role: source_absolue}
      - {id: keter, role: première_dérivation}
    mapping:
      modules: ["core/sefirot.py"]
      tables: ["sefirot_hierarchy"]
      partzufim: []
      relevance: "Implique un niveau au-dessus de Keter — la hiérarchie commence AVANT les 10 Sefirot connues"

  # ─── BLOC C : FLUX DU OHR ET DUALITÉ PNIMI/MAKIF ───

  - id: "EC-K1-005"
    source_he: "כי משם שואבים כל הי\"ס שפע וחיות מנקודה זו. גם אור וחיות נקודה זו יורדת מן המאציל בתוכה ביחד שהיא הכלי עם נשמתו"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Double flux depuis/vers la Nekudah :
      FLUX DESCENDANT DISTRIBUÉ : Toutes les 10S tirent (shoa'vim) Shefa et Hiyut DEPUIS la Nekudah
      FLUX DESCENDANT SOURCE : Le Ohr et Hiyut de la Nekudah elle-même descendent DU MA'ATZIL
      Le Ohr descend DANS la Nekudah comme unité Keli + Neshamah (vessel + âme)
      Le Keli et sa Neshamah arrivent ENSEMBLE (be-yahad), pas séparément.
    type: axiome_explicite
    concepts:
      - {id: shefa, role: flux_distribué}
      - {id: hiyut, role: vitalité}
      - {id: ma_atzil, role: source_transcendante}
      - {id: keli_ve_neshamah, role: unité_réceptacle_âme}
    mapping:
      modules: ["core/ohr_system.py", "core/shefa_flow.py"]
      tables: ["ohr_states", "shefa_flows"]
      partzufim: []
      relevance: "Architecture fondamentale du flux — le Keli n'est jamais vide, il arrive AVEC son Ohr"

  - id: "EC-K1-006"
    source_he: "כהדין קמצא דלבושיה מניה וביה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      MASHAL araméen (du Zohar) : "Comme cet escargot (kamtza) dont le vêtement
      vient de lui-même et est en lui" (dilvusheiha minah u'vah).
      NIMSHAL : Le Keli n'est pas externe à la Neshamah — il est PRODUIT par elle.
      Le contenant émerge du contenu. Le vêtement croît du corps.
      Implication : le Keli est une EXPRESSION de l'Ohr, pas un récipient externe.
    type: analogie_explicative
    concepts:
      - {id: kamtza, role: mashal_zoharique}
      - {id: levush, role: vêtement_auto_généré}
      - {id: keli, role: nimshal}
    mapping:
      modules: ["core/ohr_system.py"]
      tables: []
      partzufim: []
      relevance: "Principe fondamental : le réceptacle est une émanation de la lumière elle-même"

  - id: "EC-K1-007"
    source_he: "והיו בה י' אורות פנימים וי' אורות מקיפים ואור המקיף מבחוץ לכלי ונודע כי המקיף גדול מהפנימי כי או\"פ מצומצמת תוך הכלי משא\"כ במקיף"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Structure duale du Ohr dans la Nekudah :
      - 10 OROT PNIMIM (אורות פנימים) — lumières INTÉRIEURES, DANS le Keli
      - 10 OROT MAKIFIM (אורות מקיפים) — lumières ENVIRONNANTES, HORS du Keli
      AXIOME FONDAMENTAL : Ohr Makif > Ohr Pnimi (le Makif est TOUJOURS plus grand)
      RAISON : Le Ohr Pnimi est CONTRACTÉ (metzumtzemet) dans le Keli
      Le Ohr Makif n'est PAS contracté (ein bo tzimtzum)
      La contraction DIMINUE, l'absence de contraction PRÉSERVE la grandeur.
    type: axiome_explicite
    concepts:
      - {id: ohr_pnimi, role: lumière_contractée_intérieure}
      - {id: ohr_makif, role: lumière_non_contractée_environnante}
      - {id: keli, role: facteur_de_contraction}
      - {id: tzimtzum_local, role: cause_de_diminution}
    mapping:
      modules: ["core/ohr_system.py", "tzimtzum/regulator.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Fondement de TOUTE dualité Pnimi/Makif dans le système — le Tzimtzum Regulator gère ce ratio"

  - id: "EC-K1-008"
    source_he: "וז\"ס ודברתי אתך מבין ב' הכרובים שהיה מצומצמת שם השכינה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Preuve scripturaire (Exode 25:22) : "Je te parlerai d'entre les deux Kerouvim"
      Interprétation : La Shekhinah était CONTRACTÉE (metzumtzemet) entre les deux Kerouvim.
      Le Dibur (parole divine) ne se manifeste que dans un espace de contraction.
      Implication : la communication divine nécessite un Tzimtzum.
    type: déduction_scripturaire
    concepts:
      - {id: shekhinah, role: présence_contractée}
      - {id: kerouvim, role: limites_de_contraction}
      - {id: dibur, role: manifestation_dans_contraction}
    mapping:
      modules: ["tzimtzum/regulator.py"]
      tables: []
      partzufim: []
      relevance: "Le Tzimtzum n'est pas seulement un retrait — c'est la CONDITION de la communication"

  # ─── BLOC D : DÉPLOIEMENT DES 10 NEKUDOT (OLAM HA-TOHU) ───

  - id: "EC-K1-009"
    source_he: "ומנקודה זו נתפשטו י' נקודות מכתר עד המלכות עד\"ז כי מהיותר מובחר ועליון מנקודה זו נעשה כתר ונתפשט למטה ושאר הט' כלולים בו"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Processus de HITPASHTUT (déploiement) depuis la Nekudah source :
      10 Nekudot se déploient de Keter à Malkhut.
      MÉCANISME : Extraction du MUVHAR (מובחר — le plus raffiné/choisi)
      ÉTAPE 1 : Du plus Muvhar et Elyon de la Nekudah → KETER se forme
      Keter se déploie vers le bas (nitpasheet le-matah)
      Les 9 restantes sont INCLUSES (kelulim) en Keter.
    type: axiome_explicite
    concepts:
      - {id: hitpashtut, role: processus_de_déploiement}
      - {id: muvhar, role: principe_de_sélection}
      - {id: keter, role: première_extraction}
      - {id: klilut, role: inclusion_du_reste}
    mapping:
      modules: ["core/sefirot.py"]
      tables: ["sefirot_hierarchy", "sefirot_states"]
      partzufim: []
      relevance: "Algorithme fondamental de déploiement — extraction séquentielle du meilleur"

  - id: "EC-K1-010"
    source_he: "ומה שנשאר בתוכה ג\"כ ממובחר הנשאר מתפשט למטה מהכתר ונעשה חכמה והח' כלולים בו. ואח\"כ בינה והז' כלולים בה. ואח\"כ הו' נקודות יחד ואח\"כ המל'"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Suite du déploiement séquentiel par extraction du Muvhar :
      ÉTAPE 2 : Du Muvhar du RESTE → CHOKHMAH (+ 8 incluses)
      ÉTAPE 3 : Du reste → BINAH (+ 7 incluses)
      ÉTAPE 4 : Les 6 NEKUDOT ENSEMBLE (Zeir Anpin) — PAS individuellement !
      ÉTAPE 5 : MALKHUT — dernière, seule
      RUPTURE DE PATTERN : Les 6 du milieu sortent EN BLOC, pas une par une.
      Cela distingue les G"R (Keter, Chokhmah, Binah) des Z"T (6 + Malkhut).
    type: axiome_explicite
    concepts:
      - {id: chokhmah, role: deuxième_extraction}
      - {id: binah, role: troisième_extraction}
      - {id: zeir_anpin, role: extraction_groupée_de_6}
      - {id: malkhut, role: dernière_extraction}
      - {id: gimel_rishonot, role: catégorie_supérieure}
      - {id: zayin_tachtonot, role: catégorie_inférieure}
    mapping:
      modules: ["core/sefirot.py", "partzufim/zeir_anpin.py", "partzufim/nukvah.py"]
      tables: ["sefirot_hierarchy"]
      partzufim: ["zeir_anpin", "nukvah"]
      relevance: "Structure G\"R vs Z\"T — les 6 forment un BLOC (futur Z\"A)"

  - id: "EC-K1-011"
    source_he: "וזהו נקרא עולם התהו ובהו ועולם הנקודות"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      IDENTIFICATION ONTOLOGIQUE :
      Ce qui vient d'être décrit = OLAM HA-TOHU (עולם התהו ובהו — monde du Chaos)
      Synonyme : OLAM HA-NEKUDOT (עולם הנקודות — monde des Points)
      Le Tohu est caractérisé par des Sefirot sous forme de POINTS (nekudot),
      pas encore de PARTZUFIM (configurations complètes).
      Le Tohu précède le Tikkun dans l'ordre ontologique.
    type: axiome_explicite
    concepts:
      - {id: olam_ha_tohu, role: identification}
      - {id: olam_ha_nekudot, role: synonyme}
      - {id: nekudot, role: forme_pré_tikkun}
    mapping:
      modules: ["olamot/tohu.py"]
      tables: ["olamot_config"]
      partzufim: []
      relevance: "Le Tohu est l'état 'avant Tikkun' — chaque processus passe d'abord par un état Tohu"

  # ─── BLOC E : CASCADE DES LUMIÈRES (OHR PNIMI → MAKIF) ───

  - id: "EC-K1-012"
    source_he: "והאור העליון היה נכנס בתוכם ר\"ל בתוך הכלי ואור הא\"ס מקיף לכתר ומאו\"פ שבכתר נעשה פנימי ומקיף אל החכמה והקיף שבכתר נעשה מקיף עליון אל מקיף החכמה וכן כולם"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Mécanisme de CASCADE des lumières entre Sefirot :
      - Le Ohr Elyon entre dans les Kelim
      - Le Ohr Ein Sof ENTOURE Keter (Makif global)
      - Le Ohr Pnimi de KETER → devient Pnimi ET Makif de CHOKHMAH
      - Le Ohr Makif de KETER → devient Makif SUPÉRIEUR au-dessus du Makif de Chokhmah
      PATTERN : Chaque Sefirah a DEUX Makifim — un "propre" et un "hérité du supérieur"
      Le Pnimi du supérieur se DIVISE en Pnimi + Makif pour l'inférieur.
      Formule : Pnimi(N) → {Pnimi(N+1), Makif(N+1)}
                Makif(N) → Makif_Elyon(N+1)
    type: axiome_explicite
    concepts:
      - {id: cascade_ohr, role: mécanisme}
      - {id: makif_elyon, role: makif_hérité}
      - {id: makif_tahton, role: makif_propre}
      - {id: ein_sof_makif, role: makif_global}
    mapping:
      modules: ["core/ohr_system.py", "core/shefa_flow.py"]
      tables: ["ohr_states", "shefa_flows"]
      partzufim: []
      relevance: "Algorithme de propagation du Ohr de Sefirah en Sefirah — cœur du shefa_flow"

  - id: "EC-K1-013"
    source_he: "והענין כי מה שהיה יכולה לקבל מן האור המאיר בתוך הכתר נשאר בו בסוד או\"פ והשאר היה מקיף מבחוץ וכן עד\"ז מכתר לחכמה ומחכמה לבינה ומבינה לו\"ק ביחד"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      PRINCIPE DE RÉCEPTION LIMITÉE :
      Chaque Keli ne peut recevoir (lekabel) qu'une PORTION de l'Ohr qui l'éclaire.
      Ce qu'il PEUT contenir → reste comme Ohr Pnimi (סוד או"פ)
      Ce qu'il NE PEUT PAS contenir → devient Ohr Makif extérieur
      Ce pattern se RÉPÈTE identiquement à chaque niveau :
      Keter → Chokhmah → Binah → V"K (ensemble)
      La capacité de réception DÉFINIT la distinction Pnimi/Makif.
    type: axiome_explicite
    concepts:
      - {id: koah_ha_kabalah, role: capacité_de_réception}
      - {id: ohr_pnimi, role: portion_reçue}
      - {id: ohr_makif, role: excédent_non_reçu}
    mapping:
      modules: ["core/ohr_system.py", "tzimtzum/regulator.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Le ratio Pnimi/Makif est déterminé par la CAPACITÉ du Keli — variable fondamentale du Tzimtzum Regulator"

  # ─── BLOC F : MASHAL DU SOLEIL — MODES DE TRANSMISSION ───

  - id: "EC-K1-014"
    source_he: "ודע כי שמש ומגן ה' צבאות וכמו שהשמש אור עליון גדול ואין יכולת להביט בו כי אם בהתמעטות דרך חלון או ע\"י מסך או ע\"י ריחוק מקום או ע\"י נקב קטן"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      MASHAL du Soleil (Psaume 84:12 — "Shemesh u'Magen Hashem Tzva'ot") :
      Le Soleil = lumière trop grande pour être regardée directement.
      4 MODES de réduction pour rendre la lumière supportable :
      MODE 1 : Chalon (חלון) — fenêtre (réduction quantitative)
      MODE 2 : Masakh (מסך) — écran/filtre (réduction qualitative)
      MODE 3 : Rihuk Makom (ריחוק מקום) — distance (atténuation spatiale)
      MODE 4 : Nekev Katan (נקב קטן) — petite ouverture (restriction dimensionnelle)
      Ces 4 modes correspondent à 4 types de Tzimtzum dans la transmission du Ohr.
    type: analogie_explicative
    concepts:
      - {id: shemesh, role: mashal_solaire}
      - {id: chalon, role: mode_fenêtre}
      - {id: masakh, role: mode_écran}
      - {id: rihuk_makom, role: mode_distance}
      - {id: nekev_katan, role: mode_ouverture}
    mapping:
      modules: ["tzimtzum/regulator.py", "core/ohr_system.py"]
      tables: []
      partzufim: []
      relevance: "Taxonomie des modes de Tzimtzum — le Regulator utilise ces 4 modes"

  - id: "EC-K1-015"
    source_he: "והנה בעולם האצילות האור בא הלא ע\"י מסך כלל אך כשבא אור א\"ס בכתר אין בו יכולת לסבלו רק ע\"י ריחוק מקום. אך מכתר לחכמה אין בו ריחוק כלל אבל בא ע\"י חלון פי' מיסוד דא\"א הנקרא חלון"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Application du Mashal aux niveaux d'Atzilut :
      ATZILUT : PAS de Masakh (écran) du tout — transmission directe
      Ein Sof → KETER : par RIHUK MAKOM (distance) uniquement
      KETER → CHOKHMAH : par CHALON (fenêtre) = Yesod de Arikh Anpin
      Le Yesod de A"A est appelé "Chalon" (fenêtre) — il réduit quantitativement le Ohr.
      IMPORTANT : Chaque transition inter-Sefirot passe par le YESOD du supérieur.
      Le Yesod est l'organe de transmission.
    type: axiome_explicite
    concepts:
      - {id: atzilut, role: monde_sans_masakh}
      - {id: arikh_anpin, role: partzuf_de_keter}
      - {id: yesod, role: organe_de_transmission}
      - {id: chalon, role: yesod_comme_fenêtre}
    mapping:
      modules: ["core/ohr_system.py", "partzufim/arikh_anpin.py"]
      tables: ["ohr_states", "partzufim_states"]
      partzufim: ["arikh_anpin", "abba"]
      relevance: "Le Yesod comme canal de transmission — fondement de l'architecture de flux inter-Partzufim"

  - id: "EC-K1-016"
    source_he: "גם מחכה לבינה בא ע\"י חלון פי' מיסוד אבא שהוא חלון אחר קטן. אמנם בו\"ק עצמן חלונותיהם שוין מזה לזה כי כולם בחי' א'. אח\"כ מיסוד למל' בא האור מחלון קטן וצר מאד פי' מיסוד דז\"א הנקרא חלון ג\"כ וצר מאד דוגמת נקב קטן"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Suite de la transmission inter-Sefirot dans Atzilut :
      CHOKHMAH → BINAH : par CHALON (fenêtre) = Yesod de Abba (חלון אחר קטן — fenêtre PLUS PETITE)
      V"K entre eux : CHALONS ÉGAUX (חלונותיהם שוין) car ils sont de même nature (בחי' א')
      YESOD → MALKHUT : par CHALON très étroit (קטן וצר מאד) = Yesod de Z"A
      Ce Chalon de Z"A est comparé à un NEKEV KATAN (נקב קטן — petite ouverture)
      GRADIENT : A"A(large) → Abba(moyen) → Z"A(très étroit)
      Les V"K ne diffèrent entre eux que par la DISTANCE, pas par la taille du Chalon.
    type: axiome_explicite
    concepts:
      - {id: yesod_abba, role: fenêtre_moyenne}
      - {id: yesod_za, role: fenêtre_très_étroite}
      - {id: vav_ketzavot, role: fenêtres_égales}
      - {id: gradient_transmission, role: pattern}
    mapping:
      modules: ["core/ohr_system.py", "partzufim/zeir_anpin.py"]
      tables: ["ohr_states"]
      partzufim: ["abba", "zeir_anpin"]
      relevance: "Gradient de transmission — chaque Yesod est un 'chalon' de taille différente"

  # ─── BLOC G : LES 7 HAKKAFOT ET MALKHUT ───

  - id: "EC-K1-017"
    source_he: "וז\"ס ז' הקפות כי הם בסוד המל' שיש בה כללות ז' הקפות. ומג\"ר שבכתר יצא או\"מ אל ז\"ת שבו עצמו ומז\"ת שבכתר יצא או\"מ ב' אל ג\"ר דחכמה..."
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Le secret des 7 HAKKAFOT (circuits) = Malkhut contenant 7 Makifim :
      CIRCUIT 1 : G"R de Keter → Ohr Makif sur Z"T de Keter même
      CIRCUIT 2 : Z"T de Keter → Ohr Makif sur G"R de Chokhmah
      CIRCUIT 3 : G"R de Chokhmah → Ohr Makif sur Z"T de Chokhmah
      CIRCUIT 4 : Z"T de Chokhmah → Ohr Makif sur G"R de Binah
      CIRCUIT 5 : G"R de Binah → Ohr Makif sur Z"T de Binah
      CIRCUIT 6 : Z"T de Binah → Ohr Makif sur V"K
      CIRCUIT 7 : V"K → Ohr Makif sur Malkhut
      TOUS sont INCLUS dans Malkhut — d'où les 7 Hakkafot lui correspondent.
      Pattern : oscillation G"R↔Z"T à chaque niveau, cascadant vers le bas.
    type: axiome_explicite
    concepts:
      - {id: sheva_hakkafot, role: structure_de_circuits}
      - {id: malkhut, role: réceptacle_final_de_tous_makifim}
      - {id: gimel_rishonot, role: émetteur_interne}
      - {id: zayin_tachtonot, role: récepteur_interne}
    mapping:
      modules: ["core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Structure fractale des 7 circuits — applicable au calcul de propagation des Makifim"

  - id: "EC-K1-018"
    source_he: "ונחזור לענין כי באצילות לא יש מסך כלל. אך מבריאה ולמטה האור בא ע\"י מסך גמור והאור עובר בתוכו ומאיר"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      DISTINCTION FONDAMENTALE Atzilut vs BYA :
      ATZILUT : PAS de Masakh (écran) — transmission directe (Chalon, Rihuk, mais pas Masakh)
      BERIAH et en-dessous : MASAKH GAMUR (écran complet) — le Ohr passe AU TRAVERS
      Le Masakh ne bloque pas totalement — il FILTRE ("le Ohr passe à travers et illumine")
      Implication : la frontière Atzilut/Beriah est le lieu d'apparition du premier Masakh.
    type: axiome_explicite
    concepts:
      - {id: masakh, role: écran_filtrant}
      - {id: parsah, role: frontière_atzilut_beriah}
      - {id: atzilut, role: monde_sans_écran}
      - {id: beriah, role: monde_avec_écran}
    mapping:
      modules: ["olamot/atzilut.py", "olamot/beriah.py"]
      tables: ["olamot_config"]
      partzufim: []
      relevance: "La Parsah Atzilut/Beriah est une frontière architecturale majeure dans le système"

  # ─── BLOC H : ABBA PANIM BE-PANIM, BINAH ACHOR BE-ACHOR ───

  - id: "EC-K1-019"
    source_he: "ודע כי כשנתפשטו י' נקודים הנ\"ל הנה הכתר היה בו יכולת לסבול האור הזה אבל או\"א לא היו שוין כי אבא קיבל האור פב\"פ [מן] הכתר והיה בו יכולת לסבול האור אך הבינה לא קבלה האור מחכמה אלא אב\"א שלא יכלה לסבלה"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Capacité de réception des 10 Nekudot lors du déploiement :
      KETER : POUVAIT supporter (yakhol lisbol) le Ohr → stable
      ABBA (Chokhmah) : reçoit PANIM BE-PANIM (פב"פ — face à face) de Keter → stable
      BINAH : NE POUVAIT PAS recevoir Panim be-Panim de Chokhmah
      Binah reçoit ACHOR BE-ACHOR (אב"א — dos à dos) — mode réduit
      L'asymétrie Abba/Ima est ORIGINELLE, pas accidentelle.
      PbP = réception pleine ; AbA = réception partielle/réduite.
    type: axiome_explicite
    concepts:
      - {id: panim_be_panim, role: réception_pleine}
      - {id: achor_be_achor, role: réception_réduite}
      - {id: koah_ha_sevil, role: capacité_à_supporter}
      - {id: abba, role: récepteur_stable}
      - {id: imma, role: récepteur_limité}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "core/zivvug_engine.py"]
      tables: ["partzufim_states", "zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "L'asymétrie PbP/AbA est la racine du Zivvug — directement lié au ZivvugEngine"

  - id: "EC-K1-020"
    source_he: "וז\"ס וחכם באחור ישבחנה כי חכם שהיא חכמה השביח את הבינה והאיר בה בסוד אב\"א"
    source_ref: "Sha'ar HaKlalim 1:1"
    assertion: |
      Preuve scripturaire (Proverbes 29:11) : "Le sage la loue par derrière"
      Chokhmah (le "sage") illumine Binah par l'ARRIÈRE (sod Achor be-Achor).
      "Ishbehenah" (la loue) = il la REHAUSSE malgré la limitation.
      L'illumination AbA n'est pas un échec — c'est un mode spécifique de bienfaisance.
    type: déduction_scripturaire
    concepts:
