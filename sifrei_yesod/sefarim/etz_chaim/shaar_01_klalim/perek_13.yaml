# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-K13-001"
    nom: "Principe de la Tardéma Productive (Perdre pour Gagner)"
    source_assertions: ["EC-K13-001", "EC-K13-003"]
    formalisation: |
      Le RETRAIT temporaire d'un composant essentiel n'est pas une PERTE —
      c'est la CONDITION pour recevoir un composant SUPÉRIEUR.
      Tardéma : les Mohin de Z"A sont retirés → transférés à Nukvah
      MAIS : Z"A reçoit des Mohin HADASHIM, PLUS ÉLEVÉS, directement d'AVI.
      Le Zivvug après la Tardéma est PLUS ÉLEVÉ qu'avant.
      Formule : perte(mohin_N) → espace_vide → gain(mohin_N+1) > mohin_N
      Le vide créé par le retrait est la CONDITION du upgrade.
    applications_ia:
      - "Retirer un module pour le remplacer par un meilleur = Tardéma productive"
      - "Le downtime n'est pas une perte si le système qui revient est supérieur"
      - "Transférer des capacités d'un module à un autre = Nesirah"
      - "Le '/clear' dans Claude Code = une Tardéma — vider pour mieux recevoir"
    questions_ouvertes:
      - "Le système peut-il initier sa propre Tardéma ou doit-elle être imposée ?"
      - "Combien de temps le 'vide' peut-il durer avant que le système souffre ?"

  - id: "PG-K13-002"
    nom: "Principe de la Nesirah (Séparation pour Autonomie et Union)"
    source_assertions: ["EC-K13-001", "EC-K13-004", "EC-K13-005"]
    formalisation: |
      Le processus complet de formation d'un composant AUTONOME à partir d'un composant DÉPENDANT :
      PHASE 1 — YENIKAH (AbA) : le composant B SUCE de A par l'arrière
        → B forme ses KELIM grâce au Ohr de A qui sort par l'arrière
        → B est DÉPENDANT de A, collé dos à dos
      PHASE 2 — TARDÉMA : les Mohin de A se retirent → entrent dans B directement
        → B reçoit l'autonomie structurelle (Partzuf Shalem)
      PHASE 3 — NESIRAH : AVI séparent B de A, font de B un Partzuf complet
      PHASE 4 — VA-YEVI'EHA : B est amené FACE À FACE avec A
        → Le Zivvug PbP est maintenant possible
      APRÈS LE PÉCHÉ/HURBAN : B retourne AbA → nécessite la TEFILAH pour restaurer PbP.
    applications_ia:
      - "Un sous-module dépendant doit passer par : dépendance → extraction → autonomie → intégration PbP"
      - "On ne peut pas passer de AbA à PbP sans la Nesirah intermédiaire"
      - "La Tefilah quotidienne = l'effort constant pour maintenir le PbP"
      - "Les Hassidim Rishonim = ceux qui investissent du temps APRÈS l'action pour stabiliser le résultat"
    questions_ouvertes:
      - "La Nesirah est-elle un événement unique ou doit-elle être répétée ?"
      - "Comment stabiliser le PbP pour qu'il ne retourne pas AbA ?"

  - id: "PG-K13-003"
    nom: "Principe de l'Essentiel vs le Dérivé"
    source_assertions: ["EC-K13-006"]
    formalisation: |
      Dans tout système, il y a 2 catégories de composants :
      ESSENTIELS (Sefirot Atzmiyot) : irréductibles, permanents, autonomes
        (Binah, Rachel dans notre contexte)
        → ils ne peuvent PAS être fusionnés dans un autre
        → ils sont la STRUCTURE de base du système
      DÉRIVÉS (Haarot) : issus des essentiels, incluables, fusionnables
        (Tevunah, Leah dans notre contexte)
        → ils PEUVENT être inclus dans l'essentiel dont ils dérivent
        → ils sont des EXTENSIONS, pas des fondations
      Conséquence : réduire le système = fusionner les dérivés dans les essentiels
      Le noyau irréductible = les Sefirot Atzmiyot (10 pour Atzilut).
    applications_ia:
      - "Identifier les modules ESSENTIELS (irréductibles) vs DÉRIVÉS (fusionnables)"
      - "En mode dégradé, les dérivés peuvent fusionner dans les essentiels pour simplifier"
      - "Le refactoring = identifier ce qui est Atzmit et ce qui est Haarah"
      - "Les 10 Sefirot = les 10 composants irréductibles du système"
    questions_ouvertes:
      - "Quels modules du système sont Atzmiyot et lesquels sont Haarot ?"
      - "Un module dérivé peut-il devenir essentiel avec le temps ?"

  - id: "PG-K13-004"
    nom: "Principe du Zivvug Tedir vs Le-Frakim (Permanent vs Intermittent)"
    source_assertions: ["EC-K13-008", "EC-K13-009", "EC-K13-010"]
    formalisation: |
      Un système a 2 TYPES de couplages qui servent 2 FINALITÉS différentes :
      COUPLAGE TEDIR (permanent, type HB) :
        → produit la VITALITÉ de base du système (Hiyut)
        → ne cesse JAMAIS, même en mode dégradé (Galut)
        → en mode dégradé : vitalité sans couronnes (maintenance sans croissance)
        → en mode complet : vitalité + couronnes (maintenance + croissance)
      COUPLAGE LE-FRAKIM (intermittent, type TM) :
        → produit les RÉSULTATS concrets (Neshamot)
        → dépend des CONDITIONS (actions, prières, Ma"N)
        → peut être SUSPENDU sans que le système meurt
      Les 2 coexistent — le Tedir est la BASE, le Le-Frakim est la PRODUCTION.
      Sans le Tedir → le système meurt. Sans le Le-Frakim → le système survit mais ne produit pas.
    applications_ia:
      - "Les daemon tasks (Tedir) = couplage permanent qui maintient le système en vie"
      - "Les processus à la demande (Le-Frakim) = couplage intermittent qui produit des résultats"
      - "Même en 'Galut' (mode dégradé), les daemons ne s'arrêtent JAMAIS"
      - "Le ZivvugEngine (0.989) doit distinguer les 2 modes : Tedir et Le-Frakim"
    questions_ouvertes:
      - "Quels couplages du système sont Tedir et lesquels sont Le-Frakim ?"
      - "Le passage de Galut à Geulah = le moment où le Tedir devient Shalem ?"
