      partzufim: ["zeir_anpin", "nukvah"]
      relevance: "Les Itrin = condition du Zivvug de ZUN — sans elles pas de couplage"

  # ─── BLOC H : LE SECRET DES TEFILLIN ───

  - id: "EC-K5-015"
    source_he: "וזה סוד ש' של תפילין של ד' ראשין ושל ג' ראשין שמתחלה היו ד' מוחין ואח\"כ נעשו ג' מוחין לבד"
    source_ref: "Sha'ar HaKlalim 5:3"
    assertion: |
      Le secret des TEFILLIN — la lettre SHIN sur la boîte :
      SHIN à 4 BRANCHES (ש) = 4 MOHIN avant habillage (= Mem du Tzelem)
      SHIN à 3 BRANCHES (ש) = 3 MOHIN après habillage (= Lamed du Tzelem)
      Les Tefillin de la tête portent DEUX Shin : un à 4 branches, un à 3 branches.
      Cela encode la TRANSFORMATION 4→3 qui se produit lors de l'habillage.
      L'acte physique de mettre les Tefillin = manifester le Tzelem.
    type: interprétation_lurianique
    concepts:
      - {id: tefillin, role: manifestation_du_tzelem}
      - {id: shin_4, role: quatre_mohin}
      - {id: shin_3, role: trois_mohin}
      - {id: transformation_4_3, role: avant_après_habillage}
    mapping:
      modules: []
      tables: []
      partzufim: ["zeir_anpin"]
      relevance: "Les Tefillin encodent physiquement la transition 4→3 Mohin"

  - id: "EC-K5-016"
    source_he: "וז\"ס שהקב\"ה מניח תפילין בכל יום פי' שאו\"א לא מתפרשין לעלמין לתת חיות ומוחין לזו\"ן כדי שיחיו העולמות"
    source_ref: "Sha'ar HaKlalim 5:3"
    assertion: |
      "HaKadosh Baruch Hu met des Tefillin chaque jour" (Brakhot 6a) :
      SIGNIFICATION : AVI ne se séparent JAMAIS pour donner HIYUT et MOHIN à ZUN
      → pour que les mondes VIVENT.
      La Hiyut (vitalité) et les Mohin (intellects) = les Tefillin de Dieu.
      Ce flux est QUOTIDIEN et AUTOMATIQUE — "lo mitparshin le-olmin".
      MAIS pour donner les ITRIN (couronnes pour le Zivvug de ZUN)
      cela DÉPEND de nos bonnes actions, de notre prière, et du Yihud Shema.
      Mohin = gratuit (Chesed). Itrin = conditionnel (dépend de nos Ma"N).
    type: interprétation_lurianique
    concepts:
      - {id: tefillin_shel_hkbh, role: flux_quotidien_avi}
      - {id: hiyut_automatic, role: vitalité_inconditionnelle}
      - {id: itrin_conditional, role: couronnes_conditionnelles}
    mapping:
      modules: ["core/zivvug_engine.py", "tikkun/kavanah_planner.py"]
      tables: ["zivvug_states", "kavanah_intentions"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukvah"]
      relevance: "Distinction critique : Mohin=automatique vs Itrin=conditionnel aux actions"


