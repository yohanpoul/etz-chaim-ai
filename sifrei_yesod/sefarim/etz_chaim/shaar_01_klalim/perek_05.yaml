principes_generatifs:

  - id: "PG-K5-001"
    nom: "Principe du Triple Emboîtement (Moah → NHY → Keli)"
    source_assertions: ["EC-K5-008", "EC-K5-009"]
    formalisation: |
      Un contenu de haute intensité ne peut être reçu que par TRIPLE EMBOÎTEMENT :
      COUCHE 1 (interne) : Le CONTENU brut (Moah/intellect)
      COUCHE 2 (intermédiaire) : L'ENVELOPPE protectrice (NHY d'Imma)
      COUCHE 3 (externe) : Le RÉCEPTACLE final (Sefirah de Z"A)
      Sans la couche intermédiaire, le contenu DÉTRUIRAIT le réceptacle.
      L'Imma ne donne pas seulement les Mohin — elle les EMBALLE pour protéger Z"A.
      C'est un pattern d'ENCAPSULATION à 3 niveaux.
    applications_ia:
      - "Les données brutes (Moah) doivent être encapsulées avant d'être injectées dans un module"
      - "L'architecture 3-tier (données → service → interface) est un Tzelem"
      - "Les API wrappent les données (NHY) avant de les exposer aux consommateurs (Z\"A)"
      - "Le pattern Adapter/Wrapper est un NHY d'Imma"
    questions_ouvertes:
      - "Peut-on avoir plus ou moins de 3 couches d'emboîtement ?"
      - "La couche intermédiaire (NHY) modifie-t-elle le contenu ou seulement le protège ?"

  - id: "PG-K5-002"
    nom: "Principe du Tzelem (3 États de Transformation)"
    source_assertions: ["EC-K5-007", "EC-K5-010", "EC-K5-011"]
    formalisation: |
      Tout transfert d'information passe par 3 ÉTATS encodés dans le mot TZELEM (צל"ם) :
      ÉTAT MEM (ם=40) : Information BRUTE — 4 éléments distincts, non emballés
      ÉTAT LAMED (ל=30) : Information EMBALLÉE — certains éléments fusionnent (4→3)
      ÉTAT TZADI (צ=90) : Information DÉPLOYÉE — propagée dans tout le système (9 points)
      Le passage d'un état à l'autre est IRRÉVERSIBLE dans l'ordre.
      La FUSION (4→3) est un processus de SIMPLIFICATION NÉCESSAIRE.
      Le DÉPLOIEMENT (3→9) est un processus d'EXPANSION.
    applications_ia:
      - "Pipeline de données : raw (Mem) → packaged (Lamed) → deployed (Tzadi)"
      - "Le compilateur suit le même pattern : source → bytecode → exécution"
      - "Les Mohin ne sont utiles que quand ils sont DÉPLOYÉS (Tzadi) — pas quand ils sont bruts (Mem)"
      - "Mesurer à quel état Tzelem se trouve chaque composant"
    questions_ouvertes:
      - "Le processus est-il réversible (peut-on revenir de Tzadi à Lamed) ?"
      - "Le ratio 40→30→90 a-t-il une signification mathématique ?"

  - id: "PG-K5-003"
    nom: "Principe de la Betisha (Impact Créatif entre Polarités)"
    source_assertions: ["EC-K5-003"]
    formalisation: |
      La PRODUCTION de nouveaux éléments (5H + 5G) nécessite un IMPACT (Betisha)
      entre deux polarités complémentaires (Mazal Elyon + Mazal Tahton).
      La Betisha est un MYSTÈRE reconnu — "nous ne pouvons expliquer ce qu'elle est".
      Propriétés :
        - Les 2 polarités ne FUSIONNENT pas — elles s'IMPACTENT
        - L'impact PRODUIT quelque chose de nouveau (5H + 5G)
        - Chaque polarité produit selon sa NATURE (Chesed→Hassadim, Din→Gevurot)
        - L'impact est la condition SINE QUA NON de la production
      Le mystère de la Betisha = le mystère de la créativité fondamentale.
    applications_ia:
      - "L'innovation naît de l'IMPACT entre deux perspectives opposées, pas de leur fusion"
      - "Le DissensuEngine (tensions) = des Betishiot productives"
      - "L'impact Chesed/Gevurah dans le système produit les ressources pour les Mohin"
      - "Certains processus restent des 'boîtes noires' même dans un système érudit"
    questions_ouvertes:
      - "La Betisha est-elle modélisable ou fondamentalement mystérieuse ?"
      - "Comment créer des conditions de Betisha productive dans le système ?"

  - id: "PG-K5-004"
    nom: "Principe du Flux Automatique vs Conditionnel"
    source_assertions: ["EC-K5-016"]
    formalisation: |
      Deux types de flux dans le système :
      FLUX AUTOMATIQUE (Tefillin/Hiyut) :
        - Toujours actif, quotidien, inconditionnel
        - AVI ne se séparent jamais pour donner Mohin et Hiyut
        - C'est la BASE VITALE du système — sans elle, les mondes ne vivent pas
        - Mode CHESED pur (gratuité)
      FLUX CONDITIONNEL (Itrin/Ateret) :
        - Dépend des Ma"N (actions, prières, Yihud)
        - Nécessaire pour le Zivvug de ZUN
        - C'est la CROISSANCE et la REPRODUCTION du système
        - Mode dépendant de l'input extérieur
      Les deux coexistent — le conditionnel s'appuie sur l'automatique.
    applications_ia:
      - "Les daemon tasks (21 actives) = flux automatique (Tefillin quotidiens)"
      - "Les améliorations et nouveaux features = flux conditionnel (dépend des Ma\"N)"
      - "Le ZivvugEngine (0.989) fonctionne en automatique pour la Hiyut, en conditionnel pour les Itrin"
      - "Distinguer les processus vitaux (never-stop) des processus de croissance (on-demand)"
    questions_ouvertes:
      - "Quels processus du système sont automatiques et lesquels sont conditionnels ?"
      - "Le flux conditionnel peut-il devenir automatique (passage à la maturité) ?"

  - id: "PG-K5-005"
    nom: "Principe des 2 Sources Complémentaires (Terin Mazalot)"
    source_assertions: ["EC-K5-001", "EC-K5-002", "EC-K5-003"]
    formalisation: |
      Tout système productif nécessite 2 SOURCES complémentaires :
      SOURCE DROITE (Mazal Elyon → Abba) : produit HASSADIM (expansion, bonté, accueil)
      SOURCE GAUCHE (Mazal Tahton → Imma) : produit GEVUROT (restriction, rigueur, forme)
      Les 2 sources doivent s'IMPACTER (Betisha) pour produire
      Ni l'une ni l'autre ne suffit seule
      Hassadim sans Gevurot = expansion sans forme = chaos
      Gevurot sans Hassadim = forme sans contenu = vide rigide
      L'IMPACT entre les deux = la créativité
    applications_ia:
      - "Chaque processus a besoin d'un input Chesed (contenu) et Gevurah (contrainte)"
      - "Le Tzimtzum Regulator = le Mazal Tahton (restriction), le Shefa Flow = le Mazal Elyon (expansion)"
      - "Les tests (Gevurot) impactent le code (Hassadim) → produisent la qualité"
      - "InsightForge acceptance (31.8%) = Gevurah qui contraint la Hassadim des insights"
    questions_ouvertes:
      - "Le ratio optimal Hassadim/Gevurot est-il toujours 5:5 ?"
      - "Comment identifier les 2 Mazalot de chaque sous-système ?"
