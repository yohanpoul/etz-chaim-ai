principes_generatifs:

  - id: "PG-K7-001"
    nom: "Principe de la Couverture Défensive (Protection des Achorayim)"
    source_assertions: ["EC-K7-002", "EC-K7-003", "EC-K7-004"]
    formalisation: |
      Les parties ARRIÈRE (Achorayim) d'un système sont VULNÉRABLES aux forces extérieures.
      Les parties HAUTES sont naturellement protégées (les Kelipot n'y accèdent pas).
      Les parties BASSES DÉCOUVERTES sont les plus VULNÉRABLES.
      SOLUTION : Créer un composant dédié qui COUVRE les Achorayim vulnérables.
      Ce composant (Nukvah) sort EXACTEMENT là où la vulnérabilité commence.
      La protection n'est pas par FORCE mais par PRÉSENCE (collage des Achorayim).
    applications_ia:
      - "Chaque module exposé devrait avoir une couche de protection sur ses 'arrières'"
      - "Les interfaces publiques (Malkhut) protègent les internals (Z\"A) des accès extérieurs"
      - "Le firewall = la Nukvah du système réseau"
      - "La vulnérabilité est proportionnelle à l'exposition (gilui)"
    questions_ouvertes:
      - "Quels sont les 'Achorayim' vulnérables du système Etz Chaim AI ?"
      - "La protection par présence est-elle suffisante ou faut-il aussi de la force ?"

  - id: "PG-K7-002"
    nom: "Principe du Noyau Irréductible (Ma'aser/Nekudah Ikarit)"
    source_assertions: ["EC-K7-008"]
    formalisation: |
      Tout composant a un NOYAU IRRÉDUCTIBLE (Nekudah Ikarit) qui est SON ESSENCE.
      Ce noyau = 1/10 du total (Ma'aser).
      Les 9/10 restants viennent de l'EXTÉRIEUR (du niveau supérieur).
      Le noyau est KADOSH (saint/intouchable) car c'est la seule chose PROPRE au composant.
      Sans ce noyau → le composant n'existe pas, même avec les 9/10 externes.
      Les 9/10 sont l'EXTENSION du noyau, pas son remplacement.
    applications_ia:
      - "Chaque module a un 'Ma'aser' = son noyau fonctionnel irréductible"
      - "90% du code/fonctionnalité peut venir de l'extérieur (frameworks, libraries)"
      - "Le 10% propre est ce qui rend le module UNIQUE et irremplaçable"
      - "Identifier le 'Ma'aser' de chaque module = comprendre son essence"
    questions_ouvertes:
      - "Le ratio 1:9 est-il universel ou spécifique à Nukvah ?"
      - "Comment identifier le Ma'aser (noyau irréductible) de chaque composant ?"

  - id: "PG-K7-003"
    nom: "Principe des Profils Complémentaires Inversés"
    source_assertions: ["EC-K7-012"]
    formalisation: |
      Deux composants COMPLÉMENTAIRES ont des profils de FORCE/FAIBLESSE INVERSÉS :
      COMPOSANT A (Z"A) : fort en bas (Hassadim), faible en haut (pas de Hassadim)
      COMPOSANT B (Nukvah) : fort en haut (Hassadim surplus), faible en bas (Gevurot brutes)
      Quand ils s'UNISSENT (Zivvug) :
      La force de A compense la faiblesse de B EN BAS
      La force de B compense la faiblesse de A EN HAUT
      L'union produit un PROFIL COMPLET — ni dur ni doux mais ÉQUILIBRÉ.
      La complémentarité n'est pas une similarité — c'est une INVERSION.
    applications_ia:
      - "Les modules complémentaires ont des profils de force/faiblesse INVERSÉS"
      - "Un module qui fait bien l'analyse (haut) et mal l'exécution (bas) se couple avec son inverse"
      - "Le Zivvug optimal = union de profils inversés, pas de profils similaires"
      - "Le ZivvugEngine devrait détecter les profils complémentaires inversés"
    questions_ouvertes:
      - "Comment mesurer le 'profil d'inversion' de chaque module ?"
      - "Tous les couples fonctionnels ont-ils des profils inversés ?"

  - id: "PG-K7-004"
    nom: "Principe de la Fractalité Parentale"
    source_assertions: ["EC-K7-001"]
    formalisation: |
      Le MÊME PATTERN de croissance se répète à chaque niveau :
      IMMA fait croître Z"A via ses NHY + moitié de Tiferet
      Z"A fait croître NUKVAH via ses NHY + moitié de Tiferet
      Chaque Partzuf est l'IMMA du Partzuf inférieur.
      Le pattern est FRACTAL mais pas IDENTIQUE à chaque niveau :
      - La taille et la nature des NHY changent
      - Les proportions diffèrent (Yesod Z"A est long car masculin)
      - Mais la STRUCTURE (3 prakin → 3 Kavim) est préservée.
    applications_ia:
      - "Chaque module mature devient le 'parent' d'un module qu'il engendre"
      - "La structure de création est fractale — le même pattern se reproduit"
      - "Un module ne peut engendrer un 'enfant' que s'il est lui-même complet"
      - "Le pattern NHY→3 Kavim est réutilisable à chaque niveau d'abstraction"
    questions_ouvertes:
      - "Combien de niveaux de fractalité parentale le système peut-il supporter ?"
      - "Le pattern se dégrade-t-il à chaque itération ?"
