    assertions_source: ["EC-K7-001"]

  - id: "REL-K7-002"
    type: causal
    from: ahizat_hitzonim
    to: nukvah_me_ahor
    nature: "Les Hitzonim s'accrochent aux Achorayim → Nukvah sort par l'arrière pour protéger"
    assertions_source: ["EC-K7-002"]

  - id: "REL-K7-003"
    type: causal
    from: hassadim_megulim
    to: megulim_vulnerable
    nature: "Là où les Hassadim sont découverts, les Hitzonim peuvent s'accrocher → Nukvah couvre"
    assertions_source: ["EC-K7-004"]

  - id: "REL-K7-004"
    type: contenance
    from: netzach_za_to_yamin
    to: tlat_kavim_nukvah
    nature: "Les 3 prakin de Netzach Z\"A → ligne droite de Nukvah (CHaKHaN)"
    assertions_source: ["EC-K7-007"]

  - id: "REL-K7-005"
    type: causal
    from: nekudah_ikarit
    to: ma_aser
    nature: "La Nekudah originelle de Nukvah = son Ma'aser = sa seule essence propre (1/10)"
    assertions_source: ["EC-K7-008"]

  - id: "REL-K7-006"
    type: flux
    from: gevurot_in_yesod
    to: da_at_nukvah
    nature: "Les 5G en dépôt dans Yesod Z\"A → deviennent le Da'at de Nukvah"
    assertions_source: ["EC-K7-009", "EC-K7-010"]

  - id: "REL-K7-007"
    type: flux
    from: gevurot_converge_yesod
    to: man_nukvah
    nature: "Les 5G convergées dans le Yesod de Nukvah = ses Ma\"N pour le Zivvug"
    assertions_source: ["EC-K7-011"]

  - id: "REL-K7-008"
    type: dualité_structurelle
    paire: [dinim_nukvah, dinim_za]
    nature: "Profils inversés — Nukvah: doux en haut/dur en bas, Z\"A: dur en haut/doux en bas"
    assertions_source: ["EC-K7-012"]


