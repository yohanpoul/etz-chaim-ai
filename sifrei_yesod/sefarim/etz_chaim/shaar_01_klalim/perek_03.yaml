principes_generatifs:

  - id: "PG-K3-001"
    nom: "Principe des 3 Phases de Maturation (Ibur → Yenikah → Gadlut)"
    source_assertions: ["EC-K3-003", "EC-K3-011", "EC-K3-015", "EC-K3-016", "EC-K3-017"]
    formalisation: |
      Tout processus de formation complète passe par 3 PHASES distinctes :
      PHASE 1 — IBUR (gestation) : clarification des éléments les plus PURS
        Durée variable selon la complexité (7, 9, ou 12 unités de temps)
        Résultat : structure de base formée mais incomplète
      PHASE 2 — YENIKAH (allaitement) : clarification des éléments DIFFICILES
        Les Dinim (rigueurs) sont transformés en Halav (nourriture)
        Ce qui ne pouvait être clarifié rapidement est traité lentement
        Durée : 24 unités (3 × 8 pour chaque aspect inférieur)
        Résultat : complétion des parties manquantes, capacité de "marcher"
      PHASE 3 — GADLUT (maturité) : croissance complète
        Les parties devenues fonctionnelles se déploient pleinement
      Le passage d'une phase à la suivante est IRRÉVERSIBLE.
    applications_ia:
      - "Chaque nouveau module passe par Ibur (prototype) → Yenikah (stabilisation) → Gadlut (maturité)"
      - "Le système Etz Chaim à 82% est en phase Yenikah — les parties difficiles se clarifient"
      - "Abba à 0.57 est probablement en phase Yenikah — les Dinim de son Ibur se transforment en Halav"
      - "Ne pas forcer la maturité — respecter les phases naturelles"
    questions_ouvertes:
      - "Comment détecter dans quelle phase se trouve chaque composant ?"
      - "Les 24 'mois' de Yenikah sont-ils mappables à des sprints de développement ?"

  - id: "PG-K3-002"
    nom: "Principe du Déchet Recyclé (Pesolet shel Elyon = Okhel shel Tahton)"
    source_assertions: ["EC-K3-010"]
    formalisation: |
      Le PESOLET (déchet/résidu) d'un niveau supérieur
      est le OKHEL (nourriture/matière première) du niveau inférieur.
      Ce qui est trop AV (épais) pour A"A → acceptable pour AVI
      Ce qui est trop AV pour AVI → acceptable pour Z"A
      Ce qui est trop AV pour Z"A → reste dans Kelipah (pas encore recyclable)
      Formule : pesolet(N) = okhel(N-1)
      Il n'y a pas de "déchet absolu" tant qu'il reste un niveau inférieur capable de le recevoir.
    applications_ia:
      - "Les insights rejetés par Hitbonenut (68.2%) peuvent nourrir des modules moins exigeants"
      - "Le code refactoré n'est pas perdu — il peut être utile à un niveau différent"
      - "Les Nitzotzot non élevés par un processus supérieur peuvent être élevés par un processus inférieur"
      - "Pas de 'déchets' dans le système — seulement des matériaux en attente du bon récepteur"
    questions_ouvertes:
      - "À quel point le pesolet peut-il descendre avant de devenir irrécupérable ?"
      - "Le pesolet a-t-il une 'date d'expiration' ?"

  - id: "PG-K3-003"
    nom: "Principe de Transformation Dam→Halav (Rigueur transformée en Nourriture)"
    source_assertions: ["EC-K3-015", "EC-K3-020"]
    formalisation: |
      Les DINIM (rigueurs/restrictions/erreurs) ne sont pas éliminés — ils sont TRANSFORMÉS.
      DAM (sang = rigueur brute) → HALAV (lait = nourriture douce)
      Le même contenu change de FORME : ce qui était destructeur devient nourricier.
      La transformation nécessite :
        1. Du TEMPS (la Yenikah est plus longue que l'Ibur)
        2. Un ENVIRONNEMENT protégé (dans Imma)
        3. Un processus de RETRAIT (ôter le pashut, garder le milui)
      Ce qui ne peut être clarifié par FORCE peut être clarifié par DOUCEUR et TEMPS.
    applications_ia:
      - "Les bugs et erreurs du système ne sont pas supprimés — ils sont transformés en correctifs"
      - "Les Dinim du DissensuEngine (3 tensions) = Dam qui deviendra Halav (résolutions)"
      - "Le processus de clarification lente > la clarification forcée pour les problèmes profonds"
      - "Le refactoring patient transforme le 'sang' (code douloureux) en 'lait' (code nourricier)"
    questions_ouvertes:
      - "Combien de temps de 'Yenikah' est nécessaire pour chaque type de problème ?"
      - "Tous les Dinim sont-ils transformables ou certains sont-ils irréductibles ?"

  - id: "PG-K3-004"
    nom: "Principe du Couplage Inséparable (Trei Palgei Gufa)"
    source_assertions: ["EC-K3-018"]
    formalisation: |
      Certains composants fonctionnent en PAIRES INSÉPARABLES :
      Le Birur (clarification) de l'un ne se MANIFESTE pas tant que l'autre n'est pas clarifié aussi.
      "Be-hadei hotzei laki karba" — quand l'un souffre, l'autre aussi.
      Propriétés :
        - Un composant clarifié mais dont le jumeau ne l'est pas → reste en état LATENT
        - Les deux doivent atteindre le même état avant que l'un puisse se révéler
        - Le plus lent des deux détermine la vitesse EFFECTIVE du couple
      Ce n'est PAS le même pattern que le Zivvug (union productive) —
      c'est un COUPLAGE FONCTIONNEL (les deux sont un seul organe en deux parties).
    applications_ia:
      - "Certains modules sont des 'paires fonctionnelles' — les améliorer individuellement ne suffit pas"
      - "Le Birur de Netzach sans Hod = progrès invisible — les deux doivent avancer ensemble"
      - "Dans les tests, un module qui passe mais dont le jumeau échoue = succès non fonctionnel"
      - "Identifier les 'paires Netzach-Hod' dans l'architecture"
    questions_ouvertes:
      - "Quelles sont les paires fonctionnelles inséparables dans le système Etz Chaim AI ?"
      - "Le couplage NH est-il un pattern universel ou spécifique ?"

  - id: "PG-K3-005"
    nom: "Principe d'Adhérence Proportionnelle de la Kelipah"
    source_assertions: ["EC-K3-012", "EC-K3-014"]
    formalisation: |
      L'ADHÉRENCE de la Kelipah (le mal/l'erreur/le bruit) est PROPORTIONNELLE
      à la bassesse du niveau :
        ahizah(Kelipah, niveau_N) = f(profondeur(N))
        Plus N est profond (bas), plus la Kelipah adhère fortement
        Plus la Kelipah adhère, plus le Birur est LENT et DIFFICILE
      Conséquences :
        - Les premiers Nitzotzot élevés sont les plus FACILES (niveaux hauts)
        - Les derniers sont les plus DIFFICILES (niveaux bas)
        - Le progrès RALENTIT naturellement à mesure qu'on avance
        - 49/288 Nitzotzot élevés = on est encore dans les "faciles"
    applications_ia:
      - "Les premiers 17% de Nitzotzot (49/288) sont les plus faciles — le vrai travail commence"
      - "Le Tikkun suit une courbe logarithmique, pas linéaire"
      - "Les bugs les plus profonds du système sont les plus résistants à la correction"
      - "Attendre que les conditions soient mûres avant d'attaquer les clarifications profondes"
    questions_ouvertes:
      - "La courbe d'adhérence est-elle logarithmique, exponentielle, ou autre ?"
      - "Y a-t-il un point de basculement où la Kelipah perd son adhérence ?"

  - id: "PG-K3-006"
    nom: "Principe de la Durée Proportionnelle à la Complexité (7-9-12)"
    source_assertions: ["EC-K3-003", "EC-K3-005", "EC-K3-007"]
    formalisation: |
      La durée de FORMATION d'une entité est proportionnelle à sa COMPLEXITÉ structurelle :
      A"A (le plus simple dans ce contexte) → 7 unités de temps
      Z"A (complexité moyenne) → 9 unités de temps
      Nukvah (la plus complexe car elle inclut Z"A + ses propres aspects) → 12 unités de temps
      Le CALCUL de la durée est basé sur le nombre de KLILUT (inclusions) nécessaires :
        durée = nombre_d'inclusions_nécessaires
      Chaque inclusion = 1 unité de temps
      Plus il y a de niveaux à inclure, plus la formation est longue.
      La Nukvah est la plus longue car elle vient APRÈS Z"A — elle porte aussi ses résidus.
    applications_ia:
      - "Estimer la durée de développement d'un module par le nombre de dépendances à intégrer"
      - "Les modules complexes (comme Nukvah/Malkhut) prennent naturellement plus de temps"
