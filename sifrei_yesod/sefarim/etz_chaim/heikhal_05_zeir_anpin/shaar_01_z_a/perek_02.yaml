# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 5 — Heikhal Ze'eir Anpin (היכל זעיר אנפין)
# Sha'ar: 1 — Sha'ar Z"A (שער ז"א)
# Perek: 2 — IBBUR Z"O"N. ASOF RAGLAV. Z"T MELAKHIM. 3-GO-3 KOLLEL. RH"Y vs RH"R.
#            YESOD ATIK NIVKA. 2 partzufim Abba+YISSO+Bina+Tevunah unifies.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_02 :
#   - Bloc A : Apres tikkun A"O — restent Z"T MELAKHIM morts (Z"T BaN) sans tikkun
#   - Bloc B : A"A encore non-revetu Tabbur-down ; megaleh sans levush
#   - Bloc C : Pour tikkun → besoin IBBUR dans IMMA
#   - Bloc D : ASOF RAGLAV — A"A NHY montent dans 3 emtza'iyot ChGT-A"A
#   - Bloc E : Atik aussi 2 prakim emtza-NHY → revetus tokh prakim rishonim
#   - Bloc F : Yesod-Atik pas besoin monter (termine chazeh A"A deja)
#   - Bloc G : ChG+1/2-Tiferet-elyon-A"A revetent 2 prakim emtza-NHY-Atik+Yesod-Atik
#   - Bloc H : NH-A"A → ChG-A"A ; 1/2-Tiferet-tachton revet 1/2-elyon ; Yesod-A"A revet 1/2-Tiferet-tachton
#   - Bloc I : Ataret-yesod monte vers Yesod ; ChGT-Z"A montent revetent NH+atarah-A"A
#   - Bloc J : NHY-Z"A montent revetent ChGT-Z"A ; Nukva (Malkhut=ATARAH) revet Yesod-Z"A
#   - Bloc K : Z"A=KOLLEL 3-go-3 (V"K) — Tosefta Beshalach 54 "3 ruchin kelilin 3 shekiyin"
#   - Bloc L : Z"A=RUACH ; Malkhut=EVEN ; "avnin shekiyen"
#   - Bloc M : Apres : A"O+YISSO+Tev REVETENT toutes ces bechinot (tier-clothing comprehensive)
#   - Bloc N : A"O courts (Garon-Tabbur) restent comme avant ; Atik+A"A longs lift-tachton+kollel
#   - Bloc O : Cause Z"A 3-go-3 cohesion : LE-KABETZAM VE-LE-KASHRAM yachad — RH"Y (unite) vs RH"R (division=mort melakhim)
#   - Bloc P : Z"A entre NHY-A"A et PNIMIYUT-A"O = sod IBBUR (foetus dans meei imma)
#   - Bloc Q : Pas de hefsek A"A-A"O car Z"A petit ; Z"A occupe 1/2 Tiferet-tachton Imma=lieu HERON
#   - Bloc R : Apres : MITKABTZIM dans meei Imma ; Abba donne 1/2 a Imma (lieu IBBUR amiti)
#   - Bloc S : De ascension+kollel → or grand sort YESOD ATIK (nivka, sodek mi-le-maala-le-mata)
#   - Bloc T : Or sort → CHOKHMAH+YISSO=1 partzuf ; IMMA+TEVUNAH=1 partzuf ; orot egaux pas keisuy/giluy distinct
#   - Bloc U : 2 partzufim seul : Abba+YISSO et Bina+Tevunah ; Garon→Tabbur ; HAKDAMAH chaque zivvug-mochin-Z"A
#
# Source Sefaria : Sefer_Etz_Chaim.17.2 (1 section, 3545 chars)
# IDs : EC-H5S17-019 → EC-H5S17-038

