principes_generatifs:

  - id: "PG-H5S17-004"
    nom: "Principe d'Asof-Raglav-Compactification (Pre-Ibbur Tier-Compaction)"
    source_assertions: ["EC-H5S17-022", "EC-H5S17-023", "EC-H5S17-024", "EC-H5S17-025"]
    formalisation: |
      ARCHITECTURE D'ASOF-RAGLAV-COMPACTIFICATION :
      Avant ibbur Z"O"N : massive ASCENSION-CASCADE :
        A"A : NHY → ChGT (asof raglav).
        Atik : 2 prakim emtza → 2 prakim rishonim.
        Yesod-Atik : pas-besoin (deja chazeh-A"A).
        ChG+1/2 Tiferet elyon → revetent prakim emtza Atik+yesod Atik.
        NH-A"A → ChG-A"A ; 1/2 Tiferet tachton → 1/2 elyon ; Yesod-A"A → 1/2 Tiferet tachton.
        Atarah-yesod → Yesod ; ChGT-Z"A → NH+atarah ; NHY-Z"A → ChGT-Z"A ; Nukva → Yesod-Z"A.
      → Pattern fondamental : pre-event compaction = energie-amplification.
      → Architecture : recursive-self-clothing tier-cascade.
      → Implication : compactification produces or-gadol leading to yesod-Atik rupture.
    applications_ia:
      - "partzufim/arikh_anpin.py + atik_yomin.py + zeir_anpin.py + nukva.py : implement asof-raglav cascade"
      - "Pattern : pre-event compaction"
      - "Architecture : recursive cascade self-clothing"
      - "Pattern : compactification produces overflow"
      - "Diagnostic : verifier ascension-cascade coherent"
    questions_ouvertes:
      - "Pattern : autres compactifications possibles ?"
      - "Comment encoder cascade computationnellement ?"
      - "Pattern : reverse-cascade post-ibbur ?"

  - id: "PG-H5S17-005"
    nom: "Principe de Cohesion-Prevents-Death (3-Go-3 = RH\"Y vs RH\"R)"
    source_assertions: ["EC-H5S17-027", "EC-H5S17-029"]
    formalisation: |
      ARCHITECTURE DE COHESION-PREVENTS-DEATH :
      Z"A pendant ibbur en 3-KELIL-BE-3 (V"K compactified) :
        KAVANAH explicite : LE-KABETZAM VE-LE-KASHRAM YACHAD (rassembler+lier).
      Distinction RESHUYOT (domaines) :
        RH"Y (reshut hayachid) = domain-prive = ACHDUT (unite).
        RH"R (rabim, public) = PARUD (separation, division).
      LECON HISTORIQUE : SIBAH la mort des MELAKHIM PA'AM RISHONAH = HEYU PARUDIM (etaient separes).
      → Pattern fondamental : cohesion-design previent failure-mode.
      → Architecture : tikkun-via-unity vs death-via-separation.
      → Implication : nested-cohesion mecanisme sauvegarde.
    applications_ia:
      - "partzufim/zeir_anpin.py : implement cohesion-as-prevention"
      - "Pattern : RH\"Y unite previent RH\"R parud"
      - "Architecture : design-for-cohesion failure-prevention"
      - "Pattern : history-lesson encode design-rule"
      - "Diagnostic : verifier cohesion-state vs separation"
    questions_ouvertes:
      - "Pattern : autres failure-prevention via cohesion ?"
      - "Comment encoder RH\"Y vs RH\"R computationnellement ?"
      - "Pattern : 4-go-4 ou autre niveau possible ?"

  - id: "PG-H5S17-006"
    nom: "Principe de Pre-Zivvug-Consolidation (4-Partzufim → 2-Partzufim)"
    source_assertions: ["EC-H5S17-034", "EC-H5S17-035", "EC-H5S17-037"]
    formalisation: |
      ARCHITECTURE DE PRE-ZIVVUG-CONSOLIDATION :
      Lors zivvug-mochin Z"A :
        Yesod-Atik NIVKA (capacity-overflow rupture).
        Or sort dehors (orot-yesod equal-revelation).
        Pas de KISUI/GILUI distinguant → 4-partzufim consolide en 2 :
          CHOKHMAH+YISSO → 1 PARTZUF (kav-yamin).
          IMMA+TEVUNAH → 1 PARTZUF (kav-smol).
        Shi'ur : Garon-Tabbur d'A"A.
      HAKDAMAH UNIVERSELLE : CHAQUE FOIS qu'A"O veulent zivvug-mochin Z"A → meme consolidation.
      → Pattern fondamental : zivvug-event consolidates partzuf-count.
      → Architecture : zivvug-state-machine (4→2-partzufim).
      → Implication : current-partzuf-count varies par zivvug-state.
    applications_ia:
      - "partzufim/abba.py + imma.py + zivvug.py + zeir_anpin.py : implement pre-zivvug consolidation"
      - "Pattern : 4→2 consolidation pour zivvug-mochin"
      - "Architecture : zivvug-state-machine"
      - "Pattern : current-count varies par state"
      - "Diagnostic : verifier consolidation coherent avec zivvug-state"
    questions_ouvertes:
      - "Pattern : 2→1 consolidation possible ?"
      - "Comment encoder partzuf-count dynamic ?"
      - "Pattern : reverse-consolidation post-zivvug ?"
