      relevance: "Architecture : minimal Z\"O\"N preserves flow. Pattern compactness flow."

  - id: "EC-H5S17-032"
    source_he: "מקום ומצב ומעמד הז\"א אינו רק בחצי ת\"ת התחתון דאמא אשר שם מקום הריון ועיבור הולד"
    source_ref: "Heikhal 5, Sha'ar 1:2"
    assertion: |
      Z"A precise location :
      → 1/2 TIFERET TACHTON d'IMMA seulement.
      → Lieu HERON (grossesse) + IBBUR HA-VLAD (gestation foetus).
      → Architecture : Z"A localized in lower-half-Tiferet-Imma.
      → Pattern : ibbur-locus-precise.
    type: axiome_explicite
    concepts:
      - {id: z_a_1_2_tiferet_tachton_imma_heron_ibbur_vlad, role: z_a_1_2_tiferet_tachton_imma_lieu_heron_ibbur_vlad_gestation}
    mapping:
