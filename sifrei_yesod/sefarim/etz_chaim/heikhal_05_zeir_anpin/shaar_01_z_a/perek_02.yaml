      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "imma"]
      relevance: "Architecture : ibbur-locus precise. Pattern lower-Tiferet-Imma."

  - id: "EC-H5S17-033"
    source_he: "נצח וחסד וחצי ת\"ת וחצי יסוד וחצי מל' של ז\"א נתונים מצד ימין בתוך אבא וחצי האחר נתונים בצד שמאל תוך אמא אמנם אח\"כ כולם מתקבצין במעוי דאמא ואבא נותן המחצה שלו במעי דאמא"
    source_ref: "Heikhal 5, Sha'ar 1:2"
    assertion: |
      Z"A distribution detaillee :
      → 1/2 Z"A (Netzach+Chesed+1/2 Tiferet+1/2 Yesod+1/2 Malkhut) = COTE DROIT dans ABBA.
      → AUTRE 1/2 = COTE GAUCHE dans IMMA.
      → APRES : tous MITKABTZIM dans MEEI IMMA.
      → ABBA donne SA MOITIE a IMMA — la est MAKOM IBBUR HA-AMITI (lieu vrai d'ibbur).
      → Architecture : initial-bilateral split → final-unification dans Imma.
      → Pattern : bilateral-merger pour ibbur-amiti.
    type: interprétation_lurianique
    concepts:
      - {id: z_a_1_2_droite_abba_1_2_gauche_imma_mitkabtzim_meei_imma_amiti, role: z_a_1_2_droite_abba_1_2_gauche_imma_apres_mitkabtzim_meei_imma_abba_donne_imma_makom_ibbur_amiti}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "abba", "imma"]
      relevance: "Architecture : bilateral-merger. Pattern split-then-unify."

  - id: "EC-H5S17-034"
    source_he: "מכח עליית כל האורות הנ\"ל וכללותן למעלה וכן מכח עליית ב\"פ האמצעיים דנ\"ה דעתיק למעלה בב\"פ קדמאין נוסף שם אור גדול ועצום ואין בו כח ביסוד דעתיק לסבלו כי הוא צר מאד ואז נבקע ונסדק מלמעלה למטה לארכו ויצא האור לחוץ"
    source_ref: "Heikhal 5, Sha'ar 1:2"
    assertion: |
      Resultat ascension+kollel — OR GADOL VE-ATZUM :
      → Yesod d'Atik n'a pas le KOACH (force) pour CONTENIR.
      → Yesod TZAR ME'OD (tres etroit).
      → NIVKA VE-NIDSAK (se fend+craque) MI-LEMAALAH-LE-MATAH LE-ARKHO (du haut vers le bas).
      → OR YOTZ'A LE-CHUTZ (lumiere sort dehors).
      → Architecture : overflow-event yesod-Atik bursting.
      → Pattern : capacity-overflow → structural-rupture.
    type: interprétation_lurianique
    concepts:
      - {id: or_gadol_yesod_atik_nivka_nidsak_mi_lemaala_le_mata_or_yotza_chutz, role: or_gadol_atzum_yesod_atik_pas_koach_tzar_meod_nivka_nidsak_mi_lemaalah_le_matah_le_arkho_or_yotza_chutz}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "zeir_anpin"]
      relevance: "Architecture : overflow rupture. Pattern capacity-burst."

  - id: "EC-H5S17-035"
    source_he: "חכמה ויש\"ס העומדין בימין מתחברים ונעשו פרצוף אחד בלבד וכן אמא ותבונה שבצד שמאל נעשו פרצוף אחד לבד כי עתה אורות היסוד שוין בענין גילוי בהשוואה א' ואין עתה כסוי וגלוי הגורם חילוק פרצופים"
    source_ref: "Heikhal 5, Sha'ar 1:2"
    assertion: |
      Apres or-yotz'a : COMBINATION partzufim :
      → CHOKHMAH + YISSO (kav-yamin) MITCHABRIM → 1 PARTZUF ECHAD seul.
      → IMMA + TEVUNAH (kav-smol) NA'ASU 1 PARTZUF ECHAD.
      → Cause : OROT YESOD SHAVIN BE-INYAN GILUI BE-HASHVAAH ECHAT (egaux en revelation).
      → Pas de KISUI/GILUI distinguant — donc pas de division des partzufim.
      → Architecture : equal-light-state collapses 4-partzufim → 2-partzufim.
      → Pattern : revelation-uniformity = partzuf-merger.
    type: interprétation_lurianique
    concepts:
      - {id: chokhmah_yisso_unifie_imma_tevunah_unifie_orot_yesod_shavin_pas_kisui_gilui, role: chokhmah_yisso_kav_yamin_1_partzuf_imma_tevunah_kav_smol_1_partzuf_orot_yesod_shavin_be_hashvaah_pas_kisui_gilui}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : revelation-uniformity merger. Pattern light-state-driven."

  - id: "EC-H5S17-036"
    source_he: "עתה אין שם רק ב' פרצופים לבד אחד מאבא ואחד מאמא ושיעורם למעלה מן הגרון עד למטה בטבורא דא\"א"
    source_ref: "Heikhal 5, Sha'ar 1:2"
    assertion: |
      ETAT FINAL — 2 PARTZUFIM SEUL :
      → Un d'ABBA (= Abba+YISSO unifies).
      → Un d'IMMA (= Imma+Tevunah unifies).
      → Shi'ur : du GARON jusqu'au TABBURA d'A"A.
      → Architecture : 4→2-partzufim consolidation pour zivvug-mochin.
      → Pattern : pre-zivvug consolidation.
    type: axiome_explicite
    concepts:
      - {id: 2_partzufim_seul_abba_yisso_imma_tevunah_garon_tabbura, role: 2_partzufim_seul_abba_unifie_yisso_imma_unifie_tevunah_shiur_garon_tabbura}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : 4→2 consolidation. Pattern pre-zivvug."

  - id: "EC-H5S17-037"
    source_he: "זכור הקדמה זו כי בכל פעם שרוצין או\"א להזדווג לצורך מוחין לז\"א נעשה הכל פרצוף אחד לבד לאבא ויש\"ס ופרצוף אחד לבינה"
    source_ref: "Heikhal 5, Sha'ar 1:2"
    assertion: |
      HAKDAMAH cruciale :
      → CHAQUE FOIS qu'A"O veulent ZIVVUG pour MOCHIN Z"A :
        Tout devient 1 PARTZUF — Abba+YISSO unifies.
        Et 1 PARTZUF — Imma+Tevunah unifies.
      → ZAKHOR (souviens-toi) — principe a memoriser.
      → Architecture : universal-rule pour all-future-zivvug-mochin.
      → Pattern : recurring-consolidation pattern.
    type: axiome_explicite
    concepts:
      - {id: hakdamah_zivvug_mochin_z_a_ao_2_partzufim_unifies_universal, role: hakdamah_zakhor_zivvug_ao_mochin_z_a_2_partzufim_unifies_abba_yisso_imma_tevunah_universal}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zivvug.py", "partzufim/zeir_anpin.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : universal-rule. Pattern recurring-consolidation."

  - id: "EC-H5S17-038"
    source_he: "כי שם הוא מקום העיבור האמיתי וכמ\"ש בע\"ה"
    source_ref: "Heikhal 5, Sha'ar 1:2"
    assertion: |
      CLOTURE perek 2 :
      → MAKOM HA-IBBUR HA-AMITI (lieu vrai d'ibbur) = dans MEEI IMMA.
      → "VE-KMO SHE-NEKTOV BE'EZRAT HASHEM" — sera ecrit avec l'aide d'Hashem (formule pedagogique).
      → Architecture : perek-closure avec promise pour developpement-futur.
      → Pattern : pedagogical-bookend forward-pointer.
    type: axiome_explicite
    concepts:
      - {id: cloture_perek_2_makom_ibbur_amiti_meei_imma_pedagogical, role: cloture_perek_2_makom_ibbur_amiti_meei_imma_kmo_she_nektov_pedagogical_forward}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : pedagogical bookend. Pattern forward pointer."


