  - id: "EC-H5S17-049"
    source_he: "אח\"כ יצאו ז' מלכים אחרים דמ\"ה והם זו\"נ דמ\"ה ונקרא הדר שהוא ז\"א דמ\"ה שהם ו' מלכים ומהיטבאל נוק' דמ\"ה וע\"י אלו נתקנו ז\"ת"
