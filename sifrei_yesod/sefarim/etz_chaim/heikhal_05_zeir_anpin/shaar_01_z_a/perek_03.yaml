      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva", "atik_yomin"]
      relevance: "Architecture : 5-partzufim couplings. Pattern pairing-except-summit."

  - id: "EC-H5S17-055"
    source_he: "צמח מכאן משמע כי בכל פרצוף ופרצוף מן הנ\"ל יצא הדר חדש לתקן כל הז' עלאין של כל פרצוף ופרצוף"
