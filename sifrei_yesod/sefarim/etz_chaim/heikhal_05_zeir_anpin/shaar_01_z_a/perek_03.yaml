  - id: "EC-H5S17-048"
    source_he: "הבן שהוא ז\"א יורש או\"א ולקח מ\"ה וב\"ן ונקבה יורשת או\"א בסוד ויבן ה' אלהים את הצלע ולקחה מ\"ה וב\"ן ועיין פ' פקודי דרכ\"א ונשא דף קכ\"ח ותבין איך הז' מלכים הם זו\"ן דב\"n"
