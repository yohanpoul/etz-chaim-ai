# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 5 — Heikhal Ze'eir Anpin (היכל זעיר אנפין)
# Sha'ar: 1 — Sha'ar Z"A (שער ז"א)
# Perek: 3 — Z"A=V"K MaH+BaN. Mochin chacun MaH+BaN (zachar+nukva).
#            HADAR+MEHEITAVEL=ZON-MaH. 7 melakhim ikkar tikkun. Naso 131.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_03 :
#   - Bloc A : Z"A=V"K MaH+V"K BaN sauf keterim (=Malkhut Z"A)
#   - Bloc B : Nukva=Z"-MaH+Z"-BaN sauf keter
#   - Bloc C : Mochin=2 bechinot NHY-A"O ; Abba zorea 4 mochin MaH ; Imma 4 mochin BaN
#   - Bloc D : NIT'CHALFU : Chokhmah-MaH+BaN=ChB tzelem Abba ; Bina-MaH+BaN=ChB tzelem Imma
#   - Bloc E : Chasadim-MaH+BaN=Daat ChG Abba ; Gevurah-MaH+BaN=Daat ChG Imma
#   - Bloc F : Cause : zachar+nukva (MaH+BaN) chacun pour zivvug
#   - Bloc G : Z"A revet NHY-A"A ChG ChB MaH+BaN ; Nukva idem revet Z"A
#   - Bloc H : Aucun 10S sauf ZON a MaH+BaN dans zachar+nukva
#   - Bloc I : AUTRE TA'AM : chaque partzuf ajoute shinui ; ZON ajoute kelul MaH+BaN
#   - Bloc J : AUTRE TA'AM : en haut Nukva pas separe → mocha-zachar=MaH seul ; A"O zachar+nukva separe
#   - Bloc K : Sod "VA-YIVEN HASHEM ELOKIM ET HA-TZELA" (Bereshit 2:22) ; Pekudei 221, Naso 128
#   - Bloc L : Apres : 7 MELAKHIM ACHERIM-MaH=ZON-MaH=HADAR (Z"A-MaH 6)+MEHEITAVEL (Nukva-MaH)
#   - Bloc M : NL"H : surement 10 sortirent ; 7 melakhim ikkar nommes (tikkun seulement Z"T)
#   - Bloc N : TIRUTZ Naso 122 : 7 melakhim dans A"A, A"O, Z"O"N respectivement
#   - Bloc O : MaH+BaN tous deux ont ChG ; HADAR-klal=AB+SaG+MaH+BaN ; BaN-klal idem
#   - Bloc P : Naso 131 : 4 sortes melakhim ; 5 partzufim chacun MaH+BaN ; A"A seul sans nukva
#   - Bloc Q : (§2 TZEMACH) : chaque partzuf sortit HADAR CHADASH pour fix 7 elyon
#
# Source Sefaria : Sefer_Etz_Chaim.17.3 (2 sections, 3297 chars)
# IDs : EC-H5S17-039 → EC-H5S17-055

meta:
  sefer: etz_chaim
