    assertion: |
      §2 TZEMACH variant :
      → De cela MASHMA (resulte) :
        Dans CHAQUE partzuf — sortit HADAR CHADASH (un nouveau Hadar).
        Pour FIX les 7 ELYON (superieurs) de chaque partzuf.
      → Architecture : per-partzuf renewal-mechanism (Hadar-chadash).
      → Pattern : tier-internal-tikkun via local-Hadar.
    type: interprétation_lurianique
    concepts:
