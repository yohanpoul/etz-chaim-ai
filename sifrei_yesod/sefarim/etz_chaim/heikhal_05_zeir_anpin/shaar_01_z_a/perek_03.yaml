  - id: "EC-H5S17-047"
    source_he: "למעלה אין ניכר רק זכר לבד והנוק' כלולה בו וע\"כ המוח של הזכר מ\"ה לבדו ושל נוק' ב\"ן לבדו אך או\"א זכר ונקבה גמורים בפרצופים גמורים נפרדין וכ\"א צריך לתת מחלקו לכל אחד מבניו לבן ולבת"
