      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : multi-tier melakhim. Source Zohar Naso 131."

  - id: "EC-H5S17-054"
    source_he: "ה' פרצופים הם ובכל אחד יש בו מ\"ה וב\"ן אמנם פרצוף הא' לבד הוא בלי נוק' והד' פרצופים אחרים כ\"א נעשה נקבה לחבירו אע\"פ שיש בכל אחד מ\"ה וב\"ן... א\"א יש בו מ\"ה וב\"ן והוא פרצוף אחד שאין כנגדו בת זוג כלל"
    source_ref: "Heikhal 5, Sha'ar 1:3"
    assertion: |
      5 PARTZUFIM avec MaH+BaN :
      → A"A, Abba, Imma, Z"A, Nukva — chacun MaH+BaN.
      → MAIS A"A SEUL est SANS NUKVA (pas de bat-zug).
      → Atik (au-dessus 5 partzufim) — meme principe ; SHORESH (racine) du tout.
      → 4 autres partzufim : chacun fait NEKEVAH (bat-zug) pour l'autre.
      → Abba+Imma=couple ; Z"A+Nukva=couple.
      → Architecture : 5-partzufim system avec couplings 2+2 + A"A-solo.
      → Pattern : pairing-pattern except-summit.
    type: axiome_explicite
    concepts:
      - {id: 5_partzufim_mah_ban_a_a_solo_4_couples_atik_shoresh, role: 5_partzufim_mah_ban_chacun_a_a_solo_sans_nukva_4_couples_atik_au_dessus_shoresh}
    mapping:
