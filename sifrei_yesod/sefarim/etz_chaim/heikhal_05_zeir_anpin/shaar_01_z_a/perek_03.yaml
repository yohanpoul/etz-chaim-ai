  note: "Z\"A=V\"K MaH+V\"K BaN sauf keterim (=Malkhut). Nukva=Z\"-MaH+Z\"-BaN sauf keter. Mochin=2 bechinot NHY-A\"O. Abba zorea 4 mochin MaH ; Imma 4 mochin BaN. NIT'CHALFU : Chokhmah-MaH+BaN=ChB Abba ; Bina-MaH+BaN=ChB Imma ; Chasadim/Gevurah-MaH+BaN=Daat Abba/Imma. Cause : zachar+nukva (MaH+BaN) chacun pour zivvug. Z\"O\"N seul a MaH+BaN dans zachar+nukva. Sod 'Va-yiven Hashem Elokim et ha-Tzela' (Bereshit 2:22). Apres : 7 MELAKHIM ACHERIM-MaH=ZON-MaH=HADAR+MEHEITAVEL. NL\"H 10 sortirent mais 7 ikkar tikkun. Naso 122 : 7 melakhim dans A\"A, A\"O, ZON. Naso 131 : 4 sortes melakhim ; 5 partzufim avec MaH+BaN ; A\"A seul sans nukva ; Atik=shoresh. TZEMACH : chaque partzuf sortit HADAR CHADASH."

