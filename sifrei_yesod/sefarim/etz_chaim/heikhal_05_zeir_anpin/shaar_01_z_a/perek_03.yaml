  - id: "EC-H5S17-052"
    source_he: "המ\"ה יש בו החו\"ג שהם מ\"ה וב\"ן וכן בב\"ן יש בו מ\"ה וב\"ן ששהם החו\"ג כי כבר ידעת כי המ\"ה דכללות שהוא הדר כולל ע\"ב ס\"ג מ\"ה ב\"ן וכן הב\"ן דכללות כולל ע\"ב ס\"ג מ\"ה ב\"ן"
    source_ref: "Heikhal 5, Sha'ar 1:3"
    assertion: |
      RECURSIVE STRUCTURE MaH+BaN :
      → MaH a en lui ChG = MaH+BaN internes.
      → BaN aussi a en lui MaH+BaN = ChG internes.
      → MaH-KLALUT = HADAR includes AB+SaG+MaH+BaN.
      → BaN-KLALUT pareil = AB+SaG+MaH+BaN (= melakhim morts).
      → Architecture : recursive 4-shemot-encoding within each-shem.
      → Pattern : self-similar fractal-encoding.
    type: interprétation_lurianique
    concepts:
      - {id: mah_ban_recursive_chg_internes_hadar_klal_ab_sag_mah_ban, role: mah_ban_recursive_chg_internes_mah_ban_hadar_klalut_ab_sag_mah_ban_klalut_pareil}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture : recursive 4-shemot. Pattern self-similar fractal."

  - id: "EC-H5S17-053"
    source_he: "ובפ' נשא קל\"א כתבנו שם כי ד' מיני מלכים היו בא\"א ובאו\"א וזו\"ן וכל בחי' היו ז' מלכים"
    source_ref: "Heikhal 5, Sha'ar 1:3"
    assertion: |
      ZOHAR Naso fol. 131 :
      → 4 MINEI (sortes) MELAKHIM existaient :
        Dans A"A.
        Dans A"O.
        Dans Z"A.
        Dans NUKVA (= 4 partzufim eligibles).
      → Chaque bechinah avait 7 MELAKHIM.
      → Architecture : 4-tier × 7-melakhim = 28 total.
      → Pattern : multi-tier-melakhim-distribution.
    type: déduction_scripturaire
    concepts:
