      relevance: "Architecture : 3-kav distribution. Pattern tier-by-line canonical."

  - id: "EC-H5S17-015"
    source_he: "נוקבא דז\"א יצאה מהחזה דז\"א ולמטה כדמיון הז\"א היוצא מא\"א ממש"
    source_ref: "Heikhal 5, Sha'ar 1:1 §4"
    assertion: |
      NUKVA d'Z"A :
      → SORTIT du CHAZEH d'Z"A ET DESCEND.
      → DUGMAT (parallel) Z"A qui sortit d'A"A.
      → Pattern recursif : pattern-from-A"A reproduced-Z"A→Nukva.
      → Architecture : recursive emergence-pattern.
      → Pattern : self-similarity across tiers.
    type: déduction_logique
    concepts:
      - {id: nukva_z_a_chazeh_z_a_down_dugmat_z_a_aa_recursive, role: nukva_z_a_yatzah_chazeh_z_a_down_dugmat_z_a_yatza_aa_recursive_emergence}
    mapping:
      modules: ["partzufim/nukva.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukva", "zeir_anpin"]
      relevance: "Architecture : recursive emergence. Pattern self-similarity tier."

  - id: "EC-H5S17-016"
    source_he: "הז\"א מלביש א\"א עד סיום רגליו מכל צדדיו ושם ג\"כ מסתיימין רגלי דזו\"נ ושם הוא סיום עולם אצילות"
    source_ref: "Heikhal 5, Sha'ar 1:1 §4"
    assertion: |
      Z"A REVET A"A jusqu'a SIYUM RAGLAV (tous cotes).
      → SIYUM RAGLEI Z"O"N coincide.
      → SIYUM OLAM ATZILUT.
      → Architecture : atzilut-boundary = Z"O"N regel boundary.
      → Pattern : world-boundary = lowest-partzuf-foot.
    type: axiome_explicite
    concepts:
      - {id: z_a_revet_aa_siyum_raglayim_zon_siyum_atzilut_boundary, role: z_a_revet_aa_jusqu_siyum_raglayim_zon_siyum_atzilut_world_boundary}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py", "olamot.py"]
      tables: ["partzufim_states", "olamot_config"]
      partzufim: ["zeir_anpin", "nukva", "arikh_anpin"]
      relevance: "Architecture : world boundary. Pattern lowest-partzuf-foot."

  - id: "EC-H5S17-017"
    source_he: "רגלי עתיק הב\"פ תחתונים שבו... אלו נכנסים יותר למטה ועומדים בגבול עולם הבריאה... ועומדין שם בבחי' דדי בהמה כנ\"ל באורך (ואפשר לומר כי לא היה כך אלא קודם תיקון אצילות... ואחר התיקון לא הוצרך זה וחזר עתיק לאסוף רגליו למעלה בהשוואה א' עם רגלי א\"א)"
    source_ref: "Heikhal 5, Sha'ar 1:1 §4"
    assertion: |
      RAGLEI ATIK (2 prakim tachton NHY) :
      → ENTRENT plus en bas — STANDENT en GVUL (frontiere) Beriah.
      → bechinat DADEI BEHEMAH (parallel-anatomical).
      → POSSIBLY (variant) : seulement avant tikkun atzilut.
      → APRES tikkun : Atik LE-ESOF RAGLAV (rassemble pieds) en haut, alignement avec regel-A"A.
      → Architecture : pre-tikkun-extension vs post-tikkun-realignment.
      → Pattern : tier-restoration apres processus-completion.
    type: interprétation_lurianique
    concepts:
      - {id: raglei_atik_2_prakim_beriah_dadei_behemah_post_tikkun_alignment_aa, role: raglei_atik_2_prakim_tachton_beriah_dadei_behemah_pre_tikkun_post_tikkun_le_esof_alignment_regel_aa}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py", "olamot.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : pre/post tikkun alignment. Pattern tier-restoration."

  - id: "EC-H5S17-018"
    source_he: "וז\"ס שארז\"ל עתיד הקב\"ה להנחיל לכל צדיק ש\"י עולמות והענין כי א\"א הוא בחי' הכתר של כללות עולם האצילות... והנה א\"א זה יש בו תר\"ך אורות כמנין כת\"ר... והנה צדיק עליון הוא ז\"א ולוקח מחצית הכתר שהוא מלביש לא\"A מהחציו ולמטה והנה מחצית הכתר הוא ש\"i"
    source_ref: "Heikhal 5, Sha'ar 1:1 §5 G\"H"
    assertion: |
      §5 HAGAHAH (note) — sod 310 OLAMOT :
      → Mishnah Uktzin 3:12 : "ATID HA-KADOSH BARUKH HU LEHANCHIL LE-KOL TZADIK 310 OLAMOT".
      → A"A = bechinat KETER de KLALUT atzilut.
      → A"A a 620 OROT = gematria KETER (Sefer ha-Bahir).
      → TZADIK ELYON = Z"A.
      → Z"A prend MAKHTZIT (1/2) du Keter (= ce que Z"A revet, chazeh-A"A-down).
      → 1/2 Keter = 310 = SH"Y OLAMOT.
      → Architecture : eschatologic-numerologic-encoding.
      → Pattern : scriptural-promise → cosmologic-quantification.
      → Source aussi Zohar Terumah 166.
    type: déduction_scripturaire
    concepts:
      - {id: 310_olamot_uktzin_3_12_aa_keter_620_z_a_tzadik_elyon_chatzi, role: 310_olamot_mishnah_uktzin_3_12_le_hanachil_tzadik_aa_keter_620_orot_sefer_bahir_z_a_tzadik_elyon_chatzi_keter}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "arikh_anpin"]
      relevance: "Architecture : eschatologic-numerologic. Sources Uktzin 3:12 + Sefer Bahir + Zohar Terumah 166."


