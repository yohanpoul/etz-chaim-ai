principes_generatifs:

  - id: "PG-H5S17-001"
    nom: "Principe de N-Yenikahs-By-Tier-Distance (Lower Partzuf Requires More Steps)"
    source_assertions: ["EC-H5S17-008", "EC-H5S17-009", "EC-H5S17-010", "EC-H5S17-011", "EC-H5S17-012"]
    formalisation: |
      ARCHITECTURE DE N-YENIKAHS-DISTANCE :
      Number-of-yenikahs determined by tier-distance-to-source :
        A"A (sous Atik direct) : 1 madregah → 1 yenikah (Beriah → Atzilut directly).
        A"O (Atik+A"A clothing) : 2 madregot → 2 yenikahs (Beriah dadei-behemah → Atzilut 2-prakim Atik → Atzilut clothing A"A).
        Z"O"N : same template A"O — 2 yenikahs (lower tier still 2 madregot above).
      DADEI BEHEMAH (parallele anatomique animal) = pre-tikkun-mode.
      DADEI ADAM = post-tikkun-mode.
      → Pattern fondamental : tier-distance = ascent-step-count.
      → Architecture : graduated-development par hierarchical-distance.
      → Implication : downstream-partzufim require multi-stage-maturation.
    applications_ia:
      - "partzufim/arikh_anpin.py + abba.py + imma.py + zeir_anpin.py + nukva.py : implement N-yenikahs"
      - "Pattern : tier-distance-determined ascent-count"
      - "Architecture : graduated-maturation"
      - "Pattern : pre-tikkun-mode vs post-tikkun-mode"
      - "Diagnostic : verifier yenikah-count coherent avec tier-distance"
    questions_ouvertes:
      - "Pattern : 3-yenikahs ou plus possibles ?"
      - "Comment encoder tier-distance computationnellement ?"
      - "Pattern : skip-tier yenikah possible ?"

  - id: "PG-H5S17-002"
    nom: "Principe de 3-Kav-Distribution-NHY-A\"A (Netzach/Hod/Yesod → 3 Lines Z\"A)"
    source_assertions: ["EC-H5S17-014"]
    formalisation: |
      ARCHITECTURE DE 3-KAV-DISTRIBUTION :
      NHY-A"A → 3 KAV de Z"A — distribution canonique :
        NETZACH-A"A (3 prakim) → KAV YAMIN d'Z"A = ChChN (Chesed-Chokhmah-Netzach).
        HOD-A"A (3 prakim) → KAV SMOL d'Z"A = BGH (Bina-Gevurah-Hod).
        YESOD-A"A → KAV EMTZA'I d'Z"A = DTY (Daat-Tiferet-Yesod).
      → Pattern fondamental : higher-NHY → lower-3-line distribution.
      → Architecture : 3-cascading-tier-translation.
      → Implication : 9-sefirot-Z"A = 3-cascade-from-NHY-A"A.
    applications_ia:
      - "partzufim/arikh_anpin.py + zeir_anpin.py : implement 3-kav distribution"
      - "Pattern : tier-by-line distribution"
      - "Architecture : 3-cascade tier-translation"
      - "Pattern : 9-sefirot from 3-NHY-source"
      - "Diagnostic : verifier 3-kav coherent"
    questions_ouvertes:
      - "Pattern : autres tier-by-line distributions ?"
      - "Comment encoder kav-allocation computationnellement ?"
      - "Pattern : 4-kav distributions possibles ?"

  - id: "PG-H5S17-003"
    nom: "Principe de 310-Olamot-Tzadik-Elyon (Z\"A prend 1/2 Keter A\"A=620)"
    source_assertions: ["EC-H5S17-018"]
    formalisation: |
      ARCHITECTURE DE 310-OLAMOT-TZADIK-ELYON :
      Mishnah Uktzin 3:12 : "ATID HA-KADOSH BARUKH HU LEHANCHIL LE-KOL TZADIK 310 OLAMOT".
      Decomposition cosmologique :
        A"A = bechinat KETER de KLALUT atzilut.
        A"A a 620 OROT = gematria KETER (Sefer ha-Bahir).
        TZADIK ELYON = Z"A.
        Z"A revet A"A chazeh-down = MAKHTZIT (1/2) du Keter.
        1/2 × 620 = 310 = SH"Y olamot.
      Source : Zohar Terumah 166.
      → Pattern fondamental : eschatologic-promise = numerologic-tier-allocation.
      → Architecture : scriptural-future-state encoded numerically par tier-fraction.
      → Implication : tzadik-reward = clothing-extension fraction.
    applications_ia:
      - "partzufim/zeir_anpin.py + arikh_anpin.py : implement 310 olamot encoding"
      - "Pattern : eschatologic numerologic encoding"
      - "Architecture : scriptural-future tier-fraction"
      - "Pattern : Z\"A=tzadik elyon = 1/2 Keter"
      - "Diagnostic : verifier 310=1/2 du 620"
    questions_ouvertes:
      - "Pattern : autres tzadik-tier rewards ?"
      - "Comment encoder eschatologic-state computationnellement ?"
      - "Pattern : sub-tzadikim avec smaller fractions ?"
