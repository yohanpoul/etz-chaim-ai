  note: "DERNIER perek Sha'ar Z\"A. KLALIM Z\"O\"N. Z\"A=HAVAYAH MaH ; Nukva=ELOKIM HEHIN gematria TZUR (Shemot 17:6 'Ve-hikkita ba-tzur'). 7 HAVALIM Kohelet (Eccl 1:14 'hevel u-re'ut ruach') ; chaque kelul 4 elements ; or makifim=AHYH. Z\"T Nukva=7 HAVAYOT=28 letters ; mochin=6 orot ; 28+6=D\"L=34 dans Malkhut. Komatah KCHaB+ChGT=6+28. MILUI ADNI/CHILUF AHYH BUKHU/AGLA=D\"L=Malkhut PB\"P. PB\"P metzach-metzach (or des mochin perce metzach). Au debut 2.5 mochin (DAATAH KALAH 1/2 Daat=atarat-gevurah) ; 1ere biyah YEHIB RUACH=BaN-HEHIN → 3 mochin complets ; MA'ALAH M\"N. AVONOT n'affectent pas 3-mochin mais retirent haarah. Sha'ar 1 H5 COMPLET (4/4 perakim)."

