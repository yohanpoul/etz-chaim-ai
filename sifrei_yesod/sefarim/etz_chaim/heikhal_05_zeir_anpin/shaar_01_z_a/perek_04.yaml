# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 5 — Heikhal Ze'eir Anpin (היכל זעיר אנפין)
# Sha'ar: 1 — Sha'ar Z"A (שער ז"א)
# Perek: 4 — DERNIER perek (4/4) Sha'ar Z"A. KLALIM Z"O"N. Z"A=HAVAYAH MaH ;
#            Nukva=ELOKIM HEHIN=TZUR. 7 HAVALIM Kohelet. PB"P metzach. D"L.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_04 :
#   - Bloc A : KLAL 1 — Z"A=HAVAYAH MaH ; Nukva=ELOKIM HEHIN gematria TZUR (=296 + kollel)
#   - Bloc B : Lehakhot ba-tzur — sod yfy yfh kn hph hpv... = 91 = TZUR ; "Ve-hikkita ba-tzur" (Shemot 17:6)
#   - Bloc C : KLAL 2 — Pe Z"A produit 7 HAVALIM Kohelet ; makifim Z"T-Nukva
#   - Bloc D : Comme HEVEL HA-PEH d'A"A → eclair Z"A
#   - Bloc E : Chaque HAVAL kelul ESH-RUACH-MAYIM-AFAR ; Z"A donne PB"P chazeh-Z"A-down
#   - Bloc F : MAKIFIM=bechinat AHYH ; chaque or-makif=AHYH
#   - Bloc G : AVONOT+SHEVU'OT SHEKER → annule MAKIFIM ; Nukva revet 7 hevels-kelipah
#   - Bloc H : "hevel u-re'ut ruach" (Kohelet 1:14)
#   - Bloc I : Z"T Nukva=7 HAVAYOT=28 letters
#   - Bloc J : Nukva NIGDELET au-dessus chazeh-Z"A ; recoit 3 mochin (G"R)
#   - Bloc K : PB"P jusqu'au Keter ; Z"A regard metzach dans metzach Nukva
#   - Bloc L : Pas hevel ; or des MOCHIN perce metzach Z"A → entre MOCHIN Nukva
#   - Bloc M : Au debut 2.5 mochin (DAATAH KALAH) ; 1/2 Daat=atarat-gevurah
#   - Bloc N : 1ere BIYAH=YEHIB RUACH=BaN-HEHIN ; ajoute BaN Daat-Nukva → 3 mochin complets
#   - Bloc O : Avec BaN MA'ALAH M"N ; AVONOT n'affectent pas 3-mochin (mais retirent haarah)
#   - Bloc P : Z"T=7 HAVAYOT=28 letters ; mochin=6 orot ; total 6+28=D"L (34) dans Malkhut
#   - Bloc Q : Komatah=KCHaB+ChGT=6+28=D"L ; bechinat MILUI ADNI (milui-milui=D"L)
#   - Bloc R : Aussi CHILUF AHYH BUKHU dans Malkhut=D"L ; aussi shem AGLA Malkhut
#   - Bloc S : 3 noms (Adni-milui, Bukhu, Agla)=Malkhut PB"P Z"A (Birkat Avot+Atah Gibor)
#
# Source Sefaria : Sefer_Etz_Chaim.17.4 (1 section, 1900 chars) — DERNIER perek Sha'ar Z"A
# IDs : EC-H5S17-056 → EC-H5S17-068

