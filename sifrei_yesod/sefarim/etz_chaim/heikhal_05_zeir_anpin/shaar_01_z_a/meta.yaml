  sujet_principal: |
    Sha'ar Z"A (Heikhal 5, Sefer Etz Chaim 17). 4 perakim systematiques sur :
    - Tikkun Z"A apres tikkun A"O
    - Z"A = Z"T (7 inferieures) de MaH + Z"T de BaN (sauf KETERIM)
    - Z"A revet A"A de TABBUR jusqu'a fin RAGLAYIM
    - 2 YENIKAHS : Beriah dadei behemah → Atzilut dadei adam
    - IBBUR 12 mois (tikkun complete atzilut)
    - Distribution NHY-A"A : 3 kav Z"A (Netzach→ChChN, Hod→BGH, Yesod→DTY)
    - Sod 310 OLAMOT (Mishnah Uktzin 3:12) ; "le-hanachil le-kol tzadik 310 olamot"
    - Tzadik elyon = Z"A prend 1/2 KETER A"A = 310 (= SH"Y olamot ; A"A=620=KETER, Sefer Bahir)
