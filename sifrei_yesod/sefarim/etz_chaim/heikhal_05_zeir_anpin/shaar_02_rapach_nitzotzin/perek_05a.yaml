# Sha'ar: 2 — Sha'ar Rapach Nitzotzin (שער רפ"ח ניצוצין)
# Perek: 5a — RaPaCh = GEVUROT/DININ. Sources Zohar (Pekudei,
#             Tazria, Idra). 320/325/640 nitzotzin = 7 ADAM × 45 +
#             tikkun. NA'AR/NA'ARAH. MNTzPCh = פ"ר. SHACh vs PaR.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_05a (1ere section, ~5662 chars) :
#   - Bloc A : RaPaCh = GEVUROT + DININ GEMURIM
#   - Bloc B : Source Zohar Pekudei — BOTzINA DE-KARDINUTA bashes Mahshava → 320 nitzotzin
#   - Bloc C : Source Tazria 48b — 325 nitzotzin de Botzina (mi-sitra de-Gevurah)
#   - Bloc D : Source Idra 132 — NEHIRA YEKIRA + 325 ibrin
#   - Bloc E : 320 vs 288 vs 325 — same matter
#   - Bloc F : 320 = 7 MELAKHIM × ADAM ; Z"A=ADAM=havayah milui alafin=45
#   - Bloc G : 7 × 45 = 315 (שט"ו) ; +5 chadasim = 320
#   - Bloc H : Tikkun via TIPAT ABA (5 chasadim, pas nitzotzin) + TIPAT M"N IMA (5 gevurot, nitzotzin)
#   - Bloc I : Z"A total = 320 ; Nukva total = 320 (klalut 7 melakhim)
#   - Bloc J : Gevurot DUPLICATED → 2×320 dans Z"A → SHaMSH ; 2×320 dans Nukva → TaMaR
#   - Bloc K : Mitarvim be-mei aamma + tikkun (oeufs maternels)
#   - Bloc L : Source Bo 31b — NA'AR / NA'ARAH
#   - Bloc M : Shem ADNI = DIN (3 dernieres letters) + ALEPH (premiere = AHYH = rehamim)
#   - Bloc N : Malkhut = DINA RAFIA (rigueur douce) — AHYH adoucit
#   - Bloc O : 5 GEVUROT = 5 DIN = 5×64 = 320 (ש"ך)
#   - Bloc P : Source Pekudei — BOTzINA jette nitzotzin → birur pesolet via 5 gevurot
#   - Bloc Q : 5 ALEFIN ajoutees → ADNI 5 fois = 325 (שכ"ה) ; pure-din mitigee
#   - Bloc R : 320 = SHaCh = NA'AR (pre-mitigation) ; 325 = SHaChE = NA'ARAH (post-mitigation, +H' rehamim)
#   - Bloc S : MNTzPCh (5 letters finales) = פ"ר = 280 = 5 GEVUROT mitigees mieux
#   - Bloc T : Difference SHaCh vs PaR : SHaCh = gevurot Nukva elle-meme (kelim 3 ADNI) ; PaR = gevurot Z"A donnes a Nukva (atterrissent NEKUDAT TZIYON, Yesod-Nukva)
#   - Bloc U : MNTzPCh ממותקות plus que SHaCh
#   - Bloc V : Resemblances autres nitzotzin (groupes 4 ou 2) — TZARIKH IYUN
#
# Source Sefaria : Sefer_Etz_Chaim.18.5 (1ere moitie ~5662 chars / 7894 total)
# IDs : EC-H5S18-116 → EC-H5S18-138

