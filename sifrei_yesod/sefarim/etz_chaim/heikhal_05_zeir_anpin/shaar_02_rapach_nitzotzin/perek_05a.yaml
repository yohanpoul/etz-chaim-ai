  note: "Part A de 2 — RaPaCh = GEVUROT/DININ GEMURIM. Sources Zohar : Pekudei (BOTzINA DE-KARDINUTA bashes MAHSHAVA, jette ש\"ך/320 nitzotzin), Tazria 48b (שכ\"ה=325 ibrin sitra de-Gevurah), Idra 132 (Nehira Yekira sliq le-325 ibrin). Variante 320/288/325 = same matter. Calcul 320 : Z\"A=ADAM (havayah milui alafin=45) ; 7 melakhim × ADAM = שט\"ו (315) ; +5 chadashim (5 gevurot tipat M\"N Ima) = 320 (ש\"ך). Tipat Aba = 5 chasadim pas nitzotzin. Nukva aussi = 320 (klalut 7 melakhim). Gevurot duplicated → 2×320 = 640 = SHaMSH (שמ\"ש en Z\"A) / TaMaR (תמ\"ר en Nukva). Source Bo 31b NA\"AR (320 nitzotzin pre-mitigation) / NA\"ARAH (325 post-mitigation +H'). Mecanique : Shem ADNI = DIN (3 lettres dernieres) + ALEPH (1ere = AHYH = rehamim) ; Malkhut DINA RAFIA. 5 GEVUROT = 5 DIN = 5×64 = 320 ; +5 ALEFIN (5 AHYH dans H'-elyonah=Bina) → 5 ADNI = 325 ; mitigation. SHaCh (du ZAchAR/Z\"A) = 320 dans Z\"A ; SHaChE (325) = NA'ARAH = mitigated dans Nukva. MNTzPCh (5 lettres finales) = פ\"ר = 280 = 5 gevurot Z\"A donnes a Nukva (NEKUDAT TZIYON) ; mieux mitigees que SHaCh. SHaCh = gevurot Nukva ELLE-MEME (kelim 3 noms ADNI) ; PaR = gevurot Z\"A. Resemblances autres nitzotzin (4 ou 2) — TZARIKH IYUN."

