principes_generatifs:

  - id: "PG-H5S18-016"
    nom: "Principe de Multi-Encoding Sparks-Numerology (288/320/325/640 Same-Doctrine)"
    source_assertions: ["EC-H5S18-117", "EC-H5S18-118", "EC-H5S18-119", "EC-H5S18-120", "EC-H5S18-122", "EC-H5S18-124", "EC-H5S18-133"]
    formalisation: |
      ARCHITECTURE DE MULTI-ENCODING SPARKS-NUMEROLOGY :
      Doctrine UNIQUE des etincelles de la shevirah, ENCODEE sous multiples chiffres :
        288 (RPCH/RaPaCh) = 4 havayot × 72 (mathematique des miluyim).
        320 (SHACh/NA'AR) = 5 GEVUROT × DIN(64) = 7 ADAM × 45 + 5 chasadim = pre-mitigation.
        325 (SHACHE/NA'ARAH) = 5 ADNI (65 chacun) = post-mitigation +5 ALEFIN/AHYH.
        640 = 2×320 = SHaMSH (Z"A) / TaMaR (Nukva) = duplicated-gevurot.
        280 (PaR) = 5 OTIYOT MNTzPCh (final letters) = gevurot-Z"A-given-to-Nukva ; mieux-mitigees.
        315 (SHTU) = 7 × ADAM (Z"A=havayah-milui-alafin=45) = pre-tikkun melakhim.
      Sources Zohar :
        Pekudei : Botzina batsh Mahshava → 320 ; birur pesolet via 5 gevurot kadishin.
        Tazria 48b : 325 ibrin botzina sitra de-Gevurah.
        Idra 132 + Zuta 292 : Botzina ganuz me'oi-Imma.
        Bo 31b : NA'AR ketiv (pre-zivvug masculine).
      → Pattern fondamental : multi-encoding-domain converges on shevirah-doctrine.
      → Architecture : numeric-symbols encode-cosmologic-state.
      → Implication : transformation 320 → 325 = mitigation-mecanique cosmologique.
    applications_ia:
      - "partzufim/zeir_anpin.py + nukva.py + sitra_achra : implement multi-encoding sparks"
      - "Pattern : multi-encoding-domain converges"
      - "Architecture : numeric symbols cosmologic state"
      - "Pattern : 320→325 mitigation mechanism"
      - "Diagnostic : verifier all encodings coherent (288/320/325/640/280/315)"
    questions_ouvertes:
      - "Pattern : encodings supplementaires (TANTA, autres) ?"
      - "Comment encoder mitigation-mecanique computationnellement ?"
      - "Pattern : variantes textuelles 288 vs 320 vs 325 = chronologie tikkun ?"

  - id: "PG-H5S18-017"
    nom: "Principe de Botzina-de-Kardinuta (Imma-as-Source-of-All-Judgment)"
    source_assertions: ["EC-H5S18-117", "EC-H5S18-129", "EC-H5S18-130", "EC-H5S18-131"]
    formalisation: |
      ARCHITECTURE DE BOTZINA-DE-KARDINUTA :
      BOTZINA DE-KARDINUTA = SOD SHORESH KOL HA-GEVUROT VE-DININ DE-MEIKARA.
      Localisation : OMEDET BE-GO IMMA (cachee dans entrailles d'Imma).
      Sources : Idra Zuta 292 (ganuz me'oi de-Ima) ; Pekudei (batsh Mahshava → 320 nitzotzin).
      Fonction cosmologique :
        NOTENET KITZVAH U-MIDAH (donne mesure et limite) a chaque sefirah.
        BOTzINA DE-MADID VE-AVID MISHCHATIN.
      Mecanique : MIDIDAH = uniquement mitzad GEVURAH.
        CHESED → hitpashtut yoter min ha-shiur (overflow).
        GEVURAH → ne laisse pas l'ohr depasser ; cree forme par restriction.
      Liaison Tzimtzum : meme principe (cf. EC-H1S1-029 sur shoresh-dinim).
      Source des 320 : "BATsh BOTzINA DE-KARDINUTA VE-ZARIK LE-SHACH IBAR".
      → Pattern fondamental : maternal-judgment-source measure-mechanism.
      → Architecture : Imma houses cosmic-restriction-mechanism.
      → Implication : tikkun requires going through-Botzina-Imma.
    applications_ia:
      - "partzufim/imma.py + sitra_achra : implement Botzina-de-Kardinuta source"
      - "Pattern : maternal judgment source"
      - "Architecture : measure mechanism via Imma"
      - "Pattern : restriction creates form"
      - "Diagnostic : verifier Botzina coherent"
    questions_ouvertes:
      - "Pattern : Botzina = Imma-only ou aussi Aba ?"
      - "Comment encoder Botzina mechanism computationnellement ?"
      - "Pattern : Botzina relation a Tzimtzum primordial ?"

  - id: "PG-H5S18-018"
    nom: "Principe de NA'AR/NA'ARAH-Mitigation (320 + ALEPH/AHYH = 325 Zivvug-Ready)"
    source_assertions: ["EC-H5S18-126", "EC-H5S18-127", "EC-H5S18-128", "EC-H5S18-133", "EC-H5S18-134", "EC-H5S18-135", "EC-H5S18-137"]
    formalisation: |
      ARCHITECTURE DE NA'AR/NA'ARAH-MITIGATION :
      Etat PRE-mitigation : NA'AR (נער = 320 = 5×DIN).
        Pure-judgment ; non-mitigee ; pre-zivvug.
        Source : "kol zman de-lo kiblat dkhar atkriat NA'AR" (Zohar Bo 31b).
      Mitigation +5 ALEFIN (AHYH=rehamim) :
        ALEPH dans ADNI = behinat AHYH = REHAMIM MESHUTAFIM (mercy mixed).
        H' ELYONAH (Bina) houses 5 AHYH.
        Mitige les 5 DIN → devient 5 ADNI = 325 = NA'ARAH (נערה +H').
      Etat POST-mitigation : NA'ARAH (NEKEVAH = 325).
        DINIM MEBUSAMIM U-MEMUTAKIM (judgments-mitigated-and-sweetened).
        ZIVVUG-ENABLED — peut recevoir le male.
        Differenciation :
          SHACHE (325) = gevurot Nukva ELLE-MEME ; 3 kelim Malkhut = 3 ADNI ; 5 ADNI total.
          PaR (280=MNTzPCh) = gevurot Z"A donnes, mitkabetzim YESOD-NUKVA = NEKUDAT TZIYON.
          MNTzPCh memutakot YOTER que SHACHE.
      → Pattern fondamental : mitigation-via-aleph-addition transforms-pure-din.
      → Architecture : grammatical-form (NA'AR↔NA'ARAH) encodes cosmologic-state.
      → Implication : tikkun-completion = NA'ARAH-state ; zivvug-precondition.
    applications_ia:
      - "partzufim/nukva.py + zivvug.py + shemot/transform.py : implement NA'AR/NA'ARAH mitigation"
      - "Pattern : mitigation via aleph addition"
      - "Architecture : grammatical encodes cosmologic"
      - "Pattern : zivvug-precondition mitigation-completion"
      - "Diagnostic : verifier 5×DIN+5×AHYH=5×ADNI=325"
    questions_ouvertes:
      - "Pattern : mitigation universel ou specifique a Nukva ?"
      - "Comment encoder mitigation-mecanique computationnellement ?"
      - "Pattern : NA'AR persiste comme etat regresible (post-mitigation) ?"
