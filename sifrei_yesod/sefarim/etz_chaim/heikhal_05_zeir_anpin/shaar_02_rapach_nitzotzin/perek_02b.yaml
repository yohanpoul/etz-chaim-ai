      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Architecture : MaH=71 (26+45). Pattern near-72 marker."

  - id: "EC-H5S18-068"
    source_he: "ומשם ב\"ן ירדו כל המדרגות חוץ מן העליונה והראשונה לפי שלהיות בחי' ב\"ן מל' והיא תחתונה מכולם היה בה שבירה יותר מכום שלמעלה ממנה ולא עלו ממנה רק ד' אותיות פשוטים בבחי' אותיות עצמן וכל השאר ירדו לבריאה"
