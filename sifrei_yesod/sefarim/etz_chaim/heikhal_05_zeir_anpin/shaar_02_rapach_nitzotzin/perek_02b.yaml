  - id: "EC-H5S18-066"
    source_he: "ומשם מ\"ה שהוא הת\"ת ירדו ב' מדרגות עליונים יותר לפי שהוא גרוע במעלה מן ס\"ג ולא עלו באצילות רק ב' מדרגות ראשונים לבד וכל השאר ירדו בבריאה נמצא כי הניצוצין שלהם הם ע\"א ניצוצין כ\"ו ומ\"ה"
    source_ref: "Heikhal 5, Sha'ar 2:2 §19"
    assertion: |
      MaH : 71 nitzotzin :
