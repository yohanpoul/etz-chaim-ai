  - id: "EC-H5S18-065"
    source_he: "נמצא כי ירדו בבריאה ב' מדרגות אחרות יותר עליונים שהם י' אותיות דמילוי הס\"ג ובחי' האחור שלהם שהם מדרגה ה' וז' וכאשר נמנה בחי' המדרגה הה' שהם י' אותיות דמילוי ס\"ג בבחי' אותיות עצמן ונמנה גם מספרם שהוא ס\"ג הרי ע\"ג ניצוצין שירדו משם ס\"ג"
    source_ref: "Heikhal 5, Sha'ar 2:2 §19"
    assertion: |
      SAG : 73 nitzotzin :
      → 2 MADREGOT additionnelles plus elevees descendent (vs AV).
      → MAD 5 (10 letters milui SAG) + MAD 7 (mispar de cela = 63).
