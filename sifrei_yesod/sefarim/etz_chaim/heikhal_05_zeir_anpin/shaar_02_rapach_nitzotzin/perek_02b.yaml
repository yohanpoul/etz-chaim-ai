  note: "Part B de 2 — HAQDAMAH 10 nekudim sortis nikvei einayim A\"K → KETER=A\"A, CHB=AbA+IMA, CHESED-YESOD(6S)=Z\"A, MALKHUT=Nukva. Au TIKKUN : pas placement original — A\"A descend jusqu'a siyum atzilut ; AbA-IMA habillent CHESED-GEVURAH A\"A (PAS CHB) ; Z\"A habille seulement chatzi-Tiferet-A\"A et descend ; NUKVA seule reste makom rishon=Malkhut A\"A. KLAL : AV en CHESED A\"A (CHESED gimatria=72) ; SAG en GEVURAH ; MaH en chatzi-Tiferet+NHY (V\"K Z\"A) ; BaN en MALKHUT. 4 HAVAYOT toutes en Z\"T A\"A. AV : 6 mad premieres montent atzilut ; mad 7 = mispar 10 lettres milui = 72 = AV ; mad inferieures kelulot. RPCH = 4×AV(72) = 288. SAG : 4 mad premieres montent ; descend mad 5+7 = 10 lettres + 63 = 73. MaH : 2 mad premieres montent ; descend mad 3+7 = 26 + 45 = 71. BaN : toutes mad descendent SAUF mad 1 (Malkhut nekudah ahat reste atzilut) ; achorayim BaN = 72. Total 4×72 = 288 RaPaCh. Distinction : AV=mad7 ; SAG=mad 5+7 (73) ; MaH=mad 3+7 (71) ; BaN=mad 4 (72). Closing : tous AV/SAG/MaH/BaN dans shem BaN englobant 10 nekudot."

