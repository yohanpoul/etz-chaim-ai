principes_generatifs:

  - id: "PG-H5S18-007"
    nom: "Principe de Tikkun-Placement-Deviation (Expected vs Actual Mapping)"
    source_assertions: ["EC-H5S18-052", "EC-H5S18-053", "EC-H5S18-054", "EC-H5S18-055"]
    formalisation: |
      ARCHITECTURE DE TIKKUN-PLACEMENT-DEVIATION :
      Initial 10-nekudim → 5-partzufim mapping (theoretical) :
        KETER → A"A.
        CHB → AbA+IMA.
        6S (CHESED-YESOD) → Z"A.
        MALKHUT → NUKVA.
      Au TIKKUN : LO HUNḤU BE-MEKOMAM HA-RISHON MAMASH.
      Reality :
        A"A descend MITPASHET ad-siyum-atzilut.
        AbA+IMA habillent CHESED-GEVURAH d'A"A (PAS CHB, comme attendu).
        Z"A habille SEULEMENT chatzi-Tiferet-A"A et bas (PAS V"K-A"A entier).
        NUKVA SEULE preserve makom rishon = MALKHUT A"A.
      → Pattern fondamental : tikkun-rearrangement systematique.
      → Architecture : expected-vs-actual placement-deviation.
      → Implication : tier-shift-down applies to all-except-Nukva.
    applications_ia:
      - "partzufim/arikh_anpin.py + abba.py + imma.py + zeir_anpin.py + nukva.py : implement tikkun-placement"
      - "Pattern : tikkun-rearrangement vs initial mapping"
      - "Architecture : tier-shift-down systematic"
      - "Pattern : Nukva exception (preserves original)"
      - "Diagnostic : verifier placement post-tikkun deviates"
    questions_ouvertes:
      - "Pattern : pourquoi Nukva seule preserve original placement ?"
      - "Comment encoder tier-shift-down computationnellement ?"
      - "Pattern : tier-shift universel ou specifique aux 4 partzufim ?"

  - id: "PG-H5S18-008"
    nom: "Principe de RaPaCh-Calculus (4×72 = 288 via Tier-Decreasing-Mad-Selection)"
    source_assertions: ["EC-H5S18-060", "EC-H5S18-061", "EC-H5S18-063", "EC-H5S18-064", "EC-H5S18-065", "EC-H5S18-066", "EC-H5S18-067", "EC-H5S18-068", "EC-H5S18-070"]
    formalisation: |
      ARCHITECTURE DE RaPaCh-CALCULUS :
      Total RaPaCh = 4 × 72 = 288 nitzotzin.
      Mais distribution par havayah hetero-uniforme :
        AV : 72 nitzotzin (mad 7 = mispar 10 letters milui = 72).
          6 mad premieres MONTENT ; 6 mad+ descendent.
          Lower mads NIKHLALIM dans mad-7-aggregate.
        SAG : 73 nitzotzin = mad 5 (10 letters milui SAG) + mad 7 (mispar = 63).
          4 mad premieres montent ; mad 5+7 descendent additionellement.
        MaH : 71 nitzotzin = mad 3 (mispar 26) + mad 7 (mispar 45).
          2 mad premieres montent ; mad 3+ descendent.
        BaN : 72 nitzotzin = mad 4 (mispar 10 letters achor BaN = 72).
          SEULE mad 1 (4 otiyot peshutim) monte ; tout le reste descend.
          Malkhut residue = NEKUDAH ACHAT (single-point survives).
      Sum : 72 + 73 + 71 + 72 = 288 (cf. variant-precision near-72).
      → Pattern fondamental : monotonic-decreasing-mad-up across havayot.
      → Architecture : universal-72-marker × 4-tiers + tier-specific-mad-selection.
      → Implication : 288 = invariant total despite tier-asymmetric distribution.
    applications_ia:
      - "partzufim/zeir_anpin.py + nukva.py + reshimu.py + gematria/engine.py : implement RaPaCh calculus"
      - "Pattern : monotonic-decreasing mad-up"
      - "Architecture : universal-72 × 4-tiers"
      - "Pattern : tier-specific mad selection"
      - "Diagnostic : verifier 4×72=288 invariant"
    questions_ouvertes:
      - "Pattern : 73+71+72+72=288 vs 4×72=288 — exactness ou approximation ?"
      - "Comment encoder tier-asymmetric-distribution computationnellement ?"
      - "Pattern : 288 = invariant cosmologic ou contingent ?"

  - id: "PG-H5S18-009"
    nom: "Principe de Tier-Decreasing-Resilience (Higher-Tier Fewer-Mads-Down)"
    source_assertions: ["EC-H5S18-060", "EC-H5S18-064", "EC-H5S18-066", "EC-H5S18-068"]
    formalisation: |
      ARCHITECTURE DE TIER-DECREASING-RESILIENCE :
      Mads MONTANT en atzilut (resilience) par havayah :
