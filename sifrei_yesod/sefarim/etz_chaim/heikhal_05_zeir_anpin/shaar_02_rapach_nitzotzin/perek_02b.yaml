      → 4 PE'AMIM (× ) AV (72) = 288 RaPaCh.
      → MISPAR KULAM = 288 nitzotzin.
      → Architecture : BaN=72 = achor-tetration ; total 4×72=288 RaPaCh confirme.
      → Pattern : universal-72 across-4-tiers.
    type: déduction_logique
    concepts:
