# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 5 — Heikhal Ze'eir Anpin (היכל זעיר אנפין)
# Sha'ar: 2 — Sha'ar Rapach Nitzotzin (שער רפ"ח ניצוצין)
# Perek: 2b — HAQDAMAH 10 nekudim → A"A/AbA-IMA/Z"A/Nukva placement.
#             AV/SAG/MaH/BaN distribution Z"T A"A. RAPACH = 4×72.
#             Calcul nitzotzin par havayah. Closing : 4 havayot dans BaN.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_02b :
#   - Bloc T : HAQDAMAH — 10 nekudim sortis nikvei einayim A"K
#   - Bloc U : KETER nekudah → A"A (post-tikkun atzilut)
#   - Bloc V : CHB nekudot → 2 partzufim AbA+IMA
#   - Bloc W : CHESED-YESOD (6S) → Z"A ; MALKHUT → Nukva-Z"A
#   - Bloc X : Au TIKKUN : pas placés au makom rishon ; A"A descend jusqu'a siyum atzilut
#   - Bloc Y : AbA+IMA habillent CHESED-GEVURAH d'A"A (PAS CHB d'A"A, contre l'attente)
#   - Bloc Z : Z"A ne habille pas VK A"A ; seulement de CHATZI TIFERET-A"A et descend
#   - Bloc AA : NUKVA reste makom rishon = habille MALKHUT d'A"A
#   - Bloc BB : KLAL — AV en CHESED A"A ; SAG en GEVURAH ; MaH en CHATZI TIFERET+NHY ; BaN en MALKHUT
#   - Bloc CC : 4 HAVAYOT toutes en Z"T A"A
#   - Bloc DD : AV — 6 mad premieres montent atzilut ; mad 7 (mispar 10 lettres milui = 72 = AV)
#   - Bloc EE : Mad inferieures incluses dans AV (kelulot) ; pas comptees comme dabar bifnei atzmah
#   - Bloc FF : RPCH = 4 × AV (72) ; AV : 72 nitzotzin
#   - Bloc GG : SAG — 4 mad premieres montent ; descendent mad 5 + mad 7 = 10 letters + 63 = 73
#   - Bloc HH : MaH — 2 mad premieres montent ; descend = 26 + 45 = 71
#   - Bloc II : BaN — toutes mad descendent SAUF mad 1 (Malkhut nekudah ahat reste atzilut) ; ירדו י' אותיות achor BaN = 72
#   - Bloc JJ : Total = 4 × 72 = 288 RaPaCh ; mais distinction : AV=mad7 ; SAG=mad 5+7 ; MaH=mad 3+7 ; BaN=mad 4
#   - Bloc KK : Closing — tous AV+SAG+MaH+BaN dans shem BaN qui inclut 10 nekudot et se divise
#
# Source Sefaria : Sefer_Etz_Chaim.18.2 (2eme moitie + part 1, ~2700 chars)
# IDs : EC-H5S18-050 → EC-H5S18-070

meta:
  sefer: etz_chaim
  heikhal: 5
