      → 71 nitzotzin = 26 (mad 3 mispar 4 letters peshutim panim) + 45 (mad 7 mispar 10 letters milui = MaH).
      → Architecture : MaH = 71 nitzotzin (26+45).
      → Pattern : tier-down accelerating-fall.
    type: déduction_logique
    concepts:
      - {id: mah_71_nitzotzin_mad_3_26_mad_7_45_total_71, role: mah_tiferet_2_mad_supplementaires_descendent_mad_1_2_montent_71_nitzotzin_26_mad_3_45_mad_7_total_71}
    mapping:
