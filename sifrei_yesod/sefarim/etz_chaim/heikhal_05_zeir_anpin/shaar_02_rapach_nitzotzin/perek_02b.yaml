  - id: "EC-H5S18-063"
    source_he: "וכבר נת\"ל במקומות רבים כי מציאת מספר רפ\"ח ניצוצין הם ד' בחי' ע\"ב שירדו מאלו הד' הויות וכולם יחד הם רפ\"ח ניצוצים"
    source_ref: "Heikhal 5, Sha'ar 2:2 §19"
    assertion: |
      RaPaCh = 4 × 72 (cf. EC-H5S18-022 sur 288 nitzotzin) :
      → Mispar RPCH (288) = 4 BEHINOT D'AV (72 each).
      → DESCENDUS des 4 HAVAYOT (AV+SAG+MaH+BaN).
