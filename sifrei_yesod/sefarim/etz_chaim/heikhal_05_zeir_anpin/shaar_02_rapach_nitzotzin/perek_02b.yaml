      relevance: "Architecture : BaN extreme shevirah. Pattern terminal-tier max-fall."

  - id: "EC-H5S18-069"
    source_he: "וז\"ס שאנו אומרים בכ\"מ כי המלכות נשארה באצילות בבחינת נקודה א' בלבד וכל השאר נתמעט ממנה וירדו אל הבריאה והבן זה כי הנה נקודה ההיא היא בחי' מדרגה ראשונה שבכולם בלבד"
