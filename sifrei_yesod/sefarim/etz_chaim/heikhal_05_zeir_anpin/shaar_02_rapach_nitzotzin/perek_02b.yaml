      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Architecture : MaH=71 (26+45). Pattern accelerating-fall."

  - id: "EC-H5S18-067"
    source_he: "פי' כי מספר ד' אותיות הפשוטים הם מספר כ\"ו ומספר י' אותיות מילוי הם מ\"ה והנה כ\"ו ומ\"ה הם ע\"א ניצוצין הרי הם ג\"פ ע\"ב"
    source_ref: "Heikhal 5, Sha'ar 2:2 §19"
    assertion: |
      MaH — explication mispar 71 :
      → MISPAR de 4 OTIYOT PESHUTIM (panim simples) = 26.
      → MISPAR de 10 OTIYOT MILUI = 45 (= MaH).
      → 26 + 45 = 71 nitzotzin = G"P (= grande precision approximative) AV (72).
      → 71 ≈ 72 - 1 (approximation 3-fois AV apres total compute).
      → Architecture : MaH-71-nitzotzin = 26+45 sum.
      → Pattern : numeric-precision near-72-marker.
    type: déduction_logique
    concepts:
      - {id: mah_71_explication_26_4_otiyot_peshutim_45_10_otiyot_milui, role: mah_71_explication_26_4_otiyot_peshutim_panim_45_10_otiyot_milui_mah_total_71_proche_72}
    mapping:
