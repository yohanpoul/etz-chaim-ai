      relevance: "Architecture : Malkhut single-point residual. Pattern minimum residual."

  - id: "EC-H5S18-070"
    source_he: "ואמנם מספר הע\"ב ניצוצין שירדו ממנה הם בחי' המספר והחשבון של י' אותיות דאחור דב\"ן ולא הפנים דשם עצמו שהוא מדרגה א' רק אחוריים שהם גימ' ע\"ב הרי ד\"פ ע\"ב שירדו מן ד' הויות ומספר כולם הם רפ\"ח ניצוצין"
