    source_he: "ופשוט הוא שכל המדרגות שלמטה ממנו נכללין בה ואינם נחשבים בה כדבר בפ\"ע ולכן אינה עולה במספר ולכן אינו נחשב רק מדרגה זו בחי' מספר י' אותיות המילוי שהוא גי' ע\"ב וכל שאר הניצוצין שלמטה מהם נכללין באלו ע\"ב"
    source_ref: "Heikhal 5, Sha'ar 2:2 §19"
    assertion: |
      AV — KOLELOT principle :
      → Toutes les madregot INFERIEURES (mad 8-12+) sont NIKHLALIM (incluses) dans mad-7.
      → Pas comptees comme DABAR BIFNEI ATZMAH (chose en soi).
      → MISPAR ne s'eleve pas pour elles.
      → Seul mad-7 (MISPAR 10 letters milui = 72) compte.
      → SHE'AR HA-NITZOTZIN inferieurs INCLUS dans ces 72.
      → Architecture : aggregation-by-tier-7 ; lower-mads-collapsed.
      → Pattern : single-marker-aggregation.
    type: déduction_logique
    concepts:
      - {id: av_mad_inferieurs_kolelot_dans_mad_7_72_pas_compte_dabar_bifnei_atzmah, role: av_madregot_inferieurs_nikhlalim_mad_7_72_pas_compte_dabar_bifnei_atzmah_aggregation_collapse}
