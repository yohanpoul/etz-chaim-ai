# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 5 — Heikhal Ze'eir Anpin (היכל זעיר אנפין)
# Sha'ar: 2 — Sha'ar Rapach Nitzotzin (שער רפ"ח ניצוצין)
# Perek: 1 — IBBUR Z"A. 3 BEHINOT a tikkun. RaPaCh nitzotzin (288).
#            Hevel de-garmei. 7 Melakhim shevirah. TOHU VAVOHU = MeT+RaPaCh.
#            4 HAVAYOT (AV/SAG/MaH/BaN). MILUI=DINIM=ELOHIM.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_01 :
#   - Bloc A (§1) : Title H5 Sha'ar 2 = Sha'ar RaPaCh Nitzotzin, 6 perakim
#   - Bloc B : IBBUR Z"A dans pratzuf "ha-kolel" Bina+Tevunah
#   - Bloc C : 3 BEHINOT a tikkun par ibbur (orot melakhim retires, RaPaCh nitzotzin, kelim shevurim)
#   - Bloc D : BEHINAH 1 — orot melakhim remontent ; kelim "morts" en Beriah
#   - Bloc E : BEHINAH 2 — RaPaCh nitzotzin restant pour vie diminuee (chiyut metzumtzam)
#   - Bloc F : Analogie adam tachton mort — chelek nefesh reste guf pour TECHIYAT HA-METIM
#   - Bloc G : Source Zohar Shelach 170 — pekudana de-ruach le-nefesh la nuit
#   - Bloc H : Hevel de-Garmei Zohar 169 — ba'alat ov+Shmuel ; verset Yeshayah 58:11
#   - Bloc I : BEHINAH 3 — kelim eux-memes shevurim, descendus Beriah
#   - Bloc J : 7 NEKUDOT TACHTONIM = 7 MELAKHIM = ZON BaN sortis NIKVEI EINAYIM A"K
#   - Bloc K : Kelim sortirent d'abord ; orot ne supportent ; SHEVIRAH ; kelim descendent futur Beriah
#   - Bloc L : YERIDAH = MITAH (sortir d'olamo vers olam acher = mort)
#   - Bloc M : 7 melakhim = Z"T = ZON Atzilut ; contraste ACHORAYIM A"O tombes pas morts
#   - Bloc N : Comparaison adam tachton — neshamah remonte Atzilut ; gufam (kelim) en Beriah = kevurah
#   - Bloc O : Ne'emar "ve-nafsho alav te'evul" ; reste behinah ruchani = HEVEL DE-GARMEI pour TECHIYAH
#   - Bloc P : Avon (RIBBIT, KOFER BE-TECHIYAH) → seche ruchaniyut → pas de techiyah ; verset Yeshayah 58:11
#   - Bloc Q : Yechezkel vision atzamot yeveishot — ish neshikh+marbit, atzamot sechees, pas techiyah
#   - Bloc R : Pareil 7 melakhim — ruchaniyut reste pour TIKKUN ATZILUT = TECHIYAH
#   - Bloc S : Klal — kol ma she-yesh be-olam ha-zeh = comme 7 melakhim ; "ein chadash tachat ha-shemesh" (Eccl 1:9)
#   - Bloc T : Ruchaniyut nishar = NITZOTZIN orot elyonim restes kelim metim ; iqarei orot remonterent
#   - Bloc U : Mispar nitzotzin = RPCH (288) ; sod "vehaaretz hayetah TOHU VAVOHU" (Bereshit 1:2)
#   - Bloc V : "Eretz Edom" = Malkhut A"K (Bereshit 36) ; "Ruach Elohim MERAḤEFET aleyhon" ; tevat MERAḤEFET = MeT (מ"ת=440) + RaPaCh (רפ"ח=288) = 728
#   - Bloc W : Pashut — ohr me'uleh ala lemalah ; behinah gru'ah resta = DININ GEMURIM
#   - Bloc X : Seder orot Atzilut = HAVAYOT ; 4 BEHINOT HAVAYAH (AV/SAG/MaH/BaN) avec miluyim
#   - Bloc Y : HAVAYAH d'AV — etzem ohr = 4 lettres havayah simples ; aspect MISPAR (havayah=26) ; tzurah > mispar
#   - Bloc Z : Aspect PANIM ; ACHORAYIM ; tzurah-letter ou mispar
#   - Bloc AA : MILUI = DININ ; gimatria milui = ELOHIM ; milui-milui ad ein ketz (recursion infinie)
#
# Source Sefaria : Sefer_Etz_Chaim.18.1 (2 sections, 4529 chars)
# IDs : EC-H5S18-001 → EC-H5S18-024

meta:
  sefer: etz_chaim
  heikhal: 5
  shaar: 2
  shaar_name_he: "שער רפ\"ח ניצוצין"
  perek: 1
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Premier perek Sha'ar RaPaCh Nitzotzin (Sefer Etz Chaim 18). IBBUR Z\"A dans pratzuf Imma+Tevunah ha-kolel. 3 BEHINOT a tikkun par ibbur : (1) orot melakhim retires, (2) RaPaCh nitzotzin = 288 etincelles restees kelim pour CHIYUT METZUMTZAM, (3) kelim shevurim descendus Beriah. Analogie adam tachton mort : chelek nefesh reste guf pour TECHIYAT HA-METIM. HEVEL DE-GARMEI (Zohar Shelach 169-170). Verset Yeshayah 58:11 ('ve-hisbi'a be-tzachtzachot nafshekha ve-atzmotekha yachalitz') ; ba'alat ov Shmuel ; Yechezkel vision atzamot yeveishot (37) ; usurier RIBBIT seche os pas techiyah. 7 MELAKHIM = ZON BaN sortis NIKVEI EINAYIM A\"K ; kelim sortirent d'abord, orot ne supportent → SHEVIRAH ; kelim descendent futur Beriah ; orot remontent. YERIDAH=MITAH (mort). Klal 'ein chadash tachat ha-shemesh' (Eccl 1:9) — tout olam ha-zeh = melakhim. Mispar nitzotzin = RPCH (288). Sod TOHU VAVOHU (Bereshit 1:2) ; 'Eretz Edom' = Malkhut A\"K (Bereshit 36 — rois morts) ; tevat MERAḤEFET = MeT (מ\"ת=440) + RaPaCh (רפ\"ח=288) = 728. Ohr me'uleh remonta ; behinah gru'ah resta = DININ GEMURIM. Seder 4 HAVAYOT Atzilut : AV (יוד הי ויו הי=72), SAG (יוד הי ואו הי=63), MaH (יוד הא ואו הא=45), BaN (יוד הה וו הה=52). Etzem ohr = 4 lettres simples ; aspect MISPAR (havayah=26) ; tzurah > mispar. PANIM/ACHORAYIM. MILUI = DININ = ELOHIM ; milui-milui ad ein ketz (recursion infinie)."

