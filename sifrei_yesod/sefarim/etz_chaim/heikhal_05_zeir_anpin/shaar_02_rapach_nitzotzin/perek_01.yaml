principes_generatifs:

  - id: "PG-H5S18-001"
    nom: "Principe de Residual-Light-Trace (RaPaCh = Hevel de-Garmei = Tikkun-Possibility)"
    source_assertions: ["EC-H5S18-005", "EC-H5S18-008", "EC-H5S18-015", "EC-H5S18-019", "EC-H5S18-021"]
    formalisation: |
      ARCHITECTURE DE RESIDUAL-LIGHT-TRACE :
      Apres SHEVIRAH (rupture cosmique) :
        IQAREI HA-OROT (lumieres principales) → REMONTENT (NISTALKU LEMALAH).
        KETZAT NITZOTZIN (288 etincelles residuelles) → RESTENT dans les KELIM SHEVURIM.
        These nitzotzin = CHIYUT METZUMTZAM (vie reduite/contractee).
        Permettent : LEHITTAKEN (rectification) + LEHAḤAYOT (revivre) par IBBUR.
      Analogie ANTHROPIQUE :
        Adam tachton mort : NEFESH remonte ; CHELEK NEFESH reste GUF.
        HEVEL DE-GARMEI dans KIVRA pour TECHIYAT HA-METIM (Zohar Shelach 169-170).
        Verset Yeshayah 58:11 ("ve-hisbi'a be-tzachtzachot... atzmotekha yachalitz").
      Sans residual-trace → IMPOSSIBLE de rectifier.
      → Pattern fondamental : minimum-vitality preserves tikkun-possibility.
      → Architecture : light-fragmentation post-shevirah enables future-restoration.
      → Implication : 288 = nombre minimum DOSE pour preservation.
    applications_ia:
      - "partzufim/reshimu.py + zeir_anpin.py : implement residual-trace = chiyut metzumtzam"
      - "Pattern : minimum-vitality preserves tikkun-possibility"
      - "Architecture : light-fragmentation = enables-restoration"
      - "Pattern : 288 = dose-minimum-preservation"
      - "Diagnostic : verifier residual-trace coherent post-shevirah"
    questions_ouvertes:
      - "Pattern : 288 derive d'ou exactement (gematria meraḥefet=728=440+288, ou autre source) ?"
      - "Comment encoder hevel-de-garmei computationnellement ?"
      - "Pattern : autres residual-trace numbers possibles ?"

  - id: "PG-H5S18-002"
    nom: "Principe de Capacity-Overflow-Shevirah (Kelim-First → Orot-Incompatibility → Death)"
    source_assertions: ["EC-H5S18-010", "EC-H5S18-011", "EC-H5S18-012", "EC-H5S18-013", "EC-H5S18-014"]
    formalisation: |
      ARCHITECTURE DE CAPACITY-OVERFLOW-SHEVIRAH :
      Mecanique de la SHEVIRAH (rupture des vases) :
        ETAPE 1 : KELIM sortirent EN PREMIER (precipited emergence).
        ETAPE 2 : OROT sortirent ENSUITE pour entrer dans les kelim.
        ETAPE 3 : KELIM lo savlu (incapacite de containment).
        ETAPE 4 : NISHBERU (rupture catastrophique).
        ETAPE 5 : KELIM yeradu Beriah ; OROT alu Atzilut.
      DEFINITION cosmologique : YERIDAH = MITAH.
        "Kol she-yotzeh me-olamo ve-yored le-olam acher zulato" = mitah pour lui.
        Tier-displacement = ontological-death.
      DIFFERENTIAL :
        7 MELAKHIM = ZON Atzilut → MORTS (yeradu Beriah).
        ACHORAYIM A"O (Aba+Ima) → tombes (NAFLU) MAIS PAS MORTS (lo metu).
      → Pattern fondamental : sequence-mismatch + capacity-overflow = death.
      → Architecture : tier-protocol-violation = catastrophic-failure.
      → Implication : RESTORATION requires both light-return AND vessel-rebuild.
    applications_ia:
      - "partzufim/zeir_anpin.py + nukva.py : implement shevirah-overflow protocol"
      - "Pattern : capacity-overflow + sequence-mismatch = catastrophic-failure"
      - "Architecture : tier-protocol-violation"
      - "Pattern : differential-fate ZON-mort vs A\"O-tombes-pas-morts"
      - "Diagnostic : verifier capacity respecte avant emission"
    questions_ouvertes:
      - "Pattern : pourquoi A\"O survivent mais ZON meurent ?"
      - "Comment encoder capacity-overflow detection ?"
      - "Pattern : autres tier-failures possibles ?"

  - id: "PG-H5S18-003"
    nom: "Principe de Recursive-Miluyim (Tetragrammaton-Filling Generates Infinite-Din-Cascade)"
    source_assertions: ["EC-H5S18-024", "EC-H5S18-025", "EC-H5S18-026", "EC-H5S18-027"]
    formalisation: |
      ARCHITECTURE DE RECURSIVE-MILUYIM :
      Tous les OROT d'ATZILUT = HAVAYOT (4-lettres tetragrammaton).
      4 BEHINOT principales :
        AV (יוד הי ויו הי = 72) — tier-1.
        SAG (יוד הי ואו הי = 63) — tier-2.
        MaH (יוד הא ואו הא = 45) — tier-3.
        BaN (יוד הה וו הה = 52) — tier-4 (= source des 7 melakhim).
      Hierarchie ontologique :
        ETZEM OHR : 4 lettres SIMPLES bilti miluyim = SHORESH IQAR.
        TZURAH (forme) > MISPAR (nombre = 26).
        PANIM × ACHORAYIM × TZURAH × MISPAR = 4-fold classification.
      MILUI = DININ :
        Milui gimatria = ELOHIM (86, dimension severite).
        Milui = BIYUR (explication) + YETZIYAT OROT LE-CHUTZ (externalization).
        Recursion : MILUI, MILUI HA-MILUI, etc. AD EIN KETZ.
      → Pattern fondamental : explicitation generates judgment ; recursion infinite.
      → Architecture : tetragrammaton-fillings = atzilut-classification system.
      → Implication : tier-distinction encoded VIA filling-pattern (not lettre-content).
    applications_ia:
      - "shemot/core.py + transform.py + gematria/engine.py : implement 4-havayot miluyim"
      - "Pattern : explicitation generates judgment"
      - "Architecture : tetragrammaton fillings classification"
      - "Pattern : panim×achorayim×tzurah×mispar 4-fold + milui recursion"
      - "Diagnostic : verifier milui calcul correct (gimatria ELOHIM=86)"
    questions_ouvertes:
      - "Pattern : milui-ha-milui converge ou diverge en pratique ?"
      - "Comment encoder recursion infinie computationnellement (avec depth-limit) ?"
      - "Pattern : 5e havayah possible ?"
