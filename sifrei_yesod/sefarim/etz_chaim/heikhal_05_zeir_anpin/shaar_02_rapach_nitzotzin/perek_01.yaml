      relevance: "Architecture : 4-fold classification. Pattern panim-achorayim × tzurah-mispar."

  - id: "EC-H5S18-027"
    source_he: "גם יש בחי' אחרת והוא ד' אותיות השם בהיותן במילוי כי אז הם בחי' דינין כי מילוי גי' אלהים ועוד כי שורש הוי\"ה הם ד' אותיות עצמן אבל מלואם הוא ביאור הוי\"ה ויציאת אורותיהן לחוץ וגם בבחי' המילוי יש בהם בחי' אותיות בעצמן ובחי' מספרם וכיוצא בזה בחי' רבות לאין קץ במילוי ובמלוי המילוי וכו' עד אין קץ"
    source_ref: "Heikhal 5, Sha'ar 2:1"
    assertion: |
      MILUI = DININ + recursion infinie (cf. EC-H1S4 sur miluyim) :
      → 4 lettres du SHEM en MILUI = BEHINAT DININ ; gimatria milui = ELOHIM (86).
      → SHORESH HAVAYAH = 4 lettres elles-memes ; MILUYAM = BIYUR + YETZIYAT OROT LE-CHUTZ.
      → Dans MILUI : 2 behinot (otiyot + misparan).
      → BEHINOT RABBOT LE-EIN KETZ : MILUI, MILUI HA-MILUI, etc. AD EIN KETZ.
      → Architecture : recursive-fillings = infinite-explication-cascade.
      → Pattern : milui-explicitation generates din ; recursion ad infinitum.
    type: interprétation_lurianique
