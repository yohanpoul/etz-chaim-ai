      → Mais il y a aussi BEHINAH ACHORAYIM (DOS) des orot.
      → Et la AUSSI les MEMES 2 BEHINOT : (a) TZURAT HA-OTIYOT, (b) MISPARAM.
      → Architecture : panim-achorayim duality preserves tzurah-mispar duality.
      → Pattern : 4-fold classification (panim+achorayim) × (tzurah+mispar).
