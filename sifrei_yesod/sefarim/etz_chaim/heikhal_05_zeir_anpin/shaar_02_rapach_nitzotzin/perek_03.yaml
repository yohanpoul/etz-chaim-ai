  - id: "PG-H5S18-012"
    nom: "Principe de BaN-as-MEARAT-HA-MAKHPELAH (Doubled-Havayah Z\"A+Nukva)"
    source_assertions: ["EC-H5S18-089", "EC-H5S18-090", "EC-H5S18-091"]
    formalisation: |
      ARCHITECTURE DE BaN-COMME-DOUBLE-HAVAYAH :
      SHEM BaN MILUI HEHIN (dans Malkhut) = 2 HAVAYOT YACHAD MAMASH.
      Nom = HAVAYAH KEFULAH (doublee).
      Symbole : MEARAT HA-MAKHPELAH (caverne du double — Genesis 23:9, 23:17).
      Decomposition mathematique :
        ו"ד du milui yod (יו"ד) = mispar y (10) = aleph peshut (4 letters peshutim).
        Reste = OTIYOT HAVAYAH KEFULAH MAMASH (literally doubled tetragrammaton).
      Interpretation cosmologique :
        HAVAYAH 1 = Z"A.
        HAVAYAH 2 = Nukva.
        Au ZIVVUG : Z"A NOTEN HAARAT HAVAYAH a Nukva → 2 havayot dans Nukva = BaN.
      Resolution counting :
        IQAR OTIYOT BaN = MIN-HA-Z"A (origine racine en Z"A).
        Donc PAS raui de compter BIFNEI ATZMAH dans Malkhut.
        Mad 7 (mispar BaN=52) PAS compté ; mad 5 (milui panim) PAS compté.
      Question OUVERTE (TZARIKH IYUN) :
        Mad 2 (achorayim peshutim י, יה, יהו, יהוה) pourquoi pas compté?
        "I'LO DE-MISTAPHINA HAVA AMINA" (si pas peur, j'aurais dit) — entre dans 10 letters MaH (perek 4).
        Mais perek 4 ne dit pas ainsi → TZARIKH IYUN.
      → Pattern fondamental : doubled-havayah-via-zivvug ; root-in-Z"A.
      → Architecture : Malkhut-letters trace-back-to-Z"A.
      → Implication : intellectual-honesty preserves open-question.
    applications_ia:
      - "partzufim/nukva.py + zeir_anpin.py + zivvug.py + shemot/transform.py : implement BaN doubled havayah"
      - "Pattern : Malkhut-letters trace-back-to-Z\"A"
      - "Architecture : zivvug-creates-doubled-havayah"
      - "Pattern : intellectual-honesty open-questions preserved"
      - "Diagnostic : verifier BaN structure decomposition coherent"
    questions_ouvertes:
      - "Pattern : MEARAT HA-MAKHPELAH symbol uniquement BaN ou autres havayot ?"
      - "Comment encoder doubled-havayah computationnellement ?"
      - "Pattern : mad-2 BaN compté en mad-5 MaH (perek 4 confirme ou refute) ?"
