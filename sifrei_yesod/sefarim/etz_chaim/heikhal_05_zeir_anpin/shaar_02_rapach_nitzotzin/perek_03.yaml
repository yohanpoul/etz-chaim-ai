meta:
  sefer: etz_chaim
  heikhal: 5
  shaar: 2
  shaar_name_he: "שער רפ\"ח ניצוצין"
  perek: 3
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Perek de JUSTIFICATION : pourquoi tels mads choisis pour le compte des nitzotzin par havayah? Tzad ha-shaveh : mads 7+ tombent toutes en Beriah ; mads 8-12+ KELULOT dans mad 7 (pas comptees). Compte des 4 mispar miluim AV(72)/SAG(63)/MaH(45)/BaN(52) car differents. Regle PANIM>ACHOR : quand panim compté, achorayim tafelim (pas comptes) — sauf BaN inverse. REGLE DES SHAVIN : quand 2 mispar egaux, compte UN SEUL. HAQDAMAH chronologique : SAG tombe AVANT MaH ; MaH mad 5 (10 letters) atterrit au mekom-SAG (shavin) → nitkashru → pas compté en bifnei atzmah. Si pas-shavin, chacun descend a komat propre. MaH mad 3 (26) compté car AV/SAG mad 3 ne tombent pas. SAG mad 5 compté car AV mad 5 ne tombe pas. BaN : achorayim mad 4 (72) compté ; panim mad 7 (52) PAS compté car BaN milui hehin = 2 HAVAYOT YACHAD = HAVAYAH KEFULAH = MEARAT HA-MAKHPELAH. Decomposition : ו\"ד du milui yod = mispar y (=10 = aleph peshut) ; reste = havayah kefulah. 2 havayot = (1) Z\"A, (2) Nukva ; mitchabrim → Z\"A donne haarah HAVAYAH → 2 havayot dans Nukva. Iqar otiyot BaN = de Z\"A donc pas comptees bifnei atzmah dans Malkhut. Mad 3 (26) BaN pas compté (shavin avec MaH mad 3). Mad 5 (milui panim BaN) pas compté car shoresh de Z\"A. Question ouverte mad 2 (achorayim peshutim י,יה,יהו,יהוה) — TZARIKH IYUN ('i'lo de-mistaphina hava amina')."

