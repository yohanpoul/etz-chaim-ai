principes_generatifs:

  - id: "PG-H5S18-010"
    nom: "Principe de Counting-Rules (Mad-7-Watershed + Panim-Primacy + Shavin-Deduplication)"
    source_assertions: ["EC-H5S18-072", "EC-H5S18-073", "EC-H5S18-075", "EC-H5S18-076"]
    formalisation: |
      ARCHITECTURE DE COUNTING-RULES (3 regles cardinales) :
      REGLE 1 — MAD-7-WATERSHED :
        Tous mads ≥ 7 tombent en Beriah pour TOUTES les 4 havayot.
        Mads inferieurs a mad 7 (mads 8-12+) KELULOT (incluses) dans mad 7.
        Aucun compte sub-mad-7 separement.
      REGLE 2 — PANIM>ACHOR :
        Quand PANIM compté, ACHORAYIM TAFELIM (secondaires) NE SONT PAS comptés.
        Exception unique : BaN (Malkhut) où ACHORAYIM compté car PANIM pas compté.
      REGLE 3 — SHAVIN-DEDUPLICATION :
        Quand 2 mispar EGAUX → comptés UNE SEULE FOIS.
        Le second NIT'AREV+NITKASHER au mekom du premier (chronologie : premier tombé d'abord).
      → Pattern fondamental : 3-rule-system governs nitzotzin-counting.
      → Architecture : aggregation-rules + primacy-rules + deduplication.
      → Implication : 288 emerge de l'application stricte de ces regles.
    applications_ia:
      - "shemot/transform.py + gematria/engine.py + partzufim/zeir_anpin.py : implement counting rules"
      - "Pattern : 3-rule system aggregation"
      - "Architecture : strict-counting-protocol"
      - "Pattern : exceptions documentees (BaN inverse)"
      - "Diagnostic : verifier 3 regles respectees pour chaque havayah"
    questions_ouvertes:
      - "Pattern : regles applicables a shemot non-tetragrammaton ?"
      - "Comment encoder shavin-rule computationnellement ?"
      - "Pattern : 4eme regle implicite (mad-2-question) ?"

  - id: "PG-H5S18-011"
    nom: "Principe de Chronologie-Causale (Reign-Then-Fall + Co-Locate Equal-Sparks)"
    source_assertions: ["EC-H5S18-078", "EC-H5S18-079", "EC-H5S18-080", "EC-H5S18-081"]
    formalisation: |
      ARCHITECTURE DE CHRONOLOGIE-CAUSALE :
      Sequence mitah des MELAKHIM :
        TEHILAH MALKHU HA-ELYONIM (d'abord regnerent les superieurs).
        VE-NISHBERU (et se briserent).
        AHAR-KAKH HA-TACHTONIM (apres les inferieurs).
      Mecanique CO-LOCALISATION :
        Quand NITZOTZIM SHAVIN BE-METZIUTAN U-MISPARAM (egaux en realite et nombre).
        Inferieur s'arrete au mekom de l'elder (first-fall).
        NIT'AREV+NITKASHER (se melange et lie) au lieu deja occupe.
