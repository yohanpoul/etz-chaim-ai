# Sha'ar: 2 — Sha'ar Rapach Nitzotzin (שער רפ"ח ניצוצין)
# Perek: 3 — Justification des choix mad par havayah. Regle SHAVIN
#            UN SEUL. Sequence chronologique fall. PANIM vs ACHOR.
#            BaN = 2 havayot (Z"A+Nukva) = MEARAT MAKHPELAH.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_03 :
#   - Bloc A : Question — pourquoi mad-selection differente par havayah?
#   - Bloc B : Tzad ha-shaveh — mad 7+ tomberent toutes en Beriah
#   - Bloc C : Mads inferieurs a mad 7 KELULOT — pas comptees (cf. EC-H5S18-062)
#   - Bloc D : Compte 4 mispar miluim AV/SAG/MaH/BaN car DIFFERENTS (72/63/45/52)
#   - Bloc E : Quand PANIM compté, ACHORAYIM PAS (tafelim — secondaires)
#   - Bloc F : Sauf BaN où inverse (achorayim compté pas panim)
#   - Bloc G : REGLE SHAVIN — quand 2 mispar EGAUX, compte UN SEUL
#   - Bloc H : Exemple — 10 letters SAG + 10 letters MaH ; tombent SAG d'abord
#   - Bloc I : HAQDAMAH — quand shavin be-metziut+mispar restent ENSEMBLE
#   - Bloc J : Sequence chronologique — SAG tombe AVANT MaH (tehilah elyonim, ahar kakh tachtonim)
#   - Bloc K : MaH mad 5 atterrit au mekom-SAG (shavin), nitkashru
#   - Bloc L : Si non-shavin → chacun descend a komat propre
#   - Bloc M : MaH mad 3 (mispar 4 letters peshutim 26) compté car PAS dans AV/SAG (leurs mad 3 ne tombent pas)
#   - Bloc N : SAG mad 5 (10 letters milui SAG) compté car NE TOMBE PAS dans AV
#   - Bloc O : SAG mad 7 (mispar=63) different d'AV mad 7 (72) et MaH mad 7 (45) → comptees
#   - Bloc P : BaN — POURQUOI achorayim mad 4 et PAS panim?
#   - Bloc Q : Reponse — dans BaN, PANIM NE SONT PAS comptés → ACHORAYIM le sont
#   - Bloc R : Pourquoi panim BaN pas comptés? — mad 3 BaN deja inclus en MaH mad 3 (shavin)
#   - Bloc S : Mad 7 (mispar BaN=52) pas compté → raison cosmologique : BaN MILUI HEHIN = 2 HAVAYOT
#   - Bloc T : MEARAT HA-MAKHPELAH — BaN milui hehin = HAVAYAH KEFULAH (doublee)
#   - Bloc U : ו"ד du milui yod = mispar y (10 = aleph peshut) ; reste = havayah kefulah
#   - Bloc V : 2 havayot interpretation : (1) Z"A, (2) Nukva ; mitchabrim → Z"A donne haarah → 2 havayot dans Nukva
#   - Bloc W : Iqar otiyot BaN = de Z"A → pas BIFNEI ATZMAH dans Malkhut
#   - Bloc X : Donc mad 7 (mispar BaN=52) PAS compté ; mad 3 (mispar 26) PAS compté
#   - Bloc Y : Question ouverte mad 2 (achorayim peshutim) — TZARIKH IYUN ; "i'lo de-mistaphina hava amina"
#   - Bloc Z : Mad 5 (milui panim BaN) PAS compté car shoresh milui BaN de Z"A
#
# Source Sefaria : Sefer_Etz_Chaim.18.3 (1 section, 4518 chars)
