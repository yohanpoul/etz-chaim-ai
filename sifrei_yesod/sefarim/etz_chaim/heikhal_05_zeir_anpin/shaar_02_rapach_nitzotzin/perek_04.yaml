# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 5 — Heikhal Ze'eir Anpin (היכל זעיר אנפין)
# Sha'ar: 2 — Sha'ar Rapach Nitzotzin (שער רפ"ח ניצוצין)
# Perek: 4 — NHY = 3 SHEMOT י"ה (pas havayot gemurot). Nitzotzin
#            NHY MONTENT avec MaH-Tiferet (anchor mispar). 3×י"ה
#            milui alafin = 15 letters > 10 letters MaH montes.
#            KELIM NHY restent BILTI NITZOTZIN → yenikat klipot.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_04 :
#   - Bloc A : Question — RaPaCh = CHG+TIFERET+MALKHUT ; NHY descendent aussi mais pas comptés. Pourquoi?
#   - Bloc B : N+H = 2 PALGEI DE-GUFA (2 moities corps) ; 1 havayah entre 2 ; chaque = 1/2 havayah = י"ה
#   - Bloc C : Citation "ki yad al kes Yah" (Shemot 17:16) ; ו"ה pas shem en soi
#   - Bloc D : Yesod = י"ה (haarah kelulah orot elyonim, pas behinah bifnei atzmah)
#   - Bloc E : 2 YESODOT AbA-IMA habillent dans Z"A ; chacun 5 CHASADIM + 5 GEVUROT
#   - Bloc F : YESOD-IMMA 5 chasadim → CHG-TIFERET-NH d'Z"A
#   - Bloc G : YESOD-IMMA 5 gevurot + YESOD-ABA 5+5 → YESOD-Z"A
#   - Bloc H : YESOD-ABA termine au YESOD-Z"A ; 15 chasadim+gevurot dans YESOD-Z"A = mispar י"ה (15)
#   - Bloc I : Reponse 3 — 5 chasadim Yesod-Imma 3 behinot dans Z"A : (1) Daat shoresh, (2) Hitpashtut Chesed-Hod, (3) Reagregation Yesod = 15 chasadim = י"ה
#   - Bloc J : NHY = PAS HAVAYOT GEMUROT, mais 3 shemot י"ה (3 noms 2 letters)
#   - Bloc K : Toutes 12 madregot existent AUSSI dans י"ה ; analogie MaH
#   - Bloc L : Restent en atzilut : 2 mad premieres + achorayim mad 2 (י, י"ה)
#   - Bloc M : Mad 3+ descendent en Beriah (comme MaH)
#   - Bloc N : POURQUOI pas comptés? — nitzotzin NHY MITCHABRIM avec nitzotzin TIFERET (=MaH)
#   - Bloc O : Achorayim NHY : pas besoin justification (panim>achor regle)
#   - Bloc P : Panim NHY = 3×י"ה = 45 = MaH ; donc collent nitzotzin MaH
#   - Bloc Q : MILUI 3 shemot י"ה = ALAFIN (NHY=Z"A=milui alafin)
#   - Bloc R : י"ה milui alafin = יו"ד ה"א = 26 ; lien avec MaH mad 3 (mispar 26)
#   - Bloc S : Mecanique — 10 letters MaH milui MONTERENT avec 10 letters SAG ; CRAINTE mispar MaH (mad 7) monte aussi
#   - Bloc T : Si mispar monte = KELI TIFERET (MaH) reste GARU'A RIKAN BILTI NITZOTZIN — irreversible
#   - Bloc U : SOLUTION — nitzotzin NHY MONTENT vers TIFERET ; LIENT mispar MaH-mad-7 (anchor-down)
#   - Bloc V : Pas-shavin acceptable ; but est creation lien (pas exact match)
#   - Bloc W : Question AV — pourquoi pas crainte? Reponse : AV mad 5 RESTE atzilut ; seul mispar AV descendu ; pas risque montee
#   - Bloc X : Question MaH-shoresh-monte? : 3×י"ה milui (15 letters) sert comme TEMURAH pour 10 letters MaH ; 15>10 acceptable
#   - Bloc Y : Donc nitzotzin NHY MONTENT (pas descendent) ; pas comptés en bifnei atzmah
#   - Bloc Z : KELIM NHY RESTENT BILTI NITZOTZIN ATZMAN ; YENIKAT KELIPOT sourcée d'eux
#   - Bloc AA : Question 1 part 2 — pourquoi 3×י"ה compté en haut, mais UNE-FOIS 26 ici? Reponse : 3-fois י"ה se LIENT seulement ensemble ; כ"ו lie individuellement
#   - Bloc BB : Question 2 part 2 — SAG-mispar peut monter a shoresh ; pourquoi pas crainte? Reponse : MaH-mispar monte → KELI MaH (TIFERET) bilti ohr=probleme ; SAG-mispar monte = KELI SAG dans son KLI propre = pas-probleme
#
# Source Sefaria : Sefer_Etz_Chaim.18.4 (2 sections, 5210 chars)
# IDs : EC-H5S18-092 → EC-H5S18-115

