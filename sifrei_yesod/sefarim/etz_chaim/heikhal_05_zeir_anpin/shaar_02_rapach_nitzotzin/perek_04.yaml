  version: 1
  strates: ["base"]
  note: "Perek dedie a NHY (Netzach-Hod-Yesod) : pourquoi nitzotzin NHY pas comptés en bifnei atzmah dans 288 RaPaCh? NHY = PAS HAVAYOT GEMUROT mais 3 SHEMOT י\"ה (yod-he 2 letters). N+H = 2 PALGEI DE-GUFA (Shemot 17:16 'ki yad al kes Yah') ; chaque moitie = 1/2 havayah = י\"ה. Yesod = י\"ה (haarah kelulah). Confirmation : 2 YESODOT d'AbA-IMA habillent dans Z\"A ; 5+5+5 chasadim/gevurot = 15 = mispar י\"ה. Aussi 5 chasadim Yesod-Imma → 3 behinot dans Z\"A (Daat shoresh, hitpashtut Chesed-Hod, reagregation Yesod) = 15 = י\"ה. Toutes 12 madregot existent dans י\"ה ; analogie MaH. Restent atzilut : mad 1-2 + achorayim mad 2. Mad 3+ descendent. POURQUOI pas comptés en bifnei atzmah? Nitzotzin NHY MITCHABRIM avec nitzotzin TIFERET (=MaH). Panim NHY 3×י\"ה=45=MaH (donc collent MaH). MILUI 3 shemot י\"ה = ALAFIN (NHY=Z\"A=milui alafin) ; י\"ה milui alafin = יו\"ד ה\"א = 26 ; lien avec MaH mad 3 (mispar 26). Mecanique COSMIQUE : 10 letters MaH milui MONTERENT avec 10 letters SAG ; CRAINTE = mispar MaH (mad 7=45) monte aussi → KELI TIFERET-MaH reste BILTI NITZOTZIN irreversible. SOLUTION : nitzotzin NHY MONTENT vers TIFERET ; ANCHOR mispar MaH-mad-7 down. Pas-shavin acceptable. Question AV pas crainte : AV mad 5 reste atzilut. Question MaH-shoresh-monte : 3×י\"ה milui (15 letters) = TEMURAH pour 10 letters MaH ; 15>10 ok. Conclusion : nitzotzin NHY MONTENT (pas descendent) ; KELIM NHY restent BILTI NITZOTZIN ATZMAN → YENIKAT KELIPOT (succion klipot) sourcée d'eux. Part 2 questions/reponses : (1) 3-fois yh compté ensemble ; KW (26) individuellement car y a bichinah pour collage. (2) SAG-mispar peut monter mais pas-probleme car SAG-keli reste dans son kli."

