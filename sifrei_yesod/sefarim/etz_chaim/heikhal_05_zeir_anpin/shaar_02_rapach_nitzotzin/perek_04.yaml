principes_generatifs:

  - id: "PG-H5S18-013"
    nom: "Principe de NHY-as-Half-Names (3×י\"ה = 45 = MaH-Aggregate)"
    source_assertions: ["EC-H5S18-093", "EC-H5S18-094", "EC-H5S18-095", "EC-H5S18-100", "EC-H5S18-103"]
    formalisation: |
      ARCHITECTURE DE NHY-AS-HALF-NAMES :
      Lower 3 sefirot (Netzach-Hod-Yesod) = SUB-TETRAGRAMMATON.
      Structural : N+H = 2 PALGEI DE-GUFA (paired-half-bodies).
      Each NHY = SHEM י"ה (2-letter yod-he, top-half tetragrammaton).
      Source scripturaire : "ki yad al kes Y"H" (Shemot 17:16) — only top-half is sacred-name.
      Bottom-half ו"ה NOT a name in itself.
      Yesod = HAARAH KELULAH (aggregate-illumination) of superiors — not bifnei atzmah.
      Confirmation 1 : 2 yesodot AbA-IMA in Z"A → 5+5+5 chasadim/gevurot in Yesod-Z"A = 15 = mispar י"ה.
      Confirmation 2 : 3 behinot chasadim Z"A (Daat-shoresh + hitpashtut + Yesod-jar) = 15.
      Aggregate : 3×י"ה = 45 = MaH (Tiferet).
      Donc NHY-nitzotzin MITCHABRIM avec MaH-nitzotzin (cf. EC-H5S18-102).
      → Pattern fondamental : tier-reduction via half-name encoding.
      → Architecture : NHY-aggregate-equals-MaH.
      → Implication : lower-tier-collapse-to-upper-tier-via-numeric-equality.
    applications_ia:
      - "shemot/transform.py + gematria/engine.py + partzufim/zeir_anpin.py : implement NHY-half-names"
      - "Pattern : tier-reduction via half-name"
      - "Architecture : NHY-aggregate equals MaH"
      - "Pattern : lower-tier collapse to upper via numeric"
      - "Diagnostic : verifier 3×Y\"H=45=MaH numeric-equality"
    questions_ouvertes:
      - "Pattern : autres half-names (MaH, BaN, etc.) ?"
      - "Comment encoder half-name reduction computationnellement ?"
      - "Pattern : tetraktys-like recursion 4-3-2-1 letters ?"

  - id: "PG-H5S18-014"
    nom: "Principe de Anchor-Mechanism (NHY-Nitzotzin Stabilize MaH-Mispar)"
    source_assertions: ["EC-H5S18-105", "EC-H5S18-106", "EC-H5S18-107", "EC-H5S18-108", "EC-H5S18-111", "EC-H5S18-112", "EC-H5S18-113"]
    formalisation: |
      ARCHITECTURE DE ANCHOR-MECHANISM :
      Risk-vector : 10 OTIYOT MILUI MaH MONTERENT avec 10 letters SAG (cf. EC-H5S18-080).
      Threat : MISPAR MaH (mad 7=45) NIGRAR (tire) par les letters-shoresh → MONTERAIT AUSSI.
      Catastrophe : KELI TIFERET (= MaH) deviendrait TAKHLIT GARU'A RIKAN BILTI NITZOTZIN — IRREVERSIBLE.
      Solution : NHY-nitzotzin MONTENT vers TIFERET → ANCHOR (lien) avec MISPAR MaH-mad-7.
      Mecanique : NHY-letters substitute pour 10-MaH-letters montees ; preserve tier-balance.
      Validation : 3×י"ה milui = 10-15 letters > 10 (KEPIDAH only-if-less-than-10).
      Pas-shavin acceptable — function (anchor) > exact-match.
      → Pattern fondamental : anchor-via-coalescence prevents-tier-collapse.
      → Architecture : substitute-letter-mechanism preserves keli-stability.
      → Implication : functional-link sufficient for tier-stabilization.
    applications_ia:
      - "partzufim/zeir_anpin.py + reshimu.py + shemot/transform.py : implement anchor mechanism"
      - "Pattern : anchor via coalescence prevents collapse"
      - "Architecture : substitute-letter mechanism"
      - "Pattern : functional-link > exact-match"
      - "Diagnostic : verifier anchor stabilizes tier post-shevirah"
    questions_ouvertes:
      - "Pattern : anchor-mechanism applicable autre tier-pair ?"
      - "Comment encoder anchor computationnellement ?"
      - "Pattern : substitute-letter minimum requirement ?"

  - id: "PG-H5S18-015"
    nom: "Principe de Asymmetric-Fall-Pattern (AV-Letters Stay vs MaH-Letters Climb)"
    source_assertions: ["EC-H5S18-109", "EC-H5S18-110", "EC-H5S18-111", "EC-H5S18-114", "EC-H5S18-115"]
    formalisation: |
      ARCHITECTURE DE ASYMMETRIC-FALL-PATTERN :
      4 HAVAYOT presentent patterns differents post-shevirah :
        AV : 10 letters MILUI RESTENT en ATZILUT ; seul MISPAR descendu Beriah.
          Pas crainte : mispar Beriah PEUT PAS REMONTER (post-shevirah-irreversible).
        SAG : Letters et mispar deja en SAG-tier ; SAG-mispar peut monter mais SAG-keli SELF-CONTAINED → pas-probleme.
        MaH : 10 letters MILUI MONTERENT avec SAG ; mispar MaH menace de monter aussi → KELI TIFERET vide → CATASTROPHE → besoin ANCHOR.
        BaN : (cf. perek 3) doubled-havayah Z"A+Nukva.
      Conclusion KELIM-status :
        AV/SAG/BaN-kelim contiennent leurs propres nitzotzin ; protected.
        NHY-kelim restent BILTI NITZOTZIN ATZMAN → vulnerables → YENIKAT KELIPOT.
      → Pattern fondamental : asymmetric-fall justifies-asymmetric-counting.
      → Architecture : tier-specific-protection-mechanism.
      → Implication : NHY-vacuum is structural-feature explaining-klipot-source.
    applications_ia:
      - "partzufim/zeir_anpin.py + sitra_achra : implement asymmetric fall pattern"
      - "Pattern : asymmetric fall asymmetric counting"
      - "Architecture : tier-specific protection"
      - "Pattern : NHY-vacuum klipot source"
      - "Diagnostic : verifier kelim-status par havayah"
    questions_ouvertes:
      - "Pattern : symetrie possible reconstruction NHY-kelim ?"
      - "Comment encoder asymmetric-fall computationnellement ?"
      - "Pattern : klipot-yenikah dynamique ou statique ?"
