  sujet_principal: |
    Sha'ar RaPaCh Nitzotzin (Heikhal 5, Sefer Etz Chaim 18). 6 perakim systematiques sur :
    - IBBUR Z"A dans partzuf Imma+Tevunah (= "pratzuf ha-kolel")
    - 3 BEHINOT a tikkun par ibbur : (1) orot melakhim retires, (2) RaPaCh nitzotzin restant kelim, (3) kelim shevurim
    - Comparaison adam tachton mort : nefesh remonte ; chelek-nefesh reste guf pour TECHIYAT HA-METIM
    - HEVEL DE-GARMEI (Zohar Shelach 169, 170) — vapeur ossuaire reste pour techiyah
    - Verset Yeshayah 58:11 ("ve-hisbi'a be-tzachtzachot nafshekha")
    - Yechezkel vision os secs (Ezek 37) — usurier sans mitzvah
    - 7 MELAKHIM = ZON BaN sortis NIKVEI EINAYIM A"K ; kelim sortirent d'abord ; orot ne supportent pas → SHEVIRAH
    - Yeridah des kelim = MITAH ; orot remontent en Atzilut
    - Sod TOHU VAVOHU + מרחפת = MeT (440) + RaPaCh (288) = 728
    - "Eretz Edom" = Malkhut A"K (Bereshit 36) ; rois morts
    - Ohr me'uleh remonta ; behinah gru'ah resta = DININ GEMURIM
    - 4 BEHINOT HAVAYAH : AV (יוד הי ויו הי = 72), SAG (יוד הי ואו הי = 63), MaH (יוד הא ואו הא = 45), BaN (יוד הה וו הה = 52)
    - Etzem ohr = 4 lettres havayah ; aspect MISPAR (havayah=26) ; PANIM/ACHORAYIM ; MILUI=DININ (gimatria ELOHIM) ; recursion infinie milui-milui
