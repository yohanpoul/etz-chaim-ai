    source_he: "אלא שמה שירד מהוי\"ה דע\"ב היו הניצוצין הגרועים מכולם אשר בשם ע\"ב וכן הניצוצין שירדו משם ס\"ג הם הגרועות מכולם אשר בשם ס\"ג"
