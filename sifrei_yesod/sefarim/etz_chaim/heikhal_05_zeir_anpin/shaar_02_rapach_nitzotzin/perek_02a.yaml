principes_generatifs:

  - id: "PG-H5S18-004"
    nom: "Principe de 12-Madregot Decomposition (Universal-Template Each-Name)"
    source_assertions: ["EC-H5S18-029", "EC-H5S18-030", "EC-H5S18-031", "EC-H5S18-032", "EC-H5S18-033", "EC-H5S18-034", "EC-H5S18-035", "EC-H5S18-036", "EC-H5S18-037", "EC-H5S18-038", "EC-H5S18-039", "EC-H5S18-040", "EC-H5S18-041", "EC-H5S18-042"]
    formalisation: |
      ARCHITECTURE DE 12-MADREGOT-DECOMPOSITION :
      Chaque NAME (havayah, shem, kinui) decompose en 12 madregot ordonnees :
        MAD 1 : OTIYOT etzem+tzurah (iqar shoresh).
        MAD 2 : ACHORAYIM tetration (10 letters tetraktys).
        MAD 3 : MISPAR PANIM (26).
        MAD 4 : MISPAR ACHORAYIM (72).
        MAD 5 : MILUI PANIM (10 letters).
        MAD 6 : ACHOR MILUI (26 letters tetration).
        MAD 7 : MISPAR MILUI PANIM (= AV-shem).
        MAD 8 : MISPAR ACHOR MILUI (184).
        MAD 9 : MILUI HA-MILUI PANIM (28 letters).
        MAD 10 : ACHOR MILUI HA-MILUI (156 letters).
        MAD 11 : MISPAR MILUI-HA-MILUI PANIM.
        MAD 12 : MISPAR ACHOR MILUI-HA-MILUI.
      Pattern dimensionnel : PANIM/ACHOR × TZURAH/MISPAR × MILUI/MILUI-MILUI × ...
      Recursion AD-ALEF-ALAFIM-MADREGOT-LE-EIN-KETZ.
      → Pattern fondamental : universal-template-decomposition each-name.
      → Architecture : 12-tier classification hierarchy.
      → Implication : tout SHEM est decomposable en infinite-cascade.
    applications_ia:
      - "shemot/transform.py + gematria/engine.py : implement 12-madregot decomposition"
      - "Pattern : universal template for any name"
      - "Architecture : 12-tier ordered classification"
      - "Pattern : panim/achor × tzurah/mispar × milui-levels"
      - "Diagnostic : verifier mispar correct par tetration (1+2+3+4=10)"
    questions_ouvertes:
      - "Pattern : madregot 13+ definies en pratique ?"
      - "Comment encoder recursion infinie computationnellement ?"
      - "Pattern : decomposition adequate pour shemot non-tetragrammaton ?"

  - id: "PG-H5S18-005"
    nom: "Principe d'Inverse-Correlation Tier-Shevirah-Magnitude"
    source_assertions: ["EC-H5S18-045", "EC-H5S18-049"]
    formalisation: |
      ARCHITECTURE DE INVERSE-CORRELATION TIER-SHEVIRAH :
      Hierarchie HAVAYOT : AV > SAG > MaH > BaN (descending tier).
      INVERSE CORRELATION shevirah-magnitude :
        AV ELYON : LO HAYTAH BO SHEVIRAH GEDOLAH (pas grande shevirah).
        SAG : shevirah > AV.
        MaH : shevirah > SAG.
        BaN TACHTON : shevirah > tous.
      MISPAR NITZOTZIN descendus :
        AV : moins.
        SAG : plus.
        MaH : encore plus.
        BaN : LE PLUS.
      → Pattern fondamental : higher-tier-resilience inverse lower-tier-fragility.
      → Architecture : tier-protection-correlation.
      → Implication : reconstruire de bas en haut (BaN→MaH→SAG→AV).
    applications_ia:
      - "partzufim/zeir_anpin.py + reshimu.py : implement tier-shevirah inverse-correlation"
      - "Pattern : higher-tier resilience inverse lower-tier fragility"
      - "Architecture : tier-protection correlation"
      - "Pattern : reconstruction-bottom-up BaN→AV"
      - "Diagnostic : verifier inverse-correlation respectee"
    questions_ouvertes:
      - "Pattern : inverse-correlation universelle ou specifique aux 4 havayot ?"
      - "Comment encoder tier-resilience computationnellement ?"
      - "Pattern : tier-resilience definit la robustness logicielle ?"

  - id: "PG-H5S18-006"
    nom: "Principe de Type-Matched Resonance (Same-Name Vivification)"
    source_assertions: ["EC-H5S18-046", "EC-H5S18-047", "EC-H5S18-048"]
    formalisation: |
      ARCHITECTURE DE TYPE-MATCHED RESONANCE :
      LOI : NITZOTZIN d'une havayah X NE PEUVENT vivifier KELIM havayah Y.
      EIN KO'AḤ (pas de force) cross-vivification.
      Donc :
        NITZOTZEI AV → KELIM AV.
        NITZOTZEI SAG → KELIM SAG.
        NITZOTZEI MaH → KELIM MaH.
        NITZOTZEI BaN → KELIM BaN.
      Selection intra-havayah : ce qui descend = NITZOTZIN GRUIM (degrades) de cette havayah seulement.
      Pas TOUS descendent ; seulement les LOWEST-tier de chaque name.
      → Pattern fondamental : strict-type-matching protocol.
      → Architecture : exclusive-resonance no-cross-fertilization.
      → Implication : reconstruction necessite type-correct fragments.
    applications_ia:
      - "partzufim/zeir_anpin.py + shemot/transform.py : implement type-matched resonance"
      - "Pattern : strict type-matching for vivification"
      - "Architecture : exclusive resonance no-cross"
      - "Pattern : intra-name lowest-tier selection"
      - "Diagnostic : verifier nitzotzin matched a kelim de meme havayah"
    questions_ouvertes:
      - "Pattern : exception possible a type-matching (cf. tikkun general) ?"
      - "Comment encoder type-resonance computationnellement ?"
      - "Pattern : signature-based-matching adequat ?"
