  - id: "EC-H5S18-049"
    source_he: "גם צריך שתדע כי מספר ניצוצין שירדו מכל הוי\"ה מאלו ד' אינם שוין לפי ששם ע\"ב עליון שבכולם לא היתה בו כ\"כ שבירה גדולה כמו בס\"ג וכיוצא בזה בשאר ובודאי כי משם ב\"ן ירדו יותר ניצוצין מכל השאר וממ\"ה פחות מב\"ן ומס\"ג פחות ממ\"ה ומע\"ב פחות מס\"ג"
    source_ref: "Heikhal 5, Sha'ar 2:2 §17"
    assertion: |
      MISPAR NITZOTZIN — non-uniform par havayah :
      → Mispar nitzotzin descendus de chaque havayah des 4 NE SONT PAS EGAUX.
      → Raison : AV ELYON SHE-BA-KULAM (le plus eleve) = LO HAYTAH BO SHEVIRAH GEDOLAH KOL-KAKH (pas si grande shevirah).
      → Hierarchie quantitative : BaN > MaH > SAG > AV en nombre de nitzotzin descendus.
