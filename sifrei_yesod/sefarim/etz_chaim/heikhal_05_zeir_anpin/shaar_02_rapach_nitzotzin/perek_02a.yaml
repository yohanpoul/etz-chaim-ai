# Sha'ar: 2 — Sha'ar Rapach Nitzotzin (שער רפ"ח ניצוצין)
# Perek: 2a — 12 MADREGOT orot detaillees (panim/achor × tzurah/mispar
#             × milui levels). Recursion ad-ein-ketz. Hierarchie
#             AV>SAG>MaH>BaN. Shevirah-residue dans propres kelim.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_02a :
#   - Bloc A : Intro sader madregot zeh le-maalah mi-zeh (cf. EC-H5S18-024)
#   - Bloc B : MADREGAH 1 = OTIYOT HAVAYAH BE-ETZMAN UV-TZURATAN (iqar+shoresh)
#   - Bloc C : MADREGAH 2 = ACHORAYIM tetration (י, י"ה, יה"ו, יהו"ה = 10 lettres)
#   - Bloc D : MADREGAH 3 = MISPAR PANIM (4 lettres havayah = 26)
#   - Bloc E : MADREGAH 4 = MISPAR ACHORAYIM (10 lettres = 72)
#   - Bloc F : MADREGAH 5 = MILUI PANIM (יוד הי ויו הי = 10 lettres miluyim)
#   - Bloc G : MADREGAH 6 = ACHOR du milui (26 lettres tetration milui)
#   - Bloc H : MADREGAH 7 = MISPAR 10 lettres milui = 72 (= AV)
#   - Bloc I : MADREGAH 8 = MISPAR 26 lettres achor du milui = 184 (קפ"ד)
#   - Bloc J : MADREGAH 9 = MILUI HA-MILUI PANIM (28 lettres יוד ויו דלת. הי יוד...)
#   - Bloc K : MADREGAH 10 = ACHORAYIM milui ha-milui = 156 lettres (קנ"ו)
#   - Bloc L : MADREGAH 11 = MISPAR 28 lettres milui ha-milui panim
#   - Bloc M : MADREGAH 12 = MISPAR 156 lettres achor milui ha-milui
#   - Bloc N : Recursion ALEF ALAFIM MADREGOT LE-EIN KETZ (sans fin)
#   - Bloc O : Meme schema pour SAG, MaH, BaN et tous shemot/kinuyim
#   - Bloc P : KOL MADREGAH HA-KODEMET MEULAH MI-CHAVERTAH (chaque mad. plus haute > suivante)
#   - Bloc Q : Hierarchie HAVAYOT : AV > SAG > MaH > BaN
#   - Bloc R : Shevirah : nitzotzin GRUIM descendent dans propres kelim ; nitzotzin havayah X NE PEUVENT pas revivre kelim havayah Y
#   - Bloc S : Mispar nitzotzin pas egal pour chaque havayah ; AV moins shevirah ; BaN le plus
#
