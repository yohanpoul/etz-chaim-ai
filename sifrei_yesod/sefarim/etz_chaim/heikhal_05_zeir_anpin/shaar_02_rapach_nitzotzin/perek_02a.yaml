  - id: "EC-H5S18-045"
    source_he: "ודע כי לא כל הבחי' שוין כי הנה שם ע\"ב גדול במעלה מכולם ותחתיו במדרגה שם ס\"ג ותחתיו במדרגה שם מ\"ה ותחתיו במדרגה שם ב\"ן"
