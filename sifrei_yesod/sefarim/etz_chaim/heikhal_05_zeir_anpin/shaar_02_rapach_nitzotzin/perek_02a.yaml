  - id: "EC-H5S18-046"
    source_he: "ופשוט הוא כי כל הוי\"ה מאלו הד' יורדין מהם בחי' נצוצין להחיות הכלים וניצוצי הויות דע\"ב ירדו בכלים דע\"ב וניצוצי דס\"ג ירדו בכלים דס\"ג כו'"
