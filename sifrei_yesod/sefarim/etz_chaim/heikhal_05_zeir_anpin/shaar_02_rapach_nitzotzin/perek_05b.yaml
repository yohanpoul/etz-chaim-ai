  - id: "EC-H5S18-148"
    source_he: "ואמנם ראה המאציל העליון שאין מציאות לברר ז\"א תוך עיבור רק עד הנצח כי בכל חדש וחדש הוא מתברר ספי' א' ממנו ומן הכתר עד נצח הם ח' ספי' כשתמנה הדעת עמהם"
    source_ref: "Heikhal 5, Sha'ar 2:5 §2"
    assertion: |
      RAA HA-MA'ATZIL — limites du BERUR ibbur :
      → MA'ATZIL ELYON VIT (vit) : EIN METZIUT LEVARER Z"A be-tokh ibbur RAK AD HA-NETZACH (jusqu'au Netzach).
      → Chaque CHODESH BERUR = 1 SEFIRAH.
      → MIN KETER AD NETZACH = 8 SEFIROT (KETER, CHOKHMAH, BINA, DAAT, CHESED, GEVURAH, TIFERET, NETZACH).
