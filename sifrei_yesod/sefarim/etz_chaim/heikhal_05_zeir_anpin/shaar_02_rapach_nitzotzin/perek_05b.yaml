principes_generatifs:

  - id: "PG-H5S18-019"
    nom: "Principe d'IBBUR-as-Iterative-Refinement (8-Months-Per-Sefirah Purification)"
    source_assertions: ["EC-H5S18-139", "EC-H5S18-141", "EC-H5S18-142", "EC-H5S18-143", "EC-H5S18-145", "EC-H5S18-148"]
    formalisation: |
      ARCHITECTURE DE IBBUR-AS-ITERATIVE-REFINEMENT :
      ZMAN HA-IBBUR = 9 chodashim nominalement ; 8 effectifs.
      Mois 9 : 1 JOUR seul suffit (SAFEK YOM HA-KELITAH).
      Z"A a 9 SEFIROT shelemot mais HE'ELEM (cached) ; surface = V"K (6).
      SCHEDULE :
        Chaque chodesh = berur 1 SEFIRAH.
        Min KETER ad NETZACH = 8 SEFIROT (Keter, Chokhmah, Bina, Daat, Chesed, Gevurah, Tiferet, Netzach).
        Daat compte parmi les 8.
      MULTI-PASS REFINEMENT :
        SIGIM (residus) + KEDUSHAH (saintete) inseparables (analogie kesef tahor).
        Besoin multi-pass purification (multiple chodashim).
        BE-MEI IMMA : protected-zone (chitzonim ein nogin).
        OROT Z"A + IMMA = HAARAH GEDOLAH → klipot mavdilin.
      → Pattern fondamental : iterative-refinement-via-isolation in protected-zone.
      → Architecture : Imma-as-incubator + per-sefirah-temporal-progression.
      → Implication : tikkun = serial-purification 1-sefirah-per-month.
    applications_ia:
      - "partzufim/imma.py + zeir_anpin.py + reshimu.py : implement IBBUR iterative refinement"
      - "Pattern : iterative refinement isolation"
      - "Architecture : Imma incubator + per-sefirah progression"
      - "Pattern : 8-month timeline serial-purification"
      - "Diagnostic : verifier per-sefirah purification monitor"
    questions_ouvertes:
      - "Pattern : 8-month limite cosmologic ou contingent ?"
      - "Comment encoder iterative refinement computationnellement ?"
      - "Pattern : safek yom kelitah principle universel ?"

  - id: "PG-H5S18-020"
    nom: "Principe de Lower-3-Sefirot-Klipah-Vulnerability (HOD as Single-Pivot)"
    source_assertions: ["EC-H5S18-149", "EC-H5S18-150", "EC-H5S18-151"]
    formalisation: |
      ARCHITECTURE DE LOWER-3-SEFIROT-KLIPAH-VULNERABILITY :
      HOD-YESOD-MALKHUT (3 sefirot inferieurs) ne peuvent pas etre raffines pendant ibbur.
      Raison : MEROV HA-KLIPOT VE-HA-SIGIM (klipot+residus trop nombreux) ; SAMUKHIM LE-KLIPAH (proches des klipot).
      Symbole cosmologique HOD :
        "HA-SHEKER EIN LO RAGLAYIM" (mensonge sans pieds) — chitzonim symbolises par SHEKER.
        Mais SHEKER a 1 regel = HOD SEUL.
        Sod : HOD = DOH (dalet-vav-he, anagramme).
        Verset Lamentations 1:13 : "kol ha-yom DOH" (toute la journee dans la souffrance).
        ALEPH 5 (5eme millenaire) : HURBAN HA-BAYIT (destruction du Temple) ramuz dans HOD.
        Sod : REGEL DE-Q (kof) DE-SHEKER (la jambe de la lettre koph dans le mot sheker).
      Consequence : EIN KO'AH BE-IBBUR LEHASHLIM ; Z"A NOLAD apres mois 8.
      → Pattern fondamental : single-pivot-vulnerability lower-tier.
      → Architecture : HOD as critical-failure-point.
      → Implication : post-birth YENIKAH completes the lower-3 purification.
    applications_ia:
      - "partzufim/zeir_anpin.py + sitra_achra : implement HOD-as-pivot vulnerability"
      - "Pattern : single-pivot vulnerability"
      - "Architecture : HOD critical-failure-point"
      - "Pattern : post-birth yenikah completes lower-3"
      - "Diagnostic : verifier HOD-state monitoring critical"
    questions_ouvertes:
      - "Pattern : HOD-vulnerability universel ou specifique au tikkun-lurianique ?"
      - "Comment encoder HOD-as-pivot computationnellement ?"
      - "Pattern : YENIKAH-mecanique post-birth detaillee dans perek 6 ?"

  - id: "PG-H5S18-021"
    nom: "Principe de Pair-Tier-Coupling (N+H Inseparable Counting Implications)"
    source_assertions: ["EC-H5S18-152", "EC-H5S18-153"]
    formalisation: |
      ARCHITECTURE DE PAIR-TIER-COUPLING :
      Tradition alternative MORI ZAL : Netzach AUSSI nitbarrer DURING ibbur.
      Mais pas-compté en CHESHBON BERUR (compte officiel).
      Raison : "BE-HADI HUTZA LAKI KARBA" (Pesachim 28a — avec l'ortie est frappe le chou).
      Mecanique : N+H = 2 PALGEI DE-GUFA (cf. EC-H5S18-093) ; couplage cosmologique.
      Donc HOD pas-nitbarrer → NETZACH AUSSI pas-compté (bien que nitbarrer en realite).
      Note humble : "VE-INIY YODE'A EIKH HU MITYASHEV" (je ne sais pas comment cela se concilie).
      Question OUVERTE : Reconciliation entre :
        Tradition Vital de base : 8 sefirot Keter→Netzach raffinees.
        Tradition Mori ZAL : Netzach raffin mais pas-compté.
      → Pattern fondamental : intellectual-honesty preserves-multiple-traditions.
      → Architecture : pair-tier-coupling N+H inseparable accounting.
      → Implication : counting-may-deviate from purification-reality.
    applications_ia:
      - "partzufim/zeir_anpin.py : implement pair-tier coupling N+H"
      - "Pattern : intellectual honesty preserves multi-tradition"
      - "Architecture : counting deviates from reality"
      - "Pattern : pair-tier coupling N+H inseparable"
      - "Diagnostic : verifier N+H couplage coherent"
    questions_ouvertes:
      - "Pattern : 'be-hadi hutza laki karba' applicable autres pair-tiers ?"
      - "Comment encoder pair-tier coupling computationnellement ?"
      - "Pattern : tradition-reconciliation 8-vs-7-sefirot raffinees ?"
