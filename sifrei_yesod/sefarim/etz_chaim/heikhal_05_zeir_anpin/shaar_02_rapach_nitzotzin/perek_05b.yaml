  - id: "EC-H5S18-142"
    source_he: "והענין כי כבר ביארנו ענין ברור זו\"ן מה הוא כי הכל נמשך מסוד ז' מלכים קדמאין שמתו ונתבטלו והיה בהם סיגים כנודע ואותן הסיגין מעורבים הם עם כל הקדושה שבהם"
