      → "VE-SHADI LEHU BE-PUMA DE-IMMA" (et jette dans la bouche d'Imma).
      → Architecture : Aba-as-discriminator + Imma-as-incubator.
      → Pattern : intellect-as-sorting-mechanism.
    type: interprétation_lurianique
    concepts:
