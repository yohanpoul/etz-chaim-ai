      → Pour LEHOTZI MI'UT NITZOTZOT HA-KESEF NISHARIM ME'ORAVIM (extraire la fraction d'etincelles d'argent restees).
      → Architecture : iterative-refinement (multi-pass purification).
      → Pattern : intrinsic-mixture-requires multi-pass.
    type: analogie_explicative
    concepts:
