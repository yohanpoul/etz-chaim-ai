  - id: "EC-H5S18-143"
    source_he: "וכבר נודע שהסיגים היוצאין מן הכסף הטהור א\"א שלא יתערב בהם קצת כסף טהור ואז צריך לנקות את הסיגים פעם ב' להוציא אותו המיעוט של ניצוצות הכסף הנשאר מעורב בהם"
    source_ref: "Heikhal 5, Sha'ar 2:5 §2"
    assertion: |
      Inevitabilite SIGIM-KESEF melange :
      → SIGIM YOTZIN MIN HA-KESEF HA-TAHOR (residus issus de l'argent pur).
      → I-EFSHAR (impossible) shel-LO YIT'AREV BAHEM KETZAT KESEF TAHOR (qu'aucun morceau d'argent pur ne se mele).
