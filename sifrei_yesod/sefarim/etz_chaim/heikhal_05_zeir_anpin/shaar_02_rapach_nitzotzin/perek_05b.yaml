meta:
  sefer: etz_chaim
  heikhal: 5
  shaar: 2
  shaar_name_he: "שער רפ\"ח ניצוצין"
  perek: 5
  part: "b"
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Part B de 2 — IBBUR ZON 9 mois (en realite 8 effectifs ; mois 9 = 1 jour suffit ; raison SAFEK YOM HA-KELITAH). Z\"A a 9 sefirot mais HE'ELEM (surface V\"K). But IBBUR : nettoyer SIGIM (residus) des 7 melakhim. Sigim+kesef-tahor inseparables ; pas-eviter melange. MAHSHAVA = ABA effectue tikkun ('be-mahshava itbarru'). Yesod-Aba moutzi tipat-mochin → tziyer velad ; Aba mevarer be-mochim. Berur progressif dans MEI-IMMA (chitzonim pas-noge'in dans Ima). Z\"A-orot dans IMMA-orot = HAARAH GEDOLAH → klipot s'eclatent. RAA HA-MA'ATZIL : impossible berur Z\"A-tout-entier pendant ibbur ; seulement jusqu'a NETZACH. Chaque mois = 1 sefirah berur (Daat incluse) ; 8 chodashim = 8 sefirot Keter→Netzach. HOD-YESOD-MALKHUT pas-yokhlu raffinées (sigim trop, klipot proches). Verset 'ha-SHEKER ein lo raglayim' (chitzonim sans pieds) ; 1 regel = HOD seule ; rgl ק de שקר ; HOD=DOH ('kol ha-yom DOH', Lamentations 1:13) ; aleph 5 = beit hurban via HOD. HOD-down klipot-yenikah grande. Donc IBBUR pas-koach achever 3 sefirot bas → Z\"A nait apres mois 8. Tradition autre Mori ZL : Netzach AUSSI raffinee mais pas-compté ; raison 'be-hadi hutza laki karba' (Pesachim 28a — N+H 2 palgei de-gufa attaches ; Hod pas-raffin → Netzach pas-compté). Note humble : 'iniy yode'a eikh hu mityashev'."

