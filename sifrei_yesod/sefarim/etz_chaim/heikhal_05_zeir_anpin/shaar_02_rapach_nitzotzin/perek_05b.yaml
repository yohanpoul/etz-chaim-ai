#   - Bloc CC : But IBBUR = nettoyer SIGIM (residus) MELAKHIM
#   - Bloc DD : Sigim a separer ; impossible-de-pas-meler kesef-tahor
#   - Bloc EE : MAHSHAVA = ABA effectue tikkun ("be-mahshava itbarru")
#   - Bloc FF : Yesod-Aba moutzi tipat-mochin tziyer-velad ; Aba mevarer
#   - Bloc GG : Tikkun ETZEM dans MEI-IMMA chodashim ; chitzonim pas-noge'in
#   - Bloc HH : Z"A-orot dans IMMA-orot = HAARAH GEDOLAH ; klipot s'eclatent
#   - Bloc II : RAA HA-MA'ATZIL — pas-tout berur possible jusqu'a NETZACH
#   - Bloc JJ : Chaque mois = 1 sefirah berur (Daat compte) ; 8 chodashim = 8 sefirot
#   - Bloc KK : Mois 8 : NETZACH ; HOD-YESOD-MALKHUT pas-yokhlu raffinés (klipot proches)
#   - Bloc LL : "Ha-SHEKER ein lo raglayim" = chitzonim ; 1 regel = HOD seul ; rgl ק de שקר
#   - Bloc MM : HOD = DOH ("kol ha-yom DOH") ; alef 5 = beit hurban Hod ; HOD-down klipot-yenikah
#   - Bloc NN : Donc IBBUR pas-ko'ach lehashlim ; Z"A nait apres mois 8
#   - Bloc OO : Tradition autre Mori ZL : Netzach AUSSI raffin ; pas compté ; raison "be-hadi hutza laki karba" (N-H attaches)
#   - Bloc PP : Note humble — "iniy yode'a eikh hu mityashev" (je ne sais pas resolution)
