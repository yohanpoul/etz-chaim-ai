  - id: "EC-H5S18-144"
    source_he: "וענין בירור זה תלוי במחשבה עילאה שהוא אבא. כמ\"ש פ' פקודי במחשבה אתברירו כולהו כי הלא יסוד אבא הוא מוציא טיפת המוחין לצייר ממנו הולד והאב הוא המברר במוחין שלו הנקרא מחשבה ומברר הטוב ושדי להו בפומא דאמה"
