  - id: "EC-H5S18-150"
    source_he: "וגם עם מה שכבר הודעתיך כי השקר אין לו רגלים והוא סוד החיצונים הנקרא שקר ואין לו ב' רגלים שהם נ\"ה רק רגל א' שהוא הוד לבד ושם יש לו אחיזה בסוד הוד דוה כמ\"ש כל היום דוה ובו נחרב הבית באלף הה' הרמוז בהוד והוא סוד רגל של ק' של שקר"
    source_ref: "Heikhal 5, Sha'ar 2:5 §2"
    assertion: |
      SHEKER (mensonge) — 1 regel = HOD seul (cf. EC-H5S18-093 sur N+H palgei) :
      → "HA-SHEKER EIN LO RAGLAYIM" — chitzonim 2 raglayim = N+H.
      → SHEKER seulement 1 regel = HOD seul.
      → SOD HOD = DOH (cf. "kol ha-yom DOH" Lamentations 1:13).
      → ALEPH 5 (5e millenaire) HURBAN ; sod REGEL DE-Q (kof) DE-SHEKER.
      → Architecture : klipot-grip-via-HOD.
      → Pattern : single-pivot-vulnerability HOD.
