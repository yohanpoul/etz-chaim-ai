      MAHSHAVA = ABA effectue TIKKUN :
      → BERUR depend de MAHSHAVA ELYONA = ABA.
      → Source Pekudei : "BE-MAHSHAVA ITBARRU KULHU" (tous sont tries dans la pensee).
      → YESOD-ABA moutzi TIPAT HA-MOCHIN pour LE-TZAYER MIMENU HA-VLAD (sculpter le foetus).
