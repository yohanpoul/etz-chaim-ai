# STRUCTURE §perek_05b (2eme section, ~2232 chars) :
#   - Bloc Y2 : MK (Marginal Note) — bourrur ZON par IBBUR + YENIKAH
#   - Bloc Z : IBBUR = 9 mois ; 8 chodashim effectifs (1 jour 9eme suffit)
#   - Bloc AA : Z"A a 9 sefirot completes (HE'ELEM, surface VK)
