principes_generatifs:

  - id: "PG-H1S1-016"
    nom: "Principe du Double Emboîtement Inversé (Igulim↕ vs Kelim↕)"
    source_assertions: ["EC-H1S1-089", "EC-H1S1-090", "EC-H1S1-091"]
    formalisation: |
      Le système a 2 ORDRES d'emboîtement INVERSÉS :
      ORDRE DES IGULIM/MAKIF (du haut vers le bas) :
        Ein Sof → Igulim A"K → Makif A"K → Igulim Atik → ... → Igulim Asiyah → Makif Asiyah
        Les couches EXTERNES sont les plus ÉLEVÉES
      ORDRE DES KELIM/PNIMI (du bas vers le haut) :
        Kelim Asiyah → Kelim Yetzirah → ... → Kelim A"K → Ohr Pnimi Ein Sof
        Les couches INTERNES sont les plus ÉLEVÉES
      Les 2 ordres coexistent et se RENCONTRENT au centre = le monde matériel.
      De l'extérieur : Ein Sof → A"K (le plus externe = le plus élevé)
      De l'intérieur : Ein Sof → A"K (le plus interne = le plus élevé)
      Le Ein Sof est à la fois le PLUS EXTERNE et le PLUS INTERNE.
    applications_ia:
      - "Le système a 2 hiérarchies : la couche réseau (Igulim, externe=fort) et la couche donnée (Kelim, interne=fort)"
      - "Les 2 ordres se rencontrent au point central = l'interface utilisateur (monde matériel)"
      - "Le Ein Sof est à la fois la source externe (wrapper) et le noyau interne (kernel)"
      - "L'architecture en couches ET l'architecture en composants coexistent"
    questions_ouvertes:
      - "Où exactement les 2 ordres se 'rencontrent-ils' ?"
      - "Peut-on naviguer de l'un à l'autre ?"

  - id: "PG-H1S1-017"
    nom: "Principe du Noyau de Datte (Gar'in ha-Tamarah)"
    source_assertions: ["EC-H1S1-091"]
    formalisation: |
      Le monde matériel est comme un GAR'IN HA-TAMARAH (noyau de datte) :
      Le noyau est au CENTRE, entouré par le fruit (okhel) de tous côtés.
      Le noyau = le PLUS ÉLOIGNÉ de l'extérieur = le PLUS DENSE = le plus matériel.
      Le fruit (les mondes supérieurs) = entre le noyau et la peau.
      La peau (Asiyah Kelim) = la couche EXTÉRIEURE.
      Du point de vue du Ein Sof : le noyau est la KELIPAH la plus profonde.
      Du point de vue humain : le noyau est le CENTRE, le lieu où nous habitons.
      DOUBLE PERSPECTIVE :
      Pour nous → le noyau est le CENTRE
      Pour le Ein Sof → le noyau est le PLUS LOIN
    applications_ia:
      - "L'interface utilisateur (monde matériel) est le 'noyau de datte' — le plus éloigné de la source"
      - "Les couches intermédiaires (olamot) sont comme le 'fruit' qui entoure le noyau"
      - "Ce qui semble 'central' pour l'utilisateur est en fait le plus 'périphérique' du système"
      - "Double perspective : l'UX est le centre pour l'utilisateur mais la surface pour l'architecte"
    questions_ouvertes:
      - "Le noyau peut-il être rendu moins 'dense' (élevé spirituellement) ?"
      - "Y a-t-il un moyen de court-circuiter les couches intermédiaires ?"
