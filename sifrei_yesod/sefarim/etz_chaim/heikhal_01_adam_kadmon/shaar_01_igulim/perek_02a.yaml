principes_generatifs:

  - id: "PG-H1S1-005"
    nom: "Principe du Tzimtzum (Retrait pour Créer l'Espace)"
    source_assertions: ["EC-H1S1-023", "EC-H1S1-024", "EC-H1S1-025", "EC-H1S1-026", "EC-H1S1-027", "EC-H1S1-029"]
    formalisation: |
      Pour que quelque chose de NOUVEAU puisse exister, la source doit SE RETIRER :
      ÉTAT 0 : L'Ohr Pashut remplit TOUTE la réalité — pas d'espace pour autre chose
      ACTE : Tzimtzum = retrait de l'Ohr du CENTRE vers la PÉRIPHÉRIE
      RÉSULTAT : HALAL (espace vide circulaire) où les mondes peuvent être
      PROPRIÉTÉS du Tzimtzum :
        - CIRCULAIRE (car la source est parfaitement égale)
        - ÉGAL de tous les côtés (pas plus d'un côté que l'autre)
        - Crée un HALAL mais PAS un NÉANT — le Ein Sof entoure toujours
      RAISON PROFONDE : révéler le SHORESH HA-DINIM (Butzina de-Kardinuta)
      = introduire le DIN (forme, limite, mesure) dans une réalité sans forme
      SANS Tzimtzum → pas de Din → pas de forme → pas de création
    applications_ia:
      - "Le Tzimtzum Regulator fait exactement ça — créer de l'espace par retrait"
      - "Pour qu'un nouveau module existe, l'existant doit se retirer (réduire sa portée)"
      - "Le vide (Halal) n'est pas négatif — c'est l'espace NÉCESSAIRE pour la création"
      - "La restriction (Din) est la CONDITION de la forme — sans elle, tout est indifférencié"
      - "Le retrait doit être ÉGAL de tous les côtés — pas de favoritisme"
    questions_ouvertes:
      - "Le Tzimtzum est-il un acte unique ou continu ?"
      - "Le Halal peut-il être rempli à nouveau par l'Ohr Ein Sof ?"
      - "La Butzina de-Kardinuta est-elle la même force que le Din dans les Sefirot ?"

  - id: "PG-H1S1-006"
    nom: "Principe du Kav Asymétrique (Direction par Asymétrie)"
    source_assertions: ["EC-H1S1-031", "EC-H1S1-033", "EC-H1S1-037", "EC-H1S1-038"]
    formalisation: |
      La DIRECTION (haut/bas, devant/derrière, E/O/N/S) n'existe que par ASYMÉTRIE :
      Le Kav TOUCHE le Ein Sof en haut → connecté à la source = ROSH
      Le Kav NE TOUCHE PAS le Ein Sof en bas → déconnecté = SOF
      Si les 2 bouts touchaient → 2 têtes égales → pas de direction
      Si l'Ohr arrivait de partout → pas de direction du tout
      Le Kav est FIN (dak) intentionnellement → l'Ohr arrive MESURÉ :
        - Ni trop (ce qui rendrait les émanés = l'Émanateur)
        - Ni trop peu (ce qui les priverait de vie)
        - KEDEI TZORKHAM BILVAD (selon leur besoin seulement)
      Les Sefirot sont appelées MIDOT (mesures) car le Kav les MESURE et LIMITE
    applications_ia:
      - "La direction dans un système vient de l'ASYMÉTRIE — un point d'entrée, un sens de flux"
      - "Un système sans asymétrie n'a pas de direction — tout est égal = chaos"
      - "Le Kav dak = le bandwidth limité intentionnellement pour ne pas submerger"
      - "Les Sefirot comme MESURES = les composants du système sont quantifiables GRÂCE au Kav"
      - "Le dosage kedei tzorkham = donner exactement ce dont le composant a besoin, pas plus"
    questions_ouvertes:
      - "L'asymétrie peut-elle être modifiée ?"
      - "Le Kav a-t-il une épaisseur variable selon les niveaux ?"
      - "Le dosage kedei tzorkham est-il dynamique ou fixe ?"

  - id: "PG-H1S1-007"
    nom: "Principe de la Proximité Sans Adhérence (Samukh lo Mitdabek)"
    source_assertions: ["EC-H1S1-035", "EC-H1S1-036"]
    formalisation: |
      Les émanations doivent être PROCHES (samukh) de leur source
      mais PAS COLLÉES (lo mitdabek) :
      Si COLLÉES → RÉABSORPTION dans la source → retour à l'état initial → pas de création
      Si TROP ÉLOIGNÉES → pas de connexion → pas de flux vital
      Le SEUL LIEN = le Kav (la ligne fine de connexion)
      Le Ein Sof ENTOURE les Igulim mais ne les TOUCHE PAS directement
      La DISTANCE est maintenue par la forme CIRCULAIRE
      L'indépendance des émanés NÉCESSITE cette distance minimale
    applications_ia:
      - "Les modules doivent être PROCHES mais pas COUPLÉS à leur source"
      - "Un couplage trop fort = réabsorption (le module perd son identité)"
      - "Un couplage trop faible = déconnexion (le module n'est plus alimenté)"
      - "Le Kav = l'interface API fine qui connecte sans coupler"
      - "Le pattern samukh-lo-mitdabek = loose coupling en architecture logicielle"
    questions_ouvertes:
      - "Quelle est la distance optimale (samukh mais pas mitdabek) ?"
      - "Le degré de couplage doit-il varier selon le niveau ?"

  - id: "PG-H1S1-008"
    nom: "Principe de la Structure Fractale Infinie (Gildei Betzalim)"
    source_assertions: ["EC-H1S1-040", "EC-H1S1-041", "EC-H1S1-042"]
    formalisation: |
      Le système est FRACTALEMENT structuré :
      Chaque monde contient 10 Sefirot
      Chaque Sefirah contient 10 sub-Sefirot
      Chaque sub-Sefirah contient 10 sub-sub-Sefirot
      → AD EIN KETZ U-MISPAR (sans fin ni nombre)
      La structure est comme GILDEI BETZALIM (pelures d'oignon) — l'une dans l'autre
      Le KAV traverse TOUTE la profondeur fractale = le FIL CONDUCTEUR universel
      TOUT est DANS le Halal — RIEN en dehors (ein davar hutzah lo)
      Le nombre de mondes = ALEF ALAFIM VE-RIBO RIVAVOT (milliers de milliers)
    applications_ia:
      - "Le système est fractalement structuré — chaque composant contient des sous-composants"
      - "La récursion est INFINIE en théorie mais FINIE en pratique (limitations matérielles)"
      - "Le Kav (shefa_flow) traverse TOUS les niveaux de la fractalité"
      - "Rien n'existe en dehors du 'Halal' du système — tout est contenu"
      - "Le pattern pelures d'oignon = architecture en couches (onion architecture)"
    questions_ouvertes:
      - "La fractalité est-elle parfaite (auto-similaire) ou approximative ?"
      - "Combien de niveaux de récursion le système peut-il pratiquement supporter ?"

  - id: "PG-H1S1-009"
    nom: "Principe d'Élou ve-Élou (Résolution des Contradictions Apparentes)"
    source_assertions: ["EC-H1S1-020", "EC-H1S1-021", "EC-H1S1-022"]
    formalisation: |
      Des modèles apparemment CONTRADICTOIRES peuvent être TOUS VRAIS simultanément :
      MODÈLE SÉQUENTIEL → vrai AVANT le Tikkun (état Nekudim)
      MODÈLE DES KAVIM → vrai APRÈS le Tikkun (état rectifié)
      MODÈLE DES IGULIM → coexiste AVEC le Yosher (2 Behinot simultanées)
      La résolution n'est pas de CHOISIR un modèle mais de comprendre
      que chaque modèle décrit un ASPECT ou un MOMENT différent.
      "Elou ve-elou divrei Elohim Hayim" = le paradoxe est RÉSOLU, pas ÉLIMINÉ
    applications_ia:
      - "Des architectures apparemment contradictoires peuvent coexister dans le même système"
      - "Ne pas chercher LE modèle unique — accepter la complémentarité des modèles"
      - "Le DissensuEngine (3 tensions) utilise exactement ce principe"
      - "Chaque modèle est vrai dans son CONTEXTE — le contexte détermine lequel s'applique"
    questions_ouvertes:
      - "Peut-on TOUJOURS résoudre par Elou ve-Elou ou y a-t-il de vraies contradictions ?"
      - "Comment savoir quel modèle appliquer dans quel contexte ?"
