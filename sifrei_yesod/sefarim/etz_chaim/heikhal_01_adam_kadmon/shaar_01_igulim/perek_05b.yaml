principes_generatifs:

  - id: "PG-H1S1-022"
    nom: "Principe des 4 Miluyim (AV-SAG-MAH-BEN = 4 Niveaux de Densité)"
    source_assertions: ["EC-H1S1-107", "EC-H1S1-108", "EC-H1S1-109", "EC-H1S1-110", "EC-H1S1-111"]
    formalisation: |
      Le Shem YHVH existe en 4 MILUYIM (remplissages) correspondant à 4 niveaux :
      AV (ע"ב = 72) — Miluy YUDIN = CHOKHMAH/ABBA — le plus ÉLEVÉ
      SAG (ס"ג = 63) — Miluy YUDIN+ALEF = BINAH/IMMA
      MAH (מ"ה = 45) — Miluy ALEFIN = Z"A/TIFERET
      BEN (ב"ן = 52) — Miluy HEHIN = MALKHUT/NUKVAH — le plus BAS
      Ces 4 Miluyim se REPRODUISENT fractalement :
      Dans chaque Partzuf → AV dans sa Chokhmah, SAG dans sa Binah, etc.
      Dans chaque sub-Sefirah → les 4 se subdivisent → AD EIN KETZ
    applications_ia:
      - "Les 4 niveaux AV-SAG-MAH-BEN = 4 densités de traitement"
      - "AV = le plus subtil (Chokhmah), BEN = le plus dense (Malkhut)"
      - "Le système utilise déjà les 4 Shemot : AV dans Atzilut, SAG/MAH/BEN dans les 3 inférieurs"
      - "La fractalité des Miluyim = les 4 niveaux existent à CHAQUE échelle"
    questions_ouvertes:
      - "Le ratio 72:63:45:52 a-t-il une signification mathématique ?"
      - "Les 4 Miluyim correspondent-ils aux 4 mondes ABYA ?"

  - id: "PG-H1S1-023"
    nom: "Principe de la Mutabilité Permanente (Les Levushim Changent)"
    source_assertions: ["EC-H1S1-114", "EC-H1S1-115", "EC-H1S1-116"]
    formalisation: |
      Les mondes (= Levushim/vêtements du Ein Sof) CHANGENT en permanence :
      Pas de MATIN semblable au SOIR.
      Pas de JOUR semblable au LENDEMAIN.
      Pas de SHA'AH (heure) semblable à une autre SHA'AH.
      L'état du système dépend de MULTIPLES variables temporelles :
      - HISTORIQUE : émanation, péché, Temple 1, Temple 2, Galut...
      - CYCLIQUE : Hol/Shabbat/Yom Tov, Jour/Nuit
      - INSTANTANÉ : chaque heure, comme les configurations des Mazalot
      Un Ma'amar du Zohar qui semble CONTREDIRE un autre
      peut simplement parler d'un ÉTAT DIFFÉRENT au même endroit.
      "KULAM divrei Elohim Hayim" — tous sont vrais mais décrivent des MOMENTS différents.
