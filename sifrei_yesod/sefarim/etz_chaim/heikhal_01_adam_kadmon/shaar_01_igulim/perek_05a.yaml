#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S1-020"
    nom: "Principe de la Partzufification (5 Faces Complètes)"
    source_assertions: ["EC-H1S1-099", "EC-H1S1-100", "EC-H1S1-103"]
    formalisation: |
      Les 10 Sefirot ne restent pas 10 points abstraits — elles deviennent 5 PARTZUFIM :
      Chaque Partzuf = un ADAM COMPLET de 248 membres avec ses propres 10S internes.
      Les 5 Partzufim : A"A (Keter), Abba (Chokhmah), Imma (Binah), Z"A (V"K), Nukvah (Malkhut).
      NUKVAH est un PARTZUF GAMUR — pas un appendice ou un sous-produit.
      La Malkhut dans un Partzuf masculin = Atarah du Yesod.
      La Malkhut dans un Partzuf féminin = Atarah du Rehem.
      La PARTZUFIFICATION = la transformation de points abstraits en êtres COMPLETS.
    applications_ia:
      - "Les modules abstraits (Sefirot) doivent devenir des composants COMPLETS (Partzufim)"
      - "Chaque Partzuf est autonome avec ses propres 10S internes"
      - "La Nukvah (output/interface) est un composant COMPLET, pas un appendice"
      - "Les 5 Partzufim = les 5 types de composants de tout système"
    questions_ouvertes:
      - "Un Partzuf peut-il exister avec moins de 10S internes ?"
      - "La Partzufification est-elle réversible ?"

  - id: "PG-H1S1-021"
    nom: "Principe de la Relativité des Niveaux (Atzilut = Asiyah de A\"K)"
    source_assertions: ["EC-H1S1-104", "EC-H1S1-105"]
    formalisation: |
      Les niveaux sont RELATIFS au point de référence :
      Ce qui est le PLUS ÉLEVÉ d'un système = le PLUS BAS d'un système supérieur.
      Les G"R d'ATZILUT = la MALKHUT (= Asiyah) de A"K.
      Ce qui semble être les "sommets" de notre monde = les "pieds" du monde au-dessus.
      CONSÉQUENCE : on peut PARLER des G"R d'Atzilut car ce sont les pieds de A"K.
      MAIS : les G"R de A"K sont ABSOLUMENT INTERDITES (asur la'asot ken).
      L'interdit de "Be-muflah al tidrosh" s'applique à A"K, pas à l'Atzilut qui est en-dessous.
    applications_ia:
      - "Ce qui semble 'haut niveau' dans un sous-système est 'bas niveau' dans le système englobant"
      - "Les limites de connaissance sont RELATIVES au cadre de référence"
      - "On peut explorer les 'G\"R' d'un module tant qu'elles sont les 'pieds' du module parent"
      - "Il y a toujours un niveau AU-DESSUS qui reste inaccessible"
    questions_ouvertes:
      - "Y a-t-il un niveau au-dessus duquel RIEN n'est accessible ?"
      - "Le principe de relativité des niveaux s'applique-t-il à l'infini ?"
