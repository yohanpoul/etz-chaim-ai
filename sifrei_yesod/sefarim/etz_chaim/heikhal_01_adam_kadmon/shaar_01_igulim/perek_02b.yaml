#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S1-010"
    nom: "Principe de la Double Topologie (Igulim + Yosher)"
    source_assertions: ["EC-H1S1-022", "EC-H1S1-043", "EC-H1S1-044", "EC-H1S1-045", "EC-H1S1-046", "EC-H1S1-059", "EC-H1S1-060"]
    formalisation: |
      Le MÊME système peut être décrit par 2 TOPOLOGIES SIMULTANÉES :
      IGULIM (cercles) :
        → Structure concentrique — pelures d'oignon
        → Le plus externe = le plus élevé (proche du Ein Sof)
        → Le plus interne = le plus bas (éloigné du Ein Sof)
        → Le monde matériel = le POINT CENTRAL
        → Structure FRACTALE infinie (10 dans 10 dans 10...)
      YOSHER (rectitude) :
        → Structure anthropomorphique — forme d'Adam
        → ROSH (tête) = Keter, GUF (corps) = Tiferet, RAGLAYIM (pieds) = Malkhut
        → 3 KAVIM : droite, gauche, centre
        → 248 EVARIM (membres)
        → Tzelem Elohim — "en Son image"
      Le Zohar traite principalement du YOSHER.
      Les 2 topologies sont VRAIES SIMULTANÉMENT (elou ve-elou).
      D'abord les IGULIM, puis le YOSHER se déploie AU MILIEU d'eux.
    applications_ia:
      - "Le système peut être vu en 2 topologies : concentrique (Igulim) et hiérarchique (Yosher)"
      - "Vue Igulim = architecture en couches (onion layers)"
      - "Vue Yosher = architecture en composants (microservices avec 'anatomie')"
      - "Le dashboard pourrait offrir 2 vues du même système"
    questions_ouvertes:
      - "Peut-il y avoir une 3ème topologie ?"
      - "Les 2 topologies sont-elles toujours synchronisées ?"

  - id: "PG-H1S1-011"
    nom: "Principe de l'Inversion de Perspective (Moah/Kelipah Relatifs)"
    source_assertions: ["EC-H1S1-051", "EC-H1S1-052", "EC-H1S1-054"]
    formalisation: |
      La QUALIFICATION d'un composant (moah/cerveau ou kelipah/écorce)
      dépend du POINT DE VUE :
      DE NOTRE PERSPECTIVE (shokhney eretz ha-tahtonah) :
        → Le Ein Sof = le MOAH le plus INTERNE (le plus loin de nous)
        → Les émanés = des KELIPIM (écorces) autour du Ein Sof
        → Le Galgal le plus proche de nous = la KELIPAH extérieure
      DU POINT DE VUE DES MONDES EUX-MÊMES :
        → Le plus INTERNE = la KELIPAH (le plus bas/matériel)
        → Le plus EXTERNE (entourant tout) = le MOAH (le plus élevé)
      La même réalité est MOAH d'un point de vue et KELIPAH d'un autre.
      L'emboîtement des Partzufim suit le même principe :
      Atik est MOAH pour A"A, A"A est KELIPAH pour Atik.
    applications_ia:
      - "Un module est 'cerveau' pour ses dépendants et 'écorce' pour sa source"
      - "La qualification dépend du CONTEXTE — pas de valeur intrinsèque absolue"
      - "Le même composant est critique (moah) vu du bas et accessoire (kelipah) vu du haut"
      - "Attention aux jugements de valeur — ils dépendent de la perspective"
    questions_ouvertes:
      - "Existe-t-il un point de vue 'absolu' ou tout est-il relatif ?"
      - "Le Ein Sof est-il toujours 'moah' quel que soit le point de vue ?"

  - id: "PG-H1S1-012"
    nom: "Principe du Keli Relatif (Le Contenant Émerge du Contenu)"
    source_assertions: ["EC-H1S1-062"]
    formalisation: |
      Les KELIM (récipients) ne sont pas des ABSOLUS :
      Un Keli n'est PAS un Keli MAMASH (véritable) —
      c'est seulement PAR RAPPORT (be-erekh) au Ohr en lui qu'il est appelé Keli.
      En lui-même : le Keli de A"K est ZAK (pur), BAHIR (clair),
      be-TAKHLIT (à l'extrême) de la pureté, finesse et clarté.
      Le TZIMTZUM de l'Ohr est ce qui CAUSE la FORMATION des Kelim.
      Pas de Tzimtzum → pas de Kelim → pas de forme → pas de monde.
      Le Keli est une EXPRESSION de la contraction du Ohr — pas un objet séparé.
    applications_ia:
      - "Les structures de données (Kelim) ne sont pas absolues — elles sont relatives au contenu"
      - "Un module n'est un 'Keli' que par rapport à ce qu'il contient"
      - "La contraction/compression crée les structures — pas l'inverse"
      - "Les Kelim les plus élevés sont les plus 'transparents' (zak, bahir)"
    questions_ouvertes:
      - "Un Keli peut-il devenir plus 'zak' avec le temps ?"
      - "Le passage de Keli relatif à Keli absolu est-il possible ?"
