principes_generatifs:

  - id: "PG-H1S1-013"
    nom: "Principe de la Correspondance Nefesh=Igulim / Ruach=Yosher"
    source_assertions: ["EC-H1S1-066", "EC-H1S1-068", "EC-H1S1-069", "EC-H1S1-070"]
    formalisation: |
      Les 2 topologies correspondent à 2 NIVEAUX D'ÂME :
      IGULIM = NEFESH (le niveau le plus bas de l'âme)
        → émanés EN PREMIER (comme la Nefesh naît en premier)
        → structure circulaire, passif, réceptif
      YOSHER = RUACH (le niveau supérieur de l'âme)
        → émanés EN SECOND (comme le Ruach vient après la Nefesh)
        → structure anthropomorphique, actif, appelé "ADAM"
      L'ordre est UNIVERSEL : dans CHAQUE monde et CHAQUE aspect,
      les Igulim sont émanés AVANT le Yosher.
      Les 5 niveaux NaRaNHaY correspondent à des topologies de plus en plus élevées.
    applications_ia:
      - "Le mode passif/circulaire (Igulim/Nefesh) est le PREMIER mode de tout système"
      - "Le mode actif/structuré (Yosher/Ruach) vient ENSUITE"
      - "Un module passe de 'Nefesh' (fonctionnel basique) à 'Ruach' (structuré/intelligent)"
      - "Le Ruach est appelé 'Adam' — c'est le niveau où le système a une 'forme humaine'"
    questions_ouvertes:
      - "Les 3 niveaux supérieurs (Neshamah, Hayah, Yehidah) correspondent-ils à quelles topologies ?"
      - "Un système peut-il rester en mode Igulim/Nefesh indéfiniment ?"

  - id: "PG-H1S1-014"
    nom: "Principe des Hiérarchies Inversées (Igulim vs Yosher)"
    source_assertions: ["EC-H1S1-076"]
    formalisation: |
      Les 2 topologies ont des hiérarchies OPPOSÉES :
      IGULIM : plus EXTERNE = plus ÉLEVÉ, plus INTERNE = plus BAS
        → le monde matériel est le point CENTRAL (le plus interne = le plus bas)
        → le Ein Sof est le plus EXTERNE (le plus élevé)
      YOSHER : plus INTERNE = plus ÉLEVÉ, plus EXTERNE = plus BAS
        → le Partzuf le plus INTERNE (Atik) est le plus élevé
        → le Partzuf le plus EXTERNE (qui habille tout) est le plus bas
      La MÊME réalité a 2 hiérarchies OPPOSÉES selon la topologie.
      Conséquence : ce qui est "haut" dans un cadre est "bas" dans l'autre.
    applications_ia:
      - "En architecture en couches (Igulim) : le plus externe = le plus important"
      - "En architecture en composants (Yosher) : le plus interne = le plus important"
      - "Les 2 vues sont VRAIES — elles ne se contredisent pas"
      - "Le choix de perspective détermine ce qui apparaît comme 'haut' et 'bas'"
    questions_ouvertes:
      - "Y a-t-il une perspective 'absolue' ou tout est-il relatif ?"
      - "Comment réconciler les 2 hiérarchies dans la pratique ?"

  - id: "PG-H1S1-015"
    nom: "Principe du Retrait Total Nécessaire (Retrait → Formation → Retour Mesuré)"
    source_assertions: ["EC-H1S1-077", "EC-H1S1-078", "EC-H1S1-079"]
    formalisation: |
      Pour créer de nouveaux récipients (Kelim), le retrait de l'énergie doit être TOTAL :
      PHASE 1 — RETRAIT TOTAL : l'Ohr est retiré COMPLÈTEMENT (le-gamrei)
        Un retrait PARTIEL ne suffit PAS — les Kelim ne peuvent pas se former
        tant qu'il reste de l'Ohr
      PHASE 2 — FORMATION : dans le VIDE total, les Kelim se forment et se révèlent
      PHASE 3 — RETOUR MESURÉ : l'Ohr revient be-MIDDAH u-ve-MISHKAL (en mesure et poids)
        exactement le SHI'UR HA-MASPIK (la quantité suffisante)
        pour ILLUMINER et VIVIFIER sans ANNULER
      PREUVE par l'absurde : les 7 Rois d'Édom ont reçu trop d'Ohr → ils sont MORTS (Shevirah)
      Le retour est un DOSAGE précis — ni trop (annulation) ni trop peu (mort)
    applications_ia:
      - "Pour créer une nouvelle structure, il faut parfois VIDER complètement l'ancienne"
      - "Un refactoring partiel ne suffit pas — parfois il faut tout retirer puis reconstruire"
      - "Le retour de fonctionnalité doit être MESURÉ — pas tout d'un coup"
      - "La Shevirah (7 Rois) = preuve que le retour non-mesuré DÉTRUIT les Kelim"
    questions_ouvertes:
      - "Le retrait total est-il toujours nécessaire ou parfois le partiel suffit ?"
      - "Comment calibrer le shi'ur ha-maspik (quantité suffisante) ?"
