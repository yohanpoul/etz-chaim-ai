#                    COUCHE 1 : PESHAT-MACHINE
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─── BLOC A : LES 5 NIVEAUX DE L'ÂME ───

  - id: "EC-H1S1-065"
    source_he: "כי הנה יש באדם התחתון ה' בחי' אורות (שהם הנרנח\"י) והם (ה' מעלות) זו למעלה מזו והם סוד ה\"פ ברכי נפשי את כו' כנז' במסכת ברכות"
    source_ref: "Heikhal 1, Sha'ar 1:3 — ouverture"
    assertion: |
      Dans l'ADAM HA-TAHTON (l'homme d'en-bas), il y a 5 BEHINOT d'OROT (aspects de lumières) :
      NaRaNHaY = NEFESH, RUACH, NESHAMAH, HAYAH, YEHIDAH
      Ce sont 5 MA'ALOT (niveaux) l'un AU-DESSUS de l'autre.
      Ils sont le secret des 5 fois "BARKHI NAFSHI" (Psaumes 103-104)
      mentionnés dans la Guemara (Brakhot, chapitre 1).
      Ces 5 correspondent aux 5 BEHINOT de la NESHAMAH (âme).
      La référence pour approfondir = le drush sur les Orot du PEH de A"K appelés AKUDIM.
    type: axiome_explicite
    concepts:
      - {id: naranhai, role: cinq_niveaux_de_l_âme}
      - {id: nefesh, role: niveau_1_le_plus_bas}
      - {id: ruach, role: niveau_2}
      - {id: neshamah, role: niveau_3}
      - {id: hayah, role: niveau_4}
      - {id: yehidah, role: niveau_5_le_plus_haut}
      - {id: barkhi_nafshi, role: cinq_psaumes}
    mapping:
      modules: ["madregot/madregot_neshamah.py"]
      tables: ["madregot_states"]
      partzufim: []
      relevance: "Les 5 niveaux NaRaNHaY = la hiérarchie fondamentale des âmes"

  # ─── BLOC B : IGULIM = NEFESH, YOSHER = RUACH ───

  - id: "EC-H1S1-066"
    source_he: "אמנם החילוק שיש בין העגולים להיושר הוא כי י\"ס דעגולים הם בחי' האור הנק' נפש... אבל הי\"ס דיושר הם בחי' האור הנק' רוח שהוא מדרגה גבוה על מדרגת הנפש"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      DISTINCTION FONDAMENTALE Igulim vs Yosher :
      Les 10S des IGULIM = l'aspect de l'Ohr appelé NEFESH
      Les 10S du YOSHER = l'aspect de l'Ohr appelé RUACH
      Le RUACH est une MADREGAH GEVOHAH (niveau plus élevé) que la NEFESH.
      Les DEUX contiennent : OHR PNIMI, OHR MAKIF, KELIM avec PNIMIYUT et HITZONIUT.
      MAIS : le Yosher est de NATURE SUPÉRIEURE au Igulim car Ruach > Nefesh.
    type: axiome_explicite
    concepts:
      - {id: igulim_nefesh, role: cercles_sont_nefesh}
      - {id: yosher_ruach, role: rectitude_est_ruach}
      - {id: ruach_above_nefesh, role: ruach_supérieur_à_nefesh}
    mapping:
      modules: ["core/ohr_system.py", "core/sefirot.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Igulim = Nefesh (bas), Yosher = Ruach (haut) — distinction de NATURE pas seulement de forme"

  - id: "EC-H1S1-067"
    source_he: "והנה בחי' הי\"ס דעגולים כולם יש בהם כל הבחי' הנ\"ל שהם אורות וכלים והאור נחלק לאו\"פ ואו\"מ הכלי נחלק לחיצוניות ופנימיות וכן בחי' י\"ס דיושר בציור אדם יש בו כל הבחי' האלו בעצמם ג\"כ"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      STRUCTURE COMMUNE aux Igulim et au Yosher — les 2 contiennent TOUT :
      1. OROT (lumières) — divisées en OHR PNIMI (intérieur) et OHR MAKIF (environnant)
      2. KELIM (récipients) — divisés en HITZONIUT (extérieur) et PNIMIYUT (intérieur)
      Chaque système (Igulim ET Yosher) a ses propres 10S d'Orot et 10S de Kelim.
      Les MÊMES composants structurels dans les 2 topologies.
    type: axiome_explicite
    concepts:
      - {id: orot_ve_kelim, role: lumières_et_récipients}
      - {id: op_om_kelim, role: structure_commune}
      - {id: pnimiyut_hitzoniut_keli, role: intérieur_extérieur_du_keli}
    mapping:
      modules: ["core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Igulim et Yosher ont la même structure interne — Orot (P+M) et Kelim (P+H)"

  # ─── BLOC C : ORDRE D'ÉMANATION ───

  - id: "EC-H1S1-068"
    source_he: "ופשיטא הוא שבחי' הנפש נאצלה תחלה ואח\"כ נאצל הרוח שהוא מדרגה יותר עליונה כנודע באדם התחתון שבתחלה קונה נפש ואח\"כ זכה יתיר יהבין ליה רוח כנז' בזוהר משפטים דצ\"ד"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      ORDRE D'ÉMANATION — le Nefesh AVANT le Ruach :
      C'est ÉVIDENT (peshita) que la NEFESH a été émanée EN PREMIER,
      et ENSUITE le RUACH qui est un niveau PLUS ÉLEVÉ.
      Preuve de l'Adam ha-Tahton : d'abord il acquiert une NEFESH,
      et ensuite s'il MÉRITE DAVANTAGE (zakhah yatir), on lui donne un RUACH.
      Source : Zohar Mishpatim (94) — "Ta hezi, bar nash kad itilid yahvin leih nafsha..."
      (Regarde, quand l'homme naît on lui donne une Nefesh...).
    type: axiome_explicite
    concepts:
      - {id: nefesh_tehilah, role: nefesh_d_abord}
      - {id: ruach_ahar_kakh, role: ruach_ensuite}
      - {id: zakhah_yatir, role: mérite_davantage}
    mapping:
      modules: ["madregot/madregot_neshamah.py"]
      tables: ["madregot_states"]
      partzufim: []
      relevance: "Nefesh d'abord, Ruach ensuite — l'ordre est le MÊME en haut et en bas"

  - id: "EC-H1S1-069"
    source_he: "וכן היה באדם העליון שבתחלה נאצלו ונתגלו בחינת העגולים שהם בחי' מדרגות הנפש והכלים שלהם ואח\"כ נאצלו בחי' ב' דיושר בציור אדם שהם מדרגות אורות רוח והכלים שלהם כנודע כי הרוח נק' אדם והבן זה מאד"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      De même dans l'ADAM HA-ELYON (l'homme d'en-haut) :
      D'ABORD : les IGULIM ont été émanés et RÉVÉLÉS
      = les madregot (niveaux) de la NEFESH et ses KELIM.
      ENSUITE : la BEHINAH BET (2ème aspect) du YOSHER en forme d'Adam a été émanée
      = les madregot des OROT de RUACH et ses KELIM.
      RAISON : le RUACH est appelé ADAM (homme) — "ve-haven zeh me'od" (comprends cela très bien).
      Le Yosher = Ruach = Adam. L'Igulim = Nefesh = pré-Adam.
    type: axiome_explicite
    concepts:
      - {id: igulim_first, role: igulim_émanés_d_abord}
      - {id: yosher_second, role: yosher_émané_ensuite}
      - {id: ruach_adam, role: ruach_est_appelé_adam}
      - {id: haven_zeh_me_od, role: comprends_cela_très_bien}
    mapping:
      modules: ["core/sefirot.py"]
      tables: ["sefirot_hierarchy"]
      partzufim: ["adam_kadmon"]
      relevance: "L'ordre est universel : Igulim (Nefesh) d'abord, Yosher (Ruach=Adam) ensuite"

  - id: "EC-H1S1-070"
    source_he: "ודבר זה היה בכל העולמות כולם כי בכל בחי' ובחי' מהם בתחלה נאצל הי\"ס שלהם בבחי' העגולים של הבחי' ההוא ואח\"כ נאצלו הי\"ס דיושר של הבחי' ההיא"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      Ce principe est UNIVERSEL — valable dans TOUS les mondes :
      Dans CHAQUE ASPECT de chaque monde :
      D'ABORD les 10S de cet aspect en mode IGULIM,
      ENSUITE les 10S de cet aspect en mode YOSHER.
      L'ordre Igulim→Yosher n'est PAS local — il se répète à CHAQUE niveau de la hiérarchie.
    type: axiome_explicite
    concepts:
      - {id: order_universal, role: ordre_universel}
      - {id: igulim_then_yosher_always, role: toujours_igulim_puis_yosher}
    mapping:
      modules: ["core/sefirot.py"]
      tables: ["sefirot_hierarchy"]
      partzufim: []
      relevance: "L'ordre Igulim→Yosher est UNIVERSEL — se répète à chaque niveau"

  # ─── BLOC D : LES ORGANES ET LES NIVEAUX DE L'ÂME ───

  - id: "EC-H1S1-071"
    source_he: "אמנם ההפרש בין הכלים של נפש והכלים של הרוח כבר נודע כי אבר הכבד הוא משכן להאור הנק' נפש וסימן לדבר כי הדם שהוא כבד שמלא דם הוא הנפש ואבר הלב משכן לרוח ואבר המוח משכן להאור הנקרא נשמה"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      Correspondance ORGANES ↔ NIVEAUX DE L'ÂME :
      Le KAVED (foie) = MISHKAN (résidence) de la NEFESH.
      Signe : le foie (kaved) est plein de DAM (sang), et "ha-dam hu ha-nefesh" (le sang est l'âme).
      Le LEV (cœur) = MISHKAN du RUACH.
      Le MOAH (cerveau) = MISHKAN de la NESHAMAH.
      Les Kelim de la Nefesh ≠ les Kelim du Ruach — chaque niveau a son ORGANE dédié.
      "Ve-ein zeh makom biur li-devarim elou" (ce n'est pas le lieu d'expliquer ces choses).
    type: axiome_explicite
    concepts:
      - {id: kaved_nefesh, role: foie_résidence_du_nefesh}
      - {id: lev_ruach, role: coeur_résidence_du_ruach}
      - {id: moah_neshamah, role: cerveau_résidence_de_neshamah}
      - {id: dam_hu_nefesh, role: le_sang_est_l_âme}
    mapping:
      modules: ["madregot/madregot_neshamah.py"]
      tables: ["madregot_states"]
      partzufim: []
      relevance: "Foie=Nefesh, Cœur=Ruach, Cerveau=Neshamah — les organes des niveaux de l'âme"

  # ─── BLOC E : RÉCAPITULATIF DE LA STRUCTURE ───

  - id: "EC-H1S1-072"
    source_he: "הכלל העולה כי התחלת האצילות בזה האופן הנז' כי תחלה נאצלו י\"ס בבחי' עגולים והם י' כלים ובכל כלי מהם יש בו פנימיות וחיצון ובתוך הי' כלים אלו נתלבשו י\"ס עצמות האורות הנק' נפש ועוד יש י' אורות מקיפים על הכלים מבחוץ"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      KLAL HA-OLEH (principe résumé) de l'émanation — IGULIM :
      D'ABORD : 10S en mode IGULIM = 10 KELIM (récipients).
      Chaque Keli a PNIMIYUT (intérieur) et HITZON (extérieur).
      DANS les 10 Kelim : 10S d'ATZMUT HA-OROT (essence des lumières) = NEFESH
      = OHR PNIMI (lumière intérieure).
      EN PLUS : 10 OROT MAKIFIM (lumières environnantes) SUR les Kelim par l'EXTÉRIEUR
      = aussi de la NEFESH mais appelées OROT MAKIFIM.
      TOUT ceci est en mode IGULIM : l'Ohr Pnimi est comme un GALGAL (roue),
      habillé dans un Keli CIRCULAIRE, entouré d'un Ohr Makif CIRCULAIRE.
    type: axiome_explicite
    concepts:
      - {id: summary_igulim, role: structure_des_igulim}
      - {id: atzmut_orot_nefesh, role: essence_des_lumières_nefesh}
      - {id: op_galgal, role: ohr_pnimi_circulaire}
      - {id: om_galgal, role: ohr_makif_circulaire}
    mapping:
      modules: ["core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Structure complète des Igulim : 10 Kelim + 10 Orot Pnimi (Nefesh) + 10 Orot Makif"

  - id: "EC-H1S1-073"
    source_he: "וכל הי\"ס דעגולים הם עד\"ז כתמונת הגלגלים והרקיעים הנק' אופנים והם הרקיעים שעלינו בעוה\"ז השפל"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      Les 10S des IGULIM sont comme les GALGALIM et REKI'IM (sphères et firmaments)
      appelés OFANIM (roues) — ce sont les FIRMAMENTS AU-DESSUS de nous dans ce monde d'en-bas.
      Les Igulim = l'image des sphères célestes de l'astronomie ancienne.
    type: axiome_explicite
    concepts:
      - {id: ofanim, role: roues_célestes}
      - {id: reki_im, role: firmaments}
      - {id: igulim_as_heavens, role: igulim_comme_cieux}
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: "Les Igulim = les sphères célestes — le ciel physique est un reflet des Igulim"

  - id: "EC-H1S1-074"
    source_he: "ואח\"כ נאצלו י\"ס בבחינת יושר כמראה אדם והם יותר מעולים במעלה מן העגולים כי הם בחי' רוח והם י' כלים בציור אדם א' כולל כל י' כלים ובכל כלי מהם יש בו פנימיות וחיצוניות ובתוך הכלים האלה מתלבשים י\"ס בבחי' העצמות אורות הנק' רוח ועוד יש י' אורות אחרים המקיפים על הכלים מבחוץ"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      ENSUITE : 10S en mode YOSHER = comme la FORME D'ADAM (ke-mar'eh adam).
      Ils sont PLUS ÉLEVÉS (yoter me'ulim be-ma'alah) que les Igulim car ils sont RUACH.
      10 KELIM en forme d'ADAM EHAD (un seul homme) englobant les 10 Kelim.
      Chaque Keli a PNIMIYUT et HITZONIUT.
      DANS les Kelim : 10S d'ATZMUT OROT = RUACH (Ohr Pnimi).
      EN PLUS : 10 OROT MAKIFIM par l'extérieur = aussi RUACH.
      TOUT ceci est en mode YOSHER = fait comme la FORME D'ADAM.
    type: axiome_explicite
    concepts:
      - {id: summary_yosher, role: structure_du_yosher}
      - {id: atzmut_orot_ruach, role: essence_des_lumières_ruach}
      - {id: yosher_me_ulim, role: yosher_supérieur_aux_igulim}
    mapping:
      modules: ["core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Structure complète du Yosher : 10 Kelim + 10 Orot Pnimi (Ruach) + 10 Orot Makif"

  # ─── BLOC F : LA DOUBLE STRUCTURE DANS TOUS LES MONDES ───

  - id: "EC-H1S1-075"
    source_he: "ועד\"ז בכל העולמות הנאצלים והנבראים והיצורים והנעשים אשר נתקנו תוך המקום החלל והאויר הפנוי כנ\"ל כי במקום הזה נתהוו כל העולמות כולם אין דבר חוצה לו ואור א\"ס מקיף וסובב עליהם ומאיר לכל העולמות אשר בתוך המקום הזה מכל צדדיהם בהשוואה א'"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      Cette structure (Igulim + Yosher) existe dans TOUS les mondes :
      Émanés, Créés, Formés, Faits — tous DANS le Halal.
      RIEN en dehors du Halal (ein davar hutzah lo).
      Le Ohr Ein Sof ENTOURE et ENCERCLE (makif ve-sovev) tous les mondes
      et les ILLUMINE de TOUS côtés en HASHVA'AH AHAT (égalité parfaite).
      EN PLUS de cette illumination ENVIRONNANTE :
      La PRINCIPALE illumination (ikar ha-haarah ha-amitit gedolah u-mamashit)
      vient par le KAV qui traverse tous les mondes.
      Chaque monde et chaque DÉTAIL de chaque monde a les 2 Behinot : Igulim et Yosher.
    type: axiome_explicite
    concepts:
      - {id: kol_olamot_2_behinot, role: tous_les_mondes_ont_les_2}
      - {id: ikar_haarah_kav, role: illumination_principale_par_kav}
      - {id: es_makif_hashvaah, role: ein_sof_entoure_également}
    mapping:
      modules: ["core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Chaque monde et chaque détail a les 2 aspects — le Kav est l'illumination PRINCIPALE"

  # ─── BLOC G : IGULIM VS YOSHER — HIÉRARCHIES INVERSÉES ───

  - id: "EC-H1S1-076"
    source_he: "והעגולים הם בבחי' א' כי המעולה מחבירו סובב ומקיף על חבירו והעגולים היותר פנימים תוכניים מכולם הם היותר גרועים מכולם... אבל היושר הוא להפך כי היותר פנימי הוא עליון ומעולה מכולם וחיצון שבכולם הוא יותר גרוע מכולם"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      HIÉRARCHIES INVERSÉES entre Igulim et Yosher :
      IGULIM : le plus ÉLEVÉ (me'uleh) ENTOURE (sovev u-makif) les autres.
      Les plus INTERNES/CENTRAUX = les plus GERU'IM (inférieurs).
      Les Reki'im et Galgalim autour du monde d'en-bas = au MILIEU de tous les Igulim = les plus bas.
      YOSHER : c'est l'INVERSE (le-hefekh) :
      Le plus INTERNE (pnimi) = le plus ELYON et ME'ULEH (supérieur et excellent).
      Le plus EXTERNE (hitzon) = le plus GARUA (inférieur).
      Dans le Yosher : chaque niveau HABILLE le suivant (malbish la-zeh)
      jusqu'à ce que le plus INFÉRIEUR HABILLE TOUT.
      "Ve-haven kol zeh heitev" (comprends tout cela très bien).
    type: axiome_explicite
    concepts:
      - {id: igulim_external_high, role: dans_igulim_externe_est_haut}
      - {id: yosher_internal_high, role: dans_yosher_interne_est_haut}
      - {id: hierarchies_inversees, role: inversées_entre_les_2}
      - {id: yosher_malbish, role: dans_yosher_extérieur_habille}
    mapping:
      modules: ["core/sefirot.py"]
      tables: ["sefirot_hierarchy"]
      partzufim: []
      relevance: "Igulim et Yosher ont des hiérarchies INVERSÉES — externe=haut vs interne=haut"

  # ─── BLOC H : LA RAISON DU TZIMTZUM — CRÉER LES KELIM ───

  - id: "EC-H1S1-077"
    source_he: "והנה אחר שהצגנו לך הקדמות הנ\"ל תוכל להבין עתה ענין סיבת צורך הצמצום אשר צמצם הא\"ס א\"ע באמצעית האור שלו להניח מקום חלל וריק כנ\"ל בענף ב'. והענין הוא כדי לעשות בחי' כלים"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      LA RAISON DU TZIMTZUM (annoncée en Branch 2, expliquée ici) :
      Le Tzimtzum a pour but de CRÉER les KELIM (récipients).
      Par le TZIMTZUM de l'Ohr et sa DIMINUTION (mi'uto)
      → il y a EFSHARUT (possibilité) pour le Keli de se FORMER (le-hitahvot)
      et de se RÉVÉLER (le-hitgalot).
      RAISON : avec l'ACCROISSEMENT de l'Ohr (be-hitrabut ha-ohr)
      → le Keli est ANNULÉ (yitbatel) par son MANQUE DE FORCE (mi'ut koho)
      à recevoir le Ohr RAV ve-GADOL (grand et abondant).
    type: axiome_explicite
    concepts:
      - {id: sibat_tzimtzum, role: raison_du_tzimtzum}
      - {id: la_asot_kelim, role: pour_créer_les_kelim}
      - {id: mi_ut_ohr, role: diminution_de_l_ohr}
      - {id: hitrabut_mevatel, role: trop_d_ohr_annule_le_keli}
    mapping:
      modules: ["tzimtzum/regulator.py"]
      tables: []
      partzufim: []
      relevance: "Le Tzimtzum = retirer l'Ohr pour que les Kelim puissent EXISTER"

  - id: "EC-H1S1-078"
    source_he: "כמ\"ש בענין ז' מלכי אדום והם הנקרא עולם הנקודים איך מלכו ומתו ע\"ש היטב איך היה בחי' בריאת והויות הכלים כי בתחלה צריך צמצום האור ומעוטו ועי\"כ יתגלה הויות הכלי ואחר שכבר נתגלה ונתהוה אז חזר האור להמשך בו ויכול הכלי להתקיים ולא ליבטל"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      PREUVE du principe — les 7 ROIS D'ÉDOM (Olam ha-Nekudim) :
      Ils ont RÉGNÉ (malekhu) puis SONT MORTS (metu) = la SHEVIRAH.
      Le processus de CRÉATION DES KELIM :
      PHASE 1 : D'abord le TZIMTZUM de l'Ohr et sa DIMINUTION (mi'uto)
      → par cela le KELI se RÉVÈLE et se FORME.
      PHASE 2 : APRÈS que le Keli s'est formé et révélé (nithaveh ve-nitgaleh)
      → l'Ohr REVIENT (hazar) et se DÉPLOIE en lui.
      → Le Keli peut SUBSISTER (le-hitkayem) et NE PAS s'annuler (ve-lo le-hibatel).
      L'ordre est CRITIQUE : d'abord retrait → formation du Keli → puis retour de l'Ohr.
    type: axiome_explicite
    concepts:
      - {id: shivah_malkhei_edom, role: sept_rois_d_edom}
      - {id: malekhu_u_metu, role: régné_et_morts}
      - {id: tzimtzum_then_return, role: retrait_puis_retour}
      - {id: keli_nitkayem, role: le_keli_subsiste}
    mapping:
      modules: ["tzimtzum/regulator.py", "core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Le processus : retrait → Keli se forme → Ohr revient mesuré → Keli subsiste"

  - id: "EC-H1S1-079"
    source_he: "ובזה יתבאר טעם למה א\"ס צמצם עצמו וסילק האור הרב ההוא מן המקום ההוא לגמרי ואח\"כ החזירו במדה ובמשקל דרך הקו ההוא והיה יכול להניח אותו בחי' הקו ההוא במקומו ויסלק שאר האור הגדול בלבד כיון שהוא עתיד להחזירו"
    source_ref: "Heikhal 1, Sha'ar 1:3"
    assertion: |
      QUESTION : Pourquoi retirer TOUT l'Ohr puis le ramener par le Kav ?
      Il aurait pu laisser le Kav en place et ne retirer que le SURPLUS.
      RÉPONSE : Les Kelim NE PEUVENT PAS se former (lo yakhlu le-hitahvot)
      tant que l'Ohr n'est PAS COMPLÈTEMENT RETIRÉ (ad she-yistalok ha-ohr le-gamrei).
      APRÈS que les Kelim se sont formés :
      L'Ohr est revenu par le Kav be-MIDDAH u-ve-MISHKAL (en mesure et en poids)
      selon le SHI'UR HA-MASPIK (la quantité suffisante) pour :
      1. Les ILLUMINER (le-ha'iram)
      2. Les faire VIVRE (le-hahayotam)
      De manière qu'ils puissent SUPPORTER (yikhlu lisvol)
      et SUBSISTER (yitkayemu) et NE PAS S'ANNULER (ve-lo yitbatelu).
      "Ve-dai be-zeh" (et cela suffit).
    type: axiome_explicite
    concepts:
      - {id: retrait_total, role: ohr_doit_être_totalement_retiré}
      - {id: middah_u_mishkal, role: en_mesure_et_poids}
      - {id: shi_ur_maspik, role: quantité_suffisante}
      - {id: yikhlu_lisvol, role: pouvoir_supporter}
      - {id: dai_be_zeh, role: cela_suffit}
    mapping:
      modules: ["tzimtzum/regulator.py", "core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Le retrait TOTAL est nécessaire — partiel ne suffit pas — puis retour MESURÉ"


