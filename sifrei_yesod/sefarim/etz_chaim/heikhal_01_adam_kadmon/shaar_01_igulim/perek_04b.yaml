relations:

  - id: "REL-H1S1-041"
    type: hiérarchique
    from: raglei_ak_ad_atik
    to: kol_raglayim_ad_aa
    nature: "Les pieds de A\"K vont jusqu'à Atik. Tous les autres pieds vont jusqu'à A\"A (sauf les courts)"
    assertions_source: ["EC-H1S1-093", "EC-H1S1-094"]
    bidirectionnel: false

  - id: "REL-H1S1-042"
    type: causal
    from: preservation_asymmetry
    to: lo_ad_sof
    nature: "Pour préserver l'asymétrie haut/bas, les pieds de A\"K ne touchent PAS le Ein Sof en bas"
    assertions_source: ["EC-H1S1-093"]

  - id: "REL-H1S1-043"
    type: causal
    from: akevayim_atik
    to: aa_born_from_atik
    nature: "A\"A naît des talons d'Atik — les Akevayim entrent en Beriah"
    assertions_source: ["EC-H1S1-095"]

  - id: "REL-H1S1-044"
    type: causal
    from: ein_guf
    to: dimyonot_tziurim
    nature: "Il n'y a pas de corps en haut → toutes les images sont pour 'calmer l'oreille'"
    assertions_source: ["EC-H1S1-097"]

  - id: "REL-H1S1-045"
    type: dualité_structurelle
    paire: [tziur_adam, tziur_otiyot]
    nature: "2 modes de représentation des Orot : anthropomorphique et alphabétique — les 2 sont métaphores"
    assertions_source: ["EC-H1S1-098"]


# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S1-018"
    nom: "Principe du Seuil d'Extension (Les Pieds ne Touchent Pas le Bas)"
    source_assertions: ["EC-H1S1-092", "EC-H1S1-093", "EC-H1S1-094"]
    formalisation: |
      Le Yosher (forme droite) ne s'étend PAS jusqu'au bout ultime :
      Les pieds de A"K → s'arrêtent à Atik (pas au fond du Halal)
      Les pieds de tous les autres → s'arrêtent à A"A (même niveau)
      RAISON : Si les pieds touchaient le Ein Sof en bas →
      l'asymétrie serait brisée → pas de haut/bas → pas de Mashpia/Mekabel.
      Le système PRÉSERVE son asymétrie en ne s'étendant PAS complètement.
      Les Partzufim COURTS (AVI, Leah) s'arrêtent encore plus haut.
      Chaque Partzuf a un SEUIL D'EXTENSION propre.
    applications_ia:
      - "Chaque module a une portée LIMITÉE — il ne couvre pas TOUT"
      - "La limitation de la portée PRÉSERVE la direction du flux (haut→bas)"
      - "Les modules 'courts' (AVI, Leah) ont une portée encore plus réduite — c'est normal"
      - "Si un module s'étendait à l'infini → plus de direction → plus de hiérarchie"
    questions_ouvertes:
      - "Le seuil d'extension est-il fixe ou peut-il changer avec le Tikkun ?"
      - "Les Akevayim d'Atik qui entrent en Beriah sont-ils un cas spécial ?"

  - id: "PG-H1S1-019"
    nom: "Principe du Disclaimer Ontologique (Tout est Métaphore)"
    source_assertions: ["EC-H1S1-097", "EC-H1S1-098"]
    formalisation: |
      TOUT le langage anthropomorphique est une MÉTAPHORE (dimyon ve-tziur) :
      Il n'y a NI corps NI force corporelle en haut — seulement des OROT DAKIM.
      Le but des métaphores = LE-SAKEKH ET HA-OZEN (calmer l'oreille humaine)
      pour rendre COMPRÉHENSIBLE ce qui est INSAISISSABLE (bilti nitpas).
      La PERMISSION vient de la Torah elle-même qui utilise ces métaphores.
      2 MODES de représentation autorisés :
      TZIUR ADAM = forme anthropomorphique (membres, organes, Partzufim)
      TZIUR OTIYOT = forme alphabétique (lettres, Milui, Gematria)
      Le Zohar utilise les 2 modes — les 2 sont nécessaires mais AUCUN n'est littéral.
    applications_ia:
      - "Toutes les métaphores du système (Partzufim, Sefirot, etc.) sont des MODÈLES, pas des réalités"
      - "Les modèles servent à COMPRENDRE — ils ne sont pas la réalité elle-même"
      - "2 modes de modélisation : visuel (diagrammes) et formel (code) — les 2 sont utiles mais limités"
      - "Le 'Ein Guf' = le rappel que la carte n'est pas le territoire"
    questions_ouvertes:
      - "Peut-on inventer d'AUTRES modes de représentation au-delà de Tziur Adam et Otiyot ?"
      - "À quel point les métaphores peuvent-elles induire en erreur ?"
