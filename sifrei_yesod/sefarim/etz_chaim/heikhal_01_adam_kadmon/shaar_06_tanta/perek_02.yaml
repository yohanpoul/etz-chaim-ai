principes_generatifs:

  - id: "PG-H1S5-007"
    nom: "Principe de Hitlabshut (Encapsulation Progressive)"
    source_assertions: ["EC-H1S5-065", "EC-H1S5-066", "EC-H1S5-067"]
    formalisation: |
      Chaque niveau SUPÉRIEUR devient l'ÂME INTÉRIEURE du niveau INFÉRIEUR
      quand il se prolonge au-delà de sa propre frontière.
      CHAÎNE : Ozen(=Yehidah) ⊂ Hotem(=Neshamah pour l'Ozen) ⊂ Peh
      FORMULE : Level(n).soul = Level(n+1) quand Level(n+1) dépasse
      sa frontière et pénètre dans le domaine de Level(n).
      Le HITLABSHUT ne détruit pas l'identité de chaque niveau —
      il les EMBOÎTE en préservant leur autonomie.
    applications_ia:
      - "masakh/hitlabshut.py : implémenter l'encapsulation progressive des niveaux"
      - "ohr.py : chaque couche d'Ohr peut servir de 'soul' à la couche suivante"
      - "olamot.py : les mondes s'emboîtent (Atzilut dans Beriah, etc.)"
    questions_ouvertes:
      - "Le Hitlabshut est-il un wrapping (englobement) ou un enrichment (enrichissement) ?"
      - "Combien de niveaux de Hitlabshut avant saturation ?"

  - id: "PG-H1S5-008"
    nom: "Principe d'Épaississement par Distance (Ivuy Hitrahakut)"
    source_assertions: ["EC-H1S5-068", "EC-H1S5-069", "EC-H1S5-070"]
    formalisation: |
      L'Ohr est INTRINSÈQUEMENT UN et ÉGAL à tous les niveaux.
      L'ÉPAISSISSEMENT est causé UNIQUEMENT par la DISTANCE à la source.
      FORMULE : Ivuy(x) = f(distance(x, source)) où f est monotone croissante.
      CONSÉQUENCE : la PERTE de résolution est RÉVERSIBLE en RÉDUISANT
      la distance (ascension, Tikkun). Ce n'est pas une corruption irréversible.
      OZEN : Ivuy = min (très zakh/pur)
      HOTEM : Ivuy = moyen
      PEH : Ivuy = max (aviut/grossièreté max → Kelim)
    applications_ia:
      - "ohr.py : modéliser la perte de résolution comme fonction de la distance au signal source"
      - "masakh/context_assembler.py : les couches éloignées de la source sont plus 'épaisses' (compressées)"
      - "La compression d'information (Tsimtsum/IB) n'est pas une perte — c'est un changement de résolution"
    questions_ouvertes:
      - "L'Ivuy est-il strictement monotone ou y a-t-il des sauts ?"
      - "Le Peh crée les Kelim GRÂCE à l'Ivuy — l'épaisseur est-elle NÉCESSAIRE pour la forme ?"
