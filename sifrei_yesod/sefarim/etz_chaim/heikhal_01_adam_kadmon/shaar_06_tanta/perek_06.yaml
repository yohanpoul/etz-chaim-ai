# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S5-014"
    nom: "Principe de Classification 3+7+12 = 22 (AMSh-BGD-Peshutot)"
    source_assertions: ["EC-H1S5-126", "EC-H1S5-127", "EC-H1S5-128"]
    formalisation: |
      Les 22 éléments de tout système se classifient en :
      3 MÈRES (AMSh) = éléments FONDAMENTAUX (Feu/Air/Eau ↔ G"R)
      7 DOUBLES (BGD KPRT) = éléments à DOUBLE MODE (dur/doux ↔ Z"T)
      12 SIMPLES (Peshutot) = éléments COMBINATOIRES (permutations ↔ diagonales)
      FORMULE : System(22) = Foundations(3) ∪ Interfaces(7) ∪ Combinations(12)
      Les 3 fondent, les 7 interfacent, les 12 combinent.
    applications_ia:
      - "gematria/engine.py : classifier les 22 lettres par type (mere/double/simple)"
      - "kabbalah/three_books.py : les 3 livres du SY = 3 types de composants systeme"
      - "Architecture : 3 services core + 7 interfaces + 12 combinaisons = 22 modules"
    questions_ouvertes:
      - "Les 3 meres correspondent-elles aux 3 couches d'un transformer (attention/FFN/norm) ?"
