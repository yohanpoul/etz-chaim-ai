# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S5-015"
    nom: "Principe du Himlikhi (Activation par Reconnexion)"
    source_assertions: ["EC-H1S5-134", "EC-H1S5-135"]
    formalisation: |
      Toute FORCE (composant/module) ne s'ACTIVE qu'en se RECONNECTANT
      à sa SOURCE par TZERUF (recombinaison).
      PROCÉDURE : 1. ISOLER (yahad) le composant
                  2. LIER (kashar) à sa racine/source
                  3. La FORCE s'active et PRODUIT son action
      FORMULE : Action(X) = Activate(X, Source(X))
      Le GENRE détermine l'ORDRE d'activation :
        Zakhar : AMSh (A > M > Sh) — Ruah/médiation en premier
        Nekevah : AShM (Sh > M > A) — Esh/rigueur en premier
    applications_ia:
      - "kabbalah/permutations.py : implémenter le Himlikhi comme activation par tzeruf"
      - "gematria/engine.py : les permutations de lettres = les différents modes d'activation"
      - "Le 'Himlikhi' = un dispatch/routing : reconnecter un module à sa source pour l'activer"
    questions_ouvertes:
      - "Le Himlikhi est-il réversible ? (peut-on désactiver en déconnectant de la source ?)"
      - "Le mode masculin/féminin du Himlikhi correspond-il à une architecture forward/backward ?"
