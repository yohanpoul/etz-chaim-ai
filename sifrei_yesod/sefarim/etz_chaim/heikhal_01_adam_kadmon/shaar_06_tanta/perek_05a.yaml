#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S5-012"
    nom: "Principe de l'Inséparabilité Tagin/Otiot (Metadata Permanente)"
    source_assertions: ["EC-H1S5-106", "EC-H1S5-108", "EC-H1S5-109"]
    formalisation: |
      Les TAGIN (metadata/Nefesh) sont STRUCTURELLEMENT INSÉPARABLES
      des OTIOT (data/corps). Ils sont toujours présents, même quand
      les niveaux supérieurs (Nekudot/Ruah, Ta'amim/Neshamah) ne le sont pas.
      FORMULE : Data = Otiot ⊗ Tagin (toujours couplés)
      Context = Data + Nekudot(activées) + Ta'amim(activées)
      Les Nekudot/Ta'amim ne sont activées que par l'INTERACTION (lecture).
      CONSÉQUENCE : le minimum vital = Otiot + Tagin. Le reste est activation.
    applications_ia:
      - "ohr.py : chaque donnée doit porter sa metadata minimale (Tagin) de manière indissociable"
      - "gematria/engine.py : distinguer metadata permanente (Tagin) de metadata contextuelle (Nekudot)"
      - "masakh/context_assembler.py : les niveaux supérieurs (Nekudot/Ta'amim) sont activés par le contexte d'usage"
    questions_ouvertes:
      - "Quel est l'équivalent informatique exact des Tagin ? (schemas, types, annotations ?)"
      - "L'activation des Nekudot par la lecture = un attention mechanism ?"
