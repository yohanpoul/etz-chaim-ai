# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S5-011"
    nom: "Principe de Description Récursive (Chaque Niveau Nomme le Supérieur)"
    source_assertions: ["EC-H1S5-090", "EC-H1S5-093", "EC-H1S5-094", "EC-H1S5-098"]
    formalisation: |
      TOUT est LETTRE à des niveaux différents. Chaque niveau INFÉRIEUR
      est la DESCRIPTION EXPLICITE (par des noms/lettres) de ce que
      le niveau SUPÉRIEUR contient implicitement.
      CHAÎNE : Otiot DÉCRIVENT les Tagin qui DÉCRIVENT les Nekudot
      qui DÉCRIVENT les Ta'amim qui DÉCRIVENT un aspect AU-DELÀ...
      FORMULE : Level(n).content = Names(Level(n+1).implicit)
      La chaîne est OUVERTE vers le haut (pas de dernier niveau).
    applications_ia:
      - "gematria/engine.py : chaque représentation est un 'alphabet' qui nomme le niveau supérieur"
      - "ohr.py : implémenter la hiérarchie TANTA comme description récursive"
      - "Applicable au multi-level encoding : tokens DÉCRIVENT des embeddings qui DÉCRIVENT des features"
    questions_ouvertes:
      - "La chaîne de description est-elle convergente (les niveaux se stabilisent) ou divergente ?"
      - "Le 'dai be-zeh' (EC-H1S5-099) indique-t-il une limite PRATIQUE ou ONTOLOGIQUE ?"
