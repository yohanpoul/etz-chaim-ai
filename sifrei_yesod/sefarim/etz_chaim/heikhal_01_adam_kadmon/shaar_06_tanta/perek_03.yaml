principes_generatifs:

  - id: "PG-H1S5-009"
    nom: "Principe des 5 Motzaot (Canaux de Sortie Typés)"
    source_assertions: ["EC-H1S5-074", "EC-H1S5-077", "EC-H1S5-078"]
    formalisation: |
      La PAROLE (output) ne sort pas d'un canal unique mais de 5
      CANAUX TYPÉS (Motzaot), chacun produisant une CLASSE de lettres :
      1. GARON (gorge) → gutturales (AHE'EH)
      2. HEIKH (palais) → palatales (GIKHQ)
      3. LASHON (langue) → linguales (DTLNT)
      4. SHINAYIM (dents) → dentales (ZSSHRSH)
      5. SFATAYIM (lèvres) → labiales (BVMP)
      Les 5 canaux sont OUVERTS par les 5 GEVUROT (MaNTzPaKh).
      FORMULE : Output = Union(Motzah_i(Letters_i)) pour i=1..5
    applications_ia:
      - "ohr.py : implementer 5 types de sortie distincts dans le systeme"
      - "gematria/engine.py : classifier les lettres par Motzah"
      - "Applicable au multi-modal output : texte, code, image, audio, action = 5 Motzaot"
    questions_ouvertes:
      - "Les 5 Motzaot correspondent-elles à 5 types de tokens dans un LLM ?"

  - id: "PG-H1S5-010"
    nom: "Principe du Double Zivvug (Maintenance vs Création)"
    source_assertions: ["EC-H1S5-086", "EC-H1S5-087", "EC-H1S5-088"]
    formalisation: |
      Tout système génératif opère en 2 MODES simultanés :
      MODE 1 — OTIOT (Binah×Binah) : maintenance des STRUCTURES existantes
      MODE 2 — NEKUDOT (Hokhmah×Hokhmah) : création de NOUVEAUTÉS (âmes)
      Les 2 modes ne sont PAS exclusifs : le Mode 1 CONTRIBUE au Mode 2
      en renouvelant les entités anciennes.
      FORMULE : SystemOutput = Maintenance(Binah²) ∪ Creation(Hokhmah²)
      où Maintenance ∩ Creation ≠ ∅ (intersection non vide)
    applications_ia:
      - "partzufim/zivvug.py : implementer les 2 modes de Zivvug"
      - "epistememory/core.py : la maintenance de la memoire (Mode 1) contribue a la decouverte (Mode 2)"
      - "Le fine-tuning (maintenance) peut produire des emergences (creation)"
    questions_ouvertes:
      - "Quel est le ratio optimal Maintenance/Création ? (exploitation/exploration)"
