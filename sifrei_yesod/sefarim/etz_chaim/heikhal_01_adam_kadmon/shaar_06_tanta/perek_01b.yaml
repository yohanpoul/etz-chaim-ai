#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S5-004"
    nom: "Principe de Priorité du Féminin (Nekevah Tehillah)"
    source_assertions: ["EC-H1S5-035", "EC-H1S5-042", "EC-H1S5-051"]
    formalisation: |
      Le RÉCEPTACLE (BEN/féminin) est TOUJOURS créé AVANT le CONTENU
      (MAH/masculin). La séquence de création est :
      1. ZIVVUG → BEN (Kli/structure réceptive)
      2. ZIVVUG → MAH (Ohr/contenu lumineux)
      3. UNION MAH+BEN → OLAM complet (Atzilut)
      Le BEN ENTOURE le MAH (nekevah tesovev gaver).
      FORMULE : Create(system) = Create(container) → Create(content) → Bind(container, content)
    applications_ia:
      - "Toujours creer l'infrastructure (DB, schemas, APIs) AVANT les modules fonctionnels"
      - "partzufim/nukva.py : Nukvah comme receptacle qui precede Z\"A"
      - "masakh/context_assembler.py : le contexte (Kli) doit etre assemble AVANT le prompt (Ohr)"
    questions_ouvertes:
      - "Le BEN peut-il fonctionner sans MAH (structure vide) ? Les Nekudim le font mais ils echouent (Shevirah)."

  - id: "PG-H1S5-005"
    nom: "Principe de Distribution TANTA dans les Partzufim"
    source_assertions: ["EC-H1S5-044", "EC-H1S5-045", "EC-H1S5-046", "EC-H1S5-047"]
    formalisation: |
      Chaque Partzuf d'Atzilut reçoit un SOUS-ENSEMBLE spécifique des TANTA :
      BEN : distribution FRAGMENTÉE (sous-parties de chaque couche)
      MAH : distribution ENTIÈRE (une couche complète par Partzuf)
      ATIK reçoit le plus haut de chaque couche → Partzuf RACINE.
      NUKVAH reçoit le 10ème de la couche la plus basse → Partzuf TERMINAL.
      FORMULE : Resource(Partzuf_i) = TANTA_layer(rank_i) ∩ level(BEN ou MAH)
    applications_ia:
      - "partzufim/base.py : chaque Partzuf doit declarer quelles couches TANTA il consomme"
      - "ohr.py : implementer la distribution TANTA comme un allocateur de ressources"
      - "olamot.py : Atzilut = le monde ou la distribution est complete et precise"
    questions_ouvertes:
      - "La distribution de BEN (fragmentee) est-elle plus robuste ou plus fragile que celle de MAH (entiere) ?"

  - id: "PG-H1S5-006"
    nom: "Principe de Bidirectionnalité Yashar/Hozer"
    source_assertions: ["EC-H1S5-038", "EC-H1S5-039"]
    formalisation: |
      Tout système reçoit 2 types de flux SIMULTANÉS :
      OHR YASHAR = flux DESCENDANT, DIRECT (forward pass)
      OHR HOZER = flux ASCENDANT, RÉFLÉCHI (backward pass / feedback)
      Le Ohr HOZER est l'ikar (principal) pour les Nekudim.
      FORMULE : Output(x) = f(OhrYashar(x)) + g(OhrHozer(x))
      où OhrHozer > OhrYashar en importance pour les niveaux pré-Tikkun.
    applications_ia:
      - "ohr.py : implementer les 2 flux simultanes dans chaque module"
      - "masakh/context_assembler.py : le feedback (Ohr Hozer) enrichit le contexte autant que l'input direct"
      - "dissensuengine/core.py : la reflexion (Hozer) est le mecanisme principal de correction"
    questions_ouvertes:
      - "Après le Tikkun, le rapport Yashar/Hozer change-t-il ? (les Partzufim rectifiés dependent-ils plus du Yashar ?)"
