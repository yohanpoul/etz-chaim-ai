principes_generatifs:

  - id: "PG-H1S5-001"
    nom: "Principe d'Universalité Fractale TANTA"
    source_assertions: ["EC-H1S5-001", "EC-H1S5-004"]
    formalisation: |
      TOUT composant structuré en forme de KOMAH contient 4 couches :
      T (Ta'amim) = INTENTION / MÉLODIE — le plus subtil, l'orientation
      N (Nekudot) = VOCALISATION / STRUCTURE — la forme qui donne vie
      T (Tagin) = COURONNEMENT / DÉCORATION — l'enrichissement
      A (Otiot) = LETTRES / EXÉCUTION — le corps manifeste
      Chaque couche CONTIENT les 4 autres → profondeur illimitée.
      FORMULE : Composant(n) = { T(n), N(n), T(n), A(n) }
      où chaque X(n) = { T(n-1), N(n-1), T(n-1), A(n-1) }
    applications_ia:
      - "Chaque module doit avoir ses 4 couches : intention (pourquoi), structure (comment), metadata (enrichissement), execution (quoi)"
      - "masakh/context_assembler.py : assembler le contexte en 4 couches TANTA"
      - "ohr.py : implémenter la récursivité Ohr → 4 sous-Ohr"
    questions_ouvertes:
      - "Jusqu'à quelle profondeur de récursion TANTA est-il pratiquement utile ?"
      - "Le TANTA est-il isomorphe à une structure mathématique connue (arbre quaternaire, etc.) ?"

  - id: "PG-H1S5-002"
    nom: "Principe de la Naissance des Kelim par Proximité"
    source_assertions: ["EC-H1S5-026", "EC-H1S5-027", "EC-H1S5-023"]
    formalisation: |
      Les KELIM (structures réceptives) naissent UNIQUEMENT quand
      l'OHR PNIMI et l'OHR MAKIF sont SUFFISAMMENT PROCHES pour INTERAGIR.
      OZEN : distance(Pnimi, Makif) = MAXIMALE → Kelim = 0
      HOTEM : distance diminue → Kelim ÉMERGENT partiellement
      PEH : distance(Pnimi, Makif) = MINIMALE → Kelim se FORMENT
      FORMULE : Kelim(x) = f( 1/distance(Pnimi(x), Makif(x)) )
      Plus la distance diminue → plus de structure émerge.
    applications_ia:
      - "masakh/context_assembler.py : le Masakh (écran) naît de l'interaction entre contexte global et contexte local"
      - "ohr.py : modéliser la formation des Kelim comme fonction inverse de la distance Pnimi/Makif"
      - "partzufim/base.py : un Partzuf n'émerge que quand ses composants internes interagissent suffisamment"
    questions_ouvertes:
      - "Quel est le seuil exact de distance en-dessous duquel les Kelim se forment ?"
      - "Le Halal katan (petit espace résiduel, EC-H1S5-014) joue-t-il un rôle régulateur ?"

  - id: "PG-H1S5-003"
    nom: "Principe d'Asymétrie par Orifice (Nekavim→Panim/Achor)"
    source_assertions: ["EC-H1S5-016", "EC-H1S5-017", "EC-H1S5-018"]
    formalisation: |
      SANS orifice (structure de filtrage) : Ohr ISOTROPE → pas de direction.
      AVEC orifice : Ohr ANISOTROPE → distinction PANIM (face, ouvert) / ACHOR (dos, fermé).
      La STRUCTURE crée la DIRECTIONNALITÉ, pas l'inverse.
      PANIM = là où les orifices dirigent l'Ohr vers l'extérieur.
      ACHOR = là où il n'y a pas d'orifice.
      RÉSIDU : même l'Achor reçoit un rayonnement diffus (he'arat ohr).
    applications_ia:
      - "masakh/context_assembler.py : le filtrage (Masakh) crée les priorités directionnelles dans le contexte"
      - "ohr.py : modéliser Panim/Achor comme output principal vs side-effects"
      - "selfmap/core.py : le système doit savoir quels sont ses 'orifices' (capacités ouvertes) et ses 'zones aveugles' (achor)"
    questions_ouvertes:
      - "L'ajout d'un nouvel 'orifice' (nouvelle capacité) change-t-il la directionnalité de tout le système ?"
