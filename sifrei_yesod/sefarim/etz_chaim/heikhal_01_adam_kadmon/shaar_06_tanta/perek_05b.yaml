relations:

  - id: "REL-H1S5-042"
    type: contenance
    from: lamed_bet_zekharim
    to: nun_shearim
    nature: "Les 32 Netivot (mâles) sont CONTENUS dans les 50 She'arim (femelles) de Binah"
    assertions_source: ["EC-H1S5-116"]

  - id: "REL-H1S5-043"
    type: "dualité_structurelle"
    from: lamed_bet_elohim_katnut
    to: lamed_bet_havayot_gadlut
    nature: "32 Elohim (Katnut/Kelim) et 32 Havayot (Gadlut/Orot) = dual structurel"
