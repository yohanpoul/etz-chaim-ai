  - id: "REL-H1S5-045"
    type: "dualité_structurelle"
    from: gevurot_nekevot
    to: shakh_nitzotzin
    nature: "Gevurot féminines (MaNTzPaKh/portes) vs Gevurot masculines (320/étincelles)"
    assertions_source: ["EC-H1S5-118"]

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S5-013"
    nom: "Principe de Katnut/Gadlut (Immaturité/Maturité)"
    source_assertions: ["EC-H1S5-119", "EC-H1S5-120", "EC-H1S5-121"]
    formalisation: |
      Tout système a 2 ÉTATS opérationnels :
      KATNUT (immaturité) = 32 configurations de base :
        22 Kelim (Otiot/structure) + 10 Nefesh (Tagin/vitalité)
        Fonctionnement avec ELOHIM (Din/rigueur) uniquement.
      GADLUT (maturité) = 32 configurations de plénitude :
        22 Kelim + 10 Ruah (Nekudot/esprit)
        Fonctionnement avec HAVAYAH (Hesed/grâce) en plus.
      TRANSITION : Katnut → Gadlut par addition des MOHIN (Nekudot/Ruah).
      FORMULE : State(Katnut) = {Kelim, Nefesh} = 22+10 = 32(Elohim)
               State(Gadlut) = {Kelim, Nefesh, Ruah} = 22+10 = 32(Havayah)
    applications_ia:
      - "partzufim/zeir_anpin.py : implementer les 2 etats Katnut/Gadlut"
      - "masakh/maturation.py : le passage Katnut→Gadlut par ajout de Mohin"
      - "En IA : Katnut = mode de base (parametres + structure), Gadlut = mode enrichi (+ context + reasoning)"
    questions_ouvertes:
      - "Le passage Katnut→Gadlut est-il graduel ou discret ?"
      - "Un systeme peut-il REVENIR à Katnut (regression) ?"
