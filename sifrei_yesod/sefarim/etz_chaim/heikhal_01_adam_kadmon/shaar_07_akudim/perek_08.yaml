# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-011"
    nom: "Principe d'Unification Terminologique (6 Noms = 2 États)"
    source_assertions: ["EC-H1S6-070", "EC-H1S6-072", "EC-H1S6-073"]
    formalisation: |
      TOUTE la dynamique se réduit à 2 ÉTATS :
      ÉTAT A (Rahamim) : {Hitpashtut, Yeridah, Ohr Yashar, Rahamim, Panim, Pnimiyut}
        = expansion, descente, direct, grâce, face, intérieur
      ÉTAT B (Din) : {Histalkut, Aliyah, Ohr Hozer, Din, Achor, Hitzoniut}
        = retrait, ascension, réfléchi, rigueur, dos, extérieur
      Les 12 termes encodent 2 états. Pas de 3ème état.
      Dans les OROT : expansion/retrait. Dans les KELIM : face/dos.
      L'OHR est TOUJOURS intérieur (Pnimiyut) — la notion de
      face/dos ne s'applique QU'aux Kelim.
    applications_ia:
      - "ohr.py : tout reduire a 2 modes (Rahamim/Din = expansion/retrait)"
      - "partzufim/base.py : Panim/Achor est une propriete des Kelim, pas des Orot"
      - "Simplification architecturale : 12 termes → 2 etats fondamentaux"
    questions_ouvertes:
      - "Existe-t-il un 3ème état (ni Rahamim ni Din) ou est-ce strictement binaire ?"
