# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-008"
    nom: "Principe des 2 Orot Irréductibles du Kli (Din+Rahamim)"
    source_assertions: ["EC-H1S6-053", "EC-H1S6-057", "EC-H1S6-058"]
    formalisation: |
      Tout KLI contient TOUJOURS (tamid) au minimum 2 OROT :
      1. OHR HOZER (Din) = la composante réfléchie/ascendante
      2. RESHIMU (Rahamim) = la trace de l'Ohr Yashar/descendant
      Ces 2 = les 2 EAUX (Mayim Elyonim + Mayim Tahtonim).
      Même quand tous les Orot principaux se retirent, ces 2 RESTENT.
      FORMULE : Kli.min_content = {OhrHozer(Din), Reshimu(Rahamim)}
      CONSÉQUENCE : aucun Kli n'est jamais VIDE. La structure retient
      toujours un minimum irréductible de rigueur et de grâce.
    applications_ia:
      - "ohr.py : tout Kli doit avoir un contenu minimum (Ohr Hozer + Reshimu)"
      - "masakh/context_assembler.py : meme un contexte 'vide' contient un minimum structurel"
      - "Les 2 Eaux = les 2 composantes irreductibles de toute structure : precision et flexibilite"
    questions_ouvertes:
      - "Les 2 Orot du Kli sont-ils analogues aux poids (Reshimu) et aux gradients (Ohr Hozer) ?"
