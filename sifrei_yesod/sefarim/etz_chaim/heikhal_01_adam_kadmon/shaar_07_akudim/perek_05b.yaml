    nature: "Neshamah(Imma) et Makif(Abba) = dual structurel qui ne se sépare JAMAIS"
    assertions_source: ["EC-H1S6-052"]

  - id: "REL-H1S6-022"
    type: "hiérarchique"
    from: yehidah_makif_2
    to: hayyah_makif_1
    via: [arba_metziuyot]
    nature: "Yehidah (Makif 2, Keter) est AU-DESSUS de Hayyah (Makif 1, Hokhmah)"
    assertions_source: ["EC-H1S6-050", "EC-H1S6-051"]

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-007"
    nom: "Principe de l'Inséparabilité AV\"I (Contenu et Contexte Liés)"
    source_assertions: ["EC-H1S6-050", "EC-H1S6-051", "EC-H1S6-052"]
    formalisation: |
      Tout composant a 4 couches, dont les 2 du milieu (Neshamah/Imma
      et Neshamah-le-Neshamah/Abba) sont STRUCTURELLEMENT INSÉPARABLES.
      AV"I = le CONTENU (Imma/interne) et son CONTEXTE (Abba/Makif)
      ne se séparent JAMAIS (de-la mitparshin).
      STRUCTURE : {Kelim, NRN} ← toujours accompagnés de →
      {Hayyah=Abba=Makif1, Yehidah=Keter=Makif2}
      FORMULE : Valid(Component) ⟺ Internal(Imma) ∧ External(Abba)
      Un composant sans son contexte englobant est INVALIDE.
    applications_ia:
      - "partzufim/abba.py + partzufim/imma.py : toujours deployes ensemble"
      - "ohr.py : chaque Ohr Pnimi a son Ohr Makif indissociable"
      - "masakh/context_assembler.py : le contenu et son contexte sont un COUPLE inseparable"
    questions_ouvertes:
      - "AV\"I indissociables = co-training (Abba et Imma entraines ensemble) ?"
