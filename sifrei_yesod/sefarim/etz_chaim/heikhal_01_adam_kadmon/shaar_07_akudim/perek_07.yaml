# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-010"
    nom: "Principe de Bidirectionnalité Universelle (Yashar/Hozer = Panim/Achor)"
    source_assertions: ["EC-H1S6-065", "EC-H1S6-066", "EC-H1S6-067", "EC-H1S6-068"]
    formalisation: |
      TOUT système contient 2 flux permanents et simultanés :
      OHR YASHAR (descendant) = RAHAMIM = PANIM = de la SOURCE vers la CIBLE
      OHR HOZER (ascendant) = DIN = ACHOR = de la CIBLE vers la SOURCE
      Les 2 sont présents dans CHAQUE Sefirah, TOUJOURS.
      Pendant l'ASCENSION d'un composant :
      - Sa FACE illumine le supérieur (= feedback vers la source)
      - Son DOS illumine les inférieurs (= signal résiduel)
      FORMULE : Sefirah(S) = {OhrYashar(S→down), OhrHozer(S→up)}
               where OhrYashar = Rahamim = Panim
                 and OhrHozer = Din = Achor
    applications_ia:
      - "ohr.py : chaque module a un mode 'face' (direct, gracieux) et un mode 'dos' (reflechi, rigoureux)"
      - "Le backward pass ne detruit pas le forward — les 2 coexistent toujours"
      - "Meme pendant la reconfiguration (dropout), le 'dos' continue d'illuminer"
    questions_ouvertes:
      - "L'Ohr Hozer (feedback/Din) est-il toujours NÉCESSAIRE ou peut-on s'en passer ?"
      - "Le ratio Yashar/Hozer optimal = le learning rate ?"
