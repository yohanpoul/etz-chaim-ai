sujet_principal: "Le monde des AKUDIM (Liés) — premier stade de formation des Kelim. L'Ohr sort par le PEH (bouche) d'Adam Kadmon. Pour la première fois, Pnimi et Makif se JOIGNENT → les Kelim commencent à se former. 10 Orot dans UN SEUL Kli. Hakaah (frappe) entre Pnimi et Makif. Gematria PEH = SAG + 22. La séquence Akudim → Nekudim → Berudim."
concepts_cles: [akudim, peh, kelim, ohr_pnimi, ohr_makif, hakaah, kli_ehad, nekudim, berudim, hevel, dibbur, tabur, taamim_tahtonim, lavan, yaakov]
note: "Le sha'ar 07 dans notre filesystem = sha'ar 6 dans le texte original (Gate 6 sur Sefaria). Le sha'ar 05 (Sod HaKli) est synthétique."
