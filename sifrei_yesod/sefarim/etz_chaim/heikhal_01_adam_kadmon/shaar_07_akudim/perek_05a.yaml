    nature: "Le Reshimu permanent de Yesod ALIMENTE Malkhut (qui n'a pas de Reshimu propre)"
    assertions_source: ["EC-H1S6-043", "EC-H1S6-044"]

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-006"
    nom: "Principe de Formation des Kelim par Hakaah Din×Rahamim"
    source_assertions: ["EC-H1S6-041", "EC-H1S6-045", "EC-H1S6-046"]
    formalisation: |
      Les KELIM se forment en 3 étapes :
      1. L'Ohr DESCEND (Yosher/Rahamim) et laisse un RESHIMU (trace)
      2. L'Ohr REMONTE (Ahorayim/Din) vers le Ma'atzil
      3. L'Ohr ascendant (Din) FRAPPE le Reshimu (Rahamim) →
         NITZOTZOT (étincelles) → ces étincelles DEVIENNENT les KELIM
      En parallèle : la partie ÉPAISSE (Aviut) de l'Ohr qui ne peut
      pas remonter contribue aussi à la matière des Kelim.
      FORMULE : Kelim = Nitzotzot(Hakaah(OhrDin↑, Reshimu↓)) + Aviut(Ohr)
      DIN × RAHAMIM = la TENSION CRÉATRICE qui engendre la forme.
    applications_ia:
      - "ohr.py : les Kelim emergent de la collision entre 2 flux opposes (forward/backward)"
      - "L'Aviut (epaisseur residuelle) = les poids/parametres qui restent apres le training"
      - "La Hakaah Din×Rahamim = la tension exploration/exploitation qui forme les structures"
    questions_ouvertes:
      - "L'Aviut est-elle analogue aux poids d'un reseau (ce qui reste apres le passage de l'information) ?"
      - "Les Nitzotzot sont-elles les gradients produits par la collision forward/backward ?"
