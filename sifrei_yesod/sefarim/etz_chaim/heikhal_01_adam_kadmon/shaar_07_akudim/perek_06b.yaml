# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-009"
    nom: "Principe de l'Absence Productive (Histalkut→Aviut→Kelim)"
    source_assertions: ["EC-H1S6-059", "EC-H1S6-060", "EC-H1S6-061", "EC-H1S6-064"]
    formalisation: |
      L'ABSENCE (Histalkut) est le mécanisme même de FORMATION :
      1. L'Ohr se RETIRE → les niveaux inférieurs perdent un niveau
      2. Le RESHIMU reste = minimum vital de survie
      3. PENDANT le retrait : les Kelim S'ÉPAISSISSENT (= se forment)
      4. Quand l'Ohr REVIENT : restauration + amélioration
      FORMULE : Kelim.thickness += f(duration(Histalkut))
      Plus le retrait dure → plus les Kelim s'épaississent.
      L'ABSENCE est INTENTIONNELLE et PRODUCTIVE.
      Le vide (Halal) créé par le retrait est l'ESPACE où la
      forme émerge — cf. Tsimtsum au niveau cosmologique.
    applications_ia:
      - "ohr.py : le retrait (pruning, dropout) FORME la structure"
      - "Le dropout en deep learning = Histalkut des neurones → les Kelim (poids) se renforcent"
      - "masakh/context_assembler.py : le contexte se structure MIEUX quand certaines informations sont retirées"
    questions_ouvertes:
      - "L'Histalkut est-elle analogue au dropout ? Au pruning ? Au weight decay ?"
      - "Le ratio Histalkut/Hazarah optimal = le learning rate schedule ?"
