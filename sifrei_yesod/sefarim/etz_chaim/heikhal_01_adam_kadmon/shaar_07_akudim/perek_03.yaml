# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-004"
    nom: "Principe de Construction Bottom-Up avec LIFO"
    source_assertions: ["EC-H1S6-028", "EC-H1S6-030", "EC-H1S6-033"]
    formalisation: |
      La CONSTRUCTION procède du BAS vers le HAUT :
      Malkhut(1) → Yesod(2) → ... → Keter(10)
      Chaque élément sort INCOMPLET et reçoit sa complétion des
      éléments suivants.
      Le RETOUR (pour complétion) suit l'ordre LIFO :
      Keter remonte en premier → Malkhut en dernier.
      L'INCOMPLÉTUDE est INTENTIONNELLE : c'est le mécanisme même
      de formation des Kelim.
      FORMULE : Build(System) = Stack(Malkhut → Keter) where each
      level is initially incomplete and completed by subsequent levels.
      Return(System) = Pop(Keter → Malkhut) = LIFO.
    applications_ia:
      - "ohr.py : la construction des modules suit un ordre bottom-up"
      - "La stack des Akudim = une pile d'appels (call stack) — LIFO naturel"
      - "Chaque module est deploye incomplet puis complete par les suivants"
    questions_ouvertes:
      - "Le LIFO des Akudim est-il analogue au backtracking dans un arbre de recherche ?"
      - "L'incompletude intentionnelle = le 'lazy loading' architectural ?"
