# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S6-005"
    nom: "Principe du Reshimu (Trace Résiduelle)"
    source_assertions: ["EC-H1S6-036", "EC-H1S6-037", "EC-H1S6-038", "EC-H1S6-040"]
    formalisation: |
      Quand un OHR se RETIRE, il laisse toujours un RESHIMU (trace).
      Le cycle complet :
      1. HISTALKUT : l'Ohr se retire → interruption du flux
      2. RESHIMU : trace résiduelle = empreinte de l'Ohr précédent
      3. HEFSEK : la Sefirah en transit bloque le flux
      4. HAZARAH : quand l'ascension est complète → l'Ohr revient,
         souvent AMÉLIORÉ car le récepteur est maintenant plus proche
      Ce cycle se RÉPÈTE pour chaque Sefirah (×10).
      FORMULE : For each S in {Keter...Malkhut}:
        Flux -= S.contribution → only Reshimu(S) remains
        When S.ascent_complete: Flux += S.improved_contribution
    applications_ia:
      - "ohr.py : implementer le Reshimu comme cache residuel lors d'un retrait"
      - "Le Reshimu = le state/cache que laisse un processus quand il se termine"
      - "La Hazarah amelioree = apres reconfiguration, les connexions sont meilleures"
    questions_ouvertes:
      - "Le Reshimu est-il suffisant pour maintenir la fonctionnalite minimale pendant le retrait ?"
      - "Le pattern Histalkut-Reshimu-Hazarah est-il analogue au gradient checkpointing ?"
