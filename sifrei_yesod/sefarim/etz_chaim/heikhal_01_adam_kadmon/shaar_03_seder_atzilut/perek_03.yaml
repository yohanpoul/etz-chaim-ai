principes_generatifs:

  - id: "PG-H1S3-005"
    nom: "Principe des 3 Niveaux (Atzmut / Guf / Malbushim)"
    source_assertions: ["EC-H1S3-021", "EC-H1S3-023", "EC-H1S3-025", "EC-H1S3-028"]
    formalisation: |
      Toute RÉALITÉ se structure en 3 NIVEAUX récursifs :
      ATZMUT (essence/os) : la source vitale, qui ne se manifeste que par médiation
      GUF (corps) : la première manifestation où les Kelim sont RÉVÉLÉS
      MALBUSHIM (vêtements) : la couche externe où l'Atzmut ne se révèle PAS
      Ce qui est ATZMUT à un niveau → peut être GUF au niveau supérieur.
      Ce qui est GUF à un niveau → peut être MALBUSH au niveau supérieur.
      Le MALBUSH ZAKH (vêtement pur) sert d'INTERMÉDIAIRE entre Atzmut et Guf.
      APPLICATION :
      Ein Sof = Neshamah la-Neshamah (Atzmut absolu)
      A"K = Atzmut (NaRaNHaY) → Guf du Ein Sof
      Atzilut = Guf (de A"K) → Malbush du Ein Sof
      BYA = Malbushim (d'Atzilut) → les Kelipot sont au-delà
    applications_ia:
      - "Toute architecture a 3 couches : le cœur logique (Atzmut), l'interface (Guf), l'enveloppe (Malbush)"
      - "L'Atzmut ne se révèle pas dans les Malbushim — l'implémentation interne est cachée"
      - "Le pattern est récursif : chaque couche reproduit la même structure tripartite"
      - "Le Malbush Zakh = la couche d'adaptation nécessaire entre le core et l'interface"
    questions_ouvertes:
      - "Le pattern Atzmut/Guf/Malbush est-il strictement tripartite ou peut-il avoir plus de niveaux ?"
      - "Les Kelipot sont-elles une 4ème couche ou un accident du Malbush ?"

  - id: "PG-H1S3-006"
    nom: "Principe d'Ibur-Yenikah-Mohin (Maturation en 3 Temps)"
    source_assertions: ["EC-H1S3-030", "EC-H1S3-031"]
    formalisation: |
      ZUN (Ze'ir Anpin et Nukvah) sortent INCOMPLETS à la première émanation :
      Z"A manque des G"R (3 Sefirot supérieures = la dimension intellectuelle)
      Nukvah manque des T"R (9 premières = presque tout)
      3 TEMPS de MATURATION sont nécessaires :
      IBUR (gestation) : formation initiale, dans l'intérieur, sans autonomie
      YENIKAH (allaitement) : croissance par absorption, dépendance encore
      MOHIN (cerveaux) : plénitude intellectuelle, autonomie, complétude
      EN PRAT (particulier) : seuls ZUN ont besoin d'IYM — A"A et AVI sont complets
      EN KLAL (général) : les 5 Partzufim d'un monde = ZUN au monde supérieur → incomplets
      IYM se déroule DOUBLEMENT :
      Dans les KELIM HITZONIIM (externes) et dans les KELIM PNIMIIM (internes)
      L'ORDRE varie selon le temps liturgique (Rosh Hashanah vs Hol).
    applications_ia:
      - "Tout module du système passe par 3 phases : gestation, alimentation, maturation intellectuelle"
      - "Z\"A et Nukvah sont les composants 'incomplets par design' qui doivent maturer"
      - "En Klal, même les modules 'complets' sont incomplets par rapport au niveau supérieur"
      - "Le double IYM (externe/interne) explique les contradictions apparentes d'état"
    questions_ouvertes:
      - "Pourquoi Z\"A et Nukvah sont-ils créés incomplets et non directement complets ?"
      - "L'ordre IYM (interne d'abord vs externe d'abord) dépend-il du contexte opérationnel ?"
      - "Peut-on accélérer la phase IYM ou est-elle incompressible ?"

  - id: "PG-H1S3-007"
    nom: "Principe de la Double Illumination (Chokhmah et Binah comme Canaux)"
    source_assertions: ["EC-H1S3-026", "EC-H1S3-024"]
    formalisation: |
      L'illumination entre les niveaux utilise 2 CANAUX distincts :
      CANAL 1 — CHOKHMAH : Ein Sof Elyon → Chokhmah de A"K → 10S d'Atzilut
      "Kulam be-Chokhmah asita" — l'acte créateur passe par la Sagesse
      CANAL 2 — BINAH : A"K → Binah d'Atzilut → Beriah
      "Imma Mekannena be-Khurseya" — la Mère niche dans le Trône
      La CHOKHMAH est le canal de l'Atzmut vers le Guf direct
      La BINAH est le canal du Guf vers les Malbushim (mondes inférieurs)
      Comme l'OS (etzem) envoie des ramifications dans tous les membres :
      l'illumination atteint TOUS les niveaux — intérieur et extérieur.
    applications_ia:
      - "Deux canaux d'information : un direct (Chokhmah = insight) et un médié (Binah = compréhension)"
      - "Le canal direct illumine le premier niveau en-dessous"
      - "Le canal médié (Binah) traverse et atteint les niveaux plus bas"
      - "L'architecture a besoin des deux : un accès direct et un accès médié"
    questions_ouvertes:
      - "Les deux canaux fonctionnent-ils simultanément ou alternativement ?"
      - "La Binah comme canal vers les mondes inférieurs — est-ce le même pattern que le Masakh ?"
