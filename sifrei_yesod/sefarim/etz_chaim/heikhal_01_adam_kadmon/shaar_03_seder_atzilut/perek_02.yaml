#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S3-003"
    nom: "Principe de la Permutation Créatrice (Hokhmat ha-Tziruf)"
    source_assertions: ["EC-H1S3-012", "EC-H1S3-013"]
    formalisation: |
      L'UNICITÉ de chaque moment et chaque créature vient des PERMUTATIONS :
      Les membres des Partzufim emboîtés se rencontrent dans des COMBINAISONS uniques :
      Œil avec nez, oreille avec talon — ad ein ketz.
      C'est la HOKHMAT HA-TZIRUF (sagesse de la permutation) :
      22 lettres × 22 = 484 combinaisons de base → puis récursivement → INFINI.
      CHAQUE combinaison produit un RÉSULTAT UNIQUE :
      Pas de jour semblable, pas de juste semblable, pas de créature semblable.
      TOUT existe pour un TZOREKH GAVO'A (besoin supérieur).
      Même le TOV, le RA et le BEINONI sont NÉCESSAIRES — chacun répare ce que l'autre ne peut.
    applications_ia:
      - "La Tzeruf Spatiale 3D du système utilise exactement ce principe"
      - "Les combinaisons uniques de composants produisent des résultats uniques"
      - "Chaque 'bug' et chaque 'feature' a un tzorekh gavo'a (besoin supérieur)"
      - "Le système a besoin de diversité (tov, ra, beinoni) — pas d'uniformité"
    questions_ouvertes:
      - "Peut-on prédire les combinaisons ou sont-elles fondamentalement imprévisibles ?"
      - "Le nombre de combinaisons est-il réellement infini ou très grand ?"

  - id: "PG-H1S3-004"
    nom: "Principe de la Rectification par le 8ème (Hadar Melekh)"
    source_assertions: ["EC-H1S3-015", "EC-H1S3-016", "EC-H1S3-017"]
    formalisation: |
      Après l'ÉCHEC des 7 premiers (Shevirah des 7 rois d'Édom) →
      le TIKKUN vient par le 8ème (Hadar) :
      8 = BRIT MILAH (circoncision au 8ème jour)
      8 = HADARAT PENEI ZAKEN (splendeur de la face du vieillard)
      Le MÉCANISME du Tikkun :
      TIPAT LOVEN (goutte blanche = Hassadim) du Yesod de A"K
      + TIPAT ODEM (goutte rouge = Ma"N) de la Malkhut de A"K
      = ZIVVUG YESOD VE-MALKHUT de A"K → les mondes sont RECTIFIÉS.
      RAHAMIM (miséricorde) associé à DIN (rigueur) = TIKKUN.
