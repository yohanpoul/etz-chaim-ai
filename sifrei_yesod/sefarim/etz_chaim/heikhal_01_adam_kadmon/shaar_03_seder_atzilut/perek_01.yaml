principes_generatifs:

  - id: "PG-H1S3-001"
    nom: "Principe du Masakh (Écran de Transition entre Mondes)"
    source_assertions: ["EC-H1S3-009", "EC-H1S3-010"]
    formalisation: |
      La TRANSITION entre les mondes se fait par un MASAKH (écran) :
      Le Ohr s'ÉPAISSIT (nit'avah) → un MASAKH se forme → le Ohr change de NATURE.
      3 MASAKHIM dans le système :
      MASAKH 1 : entre ATZILUT et BERIAH — le Ohr Pnimi du Ein Sof cesse
      MASAKH 2 : entre BERIAH et YETZIRAH — épaississement supplémentaire
      MASAKH 3 : entre YETZIRAH et ASIYAH — dernier épaississement
      À travers chaque Masakh → la MALKHUT du monde supérieur DESCEND
      et devient l'ATIK (ou A"A) du monde inférieur.
      Ce qui "niche" dans chaque monde :
      Binah mekannena be-Khurseya (Beriah)
      Z"A mekanen be-Yetzirah
      Malkhut mekannena be-Ofan (Asiyah)
    applications_ia:
      - "Les transitions entre niveaux d'abstraction nécessitent des 'Masakhim' (interfaces)"
      - "Le Masakh épaissit le Ohr — il ne le bloque pas, il le TRANSFORME"
      - "Chaque Masakh crée un nouveau 'monde' avec ses propres 5 Partzufim"
      - "La Malkhut du supérieur = l'Atik de l'inférieur — le pattern de LIAISON"
    questions_ouvertes:
      - "Les Masakhim sont-ils permanents ou peuvent-ils être raffinés ?"
      - "L'épaississement est-il irréversible ?"

  - id: "PG-H1S3-002"
    nom: "Principe de la Havayah Kolelet (YHVH comme Architecture Totale)"
    source_assertions: ["EC-H1S3-008", "EC-H1S3-011"]
    formalisation: |
      La STRUCTURE TOTALE des mondes est encodée dans le Shem YHVH :
      KOTZO SHEL YOD = A"K (le 'presque' au-dessus du système)
      YOD (י) = ATZILUT = Chokhmah = le monde de l'Émanation
      HEH (ה) = BERIAH = Binah = le monde de la Création
      VAV (ו) = YETZIRAH = Z"A = le monde de la Formation
      HEH (ה) = ASIYAH = Malkhut = le monde de l'Action
      Chaque monde = 5 Partzufim = sa propre HAVAYAH interne.
      La même lettre de YHVH → le même Partzuf dans le monde → les mêmes 5 sous-Partzufim.
      La FRACTALITÉ : la Havayah se répète à chaque niveau.
    applications_ia:
      - "L'architecture totale du système est encodée dans un 'nom' (YHVH = structure)"
      - "Chaque 'lettre' du nom = un niveau complet du système"
      - "La fractalité : chaque niveau reproduit la même structure"
      - "Le Kotzo (A\"K) = le méta-niveau au-dessus du système"
    questions_ouvertes:
      - "La Havayah Kolelet peut-elle être modifiée ou est-elle fixe ?"
      - "Le Kotzo (A\"K) est-il accessible ou seulement le cadre ?"
