relations:

  - id: "REL-H1S3-001"
    type: séquentiel
    from: es_pnimi_ad_atzilut
    to: masakh_atzilut_beriah
    via: [chokhmah_ak_atzilut, atik_neshamah_aa, chain_hitlabshut]
    nature: "Ein Sof → A\"K → Atik → A\"A → AVI → ZUN (Atzilut) → Masakh → Beriah"
    assertions_source: ["EC-H1S3-001", "EC-H1S3-004", "EC-H1S3-005", "EC-H1S3-006", "EC-H1S3-009"]

  - id: "REL-H1S3-002"
    type: séquentiel
    from: masakh_atzilut_beriah
    to: masakh_3_asiyah
    via: [masakh_2_yetzirah]
    nature: "Beriah (Heh) → Masakh 2 → Yetzirah (Vav) → Masakh 3 → Asiyah (Heh)"
    assertions_source: ["EC-H1S3-009", "EC-H1S3-010"]

  - id: "REL-H1S3-003"
    type: contenance
    from: havayah_kolelet
    to: hamesh_partzufim_atzilut
    nature: "La Havayah Kolelet englobe les 4 mondes + A\"K, chaque monde a 5 Partzufim"
    assertions_source: ["EC-H1S3-008", "EC-H1S3-011"]

  - id: "REL-H1S3-004"
    type: causal
    from: gar_remain
    to: atik_yomin_def
    nature: "Les G\"R de Malkhut de A\"K restent en place, les Z\"T descendent = Atik Yomin"
    assertions_source: ["EC-H1S3-005"]

  - id: "REL-H1S3-005"
    type: dualité_structurelle
    paire: [raglayim_shavin, rashim_nifradim]
