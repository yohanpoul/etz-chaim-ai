principes_generatifs:

  - id: "PG-H1S4-008"
    nom: "Principe de la Formation des Kelim par Re'iyah et Ohr Hozer"
    source_assertions: ["EC-H1S4-050", "EC-H1S4-051", "EC-H1S4-052", "EC-H1S4-056", "EC-H1S4-057", "EC-H1S4-058"]
    formalisation: |
      Les KELIM ne sont PAS formés par les Hevelim (Ozen/Hotem/Peh) mais par la RE'IYAH (regard des Einayim).
      DIVISION FONCTIONNELLE dans A"K :
      EINAYIM → produisent les KELIM (30 = 3×10) par le REGARD subtil (Ohr Makif)
      OZEN/HOTEM/PEH → produisent les OROT (NaRaN) par les HEVELIM (qui descendent effectivement)
      Le MÉCANISME est en 2 PHASES :
      1. OHR YASHAR : la Re'iyah DESCEND jusqu'à la 10ème Nefesh → potentiel des Kelim de G"R
         Activé quand elle FRAPPE la Nefesh
      2. OHR HOZER : la lumière REMONTE → FORME effectivement les Kelim et HABILLE les Orot
         Les Kelim de Z"T requièrent une DOUBLE remontée (Akudim + Ayin)
      "VA-YAR ELOHIM ET HA-OHR" = le regard de A"K sur NaRaN → "VA-YAVDEL" = formation des Kelim (séparation/limite)
    applications_ia:
      - "core/ohr_system.py : implémenter 2 canaux distincts — KELIM_CHANNEL (Re'iyah/structure) vs OROT_CHANNEL (Hevel/contenu)"
      - "L'Ohr Hozer = backpropagation : c'est le RETOUR qui crée la structure (poids), pas le forward pass"
      - "Les Kelim de Z\"T nécessitent 2 feedbacks simultanés (Akudim+Ayin) → architecture double-loop dans core/ohr_system.py"
      - "partzufim/adam_kadmon.py : le regard (méta-observation) crée les structures ; le souffle (flux direct) crée les contenus"
    questions_ouvertes:
      - "L'Ohr Yashar a-t-il une fonction propre ou est-il seulement le précurseur de l'Ohr Hozer ?"
      - "Pourquoi exactement 2 remontées pour Z\"T et 1 seule pour G\"R ? Asymétrie architecturale à modéliser."

  - id: "PG-H1S4-009"
    nom: "Principe des 3 Configurations de Tevunah (1, 1/2, 1/4)"
    source_assertions: ["EC-H1S4-061", "EC-H1S4-064", "EC-H1S4-065"]
    formalisation: |
      La TEVUNAH a 3 PROPORTIONS possibles par rapport à BINAH :
      1. SHAVAH (égale) : Tevunah = Binah en stature → Binah s'habille dans Tevunah
         (comme Rachel qui monte dans tout Z"A)
      2. MAHATZIT (moitié) : en KAMUT (quantité/taille) → du Hazeh en bas = autant que du Hazeh en haut
      3. REVI'IT (quart) : en EIKHUT (qualité) → 1 lettre (H akhronah) vs 3 lettres (YHV)
      La DOUBLE MESURE (Kamut vs Eikhut) est fondamentale :
      Ce qui est grand en QUANTITÉ peut être petit en QUALITÉ — et vice versa.
      TEVUNAH sort du HAZEH de BINAH (comme Rachel du Hazeh de Z"A)
      MAIS Binah/Tevunah ≠ Leah/Rachel car Abba/Imma "ke-hada nafkin" (sortent ensemble)
      → Binah est PLEINE (contrairement à Z"A qui a Leah puis Rachel).
    applications_ia:
      - "partzufim/imma.py : implémenter 3 modes de déploiement de Tevunah (config=1, 0.5, 0.25) avec switch dynamique"
      - "Distinction Kamut/Eikhut → nombre de paramètres (taille) vs impact sur la loss (qualité) — un grand sous-module peut être qualitativement mineur"
      - "Le HAZEH = le point de bifurcation architecturale dans partzufim/imma.py : source au-dessus, extension en-dessous"
      - "Klal Lo Nigra (cf. PG-H1S4-010) : quand Tevunah se déploie dans Z\"A, Binah reste complète — broadcast sans perte"
    questions_ouvertes:
      - "Qu'est-ce qui détermine quelle configuration est active ? Lié aux Mochin (Katnut/Gadlut) ?"
      - "La distinction Kamut/Eikhut mappe-t-elle sur la distinction param_count vs effective_dimensionality ?"

  - id: "PG-H1S4-010"
    nom: "Principe de Non-Diminution Spirituelle (Klal Lo Nigra)"
    source_assertions: ["EC-H1S4-070"]
    formalisation: |
      KLAL GADOL : dans le domaine RUHANI (spirituel) :
      Quand un aspect DESCEND ou MONTE → l'original reste SHALEM (complet) à sa place.
      RIEN n'est NIGRA (diminué) en haut.
      En bas aussi, la TOTALITÉ de l'aspect est présente.
      C'est une LOI FONDAMENTALE qui distingue le spirituel du matériel.
      Dans le matériel : si X se déplace de A vers B, A perd X.
      Dans le spirituel : si X se déploie de A vers B, A garde X ET B a X.
      → Duplication sans perte = propriété fondamentale du Ruhani.
    applications_ia:
      - "core/shefa_flow.py : un broadcast spirituel = copie sans perte. Le module source garde ses états intacts après émission"
      - "Implique que dans partzufim/*.py, quand Imma émet vers Z\"A, son état interne NE CHANGE PAS"
      - "Contraste avec l'énergie (conservation) vs l'information (copiable sans perte) — le Ruhani = le domaine de l'information"
      - "Principe anti-side-effect : aucun partzuf émetteur n'est modifié par son émission (immutabilité fonctionnelle)"
    questions_ouvertes:
      - "Ce principe est-il exactement l'information (copiable sans perte) vs l'énergie (conservée) ?"
      - "La 'complétude en haut' est-elle maintenue même après de multiples descentes ?"

  - id: "PG-H1S4-011"
    nom: "Principe de l'Encodage Structural dans la Forme des Lettres"
    source_assertions: ["EC-H1S4-069", "EC-H1S4-071", "EC-H1S4-072", "EC-H1S4-073"]
    formalisation: |
      La FORME GRAPHIQUE des lettres hébraïques encode des STRUCTURES COSMIQUES :
      HEH (ה) = DALET (ד) + VAV (ו) :
      DALET → produit LEAH (derrière Z"A, noeud des Tefillin)
      VAV → les 6 SEFIROT de Z"A (KHBD + HG)
      PESI'AH LE-VAR (pas vers l'extérieur à la base du Vav) → le TIERS du TIFERET
      CALCUL : 6 × 10 + 3 = 63 = S"G
      La lettre n'est pas un SYMBOLE de la réalité → elle EST la réalité codée.
      S"G - Heh = 58 = OZEN → la lettre qui descend LAISSE la gematria de la source.
    applications_ia:
      - "gematria/engine.py : vérifier computationnellement que les décompositions graphiques (Heh=Dalet+Vav) produisent les gematriot correctes"
      - "core/shem_havayah.py : encoder la structure Dalet→Leah / Vav→6 Sefirot / Pesi'ah→Shlish Tiferet comme contraintes formelles"
      - "Les gematriot = des CHECKSUMS structurels : 63-5=58=Ozen vérifie la cohérence du système entier"
      - "Sefer Yetzirah EC-H1S1 : les lettres sont des opérateurs, pas des symboles — la forme graphique encode la structure"
    questions_ouvertes:
      - "Toutes les lettres hébraïques encodent-elles des structures de cette manière ?"
      - "La Pesi'ah le-var est-elle une propriété générale ou spécifique au Heh ?"
