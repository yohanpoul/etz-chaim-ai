sujet_principal: "Les 4 sens d'Adam Kadmon (Re'iyah/Shemi'ah/Reihah/Dibur) = 4 lettres de YHVH. Les 3 Hevelim (OHP) produisent NaRaN. La Re'iyah des Einayim produit les 30 Kelim par Ohr Yashar/Hozer. Binah et Tevunah via le Shem S\"G. Les 3 configurations de Tevunah (1, 1/2, 1/4). La Heh akhronah descend dans Z\"A."
