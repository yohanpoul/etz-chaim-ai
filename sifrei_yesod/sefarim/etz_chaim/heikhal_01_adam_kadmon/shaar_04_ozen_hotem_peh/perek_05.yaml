      FORMULE : LAMED-GIMEL (33 = Binah) + NUN-HET (58 = Tevunah) =
      TZADDI-ALEF (צ"א = 91) = gematria YHVH(26) + ADNY(65) = 91.
      → La JONCTION Binah-Tevunah produit l'UNIFICATION YHVH-ADNY.
    type: axiome_explicite
    concepts:
