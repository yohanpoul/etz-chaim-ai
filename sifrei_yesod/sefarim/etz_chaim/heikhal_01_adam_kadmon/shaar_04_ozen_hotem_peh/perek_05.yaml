  - id: "EC-H1S4-120"
    source_he: "גם בזה תבין איך כל סוד הבינה הם קולות הנשמעים באז\"ן ואלו הם מ\"ש בסוד ה' עינוים דיוה\"כ שאז אין מלכות ות\"ת נזונים אלא מסוד קולות לא מסוד אכילה ושתיה"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Tout le SECRET de BINAH = des KOLOT (קולות — voix/sons) ENTENDUS dans l'OZEN.
