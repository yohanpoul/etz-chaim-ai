principes_generatifs:

  - id: "PG-H1S4-016"
    nom: "Principe de la Triple Identité Alef=Binah=Ozen"
    source_assertions: ["EC-H1S4-114", "EC-H1S4-117"]
    formalisation: |
      Trois entités apparemment distinctes sont structurellement IDENTIQUES :
      ALEF (א) → forme = 32+1 = 33 (Yod-Vav en haut + Yod-Vav en bas + kolel)
      BINAH (בינה) → le résidu dans Binah après descente = 33
      OZEN (אזן) → selon le Sefer HaBahir, l'oreille a la FORME de l'Alef
      L'identité n'est PAS métaphorique — elle est FORMELLE :
      même valeur numérique, même forme graphique, même fonction (compréhension/audition).
      Le BAHIR (source : Bahir §58/Kaplan) affirme le lien VISUEL : la forme de l'oreille
      humaine ressemble à la forme de la lettre Alef.
    applications_ia:
      - "gematria/engine.py : implémenter les vérifications d'identité triple (valeur + forme + fonction convergentes)"
      - "partzufim/imma.py : Binah est accessible via 3 interfaces : Alef (lettre), Binah (sefirah), Ozen (organe/canal)"
      - "La triple identité = 3 perspectives sur le même objet — pattern de vues multiples en architecture"
    questions_ouvertes:
      - "D'autres sefirot ont-elles des triples identités lettre/sefirah/organe aussi précises ?"
      - "La forme de Alef est-elle unique parmi les lettres pour ce type de correspondance morphologique ?"

  - id: "PG-H1S4-017"
    nom: "Principe du Kuf (100) comme Complétude Structurelle"
    source_assertions: ["EC-H1S4-109", "EC-H1S4-110", "EC-H1S4-116", "EC-H1S4-118"]
    formalisation: |
      Le nombre 100 (KUF) apparaît comme VÉRIFICATION DE COMPLÉTUDE dans 4 calculs :
      1. BINAH directe : 33 + 68 = 101 → 100 (kolel)
      2. TEVUNAH : 58 + 42 = 100
      3. ALEPHS : 3 × 33 = 99 → 100 (kolel)
      4. ADNY : 65 + 34 lettres = 99 → 100 (kolel)
      Chaque voie INDÉPENDANTE converge vers le même 100.
      Le KUF = le "CHECKSUM" structurel : si le calcul n'arrive pas à 100, la structure est incomplète.
      Les 100 ADANIM (socles) du Mishkan = les 100 fondations de la structure.
      Les 100 BERAKHOT (bénédictions) quotidiennes = la même complétude.
    applications_ia:
      - "gematria/engine.py : implémenter le test de complétude — si la somme des parties d'un sous-système ≠ 100 (±kolel), la structure est incohérente"
      - "partzufim/imma.py : Binah doit toujours atteindre 100 comme vérification d'intégrité"
      - "[PLANNED] core/shem_havayah.py : les 4 voies vers 100 = 4 tests de cohérence indépendants"
      - "Pattern checksum : multiple chemins vers le même total = robustesse structurelle"
    questions_ouvertes:
      - "Le kolel (±1) est-il toujours légitime ou seulement dans certains contextes ?"
      - "D'autres totaux (comme 72, 216, 248, 365) servent-ils aussi de checksums ?"

  - id: "PG-H1S4-018"
    nom: "Principe d'Unification YHVH-ADNY par Jonction Binah-Tevunah"
    source_assertions: ["EC-H1S4-121", "EC-H1S4-122"]
    formalisation: |
      BINAH seule = seulement YHVH (26) = le BEN (fils) = la dimension intérieure.
      TEVUNAH seule = 58 = la structure déployée mais sans nom propre.
      BINAH + TEVUNAH = YHVH(26) + ADNY(65) = 91 = BEN U-BAT (fils ET fille).
      La gematria vérifie : 33 + 58 = 91 = 26 + 65.
      L'UNIFICATION (Yihud) se produit SEULEMENT quand les deux se CONNECTENT.
      Séparément → chacun est incomplet. Ensemble → le YIHUD est réalisé.
      ADNY n'existe pas dans Binah seule → il ÉMERGE de la connexion.
    applications_ia:
      - "partzufim/imma.py : Binah (module principal) + Tevunah (extension) = ensemble complet. L'interface ADNY n'existe que quand les deux sont connectés"
      - "[PLANNED] core/shem_havayah.py : modéliser le YIHUD comme émergence d'un nouveau Shem quand deux modules se connectent"
      - "Pattern compositional : les propriétés émergentes n'existent que dans la composition, pas dans les composants isolés"
      - "La distinction Ben/Bat = l'aspect émetteur (YHVH) + l'aspect récepteur (ADNY) comme couple fonctionnel"
    questions_ouvertes:
      - "Ce pattern de Yihud (émergence par composition) est-il universel dans tous les Partzufim ?"
      - "D'autres paires de Shemot émergent-elles de jonctions spécifiques ?"

  - id: "PG-H1S4-019"
    nom: "Principe de Convergence OZEN-HOTEM (58+5=63=63)"
    source_assertions: ["EC-H1S4-110", "EC-H1S4-124"]
    formalisation: |
      OZEN (אזן = 58) + HEH (5) = 63.
      HOTEM (חוטם) = gematria 63.
      Les deux CANAUX SENSORIELS d'A"K (oreille et nez) convergent vers la MÊME valeur.
      Ce n'est PAS une coïncidence — c'est une VÉRIFICATION STRUCTURELLE :
      la sortie de Tevunah (OZEN) + le Heh descendu = l'entrée du Hotem.
      Le S"G (63) est le DÉNOMINATEUR COMMUN des deux canaux.
      Le Heh est l'INTERFACE entre les deux : il complète l'OZEN et il EST le HOTEM.
    applications_ia:
      - "gematria/engine.py : vérifier la convergence 58+5=63=HOTEM comme contrainte de cohérence entre modules"
      - "partzufim/imma.py → partzufim/zeir_anpin.py : le pont Binah→Z\"A passe par le Heh qui transforme OZEN en HOTEM"
      - "Le S\"G (63) comme protocole commun entre modules — même 'format de données' pour deux canaux différents"
    questions_ouvertes:
      - "Le PEH (bouche) a-t-il aussi une convergence numérique avec OZEN ou HOTEM ?"
      - "La valeur 63 encode-t-elle une propriété spécifique du canal Binah→Z\"A ?"
