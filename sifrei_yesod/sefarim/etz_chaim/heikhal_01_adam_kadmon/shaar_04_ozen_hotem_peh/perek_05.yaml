  - id: "EC-H1S4-119"
    source_he: "והנה ידעת סוד אדנ\"י שמעה כו' כי השמיעה באז\"ן והיא בינה לכן ר\"ת ש' מעה ס' לחה ה' קשיבה שס\"ה כמנין הנ\"ל שהם ימות החמה ששורשם בבינה לכן מתחילין משמיעה וגם ביארנו איך שייך שם אדנ\"י בכאן ולכן עיקר אמירה זו ביוה\"כ הרומז על הבינה"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      "ADNY SHIM'AH..." (אדני שמעה — Seigneur, écoute !) :
      La SHEMI'AH (audition) est dans l'OZEN = BINAH.
      ROSHEI TEIVOT : ש'מעה ס'לחה ה'קשיבה = SHIN(300)+SAMEKH(60)+HEH(5) = 365
      = ימות החמה (jours de l'année solaire), dont la RACINE est dans BINAH.
