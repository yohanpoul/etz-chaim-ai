  - id: "EC-H1S4-122"
    source_he: "והוא כי בבינה עצמה עדיין לא יש חשבון אדנ\"י רק חשבון של שם הוי\"ה אך בהתחברותה עם התבונה אז שם הוי\"ה אדנ\"י הוא בן ובת והוא כי ל\"ג דבינה עם נ\"ח דתבונה הם צ\"א כמנין הוי\"ה אדנ\"י"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Dans BINAH seule → pas encore le SHEM ADNY, seulement le SHEM YHVH.
      YHVH = le BEN (fils) seul.
