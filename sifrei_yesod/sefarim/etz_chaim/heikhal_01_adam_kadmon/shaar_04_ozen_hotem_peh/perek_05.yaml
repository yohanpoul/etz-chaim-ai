  - id: "EC-H1S4-118"
    source_he: "ואמרנו איך מן הל\"ג הזה נמשכו ג' אלפין שהוא ק'. וק' זה הוא שורשו מאדנ\"י העליון אשר בכאן והם סוד מאה אדנים אשר ידעת ביאורם שהוא אדנ\"י גי' ס\"ה ועם מילוי המלוי שלו שהן ל\"ד אותיות הן צ\"ט כמנין ג' ל\"ג הנ\"ל ועם כללותם הרי ק'"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
