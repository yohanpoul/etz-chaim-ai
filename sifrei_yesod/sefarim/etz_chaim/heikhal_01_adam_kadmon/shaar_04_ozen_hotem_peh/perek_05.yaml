assertions:

  # ─── BLOC A : LE NUN DE OZEN = 25 × 2 = 50 ───

  - id: "EC-H1S4-104"
    source_he: "והנה לעיל פירשנו כסדרן והוא ממטה למעלה אז\"ן וכבר ביארנו טעם של א\"ז מאז\"ן ועתה נבאר ן' מאז\"ן איך הוא עיקרית מכל"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      TRANSITION depuis perek 4 (cf. EC-H1S4-098) : nous avons expliqué
      l'ordre de BAS en HAUT = A-Z-N, et le A"Z (cf. EC-H1S4-096).
      MAINTENANT : le NUN (ן = 50) de AZeN → comment il est le IKAR
      (עיקרית — l'essentiel) de TOUT.
    type: axiome_explicite
    concepts:
      - {id: nun_ikar_development, role: developpement_du_nun_essentiel}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: []
      relevance: "Lien avec EC-H1S4-098 : le Nun (50) est le corps principal, développé ici"

  - id: "EC-H1S4-105"
    source_he: "והנה הלא כאשר נמנה עיקר כל אלו אינם רק כ\"ה והוא כי ה' אחרונה כבר ירדה למטה ולא נשאר בה רק ב' ההי\"ן למעלה ואותיות וא\"ו הרי כ\"ג וב' חלקים מן י' דה\"י עילאה שירדה תוך וא\"ו הרי כ\"ה"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Quand on COMPTE l'essence (IKAR) de tout cela → seulement 25.
      CALCUL : le Heh AKHRONAH (dernier) est déjà descendu en bas.
      Ce qui RESTE en haut : 2 HEHS + les lettres VAV = 23.
      + 2 PARTS du YOD (de HY supérieure, descendues dans le Vav, cf. EC-H1S4-087) = 25.
    type: axiome_explicite
    concepts:
      - {id: ikar_25, role: essence_egale_25}
      - {id: remaining_above, role: ce_qui_reste_en_haut}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "Le IKAR = 25 = la structure essentielle après filtrage de ce qui est descendu"

  - id: "EC-H1S4-106"
    source_he: "הוא כ\"ה אתוון דק\"ש לכן שמע הם לשון שמיעה להורות שכולם תלויים באזן לכן הקורא את שמע צריך להשמיע לאזניו כי משם מציאותה"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Les 25 = les 25 LETTRES de KERIAT SHEMA (קריאת שמע — récitation du Shema).
      "SHEMA" (שמע) = langue de SHEMI'AH (שמיעה — audition) → TOUT dépend de l'OZEN.
      Conséquence HALAKHIQUE : celui qui lit le SHEMA doit le faire ENTENDRE À SES OREILLES
      (להשמיע לאזניו), car c'est DE LÀ que vient sa RÉALITÉ (metzi'utah).
    type: déduction_scripturaire
    concepts:
      - {id: kh_letters_shema, role: 25_lettres_du_shema}
      - {id: shema_hearing, role: shema_egal_audition}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: []
      relevance: "Les 25 lettres du Shema = la structure essentielle de la TEVUNAH. Audition = réception de la structure."

  - id: "EC-H1S4-107"
    source_he: "אמנם כ\"ה אלו מוכרח שיהיה בהם פנימיות וחיצו' שהם ן' וז\"ס ויפן כ\"ה וכ\"ה והם ב' יחודים שמע ובשכמל\"ו של ק\"ש כנודע והנה אלו הם הנו\"ן פשוטה של אזן שהוא עיקרית וח' אחרים הם דרך תוס' וגם הם נחלקים לב' שהם א\"ז מאזן"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Les 25 doivent avoir PNIMIYUT et HITZONIYUT = 25 + 25 = 50 = NUN.
      SECRET SCRIPTURAIRE : "VA-YIFEN KO VA-KHO" (ויפן כה וכה — il se tourna de ce côté et de l'autre,
      Shemot 2:12) = 2 × 25.
      Les 2 YIHUDIM du SHEMA : "SHEMA YISRAEL" + "BARUKH SHEM KEVOD MALKHUTO LE-OLAM VA-ED."
      → Ce sont la NUN PESHUTAH (ן — Nun droite = 50) de OZEN = le IKAR.
      Les 8 AUTRES = ajout supplémentaire, aussi divisés en 2 = A"Z (cf. EC-H1S4-096).
    type: axiome_explicite
    concepts:
      - {id: nun_50_explained, role: nun_egal_25_pnimiyut_plus_25_hitzoniyut}
      - {id: vayifen_ko_vakho, role: verset_2x25}
      - {id: two_yihudim_shema, role: shema_plus_barukh_shem}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: []
      relevance: "Le NUN = Pnimiyut(25) + Hitzoniyut(25) = la dualité intérieur/extérieur appliquée à la structure principale"

  # ─── BLOC B : LE 100 (KUF) DE BINAH ET TEVUNAH ───

  - id: "EC-H1S4-108"
    source_he: "ואמנם כבר ידעת כי הבינה היא י' [נ\"א היא ד\"ו] ספירות וכ\"א כלולה מי' הרי ק' סוד אותיות מ\"ס שהם בבינה ותבונה סוד ק'"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      BINAH = 10 SEFIROT (chacune inclut 10 = 100 = KUF).
      Variante (Nusah Aher) : BINAH = 6 SEFIROT (ד"ו = Dalet-Vav = 6).
      Le secret des lettres MEM-SAMEKH (מ"ס = 40+60 = 100) =
      dans BINAH et TEVUNAH = secret du KUF (100).
      Les 2 lettres FERMÉES (Mem Setumah et Samekh) = les 2 aspects de Binah/Tevunah.
    type: axiome_explicite
    concepts:
      - {id: binah_100, role: binah_10x10_egal_100}
      - {id: mem_samekh_secret, role: mem_samekh_egal_100}
      - {id: nusah_aher_06, role: variante_10_vs_6_sefirot}
    mapping:
      modules: ["gematria/engine.py", "partzufim/imma.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "Le 100 de Binah = structure complète (10×10). Les lettres fermées Mem/Samekh = les contenants parfaits"

  - id: "EC-H1S4-109"
    source_he: "אמנם כאשר תחבר כל החלקים אלו יהיה ק' כיצד ה' לתתא ונ\"ח באמצע וה' עלאה הרי ס\"ח. ואמנם נשאר למעלה בסוד הבינה חשבון ל\"ג כי הורדנו מן יו\"ד של ה' עלאה ב' חלקים ממנו לפנימיות ג' הנשארים מן הוא\"ו ונעשה ה' עלאה כנ\"ל ונשאר למעלה בבינה יו\"ד ה\"י גימ' ל\"ה וכאשר תסיר ב' חלקים מהם נשארו ל\"ג. ל\"ג וס\"ח הרי ק\"א הרי שכל בחי' אלו הם ק' עם הכולל"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      CALCUL DU 100 PAR PARTIES :
      HEH TATA (5) + NUN-HET au milieu (58) + HEH EILA (5) = 68.
      RESTANT en BINAH en haut : le SHEM a YOD(10) + HEH-YOD(15) = 35.
      Moins les 2 parts descendues (cf. EC-H1S4-087) = 33 (LAMED-GIMEL).
      TOTAL : 33 + 68 = 101 = 100 avec le KOLEL (כולל — 1 ajouté pour la totalité).
      → TOUTES ces parties = KUF (100).
    type: axiome_explicite
    concepts:
      - {id: lamed_gimel_33, role: 33_restant_en_binah}
      - {id: total_100_kolel, role: 101_egal_100_avec_kolel}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "Le 100 = vérification de complétude : toutes les parties se recombinent en un total cohérent"

  - id: "EC-H1S4-110"
    source_he: "הנה גם בתבו' צריך שיהיו כל הק' ברכאן כנ\"ל עד\"ז והוא שכבר ביארנו סוד הנ\"ח מה עניינם והנה הה' המתפשטת בז\"א הוא מ\"ב ונ\"ח הרי ק'"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Aussi dans TEVUNAH → il faut les 100 BIRKHOT (bénédictions).
      Le HEH qui s'étend dans Z"A = MEM-BET (מ"ב = 42).
      NUN-HET (58) + MEM-BET (42) = KUF (100).
      → Le 100 de TEVUNAH : 58 (structure interne) + 42 (extension dans Z"A) = 100.
    type: axiome_explicite
    concepts:
      - {id: heh_42, role: heh_dans_za_egal_42}
      - {id: tevunah_100, role: 58_plus_42_egal_100}
      - {id: meah_berakhot, role: 100_benedictions}
    mapping:
      modules: ["gematria/engine.py", "partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: []
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Le 100 de Tevunah = structure(58) + extension(42) — vérification de complétude dans le sous-système"

  # ─── BLOC C : LE HEH = 42 LETTRES = S"G COMPLET ───

  - id: "EC-H1S4-111"
    source_he: "ועתה נבאר איך ה' זו מתפשטת למ\"ב והוא כי כבר הודעתיך כי צורת ה' לפעמים בצורה זו ה' שהם ג' קוים נה\"י. וה' בכל א' שצורתה ד\"י הרי ג\"פ י\"ד גימטריא מ\"ב"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Comment le HEH s'étend à 42 :
      La FORME du HEH = parfois 3 LIGNES (kavim) = NETZAH-HOD-YESOD (NHY).
      Chaque ligne a un HEH en forme de DALET-YOD (ד"י = 14).
      CALCUL : 3 × 14 = 42 (MEM-BET).
      → La FORME GRAPHIQUE de la lettre encode la VALEUR NUMÉRIQUE de son extension.
    type: axiome_explicite
    concepts:
      - {id: heh_3_lines_nhy, role: heh_3_lignes_nhy}
      - {id: dalet_yod_14, role: chaque_ligne_egal_14}
      - {id: heh_42_form, role: forme_du_heh_egal_42}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "La forme graphique comme encodage structural — chaque trait de la lettre porte une valeur computationnelle"

  - id: "EC-H1S4-112"
    source_he: "וגם סוד הענין הוא מ\"ב אתוון שיש בשם ס\"ג שהוא פשוט ומלא ומלא דמלא כזה יהו\"ה, יו\"ד ה\"י וא\"ו ה\"י, יו\"ד וא\"ו דל\"ת, ה\"י יו\"ד, וא\"ו אל\"ף וא\"ו, ה\"י יו\"ד וכל שם ס\"ג נרמז בה' זו לבדה הרי שהוא מ\"ב אתוון ועם הנ\"ח הרי ק'"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Aussi : les 42 LETTRES du SHEM S"G dans ses 3 NIVEAUX d'expansion :
      PASHUT (simple) : י-ה-ו-ה = 4 lettres
      MALE (miluy) : יו"ד ה"י וא"ו ה"י = 10 lettres
      MALE DE-MALE (miluy demiluy) : יו"ד וא"ו דל"ת, ה"י יו"ד, וא"ו אל"ף וא"ו, ה"י יו"ד = 28 lettres
      TOTAL : 4 + 10 + 28 = 42.
      TOUT le Shem S"G est CONTENU dans ce HEH seul.
      42 (Heh) + 58 (NuN-Het) = 100 (KUF).
    type: axiome_explicite
    concepts:
      - {id: sg_42_letters, role: 3_niveaux_expansion_sg_42}
      - {id: pashut_male_male_demale, role: simple_miluy_miluy_demiluy}
    mapping:
      modules: ["gematria/engine.py", "[PLANNED] core/shem_havayah.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "L'expansion en 3 niveaux (simple/miluy/miluy demiluy) = 3 couches de résolution du même encodage"

  - id: "EC-H1S4-113"
    source_he: "גם יש סוד אחר בענין ה' הנעשה צורת ד\"י והוא כי כאן היה סוד שאמר לעולמו די והוא כי הלא שד\"י שהוא יסוד דבינה הוא מתפשט בז\"א עד החזה שלו לבד ושם הוא שאמר לעולמו די לכן ה' זו צורת די. וגם טעם אחר כי נגד נה\"י דבינה יצאה לאה עד החזה לבדו וזהו טעם שאמר לעולמו די ע\"י יסוד דבינה שנפסק שם"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Autre SECRET du HEH en forme de DALET-YOD (ד"י = DAI) :
      Ici est le secret de "AMAR LE-OLAMO DAI" (אמר לעולמו די — Il dit à Son monde : ASSEZ).
      SHADDAI (שד"י) = YESOD de BINAH → s'étend dans Z"A SEULEMENT jusqu'au HAZEH.
      Là, Il dit DAI (assez) = LIMITE de l'extension.
      → Le HEH a la forme DAI (ד"י).
      AUTRE RAISON : face aux NHY de BINAH → LEAH émerge seulement jusqu'au HAZEH.
      Le YESOD de BINAH SE COUPE LÀ → "dit à Son monde DAI."
    type: axiome_explicite
    concepts:
      - {id: dai_limit, role: secret_de_amar_dai}
      - {id: shaddai_yesod_binah, role: shaddai_egal_yesod_de_binah}
      - {id: leah_hazeh_limit, role: leah_jusqu_au_hazeh}
    mapping:
      modules: ["partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin", "leah"]
      relevance: "DAI = limite d'extension = le point où un module cesse de se déployer dans le suivant. Le HAZEH comme frontière."

  # ─── BLOC D : LE 33 DE BINAH = ALEF = 3 S"G ───

  - id: "EC-H1S4-114"
    source_he: "ונחזור עתה לבאר ל\"ג הנשאר משם ס\"ג דבינה ודע כי אלף צורתה ל\"ב כזה א' י\"ו למעלה י\"ו למטה כמבואר אצלינו בסוד ל\"ב שיניים וכללותם הרי ל\"ג. נמצא כי בינה הוא ל\"ג והוא אלף וז\"ס משרז\"ל אלף בינה"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Le 33 RESTANT dans BINAH (cf. EC-H1S4-109) :
      La FORME de la lettre ALEF = LAMED-BET (ל"ב = 32) :
      YOD-VAV (10+6=16) en HAUT + YOD-VAV (16) en BAS = 32.
      (Lien avec les 32 SHINAYIM — 32 dents, et les 32 NETIVOT de HOKHMAH.)
      Avec le KOLEL = 33.
      DONC : BINAH = 33 = ALEF.
      SECRET DES HAZAL : "ALEF BINAH" (אלף בינה) = "apprends la compréhension" →
      mais aussi ALEF EST BINAH (l'Alef = la lettre de Binah).
    type: axiome_explicite
    concepts:
      - {id: alef_32_form, role: forme_alef_egal_32}
      - {id: binah_33_alef, role: binah_egal_33_egal_alef}
      - {id: alef_binah_hazal, role: drash_alef_binah}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "La forme de Alef = 32+1 = 33 = Binah. La lettre encode la sefirah qu'elle représente."

  - id: "EC-H1S4-115"
    source_he: "והנה אלף במלואה אל\"ף למ\"ד פ\"א גימ' רס\"ו וכשמחלקים לג' חלקים יהיה פ\"ט פ\"ט פ\"ט והנה פ\"ט עולה ס\"ג עם השם עצמו העולה כ\"ו גימ' פ\"ט הרי כי ברס\"ו שהוא אל\"ף במילוי מילואו יש ג' שמות ס\"ג וג' שמות הוי\"ה"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      ALEF en MILUY : אל"ף + למ"ד + פ"א = 111 + 74 + 81 = RES-SAMEKH-VAV (רס"ו = 266).
      Divisé en 3 (avec KOLEL : 266+1=267) : PEH-TET (פ"ט = 89) × 3.
      89 = S"G (63) + YHVH (26).
      → Dans le 266 de ALEF : 3 SHEMOT S"G + 3 SHEMOT YHVH.
      Les 3 S"G de BINAH correspondent aux 3 S"G de TEVUNAH (cf. EC-H1S4-103).
    type: axiome_explicite
    concepts:
      - {id: alef_miluy_266, role: alef_miluy_egal_266}
      - {id: three_sg_three_yhvh, role: 3_sg_plus_3_yhvh_dans_alef}
      - {id: peh_tet_89, role: 89_egal_63_plus_26}
    mapping:
      modules: ["gematria/engine.py", "[PLANNED] core/shem_havayah.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "L'Alef encode 3 paires (S\"G+YHVH) = la structure de Binah contient 3 instances du même pattern"

  - id: "EC-H1S4-116"
    source_he: "והנה ידעת כי ג' שמות הוי\"ה הם ג' אלפין כי אות א' צורתה כ\"ו כזה יוי א' הרי שברס\"ו הנ\"ל יש ג' ס\"ג וג' אלפין וכבר אמרנו כי כל אלף גימ' ל\"ג וג\"פ ל\"ג לל\"ג גימ' ק' (ע\"ה)"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      3 SHEMOT YHVH = 3 ALEPHS (car ALEF a la FORME de 26 = YOD-VAV-YOD = 10+6+10 = 26 = YHVH).
      Dans le 266 : 3 S"G + 3 ALEPHS.
      Chaque ALEF = gematria 33 (cf. EC-H1S4-114).
      3 × 33 = 99 (+1 KOLEL) = KUF (100).
      → Le 100 de BINAH SUPÉRIEURE est le même 100 que celui de TEVUNAH (cf. EC-H1S4-110).
    type: axiome_explicite
    concepts:
      - {id: alef_form_26, role: alef_forme_yvy_egal_26}
      - {id: three_alefs_100, role: 3x33_plus_kolel_egal_100}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "Le 100 dérivé de deux voies différentes (Binah et Tevunah) converge — vérification croisée"

  # ─── BLOC E : CONNECTIONS — ADNY, 365, OZEN=ALEF ───

  - id: "EC-H1S4-117"
    source_he: "ואמנם ק' זו עם רס\"ו הנ\"ל הם שס\"ו וזה שס\"ה מנין ימות החמה, וכבר הודעתיך כי אל\"ף הוא בינה וגם ידעת כי בינה היא אז\"ן גם ידעת מ\"ש בספר הבהיר כי אז\"ן צורת אל\"ף והוא מובן עם הנ\"ל"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      KUF (100) + 266 = SHIN-SAMEKH-VAV (שס"ו = 366) ≈ 365 (KOLEL) =
      nombre de JOURS de l'ANNÉE SOLAIRE (ימות החמה).
      CHAÎNE D'IDENTITÉ : ALEF = BINAH, BINAH = OZEN.
      Le SEFER HA-BAHIR affirme : OZEN (oreille) a la FORME de ALEF.
      → ALEF = BINAH = OZEN → la même structure sous 3 noms.
      Compréhensible avec tout ce qui précède.
    type: axiome_explicite
    concepts:
      - {id: chain_alef_binah_ozen, role: identite_triple_alef_binah_ozen}
      - {id: solar_year_365, role: lien_avec_annee_solaire}
      - {id: bahir_ozen_alef, role: citation_sefer_habahir}
    mapping:
      modules: ["gematria/engine.py"]
