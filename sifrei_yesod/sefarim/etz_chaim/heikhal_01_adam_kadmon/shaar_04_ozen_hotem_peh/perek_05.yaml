      relevance: "Le canal de Binah = traitement auditif/informationnel, pas matériel. Yom Kippour = mode purement informationnel."

  # ─── BLOC F : TEVUNAH, BINAH+TEVUNAH, 370 NEHORIN, HOTEM ───

  - id: "EC-H1S4-121"
    source_he: "גם תבין כי הלא התבונה היא ה' אחרונה של בינה ותבין בזה מש\"כ בתקו' מל' נפש תבונה כי תבונה היא בחי' מל' ובחי' נפש של הבינה. גם תבין בתבונה עניינה שהם בן ובת אך בבינה לא נרמז רק הבן לבד"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      TEVUNAH = le HEH AKHRONAH (dernière lettre) de BINAH.
      Le TIKKUNEI ZOHAR dit : "MALKHUT, NEFESH, TEVUNAH" →
      TEVUNAH = l'aspect MALKHUT et l'aspect NEFESH de BINAH.
