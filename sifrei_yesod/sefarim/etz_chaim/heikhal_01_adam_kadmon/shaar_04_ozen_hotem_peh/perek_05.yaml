  - id: "EC-H1S4-123"
    source_he: "גם תבין כאן ענין ש\"ע נהורין דא\"א כי הלא ביארנו כי יש באזן זה ג' מיני ס\"ג שהם ה' עליונה ונ\"ח הרי ס\"ג א' וה' תתאה ונ\"ח הרי ס\"ג ב' וכל כללותם הם ס\"ג הרי ג\"פ ס\"ג בימין וכן ג' מיני ס\"ג באזן שמאלית הרי ו\"פ ס\"ג גימ' שע\"ח נהורין ש\"ע נהורין הנמשכין אל הפנים עם ח' אותיות של ב' הויות דחוורתי דברישא דחוורתי מצד פני הראש הנמשכין אל הפנים"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Les 370 NEHORIN (שע"ן נהורין — lumières) de ARIKH ANPIN :
      Dans CHAQUE OREILLE : 3 types de S"G (cf. EC-H1S4-103) = 3 × 63.
      OREILLE DROITE : 3 × S"G. OREILLE GAUCHE : 3 × S"G.
      TOTAL : 6 × 63 = SHIN-AYIN-HET (שע"ח = 378) NEHORIN.
      DÉCOMPOSITION : 370 NEHORIN tirés vers le PANIM (visage) +
      8 LETTRES de 2 SHEMOT YHVH de la HAVARTA DE-RISHA DE-HAVARTA
      (le blanc du crâne du blanc), du côté du VISAGE de la tête → tirées vers le PANIM.
      378 = 370 + 8.
    type: axiome_explicite
    concepts:
