      - {id: six_sg_378, role: 6_fois_63_egal_378}
      - {id: havarta_risha, role: blanc_du_crane}
    mapping:
      modules: ["partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Les 370 Nehorin de A\"A = dérivés des 6 S\"G bilatéraux. 378 = 370 lumières + 8 lettres d'interface."

  - id: "EC-H1S4-124"
    source_he: "גם תבין ענין שם מ\"ה דאלפי\"ן שהוא בחוטם דז\"א כי שם מ\"ה הוא בז\"א וגם החוטם גי' ס\"ג נגד ה' תתאה דאתלבשת כאן ונעשה ס\"ג כנ\"ל והוא ג\"כ ענין גימ' אז\"ן שהוא נ\"ח הנמשך עם ה' זו ונעשית ס\"ג כמנין חוטם"
    source_ref: "Heikhal 1, Sha'ar 4:5"
    assertion: |
      Le Shem MAH (מ"ה = 45, de miluy ALEFIN) = dans le HOTEM de Z"A.
      MAH = Z"A.
      HOTEM (חוטם) = gematria 63 = S"G.
      Car le HEH TATA qui s'est habillé ICI = devient S"G (cf. EC-H1S4-078).
      IDENTITÉ FINALE : OZEN (אז"ן = 58) + HEH (5) = 63 = HOTEM (חוטם = 63).
      → OZEN + HEH = HOTEM : l'audition complétée par le Heh = l'odorat.
      Le canal de l'OREILLE et le canal du NEZ ont la MÊME valeur numérique (63).
    type: axiome_explicite
    concepts:
      - {id: hotem_63, role: hotem_gematria_63}
      - {id: ozen_heh_hotem, role: ozen_plus_heh_egal_hotem}
      - {id: mah_hotem_za, role: shem_mah_dans_hotem_de_za}
    mapping:
      modules: ["gematria/engine.py", "partzufim/zeir_anpin.py"]
      tables: []
      partzufim: ["zeir_anpin"]
      relevance: "OZEN(58)+5=63=HOTEM : les deux canaux sensoriels (ouïe/odorat) convergent numériquement. HOTEM de Z\"A reçoit S\"G de Binah."


