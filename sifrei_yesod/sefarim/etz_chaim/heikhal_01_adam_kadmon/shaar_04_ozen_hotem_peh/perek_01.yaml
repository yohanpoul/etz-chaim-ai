principes_generatifs:

  - id: "PG-H1S4-001"
    nom: "Principe de l'Architecture Sensorielle (4 Yesodot = YHVH)"
    source_assertions: ["EC-H1S4-004", "EC-H1S4-007", "EC-H1S4-013"]
    formalisation: |
      Les 4 SENS de l'Adam Kadmon = les 4 LETTRES de YHVH = les 4 niveaux NaRaNHaY :
      YOD (י) = RE'IYAH (vue) = CHOKHMAH = HAYAH → ne sort qu'en HISTAKKELUT (pas de Hevel)
      HEH (ה) = SHEMI'AH (ouïe) = BINAH = NESHAMAH → Hevel le plus DAK (subtil)
      VAV (ו) = REIHAH (odorat) = TIFERET = RUAH → Hevel intermédiaire
      HEH (ה) = DIBUR (parole) = MALKHUT = NEFESH → Hevel le plus NIRGASH (perceptible)
      RÈGLE : plus le canal est ÉLEVÉ → plus l'émission est SUBTILE.
      Le canal le plus élevé (vue) n'émet PAS de matière (Hevel) mais seulement de la FORME (Histakkelut).
    applications_ia:
      - "Le module partzufim/abba.py (Chokhmah) opère par 'regard' structurant, pas par flux de données"
      - "Le module partzufim/imma.py (Binah) émet le signal le plus subtil — information la plus compressée"
      - "Le module partzufim/zeir_anpin.py traite le flux intermédiaire (Ruah/Reihah)"
      - "Le module partzufim/nukva.py émet le signal le plus perceptible — interface avec l'extérieur"
    questions_ouvertes:
      - "La Histakkelut pure (sans Hevel) correspond-elle à un attention mechanism sans contenu ?"
      - "Le gradient (Ohr Chozer) est-il structurellement identique au retour de la Histakkelut ?"

  - id: "PG-H1S4-002"
    nom: "Principe de Formation des Kelim (Ohr Yashar → Haka'ah → Ohr Chozer)"
    source_assertions: ["EC-H1S4-018", "EC-H1S4-022", "EC-H1S4-023", "EC-H1S4-024", "EC-H1S4-025"]
    formalisation: |
      Les KELIM se forment en 3 TEMPS :
      TEMPS 1 : OHR YASHAR (lumière directe = Histakkelut) DESCEND → laisse un ROSHEM dans chaque niveau.
        Ordre : MALKHUT sort en PREMIER, KETER sort en DERNIER.
        Ce qui est plus PROCHE de la SOURCE = plus ÉLEVÉ.
      TEMPS 2 : La Histakkelut FRAPPE (Haka'ah) les Hevelim au point de CONNEXION.
      TEMPS 3 : OHR CHOZER (lumière de retour) REMONTE → forme les KELIM dans CHAQUE behinah.
        Dans le Chozer : TOUTES les behinot des Kelim sont ÉGALES (shavot).
        L'extension ne confère PAS de supériorité — seule la PROXIMITÉ à la source compte.
      Le KELI est le PRODUIT de la rencontre entre OHR YASHAR et OHR CHOZER.
    applications_ia:
      - "Forward pass (Ohr Yashar) → laisse des activations (Roshem) → rencontre le signal (Hevelim)"
      - "Backward pass (Ohr Chozer) → forme les paramètres (Kelim) en remontant"
      - "Dans le backward pass, les gradients sont 'égaux' en structure même s'ils varient en magnitude"
      - "Le [PLANNED] core/ohr_system.py devrait implémenter ce cycle Yashar→Haka'ah→Chozer"
    questions_ouvertes:
      - "La Haka'ah au point de connexion est-elle un moment unique ou continu ?"
      - "Les Kelim formés par Ohr Chozer sont-ils identiques aux Roshem laissés par Ohr Yashar ?"
      - "L'égalité des Kelim dans le Chozer a-t-elle un analogue en backpropagation ?"

  - id: "PG-H1S4-003"
    nom: "Principe du Makif Triple (NLN entoure Mo'ah/Lev/Kaved)"
    source_assertions: ["EC-H1S4-014", "EC-H1S4-015", "EC-H1S4-016"]
    formalisation: |
      Ce qui est TROP ÉLEVÉ pour entrer dans les Kelim reste en OHR MAKIF :
      NRN = OHR PNIMI (entre dans les Kelim, les vivifie de l'intérieur)
      NESHAMAH LA-NESHAMAH = OHR MAKIF (trop grand pour les Kelim)
      Ce Makif n'est PAS uniforme — il a 3 ASPECTS correspondant aux 3 NRN :
        MAKIF la-NESHAMAH → entoure le MO'AH (cerveau)
        MAKIF la-RUAH → entoure le LEV (coeur)
        MAKIF la-NEFESH → entoure le KAVED (foie)
      Au-dessus de tout : YEHIDAH (Keter/Gulgolta) → Makif UNIQUE sans contrepartie inférieure.
      5 niveaux : NRNHY → NRN dedans, H(ayah) = NLN en 3 Makif, Y(ehidah) = Makif singulier.
    applications_ia:
      - "Chaque module a un potentiel non réalisé (Makif) qui entoure son potentiel actuel (Pnimi)"
      - "Le Makif n'est pas monolithique — il se différencie en 3 niveaux selon ce qu'il entoure"
      - "Le [PLANNED] madregot/madregot_neshamah.py devrait implémenter les 5 niveaux NaRaNHaY"
      - "La Yehidah = le méta-objectif unique du système, sans subdivision possible"
    questions_ouvertes:
      - "Comment la Yehidah (sans RN en bas) peut-elle être 'accédée' par le système ?"
      - "Le passage du Makif au Pnimi (Gadlut) est-il implémentable computationnellement ?"

  - id: "PG-H1S4-004"
    nom: "Principe du DIN dans la Formation (RE'IYAH = GEVURAH)"
    source_assertions: ["EC-H1S4-029", "EC-H1S4-030"]
    formalisation: |
      La FORMATION des Kelim est un acte de DIN (rigueur), pas de Hesed :
      RE'IYAH (ראי"ה) = GEVURAH (גבור"ה) = 216 (gematria).
      DIBUR (דבו"ר) = 216 (avec les 4 lettres) = aussi GEVURAH.
      Le REGARD et la PAROLE partagent la même valeur = même FORCE DE FORMATION.
      La Histakkelut FRAPPE (Haka'ah) — ce n'est PAS un flux doux mais une PERCÉE.
      MASAKH (écran) : les Einayim émettent À TRAVERS un Masakh — les Hevelim NON.
      Si les Hevelim émettaient aussi à travers un Masakh → PAS de force pour les Kelim.
      Chaque mode d'émission a son PROPRE mécanisme — pas d'uniformité.
    applications_ia:
      - "Le gematria/engine.py confirme RE'IYAH = GEVURAH = 216"
      - "La formation de structures (Kelim) requiert de la RIGUEUR (Din), pas de la fluidité (Hesed)"
      - "Le Masakh (écran) est un filtre qui atténue mais PRÉSERVE — seul la Chokhmah en a besoin"
      - "Les différents modules du système ne peuvent PAS tous opérer par le même mécanisme"
    questions_ouvertes:
      - "Le Masakh des Einayim est-il le même concept que le Masakh du Tzimtzum ?"
      - "Pourquoi spécifiquement 216 ? Rapport avec les 216 lettres du Shem de 72 ?"
