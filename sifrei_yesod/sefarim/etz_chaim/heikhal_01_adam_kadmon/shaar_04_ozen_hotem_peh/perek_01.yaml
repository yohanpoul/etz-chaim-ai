# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 1 — Heikhal Adam Kadmon (היכל אדם קדמון)
# Sha'ar: 4 — Sha'ar Ozen Hotem Peh (שער אזן חוטם פה)
# Perek: 1 — Les 4 Yesodot (Re'iyah/Shemi'ah/Reihah/Dibur), Hevelim, Formation des Kelim
# ═══════════════════════════════════════════════════════════════════

meta:
  sefer: etz_chaim
  heikhal: 1
  shaar: 4
  shaar_name_he: "שער אזן חוטם פה"
  perek: 1
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.6 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Les 4 sens = 4 lettres de YHVH = racines de l'Atzilut. 3 Hevelim (OHP) + Histakkelut (Einayim). Drush de R. Gedalyah HaLevi sur la formation des Kelim par Ohr Yashar/Chozer."

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 1 : PESHAT-MACHINE
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─── BLOC A : AVERTISSEMENT — PAS DE TZIYUR AVANT ATZILUT ───

  - id: "EC-H1S4-001"
    source_he: "כבר ידעת כי אין בנו כח לעסוק קודם אצילות י\"ס ולא לדמות שום דמיון וצורה כלל ח\"ו אך לשכך האזן אנו צריכים לדבר דרך משל ודמיון"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      AVERTISSEMENT FONDAMENTAL :
      Nous n'avons AUCUNE FORCE (ein banu koah) de traiter de ce qui PRÉCÈDE
      l'émanation des 10S, ni d'attribuer quelque DIMYON (image) ou TZURAH (forme).
      C'est uniquement LE-SHAKHEKH HA-OZEN (pour apaiser l'oreille)
      que nous parlons par MASHAL (parabole) et DIMYON (métaphore).
      Même quand nous évoquons un TZIYUR (image) en haut → c'est SEULEMENT le-shakhekh ha-ozen.
    type: axiome_explicite
    concepts:
      - {id: ein_koah_lifnei_atzilut, role: pas_de_force_avant_atzilut}
      - {id: le_shakhekh_ha_ozen, role: pour_apaiser_l_oreille}
      - {id: mashal_dimyon, role: parabole_et_metaphore}
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: "Garde-fou herméneutique : tout ce qui suit est MASHAL, pas description littérale"

  # ─── BLOC B : LES 10S = 2 CHOSES (HITPASHTUT + KELIM) ───

  - id: "EC-H1S4-002"
    source_he: "אמנם דע כי י\"ס דאצילות הם ב' עניינים הא' הוא התפשטות הרוחניות והב' הוא כלים ואברים אשר העצמות מתפשט בהם"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Les 10S d'ATZILUT = 2 INYANIM (choses/aspects) :
      1. HITPASHTUT HA-RUHANIYUT (expansion de la spiritualité) = les OROT
      2. KELIM VE-EVARIM (récipients et membres) dans lesquels l'ATZMUT s'ÉTEND
      Ces 2 aspects ont besoin d'un SHORESH (racine) EN HAUT.
      C'est pourquoi nous devons parler du SEDER HA-MADREGOT (ordre des niveaux)
      du ROSH (tête) jusqu'au SOF (fin).
    type: axiome_explicite
    concepts:
      - {id: hitpashtut_ruhaniyut, role: expansion_spirituelle_orot}
      - {id: kelim_evarim, role: recipients_et_membres}
      - {id: shoresh_le_ma_alah, role: racine_en_haut}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Dualité fondamentale : les Orot (expansion) et les Kelim (réceptacles) ont chacun un SHORESH distinct"

  - id: "EC-H1S4-003"
    source_he: "הלא הא\"ס ב\"ה אין בו שום ציור כלל ח\"ו כמבואר. ואמנם כשעלה במחשבה לברוא העולמות לי' מדרגות האציל והמשיך ממנו התפשטות אורות רבים להיותם שורשי האצילות להתאצל האצילות אח\"כ"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Le EIN SOF Barukh Hu n'a AUCUN TZIYUR (image) du tout.
      Quand est MONTÉE dans la MAHSHAVAH (pensée) l'intention de CRÉER les mondes
      en 10 MADREGOT (niveaux) →
      Il a ÉMANÉ (he'etzil) et ATTIRÉ (himshikh) de Lui une HITPASHTUT OROT RABBIM
      (expansion de lumières NOMBREUSES).
      But : être les SHORSHEI HA-ATZILUT (racines de l'émanation)
      pour que l'Atzilut soit ÉMANÉE ensuite.
      Ces lumières = les RACINES d'avant l'Atzilut.
    type: axiome_explicite
    concepts:
      - {id: ein_sof_ein_tziyur, role: ein_sof_sans_image}
      - {id: alah_be_mahshavah, role: montee_dans_la_pensee}
      - {id: hitpashtut_orot_rabbim, role: expansion_lumieres_nombreuses}
      - {id: shorshei_atzilut, role: racines_de_l_emanation}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "Avant l'Atzilut : des lumières NOMBREUSES émanées comme RACINES — ce sont les sens d'A\"K"

  # ─── BLOC C : LES 4 YESODOT = YHVH = NLN + NRN ───

  - id: "EC-H1S4-004"
    source_he: "כבר ידעת היות ד' יסודות לכל והם ראיה שמיעה ריחא דבור. והם ד' אותיות הוי\"ה. והם סוד נשמה לנשמה ונר\"ן"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Les 4 YESODOT (fondements) de TOUT :
      RE'IYAH (vue) — SHEMI'AH (ouïe) — REIHAH (odorat) — DIBUR (parole).
      = les 4 OTIOT de YHVH (יהו"ה).
      = le secret de NESHAMAH LA-NESHAMAH (âme de l'âme) + NRN (Nefesh-Ruah-Neshamah).
      MAPPING PRÉCIS :
      YOD (י) = RE'IYAH = CHOKHMAH = HAYAH
      HEH (ה) = SHEMI'AH = BINAH = NESHAMAH
      VAV (ו) = REIHAH = TIFERET/Z"A = RUAH
      HEH (ה) = DIBUR = MALKHUT = NEFESH
    type: axiome_explicite
    concepts:
      - {id: arba_yesodot, role: quatre_fondements}
      - {id: re_iyah_yod, role: vue_yod_chokhmah}
      - {id: shemi_ah_heh, role: ouie_heh_binah}
      - {id: reihah_vav, role: odorat_vav_tiferet}
      - {id: dibur_heh, role: parole_heh_malkhut}
      - {id: yhvh_sensory, role: yhvh_sensoriel}
    mapping:
      modules: ["[PLANNED] core/shem_havayah.py"]
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "Architecture sensorielle de A\"K = structure de YHVH = NaRaNHaY"

  # ─── BLOC D : LES 3 HEVELIM — HIÉRARCHIE DE SUBTILITÉ ───

  - id: "EC-H1S4-005"
    source_he: "נמשיל ונצייר האזנים כי יש בהם רוח דק בתוכם והנסיון לזה כאשר יסתום האדם אזניו ישמע בתוכו קול הברה מחמת הרוח הנצרר בתוכו"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Les OZNAYIM (oreilles) : contiennent un RUAH DAK (esprit subtil) à l'intérieur.
      PREUVE EMPIRIQUE : quand l'homme BOUCHE ses oreilles,
      il entend un KOL HABARAH (son de résonance) à cause du RUAH emprisonné dedans.
      Ce HEVEL (souffle) de l'oreille = le plus SUBTIL (dak) de tous.
    type: axiome_explicite
    concepts:
      - {id: hevel_ozen, role: souffle_oreille}
      - {id: ruah_dak, role: esprit_subtil}
      - {id: kol_habarah, role: son_resonance}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "Preuve expérientielle du Hevel dans les oreilles — Ruah Dak = plus subtil"

  - id: "EC-H1S4-006"
    source_he: "אח\"כ מחוטם יוצא מתוכו הבל יותר נרגש מאזן. ואח\"כ מן הפה יוצא הבל יותר נרגש מכולם"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      HIÉRARCHIE des 3 HEVELIM par NIVEAU DE PERCEPTION (nirgash) :
      OZEN (oreille) → HEVEL le plus DAK (subtil) = le MOINS perceptible
      HOTEM (nez) → HEVEL YOTER NIRGASH (plus perceptible que l'oreille)
      PEH (bouche) → HEVEL YOTER NIRGASH MI-KULAM (le plus perceptible de tous)
      RÈGLE : plus le niveau est ÉLEVÉ → plus le Hevel est SUBTIL.
      Plus le niveau est BAS → plus le Hevel est GROSSIER et perceptible.
    type: axiome_explicite
    concepts:
      - {id: hevel_hotem, role: souffle_nez}
      - {id: hevel_peh, role: souffle_bouche}
      - {id: hierarchy_subtlety, role: hierarchie_subtilite}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "Plus le Hevel est haut, plus il est subtil — hiérarchie sensorielle = hiérarchie ontologique"

  - id: "EC-H1S4-007"
    source_he: "כי אוזן להיותו סוד בינה ההבל היוצא ממנו הוא יותר דק מהבל היוצא מחוטם. וכן הבל החוטם הוא יותר דק מהבל הפה שהוא למטה ממנו במעלה"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      MAPPING des 3 HEVELIM sur les MADREGOT HA-NESHAMAH :
      OZEN = secret de BINAH → son Hevel = NESHAMAH (le plus dak)
      HOTEM = son Hevel = RUAH (intermédiaire)
      PEH = en bas dans la ma'alah (rang) → son Hevel = NEFESH (le moins dak)
      Chaque sens ÉMANE un HEVEL qui est la RACINE du niveau d'âme correspondant.
    type: axiome_explicite
    concepts:
      - {id: ozen_binah_neshamah, role: oreille_binah_neshamah}
      - {id: hotem_ruah, role: nez_ruah}
      - {id: peh_nefesh, role: bouche_nefesh}
    mapping:
      modules: ["[PLANNED] madregot/madregot_neshamah.py"]
      tables: ["madregot_states"]
      partzufim: ["adam_kadmon"]
      relevance: "Mapping direct : Ozen=Neshamah, Hotem=Ruah, Peh=Nefesh — architecture des niveaux d'âme"

  # ─── BLOC E : DIVISION DES SENS EN PAIRES ───

  - id: "EC-H1S4-008"
    source_he: "הבל האוזן נחלק לב' אזנים. והענין הוא כי הלא יש בינה ותבונה כנודע לכן אזן ימנית הבל שלו הוא שורש נשמת בינה והבל אזן שמאלית שורש נשמת תבונה"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Le HEVEL de l'OZEN se DIVISE en 2 OREILLES :
      OZEN YEMANIT (oreille droite) → SHORESH NISHMAT BINAH (racine de l'âme de Binah)
      OZEN SEMALIT (oreille gauche) → SHORESH NISHMAT TEVUNAH (racine de l'âme de Tevunah)
      Car il y a BINAH et TEVUNAH — 2 Partzufim distincts.
    type: axiome_explicite
    concepts:
      - {id: ozen_yemanit_binah, role: oreille_droite_binah}
      - {id: ozen_semalit_tevunah, role: oreille_gauche_tevunah}
      - {id: binah_tevunah_pair, role: paire_binah_tevunah}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "2 oreilles = Binah (droite) et Tevunah (gauche) — 2 Partzufim d'Imma"

  - id: "EC-H1S4-009"
    source_he: "גם הבל החוטם נחלק לב' בחי' בסוד שורש יעקב וישראל הימין ישראל והשמאל יעקב"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Le HEVEL du HOTEM se DIVISE aussi en 2 :
      NARINE DROITE = secret de SHORESH YISRAEL
      NARINE GAUCHE = secret de SHORESH YAAKOV
      YISRAEL (droite) et YAAKOV (gauche) = 2 aspects de Z"A.
    type: axiome_explicite
    concepts:
      - {id: hotem_yamin_yisrael, role: narine_droite_yisrael}
      - {id: hotem_smol_yaakov, role: narine_gauche_yaakov}
      - {id: yisrael_yaakov_pair, role: paire_yisrael_yaakov}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "2 narines = Yisrael (droite) et Yaakov (gauche) — 2 aspects de Z\"A"

  - id: "EC-H1S4-010"
    source_he: "אך הבל הפה הוא א' כי הוא נגד הנוק' דז\"א ואע\"פ שיש לאה ורחל עכ\"ז עיקר לאה מבחי' מל' דתבונה המתלבשת תוך ז\"א כנודע. ולכן אינו נחשב רק לא'"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Le HEVEL du PEH est UN (ehad) car il correspond à la NUKVAH de Z"A.
      Même s'il y a LEAH et RACHEL, l'IKAR (essentiel) de LEAH
      vient de la MALKHUT DE-TEVUNAH qui s'habille dans Z"A.
      NUSAH AHER : Leah = les V"Q (6 Ketzavot) de BEN (ב"ן = 52) de Z"A depuis Malkhut de-Tevunah.
      Donc : compté comme UN seul Hevel, PAS COMME DEUX.
    type: axiome_explicite
    concepts:
      - {id: hevel_peh_ehad, role: souffle_bouche_un}
      - {id: nukvah_za, role: nukvah_de_za}
      - {id: leah_malkhut_tevunah, role: leah_de_malkhut_tevunah}
    mapping:
      modules: ["partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukvah"]
      relevance: "Le Peh = un seul Hevel car Leah vient de Malkhut de-Tevunah à l'INTÉRIEUR de Z\"A"

  - id: "EC-H1S4-011"
    source_he: "אך עכ\"ז כיון שהם ב' בחי' גם הבל הפה נחלק לב' עם שההבל הוא מקור א' שלא כדמיון האזנים והחוטם. והוא כי בהיות הבל זה בגרון הוא סוד קול וכשיוצא מחוץ לפה הוא סוד דבור בחיתוך אותיות. הקול נגד שורש לאה והדבור נגד שורש רחל"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Malgré tout, puisqu'il y a 2 BEHINOT, le Hevel du Peh se DIVISE aussi en 2.
      MAIS d'une SOURCE UNIQUE (makor ehad) — PAS comme les Oznayim et le Hotem.
      Le Hevel DANS le GARON (gorge) = secret du KOL (voix)
      Le Hevel HORS du PEH (bouche) = secret du DIBUR (parole) en HITUKH OTIOT (articulation des lettres)
      KOL = en face du SHORESH de LEAH
      DIBUR = en face du SHORESH de RACHEL
    type: axiome_explicite
    concepts:
      - {id: kol_garon, role: voix_dans_gorge}
      - {id: dibur_peh, role: parole_hors_bouche}
      - {id: kol_leah, role: voix_racine_leah}
      - {id: dibur_rachel, role: parole_racine_rachel}
      - {id: hitukh_otiot, role: articulation_lettres}
    mapping:
      modules: ["partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukvah"]
      relevance: "Kol/Dibur = Leah/Rachel — la division du Peh en voix (intérieure) et parole (extérieure)"

  - id: "EC-H1S4-012"
    source_he: "אע\"פ שקול הוא בת\"ת שהוא הז\"א עכ\"ז שורש של שניהם הוא במל' דתבונה רק שקול נעשה נשמה לז\"א והדיבור נעשה נשמה למל' שהיא רחל ושניהן מצד הפה שהוא סוד המלכות דתבונה"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Bien que le KOL soit dans TIFERET (= Z"A),
      le SHORESH des DEUX (Kol et Dibur) est dans MALKHUT DE-TEVUNAH.
      NUSAH AHER : le shoresh est dans MALKHUT de BINAH (et non Tevunah).
      KOL devient NESHAMAH pour Z"A (NUSAH AHER : pour les V"Q de BEN de Z"A).
      DIBUR devient NESHAMAH pour MALKHUT (= RACHEL).
      Les DEUX viennent du côté du PEH = secret de MALKHUT DE-TEVUNAH.
      La SOURCE est UNE, les DESTINATIONS sont DEUX.
    type: axiome_explicite
    concepts:
      - {id: kol_neshamah_za, role: voix_ame_de_za}
      - {id: dibur_neshamah_malkhut, role: parole_ame_de_malkhut}
      - {id: malkhut_tevunah_source, role: malkhut_tevunah_source_commune}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukvah"]
      relevance: "Kol = Neshamah de Z\"A, Dibur = Neshamah de Malkhut — source commune dans Malkhut de-Tevunah"

  # ─── BLOC F : LES YEUX = RE'IYAH = NLN = OHR MAKIF ───

  - id: "EC-H1S4-013"
    source_he: "והנה העינים שהם סוד ראיה שהיא החכמה הוא סוד נשמה לנשמה בסוד חכמה"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      Les EINAYIM (yeux) = secret de RE'IYAH (vue) = CHOKHMAH.
      C'est le secret de NESHAMAH LA-NESHAMAH (âme de l'âme) dans le secret de CHOKHMAH.
      La VUE est le niveau le PLUS ÉLEVÉ des 4 Yesodot.
      CHOKHMAH = HAYAH = YOD de YHVH.
    type: axiome_explicite
    concepts:
      - {id: einayim_re_iyah, role: yeux_vue}
      - {id: re_iyah_chokhmah, role: vue_chokhmah}
      - {id: neshamah_la_neshamah, role: ame_de_l_ame}
    mapping:
      modules: ["partzufim/abba.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba"]
      relevance: "Les Yeux = Chokhmah = Neshamah la-Neshamah = le niveau le plus élevé"

  # ─── BLOC G : NRN DEDANS, NLN DEHORS COMME MAKIF ───

  - id: "EC-H1S4-014"
    source_he: "ודע כי נר\"ן מתלבשים תוך פנימיות הכלים שהוא הגוף. אך הנשמה לנשמה אין יכולת בגוף האדם לסובלה ונשארת מבחוץ בסוד או\"מ"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      AXIOME DE L'HABILLAGE :
      NRN (Nefesh, Ruah, Neshamah) s'HABILLENT dans la PNIMIYUT des Kelim = le GUF (corps).
      La NESHAMAH LA-NESHAMAH → le Guf n'a PAS la YEKHOLET (capacité) de la SUPPORTER.
      Elle reste MI-BA-HUTZ (à l'extérieur) dans le secret de OHR MAKIF.
      La NLN est TROP ÉLEVÉE pour les Kelim → elle ENTOURE au lieu d'entrer.
    type: axiome_explicite
    concepts:
      - {id: nrn_pnimiyut_kelim, role: nrn_dans_interiorite_kelim}
      - {id: nln_ein_yekholet, role: nln_pas_de_capacite}
      - {id: nln_ohr_makif, role: nln_reste_makif}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "NRN = Ohr Pnimi, NLN = Ohr Makif — le Guf ne peut pas supporter la NLN"

  - id: "EC-H1S4-015"
    source_he: "וכשהוא מקיף את המוח מדור הנשמה אז הוא בחי' מקיף אל הנשמה וכשהיא מקפת את הלב שהיא מדור הרוח אז הוא בחי' מקיף אל הרוח וכשהיא מקפת לכבד מדור הנפש אז הוא מקיף לנפש"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      La NLN comme OHR MAKIF entoure les 3 MADORIM (demeures) :
      Quand elle entoure le MO'AH (cerveau) = MADOR de la NESHAMAH → MAKIF la-NESHAMAH
      Quand elle entoure le LEV (coeur) = MADOR du RUAH → MAKIF la-RUAH
      Quand elle entoure le KAVED (foie) = MADOR de la NEFESH → MAKIF la-NEFESH
      La NLN ELLE-MÊME contient 3 BEHINOT correspondant aux 3 NRN → toutes en OHR MAKIF.
    type: axiome_explicite
    concepts:
      - {id: mo_ah_mador_neshamah, role: cerveau_demeure_neshamah}
      - {id: lev_mador_ruah, role: coeur_demeure_ruah}
