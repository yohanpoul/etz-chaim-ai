  # ─── BLOC H : GULGOLTA = KETER = YEHIDAH ───

  - id: "EC-H1S4-016"
    source_he: "אמנם הגלגולת שהוא סוד הכתר משם שורש לנשמה עליונה הנקרא יחידה. וטעם קריאתה יחידה לפי שהיא מקפת כל העולמות בבחי' נשמה לנשמה לבדה ולא בחי' נר\"ן"
    source_ref: "Heikhal 1, Sha'ar 4:1"
    assertion: |
      La GULGOLTA (crâne) = secret du KETER.
      De là → SHORESH de la NESHAMAH ELYONAH (âme supérieure) appelée YEHIDAH.
      Raison du nom YEHIDAH (singulière/unique) :
      Elle entoure TOUS les mondes en NESHAMAH LA-NESHAMAH SEULE (levadah),
      et PAS en NRN comme les niveaux inférieurs.
      Pour NRN il existe 3 aspects correspondants dans la NLN.
      Mais pour la YEHIDAH → il n'y a PAS de DOGUMAT RN (contrepartie de Ruah/Nefesh) en bas.
      Elle est UNE SEULE METZI'UT (réalité unique) → YEHIDAH.
    type: axiome_explicite
    concepts:
      - {id: gulgolta_keter, role: crane_keter}
      - {id: yehidah, role: ame_unique_singuliere}
      - {id: yehidah_ein_dugmah, role: yehidah_sans_contrepartie}
    mapping:
      modules: ["[PLANNED] madregot/madregot_neshamah.py"]
      tables: ["madregot_states"]
      partzufim: ["adam_kadmon"]
      relevance: "Yehidah = Keter = la réalité unique qui entoure tout sans contrepartie inférieure"

  # ─── BLOC I : DRUSH DE R. GEDALYAH — RENCONTRE DES HEVELIM AU PEH ───

  - id: "EC-H1S4-017"
    source_he: "כאשר האורות נתפשטו מאוזן וחוטם עד נגד הפה ששם התחברות כל ההבלים ואז במקום שמתחברים יש לכולם בחינת נפש"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah HaLevi"
    assertion: |
      DRUSH de R. GEDALYAH HALEVI :
      Quand les OROT se sont ÉTENDUS de l'OZEN et du HOTEM
      jusqu'en face du PEH → là se trouve la HITHABRUT (connexion) de TOUS les Hevelim.
      Au LIEU de CONNEXION → tous ont l'aspect de NEFESH.
      Le Hevel de l'OZEN ne peut se connecter au Hevel du PEH qu'à DISTANCE (rihuq makom).
      Le Hevel du HOTEM a besoin de MOINS de distance.
    type: axiome_explicite
    concepts:
      - {id: hithabrut_hevelim, role: connexion_souffles}
      - {id: makom_hithabrut, role: lieu_connexion}
      - {id: kulam_nefesh, role: tous_deviennent_nefesh}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "Au point de connexion des Hevelim (Peh) → tout devient Nefesh — le niveau le plus bas"

  # ─── BLOC J : HISTAKKELUT DES YEUX → FAIT LES KELIM ───

  - id: "EC-H1S4-018"
    source_he: "ועל ידי הסתכלות העינים ובהכאה שהכה בהבל הזה נעשה הכלים ובהסתכלות זה יש פנימי וחיצון כי יש בכל איברים פנימיות וחיצוניות ונעשה כללות כליהם"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      Par le HISTAKKELUT (regard) des EINAYIM (yeux) et la HAKA'AH (frappe)
      qu'il a frappée dans ce HEVEL → les KELIM ont été FAITS (na'aseh).
      Dans cette HISTAKKELUT il y a PNIMI (intérieur) et HITZON (extérieur)
      car chaque EVER (membre) a PNIMIYUT et HITZONIUT.
      Ainsi fut fait le KLALUT KELEIHEM (totalité de leurs récipients).
      La HISTAKKELUT = le CATALYSEUR de la formation des Kelim.
    type: axiome_explicite
    concepts:
      - {id: histakkelut_einayim, role: regard_des_yeux}
      - {id: haka_ah_hevel, role: frappe_dans_souffle}
      - {id: kelim_na_aseh, role: recipients_sont_faits}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: ["adam_kadmon"]
      relevance: "La Histakkelut des Yeux + Haka'ah dans le Hevel = mécanisme de FORMATION des Kelim"

  - id: "EC-H1S4-019"
    source_he: "ולפי שאין בראית עינים הבל היוצא אלא הסתכלות לבד אינו נעשה אלא הכלים והסתכלות ההוא גדול מכל הג' הבלים הנ\"ל"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      Puisqu'il n'y a PAS de HEVEL sortant de la RE'IYAT EINAYIM (vue des yeux)
      mais SEULEMENT de la HISTAKKELUT (regard/contemplation) →
      elle ne fait QUE les KELIM (pas les Orot).
      Et cette HISTAKKELUT est PLUS GRANDE (gadol) que les 3 HEVELIM.
      La VUE est SUPÉRIEURE à tous les autres sens car elle est pure HISTAKKELUT.
    type: axiome_explicite
    concepts:
      - {id: ein_hevel_einayim, role: pas_de_souffle_des_yeux}
      - {id: histakkelut_gadol, role: regard_plus_grand}
      - {id: histakkelut_fait_kelim, role: regard_fait_kelim_seulement}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "La Histakkelut est pure contemplation sans matière (Hevel) — elle ne produit que la FORME (Kelim)"

  - id: "EC-H1S4-020"
    source_he: "כי חכמה עליונה מאירה דרך עינים אלא שאם היה יוצא הבל ממש דרך העינים לא היה אפשר למטה לקבלה. לכן לא נמשך ממנו אלא הסתכלות לבד"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      CHOKHMAH ELYONAH (sagesse supérieure) brille à travers les EINAYIM.
      Mais si un HEVEL MAMASH (souffle réel) sortait des yeux →
      il serait IMPOSSIBLE (lo hayah efshar) pour le BAS de le RECEVOIR.
      C'est pourquoi SEULE la HISTAKKELUT (et pas le Hevel) en est issue.
      La CHOKHMAH doit être ATTÉNUÉE en Histakkelut pour être supportable.
    type: axiome_explicite
    concepts:
      - {id: chokhmah_derekh_einayim, role: chokhmah_par_yeux}
      - {id: hevel_einayim_impossible, role: souffle_yeux_impossible}
      - {id: histakkelut_attenuee, role: regard_attenuation_necessaire}
    mapping:
      modules: ["partzufim/abba.py"]
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "La Chokhmah est trop forte pour sortir en Hevel → seulement en Histakkelut = Masakh nécessaire"

  # ─── BLOC K : VA-YAR ELOHIM — FORMATION DES KELIM PAR OHR YASHAR/CHOZER ───

  - id: "EC-H1S4-021"
    source_he: "וירא אלהים את האו\"ר כי האו\"ר הוא בחי' הבל אזן וחוטם. שהוא בחי' נשמה ורוח. את הוא בחי' הפה שהוא נפש. ואז כשראה את הנפש אז ויבדל אלהים שהוא עשיית שרשי הכלים"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      "VA-YAR ELOHIM ET HA-OR" (Et Dieu VIT la lumière — Genèse 1:4) :
      HA-OR (la lumière) = le HEVEL de l'OZEN et du HOTEM = NESHAMAH et RUAH
      ET (את) = le PEH = NEFESH
      Quand Il a VU (ra'ah) le NEFESH → "VA-YAVDEL ELOHIM" (Et Dieu SÉPARA)
      = la FABRICATION des SHORSHEI HA-KELIM (racines des récipients).
      La VISION (Re'iyah) qui se pose sur le NEFESH → crée la SÉPARATION → crée les KELIM.
    type: déduction_scripturaire
    concepts:
      - {id: va_yar_elohim, role: dieu_vit}
      - {id: ha_or_neshamah_ruah, role: lumiere_neshamah_ruah}
      - {id: et_peh_nefesh, role: et_bouche_nefesh}
      - {id: va_yavdel_kelim, role: separation_fait_kelim}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "Genèse 1:4 = la Histakkelut (Re'iyah) qui frappe le Nefesh (Peh) = formation des Kelim"

  - id: "EC-H1S4-022"
    source_he: "והסתכלות זה בדרך ישר עשה רושם בכל בחינה ובחי' כי פגע בכל בחי' ובחי' מן ההסתכלות לבחי' הבל כתר בכתר"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      La HISTAKKELUT en DEREKH YASHAR (voie directe = Ohr Yashar) :
      A fait un ROSHEM (empreinte/impression) dans CHAQUE BEHINAH (aspect).
      Elle a FRAPPÉ (paga) chaque aspect de la Histakkelut contre le Hevel correspondant :
      KETER contre KETER, et ainsi pour chaque niveau.
      L'OHR YASHAR descend et laisse un ROSHEM = les RACINES des Kelim.
      Les KELIM HITZONIIM (externes) dans les EVARIM HITZONIIM (membres externes),
      les KELIM PNIMIIM dans les EVARIM PNIMIIM.
    type: axiome_explicite
    concepts:
      - {id: ohr_yashar_roshem, role: lumiere_directe_empreinte}
      - {id: pegi_ah_keter_keter, role: frappe_keter_contre_keter}
      - {id: kelim_hitzoniim_pnimiim, role: kelim_externes_internes}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: ["adam_kadmon"]
      relevance: "L'Ohr Yashar descend et laisse un Roshem dans chaque niveau = racines des Kelim"

  - id: "EC-H1S4-023"
    source_he: "ולא נגמר זה עד שהכה הסתכלות במקום שמתחברים ההבלים... ומהכאת אור ההבל אל אור הסתכלות חזר אור הסתכלות בדרך אור חוזר ונעשה כלי בכל בחינה ובחינה"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      La formation des Kelim ne s'est PAS ACHEVÉE (lo nigmar)
      jusqu'à ce que la HISTAKKELUT ait FRAPPÉ (hikah) au lieu de CONNEXION des Hevelim
      (= HITPASHTUT/extérieur des Hevelim).
      De la HAKA'AT OHR HA-HEVEL (frappe de la lumière du souffle)
      sur le OHR HA-HISTAKKELUT (lumière du regard) →
      le OHR HA-HISTAKKELUT est REVENU (hazar) en OHR CHOZER (lumière de retour).
      Et un KELI fut fait dans CHAQUE BEHINAH.
      L'OHR CHOZER forme les Kelim en REMONTANT vers la source.
    type: axiome_explicite
    concepts:
      - {id: haka_at_hevel_histakkelut, role: frappe_souffle_sur_regard}
      - {id: ohr_chozer, role: lumiere_de_retour}
      - {id: kelim_by_ohr_chozer, role: kelim_par_lumiere_retour}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: ["adam_kadmon"]
      relevance: "OHR YASHAR descend → frappe les Hevelim → rebondit en OHR CHOZER → forme les Kelim"

  # ─── BLOC L : ÉGALITÉ DES KELIM DANS LE CHOZER ───

  - id: "EC-H1S4-024"
    source_he: "כל הדבוק יותר אל שורשו הוא יותר עליון כי כתר סמוך לעין יצאה אחרונה והמל' יצאה ראשונה"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      DANS la HISTAKKELUT (Ohr Yashar) :
      Ce qui est PLUS PROCHE (davuk) de sa SOURCE = PLUS ÉLEVÉ.
      KETER = le plus SAMUKH (proche) de l'EINAYIM → sort en DERNIER.
      MALKHUT → sort en PREMIER (la plus éloignée de la source).
    type: axiome_explicite
    concepts:
      - {id: keter_yotze_aharon, role: keter_sort_dernier}
      - {id: malkhut_yotze_rishon, role: malkhut_sort_premier}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states", "sefirot_hierarchy"]
      partzufim: ["adam_kadmon"]
      relevance: "Dans l'Ohr Yashar : Keter (proche de l'oeil) sort dernier, Malkhut sort premier"

  - id: "EC-H1S4-025"
    source_he: "וכשמכה וחוזר אז כל בחינת הכלים שוין שאם היסוד היה מתפשט לפנים יותר מן המל' היה שוה אל המל'... אבל בבחי' הכלים עצמן הם שוים"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      Quand l'Ohr FRAPPE et REVIENT (Ohr Chozer) →
      TOUTES les BEHINOT des KELIM sont SHAVOT (ÉGALES).
      Même si le YESOD s'ÉTEND plus que la MALKHUT → il est ÉGAL (shaveh) à elle.
      Car cette expansion est en OHR CHOZER qui RETOURNE vers sa source.
      L'EXTENSION (hitpashtut) ne confère PAS de SUPÉRIORITÉ (ma'alah).
      Dans les KELIM EUX-MÊMES (be-behinat ha-kelim atzman) → ils sont ÉGAUX.
    type: axiome_explicite
    concepts:
      - {id: kelim_shavim_be_chozer, role: kelim_egaux_dans_chozer}
      - {id: hitpashtut_lo_ma_alah, role: extension_pas_superiorite}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: ["adam_kadmon"]
      relevance: "Dans l'Ohr Chozer : TOUS les Kelim sont ÉGAUX — l'extension ne confère pas de supériorité"

  - id: "EC-H1S4-026"
    source_he: "וכשחוזר האור ומלביש ההבל נמצא כשהוא סמוך לפה גדול הבל הפה מהבל האזן כי הבל הפה הוא עתה סמוך לפה בבחי' ראש והבל האזן עדיין הוא בבחי' שאר הגוף עד שיעלה נגד האזן"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      Quand l'OHR revient et HABILLE le HEVEL →
      PRÈS du PEH : le HEVEL du PEH est GADOL (grand) par rapport au HEVEL de l'OZEN.
      Car le Hevel du PEH est maintenant SAMUKH (proche) du PEH en aspect de ROSH (tête).
      Le Hevel de l'OZEN est encore en aspect de SHE'AR HA-GUF (reste du corps)
      jusqu'à ce qu'il MONTE en face de l'OZEN.
      La PROXIMITÉ à la source ACTUELLE détermine la GRANDEUR relative.
    type: axiome_explicite
    concepts:
      - {id: proximity_source, role: proximite_determine_grandeur}
      - {id: hevel_peh_rosh, role: souffle_bouche_tete}
      - {id: hevel_ozen_guf, role: souffle_oreille_corps}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "La proximité au point d'émission actuel détermine la grandeur relative du Hevel"

  # ─── BLOC M : DÉTAILS MANQUANTS DU DRUSH — GEMATRIA, MASAKH, MAKIF ───

  - id: "EC-H1S4-027"
    source_he: "כי הראיי' היא י' שמיעה ה' ריחא ו' דיבור ה' הרי ד' אותיות הוי\"ה שהם חבת\"ם שהם נר\"ן [נ\"א נרנ\"ח]"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      MAPPING YHVH SENSORIEL — détail du Drush :
      RE'IYAH = YOD, SHEMI'AH = HEH, REIHAH = VAV, DIBUR = HEH
      = 4 OTIOT HAVAYAH = CHBTM (חבת"ם — Chokhmah, Binah, Tiferet, Malkhut) = NRN.
      NUSAH AHER : NRNH (נרנ"ח — Nefesh, Ruah, Neshamah, Hayah).
      La RE'IYAH est HAYAH = YOD du Shem = CHOKHMAH.
    type: axiome_explicite
    concepts:
      - {id: chbtm, role: chokhmah_binah_tiferet_malkhut}
      - {id: nusah_aher_nrnh, role: variante_nrnh}
    mapping:
      modules: ["[PLANNED] core/shem_havayah.py"]
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "CHBTM = l'acronyme exact du mapping YHVH sensoriel, avec variante textuelle NRNH"

  - id: "EC-H1S4-028"
    source_he: "והיה בו כח לעשות כלים לג' בחינת אלו. י' דנשמה בהבל אזן. י' דרוח בהבל חוטם י' דנפש בהבל הפה וז\"ס מרחוק ה' נראה לי"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      La HISTAKKELUT a le KOAH (force) de faire les KELIM pour les 3 BEHINOT :
      YOD de NESHAMAH → dans le HEVEL de l'OZEN
      YOD de RUAH → dans le HEVEL du HOTEM
      YOD de NEFESH → dans le HEVEL du PEH
      Chaque Hevel reçoit un YOD (étincelle de Chokhmah) pour former ses Kelim.
      C'est le secret de "ME-RAHOK HASHEM NIR'AH LI" (Jérémie 31:3 —
      de LOIN, Hashem m'est APPARU) : la Re'iyah agit de LOIN.
    type: déduction_scripturaire
    concepts:
      - {id: yod_neshamah_ozen, role: yod_neshamah_dans_oreille}
      - {id: yod_ruah_hotem, role: yod_ruah_dans_nez}
      - {id: yod_nefesh_peh, role: yod_nefesh_dans_bouche}
      - {id: me_rahok_nir_ah, role: de_loin_apparu}
    mapping:
      modules: []
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "Chaque Hevel reçoit un YOD de la Histakkelut pour former ses Kelim — la vue agit à distance"

  - id: "EC-H1S4-029"
    source_he: "ומשאר הבלים אם היה יוצא מהם הסתכלות לבד דרך מסך כמו העינים לא היה כח בהם לעשות כלים. וכ\"ז הוא דין... וראי' זו גימ' גבור\"ה ודבו\"ר גימ' רי\"ו עם ד' אותיות"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah"
    assertion: |
      Si les AUTRES HEVELIM ne produisaient que de la HISTAKKELUT
      à travers un MASAKH (écran) comme les EINAYIM →
      ils n'auraient PAS la FORCE (koah) de faire les KELIM.
      Les Hevelim DOIVENT émettre du Hevel RÉEL (pas seulement du regard).
      Tout ceci est DIN (rigueur/jugement).
      GEMATRIA : RE'IYAH (ראי"ה) = GEVURAH (גבור"ה) = 216.
      DIBUR (דבו"ר) = 216 avec les 4 lettres = aussi GEVURAH.
      La FORMATION des Kelim est un acte de DIN.
    type: axiome_explicite
    concepts:
      - {id: masakh_einayim, role: ecran_des_yeux}
      - {id: hevelim_need_substance, role: hevelim_doivent_emettre}
      - {id: din_formation_kelim, role: rigueur_dans_formation}
      - {id: re_iyah_gevurah_216, role: gematria_re_iyah_gevurah}
      - {id: dibur_216, role: gematria_dibur_216}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["adam_kadmon"]
      relevance: "RE'IYAH = GEVURAH = 216 — la formation des Kelim est un acte de DIN (rigueur)"

  - id: "EC-H1S4-030"
    source_he: "הענין הוא שמכאן נמשך מקיף מהקול אל הת\"ת ומהדבור אל המל' ומה שלפעמים עלה ישראל לחכמה... כמאן דארח שעולה ריח ניחוח עד המוח. כי שם הוא חכמה"
    source_ref: "Heikhal 1, Sha'ar 4:1 — Drush R. Gedalyah — conclusion"
    assertion: |
      D'ici (du Peh) se tire un OHR MAKIF :
      Du KOL → MAKIF vers TIFERET (Z"A).
      Du DIBUR → MAKIF vers MALKHUT.
      Même si YISRAEL monte parfois jusqu'à CHOKHMAH
      (alors que son SHORESH est ici dans le HOTEM, et les EINAYIM sont en CHOKHMAH) →
      il MONTE comme RE'AH NIHO'AH (odeur agréable) qui s'élève jusqu'au MO'AH (cerveau)
      car là se trouve la CHOKHMAH.
    type: axiome_explicite
    concepts:
      - {id: makif_kol_tiferet, role: makif_voix_vers_tiferet}
