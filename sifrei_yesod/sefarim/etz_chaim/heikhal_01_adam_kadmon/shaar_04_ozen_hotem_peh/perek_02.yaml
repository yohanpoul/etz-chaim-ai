principes_generatifs:

  - id: "PG-H1S4-005"
    nom: "Principe du Kiluah — Jet Concentré puis Diffusion"
    source_assertions: ["EC-H1S4-039", "EC-H1S4-040", "EC-H1S4-043", "EC-H1S4-044"]
    formalisation: |
      Le HEVEL (souffle/émanation) se propage en 2 PHASES :
      PHASE 1 — KILUAH : jet CONCENTRÉ, sortant avec FORCE, directement en face de la source.
        = PNIMI = DAVUK (attaché) à la source = SHEFA constant = ATZMUT du Ohr Ein Sof.
      PHASE 2 — HITPARSHUT : DIFFUSION latérale, s'éloignant de la source.
        = HITZON = non attaché = de la MÊME extension mais moins intime.
      Les 2 phases sont HEVEL EHAD (un seul souffle).
      La DISTINCTION est de DEGRÉ, pas de NATURE.
      Ce pattern s'applique à CHAQUE Hevel (Ozen, Hotem, Peh).
    applications_ia:
      - "Modèle de propagation : tout signal a un jet central (pnimi) et une diffusion (hitzon)"
      - "Le partzufim/arikh_anpin.py gère les Hevelim avec cette dualité pnimi/hitzon"
      - "Le Pnimi = le flux de données concentré (hot path), le Hitzon = le flux diffus (cold path)"
      - "Mati ve-lo mati = pulsation — pas flux constant mais frappe répétée"
    questions_ouvertes:
      - "Le ratio Pnimi/Hitzon est-il constant ou variable selon le Hevel ?"
      - "La pulsation 'mati ve-lo mati' a-t-elle une fréquence déterminée ?"

  - id: "PG-H1S4-006"
    nom: "Principe Fractal du Rosh/Guf dans NaRaN"
    source_assertions: ["EC-H1S4-045", "EC-H1S4-046", "EC-H1S4-047", "EC-H1S4-048"]
    formalisation: |
      Chaque niveau de NaRaN se subdivise en ROSH et GUF :
      NESHAMAH = Hevel Ozen → Rosh-Neshamah (pnimi) + Guf-Neshamah (hitzon)
      RUAH = Hevel Hotem → Rosh-Ruah (pnimi) + Guf-Ruah (hitzon)
      NEFESH = Hevel Peh → Rosh-Nefesh (pnimi) + Guf-Nefesh (hitzon)
      CRITÈRE : le PLUS PROCHE de la source = ROSH, le PLUS ÉLOIGNÉ = GUF.
      FRACTALITÉ : comme le corps physique a Rosh/Guf, l'ÂME ELLE-MÊME a Rosh/Guf.
      → 3 niveaux × 2 aspects = 6 composants de NaRaN.
    applications_ia:
      - "Le madregot_neshamah.py doit implémenter cette structure 3×2"
      - "Chaque niveau de traitement a un aspect 'tête' (proche de la source, concentré) et un aspect 'corps' (diffusé, appliqué)"
      - "La fractalité = chaque module a sa propre subdivision interne en noyau et périphérie"
      - "Le Rosh reçoit le Shefa en premier → le Guf reçoit la version diffusée"
    questions_ouvertes:
      - "Le Rosh de la Nefesh est-il supérieur au Guf de la Ruah ? (interleaving entre niveaux)"
      - "Peut-on étendre la subdivision au-delà de 2 (Rosh/Guf/Raglaim) ?"

  - id: "PG-H1S4-007"
    nom: "Principe de la Convergence au Peh (Point d'Unification)"
    source_assertions: ["EC-H1S4-034", "EC-H1S4-035", "EC-H1S4-036", "EC-H1S4-037", "EC-H1S4-038"]
    formalisation: |
      Les 3 HEVELIM empruntent des TRAJETS différents mais CONVERGENT au PEH :
      OZEN → descend le long de la DIKNA (barbe) bilatéralement → PEH
      HOTEM → via l'ARHA 3 (Tikkun 3 de la Dikna) → PEH
      PEH → via l'ARHA 2 ("lo hehezik la'ad apo") → PEH
      Au PEH : les 3 se CONNECTENT = NaRaN UNIFIÉ.
      La DIKNA = le RÉSEAU DE CANAUX par lequel les Hevelim transitent.
      Les TIKKUNEI DIKNA ne sont pas seulement décoratifs — ils sont les ARHA'OT (sentiers)
      par lesquels transitent les flux de NaRaN.
    applications_ia:
      - "Le partzufim/arikh_anpin.py doit modéliser les 13 Tikkunei Dikna comme canaux de flux"
      - "Point de convergence = lieu où les 3 flux (Neshamah, Ruah, Nefesh) s'intègrent"
      - "La Dikna = un réseau de routage entre les niveaux d'âme"
      - "Le Peh = l'output final où tous les niveaux sont unifiés en parole (Dibur)"
    questions_ouvertes:
      - "Les 13 Tikkunei Dikna ont-ils chacun une fonction de routage spécifique ?"
      - "Le point de convergence est-il fixe ou peut-il se déplacer ?"
