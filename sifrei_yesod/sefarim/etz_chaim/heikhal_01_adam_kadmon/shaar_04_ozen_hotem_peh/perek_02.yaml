      tables: ["madregot_states"]
      partzufim: []
      relevance: "Le Hevel Hotem Pnimi = Rosh de la Ruah; Hitzon = Guf de la Ruah"

  - id: "EC-H1S4-048"
    source_he: "גם מהבל פה נעשה עד\"ז בחי' נפש של ראש ובחי' נפש של גוף הרי ביארנו ענין נר\"ן"
