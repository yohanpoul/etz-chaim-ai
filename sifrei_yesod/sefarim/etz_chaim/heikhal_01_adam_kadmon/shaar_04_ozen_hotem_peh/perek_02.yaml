      Du HEVEL PEH → de la MÊME MANIÈRE (al derekh zeh) :
      NEFESH SHEL ROSH (Nefesh de la tête) et NEFESH SHEL GUF (Nefesh du corps).
      "HAREI BEIRARNU INYAN NaRaN" (ainsi nous avons expliqué la question de NaRaN).
      RÉCAPITULATION COMPLÈTE :
      OZEN → NESHAMAH (Rosh + Guf)
      HOTEM → RUAH (Rosh + Guf)
      PEH → NEFESH (Rosh + Guf)
