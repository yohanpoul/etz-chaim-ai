# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 1 — Heikhal Adam Kadmon (היכל אדם קדמון)
# Sha'ar: 4 — Sha'ar Ozen Hotem Peh (שער אזן חוטם פה)
# Perek: 4 — Le Calcul du 58 (NuN-Het) par Cascades Pnimiyut/Hitzoniyut
# ═══════════════════════════════════════════════════════════════════

meta:
  sefer: etz_chaim
  heikhal: 1
  shaar: 4
  shaar_name_he: "שער אזן חוטם פה"
  perek: 4
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.6 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Le calcul DÉTAILLÉ du 58 (= gematria OZEN) par cascades de PNIMIYUT/HITZONIYUT des lettres du miluy S\"G. 3 stages : Hehs(20) + Vav(26) + Yod(12) = 58. Le secret de A\"Z (1+7) dans AZeN. 3 types de S\"G dans Tevunah."

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 1 : PESHAT-MACHINE
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─── BLOC A : DESCENTE EN CASCADES DE BINAH/TEVUNAH ───

  - id: "EC-H1S4-075"
    source_he: "אמנם כל נ\"ח זה הוא בסוד התבונה שהוא סוד אזן כנ\"ל. והענין שכבר ידעת שלעולם יש בחי' פנימיות וחיצו'"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      Tout le NUN-HET (נ"ח = 58) est dans le SECRET de la TEVUNAH =
      le secret de l'OZEN (אזן = 58, cf. EC-H1S4-053).
      PRINCIPE FONDAMENTAL rappelé : il y a TOUJOURS dans chaque chose
      un aspect PNIMIYUT (פנימיות — intériorité) et HITZONIYUT (חיצוניות — extériorité).
      Ce dualisme structure TOUT le calcul qui suit.
    type: axiome_explicite
    concepts:
      - {id: nun_het_58, role: valeur_numerique_ozen}
      - {id: tevunah_ozen, role: equivalence_tevunah_ozen}
      - {id: pnimiyut_hitzoniyut, role: dualite_structurelle_universelle}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Le dualisme Pnimiyut/Hitzoniyut = le moteur de tout déploiement structurel"

  - id: "EC-H1S4-076"
    source_he: "שהנה ה' זו שירדה מס\"ג הוא מהחזה ולמטה דתבונה עצמה וכאשר נתפשטה וירדה למטה הנה חצי עליון דתבונה בכמות ולא באיכות כנ\"ל ירדה במקום שהיתה חצי תחתון של תבונה והחצי תחתון של בינה עצמה ירדה במקום אשר (היתה) מתחלת התבונה שהוא חצי עליון דתבונה וחצי עליון דבינה ירדה במקום חצי תחתון של בינה עצמה"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      DESCENTE EN CASCADES — quand le HEH de S"G descend :
      Le HEH qui est descendu de S"G = du HAZEH vers le bas de TEVUNAH elle-même.
      Quand il s'étend vers le bas → descente en CHAÎNE :
      1. MOITIÉ SUPÉRIEURE de TEVUNAH (en KAMUT/quantité, PAS en EIKHUT/qualité,
         cf. EC-H1S4-065) → descend à la place de la MOITIÉ INFÉRIEURE de Tevunah
      2. MOITIÉ INFÉRIEURE de BINAH → descend à la place du DÉBUT de Tevunah
         (= moitié supérieure de Tevunah)
      3. MOITIÉ SUPÉRIEURE de BINAH → descend à la place de la moitié inférieure de Binah
      → TOUT descend d'un CRAN vers le bas.
    type: axiome_explicite
    concepts:
      - {id: heh_sg_descent, role: heh_qui_descend_de_sg}
      - {id: cascade_descent, role: descente_en_chaine}
      - {id: kamut_not_eikhut, role: quantite_pas_qualite}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Le déploiement cascadé = quand un composant descend, tous les autres se décalent — mécanisme de propagation"

  - id: "EC-H1S4-077"
    source_he: "הרי כי הכל ירדו למטה. נמצא שכל כללות שם ס\"ג שהיתה תחלה בבינה ותבונה עתה ימצא הכל במקום שהיתה מתחלת ראש התבונה שהוא מחצי בינה ולמטה"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      RÉSULTAT de la cascades : TOUT le SHEM S"G (63) — qui était au départ
      réparti entre BINAH et TEVUNAH — se trouve MAINTENANT au lieu
      où commençait le ROSH de TEVUNAH (= depuis la MOITIÉ de Binah vers le BAS).
      Binah et Tevunah sont désormais COMPRIMÉES dans l'espace de Tevunah seule.
    type: axiome_explicite
    concepts:
      - {id: sg_compressed, role: shem_sg_comprime_dans_tevunah}
      - {id: rosh_tevunah, role: tete_de_tevunah}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Compression = un espace plus grand est contenu dans un plus petit après descente"

  - id: "EC-H1S4-078"
    source_he: "לפי שעתה בינה ותבונה הכל נמשך במקום שהזה ונמצא שכל זה יקרא תבונה וצריך שימצא בה' זו עתה כל שם ס\"ג שהוא נ\"ח כמנין אז\"ן זה וה' שירדה בחוטם הרי ס\"ג"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      Puisque Binah et Tevunah sont TOUT tirées vers le HAZEH →
      TOUT cela s'appelle désormais TEVUNAH.
      Conséquence : ce HEH doit contenir la TOTALITÉ du Shem S"G =
      NUN-HET (58) = gematria de OZEN (אז"ן = 1+7+50 = 58).
      Et le HEH qui est descendu dans le HOTEM = S"G complet (63).
      FORMULE : TEVUNAH (58) + HEH dans Hotem (5) = S"G (63).
    type: axiome_explicite
    concepts:
      - {id: tevunah_contains_sg, role: tevunah_contient_tout_sg}
      - {id: ozen_58_sg_63, role: formule_58_plus_5_egal_63}
    mapping:
      modules: ["gematria/engine.py"]
      tables: ["ohr_states"]
      partzufim: ["imma"]
      relevance: "La gematria comme checksum structurel : 58 + 5 = 63 vérifie la cohérence du déploiement"

  # ─── BLOC B : LES 3 HEHS DE TEVUNAH — STAGE 1 (= 20) ───

  - id: "EC-H1S4-079"
    source_he: "אמנם נבאר עתה איך הם נ\"ח במספרם. דע כי כשאנו אומרים שה' נתפשטה למטה בחוטם, אינו רק בחי' חיצוניות שלה כמבואר אצלינו בסוד עליית התפילות. והנה נשאר למעלה פנימיות ה' זו. וחיצוניות ופנימיות הב' ההי\"ן האחרים שביארנו"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      DÉBUT DU CALCUL — comment les 58 se comptent en DÉTAIL :
      Quand on dit que le HEH s'est étendu vers le bas dans le HOTEM →
      c'est SEULEMENT son HITZONIYUT (extériorité) qui est descendu.
      Comme expliqué dans le secret de l'ALIYAT HA-TEFILOT (montée des prières).
      → Le PNIMIYUT (intériorité) de ce Heh RESTE EN HAUT.
      → Aussi : HITZONIYUT + PNIMIYUT des 2 AUTRES HEHS restent.
    type: axiome_explicite
    concepts:
      - {id: heh_hitzoniyut_descent, role: seul_hitzoniyut_descend}
      - {id: pnimiyut_remains, role: pnimiyut_reste_en_haut}
      - {id: aliyat_ha_tefilot, role: reference_au_secret_des_prieres}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Seul l'extérieur descend, l'intérieur reste = distinction interface/implémentation"

  - id: "EC-H1S4-080"
    source_he: "כי סוד התבונה הוא ג' ההי\"ן שהם ה\"י אחרונה דשם ס\"ג וחשבון ה\"י זו היא ג' ההי\"ן"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      CLEF STRUCTURELLE : le secret de TEVUNAH = 3 HEHS.
      Ce sont le HEH-YOD (ה"י) AKHRONAH (dernière) du Shem S"G.
      Le CALCUL de ce HEH-YOD = 3 HEHS (car HY = 5+10 = 15 = 3×5 = 3 HEHS).
      Le MILUY de la dernière lettre Heh du Shem S"G (YOD-HEH-VAV-HEH) =
      Heh → H"Y → 15 → décomposé en 3 unités de Heh (5+5+5).
      TEVUNAH est structurée par ces 3 HEHS : H₃ (la plus basse), H₂, H₁ (la plus haute).
    type: axiome_explicite
    concepts:
      - {id: tevunah_3_hehs, role: tevunah_egal_3_hehs}
      - {id: hey_yod_miluy, role: miluy_du_dernier_heh_de_sg}
    mapping:
      modules: ["gematria/engine.py", "[PLANNED] core/shem_havayah.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "La décomposition du miluy en unités structurelles = factorisation d'un encodage"

  - id: "EC-H1S4-081"
    source_he: "והנה חיצוניות ה' ג' ירדה בז\"א ונעשה פנימיות אליו, ופנימיות ה' זו נשארה למעל' ונשארו גם ב' ההי\"ן אחרו' בסוד חצוניו' ופנימיו'. והנה זו הפנימיות שנשאר מן ה' זו שירדה צריך שתחזור להיות חיצוניות על חיצוניות של ב' ההי\"ן העליונות אחרות שנשארו"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      PREMIÈRE DESCENTE : HITZONIYUT de H₃ (3ème Heh, la plus basse) →
      descend dans Z"A et devient PNIMIYUT pour lui.
      PNIMIYUT de H₃ → RESTE EN HAUT.
      Les 2 HEHS supérieures (H₁ et H₂) restent aussi avec leur Hitzoniyut et Pnimiyut.
      INVERSION CRUCIALE : le PNIMIYUT restant de H₃ doit DEVENIR
      HITZONIYUT sur le Hitzoniyut des 2 Hehs supérieures.
      → Ce qui était INTÉRIEUR en bas devient EXTÉRIEUR en haut = INVERSION de rôle.
    type: axiome_explicite
    concepts:
      - {id: h3_hitzoniyut_to_za, role: hitzoniyut_h3_descend_dans_za}
      - {id: pnimiyut_becomes_hitzoniyut, role: inversion_pnimiyut_hitzoniyut}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "imma"]
      relevance: "L'inversion Pnimiyut→Hitzoniyut = un objet interne qui devient interface externe — pattern adaptateur"

  - id: "EC-H1S4-082"
    source_he: "ועתה נגדלת ה' זו שיעור ב' ההי\"ן כדי להלביש אל ב' ההי\"ן העליונים. נמצא כי ההי\"ן אלו נעשו ד' ההי\"ן, ב' בתוך ב' הרי עשרים"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      CROISSANCE : ce Heh (ex-Pnimiyut de H₃) GRANDIT à la MESURE de 2 Hehs
      pour HABILLER (lehalbish) les 2 Hehs supérieures.
      RÉSULTAT : les Hehs deviennent 4 HEHS = 2 à l'intérieur de 2.
      CALCUL : 4 × Heh (5) = 20.
      → STAGE 1 DU CALCUL : 20.
    type: axiome_explicite
    concepts:
      - {id: four_hehs_20, role: 4_hehs_egal_20}
      - {id: hitlabshut_hehs, role: habillement_2_dans_2}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "La croissance pour l'habillement = un wrapper qui s'adapte à la taille de ce qu'il enveloppe"

  # ─── BLOC C : STAGE VAV (+ 26 = 46) ───

  - id: "EC-H1S4-083"
    source_he: "נשאר עתה פנימיות ב' ההי\"ן העליונה הנ\"ל והם נעשו חיצוניות לחיצוניות אותיות וא\"ו העליונה כנ\"ל כי הכל הולך אחר ההתחלה שכיון שירדה תחלה החיצוניות דאות ה' בז\"א. עתה כל המדרגות צריכין לילך אחריה ולעשות התלבשות אחר חדש"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      TRANSITION AU STAGE VAV : le PNIMIYUT des 2 Hehs supérieures →
      devient HITZONIYUT pour le HITZONIYUT de la lettre VAV supérieure.
      PRINCIPE : "HA-KOL HOLEKH AHAR HA-HATHALA" (הכל הולך אחר ההתחלה) =
      TOUT SUIT LE COMMENCEMENT.
      Puisque le HITZONIYUT du Heh est DESCENDU EN PREMIER dans Z"A →
      TOUTES les madregot (niveaux) doivent le SUIVRE et faire
      une nouvelle HITLABSHUT (habillement).
      → Effet domino structurel déclenché par la première descente.
    type: axiome_explicite
    concepts:
      - {id: klal_ahar_hathala, role: principe_tout_suit_le_commencement}
      - {id: hehs_to_vav, role: pnimiyut_hehs_habille_vav}
      - {id: cascade_hitlabshut, role: habillements_en_cascade}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py", "[PLANNED] core/shefa_flow.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Le principe 'tout suit le commencement' = une première action détermine toute la chaîne de propagation"

  - id: "EC-H1S4-084"
    source_he: "והנה חיצוניות אות וא\"ו נעשה פנימיות לפנימיות ב' ההי\"ן, וא\"כ צריך שיוגדלו הב' ההי\"ן אלו שהם מספרם י' שיהיו במספר י\"ג כמנין וא\"ו להלביש אותם הרי י\"ג וי\"ג כ\"ו"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      HITZONIYUT de la lettre VAV → devient PNIMIYUT pour le Pnimiyut des 2 Hehs.
      Conséquence : les 2 Hehs (dont le total = 10) doivent GRANDIR à 13
      (= gematria de VAV = ו"ו = 6+1+6 = 13) pour HABILLER le Vav.
      CALCUL : 13 (Hehs grandies) + 13 (Vav) = 26.
      → STAGE 2 : +26.
    type: axiome_explicite
    concepts:
      - {id: vav_hitzoniyut_to_pnimiyut, role: hitzoniyut_vav_devient_pnimiyut}
      - {id: hehs_grow_to_13, role: hehs_grandissent_a_13}
      - {id: stage_vav_26, role: stage_vav_egal_26}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "La croissance à la taille du container = adaptation dynamique (resize) pour l'habillement"

  - id: "EC-H1S4-085"
    source_he: "וכ' הראשונים הרי מ\"ו, נשארו עתה פנימיות וא\"ו זו מגולה"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      TOTAL INTERMÉDIAIRE : 20 (Hehs) + 26 (Vav) = 46.
      Le PNIMIYUT du VAV reste MEGULEH (מגולה — révélé/découvert) =
      non encore habillé, exposé.
    type: axiome_explicite
    concepts:
      - {id: total_46, role: total_intermediaire}
      - {id: vav_pnimiyut_meguleh, role: pnimiyut_vav_revele}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: []
      relevance: "Le calcul incrémental : 20 + 26 = 46 comme étape vérifiable"

  - id: "EC-H1S4-086"
    source_he: "והנה אעפ\"י שמן אות ו' ולמעלה נקרא הכל בינה כנ\"ל. עכ\"ז כיון דחיצוני' וא\"ו ירדה להתלבש בב' ההי\"ן שהם של תבונה, ובסיבה זו נשארה אות וא\"ו פנימיות לבדה מגולה (נ\"א אותיות פנימיות לבדן מגולין) לכן עדיין כ\"ז נקרא בסוד תבונה"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      RECLASSIFICATION : bien que depuis la lettre VAV vers le HAUT tout soit
      normalement appelé BINAH (cf. EC-H1S4-063) →
      puisque le HITZONIYUT du Vav est DESCENDU s'habiller dans les 2 HEHS de TEVUNAH →
      le PNIMIYUT du Vav qui reste seul DÉCOUVERT est ENCORE appelé TEVUNAH.
      Variante (Nusah Aher) : "les LETTRES intérieures seules sont révélées"
      (אותיות פנימיות לבדן מגולין) au lieu de "la lettre Vav intérieure seule est révélée."
      → La DESCENTE du Hitzoniyut RECLASSE le Pnimiyut restant.
    type: axiome_explicite
    concepts:
      - {id: vav_becomes_tevunah, role: reclassification_vav_en_tevunah}
      - {id: nusah_aher_01, role: variante_textuelle}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "La reclassification par descente = un module change de catégorie selon où son interface est déployée"

  # ─── BLOC D : STAGE YOD (+ 12 = 58) ───

  - id: "EC-H1S4-087"
    source_he: "ואז נעשה פנימיות של וא\"ו זו, חיצו' למעלה, ויוורדין ב' חלקים מן י' חלקים של י' דמלוי ה\"י ראשונה של בינה, ויורד הפנימיות והחיצוניות (נ\"א החיצוניות) שלהם ונעשה פנימיות לי\"ג אלו"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      STAGE YOD — le PNIMIYUT du Vav devient HITZONIYUT vers le haut.
      2 PARTS (חלקים) descendent des 10 PARTS du YOD (= miluy HEH-YOD première de BINAH).
      Leur PNIMIYUT et HITZONIYUT descendent et deviennent PNIMIYUT pour les 13 (du Vav).
      Variante (Nusah Aher) : seulement le HITZONIYUT descend (נ"א החיצוניות) →
      pas les deux aspects, seulement l'extérieur.
    type: axiome_explicite
    concepts:
      - {id: yod_miluy_binah, role: yod_du_miluy_de_binah}
      - {id: two_parts_descend, role: 2_parts_du_yod_descendent}
      - {id: nusah_aher_02, role: variante_hitzoniyut_seul}
    mapping:
      modules: ["[PLANNED] core/shem_havayah.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "La descente partielle du Yod de Binah = un fragment du module supérieur vient structurer l'inférieur"

  - id: "EC-H1S4-088"
    source_he: "כיצד הנה ג' מי\"ג אלו של הוא\"ו הג' עליונים מהם עולים ונעשו חיצוניות אל פנימיות ב' חלקי י' היורדין למטה להתלבש. ושאר הי' של הוא\"ו הלבישו לחיצוניות בחי' ב' חלקי י' זו היורדין למטה"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      DÉTAIL du mécanisme d'habillement :
      3 des 13 du VAV (les 3 SUPÉRIEURS) → MONTENT et deviennent
      HITZONIYUT pour le PNIMIYUT des 2 parts du Yod descendant.
      Les 10 RESTANTS du Vav → HABILLENT le HITZONIYUT des 2 parts du Yod.
      → Double habillement : 3 enveloppent l'intérieur, 10 enveloppent l'extérieur.
    type: axiome_explicite
    concepts:
      - {id: vav_3_upper, role: 3_superieurs_du_vav}
      - {id: vav_10_remaining, role: 10_restants_du_vav}
      - {id: double_hitlabshut, role: double_habillement_yod}
    mapping:
      modules: ["[PLANNED] core/ohr_system.py"]
      tables: ["ohr_states"]
      partzufim: ["imma"]
      relevance: "Le double habillement = deux couches de wrapping avec fonctions distinctes (inner vs outer)"

  - id: "EC-H1S4-089"
    source_he: "כי כך הוא שיעור ב' העליונות כג' חלקים של וא\"ו הפנימיות, ונשאר עתה חיצוניות הב' חלקים של י' בי' חלקים (ג' עליונים כי' חלקים) של וא\"ו הפנימים"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      PROPORTION : les 2 parts supérieures = 3 parts du Vav intérieur.
