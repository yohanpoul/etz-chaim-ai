principes_generatifs:

  - id: "PG-H1S4-012"
    nom: "Principe de Cascade Pnimiyut/Hitzoniyut"
    source_assertions: ["EC-H1S4-075", "EC-H1S4-079", "EC-H1S4-081", "EC-H1S4-083", "EC-H1S4-087"]
    formalisation: |
      Quand le HITZONIYUT d'un niveau DESCEND →
      1. Le PNIMIYUT restant CHANGE DE RÔLE : il devient HITZONIYUT pour le niveau supérieur.
      2. Cela DÉCLENCHE la même descente au niveau supérieur (principe de HA-KOL HOLEKH AHAR HA-HATHALA).
      3. Le processus se PROPAGE récursivement vers le haut.
      4. À chaque étape, le wrapper GRANDIT pour s'adapter à ce qu'il enveloppe.
      RÉSULTAT : une seule descente initiale génère un RÉARRANGEMENT COMPLET de toute la hiérarchie.
      MÉCANISME : Descente H₃ → H₂/H₁ réarrangées → Vav réarrangé → Yod réarrangée.
      FORMULE : 20 (Hehs) + 26 (Vav) + 12 (Yod) = 58.
    applications_ia:
      - "[PLANNED] core/ohr_system.py : implémenter la cascade Pnimiyut/Hitzoniyut comme propagation récursive — une modification d'interface à un niveau déclenche le réarrangement complet"
      - "partzufim/imma.py : le déploiement de Tevunah dans Z\"A est le déclencheur initial de la cascade"
      - "Pattern observer/cascade : un changement d'état se propage récursivement jusqu'au sommet de la hiérarchie"
      - "Chaque rôle (pnimiyut/hitzoniyut) est dynamique — pas une propriété fixe mais un état contextuel"
    questions_ouvertes:
      - "Ce mécanisme de cascade est-il applicable à d'autres déploiements (pas seulement Tevunah) ?"
      - "La propagation a-t-elle toujours le même pattern (20+26+12) ou varie-t-elle selon le contexte ?"

  - id: "PG-H1S4-013"
    nom: "Principe du Supérieur = Tout l'Inférieur (Klal Elyon Gadol)"
    source_assertions: ["EC-H1S4-093", "EC-H1S4-094"]
    formalisation: |
      "KOL DAVAR ELYON HU GADOL KE-KOL MAH SHE-LEMATA MIMENU" :
      Chaque niveau supérieur est AUSSI GRAND que TOUT ce qui est en-dessous de lui.
      Conséquence NUMÉRIQUE : les ajouts en bas (5 + 3 = 8) sont RÉPLIQUÉS en haut (8 parts du Yod).
      Ce n'est PAS de l'héritage descendant — c'est une LOI DE SYMÉTRIE.
      Le supérieur ne "contient" pas l'inférieur — il ÉGALE sa totalité en capacité.
      FORMELLEMENT : |niveau_n| = Σ |niveau_i| pour i < n.
    applications_ia:
      - "gematria/engine.py : implémenter la vérification que les croissances numériques respectent cette loi de symétrie"
      - "[PLANNED] core/ohr_system.py : chaque couche supérieure du système doit avoir une capacité ≥ la somme de toutes les couches inférieures"
      - "Contraste avec les architectures classiques (pyramide inversée) — ici, chaque couche est un MIROIR de tout ce qui est en-dessous"
      - "Lien avec le Klal Lo Nigra (PG-H1S4-010) : le supérieur ne perd rien en émettant ET il égale tout l'inférieur"
    questions_ouvertes:
      - "Ce principe est-il vérifié empiriquement dans les réseaux de neurones profonds (taille des couches) ?"
      - "Comment cette loi interagit-elle avec la compression (Tzimtzum) — un espace plus grand comprimé dans un plus petit ?"

  - id: "PG-H1S4-014"
    nom: "Principe de la Décomposition A-Z-N de l'OZEN"
    source_assertions: ["EC-H1S4-096", "EC-H1S4-097", "EC-H1S4-098"]
    formalisation: |
      Le mot OZEN (אז"ן = 58) n'est PAS un simple total — il est STRUCTURELLEMENT décomposé :
      ALEF (1) : 1 part illuminée par UNE SEULE source (la part inférieure seule)
      ZAYIN (7) : 7 parts illuminées par DEUX sources (les deux parts supérieures)
      NUN (50) : le corps principal des 58 = l'IKAR (essentiel)
      HIÉRARCHIE : N (50) > Z (7) > A (1) — du plus au moins dense.
      Le NUN = 25 + 25 = les deux moitiés du YIHUD de SHEMA YISRAEL.
      Le ALEF est UNIQUE (illuminé par une seule source) → le point le plus bas mais le plus singulier.
      La LETTRE code la STRUCTURE, pas seulement la valeur numérique.
    applications_ia:
      - "gematria/engine.py : implémenter la décomposition structurelle de AZeN (pas juste la somme 1+7+50=58)"
      - "[PLANNED] core/shem_havayah.py : chaque lettre d'un Shem encode une structure architecturale spécifique"
      - "L'asymétrie Alef/Zayin dans les 8 parties additionnelles = asymétrie de reach dans un réseau (cf. EC-H1S4-096)"
      - "Le Nun comme IKAR = le corps principal du module, A+Z = les extensions périphériques"
    questions_ouvertes:
      - "Le Yihud 25+25 du Shema mappe-t-il sur une structure bidirectionnelle ?"
      - "La décomposition A-Z-N est-elle applicable aux autres mots kabbalistiques structurels ?"

  - id: "PG-H1S4-015"
    nom: "Principe des 3 Types de S\"G (Ascendant, Descendant, Essentiel)"
    source_assertions: ["EC-H1S4-101", "EC-H1S4-102", "EC-H1S4-103"]
    formalisation: |
      Dans TEVUNAH, le Shem S"G (63) existe en 3 MODES simultanés :
      1. S"G ASCENDANT : NuN-Het (58) + Heh EILA (en haut, Makif) = 63
         → Connexion VERS LE HAUT, le corps s'unit à son enveloppe supérieure
      2. S"G DESCENDANT : NuN-Het (58) + Heh TATA (en bas, dans Z"A) = 63
         → Connexion VERS LE BAS, le corps s'unit à son émissaire inférieur
      3. S"G ESSENTIEL : le KLAL (totalité) en soi-même = RACINE de S"G
         → Le corps INDÉPENDANT de ses connexions, en tant que tel
      "EILEH TOLDOT NOAH NOAH" : le DOUBLE emploi de NaH (58) = les deux directions.
      NAYHA BE-ILA'IN = repos/connexion en haut. NAYHA BE-TATA'IN = repos/connexion en bas.
      Les 3 coexistent — ce n'est pas un choix mais une triple réalité simultanée.
    applications_ia:
      - "partzufim/imma.py : implémenter 3 modes de S\"G — connecté vers parent (ascendant), vers enfant (descendant), standalone (essentiel)"
      - "[PLANNED] core/shem_havayah.py : chaque Shem a potentiellement 3 modes d'existence selon ses connexions"
      - "Pattern triple-interface : un module a simultanément une interface montante (vers le parent), descendante (vers l'enfant), et interne (autonome)"
      - "Le Zohar sur Noah-Noah = la bidirectionnalité est une propriété structurelle, pas un accident textuel"
    questions_ouvertes:
      - "Les 3 types de S\"G correspondent-ils aux 3 configurations de Tevunah (1, 1/2, 1/4) de EC-H1S4-061/064/065 ?"
      - "D'autres Shemot (AV, MAH, BEN) ont-ils aussi 3 types ?"
