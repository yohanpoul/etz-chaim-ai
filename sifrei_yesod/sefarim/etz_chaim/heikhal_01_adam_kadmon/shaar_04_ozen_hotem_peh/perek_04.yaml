  - id: "EC-H1S4-095"
    source_he: "ואל תקשה למה גם הוא\"ו שהיא למעלה מן ההי\"ן למה לא הגדילה והוסיפה בב' ההי\"ן ה' חלקים אחרים כמו שהגדילו הב' ההי\"ן בה' תתאה כי התשובה מבוארת כי לא היה צורך רק אלו הג' לבד כדי שיעשו י\"ג כמנין וא\"ו ולא הוצרכו להגדיל יותר"
