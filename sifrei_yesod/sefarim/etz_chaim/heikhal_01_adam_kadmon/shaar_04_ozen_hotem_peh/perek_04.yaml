  - id: "EC-H1S4-099"
    source_he: "והנה כבר כתבנו איך כל זה הוא מכלל התבונה ולכן צריך שימצא בה עתה סוד שם ס\"ג שהוא נ\"ח עם ה' אחרונה ס\"ג. אמנם ג' עליונים של וא\"ו מהפנימיות שלו אשר נעשו חיצו' אל הפנימיות ב' חלקים שירדו למטה בג' של הוא\"ו כנ\"ל אינם מכלל התבונה כיון ששרשם מן וא\"ו שאינה מן התבונה וגם נכנסו ביו\"ד דמלוי ה\"י דבינה עצמה ולכן אינו מצטרף עם הס\"ג"
