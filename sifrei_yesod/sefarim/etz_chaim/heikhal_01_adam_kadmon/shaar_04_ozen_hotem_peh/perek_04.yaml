  - id: "EC-H1S4-101"
    source_he: "וה' זו אינה לא מבינה ולא מתבונה ונשארת בסוד מקיף אל כל התבונה שהם נ\"ח וה' תתאה מכולם הרי ס\"ג והרי עתה הם ה' לעילא וה' לתתא נ\"ח באמצעיתא"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      Ce HEH N'EST NI de BINAH NI de TEVUNAH → reste en tant que
      OHR MAKIF (lumière englobante) pour TOUTE la Tevunah (= 58).
      Le HEH inférieur de tous = celui habillé dans Z"A.
      STRUCTURE TRIPARTITE RÉSULTANTE :
      HEH LE-EILA (ה' לעילא — Heh en haut) = MAKIF
      NUN-HET (58) BA-EMTZA'ITA (באמצעיתא — au milieu)
      HEH LE-TATA (ה' לתתא — Heh en bas) = dans Z"A.
    type: axiome_explicite
    concepts:
