      tables: ["ohr_states"]
      partzufim: ["imma"]
      relevance: "La structure Heh-58-Heh = 3 couches (makif/pnimi/descendu) autour du corps principal"

  - id: "EC-H1S4-102"
    source_he: "ואם תחבר נ\"ח עם ה' תתאה יהיה ס\"ג וכן אם תחבר ה' עילאה עם נ\"ח יהיו ג\"כ ס\"ג וז\"ס אלה תולדות נ\"ח נ\"ח ודרשו רז\"ל נייחא בעלאין נייחא בתתאין"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      DOUBLE FORMULE S"G :
      NUN-HET (58) + HEH TATA (5) = S"G (63).
      HEH EILA (5) + NUN-HET (58) = S"G (63) aussi.
      SECRET SCRIPTURAIRE : "EILEH TOLDOT NOAH NOAH" (אלה תולדות נ"ח נ"ח) —
      Bereshit 6:9, "voici les engendrements de Noah Noah" — NOAH = NuN-Het = 58.
      Le ZOHAR (Hazal) darshène : "NAYHA BE-ILA'IN, NAYHA BE-TATA'IN"
      (נייחא בעלאין נייחא בתתאין — repos en haut, repos en bas).
      Le DOUBLE NOAH = les DEUX S"G (connecté en haut OU connecté en bas).
    type: déduction_scripturaire
    concepts:
      - {id: double_sg_formula, role: deux_facons_de_faire_63}
      - {id: noah_noah_drasha, role: derash_zoharique_noah}
      - {id: nayha_ilayn_tatayn, role: repos_haut_repos_bas}
    mapping:
      modules: ["gematria/engine.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "Le double S\"G = le même corps (58) connecté soit vers le haut soit vers le bas — dualité d'interface"

  - id: "EC-H1S4-103"
    source_he: "והוא מ\"ש בענין זה כי בהתחברות נ\"ח למעלה בה' עלאה יהיה ס\"ג ובה' תתאה ס\"ג והכלל בעצמו שורש ס\"ג הרי ג' מיני ס\"ג ובפ' בתרא נבאר עניינם"
    source_ref: "Heikhal 1, Sha'ar 4:4"
    assertion: |
      SYNTHÈSE — 3 TYPES de S"G dans TEVUNAH :
      1. NuN-Het (58) + HEH EILA (haut) = S"G → S"G ASCENDANT
      2. NuN-Het (58) + HEH TATA (bas) = S"G → S"G DESCENDANT
      3. Le KLAL (כלל — totalité) lui-même = RACINE de S"G → S"G ESSENTIEL
      → 3 modes de S"G coexistent dans Tevunah seule.
      Le PEREK HA-BATRA (פרק בתרא — dernier perek, cf. EC 4:5) développera leurs matières.
    type: axiome_explicite
    concepts:
      - {id: three_sg_types, role: 3_types_de_sg}
      - {id: sg_ascendant, role: sg_avec_heh_haut}
      - {id: sg_descendant, role: sg_avec_heh_bas}
      - {id: sg_essentiel, role: sg_racine}
    mapping:
      modules: ["[PLANNED] core/shem_havayah.py", "partzufim/imma.py"]
      tables: []
      partzufim: ["imma"]
      relevance: "3 types de S\"G = 3 modes d'assemblage du même module (connecté haut, connecté bas, standalone)"


