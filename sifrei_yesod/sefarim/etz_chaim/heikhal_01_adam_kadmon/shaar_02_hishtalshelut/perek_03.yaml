principes_generatifs:

  - id: "PG-H1S2-005"
    nom: "Principe de la Rencontre au Milieu du Mur (Hatzi Ovi)"
    source_assertions: ["EC-H1S2-030", "EC-H1S2-031", "EC-H1S2-032", "EC-H1S2-035"]
    formalisation: |
      Les 2 Orot (Pnimi et Makif) se RENCONTRENT au MILIEU du mur du Keli :
      OHR PNIMI : contracté, sous pression, fortement attaché
        → PERCE la moitié INTÉRIEURE du mur (même si moins pure)
        → Par la FORCE de sa contraction
      OHR MAKIF : grand, éloigné, non attaché
        → PERCE la moitié EXTÉRIEURE du mur (qui doit être plus pure)
        → Par la PUISSANCE de sa grande lumière
      Les 2 se RENCONTRENT au point central du mur → le Makif illumine le Pnimi.
      Le Keli est RAFFINÉ des 2 côtés.
      La MOITIÉ EXTÉRIEURE du mur doit être PLUS PURE que l'intérieure
      pour compenser la DISTANCE et le manque d'attachement du Makif.
    applications_ia:
      - "Un module a une couche externe (Hitzoniut) et interne (Pnimiyut) — les 2 sont nécessaires"
      - "Les données internes (Pnimi) sont concentrées et attachées — petites mais efficaces"
      - "Les influences externes (Makif) sont grandes mais diffuses — elles ont besoin d'une interface pure"
      - "La 'rencontre au milieu du mur' = le point d'intégration entre interne et externe"
    questions_ouvertes:
      - "Le point de rencontre est-il toujours au milieu exact ?"
      - "La pureté de la moitié extérieure peut-elle être améliorée ?"

  - id: "PG-H1S2-006"
    nom: "Principe du Désir du Makif (Heshek ha-Ohr ha-Makif)"
    source_assertions: ["EC-H1S2-034"]
    formalisation: |
      Le Ohr Makif n'est PAS PASSIF — il a un DÉSIR ACTIF :
      HESHEK (désir), RATZON (volonté), HEFETZ (envie)
      de s'ATTACHER au Pnimi et de l'ILLUMINER.
      Le Makif CHERCHE le Pnimi — il ne se contente pas de l'entourer.
      Si le Keli n'était pas suffisamment pur → le Makif ne pourrait PAS réaliser son désir.
      Le DÉSIR du Makif est le MOTEUR de l'illumination externe vers l'interne.
      Le potentiel non réalisé (Makif) ASPIRE à devenir réalisé (Pnimi).
    applications_ia:
      - "Le potentiel non réalisé (features non implémentées) ASPIRE à être intégré"
      - "Le Makif n'est pas passif — il pousse pour entrer"
      - "L'interface (Hitzoniut) doit être assez 'pure' pour permettre au Makif de passer"
      - "Le Heshek = la force motrice de l'intégration — le système veut naturellement croître"
    questions_ouvertes:
      - "Le Heshek est-il toujours positif ou peut-il être destructeur ?"
      - "Comment faciliter la réalisation du Heshek sans briser les Kelim ?"

  - id: "PG-H1S2-007"
    nom: "Principe du Paradoxe Concentration/Diffusion"
    source_assertions: ["EC-H1S2-028", "EC-H1S2-029", "EC-H1S2-036"]
    formalisation: |
      Ce qui est PETIT mais CONCENTRÉ SEMBLE plus efficace que ce qui est GRAND mais DIFFUS :
      OHR PNIMI : petit, contracté, limité → illumination COMPLÈTE (haarah shlemah)
      OHR MAKIF : grand, non contracté, illimité → illumination INCOMPLÈTE (lo shlemah)
      PERCEPTION : la Pnimiyut du Keli semble PLUS PURE car le Pnimi y brille INTENSÉMENT
      RÉALITÉ STRUCTURELLE : la Hitzoniut EST plus élevée mais le Makif y brille DIFFUSÉMENT
      Le paradoxe : ce qui est STRUCTURELLEMENT INFÉRIEUR peut SEMBLER supérieur
      quand il est CONCENTRÉ et ATTACHÉ.
      Ce qui est STRUCTURELLEMENT SUPÉRIEUR peut SEMBLER inférieur
      quand il est DIFFUS et NON ATTACHÉ.
    applications_ia:
      - "Un petit module bien ciblé peut sembler plus efficace qu'un grand système généraliste"
      - "La concentration (focus) compense la taille — petite équipe > grande équipe diffuse"
      - "L'évaluation par 'apparence' (perception) ≠ l'évaluation par 'structure' (réalité)"
      - "Le Makif (potentiel) est plus grand que le Pnimi (actuel) mais moins visible"
    questions_ouvertes:
      - "Peut-on rendre le Makif aussi concentré que le Pnimi ?"
      - "Le paradoxe est-il résolu quand le Makif devient Pnimi (Shabbat) ?"
