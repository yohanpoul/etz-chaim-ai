relations:

  - id: "REL-H1S2-011"
    type: causal
    from: om_gadol
    to: hitzoniut_zak
    nature: "Le Makif est plus grand que le Pnimi → la Hitzoniut du Keli doit être plus pure pour le recevoir"
    assertions_source: ["EC-H1S2-027", "EC-H1S2-033"]

  - id: "REL-H1S2-012"
    type: causal
    from: op_metzumtzam_dohak
    to: op_boke_a_kotel
