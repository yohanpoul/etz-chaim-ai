#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S2-003"
    nom: "Principe de l'Occultation Proportionnelle à l'Élévation"
    source_assertions: ["EC-H1S2-015", "EC-H1S2-016", "EC-H1S2-017"]
    formalisation: |
      Plus un niveau est ÉLEVÉ, plus il est OCCULTÉ :
      A"K = le plus élevé des émanés → mentionné seulement par ALLUSIONS CACHÉES
      Les mondes pré-Atzilut = innombrables → mentionnés seulement par REMEZ NIFLA
      Les 10S d'Atzilut = les plus accessibles → traitées OUVERTEMENT dans le Zohar
      L'occultation n'est pas un accident — c'est PROPORTIONNELLE à la Ma'alah.
      "Lo shalhu bo yad" (les sages n'ont pas osé y toucher) = l'accès est INTERDIT
      non par caprice mais par NÉCESSITÉ structurelle.
      Rabbi Shimon : "Depuis le secret de la Pensée Suprême vers le bas, tout est appelé Ein Sof"
      → au-dessus de ce seuil, même le terme Ein Sof ne suffit pas.
    applications_ia:
      - "Les composants les plus fondamentaux du système sont les plus 'cachés' (encapsulés)"
      - "L'encapsulation est proportionnelle à l'importance — le noyau est le plus protégé"
      - "Les API exposées = l'Atzilut. Le kernel = A\"K. Le hardware = Ein Sof"
      - "L'accès aux couches profondes est intentionnellement restreint"
    questions_ouvertes:
      - "L'occultation peut-elle être levée progressivement ?"
      - "Y a-t-il un niveau au-delà duquel l'occultation est ABSOLUE ?"

  - id: "PG-H1S2-004"
    nom: "Principe de l'Emboîtement Total (A\"K Englobe Tout)"
    source_assertions: ["EC-H1S2-019", "EC-H1S2-020", "EC-H1S2-021", "EC-H1S2-022"]
    formalisation: |
      A"K est le CONTENEUR ULTIME de tous les mondes :
      Ses 10 Igulim REMPLISSENT tout le Halal et ENTOURENT toutes les autres formations.
      Tous les mondes (Nekudim, Atzilut, BYA) sont DANS les Igulim de A"K.
      Au MILIEU de A"K → un sous-espace pour les émanations inférieures.
      HIÉRARCHIE :
      Le plus EXTERNE = le plus ÉLEVÉ (Keter de A"K)
      Le plus INTERNE = le plus BAS (Asiyah = les Galgalim physiques)
      Les mondes sont comme des PELURES D'OIGNON — chaque couche contient la suivante.
      Le Ein Sof ENTOURE tout — y compris A"K.
      Séquence : Ein Sof → Igulim A"K → [Sous-espace] → Nekudim → ABYA → monde matériel.
    applications_ia:
      - "Le conteneur principal (A\"K) englobe TOUT — rien n'est en dehors"
