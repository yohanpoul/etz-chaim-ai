relations:

  - id: "REL-H1S2-006"
    type: contenance
    from: igulei_ak_malei_halal
    to: nekudim_in_ak
    nature: "Les Igulim de A\"K remplissent le Halal et contiennent l'Olam ha-Nekudim"
