relations:

  - id: "REL-H1S2-001"
    type: séquentiel
    from: igulim_nefesh_first
    to: yosher_kelim_ruah
    nature: "D'abord les Igulim (Nefesh+Kelim), ENSUITE le Yosher (Ruah+Kelim) — ordre universel"
    assertions_source: ["EC-H1S2-001", "EC-H1S2-002", "EC-H1S2-003"]

  - id: "REL-H1S2-002"
    type: dualité_structurelle
    paire: [ohr_pnimi_def, ohr_makif_def]
    nature: "Tout Ohr a 2 aspects : Pnimi (ce que le Keli contient) et Makif (ce qui déborde)"
    assertions_source: ["EC-H1S2-006", "EC-H1S2-007"]

  - id: "REL-H1S2-003"
    type: dualité_structurelle
    paire: [pnimiyut_keli, hitzoniut_keli]
    nature: "Tout Keli a 2 aspects : Pnimiyut (où le Pnimi adhère) et Hitzoniut (où le Makif entoure)"
    assertions_source: ["EC-H1S2-008"]

  - id: "REL-H1S2-004"
    type: contenance
    from: arba_components
    to: kol_olamot_arba
    nature: "Les 4 composants (OP, OM, PK, HK) s'appliquent universellement à tout dans tous les mondes"
    assertions_source: ["EC-H1S2-009", "EC-H1S2-012"]

  - id: "REL-H1S2-005"
    type: hiérarchique
    from: yosher_me_ulim
    to: structure_igulim_complete
    nature: "Le Yosher (Ruah) est plus élevé que les Igulim (Nefesh)"
    assertions_source: ["EC-H1S2-003", "EC-H1S2-011"]
    bidirectionnel: false


# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H1S2-001"
    nom: "Principe des 4 Composants Universels (OP-OM-PK-HK)"
    source_assertions: ["EC-H1S2-006", "EC-H1S2-007", "EC-H1S2-008", "EC-H1S2-009", "EC-H1S2-012"]
    formalisation: |
      TOUTE réalité émanée contient exactement 4 COMPOSANTS :
      1. OHR PNIMI (OP) — la lumière/essence qui S'HABILLE dans le récipient
      2. OHR MAKIF (OM) — la lumière/essence TROP GRANDE pour être contenue → reste dehors
      3. PNIMIYUT HA-KELI (PK) — l'intérieur du récipient où le OP adhère
      4. HITZONIUT HA-KELI (HK) — l'extérieur du récipient que le OM entoure
      AXIOMES :
      - TOUT Ohr a Pnimi ET Makif — AUCUNE exception
      - TOUT Keli a Pnimiyut ET Hitzoniut — AUCUNE exception
      - Ces 4 composants sont UNIVERSELS — dans chaque monde, chaque Sefirah, chaque détail
      - Le Ohr Makif existe car le Keli ne peut PAS contenir TOUTE la lumière
      - Le rapport OP/OM dépend de la CAPACITÉ du Keli
    applications_ia:
      - "Chaque module a 4 composants : données internes (OP), potentiel non réalisé (OM), structure interne (PK), interface externe (HK)"
      - "Le Ohr Makif = le potentiel non encore intégré — toujours présent"
      - "Un module qui intériorise son Makif → CROISSANCE (passage Katnut→Gadlut)"
      - "Les 4 composants = le modèle de données universel de tout élément du système"
    questions_ouvertes:
      - "Le ratio OP/OM est-il mesurable ?"
      - "Un Keli peut-il un jour contenir TOUT son Makif ?"

  - id: "PG-H1S2-002"
    nom: "Principe de la Priorité du Simple (Nefesh Avant Ruah)"
    source_assertions: ["EC-H1S2-001", "EC-H1S2-002", "EC-H1S2-003"]
    formalisation: |
      Le niveau le plus SIMPLE (Nefesh) est toujours émané EN PREMIER :
      Igulim (Nefesh) → PUIS Yosher (Ruah) → PUIS niveaux supérieurs
      Comme dans l'homme : d'abord Nefesh, puis Ruah si on le MÉRITE (zokheh).
      Le simple PRÉCÈDE le complexe. Le bas PRÉCÈDE le haut.
      Les Igulim (cercles simples) précèdent le Yosher (forme complexe d'Adam).
      Chaque aspect (Igulim et Yosher) a ses PROPRES Kelim — pas les mêmes.
      Les Kelim de la Nefesh ≠ les Kelim du Ruah (foie ≠ cœur ≠ cerveau).
