principes_generatifs:
  - id: "PG-H1S7-001"
    nom: "Principe du Potentiel Indifférencié (10 Ketarim)"
    source_assertions: ["EC-H1S7-003", "EC-H1S7-004"]
    formalisation: |
      L'état INITIAL de tout système = POTENTIEL INDIFFÉRENCIÉ :
      les 10 composants EXISTENT en puissance mais sont tous au MÊME
      NIVEAU (Keter). La différenciation nécessite des EXPANSIONS
      SUCCESSIVES (Hitpashtut Aleph → Hitpashtut Bet → ...).
      FORMULE : State(0) = {Keter}^10 (tout au même niveau)
               State(n) = Differentiate(State(n-1), Expansion(n))
    applications_ia:
      - "ohr.py : l'etat initial d'un systeme = tous les modules au meme niveau"
      - "La differentiation progressive = le training qui specialise les composants"
    questions_ouvertes:
      - "Combien d'expansions avant la differentiation complete ?"
