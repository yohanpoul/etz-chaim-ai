# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 1 — Heikhal Adam Kadmon (היכל אדם קדמון)
# Sha'ar: 8 (=7 original) — Sha'ar Mati veLo Mati (שער מטי ולא מטי)
# Perek: 1a — Avant les Akudim, le Kli unique, les 10 Ketarim (100% §1-§4)
# ═══════════════════════════════════════════════════════════════════
#
# Retour détaillé sur la formation des Akudim.
# Avant les Akudim : l'Ohr ne pouvait s'habiller dans aucun Kli.
# Le 1er Kli = Keter. Tout est encore en mode "10 Ketarim."
# L'Ohr a la FORCE de 10 même si non distinguées.
#
# Source Sefaria : Sefer_Etz_Chaim.7.1 (§1-§4)
# IDs : EC-H1S7-001 →

meta:
  sefer: etz_chaim
  heikhal: 1
  shaar: 8
  shaar_name_he: "שער מטי ולא מטי"
  perek: 1
  part: "a"
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
