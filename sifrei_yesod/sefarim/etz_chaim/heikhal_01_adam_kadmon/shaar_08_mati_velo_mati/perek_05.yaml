# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 1 — Heikhal Adam Kadmon (היכל אדם קדמון)
# Sha'ar: 8 (=7 original) — Sha'ar Mati veLo Mati (שער מטי ולא מטי)
# Perek: 5 — Conclusion : Kellalut en Hokhmah-Binah, Miluy Y-H, Vav-Dalet
# ═══════════════════════════════════════════════════════════════════
#
# Les 5 Orot de Hokhmah-Binah montent dans Keter.
# Kellalut selon actions des Tahtonim : parfois tous en Nekevah,
# parfois en Zakhar, parfois partages.
# Quand 4 montent = Kellalut dans Nekevah = H rempli de Yod = H"Y.
# Les 2 Malkhuyot (Zakhar+Nekevah) sont EGALES quand les Z"N montent.
# Raison : Zakhar = sod Histalkut (residuel). Nekevah = sod Panim (entrant).
# Premiere fois : Ohr Hokhmah entre dans Kli de Nekevah.
# Apres : Z"N dans Kli de Zakhar, Zivvug = Vav+Dalet = miluy de Yod.
# "Lo nimtza yoter mi-kan ve-eilakh" — il n'a pas ete trouve davantage.
# NISHLAM HEIKHAL RISHON — Fin du Premier Heikhal.
#
# Source Sefaria : Sefer_Etz_Chaim.7.5 (§1-§5)
# IDs : EC-H1S7-049 →

meta:
  sefer: etz_chaim
  heikhal: 1
  shaar: 8
