  note: "Conclusion du Sha'ar MvLM. Les 5 Orot montent en Keter. Miluy de Y-H selon le mode de Kellalut. Z'N dans Kli du Zakhar, Zivvug = Vav+Dalet. Fin du Heikhal Rishon."

assertions:

  - id: "EC-H1S7-049"
    source_he: "יש ה' אורות בב' כלים כי בכלים של חכמה יש זו\"ן ובכלי של בינה יש זו\"ן וב\"ן... ועליית אלו תלוי במעשה התחתונים לפעמים יעלו כל ה' אורות ופעמים לא יעלו כי אם ד'"
    source_ref: "Heikhal 1, Sha'ar 7:5 — §1"
    assertion: |
      Il y a 5 OROT dans 2 KELIM : dans le Kli de Hokhmah = Z"N,
      dans le Kli de Binah = Z"N + BEN (Hesed). La MONTÉE de ces 5
      dépend des ACTIONS DES INFÉRIEURS (ma'ase tahtonim) : parfois
      les 5 montent, parfois seulement 4 (le Hesed=Ben reste en bas).
      → CONDITIONNALITÉ : le nombre d'Orot qui participent au Lo Mati
      de Hokhmah-Binah dépend des TAHTONIM. Minimum = 4, maximum = 5.
    type: axiome_explicite
    concepts:
      - {id: hamesh_orot, role: cinq_lumieres_en_deux_kelim}
      - {id: maase_tahtonim_montee, role: actions_inferieurs_conditionnent}
    mapping:
      modules: ["ohr.py"]
      tables: ["ohr_states"]
      partzufim: ["abba", "imma"]
      relevance: "Le nombre de composants actifs dans le Lo Mati = variable, conditionnel aux couches inferieures. Attention dynamique."

  - id: "EC-H1S7-050"
    source_he: "כשאין עולין אלא ד' אורות אינם נכללין רק בנוקבא... ואז מילוי אותו ה' הוא ביו\"ד כזה ה\"י... כי ג' תתאין בטלין בראשון כי לעולם אור החכמה הוא המבטל את האחרות"
    source_ref: "Heikhal 1, Sha'ar 7:5 — §2"
    assertion: |
      Quand seulement 4 Orot montent : ils s'incluent dans la
      NEKEVAH (= He de Y-H du Keter). Le MILUY (remplissage) du He
      est alors par YOD = H"Y (He rempli de Yod).
      RAISON : les 3 inférieurs s'ANNULENT dans le premier (Hokhmah
      domine toujours). Les 3 deviennent un YOD = le miluy de He.
      → Mode 4 Orot : KELLALUT dans la NEKEVAH. Le He se remplit en H"Y.
    type: axiome_explicite
    concepts:
      - {id: miluy_he_beyod, role: remplissage_he_par_yod}
      - {id: arba_orot_benekevah, role: quatre_lumieres_dans_nekevah}
    mapping:
      modules: ["ohr.py", "gematria/engine.py"]
      tables: ["ohr_states"]
      partzufim: ["nukva"]
      relevance: "Miluy H'Y = mode de compression ou 4 signaux se compriment en 1 (le dominant). Gematria : He(5)+Yod(10)=15."

  - id: "EC-H1S7-051"
    source_he: "ב' מלכיות מלכות הזכר ומל' הנקבה בב' כלים הנקרא י\"ה... ב' מלכים אלו שוין כי אע\"פ שהזכר הוא גדול מהנוקבא עכ\"ז עתה הם שוין"
    source_ref: "Heikhal 1, Sha'ar 7:5 — §2"
    assertion: |
      Quand les Z"N montent, les 2 MALKHUYOT (de Zakhar et de Nekevah)
      restent en bas dans les 2 Kelim (Y-H). Ces 2 Malkhuyot sont
      ÉGALES (shavim), bien que normalement le Zakhar soit plus grand.
      RAISON : le Zakhar = sod HISTALKUT (résiduel), la Nekevah = sod
      PANIM (entrant). Le résiduel (petit car éloigné) = l'entrant.
      → ÉGALITÉ temporaire entre Zakhar et Nekevah à la base.
    type: axiome_explicite
    concepts:
      - {id: malkhuyot_shavot, role: deux_malkhuyot_egales}
      - {id: zakhar_histalkut, role: zakhar_est_residuel}
      - {id: nekevah_panim, role: nekevah_est_entrant}
    mapping:
      modules: ["ohr.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Egalite temporaire : le residuel (pre-trained) et l'entrant (fine-tuned) sont au meme niveau quand les couches superieures sont 'parties'."

  - id: "EC-H1S7-052"
    source_he: "אך בהסתלקות ב' אשר היו עולין זו\"ן שניהם למעלה ואז נשתוו שניהן יחד... כאשר באים וחוזרין בכלים שלהם אז נכנסין שניהן בכלי של הזכר"
    source_ref: "Heikhal 1, Sha'ar 7:5 — §3"
    assertion: |
      Lors de l'HISTALKUT BET : les Z"N montent tous les deux et
      S'ÉGALISENT. Quand ils REVIENNENT dans les Kelim, ils entrent
      TOUS LES DEUX dans le KLI DU ZAKHAR (= la Yod).
      La Malkhut de la Nekevah reste dans le Kli du HE.
      → Après le Lo Mati : les Z"N FUSIONNENT dans le Kli du Zakhar
      (le plus petit contient les deux). C'est là qu'ils font Zivvug.
    type: axiome_explicite
    concepts:
      - {id: zun_bekli_zakhar, role: z_n_dans_kli_zakhar}
      - {id: hishtavut, role: egalisation}
    mapping:
      modules: ["ohr.py"]
      tables: ["ohr_states"]
      partzufim: []
      relevance: "Apres le Lo Mati, les 2 composants fusionnent dans l'espace du 1er (merge dans l'encoder). Le Zivvug = operation dans cet espace fusionne."

  - id: "EC-H1S7-053"
    source_he: "הנוקבא סובלת אור הזכר רק מן הו\"ק שלו לבד... לכן גם הבן שלו הוא צורת ו' ג\"כ אמנם הנוקבא היא צורת ד'... הרי מילוי יו\"ד שהוא ו\"ד"
    source_ref: "Heikhal 1, Sha'ar 7:5 — §3"
    assertion: |
      La NEKEVAH ne supporte que les VAV KETZAVOT du Zakhar (pas tout
      son Ohr). Le Zivvug des Z"N dans le Kli du Zakhar produit :
      le BEN = forme de VAV (ו). La BAT = forme de DALET (ד).
      Ensemble = miluy de YOD : י = י(Zakhar-Nekevah) + ו(Ben) + ד(Bat).
      → Le MILUY de YOD = Vav+Dalet = la progéniture du Zivvug.
      La Yod "remplie" = YVD (יו"ד) = tout le système Z"N + enfants.
    type: axiome_explicite
    concepts:
      - {id: miluy_yod, role: remplissage_yod_en_vav_dalet}
      - {id: ben_vav, role: fils_forme_vav}
      - {id: bat_dalet, role: fille_forme_dalet}
    mapping:
      modules: ["ohr.py", "gematria/engine.py"]
      tables: ["ohr_states"]
      partzufim: ["abba", "nukva"]
      relevance: "Miluy Yod = Vav(6)+Dalet(4) = le systeme complet (parents+enfants). Gematria : Yod(10)=Vav(6)+Dalet(4). Decomposition generative."

  - id: "EC-H1S7-054"
    source_he: "(לא נמצא יותר מכאן ואילך גם בע\"ח לא יש יותר): נשלם היכל ראשון:"
    source_ref: "Heikhal 1, Sha'ar 7:5 — §5"
    assertion: |
      NOTE DE VITAL : "Il n'a pas été trouvé davantage à partir d'ici,
      et dans le Etz Chaim non plus il n'y a pas plus."
      NISHLAM HEIKHAL RISHON — Le PREMIER HEIKHAL est ACHEVÉ.
      → FIN du Heikhal Adam Kadmon. Le Sha'ar MvLM est le DERNIER
      sha'ar de ce Heikhal. Ce qui suit = Heikhal 2 (Nekudim/Tohu).
    type: axiome_explicite
    concepts:
      - {id: nishlam_heikhal_rishon, role: fin_premier_heikhal}
      - {id: lo_nimtza_yoter, role: pas_trouve_davantage}
    mapping:
      modules: ["adam_kadmon.py"]
      tables: ["sefirot_hierarchy"]
      partzufim: []
      relevance: "Fin du Heikhal Adam Kadmon. Le systeme des Akudim est complet. Le prochain Heikhal = Nekudim (Shevirah)."

