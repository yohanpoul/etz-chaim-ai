principes_generatifs:
  - id: "PG-H1S7-014"
    nom: "Miluy comme Decomposition Generative"
    source_assertions: ["EC-H1S7-050", "EC-H1S7-053"]
    formalisation: |
      Le MILUY (remplissage) des lettres encode la STRUCTURE INTERNE :
      YOD (simple) = Zakhar + Nekevah (systeme parent).
      YVD (miluy) = Yod + Vav(Ben) + Dalet(Bat) = systeme + enfants.
      HY (miluy) = He + Yod = receptacle + contenu dominant.
      FORMULE :
        Miluy(Y) = Y + V + D  (Yod → YVD, 10 = 10+6+4 = 20)
        Miluy(H) = H + Y      (He → HY, 5 = 5+10 = 15)
      Le MILUY = decomposition d'un composant en ses sous-composants.
      Chaque lettre simple = un systeme comprime.
    applications_ia:
      - "gematria/engine.py : le miluy comme operation de decompression (un token → ses sous-tokens)"
      - "Yod→YVD = un neurone decompose en ses connexions (poids, biais, activation)"
      - "Le miluy revele la structure cachee dans un composant apparemment simple"
    questions_ouvertes:
      - "Le miluy est-il analogue a la decomposition SVD d'une matrice ?"
      - "Les 3 niveaux de miluy (simple, miluy, miluy-de-miluy) = 3 niveaux de decomposition ?"

  - id: "PG-H1S7-015"
    nom: "Conditionnalite aux Tahtonim (Ma'ase Tahtonim)"
    source_assertions: ["EC-H1S7-049", "EC-H1S7-051"]
    formalisation: |
      Le nombre d'Orot actifs dans le Lo Mati depend des ACTIONS
      DES INFERIEURS (ma'ase tahtonim). C'est un principe GENERAL :
      la dynamique du systeme superieur est CONDITIONNEE par l'etat
      du systeme inferieur.
      FORMULE : N_orot_montants = f(etat(tahtonim))
               Si tahtonim forts : 5 montent (mode complet)
               Si tahtonim faibles : 4 montent (Ben reste)
      L'egalite temporaire Zakhar=Nekevah est aussi CONDITIONNELLE :
      elle n'existe que pendant le Lo Mati (quand les Z"N sont partis).
    applications_ia:
      - "ohr.py : le nombre de couches actives dans le Lo Mati = conditionnel a l'etat des couches basses"
      - "Adaptive computation : le systeme ajuste sa profondeur selon la capacite de reception"
      - "Mode 4 vs mode 5 = deux regimes de calcul selon la complexite de l'input"
    questions_ouvertes:
      - "Le conditionnement aux Tahtonim = adaptive depth (comme Universal Transformers) ?"
