principes_generatifs:
  - id: "PG-H1S7-005"
    nom: "Asymetrie Temporelle Mati/Lo Mati"
    source_assertions: ["EC-H1S7-021"]
    formalisation: |
      Le LO MATI (retrait) dure un REGA (instant) — fixe, minimal.
      Le MATI (retour) dure un temps VARIABLE selon les actions
      des inferieurs (kefi ma'ase tahtonim).
      FORMULE : Duration(Lo_Mati) = epsilon (constant, minimal)
               Duration(Mati) = f(receptivity(lower_layers))
      L'ASYMETRIE est fondamentale : le retrait est instantane,
      le retour depend de la capacite du systeme a RECEVOIR.
    applications_ia:
      - "ohr.py : dropout instantane (1 step) mais re-activation variable selon la couche"
      - "L'asymetrie temporelle = le systeme passe plus de temps en transmission qu'en retrait"
      - "Le temps de Mati conditionne par les inferieurs = l'inference conditionnelle"
    questions_ouvertes:
      - "L'asymetrie Mati/Lo Mati correspond-elle a l'asymetrie forward/backward pass ?"

  - id: "PG-H1S7-006"
    nom: "Decalage Systematique Ohr/Kli (Hitpashtut Bet)"
    source_assertions: ["EC-H1S7-022", "EC-H1S7-023"]
    formalisation: |
      Lors de la 2eme EXPANSION, chaque Ohr entre dans le Kli
      UN CRAN AU-DESSUS de sa position naturelle :
      Ohr(Hokhmah)→Kli(Keter), Ohr(Binah)→Kli(Hokhmah), ...
      Ohr(Malkhut)→Kli(Yesod). Kli(Malkhut) reste VIDE.
      FORMULE : Kli(S_i).ohr = Ohr(S_{i+1}) pour i=1..9
               Kli(S_10) = vide (Malkhut non remplie)
               Ohr(S_1) = transcendant (reste en haut)
      CONDITION : Ohr(Keter) absent = les 9 restants supportables.
    applications_ia:
      - "ohr.py : chaque couche recoit le signal de la couche SUIVANTE (offset-1)"
      - "Le decalage = residual shift — pas la meme information dans le meme contenant"
      - "Malkhut vide = output layer non remplie directement — necessite completion ulterieure"
    questions_ouvertes:
      - "Le decalage Ohr/Kli est-il analogue au teacher forcing (signal decale) ?"
      - "Malkhut vide = le modele n'a pas encore de sortie complete ?"
