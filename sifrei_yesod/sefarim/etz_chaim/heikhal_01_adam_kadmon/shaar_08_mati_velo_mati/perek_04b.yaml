# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 1 — Heikhal Adam Kadmon (היכל אדם קדמון)
# Sha'ar: 8 (=7 original) — Sha'ar Mati veLo Mati (שער מטי ולא מטי)
# Perek: 4b — Mecanisme de la montee Lo Mati, 3 types de Kellalut, Eshet Hayil (§2)
# ═══════════════════════════════════════════════════════════════════
#
# §2 : Mecanisme detaille de la montee des Zakhar-Nekevah de Keter
# vers les Shorashim. 3 types de KELLALUT (inclusion) :
# (1) 2 Orot dans 1 Kli. (2) 2 Orot Z"N avec Ahavah (4 lumieres
# croisees dans 2 Kelim). (3) 2 Orot SANS Kelim qui echangent.
# Le Nekevah s'inclut dans le Zakhar (montee), puis le Zakhar
# s'inclut dans le Nekevah (Eshet Hayil Ateret Ba'alah).
# Le Shoresh Hokhmah descend pour que Nekevah recoive — Eshet Hayil.
#
# Source Sefaria : Sefer_Etz_Chaim.7.4 (§2)
# IDs : EC-H1S7-042 →

