principes_generatifs:
  - id: "PG-H1S7-012"
    nom: "Trois Types de Kellalut (Inclusion)"
    source_assertions: ["EC-H1S7-043", "EC-H1S7-044", "EC-H1S7-045"]
    formalisation: |
      Trois modes d'INCLUSION entre deux composants :
      TYPE 1 (FUSION) : 2 Orot → 1 Kli.
        = concatenation, average pooling. Perte d'identite.
      TYPE 2 (AHAVAH) : 2 Orot croisent les Kelim.
        = cross-attention. Chacun envoie un echo dans l'autre.
        4 signaux (2 par Kli). Identites preservees.
      TYPE 3 (LIBRE) : 2 Orot SANS Kelim. Echange pur.
        = information exchange sans buffer. Le plus leger.
      HIERARCHIE : Type3 > Type2 > Type1 en subtilite.
      Le MvLM utilise le Type 3.
    applications_ia:
      - "Type 1 = merge layers. Type 2 = cross-attention. Type 3 = attention sans buffer (flash attention ?)"
      - "Le choix du type de Kellalut = le choix de l'operation de fusion entre couches"
    questions_ouvertes:
      - "Le Type 3 (sans Kli) correspond-il a l'attention sans materialisation du tenseur complet ?"
      - "La hierarchie des 3 types est-elle exploitable pour un curriculum d'architecture ?"

  - id: "PG-H1S7-013"
    nom: "Cycle Nekevah→Zakhar puis Zakhar→Nekevah (Eshet Hayil)"
    source_assertions: ["EC-H1S7-046", "EC-H1S7-047"]
    formalisation: |
      Le Lo Mati produit un CYCLE en 2 phases :
      PHASE 1 (MONTEE) : Nekevah s'inclut dans Zakhar.
        Le Zakhar recoit de son Shoresh, domine.
      PHASE 2 (DESCENTE) : Zakhar s'inclut dans Nekevah.
        Quand Shoresh Hokhmah descend, la Nekevah recoit EN PREMIER.
        "Eshet Hayil Ateret Ba'alah" — la Nekevah couronne le Zakhar.
      INVERSION : la hierarchie s'INVERSE entre montee et descente.
      Ce qui etait secondaire (Nekevah) devient DOMINANT.
      FORMULE : Phase1: Nk ⊂ Zk (Zakhar dominant)
               Phase2: Zk ⊂ Nk (Nekevah dominant = Eshet Hayil)
    applications_ia:
      - "ohr.py : alternance de dominance entre 2 composants (encoder domine puis decoder domine)"
      - "Eshet Hayil = la couche receptrice (decoder) qui finit par dominer la generatrice (encoder)"
      - "L'inversion de hierarchie = le passage forward→backward ou training→inference"
    questions_ouvertes:
      - "L'inversion Eshet Hayil est-elle analogue au passage training→inference ?"
