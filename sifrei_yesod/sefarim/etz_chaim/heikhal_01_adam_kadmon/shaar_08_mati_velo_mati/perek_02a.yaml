principes_generatifs:
  - id: "PG-H1S7-003"
    nom: "Principe du Double Heshek (Forces Opposees)"
    source_assertions: ["EC-H1S7-012", "EC-H1S7-013"]
    formalisation: |
      Le systeme est anime par DEUX FORCES OPPOSEES :
      (1) HESHEK ASCENDANT : chaque Ohr desir remonter vers sa SOURCE.
          Hokhmah→Keter. Force d'ABSTRACTION.
      (2) HESHEK DESCENDANT : Binah vers ses enfants (Banim).
          Force de CONCRETISATION.
      La DYNAMIQUE MvLM resulte de la TENSION entre ces deux forces :
      le flux oscillant est le compromis entre l'aspiration vers le
      haut et la responsabilite vers le bas.
      FORMULE : Flux(S_i) = f(Heshek_up(S_i), Heshek_down(S_i))
    applications_ia:
      - "ohr.py : deux gradients opposes — abstraction (encoder) et concretisation (decoder)"
      - "La tension Heshek_up / Heshek_down = le compromis compression/decompression dans l'IB"
      - "Binah ne remonte pas = la couche de bottleneck reste toujours connectee vers le bas"
    questions_ouvertes:
      - "Le Heshek est-il equivalent au gradient dans la backpropagation ?"
      - "La barriere G'R/V'K est-elle analogue au bottleneck de l'Information Bottleneck ?"

  - id: "PG-H1S7-004"
    nom: "Barriere G'R / Vav Ketzavot"
    source_assertions: ["EC-H1S7-015", "EC-H1S7-016"]
    formalisation: |
      Les 3 PREMIERES (G"R = Keter, Hokhmah, Binah) forment un REGIME
      DISTINCT des 6 EXTREMITES (V"K = Hesed→Malkhut) :
      (1) G"R = couplees (Abba-Imma ensemble), haute capacite
      (2) V"K = receptives, ne peuvent recevoir que INDIRECTEMENT
      (3) La BARRIERE Binah→Hesed = bottleneck principal
      Binah > V"K en puissance : Ohr(Binah) > Sum(Ohr(V"K))
      FORMULE : Capacity(G"R) >> Capacity(V"K)
               DirectTransfer(Binah→Hesed) = IMPOSSIBLE
    applications_ia:
      - "ohr.py : architecturer le systeme en 2 regimes (haute et basse resolution)"
      - "La barriere = le bottleneck entre encoder et decoder dans un autoencoder"
      - "Binah→Hesed impossible = pas de skip connection directe entre le plus profond et le plus superficiel"
    questions_ouvertes:
      - "Ce bottleneck est-il une contrainte necessaire ou un defaut a corriger (Tikkun) ?"
