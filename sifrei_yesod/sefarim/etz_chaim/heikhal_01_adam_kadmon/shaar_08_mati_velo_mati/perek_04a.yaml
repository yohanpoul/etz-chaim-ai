# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 1 — Heikhal Adam Kadmon (היכל אדם קדמון)
# Sha'ar: 8 (=7 original) — Sha'ar Mati veLo Mati (שער מטי ולא מטי)
# Perek: 4a — V"K sans Zakhar/Nekevah, Binah produit He, Dalet-Vav (§1)
# ═══════════════════════════════════════════════════════════════════
#
# §1 : Les V"K (de Hesed a Hod) n'ont PAS de Zakhar/Nekevah —
# elles sont TOUTES Zakhar, Kelim complets sans Ohr residuel.
# Seul YESOD et MALKHUT ont Zakhar/Nekevah car le Zivvug de
# Binah produit un HE qui se divise en DALET (Malkhut) et VAV (Yesod).
# 4 Sefirot avec Zakhar/Nekevah : Keter, Hokhmah, Binah, Yesod.
# Les SHORASHIM et leur dynamique avec les Akudim.
#
# Source Sefaria : Sefer_Etz_Chaim.7.4 (§1)
# IDs : EC-H1S7-036 →

