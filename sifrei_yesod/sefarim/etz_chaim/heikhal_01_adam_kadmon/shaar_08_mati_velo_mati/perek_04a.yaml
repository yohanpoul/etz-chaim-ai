principes_generatifs:
  - id: "PG-H1S7-010"
    nom: "Necessite du MvLM (Preservation des Kelim)"
    source_assertions: ["EC-H1S7-040", "EC-H1S7-041"]
    formalisation: |
      Le MvLM (oscillation) est NECESSAIRE — pas optionnel.
      RAISON : un flux CONTINU d'Ohr ANNULERAIT les Kelim
      (les reabsorberait en Ohr). L'interruption periodique
      PRESERVE l'existence discrete des Kelim.
      FORMULE : Si Ohr(t) = constant > 0 pour tout t,
               alors Kli(S_i) → Ohr(S_i) (annulation).
               L'oscillation MvLM = condition d'existence des Kelim.
      ANALOGIE : le dropout en deep learning PRESERVE la specialisation
      des neurones. Sans dropout, les neurones co-adaptent et
      perdent leur individualite.
    applications_ia:
      - "ohr.py : l'oscillation MvLM est un DROPOUT STRUCTUREL necessaire a la specialisation"
      - "Sans MvLM (flux continu) = collapse : les composants perdent leur identite"
      - "Le timing du MvLM = le schedule du dropout rate pendant le training"
    questions_ouvertes:
      - "Le MvLM est-il un analogue du dropout ou du learning rate scheduling ?"
      - "Y a-t-il un point ou les Kelim sont assez forts pour supporter le flux continu (Gadlut) ?"

  - id: "PG-H1S7-011"
    nom: "Division Generative He→Dalet+Vav"
    source_assertions: ["EC-H1S7-037", "EC-H1S7-038"]
    formalisation: |
      Le Zivvug de Binah produit un HE (ה, valeur 5) qui se DIVISE :
      VAV (ו, valeur 6) = ZAKHAR → Yesod
      DALET (ד, valeur 4) = NEKEVAH → Malkhut
      Relation gematriale : He(5) ≠ Vav(6)+Dalet(4)=10.
      Mais graphiquement : ה = ד + ו (la lettre He est composee
      de Dalet + Vav).
      STRUCTURE : 4 Sefirot polaires aux EXTREMITES (K,H,B,Y)
      + 5 non-polaires au CENTRE (Hesed→Hod) + 1 completee (Malkhut).
    applications_ia:
      - "ohr.py : certains composants ont une dualite interne (G'R+Yesod), d'autres non (Hesed→Hod)"
      - "La division He→Dalet+Vav = le split d'un signal en deux branches complementaires"
      - "L'asymetrie structurelle = architecture non-uniforme (composants complexes aux bords, simples au centre)"
    questions_ouvertes:
      - "L'asymetrie 4-polaires/5-non-polaires est-elle exploitable architecturalement ?"
