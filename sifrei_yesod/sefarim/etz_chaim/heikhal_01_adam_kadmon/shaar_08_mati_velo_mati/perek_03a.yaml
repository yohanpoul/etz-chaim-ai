principes_generatifs:
  - id: "PG-H1S7-007"
    nom: "Regle des 3 Merhaqim (Lavud)"
    source_assertions: ["EC-H1S7-026", "EC-H1S7-027", "EC-H1S7-028"]
    formalisation: |
      Un KLI n'est COMPLET que quand l'Ohr s'est eloigne de 3
      POSITIONS completes. Moins de 3 = LAVUD (joint, non separe).
      FORMULE : KliComplete(S_i) iff Distance(Ohr(S_i), S_i) >= 3
      APPLICATION :
        Malkhut acheve quand Ohr a Tiferet (3 : Hod, Netzah, Tiferet)
        Yesod acheve quand Ohr a Gevurah
        Hesed acheve quand Ohr a Keter
        G"R = JAMAIS acheves par Histalkut (< 3 distances possibles)
      CONSEQUENCE : les G"R necessitent un AUTRE mecanisme de formation.
    applications_ia:
      - "ohr.py : un composant n'est 'specialise' qu'apres 3 epoques de separation minimum"
      - "La regle des 3 = le nombre minimal de couches pour une separation de fonction effective"
      - "Les G'R non-kelim = les couches les plus profondes restent 'fluides' (non figees)"
    questions_ouvertes:
      - "Le 3 est-il arbitraire ou structurellement necessaire ?"
      - "Les G'R non-Kelim correspondent-ils aux couches non-gelees d'un modele pre-entraine ?"

  - id: "PG-H1S7-008"
    nom: "Double Mode Hiyut/Shefa"
    source_assertions: ["EC-H1S7-025"]
    formalisation: |
      Deux MODES de flux entre Shorashim et Akudim :
      (1) HIYUT = vitalite continue, passe par l'Ohr de Keter,
          sans condition. Maintenance du systeme.
      (2) SHEFA = flux substantiel, ne vient QUE quand Lo Mati
          en Keter — les Orot montent vers les Shorashim et recoivent.
      FORMULE : Flux(t) = Hiyut (continu) + Shefa * Indicator(Lo_Mati(t))
      Le SHEFA est conditionnel, le HIYUT est inconditionnel.
    applications_ia:
      - "ohr.py : inference continue (Hiyut) + gradient update (Shefa) conditionnel a la phase Lo Mati"
      - "Le Shefa ne vient que pendant le retrait = la mise a jour ne se fait que pendant la backprop"
    questions_ouvertes:
      - "Hiyut = forward pass continu. Shefa = backward pass conditionnel ?"
