# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 1 — Heikhal Adam Kadmon (היכל אדם קדמון)
# Sha'ar: 8 (=7 original) — Sha'ar Mati veLo Mati (שער מטי ולא מטי)
# Perek: 3a — Les Shorashim, la regle des 3 Merhaqim, formation des Kelim (§1)
# ═══════════════════════════════════════════════════════════════════
#
# §1 : Au-dessus des Akudim = les SHORASHIM (racines).
# L'Ohr de Keter en haut, face en haut, dos en bas.
# Toute la Hiyut des Akudim passe par l'Ohr de Keter.
# Quand Lo Mati en Keter = les Orot montent vers les Shorashim.
# La regle des 3 MERHAQIM : un Kli n'est ACHEVE que quand
# l'Ohr s'est eloigne de 3 positions completes (< 3 = Lavud).
# G"R = pas encore Kelim complets (< 3 Merhaqim).
#
# Source Sefaria : Sefer_Etz_Chaim.7.3 (§1)
# IDs : EC-H1S7-024 →

