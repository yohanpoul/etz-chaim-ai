principes_generatifs:
  - id: "PG-H1S7-002"
    nom: "Principe du Mati veLo Mati (Oscillation Sélective)"
    source_assertions: ["EC-H1S7-007", "EC-H1S7-008", "EC-H1S7-009"]
    formalisation: |
      Lors de la 2ème EXPANSION, l'Ohr ne touche PAS toutes les Sefirot
      également — il OSCILLE : mati (touche) les IMPAIRES, lo mati
      (ne touche pas) les PAIRES :
      K(1)=oui, H(2)=non, B(3)=oui, Hsd(4)=non, G(5)=oui,
      T(6)=non, N(7)=oui, Hd(8)=non, Y(9)=oui, M(10)=non.
      FORMULE : Mati(S_i) = (i % 2 == 1) pour i=1..10
      Ce pattern crée la PREMIÈRE DIFFÉRENCIATION dans le Kli unique :
      les Sefirot touchées = embryons de DROITE (Hesed).
      Les non-touchées = embryons de GAUCHE (Din).
    applications_ia:
      - "ohr.py : implementer l'oscillation Mati/LoMati comme pattern de distribution selective"
      - "L'alternance = le sparse attention (toucher 1 sur 2 au lieu de tous)"
      - "Le Mati veLo Mati = le dropout structurel qui differentie les composants"
    questions_ouvertes:
      - "Le pattern impair/pair est-il fixe ou peut-il varier ?"
      - "Le MvLM est-il analogue à un attention mask alternant ?"
