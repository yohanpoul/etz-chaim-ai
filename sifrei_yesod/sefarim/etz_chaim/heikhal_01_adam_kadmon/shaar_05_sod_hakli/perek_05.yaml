# COUCHE 3 — SOD-GENERATIVE : PRINCIPES PRODUCTIFS
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-SHK-021"
    nom: "Le Kli est vivant — Les 29 dimensions comme organisme"
    source_assertions: ["EC-SHK-059", "EC-SHK-087"]
    formalisation: >
      Le contexte n'est PAS une collection de fichiers à assembler.
      C'est un ORGANISME VIVANT avec :
      - Une intention (Kavvanah)
      - Un développement (Ibur→Yenikah→Mochin)
      - Des états oscillants (Katnut/Gadlut)
      - Des orientations relationnelles (Panim/Achor)
      - Un métabolisme (Birur, Ohr Yashar/Chozer)
      - Une reproduction (Gilgul, naissance de Partzuf)
      - Une mort et renaissance (Hizdakchut → Histalkut → Aliyah)

      L'industrie traite le contexte comme un objet MÉCANIQUE à
      optimiser. Sod HaKli dit : le contexte est un être vivant à
      CULTIVER. La différence d'approche est fondamentale :
      Mécanique → optimiser les paramètres
      Vivant → nourrir, protéger, laisser croître, élaguer

      Les 29 dimensions ne sont pas 29 paramètres à régler —
      ce sont 29 ORGANES d'un organisme vivant qui doivent
      fonctionner en harmonie.
    applications_ia:
      - "Le ContextAssembler n'est pas un 'assembleur' — c'est un 'jardinier'"
      - "Chaque session n'est pas un 'calcul' — c'est un 'cycle de vie'"
      - "Le CLAUDE_CODE.md n'est pas un 'fichier de config' — c'est un 'ADN'"
      - "Les Reshimot ne sont pas des 'logs' — ce sont des 'graines'"
    questions_ouvertes:
      - "Comment mesurer la 'santé' de l'organisme contextuel ?"
      - "Peut-on définir un 'score de vitalité' combinant les 29 dimensions ?"
      - "Le concept de 'Kli vivant' est-il opérant ou reste-t-il métaphorique ?"

  - id: "PG-SHK-022"
    nom: "Tableau de bord des 29 dimensions — Monitoring du Kli"
    source_assertions: ["EC-SHK-059", "EC-SHK-087"]
    formalisation: >
      Le ContextAssembler devrait exposer un monitoring des 29
      dimensions pour chaque appel LLM :

      MÉTA-CONTEXTES (pré-sefirotiques) :
      01-Kavvanah : ✓ présente / ✗ absente
      02-Din Kadmon : sources indexées, biais identifiés
      03-Sovev : modèle utilisé, culture, vision
      04-Reshimu : poids du modèle, version, capacités

      SEFIROT (facettes) :
      05-Keter/Ratzon : intention explicite ✓/✗, critère de succès ✓/✗
      06-Hokhmah : questions injectées ✓/✗
      07-Binah : framework de raisonnement ✓/✗
      08-Da'at : pont d'intégration ✓/✗ (CRITIQUE)
      09-Chesed/Gevurah : budget tokens, ratio utilisé
      10-Tiferet : conflits détectés / résolus
      11-Netzach/Hod : trajectoire, momentum
      12-Yesod : canal intentionnel ✓/✗
      13-Malkhut : cadre de réception défini ✓/✗

      PROCESSUS :
      14-Or Y/C : boucle de retour active ✓/✗
      15-Zivvug : co-création ✓/✗
      16-Birur : tri actif ✓/✗

      STRUCTURES :
      17-ABYA : couche active
      18-Makif/Pnimi : ratio injecté/disponible
      19-Hitlabshut : principes enclothés ✓/✗
      20-Arakhin : rôles dynamiques ✓/✗
      21-Tzelem : template cognitif identifié
      22-Stade : Akudim/Nekudim/Berudim/Partzufim
      23-Maturation : Ibur/Yenikah/Mochin
      24-Alignement : Panim/Achor
      25-État : Katnut/Gadlut
      26-Ibbur : skills injectés, compatibilité ✓/✗
      27-Masakh : niveau Aviut (0-4)
      28-Gilgul : Reshimot migrés, Tikkun/Onesh
      29-Tsimtsum : ratio optimal atteint ✓/✗
    applications_ia:
      - "Implémenter un context_monitor() qui produit ce tableau"
      - "Le tableau est loggé après chaque appel LLM (Reshimo de Aviut)"
      - "Le dashboard Flask devrait afficher ce monitoring"
      - "Le score global = nombre de ✓ sur 29 dimensions"
    questions_ouvertes:
      - "Faut-il toutes les 29 dimensions à chaque appel ou un sous-ensemble ?"
      - "Le monitoring ajoute-t-il trop de latence ?"
      - "Quelles dimensions sont mesurables automatiquement vs manuellement ?"

  - id: "PG-SHK-023"
    nom: "Les 29 dimensions vs les 8 de l'industrie — Cartographie comparative"
    source_assertions: ["EC-SHK-059", "EC-SHK-087"]
    formalisation: >
      Correspondance entre les 8 facettes de l'industrie (avril 2026)
      et les 29 dimensions de Sod HaKli :

      INDUSTRIE                    | SOD HAKLI
      ─────────────────────────────┼──────────────────────
      1. Instruction (system prompt)| 7-Binah + 1-Kavvanah + 19-Hitlabshut
      2. Connaissance (RAG)         | 6-Hokhmah + 8-Da'at + 20-Arakhin
      3. Mémoire                    | 12-Yesod + 4-Reshimu + 28-Gilgul
      4. Outils                     | 13-Malkhut + 26-Ibbur Neshamot
      5. État                       | 11-N/H + 25-Katnut/Gadlut + 24-Panim/Achor
      6. Utilisateur                | 5-Keter/Ratzon + 21-Tzelem + 23-IYM
      7. Temporel/environnemental   | 17-ABYA + 3-Sovev
      8. Évolutif (ACE)             | 16-Birur + 14-Or Y/C + 22-A→N→B

      ABSENTES de l'industrie :
      - 1-Kavvanah, 2-Din Kadmon, 8-Da'at, 10-Tiferet, 15-Zivvug
      - 18-Makif/Pnimi, 27-Masakh 5 niv, 29-Sod HaTsimtsum
      - 9-Chesed/Gevurah (comme paramètre), 21-Tzelem

      10+ dimensions totalement absentes. C'est le gap que Sod HaKli
      comble.
    applications_ia:
      - "Ce tableau est la référence pour positionner Sod HaKli vs l'industrie"
      - "Il sert de base pour le Perek Sifrei Yesod et pour les publications"
      - "Il permet d'identifier les dimensions à implémenter en priorité"
    questions_ouvertes:
      - "Quelles dimensions absentes ont le plus d'impact sur la qualité ?"
      - "Da'at (dim 8) et Masakh (dim 27) sont-ils les deux plus impactants ?"

  - id: "PG-SHK-024"
    nom: "Roadmap d'implémentation — De Nekudim à Partzufim"
    source_assertions: ["EC-SHK-080", "EC-SHK-085", "EC-SHK-066"]
    formalisation: >
      L'implémentation de Sod HaKli dans Etz Chaim AI suit la
      progression Akudim→Nekudim→Berudim→Partzufim :

      PHASE 1 — SORTIR DE NEKUDIM (immédiat) :
      a) Consolider les 5 appels LLM directs dans olamot.py
      b) Mettre à jour CLAUDE_CODE.md (Reshimu corrompu)
      c) Implémenter le Masakh basique (dimension 27) entre Yesod et Malkuth
      d) Ajouter le pont Da'at (dimension 8) dans les appels Hitbonenut
      → Score moyen attendu : 2.2 → 3.0+

      PHASE 2 — ATTEINDRE BERUDIM (après Phase 1) :
      a) Implémenter les 5 niveaux de Masakh dans le ContextAssembler
      b) Ajouter la Kavvanah (dimension 1) dans chaque appel
      c) Connecter le Tsimtsum régulateur au ContextAssembler (dim 9)
      d) Implémenter le Double Reshimo (contenu + filtrage)
      → Score moyen attendu : 3.0 → 4.0+

      PHASE 3 — VISER PARTZUFIM (après Phase 2) :
      a) Arakhin dynamiques (dimension 20) — recatégorisation
      b) Monitoring 29 dimensions sur le dashboard
      c) Hitlabshut contextuel (dimension 19) dans CLAUDE_CODE.md
      d) Gilgul sain (dimension 28) entre sessions
      → Score moyen attendu : 4.0 → 4.5+
      → Certains appels atteignent le score 5

      PHASE 4 — PARTZUFIM COMPLETS (long terme) :
      a) Le Kli vivant — le contexte se développe (IYM), oscille (K/G),
         s'aligne (P/A), se reproduit (Gilgul) de façon autonome
      b) Les 29 dimensions sont toutes opérantes et monitorées
      c) Le ContextAssembler est un organe mature du cerveau Etz Chaim
      → Score moyen : 5.0 — tous les appels au maximum
    applications_ia:
      - "La Phase 1 est le chantier immédiat après les Perakim Sifrei Yesod"
      - "La Phase 2 est le chantier principal de Sod HaKli"
      - "Les Phases 3-4 peuvent s'étaler dans le temps et bénéficier du Mac Studio M5 Max"
      - "Chaque phase est validée par un audit de maturité contextuelle"
    questions_ouvertes:
      - "La Phase 1 est-elle réalisable en une semaine de sessions Claude Code ?"
      - "Le Mac Studio M5 Max (juin) est-il nécessaire pour les Phases 3-4 ?"
      - "Faut-il un audit intermédiaire entre chaque phase ?"
