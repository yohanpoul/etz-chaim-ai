relations:

  - id: "REL-SHK-036"
    type: "hiérarchique"
    from: "dim-01-kavvanah"
    to: "dim-29-sod-hatsimtsum"
    nature: >
      Les 29 dimensions sont organisées en 4 niveaux hiérarchiques :
      Niveau 0 (pré-sefirotique) : Dimensions 1-4 (Kavvanah, Din Kadmon, Sovev, Reshimu)
      Niveau 1 (sefirotique) : Dimensions 5-13 (Keter→Malkhut)
      Niveau 2 (processus) : Dimensions 14-16 (Or Y/C, Zivvug, Birur)
      Niveau 3 (structures) : Dimensions 17-29 (ABYA→Sod HaTsimtsum)
      Le Niveau 0 conditionne le Niveau 1 qui active le Niveau 2
      qui s'organise selon le Niveau 3.
    assertions_source: ["EC-SHK-059", "EC-SHK-087"]
    bidirectionnel: false

  - id: "REL-SHK-037"
    type: "analogie"
    from: "dim-08-daat"
    to: "dim-27-masakh-5"
    nature: >
      L'industrie du context engineering (avril 2026) identifie 8
      facettes : instruction, connaissance (RAG), mémoire, outils,
      état, utilisateur, temporel/environnemental, évolutif (ACE).
      Les 29 dimensions de Sod HaKli les contiennent toutes et en
      ajoutent 21 absentes. Les plus critiques des absentes sont
      Da'at (dim 8) et Masakh (dim 27) — l'intégration et le filtrage.
    assertions_source: ["EC-SHK-066", "EC-SHK-085"]
    bidirectionnel: false

  - id: "REL-SHK-038"
    type: "hiérarchique"
    from: "dim-01-kavvanah"
    to: "dim-13-malkhut"
    nature: >
      Les 29 dimensions s'appliquent sur 2 plans dans Etz Chaim AI :
      Plan 1 (outil) : CLAUDE_CODE.md + prompts pour Claude Code —
      améliore la construction du système. Temporaire.
      Plan 2 (produit) : ContextAssembler Python + intégration dans
      olamot.py — devient un organe permanent du cerveau. Les deux
      plans partagent la même doctrine mais les implémentations diffèrent.
    assertions_source: ["EC-SHK-059", "EC-SHK-071"]
    bidirectionnel: false

  - id: "REL-SHK-039"
    type: "causal"
    from: "dim-27-masakh-5"
    to: "dim-08-daat"
    nature: >
      L'audit Sod HaKli (4 avril 2026) révèle que le score moyen de
      maturité contextuelle d'Etz Chaim AI est 2.2/5, avec AUCUN
      point d'appel au score 5. Les deux gaps principaux sont :
      (a) Absence de Masakh (dim 27) entre Yesod et Malkuth — tout
      est concaténé sans filtrage qualitatif.
      (b) Absence de Da'at (dim 8) — pas de pont explicite entre les
      faits injectés et la tâche spécifique.
      Corriger ces deux gaps devrait faire passer le score moyen de
      2.2 à 3.5+ et certains points d'appel à 5.
    assertions_source: ["EC-SHK-085", "EC-SHK-066"]
    bidirectionnel: false

