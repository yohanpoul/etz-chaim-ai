# COUCHE 2 — REMEZ-RELATIONAL : RELATIONS
# ═══════════════════════════════════════════════════════════════════

relations:

  - id: "REL-SHK-014"
    type: "analogie"
    from: "aviut-5-niveaux"
    to: "5-partzufim-AK"
    nature: >
      Correspondance bijective : chaque niveau d'Aviut du Masakh produit
      exactement un type de Partzuf. Aviut Dalet→Galgalta, Gimel→AB,
      Bet→SAG, Aleph→MA, Shoresh→BON. La force du filtre détermine
      univoquement le type de structure qui en résulte.
    assertions_source: ["EC-SHK-018", "EC-SHK-022"]
    bidirectionnel: false

  - id: "REL-SHK-015"
    type: "dualité_structurelle"
    from: "kashiut"
    to: "aviut-propriété"
    nature: >
      Kashiut (résistance/rejet) et Aviut (profondeur transformable)
      sont les deux faces du Masakh. Kashiut dit "non" ; Aviut transforme
      le "non" en "oui qualitatif". Les deux doivent être présents pour
      un filtrage opérant. Un Masakh avec Kashiut sans Aviut rejette
      tout sans rien produire. Un Masakh avec Aviut sans Kashiut
      accepte tout sans filtrer.
    assertions_source: ["EC-SHK-020"]
    bidirectionnel: true

  - id: "REL-SHK-016"
    type: "causal"
    from: "zivug-de-hakaa"
    to: "ohr-chozer-remontée"
    nature: >
      Séquence causale stricte : Ohr Yashar descend → frappe le Masakh
      (Zivug de Haka'a) → Masakh résiste (Kashiut) → Ohr Chozer est
      généré et remonte → Ohr Chozer habille le Ohr Yashar → ensemble
      ils forment les 10 Sefirot du Rosh. Sans la frappe initiale, pas
      de Ohr Chozer, donc pas de Kelim véritables.
    assertions_source: ["EC-SHK-021", "EC-SHK-025"]
    bidirectionnel: false

  - id: "REL-SHK-017"
    type: "hiérarchique"
    from: "rosh"
    to: "sof"
    nature: >
      Rosh → Toch → Sof est une tripartition fonctionnelle universelle :
      Décision (potentiel) → Réception (acte) → Rejet (résidu).
      Les frontières sont le Peh (Rosh→Toch) et le Tabur (Toch→Sof).
      Cette structure se retrouve dans TOUT Partzuf, dans TOUT monde,
      à TOUTE échelle. C'est un invariant architectural.
    assertions_source: ["EC-SHK-023"]
    bidirectionnel: false

  - id: "REL-SHK-018"
    type: "opposition"
    from: "ohr-pnimi"
    to: "bitush-or-makif"
    nature: >
      Tension permanente entre Ohr Pnimi (reçu) et Ohr Makif (exclu).
      L'Ohr Makif frappe (Bitush) le Masakh pour tenter de le purifier.
      Cette tension est le MOTEUR de tout changement. Sans elle, le
      système est statique. Trop de tension non-gérée = Shevirah.
      Tension gérée = évolution.
    assertions_source: ["EC-SHK-024", "EC-SHK-030"]
    bidirectionnel: true

  - id: "REL-SHK-019"
    type: "séquentiel"
    from: "histalkut"
    to: "naissance-partzuf"
    nature: >
      Cycle fermé : Naissance → Fonctionnement → Bitush → Hizdakchut →
      Histalkut → Aliyah avec Reshimot → Naissance du suivant.
      Chaque "mort" (Histalkut) contient les graines (Reshimot) de la
      prochaine "naissance". Le cycle ne s'arrête jamais tant qu'il
      reste des Reshimot. C'est le Tikkun comme processus continu.
    assertions_source: ["EC-SHK-027"]
    bidirectionnel: false

  - id: "REL-SHK-020"
    type: "dualité_structurelle"
    from: "reshimo-hitlabshut"
    to: "reshimo-aviut"
    nature: >
      Tout Reshimo est double : trace de CONTENU (Hitlabshut — ce qui a
      été reçu) + trace de CAPACITÉ (Aviut — comment le filtrage a
      fonctionné). Les deux sont nécessaires pour la naissance d'un
      nouveau Partzuf. Perdre l'un des deux produit un Partzuf incomplet.
    assertions_source: ["EC-SHK-026"]
    bidirectionnel: true

  - id: "REL-SHK-021"
    type: "analogie"
    from: "4-mondes-masakh"
    to: "config-olamot"
    nature: >
      Les 4 Olamot du config.yaml (Atzilut/Briah/Yetzirah/Assiah) avec
      leurs paramètres (think, temperature, ctx) correspondent aux 4
      niveaux de Masakh du TES. La correspondance est déjà opérante
      dans Etz Chaim AI sans avoir été formalisée.
    assertions_source: ["EC-SHK-031"]
    bidirectionnel: false

