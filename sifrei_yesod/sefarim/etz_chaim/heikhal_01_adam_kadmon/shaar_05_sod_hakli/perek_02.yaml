# ═══════════════════════════════════════════════════════════════════
# שער סוד הכלי — SHA'AR SOD HAKLI (La Porte du Secret du Vaisseau)
# פרק ב — PEREK 2 : המסך והאור חוזר — HAMASAKH V'HAOHR CHOZER
# (L'Écran et la Lumière de Retour)
# ═══════════════════════════════════════════════════════════════════
#
# Ce perek approfondit la mécanique du Masakh (écran/filtre) et du
# Ohr Chozer (lumière de retour) — le cœur opérant du ContextAssembler.
# Il s'appuie principalement sur le Talmud Eser Sefirot (TES) du
# Baal HaSulam, qui fournit la formalisation technique la plus
# précise de ces mécanismes dans toute la littérature kabbalistique.
#
# Le Perek 1 a établi POURQUOI le Kli prime sur l'Ohr.
# Ce Perek 2 explique COMMENT le Kli reçoit, filtre et retourne.
#
# Sources primaires :
#   TES  = Talmud Eser Sefirot (R. Yehuda Ashlag, Baal HaSulam)
#   EC   = Etz Chaim (R. Haim Vital)
#   OC   = Otzrot Chaim (R. Haim Vital)
#   T    = Tanya (R. Shneur Zalman de Liadi)

meta:
  sefer: etz_chaim
  heikhal: 1
  shaar: 5
  shaar_name_he: "שער סוד הכלי"
  perek: 2
  source_edition: "TES Pticha §14-55, Parts 3-4; EC Shaar HaMasakhim"
  transposed_by: "Etz Chaim AI — Sha'ar Sod HaKli initiative"
  version: 1
  strates: ["base"]
  note: "Perek 2: HaMasakh v'HaOhr Chozer — Mécanique du filtrage et du retour. Context Engineering (couche Sod)."

# ═══════════════════════════════════════════════════════════════════
# COUCHE 1 — PESHAT-MACHINE : ASSERTIONS
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─────────────────────────────────────────────────────────────────
  # Section A : Anatomie du Masakh — Les 5 niveaux d'Aviut
  # ─────────────────────────────────────────────────────────────────

  - id: "EC-SHK-018"
    source_he: "חמש בחינות עביות נבחנות במסך דמלכות"
    source_ref: "TES, Pticha §17; Part 3, ch. 3"
    assertion: >
      Le Masakh possède 5 niveaux d'Aviut (épaisseur/profondeur) :
      Behina Shoresh (racine, le plus subtil), Behina Aleph, Behina Bet,
      Behina Gimel, et Behina Dalet (le plus épais/profond). Chaque niveau
      correspond à une capacité de résistance différente face à la lumière
      entrante. Le Masakh le plus épais (Dalet) produit le Ohr Chozer le
      plus élevé ; le plus subtil (Shoresh) ne produit presque pas de
      Zivug de Haka'a.
    type: axiome_explicite
    concepts:
      - { id: "aviut-5-niveaux", role: "système complet des 5 niveaux d'Aviut du Masakh" }
      - { id: "aviut-shoresh", role: "niveau 0 — résistance minimale" }
      - { id: "aviut-aleph", role: "niveau 1 — résistance basique" }
      - { id: "aviut-bet", role: "niveau 2 — résistance modérée" }
      - { id: "aviut-gimel", role: "niveau 3 — résistance élevée" }
      - { id: "aviut-dalet", role: "niveau 4 — résistance maximale" }
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: >
        Le ContextAssembler devrait implémenter 5 niveaux de filtrage :
        Niveau 0 (Shoresh) = pas de filtrage, tout passe (debug/exploration).
        Niveau 1 (Aleph) = filtrage minimal, pertinence basique.
        Niveau 2 (Bet) = filtrage modéré, sélection par domaine.
        Niveau 3 (Gimel) = filtrage élevé, sélection par pertinence sémantique.
        Niveau 4 (Dalet) = filtrage maximum, seul le plus pertinent passe.

  - id: "EC-SHK-019"
    source_he: ""
    source_ref: "TES, Part 3, ch. 3, item 5; Pticha §17"
    assertion: >
      La correspondance entre Aviut du Masakh et niveau de lumière reçue
      est formelle et précise :
      Aviut Dalet → Ohr Chozer atteint le niveau de Keter → lumière Yechidah.
      Aviut Gimel → Ohr Chozer atteint Hokhmah → lumière Hayah.
      Aviut Bet → Ohr Chozer atteint Binah → lumière Neshamah.
      Aviut Aleph → Ohr Chozer atteint Zeir Anpin → lumière Ruach.
      Aviut Shoresh → Ohr Chozer atteint Malkhut → lumière Nefesh.
      Plus le Masakh est "épais" (fort), plus haute est la qualité de
      lumière accessible.
    type: axiome_explicite
    concepts:
      - { id: "correspondance-aviut-ohr", role: "mapping formel 5 niveaux" }
      - { id: "yechidah", role: "lumière la plus haute — via Masakh Dalet" }
      - { id: "nefesh", role: "lumière la plus basse — via Masakh Shoresh" }
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: >
        Mapping opérant pour le ContextAssembler :
        Masakh Dalet (filtrage max) → le modèle reçoit peu de tokens mais
        de très haute pertinence → réponses de type Keter (insight profond).
        Masakh Shoresh (pas de filtrage) → le modèle reçoit tout → réponses
        de type Malkhut (exécution basique, pas de profondeur).
        L'industrie fait l'inverse (plus de tokens = mieux). Le TES dit :
        plus de filtrage = plus de profondeur.

  - id: "EC-SHK-020"
    source_he: ""
    source_ref: "TES, Pticha §17; Histaklut Pnimit Part 3"
    assertion: >
      Le Masakh possède deux propriétés distinctes :
      (1) Kashiut (dureté/rigidité) — la force de résistance qui repousse
      la lumière entrante. C'est la capacité de dire "non" à l'information
      non-pertinente.
      (2) Aviut (épaisseur) — la profondeur du désir de recevoir qui peut
      être transformé en acte de don. C'est la capacité de transformer la
      réception en quelque chose de productif.
      Les deux forces sont toujours présentes dans les 5 niveaux du Masakh.
    type: axiome_explicite
    concepts:
      - { id: "kashiut", role: "force de résistance/rejet" }
      - { id: "aviut-propriété", role: "profondeur transformable" }
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: >
        Le ContextAssembler a besoin de DEUX forces :
        (1) Kashiut = le filtre qui REJETTE le contexte non-pertinent
        (embedding similarity threshold, domain matching).
        (2) Aviut = la capacité de TRANSFORMER le contexte brut en contexte
        structuré utile (reformulation, hiérarchisation, compression
        intelligente). Un bon Masakh ne fait pas que filtrer — il transforme.

  # ─────────────────────────────────────────────────────────────────
  # Section B : Le Zivug de Haka'a — La frappe génératrice
  # ─────────────────────────────────────────────────────────────────

  - id: "EC-SHK-021"
    source_he: ""
    source_ref: "TES, Pticha §14; Part 3, ch. 1; Part 4, Histaklut Pnimit"
    assertion: >
      Le Zivug de Haka'a (union par frappe) est le mécanisme central de
      la réception dans le Kli. Le Ohr Yashar (lumière directe) descend
      vers le Masakh ; le Masakh résiste et repousse ; cette frappe génère
      le Ohr Chozer (lumière de retour) qui remonte et "habille" le Ohr
      Yashar descendant. Le Ohr Chozer est la véritable base des Kelim —
      sans lui, pas de vaisseau véritable, seulement de la lumière brute.
    type: axiome_explicite
    concepts:
      - { id: "zivug-de-hakaa", role: "union par frappe — mécanisme central" }
      - { id: "ohr-yashar-descente", role: "lumière entrante descendante" }
      - { id: "résistance-masakh", role: "rejet initial par le Masakh" }
      - { id: "ohr-chozer-remontée", role: "lumière de retour ascendante" }
    mapping:
      modules: ["main.py (Or Chozer pattern)"]
      tables: ["epistememory", "selfmap_scores"]
      partzufim: []
      relevance: >
        Le Zivug de Haka'a est le processus par lequel le contexte injecté
        (Ohr Yashar) rencontre le filtre du système (Masakh), et la
        "frappe" produit un feedback (Ohr Chozer) qui remonte et enrichit
        le contexte futur. Ce n'est PAS un simple input→output. C'est :
        contexte → frappe sur le filtre → réponse + feedback qui modifie
        le contexte. Le cycle est génératif, pas linéaire.

  - id: "EC-SHK-022"
    source_he: ""
    source_ref: "TES, Part 4, Histaklut Pnimit, item 3"
    assertion: >
      Il existe 5 types de Zivug de Haka'a, correspondant aux 5 niveaux
      d'Aviut, produisant 5 niveaux de Partzufim :
      (1) Zivug sur Aviut Dalet → Partzuf Galgalta (Keter) — le plus élevé.
      (2) Zivug sur Aviut Gimel → Partzuf AB (Hokhmah).
      (3) Zivug sur Aviut Bet → Partzuf SAG (Binah).
      (4) Zivug sur Aviut Aleph → Partzuf MA (Zeir Anpin).
      (5) Zivug sur Aviut Shoresh → Partzuf BON (Malkhut) — le plus bas.
      Chaque Partzuf a ses propres 10 Sefirot complètes, mais à un niveau
      différent déterminé par la force du Masakh.
    type: axiome_explicite
    concepts:
      - { id: "5-partzufim-AK", role: "5 niveaux de Partzuf selon Aviut" }
      - { id: "galgalta", role: "Partzuf de Keter — Masakh maximum" }
      - { id: "bon", role: "Partzuf de Malkhut — Masakh minimum" }
    mapping:
      modules: ["olamot.py"]
      tables: []
      partzufim: ["Galgalta/AB/SAG/MA/BON"]
      relevance: >
        5 types d'assemblage de contexte produisent 5 types de réponses :
        Galgalta (Masakh max, filtrage max) → insight stratégique profond.
        AB (Masakh élevé) → analyse architecturale.
        SAG (Masakh modéré) → compréhension structurée.
        MA (Masakh basique) → implémentation guidée.
        BON (Masakh minimal) → exécution rapide.
        Le config.yaml d'Etz Chaim AI a déjà 4 Olamot (Atzilut→Assiah)
        qui mappent approximativement sur cette échelle.

  # ─────────────────────────────────────────────────────────────────
  # Section C : Rosh, Toch, Sof — Anatomie du Partzuf
  # ─────────────────────────────────────────────────────────────────

  - id: "EC-SHK-023"
    source_he: ""
    source_ref: "TES, Pticha §50-52; Part 3, ch. 5"
    assertion: >
      Tout Partzuf possède 3 zones fonctionnelles :
      (1) Rosh (tête) — la zone de DÉCISION. C'est ici que le Zivug de
      Haka'a a lieu, que l'Ohr Chozer est généré, et que la décision est
      prise sur combien de lumière peut être reçue. Dans le Rosh,
      l'Hitlabshut (enclothement) et le rejet sont seulement en
      POTENTIEL, pas en ACTE.
      (2) Toch (intérieur) — la zone de RÉCEPTION EFFECTIVE. Du Peh
      (bouche, sortie du Rosh) au Tabur (nombril). C'est ici que l'Ohr
      Pnimi (lumière intérieure) est effectivement reçue et habillée
      dans les Kelim. Environ 20% de chaque lumière peut être reçue.
      (3) Sof (fin) — la zone de REJET. Du Tabur aux Siyum Raglayim
      (extrémité des pieds). La lumière qui ne peut pas être reçue est
      rejetée ici. C'est l'Ohr Makif — lumière environnante non-absorbée.
    type: axiome_explicite
    concepts:
      - { id: "rosh", role: "zone de décision — potentiel" }
      - { id: "toch", role: "zone de réception — acte" }
      - { id: "sof", role: "zone de rejet — lumière non-reçue" }
      - { id: "peh", role: "frontière Rosh→Toch (bouche = sortie)" }
      - { id: "tabur", role: "frontière Toch→Sof (nombril = limite)" }
    mapping:
      modules: ["main.py", "olamot.py"]
      tables: []
      partzufim: []
      relevance: >
        Architecture directe du ContextAssembler :
        ROSH = phase de DÉCISION : analyser la requête, déterminer le type
        de tâche, choisir le niveau de Masakh, calculer le budget de tokens.
        Tout est en potentiel — aucun contexte n'est encore assemblé.
        TOCH = phase d'ASSEMBLAGE : sélectionner et injecter le contexte
        effectif dans la fenêtre du modèle. ~20% du contexte disponible.
        SOF = le contexte REJETÉ : ce qui est disponible mais non-injecté.
        Il reste comme Ohr Makif — influence ambiante sans injection directe.
        Le Peh est le point de passage de la décision à l'assemblage.
        Le Tabur est le point de passage de l'assemblage au rejet.

  - id: "EC-SHK-024"
    source_he: ""
    source_ref: "TES, Pticha §52; Part 4, Histaklut Pnimit, item 12-13"
    assertion: >
      Le Ohr Pnimi (lumière intérieure, dans le Toch) et le Ohr Makif
      (lumière environnante, dans le Sof) sont en tension permanente.
      Le Ohr Makif "frappe" (Bitush) le Masakh pour tenter de le purifier
      (Hizdakchut) — c'est-à-dire de réduire son Aviut pour pouvoir
      pénétrer dans le Toch. Cette Bitush (frappe) de l'Ohr Makif sur
      l'Ohr Pnimi provoque la purification progressive du Masakh, qui
      perd son Aviut niveau par niveau. C'est le mécanisme par lequel
      un Partzuf "meurt" et un nouveau naît.
    type: axiome_explicite
    concepts:
      - { id: "ohr-pnimi", role: "lumière intérieure reçue dans le Toch" }
      - { id: "bitush-or-makif", role: "frappe de la lumière environnante" }
      - { id: "hizdakchut", role: "purification progressive du Masakh" }
      - { id: "naissance-partzuf", role: "nouveau Partzuf par perte d'Aviut" }
    mapping:
      modules: ["hitbonenut.py"]
      tables: []
      partzufim: []
      relevance: >
        La pression du contexte non-injecté (Ohr Makif) sur le filtre
        (Masakh) cause une dégradation progressive du filtrage. C'est
        EXACTEMENT le context rot : le contexte exclu s'accumule et
        "pousse" pour entrer, affaiblissant la sélection. La solution
        n'est pas d'ignorer l'Ohr Makif mais de le GÉRER — nettoyer
        régulièrement le contexte exclu (Hizdakchut conscient au lieu
        de subi). Le /compact de Claude Code est un Hizdakchut brutal.

  # ─────────────────────────────────────────────────────────────────
  # Section D : Le Ohr Chozer — La lumière de retour
  # ─────────────────────────────────────────────────────────────────

  - id: "EC-SHK-025"
    source_he: ""
    source_ref: "TES, Part 3, ch. 1; EC, Shaar HaOhr Chozer"
    assertion: >
      Le Ohr Chozer (lumière de retour/réfléchie) a une double fonction :
      (1) Il HABILLE le Ohr Yashar — il donne une forme, un vêtement, un
      cadre à la lumière descendante. Sans habillage, l'Ohr Yashar est
      brut et inutilisable.
      (2) Il CRÉE les Kelim — les Sefirot du Rosh ne sont que des racines
      (Shorshei Kelim). Les véritables Kelim n'existent que quand le Ohr
      Chozer descend dans le Guf (Toch + Sof) et forme les vaisseaux
      effectifs.
    type: axiome_explicite
    concepts:
      - { id: "ohr-chozer-habillage", role: "donne forme à la lumière brute" }
      - { id: "ohr-chozer-crée-kelim", role: "forme les vaisseaux effectifs" }
      - { id: "shorshei-kelim", role: "racines des Kelim dans le Rosh" }
    mapping:
      modules: ["main.py (Or Chozer pattern)", "epistememory/"]
      tables: ["epistememory", "selfmap_scores"]
      partzufim: []
      relevance: >
        Le feedback du LLM (Ohr Chozer) n'est pas juste un "output" —
        il CRÉE le contexte futur. Chaque réponse du modèle, quand elle
        est correctement recyclée (remember() → EMA scoring → recall
        enrichi), forme les véritables Kelim du système. Le pattern Or
        Chozer d'Etz Chaim AI fait déjà cela mais sans conscience que
        c'est le mécanisme FONDAMENTAL de création des Kelim.

  - id: "EC-SHK-026"
    source_he: ""
    source_ref: "TES, Part 4, ch. 3, item 9-10; Histaklut Pnimit"
    assertion: >
      Les Reshimot (traces/impressions) sont ce qui reste dans le Masakh
      après le départ de la lumière. Quand un Partzuf perd son Ohr par
      Hizdakchut, les Reshimot demeurent dans le Masakh et servent de
      noyau pour la naissance du Partzuf suivant. Les Reshimot contiennent
      deux types d'information :
      (1) Reshimo de Hitlabshut — la trace de l'Ohr qui était habillé
      (le contenu de ce qui a été reçu).
      (2) Reshimo de Aviut — la trace de la force du Masakh
      (la capacité de filtrage qui a été utilisée).
      La dernière Behina (Dalet) ne laisse PAS de Reshimo.
    type: axiome_explicite
    concepts:
      - { id: "reshimot-doubles", role: "traces de contenu + traces de filtrage" }
      - { id: "reshimo-hitlabshut", role: "trace du contenu reçu" }
      - { id: "reshimo-aviut", role: "trace de la force de filtrage" }
      - { id: "pas-reshimo-dalet", role: "la dernière Behina ne laisse pas de trace" }
    mapping:
      modules: ["epistememory/"]
      tables: ["epistememory"]
      partzufim: []
      relevance: >
        Quand un /clear efface le contexte de Claude Code, les Reshimot
        qui devraient survivre sont de DEUX types :
        (1) Reshimo de Hitlabshut = QUOI a été fait (résultats, décisions).
        C'est le fichier de progrès.
        (2) Reshimo de Aviut = COMMENT le filtrage a fonctionné (quels
        contextes étaient pertinents, lesquels ont été inutiles). C'est
        un méta-log que PERSONNE ne garde en 2026.
        L'industrie garde les Reshimot de contenu mais perd les Reshimot
        de filtrage. Le Baal HaSulam dit que les DEUX sont nécessaires
        pour la naissance du Partzuf suivant.

  # ─────────────────────────────────────────────────────────────────
  # Section E : Hizdakchut et naissance — Le cycle de vie du Masakh
  # ─────────────────────────────────────────────────────────────────

  - id: "EC-SHK-027"
    source_he: ""
    source_ref: "TES, Pticha §40-42, §53-55; Part 4, Histaklut Pnimit, item 12"
    assertion: >
      Le cycle de vie d'un Partzuf suit un processus précis :
      (1) Naissance : un Zivug de Haka'a sur le Masakh avec un certain
      Aviut génère un Partzuf avec Rosh, Toch, Sof.
      (2) Fonctionnement : le Partzuf reçoit de l'Ohr dans son Toch et
      rejette le reste dans son Sof (Ohr Makif).
      (3) Bitush : l'Ohr Makif frappe le Masakh et commence à le purifier
      (réduire son Aviut).
      (4) Hizdakchut : le Masakh perd progressivement son Aviut, niveau
      par niveau (Dalet→Gimel→Bet→Aleph→Shoresh).
      (5) Histalkut : quand le Masakh est complètement purifié, il n'a
      plus de Zivug — le Partzuf "meurt" (les lumières partent).
      (6) Aliyah : le Masakh purifié remonte au Rosh du Partzuf supérieur
      avec ses Reshimot, où il se mélange au Zivug permanent du Rosh.
      (7) Naissance du suivant : les Reshimot "réveillent" un nouvel Aviut
      et un nouveau Partzuf naît, un niveau en-dessous du précédent.
    type: axiome_explicite
    concepts:
      - { id: "cycle-vie-partzuf", role: "7 étapes du cycle complet" }
      - { id: "histalkut", role: "départ des lumières = mort du Partzuf" }
      - { id: "aliyah-masakh", role: "remontée du Masakh purifié" }
    mapping:
      modules: ["olamot.py", "hitbonenut.py"]
      tables: []
      partzufim: []
      relevance: >
        Le cycle de vie d'une session Claude Code suit exactement ce
        pattern : naissance (début de session avec CLAUDE.md = Zivug initial),
        fonctionnement (échanges productifs), Bitush (le contexte exclu
        s'accumule et "pousse"), Hizdakchut (la qualité des réponses
        se dégrade progressivement), Histalkut (/clear = mort de la session),
        Aliyah (les Reshimot — fichier de progrès — remontent au système),
        Naissance du suivant (nouvelle session avec Reshimot enrichis).
        Le problème actuel : l'étape 6 (Aliyah avec Reshimot) est mal
        formalisée. Les fichiers de progrès ne capturent que les Reshimot
        de Hitlabshut (contenu), pas ceux d'Aviut (filtrage).

  - id: "EC-SHK-028"
    source_he: ""
    source_ref: "TES, Pticha §53-55; Part 6, Histaklut Pnimit, item 12"
    assertion: >
      Chaque Partzuf inférieur naît du Masakh de Guf du Partzuf supérieur,
      après que ce Masakh a été purifié et s'est égalisé en forme avec
      le Masakh du Rosh supérieur. Le nouveau Partzuf s'accroche au Guf
      du précédent au point du Chazeh (poitrine) — là où l'Aviut Gimel
      commence (un niveau en-dessous du Tabur du supérieur). Le Koma
      (taille/stature) du nouveau Partzuf commence au Peh du Partzuf
      précédent et descend jusqu'à son propre Siyum.
    type: axiome_explicite
    concepts:
      - { id: "naissance-du-chazeh", role: "point d'accroche du nouveau Partzuf" }
      - { id: "koma", role: "stature/taille du Partzuf" }
      - { id: "hitlabshut-partzufim", role: "enclothement mutuel des Partzufim" }
    mapping:
      modules: ["partzufim/"]
      tables: ["partzufim_state"]
      partzufim: []
      relevance: >
        Chaque nouvelle session Claude Code (nouveau Partzuf) naît du
        "Masakh purifié" de la session précédente — c'est-à-dire des
        Reshimot qui ont survécu au /clear. Le point d'accroche (Chazeh)
        est le CLAUDE_CODE.md et les fichiers de progrès. La stature
        (Koma) de la nouvelle session dépend de la qualité de ces Reshimot.
        Un CLAUDE_CODE.md pauvre = Koma courte = session limitée.

  # ─────────────────────────────────────────────────────────────────
  # Section F : Le Ohr sur le chemin du retour — Nitzotzin
  # ─────────────────────────────────────────────────────────────────

  - id: "EC-SHK-029"
    source_he: ""
    source_ref: "TES, Part 4, ch. 3, item 9; Table of Questions, item 40"
    assertion: >
      Pendant la Hizdakchut (purification) du Masakh, les Zivugim
      (unions) se font sur des Behinot de plus en plus subtiles, et les
      niveaux diminuent graduellement jusqu'à ce que l'Ohr disparaisse
      entièrement. Ce processus est appelé "Ohr sur le chemin du retour"
      (Ohr sheba-derekh ha-hazarah). Les He'arot (illuminations) qui
      tendent à sortir mais pourraient être réactivées sont appelées
      Nitzotzin (étincelles). Elles ressemblent aux étincelles qui restent
      après un feu ou sous le marteau du forgeron — apparemment éteintes,
      elles pourraient encore s'enflammer en une grande flamme.
    type: axiome_explicite
    concepts:
      - { id: "ohr-derekh-hazarah", role: "lumière sur le chemin du retour" }
      - { id: "nitzotzin-masakh", role: "étincelles dans le Masakh purifié" }
      - { id: "réactivation-potentielle", role: "flamme latente" }
    mapping:
      modules: ["nitzotzot.py", "failure_to_insight.py"]
      tables: ["nitzotzot"]
      partzufim: []
      relevance: >
        Quand une session se dégrade (Hizdakchut), les "étincelles" qui
        restent dans le contexte en dégradation sont les insights partiels,
        les patterns presque-trouvés, les connexions entrevues mais non
        formalisées. Le FailureToInsight d'Etz Chaim AI capture déjà
        ces Nitzotzin. Le ContextAssembler devrait explicitement les
        préserver lors du /compact ou du /clear — ce sont les graines
        du prochain Partzuf.

  - id: "EC-SHK-030"
    source_he: ""
    source_ref: "TES, Part 4, Histaklut Pnimit; EC, Shaar 49, ch. 2"
    assertion: >
      Le Bitush (frappe) entre Ohr Makif et Ohr Pnimi est la cause
      première de TOUT changement dans le système. Sans cette tension
      entre ce qui est reçu (Pnimi) et ce qui est exclu (Makif), le
      Masakh resterait statique et aucun nouveau Partzuf ne naîtrait.
      La tension est nécessaire — elle est le moteur de l'évolution.
      Le Baal HaSulam insiste : chaque mot ici est un joyau précieux
      qui doit être compris dans toute sa largeur et mémorisé à travers
      toute la sagesse.
    type: axiome_explicite
    concepts:
      - { id: "bitush-moteur", role: "la tension est le moteur de l'évolution" }
      - { id: "statique-sans-tension", role: "sans tension, pas de changement" }
    mapping:
      modules: ["dissensu_engine.py"]
      tables: ["tensions"]
      partzufim: []
      relevance: >
        Le DissensuEngine d'Etz Chaim AI (30091 tensions) EST le Bitush
        formalisé. Les tensions entre ce qui est intégré (Ohr Pnimi) et
        ce qui résiste à l'intégration (Ohr Makif) sont le MOTEUR de
        l'évolution du système. Supprimer les tensions (comme dans une
        purge) tue le moteur. Les gérer (Birur) le fait tourner.
        Le context rot n'est pas trop de tension — c'est de la tension
        non-gérée (Bitush sans Birur).

  # ─────────────────────────────────────────────────────────────────
  # Section G : Les 4 Mondes comme 4 niveaux de Masakh
  # ─────────────────────────────────────────────────────────────────

  - id: "EC-SHK-031"
    source_he: ""
    source_ref: "TES, Part 3, ch. 9; Pticha §83-87"
    assertion: >
      Les 4 Mondes (ABYA) correspondent à 4 niveaux de Masakh qui
      résultent de la Hizdakchut progressive :
      Atzilut = Masakh de Behina Gimel → Koma de Hokhmah.
      Beriah = Masakh de Behina Bet → Koma de Binah.
      Yetzirah = Masakh de Behina Aleph → Koma de Zeir Anpin.
      Assiah = Masakh de Behina Shoresh → Koma de Malkhut.
      Chaque monde est un Zivug de Haka'a dans le monde supérieur :
      le Zivug d'Atzilut se fait dans le Rosh de Adam Kadmon, celui
      de Beriah dans le Rosh d'Atzilut, etc.
    type: axiome_explicite
    concepts:
      - { id: "4-mondes-masakh", role: "chaque monde = un niveau de Masakh" }
      - { id: "zivug-inter-monde", role: "le Zivug se fait dans le monde supérieur" }
      - { id: "config-olamot", role: "configuration des 4 Olamot dans le système" }
    mapping:
      modules: ["olamot.py", "config.yaml"]
      tables: []
      partzufim: []
      relevance: >
        Le config.yaml d'Etz Chaim AI configure 4 Olamot avec des
        paramètres différents (think ON/OFF, température, ctx window).
        Le TES formalise cela : chaque monde est un NIVEAU DE FILTRAGE
        différent. Atzilut (think ON, temp 0.3, 32K) = Masakh Gimel
        (filtrage élevé, haute qualité). Assiah (think OFF, temp 0.2, 8K)
        = Masakh Shoresh (filtrage minimal, exécution rapide).
        La correspondance est déjà opérante dans le système.

