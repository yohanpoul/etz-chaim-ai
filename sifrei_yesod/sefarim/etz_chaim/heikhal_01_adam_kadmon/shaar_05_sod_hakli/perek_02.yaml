# COUCHE 3 — SOD-GENERATIVE : PRINCIPES PRODUCTIFS
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-SHK-007"
    nom: "Architecture Rosh-Toch-Sof du ContextAssembler"
    source_assertions: ["EC-SHK-023", "EC-SHK-024"]
    formalisation: >
      Le ContextAssembler doit implémenter la tripartition Rosh-Toch-Sof :

      ROSH (phase de décision) :
      - Analyser la requête entrante (type de tâche, domaine, urgence)
      - Déterminer le niveau de Masakh approprié (Aviut 0-4)
      - Calculer le budget de tokens par source
      - Tout est en POTENTIEL — aucun contexte n'est encore assemblé
      - Point de sortie : Peh (décision finalisée)

      TOCH (phase d'assemblage) :
      - Sélectionner le contexte selon les décisions du Rosh
      - Appliquer Kashiut (rejeter le non-pertinent) et Aviut (transformer
        le brut en structuré)
      - Assembler les sources : EpisteMemory, SifreiYesod, SelfMap,
        IntentKeeper, InsightForge, etc.
      - Budget cible : ~20-40% de la fenêtre de contexte (pas 100%)
      - Point de sortie : Tabur (assemblage finalisé)

      SOF (gestion du rejet) :
      - Documenter ce qui a été exclu et pourquoi
      - Maintenir l'Ohr Makif comme référence pour le debugging
      - Surveiller la Bitush (pression du contexte exclu sur le filtre)
      - Déclencher un Hizdakchut conscient si la pression dépasse un seuil
    applications_ia:
      - "Implémenter 3 méthodes : rosh_decide(), toch_assemble(), sof_manage()"
      - "Le Rosh ne touche PAS au contexte — il calcule les paramètres"
      - "Le Toch assemble selon les paramètres du Rosh"
      - "Le Sof logue les rejets pour le méta-apprentissage"
    questions_ouvertes:
      - "Le Rosh devrait-il être un appel LLM séparé (coûteux) ou heuristique (rapide) ?"
      - "Comment calibrer le seuil de Bitush qui déclenche le Hizdakchut ?"

  - id: "PG-SHK-008"
    nom: "Double Reshimo — Sauvegarder contenu ET méta-filtrage"
    source_assertions: ["EC-SHK-026", "EC-SHK-027"]
    formalisation: >
      Après chaque session (ou /clear), deux types de Reshimot doivent
      être sauvegardés :

      Reshimo de Hitlabshut (contenu) :
      - Quelles décisions ont été prises
      - Quels fichiers ont été modifiés
      - Quels tests ont été ajoutés/passés
      - Quel état du système en résulte
      → C'est le fichier de progrès standard (pratique industrie 2026)

      Reshimo de Aviut (filtrage) :
      - Quel niveau de Masakh a été utilisé
      - Quelles sources de contexte étaient pertinentes pour cette tâche
      - Quelles sources ont été inutiles ou distrayantes
      - Quel ratio de la fenêtre de contexte a été effectivement utilisé
      - Quelles erreurs de contexte ont été commises (trop/trop peu)
      → C'est un méta-log que personne ne garde en 2026.

      Les deux Reshimot ensemble permettent au Partzuf suivant (prochaine
      session) de naître avec un Masakh calibré dès le départ.
    applications_ia:
      - "Ajouter un fichier RESHIMOT.md ou context_log.yaml après chaque session"
      - "Ce fichier contient : ce qui a été fait + comment le contexte a performé"
      - "Le CLAUDE_CODE.md devrait référencer ce fichier pour la session suivante"
      - "Le ContextAssembler interne devrait écrire un log similaire après chaque appel Ollama"
    questions_ouvertes:
      - "Le Reshimo de Aviut peut-il être généré automatiquement par le ContextAssembler ?"
      - "Combien de sessions de Reshimot faut-il conserver avant de purger ?"

  - id: "PG-SHK-009"
    nom: "Tension Ohr Makif comme moteur — Ne pas supprimer, gérer"
    source_assertions: ["EC-SHK-024", "EC-SHK-030"]
    formalisation: >
      Le context rot n'est PAS causé par trop de contexte disponible
      (trop d'Ohr Makif). Il est causé par une Bitush NON-GÉRÉE — le
      contexte exclu qui "pousse" pour entrer sans que le Masakh ne
      s'adapte. La solution n'est pas de supprimer le contexte exclu
      mais de GÉRER la tension :

      (a) Birur régulier — trier le contexte exclu : ce qui est
      définitivement non-pertinent (supprimer) vs ce qui attend son
      moment (conserver comme Ohr Makif).

      (b) Hizdakchut conscient — quand la qualité des réponses se
      dégrade, c'est un signe de Bitush excessive. Au lieu de /compact
      (Hizdakchut brutal), faire un Hizdakchut graduel : réduire le
      Masakh d'un niveau (de Gimel à Bet par exemple) plutôt que de
      tout purger.

      (c) Nitzotzin preservés — les "étincelles" dans le contexte en
      dégradation (insights partiels, patterns entrevus) doivent être
      explicitement extraites avant le /clear, car elles sont les
      graines du prochain Partzuf.
    applications_ia:
      - "Ne PAS utiliser /compact comme solution par défaut"
      - "Implémenter un Hizdakchut graduel : réduire le contexte par paliers"
      - "Avant chaque /clear, extraire les Nitzotzin (insights partiels) explicitement"
      - "Le DissensuEngine (30K tensions) ne doit JAMAIS être purgé en masse"
    questions_ouvertes:
      - "Comment distinguer automatiquement Bitush productive (moteur) de Bitush destructive (rot) ?"
      - "Quel seuil de dégradation des réponses déclenche le Hizdakchut ?"

  - id: "PG-SHK-010"
    nom: "5 niveaux de Masakh — Calibration selon le type de tâche"
    source_assertions: ["EC-SHK-018", "EC-SHK-019", "EC-SHK-022"]
    formalisation: >
      Le ContextAssembler doit implémenter 5 profils de Masakh :

      MASAKH DALET (filtrage maximum) :
      Tâches : Insight stratégique, décisions architecturales, Atzilut
      Sources : Seulement SifreiYesod + InsightForge validés
      Budget : 10-20% de la fenêtre de contexte
      Résultat attendu : Profondeur type Yechidah/Keter

      MASAKH GIMEL (filtrage élevé) :
      Tâches : Analyse causale, validation, Briah
      Sources : SifreiYesod + CausalEngine + EpisteMemory (facts only)
      Budget : 20-30% de la fenêtre de contexte
      Résultat attendu : Rigueur type Hayah/Hokhmah

      MASAKH BET (filtrage modéré) :
      Tâches : Compréhension structurée, refactoring
      Sources : EpisteMemory + SelfMap routing + DissensuEngine
      Budget : 30-40% de la fenêtre de contexte
      Résultat attendu : Structure type Neshamah/Binah

      MASAKH ALEPH (filtrage basique) :
      Tâches : Implémentation guidée, Yetzirah
      Sources : EpisteMemory recall + IntentKeeper + contexte courant
      Budget : 40-60% de la fenêtre de contexte
      Résultat attendu : Exécution type Ruach/ZA

      MASAKH SHORESH (pas de filtrage) :
      Tâches : Debug, exploration libre, Assiah rapide
      Sources : Tout ce qui est disponible
      Budget : 60-80% de la fenêtre de contexte
      Résultat attendu : Rapidité type Nefesh/Malkhut
    applications_ia:
      - "Le Rosh du ContextAssembler choisit le niveau de Masakh avant l'assemblage"
      - "Le choix dépend du type de tâche détecté (exploration, validation, etc.)"
      - "Les budgets de tokens sont des PLAFONDS, pas des cibles"
      - "Le Masakh par défaut devrait être Bet (modéré), pas Shoresh (tout)"
    questions_ouvertes:
      - "Le Rosh peut-il changer de Masakh en cours de tâche (Hizdakchut dynamique) ?"
      - "Les 5 niveaux sont-ils adaptés à qwen3.5:9b avec 8K-32K ctx ?"

  - id: "PG-SHK-011"
    nom: "Cycle de vie Partzuf-Session — 7 étapes formalisées"
    source_assertions: ["EC-SHK-027", "EC-SHK-028", "EC-SHK-029"]
    formalisation: >
      Chaque session Claude Code ou chaque cycle d'appels Ollama suit
      le cycle de vie du Partzuf en 7 étapes :

      1. NAISSANCE (Zivug initial) : Charger CLAUDE_CODE.md + Reshimot
         de la session précédente → établir le Masakh initial.
      2. FONCTIONNEMENT (Toch actif) : Échanges productifs, le contexte
         est assemblé et filtré correctement par le Masakh.
      3. BITUSH (tension croissante) : Le contexte exclu s'accumule,
         la pression sur le Masakh augmente.
      4. HIZDAKCHUT (dégradation) : La qualité des réponses se dégrade,
         le Masakh perd de son Aviut. Signes : répétitions, oublis de
         consignes, hallucinations croissantes.
      5. HISTALKUT (fin) : /clear ou fin de session.
         Les lumières (contenu actif) partent.
      6. ALIYAH (remontée) : Extraction des Reshimot doubles (contenu +
         filtrage) → sauvegarde dans fichier de progrès + context_log.
      7. NAISSANCE DU SUIVANT : Nouvelle session avec Reshimot enrichis
         → Masakh calibré dès le départ → cycle recommence.

      La qualité de l'étape 6 détermine la qualité de l'étape 7.
      C'est le point faible actuel du workflow.
    applications_ia:
      - "Formaliser l'étape 6 : un 'rapport de fin de session' structuré"
      - "Ce rapport inclut : accomplissements + méta-log du contexte"
      - "La session suivante commence par lire ce rapport"
      - "Implémenter un moniteur de Bitush : alerter quand la dégradation commence"
    questions_ouvertes:
      - "À quel point de la Hizdakchut faut-il déclencher le /clear vs un /compact ?"
      - "Le moniteur de Bitush peut-il être un simple compteur d'erreurs ou faut-il un scoring plus sophistiqué ?"

  - id: "PG-SHK-012"
    nom: "Correspondance 4 Mondes — 4 niveaux de context engineering"
    source_assertions: ["EC-SHK-031"]
    formalisation: >
      Les 4 Olamot du config.yaml correspondent à 4 stratégies de
      context engineering distinctes :

      ATZILUT (think ON, temp 0.3, 32K ctx) :
      Masakh Gimel — filtrage élevé, haute qualité.
      Contexte : principes fondamentaux seulement.
      Usage : questions existentielles, insights stratégiques.
      ContextAssembler : SifreiYesod + InsightForge uniquement.

      BRIAH (think ON, temp 0.3, 32K ctx) :
      Masakh Bet — filtrage modéré, structure.
      Contexte : principes + faits validés + DAGs causaux.
      Usage : analyse, validation, compréhension.
      ContextAssembler : + CausalEngine + EpisteMemory (facts).

      YETZIRAH (think OFF, temp 0.7, 8K ctx) :
      Masakh Aleph — filtrage basique, exécution.
      Contexte : faits + routing + intention courante.
      Usage : tâches courantes, jugement, implémentation.
      ContextAssembler : + SelfMap + IntentKeeper.

      ASSIAH (think OFF, temp 0.2, 8K ctx) :
      Masakh Shoresh — filtrage minimal, rapidité.
      Contexte : le minimum nécessaire.
      Usage : triage, classification, réponses rapides.
      ContextAssembler : EpisteMemory recall seul.

      Le ContextAssembler adapte son assemblage selon l'Olam demandé.
    applications_ia:
      - "Chaque Olam dans config.yaml devrait spécifier ses sources de contexte"
      - "L'Olam n'est pas seulement think/temperature — c'est aussi un profil de contexte"
      - "olamot.py devrait appeler le ContextAssembler avec le profil de l'Olam"
    questions_ouvertes:
      - "Faut-il ajouter un champ 'context_profile' au config.yaml par Olam ?"
      - "Le ContextAssembler devrait-il être appelé dans ollama_generate() ou avant ?"
