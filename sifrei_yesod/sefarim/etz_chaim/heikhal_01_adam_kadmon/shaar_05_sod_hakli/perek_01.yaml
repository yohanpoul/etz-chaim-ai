# COUCHE 3 — SOD-GENERATIVE : PRINCIPES PRODUCTIFS
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-SHK-001"
    nom: "Primat du Kli — Le vaisseau détermine ce que la lumière peut devenir"
    source_assertions: ["EC-SHK-001", "EC-SHK-005", "EC-SHK-006"]
    formalisation: >
      Soit M un modèle LLM, C un contexte, P un prompt, et R la réponse.
      R = f(M, C, P). La variance de R expliquée par C domine la variance
      expliquée par P à M fixe. Var(R|C) >> Var(R|P).
      Le contexte (Kli) détermine le manifold des réponses accessibles ;
      le prompt (Kav) sélectionne un point sur ce manifold.
    applications_ia:
      - "Investir plus dans la structure du contexte que dans le raffinement du prompt"
      - "Le CLAUDE_CODE.md et les skills sont plus importants que le prompt individuel"
      - "Un prompt médiocre dans un bon contexte > un prompt parfait dans un mauvais contexte"
    questions_ouvertes:
      - "La prédiction Var(R|C) >> Var(R|P) est-elle falsifiable empiriquement ?"
      - "Existe-t-il un seuil de qualité de contexte en-dessous duquel le prompt reprend la dominance ?"

  - id: "PG-SHK-002"
    nom: "Relation Inverse Masakh-Qualité — Plus on filtre, mieux on reçoit"
    source_assertions: ["EC-SHK-008", "EC-SHK-009"]
    formalisation: >
      Soit F le degré de filtrage (Aviut du Masakh, 0-4) et Q la qualité
      de la réponse. Q = g(F) où g est croissante. Contre-intuitif :
      réduire le volume de contexte injecté (augmenter F) augmente la
      qualité de la réponse, jusqu'à un optimum. Au-delà, l'information
      essentielle est filtrée et Q chute (Tsimtsum excessif = Chalal vide).
    applications_ia:
      - "Implémenter 5 niveaux de filtrage dans le ContextAssembler (Aviut 0-4)"
      - "Le niveau par défaut ne devrait PAS être 'tout injecter' mais un filtrage modéré"
      - "Rester sous 40% d'utilisation de la fenêtre de contexte (règle empirique 2026)"
      - "Le budget de tokens par source doit être explicite et calibré"
    questions_ouvertes:
      - "Comment calibrer les 5 niveaux pour un modèle spécifique (qwen3.5:9b) ?"
      - "Le Masakh optimal est-il constant ou dépend-il du type de tâche ?"

  - id: "PG-SHK-003"
    nom: "Triple Cause de Shevirah — Diagnostic structurel du context collapse"
    source_assertions: ["EC-SHK-012"]
    formalisation: >
      Le context collapse se produit quand au moins une des 3 conditions
      est violée :
      (a) Katnut : le contexte est tronqué arbitrairement sans critère
      de priorité → information essentielle perdue
      (b) Absence de Hitlabshut : les couches de contexte sont concaténées
      sans interaction → incohérence entre couches
      (c) Absence de colonnes : pas de structure harmonieuse
      (droite/expansion, gauche/contraction, centre/harmonisation) →
      déséquilibre contextuel
    applications_ia:
      - "Avant chaque assemblage de contexte, vérifier les 3 conditions anti-Shevirah"
      - "Les poids Igulim ne doivent PAS être hardcodés — ils doivent s'adapter (Hitlabshut)"
      - "Le contexte Hitbonenut ne doit PAS être tronqué à 800 chars sans critère de qualité"
      - "Chaque assemblage doit avoir les 3 colonnes : expansion (Chesed), contraction (Gevurah), harmonisation (Tiferet)"
    questions_ouvertes:
      - "Peut-on détecter automatiquement les signes avant-coureurs de Shevirah contextuelle ?"
      - "Existe-t-il un équivalent du 'Bitush Or Makif be-Or Pnimi' dans le context engineering ?"

  - id: "PG-SHK-004"
    nom: "Trajectoire Akudim→Partzufim — Maturité architecturale du contexte"
    source_assertions: ["EC-SHK-011", "EC-SHK-006"]
    formalisation: >
      Le context engineering suit une progression développementale :
      Akudim (monolithique, un seul bloc) → Nekudim (empilé, éléments
      isolés) → Berudim (interactif, éléments qui commencent à interagir)
      → Partzufim (organique, structures composées auto-régulées).
      L'industrie en 2026 est en transition Nekudim→Berudim. Sod HaKli
      vise le stade Partzufim.
    applications_ia:
      - "Le ContextAssembler doit être conçu pour le stade Partzufim, pas juste Berudim"
      - "Chaque élément de contexte doit contenir une trace (Reshimu) de tous les autres"
      - "Les modules sephirothiques doivent s'enrichir mutuellement, pas juste s'empiler"
    questions_ouvertes:
      - "Quel est le coût computationnel du passage Nekudim→Partzufim ?"
      - "Est-ce réaliste avec la fenêtre de contexte actuelle de qwen3.5:9b (8K-32K) ?"

  - id: "PG-SHK-005"
    nom: "Da'at comme pont anti-hallucination"
    source_assertions: ["EC-SHK-016"]
    formalisation: >
      L'hallucination = Hokhmah + Binah - Da'at. Le modèle a des faits
      (Hokhmah) et sait raisonner (Binah) mais ne les INTÈGRE pas à la
      tâche spécifique (Da'at). Le contexte de Da'at est le pont :
      exemples résolus dans le domaine exact, liens explicites entre
      les faits injectés et la requête, démonstration de comment appliquer
      la connaissance à CE cas.
    applications_ia:
      - "Chaque assemblage de contexte doit inclure un 'pont Da'at' explicite"
      - "Le pont Da'at = exemples de comment les faits injectés ont été utilisés dans des cas similaires"
      - "Le score Hitbonenut (0.742) pourrait augmenter avec un meilleur Da'at dans les prompts"
    questions_ouvertes:
      - "Comment générer automatiquement le pont Da'at à partir de l'historique des interactions ?"
      - "Le Da'at est-il le différenciateur principal entre score 4 et score 5 dans l'audit ?"

  - id: "PG-SHK-006"
    nom: "Ibur/Yenikah/Mochin — Le contexte comme organisme en développement"
    source_assertions: ["EC-SHK-013"]
    formalisation: >
      Tout système de contexte traverse 3 stades :
      Ibur : contexte minimal, nourri directement par l'humain, tout est
      injecté manuellement.
      Yenikah : contexte intermédiaire, le système commence à trier mais
      dépend encore de l'humain pour les décisions majeures.
      Mochin/Gadlut : contexte autonome, le système gère son propre
      contexte, se met à jour, se corrige, génère ses propres skills.
      Le stade courant doit être TRACKÉ et le comportement ADAPTÉ.
    applications_ia:
      - "Ajouter un champ 'stade_contextuel' (ibur/yenikah/mochin) au système"
      - "En Ibur : tout injecter, pas de filtrage, supervision humaine totale"
      - "En Yenikah : filtrage basique, l'humain valide les décisions de filtrage"
      - "En Mochin : filtrage autonome, l'humain intervient seulement sur exception"
      - "Abba à 0.57 est en transition Yenikah→Mochin — c'est un indicateur"
    questions_ouvertes:
      - "Comment détecter automatiquement le passage d'un stade à l'autre ?"
      - "Le stade est-il global (tout le système) ou par module/domaine ?"
