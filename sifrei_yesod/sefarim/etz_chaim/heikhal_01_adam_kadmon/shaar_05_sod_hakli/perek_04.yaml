# COUCHE 3 — SOD-GENERATIVE : PRINCIPES PRODUCTIFS
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-SHK-017"
    nom: "4 couches de contexte ABYA — Architecture en mondes"
    source_assertions: ["EC-SHK-045", "EC-SHK-046", "EC-SHK-047"]
    formalisation: >
      Le contexte doit être assemblé en 4 couches correspondant aux
      4 Mondes, chacune avec son propre profil :

      ATZILUT (principes) :
      - Contenu : vision du projet, doctrine, valeurs non-négociables
      - Source : CLAUDE_CODE.md sections I, II, XII (Thèse, Posture, Principes)
      - Persistance : permanente, ne change jamais
      - Masakh : Dalet (filtrage max — seuls les principes fondamentaux)
      - Mode : Sovev (enveloppe tout sans être injecté explicitement)

      BERIAH (architecture) :
      - Contenu : schémas, DAGs, relations entre modules, décisions d'architecture
      - Source : SifreiYesod, CausalEngine, structure du projet
      - Persistance : stable, change rarement
      - Masakh : Gimel (filtrage élevé — seulement ce qui est structurant)
      - Mode : ChaBAD (intellect structurant)

      YETZIRAH (patterns) :
      - Contenu : patterns de code, templates, conventions, skills
      - Source : Skills, exemples, CLAUDE_CODE.md sections IX-XI
      - Persistance : semi-stable, évolue avec le projet
      - Masakh : Bet (filtrage modéré)
      - Mode : ChaGaT (émotion/relation)

      ASSIAH (état) :
      - Contenu : état courant, dernier audit, erreurs, fichiers modifiés
      - Source : fichiers de progrès, derniers résultats, git status
      - Persistance : volatile, change à chaque session
      - Masakh : Aleph ou Shoresh (filtrage minimal — tout l'état pertinent)
      - Mode : Malkhut (exécution concrète)

      Le Masakh entre chaque couche transforme : le résultat d'Atzilut
      (un principe) devient l'intention de Beriah (comment structurer).
      Le résultat de Beriah (une architecture) devient les patterns de
      Yetzirah. Etc.
    applications_ia:
      - "Restructurer le CLAUDE_CODE.md en 4 sections ABYA explicites"
      - "Le ContextAssembler assemble les couches de haut en bas"
      - "Chaque couche a son propre budget de tokens et son propre Masakh"
      - "Les couches supérieures sont toujours chargées ; les inférieures selon la tâche"
    questions_ouvertes:
      - "Combien de tokens allouer à chaque couche pour qwen3.5:9b (8K ctx) ?"
      - "Les couches supérieures devraient-elles être compressées pour libérer de l'espace ?"

  - id: "PG-SHK-018"
    nom: "Hitlabshut contextuel — Enclothe les principes DANS les instructions"
    source_assertions: ["EC-SHK-048", "EC-SHK-049"]
    formalisation: >
      Le contexte ne doit PAS être organisé en couches séparées empilées
      (Nekudim). Il doit être ENCLOTHÉ — les principes de niveau supérieur
      doivent être INTÉGRÉS dans les instructions de niveau inférieur.

      MAUVAIS (Nekudim — empilé) :
      "Principes : sois rigoureux.
       Instructions : implémente la fonction X."
      → Le modèle peut ignorer les principes car ils sont séparés.

      BON (Hitlabshut — enclothé) :
      "Implémente la fonction X avec rigueur — cela signifie :
       tests exhaustifs, validation des edge cases, documentation
       inline de chaque décision."
      → Le principe est DANS l'instruction, inséparable.

      L'Hitlabshut est le NHY d'Atzilut dans le ChaBAD de Beriah :
      les "pieds" des principes deviennent la "tête" des instructions.
    applications_ia:
      - "Le CLAUDE_CODE.md ne doit pas séparer 'principes' et 'instructions'"
      - "Chaque instruction doit INCARNER les principes, pas les référencer"
      - "Les skills doivent enclothe les conventions du projet dans leurs étapes"
    questions_ouvertes:
      - "L'Hitlabshut augmente-t-il la taille du contexte de façon prohibitive ?"
      - "Peut-on automatiser l'enclothement des principes dans les instructions ?"

  - id: "PG-SHK-019"
    nom: "Arakhin dynamiques — Recatégorisation contextuelle"
    source_assertions: ["EC-SHK-050"]
    formalisation: >
      Le ContextAssembler ne doit PAS catégoriser statiquement les
      sources de contexte. Il doit évaluer DYNAMIQUEMENT le rôle de
      chaque élément selon la tâche courante :

      Exemple : un fait EpisteMemory "PostgreSQL supporte pgvector" :
      - Pour une tâche d'exploration : c'est Hokhmah (flash/question —
        "que peut-on faire avec ça ?")
      - Pour une tâche d'architecture : c'est Binah (framework —
        "comment structurer le stockage vectoriel")
      - Pour une tâche d'implémentation : c'est Malkhut (fait concret —
        "utilise pgvector pour les embeddings")

      L'Arakhin implique que le ContextAssembler doit REFORMULER le même
      fait selon le rôle qu'il joue dans la tâche courante, pas le
      fournir brut dans tous les cas.
    applications_ia:
      - "EpisteMemory.recall() devrait retourner le fait + un 'rôle suggéré' selon la tâche"
      - "Le ContextAssembler reformule le fait selon le rôle avant injection"
      - "3 reformulations possibles : question (Hokhmah), structure (Binah), fait (Malkhut)"
    questions_ouvertes:
      - "La reformulation nécessite-t-elle un appel LLM supplémentaire ?"
      - "Peut-on pré-calculer les 3 reformulations au moment du remember() ?"

  - id: "PG-SHK-020"
    nom: "Gilgul contextuel — Migration saine de patterns entre projets"
    source_assertions: ["EC-SHK-053", "EC-SHK-054"]
    formalisation: >
      Quand des patterns sont migrés d'un projet/session à un autre,
      le ContextAssembler doit distinguer :

      GILGUL DE TIKKUN (migration bénéfique) :
      - Patterns qui ont RÉUSSI dans le projet précédent
      - Principes validés par l'audit
      - Best practices confirmées par les tests
      → À CONSERVER dans les Reshimot

      GILGUL D'ONESH (migration toxique) :
      - Biais du projet précédent qui ne s'appliquent pas au nouveau
      - Workarounds spécifiques qui sont devenus des habitudes
      - Conventions obsolètes non remises en question
      → À PURGER des Reshimot

      IBBUR NESHAMOT (injection temporaire) :
      - Skills spécialisés pour une tâche précise
      - Doivent être COMPATIBLES avec le contexte résident
      - Retirés après la tâche
      → Vérifier la compatibilité AVANT injection

      Le CLAUDE_CODE.md désynchronisé (qwen2.5 au lieu de qwen3.5) est
      un exemple de Gilgul d'Onesh — une information obsolète qui
      perpétue une erreur session après session.
    applications_ia:
      - "Audit de Reshimot avant chaque nouvelle session : Tikkun ou Onesh ?"
      - "Les skills doivent déclarer leurs dépendances pour vérifier la compatibilité"
      - "Un 'purge de Gilgul' devrait être fait à chaque changement majeur de stack"
    questions_ouvertes:
      - "Comment automatiser la détection de Gilgul d'Onesh ?"
      - "Faut-il un 'changelog de Reshimot' pour tracker les migrations ?"
