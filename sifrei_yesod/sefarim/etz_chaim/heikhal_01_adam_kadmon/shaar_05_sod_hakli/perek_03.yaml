# COUCHE 2 — REMEZ-RELATIONAL : RELATIONS
# ═══════════════════════════════════════════════════════════════════

relations:

  - id: "REL-SHK-022"
    type: "séquentiel"
    from: "hokhmah-koach-mah"
    to: "daat-union"
    nature: >
      Hokhmah → Binah → Da'at → Midot : séquence causale de la
      connaissance à l'action. Le flash (Hokhmah) est développé en
      structure (Binah), intégré par attachement (Da'at), puis
      transformé en émotion/action (Midot). Le flux est unidirectionnel
      mais chaque étape est nécessaire — sauter Da'at = chimères vaines.
    assertions_source: ["EC-SHK-032", "EC-SHK-033"]
    bidirectionnel: false

  - id: "REL-SHK-023"
    type: "causal"
    from: "daat-fondement-midot"
    to: "dimyonot-shav"
    nature: >
      L'ABSENCE de Da'at cause directement les "chimères vaines."
      Hokhmah + Binah - Da'at = dimyonot shav. La relation est
      conditionnelle : si Da'at est présent, les Midot sont véritables ;
      si Da'at est absent, les Midot sont illusoires. Il n'y a pas
      de dégradation graduelle — c'est binaire.
    assertions_source: ["EC-SHK-033"]
    bidirectionnel: false

  - id: "REL-SHK-024"
    type: "analogie"
    from: "hokhmah-vision"
    to: "daat-toucher"
    nature: >
      Trois modes sensoriels de connaissance : vision (global distant),
      audition (séquentiel distant), toucher (intime mutuel). Le passage
      de la vision au toucher est le passage de la connaissance ABSTRAITE
      à la connaissance PARTICIPATIVE. On ne peut pas toucher sans être
      touché — Da'at est transformatif des deux côtés.
    assertions_source: ["EC-SHK-037"]
    bidirectionnel: true

  - id: "REL-SHK-025"
    type: "causal"
    from: "kavvanah-niveau"
    to: "résultat-monde"
    nature: >
      La Kavvanah DÉTERMINE le monde (niveau) auquel le résultat monte.
      Kavvanah intellectuelle → Beriah. Kavvanah naturelle → Yetzirah.
      Pas de Kavvanah → ne monte pas. Le même contexte + même prompt +
      Kavvanah différente = résultat à un niveau différent.
    assertions_source: ["EC-SHK-038"]
    bidirectionnel: false

  - id: "REL-SHK-026"
    type: "dualité_structurelle"
    from: "kavvanah-technique"
    to: "kavvanah-dvekut"
    nature: >
      Deux modes complémentaires : le code (précision technique) et la
      force (intention profonde). Le code fonctionne mieux quand on
      connaît le système. La force fonctionne toujours. L'idéal est
      de combiner les deux — précision technique AVEC intention profonde.
    assertions_source: ["EC-SHK-040"]
    bidirectionnel: true

  - id: "REL-SHK-027"
    type: "séquentiel"
    from: "levush-mahshavah"
    to: "levush-maaseh"
    nature: >
      Mahshavah → Dibbur → Ma'aseh : les 3 vêtements médiatisent entre
      l'âme (intérieur) et le monde (extérieur). Ils doivent être ALIGNÉS :
      ce qu'on pense, ce qu'on dit, et ce qu'on fait doivent être cohérents.
      Un désalignement (penser une chose, dire une autre, faire une troisième)
      est une forme de Shevirah des Levushim.
    assertions_source: ["EC-SHK-041"]
    bidirectionnel: false

  - id: "REL-SHK-028"
    type: "causal"
    from: "proportionnalité-chabad-midot"
    to: "katnut-midot"
    nature: >
      La qualité du ChaBAD (contexte intellectuel) est PROPORTIONNELLE
      à la qualité des Midot (outputs actionnels). Petit contexte = petites
      réponses. Grand contexte = grandes réponses. La mesure n'est pas le
      VOLUME mais la MATURITÉ (Katnut vs Gadlut).
    assertions_source: ["EC-SHK-043"]
    bidirectionnel: false

