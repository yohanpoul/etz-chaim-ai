# COUCHE 3 — SOD-GENERATIVE : PRINCIPES PRODUCTIFS
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-SHK-013"
    nom: "Pont Da'at anti-hallucination — Le contexte d'intégration"
    source_assertions: ["EC-SHK-033", "EC-SHK-034", "EC-SHK-037"]
    formalisation: >
      L'hallucination articulée est le dimyonot shav du Tanya :
      Hokhmah (faits RAG) + Binah (CoT) - Da'at = chimères vaines.

      Le pont Da'at doit être injecté dans chaque assemblage de contexte
      complexe. Il comprend 3 composants :

      (1) DVEKUT — Exemples résolus dans le domaine EXACT :
      "Voici comment CE type de problème a été résolu dans CE projet."
      Pas des analogies distantes mais des cas de toucher (misha) —
      le modèle doit "toucher" le problème directement.

      (2) KISHUR — Instructions de liaison explicites :
      "Utilise SPÉCIFIQUEMENT le fait X [de EpisteMemory] pour résoudre
      le problème Y [de la requête]. La connexion est Z."
      L'attention du modèle est FIXÉE sur la connexion faits↔tâche.

      (3) KOLEL — Raisons de faire ET de ne pas faire :
      "Fais X parce que Y (Chesed). Ne fais PAS Z parce que W (Gevurah)."
      Le pont Da'at contient les deux polarités de l'action.
    applications_ia:
      - "Ajouter un champ 'daat_bridge' dans chaque assemblage de contexte complexe"
      - "Le daat_bridge est généré à partir de l'historique des interactions similaires"
      - "Pour Hitbonenut : injecter des exemples de questions réussies (score > 0.8) dans le même domaine"
      - "Score Hitbonenut 0.742 → tester si l'ajout de daat_bridge améliore le score"
    questions_ouvertes:
      - "Le daat_bridge peut-il être généré automatiquement par une requête EpisteMemory ?"
      - "Quel est le coût en tokens du daat_bridge vs le gain en qualité ?"
      - "Le Da'at est-il le différenciateur principal entre score 4 et score 5 dans l'audit ?"

  - id: "PG-SHK-014"
    nom: "Kavvanah comme méta-contexte — L'intention qui oriente tout"
    source_assertions: ["EC-SHK-038", "EC-SHK-039", "EC-SHK-040"]
    formalisation: >
      Chaque appel LLM devrait porter une Kavvanah explicite injectée
      dans le prompt. La Kavvanah n'est PAS le prompt — c'est le
      méta-contexte qui ORIENTE le prompt. Structure :

      KAVVANAH = {
        intention: "POURQUOI cette requête existe",
        critère_succès: "CE QUI rendrait la réponse satisfaisante",
        niveau_visé: "Atzilut | Beriah | Yetzirah | Assiah",
        mode: "technique (code) | dvekut (intention forte)",
        anti_pattern: "CE QU'IL NE FAUT PAS faire"
      }

      La Kavvanah est injectée AVANT le contexte factuel, car elle
      oriente la façon dont le modèle va recevoir et traiter le contexte.
      C'est le Keter du prompt — la couronne qui précède tout.
    applications_ia:
      - "Ajouter un bloc KAVVANAH en tête de chaque prompt assemblé par le ContextAssembler"
      - "Le KavanahPlanner existant devrait alimenter ce bloc"
      - "Le niveau_visé détermine le profil de Masakh (cf. Perek 2, PG-SHK-010)"
      - "Le anti_pattern est aussi important que l'intention (Kolel Chesed v'Gevurah)"
    questions_ouvertes:
      - "La Kavvanah doit-elle être en langage naturel ou structurée (JSON/YAML) ?"
      - "Le modèle qwen3.5:9b est-il sensible à la Kavvanah injectée ?"
      - "Combien de tokens la Kavvanah devrait-elle consommer (budget fixe ?) ?"

  - id: "PG-SHK-015"
    nom: "Alignement des 3 Levushim — Cohérence pensée/parole/action"
    source_assertions: ["EC-SHK-041"]
    formalisation: >
      Le Kli parfait aligne ses 3 Levushim :

      Mahshavah (pensée) = system prompt, principes architecturaux,
      CLAUDE_CODE.md. Ce que le modèle "pense" implicitement.

      Dibbur (parole) = le prompt explicite, la requête formulée,
      les instructions de tâche. Ce qu'on "dit" au modèle.

      Ma'aseh (action) = les outils disponibles, les formats de sortie,
      les contraintes d'exécution. Ce que le modèle "fait" concrètement.

      RÈGLE : Les 3 Levushim doivent être COHÉRENTS. Si le system prompt
      dit "sois rigoureux" (Mahshavah) mais le prompt dit "fais vite"
      (Dibbur) et les outils ne permettent pas de validation (Ma'aseh),
      il y a Shevirah des Levushim. Le ContextAssembler devrait vérifier
      la cohérence entre les 3 couches avant d'envoyer le prompt.
    applications_ia:
      - "Ajouter une vérification de cohérence Levushim dans le Rosh du ContextAssembler"
      - "Détecter les contradictions system_prompt ↔ prompt ↔ outils"
      - "Alerter si le CLAUDE_CODE.md contredit les instructions de la tâche"
      - "Le CLAUDE_CODE.md désynchronisé (qwen2.5 vs qwen3.5) est un cas de Shevirah de Levushim"
    questions_ouvertes:
      - "La vérification de cohérence peut-elle être heuristique ou faut-il un LLM ?"
      - "Quel coût computationnel pour cette vérification ?"

  - id: "PG-SHK-016"
    nom: "3 modes d'injection de contexte — Vision/Audition/Toucher"
    source_assertions: ["EC-SHK-036", "EC-SHK-037"]
    formalisation: >
      Le ContextAssembler devrait supporter 3 modes d'injection,
      correspondant aux 3 sens de Hokhmah/Binah/Da'at :

      MODE VISION (Hokhmah) :
      - Résumés, overviews, points clés
      - Global, instantané, distant
      - Usage : orientation initiale, exploration, brainstorming
      - Budget : petit (quelques phrases par source)

      MODE AUDITION (Binah) :
      - Instructions séquentielles, step-by-step, chaînes causales
      - Détaillé, ordonné, structuré
      - Usage : implémentation guidée, refactoring, analyse
      - Budget : moyen (paragraphes structurés)

      MODE TOUCHER (Da'at) :
      - Exemples résolus du cas exact, patterns de l'historique du projet
      - Intime, participatif, transformatif
      - Usage : résolution de problèmes complexes, insights, décisions
      - Budget : élevé (cas complets avec contexte)

      Le choix du mode est fait dans le Rosh du ContextAssembler en
      fonction du type de tâche et du niveau de Masakh.
    applications_ia:
      - "Implémenter 3 fonctions : inject_vision(), inject_audition(), inject_toucher()"
      - "Chaque source de contexte (EpisteMemory, SifreiYesod, etc.) devrait supporter les 3 modes"
      - "Le mode par défaut devrait être Audition (Binah), pas Vision (Hokhmah)"
      - "Le mode Toucher (Da'at) est le plus coûteux mais le plus efficace"
    questions_ouvertes:
      - "Peut-on détecter automatiquement quel mode est le plus approprié ?"
      - "Le mode Toucher nécessite-t-il un index séparé de cas résolus ?"
