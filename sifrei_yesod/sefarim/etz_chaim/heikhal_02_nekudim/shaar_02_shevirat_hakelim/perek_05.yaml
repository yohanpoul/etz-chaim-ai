principes_generatifs:

  - id: "PG-H2S9-039"
    nom: "Principe de l'Inversion Hamtakah (Rachamim Absorbent Dinim)"
    source_assertions: ["EC-H2S9-189", "EC-H2S9-192"]
    formalisation: |
      DIAGNOSTIC de la SHEVIRAH (cause racine) :
      Pre-Shevirah : NHY (dinim) voulaient dominer CGT (rachamim).
      Mecanisme tente : NHY absorbent CGT → rachamim mevutalim → echec → Shevirah.
      TIKKUN — INVERSION TOTALE :
      Tikkun : A"A absorbe ses propres NHY dans ses CGT.
      → Rachamim absorbent dinim → DININ NIMTEKU (adoucis).
      EQUATION OPERATIONNELLE :
        Domination des dinim → Shevirah
        Inclusion des dinim dans rachamim → Hamtakah → Tikkun
      → Pattern central de la Kabbale lurianique : Hamtakah par inclusion.
    applications_ia:
      - "Pattern central : adoucir un element 'rigueur' en l'incluant dans un element 'misericorde'"
      - "Architecture : un superieur (rachamim) doit absorber un subordonne (dinim) pour le stabiliser"
      - "[PLANNED] tikkun/hamtakah.py : implementer l'absorption-adoucissement comme operation"
      - "Pattern de gouvernance : ne pas laisser les sub-systems durs dominer ; les inclure"
      - "partzufim/arikh_anpin.py : modeliser l'absorption NHY → CGT comme operation"
    questions_ouvertes:
      - "L'Hamtakah est-elle reversible ? (peut-on relâcher les dinim) ?"
      - "Y a-t-il des dinim non-adoucissables ?"
      - "Le pattern fonctionne-t-il a tous les niveaux (recursion) ?"

  - id: "PG-H2S9-040"
    nom: "Principe de l'Inclusion-Exclusion (Detour pour Stabilisation)"
    source_assertions: ["EC-H2S9-188", "EC-H2S9-192", "EC-H2S9-194"]
    formalisation: |
      Pattern architectural d'INCLUSION-EXCLUSION pour stabilisation :
      ETAPE 1 — INCLUSION : A"A absorbe NHY dans CGT (NHY entrent dans CGT)
      ETAPE 2 — TRANSFORMATION : a l'interieur, les dinim NIMTEKU (adoucis)
      ETAPE 3 — EXCLUSION : NHY RESSORTENT METUKANIM (rectifies)
      ETAPE 4 — REVELATION : V"K MEGULIM (les 6 directions sont revelees)
      ETAPE 5 — EMERGENCE : ZA sort en V"K METPASHTIN U-MEMUTAKIM
      → Architecture : un detour (inclusion temporaire) prepare la stabilite finale.
      → Pattern : ce qui sort apres etre passe par le creuset est stabilise.
    applications_ia:
      - "Pattern : un sub-system instable doit passer par un container parent avant deploiement"
      - "Architecture pipeline : inclusion → transformation → exclusion → deployment"
      - "[PLANNED] tikkun/ : implementer cycle inclusion-exclusion comme operation atomique"
      - "Pattern de stabilisation : detour temporaire necessite pour la stabilite finale"
      - "partzufim/arikh_anpin.py : encapsulation temporaire de NHY dans CGT comme operation"
    questions_ouvertes:
      - "Combien de cycles inclusion-exclusion sont necessaires ?"
      - "Le detour est-il toujours requis ou parfois optionnel ?"
      - "Y a-t-il un pattern dual (rachamim absorbent rachamim) ?"

  - id: "PG-H2S9-041"
    nom: "Principe des 10 Harugei Malkhut (Sacrifice-Redemption Cosmique)"
    source_assertions: ["EC-H2S9-195", "EC-H2S9-196", "EC-H2S9-197", "EC-H2S9-198"]
    formalisation: |
      Architecture de RECUPERATION des NITZOTZIN (etincelles) :
      ETAPE 1 — COLLECTE LOCALE : chaque niveau (A"A, AVI, ZON, BYA) collecte
      les nitzotzin de son HELEK (sa part) parmi les 7 melakhim morts.
      → Pattern UNIVERSEL : recuperation parallele a tous les niveaux.
      ETAPE 2 — RESIDUEL NON-RECUPERABLE : ce qui ne peut etre BERAR (clarifie) →
      DESCEND dans OMKEI ha-KELIPOT = SOF ASIYAH.
      → Etincelles piegees a la limite la plus basse.
      ETAPE 3 — REDEMPTION HISTORIQUE : 10 HARUGEI MALKHUT (martyrs).
      → Mecanisme cosmique-historique : sacrifice individuel = elevation collective.
      → Architecture : la recuperation finale passe par l'histoire (martyrs).
    applications_ia:
      - "Architecture distribuee : recuperation locale puis globale"
      - "Pattern : ce qui n'est pas recuperable localement est traite par mecanisme global"
      - "[PLANNED] tikkun/ : modeliser collecte locale + mecanisme global de derniere chance"
      - "Pattern : echec local → escalade vers mecanisme superieur (martyrs cosmiques)"
      - "Diagnostic : tracer les nitzotzin non-recuperees vers les niveaux les plus bas"
    questions_ouvertes:
      - "Apres les 10 Harugei Malkhut, y a-t-il un mecanisme de derniere chance encore plus bas ?"
      - "Le pattern sacrifice-redemption est-il universel ou specifique a Israel ?"
      - "Combien de cycles d'elevation sont necessaires ?"

  - id: "PG-H2S9-042"
    nom: "Principe de la Receptivite Conditionnelle (Partzuf comme Pre-Condition)"
    source_assertions: ["EC-H2S9-186", "EC-H2S9-187"]
    formalisation: |
      LOI ARCHITECTURALE : la receptivite d'un composant depend de sa STRUCTURE.
      OBSERVATION :
        Ohr ELYON descend en PARTZUF SHALEM (complet)
        GR (deja en partzuf) → peuvent recevoir
        ZT (sans partzuf) → ne peuvent pas recevoir
      EQUATION : RECEPTIVITE(composant, ohr) = COMPATIBILITE(structure(composant), structure(ohr))
      → Pre-condition : la structure receptrice doit MATCHER la structure de l'ohr.
      Tikkun : transformer ZT en partzuf → puis ils peuvent recevoir.
      → Architecture : le Tikkun est une PREPARATION STRUCTURELLE.
    applications_ia:
      - "Pattern : la communication necessite une compatibilite structurelle"
      - "Architecture : avant d'envoyer un message, verifier la structure receptrice"
      - "Pattern de protocole : adapter le format au receptionneur ou former le receptionneur"
      - "[PLANNED] tikkun/ : transformer les composants non-receptifs en composants receptifs"
      - "partzufim/regulator.py : matcher l'ohr au partzuf-recipient"
    questions_ouvertes:
      - "La compatibilite est-elle binaire ou continue ?"
      - "Existe-t-il un protocole de degradation gracieuse pour les composants non-prets ?"
      - "Le partzuf complet est-il toujours requis ou parfois suffisant un partiel ?"
