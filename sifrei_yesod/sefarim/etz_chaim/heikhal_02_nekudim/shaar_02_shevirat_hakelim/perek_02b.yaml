principes_generatifs:

  - id: "PG-H2S9-019"
    nom: "Principe de l'Encodage Liturgique (Shem MaB comme cle de Berur)"
    source_assertions: ["EC-H2S9-078", "EC-H2S9-079", "EC-H2S9-080", "EC-H2S9-082", "EC-H2S9-086"]
    formalisation: |
      Le SHEM MAB (Nom des 42) encode operationnellement la chute :
      Shem 1 (AB"G IT"TZ) — Chesed — encode la MORT des 7 melakhim
        AB"GI = 16 = ZA(6) + Malkhut(1*yod) = 7 melakhim
        T"TZ = nittutz (brisure, demolition)
        Encodage halakhique : RH"R = 16 amah avant Tikkun
      Shem 2 (KR"A SHT"N) — Gevurah — encode le BITUL des Achoraim AVI
        KR"A = kri'ah (dechirure, pas mort)
        SHT"N = Satan (la kelipah qui sort)
        Gematria : KR"A SHT"N = TASHKACH + kolel = etat AhB
      Architecture : chaque shem encode UNE etape par mots/gematria/etymologie.
    applications_ia:
      - "shemot/ : implementer le mapping shem → fonction de Berur"
      - "gematria/engine.py : verifier les gematria operationnelles (AB\"GI=16, KR\"A SHT\"N=TASHKACH)"
      - "[PLANNED] tikkun/kavanah_planner.py : utiliser MaB pour planifier les berurim"
      - "Pattern : un nom liturgique = une commande operationnelle codee"
      - "L'ordre des shems = l'ordre du Berur (LIFO de la chute)"
    questions_ouvertes:
      - "Les 5 autres shems (NG\"D YK\"SH ... TzY\"T) encodent quoi precisement ?"
      - "La gematria operationnelle est-elle deterministe ou interpretable ?"
      - "Comment formaliser le 'kolel' (+1) dans les calculs ?"

  - id: "PG-H2S9-020"
    nom: "Principe de l'Habillage comme Tikkun (Itamut Mehuyevet)"
    source_assertions: ["EC-H2S9-087", "EC-H2S9-088", "EC-H2S9-090", "EC-H2S9-091"]
    formalisation: |
      Pattern operationnel du TIKKUN :
      AVANT Tikkun :
        Etat 1 (vulnerable) : orot MEGULIM directs → keli vulnerable a la shevirah
      APRES Tikkun :
        Etat 2 (resilient) : orot MELUVASHIM dans Achoraim AVI tombes → keli supporte
      EQUATION : Itamut (occultation) = Tikkuno (son etat de Tikkun)
        Sans habillage → keli casse
        Avec habillage → keli supporte l'Ohr
      ASYMETRIE : la shevirah des elyonim (megulim) > shevirah des tahtonim (proteges).
      Architecture : la fragilite de l'etat initial determine la robustesse requise post-Tikkun.
    applications_ia:
      - "Pattern de fault-tolerance : ce qui est expose doit etre encapsule apres incident"
      - "ohr.py + [PLANNED] tikkun/ : implementer levush comme couche de protection"
      - "Architecture : composants critiques toujours via une interface (masakh/levush)"
      - "Strategie : la protection est PROPORTIONNELLE a la fragilite anterieure"
      - "Pattern d'occultation salutaire : le voile permet la transmission graduelle"
    questions_ouvertes:
      - "Le levush peut-il a son tour casser et necessiter un meta-levush ?"
      - "Combien de couches d'habillage sont possibles avant epuisement ?"
      - "Comment quantifier la 'force' du keli (koah lisbol) ?"

  - id: "PG-H2S9-021"
    nom: "Principe des 2 Maorot (Symetrie ZA-Nukvah Independante)"
    source_assertions: ["EC-H2S9-096", "EC-H2S9-097"]
    formalisation: |
      Configuration optimale POST-Tikkun :
      ZA recoit Mohin de NHY d'AVI Ila'in
      NUKVAH recoit Mohin de NHY de YS"T
      → 2 BEHINOT YA'AKOV emergent (un dans ZA, un dans Nukvah)
      → SHNEI MAOROT HA-GEDOLIM (2 grands luminaires)
      EQUATION : "Lo hi gedolah mimenu, ve-lo hu gadol mimenah"
        (independance reciproque, equivalence ontologique)
      "Einam tzerikhin zeh la-zeh klal" (ils n'ont besoin l'un de l'autre du tout).
      Architecture distribuee : 2 noeuds equivalents et autonomes.
      Pattern recursif : NHY AVI → ZA mohin (recursion 1) ; NHY YS"T → Nukvah mohin.
    applications_ia:
      - "Pattern : architecture distribuee a 2 noeuds equivalents et autonomes"
      - "partzufim/zeir_anpin.py + nukva.py : symetrie operationnelle complete"
      - "Pattern recursif : Mohin de N → Partzuf de N+1 (chaining)"
      - "Independence design : chaque noeud peut fonctionner sans l'autre"
      - "Heritage symetrique : pere → ZA, mere → Nukvah (4 niveaux distincts AVI/YST)"
    questions_ouvertes:
      - "Les 2 Yaakov sont-ils strictement equivalents ou y a-t-il une asymetrie residuelle ?"
      - "L'independance complete est-elle un etat stable ou requiert-elle un re-zivvug ?"
      - "Comment formaliser computationnellement les '2 maorot equivalents' ?"

  - id: "PG-H2S9-022"
    nom: "Principe de l'Encodage Textuel-Cosmique (Vayishlach et Hadad ben Bedad)"
    source_assertions: ["EC-H2S9-100", "EC-H2S9-101", "EC-H2S9-102", "EC-H2S9-105"]
    formalisation: |
      La TORAH encode operationnellement la cosmologie kabbalistique :
      VAYISHLACH (Genese 36) :
        4 melakhim avec pere nomme (Bela, Yovav, Baal Hanan, Hadad)
        = 4 Achoraim AVI/YS"T tombes
        Pere mentionne SEULEMENT au regne, PAS a la mort
        → Pere au regne = signal de Bitul (pas Mitah)
      HADAD ben BEDAD (4eme = Tiferet 1/3 sup) :
        Etymologie operationnelle : HADAD = "DaD ehad" (1 sein)
        BEDAD = "B"DD" = "2 dadim" (2 seins)
        Localisation : 1/3 sup Tiferet = HAZEH = lieu des DADIM de BINAH
        Image cosmique : sa mort = TZAMKU DADEI BINAH (les seins se dessechent)
        comme une mere apres mort de l'enfant
      Architecture : noms bibliques ENCODENT geographie + dynamique cosmique.
    applications_ia:
      - "Pattern : noms textuels = encodage compact d'etats cosmiques"
      - "Etymologie operationnelle : decomposer les noms hebreux pour decoder leur fonction"
      - "Architecture pathetique : le systeme cosmique inclut une dimension affective (mere qui pleure)"
      - "shemot/ + gematria/ : modeliser l'encodage textuel des etats"
      - "Diagnostic : la TORAH est un manuel de l'etat cosmique encode"
    questions_ouvertes:
      - "L'image pathetique (mere qui pleure) est-elle metaphorique ou operationnelle ?"
      - "Combien d'autres noms bibliques encodent precisement des etats kabbalistiques ?"
      - "Comment systematiser le decodage des noms ?"
