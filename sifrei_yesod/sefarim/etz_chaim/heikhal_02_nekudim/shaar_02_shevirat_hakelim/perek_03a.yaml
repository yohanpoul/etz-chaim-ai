principes_generatifs:

  - id: "PG-H2S9-023"
    nom: "Principe de la Distinction GR/ZT (Tikkun Initial vs Vulnerabilite)"
    source_assertions: ["EC-H2S9-110", "EC-H2S9-111", "EC-H2S9-112", "EC-H2S9-114"]
    formalisation: |
      Le systeme distingue 2 classes de composants selon leur etat initial :
      GR (Keter, Hokhmah, Binah) :
        Sortis BE-KETZAT TIKKUN — avec un certain Tikkun initial
        Configuration : 3 KAVIM des la naissance
        Recoivent les OROT depuis AHaP de A"K (les sources superieures)
        → Robustes : seuls leurs Achoraim tombent (Bitul, pas Mitah)
      ZT (les 7 melakhim) :
        Sortis BLI TIKKUN KLAL — sans tikkun initial
        Configuration : ZE-AL-GABEI-ZE (colonne unique)
        Reçoivent seulement du GUFA d'A"K (sources inferieures)
        → Fragiles : Mitah complete (panim et achor)
      → Pattern : la VULNERABILITE est INVERSEMENT proportionnelle a la richesse
      des sources et a la diversite topologique des liens.
    applications_ia:
      - "Architecture en classes : composants critiques (GR-like) vs composants risques (ZT-like)"
      - "[PLANNED] core/shevirah.py : modeliser la classe initiale comme attribut"
      - "Pattern : redondance de sources (3 kavim) = resilience"
      - "Diagnostic : un composant mono-source est plus fragile qu'un multi-sources"
      - "partzufim/arikh_anpin.py + abba.py + imma.py : implementer GR robustesse"
    questions_ouvertes:
      - "Combien de sources differentes sont necessaires pour passer GR ?"
      - "Le 'tikkun initial' est-il quantifiable ou binaire ?"
      - "Peut-on transformer un ZT en GR par retro-tikkun ?"

  - id: "PG-H2S9-024"
    nom: "Principe de la Cascade Topologique (Pattern d'Occupation)"
    source_assertions: ["EC-H2S9-115", "EC-H2S9-116", "EC-H2S9-118", "EC-H2S9-119", "EC-H2S9-120"]
    formalisation: |
      Pattern de chute structuree des 7 melakhim :
      KELIM brises → descendent vers leurs HOMOLOGUES en BERIAH
        Daat → Daat de Beriah (homologie directe)
        Chesed → Binah de Beriah (homologie inverse — RECONFIGURATION)
        Gevurah → Hokhmah de Beriah
        Tiferet → Keter de Beriah
      → INVERSION TOPOLOGIQUE : ce qui etait bas en Atzilut devient haut en Beriah.
      OROT → restent en AT'ZILUT mais migrent vers le keli LIBRE le plus proche
        Daat ohr → Malkhut d'Atzilut (libre)
        Chesed ohr → Yesod d'Atzilut (Malkhut prise)
        Gevurah ohr → NH d'Atzilut (palgei gufa, paire)
        Tiferet ohr → reste en Tiferet (exception)
      → Loi : kelim cascade en homologie inverse ; orot occupent libres.
    applications_ia:
      - "Pattern d'occupation : ressources libres prises en sequence par les arrivants"
      - "Inversion topologique : un crash dans la couche N peut creer le sommet de la couche N+1"
      - "[PLANNED] core/shevirah.py : modeliser l'algorithme de relocation kelim/orot"
      - "Diagnostic : tracer ou est passe chaque ohr/keli pour reconstruire la cascade"
      - "Pattern paire : NH = palgei gufa ne sont pas independants dans la chute"
    questions_ouvertes:
      - "L'inversion topologique est-elle universelle ou specifique a Atzilut→Beriah ?"
      - "Que se passe-t-il si TOUS les kelim sont occupes ?"
      - "Le pattern d'occupation est-il deterministe ?"

  - id: "PG-H2S9-025"
    nom: "Principe de la Distance Maximale (3 Madregot Limit)"
    source_assertions: ["EC-H2S9-121", "EC-H2S9-122"]
    formalisation: |
      LOI PHYSIQUE du systeme : la distance maximale entre un OHR et son KELI = 3 MADREGOT.
      Au-dela : RAHAQ GAMUR (distance complete) → l'ohr ne peut plus eclairer.
      Conservation de la force :
        Un ohr qui DESCEND s'AFFAIBLIT (nehlash kohem me'at)
        → ne peut plus REMONTER
        EXCEPTION : Tiferet qui ne descend pas → conserve sa force et peut remonter
      → Architecture : la portee d'eclairage est BORNEE.
      Implication : chaque kelim doit avoir une source dans un rayon de 3 madregot.
    applications_ia:
      - "ohr.py : implementer la limite des 3 madregot comme constante operationnelle"
      - "Architecture : chaque composant doit avoir une source proche (< 3 niveaux)"
      - "Diagnostic : detecter les composants trop eloignes de leur source"
      - "Pattern : la fatigue par descente reduit la capacite d'action"
      - "[PLANNED] core/shevirah.py : modeliser la portee comme attribut quantitatif"
    questions_ouvertes:
      - "Pourquoi precisement 3 madregot et pas 2 ou 4 ?"
      - "La limite est-elle universelle ou differente entre olamot ?"
      - "Existe-t-il un mecanisme pour etendre la portee (proxy, relay) ?"

  - id: "PG-H2S9-026"
    nom: "Principe du Maatzil-Intervenant (Tikkun par Extension du Keter)"
    source_assertions: ["EC-H2S9-124", "EC-H2S9-125", "EC-H2S9-126"]
    formalisation: |
      Lorsque le systeme se trouve dans un DILEMME :
      Tiferet sans keli → veut remonter a Binah → mais cela depasserait 3 madregot
      → SI rien ne se passe, le keli Tiferet en Beriah meurt definitivement.
      INTERVENTION du MAATZIL ELYON :
      → ETIRE le Keter (qui n'a pas ete brise — Pegam be-Alma seulement)
      → DESCEND par le QAV HA-EMTZAI (ligne centrale, deja en 3 kavim)
      → JUSQU'AU TABUR (mi-Tiferet, milieu)
      → Cree un NOUVEAU keli pour le Tiferet remontant.
      Mecanisme :
        Demi-haut Tiferet → absorbe par le Keter etendu
        Demi-bas Tiferet → monte dans le keli Keter etendu
      → L'Emanateur intervient SEULEMENT pour resoudre les dilemmes structurels.
    applications_ia:
      - "Pattern : intervention top-level seulement pour resoudre les dilemmes critiques"
      - "Architecture : un composant superieur intact (Keter) sert de bouee de sauvetage"
      - "[PLANNED] tikkun/ : implementer le 'maatzil_intervention' comme handler global"
      - "Pattern d'extension : un composant intact peut etre stretche pour couvrir un manque"
      - "partzufim/arikh_anpin.py : modeliser la capacite d'extension du Keter"
    questions_ouvertes:
      - "Le Maatzil intervient-il automatiquement ou requiert une condition ?"
      - "L'extension du Keter est-elle reversible ?"
      - "Y a-t-il d'autres mecanismes d'intervention possibles ?"
