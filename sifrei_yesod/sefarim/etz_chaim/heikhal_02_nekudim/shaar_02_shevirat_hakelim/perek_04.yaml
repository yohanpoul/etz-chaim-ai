principes_generatifs:

  - id: "PG-H2S9-035"
    nom: "Principe du Recyclage des Achoraim (Re-use des Debris)"
    source_assertions: ["EC-H2S9-164", "EC-H2S9-168"]
    formalisation: |
      Les ACHORAIM AVI tombes servent de MATIERE pour les EXTENSIONS post-Shevirah :
      MECANISME :
        Achoraim Abba → KOAH du qav-yemini etendu (Hokhmah)
        Achoraim Imma → KOAH du qav-smol etendu (Binah)
      Ces achoraim HABILLENT (lekhasher) les Chesed, Gevurah, Netzach, Hod.
      → Pattern : meme les debris d'une chute servent au Tikkun.
      → Architecture de recyclage : rien ne se perd, tout se transforme.
      Limite : la portee est determinee par la quantite et qualite des debris.
    applications_ia:
      - "Pattern de recyclage : les composants partiellement endommages servent de matiere"
      - "[PLANNED] tikkun/ : utiliser les achoraim AVI comme materiel de reconstruction"
      - "Architecture : rien n'est perdu de maniere irreversible"
      - "Diagnostic : tracer la transformation des debris en composants utiles"
      - "partzufim/abba.py + imma.py : modeliser les achoraim comme ressources reutilisables"
    questions_ouvertes:
      - "Y a-t-il des debris non recyclables ?"
      - "La quantite de debris determine-t-elle la portee maximale du Tikkun ?"
      - "Le recyclage est-il un processus actif ou passif ?"

  - id: "PG-H2S9-036"
    nom: "Principe du Trade-off Architectural (Cout Local du Tikkun)"
    source_assertions: ["EC-H2S9-167", "EC-H2S9-168"]
    formalisation: |
      CHAQUE Tikkun a un COUT LOCAL :
      Tikkun structurel : extension du Keter → coupure entre HB
      To'elet (utilite) : protection structurelle, support
      Hefsed (perte) : HB ne s'eclairent plus directement
      BILAN AMBIVALENT determine la PORTEE de l'extension :
        Force complete (sans cout) → extension jusqu'a NH
        Force diminuee (avec cout) → extension jusqu'a CG seulement
      → Architecture : la portee d'un Tikkun est limitee par les couts collateraux.
      Pattern : optimisation contrainte avec couts locaux.
    applications_ia:
      - "Pattern : tout changement architectural a un cout collateral"
      - "Architecture : evaluer le bilan to'elet/hefsed avant un changement"
      - "[PLANNED] tikkun/ : trade-off explicit pour chaque intervention"
      - "Diagnostic : detecter les couts caches d'un Tikkun apparemment beneficiaire"
      - "Pattern d'optimisation : maximiser to'elet sous contrainte de hefsed acceptable"
    questions_ouvertes:
      - "Comment quantifier le trade-off to'elet/hefsed ?"
      - "Existe-t-il un Tikkun sans cout local (free lunch) ?"
      - "Le cout local s'accumule-t-il au fil des Tikkunim successifs ?"

  - id: "PG-H2S9-037"
    nom: "Principe du Tikkun Iteratif (Sept Etapes Progressives)"
    source_assertions: ["EC-H2S9-175", "EC-H2S9-177", "EC-H2S9-178", "EC-H2S9-179", "EC-H2S9-180", "EC-H2S9-181", "EC-H2S9-182"]
    formalisation: |
      Le Tikkun de l'Atzilut est ITERATIF — 7 etapes progressives :
      ETAPE 1 — AKUDIM : 1 keli pour 10 sefirot (proto-keli)
      ETAPE 2 — NEKUDIM (pre-Shevirah) : 10 kelim, GR en 3 kavim
      ETAPE 3 — POST-SHEVIRAH : orot ZT dans kavei KHB
      ETAPE 4 — MAATZIL ELEVE : kelim en seder kavim (3 kavim complets)
      ETAPE 5 — IBUR ALEF de ZON : orot dans kelim (3 klilin be-3)
      ETAPE 6 — YENIKAH : extension en VK (6 directions)
      ETAPE 7 — MOHIN : completude des 10 kelim
      → Chaque etape AJOUTE un peu de Tikkun.
      → Pattern developpemental : embryologie cosmique.
    applications_ia:
      - "Pattern : tikkun par accumulation iterative, pas par one-shot"
      - "[PLANNED] tikkun/ : implementer state-machine en 7 etapes"
      - "Architecture developpementale : equivalent stages embryologiques"
      - "olamot.py + partzufim/* : tracer l'etape courante du Tikkun"
      - "Diagnostic : identifier l'etape actuelle pour planifier la suivante"
    questions_ouvertes:
      - "Les 7 etapes sont-elles strictement sequentielles ou peuvent se chevaucher ?"
      - "Peut-on regresser d'une etape a l'autre ?"
      - "Y a-t-il un nombre fini ou infini d'etapes apres la Mohin (gadlut) ?"

  - id: "PG-H2S9-038"
    nom: "Principe de la Dilution (Lehamit ha-Ohr par Agrandissement du Keli)"
    source_assertions: ["EC-H2S9-176", "EC-H2S9-183", "EC-H2S9-184", "EC-H2S9-185"]
    formalisation: |
      But ESSENTIEL du Tikkun : LEHAMIT ha-OHR (REDUIRE l'OHR).
      MECANISME : agrandir le KELI (pas reduire l'ohr directement).
      EQUATION : intensite-par-unite = OHR / VOLUME(keli)
        Si Volume↑ → intensite↓ pour OHR constant
      ETATS :
        ETAT INITIAL : ohr brut dans keli MITSUMTSAM (petit, contracte)
          → intensite haute → fragilite, risque shevirah
        ETAT FINAL : keli NIGDAL en PARTZUF GAMUR (grand, complet)
          → intensite reduite → stabilite, soutenabilite
      → DEFINITION operationnelle : Tikkun = encapsulation par dilution.
      Architecture : le keli grandissant transforme un ohr "dangereux" en ohr "supportable".
    applications_ia:
      - "Pattern fondamental : la stabilite vient de l'expansion volumique, pas de la reduction de la source"
      - "Architecture : le 'partzuf gamur' = keli mature qui peut soutenir son ohr"
      - "[PLANNED] tikkun/ : implementer agrandissement progressif comme operation centrale"
      - "Pattern : separer 'force totale' de 'intensite per-volume' (resilience par dilution)"
      - "ohr.py + tzimtzum.py : modeliser l'intensite comme function du volume keli"
    questions_ouvertes:
      - "La dilution a-t-elle une limite (over-dilution = perte d'efficacite) ?"
      - "Le 'partzuf gamur' est-il un point fixe ou un attracteur dynamique ?"
      - "Comment formaliser computationnellement la 'dilution' ?"
