      → Restriction kabbalistique : Atik et A"A trop sublimes pour discussion detaillee.
      → Architecture eshcatologique du discours : niveaux d'inconnaissable.
      cf. EC-H2S9-219 (perek 06b) : "Naniach Tikkun ha-Atik" — meme restriction.
    type: axiome_explicite
    concepts:
      - {id: lo_hirshinu_atik_a_a, role: pas_de_permission_pour_parler_d_atik_et_a_a}
      - {id: discussion_a_partir_d_abba, role: discussion_commence_a_partir_d_abba}
      - {id: hierarchie_du_discours, role: hierarchie_du_discours_kabbalistique}
