# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 2 — Heikhal Nekudim (היכל נקודים)
# Sha'ar: 2 — Sha'ar Shevirat ha-Kelim (שער שבירת הכלים)
# Perek: 7a — MAH/BAN dans chaque sefirah, sequence des kelim brises,
#             sortie Atik et A"A
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §7 — Part A :
#   - Bloc A : Titre — beur melakhim, MAH/BAN, RPaH/ShaCh nitzotzin
#   - Bloc B : Chaque sefirah a MAH+BAN ; pas un nitzotz sans
#   - Bloc C : 9 GR de MAH/BAN + 10eme Malkhut composite
#   - Bloc D : Atzilut sortie de BAN ; 5 partzufim chacun de 10S
#   - Bloc E : BAN Kollel = Malkhut d'A"K ; MAH Hadash = ZA d'A"K
#   - Bloc F : Tous nekudim = melakhim car BAN = Malkhut
#   - Bloc G : Sequence — d'abord kelim, puis orot
#   - Bloc H : Atik — Keter, Hokhmah, Binah survivent ; 7 ZT brisent
#   - Bloc I : Tripartition kelim — Pnim Beriah, Hits Yetzirah, Hits-Hits Asiyah
#   - Bloc J : Sequence A"A et Abba — GR survivent, ZT brisent BYA
#   - Bloc K : Note — pas autorise a parler d'Atik et A"A
#
# Source Sefaria : Sefer_Etz_Chaim.9.7 (premiere partie)
# IDs : EC-H2S9-233 → EC-H2S9-247

