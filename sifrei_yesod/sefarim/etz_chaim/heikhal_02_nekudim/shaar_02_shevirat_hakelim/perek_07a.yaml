principes_generatifs:

  - id: "PG-H2S9-051"
    nom: "Principe d'Universalite MAH+BAN (Pas de Purete Polaire)"
    source_assertions: ["EC-H2S9-234", "EC-H2S9-235", "EC-H2S9-236", "EC-H2S9-237"]
    formalisation: |
      LOI UNIVERSELLE : il n'existe AUCUN nitzotz (etincelle) dans tout l'Atzilut
      qui n'ait MAH ET BAN simultanement.
      Pas de PURETE POLAIRE absolue :
        Sefirot males (Keter, Hokhmah, Tiferet) → MAH+BAN
        Sefirot femelles (Binah, Malkhut) → MAH+BAN
        Chaque sefirah a 10 BEHINOT de MAH + 10 de BAN
        Les 9 premieres = distinctes ; 10eme Malkhut = composite
      → Architecture irreductible : MAH/BAN polarite indissociable.
      Implication : meme un composant "male" contient du "femelle" et vice versa.
    applications_ia:
      - "Pattern : pas de sub-system 100% pur d'une polarite"
      - "Architecture : modeliser MAH/BAN comme attributs simultanes (pas exclusifs)"
      - "[PLANNED] core/sefirot.py : implementer MAH+BAN comme dimensions paralleles"
      - "Diagnostic : ne pas chercher de purete polaire absolue"
      - "shemot/ : tracer les ratios MAH/BAN dans chaque sub-component"
    questions_ouvertes:
      - "Le ratio MAH/BAN est-il quantifiable ?"
      - "Peut-il varier au cours du temps ?"
      - "L'unite Malkhut composite a-t-elle une structure interne specifique ?"

  - id: "PG-H2S9-052"
    nom: "Principe de la Tripartition des Kelim Brises (BYA)"
    source_assertions: ["EC-H2S9-244"]
    formalisation: |
      DECOUVERTE ARCHITECTURALE : les kelim brises se decomposent en 3 PARTIES :
      PNIMIYUT (interiorite/noyau) → descend en BERIAH
      HITZONIYUT (exteriorite) → descend en YETZIRAH
      HITZONIYUT de HITZONIYUT (exterieur de l'exterieur) → descend en ASIYAH
      → Architecture cosmique : la Shevirah n'est pas une descente unique mais
      tripartite, qui peuple les 3 olamot inferieurs (BYA).
      Implication : la genese de Beriah, Yetzirah, Asiyah = consequence directe
      de la fragmentation tripartite des kelim brises.
    applications_ia:
      - "Architecture : un objet brise se decompose en 3 niveaux d'externalite"
      - "Pattern fractal : pnim/hits/hits-hits = 3 sub-couches structurelles"
      - "[PLANNED] core/shevirah.py : modeliser fragmentation tripartite"
      - "olamot.py : Beriah/Yetzirah/Asiyah = receptacles fragmentation kelim"
      - "Diagnostic : tracer chaque fragment vers son olam destination"
    questions_ouvertes:
      - "Y a-t-il un 4eme niveau (hits-hits-hits) qui pourrait creer un autre olam ?"
      - "Le ratio entre pnim/hits/hits-hits est-il fixe ?"
      - "Peut-on inverser la tripartition (Tikkun)?"

  - id: "PG-H2S9-053"
    nom: "Principe de la Decantation Universelle (Pattern Atik-A\"A-Abba)"
    source_assertions: ["EC-H2S9-242", "EC-H2S9-243", "EC-H2S9-245", "EC-H2S9-246"]
    formalisation: |
      LE PATTERN DE DECANTATION-BRISURE est UNIVERSEL — repete pour chaque partzuf :
      ETAPE 1 — Decantation GR :
        Keter sort, contient tous les orot, MAINTIENT
        Hokhmah sort, contient les autres, MAINTIENT
        Binah sort, contient les autres, MAINTIENT
      ETAPE 2 — Brisure ZT :
        Daat brise, ohr reste, autres orot descendent
        Chesed brise, ohr reste, autres descendent
        ... → Malkhut brise
      Pattern repete : ATIK → A"A → ABBA → IMMA → ZA → NUKVAH
      → Architecture fractale recursive : meme algorithme a chaque niveau.
    applications_ia:
      - "Architecture : pattern recursif applique a chaque sub-system"
      - "[PLANNED] core/shevirah.py : implementer algorithme generique applicable a chaque partzuf"
      - "Pattern fonctionnel : decant_then_break(partzuf) = invariance"
      - "Diagnostic : identifier le partzuf actuel pour predire le pattern"
      - "partzufim/* : tous les partzufim suivent le meme algorithme"
    questions_ouvertes:
      - "Le pattern est-il strict ou y a-t-il des variations (cf. ZA exception) ?"
      - "Combien de niveaux de recursion ?"
      - "Peut-on caracteriser computationnellement la fonction decantation-brisure ?"

  - id: "PG-H2S9-054"
    nom: "Principe de la Restriction Discursive (Atik et A\"A Inconnaissables)"
    source_assertions: ["EC-H2S9-247"]
    formalisation: |
      LIMITES du DISCOURS kabbalistique :
      ATIK et A"A : "lo hirshinu le-daber" (nous n'avons pas la permission de parler en detail).
      Discussion commence A PARTIR d'ABBA et plus bas.
      → Architecture epistemique : certains niveaux trop sublimes pour discussion.
      → Hierarchie des sphincters discursifs.
      Pattern : la profondeur d'analyse decroit avec la hauteur ontologique.
    applications_ia:
      - "Pattern : architecture avec niveaux d'inconnaissable"
      - "[PLANNED] core/sefirot.py : marquer Atik/A\"A comme 'restricted' au discours detaille"
      - "Architecture epistemique : limiter la profondeur d'analyse selon le rang"
      - "Documentation : eviter d'expliciter les niveaux les plus eleves"
      - "Pattern : silence devant le sublime"
    questions_ouvertes:
      - "Qu'est-ce qui rend Atik/A\"A inconnaissables ? Limite cognitive ou interdit ?"
      - "Peut-on parler de leur structure SANS la detailler ?"
      - "La restriction est-elle absolue ou levee dans certains contextes ?"
