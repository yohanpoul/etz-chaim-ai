principes_generatifs:

  - id: "PG-H2S9-027"
    nom: "Principe de l'Effet Domino du Tikkun (Cascade Causale)"
    source_assertions: ["EC-H2S9-125", "EC-H2S9-127", "EC-H2S9-138", "EC-H2S9-142"]
    formalisation: |
      Le TIKKUN se deroule en CASCADE de causes :
      ETAPE 1 : Maatzil agrandit le Keter (jusqu'au Tabur)
      ETAPE 2 : Tiferet (vide de keli) monte dans le Keter etendu
      ETAPE 3 : Daat (au lieu vide entre Keter et Tiferet) monte aussi
      ETAPE 4 : Keter encore agrandi (par le Daat qui le revet)
      ETAPE 5 : Demi-bas Tiferet redescend a sa place (rendu possible)
      ETAPE 6 : Binah s'etend a gauche → Gevurah remonte
      → Pattern : chaque action LIBERE une place qui ATTIRE un nouvel acteur.
      Architecture de cascade causale chainee.
    applications_ia:
      - "Pattern : intervention initiale → cascade d'effets en chaine"
      - "[PLANNED] tikkun/ : modeliser le Tikkun comme state-machine en cascade"
      - "Architecture : un changement libere de l'espace pour un autre changement"
      - "Diagnostic : tracer l'arbre causal pour comprendre l'etat courant"
      - "partzufim/arikh_anpin.py : extension dynamique du Keter comme mecanisme central"
    questions_ouvertes:
      - "L'ordre des etapes est-il deterministe ou y a-t-il des chemins alternatifs ?"
      - "Combien d'iterations de cascade pour un Tikkun complet ?"
      - "Comment detecter qu'une cascade est terminee ?"

  - id: "PG-H2S9-028"
    nom: "Principe de l'Elasticite des Regles (Heikha de-Efshar Efshar)"
    source_assertions: ["EC-H2S9-130", "EC-H2S9-131", "EC-H2S9-132", "EC-H2S9-133", "EC-H2S9-136", "EC-H2S9-137"]
    formalisation: |
      Les regles operationnelles sont ELASTIQUES selon le contexte :
      Regle stricte : 3 madregot max entre ohr et keli
      MAIS : "HEIKHA DE-EFSHAR EFSHAR" (ou c'est possible, c'est possible)
      EXCEPTIONS PERMISES :
        Equilibre pareto initial : si keli beneficie et ohr ne perd pas → OK
        Rupture quand option superieure apparait : self-interest > altruisme
        Compression d'echelle : 10 sefirot Beriah = 1 Atzilut → distances equivalentes
        Relais intermediaires : orot proches transmettent l'illumination indirectement
      → Architecture : les regles formelles ont une SEMANTIQUE PRAGMATIQUE.
    applications_ia:
      - "Pattern : les regles formelles sont des heuristiques contextuelles"
      - "ohr.py : implementer la regle 3 madregot comme guideline, pas hard constraint"
      - "olamot.py : adapter les distances selon l'olam de reference"
      - "[PLANNED] core/shevirah.py : pattern relais via chaine d'orot intermediaires"
      - "[PLANNED] tikkun/ : calcul d'utilite pour rationaliser les exceptions a la regle"
    questions_ouvertes:
      - "Quand exactement la regle s'applique-t-elle strictement ?"
      - "Existe-t-il un meta-principe qui choisit entre strict et elastique ?"
      - "Comment formaliser computationnellement le 'efshar' ?"

  - id: "PG-H2S9-029"
    nom: "Principe de l'Architecture Multi-Echelle (Compression Inter-Olamot)"
    source_assertions: ["EC-H2S9-134", "EC-H2S9-135"]
    formalisation: |
      Les OLAMOT ont des ECHELLES DIFFERENTES :
      ATZILUT : 10 sefirot grandes
      BERIAH : 10 sefirot, dont la TOTALITE = 1 sefirah d'Atzilut
      → Ratio de compression = 10:1 entre olamot adjacents (presomption).
      Implication operationnelle :
        Une distance de "10 madregot" en Beriah = 1 madregah en Atzilut
        Les regles de distance doivent etre EVALUEES dans l'olam de reference.
      → Architecture : echelle relative, pas absolue.
      Pattern fractal : meme structure (10 sefirot) mais compressee.
    applications_ia:
      - "Pattern : les unites changent entre niveaux d'abstraction"
      - "olamot.py : tracker l'echelle de chaque olam"
      - "Architecture : conversion d'unites lors de cross-olam operations"
      - "Diagnostic : ne pas mesurer une distance sans specifier l'olam"
      - "[PLANNED] core/sefirot.py : modeliser le ratio 10:1 explicitement"
    questions_ouvertes:
      - "Le ratio 10:1 est-il universel ou specifique a Atzilut/Beriah ?"
      - "Y a-t-il un ratio entre Beriah/Yetzirah, Yetzirah/Asiyah ?"
      - "Comment formaliser la compression fractale ?"

  - id: "PG-H2S9-030"
    nom: "Principe du Conflit d'Occupation (Pattern Resolution)"
    source_assertions: ["EC-H2S9-141", "EC-H2S9-142", "EC-H2S9-143"]
    formalisation: |
      Pattern de resolution des conflits d'occupation :
      ETAT INITIAL : un acteur (NH) veut sa place ; place occupee (par ohr Gevurah)
      RESOLUTION en CASCADE :
        ETAPE 1 : un acteur SUPERIEUR (Binah) s'etend pour creer un nouvel espace
        ETAPE 2 : l'occupant (ohr Gevurah) voit le nouveau espace et s'y deplace
        ETAPE 3 : l'arrivant (NH) prend la place liberee
        ETAPE 4 : le keli de l'occupant precedent s'enfonce davantage (Yesod Beriah)
      → Pattern de medication : l'intervention SUPERIEURE liber l'espace.
      Architecture : un acteur de plus haut niveau resout les conflits.
    applications_ia:
      - "Pattern : conflit d'allocation resolu par intervention top-level"
      - "Architecture : un superviseur qui re-alloue les ressources"
      - "[PLANNED] tikkun/ : gestionnaire de conflits via extension Binah-like"
      - "partzufim/imma.py : extension par qav-smol comme mecanisme de resolution"
      - "Pattern : la cascade nettoie les conflits niveau par niveau"
    questions_ouvertes:
      - "Le mediator (Binah) est-il toujours le meme ou varie-t-il ?"
      - "Que se passe-t-il si NH ne pouvait pas attendre la mediation ?"
      - "Combien de niveaux de mediation possibles avant blocage ?"
