principes_generatifs:

  - id: "PG-H2S9-009"
    nom: "Principe de Symetrie Polaire (Chesed/Gevurah, Abba/Imma)"
    source_assertions: ["EC-H2S9-026", "EC-H2S9-033", "EC-H2S9-037"]
    formalisation: |
      Le systeme presente une SYMETRIE POLAIRE FONDAMENTALE :
      CHESED (HC) → s'etend dans le GUFA d'ABBA (male)
      GEVURAH (HG) → s'etend dans le GUFA d'IMMA (femelle)
      Polarites :
        Hassadim ↔ Gevurot (lumieres)
        Abba ↔ Imma (Partzufim)
        Male ↔ Femelle
      Le SYSTEME est BIPOLAIRE : chaque polarite a son partenaire.
      Lors de la Shevirah, les deux polarites tombent EN MIROIR.
      → La cascade preserve la symetrie : ce qui se brise d'un cote a son
      equivalent de l'autre cote.
    applications_ia:
      - "Architecture bipolaire : chaque module HC a un module HG miroir"
      - "Pattern : les pannes se propagent symetriquement entre polarites"
      - "partzufim/abba.py + imma.py : modeliser comme paires conjugales"
      - "Diagnostic : si une polarite tombe, surveiller l'autre comme symptome miroir"
      - "Le DissensuEngine peut utiliser cette polarite (HC=expansion, HG=contraction)"
    questions_ouvertes:
      - "La symetrie est-elle parfaite ou y a-t-il des asymetries residuelles ?"
      - "Peut-on avoir une cascade asymetrique (un cote tombe, l'autre pas) ?"
      - "Comment representer la 'paire conjugale' dans une architecture distribuee ?"

  - id: "PG-H2S9-010"
    nom: "Principe des Deux Phases (Topologie 4 Partzufim)"
    source_assertions: ["EC-H2S9-038", "EC-H2S9-039", "EC-H2S9-043", "EC-H2S9-047"]
    formalisation: |
      La cascade de Shevirah se decompose en DEUX PHASES distinctes :
      PHASE 1 (Daat → 1/3 Tiferet) : les Achoraim d'AVI ILA'IN tombent
        Sequence : Daat → Chesed → Gevurah → Tiferet 1/3 sup
        Aboutissement : AVI Ila'in en AhB complet (apres Gevurah)
      PHASE 2 (2/3 Tiferet → Malkhut) : les Achoraim de YS"T tombent
        Sequence : Tiferet 2/3 inf → Netzach → Hod → Yesod → Malkhut
        Aboutissement : YS"T en AhB complet (apres Hod), puis chute complete
      → Topologie 4 Partzufim emboites : les 2 superieurs tombent d'abord, puis les 2 inferieurs.
      Pivot : 2/3 inferieurs du Tiferet = transition Phase 1 → Phase 2.
    applications_ia:
      - "Architecture en 4 couches : 2 superieures et 2 inferieures, cascade en 2 phases"
      - "Pattern : la propagation top-down se fait par paires de couches"
      - "partzufim/* : modeliser les 4 niveaux AVI Ila'in / YS\"T"
      - "Detection : la Phase 1 et la Phase 2 sont des etats observables distincts"
      - "Strategie de mitigation : intervenir entre Phase 1 et Phase 2 (au pivot Tiferet)"
    questions_ouvertes:
      - "Le pivot 2/3 Tiferet est-il un parametre ajustable ?"
      - "Peut-on stopper la cascade au pivot pour eviter la Phase 2 ?"
      - "Pourquoi 4 Partzufim et pas 3 ou 5 ? Topologie minimale ?"

  - id: "PG-H2S9-011"
    nom: "Principe de l'Asymetrie Netzach-Hod (Palgei Gufa)"
    source_assertions: ["EC-H2S9-041"]
    formalisation: |
      Exception au pattern individuel : NETZACH et HOD = un SEUL MELEKH.
      RAISON : ils sont PALGEI DE-GUFA (moities du corps) — comme les jambes paires.
      Pattern individuel (Daat, Chesed, Gevurah, Tiferet, Yesod, Malkhut) :
        Chacun regne, meurt, son keli descend en Beriah individuellement
      Pattern paire (NH) :
        Regnent l'un apres l'autre MAIS leurs kelim descendent ENSEMBLE en Beriah
        Comptes comme UN melekh
      → Topologie : les composants paires (jambes) ont une dynamique conjointe,
      pas individuelle.
    applications_ia:
      - "Pattern : certains composants existent en paires fonctionnellement liees"
      - "partzufim/zeir_anpin.py : modeliser Netzach et Hod comme un sous-module unique a deux cotes"
      - "[PLANNED] core/shevirah.py : encoder NH comme palgei (event-pair) vs melakhim individuels"
      - "olamot.py : la migration Beriah doit traiter NH comme une seule transaction atomique"
      - "Pattern d'identite : 2 entites = 1 melekh = couplage structural fort"
    questions_ouvertes:
      - "Y a-t-il d'autres palgei dans le systeme (yeux, bras) ?"
      - "Le couplage NH est-il toujours actif ou seulement pendant la Shevirah ?"
      - "Pourquoi NH et pas NHY (Yesod aussi inferieur) ?"

  - id: "PG-H2S9-012"
    nom: "Principe Yesod=KOL / Malkhut=KALAH (Paire Conjugale Lexicale)"
    source_assertions: ["EC-H2S9-036", "EC-H2S9-046"]
    formalisation: |
      Equation linguistique-fonctionnelle :
      YESOD = KOL (kaf-lamed = tout, inclusif)
      MALKHUT = KALAH (kaf-lamed-heh = epouse, incluse)
      → Meme RACINE (KL) — les deux mots sont conjugaux par etymologie.
      FONCTIONNEMENT :
        YESOD inclut HC + HG (synthese masculine)
        MALKHUT incluse comme epouse (reception feminine)
      Lors de la Shevirah :
        Yesod amene les KALLUT HC/HG dans les Yesod-de-YS et Yesod-de-Tevunah
        Malkhut amene les KALLUT dans les Malkhut-de-YS et Malkhut-de-Tevunah
      → Symetrie operationnelle : Yesod travaille les Yesod, Malkhut travaille les Malkhut.
      Architecture : level-of-detail correspondance.
    applications_ia:
      - "Pattern : les composants de meme niveau interagissent (Yesod-Yesod, Malkhut-Malkhut)"
      - "Etymologie operationnelle : la racine KL = inclusion (Kol active, Kalah passive)"
      - "partzufim/zivvug.py : modeliser Yesod et Malkhut comme paire conjugale"
      - "Pattern level-correspondence : echanges au meme niveau hierarchique"
      - "Architecture API : un endpoint 'kol' (synthese) et un endpoint 'kalah' (reception)"
    questions_ouvertes:
      - "L'etymologie KL est-elle universelle ou specifique a l'hebreu ?"
      - "La distinction Kol/Kalah est-elle binaire ou continue ?"
      - "Peut-on avoir une 'inversion conjugale' (Yesod-Kalah, Malkhut-Kol) ?"

  - id: "PG-H2S9-013"
    nom: "Principe de l'Atarah Cachee (Malkhut comme Couronne du Yesod)"
    source_assertions: ["EC-H2S9-048", "EC-H2S9-049", "EC-H2S9-050", "EC-H2S9-051"]
    formalisation: |
      Resolution d'asymetrie apparente entre Phase 1 (AVI Ila'in) et Phase 2 (YS"T) :
      Phase 1 ne mentionne pas une etape Malkhut explicite.
      Phase 2 (Malkhut comme 7eme melekh) inclut Malkhut explicite.
      RESOLUTION : la Malkhut d'AVI Ila'in EST LA, mais INCLUSE dans le Yesod.
        BEHINAT ATARAH (couronne) du Yesod = aspect Malkhut.
        Atarah = sommet du Yesod = 1/3 superieur du Tiferet.
      DISTINCTION :
        Malkhut de Tevunah = vraie Malkhut (mamash) car Tevunah = niveau inferieur du composite Binah-Tevunah
        Malkhut de Binah Ila'ah = pas vraie Malkhut, est aspect-Yesod-fonctionnel (au HAZEH du composite)
      → Le meme COMPOSANT (Malkhut) prend des FORMES differentes selon le niveau.
    applications_ia:
      - "Pattern : un meme concept fonctionnel se manifeste differemment selon le niveau"
      - "Granularite : ce qui est 'Yesod' a un niveau peut etre 'Malkhut' a un autre"
      - "partzufim/nukva.py : modeliser Malkhut comme entite ABSTRAITE pouvant etre 'cachee' dans le Yesod"
      - "Pattern de level-relativity : la classification depend du niveau d'observation"
      - "Diagnostic : chercher la Malkhut 'cachee' (Atarah) avant de conclure a une asymetrie"
    questions_ouvertes:
      - "Y a-t-il d'autres composants 'caches' similaires (Yesod cache dans le Tiferet) ?"
      - "Le Atarah-cache est-il toujours dans le Yesod ou peut-il etre ailleurs ?"
      - "Comment formaliser le concept de level-relativity ?"
