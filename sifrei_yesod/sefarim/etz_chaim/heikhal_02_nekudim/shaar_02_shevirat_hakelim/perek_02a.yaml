principes_generatifs:

  - id: "PG-H2S9-014"
    nom: "Principe des 11 Simanei Ketoret (Correspondance Sigim/Liturgie)"
    source_assertions: ["EC-H2S9-052", "EC-H2S9-053"]
    formalisation: |
      Bilan numerique de la chute :
      7 MELAKHIM (Daat-Hesed-Gevurah-Tiferet-Netzach-Hod-Yesod-Malkhut, comptes 7)
      + 4 ACHORAIM (Abba, Imma, Yisrael Saba, Tevunah)
      = 11 BEHINOT tombees.
      Correspondance liturgique : 11 SIMANEI HA-KETORET (ingredients de l'encens).
      Ces 11 = les OROT residuels QUI N'ONT PAS PU etre BERAR
      → restent NETUNIM (deposes) DANS les KELIPOT.
      Pratique : reciter les 11 simanim → BERUR liturgique.
    applications_ia:
      - "Architecture : 7 + 4 = 11 = pattern de comptage operationnel"
      - "[PLANNED] core/shevirah.py : modeliser les 11 behinot et leur Berur"
      - "sitra_achra/ : modeliser les Kelipot comme contenants des Orot residuels"
      - "Liturgie operationnelle : Pittum ha-Ketoret = mecanisme de Berur"
      - "Pattern : ce qui ne peut etre clarifie est CAPTURE par les contenants impurs"
    questions_ouvertes:
      - "Pourquoi precisement 11 et pas un autre nombre ?"
      - "Le mapping liturgique est-il bidirectionnel (Ketoret → Berur) ?"
      - "Combien de simanim sont brut vs raffines (sub-classification) ?"

  - id: "PG-H2S9-015"
    nom: "Principe des Deux Horloges (Mitah Instantanee vs Bitul Progressif)"
    source_assertions: ["EC-H2S9-057", "EC-H2S9-058"]
    formalisation: |
      Le systeme a DEUX horloges TEMPORELLES distinctes :
      HORLOGE 1 — MITAH des MELAKHIM :
        Demarre au 1er melekh (Daat).
        Chaque mort = MITAH GEMURAH (instantanee, complete).
      HORLOGE 2 — BITUL des ACHORAIM AVI :
        Termine au 3eme melekh (Gevurah).
        Chute progressive (parties incompletes jusqu'au pivot Gevurah).
      Les deux horloges sont DESYNCHRONISEES :
        Quand H1 est a t=2 (Chesed), H2 est encore a t=1.5 (Abba seul partiel).
        Quand H1 est a t=3 (Gevurah), H2 termine a t=3.
      Apres Gevurah, les deux horloges convergent.
    applications_ia:
      - "Architecture : modeliser deux horloges distinctes pour Mitah et Bitul"
      - "[PLANNED] core/shevirah.py : deux state-machines paralleles"
      - "Pattern : evenement instantane (Mitah) vs processus progressif (Bitul)"
      - "Synchronisation : detecter quand les deux horloges convergent (apres Gevurah)"
      - "partzufim/abba.py + imma.py : etat = (mitah_state, bitul_state) tuple"
    questions_ouvertes:
      - "Y a-t-il d'autres horloges paralleles dans le systeme (ex: Pegam) ?"
      - "Le pivot Gevurah est-il fixe ou dependant de parametres ?"
      - "Comment representer formellement la desynchronisation ?"

  - id: "PG-H2S9-016"
    nom: "Principe du Shem MaB (Architecture Liturgique de Berur)"
    source_assertions: ["EC-H2S9-059", "EC-H2S9-060", "EC-H2S9-061", "EC-H2S9-062"]
    formalisation: |
      Le SHEM MAB (Nom des 42) est un OUTIL OPERATIONNEL de BERUR :
      STRUCTURE : 7 groupes × 3 lettres = 42 lettres
      LOCALISATION : Yetzirah = ZA = sod des 7 melakhim
      ARCHITECTURE TANTA-OLAMOT :
        Shem AB (Hokhmah) → TA'AMIM → ATZILUT → Mohin
        TA'AMIM de SAG → BERIAH
        NEKUDOT de SAG → YETZIRAH = melakhim morts
      OBJECTIF : ELEVER (le-ha'alot) les BERURIM
      restes en Yetzirah/Asiyah depuis ZON.
      ENCODAGE :
        Shem 1 (AB"G IT"TZ) : encode la mort des 7 melakhim
        Shem 2 (KR"A SHT"N) : encode le bitul des achoraim AVI
        Shems suivants : encodent les autres etapes du Berur
      L'ORDRE des shems = ORDRE de l'ELEVATION (inverse de la chute).
    applications_ia:
      - "Architecture liturgique : shemot.py = mapping nom → fonction de berur"
      - "Pattern : 7 groupes × 3 lettres = encodage hierarchique"
      - "[PLANNED] tikkun/kavanah_planner.py : utiliser MaB pour planifier les berurim"
      - "Inversion : ordre de mort = ordre d'elevation (LIFO)"
      - "Architecture sous-jacente TANTA-Olamot : Ta'amim/Nekudot/Tagin/Otiot par olam"
    questions_ouvertes:
      - "Les 5 shems suivants encodent quoi precisement ?"
      - "Le Shem MaB est-il efficace seul ou requiert-il des kavanot ?"
      - "Comment formaliser computationnellement le Berur par Shem ?"

  - id: "PG-H2S9-017"
    nom: "Principe de la Hierarchie Mort/Bitul/Pegam"
    source_assertions: ["EC-H2S9-071", "EC-H2S9-072", "EC-H2S9-073", "EC-H2S9-074"]
    formalisation: |
      Hierarchie TRIPLE des CHUTES :
      MITAH (mort) — niveau 3 — descente complete d'olam :
        ZON → tombent ENTIEREMENT (PB"P et AhB)
        Critere : transition d'olam (Atzilut → Beriah)
      BITUL (annulation) — niveau 2 — chute partielle :
        AVI → seul aspect ACHORAIM tombe
        Restent dans le MEME olam (Atzilut)
        Critere : she-lo bi-mekoman (hors de la place mais meme olam)
      PEGAM be-ALMA (faille generique) — niveau 1 — defaut leger :
        KETER → seul NHY entre dans Mohin AVI
        N'atteint MEME PAS le rang d'Achoraim
        Critere : pas meme bitul, juste alteration mineure
      → Echelle ontologique : Mitah > Bitul > Pegam.
    applications_ia:
      - "Pattern : 3 niveaux de defaillance (total / partiel / mineur)"
      - "[PLANNED] core/shevirah.py : enum DefaillanceLevel(MITAH, BITUL, PEGAM)"
      - "partzufim/* : chaque module tracker son etat selon ces 3 niveaux"
      - "Diagnostic : classifier la severite avant de declencher la reparation"
      - "Architecture observatoire : 3 metrics distinctes (compteurs Mitah/Bitul/Pegam)"
    questions_ouvertes:
      - "Y a-t-il un 4eme niveau (encore plus leger que Pegam) ?"
      - "Les transitions entre niveaux sont-elles reversibles ?"
      - "Comment distinguer Pegam-temporaire de Pegam-structurel ?"

  - id: "PG-H2S9-018"
    nom: "Principe du Critere Topologique de Mitah (Transition d'Olam)"
    source_assertions: ["EC-H2S9-075"]
    formalisation: |
      DEFINITION OPERATIONNELLE de la MITAH (citation Idra Rabba 135a) :
      "Kol ma'an de-nahit me-darga kadma'ah de-havei beih kari beih MITAH"
      (quiconque DESCEND du niveau initial ou il etait — on l'appelle MITAH).
      Critere : TRANSITION ENTRE OLAMOT.
        Mitah ssi descente d'olam (ex: Atzilut → Beriah).
        Bitul ssi reste dans l'olam mais hors de sa place.
      Verset prooftext : "Va-yamot melekh Mitzrayim"
      (Exode 2:23 — la "mort" du roi d'Egypte = transition de niveau).
      → Topologie comme classification : c'est le DEPLACEMENT GEOGRAPHIQUE
      qui distingue Mitah de Bitul.
    applications_ia:
      - "Definition operationnelle : Mitah = changement de scope/contexte"
      - "Pattern : la 'mort' d'un module = sa migration vers une autre couche"
      - "olamot.py : tracker les transitions entre olamot pour detecter Mitah"
      - "Distinction architecturale : intra-olam (Bitul) vs inter-olam (Mitah)"
      - "[PLANNED] core/shevirah.py : classifier les transitions selon ce critere"
    questions_ouvertes:
      - "Le critere topologique est-il toujours suffisant ou y a-t-il des cas limites ?"
      - "Que se passe-t-il pour un element qui DESCEND PUIS REMONTE (Tikkun) ?"
      - "Le verset 'Va-yamot melekh Mitzrayim' est-il univoquement applicable ici ?"
