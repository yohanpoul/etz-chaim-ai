      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Keter Pegam be-Alma (faille leger). Hierarchie ontologique : Mitah > Bitul > Pegam. cf. EC-H2S8 sur NHY-Keter dans Mohin AVI."

  # ─── BLOC G : CRITERE ONTOLOGIQUE DE MITAH (TRANSITION ENTRE OLAMOT) ───

  - id: "EC-H2S9-075"
    source_he: "עוד יש טעם אחר והוא כי אינו נקרא מיתה רק מי שהולך מעולם לעולם ונבדל מעולמו ולכן שבעה מלכים שהיו באצילות וירדו אל הבריאה יקרא מיתה ממש"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      AUTRE TA'AM (raison) — CRITERE ONTOLOGIQUE :
      MITAH n'est appelee MITAH QUE pour CE QUI VA d'OLAM EN OLAM
      et est SEPARE (nivdal) de son OLAM.
      → Donc les 7 MELAKHIM qui etaient en ATZILUT et sont DESCENDUS en BERIAH
      → sont appeles MITAH MAMASH (mort effective).
      cf. EC-H2S9-074 sur la hierarchie Mitah/Bitul/Pegam.
    type: interprétation_lurianique
    concepts:
      - {id: mitah_transition_olamot, role: mitah_transition_entre_olamot}
      - {id: nivdal_me_olamo, role: separe_de_son_olam}
    mapping:
      modules: ["[PLANNED] core/shevirah.py", "olamot.py"]
      tables: ["olamot_config"]
      partzufim: []
      relevance: "Critere ontologique TOPOLOGIQUE de Mitah : transition d'olam."

  - id: "EC-H2S9-076"
    source_he: "כמ\"ש באדרא קל\"ה לא תימא דמיתו אלא כל מאן דנחית מדרגא קדמאה דהוי ביה קרי ביה מיתה כמו שכתוב וימת מלך מצרים"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      PROOFTEXT — IDRA RABBA 135a (citation arameenne) :
      "Lo teima de-mitu, ela kol ma'an de-nahit me-darga kadma'ah
      de-havei beih kari beih MITAH"
      (ne dis pas qu'ils sont morts, mais quiconque DESCEND du niveau initial
      ou il etait — on appelle cela MITAH).
      VERSET BIBLIQUE : "Va-yamot melekh Mitzrayim" (Exode 2:23
      — le roi d'Egypte mourut). cf. EC-H2S9-075 pour le critere.
    type: déduction_scripturaire
    concepts:
      - {id: idra_rabba_135a_definition_mitah, role: definition_mitah_idra_rabba}
      - {id: vayamot_melekh_mitzrayim, role: verset_la_mort_du_roi_d_egypte}
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: "Reference fondatrice : Idra Rabba 135a. Verset Exode 2:23 comme prooftext."

  - id: "EC-H2S9-077"
    source_he: "אמנם אחורי או\"א אע\"פ שנפלו לא ירדו בבריאה אלא נשארו בעולם האצילות עצמו לכן להיותן שלא במקומן יקרא ביטול אבל לא יקרא מיתה"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      MAIS les Achoraim d'AVI — bien que tombes — n'ont PAS descendu en Beriah.
      Ils sont restes dans OLAM HA-AT'ZILUT lui-meme.
      → Donc ils sont SHE-LO BI-MEKOMAN (hors de leur place mais meme olam)
      → BITUL et NON MITAH.
      → Distinction topologique : meme olam = Bitul ; autre olam = Mitah.
      cf. EC-H2S9-073 sur Bitul d'AVI.
    type: interprétation_lurianique
    concepts:
      - {id: shelo_bi_mekoman, role: hors_de_leur_place}
      - {id: bitul_dans_atzilut_meme, role: bitul_reste_dans_atzilut}
    mapping:
      modules: ["[PLANNED] core/shevirah.py", "olamot.py"]
      tables: ["olamot_config", "partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Application : Achoraim AVI = Bitul (meme olam) ; 7 Melakhim = Mitah (Atzilut → Beriah)."


