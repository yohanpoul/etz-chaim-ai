# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 1 : PESHAT-MACHINE
# ═══════════════════════════════════════════════════════════════════

assertions:

  # ─── BLOC A : 11 ASPECTS TOMBES = 11 SIMANEI KETORET ───

  - id: "EC-H2S9-052"
    source_he: "והנה נתבאר מה שנפל מאו\"א גם בחי' היותן נחלקים לד' פרצופים כנ\"ל וגם נתבאר סדר יציאת ז' מלכים ונמצא כי ירדו ז' המלכים שהם זעיר ונוקבא ועוד ד' אחוריים דאו\"א עלאין וישסו\"ת סך הכל הם י\"א בחי' שירדו"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      RECAPITULATION : on a explique ce qui est TOMBE d'AVI,
      l'aspect de leur DIVISION en 4 PARTZUFIM,
      et l'ORDRE de SORTIE des 7 MELAKHIM.
      → BILAN TOTAL : 11 BEHINOT sont tombees :
      7 MELAKHIM (= ZA et NUKVAH = 6 + 1 = 7)
      + 4 ACHORAIM (Abba, Imma, YS, Tevunah).
      → Total : 7 + 4 = 11 aspects descendus.
    type: axiome_explicite
    concepts:
      - {id: yud_alef_behinot, role: onze_aspects_tombes}
      - {id: arba_achoraim_avi_yst, role: quatre_achoraim_d_avi_yst}
    mapping:
      modules: ["[PLANNED] core/shevirah.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Bilan numerique de la chute : 11 aspects total. Decomposition 7+4. cf. EC-H2S9-052 series perek 01."

  - id: "EC-H2S9-053"
    source_he: "ומהם נתברר ומהסיגים שלהם נעשה קליפות והם י\"א סמני הקטורת שהם י\"א אורות שנשארו מאלו הי\"א בחי' כנ\"ל שירדו ולא יכלו אורות אלו להתברר ונשארו נתונים תוך הקליפות כמבואר אצלינו בסוד פטום הקטורת"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      Et de leurs SIGIM (scories) ont ete faites les KELIPOT.
      Ces 11 = les 11 SIMANEI HA-KETORET (les 11 ingredients de l'encens).
      Ce sont les 11 OROT QUI SONT RESTES de ces 11 BEHINOT tombees.
      Ces orot N'ONT PAS PU se BERAR (etre clarifies) →
      sont restes NETUNIM (deposes) DANS les KELIPOT.
      Renvoi a "Sod Pittum ha-Ketoret" (composition de l'encens).
      → 11 simanim de l'encens = correspondance liturgique au mecanisme de Berur.
    type: interprétation_lurianique
    concepts:
      - {id: yud_alef_simanei_ketoret, role: onze_ingredients_de_l_encens}
      - {id: orot_dans_kelipot, role: lumieres_capturees_dans_kelipot}
      - {id: sod_pittum_ketoret, role: secret_de_la_composition_de_l_encens}
      - {id: lo_yakhol_lehitberer, role: ne_peuvent_pas_etre_clarifies}
    mapping:
      modules: ["[PLANNED] core/shevirah.py", "sitra_achra"]
      tables: []
      partzufim: []
      relevance: "Correspondance liturgique : les 11 simanim de l'encens = mecanisme de Berur des Sigim/Kelipot. Pratique kabbalistique."

  # ─── BLOC B : SEQUENCE CHESED → GEVURAH, NUANCE ACHORAIM ABBA ───

  - id: "EC-H2S9-054"
    source_he: "והנה לא ירדו אחוריים דאבא עד שמת המלך הב' שהוא חסד ולא ירדו אחוריים דאמא עד שמת המלך הג' שהוא גבורה באופן כי במות הגבורה אז נשלמו אחורי או\"א לירד"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      ORDRE PRECIS de la chute des Achoraim AVI :
      Achoraim d'ABBA → ne tombent QUE quand le 2eme melekh = CHESED meurt.
      Achoraim d'IMMA → ne tombent QUE quand le 3eme melekh = GEVURAH meurt.
      → Quand GEVURAH meurt → les Achoraim d'AVI sont COMPLETEMENT tombes (NISHLEMU).
      Sequence : Daat (1) → Chesed (2 → tombent Abba) → Gevurah (3 → tombent Imma).
      cf. EC-H2S9-028 et EC-H2S9-033 dans perek 01.
    type: axiome_explicite
    concepts:
      - {id: ordre_chute_achoraim_abba, role: achoraim_abba_a_la_mort_du_chesed}
      - {id: ordre_chute_achoraim_imma, role: achoraim_imma_a_la_mort_du_gevurah}
      - {id: gevurah_complete_chute_avi, role: gevurah_acheve_chute_avi}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "[PLANNED] core/shevirah.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Sequence precise des chutes Achoraim. Confirmation des EC-H2S9-028/033 du perek 01."

  - id: "EC-H2S9-055"
    source_he: "והענין הוא כי אע\"פ שבמיתת החסד ירדו אחורי אבא עם כל זה אין אלו נקראים אחוריים גמורים לפי שעדיין היתה הבינה בבחי' פנים עמו והיתה מאירה באחוריו"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      NUANCE CRITIQUE : quand CHESED meurt → les Achoraim d'ABBA tombent.
      MAIS ces achoraim ne sont PAS APPELES ACHORAIM GEMURIM (achoraim complets).
      RAISON : la BINAH etait ENCORE en aspect PANIM avec lui (Abba)
      et ELLE ECLAIRAIT (me'irah) ses ACHORAIM.
      → Tant qu'Imma a sa face vers Abba → les achoraim d'Abba ne sont pas isoles.
      → Asymetrie temporaire : Imma encore PB"P, Abba deja AhB partiel.
    type: axiome_explicite
    concepts:
      - {id: achoraim_lo_gemurim, role: achoraim_pas_complets}
      - {id: imma_panim_meirah_achor, role: imma_face_eclaire_dos_abba}
      - {id: asymetrie_temporaire_abba_imma, role: asymetrie_temporaire}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Nuance ontologique : achoraim 'partiels' tant que la face d'Imma eclaire encore. cf. EC-H2S9-029 (Achor be-Panim) du perek 01."

  - id: "EC-H2S9-056"
    source_he: "נמצא כי עדיין לא ירדו בעצם כל אחורי אבא רק כשירדו גם אחורי אמא אז ירדו שניהן לגמרי ואז היו אחור באחור כמ\"ש בע\"ה באורך בדרוש פרצופי יעקב ולאה מהיכן יצאו ועי\"ש"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      CONCLUSION : les achoraim d'ABBA ne sont PAS encore tombes BE-ETZEM (essentiellement).
      Seulement quand AUSSI les achoraim d'IMMA tombent →
      les DEUX (achoraim Abba et Imma) tombent LE-GAMRI (entierement).
      → ALORS ils sont VRAIMENT en ACHOR BE-ACHOR (dos contre dos).
      Renvoi : "drush partzufei Yaakov ve-Leah me-heikhan yatz'u" (drush sur l'origine des partzufim Yaakov et Leah).
      → Critere de "AhB authentique" : les DEUX cotes simultanement.
    type: axiome_explicite
    concepts:
      - {id: achoraim_be_etzem, role: achoraim_essentiellement_tombes}
      - {id: ahb_le_gamri, role: ahb_authentique_complet}
      - {id: drush_yaakov_leah, role: drush_origine_yaakov_leah}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Critere de bascule AhB authentique : SIMULTANEITE des chutes Abba+Imma. Renvoi au drush Yaakov-Leah a venir."

  # ─── BLOC C : MORT VS BITUL DES ACHORAIM ───

  - id: "EC-H2S9-057"
    source_he: "נמצא כי אין ירידת אחורי או\"א נקרא ירידה לגמרי עד מות הגבורה שהוא מלך הג' אבל מיתת השבעה מלכים היא מיתה גמורה תכף מן העת הראשונה כי הרי במות החסד נשברו כל בחי' לגמרי ונאמר בו מיתה ממש"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      DISTINCTION TEMPORELLE :
      Pour les ACHORAIM d'AVI → la chute n'est pas LE-GAMRI avant la mort de GEVURAH (3eme).
      Pour les 7 MELAKHIM → la MITAH GEMURAH (mort COMPLETE) est IMMEDIATE, des le 1er.
      Quand CHESED meurt → TOUTES ses behinot sont brisees ENTIEREMENT (le-gamri),
      et il est dit MITAH MAMASH (mort effective).
      → ASYMETRIE : Mitah des melakhim = instantanee ; Bitul des achoraim AVI = progressive.
    type: axiome_explicite
    concepts:
      - {id: mitah_gemurah, role: mort_complete_immediate}
      - {id: mitah_mamash, role: mort_effective}
      - {id: asymetrie_mitah_bitul, role: asymetrie_temporelle_mort_annulation}
    mapping:
      modules: ["[PLANNED] core/shevirah.py"]
      tables: ["partzufim_states"]
      partzufim: []
      relevance: "Distinction critique : Mitah des Melakhim = instantanee. Bitul des Achoraim AVI = progressive (jusqu'a Gevurah)."

  - id: "EC-H2S9-058"
    source_he: "נמצא כי מיתת המלכים מתחלה להקרא מן העת שמת מלך הראשון אבל ביטול האחורים דאו\"א אינו ביטול עד שמת המלך הג'"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      EQUATION DEFINITIONNELLE :
      MITAT HA-MELAKHIM commence des le 1er melekh mort (Daat).
      BITUL HA-ACHORAIM d'AVI N'est PAS bitul avant le 3eme melekh (Gevurah) mort.
      → 2 horloges distinctes :
      Horloge 1 (Mitah) : commence avec Daat
      Horloge 2 (Bitul) : se termine avec Gevurah
      Les deux horloges sont DESYNCHRONISEES.
    type: axiome_explicite
    concepts:
      - {id: mitat_melakhim_horloge, role: horloge_de_la_mitah}
      - {id: bitul_achoraim_horloge, role: horloge_du_bitul}
      - {id: deux_horloges_desync, role: deux_horloges_desynchronisees}
    mapping:
      modules: ["[PLANNED] core/shevirah.py"]
      tables: ["partzufim_states"]
      partzufim: []
      relevance: "Modele a 2 horloges distinctes : Mitah (instant.) vs Bitul (progressif). Architecture temporelle."

  # ─── BLOC D : SHEM MaB EN YETZIRAH = SOD DES MELAKHIM ───

  - id: "EC-H2S9-059"
    source_he: "ובזה תבין סוד שם מ\"ב שהוא אב\"ג ית\"ץ קר\"ע שט\"ן נג\"ד יכ\"ש בט\"ר צת\"ג חק\"ב טנ\"ע יג\"ל פז\"ק שק\"ו צי\"ת"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      SOD du SHEM MAB (Nom des 42) :
      Composition : AB"G IT"TZ — KR"A SHT"N — NG"D YK"SH — BT"R TzT"G —
      HK"B TN"A — YG"L PZ"K — SHK"V TzY"T.
      → 7 mots (3 lettres chacun) = 42 lettres = 7 niveaux.
      → Chaque mot correspond a une Sefirah/un melekh.
      → Ce shem encode le SECRET des melakhim et de leur mort.
      Liturgie : utilise dans Ana be-Khoah, prieres de protection.
    type: interprétation_lurianique
    concepts:
      - {id: shem_mab, role: nom_de_42_lettres}
      - {id: sept_groupes_mab, role: sept_groupes_de_trois_lettres}
      - {id: ana_bekhoah, role: priere_ana_bekhoah}
    mapping:
      modules: ["shemot/", "gematria/engine.py"]
      tables: []
      partzufim: []
      relevance: "Le Shem MaB encode operationnellement les 7 niveaux/melakhim. Utilise en liturgie. cf. shemot/."

  - id: "EC-H2S9-060"
    source_he: "כי כבר ידעת כי שם מ\"ב הוא ביצירה ויצירה הוא בחי' ז\"א כנודע שהוא סוד הז' המלכים נמצא כי שם מ\"ב זה מדבר בסוד המלכים"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      Le SHEM MAB est en YETZIRAH.
      Et YETZIRAH = aspect ZA (Ze'ir Anpin), comme connu.
      ZA = SOD des 7 MELAKHIM (les 6 sefirot + Nukvah).
      → Donc le SHEM MAB parle du SOD des MELAKHIM.
      Equation operationnelle : Shem MaB ≡ Yetzirah ≡ ZA ≡ 7 Melakhim.
    type: axiome_explicite
    concepts:
      - {id: shem_mab_yetzirah, role: shem_mab_en_yetzirah}
      - {id: yetzirah_egal_za, role: yetzirah_egale_za}
      - {id: za_sod_sheva_melakhim, role: za_secret_des_sept_melakhim}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "olamot.py", "shemot/"]
      tables: ["olamot_config"]
      partzufim: ["zeir_anpin"]
      relevance: "Equation : Shem MaB = Yetzirah = ZA = 7 Melakhim. Architecture nominale."

  - id: "EC-H2S9-061"
    source_he: "ואם תסתכל תראה איך שם ע\"ב הוא במוחין והוא נקרא טעמים והוא נקרא אצילות אח\"כ הטעמים של ס\"ג הוא בבריאה והנקודות שלו ביצירה והם סוד מלכים שמתו כי הנקודות הם בחי' זו\"ן שהם יצירה ועשיה"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      DISTRIBUTION des SHEMOT par OLAM :
      Shem AB → MOHIN → appele TA'AMIM → AT'ZILUT
      TA'AMIM de SAG → BERIAH
      NEKUDOT de SAG → YETZIRAH → ce sont les MELAKHIM SHE-METU (qui sont morts).
      Les NEKUDOT = aspect ZON (Zo'an = ZA + Nukvah) = YETZIRAH + ASIYAH.
      Variante (Nusah Aher) : "hu be-behinat ZA she-hu Yetzirah" (c'est dans l'aspect ZA = Yetzirah).
      → Architecture TANTA-Olamot : chaque element TANTA peuple un olam.
    type: interprétation_lurianique
    concepts:
      - {id: shem_av_taamim_atzilut, role: shem_av_taamim_atzilut}
      - {id: taamim_sag_beriah, role: taamim_sag_beriah}
      - {id: nekudot_sag_yetzirah, role: nekudot_sag_yetzirah}
      - {id: nekudot_egal_zon, role: nekudot_aspect_zon}
    mapping:
      modules: ["shemot/", "olamot.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["olamot_config"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture TANTA-Olamot : Ta'amim AB → Atzilut, Ta'amim SaG → Beriah, Nekudot SaG → Yetzirah = melakhim morts. cf. EC-H2S8 (TANTA dans Nekudim)."

  - id: "EC-H2S9-062"
    source_he: "אמנם כוונת מ\"ב זה הוא להעלות כל הברורים משם אשר נשארו מזעיר ונוקבא ביצירה ועשיה כי כל שם מ\"ב הוא להעלות כנודע"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      FONCTION du SHEM MAB :
      Son OBJECTIF (kavanah) = ELEVER (le-ha'alot) TOUS les BERURIM
      qui sont restes de ZA et NUKVAH en YETZIRAH et ASIYAH.
      Tout le Shem MaB sert a "le-ha'alot" (elever) — c'est connu.
      → Architecture liturgique : Shem MaB = clef operationnelle de remontee
      pour les berurim des melakhim morts (cf. EC-H2S9-053).
    type: interprétation_lurianique
    concepts:
      - {id: shem_mab_le_haalot, role: shem_mab_pour_elever}
      - {id: berur_par_shem_mab, role: berur_par_le_shem_mab}
    mapping:
      modules: ["shemot/", "[PLANNED] tikkun/kavanah_planner.py"]
      tables: []
      partzufim: []
      relevance: "Architecture liturgique : Shem MaB = clef operationnelle pour Berur des Sigim."

  - id: "EC-H2S9-069"
    source_he: "אם כן ודאי הוא כי בשם זה נרמז מיתת המלכים ועל סדר מיתתן הוא סדר העלאתן ע\"י בירור בכח שם זה ולכן מיתת שבעה מלכים נרמז בשם הראשון זה וביטול אחוריים דאבא ואמא נרמז בשם הב'"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      ENCODAGE OPERATIONNEL du SHEM MAB :
      Dans ce shem est ENCODE (nirmaz) la MORT des melakhim,
      et l'ORDRE de leur mort = l'ordre de leur ELEVATION par BERUR.
      Mort des 7 melakhim → ENCODE dans le 1er shem (AB"G IT"TZ).
      Bitul des achoraim Abba et Imma → ENCODE dans le 2eme shem (KR"A SHT"N).
      → Inversion temporelle : ordre de mort = ordre d'elevation (LIFO).
    type: interprétation_lurianique
    concepts:
      - {id: encodage_mort_melakhim_shem1, role: shem_1_encode_mort_melakhim}
      - {id: encodage_bitul_achoraim_shem2, role: shem_2_encode_bitul_achoraim}
      - {id: ordre_mort_egal_ordre_elevation, role: lifo_mort_elevation}
    mapping:
      modules: ["shemot/", "[PLANNED] tikkun/kavanah_planner.py"]
      tables: []
      partzufim: []
      relevance: "Encodage hierarchique : chaque shem encode une etape du Berur. LIFO de la cascade."

  # ─── BLOC E : OPINIONS DIVERSES SUR L'ETENDUE DE LA CHUTE ───

  - id: "EC-H2S9-070"
    source_he: "והענין כי מן האדר\"ז נראה שלא ירדו רק הז' מלכים בלבד וממדרשים אחרים בס' הזהר משמע כי גם באו\"א יש ביטול ופגם וכמעט אפי' בכתר"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      DEBAT EXEGETIQUE :
      D'apres l'IDRA ZUTA : seulement les 7 MELAKHIM seuls sont tombes.
      D'apres d'AUTRES MIDRASHIM dans le Sefer ha-Zohar : il y a aussi BITUL et PEGAM
      en AVI, et MEME (presque) dans le KETER.
      → Plage d'opinions : Idra Zuta (minimale) ↔ autres midrashim (maximale).
      → Le ARI propose une RESOLUTION qui concilie les deux.
    type: axiome_explicite
    concepts:
      - {id: opinion_idra_zuta, role: opinion_idra_zuta_seuls_7_melakhim}
      - {id: opinion_midrashim_etendue, role: opinion_etendue_avi_keter}
      - {id: bitul_pegam_keter_quasi, role: bitul_pegam_quasi_dans_keter}
    mapping:
      modules: []
      tables: []
      partzufim: []
      relevance: "Reference exegetique : 2 opinions zohariques opposees. Le ARI doit les concilier."

  # ─── BLOC F : RESOLUTION MORT/BITUL/PEGAM ───

  - id: "EC-H2S9-071"
    source_he: "ואמנם הענין הוא כי ודאי שמכל י' נקודות נפלו מהם בחי' ובכולם היה ביטול"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      RESOLUTION du ARI — niveau 1 :
      VRAIMENT (vadai) : DES 10 NEKUDOT (toutes les 10 sefirot dans Nekudim),
      des BEHINOT (aspects) sont tombees.
      Et dans TOUTES, il y eut BITUL.
      → Validation partielle de l'opinion etendue : oui, les 10 nekudot ont ete affectees.
      Le BITUL est universel mais la NATURE differe.
    type: interprétation_lurianique
    concepts:
      - {id: bitul_universel_10_nekudot, role: bitul_dans_les_10_nekudot}
      - {id: validation_opinion_etendue, role: validation_partielle_opinion_etendue}
    mapping:
      modules: ["[PLANNED] core/shevirah.py"]
      tables: []
      partzufim: []
      relevance: "Bitul est universel (10 nekudot). La distinction est qualitative, pas en presence/absence."

  - id: "EC-H2S9-072"
    source_he: "רק זו\"נ נפלו כולם בין בבחי' היותן אב\"א ובין בבחי' היותן פב\"פ והנה זו נקרא מיתה כי הכל ירד לגמרי"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      RESOLUTION du ARI — niveau 2 (ZON = MITAH) :
      MAIS (rak) ZON (ZA + Nukvah) sont TOUS tombes —
      AUTANT en aspect AhB qu'en aspect PB"P.
      → C'est cela qui est appele MITAH (mort)
      car TOUT (ha-kol) est descendu LE-GAMRI (entierement).
      → Critere de Mitah : descente COMPLETE de toutes les behinot.
    type: interprétation_lurianique
    concepts:
      - {id: zon_mitah_complete, role: zon_chute_complete_egale_mitah}
      - {id: mitah_critere_le_gamri, role: critere_mitah_chute_entiere}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py", "[PLANNED] core/shevirah.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Definition technique de la Mitah : chute complete de tous les aspects. Reservee a ZON."

  - id: "EC-H2S9-073"
    source_he: "אבל אבא ואמא שלא ירד מהם רק בחי' אחוריים יקרא ביטול ולא מיתה"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      RESOLUTION du ARI — niveau 3 (AVI = BITUL) :
      MAIS (aval) Abba et Imma — desquels seul l'aspect ACHORAIM est tombe →
      → c'est appele BITUL et NON MITAH.
      → Critere de Bitul : chute PARTIELLE seulement (achoraim, pas le tout).
      Distinction qualitative : Mitah = total ; Bitul = partiel.
    type: interprétation_lurianique
    concepts:
      - {id: avi_bitul_partiel, role: avi_chute_partielle_egale_bitul}
      - {id: bitul_critere_partiel, role: critere_bitul_chute_partielle}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Bitul = chute partielle (achoraim seuls). AVI ne meurent pas, sont annules partiellement."

  - id: "EC-H2S9-074"
    source_he: "וכתר שלא נפלו ממנו רק בחינת נצח הוד יסוד שלו שנכנסו בסוד מוחין דאבא ואמא כנזכר לעיל אשר אין בחינת זו נכנסה אפי' בערך אחוריים לכן לא נקרא ביטול בכתר רק פגם בעלמא"
    source_ref: "Heikhal 2, Sha'ar 2:2"
    assertion: |
      RESOLUTION du ARI — niveau 4 (KETER = PEGAM be-ALMA) :
      Et le KETER — duquel seuls les NHY (Netzach-Hod-Yesod) sont tombes,
      qui sont entres en sod des MOHIN d'AVI (cf. perek 01).
      Cet aspect n'entre PAS MEME au rang des Achoraim.
      → Donc en Keter ce n'est PAS appele BITUL — seulement PEGAM be-ALMA
      (faille generique / leger defaut).
      → Hierarchie : Mitah > Bitul > Pegam be-Alma.
    type: interprétation_lurianique
    concepts:
      - {id: keter_pegam_be_alma, role: keter_faille_generique}
      - {id: nhy_keter_dans_mohin_avi, role: nhy_keter_entrent_mohin_avi}
      - {id: hierarchie_mitah_bitul_pegam, role: hierarchie_mort_annulation_faille}
    mapping:
