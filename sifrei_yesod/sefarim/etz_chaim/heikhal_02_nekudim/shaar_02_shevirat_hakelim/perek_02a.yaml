# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 2 — Heikhal Nekudim (היכל נקודים)
# Sha'ar: 2 — Sha'ar Shevirat ha-Kelim (שער שבירת הכלים)
# Perek: 2a — 11 simanei ketoret, distinction mort/bitul/pegam,
#             critere ontologique de la Mitah
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §2 — Part A :
#   - Bloc A : Recap chute + 11 aspects = 11 simanei ketoret
#   - Bloc B : Sequence Chesed → Gevurah, distinction achoraim Abba pas gemurim
#   - Bloc C : Mort vs Bitul des achoraim
#   - Bloc D : Shem MaB en Yetzirah = sod des Melakhim
#   - Bloc E : Opinions Idra Zuta vs autres midrashim
#   - Bloc F : Resolution Mort/Bitul/Pegam : ZON=Mitah, AVI=Bitul, Keter=Pegam be-Alma
#   - Bloc G : Critere ontologique de Mitah = transition entre olamot (Idra Rabba 135a)
#
# Source Sefaria : Sefer_Etz_Chaim.9.2 (premiere partie)
# IDs : EC-H2S9-052 → EC-H2S9-075

meta:
  sefer: etz_chaim
  heikhal: 2
  shaar: 2
  shaar_name_he: "שער שבירת הכלים"
  perek: 2
  part: "a"
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
