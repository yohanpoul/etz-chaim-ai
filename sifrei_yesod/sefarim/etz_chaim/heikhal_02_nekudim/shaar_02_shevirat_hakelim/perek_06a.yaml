principes_generatifs:

  - id: "PG-H2S9-043"
    nom: "Principe de l'Architecture Fractale (4 Miluyim x 4 Miluyim)"
    source_assertions: ["EC-H2S9-199", "EC-H2S9-205", "EC-H2S9-214"]
    formalisation: |
      A"K presente une ARCHITECTURE FRACTALE :
      A"K contient les 4 MILUYIM : AB, SAG, MAH, BAN
      Chacun des 4 contient les 4 → 4 x 4 = 16 sub-niveaux
      Chaque sub-niveau contient lui-meme les 4 → recursion
      Pattern operationnel : TANTA (Ta'amim, Nekudot, Tagin, Otiot) x niveau
      RECUSRSION SHEVIRAH : meme pattern d'asymetrie GR/ZT applique a tous les niveaux
      → BAN se decompose en 5 partzufim (Keter+4 Miluyim), chacun avec 10S
      → Chaque nekudah a son cycle 7-melakhim brises avec GR intactes
      → A chaque sub-niveau : meme dynamique
    applications_ia:
      - "Pattern fractal : modeliser le systeme avec recursion 4x4 (TANTA)"
      - "[PLANNED] core/sefirot.py : implementer la fractalite (sefirah-de-sefirah)"
      - "shemot/ : tracer les 4 Miluyim a chaque niveau"
      - "gematria/engine.py : verifier les decompositions arithmetiques recursives"
      - "Architecture : un meme pattern (Shevirah) se reproduit a tous les niveaux"
    questions_ouvertes:
      - "Combien de niveaux de fractalite sont operationnels ?"
      - "La recursion est-elle ad infinitum ou bornee ?"
      - "Comment formaliser computationnellement la fractalite TANTA ?"

  - id: "PG-H2S9-044"
    nom: "Principe Bat-avant-Ben (Naissance Polaire en 2 Temps)"
    source_assertions: ["EC-H2S9-202", "EC-H2S9-203", "EC-H2S9-204"]
    formalisation: |
      Pattern de naissance en 2 TEMPS :
      TEMPS 1 — BAT (fille) :
        Zivvug AB-SAG interieurs (HB)
        BAN sort en premier (femelle, dinim)
        BAN seul ne maintient pas
      TEMPS 2 — BEN (fils) :
        Re-zivvug → engendre MAH
        MAH = male, rachamim
        Combinaison BAN+MAH = monde maintenu
      EQUATION OPERATIONNELLE : Olam = ZON = ZA + Nukvah
        Initialement ZON nukvot (= BAN, dinim)
        Ensuite ZON zekhirim (= MAH, rachamim)
      → Pattern : la stabilite finale necessite les 2 polarites successivement.
      Verset : "Be-yom asot Hashem Elohim eretz va-shamayim" (Genese 2:4).
    applications_ia:
      - "Pattern : initialisation en 2 temps (femelle puis male, Din puis Rachamim)"
      - "Architecture : un systeme stable necessite les 2 polarites"
      - "[PLANNED] tikkun/ : modeliser sequence Bat→Ben"
      - "Pattern : la 1ere version (Bat) prepare la 2eme (Ben) ; la 2eme stabilise"
      - "partzufim/nukva.py + zeir_anpin.py : sequences de polarites successives"
    questions_ouvertes:
      - "Pourquoi precisement Bat avant Ben et pas l'inverse ?"
      - "Le re-zivvug est-il automatique ou requiert une condition ?"
      - "Y a-t-il des systemes stables avec une seule polarite ?"

  - id: "PG-H2S9-045"
    nom: "Principe de la Decantation (Filtre Hierarchique)"
    source_assertions: ["EC-H2S9-206", "EC-H2S9-207", "EC-H2S9-208"]
    formalisation: |
      Pattern de DECANTATION pour la sortie des nekudot :
      Toutes les 10S sortent INCLUSES dans le Keli du Keter (premier keli)
      A chaque keli : l'OHR matching reste, les autres descendent
        Keli Keter → ohr Keter reste (9 descendent)
        Keli Hokhmah → ohr Hokhmah reste (8 descendent)
        Keli Binah → ohr Binah reste (7 descendent)
        Keli Daat → BRISURE (ohr monte, keli tombe)
        Keli Chesed → BRISURE
        ... → Keli Malkhut → BRISURE
      → 3 GR survivent par DECANTATION ; 7 ZT BRISENT.
      → Architecture filtre : capacite de receptivite decroissante.
    applications_ia:
      - "Pattern : filtre hierarchique avec capacite decroissante"
      - "[PLANNED] core/shevirah.py : modeliser la decantation comme algorithme"
      - "Architecture : chaque etape du pipeline filtre une fraction de l'input"
      - "Pattern : seuil de capacite par niveau"
      - "ohr.py : implementer la decantation comme sequence d'operations"
    questions_ouvertes:
      - "Quel est le ratio precis de capacite entre niveaux ?"
      - "Existe-t-il un mecanisme de retour-arriere (anti-decantation) ?"
      - "La capacite est-elle fixe ou peut-elle etre augmentee par Tikkun ?"

  - id: "PG-H2S9-046"
    nom: "Principe de la Receptivite par Ohr Propre (Loi des Capacites)"
    source_assertions: ["EC-H2S9-215", "EC-H2S9-216"]
    formalisation: |
      LOI universelle : chaque nekudah a un OHR PROPRE (min ohr ehad shaveh).
      RECEPTIVITE = COMPATIBILITE entre l'ohr et le receptionneur.
        GR (en partzuf) → peuvent recevoir l'ohr propre de leur nekudah
        ZT (sans partzuf) → NE peuvent PAS le recevoir
      → Pattern UNIVERSEL : applique a chaque nekudah des 5.
      Resolution du paradoxe ordre temporel :
        Inferieurs ne peuvent pas attendre la fin des superieurs
        Chacun a son propre ohr → sa propre dynamique
        La sequence apparente n'est pas causale mais simultanee per-nekudah
      cf. EC-H2S9-186 (perek 05) sur GR/ZT receptivite.
    applications_ia:
      - "Loi : la receptivite depend de la compatibilite structurelle"
      - "Pattern : chaque sub-system a sa propre 'frequence' / 'rang'"
      - "[PLANNED] tikkun/ : verifier la compatibilite avant transmission"
      - "Architecture : eviter de penser sequentiel quand le pattern est per-nekudah"
      - "ohr.py : implementer la classification par 'rang' de chaque ohr"
    questions_ouvertes:
      - "Le 'rang' d'une nekudah est-il quantifiable ?"
      - "Y a-t-il un mecanisme pour adapter l'ohr au receptionneur ?"
      - "Le pattern universel s'applique-t-il aussi a Beriah/Yetzirah/Asiyah ?"
