# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 2 — Heikhal Nekudim (היכל נקודים)
# Sha'ar: 2 — Sha'ar Shevirat ha-Kelim (שער שבירת הכלים)
# Perek: 6a — Structure AB SAG MAH BAN dans A"K, Bat avant Ben,
#             5 nekudot de BAN et leur shevirah
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §6 — Part A :
#   - Bloc A : AK kollel AB SAG MAH BAN
#   - Bloc B : Localisations (AB=Mohin, SAG=Tabur, MAH/BAN=ZON)
#   - Bloc C : Cheveux/dikna (AB/SAG branches)
#   - Bloc D : Zivvug AB+SAG → naissance BAN (femelle, dinim)
#   - Bloc E : BAN sort de l'oeil, ne tient pas
#   - Bloc F : Olam = ZON ; d'abord nukvot BAN puis zekhirim MAH
#   - Bloc G : BAN decompose en 5 nekudot/partzufim, chacune en 10S
#   - Bloc H : Nekudah 1 (Keter de BAN) — descente Keter/Hokhmah/Binah, shevirah Daat-Malkhut
#   - Bloc I : Nekudah 2 (Hokhmah de BAN) — meme pattern
#   - Bloc J : Nekudah 3 (Binah de BAN) — meme pattern
#   - Bloc K : Nekudot 4-5 (ZON de BAN) — incomplete decomposition
#   - Bloc L : Distinction G' premieres / B' dernieres
#   - Bloc M : GR melakhim individuellement non sortis (restees dans Binah)
#   - Bloc N : Question pourquoi inferieurs sortent apres brisure des superieurs
#
# Source Sefaria : Sefer_Etz_Chaim.9.6 (premiere partie)
# IDs : EC-H2S9-199 → EC-H2S9-216

meta:
  sefer: etz_chaim
