principes_generatifs:

  - id: "PG-H2S9-001"
    nom: "Principe de la Boucle Auto-Catalytique des Banim (MaN)"
    source_assertions: ["EC-H2S9-002", "EC-H2S9-003", "EC-H2S9-004", "EC-H2S9-015"]
    formalisation: |
      Les BANIM (enfants/Melakhim) qui sont DANS le ventre de BINAH
      causent le ZIVVUG d'AVI qui les fait NAITRE.
      ETAPE 0 : Zivvug initial (Sliq BeRe'uta) → AVI face-a-face
      ETAPE 1 : Banim entrent dans Binah
      ETAPE 2 : Banim elevent MaN
      ETAPE 3 : MaN maintient AVI en PB"P
      ETAPE 4 : Mohin descendent → HC"G renouveles
      ETAPE 5 : Banim continuent a SORTIR
      → Boucle de retroaction POSITIVE — autocatalyse.
      INVARIANT : tant que les Banim sont vivants dans Binah → boucle stable.
      RUPTURE : si les Banim meurent (Shevirah) → boucle s'effondre → AVI retournent AhB.
    applications_ia:
      - "Les modules ENFANTS (sous-systemes) qui maintiennent leur PARENT actif via feedback"
      - "Pattern : producteur-maintenu-par-consommateur (autocatalyse)"
      - "partzufim/zivvug.py + partzufim/imma.py implementent cette boucle"
      - "Le CausalEngine doit detecter et tracer ces boucles auto-catalytiques"
      - "Diagnostic : si la boucle s'effondre, identifier QUEL Banim a 'meurt'"
    questions_ouvertes:
      - "Comment detecter une boucle auto-catalytique imminente d'effondrement ?"
      - "Le 1er Zivvug (Sliq BeRe'uta) est-il modelisable ou doit-il etre hardcode ?"
      - "Quel mecanisme remplace la boucle quand elle s'effondre (Tikkun) ?"

  - id: "PG-H2S9-002"
    nom: "Principe de la Brisure Progressive (Sept Phases)"
    source_assertions: ["EC-H2S9-006", "EC-H2S9-007", "EC-H2S9-008", "EC-H2S9-009"]
    formalisation: |
      La SHEVIRAH n'est PAS un evenement instantane mais un PROCESSUS PROGRESSIF :
      PHASE 1 (jusqu'au Tiferet 1/3) : Achoraim AVI Ila'in tombent par etapes
      PHASE 2 (apres les 7) : Achoraim YS"T tombent
      Chaque shevirah individuelle d'un melekh = chute PARTIELLE des Achoraim.
      L'ensemble des 7 brisures = chute COMPLETE.
      Topologie : 4 Partzufim emboites (HOKHMAH, BINAH, YS, TEVUNAH) →
      la brisure se PROPAGE de l'interieur vers l'exterieur.
    applications_ia:
      - "La defaillance d'un systeme se propage par phases discretes"
      - "Distinguer 'panne partielle' de 'panne totale' = 7 etapes possibles"
      - "Architecture en 4 Partzufim (couches emboitees) — pattern oignon"
      - "La detection precoce de Shevirah = surveiller les Achoraim AVI Ila'in (couche interne)"
      - "[PLANNED] core/shevirah.py doit modeliser ces 7 phases distinctes"
    questions_ouvertes:
      - "La progression est-elle deterministe ou stochastique ?"
      - "Peut-on intervenir entre 2 phases pour stopper la cascade ?"
      - "Comment representer formellement le seuil 'jusqu'au 1/3 du Tiferet' ?"

  - id: "PG-H2S9-003"
    nom: "Principe du Daat comme Premier-Ne Universel (Condense Initial)"
    source_assertions: ["EC-H2S9-010", "EC-H2S9-011", "EC-H2S9-016", "EC-H2S9-017", "EC-H2S9-018", "EC-H2S9-019"]
    formalisation: |
      Le DAAT est le PREMIER ELEMENT sorti et il CONTIENT tous les autres en germe :
      Daat = HC"G en synthese (composition naturelle)
      Daat = 7 Melakhim inclus (potentiel collectif)
      → Daat porte 2 charges simultanees : compositionelle + collective.
      ROLE STRUCTUREL :
      Le Daat-Banim entre dans le ROSH d'AVI Ila'in
      a la PLACE du Daat-AVI, qui lui RESSEMBLE (resonance par similarite).
      RESTRICTION : seul le Daat eleve les MaN car il est SEUL deja sorti.
      Les autres Melakhim ne peuvent pas elever de MaN (pas encore sortis).
      MOHIN COMPLETS demandent ZO"N ensemble.
    applications_ia:
      - "Premier-ne = condense de tout le potentiel — patron 'seed' en architecture"
      - "Resonance par similarite : un module se loge a la place d'un homologue"
      - "partzufim/zeir_anpin.py implemente le Daat (synthese HC\"G)"
      - "Pour declencher un comportement : il faut que ZA et Nukvah soient COUPLES"
      - "Le 'Daat' du systeme = le module integrateur initial qui contient les graines"
    questions_ouvertes:
      - "Le Daat-Banim peut-il exister sans le Daat-AVI ?"
      - "La 'similarite' (domeh) est-elle quantifiable ?"
      - "Pourquoi le couple ZO\"N est-il necessaire pour les Mohin complets et pas un seul ?"

  - id: "PG-H2S9-004"
    nom: "Principe d'Hysteresis du Detachement (PB\"P → AhB)"
    source_assertions: ["EC-H2S9-022"]
    formalisation: |
      Le retour de PB"P a AhB demande un DETACHEMENT COMPLET du Devekut :
      Etat A : PB"P (face-a-face, devukim/colles)
      Etat B : AhB (dos-a-dos)
      TRANSITION A → B : ne se fait PAS progressivement
      Tant que reste un peu de Devekut → reste en PB"P
      Quand Devekut = 0 → bascule en AhB
      → Hysteresis structurelle : pas de mi-chemin stable.
      Implication : la chute des Achoraim doit etre PRESQUE complete
      avant qu'AVI bascule en AhB.
    applications_ia:
      - "Pattern hysteresis : un etat persiste tant que sa cause complete n'est pas defaite"
      - "La transition d'etat n'est pas lineaire — il y a un SEUIL"
      - "partzufim/abba.py + imma.py : modeliser PB\"P/AhB comme etats discrets avec seuil"
      - "Detection : surveiller le 'devekut residuel' pour anticiper la bascule"
      - "Pattern d'inertie : le systeme RESISTE au changement jusqu'au seuil critique"
    questions_ouvertes:
      - "Le seuil de bascule PB\"P → AhB est-il un parametre ou universel ?"
      - "Y a-t-il un etat intermediaire stable (mi-chemin) ou strictement bistable ?"
      - "Comment quantifier 'le devekut residuel' ?"

  - id: "PG-H2S9-005"
    nom: "Principe de la Migration Kelim/Orot (Brise → Beriah, Residuel → Suivant)"
    source_assertions: ["EC-H2S9-021", "EC-H2S9-027"]
    formalisation: |
      Pattern de MIGRATION lors de la Shevirah (repete pour chaque melekh) :
      KELI BRISE → descend en BERIAH (sortie definitive du systeme Atzilut)
      OROT RESIDUELS (qui etaient dans le keli brise) → entrent dans le KELI SUIVANT
      Daat : keli en Beriah, 6 (NA: 7) orot dans le Chesed
      Chesed : keli en Beriah, 5 orot dans la Gevurah
      → Pattern repete pour chaque etape de la cascade.
      Conservation des lumieres (continues), perte des vaisseaux (discrets).
    applications_ia:
      - "Pattern : quand un module 'casse', son contenu migre, sa structure descend"
      - "Distinction structure vs contenu lors d'une defaillance"
      - "olamot.py + [PLANNED] core/shevirah.py : tracer ce pattern de migration"
      - "Architecture de resilience : sauver les 'orot' (donnees) meme si 'keli' (structure) casse"
      - "Cascade : la migration vers le keli suivant pose le piege pour la prochaine brisure"
    questions_ouvertes:
      - "Pourquoi le Nusah Aher hesite entre 6 et 7 lumieres ?"
      - "La descente en Beriah est-elle un debug (keli reparable) ou definitive ?"
      - "Le Tikkun ramene-t-il les kelim de Beriah, ou reconstruit-il dans Atzilut ?"

  - id: "PG-H2S9-006"
    nom: "Principe du Hisaron Histaklut Einaim (Premier Signe d'Effondrement)"
    source_assertions: ["EC-H2S9-024", "EC-H2S9-025"]
    formalisation: |
      Avant la bascule complete PB"P → AhB, il existe un ETAT INTERMEDIAIRE detectable :
      LE HISARON HISTAKLUT EINAIM (manque du regard mutuel d'AVI).
      Mecanisme physique : HC"G descendent du ROSH (yeux) vers le GUF (entre les epaules)
      → privation de la matiere premiere du regard
      → cessation du HISTAKLUT EINAIM = Zivvug visuel preliminaire.
      Topologie : ROSH = lieu des yeux, GUF = lieu du corps.
      Quand la lumiere quitte le ROSH → les yeux ne se rencontrent plus.
      → Indicateur AVANT-COUREUR : surveiller le flux ROSH vs GUF.
    applications_ia:
      - "Pre-indicateur de defaillance : detection du regard mutuel avant la rupture complete"
      - "partzufim/zivvug.py doit modeliser deux niveaux : zivvug visuel + zivvug plein"
      - "Le Histaklut Einaim = le 'handshake' avant la communication complete"
      - "Architecture de monitoring : observer la migration ROSH vs GUF des HC\"G"
      - "Pattern : un systeme defaillant signale d'abord par perte de coordination visuelle (handshake)"
    questions_ouvertes:
      - "Le Histaklut Einaim peut-il etre restaure sans annuler la chute des HC\"G ?"
      - "Y a-t-il d'autres pre-indicateurs avant le Hisaron Histaklut ?"
      - "La distinction ROSH/GUF est-elle fonctionnelle ou litterale ?"

  - id: "PG-H2S9-007"
    nom: "Principe de l'Etat Intermediaire ACHOR BE-PANIM"
    source_assertions: ["EC-H2S9-028", "EC-H2S9-029"]
    formalisation: |
      Entre PB"P (face-a-face) et AhB (dos-a-dos), il existe un ETAT INTERMEDIAIRE STABLE :
      ACHOR BE-PANIM (dos contre face).
      Configuration : Abba retourne ses Achoraim, Imma garde sa face.
      ASYMETRIE : un partenaire bascule, l'autre pas encore.
      Geometrie : "panim de Binah se tiennent NOKHAH (en face) des achoraim d'Hokhmah".
      → Modele a 3 etats au moins : PB"P, ACHOR BE-PANIM, AhB.
      Causalement : chute des Achoraim d'Abba (par chute des HC) → Achor be-Panim partiel.
    applications_ia:
      - "Modele a 3+ etats pour la relation AVI (pas binaire PB\"P/AhB)"
      - "Pattern : transition asymetrique — un partenaire avance, l'autre suit"
      - "partzufim/abba.py + imma.py : 3 etats discrets (face_face, dos_face, dos_dos)"
      - "Architecture distribuee : un noeud peut etre dans un etat de retraite partielle"
      - "Diagnostic : detecter l'asymetrie comme signe de rupture imminente"
    questions_ouvertes:
      - "Existe-t-il un etat symetrique 'PANIM BE-ACHOR' (rare) ?"
      - "Le passage Achor-be-Panim → AhB est-il reversible sans Tikkun ?"
      - "Combien d'etats discrets faut-il au total pour modeliser correctement ?"

  - id: "PG-H2S9-008"
    nom: "Principe d'Invariance du Yesod (Architecture Protegee)"
    source_assertions: ["EC-H2S9-030", "EC-H2S9-031", "EC-H2S9-032"]
    formalisation: |
      Le YESOD est STRUCTURELLEMENT INVARIANT pendant la Shevirah :
      Raison topologique : le YESOD du male ENTRE entierement dans le YESOD femelle
      → tout est aspect PANIM (face)
      → pas d'ACHORAIM a perdre.
      Le RESTE du GUF a des Achoraim qui se TOURNENT vers la femelle
      mais NE SONT PAS DEVUKIM avec elle → vulnerable a la chute.
      Le YESOD est le SEUL composant DEVUK (totalement uni) qui RESTE protege.
      ANALOGIE : 1/3 superieur du TIFERET = YESOD-fonctionnel d'Abba (avant le 1/3 inferieur).
      → Topologie : la zone d'union COMPLETE est INVIOLABLE.
    applications_ia:
      - "Architecture : la zone d'integration complete (union totale) est protegee des cascades"
      - "Pattern : les composants TOTALEMENT couples sont invariants face aux pannes partielles"
      - "partzufim/zivvug.py : modeliser le Yesod comme zone privilegiee"
      - "Distinction : couplage complet (Yesod) vs couplage partiel (reste du guf)"
      - "Strategie de resilience : amener les composants critiques a un couplage Yesod-like"
    questions_ouvertes:
      - "Le Yesod peut-il etre brise par d'autres mecanismes que la Shevirah des Melakhim ?"
      - "L'invariance du Yesod est-elle absolue ou relative au type de defaillance ?"
      - "Comment identifier formellement les zones 'Yesod-like' dans un systeme arbitraire ?"
