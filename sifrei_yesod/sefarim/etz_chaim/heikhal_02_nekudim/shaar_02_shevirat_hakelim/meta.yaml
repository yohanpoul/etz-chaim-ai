shaar_name_he: "שער שבירת הכלים"
shaar_name_fr: "Porte de la Brisure des Vaisseaux"
nombre_perakim: 8
sefaria_gate: 9
sujet_principal: "La SHEVIRAT HA-KELIM (brisure des vaisseaux) — mecanisme detaille de la chute des 7 Melakhim (rois d'Edom). Comment la mort progressive de chaque Roi cause la descente graduelle des Achoraim d'AV'I puis YS'T. Sequence : Daat → Chesed → Gevurah → Tiferet (1/3 superieur) → Netzach → Hod → Yesod → Malkhut. Le passage AV'I de PbP a AhbAh. Le premier Zivvug Sliq BeRe'uta (sans Mohin prealables). Les 4 Partzufim de Hokhmah-Binah (Abba+Imma+YS+Tevunah) et leurs degres de dependance au Ma'N des Banim. Yesod = tout panim (pas d'achoraim). Malkhut = Kalah comme Yesod = Kol."
concepts_cles: [shevirat_hakelim, sheva_melakhim, av_i_panim_bepanim, achor_beachor, daat_melekh_rishon, sliq_bereuta, av_i_ilain, yisrael_saba_tevunah, yesod_kulo_panim, malkhut_kalah, hastakalut_einaim, hibaruth, aretz_edom]
note: "Sha'ar 02 filesystem = sha'ar 2 original = Sefaria gate 9. Second sha'ar du Heikhal Nekudim. Suit directement Drushei Nekudot."
