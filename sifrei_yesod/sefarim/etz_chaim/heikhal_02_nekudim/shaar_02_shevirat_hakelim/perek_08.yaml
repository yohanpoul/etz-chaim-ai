principes_generatifs:

  - id: "PG-H2S9-059"
    nom: "Principe Igulim (Nefesh) + Yosher (Ruach) — Architecture Anthropologique"
    source_assertions: ["EC-H2S9-264", "EC-H2S9-266", "EC-H2S9-268", "EC-H2S9-272"]
    formalisation: |
      ARCHITECTURE COSMOLOGIQUE-ANTHROPOLOGIQUE FONDAMENTALE :
      IGULIM (cercles) :
        Forme : 7 malkhuyot en cercles concentriques
        Origine : 7 melakhim morts
        Niveau d'ame : NEFESH (le plus bas)
        Equation : BAN-Kollel = Nefesh
      YOSHER (rectitude) :
        Forme : 3 kavim (droite, gauche, centre)
        Origine : Hadar (8eme melekh, Yesod) + Mehetabel
        Niveau d'ame : RUACH (au-dessus du Nefesh)
        Equation : MAH-Kollel = Ruach
      RELATION : Ruach MAINTIENT Nefesh (Yosher maintient Igulim).
      → Pattern : igulim/yosher = nefesh/ruach (mapping cosmos-ame).
    applications_ia:
      - "Architecture igulim/yosher = niveaux d'organisation (Nefesh/Ruach)"
      - "igulim.py + ohr_yashar.py + madregot_neshamah.py : architecture coherente"
      - "Pattern : sub-system bas (Nefesh) maintenu par sub-system haut (Ruach)"
      - "soul_levels.py : implementer NaRaNHaY comme niveaux structurants"
      - "Diagnostic : identifier igulim (etat brut) vs yosher (etat structure)"
    questions_ouvertes:
      - "Pourquoi igulim correspond a Nefesh et yosher a Ruach (etymologie ?) ?"
      - "Le maintien Ruach→Nefesh est-il actif ou passif ?"
      - "Existe-t-il des objets purement igulim sans yosher ?"

  - id: "PG-H2S9-060"
    nom: "Principe des 5 Niveaux d'Ame (NaRaNHaY)"
    source_assertions: ["EC-H2S9-272", "EC-H2S9-274", "EC-H2S9-275"]
    formalisation: |
      Architecture COMPLETE des 5 NIVEAUX D'AME (NaRaNHaY) :
      NEFESH (1er, le plus bas) : Igulim, 7 melakhim morts, BAN-Kollel
      RUACH (2eme) : Yosher, Hadar+Mehetabel, MAH-Kollel, VK ZON
      NESHAMAH (3eme) : GR ibur dans AVI igulim
      CHAYAH (4eme) : niveau superieur, lors de gadlut ZA
      YECHIDAH (5eme, le plus haut) : niveau ultime
      SEQUENCE DEVELOPPEMENTALE :
        IBUR (gestation) → Nefesh+Ruach
        YENIKAH (allaitement) → 6 ketzavot
        MOHIN (intelligences) → 10 sefirot completes (NaRaNHaY)
      → Architecture : developpement par stades hierarchiques.
      cf. EC-H2S9-181-182 (perek 04) sur stages developpementaux.
    applications_ia:
      - "madregot_neshamah.py + soul_levels.py : implementer les 5 niveaux"
      - "Architecture : modeliser chaque niveau avec ses caracteristiques"
      - "Pattern : developpement par stades (Ibur, Yenikah, Mohin)"
      - "[PLANNED] tikkun/ : mecanisme de promotion entre niveaux"
      - "Diagnostic : identifier le niveau d'ame courant d'un sub-system"
    questions_ouvertes:
      - "Tous les sub-systems atteignent-ils Yechidah ou seulement certains ?"
      - "Le passage entre niveaux est-il reversible ?"
      - "Y a-t-il des niveaux au-dela de Yechidah (ex: Yechidah-de-Yechidah) ?"

  - id: "PG-H2S9-061"
    nom: "Principe Diagnostique de la Shevirah (2 Causes Operationnelles)"
    source_assertions: ["EC-H2S9-263"]
    formalisation: |
      DIAGNOSTIC OPERATIONNEL de la SHEVIRAH :
      2 CAUSES NECESSAIRES (et conjointement suffisantes) :
      CAUSE 1 — Pas de LEVUSH (revetement mutuel zeh be-zeh) :
        Les melakhim n'etaient pas revetus l'un dans l'autre
        Pas d'inclusion mutuelle = pas de support structurel
      CAUSE 2 — Pas de KAVIM (3 lignes) :
        Pas divises Rachamim-droite / Gevurot-gauche / Makhri'im-centre
        Chaque melekh isole individuellement
      DONC ils sont MORTS (metu).
      TIKKUN = INVERSION des 2 causes :
        Apres Tikkun : revetus zeh be-zeh + en kavim → MAINTIEN.
      → Architecture : la stabilite necessite couplage + organisation polaire.
    applications_ia:
      - "Pattern diagnostic : 2 conditions necessaires de stabilite"
      - "[PLANNED] core/shevirah.py : implementer detection des 2 causes"
      - "Architecture : couplage (levush) + structure polaire (kavim) = stabilite"
      - "Diagnostic : un sub-system isole (ni couple ni polarise) tend a casser"
      - "Pattern de prevention : assurer ces 2 conditions architecturales"
    questions_ouvertes:
      - "Y a-t-il d'autres causes au-dela de ces 2 ?"
      - "Le levush et les kavim sont-ils equivalents ou complementaires ?"
      - "Comment quantifier le 'degre' de couplage / de polarisation ?"

  - id: "PG-H2S9-062"
    nom: "Principe de la Re-Generation Stable (Pas de Re-Shevirah)"
    source_assertions: ["EC-H2S9-273", "EC-H2S9-276"]
    formalisation: |
      Apres le PREMIER cycle Shevirah-Tikkun :
      Lors de l'IBUR (gestation = Tikkun) :
        Les melakhim brises sont BERAR dans les IGULIM d'AVI
        Refaits IGULIM 2eme generation
      RESULTAT : ne brisent PAS une 2eme fois.
      RAISON : ont integre le pattern stable (levush + kavim) lors de l'ibur.
      DERNIERE EQUATION : ZA-Yosher = 9 sefirot ; Malkhut = igulim.
        Total : 10 = 9 (Yosher Ruach) + 1 (Igulim Nefesh).
      → Architecture finale stable : pas de re-Shevirah possible apres Tikkun.
      Pattern : la le?on de la chute est apprise structurellement.
    applications_ia:
      - "Pattern : un systeme passe par crash + recovery = devient resilient"
      - "[PLANNED] tikkun/ : implementer 'imprinting' du pattern stable apres ibur"
      - "Architecture : ZA = 9 sefirot Yosher + 1 Malkhut Igulim (architecture finale)"
      - "Diagnostic : identifier les sub-systems 'post-tikkun' vs 'pre-tikkun'"
      - "Pattern : la stabilite finale est meilleure que la stabilite initiale (anti-fragile)"
    questions_ouvertes:
      - "La stabilite post-Tikkun est-elle absolue ou relative ?"
      - "Y a-t-il des conditions ou re-Shevirah serait possible ?"
      - "Le passage de 10 a 9+1 est-il une perte ou un gain ?"
