principes_generatifs:

  - id: "PG-H2S9-055"
    nom: "Principe de la Distribution MAH+BAN dans les 4 Partzufim ZON"
    source_assertions: ["EC-H2S9-252", "EC-H2S9-253"]
    formalisation: |
      Architecture FINALE post-Tikkun pour ZON :
      4 PARTZUFIM ZON identifies :
      RACHEL ELYONAH (= LEAH) : MAH+BAN
      YAAKOV : MAH+BAN
      RACHEL TATAH (du HAZEH en bas) : MAH+BAN
      ZA principal (Yaakov peut etre identique ou distinct) : MAH+BAN
      → Pattern : multiplication des partzufim ZON post-Tikkun.
      → Pre-Tikkun : 1 ZA + 1 Nukvah ; Post-Tikkun : 4+ partzufim.
    applications_ia:
      - "Architecture distribuee post-Tikkun : 4+ sub-systems ZON differentiates"
      - "[PLANNED] partzufim/leah.py + rachel_tatah.py + yaakov.py : implementer les 4 partzufim"
      - "Pattern de speciation : un partzuf-souche → plusieurs partzufim differencies"
      - "Architecture : MAH+BAN en chaque sub-partzuf preserve la dualite"
      - "Diagnostic : identifier dans quel sub-partzuf se trouve un nitzotz"
    questions_ouvertes:
      - "Yaakov est-il un sub-partzuf distinct de ZA ou un aspect ?"
      - "Pourquoi precisement 4 sub-partzufim et pas 3 ou 5 ?"
      - "Le ratio Rachel Elyonah/Tatah est-il fixe ?"

  - id: "PG-H2S9-056"
    nom: "Principe de l'Exception A\"A (Androgyne Integre)"
    source_assertions: ["EC-H2S9-254", "EC-H2S9-255"]
    formalisation: |
      EXCEPTION architecturale en A"A :
      Les autres partzufim ont MAH+BAN dans CHAQUE sefirah individuellement.
      A"A est UNIQUE : pas de NUKVAH SEPAREE.
      VERSION 1 : tout cote DROIT = MAH seul ; tout cote GAUCHE = BAN seul.
      VERSION 2 (alternative) : DROIT = MAH+BAN males ; GAUCHE = MAH+BAN femelles.
      → "Tzarikh Iyun" (necessite etude) — incertitude doctrinale.
      Pattern : A"A = androgyne integre, pas dual-binaire.
      Architecture : la separation polaire spatiale (R/L) remplace la melange MAH+BAN.
    applications_ia:
      - "Pattern : un composant top-level peut avoir une architecture differente"
      - "[PLANNED] partzufim/arikh_anpin.py : modeliser le mode androgyne par cote"
      - "Architecture : separation par cote = alternative au melange par sefirah"
      - "Diagnostic : honorer les Tzarikh Iyun = ne pas dogmatiser"
      - "Pattern : exceptions architecturales pour le top-niveau"
    questions_ouvertes:
      - "Quelle version est la 'vraie' (R. Chaim Vital incertain) ?"
      - "L'androgynie d'A\"A est-elle unique ou y a-t-il des analogues ?"
      - "Atik suit-il un pattern similaire (panim/achor) ?"

  - id: "PG-H2S9-057"
    nom: "Principe Calcul Fondamental (40 Elohim per Melekh)"
    source_assertions: ["EC-H2S9-257", "EC-H2S9-258", "EC-H2S9-259"]
    formalisation: |
      Calcul GEMATRIQUE FONDAMENTAL des nitzotzei ha-din :
      ETAPE 1 : 35 melakhim total = 5 partzufim × 7 ZT
      ETAPE 2 : Chaque melekh = 4 behinot HBTM (Hokhmah-Binah-Tiferet-Malkhut)
                = les 4 lettres de YHVH = chaque sefirah composee
      ETAPE 3 : Chaque behinah = 10 sub-behinot
      ETAPE 4 : Chaque sub-behinah = 1 nom ELOHIM (panim et achor)
      ETAPE 5 : Total per melekh : 4 × 10 = 40 Elohim
      ETAPE 6 : Total per partzuf : 7 × 40 = 280 = guimatria MNTzPK
      ETAPE 7 : Source = 5G (5 lettres ELOHIM) = SHORESH de tous les 280
    applications_ia:
      - "Calcul gematique systematique : verifier les decompositions arithmetiques"
      - "gematria/engine.py : implementer ce calcul comme fonction (verifier 7×40=280)"
      - "Architecture : sub-decompositions ALEPH-LAMED-HE-YOD-MEM (5 lettres Elohim)"
      - "Pattern : MNTzPK = decomposition standard des dinim (manatsapakh = 5 lettres finales)"
      - "shemot/ : construire la table des Elohim per behinah"
    questions_ouvertes:
      - "MNTzPK guimatria stricte = 1170, mais source dit 280. Pourquoi ?"
      - "Le calcul est-il exact ou approximatif ?"
      - "Existe-t-il un calcul similaire pour le RaChaMim cote ?"

  - id: "PG-H2S9-058"
    nom: "Principe RPaH (288) vs ShaCh (320) — Combinaison BAN+MAH"
    source_assertions: ["EC-H2S9-260", "EC-H2S9-261"]
    formalisation: |
      DEUX CALCULS FONDAMENTAUX des etincelles (nitzotzin) :
      RPaH (רפ"ח) = 288 = nitzotzin de BAN seul
        Calcul : 280 + 8 (autre source) ou variation = 288
      ShaCh (ש"ך) = 320 = nitzotzei ha-din TOTAL
        Calcul : 280 (= 7 × 40) + 40 (du 8eme melekh HADAR = MAH ha-Chadash)
        = 320 (= 285 + 5 lettres shoresh + 40 Hadar selon variantes)
      DECOMPOSITION OPERATIONNELLE :
        288 (RPaH) = part BAN
        40 (added) = part MAH-Hadar
        320 (ShaCh) = total post-MAH
      → Architecture : Tikkun ajoute MAH (40 Elohim) au compte BAN (288).
      Implication : avant Tikkun = 288 dinim ; apres Tikkun = 320 dinim incluant rachamim-douces.
    applications_ia:
      - "Calculs operationnels : RPaH (288) et ShaCh (320) comme constantes du systeme"
      - "gematria/engine.py : implementer ces 2 calculs comme constantes"
      - "[PLANNED] tikkun/ : tracer la transition 288 → 320 par ajout MAH"
      - "Pattern : addition d'une nouvelle dimension (MAH) augmente le compte mais qualifie"
      - "Architecture : nitzotzin = unite operationnelle pour mesurer le travail de Berur"
    questions_ouvertes:
      - "Combien de RPaH/ShaCh ont ete recuperes/encore restant ?"
      - "Le ratio MAH/BAN dans les 320 est-il quantifiable ?"
      - "Y a-t-il d'autres calculs fondamentaux (ex: 248 evarim, 365 gidim) ?"
