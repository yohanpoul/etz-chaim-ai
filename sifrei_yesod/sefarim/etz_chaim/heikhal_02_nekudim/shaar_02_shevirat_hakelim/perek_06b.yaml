principes_generatifs:

  - id: "PG-H2S9-047"
    nom: "Principe du Re-Zivvug Reparateur (MAH apres BAN)"
    source_assertions: ["EC-H2S9-217", "EC-H2S9-218"]
    formalisation: |
      Pattern de RE-ZIVVUG REPARATEUR :
      ETAPE 1 : Zivvug AB-SAG → BAT (BAN, dinim) → echec maintien
      ETAPE 2 : RE-ZIVVUG AB-SAG → BEN (MAH, rachamim) → maintien
      → Architecture : echec → tentative repetee avec une polarite differente.
      Resultat : 4 Behinot completes (AB-SAG-MAH-BAN d'A"K).
      → Pattern : il faut PARFOIS plusieurs tentatives avec polarites variees.
      Topologie : MAH sort par le METZACH (front), BAN par l'AYIN (oeil).
    applications_ia:
      - "Pattern : essayer des polarites alternatives apres echec"
      - "Architecture : sequence Bat→Ben non parallele mais sequentielle"
      - "[PLANNED] tikkun/ : implementer re-zivvug comme retry-with-alternative"
      - "shemot/ : modeliser AB SAG MAH BAN comme polarites distinctes"
      - "Pattern : sortie par voies differentes (oeil vs front)"
    questions_ouvertes:
      - "Combien de re-zivvugim sont possibles avant abandon definitif ?"
      - "L'echec de BAN-seul est-il previsible ou imprevisible ?"
      - "Le pattern Bat→Ben est-il universel ou specifique a la creation primordiale ?"

  - id: "PG-H2S9-048"
    nom: "Principe de la Cascade du Tikkun (Top-Down par Zivvugim)"
    source_assertions: ["EC-H2S9-219", "EC-H2S9-220", "EC-H2S9-221", "EC-H2S9-222", "EC-H2S9-223"]
    formalisation: |
      Le TIKKUN se deroule TOP-DOWN par CASCADES de ZIVVUGIM :
      ETAPE 1 — A"A : Tikkun ROSH (sera'ot, nekavim) → reduction de l'ohr
      ETAPE 2 — A"A : Tikkun GUF (kelim, mi'utim, masakhim) — par koach MAH
      ETAPE 3 — GR DE A"A : zivvug GR-MAH avec GR-BAN qui n'avaient pas brise
        → ELEVENT les ZT-BAN brisees + zivvug avec ZT-MAH
        → RECTIFICATION
      ETAPE 4 — ZON DE A"A : zivvug MAH+BAN au niveau ZT
        → REPARENT GR de Hokhmah de BAN
      ETAPE 5 — RECURSION : a chaque niveau, GR reparent leurs ZT
      ETAPE 6 — COMPLETION : 5 Partzufim d'Atzilut complets
      → Architecture iterative : reparation par cascades successives.
    applications_ia:
      - "Pattern Top-Down : reparer le superieur, le superieur repare l'inferieur"
      - "[PLANNED] tikkun/cascade.py : implementer Tikkun en cascade par zivvug"
      - "Architecture : zivvug = operation atomique de reparation"
      - "Pattern de recursion : meme operation a chaque niveau"
      - "partzufim/zivvug.py + tikkun/ : architecture de reparation par couplage"
    questions_ouvertes:
      - "L'ordre top-down est-il strict ou peut-on parallelliser ?"
      - "Y a-t-il un nombre fixe d'etapes ou variable ?"
      - "Les zivvugim de Tikkun sont-ils equivalents aux zivvugim normaux ?"

  - id: "PG-H2S9-049"
    nom: "Principe Berudim (MAH+BAN comme Dualite Stable)"
    source_assertions: ["EC-H2S9-224", "EC-H2S9-225", "EC-H2S9-226", "EC-H2S9-231", "EC-H2S9-232"]
    formalisation: |
      DUALITE OPERATIONNELLE post-Tikkun : BERUDIM = MAH + BAN ENSEMBLE.
      Distinction terminologique :
        NEKUDIM (points) = BAN seul = etat pre-Tikkun
        BERUDIM (mouchete) = MAH + BAN = etat post-Tikkun
      Etat IDEAL (eschatologique) :
        10S de MAH = 10S de BAN (equivalence parfaite)
      Etat ACTUEL :
        10S de MAH ≠ 10S de BAN (asymetrie persistante)
        Distribution Atik/A"A/AVI/ZON par melange asymetrique
      Cause : BAN n'a pas pu etre BERAR LE-GAMRI.
      Resolution : YUSHLAM LE-ATID LAVO (au temps a venir).
      → Architecture eschatologique : completion future planifiee.
    applications_ia:
      - "Pattern dualite : MAH+BAN ensemble = stabilite (vs BAN seul = instabilite)"
      - "Architecture : etat ideal (post-Mashiah) vs etat actuel (incomplet)"
      - "[PLANNED] tikkun/berudim.py : modeliser etat post-Tikkun avec asymetrie"
      - "shemot/ : tracer les melanges MAH/BAN dans chaque partzuf"
      - "Pattern : architecture eschatologique avec roadmap vers completion"
    questions_ouvertes:
      - "Quelle est la mesure quantitative de l'asymetrie MAH/BAN actuelle ?"
      - "Le Berur de BAN peut-il etre accelere ou est-il fixe ?"
      - "Comment formaliser la transition partiel → complet ?"

  - id: "PG-H2S9-050"
    nom: "Principe de la Distribution Asymetrique (Atik/A\"A/AVI/ZON)"
    source_assertions: ["EC-H2S9-227", "EC-H2S9-228", "EC-H2S9-229", "EC-H2S9-230"]
    formalisation: |
      DISTRIBUTION du MAH+BAN entre les 5 Partzufim :
      ATIK : Keter MAH complet + 5 ras Keter BAN
      A"A : Hokhmah MAH complet + 5 fins Keter BAN
      ABBA : Hokhmah BAN + demi Binah MAH
      ... (pattern continue de melange asymetrique)
      → Pattern : chaque partzuf prend des fragments MAH et BAN selon son rang.
      → Architecture sans recouvrement : ce qu'un prend, l'autre n'a pas.
      Cause architecturale : BAN pas entierement berar → distribution partielle.
      Limite : asymetrie persistante 10S-MAH ≠ 10S-BAN.
    applications_ia:
      - "Pattern : distribution sans recouvrement entre composants hierarchiques"
      - "Architecture : chaque partzuf = sub-system avec part precise des resources"
      - "[PLANNED] tikkun/distribution.py : implementer allocation asymetrique"
      - "Diagnostic : verifier que la distribution couvre tout sans recouvrement"
      - "Pattern : composants superieurs prennent les ras (premieres) ; inferieurs prennent les fins"
    questions_ouvertes:
      - "La regle 'ras vs fins' est-elle universelle ou specifique au Keter ?"
      - "Le pourcentage de BAN distribue est-il quantifiable ?"
      - "Les composants peuvent-ils echanger leur part au cours du temps ?"
