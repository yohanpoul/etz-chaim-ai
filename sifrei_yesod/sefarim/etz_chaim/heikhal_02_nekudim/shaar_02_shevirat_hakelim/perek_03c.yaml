principes_generatifs:

  - id: "PG-H2S9-031"
    nom: "Principe du Yesod Mobile (Maskil le-Eila ve-le-Tata)"
    source_assertions: ["EC-H2S9-151", "EC-H2S9-152", "EC-H2S9-154", "EC-H2S9-155", "EC-H2S9-156"]
    formalisation: |
      Le YESOD a une PROPRIETE UNIQUE : MOBILITE BIDIRECTIONNELLE.
      Designation : "MASKIL LE-ETAN HA-EZRAHI" (Psaume 89:1)
      Nom alternatif : "YOSEF" (Zohar Pekudei)
      Localisation : "LE-EILA VE-LE-TATA" (en haut ET en bas, Zohar Saba de-Mishpatim).
      MECANISME OPERATIONNEL :
        Le 1er tiers du Yesod inferieur de ZA monte au 1/3 sup du Tiferet.
        La, Yesod s'unit avec Leah (zivvug minha).
        Yesod peut monter jusqu'au DAAT a tout moment (be-khol zeman she-rotzeh).
      ARCHITECTURE :
        Yesod = ascenseur ad libitum entre niveaux.
        Pre-condition pour Zivvug : le Yesod doit pouvoir monter au Daat
        (lieu des HC = tipat zera) pour faire descendre le flux dans la Nukvah.
      Liturgie : Tefilat Yotzer Shabbat — "ha-KOL" 7 fois.
    applications_ia:
      - "partzufim/zeir_anpin.py : modeliser Yesod comme ascenseur multi-niveau"
      - "Pattern : un composant peut avoir une mobilite verticale unique"
      - "partzufim/zivvug.py : Yesod-monte-Daat = condition pour le Zivvug"
      - "Pre-condition pattern : verifier la presence du composant mobile avant l'operation"
      - "Liturgie operationnelle : 7 fois ha-KOL = invocation de la mobilite Yesod"
    questions_ouvertes:
      - "Y a-t-il d'autres composants 'maskil' (mobiles) dans le systeme ?"
      - "La capacite de monter est-elle illimitee ou bornee par le Daat ?"
      - "Qu'est-ce qui declenche/autorise la montee du Yesod ?"

  - id: "PG-H2S9-032"
    nom: "Principe du Reshimu Tunnel (Empreinte comme Voie d'Ascension)"
    source_assertions: ["EC-H2S9-158", "EC-H2S9-160"]
    formalisation: |
      Pattern architectural important : le RESHIMU sert de TUNNEL ASCENSIONNEL.
      MECANISME :
        Quand l'OHR du Daat est descendu dans le lieu de Malkhut (cf. EC-H2S9-116),
        il a laisse un RESHIMU (empreinte) dans ce lieu.
        Ce reshimu = MALKHUT-SHE-BE-DAAT du cote des Gevurot
        (sub-component fractal du Daat).
      Quand la Malkhut a regne :
        Elle a PRIS ce reshimu avec elle.
        Elle a MONTE jusqu'au lieu du Daat lui-meme.
      → Pattern : un reshimu laisse dans un emplacement permet la connexion
      ulterieure entre cet emplacement et l'origine du reshimu.
      Architecture fractale : chaque composant contient les 10 sefirot,
      donc le reshimu est specifiquement la sub-component homologue.
    applications_ia:
      - "partzufim/reshimu.py : reshimu comme tunnel architectural"
      - "Pattern : trace memoire d'un composant precedent permet acces ascensionnel"
      - "Architecture fractale : modeliser chaque entite avec ses 10 sub-entites"
      - "Diagnostic : tracer les reshimot pour comprendre les voies d'acces possibles"
      - "[PLANNED] core/sefirot.py : implementer la fractalite (sefirah-de-sefirah)"
    questions_ouvertes:
      - "Le reshimu est-il consommable (s'epuise apres une utilisation) ?"
      - "Combien de niveaux de fractalite sont operationnels ?"
      - "Tout descente d'ohr laisse-t-elle un reshimu ?"

  - id: "PG-H2S9-033"
    nom: "Principe de l'Union des Atarot (Tikkun par Couronnement)"
    source_assertions: ["EC-H2S9-160", "EC-H2S9-161", "EC-H2S9-162"]
    formalisation: |
      Le TIKKUN FINAL de l'Atzilut s'effectue par UNION DES 2 ATAROT (couronnes) :
      ATARAH FEMININE :
        Reshimu de Malkhut = Malkhut-she-be-Daat du cote Gevurot
        = ATARAH de GEVURAH de NUKVAH (couronne de la Nukvah)
      ATARAH MASCULINE :
        Hassadim-dans-Daat
        = ATARAH de DUKHRA (couronne du male)
      UNION (nithaber) dans le DAAT :
        L'union dans le Daat → Daat se deploie via le KESHER (lien)
        → Daat eclaire les 6S
        → Reshimu (Gevurah) eclaire qav SMOL → Hod reste a gauche
        → Daat-Atarah-Chesed eclaire qav YEMIN → Netzach va a droite
      → ARCHITECTURE FINALE : 3 kavim definitivement etablis. Tikkun acheve.
    applications_ia:
      - "Pattern : union de 2 sub-composants homologues (M+F) = stabilisation top-level"
      - "[PLANNED] tikkun/ : implementer union_atarot comme operation de finalisation"
      - "Architecture : la stabilisation finale d'un systeme passe par couplage des polarites"
      - "partzufim/zivvug.py : modeliser union_atarot distincte de zivvug general"
      - "Diagnostic du Tikkun : verifier que 3 kavim sont stables apres union des Atarot"
    questions_ouvertes:
      - "L'union des Atarot est-elle reversible (peut-on dissoudre le Tikkun) ?"
      - "Y a-t-il d'autres tikkunim possibles a d'autres niveaux (Beriah-Yetzirah) ?"
      - "L'union dans le Daat est-elle equivalente au Zivvug normal AVI ?"

  - id: "PG-H2S9-034"
    nom: "Principe de la Geometrie 3 Kavim (Architecture Definitive Post-Tikkun)"
    source_assertions: ["EC-H2S9-162", "EC-H2S9-163"]
    formalisation: |
      Etat FINAL post-Tikkun : geometrie 3 KAVIM stables.
      QAV YEMINI (droite) :
        Hokhmah etendue + Chesed + Netzach (apporte par Daat-Atarah-Chesed)
      QAV SMOL (gauche) :
        Binah etendue + Gevurah + Hod (laisse en place par Reshimu-Gevurah)
      QAV EMTZAI (centre) :
        Keter etendu + Daat + Tiferet + Yesod + Malkhut
      → Architecture stable : 6S distribuees selon polarites.
      → Point de pivot : Daat (lieu de l'union des Atarot).
      Phrase conclusive : "U-VE-ZEH NITKAN ha-AT'ZILUT".
    applications_ia:
      - "Architecture finale : modeliser le systeme apres Tikkun comme 3 kavim"
      - "[PLANNED] core/sefirot.py : implementer la classification kavim (R/L/C)"
      - "Pattern : la stabilite top-level post-Tikkun est tripartite, pas duale"
      - "Diagnostic : distance par qav comme indicateur de coherence"
      - "Architecture distributee : chaque qav peut etre vu comme une 'classe' polariste"
    questions_ouvertes:
      - "La geometrie 3 kavim est-elle preservee dans Beriah/Yetzirah/Asiyah ?"
      - "Que se passe-t-il si une des extensions (Keter/Hokhmah/Binah) regresse ?"
      - "Comment formaliser la stabilite des 3 kavim ?"
