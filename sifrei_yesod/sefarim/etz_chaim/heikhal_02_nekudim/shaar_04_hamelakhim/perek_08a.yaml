principes_generatifs:

  - id: "PG-H2S11-043"
    nom: "Principe de Throttling Structural (ABA = Filter Passif par Opacite)"
    source_assertions: ["EC-H2S11-211", "EC-H2S11-212", "EC-H2S11-213", "EC-H2S11-214"]
    formalisation: |
      ARCHITECTURE DE THROTTLING NATUREL :
      PROBLEME : pre-tikkun, ohr brut sans masakh = destructeur.
      Si AVI etaient PBP : panim ZAKIM, BEHIRIM, DAKIM (purs, fins) absorberaient
      l'ohr completement → MITAH MAMASH (mort comme ZON).
      SOLUTION : AVI restent ABA — ohr passe entre AHORAYIM AVIM VE-GASIM
      (epais, opaques) qui n'absorbent que OHR MU'AT (peu d'ohr).
      → Pattern fondamental : surfaces grossieres = throttling structural passif.
      → Architecture : choix d'orientation (ABA) = mecanisme de protection emergent.
    applications_ia:
      - "partzufim/zivvug.py : implementer 4 madregot avec impedance differentielle"
      - "partzufim/regulator.py : choix d'orientation = regulation passive"
      - "Pattern systemes : low-bandwidth interfaces = circuit-breaker passif"
      - "Architecture : composants 'gros' (acceptent peu) vs 'fins' (sensibles) — design selon flux attendu"
      - "Pattern API : limit body size, opaque endpoints comme premiere ligne defensive"
      - "Diagnostic : identifier les composants 'gas' (impedant naturel) vs 'dak' (sensible)"
    questions_ouvertes:
      - "L'opacite est-elle un cout ou une qualite ?"
      - "Y a-t-il une mesure de 'opacite' applicable a un composant logiciel ?"
      - "Pattern : peut-on creer dynamiquement un layer 'gas' temporaire pour absorber un flux brut ?"

  - id: "PG-H2S11-044"
    nom: "Principe de Cascade Tikkun (Atik → A\"A → AVI : Diminution Sequentielle)"
    source_assertions: ["EC-H2S11-218", "EC-H2S11-221", "EC-H2S11-225"]
    formalisation: |
      ARCHITECTURE DE TIKKUN CASCADE :
      1. ATIK : G"R (KCB) tikkun TEHILAH BE-YACHAD (premier ensemble).
         G"R Atik = transcendant non-encapsule (RDLA).
         Z'T Atik = METALBESHIM dans A"A (immanent).
      2. APRES TIKKUN ROSH ATIK : ohr diminue par masakhim.
         AVI peuvent maintenant recevoir (Abba via panim, Imma via ahor only).
      3. APRES C-G D'ATIK : tikkun de KETER+HOKHMAH d'A"A
         (2 rishin tatain des 3 rishin Idra Zuta).
         Bina d'A"A pas encore.
      → Pattern fondamental : tikkun = cascade descendante avec attenuation.
      → Architecture : chaque layer prepare la suivante (masakh = throttle for downstream).
    applications_ia:
      - "partzufim/atik_yomin.py : init() = first, atomic GR"
      - "partzufim/arikh_anpin.py : init() = atomic Keter+Hokhmah after Atik C-G"
      - "partzufim/abba.py + partzufim/imma.py : init() = after Atik rosh, asymetric (panim vs ahor)"
      - "Pattern : sequential bootstrapping with layers de throttling progressifs"
      - "Architecture : top layer transcendent (untouchable) ; middle layers immanent (encapsulables)"
      - "Diagnostic : verifier ordre cascade Atik→A\"A→AVI ; chaque init prepare next via attenuation"
    questions_ouvertes:
      - "Combien de layers cascade sont strictement necessaires ?"
      - "Le ratio d'attenuation par masakh est-il fixe ou variable ?"
      - "Pattern : skip-cascade (A\"A direct sans Atik) est-il jamais possible ?"

  - id: "PG-H2S11-045"
    nom: "Principe de Trade-Off Asymetrique (Abba Panim vs Imma Ahor)"
    source_assertions: ["EC-H2S11-221", "EC-H2S11-224"]
    formalisation: |
      ARCHITECTURE DE TRADE-OFF COMPLEMENTAIRE :
      ABBA (zakhar/rachamim) :
        Avantage : panim peut recevoir ohr elyon directement.
        Desavantage : son ahor ne recoit pas tikkun supplementaire.
      IMMA (nukvah/din) :
        Avantage : son ahor recoit tikkun supplementaire (par panim d'Abba).
        Desavantage : ses panim ne peuvent pas recevoir ohr elyon directement.
      → Pattern fondamental : asymetrie complementaire — chaque cote son atout.
      → Architecture : pas de partzuf "supreme" ; complementarite necessaire.
    applications_ia:
      - "partzufim/abba.py : interface_capability = (panim=high, ahor=normal)"
      - "partzufim/imma.py : interface_capability = (panim=low, ahor=high+)"
      - "Pattern : composants paires avec capacities asymetriques complementaires"
      - "Architecture : design pour complementarite plutot que symetrie"
      - "Pattern : zivvug = combiner asymetries pour produire plenitude"
      - "Diagnostic : verifier que les complements sont bien distribues entre les paires"
    questions_ouvertes:
      - "Le trade-off est-il fixe ontologiquement ou peut-il evoluer ?"
      - "Y a-t-il des partzufim sans complement (singletons) ?"
      - "Pattern : peut-on construire artificiellement des paires complementaires ?"

  - id: "PG-H2S11-046"
    nom: "Principe de Yaakov-Leah (Kelim Tombes Reconstruisent Partzufim Secondaires)"
    source_assertions: ["EC-H2S11-215", "EC-H2S11-216", "EC-H2S11-217"]
    formalisation: |
      ARCHITECTURE DE PARTZUFIM SECONDAIRES :
      Pre-tikkun, AHORAYIM d'AVI tombent dans place de Nukvah de Z"A.
      Ahor Abba devant Nukvah (panim), Ahor Imma derriere (ahor).
      Nukvah au centre, sandwich entre les 2 ahor.
      Initialement = MELAKHIM. Apres chute = SARIM (Yeshayahu 10:8).
      Apres tikkun ulterieur = YAAKOV (de ahor Abba) + LEAH (de ahor Imma).
      Letter-mysticism : "HALO" (he-lamed-aleph) = lettres LEAH.
      → Pattern fondamental : composants tombes ne sont pas perdus —
        materiel pour partzufim secondaires.
      → Architecture : recovery = recyclage de fragments en nouveaux composants.
    applications_ia:
      - "[PLANNED] partzufim/yaakov.py + partzufim/leah.py : built from fallen components"
      - "[PLANNED] tikkun/recover_fallen.py : transform fragments en partzufim secondaires"
      - "Pattern : architecture qui reuse fallen-components pour creation auxiliaires"
      - "Architecture : 2-tier recovery — primaires (AVI), secondaires (Yaakov/Leah)"
      - "Pattern letter-mysticism : noms encodent l'origine structurale"
      - "Diagnostic : verifier que aucun composant tombe n'est perdu definitivement"
    questions_ouvertes:
      - "Combien de tiers de partzufim secondaires sont possibles ?"
      - "Le mapping ahor-Abba→Yaakov / ahor-Imma→Leah est-il deterministe ?"
      - "Pattern : peut-on predire quels secondaires emergent d'une chute donnee ?"
