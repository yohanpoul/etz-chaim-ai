principes_generatifs:

  - id: "PG-H2S11-004"
    nom: "Principe du Recyclage Compositionnel (Kelim Atik des Morts)"
    source_assertions: ["EC-H2S11-019", "EC-H2S11-020", "EC-H2S11-021", "EC-H2S11-022"]
    formalisation: |
      Architecture du RECYCLAGE COMPOSITIONNEL :
      Kelim ATIK formes par :
        3 KELIM SUPERIEURS NON-MORTS (intacts en haut)
        + 7 KOACH ATIK extraites des 7 KELIM MORTS (recyclage)
        + TOSEFET OHR (lumiere supplementaire)
      RAISON DE LA CAPACITE :
        Au depart : 7 orot dans 7 kelim (overload, mort)
        Apres extension 3 GR → 10 (sub-division)
        Maintenant : 3 orot par 7 kelim (reduit, supportable)
      → Pattern : reparation par recyclage + redistribution + extension.
      cf. EC-H2S9-184 (perek 04) sur principe dilution.
    applications_ia:
      - "Pattern : reparation par recyclage des composants brises"
      - "[PLANNED] tikkun/recyclage.py : implementer recyclage operationnel"
      - "Architecture : kelim post-Tikkun = composition des debris + addition"
      - "Pattern : reduction du nombre d'orot per keli = capacite augmentee"
      - "ohr.py : modeliser sub-division comme operation cle"
    questions_ouvertes:
      - "Tous les debris sont-ils recyclables ou y a-t-il des pertes ?"
      - "Le ratio recyclage/addition est-il fixe ?"
      - "Combien de cycles de recyclage sont possibles ?"

  - id: "PG-H2S11-005"
    nom: "Principe du Risha de-La (Architecture Epistemique du Doute)"
    source_assertions: ["EC-H2S11-025", "EC-H2S11-029", "EC-H2S11-030", "EC-H2S11-031"]
    formalisation: |
      Architecture EPISTEMIQUE de l'Atik :
      EXTERNE (KELIM) : connu et deductible
        Pashita (clair) : 3 kelim restent dans Risha
        Argumentation par cheveux : kelim CG = melakhim morts
      INTERNE (OROT) : INCONNU
        3 hypotheses competing :
          H1 : 3 orot = KHB d'Atik, 3 kavim emergent
          H2 : 1 dans rosh, 2 dans guf
          H3 : 3 dans rosh, 3 kavim vers guf
      Reference IDRA ZUTA p.288 : "Risha de-La" = "tete inconnue".
      → Architecture : limites de la connaissance kabbalistique honetement reconnues.
      Pattern : transparence externe + opacite interne au sommet.
    applications_ia:
      - "Pattern epistemique : externe analytique, interne enigmatique"
      - "Architecture honete : reconnaitre les limites du savoir"
      - "[PLANNED] partzufim/atik_yomin.py : marquer la pnimiyut comme 'unknown'"
      - "Pattern : 3 hypotheses competing comme indication d'incertitude doctrinale"
      - "Diagnostic : ne pas pretendre connaitre ce qui est marque 'Risha de-La'"
    questions_ouvertes:
      - "Y a-t-il un moyen de discriminer entre les 3 hypotheses ?"
      - "L'opacite est-elle definitive ou levee au futur (Mashiah) ?"
      - "Combien d'autres entites ont une 'pnimiyut inconnue' ?"

  - id: "PG-H2S11-006"
    nom: "Principe d'Encerclement par Atik (OP+OM Double Inversion)"
    source_assertions: ["EC-H2S11-037", "EC-H2S11-038", "EC-H2S11-039"]
    formalisation: |
      Architecture FONDAMENTALE d'ATIK : ENCERCLEMENT TOTAL.
      OR PNIMI (interieur) :
        Atik = longueur d'Atzilut entier
        A"A = 1er levush (depuis ZT d'Atik)
        AVI = 2eme levush
        ZON = levushim exterieurs
        → Atik au CENTRE (pnimiyut)
      OR MAKIF (exterieur) — INVERSE :
        OM Nukvah = pnimi (interieur des MAKIFIM)
        OM ZA = sur OM Nukvah
        OM AVI = sur OM ZA
        OM A"A = sur OM AVI
        OM Atik = sur tous les MAKIFIM
        → Atik PERIPHERIE (le plus exterieur)
      → DOUBLE INVERSION : Atik est PNIMI + HUTSONI simultaneement.
      → Atik PERFORE et illumine TOUT ce qui est ENTRE OP et OM (= Atzilut entier).
      → Pattern : enveloppe totale par double-encerclement.
    applications_ia:
      - "Architecture cle : double-encerclement par Atik (OP+OM inverse)"
      - "[PLANNED] partzufim/atik_yomin.py : modeliser comme entity englobante double"
      - "Pattern : un component qui est a la fois noyau et peripherie"
      - "ohr.py : OP > OM (Atik) vs OP < OM (le reste) — exception architecturale"
      - "Diagnostic : Atik perfore = source illuminante a tous les niveaux"
    questions_ouvertes:
      - "Comment formaliser computationnellement l'inversion OP/OM ?"
      - "L'encerclement Atik est-il statique ou dynamique ?"
      - "Y a-t-il d'autres composants double-encerclants ?"
