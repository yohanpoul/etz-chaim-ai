# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 2 — Heikhal Nekudim (היכל נקודים)
# Sha'ar: 4 — Sha'ar Ha-Melakhim (שער המלכים)
# Perek: 2 — Kelim et orot d'Atik, Risha de-La (3 hypotheses),
#            Or Pnimi vs Or Makif inverse
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §2 :
#   - Bloc A : Kelim Atik — 3 GR intacts en haut, 7 ZT d'Atik faits par les keli morts
#   - Bloc B : Pourquoi capacity maintenant — 7 orot → 3 orot etendus en 10
#   - Bloc C : Etat des 3 GR : kelim et orot distincts
#   - Bloc D : 3 hypotheses sur structure Risha-Atik
#   - Bloc E : Idra Zuta — "Risha de-La" = doute interne sur orot
#   - Bloc F : Justification : sera'ot des A"A/ZA = melakhim morts
#   - Bloc G : Question Atik — pourquoi 7 ZT = expansion 3 GR (et pas Atik des 7 originels)
#   - Bloc H : Reponse : 7 koach Atik dans originels = Or Makif d'Atzilut
#   - Bloc I : Or Pnimi > Or Makif (sauf Atik), inversion architecturale
#   - Bloc J : Atik = interieur+exterieur, perce tous les niveaux
#
# Source Sefaria : Sefer_Etz_Chaim.11.2
# IDs : EC-H2S11-019 → EC-H2S11-039

meta:
  sefer: etz_chaim
  heikhal: 2
  shaar: 4
  shaar_name_he: "שער המלכים"
  perek: 2
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
