principes_generatifs:

  - id: "PG-H2S11-018"
    nom: "Principe d'Interface Cosmique (ZON Absorbe le Pegam)"
    source_assertions: ["EC-H2S11-102", "EC-H2S11-103"]
    formalisation: |
      ARCHITECTURE A COUCHES PROTECTRICES :
      Chaine generationnelle : AVI → ZON → humanite.
      ZON = COUCHE D'INTERFACE entre divin (G"R = A"A et AVI) et humain.
      PROPRIETE : tout pegam cause par les humains atteint UNIQUEMENT ZON.
      G"R RESTENT INTACTES quoi qu'il arrive.
      MECANISME : ZON sont les "z' tahtonot" = chesed et au-dessous = monde.
      → Pattern fondamental : interface absorbe les chocs, noyau profond protege.
      → Architecture : separation des concerns = isolement des couches sensibles.
    applications_ia:
      - "partzufim/zeir_anpin.py + partzufim/nukva.py : implementer comme couche d'interface user-facing"
      - "partzufim/abba.py + partzufim/imma.py : noyau protege, pas modifiable par interactions humaines"
      - "Pattern : architecture en couches avec interface absorbant les pegamim"
      - "Diagnostic : verifier que les modifications utilisateur n'atteignent pas le noyau"
      - "Architecture distribuee : edge layer absorbe les requests malformes, core layer reste pur"
    questions_ouvertes:
      - "Le pegam peut-il indirectement remonter aux GR via ZON ?"
      - "Y a-t-il des formes de pegam qui contournent cette protection ?"
      - "Comment se fait la signal de pegam de l'humain a ZON sans contaminer GR ?"

  - id: "PG-H2S11-019"
    nom: "Principe de Granularite Morale (10 Ma'amarot Separes)"
    source_assertions: ["EC-H2S11-108", "EC-H2S11-110", "EC-H2S11-111", "EC-H2S11-112"]
    formalisation: |
      ARCHITECTURE DE JUSTICE QUANTITATIVE :
      Source : "BE-ASARAH MA'AMAROT NIVRA HA-OLAM" (Pirkei Avot 5:1).
      Le maatzil aurait pu creer ZON unifies (comme G"R) — mais a choisi separation.
      RAISON : pour SAKHAR (recompense) et ONESH (punition) granulaires.
      MECANISME : pegam de mesure X → X ma'amarot mistalkim → punition de degre X.
      INVERSEMENT pour les tzaddikim : recompense proportionnelle.
      → Pattern : la separation structurale est requise pour la moralite scalaire.
      → Architecture : granularite = condition de la justice quantitative.
    applications_ia:
      - "partzufim/zeir_anpin.py : structure 10 sefirot SEPARABLES, pas package atomique"
      - "[PLANNED] tikkun/ : implementer pegam_score(action) -> int (nb ma'amarot atteints)"
      - "Pattern API : reponses graduees plutot que tout-ou-rien (PASS/FAIL/PARTIAL/...)"
      - "Architecture micro-services : separation permet penalisation/recompense fine par service"
      - "Pattern morale algorithmique : justice fine-grain requiert decomposition fine de l'etat"
    questions_ouvertes:
      - "Combien de niveaux de granularite sont necessaires (10 est-il optimal) ?"
      - "Comment definir une metrique de pegam continue plutot que discrete ?"
      - "Le design intentionnel divin se traduit-il en exigences de design IA ?"

  - id: "PG-H2S11-020"
    nom: "Principe Shoresh vs Tosefet (Sortie Initiale = Squelette Inalterable)"
    source_assertions: ["EC-H2S11-116", "EC-H2S11-117"]
    formalisation: |
      DISTINCTION OPERATIONNELLE FONDAMENTALE :
      SHORESH VE-IKAR (racine et essence) = ce qui sort AVANT le tikkun
        → INALTERABLE par tout pegam ulterieur.
      TOSEFET (addition) = ce qui vient lors du tikkun, en plus du shoresh
        → DEMONTABLE lors du pegam.
      DESIGN CHOICE : le maatzil decide ce qui est shoresh vs tosefet
      en fonction du PEGAM ATTENDU :
        Pour Nukvah : Keter sub = shoresh (proche kelipot, doit etre ancre haut).
        Pour ZA : 6 inferieures = shoresh (plus loin kelipot, peut perdre G"R sans danger).
      → Pattern : choix initial determine ce qui est preserve.
      → Architecture : distinguer immutable_core vs mutable_overlay.
    applications_ia:
      - "partzufim/base.py : enum ChelekType { SHORESH, TOSEFET }"
      - "partzufim/nukva.py : shoresh = keter_sub seul ; tosefet = 9 autres chalakim"
      - "partzufim/zeir_anpin.py : shoresh = 6 ketzavot ; tosefet = G\"R"
      - "[PLANNED] core/shevirah.py : pegam(state) ne peut sistalek que tosefet, pas shoresh"
      - "Pattern systemes : invariants (shoresh) vs etat mutable (tosefet)"
      - "Architecture : fondations inalterables + couches reversibles"
    questions_ouvertes:
      - "Le shoresh peut-il etre redefini apres-coup ou est-il fige ?"
      - "Y a-t-il des hybrides (semi-shoresh) ?"
      - "Comment le design choisit-il quel chelek doit etre shoresh dans un nouveau systeme ?"

  - id: "PG-H2S11-021"
    nom: "Principe Topologique (Proximite Kelipot Determine Architecture Defensive)"
    source_assertions: ["EC-H2S11-114", "EC-H2S11-115"]
    formalisation: |
      ARCHITECTURE DEFENSIVE LIEE A LA TOPOLOGIE :
      Nukvah = ENTIEREMENT NETUNAH dans la KELIPAH (proche du danger).
      Source : "RAGLEHA YOREDOT MAVET" (Mishlei 5:5).
      CONTRAINTE : si Nukvah perdait ses parts SUPERIEURES (gardant inferieures),
      le monde serait neherav (detruit) — car la part inferieure deviendrait
      proche kelipot et s'annulerait elle-meme.
      DONC : Nukvah doit garder SON KETER SUB (la part la plus haute) comme ancre.
      ZA = plus loin des kelipot — peut se permettre de garder les inferieures.
      → Pattern topologique : plus on est proche du danger, plus l'ancre doit etre haute.
      → Architecture : la position relative determine la strategie defensive.
    applications_ia:
      - "partzufim/nukva.py : sentinelle = keter_sub (point haut, ancre)"
      - "sitra_achra : modele de proximite kelipot (distance metrique)"
      - "Pattern API : front-end (proche user) garde minimal mais critique ; back-end peut perdre couches"
      - "Architecture securite : assets critiques en haut de la chain de privilege"
      - "Pattern : la profondeur defensive doit s'ancrer au point le plus haut accessible"
    questions_ouvertes:
      - "Comment formaliser la 'proximite kelipot' en mesure quantifiable ?"
      - "Y a-t-il des architectures sans 'point d'ancrage haut' qui survivent ?"
      - "Pattern dual : la profondeur (back-end loin du user) peut-elle elle aussi avoir un shoresh inferieur ?"
