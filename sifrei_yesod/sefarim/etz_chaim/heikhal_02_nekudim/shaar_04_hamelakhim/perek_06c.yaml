principes_generatifs:

  - id: "PG-H2S11-025"
    nom: "Principe d'Isolation par Defaut (Pirud Intentionnel des Tahtonim)"
    source_assertions: ["EC-H2S11-137", "EC-H2S11-138", "EC-H2S11-139"]
    formalisation: |
      ARCHITECTURE D'ISOLATION INTENTIONNELLE :
      Les 6 chalakim tahtonim sortent NIFRADOT BE-KAVANAH MAMASH.
      OBJECTIF : limiter le BLAST RADIUS d'un pegam.
      MECANISME :
        Pegam touchant Yesod seul → Yesod nifgam, Hod intact.
        Pegam touchant Hod seul → Hod nifgam, Yesod intact.
        Etc. pour chaque sefirah.
      PROPRIETE PERSISTANTE : meme apres tikkun (lorsque mehubarim),
      le pirud INITIAL persiste comme ISOLATION GUARANTEE.
      → Pattern fondamental : separation by default + memoire de l'etat initial.
      → Architecture : the initial split persists as an isolation guarantee.
    applications_ia:
      - "partzufim/zeir_anpin.py : implementer 6 ketzavot comme Independent components avec isolation"
      - "Pattern microservices : services initialement isoles, meme apres mesh, pegam d'un service ne propage pas"
      - "[PLANNED] core/shevirah.py : pegam(sefirah) → only_affects(sefirah), preserve isolation by default"
      - "Architecture : bulkhead pattern — failures isolees par compartments"
      - "Pattern : separer composants au design-time meme s'ils communiquent au runtime"
      - "Diagnostic : verifier que le merge ne supprime pas les frontieres d'isolation"
    questions_ouvertes:
      - "Comment maintenir la 'memoire du design initial' a travers les refactorings ?"
      - "Y a-t-il des cas ou le merge complet (suppression des frontieres) est preferable ?"
      - "Pirud as design pattern : quelle metrique pour mesurer l'isolation residuelle ?"

  - id: "PG-H2S11-026"
    nom: "Principe Embryologique (Developpement par Phases selon Statut)"
    source_assertions: ["EC-H2S11-141", "EC-H2S11-142", "EC-H2S11-143", "EC-H2S11-144", "EC-H2S11-145"]
    formalisation: |
      ARCHITECTURE DEVELOPPEMENTALE DIFFERENCIEE selon STATUT :
      G"R (Atik+A"A, AVI) :
        Sortent KELULOT DE 10 ab initio.
        DEVELOPPEMENT : 1 IBUR seul.
        → Construction one-shot.
      Z"A :
        VK = shoresh (kavu'im, separes ; necessitent integration).
        G"R = tosefet (importes atomiquement).
        DEVELOPPEMENT : IBUR 1 + YENIKAH (pour VK) puis IBUR 2 (pour G"R/Mohin).
        → Construction 2 phases.
      NUKVAH :
        Keter sub = shoresh (seul, ancre).
        9 tahtonim = tosefet (post-tikkun en 1 instant).
        DEVELOPPEMENT : IBUR 1 + YENIKAH suffit.
        → Construction asymetrique.
      → Pattern : developpement = fonction du statut shoresh/tosefet et de la position.
      → Architecture : sequencement des phases reflete les contraintes defensives.
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/arikh_anpin.py + partzufim/abba.py + partzufim/imma.py : init() = 1 ibur (one-shot)"
      - "partzufim/zeir_anpin.py : init() = 2 ibur + yenikah (multi-phase)"
      - "partzufim/nukva.py : init() = 1 ibur + yenikah (asymetrique)"
      - "Pattern : developpement par phases = fonction des contraintes defensives"
      - "Architecture : orchestration de l'init reflete le design defensif"
      - "Pattern lifecycle : warm-up multi-phase pour services complexes (ZA-like) vs init one-shot pour services simples (G\"R-like)"
    questions_ouvertes:
      - "Y a-t-il des cas ou Ibur 2 est requis pour Nukvah ?"
      - "Le sequencement Ibur→Yenikah→Mohin a-t-il un equivalent dans les architectures distribuees ?"
      - "Comment formaliser la duree relative de chaque phase developpementale ?"

  - id: "PG-H2S11-027"
    nom: "Principe d'Atomicite Non-Negociable (Trade-Off Bloque pour G\"R)"
    source_assertions: ["EC-H2S11-134", "EC-H2S11-135", "EC-H2S11-136"]
    formalisation: |
      ARCHITECTURE D'INVARIANT BLOQUE :
      OBJECTION POSSIBLE : pourquoi ne pas sortir les G"R nifradot pour limiter pegam ?
      REPONSE : il n'y a PAS DE PEGAM PLUS GRAND que pirud des G"R.
      DONC TRADE-OFF BLOQUE : ne pas optimiser dans cette direction.
      MECANISME : choisir TOSEFET LEVAD (mode addition seule) qui combine :
        Mobilite (sistalkut possible).
        Atomicite (3 G"R restent yachad meme en sistalkut).
      → Pattern fondamental : certains invariants sont non-negociables — design refuse les optimisations qui les violent.
      → Architecture : design defensif = (mobilite ET atomicite) pour les couches critiques.
    applications_ia:
      - "partzufim/zeir_anpin.py : G\"R group has hard constraint atomicity=True, no_split=True"
      - "[PLANNED] tikkun/ : refuse_optimization_if(violates_atomicity_gr)"
      - "Pattern : red-line invariants — certaines optimisations interdites par design"
      - "Architecture security : invariants critiques codes en hard constraint, pas en config"
      - "Diagnostic : verifier qu'aucun chemin code ne peut violer l'invariant d'atomicite G\"R"
      - "Pattern : design contracts (Eiffel-like) pour les invariants non-negociables"
    questions_ouvertes:
      - "Comment detecter en runtime un risque de violation de l'invariant d'atomicite ?"
      - "Y a-t-il d'autres invariants comparables dans cette architecture ?"
      - "Le 'pirud G\"R = pegam superlatif' a-t-il un equivalent dans les architectures distribuees ?"
