principes_generatifs:

  - id: "PG-H2S11-035"
    nom: "Principe Container/Content (Tikkun = Restauration des Kelim seul)"
    source_assertions: ["EC-H2S11-181", "EC-H2S11-182"]
    formalisation: |
      ARCHITECTURE CONTAINER/CONTENT :
      OROT (lumieres) : INCHANGES par tout tikkun (immutables).
      KELIM (vaisseaux) : restaurables par tikkun.
      MECANISME : si kelim = nekudot ketanot bilti partzuf —
        OROT ne peuvent pas LEHOTZI HALAKEIHEM LE-PO'AL (mettre parts en acte).
        Bloques dans le petit point.
      Apres TIKKUN — kelim deviennent PARTZUF GAMUR (forme complete) :
        OROT peuvent maintenant montrer leur PE'ULAH (action) et KOAH (force).
      → Pattern fondamental : structure du container = enabling/disabling pour le contenu.
      → Architecture : separation containers (mutables) / contenu (immutable).
    applications_ia:
      - "partzufim/base.py : separer immutable Ohr (data/state) de mutable Keli (structure)"
      - "[PLANNED] tikkun/ : restore_keli(broken_partzuf) -> restored_partzuf (no touch on ohr)"
      - "Pattern : data/structure separation — fix la structure, jamais la donnee"
      - "Architecture : containers reparables (k8s pods, microservices) vs contenu protege (data)"
      - "Pattern fonctional : immutable values + mutable references"
      - "Diagnostic : verifier que tikkun n'altere jamais l'ohr (test invariant)"
    questions_ouvertes:
      - "Y a-t-il des cas ou ohr peut aussi etre transforme (pas tikkun mais autre operation) ?"
      - "Comment garantir l'immutabilite des orot pendant tikkun en presence de race conditions ?"
      - "Pattern : data immutability vs structure mutability dans les architectures distribuees ?"

  - id: "PG-H2S11-036"
    nom: "Principe de Bootstrap Multi-Phase (Z\"A vs Build One-Shot AVI)"
    source_assertions: ["EC-H2S11-187", "EC-H2S11-188"]
    formalisation: |
      ARCHITECTURE BOOTSTRAP DIFFERENCIEE :
      AVI + A"A : tikkun BE-FA'AM AHAT (one-shot, instantane).
      Z"A :
        Phase 1 : 6 chalakim VK tikkun en 9 MOIS d'IBUR + YENIKAH.
        Phase 2 : 3 chalakim G"R viennent en TOSEFET (Mohin) — Ibur 2.
      NUKVAH : 9 chalakim tahtonim en TOSEFET LEVAD en RAGA EHAD (un instant).
      → Pattern fondamental : 3 modes de bootstrap selon la complexite :
        Build one-shot (composants pre-formes complets).
        Multi-phase (composants partiels + ajouts ulterieurs).
        Atomic burst (composants entierement instancies en une operation).
      → Architecture : choix du bootstrap = fonction de l'etat initial.
    applications_ia:
      - "partzufim/abba.py + partzufim/imma.py : init() = build one-shot (instantane)"
      - "partzufim/zeir_anpin.py : init() = multi-phase bootstrap (warm-up etape par etape)"
      - "partzufim/nukva.py : init() = atomic burst (raga ehad, instant single)"
      - "Pattern : 3 strategies bootstrap selon la complexite et l'etat initial"
      - "Architecture distribuee : services lourds = warm-up multi-phase ; services legers = burst"
      - "Diagnostic : choisir bootstrap selon le profil (complexite + initialisation)"
    questions_ouvertes:
      - "Y a-t-il des hybrides (mixed strategies) ?"
      - "Comment estimer la duree relative des phases de bootstrap ?"
      - "Pattern : peut-on transformer dynamiquement un service de multi-phase vers atomic burst ?"

  - id: "PG-H2S11-037"
    nom: "Principe de Compression Axiale (3 Kelilan Be-3 + 21 Azkarot)"
    source_assertions: ["EC-H2S11-191", "EC-H2S11-192", "EC-H2S11-193", "EC-H2S11-196"]
    formalisation: |
      ARCHITECTURE DE COMPRESSION DIMENSIONNELLE :
      6 chalakim VK → 3 KAVIM (axes Droite-Gauche-Centre) :
        Chesed kelul Netzach (axe droit).
        Gevurah kelul Hod (axe gauche).
        Tiferet kelul Yesod (axe central).
      = 3 KELILAN BE-3 (compression 6→3).
      Apres 3 yom kelitah : chaque chelek est KELUL de tous les 7.
      RESULTAT LITURGIQUE : tefilin 21 azkarot = 3 axes × 7 sefirot.
      RESULTAT GEOMETRIQUE : RhY guvho 10 (YHVH) × rachvo 4 (=4 lettres) — Tikkunei Zohar 166.
      → Pattern : compression dimensionnelle preserves information (fractale).
      → Architecture : reduction de dimensions = encodage par axes orthogonaux.
    applications_ia:
      - "partzufim/zeir_anpin.py : 6 chalakim → 3 kavim via attribution axiale"
      - "Pattern : reduction PCA/SVD avec preservation de la fractale (chaque kavim contient tout)"
      - "Architecture : compression d'etat avec axes orthogonaux"
      - "Pattern : dimension reduction qui preserve la totalite via inclusion fractale"
      - "Encodage liturgique : 21 azkarot = 3 axes × 7 — pattern reusable pour tags/dimensions"
      - "Diagnostic : verifier que la compression preserve l'inclusion mutuelle (chaque part = tout)"
    questions_ouvertes:
      - "La sequence 6→3 kelilan be-3 → 3y kelitah → 21 azkarot est-elle universelle ?"
      - "Pourquoi 3 axes (droite-gauche-centre) et pas plus ?"
      - "Comment mesurer le degre de compression preservante ?"

  - id: "PG-H2S11-038"
    nom: "Principe RhY/RhR (Unification Cosmique = Espace Prive Halakhique)"
    source_assertions: ["EC-H2S11-189", "EC-H2S11-190", "EC-H2S11-196", "EC-H2S11-197"]
    formalisation: |
      ARCHITECTURE D'UNIFICATION SPATIALE :
      AVANT TIKKUN : Z"A = 6 chalakim NIFRADIN en SOD HA-RH"R (Reshut Harabim,
      domaine public — separation, multiplicite).
      APRES TIKKUN : Z"A = REH"Y (Reshut Hayachid, domaine prive —
      YIHUD VE-AHDUT EHAD = unite et unicite).
      MECANISME : ibur dans Imma rassemble + ohr Imma active.
      RESULTAT : YHVH de MAH (=45) en MILUI ALPHIN MEKUSHERET letter-by-letter.
      → Pattern fondamental : unification cosmique decrite par geometrie spatiale halakhique.
      → Architecture : transitions etat (separe/uni) decrites par spatialite (RhR/RhY).
    applications_ia:
      - "partzufim/zeir_anpin.py : etat = ESTADO_RhR (separe) | ESTADO_RhY (uni)"
      - "[PLANNED] tikkun/ : transition_via_imma_ibur(za) -> za_unified_rhy"
      - "Pattern : etats discrets (separe vs uni) avec transitions par operations definies"
      - "Architecture : geometrie semantique = topologie des etats systeme"
      - "Pattern halakhique applique : analogies entre lois et architecture"
      - "Diagnostic : verifier qu'aucun chemin ne deconstruit RhY en RhR sans tikkun reverse"
    questions_ouvertes:
      - "RhY peut-il regresser en RhR sous certaines conditions ?"
      - "Y a-t-il des etats intermediaires (RhY partiel, RhR partiel) ?"
      - "Le mapping vers Eruvin halakhah a-t-il d'autres analogies architecturales ?"
