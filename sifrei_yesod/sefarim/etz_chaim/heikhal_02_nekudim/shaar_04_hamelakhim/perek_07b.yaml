  # ─── BLOC M : ZA = VAV DANS HE RISHONAH ───

  - id: "EC-H2S11-194"
    source_he: "כי הז' היא נקודת המלכות ואז הז\"א בסוד ו' שבתוך אות ה' ראשונה שהיא אמא והם ו\"ק והמלכות היתה נקודתה בסיום הוא\"ו (נ\"א הו\"ק)"
    source_ref: "Heikhal 2, Sha'ar 4:7"
    assertion: |
      Le 7 = NEKUDAT MALKHUT.
      Z"A est en SOD VAV DANS la lettre HE RISHONAH (= IMMA) — = VK.
      MALKHUT = sa nekudah au SIYUM (fin) du VAV — Variante (Nusah Aher) : "VK".
      → Architecture letter-mysticism : ZA=Vav inside He premier de YHVH ; Malkhut au sif.
      → Pattern : geometrie sacree = inscription des partzufim dans les lettres.
    type: interprétation_lurianique
    concepts:
      - {id: za_vav_dans_he_rishonah_imma, role: za_egal_vav_dans_he_premier_imma}
      - {id: malkhut_nekudah_siyum_vav, role: malkhut_nekudah_au_siyum_vav}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukva", "imma"]
      relevance: "Architecture letter-mysticism. Nusah Aher capture (hu-k)."

  - id: "EC-H2S11-195"
    source_he: "בסוד אושיט פסיעה לבר הנזכר פ' בלק דר\"ג בפסוק אשורנו ולא קרוב כמבואר אצלינו"
    source_ref: "Heikhal 2, Sha'ar 4:7"
    assertion: |
      En SOD "OUSHIT PESI'A LE-VAR" (j'etends un pas dehors) — mentionne dans
      Parashat BALAK daf 203 (Zohar III) sur le verset
      "ASHURENU VE-LO KAROV" (Bemidbar 24:17 — je le verrai mais pas proche).
      → Architecture : Malkhut = pas hors du Vav ; reference Zohar Balak 203.
      → Pattern : Malkhut = excursion mineure du Vav (hors-axe).
    type: déduction_scripturaire
    concepts:
      - {id: oushit_pesia_le_var_balak_203, role: source_oushit_pesia_le_var_zohar_balak_203}
    mapping:
      modules: ["partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukva"]
      relevance: "Architecture : Malkhut = pas hors du Vav. Source Zohar Balak 203."

  # ─── BLOC N : TIKKUNEI ZOHAR 166 — RhY GUVHO 10 RACHVO 4 ───

  - id: "EC-H2S11-196"
    source_he: "ואז נעשה רה\"י כי נעשו כולם יחוד ואחדות אחד וז\"ס שאמרו בתיקונים קס\"ו רה\"י גבהו עשרה דאינון יו\"ד ה\"א וא\"ו ה\"א ורחבו ד' יהו\"ה"
    source_ref: "Heikhal 2, Sha'ar 4:7"
    assertion: |
      Et alors devient RH"Y — tous deviennent YIHUD VE-AHDUT EHAD (union et unite).
      C'est le SOD enseigne dans TIKKUNEI ZOHAR 166 :
        "RH"Y GUVHO ASARAH" (RhY hauteur 10) = YOD-HE-VAV-HE (YHVH=10).
        "RACHVO DALET" (largeur 4) = YHVH (= 4 lettres).
      → Architecture : RhY a 10 hauteur (YHVH) + 4 largeur = totalite spatiale du Nom divin.
      → Pattern : geometric of holiness = topologie du Nom divin.
      → Source : Tikkunei Zohar 166.
    type: déduction_scripturaire
    concepts:
      - {id: rhy_guvho_10_rachvo_4_tikkunei_166, role: rhy_geometrie_yhvh_tikkunei_zohar_166}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Architecture : RhY = topologie du Nom divin. Source Tikkunei Zohar 166."

  - id: "EC-H2S11-197"
    source_he: "פי' כי נודע דהוי\"ה דמ\"ה דמלוי אלפין הוא בז\"א אשר המלכים הו' שלו נתחברו יחד ונתקנו ונתקשרו ונעשה מהם בחי' הוי\"ה זו דאלפין מקושרת אות באות יחד בשם א' יחיד ומיוחד ונקרא רה\"י"
    source_ref: "Heikhal 2, Sha'ar 4:7"
    assertion: |
      EXPLICATION : YHVH de MAH (=45) en MILUI ALPHIN (rempli avec aleph) = en Z"A.
      Les 6 MELAKHIM se sont CONNECTES YACHAD, TIKKUN-ES, KESHARIM (lies).
      Devenus la behinah de cette HAVAYAH d'ALPHIN MEKUSHERET (liee) lettre a
      lettre ENSEMBLE en SHEM EHAD YACHID U-MEYUHAD (un nom unique et unifie).
      Appele RH"Y.
      → Architecture : ZA post-tikkun = YHVH de MaH unique ; melakhim relinked.
      → Pattern : restoration spirituelle = lettres reliees en nom unique.
      cf. EC-H2S11-149 (perek 06d) sur Hadar = T"T+M survit.
    type: interprétation_lurianique
    concepts:
      - {id: yhvh_mah_alphin_egal_za, role: yhvh_de_mah_milui_alphin_egal_za}
      - {id: melakhim_relinked_yhvh_unique, role: 6_melakhim_relinked_en_yhvh_unique}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Architecture : ZA post-tikkun = YHVH MaH unique. Pattern restoration via lettres reliees."


