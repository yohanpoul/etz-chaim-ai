  - id: "PG-H2S11-031"
    nom: "Principe de Yibum (Continuite Spirituelle Inter-Fraternelle)"
    source_assertions: ["EC-H2S11-166", "EC-H2S11-167"]
    formalisation: |
      ARCHITECTURE DE CONTINUITE SPIRITUELLE :
      PRINCIPE : faire d'elle un keli laisse un ROUACH residuel.
      Si le frere meurt avant que le rouach soit absorbe :
      Le YAVAM HAI (levir vivant) execute YIBUM avec 3 HAKHANOT :
        ALEF : ROUACH SHEVIK BE-GAVAH (rouach laisse en elle).
        BET : TIPAT AHIV (semence du frere — proche genetiquement).
        GIMEL : KAVANAT YIBUM (intention d'amener nshamah du frere mort).
      Source : "IM YASIM ALAV LIBO" + "RUCHO VE-NISHMATO ALAV YE'ESOF" (Iyov 34:14).
      Le yavam RECOLTE rouach + nshamah du mort sur lui.
      → Pattern : continuite spirituelle requiert recombinaison multi-element.
      → Architecture : 3 elements convergents (residuel + genetic + kavanah) = continuite.
    applications_ia:
      - "[PLANNED] tikkun/yibum.py : recombinaison etat residuel + similar-state + intent"
      - "Pattern : continuite de service apres failure d'instance via 3 elements (memory + similar-instance + intent)"
      - "Architecture distribuee : graceful failover requiert (residual state + sibling state + restoration intent)"
      - "Pattern : la continuite n'est pas reduite a une seule dimension"
      - "Diagnostic : verifier que les 3 elements sont presents pour une recombinaison legitime"
    questions_ouvertes:
      - "Y a-t-il d'autres formes de continuite spirituelle au-dela du yibum ?"
      - "Le mecanisme yibum a-t-il un equivalent en architecture de checkpointing ?"
      - "Comment formaliser la kavanah (intent) comme element architectural ?"
