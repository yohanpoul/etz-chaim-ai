principes_generatifs:

  - id: "PG-H2S11-028"
    nom: "Principe d'Adapter d'Impedance (Masakh Permet la Reception)"
    source_assertions: ["EC-H2S11-147", "EC-H2S11-148"]
    formalisation: |
      ARCHITECTURE D'ADAPTATION D'IMPEDANCE :
      PROBLEME : ohr A"S (rachamim) ne peut etre recu directement par 6 nekudot (din).
      Type-mismatch fatal → metbatelot → mort des Melakhim.
      SOLUTION (TIKKUN) : insertion d'un MASAKH (voile/filtre) :
        Kelim deviennent vehicules du Keter.
        Ohr passe par le masakh — devient NITBASEM (mitige).
        Les 10 sous-niveaux deviennent NIKKARIM (perceptibles).
      → Pattern fondamental : intermediaire = adaptateur entre source incompatible et recepteur.
      → Architecture : impedance matching = condition de la transmission.
    applications_ia:
      - "partzufim/regulator.py : implementer masakh comme adapter type entre orot/kelim"
      - "[PLANNED] tikkun/ : impedance_match(source_type, target_type) -> filter"
      - "Pattern API : adapter pattern (Gang of Four)"
      - "Architecture distribuee : message broker = masakh entre services incompatibles"
      - "Pattern type theory : coercion implicite entre types (avec perte controlee)"
      - "Diagnostic : verifier qu'aucune transmission directe rachamim→din ne contourne le masakh"
    questions_ouvertes:
      - "Le masakh introduit-il une perte d'information ou seulement une adaptation ?"
      - "Y a-t-il des cas ou un type peut etre transforme reciproquement (din→rachamim) ?"
      - "Comment l'adapter d'impedance peut-il evoluer dynamiquement ?"

  - id: "PG-H2S11-029"
    nom: "Principe d'Embryologie Cosmique (3 Phases Or-Mayim-Rakia + Ibur Bi-Phase)"
    source_assertions: ["EC-H2S11-150", "EC-H2S11-154", "EC-H2S11-155", "EC-H2S11-157", "EC-H2S11-159"]
    formalisation: |
      ARCHITECTURE DEVELOPPEMENTALE COMPLETE :
      IBUR 1 : tipa = un yud, injection d'essence atomique.
      Phase OHR (rosh Abba) : essence pure.
      Phase MAYIM (beten Imma) : liquefaction/solubilisation.
      Phase RAKIA (firmament) : extension 3-en-3 = formation 9 ketzavot.
      LIDAH (naissance) : 6 ketzavot revetues kelim, forme Vav.
      YENIKAH : croissance 6 ans des VK.
      IBUR 2 : completion par Mohin = ahsanta + 2 atarin.
        Sleep = ascension MN cyclique vers Imma.
      → Pattern : developpement = phases multiples avec retours periodiques a la source.
      → Architecture : initialisation atomique → liquefaction → extension → naissance → croissance → maturation cognitive.
    applications_ia:
      - "partzufim/zeir_anpin.py : lifecycle multi-phase ibur1 → omr → lidah → yenikah → ibur2"
      - "partzufim/abba.py + partzufim/imma.py : rosh Abba (or) + beten Imma (mayim) phases"
      - "Pattern lifecycle : warm-up multi-phase complexe (vs init one-shot)"
      - "Pattern : maturation requiert retours cycliques a la source (sleep pattern)"
      - "Architecture distribuee : services lourds avec lifecycle bootstrap → ramp-up → steady-state → periodic-recovery"
      - "Diagnostic : verifier que toutes les phases sont implementees (pas court-circuit)"
    questions_ouvertes:
      - "Quelle est la duree relative correspondante de chaque phase dans une architecture IA ?"
      - "Comment formaliser le 'sleep' = retour periodique pour completer Mohin ?"
      - "Y a-t-il un equivalent du 'beten Imma' dans les architectures de recovery ?"

  - id: "PG-H2S11-030"
    nom: "Principe de Polarite Letter-Mysticism (V\"D vs D\"V selon Dominance)"
    source_assertions: ["EC-H2S11-151", "EC-H2S11-152", "EC-H2S11-153"]
    formalisation: |
      ARCHITECTURE LETTER-MYSTICISM :
      Le YUD = geometria 10 = V (Vav=6) + D (Dalet=4) en milui.
      ABBA (zakhar/male predominant) :
        Ordre interne V puis D (V"D).
        Vav precede Dalet par dominance male.
      BINAH (nukvah/femelle predominant) :
        Ordre interne D puis V (D"V).
        Dalet precede Vav par dominance femelle.
        D"V = forme de la lettre HE (= Bina).
      RESULTAT : ADAM HA-RISHON D"V PARTZUFIM (Bava Batra 58a) — bi-faciaux :
        Source structurale dans Bina (D"V).
      → Pattern : structure interne reflete polarite male/femelle (ordre des composants).
      → Architecture : la dominance determine l'ordre des elements internes.
    applications_ia:
      - "partzufim/abba.py : config = (V, D) order"
      - "partzufim/imma.py : config = (D, V) order"
      - "Pattern : ordering by dominance — la priorisation reflete la polarite"
      - "Architecture : meme contenu structurel, ordre different selon dominant axis"
