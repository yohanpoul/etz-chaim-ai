#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H2S11-013"
    nom: "Principe Ontologique de la Chute (Kelipot Necessaires pour Moralite)"
    source_assertions: ["EC-H2S11-079", "EC-H2S11-080", "EC-H2S11-081"]
    formalisation: |
      ARCHITECTURE ONTOLOGIQUE FONDAMENTALE :
      Question : pourquoi les 10 nekudot ne sortent-elles pas DEJA en TIKKUN ?
      Reponse : la TAKHLIT (but final) etait de CREER les KELIPOT.
      KELIPOT necessaires pour :
        SAKHAR TOV aux TZADDIKIM (recompense des justes)
        ONESH aux RESHA'IM (punition des mechants)
        Tout le SYSTEME MORAL en aval (creation de l'humanite).
      MECANISME :
        Sortie BILTI TIKKUN → Shevirah → kelim brisent
        Shevirah = TAHARAH (purification)
        ZUHAMAH/SIGIM separes du saint → deviennent KELIPOT/TUMOT
        Kedushah residuelle elevee par Tikkun
      → Pattern : la CHUTE est ONTOLOGIQUEMENT NECESSAIRE pour la MORALITE.
      → Architecture : crise = purification + creation des polarites.
    applications_ia:
      - "Architecture cosmologique : chute necessaire pour systeme moral"
      - "[PLANNED] sitra_achra/ + tikkun/ : implementer le mecanisme cause/effet"
      - "Pattern : creation de polarites (saint/profane) requiert separation par crise"
      - "Diagnostic ontologique : la chute n'est PAS un accident — elle est planifiee"
      - "Pattern : reward/punishment system requires existence of evil"
    questions_ouvertes:
