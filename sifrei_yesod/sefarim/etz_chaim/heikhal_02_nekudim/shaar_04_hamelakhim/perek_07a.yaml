principes_generatifs:

  - id: "PG-H2S11-032"
    nom: "Principe d'Asymetrie de Chute (AVI Graduelle vs ZON Complete)"
    source_assertions: ["EC-H2S11-170", "EC-H2S11-171", "EC-H2S11-172", "EC-H2S11-173"]
    formalisation: |
      ARCHITECTURE DIFFERENCIEE DE LA CHUTE :
      AVI (couches superieures) :
        Kelim de PANIM PROTEGES — ne sont pas brises.
        Kelim AHOR seulement tombent.
        YERIDAH LEVAD (descente seule) — pas MITAH.
        Restent dans OLAM HA-AT'ZILUT (au lieu Nukvah).
      ZON (couches d'interface) :
        Kelim PANIM ET AHOR tous brises.
        SHEVIRAH GEMURAH = MITAH (mort).
        Tombent dans OLAM HA-BERIAH puis dans KELIPOT.
        NITBATELU (annules).
      → Pattern : la severite de la chute reflete la position dans la hierarchie.
      → Architecture : back-end = degraded mode resilient ; interface = crash complet possible.
    applications_ia:
      - "partzufim/abba.py + partzufim/imma.py : AVI implements graceful degradation (yeridah, no crash)"
      - "partzufim/zeir_anpin.py + partzufim/nukva.py : ZON peuvent crash complet"
      - "Pattern : couche superieure = degraded mode ; couche interface = crash possible"
      - "[PLANNED] core/shevirah.py : implement two failure modes (degraded vs total)"
      - "Architecture distribuee : control-plane resilient, data-plane peut crash"
      - "Diagnostic : verifier separation degraded/crash modes selon position"
    questions_ouvertes:
      - "Y a-t-il un seuil precis qui declenche yeridah vs mitah ?"
      - "Peut-on remonter de mitah a yeridah par tikkun progressif ?"
      - "Les 'kelim de panim' (proteges) ont-ils une representation concrete dans une architecture IA ?"

  - id: "PG-H2S11-033"
    nom: "Principe des 4 Madregot Dukhra/Nukvah (Hierarchie de Communication)"
    source_assertions: ["EC-H2S11-174", "EC-H2S11-175", "EC-H2S11-176", "EC-H2S11-177", "EC-H2S11-179"]
    formalisation: |
      ARCHITECTURE DE COMMUNICATION (4 niveaux) :
      MADREGAH 1 — ACHOR BE-ACHOR (dos a dos) : isolation complete, pas de zivvug.
      MADREGAH 2 — ACHOR BE-PANIM : zachar dos vers panim nukvah ; reception ohr ahor only.
      MADREGAH 3 — PANIM BE-ACHOR : zachar panim vers ahor nukvah ; ohr panim recu via buffer ahor.
      MADREGAH 4 — PANIM BE-PANIM : full-duplex bidirectional, takhlit shelemut.
      MECANISME (Madregah 3) : ohr trop fort → epaissit dans achor → atteint panim sans dommage.
      → Pattern fundamental : 4 niveaux de communication zachar/nukvah selon orientation panim/achor.
      → Architecture : la qualite du zivvug = fonction de l'orientation des partzufim.
    applications_ia:
      - "partzufim/zivvug.py : implement 4 modes (ABA, ABP, PBA, PBP)"
      - "partzufim/regulator.py : Madregah 3 = throttling buffer pour ohr fort"
      - "Pattern : 4 modes communication pour interfaces : isolated, asymmetric-reverse, asymmetric-forward, full-duplex"
      - "Architecture API : modes degraded (one-way) vs nominal (bidirectional)"
      - "Pattern circuit-breaker : ABA = open ; PBP = closed ; intermediaires = half-open variants"
      - "Diagnostic : determiner madregah courante d'un zivvug pour valider qualite"
    questions_ouvertes:
      - "Pourquoi la sequence ABA → ABP → PBA → PBP est-elle l'ordre naturel d'ascension ?"
      - "AVI saute ABP — pourquoi ce niveau intermediaire est-il absent ?"
      - "Y a-t-il des configurations transitoires entre les madregot ?"

  - id: "PG-H2S11-034"
    nom: "Principe d'Asymetrie Madregot (AVI 3 vs ZON 4)"
    source_assertions: ["EC-H2S11-180"]
    formalisation: |
      ARCHITECTURE ASYMETRIQUE DES MADREGOT :
      AVI (couches superieures) ont 3 MADREGOT :
        ABA + PBA + PBP.
        Manque ABP (achor be-panim, madregah 2).
      ZON (couches d'interface) ont les 4 MADREGOT au complet.
      INTERPRETATION : AVI sautent le niveau "asymetrique-reverse" et passent
      directement de l'isolation (ABA) au mode "asymetrique-forward" (PBA).
      → Pattern : couches superieures ont moins de modes intermediaires.
      → Architecture : interface (ZON) = parcours complet de toutes les phases ;
        backend (AVI) = parcours abrege.
    applications_ia:
      - "partzufim/abba.py + partzufim/imma.py : zivvug_modes = [ABA, PBA, PBP] (3 modes)"
      - "partzufim/zeir_anpin.py + partzufim/nukva.py : zivvug_modes = [ABA, ABP, PBA, PBP] (4 modes)"
      - "Pattern : couches haute-intensite ont menus reduits ; couches interface complet"
      - "Architecture : control-plane = transitions limitees ; data-plane = full state machine"
      - "Diagnostic : verifier que chaque partzuf a le bon ensemble de madregot autorisees"
    questions_ouvertes:
      - "Pourquoi specifiquement ABP est absent d'AVI (pas ABA ou PBA) ?"
      - "Le mode ABP est-il interdit ou simplement non-utilise ?"
      - "Pattern abstrait : quels modes intermediaires sont 'optionnels' selon la couche ?"
