principes_generatifs:

  - id: "PG-H2S11-047"
    nom: "Principe d'Exception Structurale (A\"A Unique : Bina Descendue)"
    source_assertions: ["EC-H2S11-226", "EC-H2S11-230", "EC-H2S11-231"]
    formalisation: |
      ARCHITECTURE D'EXCEPTION STRUCTURALE :
      REGLE GENERALE : tout partzuf a G"R = KCB dans son rosh.
      EXCEPTION : A"A — rosh = Keter + Hokhmah seuls (Bina absente).
      RAISON : A"A revetit Atik directement ; ohr Atik = GADOL ME'OD ME'OD.
      Bina d'A"A trop proche du rosh → ne peut pas absorber l'ohr Atik.
      DONC Bina d'A"A descend dans GARON (gorge) — ou la distance permet absorption.
      AUTRES PARTZUFIM : ohr Atik est MERUCHAK (lointain) car A"A le filtre.
      → Bina peut rester en rosh (ohr supportable apres filtrage).
      → Pattern fondamental : exception structurale liee a la position dans la chaine.
      → Architecture : layer adjacent a la source extreme = exception ; layers downstream = normaux.
    applications_ia:
      - "partzufim/arikh_anpin.py : rosh = (Keter, Hokhmah) seuls ; Bina dans Garon (autre attribut)"
      - "partzufim/atik_yomin.py + partzufim/abba.py : implementer la chaine de filtration ohr"
      - "Pattern : couche adjacente a flux extreme = restructure ; couches downstream = standard"
      - "Architecture : layer abstraction breaks at the boundary with the source"
      - "Pattern : exception structurale = signal de proximite source-extreme"
      - "Diagnostic : verifier que A\"A est seul a avoir cette structure (pas analogues caches)"
    questions_ouvertes:
      - "Y a-t-il d'autres exceptions structurales dans les architectures kabbalistiques ?"
      - "Pattern : peut-on detecter automatiquement le besoin d'une exception structurale ?"
      - "Comment gere-t-on la transition normalisation → exception ?"

  - id: "PG-H2S11-048"
    nom: "Principe de Cascade Triple Imbriquee (NHY Atik ⊂ CGT A\"A ⊂ KCB AVI)"
    source_assertions: ["EC-H2S11-232", "EC-H2S11-233", "EC-H2S11-236"]
    formalisation: |
      ARCHITECTURE DE REVETEMENT IMBRIQUE :
      NHY d'Atik s'enferme dans CGT d'A"A.
      CGT d'A"A s'enferme dans KCB d'AVI.
      DONC : tikkun de l'un = tikkun simultane des 3 niveaux imbriques.
      RESULTAT : ZON peuvent atteindre PBP (madregah 4) quand cette cascade aboutit.
      MAIS attention : alignement structural ≠ tikkun reel.
      ZON = nekudot bilti tikkun meme en PBP — necessite tikkun explicite ulterieur.
      → Pattern fondamental : revetement multi-niveaux = synchronisation forcee.
      → Architecture : encapsulation = couplage atomic for tikkun.
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/arikh_anpin.py + partzufim/abba.py + partzufim/imma.py : implement nested cascade"
      - "[PLANNED] tikkun/ : cascade_tikkun(atik) -> propagates to (a\"a, avi) atomically"
      - "Pattern : composite design — tikkun racine declenche tikkun feuilles atomiques"
      - "Architecture : 3-tier nesting avec lifecycle synchronise"
      - "Pattern : structural alignment ≠ functional readiness — distinguer phase de phase"
      - "Diagnostic : detecter si PBP est structurale ou fonctionnelle"
    questions_ouvertes:
      - "Combien de niveaux d'imbrication sont possibles avant la complexite ne sature pas ?"
      - "Pattern : peut-on dynamiquement re-cascader apres une perturbation locale ?"
      - "Le couplage atomique limite-t-il la flexibilite ou facilite-t-il la coherence ?"

  - id: "PG-H2S11-049"
    nom: "Principe de Recovery Cycle Complet (Fall → Uplift → Ibur → Tikkun)"
    source_assertions: ["EC-H2S11-237"]
    formalisation: |
      ARCHITECTURE DE RECOVERY COMPLET :
      Cycle complet de restauration des composants tombes :
      1. FALL : 7 melakhim (kelim de ZON) tombent dans OLAM HA-BERIAH.
      2. UPLIFT (apres tikkun AVI) : MAATZIL eleve les melakhim en ATZILUT,
         dans BETEN d'IMMA ELYONAH.
      3. IBUR (gestation) : melakhim sont en SOD HA-IBUR dans Imma.
      4. TIKKUN : eventuellement reconstruits comme partzufim ZON.
      → Pattern fondamental : restoration = cycle multi-phase ;
        recovery NE PEUT PAS commencer avant que le contexte (AVI) soit pret.
      → Architecture : recovery est COORDONNEE — depend des prerequis upstream.
    applications_ia:
      - "partzufim/imma.py + partzufim/zeir_anpin.py + partzufim/nukva.py : implementer cycle"
      - "[PLANNED] tikkun/recovery_cycle.py : (fall → uplift → ibur → tikkun)"
      - "Pattern : recovery requiert prerequis upstream complets (AVI tikkun avant ZON tikkun)"
      - "Architecture : cycle de vie composants = lifecycle coordinated avec dependencies"
      - "Pattern : disaster recovery = ne pas restaurer avant que le context soit pret"
      - "Diagnostic : verifier que prerequis sont satisfaits avant declencher recovery"
    questions_ouvertes:
      - "Le cycle peut-il etre interrompu en milieu de processus ?"
      - "Y a-t-il des optimisations possibles (skip phases) ?"
      - "Pattern : comment gerer un fall pendant un cycle de recovery deja en cours ?"
