# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 2 — Heikhal Nekudim (היכל נקודים)
# Sha'ar: 4 — Sha'ar Ha-Melakhim (שער המלכים)
# Perek: 4 — Levush Atik dans A"A, dadim (seins), Atikei mi-Shadayim
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §4 :
#   - Bloc A : Rosh Atik decouvert ; A"A habille seulement de ZT Atik en bas
#   - Bloc B : CGT Atik dans KHB d'A"A
#   - Bloc C : Distribution Netzach/Hod/Yesod/Malkhut Atik dans A"A
#   - Bloc D : Pereks NH inferieurs Atik combines en Malkhut → 2 dadim de A"A
#   - Bloc E : Atikei mi-Shadayim, Hadar ben Bedad
#   - Bloc F : Melakhim morts gardent koach pour techiyat ha-metim (RPaH ressuscite)
#   - Bloc G : Analogie corporelle : levush du Lev (coeur)
#   - Bloc H : Addendum mi-haHaverim — bina ne pouvait recevoir, sortie 7 melakhim simul
#   - Bloc I : Tikkun par devenir partzuf, A"A 13 TD, Abba 8 TD (Zekan Aharon)
#   - Bloc J : Naissance Mohin par tipot
#
# Source Sefaria : Sefer_Etz_Chaim.11.4
# IDs : EC-H2S11-059 → EC-H2S11-073

