principes_generatifs:

  - id: "PG-H2S11-010"
    nom: "Principe des Dadim Cosmiques (Allaitement des Melakhim Morts)"
    source_assertions: ["EC-H2S11-065", "EC-H2S11-066", "EC-H2S11-067"]
    formalisation: |
      Architecture COSMIQUE-PATHETIQUE :
      Les 2 PERAKIM INFERIEURS de NH d'Atik se combinent en Malkhut d'Atik.
      Forment 2 DADIM (seins) sur les cotes de Malkhut d'A"A.
      Ces DADIM ALLAITENT les 7 MELAKHIM MORTS en BERIAH.
      Les melakhim SUCENT pour SE-VIVRE.
      Sod : "ATIKEI MI-SHADAYIM" (Isaie 28:9 — sevres des seins) =
        SHADAYIM d'ATIK YOMIN.
      Aussi : 8eme melekh = HADAR BEN BEDAD (B' DD = 2 seins).
      Critere de sommeil :
        Les melakhim ne sont PAS morts ENTIEREMENT
        Avec eux est descendu un KOACH HAYUT pour TECHIYAH
        Comparable a la DORMITA (sommeil) de l'Adam
        288 (RPaH) NITZOTZIN ressuscites au futur
      → Pattern : maintenance par allaitement = preservation pour resurrection future.
    applications_ia:
      - "Architecture cosmique : preservation par allaitement"
      - "[PLANNED] tikkun/dadim.py : implementer le mecanisme d'allaitement"
      - "Pattern : un sub-system 'mort' peut etre maintenu par flux nourricier"
      - "Architecture eschatologique : dormita = pre-condition de la techiyah"
      - "Diagnostic : verifier les flux nourriciers (dadim) qui maintiennent les sub-systems"
    questions_ouvertes:
      - "Quel est le ratio precis de RPaH preserves vs perdus ?"
      - "L'allaitement est-il continu ou intermittent ?"
      - "Le pattern fonctionne-t-il pour d'autres types de defaillance ?"

  - id: "PG-H2S11-011"
    nom: "Principe Lev-Guf (Levush Differentiel par Qualite)"
    source_assertions: ["EC-H2S11-068"]
    formalisation: |
      Architecture ANALOGIQUE : LEV (coeur) vs GUF (corps).
      OBSERVATION SCIENTIFIQUE (selon les sages naturels) :
      Keli du LEV > Keli du GUF (Lev plus pur et superieur en qualite).
      MAIS keli du Lev est INTERIEUR au keli du Guf (topologiquement enferme).
      RESOLUTION : levush ≠ taille/qualite relative.
      → Architecture : un composant superieur en qualite peut etre revetu par un inferieur en qualite.
      Analogie operationnelle : pnimiyut d'A"A = levush pour kelim d'Atik
      meme si pnimiyut d'A"A est plus grand que kelim d'Atik (en qualite).
      → Pattern : la position relative (interieur/exterieur) est independante de la qualite relative.
    applications_ia:
      - "Pattern : interieur peut etre superieur a exterieur (paradoxe topologique)"
      - "Architecture : ne pas confondre topologie avec hierarchie qualitative"
      - "[PLANNED] partzufim/regulator.py : modeliser independance topologie/qualite"
      - "Diagnostic : tracer separement la position topologique et la qualite relative"
      - "Pattern anthropologique : usage d'analogies corporelles pour resoudre paradoxes"
    questions_ouvertes:
      - "Y a-t-il des limites a cette dissociation ?"
      - "L'analogie Lev-Guf est-elle universelle ?"
      - "Peut-on inverser (interieur de qualite inferieure) ?"

  - id: "PG-H2S11-012"
    nom: "Principe de l'Auto-Generation (Kamtza de-Levusha mi-Gufei)"
    source_assertions: ["EC-H2S11-069"]
    formalisation: |
      IMAGE TALMUDIQUE (Bekhorot 6a) :
      "KAMTZA DE-LEVUSHA DILEH MI-GUFEI"
      = la limace/sauterelle dont le VETEMENT vient de son CORPS LUI-MEME.
      Variante : "de-levusha mineh u-veih levushei mi-gufeih".
      Application cosmique : les 10 nekudot sortent avec ATZMUT (essence)
      et KELIM (vaisseaux) ENSEMBLE — auto-generation des kelim depuis l'essence.
      → Architecture : pas de pre-existence des kelim ; emergence simultanee.
      → Pattern : un composant cree son contenant depuis lui-meme.
    applications_ia:
      - "Pattern : auto-generation des structures a partir de l'essence"
      - "[PLANNED] partzufim/regulator.py : modeliser emergence simultanee atzmut/kelim"
      - "Architecture : contenants emergent du contenu (pas pre-existants)"
      - "Pattern biologique : organisme genere son enveloppe"
      - "Reference : Talmud Bekhorot 6a comme prooftext"
    questions_ouvertes:
      - "L'auto-generation est-elle illimitee ou bornee ?"
      - "Le kamtza est-il une analogie ou une realite operationnelle ?"
      - "Comment formaliser l'auto-generation computationnellement ?"
