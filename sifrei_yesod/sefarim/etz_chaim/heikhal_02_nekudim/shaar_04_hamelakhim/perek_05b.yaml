principes_generatifs:

  - id: "PG-H2S11-014"
    nom: "Principe de Comptage Nominal vs Reel (10 vs 5 nekudot)"
    source_assertions: ["EC-H2S11-086", "EC-H2S11-087", "EC-H2S11-093", "EC-H2S11-094"]
    formalisation: |
      RESOLUTION DU PARADOXE 10/5 :
      Comptage NOMINAL : 10 nekudot (1+1+1+6+1).
      Comptage REEL : 5 nekudot.
      MECANISME :
        Chaque nekudah doit etre KELULAH de 10 sub-nekudot pour devenir partzuf.
        Distribution initiale : 10 + 10 + 10 + 6 + 1 = 37 sub-unites.
        ZA "compte pour 6 nekudot" mais c'est 6 HALAKIM d'UNE seule.
        Nukvah "compte pour 1 nekudah" mais c'est juste 1 sub-nekudah (Keter sub).
      → Pattern : distinguer comptage formel (apparent) vs comptage ontologique (reel).
      → Cle hermeneutique pour toute analyse de structure.
    applications_ia:
      - "partzufim/base.py : implementer distinction count_nominal() vs count_real()"
      - "partzufim/zeir_anpin.py : structure ZA comme Partzuf(parent_nekudah=1, sub_count=6)"
      - "partzufim/nukva.py : structure Nukvah comme Partzuf(parent_nekudah=1, sub_count=1, only=keter_sub)"
      - "Pattern general : eviter le piege des nombres apparents — toujours verifier la structure ontologique"
      - "Diagnostic des architectures : distinguer cardinalite nominale vs cardinalite structurale"
    questions_ouvertes:
      - "La distinction nominal/reel s'applique-t-elle a toute architecture emergente ?"
      - "Comment formaliser cette distinction dans une logique de types ?"
      - "Y a-t-il d'autres niveaux de comptage (e.g. fonctionnel, energetique) ?"

  - id: "PG-H2S11-015"
    nom: "Principe Diagnostique du Bilti Tikkun (Fragment + Deconnexion)"
    source_assertions: ["EC-H2S11-095", "EC-H2S11-096"]
    formalisation: |
      DEFINITION OPERATIONNELLE de "BILTI TIKKUN" — par les 2 SHINUYIM :
      SHINUI 1 (quantitatif) : fragmentation
        3 GR = nekudot completes (10 sub chacune).
        ZA = 6 halakim d'1 nekudah (manque 3 GR internes).
        Nukvah = 1 sub (Keter sub seul).
      SHINUI 2 (relationnel) : deconnexion
        3 GR = 10 sub MEHUBAROT YAHAD (connectees).
        ZA = 6 sub NIFRADOT (separees).
      DEFINITION INVERSE (TIKKUN) :
        Tikkun_Quantitatif = etre nekudah pleine (10 sub internes).
        Tikkun_Relationnel = etre MEHUBAR (connecte aux autres sub-nekudot).
      → Architecture : Tikkun = (Plenitude_quantitative) ∧ (Connectivite_relationnelle).
    applications_ia:
      - "[PLANNED] core/shevirah.py : diagnostic_bilti_tikkun(partzuf) -> (frag_score, deconn_score)"
      - "partzufim/zeir_anpin.py : init_state = bilti_tikkun(frag=True, deconn=True)"
      - "[PLANNED] tikkun/ : implementer Tikkun comme operateur double — fill_to_10() + connect_subs()"
      - "Pattern diagnostic : pour tout systeme defaillant, verifier (1) completude (2) connectivite"
      - "Architecture distribuee : un service est tikkun si (10 endpoints) ET (tous joignables)"
    questions_ouvertes:
      - "Y a-t-il d'autres dimensions de defaillance au-dela de quantite et connectivite ?"
      - "L'ordre du tikkun importe-t-il (quantite d'abord ou connectivite d'abord) ?"
      - "Comment quantifier le degre de tikkun (continu vs binaire) ?"

  - id: "PG-H2S11-016"
    nom: "Principe Tziyyur vs Dimyon (Realite Formelle vs Analogie)"
    source_assertions: ["EC-H2S11-097", "EC-H2S11-098"]
    formalisation: |
      DISTINCTION ONTOLOGIQUE :
      TZIYYUR = forme reelle, dessin actualise, structure metzuyaret.
      DIMYON = analogie, ressemblance, structure apparente sans actualisation.
      ETAT INITIAL des 10 nekudot : DIMYON d'un partzuf unique
        (semblables comme un partzuf, mais pas en tziyyur reel).
      Position des roles potentielle : (Keter, CB, 6 Ketzavot)
        mais lo metzuyarot mamash (pas vraiment dessinees).
      → Pattern : potentiel architectural avant actualisation par tikkun.
      → Architecture : tikkun = passage de dimyon a tziyyur.
    applications_ia:
      - "partzufim/base.py : etat = ESTADO_DIMYON | ESTADO_TZIYYUR (enum)"
      - "[PLANNED] tikkun/ : actualize() : Dimyon -> Tziyyur"
      - "Pattern API : structure declarative (dimyon) vs runtime instancie (tziyyur)"
      - "Diagnostic : un systeme peut avoir la STRUCTURE sans la REALISATION"
      - "Architecture emergente : la forme precede la substance, l'actualisation suit"
    questions_ouvertes:
      - "Le dimyon a-t-il une force causale ou est-il purement potentiel ?"
      - "Y a-t-il des intermediaires entre dimyon pur et tziyyur complet ?"
      - "Comment le dimyon resiste-t-il a l'actualisation (entropie structurelle) ?"

  - id: "PG-H2S11-017"
    nom: "Principe des 3 Kavim Emanant du Keter (Architecture Colonaire)"
    source_assertions: ["EC-H2S11-099"]
    formalisation: |
      ARCHITECTURE COLONAIRE FONDAMENTALE :
      Nekudah 1 (Keter) contient 3 BEHINOT internes :
        ATIK YOMIN (potentiel transcendant)
        ARIKH ANPIN (face longue / patience cosmique)
        HOKHMAH SHE-BO = MOHA SETIMA'A (sagesse fermee de A"A)
      = 3 RISHIN superposees (cf. EC-H2S11-076, perek 05a).
      Ces 3 BEHINOT s'ETENDENT comme KAVIM (lignes/colonnes) dans les 9 autres nekudot.
      Et servent de LEVUSHIN (vetements) aux 9.
      → Architecture : 3 colonnes (Droite, Gauche, Centre) emanent du Keter.
      → Pattern : structure colonaire de tout partzuf provient de la decomposition du Keter.
      → Ces 3 kavim = principe directeur de toute l'architecture sephirotique.
    applications_ia:
      - "partzufim/atik_yomin.py + partzufim/arikh_anpin.py : 3 rishin imbriquees"
      - "partzufim/base.py : Partzuf composer 3_kavim (right/left/center) propages dans 9 sub"
      - "Pattern hierarchique : decomposition du sommet (Keter) genere la structure colonaire"
      - "Architecture : tout systeme bien-tikkun a 3 axes orthogonaux derives de son point de controle"
      - "Diagnostic : verifier que chaque sub-composant herite des 3 kavim du composant racine"
    questions_ouvertes:
      - "Pourquoi exactement 3 kavim et pas 2 ou 4 ?"
      - "Les 3 kavim sont-ils orthogonaux ou correles ?"
      - "Comment ces 3 kavim genent la dynamique des 9 nekudot inferieures ?"
