principes_generatifs:

  - id: "PG-H2S11-007"
    nom: "Principe de l'Architecture Unique d'A\"A (Vertical KHB)"
    source_assertions: ["EC-H2S11-042", "EC-H2S11-043", "EC-H2S11-044", "EC-H2S11-045"]
    formalisation: |
      EXCEPTION ARCHITECTURALE d'A"A vs autres partzufim :
      Autres partzufim : ROSH = SEGOLTA (triangle)
        Keter en haut, Hokhmah-Binah cote a cote en bas
        Daat (3eme moah) en CHaBaD distinct
      A"A : ROSH = KAV AROKH (ligne verticale longue)
        Hokhmah seule SETUMAH dans le ROSH
        Binah dans le GARON (gorge)
        Daat distribue de Chesed a Hod (pas de lieu propre)
      RAISON : Binah ne peut etre en haut a cote de Hokhmah pour recevoir l'OHR
      ATIK qui vient SANS LEVUSH → besoin d'ELOIGNEMENT pour reception.
      → Pattern : eloignement = capacite de reception.
      → Architecture : A"A = exception structurelle pour gerer l'ohr direct d'Atik.
    applications_ia:
      - "Pattern : un sub-system qui recoit directement du superieur a une architecture unique"
      - "Architecture : eloignement permet la reception (vs proximite)"
      - "[PLANNED] partzufim/arikh_anpin.py : modeliser kav arokh vs segolta"
      - "Pattern : exception structurelle pour gerer un cas limite"
      - "Diagnostic : tracer le mode d'organisation (vertical vs triangulaire)"
    questions_ouvertes:
      - "L'architecture A\"A est-elle stable ou se reorganise apres certains stages ?"
      - "Pourquoi la verticale (kav arokh) est-elle plus capable ?"
      - "Y a-t-il d'autres partzufim avec architecture exceptionnelle ?"

  - id: "PG-H2S11-008"
    nom: "Principe de la Distribution Tiers (Sub-Partition Operationnelle)"
    source_assertions: ["EC-H2S11-046", "EC-H2S11-047", "EC-H2S11-048", "EC-H2S11-049", "EC-H2S11-050"]
    formalisation: |
      Architecture quantitative DETAILLEE de la distribution :
      Chaque NEKUDAH est divisee en 3 SHELISHIM (tiers).
      Reglages distribution :
        Chesed (4) : 2 sup → Keter ; 1 inf → composante Hokhmah
        Gevurah (5) : 1 sup → composante Hokhmah ; 2 inf → Binah
        Netzach (7) : 2 sup → Chesed ; 1 inf → Netzach
        Tiferet (6) : 2 sup → Tiferet ; 1 inf → composante Netzach
        Hod (8) : 2 sup → Gevurah ; 1 inf → Hod
        Yesod (9) : 2 sup → Yesod ; 1 inf → composante Hod
        Malkhut (10) : ENTIER → Malkhut (preserve pour usage futur)
      Sods :
        "Netzach descend du Tiferet" (mirror : Yesod descend du Hod)
      → Architecture : sub-partitioning operationnel par tiers + recombinaisons.
    applications_ia:
      - "Pattern : sub-partition par tiers comme operation systematique"
      - "Architecture : recombinaison de fragments pour creer nouveaux composants"
      - "[PLANNED] gematria/engine.py : implementer division par tiers"
      - "Pattern miroir : symetrie droite-gauche dans la distribution"
      - "Diagnostic : tracer l'origine de chaque composant post-Tikkun"
    questions_ouvertes:
      - "Pourquoi precisement 3 tiers et pas 2 ou 4 ?"
      - "Le pattern miroir est-il toujours present ?"
      - "Comment formaliser la recombinaison des shelishim ?"

  - id: "PG-H2S11-009"
    nom: "Principe de la Sequence Cosmique Genealogique (4 Generations)"
    source_assertions: ["EC-H2S11-052", "EC-H2S11-053", "EC-H2S11-054"]
    formalisation: |
      Architecture GENEALOGIQUE COSMIQUE :
      GENERATION 1 : ATIK (seul, androgyne, pas de nukvah separee).
        Malkhut d'Atik = ATARAH seule en lui.
      GENERATION 2 : A"A (sorti d'Atik, androgyne).
        Malkhut d'A"A = ATARAH seule en lui.
      GENERATION 3 : AVI (sortis du COUPLE Atik+A"A) :
        ABBA du cote d'ATIK
        IMMA du cote d'A"A
      GENERATION 4 : ZON (sortis du COUPLE AVI) :
        ZA du cote d'ABBA
        NUKVAH du cote d'IMMA
      → Pattern : androgyne → couples → multiplication par couples.
      → Architecture : multiplication des partzufim par couplage progressif.
    applications_ia:
      - "Pattern genealogique : sub-systems generent par couplage"
      - "Architecture : 4 generations distinctes avec mode different"
      - "[PLANNED] partzufim/* : modeliser la genealogie comme attribut"
      - "Pattern : androgyne (1 entite) → couples (2 entites)"
      - "Diagnostic : identifier la generation cosmique d'un sub-system"
    questions_ouvertes:
      - "Y a-t-il une 5eme generation (post-Mashiah) ?"
      - "Le passage androgyne→couples est-il universel ?"
      - "Atik et A\"A sont-ils 'androgynes' ou 'a-genres' (sans concept de genre) ?"
