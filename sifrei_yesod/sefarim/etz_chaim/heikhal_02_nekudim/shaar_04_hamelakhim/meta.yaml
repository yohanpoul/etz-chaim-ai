sujet_principal: "Explication detaillee des 7 Melakhim morts (rois d'Edom). Les 10 nekudot premieres (avant le Tikkun) en sod Akudim/Nekudim/Berudim. 325 (ShKH) nitzotzin de din. La structure de l'Atik comme Risha de-La (tete inconnue) faite des kelim des 3 GR. Distinction Atzmut/Kelim. Le mode embryologique de la formation des partzufim apres Tikkun. La premiere apparition simultanee dukhra/nukvah dans Hadar+Mehetabel. Sha'ar 04 filesystem = sha'ar 4 original = Sefaria gate 11."
