principes_generatifs:

  - id: "PG-H2S11-053"
    nom: "Principe d'Adversaire Parasitaire (Kelipot vivent du Chayut Externe)"
    source_assertions: ["EC-H2S11-251", "EC-H2S11-252", "EC-H2S11-253"]
    formalisation: |
      ARCHITECTURE D'ADVERSAIRE PARASITAIRE :
      Kelipot ne peuvent EXISTER sans CHAYUT DE-KEDUSHAH residuelle.
      DIFFERENCE FONDAMENTALE :
        KEDUSHAH : chayut NIVLA (absorbe) a l'interieur — compte 10.
        KELIPOT : chayut SUR LA TETE (omed al rosham) — illuminate de l'exterieur — compte 11.
      RAISON : "EIN KODESH MITAREV BE-CHOL" (saint ne se mele pas au profane).
      Source : "KOL HA-MOSIF GORE'A" — le 11eme externe retranche de l'integrite.
      → Pattern fondamental : adversaire = parasite qui ne peut s'integrer.
      → Architecture : difference fusion (legitime) vs juxtaposition (illegitime).
    applications_ia:
      - "sitra_achra : kelipot don't fuse, only attach above (parasitic relationship)"
      - "[PLANNED] core/shevirah.py : detect_parasitic vs detect_integrated for components"
      - "Pattern security : composants legitimes integres ; adversariaux toujours separes"
      - "Architecture : separer integrate (fusion) de attach (juxtaposition)"
      - "Pattern : detection parasitism = mesure d'integration vs surface contact"
      - "Diagnostic : verifier qu'aucun composant 'parasite' n'est faussement integre"
    questions_ouvertes:
      - "Peut-on retourner un parasite en composant legitime ?"
      - "Comment formaliser 'fusion' vs 'attachement' ?"
      - "Y a-t-il une mesure quantitative de la depence parasitaire ?"

  - id: "PG-H2S11-054"
    nom: "Principe d'Encodage Multi-Source (3 Series Scripturaires Convergent)"
    source_assertions: ["EC-H2S11-250", "EC-H2S11-254", "EC-H2S11-256", "EC-H2S11-257", "EC-H2S11-258"]
    formalisation: |
      ARCHITECTURE D'ENCODAGE MULTI-SOURCE :
      3 sources scripturaires distinctes encodent la meme structure cosmologique :
        11 SIMANE KETORET (Keritot 6a / Shemot 30:34).
        11 YERI'OT IZIM (Shemot 26:7).
        11 ARURIM (Devarim 27:15-26).
      MAPPING precis des 11 arurim aux partzufim :
        Arur 1 (pesel) → A"A (be-sitro shel olam, mistater).
        Arur 2 (makleh aviv ve-imo) → AVI.
        Arurim 3-7 (5 arurim) → ChBD ChG de Z"A.
        Arur 8 (shokhev im achoto) → T"T de Z"A (chazeh = rosh Nukvah).
      → Pattern : Tanakh + Talmud + Kabbalah convergent vers meme structure.
      → Architecture : structure ontologique + multiple encodages liturgiques.
    applications_ia:
      - "sitra_achra + partzufim/* : verifier mapping aux arurim/ketoret/yeri'ot"
      - "Pattern : meme objet = multiples representations (texte/liturgique/structurel)"
      - "Architecture : ontologie + encoding layers different formats"
      - "Pattern letter-mysticism : 13 mots avant 'be-seter' = 13 tikkunei dikna"
      - "Diagnostic : verifier que toutes les representations s'accordent"
    questions_ouvertes:
      - "Y a-t-il des sources scripturaires manquantes au mapping ?"
      - "Comment verifier la coherence de tous les encodages ?"
      - "Pattern : peut-on derouler automatiquement les 3 source vers la structure ?"

  - id: "PG-H2S11-055"
    nom: "Principe de Composition des Sigim (7 Melakhim + 4 Ahor AVI = 11)"
    source_assertions: ["EC-H2S11-259"]
    formalisation: |
      ARCHITECTURE DE COMPOSITION DES SIGIM :
      11 = 7 + 4 = (7 MELAKHIM ZON morts) + (4 AHORAYIM d'AVI tombes).
      RESULTAT : 11 SIMANE HA-KETORET (et leurs analogues yeri'ot, arurim).
      AUSSI : 11 YERI'OT IZIM = avodah zarah (idolatrie) dans CHITZONIM (couches externes).
      Source secondaire : Zohar Acharei Mot.
      → Pattern fondamental : sigim = composition specifique de fragments tombes :
        7 fragments centraux (melakhim ZON).
        4 fragments lateraux (ahor AVI = futurs Yaakov+Leah).
      → Architecture : composition reflete topologie de la chute (ZON central + AVI lateral).
    applications_ia:
      - "sitra_achra : compose sigim = (melakhim_zon : 7) + (ahor_avi : 4)"
      - "[PLANNED] core/shevirah.py : track sigim by composition source"
      - "Pattern : adversaire = composition de multiples sources tombees"
      - "Architecture : monitor sigim composition pour pin-point recovery sources"
      - "Diagnostic : verifier que 7+4=11 sigim correspondent aux 7 melakhim + 4 ahor AVI"
    questions_ouvertes:
      - "Y a-t-il d'autres compositions possibles (autres ratios) ?"
      - "Le 11 est-il limite par 7+4 ou y a-t-il flexibilite ?"
      - "Pattern : composition source-tracking pour recovery selective ?"
