principes_generatifs:

  - id: "PG-H2S11-001"
    nom: "Principe Akudim-Nekudim-Berudim (Sequence Cosmique Trinitaire)"
    source_assertions: ["EC-H2S11-003", "EC-H2S11-004", "EC-H2S11-005"]
    formalisation: |
      Architecture COSMOLOGIQUE en 3 ETAPES (Genese 31 — troupeaux de Yaakov) :
      AKUDIM (lies) :
        10 nekudot dans 1 KETER
        Tout LIE zeh be-zeh, mekusharim
        Etat de COMPRESSION primordiale
      NEKUDIM (separes) :
        10 nekudot SEPAREES, chacune be-pnei atzmah
        Etat post-sortie du Keter
        7 inferieures meurent (ZT), 3 GR survivent
      BERUDIM (couples) :
        Apres Tikkun de RISHA d'ATIK
        MAH+BAN unis, polarites couples
        Etat post-Tikkun stable
      → Architecture : compression → fragmentation → re-association.
      → Pattern cosmologique en 3 phases.
    applications_ia:
      - "Pattern : sequence cosmologique en 3 etapes (compression → fragmentation → couplage)"
      - "[PLANNED] olamot.py : modeliser les 3 etats Akudim/Nekudim/Berudim"
      - "Architecture : reference biblique (Genese 31) = encodage cosmique"
      - "Diagnostic : identifier l'etat courant (Akudim/Nekudim/Berudim)"
      - "Pattern de developpement : tout systeme passe par 3 phases"
    questions_ouvertes:
      - "Le pattern 3 phases est-il universel ou specifique ?"
      - "Peut-on regresser de Berudim a Nekudim ?"
      - "Y a-t-il une 4eme phase post-Berudim ?"

  - id: "PG-H2S11-002"
    nom: "Principe des 325 Nitzotzin (Calcul Quantitatif des Etincelles)"
    source_assertions: ["EC-H2S11-007", "EC-H2S11-008"]
    formalisation: |
      ARCHITECTURE QUANTITATIVE des nitzotzin :
      325 NITZOTZIN (= ShKH) = kelim des 7 NEKUDOT INFERIEURES.
      DECOMPOSITION GEMATRIQUE :
        7 × ADAM (= 45) = 315 (= ShTaW)
        + 5G (5 lettres ELOHIM) = 320 (= ShK)
        5G doubles → 325 (= ShKH)
      Les 3 KELIM PREMIERS (GR) ne sont PAS de ces 325.
      Reference : Zohar Pinhas p.258 — "shoreshei dinin" (racines des dinim).
      → Architecture : 325 = unites de mesure des dinim.
      Confirmation cf. EC-H2S9-261 (perek 07b Shevirat).
    applications_ia:
      - "Calculs operationnels : 325 nitzotzin = constante du systeme"
      - "gematria/engine.py : verifier 7×45+5G doubles = 325"
      - "[PLANNED] core/shevirah.py + tikkun/ : tracer recuperation des 325"
      - "Pattern : unites quantitatives de Berur"
      - "Diagnostic : combien des 325 sont recuperes vs piegees"
    questions_ouvertes:
      - "Pourquoi 5G doubles (et pas triples) ?"
      - "La difference 320 (ShaCh) vs 325 (ShKH) est-elle significative ?"
      - "Combien de nitzotzin sont-ils recuperes a chaque cycle de Tikkun ?"

  - id: "PG-H2S11-003"
    nom: "Principe de la Repulsion Laterale (Pas de Mort pour les Orot)"
    source_assertions: ["EC-H2S11-017", "EC-H2S11-018"]
    formalisation: |
      Mecanisme architectural CRUCIAL : REPULSION LATERALE (LE-TZEDADIN).
      Quand les 7 ZT d'Atik (nouveaux) descendent →
        Ils ne POUSSENT PAS les 7 orot originels VERTICALEMENT vers le bas
        (car les orot ne sont pas morts).
      Ils les REPOUSSENT LATERALEMENT (le-tzedadin).
      MECANISME PRECIS :
        La nekudah d'Atik ENTRE DANS la nekudah originelle (en pnimiyut)
        La nekudah originelle reste en LEVUSH (vetement) autour
      RESULTAT : 7 nekudot d'Atik enveloppes par 7 orot originels.
      → Architecture : ce qui est ancien devient externe, ce qui est nouveau devient interne.
      → Pattern d'INVERSION : nouveau-interne / ancien-externe.
    applications_ia:
      - "Pattern : un nouveau composant peut etre encapsule par l'ancien"
      - "[PLANNED] tikkun/ : modeliser la repulsion laterale (pas verticale)"
      - "Architecture : pattern d'inversion noyau/peripherie"
      - "Diagnostic : tracer pour chaque composant son statut (nouveau-pnim vs ancien-levush)"
      - "partzufim/atik_yomin.py : modeliser comme noyau encapsule par originels"
    questions_ouvertes:
      - "Le pattern fonctionne-t-il a tous les niveaux ?"
      - "Peut-on inverser (l'ancien redevient interne) ?"
      - "Le levush ancien limite-t-il l'expression du nouveau ?"
