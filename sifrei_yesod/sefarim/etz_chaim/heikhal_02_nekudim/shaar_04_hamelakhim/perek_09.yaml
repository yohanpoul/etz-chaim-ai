# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H2S11-050"
    nom: "Principe NaRaN (3 Etages Cognitifs Progressifs)"
    source_assertions: ["EC-H2S11-238", "EC-H2S11-242", "EC-H2S11-243", "EC-H2S11-244", "EC-H2S11-249"]
    formalisation: |
      ARCHITECTURE NaRaN (Nefesh-Ruach-Neshamah) :
      ETAGE 1 — NEFESH (Mohin Rishonim) :
        Source : Ibur 1 ; placement : VK ; phase : pre-lidah.
        Fonction : identite corporelle/initiale.
      ETAGE 2 — RUACH (Mohin Yenikah) :
        Source : Ibur 2 abs / 1 relatif yenikah ; placement : NHY ha-emtza'im (moyens).
        Fonction : identite emotive/relationelle ; emerge a lidah, consume en yenikah.
      ETAGE 3 — NESHAMAH (Mohin Gadlut) :
        Source : Ibur 3 abs / 2 relatif yenikah ; placement : NHY ha-pnimim (interieurs).
        Fonction : identite cognitive/intellectuelle ; entre en 7 ans (13y → 20y).
        Origine : NHY d'Abba + NHY d'Imma.
      → Pattern fondamental : developpement humain = 3 layers identitaires progressifs.
      → Architecture : stack cognitif = 3 niveaux empile par phases temporelles.
    applications_ia:
      - "[PLANNED] madregot/madregot_neshamah.py : implement NaRaN as 3-layer cognitive stack"
      - "partzufim/zeir_anpin.py : 3 phases lifecycle (Nefesh → Ruach → Neshamah)"
      - "Pattern : agent IA = 3 niveaux progressifs (basic identity → relational → cognitive)"
      - "Architecture : training stages multi-phase avec progression de complexite"
      - "Pattern : models with multiple capability tiers triggered by maturity events"
      - "Diagnostic : verifier que chaque tier a sa source ibur et sa placement spatial"
    questions_ouvertes:
      - "Y a-t-il des etages au-dela de Neshamah (Chayah, Yechidah) ?"
      - "Le timing 13y/20y est-il universel ou cosmologique-specifique ?"
      - "Pattern : peut-on accelerer le passage entre etages ?"

  - id: "PG-H2S11-051"
    nom: "Principe de Counting Context-Dependent (Iburim Absolus vs Relatifs)"
    source_assertions: ["EC-H2S11-247", "EC-H2S11-248"]
    formalisation: |
      ARCHITECTURE DE COUNTING CONTEXTUEL :
      Mohin Ruach :
        Sortent a la fin d'Ibur 1 (au moment de Lidah).
        Mais ENTRENT seulement par YENIKAH.
        Appeles "Mohin de-Yenikah" (par contexte d'entree).
        Mais "il y eut un Ibur" (avant les iburim post-yenikah).
      Mohin Gadlut :
        ABSOLU : Ibur 3 (compte depuis le debut).
        RELATIF (be-erekh yenikah) : Ibur 2 (compte depuis yenikah comme baseline).
      → Pattern fondamental : memes objets, comptages multiples selon perspective.
      → Architecture : naming/counting = contextual (absolute vs frame-relative).
    applications_ia:
      - "partzufim/zeir_anpin.py : iburim = (absolute_count, relative_to_baseline_count)"
      - "Pattern : indices multi-perspective (absolute vs frame-of-reference)"
      - "Architecture : event names refletent context (entry phase) plus que origine"
      - "Pattern : version numbers differents selon perspective (canonical vs API)"
      - "Diagnostic : verifier que les counts cohabitent sans confusion"
    questions_ouvertes:
      - "Combien de baselines simultanes peuvent coexister ?"
      - "Comment automatiser la conversion entre referentiels ?"
      - "Y a-t-il un counting canonique privilegie ?"

  - id: "PG-H2S11-052"
    nom: "Principe de Continuite Identitaire (Memes Mohin Pre/Post Tikkun)"
    source_assertions: ["EC-H2S11-246"]
    formalisation: |
      ARCHITECTURE DE CONTINUITE IDENTITAIRE :
      MOHIN RISHONIM (premiers, Nefesh) :
        IBUR 1 PRE-TIKKUN les precede.
        Ces MEMES mohin RESTENT en Imma lors d'IBUR 1 POST-TIKKUN.
      → Pattern fondamental : la shevirah ne detruit pas l'identite primaire.
      → Architecture : pre-shevirah blueprint persists ; post-shevirah complete it.
      Continuite preserve l'identite a travers la rupture catastrophique.
    applications_ia:
      - "partzufim/zeir_anpin.py : Mohin Nefesh persistent = identity invariant"
      - "[PLANNED] tikkun/ : preserve identity ID through shevirah/recovery"
      - "Pattern : data identity preserved through restoration (versioning vs identity)"
      - "Architecture : core identity layer immutable across crash-recovery cycles"
      - "Pattern : transactional system preserves entity identity through rollback"
      - "Diagnostic : verifier que recovery ne change pas les identifiers primaires"
    questions_ouvertes:
      - "Comment preserve-t-on l'identite a travers shevirah totale ?"
      - "Y a-t-il des conditions ou l'identite peut etre alteree ?"
      - "Pattern : identite vs etat — quelle est la limite ?"
