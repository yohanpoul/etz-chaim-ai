#                    COUCHE 2 : REMEZ-RELATIONAL
# ═══════════════════════════════════════════════════════════════════

relations:

  - id: "REL-H2S11-093"
    type: causal
    from: za_initial_vk_plus_mohin_nefesh
    to: orots_montent_kelim_descendent
    nature: "ZA initial → shevirah → orots montent (Imma), kelim descendent (Beriah)"
    assertions_source: ["EC-H2S11-238", "EC-H2S11-239"]

  - id: "REL-H2S11-094"
    type: séquentiel
    from: ibur_1_berur_progressif_kelim_dans_imma
    to: lidah_trigger_par_completion_keli_nefesh
    nature: "Ibur 1 berur progressif kelim → completion Keli Nefesh → trigger lidah"
