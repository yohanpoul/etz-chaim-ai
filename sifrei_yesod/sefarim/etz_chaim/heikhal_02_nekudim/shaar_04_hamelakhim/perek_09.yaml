  - id: "REL-H2S11-097"
    type: hiérarchique
    from: mohin_de_nefesh_premier_etage
    to: naran_3_niveaux_identite_cognitive
    nature: "Mohin Nefesh (etage 1) → NaRaN = 3 niveaux progressifs identite cognitive"
