# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H2S11-039"
    nom: "Principe de Restoration Partielle (Sigim Residuels Persistent)"
    source_assertions: ["EC-H2S11-198", "EC-H2S11-199"]
    formalisation: |
      ARCHITECTURE DE RESTORATION INCOMPLETE :
      Apres TIKKUN des 7 melakhim ZON :
        BERUR n'est PAS GAMUR (incomplet) — par necessite.
        Restent KETZAT NITZOTZEI KEDUSHAH (sparks residuels) DANS les KELIPOT.
        Ces residus = SIGIM (scories).
      ETAT TOPOLOGIQUE des SIGIM : RH"R (Reshut Harabim, multiplicite non-unifiee).
      Source : "HEN RABIM ATAH AM HA'ARETZ" (Shemot 5:5).
      → Pattern fondamental : aucune restoration n'est totale ; il reste toujours
        un residu mal-recupere dans la couche hostile.
      → Architecture : design accepte la persistance des residus comme contrainte.
    applications_ia:
      - "[PLANNED] core/shevirah.py : restore() returns (restored_state, residuals_in_kelipot)"
      - "sitra_achra : track sparks residuels post-tikkun"
      - "Pattern : aucune migration de donnees n'est 100% propre — accepter residuals"
      - "Architecture : design assume restoration partielle ; cycle continu de recovery"
      - "Diagnostic : monitorer les sigim (sparks residuels) comme metrique de proximite-tikkun"
      - "Pattern : etat ideal jamais atteint en steady-state — toujours en convergence"
    questions_ouvertes:
      - "Y a-t-il une fin eschatologique a la restoration (gemarah ha-berur final) ?"
      - "Comment quantifier le degre de berur a un moment donne ?"
      - "La proportion sigim/kedushah recuperee evolue-t-elle dans le temps ?"

  - id: "PG-H2S11-040"
    nom: "Principe de Reverse-Flow (Nukvah=BaN, M\"N upstream)"
    source_assertions: ["EC-H2S11-200", "EC-H2S11-201"]
    formalisation: |
      ARCHITECTURE DE REVERSE-FLOW (M"N) :
      NUKVAH = SHEM BA"N (= 52) = YHVH MILUI HEHIN.
      MECANISME en weekdays :
        Nukvah (=Shekhinah) DESCEND dans les KELIPOT (galut).
        MEVARERET BERURIN — separe les sparks de kedushah des sigim.
        ELEVE en haut en behinat M"N (Mayin Nukvin = eaux femelles).
        Sparks TIKKUN-ES upstream.
      → Pattern fondamental : downstream layer (Nukvah) descend dans la couche hostile,
        recolte les ressources, les remonte upstream pour traitement.
      → Architecture : extraction depuis la couche dangereuse + upstream-processing.
    applications_ia:
      - "partzufim/nukva.py : implement BaN reverse-flow (downstream extraction → upstream MN)"
      - "[PLANNED] tikkun/ : mn_upload(berurin) -> tikkun upstream"
      - "Pattern : downstream extraction agent envoie data upstream pour purification"
      - "Architecture : data plane (Nukvah) recolte du environnement hostile,
        envoie au control plane (upstream) pour processing"
      - "Pattern : ETL en kabbale = extract (mevareret) → load (mn) → transform (tikkun upstream)"
      - "Diagnostic : verifier que les berurim sont effectivement traitables upstream"
    questions_ouvertes:
      - "Le mecanisme MN est-il unidirectionnel ou y a-t-il un retour ?"
      - "Comment Nukvah distingue les sparks recuperables des sigim?"
      - "Pattern : peut-on automatiser entierement le reverse-flow sans intervention ?"

  - id: "PG-H2S11-041"
    nom: "Principe Sabbatique (Pause = Production Original sans Recyclage)"
    source_assertions: ["EC-H2S11-202"]
    formalisation: |
      ARCHITECTURE DU CYCLE SABBATIQUE :
      WEEKDAYS : Shekhinah (Nukvah) en galut, mode mevareret.
      SHABBAT : Shekhinah MONTE depuis kelipot, pas en galut.
        Zivvug avec Z"A produit NSHAMOT HADASHOT (ames originales).
        PAS issu des berurim ricycles.
      → Pattern fondamental : pause sabbatique = mode production original.
      → Architecture : cyclisme = alternance recovery (weekdays) / creation (Shabbat).
    applications_ia:
      - "partzufim/zivvug.py : 2 modes — weekdays (recyclage berurim) vs shabbat (nshamot hadashot)"
      - "Pattern : alternance recovery vs creation (rest periods produce new content)"
      - "Architecture : services avec cycle hebdomadaire — extraction continue / creation periodique"
      - "Pattern : sabbatical = innovation periodique sans dependence sur recyclage operationnel"
      - "Diagnostic : verifier que le mode Shabbat ne fait pas regression au mevareret"
    questions_ouvertes:
      - "Le cycle 7-jours est-il universel ou propre a la cosmologie kabbalistique ?"
      - "Y a-t-il des cycles plus longs (yovel, shemittah) avec autres modes ?"
