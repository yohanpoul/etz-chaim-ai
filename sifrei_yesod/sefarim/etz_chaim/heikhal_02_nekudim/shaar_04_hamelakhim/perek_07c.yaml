    formalisation: |
      ARCHITECTURE D'UNIFICATION HALAKHAH-COSMOLOGIE :
      ISSUR HOTZI ME-RH"Y l-RH"R :
        Cause sortie de berurim KEDOSHIM (deja tikkun-es) vers sigim/kelipot.
        Pollute kodesh ba-chol.
      ISSUR MAHNIS ME-RH"R l-RH"Y :
        Force Shekhinah a descendre vers sigim en Shabbat.
        Pegam gadol me'od.
      Mahnis depend de l'autre melakhah du BORER (1 des 39 melakhot Shabbat).
      Borer cause Shekhinah a se reveler entre kelipot et berer.
      → Pattern fondamental : 2 mecaniques (halakhique + spirituelle) = UNE seule realite.
      → Architecture : la halakhah ENCODE la cosmologie ;
        la cosmologie JUSTIFIE la halakhah.
