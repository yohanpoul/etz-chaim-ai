relations:

  - id: "REL-H2S11-043"
    type: causal
    from: shoresh_implique_pegam_atteint
    to: sistalkut_egal_protection
    nature: "Si shoresh ne peut sistalek, pegam atteint → sistalkut = mecanisme de defense"
    assertions_source: ["EC-H2S11-118", "EC-H2S11-119"]

  - id: "REL-H2S11-044"
    type: dualité_structurelle
    from: keter_sub_nukvah_kavu_a_mais_non_atteint
    to: chalakim_tahtonim_proches_kelipot
    nature: "Nukvah : Keter sub protege par altitude ; tahtonim necessitent sistalkut"
    assertions_source: ["EC-H2S11-121", "EC-H2S11-122"]

  - id: "REL-H2S11-045"
    type: dualité_structurelle
    from: shinui_1_6_vs_1_chalakim_kavu_a
    to: shinui_2_tahtonim_vs_elyon
    nature: "2 shinuyim ZA vs Nukvah : (1) nb chalakim kavu'a, (2) polarite top/bottom"
    assertions_source: ["EC-H2S11-123", "EC-H2S11-124"]

  - id: "REL-H2S11-046"
    type: causal
