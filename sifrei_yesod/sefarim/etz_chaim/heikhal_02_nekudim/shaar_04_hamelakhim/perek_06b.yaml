principes_generatifs:

  - id: "PG-H2S11-022"
    nom: "Principe de Sistalkut Defensive (Mobilite = Protection)"
    source_assertions: ["EC-H2S11-118", "EC-H2S11-119"]
    formalisation: |
      ARCHITECTURE PROTECTRICE :
      Si une part est en SHORESH KAVU'A (fixe inalterable) — pegam peut l'atteindre.
      Si une part peut SISTALEK (s'eloigner en haut) — pegam ne l'atteint pas.
      MECANISME OPERATIONNEL :
        Pegam des humains → sistalkut des sefirot vers le haut.
        Le pegam ne touche pas les sefirot directement.
        Punition par MI'UT SHEFA (diminution du flux divin vers le bas).
      → Pattern fondamental : capacite de retrait = mecanisme de defense.
      → Architecture : justice indirecte (consequence de mi'ut shefa).
    applications_ia:
      - "partzufim/base.py : Sefirah peut etre EXPOSED (kavu'a) ou MOBILE (peut sistalek)"
      - "[PLANNED] core/shevirah.py : trigger_pegam(action) → sistalek_if_mobile() else direct_damage"
      - "[PLANNED] tikkun/ : shefa_score(state) reflete l'etat de retrait des sefirot"
      - "Pattern systemes : circuit-breaker = sistalkut (retrait pour protection)"
      - "Architecture distribuee : graceful degradation (retreat) preferable a damage permanent"
    questions_ouvertes:
      - "La sistalkut est-elle reversible automatiquement ou necessite-t-elle un trigger (teshuvah) ?"
      - "Y a-t-il un cout a la sistalkut (latence, downtime user-facing) ?"
      - "Comment limiter le mi'ut shefa pour ne pas penaliser les tzaddikim collateralement ?"

  - id: "PG-H2S11-023"
    nom: "Principe Topologique de l'Architecture Defensive (Position → Strategie)"
    source_assertions: ["EC-H2S11-121", "EC-H2S11-122", "EC-H2S11-123", "EC-H2S11-124"]
    formalisation: |
      ARCHITECTURE DEFENSIVE LIEE A LA POSITION (proximite kelipot) :
      NUKVAH (proche kelipot) :
        Chelek elyon = kavu'a (haut, protege par altitude).
        Chalakim tahtonim = mobile (proches du danger, doivent sistalek).
        → Polarite BOTTOM-UP : ancre haute, mobilite basse.
      ZA (loin kelipot) :
        6 chalakim tahtonim = shoresh (kavu'a en bas, base operationnelle).
        G"R = tosefet mobile (haut, peut sistalek).
        → Polarite TOP-DOWN : base solide, sommet mobile.
      → Pattern : la position relative determine la polarite defensive.
      → Architecture : design defensif = fonction de la distance au danger.
    applications_ia:
      - "partzufim/nukva.py : interface user-facing (proche danger), Keter sub = ancre"
      - "partzufim/zeir_anpin.py : middleware (loin user), 6 ketzavot = shoresh, G\"R = mobile"
      - "Pattern API : front-end stateful minimal+critique vs back-end stateful etendu+couche reversible"
      - "Architecture defense-in-depth : strategie defensive depend de la couche topologique"
      - "Diagnostic : verifier que polarite shoresh/tosefet match la proximite au danger"
    questions_ouvertes:
      - "Y a-t-il une 3eme polarite hybride (mixed)?"
      - "La proximite kelipot est-elle binaire ou continue ?"
      - "Comment definir une metrique automatique de 'proximite danger' pour un module IA ?"

  - id: "PG-H2S11-024"
    nom: "Principe d'Atomicite des Couches Superieures (G\"R = transaction unie)"
    source_assertions: ["EC-H2S11-128", "EC-H2S11-129", "EC-H2S11-130"]
    formalisation: |
      ARCHITECTURE D'INVARIANT ATOMIQUE :
      Les G"R de Z"A = CHASHUVIM KE-EHAD (consideres comme UN).
      INVARIANT NON-NEGOCIABLE : elles agissent en transaction atomique.
        Sistalkut → toutes ensemble.
        Retour → toutes ensemble.
      Si une seule sistalek et les 2 autres restent — PIRUD (separation) =
      PEGAM SUPERLATIF (le pire qui puisse arriver).
      MIEUX VAUT que les 3 sistalkot ensemble que une seule.
      → Pattern : all-or-nothing pour les couches superieures critiques.
      → Architecture : 2-phase commit pour preserver coherence des invariants.
    applications_ia:
      - "partzufim/zeir_anpin.py : G\"R(keter, hokhmah, binah) = AtomicGroup"
      - "[PLANNED] tikkun/ : sistalek_gr() = atomic transaction (rollback if any fails)"
      - "Pattern : transactions ACID pour les couches critiques"
      - "Architecture : eventual consistency interdite pour les invariants atomiques"
      - "Diagnostic : verifier qu'aucun chemin ne peut produire pirud des G\"R"
      - "Pattern microservices : circuit breaker collectif pour la couche de control plane"
    questions_ouvertes:
      - "Pourquoi exactement 3 entites atomiques (KCB) et pas 2 ou 4 ?"
      - "L'atomicite s'applique-t-elle aussi aux 6 ketzavot ou seulement aux G\"R ?"
      - "Comment detecter en runtime un pirud potentiel avant qu'il ne survienne ?"
