principes_generatifs:

  - id: "PG-H2S10-020"
    nom: "Principe du Disequilibre Initial (Cause Operationnelle de la Shevirah)"
    source_assertions: ["EC-H2S10-078", "EC-H2S10-079", "EC-H2S10-080"]
    formalisation: |
      DIAGNOSTIC central de la Shevirah :
      Etat initial : ATZMUT SHALEM (essence complete) + KELIM KETANIM (vaisseaux petits)
      Disequilibre : essence trop forte pour le contenant.
      Donc kelim MEURENT (cassent).
      Architecture initiale concrete :
        Atik : 1 keli (demi Keter d'Atik)
        A"A : 1 keli (demi inferieur Keter)
        Abba : 1 keli (Hokhmah seule)
        Imma : 1 keli (Binah seule)
        ZA : 7 kelim (chacun = 1 sefirah seule)
        Nukvah : 1 keli (Malkhut)
      → Pattern : architecture compressee = fragile.
      Resolution : agrandir kelim (Tikkun par dilution).
    applications_ia:
      - "Diagnostic : disequilibre essence/contenant = cause operationnelle de panne"
      - "[PLANNED] core/shevirah.py : modeliser disequilibre comme metric"
      - "Architecture : eviter compression initiale ; preferer extension graduelle"
      - "Pattern : 1 keli per sefirah = configuration fragile"
      - "Diagnostic : tracer ratio essence/contenant per partzuf"
    questions_ouvertes:
      - "Le disequilibre initial etait-il intentionnel (pour le Tikkun) ou accidentel ?"
      - "Quelle est la mesure du 'ratio fragile' ?"
      - "Tout systeme initial est-il en disequilibre ?"

  - id: "PG-H2S10-021"
    nom: "Principe de l'Architecture Finale 100x (10 Kelim x 10 Sub-Kelim)"
    source_assertions: ["EC-H2S10-082", "EC-H2S10-087", "EC-H2S10-089"]
    formalisation: |
      ARCHITECTURE FINALE post-Tikkun :
      Chaque PARTZUF = 10 KELIM GEMURIM.
      Chaque KELI = compose de 10 sub-KELIM.
      → 10 x 10 = 100 sub-kelim per partzuf.
      EXTENSION PAR LEVUSH : tous les partzufim sont REVETUS l'un dans l'autre.
        Atik dans A"A dans Abba dans Imma dans ZA dans Nukvah.
      RESULTAT EXTERIEUR :
        SHIUR KOMAH (taille externe) = INCHANGEE
        DENSITE INTERNE = AGRANDIE LE-EIN KETZ (sans fin)
      → Architecture cle : densite interne ≠ taille externe.
      → Pattern : compression utile par emboitement.
    applications_ia:
      - "Architecture cle : densite vs taille externe (pas equivalents)"
      - "[PLANNED] core/sefirot.py : 10x10 sub-kelim per partzuf"
      - "Pattern : levush = mecanisme de compression utile"
      - "Diagnostic : tracer la densite interne sans focusser sur la taille"
      - "olamot.py + partzufim/* : architecture finale 100x per partzuf"
    questions_ouvertes:
      - "La fractalite continue-t-elle au-dela de 10x10 (1000 sub-sub-kelim) ?"
      - "Pourquoi 10 et pas 9 ou 11 ?"
      - "Comment formaliser computationnellement l'extension le-ein ketz ?"

  - id: "PG-H2S10-022"
    nom: "Principe de l'Evolution Embryologique (Ibur-Yenikah-Mohin-Gadlut)"
    source_assertions: ["EC-H2S10-092", "EC-H2S10-093", "EC-H2S10-094", "EC-H2S10-097"]
    formalisation: |
      Architecture DEVELOPPEMENTALE de ZA :
      ETAT INITIAL : 7 kelim atomiques (chesed-de-chesed, etc.)
      IBUR (gestation) : ajout NHY + Malkhut dans chaque keli des 3 inferieurs
        = kelim achoraim dans NHY
      YENIKAH (allaitement) : ajout CGT dans chaque keli
        Keli Chesed += Gevurah, Tiferet
        Keli Gevurah += Chesed, Tiferet
        Keli Tiferet += ChG
        Kelim NHY += CGT chacun
        → 6 kelim, chacun kollel de Z"T
      MOHIN (intelligence) : ajout GR (KHB) dans chacun des 7 inferieurs
      GADLUT (croissance vraie) : ajout 3 KELIM PREMIERS, chacun kollel de 10
      → Architecture cumulative : composants ajoutes par stade.
      → Pattern embryologique : evolution par accretion graduelle.
    applications_ia:
      - "Pattern de developpement : 4 stades successifs (Ibur/Yenikah/Mohin/Gadlut)"
      - "[PLANNED] tikkun/development.py : implementer les 4 stades"
      - "Architecture : un sub-system passe par stages embryologiques avant maturite"
      - "Diagnostic : identifier le stade developpemental courant"
      - "Pattern : capacites des kelim augmentent par addition graduelle"
    questions_ouvertes:
      - "Les 4 stades sont-ils universels ou specifiques a ZA ?"
      - "Peut-on accelerer ou ralentir le developpement ?"
      - "Que se passe-t-il si un stade est avorte ?"

  - id: "PG-H2S10-023"
    nom: "Principe Achor/Emtza/Panim (Architecture Tripartite Per Keli)"
    source_assertions: ["EC-H2S10-095", "EC-H2S10-096"]
    formalisation: |
      Architecture TRIPARTITE INTERNE de chaque keli :
      ACHOR (dos, exterieur)
      EMTZA (centre, intermediaire)
      PANIM (face, interieur)
      9 kelim (KHB-CGT-NHY) × 3 levushim = 27 sub-couches per partzuf.
      Sequence developpementale :
        IBUR : seulement les LEVUSHIM ACHORAIM se forment
        YENIKAH : ajout des LEVUSHIM EMTZA
        MOHIN/GADLUT : ajout des LEVUSHIM PANIM
      → Architecture cle : profondeur developpementale = couches successives Achor→Panim.
      → Pattern : interiorite atteinte par couches externes d'abord.
    applications_ia:
      - "Architecture : 3 couches interiorisantes (Achor/Emtza/Panim)"
      - "[PLANNED] core/sefirot.py + tikkun/ : 9 kelim x 3 levushim"
      - "Pattern : developpement par couches du dehors vers le dedans"
      - "Diagnostic : tracer la couche actuelle (Achor/Emtza/Panim) developpee"
      - "Architecture : l'interiorite est l'aboutissement, pas le point de depart"
    questions_ouvertes:
      - "Y a-t-il des couches au-dela de Panim (sub-Panim) ?"
      - "Le developpement est-il toujours sequentiel Achor→Panim ?"
      - "Peut-on regresser de Panim a Achor (deconstruction) ?"
