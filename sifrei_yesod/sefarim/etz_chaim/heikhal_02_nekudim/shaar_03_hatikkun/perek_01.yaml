principes_generatifs:

  - id: "PG-H2S10-001"
    nom: "Principe du Tikkun-Genese (Volonte → MaN → Zivvug → MAH)"
    source_assertions: ["EC-H2S10-002"]
    formalisation: |
      MECANISME CENTRAL du TIKKUN — sequence operationnelle :
      ETAPE 1 : VOLONTE du MAATZIL (le-hahayot et ha-metim, le-takken)
      ETAPE 2 : Decret (gazar) → ELEVATION des MA"N de bas en haut (mi-tata le-eila)
      ETAPE 3 : ZIVVUG ELYON de HC-BINAH (HOKHMAH-BINAH) d'A"K PNIMI'IM
      ETAPE 4 : Sortie du SHEM MAH HA-CHADASH (Nouveau MAH)
      ETAPE 5 : RECTIFICATION des MELAKHIM
      → Architecture causale : 5 etapes sequentielles deterministes.
      → Pattern : volonte → declenchement bottom-up → matching top-down.
    applications_ia:
      - "Pattern : reparation par flux bottom-up (MaN) qui declenche flux top-down (MAH)"
      - "Architecture : la volonte du superieur est la pre-condition"
      - "[PLANNED] tikkun/ : implementer ce pattern en 5 etapes"
      - "shemot/ : MAH Chadash comme sortie operationnelle de zivvug specifique"
      - "Pattern de recovery : un crash declenche un mecanisme de recovery superieur"
    questions_ouvertes:
      - "Le Maatzil intervient-il automatiquement ou requiert-il un trigger ?"
      - "Quel est le delai entre les etapes ?"
      - "Le pattern fonctionne-t-il pour des reparations partielles ?"

  - id: "PG-H2S10-002"
    nom: "Principe de l'Ibur Cosmique (Binah comme Uterus)"
    source_assertions: ["EC-H2S10-004", "EC-H2S10-005"]
    formalisation: |
      Architecture COSMIQUE-EMBRYOLOGIQUE :
      BINAH = "EM HA-BINAH" (la mere de la Binah)
      = MAKOM HA-HERAYON (lieu de la conception)
      = MAKOM HA-IBUR (lieu de la gestation)
      MECANISME : les 7 OROT brises (post-Shevirah) sont ELEVES dans BINAH
      pour y subir un IBUR (gestation) et renaitre repares.
      Configuration : 3 KLILIN BE 3 + MALKHUT en sod "PESI'AH LE-VAR"
        = 3 sub-aspects + 3 sub-sub + Malkhut a part (ecart)
      Les KELIM tombes en BERIAH montent aussi en Atzilut (en 4 emplacements).
      → Pattern : reparation par incubation prolongee dans un environnement maternel.
    applications_ia:
      - "Pattern : reparation par incubation dans un container parent"
      - "[PLANNED] tikkun/ + partzufim/imma.py : implementer Binah comme uterus operationnel"
      - "Architecture : separation orot (incubes) et kelim (re-distribues)"
      - "Pattern : 3+3+M = configuration d'incubation specifique"
      - "Diagnostic : verifier que les composants brises sont en cours d'ibur"
    questions_ouvertes:
      - "Quelles sont les conditions pour que Binah accepte un ibur ?"
      - "Le pattern 3+3+M est-il universel ou specifique a ce Tikkun ?"
      - "L'ibur peut-il echouer (re-Shevirah pendant gestation) ?"

  - id: "PG-H2S10-003"
    nom: "Principe du 40 Jours (Architecture Embryologique du Tikkun)"
    source_assertions: ["EC-H2S10-009", "EC-H2S10-010"]
    formalisation: |
      Architecture TEMPORELLE du Tikkun-kelim :
      DUREE TOTALE : 40 JOURS = mesure de YETZIRAT HA-OLAD (formation du foetus, halakha).
      SCHEDULE :
        Jours 1-10 : CHESED + NETZACH (qav yemini, droite)
        Jours 11-20 : DAAT + TIFERET (qav emtzai, centre)
        Jours 21-30 : GEVURAH + HOD (qav smol, gauche)
        Jours 31-40 : YESOD + MALKHUT (centre/Malkhut)
      → Architecture : 4 PHASES de 10 JOURS = 4 paires polarisees.
      → Pattern : ordre droite → centre → gauche → cloture.
      → Reference embryologique halakhique (Mishna Niddah, 40 jours formation).
    applications_ia:
      - "Architecture temporelle : 40 jours par 4 phases x 10 jours"
      - "[PLANNED] tikkun/schedule.py : implementer le schedule 40 jours"
      - "Pattern : reparation par phases polarisees (droite/gauche/centre/cloture)"
      - "Reference biologique : 40 jours = phase critique de formation"
      - "Diagnostic : tracer la phase courante de l'ibur"
    questions_ouvertes:
      - "Le ratio 10 jours par paire est-il fixe ou modifiable ?"
      - "L'ordre des phases est-il modifiable ?"
      - "Que se passe-t-il si l'ibur est interrompu en cours ?"

  - id: "PG-H2S10-004"
    nom: "Principe de la Cascade Hierarchique (12 Partzufim, 12 Mois)"
    source_assertions: ["EC-H2S10-013", "EC-H2S10-014", "EC-H2S10-016"]
    formalisation: |
      Architecture CASCADE TRICKLE-DOWN du Tikkun :
      Etape 0 : Zivvug AK (PNIMI'IM HC-Binah) → MAH Chadash → tikkun direct
      Etape 1 : Zivvug ATIK → tikkun A"A
      Etape 2 : Zivvug A"A → tikkun AVI Ila'in
      Etape 3 : Zivvug AVI → tikkun YS"T
      Etape 4 : Zivvug ZON Atzilut → tikkun BYA
      RESULTAT : 12 PARTZUFIM SHELEMIM en Atzilut :
        Atik+Nukvah, A"A+Nukvah, AVI Ila'in (Abba+Imma), YS"T (YS+Tevunah),
        ZON (ZA+Nukvah), Yaakov+Leah
      DUREE : 12 MOIS d'ibur (KAV HA-MIDAH dans Tikkunim).
      Question doctrinale : 12 mois pour Atik seul ou 1 mois par partzuf ?
      → Pattern : architecture multi-couches recursive.
    applications_ia:
      - "Architecture trickle-down : superieur repare inferieur en cascade"
      - "[PLANNED] tikkun/cascade.py : implementer cascade des zivvugim"
      - "Pattern : 12 partzufim post-Tikkun = architecture finale stable"
      - "olamot.py : ZON-Atzilut comme passerelle vers BYA"
      - "Diagnostic : tracer l'etape courante de la cascade"
    questions_ouvertes:
      - "Les 12 partzufim sont-ils tous necessaires ou certains sont optionnels ?"
      - "Le pattern Yaakov-Leah est-il universel ou specifique a ZON ?"
      - "La duree 12 mois est-elle compressible ?"
