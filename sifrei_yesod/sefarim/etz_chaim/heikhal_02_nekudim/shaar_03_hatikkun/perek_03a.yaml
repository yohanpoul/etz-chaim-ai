principes_generatifs:

  - id: "PG-H2S10-009"
    nom: "Principe d'Extension Cosmique du Keter (Atzilut Total)"
    source_assertions: ["EC-H2S10-038", "EC-H2S10-039", "EC-H2S10-040"]
    formalisation: |
      Architecture FINALE de l'Atzilut post-Tikkun :
      AVANT Tikkun :
        Nekudim isolees (zeh al-gabei-zeh)
        Chaque sefirah a sa place propre
        Pas d'extension, pas d'emboitement
      APRES Tikkun :
        Keter s'etend de sa place jusqu'aux raglayim AK
        Cette extension = totalite d'Atzilut
        Tous les partzufim s'etendent a meme echelle (Atik dukhra+nukvah, A"A, AVI, ZON)
      → Architecture : transition de fragments isoles a totalite emboitee.
      → Pattern : extension = condition de l'emboitement.
    applications_ia:
      - "Pattern : transition fragments-isoles → totalite-emboitee"
      - "[PLANNED] tikkun/extension.py : implementer extension cosmique"
      - "Architecture : meme echelle pour tous les sub-systems = pre-condition emboitement"
      - "olamot.py : Atzilut = totalite emboitee (post-Tikkun)"
      - "Diagnostic : verifier si les sub-systems sont a meme echelle"
    questions_ouvertes:
      - "L'extension est-elle proportionnelle ou absolue ?"
      - "Que se passe-t-il si un partzuf ne s'etend pas a meme echelle ?"
      - "Le Keter peut-il se contracter apres extension ?"

  - id: "PG-H2S10-010"
    nom: "Principe Neshamah-Levush (Architecture Emboitee)"
    source_assertions: ["EC-H2S10-041", "EC-H2S10-042"]
    formalisation: |
      Architecture d'EMBOITEMENT post-Tikkun :
      Les 6+ partzufim se revetent l'un dans l'autre (levush mutuel).
      RESULTAT en CHAINE :
        Chaque partzuf = NESHAMAH (ame) pour le partzuf qu'il habille
        Chaque partzuf = LEVUSH (vetement) pour le partzuf qui l'habille
      EFFETS architecturaux :
        1. Transmission graduelle : orot recus a travers les couches
        2. Protection mutuelle : kelim externes protegent les internes
        3. Capacite augmentee : kelim grossis = peut recevoir plus d'ohr
      Topologie : tous les RAGLAYIM aboutissent au meme niveau.
    applications_ia:
      - "Pattern oignon : architecture en couches concentrique"
      - "[PLANNED] partzufim/regulator.py : modeliser neshamah/levush"
      - "Architecture : chaque sub-system = ame de son sub-sub + vetement de son super"
      - "Pattern de transmission : orot transmits a travers couches successives"
      - "Diagnostic : tracer les relations neshamah/levush pour debugger"
    questions_ouvertes:
      - "Combien de couches d'emboitement sont possibles ?"
      - "Le pattern fonctionne-t-il horizontalement (entre partzufim de meme niveau) ?"
      - "L'emboitement peut-il etre rompu ?"

  - id: "PG-H2S10-011"
    nom: "Principe Hadar (8eme Melekh = Exception Salvatrice)"
    source_assertions: ["EC-H2S10-043", "EC-H2S10-044", "EC-H2S10-045"]
    formalisation: |
      ARCHITECTURE de l'EXCEPTION Hadar :
      Statut : 8eme MELEKH dans la liste des rois d'Edom (Genese 36).
      Caracteristique unique : NULLE PART il n'est dit "Va-yamot" (et il mourut).
      Action : ADRABA (au contraire) il REPARE et MAINTIENT les 7 morts.
      Origine cosmique : MAH-CHADASH sortant du Metzach d'A"K.
      Genese 36:39 : "Va-yimlokh tahtav HADAR ve-shem ishto MEHETABEL"
        Apparition SIMULTANEE de la dualite (dukhra+nukvah).
      → Pattern : la 8eme position = transcendance des 7 (cycle naturel).
      Architecture : un acteur exceptionnel apres N echecs.
    applications_ia:
      - "Pattern : un sub-system exceptionnel apres N echecs (cycle 7+1)"
      - "Architecture : l'exception (8eme) = sauveur du cycle (7)"
      - "[PLANNED] tikkun/hadar.py : implementer le pattern d'exception salvatrice"
      - "Pattern biblique : presence/absence textuelle encode statut cosmique"
      - "Diagnostic : identifier le 'Hadar' dans un systeme defaillant"
    questions_ouvertes:
      - "Le pattern 7+1 est-il universel ?"
      - "Un Hadar peut-il echouer (devenir 9eme dans la lignee des morts) ?"
      - "L'exception necessite-t-elle un trigger specifique ?"
