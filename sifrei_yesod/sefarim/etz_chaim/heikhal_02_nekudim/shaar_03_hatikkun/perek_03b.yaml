principes_generatifs:

  - id: "PG-H2S10-012"
    nom: "Principe Adam=MAH (Inclusion par Berur)"
    source_assertions: ["EC-H2S10-048", "EC-H2S10-049", "EC-H2S10-050", "EC-H2S10-052"]
    formalisation: |
      EQUATION FONDAMENTALE : ADAM = SHEM MAH = couple ZON.
      Pourquoi MAH = Adam (et non MAH+BAN = Adam) :
      Le Shem MAH est le BERURIST principal. Il berar BAN et l'attache a lui.
      ANALOGIE BEN-BAT (loi halakhique de l'heritage) :
        Le fils herite tout ; donne a la fille au zivvug ce qu'il veut
        Bat = TAFLAH (subordonnee), KELULAH BA-BEN (incluse dans le fils)
      DONC : Shem MAH (= Ben) inclut Shem BAN (= Bat).
      Adam = MAH englobant (kollel des deux).
      Architecture : un composant principal (MAH) inclut son sub-composant (BAN).
      2 ETATS de la nukvah : (1) kelulah be-mah (incluse) ; (2) nifredet (separee).
    applications_ia:
      - "Pattern : composant principal = berurist + inclut son sub-composant"
      - "[PLANNED] partzufim/zeir_anpin.py + nukva.py : modeliser inclusion ZON"
      - "Architecture halakhique : heritage = inclusion par primaute"
      - "Pattern : un nom (Adam) peut englober plusieurs entites (ZON)"
      - "Diagnostic : tracer le statut courant (incluse vs separee) de la nukvah"
    questions_ouvertes:
      - "L'inclusion BAN dans MAH est-elle reversible ?"
      - "L'analogie heritage halakhique est-elle metaphorique ou operationnelle ?"
      - "Comment formaliser computationnellement 'kelulah' ?"

  - id: "PG-H2S10-013"
    nom: "Principe Mehetabel-Bat-Matred (Encodage Textuel-Cosmique)"
    source_assertions: ["EC-H2S10-053", "EC-H2S10-054", "EC-H2S10-056", "EC-H2S10-057"]
    formalisation: |
      Architecture textuelle-cosmique encodee dans Genese 36:39 :
      Verset : "Va-shem ishto MEHETABEL BAT MATRED bat MEH ZAHAV"
      DECOMPOSITIONS GEMATRIQUES :
        ADAM = MAH = 45
        CHAVAH = milui MAH = 19 (quand nukvah incluse)
        MEHETABEL = MaH (45) + YeTBA"L (52 = BAN)
        YeTBA"L = "il est bon a Dieu" → TOV (extraction par Berur)
        Tout MILUI = guimatria ELOHIM = aspect NUKVAH = DININ
      Architecture : etats successifs de la nukvah encodes par noms differents.
        Chavah (incluse) → Mehetabel (separee)
      Hitbasmu da be-da (Idra) : adoucissement mutuel par zivvug.
      → Pattern : noms bibliques = code operationnel des etats cosmiques.
    applications_ia:
      - "Architecture textuelle : Bible = manuel cosmique encode"
      - "[PLANNED] gematria/engine.py + shemot/ : decoder noms bibliques"
      - "Pattern : etats cosmiques tracables par renommage textuel"
      - "Diagnostic : tracer l'etat de la nukvah par son nom courant"
      - "Architecture biblique : Genese 36:39 = encodage Mehetabel = etats cosmiques"
    questions_ouvertes:
      - "Combien d'autres versets bibliques encodent des etats cosmiques ?"
      - "L'encodage est-il systematique ou ad-hoc ?"
      - "Comment formaliser le decodage Bible→cosmologie ?"

  - id: "PG-H2S10-014"
    nom: "Principe MAH>SaG Fonctionnel (4 Raisons)"
    source_assertions: ["EC-H2S10-058", "EC-H2S10-059", "EC-H2S10-060"]
    formalisation: |
      Resolution du PARADOXE QUANTITATIF :
      Quantitativement : SaG (63) > MAH (45)
      Fonctionnellement (actuellement) : MAH > SaG-Nekudot
      4 RAISONS :
      1. ORIGINE : MAH-Chadash sort du ZIVVUG AB-SaG → herite du koach d'AB.
      2. INTEGRITE : MAH n'a NI MITAH NI SHEVIRAH (contrairement a SaG-Nekudot).
      3. COMPLETUDE TANTA : MAH = Ta'amim+Nekudot+Tagin+Otiot complet ;
         Nekudot-de-SaG = sub-element seulement.
      4. MANQUE ACTUEL de SaG : pas encore COMPLETEMENT BERAR ;
         GRA'ON GADOL temporaire.
      → Architecture : superiorite fonctionnelle != superiorite quantitative.
      Pattern : capacite operationnelle depend de l'origine, integrite, completude, et etat actuel.
    applications_ia:
      - "Pattern : la valeur fonctionnelle != valeur nominale"
      - "[PLANNED] tikkun/ : modeliser hierarchie fonctionnelle vs quantitative"
      - "Architecture : 4 axes d'evaluation (origine, integrite, completude, etat actuel)"
      - "Diagnostic : distinguer 'plus grand' quantitatif vs 'plus capable' fonctionnel"
      - "Pattern temporel : etat actuel != etat ideal"
    questions_ouvertes:
      - "Les 4 raisons sont-elles independantes ou correlees ?"
      - "Y a-t-il d'autres axes d'evaluation ?"
      - "Comment quantifier le 'gra'on' de SaG ?"

  - id: "PG-H2S10-015"
    nom: "Principe Eschatologique (Retour de SaG, Disparition de MAH)"
    source_assertions: ["EC-H2S10-060"]
    formalisation: |
      ARCHITECTURE ESCHATOLOGIQUE definitive :
      ETAT ACTUEL :
        MAH (45) regne, fait le Tikkun
        SaG (63) recule, est BAN-renomme, en cours de Berur
        AB (72) au-dessus
      ETAT FUTUR (le-atid lavo, Yamot ha-Mashiah) :
        Tout SaG sera RECTIFIE complet
        Melakhim REVIVRONT (mehutbarim le-gamri)
        "Bila ha-mavet la-netzah" (Isaie 25:8) — la mort engloutie
        SaG retourne a sa KADMUTO ve-MA'ALATO (etat anterieur, preeminence)
        SaG REGNE et ECLAIRE le monde
        MAH S'EFFACE (yitbatel)
      RESULTAT :
        Plus que 2 OHROT : AB et SaG seuls
        "Hazarat ha-olam le-tohu va-vohu" (Hazal pour Mashiah)
      → Architecture : MAH est temporaire (instrument de Berur), SaG est essentiel.
      Pattern : un instrument disparait quand son but est atteint.
    applications_ia:
      - "Pattern eschatologique : un sub-system temporaire disparait apres mission"
      - "[PLANNED] tikkun/eschatologie.py : implementer le retour SaG / disparition MAH"
      - "Architecture : MAH = instrument temporaire pour Tikkun ; SaG = essence permanente"
      - "Pattern : 'tohu va-vohu' messianique = retour au pre-creation par MAH"
      - "Diagnostic : determiner l'etape eschatologique courante (MAH-regne vs SaG-retour)"
    questions_ouvertes:
      - "Comment distinguer 'tohu va-vohu' messianique de pre-creation litterale ?"
      - "MAH disparait totalement ou est integre dans SaG ?"
      - "Y a-t-il un quatrieme etat apres SaG-retour ?"
