assertions:

  # ─── BLOC E : ADAM = MAH SEUL SUFFIT (BAN INCLUE) ───

  - id: "EC-H2S10-048"
    source_he: "וא\"ת והלא בשם מ\"ה לא נעשה רק הדכורין שבאצילות ובחי' הנוקבא נעשה משם ב\"ן ואיך נקרא אדם והענין הוא כמ\"ש כי שם מ\"ה בצאתו היה מברר משם ב\"ן ומחברו אליו ונתקן עמו"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      QUESTION : Shem MAH ne fait que les DUKHRIM (males) d'Atzilut
      et la NUKVAH se fait du Shem BAN.
      ALORS pourquoi appele ADAM (qui inclut les 2) ?
      REPONSE : a sa sortie, MAH a BERAR (clarifie) du Shem BAN
      et l'a UNI (mehabro) a lui, et a ete RECTIFIE avec lui.
      → Architecture : MAH est le BERURIST principal qui s'attache BAN comme part.
    type: déduction_logique
    concepts:
      - {id: question_adam_mah_seul, role: question_pourquoi_adam_egal_mah}
      - {id: mah_berar_ban_attache, role: mah_berar_et_attache_ban}
    mapping:
      modules: ["partzufim/zivvug.py", "shemot/", "[PLANNED] tikkun/"]
      tables: []
      partzufim: []
      relevance: "Question architecturale : MAH = composant principal qui inclut BAN. Pattern d'inclusion."

  - id: "EC-H2S10-049"
    source_he: "ונמצא כי אז היה אור הנוקבא טפל אליו והיה יונק ממנו כדמיון הבן עם הבת שהכל נקרא ע\"ש הבן והוא יורש הכל ואינו נותן לבת אלא מה שיוטב בעיניו כרצונו"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      DONC l'OHR de la NUKVAH est TAFEL (subordonne) a lui (MAH)
      et y'NEK (telle) de lui.
      ANALOGIE BEN-BAT (fils-fille) :
      Tout est appele du nom du FILS — il herite TOUT.
      Il NE DONNE a la FILLE que ce qu'il VEUT (ke-ratzono) — comme il lui plait.
      → Architecture droits/heritage : fils prime sur fille en heritage.
      cf. Mishna Bava Batra (lois d'heritage halakhiques).
    type: analogie_explicative
    concepts:
      - {id: nukvah_tafel_yonek_de_mah, role: nukvah_subordonnee_qui_telle_du_mah}
      - {id: bat_tafel_au_ben_heritage, role: fille_subordonnee_au_fils_heritage}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/nukva.py"]
      tables: []
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Analogie biblique-halakhique : ben/bat = MAH/BAN avec primaute du male. Architecture de heritage."

  - id: "EC-H2S10-050"
    source_he: "וא\"כ נמצא כי הבת טפלה וכלולה בבן ולכן שם בן שהיא הבת נוקבא וטפלה לשם מ\"ה שהוא הבן הזכר והיא כלולה בו כי שם מ\"ה הוא המבררו עמו והוא נתקן ע\"י המ\"ה"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      Donc la BAT (fille) est TAFLAH (subordonnee) ve-KELULAH BA-BEN (incluse dans le fils).
      DONC : Shem BAN qui est BAT, NUKVAH, et TAFLAH au Shem MAH (= BEN ZAKHAR)
      → est INCLUSE en lui.
      Car Shem MAH est CELUI QUI BERAR avec lui ; et il (BAN) est RECTIFIE par MAH.
      → Architecture : inclusion structurelle BAN dans MAH.
      → Equation : tout MAH (= Adam) inclut BAN (= Bat).
    type: axiome_explicite
    concepts:
      - {id: bat_kelulah_ba_ben, role: bat_incluse_dans_le_ben}
      - {id: ban_kelulah_be_mah, role: ban_incluse_dans_mah}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py", "shemot/"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture d'inclusion : BAN dans MAH par mecanisme du Berur. Pattern d'integration."

  # ─── BLOC F : 2 ATAROT, RECEPTION DES HASSADIM ET GEVUROT ───

  - id: "EC-H2S10-051"
    source_he: "ולכן כאשר מברר הוא לוקח תחלה מה שמברר לעצמו כנודע בסוד תרין עטרין דירית ברא ב' חסדים וגבורה דמ\"ה ודב\"ן ולבתר יהיב ברא לברתא בשעתא דמזדווג עמה עטרה דגבורה וכאלו ניתן לה משלו דמי"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      Donc quand il (MAH) BERAR, il PREND D'ABORD pour LUI-MEME ce qu'il berar.
      Comme connu en SOD TEREIN ATARIN DE-YARAT BAR (les 2 couronnes que le fils herite) :
      2 HASSADIM et GEVURAH de MAH et de BAN.
      ENSUITE le fils DONNE a la fille (yahiv bara le-bartah) au moment du ZIVVUG :
      ATARAH de GEVURAH (la couronne de Gevurah).
      → Comme s'il "donne du sien" (mi-shelo dami).
      → Architecture : 2 atarot heritees par le ben ; donne 1 a la bat lors du zivvug.
      cf. EC-H2S9-161 (perek 03c) sur Atarot de Gevurah/Hassadim.
    type: interprétation_lurianique
    concepts:
      - {id: terein_atarin_yarat_bara, role: deux_couronnes_heritees_par_le_fils}
      - {id: atarah_gevurah_donnee_au_zivvug, role: couronne_gevurah_donnee_au_zivvug}
      - {id: 2_chasadim_gevurah_mah_ban, role: 2_chasadim_gevurah_de_mah_et_ban}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["zivvug_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture heritage : 2 atarot fils, 1 transferee a la fille au zivvug. cf. EC-H2S9-161."

  - id: "EC-H2S10-052"
    source_he: "ולכן הוא לבדו נקרא אדם כלול תרוייהו והרי עתה כי ב' בחי' יש לנוקבא דז\"א א' בהיותה כלולה בתחלה עם הזכר הב' כשנפרדת ממנו והוא נותן לה עטרה דגבורה"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      DONC il (MAH/Adam) SEUL est appele ADAM = inclut TROUYEHU (les 2).
      Il y a maintenant 2 BEHINOT pour la NUKVAH de ZA :
      1ere : kelulah be-tehilah avec le ZAKHAR (incluse au depart avec le male)
      2eme : kshe-nifredet (quand separee de lui) — il lui donne ATARAH de GEVURAH.
      → Architecture : 2 etats successifs de la nukvah (incluse → separee).
    type: axiome_explicite
    concepts:
      - {id: adam_kollel_trouyeh, role: adam_englobe_les_deux}
      - {id: 2_behinot_nukvah_kelulah_nifredet, role: 2_etats_de_nukvah_incluse_separee}
    mapping:
      modules: ["partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukva"]
      relevance: "Architecture nukvah : 2 etats successifs (incluse / separee). Sequence developpementale."

  # ─── BLOC G : MEHETABEL BAT MATRED ───

  - id: "EC-H2S10-053"
    source_he: "וזה סוד הכתוב ושם אשתו מהיטבאל בת מטרד כי הנה בשם זה יש כללות מ\"ה (ובן) וי\"ט שהוא המלוי של ד' אותיות הראשונים שבו"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      C'est le SOD du verset "Va-shem ishto MEHETABEL BAT MATRED" (Genese 36:39) :
      Dans ce nom (Mehetabel) il y a KOLLEL :
      MAH (variante NA: "ve-Ben") + Y"T (= 19) qui est le MILUI des 4 premieres lettres.
      → MEHETABEL = MAH + BAT MATRED (avec gematria fournie).
      → Architecture : nom biblique encode la structure cosmique MAH+BAN.
    type: déduction_scripturaire
    concepts:
      - {id: mehetabel_bat_matred_genese_36_39, role: mehetabel_bat_matred_genese}
      - {id: mehetabel_egal_mah_plus_yt, role: mehetabel_egal_mah_plus_19}
    mapping:
      modules: ["gematria/engine.py", "shemot/"]
      tables: []
      partzufim: []
      relevance: "Encodage textuel cosmique : Mehetabel Bat Matred (Genese 36:39). Gematria operative."

  - id: "EC-H2S10-054"
    source_he: "כי אדם הוא שם מ\"ה וכאשר היתה הנוקבא עמו היתה נקרא חו\"ה שהוא גימטריא י\"ט שהם בחי' מילוי דשם מ\"ה כי כל בחי' מילוי הוא גימטריא (נ\"א בחי') אלהים שהיא בחי' הנוקבא שהוא דינין"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      ARCHITECTURE GEMATRIQUE :
      ADAM = Shem MAH (= 45)
      Quand la NUKVAH etait avec lui → appelee CHAVAH (Eve) = 19
      = milui du Shem MAH.
      Tout aspect MILUI = guimatria (variante NA: "behinat") ELOHIM.
      ELOHIM = aspect NUKVAH = DININ (rigueurs).
      → Architecture : MAH/Adam (essence) + Chavah/19 (manifestation) ; ELOHIM = pattern feminin.
      cf. EC-H2S9-258 (perek 07b) sur Elohim per behinah.
    type: interprétation_lurianique
    concepts:
      - {id: adam_chavah_45_19, role: adam_45_chavah_19}
      - {id: chavah_egal_milui_mah, role: chavah_egal_milui_du_mah}
      - {id: milui_egal_elohim_dinin, role: milui_egal_elohim_egal_dinin}
    mapping:
      modules: ["gematria/engine.py", "shemot/"]
      tables: []
      partzufim: ["nukva"]
      relevance: "Architecture gematrique : Adam(45)+Chavah(19)=MAH+milui ; milui = Elohim = nukvah dinim. cf. EC-H2S9-258."

  - id: "EC-H2S10-055"
    source_he: "ובזה תבין למה בחי' הנוקבא היא תמיד דינין והוא לפי ששרשה הוא בחי' המלכים שמתו שעי\"כ נקרא מלכים מלשון מלכות"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      U-VE-ZEH TAVIN (par cela tu comprendras) pourquoi la NUKVAH est TOUJOURS DININ.
      RAISON : son SHORESH (racine) = aspect des MELAKHIM MORTS.
      Donc appeles MELAKHIM du LASHON MALKHUT (langue de royaume).
      → Architecture etymologique : Nukvah = essence-Malkhut = essence-Melakhim-morts = dinim.
      → Pattern : la nukvah herite du caractere des sources (melakhim morts).
      cf. EC-H2S10-033 (perek 10.2) sur etymologie Melakhim.
    type: déduction_logique
    concepts:
      - {id: nukvah_toujours_dinim, role: nukvah_toujours_dinim}
      - {id: shoresh_nukvah_egal_melakhim_morts, role: source_nukvah_egal_melakhim_morts}
    mapping:
      modules: ["partzufim/nukva.py"]
      tables: []
      partzufim: ["nukva"]
      relevance: "Etymologie cosmique : nukvah=dinim car shoresh=melakhim morts. cf. EC-H2S10-033."

  # ─── BLOC H : MEHETABEL APRES SEPARATION ───

  - id: "EC-H2S10-056"
    source_he: "ואמנם כאשר נפרדת מעליו ונעשה בחי' לעצמה ואז שניהן בסוד בעל ואשתו דכורא לחוד ונוקבא לחודה אז נקרא מהיטבאל כי שם זה נחלק למ\"ה יטבאל"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      Et VRAIMENT quand elle (Nukvah) se SEPARE de lui — devient be'inah le-atzmah (pour soi)
      → les 2 sont en sod BA'AL VE-ISHTO (mari et femme) — DUKHRA LE-HUD ve-NUKVAH LE-HUDAH.
      → ALORS appelee MEHETABEL.
      Car ce nom se DIVISE en : "MaH" + "YeTBA"L".
      → Architecture : separation = renommage Mehetabel = MaH-YeTBA"L.
    type: axiome_explicite
    concepts:
      - {id: nukvah_separee_le_atzmah, role: nukvah_separee_pour_soi}
      - {id: baal_ishto_dukhra_nukvah, role: baal_ishto_dukhra_nukvah}
      - {id: mehetabel_egal_mah_yetbal, role: mehetabel_egal_mah_yetbal}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/nukva.py", "shemot/"]
      tables: ["zivvug_states"]
      partzufim: ["nukva"]
      relevance: "Architecture nominale : Mehetabel = MaH+YeTBA\"L apres separation. Pattern de renommage."

  - id: "EC-H2S10-057"
    source_he: "כי מ\"ה הוא דכורא כנודע ויטבא\"ל גי' ב\"ן שהוא נוקבא בהיותה לעצמ' הוי\"ה דההי\"ן המתבסם עמו זה עם זה דכורא ונוקבא ולכן נקרא בשם טוב להורות שיצא מהם הרע והוברר מהם הטוב וז\"ש ואתבסמו דא בדא כו'"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      DECOMPOSITION GEMATRIQUE :
      MaH = DUKHRA (= 45, comme connu)
      YeTBA"L (יטבאל) = guimatria 52 = BAN (Havayah d'HEHIN)
      = NUKVAH quand elle est pour elle-meme.
      Ils s'ATBASMU (s'adoucissent) zeh be-zeh (l'un par l'autre), dukhra et nukvah.
      DONC appelee TOV (par YeTBA"L = "il est bon a Dieu") —
      pour ENSEIGNER que le RA est sorti d'eux et le TOV a ete BERAR.
      Cite : "VE-ATBASMU DA BE-DA" (Idra — ils s'adoucissent l'un par l'autre).
      → Architecture : separation→adoucissement→extraction du Tov.
    type: interprétation_lurianique
    concepts:
      - {id: yetbal_egal_52_egal_ban, role: yetbal_egal_52_egal_ban}
      - {id: hitbasmu_da_be_da, role: ils_s_adoucissent_l_un_par_l_autre}
      - {id: extraction_tov_berur, role: extraction_du_tov_par_berur}
    mapping:
      modules: ["gematria/engine.py", "shemot/", "partzufim/zivvug.py"]
      tables: []
      partzufim: ["nukva"]
      relevance: "Architecture gematrique : YeTBA\"L=52=BAN. Pattern Hitbasmu=adoucissement par couplage. cf. Idra."

  # ─── BLOC I : POURQUOI MAH > SaG (4 RAISONS) ───

  - id: "EC-H2S10-058"
    source_he: "ואמנם צריך לתת טעם אל הנ\"ל כי הרי אלו הנקודות הנ\"ל הם בחי' ס\"ג ואיך יהיו גרועים וטפלים לשם מ\"ה החדש ויהיה מ\"ה זכר ונקודות ס\"ג נקבה ונודע בכמה מקומות כי בחי' שם ס\"ג גדול משם מ\"ה"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      QUESTION CRITIQUE : il faut expliquer comment :
      Ces NEKUDOT sont aspect SaG (= 63) →
      Comment peuvent-elles etre INFERIEURES (geru'im) et SUBORDONNEES (tafelim)
      au Shem MAH-CHADASH (= 45) ?
      Et comment MAH = ZAKHAR et NEKUDOT-SaG = NEKEVAH ?
      Et il est CONNU en plusieurs endroits que SaG (63) est PLUS GRAND que MAH (45).
      → Question quantitative paradoxale : comment 63 < 45 fonctionnellement ?
    type: déduction_logique
    concepts:
      - {id: question_sag_63_plus_grand_mah_45, role: question_sag_plus_grand_que_mah_quantitativement}
      - {id: paradoxe_nekudot_sag_inferieures_a_mah, role: paradoxe_inferiorite_fonctionnelle}
    mapping:
      modules: ["shemot/", "gematria/engine.py"]
      tables: []
      partzufim: []
      relevance: "Question paradoxale : SaG=63>MAH=45 quantitativement. Mais fonctionnellement MAH>SaG-Nekudot."

  - id: "EC-H2S10-059"
    source_he: "והתשובה היא כי שם מ\"ה החדש הנ\"ל יצא מבחינת הזווג דע\"ב וס\"ג כנ\"ל לכן כיון שהוא נמשך מכח ע\"ב עצמו לכן הוא גדול מס\"ג. ועוד טעם אחר כי בשם מ\"ה לא היה בו מיתה ושבירה כמו שהיה בשם ס\"ג עצמו ועוד טעם ג' והוא כי אלו בחי' נקודות לבד של ס\"ג אבל המ\"ה החדש הוא כולל טנת\"א כנ\"ל וכיון שיש בחי' טעמים ודאי שהוא מעולה על הנקודות דס\"ג אבל לא על הטעמים דס\"ג"
    source_ref: "Heikhal 2, Sha'ar 3:3"
    assertion: |
      4 REPONSES (3 ici + 1 dans la prochaine assertion) :
      RAISON 1 : MAH-CHADASH sort du ZIVVUG d'AB-SaG → vient du KOACH d'AB lui-meme
      → donc plus grand que SaG.
      RAISON 2 : MAH n'a EU NI MITAH NI SHEVIRAH (contrairement a SaG-Nekudot brisees).
      RAISON 3 : Ces sont seulement les NEKUDOT de SaG (sub-element).
      MAH-CHADASH inclut TANTA complet (donc Ta'amim aussi).
      → Donc MAH > Nekudot-SaG (MAIS PAS > Ta'amim-SaG).
      → Architecture : superiorite par origine, integrite, et completude TANTA.
    type: déduction_logique
    concepts:
      - {id: raison_1_mah_du_zivvug_av_sag, role: raison_1_mah_origine_av_sag}
      - {id: raison_2_mah_pas_de_shevirah, role: raison_2_mah_intact}
      - {id: raison_3_mah_kollel_tanta_vs_nekudot_seules, role: raison_3_mah_complet_vs_nekudot_seules}
    mapping:
      modules: ["shemot/", "[PLANNED] tikkun/"]
      tables: []
      partzufim: []
      relevance: "3 raisons fondatrices de la superiorite fonctionnelle MAH>SaG-Nekudot. Architecture justifiee."

  - id: "EC-H2S10-060"
    source_he: "ועוד טעם ד' כי ס\"ג יש בו גרעון גדול עתה והוא כי עדיין לא הושלם להתברר כנודע ולכן עתה מ\"ה גדול ומעולה ממנו אבל לע\"ל אשר יתוקן כל בחי' ס\"ג ויחיו כל המלכים ויתבררו לגמרי בסוד בלע המות לנצח אז יחזור שם ס\"ג לקדמותו ולתועלתו (נ\"א ולמעלתו) ושם ס\"ג ישלוט ויאיר בעולם ואז יתבטל שם מ\"ה אשר זהו ענין חזרת העולם לתהו ובהו כנזכר בדרז\"ל לימות המשיח ואז יתבטל מ\"ה ואז לא יהיה רק ב' אורות של ע\"ב וס\"ג ודי בזה"
    source_ref: "Heikhal 2, Sha'ar 3:3 — conclusion"
    assertion: |
      RAISON 4 + ESCHATOLOGIE :
      SaG a un GRA'ON GADOL (grand manque) MAINTENANT —
      car il n'a PAS encore ete COMPLETEMENT BERAR.
      DONC actuellement MAH > SaG fonctionnellement.
      MAIS LE-ATID LAVO (au temps a venir), quand tout SaG sera RECTIFIE
      et tous les melakhim REVIVRONT et seront BERAR LE-GAMRI
      en sod "BILA HA-MAVET LA-NETZAH" (Isaie 25:8 — il a englouti la mort pour toujours) :
      Alors Shem SaG retourne a son KADMUTO (etat anterieur)
      et a sa TO'ELET (variante NA: "MA'ALATO" = preeminence).
      Shem SaG REGNE et ECLAIRE le monde.
      → MAH s'EFFACERA — c'est la "HAZARAT HA-OLAM LE-TOHU VA-VOHU"
      mentionne dans Hazal pour les jours du Mashiah.
      → Alors plus que 2 OHROT : AB et SaG.
      "Ve-dai be-zeh" (et cela suffit ici).
      → ARCHITECTURE ESCHATOLOGIQUE : retour a 2 ohrot, MAH disparait.
    type: interprétation_lurianique
    concepts:
      - {id: raison_4_sag_gra_on_actuel, role: raison_4_sag_manque_actuel_pas_berar}
      - {id: bila_ha_mavet_la_netzah, role: il_a_englouti_la_mort_pour_toujours}
      - {id: sag_retour_kadmuto_eschatologique, role: sag_retour_a_l_etat_initial}
      - {id: hazarat_olam_le_tohu_messianique, role: retour_du_monde_a_tohu_va_vohu_messianique}
      - {id: 2_ohrot_av_sag_seuls, role: 2_lumieres_av_et_sag_seuls_au_futur}
      - {id: mah_efface_le_atid_lavo, role: mah_efface_au_temps_a_venir}
