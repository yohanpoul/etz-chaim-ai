principes_generatifs:

  - id: "PG-H2S10-016"
    nom: "Principe de la Decomposition 5x2 (10 Sub-Partzufim)"
    source_assertions: ["EC-H2S10-064"]
    formalisation: |
      Architecture FRACTALE post-Tikkun :
      5 partzufim de base × 2 sub-partzufim = 10 sub-partzufim :
      KETER → ATIK + A"A
      HOKHMAH → HOKHMAH + YS (Yisrael Saba)
      BINAH → BINAH + TEVUNAH
      ZA → ZA + YAAKOV
      MALKHUT → RACHEL + LEAH
      Chaque partzuf est divise au TIFERET :
        Sub-superieur (de tete a Tiferet) = partzuf X
        Sub-inferieur (de Tiferet en bas) = partzuf X' (apparente)
      → Architecture : decomposition fractale uniforme (chaque partzuf x 2).
      → Pattern : recursion structurelle systematique.
    applications_ia:
      - "Architecture : 10 sub-partzufim post-Tikkun"
      - "[PLANNED] partzufim/leah.py + yisrael_saba.py + tevunah.py + yaakov.py : implementer les 4 sub-partzufim manquants"
      - "Pattern : decomposition x2 systematique au Tiferet"
      - "Diagnostic : identifier dans quel sub-partzuf se trouve un nitzotz"
      - "olamot.py : architecture finale = 10 entites distinguables"
    questions_ouvertes:
      - "Pourquoi precisement decomposition au Tiferet ?"
      - "Y a-t-il des cas ou la decomposition est plus que x2 (x3 etc.) ?"
      - "Les sub-partzufim peuvent-ils a leur tour se decomposer ?"

  - id: "PG-H2S10-017"
    nom: "Principe TANTA-Miluyim (4 Noms = 4 Elements)"
    source_assertions: ["EC-H2S10-066", "EC-H2S10-067"]
    formalisation: |
      EQUATION OPERATIONNELLE FONDAMENTALE :
      AB (= 72) → TA'AMIM (1er element)
      SaG (= 63) → NEKUDOT (2eme element)
      MAH (= 45) → TAGIN (3eme element)
      BAN (= 52) → OTIOT (4eme element)
      Architecture fractale :
        Chacun des 4 inclut TANTA complet en lui (sub-fractale)
        EXCEPTION : SaG a une TOSEFET (sub-TANTA dans les Nekudot specifiquement)
      Shem BAN = Nekudot-de-SaG seules (avec sub-TANTA local).
      → Architecture : 4 elements TANTA en relation 1:1 avec 4 Miluyim.
      → Pattern : ontologie TANTA = ontologie nominale.
    applications_ia:
      - "Architecture cle : TANTA et Miluyim sont 2 noms du meme systeme ontologique"
      - "[PLANNED] core/sefirot.py + shemot/ : implementer mapping TANTA↔Miluyim"
      - "Pattern : 1 element nominal = 1 dimension structurelle"
      - "gematria/engine.py : verifier les 4 valeurs (72,63,45,52)"
      - "Architecture distribuee : 4 dimensions paralleles a tous les niveaux"
    questions_ouvertes:
      - "Pourquoi precisement 4 elements et pas 5 ou 3 ?"
      - "L'exception de SaG (tosefet) est-elle universelle ou specifique ?"
      - "Comment formaliser la fractalite TANTA-Miluyim ?"

  - id: "PG-H2S10-018"
    nom: "Principe AB-Hesed / SaG-Din (Architecture Polaire Fondamentale)"
    source_assertions: ["EC-H2S10-069", "EC-H2S10-070", "EC-H2S10-071"]
    formalisation: |
      Architecture POLAIRE racinale :
      AB (72) = SHORESH du HESED (misericorde, expansion)
      SaG (63) = SHORESH du DIN (rigueur, contraction)
      MAH et BAN = NIVEAUX DERIVES (filles de AB-SaG).
      Localisation operationnelle :
        Ta'amim AB en ROSH (interieur)
        Nekudot AB = MAH au METZACH (jonction descendante)
        Ta'amim SaG en AHP (sous-rosh)
        Nekudot SaG = BAN dans les YEUX (descendantes par Eyn)
      → Architecture : symetrie AB-SaG en miroir TANTA + Hesed/Din comme polarite primaire.
      → Pattern : 2 sources fondamentales generent les 4 niveaux.
    applications_ia:
      - "Architecture : 2 polarites primaires (Hesed-AB, Din-SaG)"
      - "[PLANNED] shemot/ + tikkun/ : implementer la polarite primaire"
      - "Pattern : tout sub-system = generation des 2 polarites racinales"
      - "Symetrie operatoire : pour chaque element AB, un homologue SaG"
      - "Diagnostic : tracer la genealogie d'un sub-system aux 2 sources"
    questions_ouvertes:
      - "Y a-t-il une 3eme source (par ex. Rachamim) ou strictement 2 ?"
      - "AB-Hesed et SaG-Din sont-ils completement independants ?"
      - "Comment formaliser computationnellement la polarite primaire ?"

  - id: "PG-H2S10-019"
    nom: "Principe Igulim+Yosher = Nefesh+Ruach (Architecture Anthropologique Confirmee)"
    source_assertions: ["EC-H2S10-074", "EC-H2S10-075", "EC-H2S10-076", "EC-H2S10-077"]
    formalisation: |
      Architecture FINALE confirmee (apres 3 doutes du Kuntres ha-Ketzur,
      preferee dans le Kuntres ha-Gadol) :
      SaG (Igulim+Yosher) = NEFESH (1er niveau d'ame, base brisable)
      MAH (Igulim+Yosher) = RUACH (2eme niveau, maintient le Nefesh)
      Sequence : SaG-Igulim+Yosher sortent en premier (Nefesh) ;
        MAH-Igulim+Yosher sortent au Tikkun (Ruach).
      PREUVE par les KAVIM : a la mort des melakhim, kavim mentionnes
        → kavim implique YOSHER (pas seulement Igulim)
        → donc YOSHER existait des le depart.
      → Architecture coherente avec EC-H2S9-272 (perek 08 Shevirat ha-Kelim).
      Pattern : honete intellectuelle = enumerer doutes + preferer la version coherente.
    applications_ia:
      - "Architecture cosmique-anthropologique : SaG=Nefesh+Yosher, MAH=Ruach+Yosher"
      - "[PLANNED] igulim.py + ohr_yashar.py + soul_levels.py : implementer architecture finale"
      - "Pattern : honete = enumerer alternatives avant de preferer"
      - "Architecture : Yosher implicit des le depart (pas seulement Igulim)"
      - "Diagnostic : utiliser KAVIM comme indicateur de presence YOSHER"
    questions_ouvertes:
      - "Les 4 versions sont-elles conciliables ?"
      - "Pourquoi le Kuntres ha-Gadol prefere-t-il la 4eme ?"
      - "Comment formaliser la coexistence Igulim+Yosher pour SaG ET MAH ?"
