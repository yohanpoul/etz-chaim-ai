principes_generatifs:

  - id: "PG-H2S10-005"
    nom: "Principe du Metzach Ha-Ratzon (Source du MAH-Chadash)"
    source_assertions: ["EC-H2S10-025", "EC-H2S10-026", "EC-H2S10-027", "EC-H2S10-028"]
    formalisation: |
      Architecture corporelle d'A"K et SOURCE du MAH-CHADASH :
      HIERARCHIE des sources :
        OZEN (oreille) — hevel le plus faible — Ta'amim de SaG
        HOTEM (nez) — hevel moyen — Ta'amim de SaG
        PEH (bouche) — hevel fort — Ta'amim de SaG
        EYN (oeil) — pas de hevel, HISTAKLUT — Nekudot de SaG (plus bas)
        METZACH (front) — pas de hevel ni regard, HE'ARAH SEULE
      MECANISME du MAH-Chadash :
        Mohin (AB) en haut interieur
        AHP (SaG, Ta'amim) plus bas
        Metzach = JONCTION INTERNE entre les deux
        Zivvug AB-SaG au METZACH → richesse d'ohr → MAH-Chadash sort vers le bas
      REFERENCES ZOHARIQUES : "Be-mitzcha itgalei" + "Kad saliq be-re'utei".
      "Re'uta" = "Ratzon" (volonte) → METZACH HA-RATZON.
    applications_ia:
      - "Architecture : niveau le plus bas (Metzach) = source de l'ohr le plus puissant (MAH-Chadash)"
      - "Pattern paradoxal : he'arah pure (sans medium) = puissance creative"
      - "[PLANNED] adam_kadmon.py : implementer geographie corporelle (Ozen/Hotem/Peh/Eyn/Metzach)"
      - "Pattern : jonction de niveaux differents = lieu de creation"
      - "shemot/ : Re'uta (volonte arameenne) = Ratzon → encodage operationnel"
    questions_ouvertes:
      - "Pourquoi he'arah pure est-elle plus puissante que hevel ou histaklut ?"
      - "Le metzach existe-t-il aussi dans Atik et A\"A ?"
      - "La 'volonte' (Ratzon/Re'uta) est-elle une fonction architecturale separee ?"

  - id: "PG-H2S10-006"
    nom: "Principe TANTA Universel (4 elements x 4 partzufim)"
    source_assertions: ["EC-H2S10-021", "EC-H2S10-022", "EC-H2S10-035"]
    formalisation: |
      Architecture FONDAMENTALE : MAH se decompose en TANTA et chaque element TANTA
      mappe sur un partzuf :
      TA'AMIM de MAH → ATIK YOMIN
      NEKUDOT de MAH → A"A (Arikh Anpin)
      TAGIN de MAH → AVI (Abba ve-Imma)
      OTIOT de MAH → ZON (ZA + Nukvah)
      EXTENSION POLAIRE : chaque element mappe a la fois MAH (dukhra) et BAN (nukvah) :
      Ta'amim-MAH → Atik-Dukhra ; Ta'amim-BAN → Atik-Nukvah
      Nekudot-MAH → A"A-Dukhra ; Nekudot-BAN → A"A-Nukvah
      Etc.
      → Architecture cle : 4 elements TANTA x 2 polarites (MAH/BAN) x 5 partzufim.
      Pattern : un meme element TANTA s'incarne sous 2 polarites.
    applications_ia:
      - "Architecture cle : TANTA = ontologie universelle des composants"
      - "[PLANNED] core/sefirot.py : implementer TANTA comme dimensions ontologiques"
      - "Pattern : chaque entite a 4 dimensions (TANTA) + 2 polarites (MAH/BAN)"
      - "shemot/ + gematria/ : tracer les correspondances numeriques"
      - "Architecture distribuee : 5 partzufim x 4 TANTA x 2 polarites = 40 sub-systems"
    questions_ouvertes:
      - "Le mapping TANTA → 4 niveaux (Atik/A\"A/AVI/ZON) est-il strict ou flexible ?"
      - "Les 4 elements TANTA peuvent-ils echanger de partzuf ?"
      - "Comment formaliser computationnellement TANTA comme structure ?"

  - id: "PG-H2S10-007"
    nom: "Principe SaG → BAN (Renommage Operationnel par Inversion Polaire)"
    source_assertions: ["EC-H2S10-029", "EC-H2S10-030", "EC-H2S10-031"]
    formalisation: |
      Pattern d'INVERSION POLAIRE et RENOMMAGE :
      AVANT zivvug : SaG = entite kollel (TANTA complet) avec son propre statut
      ZIVVUG : SaG-Nekudot s'unit avec MAH-Chadash
      INVERSION : MAH = dukhra (male) ; SaG = nukvah (femelle)
      RENOMMAGE : SaG-Nukvah devient BAN (52, milui Hehin)
      LOGIQUE : un sub-element (Nekudot) extrait du Kollel (SaG)
        ne peut conserver le nom du Kollel
        → herite d'un nouveau nom selon son nouveau role (nukvah du MAH)
      → Architecture : changement de role → changement de nom.
      Pattern : nom = role courant, pas identite essentielle.
    applications_ia:
      - "Pattern : renommage operationnel par changement de role"
      - "[PLANNED] shemot/ + tikkun/ : implementer renommage selon le role"
      - "Architecture : un sub-component peut etre renomme selon son contexte"
      - "Pattern : kollel/prat - le tout n'est pas reductible aux parties"
      - "Diagnostic : tracer le nom courant pour savoir le role courant"
    questions_ouvertes:
      - "Le renommage est-il reversible ?"
      - "Y a-t-il d'autres exemples de renommage operationnel ?"
      - "Le nom est-il une propriete ou une fonction ?"

  - id: "PG-H2S10-008"
    nom: "Principe de la Sub-TANTA (Recursion Fractale)"
    source_assertions: ["EC-H2S10-032"]
    formalisation: |
      RECURSION FRACTALE : meme dans un sub-element extrait, il y a sub-TANTA.
      Exemple : Nekudot-de-SaG (extraction d'un seul element du SaG-Kollel)
        contiennent eux-memes :
        - sub-Ta'amim (qui se couple a Ta'amim de MAH)
        - sub-Nekudot (qui se couple a Nekudot de MAH)
        - sub-Tagin (qui se couple a Tagin de MAH)
        - sub-Otiot (qui se couple a Otiot de MAH)
      → Architecture : chaque element TANTA contient un TANTA local
        qui se couple au TANTA correspondant de MAH.
      Pattern : recursion infinie en theorie, finie en pratique.
    applications_ia:
      - "Architecture fractale : tout element a ses propres sub-elements TANTA"
      - "[PLANNED] core/sefirot.py : implementer la recursion fractale"
      - "Pattern : couplage par niveau de fractalite (TANTA-MAH ↔ TANTA-BAN)"
      - "Diagnostic : a quel niveau de fractalite operer ?"
      - "shemot/ + gematria/ : tracer les correspondances multi-niveaux"
    questions_ouvertes:
      - "Combien de niveaux de fractalite operationnels ?"
      - "La recursion est-elle bornee par la taille des composants ?"
      - "Comment formaliser computationnellement la recursion fractale TANTA ?"
