sujet_principal: "Le TIKKUN du monde des Nekudim apres la Shevirah. Mecanisme de l'elevation des MaN par les 7 orot des melakhim brises, sortie du MAH ha-Chadash par zivvug AB-SAG d'AK, ibur 12 mois pour les 12 partzufim d'Atzilut. Pour chaque partzuf une cascade de zivvugim : Atik et sa Nukvah → A\"A et sa Nukvah → AVI Ila'in → YS\"T → ZON → Yaakov-Leah. Sha'ar 03 filesystem = sha'ar 3 original = Sefaria gate 10."
