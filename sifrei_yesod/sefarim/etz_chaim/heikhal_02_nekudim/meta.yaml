sefer_id: "etz_chaim"
heikhal: 2
heikhal_name_he: "היכל נקודים"
heikhal_name_fr: "Heikhal des Nekudim (Points)"
nombre_shaarim: 4
sujet_principal: "Le monde des NEKUDIM (Points) — les lumières sortant des YEUX d'Adam Kadmon. 9 Nekudot, les 7 rois d'Edom qui moururent (Shevirat HaKelim). La primauté des Igulim dans ce monde explique leur brisure. Le Tikkun par MAH (=45=Adam) qui apporte le Yosher. Olam HaNekudim = SAG de SAG = Gevurah = Din."
concepts_cles: [nekudim, einaim, shevirat_hakelim, melakhim, igulim, yosher, sag, mah, tikkun, parsa, nhy, tiferet, ohr_einaim, adam_kadmon]
note: "Deuxieme Heikhal du Etz Chaim. Commence au gate 8 de Sefaria. Suit directement la conclusion du Heikhal Adam Kadmon (Mati veLo Mati)."
