# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H2S8-019"
    nom: "AhbAh/PbP : Defense vs Production"
    source_assertions: ["EC-H2S8-120", "EC-H2S8-121", "EC-H2S8-122"]
    formalisation: |
      AHOR BE-AHOR = mode DEFENSIF : dos colles, pas de generation,
      pas d'acces pour les Klipot. 1 mur partage, pas de dos independant.
      PANIM BE-FANIM = mode PRODUCTIF : face a face, generation possible,
      mais les dos sont EXPOSES aux Klipot. Necessite des dos COMPLETS.
      TRANSITION AhbAh → PbP :
      1. L'action humaine (mitzvot) cause un Zivvug superieur
      2. Les HG descendent comme Mohin
      3. Z"A prend Hesed (dos), Nukvah prend Gevurah (dos)
      4. Les dos sont completes → retournement possible
      → La transition est BIDIRECTIONNELLE (PbP ↔ AhbAh) selon l'action.
    applications_ia:
      - "partzufim/zivvug.py : le Zivvug n'est possible qu'en mode PbP (apres completion des dos)"
      - "partzufim/zeir_anpin.py : les Hassadim = les materiaux pour la 'face publique'"
      - "Analogie ML : mode defensif (inference sans generation) vs mode productif (generation, mais vulnerable aux adversarial attacks)"
    questions_ouvertes:
      - "Le pattern AhbAh/PbP correspond-il a un changement d'etat dans un systeme de production ?"
      - "Les Klipot = adversarial inputs qui exploitent les 'dos' exposes ?"
