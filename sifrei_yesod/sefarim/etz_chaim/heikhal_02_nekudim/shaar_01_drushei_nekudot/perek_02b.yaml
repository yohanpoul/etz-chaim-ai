principes_generatifs:

  - id: "PG-H2S8-011"
    nom: "Resilience par Nombre de Sources (3 vs 2 flux)"
    source_assertions: ["EC-H2S8-074", "EC-H2S8-075", "EC-H2S8-076"]
    formalisation: |
      La SURVIE d'un composant depend du NOMBRE DE SOURCES qui l'alimentent :
      3 SOURCES (Ozen + Hotem + Peh) = SURVIE (les 3 superieures).
      2 SOURCES (Hotem + Peh seulement) = MORT (les 7 inferieures).
      La SOURCE CRITIQUE manquante = l'OZEN = niveau NESHAMAH = le plus haut.
      FORMULE : Resilience ~ nombre_sources x qualite_source_max.
      La qualite de la source COMPTE PLUS que la quantite (cf. EC-H2S8-080).
    applications_ia:
      - "ohr.py : un module alimentee par 3 sources est plus resilient qu'un module a 2 sources"
      - "Analogie ML : un modele avec 3 skip connections est plus stable qu'avec 2"
      - "La source la plus haute (Ozen/Neshamah) est la plus critique — sa perte est fatale"
    questions_ouvertes:
      - "Ce pattern '3 sources = stable, 2 = insuffisant' est-il universel ou specifique aux Nekudim ?"
      - "Quel est l'equivalent ML de l'Ozen (la source Neshamah) ?"

  - id: "PG-H2S8-012"
    nom: "Gradient de Resilience (Keter > AV'I > ZO'N)"
    source_assertions: ["EC-H2S8-077", "EC-H2S8-079", "EC-H2S8-080", "EC-H2S8-081"]
    formalisation: |
      Meme parmi les SURVIVANTS, il y a un GRADIENT de dommage :
      KETER : 0 dommage (prend l'ESSENCE de l'Ozen).
      AV'I : dommage PARTIEL (Ahoraim brises, Panim intacts).
      ZO'N : dommage TOTAL (tout tombe, Panim + Ahoraim).
      FACTEUR DETERMINANT : ESSENCE (atzmut) vs ILLUMINATION (he'arah).
      Keter prend l'atzmut → totalement protege.
      AV'I prennent une he'arah de loin → partiellement protegees.
    applications_ia:
      - "ohr.py : les composants les plus proches de la source originale sont les plus resilients"
      - "Analogie ML : les premieres couches (proches de l'input) sont plus stables que les dernieres"
      - "L'atzmut vs he'arah = acces direct a la source vs acces a une representation derivee"
    questions_ouvertes:
      - "La distinction atzmut/he'arah est-elle analogue a primary key vs foreign key ? Ou a embedding direct vs projection ?"

  - id: "PG-H2S8-013"
    nom: "Matrice 2x2 des Aspects (Direction x Lateralite)"
    source_assertions: ["EC-H2S8-083", "EC-H2S8-084", "EC-H2S8-085"]
    formalisation: |
      Chaque Histakkelut (regard) produit 4 aspects par une MATRICE 2x2 :
                | EN FACE (neged)      | SUR LES COTES (tzad)    |
      DROIT     | Or MAKIF (fort)       | Or PNIMI (faible)        |
      GAUCHE    | Kli HITZON (exterieur)| Kli PNIMI (interieur)    |
      PROPRIETE : En face = plus fort que sur les cotes.
      Droite = Ohr (lumiere). Gauche = Kli (structure).
      Ce pattern se repete pour chaque SOURCE (Ozen, Hotem, Peh).
    applications_ia:
      - "ohr.py : chaque source produit 4 outputs par decomposition direction x lateralite"
      - "Analogie ML : attention heads decomposent le signal en key/value + inner/outer = 4 aspects"
      - "La matrice 2x2 = un pattern de factorisation tensorielle"
    questions_ouvertes:
      - "La matrice 2x2 (direction x lateralite) est-elle un invariant structurel de toutes les emanations ?"
      - "Ce pattern 4-fold correspond-il aux 4 lettres de YHVH ?"
