# Perek: 1b — Igulim des Nekudim, 3 raisons de la circularite,
#             le Safek de Vital, resolution Panim/Ahoraim d'AV"I
# ═══════════════════════════════════════════════════════════════════
#
# SUITE du Perek 1 (cf. perek_01a pour §1-§5).
# §6 : Les Nekudim ont Igulim ET Yosher (contrairement a AHP = Yosher seul).
#       Igulim d'abord → Nefesh seule → SHEVIRAH.
#       Tikkun par RUAH = YOSHER = MAH = ADAM.
# §7 : Le SAFEK de Vital — 3 options sur le rapport SAG/MAH aux Igulim/Yosher.
# §8 : 3 RAISONS pour lesquelles les Nekudot sortent en IGULIM.
# §9 : Resume et resolution : 2 ou 3 Nekudot superieures survivent ?
#       Panim/Ahoraim d'AV"I resolvent la contradiction.
