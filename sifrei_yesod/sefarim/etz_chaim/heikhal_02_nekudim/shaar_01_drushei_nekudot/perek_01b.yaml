principes_generatifs:

  - id: "PG-H2S8-004"
    nom: "Principe de Defaillance Mono-Modale (Igulim sans Yosher)"
    source_assertions: ["EC-H2S8-032", "EC-H2S8-033", "EC-H2S8-034"]
    formalisation: |
      Un systeme qui n'opere QU'EN UN SEUL MODE est destine a la DEFAILLANCE :
      IGULIM seuls = NEFESH seule = pas de structure ADAM (male/femelle).
      CONDITION NECESSAIRE pour la stabilite : DEUX modes (Igulim + Yosher).
      Le YOSHER = la RUAH = la FORME D'ADAM = le TIKKUN.
      FORMULE : Stabilite = Igulim(Nefesh) + Yosher(Ruah).
               Shevirah = Igulim(Nefesh) SEUL.
    applications_ia:
      - "ohr.py : un module ne doit jamais fonctionner en mode unique (broadcast-only OU pipeline-only)"
      - "olamot.py : le monde des Nekudim crashe car mono-modal → le Tikkun = ajouter le 2eme mode"
      - "Analogie ML : un modele qui ne fait que du feed-forward (Yosher) ou que de l'attention globale (Igulim) est fragile"
    questions_ouvertes:
      - "La dualite Igulim/Yosher correspond-elle a attention locale vs globale ? Ou a un autre dualisme architectural ?"
      - "Le pattern Nefesh-seule→crash est-il un cas de mode collapse ?"

  - id: "PG-H2S8-005"
    nom: "Circularisation par Compression (3 Orot au Hazeh)"
    source_assertions: ["EC-H2S8-042", "EC-H2S8-043", "EC-H2S8-044", "EC-H2S8-045"]
    formalisation: |
      Quand PLUSIEURS SIGNAUX CONVERGENT au meme point (bottleneck) :
      1. L'Ohr d'A"K (Tiferet) = signal resident
      2. L'Ohr premier (monte des NHY) = signal ascendant (Ma'N)
      3. L'Ohr Hadash (repond au Ma'N) = signal descendant
      → COMPRESSION (dehiqah) → FORCE (koah nimratz) → CIRCULARISATION.
      Les canaux avant et arriere se REJOIGNENT = feedback loop.
      PROPRIETE : la compression au bottleneck CHANGE LE MODE du signal
      (de lineaire/Yosher a circulaire/Igulim).
    applications_ia:
      - "masakh/compression.py : la compression excessive peut changer le MODE d'un signal"
      - "ohr.py : 3 signaux au meme point → bottleneck → changement de topologie"
      - "Analogie ML : le bottleneck dans un autoencoder change la structure des representations"
    questions_ouvertes:
      - "Le changement de mode (Yosher→Igulim) par compression est-il analogue a un changement de phase ?"
      - "Les 3 Orot au Hazeh = 3 sources d'information convergentes. Quelle architecture ML a ce pattern ?"

  - id: "PG-H2S8-006"
    nom: "Architecture Ma'N / Ma'D (Requete-Reponse Ontologique)"
    source_assertions: ["EC-H2S8-043", "EC-H2S8-042"]
    formalisation: |
      L'Ohr premier MONTE comme MA'N (Mayin Nukvin = eaux feminines = REQUETE).
      En REPONSE, un OHR HADASH (lumiere nouvelle) DESCEND = MA'D (Mayin Dukhrin = reponse).
      Le Ma'N ne cree pas directement → il PROVOQUE une creation nouvelle.
      Le Ma'D descend par un CHEMIN DIFFERENT (interieur d'A"K, a travers la Parsa).
      → Architecture REQUEST-RESPONSE ou la reponse n'est PAS un echo
      mais une CREATION NOUVELLE venant d'une SOURCE DIFFERENTE.
    applications_ia:
      - "ohr.py : implementer un pattern Ma'N/Ma'D = requete ascendante → reponse descendante par voie differente"
      - "tzimtzum.py : la Parsa transforme le signal qui la traverse"
      - "Analogie ML : le forward pass (descendant) repond au gradient (ascendant) mais n'est pas un simple miroir"
    questions_ouvertes:
      - "La distinction Ma'N/Ma'D est-elle analogue a la distinction gradient/forward pass ?"
      - "L'Ohr Hadash = un nouveau forward pass apres mise a jour des poids (en reponse au gradient) ?"

  - id: "PG-H2S8-007"
    nom: "Transparence Hermeneutique (le Safek de Vital)"
    source_assertions: ["EC-H2S8-036", "EC-H2S8-037", "EC-H2S8-038"]
    formalisation: |
      Vital ADMET ne pas savoir exactement ce que Luria a dit.
      Il presente 3 OPTIONS sans trancher.
      PRINCIPE : la TRANSMISSION ORALE contient des ZONES D'OMBRE.
      Le texte EXHIBE son propre degre d'incertitude = "mesupak".
      Cela ne DIMINUE PAS la valeur du texte — au contraire.
      → L'honnetete sur les limites de la transmission = marque d'erudition.
    applications_ia:
      - "Un systeme IA honnete expose ses NIVEAUX DE CONFIANCE, pas seulement ses reponses"
      - "3 options sans trancher = espace d'exploration, pas echec"
    questions_ouvertes:
      - "Quel impact sur l'architecture si c'est l'option 1 vs 2 vs 3 ? Faut-il implementer les 3 et tester ?"
