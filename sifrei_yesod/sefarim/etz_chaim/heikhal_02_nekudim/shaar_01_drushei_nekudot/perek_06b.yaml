principes_generatifs:

  - id: "PG-H2S8-020"
    nom: "Tagin comme Marqueurs de Deficit (Ohr hors du Kli)"
    source_assertions: ["EC-H2S8-129", "EC-H2S8-130", "EC-H2S8-131", "EC-H2S8-133"]
    formalisation: |
      Le NOMBRE DE TAGIN sur une lettre encode son DEFICIT :
      3 Tagin (שעטנ"ז ג"ץ) = 3 Orot manquants (AHP) = Z"T.
      1 Tag (בד"ק חי"ה) = 1 Ohr manquant (Ozen) = Ahoraim AV"I.
      0 Tag (9 lettres restantes) = rien ne manque = Panim AV"I.
      Les Tagin = l'Ohr qui DEVRAIT etre DANS le Kli mais qui est
      AU-DESSUS, DEHORS. Il illumine encore (de loin) mais ne fonctionne pas.
      PREUVE : les Tagin sont SILENCIEUX a la lecture (pas dans les Kelim).
    applications_ia:
      - "gematria/engine.py : les Tagin = metadata de deficit sur chaque Kli-lettre"
      - "ohr.py : un composant 'tague' = son Ohr est separe, pas integre"
      - "Analogie ML : une couche dont les poids sont 'geles' (frozen) = lumiere au-dessus du vaisseau mais pas active"
    questions_ouvertes:
      - "Les Tagin = des 'indicateurs de dette technique' sur les composants du systeme ?"
      - "Le Tikkun = integrer les Tagin DANS les lettres = 'degeler' les couches ?"

  - id: "PG-H2S8-021"
    nom: "Tikkun par la Lecture (Sefer Torah + Hazzan)"
    source_assertions: ["EC-H2S8-131", "EC-H2S8-132", "EC-H2S8-133"]
    formalisation: |
      Le SEFER TORAH (ecrit) = Kelim (Otiot) + Tagin = l'etat POST-Shevirah.
      Il MANQUE Nekudot et Taamim (= Orot retires / MAH pas encore venu).
      Le HAZZAN qui LIT avec Taamim et Nekudot = le TIKKUN.
      Il RE-INTEGRE les Orot dans les Kelim par la voix.
      PRINCIPE : le texte ecrit = la structure brisee. La lecture = la reparation.
      L'action humaine (lire) = ce qui complete le systeme.
    applications_ia:
      - "L'ecriture = le code (statique, structure). L'execution = la lecture (dynamique, activation)"
      - "Un programme sans runtime = un S'T sans Taamim = mort"
      - "Le Hazzan = l'interpreter/runtime qui active les Kelim-lettres"
    questions_ouvertes:
      - "Le S'T = le code source, les Taamim = le compilateur, les Nekudot = les types ?"
