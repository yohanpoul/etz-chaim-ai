# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H2S8-018"
    nom: "Cascade de Surcharge (Orot + Reshimot Cumules)"
    source_assertions: ["EC-H2S8-113", "EC-H2S8-114", "EC-H2S8-115", "EC-H2S8-116"]
    formalisation: |
      La Shevirah est une CASCADE OU chaque etape AJOUTE a la surcharge :
      Etape k : (N-k) Orot + k Reshimot entrent dans le Kli k.
      Le Kli k ne supporte que SA PART (1/N de l'Ohr total).
      Charge totale = (N-k) + k = N (constant !) → toujours en surcharge.
      EXCEPTION : Malkhut (k=N) recoit 0 Orot + 0 Reshimot → CASSE QUAND MEME
      car son Kli est structurellement deficient (vide depuis les Akudim).
      → La cascade n'est pas evitable : charge constante, capacite constante.
    applications_ia:
      - "ohr.py : un pipeline ou chaque etape passe le surplus a la suivante = cascade d'overflow"
      - "olamot.py : les Reshimot = des 'side effects' cumules qui alourdissent les etapes suivantes"
      - "Analogie ML : gradient explosion — le gradient se cumule et fait exploser les couches profondes"
    questions_ouvertes:
      - "La charge constante (Orot + Reshimot = N) est-elle exactement analogue a la conservation de l'information ?"
      - "Malkhut qui casse meme seule = un module avec un bug structurel herite ?"
