#                    COUCHE 3 : SOD-GENERATIVE
# ═══════════════════════════════════════════════════════════════════

principes_generatifs:

  - id: "PG-H2S8-016"
    nom: "Bitul comme Mecanisme de Stabilite"
    source_assertions: ["EC-H2S8-104", "EC-H2S8-105", "EC-H2S8-107"]
    formalisation: |
      Un systeme est STABLE tant que les composants inferieurs sont
      BETELIM (nullifies) dans le superieur :
      DANS le ventre d'Imma : Z"T = Ma'N = nullifies → STABLE.
      HORS du ventre : Z"T = autonomes → tentent d'entrer dans LEURS Kelim
      → les Kelim ne supportent PAS → SHEVIRAH.
      PRINCIPE : le BITUL (nullification/subordination) = mecanisme
      de stabilite. L'AUTONOMIE prematuree = cause de la defaillance.
    applications_ia:
      - "ohr.py : les sous-modules sont stables tant qu'ils sont 'contenus' dans un module superieur"
      - "Analogie ML : les representations dans les couches intermediaires sont 'nullifiees' dans le batch norm"
      - "L'autonomie prematuree = deployment avant que le composant soit pret"
    questions_ouvertes:
      - "Le Bitul est-il analogue au gradient clipping (empecher un composant de devenir trop fort) ?"
      - "La sortie du ventre = le moment ou un module est 'deploye' independamment ?"

  - id: "PG-H2S8-017"
    nom: "288 Nitzotzot + 1 (l'Exception du Yesod)"
    source_assertions: ["EC-H2S8-112"]
    formalisation: |
      Apres la Shevirah, TOUS les Orot se retirent.
      Il reste seulement 288 NITZOTZOT (etincelles) dans les vaisseaux brises.
      EXCEPTION : le KLI du YESOD garde un OHR SUPPLEMENTAIRE
