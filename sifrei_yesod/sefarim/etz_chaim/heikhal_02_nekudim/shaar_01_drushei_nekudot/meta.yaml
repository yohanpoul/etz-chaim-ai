shaar_name_he: "שער דרושי נקודות"
shaar_name_fr: "Porte des Discours sur les Nekudot"
nombre_perakim: 6
sefaria_gate: 8
sujet_principal: "Les NEKUDIM = lumieres sortant des YEUX (einaim) d'Adam Kadmon = SAG de SAG = Hokhmah. Les 9 nekudot hebraiques encodent la structure : 2 superieures (Kamatz/Patach = Keter/Hokhmah) survivent, 7 inferieures (les Melakhim) meurent. Igulim d'abord (Nefesh seule) → brisure. Tikkun par Yosher (Ruah = MAH = Adam). 3 raisons pour les Igulim. Correspondance TANTA-YHVH. Gematria fondamentales (Ayin=130, SAG=63, EHYEH)."
concepts_cles: [nekudot, einaim, sag_de_sag, hokhmah, taamim, nekudot_hebreu, tagin, otiot, kamatz, patach, igulim, yosher, nefesh, ruah, shevirah, tikkun, mah_45, adam, melakhim, edom, ehyeh, parsa, tabur, nhy]
note: "Le sha'ar 01 dans Heikhal 2 = sha'ar 8 global = gate 8 Sefaria."
