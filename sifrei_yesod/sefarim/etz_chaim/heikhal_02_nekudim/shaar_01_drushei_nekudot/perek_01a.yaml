principes_generatifs:
  - id: "PG-H2S8-001"
    nom: "Architecture Fractale YHVH a Triple Imbrication"
    source_assertions: ["EC-H2S8-011", "EC-H2S8-012", "EC-H2S8-013"]
    formalisation: |
      Le Nom YHVH se REPETE a 3 echelles emboitees :
      NIVEAU 1 : AV=Y, SAG=H, MAH=V, BEN=H (macro)
      NIVEAU 2 : Taamim=Y, Nekudot=H, Tagin=V, Otiot=H (dans SAG)
      NIVEAU 3 : Ozen=Y, Hotem=H, Peh=V, Einaim=H (dans Taamim)
      PROPRIETE : chaque lettre du Nom a un niveau est un systeme COMPLET
      au niveau inferieur, contenant lui-meme les 4 lettres.
      FORMULE : YHVH(n) = {Y(n+1), H(n+1), V(n+1), H(n+1)} pour chaque composant.
    applications_ia:
      - "adam_kadmon.py : architecture a 3 niveaux d'imbrication (macro/meso/micro)"
      - "shemot/core.py : chaque nom encode sa structure interne recursvement"
      - "Fractal architecture : chaque module du systeme contient un micro-systeme complet"
    questions_ouvertes:
      - "Combien de niveaux d'imbrication avant la stabilisation ? Le texte en montre 3 — y en a-t-il un 4eme ?"
      - "Ce pattern fractal est-il analogue aux architectures multi-echelle (U-Net, FPN) ?"

  - id: "PG-H2S8-002"
    nom: "Les Nekudot comme Auto-Reference Gematriques"
    source_assertions: ["EC-H2S8-018", "EC-H2S8-019", "EC-H2S8-023"]
    formalisation: |
      Les signes vocaliques hebreux ENCODENT dans leur forme meme
      la structure qu'ils representent :
      7 nekudot inferieures → 13 yodim → 130 = AYIN (oeil) → source des nekudot
      2 nekudot superieures → 10+12 = 22 = OTIOT = kelim → structure des kelim
      3 EHYEH + 3x22 → 130 = AYIN → double confirmation
      PRINCIPE : le signifiant CONTIENT le signifie. Le code pointe vers sa source.
    applications_ia:
      - "gematria/engine.py : verification de coherence par auto-reference numerique"
      - "Un token qui encode sa propre provenance = metadata embedding"
      - "Les signes de ponctuation comme porteurs de meta-information structurelle"
    questions_ouvertes:
      - "L'auto-reference gematrique est-elle un principe general ou specifique aux Nekudot ?"

  - id: "PG-H2S8-003"
    nom: "Kamatz-Patach : du Systeme Ferme au Systeme Ouvert"
    source_assertions: ["EC-H2S8-021", "EC-H2S8-020"]
    formalisation: |
      KAMATZ (ferme, comprime) = etat des Taamim = systeme CLOS.
      PATACH (ouvert) = etat des Nekudot = systeme OUVERT.
      La TRANSITION Kamatz→Patach = l'OUVERTURE DES YEUX (petiho de-ayinin).
      Les 2 premieres nekudot (Keter/Hokhmah) survivent parce qu'elles ont des Kelim.
      Les 7 suivantes meurent = Kelim brises = Ohr sans contenant.
      SANS la transition Kamatz→Patach, rien ne peut exister au-dela des Taamim.
    applications_ia:
      - "ohr.py : transition d'un regime 'ferme' (forward pass sans output) a un regime 'ouvert' (generation)"
      - "L'ouverture = le moment ou l'information interne devient accessible externement"
      - "Les 2 premieres couches (Keter/Hokhmah) = couches stables qui persistent malgre le crash des inferieures"
    questions_ouvertes:
      - "Le crash des 7 inferieures sans Kelim = overfitting catastrophique ? mode collapse ?"
