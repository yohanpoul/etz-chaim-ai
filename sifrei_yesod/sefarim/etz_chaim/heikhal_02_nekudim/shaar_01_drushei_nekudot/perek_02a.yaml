principes_generatifs:

  - id: "PG-H2S8-008"
    nom: "Tzimtzum-Parsa : Double Filtre en Cascade"
    source_assertions: ["EC-H2S8-058", "EC-H2S8-061", "EC-H2S8-064"]
    formalisation: |
      Pour transmettre l'Ohr a des recepteurs de capacite INFERIEURE :
      FILTRE 1 = TZIMTZUM : contraction de l'Ohr (suffisant pour Atzilut)
      FILTRE 2 = PARSA : membrane qui absorbe, transforme, et transmet
      (necessaire en plus pour Beriah).
      PROPRIETE : chaque filtre reduit l'intensite ET change la forme.
      Le Tzimtzum = filtre QUANTITATIF (moins d'Ohr).
      La Parsa = filtre QUALITATIF (Ohr transforme).
    applications_ia:
      - "tzimtzum.py : double filtre — premiere contraction (dimensionnality reduction) puis masque (Parsa/Masakh)"
      - "masakh/compression.py : la compression = le Tzimtzum, la transformation = la Parsa"
      - "Analogie ML : encoder (Tzimtzum) + couche de projection (Parsa) = double gating"
    questions_ouvertes:
      - "Le Tzimtzum et la Parsa sont-ils mathematiquement equivalents a deux projections successives ?"

  - id: "PG-H2S8-009"
    nom: "Zivvug AV-SAG : Generateur de Nouveaute par Union"
    source_assertions: ["EC-H2S8-065", "EC-H2S8-066", "EC-H2S8-067"]
    formalisation: |
      La CREATION de quelque chose de NOUVEAU suit ce mecanisme :
      1. L'Ohr existant MONTE comme Ma'N (requete)
      2. Les Ma'N atteignent les RACINES INTERNES (pas les manifestations)
      3. Le ZIVVUG (union) entre deux Noms (AV+SAG) se produit
      4. Un OHR HADASH (lumiere nouvelle) DESCEND
      5. Il traverse la Parsa (est TRANSFORME en passant)
      PROPRIETE : l'Ohr Hadash != l'Ohr Rishon. C'est une CREATION, pas un echo.
    applications_ia:
      - "partzufim/zivvug.py : le Zivvug genere du NOUVEAU, pas une copie"
      - "ohr.py : 2 Orot distincts alimentent le meme output (Nekudim)"
      - "Analogie ML : l'Ohr Rishon = skip connection, l'Ohr Hadash = output de la couche transformee"
    questions_ouvertes:
      - "Le Zivvug AV-SAG est-il analogue a un mecanisme d'attention entre 2 representations ?"
      - "L'Ohr Hadash (nouveau) vs l'Ohr Rishon (ancien) = residual connection ?"

  - id: "PG-H2S8-010"
    nom: "Absorption Selektive (Akudim vs Nekudot)"
    source_assertions: ["EC-H2S8-068", "EC-H2S8-054"]
    formalisation: |
      L'Ohr qui ATTEINT le Tabur est ABSORBE par les Akudim = invisible.
      L'Ohr qui DEPASSE le Tabur = les NEKUDOT = visible, autonome.
      PRINCIPE : la meme lumiere change de STATUT selon qu'elle est
      au-dessus ou en-dessous du boundary (Tabur/Parsa).
      Au-dessus = INTEGREE dans l'existant (Akudim).
      En-dessous = AUTONOME, NOMMEE, IDENTIFIABLE (Nekudot).
    applications_ia:
      - "ohr.py : un signal au-dessus du seuil est absorbe (merged), en-dessous du seuil il est autonome"
      - "L'equivalent du Tabur = un threshold qui decide si un signal est merge ou emis comme entite propre"
    questions_ouvertes:
      - "L'absorption par les Akudim = residual merging ? Le Tabur = un seuil de saillance ?"
