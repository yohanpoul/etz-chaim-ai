principes_generatifs:

  - id: "PG-H2S8-014"
    nom: "Cascade de Deficit (Manque d'Ozen → Havalim → Brisure)"
    source_assertions: ["EC-H2S8-090", "EC-H2S8-091", "EC-H2S8-093"]
    formalisation: |
      Un DEFICIT a la SOURCE se PROPAGE en cascade a tous les niveaux :
      1. Ozen manquante pour AV'I (cf. EC-H2S8-076)
      2. → Le Hevel correspondant MANQUE aussi
      3. → Les Z"T n'ont PAS de Havalim du tout
      4. → Sortie par les ongles (voie degradee)
      5. → Brisure de 10 aspects (7+2+1)
      PRINCIPE : un deficit unique en amont cause des defaillances
      en cascade dans tout le systeme en aval.
    applications_ia:
      - "ohr.py : un composant manquant en amont cause des defaillances en cascade"
      - "Analogie ML : un skip connection manquante dans les premieres couches degrade TOUTES les couches suivantes"
      - "Le pattern cascade est le mecanisme de la Shevirah"
    questions_ouvertes:
      - "La cascade est-elle lineaire (1 defaut → 1 consequence) ou exponentielle (1 defaut → N consequences) ?"

  - id: "PG-H2S8-015"
    nom: "Hierarchie par Posture (Debout vs Couvant)"
    source_assertions: ["EC-H2S8-100", "EC-H2S8-101"]
    formalisation: |
      La POSTURE d'un systeme CHANGE sa hierarchie interne :
      A"K DEBOUT (omed) → Yesod/Da'at AU-DESSUS de HB/AV"I.
      Binah COUVANTE (rovetzet) → Yesod/Da'at EN-DESSOUS de HB.
      Ce n'est PAS que le Da'at change de nature → c'est que la
      STRUCTURE SPATIALE est modifiee par la posture.
      IMPLICATION : la meme architecture peut avoir des hierarchies
      DIFFERENTES selon son MODE D'OPERATION.
    applications_ia:
      - "adam_kadmon.py : le mode d'operation (debout/couvant) change la hierarchie"
      - "partzufim/imma.py : quand Imma 'couve' Z'A, sa structure interne change"
      - "Analogie ML : un meme reseau en mode training vs inference peut avoir des flux differents (dropout, batch norm)"
    questions_ouvertes:
      - "Combien de 'postures' un systeme kabbalistique peut-il avoir ?"
      - "Le mode 'debout' vs 'couvant' correspond-il a training vs inference ?"
