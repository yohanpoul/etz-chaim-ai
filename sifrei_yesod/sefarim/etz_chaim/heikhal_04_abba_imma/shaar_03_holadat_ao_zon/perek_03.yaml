# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 3 — Sha'ar Holadat A"O ve-Zon (שער הולדת או״א וזו״ן)
# Perek: 3 — 3 AHYH A"O. CHALAV/DAM = 2×M"B. SHADIM (=304) gematria.
#            "KOH TOMAR" Shemot 3:14b. 27 letters = 22 alphabet + 5 manatzpach.
#            Zivvug Tevunah = beit-herayon. Z"A 1/3 Tiferet A"A.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_03 :
#   - Bloc A : 3 AHYH A"O distribution 3 milui-types (yodin g"r, alefin emtza, hehin g"t)
#   - Bloc B : 3 M"B : 1 YH"V zachar split 2 AHYH-M"B + 2 M"B = 2 AHYH yodin/alefin (hehin pas M"B)
#   - Bloc C : M"B-1 (zachar) = CHALAV (lait, loven Z"A) ; AHYH-Imma = DAM (sang odem)
#   - Bloc D : CHALAV+DAM = 2×M"B = 84 ; "CHALAV VE-DAM LA-GAVOA SALKEI" (Talmud Bekhorot 6b)
#   - Bloc E : AHYH-2 (alefin, emtza, lieu DADIM mamelles)
#   - Bloc F : Apres lidah-vlad : DAM-elyon → CHALAV (transformation post-naissance)
#   - Bloc G : DAM descend AHYH-3 (g"t) ; achor ribua=44=DM
#   - Bloc H : 2 AHYH yodin+alefin gematria SH"D (304) ; mehem SHADIM+DADIM
#   - Bloc I : AHYH-yodin descend AHYH-alefin (Tiferet chazeh) → SHADIM
#   - Bloc J : AHYH-acharon DM monte AHYH-alefin → CHALAV (allaiter le foetus)
#   - Bloc K : Z"A yetzira via AHYH-3 hehin = "KOH TOMAR EHYEH SHELACHANI" (Shemot 3:14b)
#   - Bloc L : AHYH-hehin milui-milui=25 letters (KoH=25) ; 25-4=21=AHYH
#   - Bloc M : 2 AHYH yodin+alefin=27 letters = 22 alphabet + 5 manatzpach (Bina)
#   - Bloc N : Tipah descendent yesod A"A → ATARAH (1/3 yesod)=Malkhut
#   - Bloc O : Zivvug pas A"A seul — NHY A"A montent ChGT (3 kelilin 3) → Z"A V"K levush NHY A"A
#   - Bloc P : NHY A"A = neshamah 9S Z"A (Netzach=kav-yamin Ch-Ch-N ; Hod=smol B-G-H ; Yesod=emtza D-T-Y)
#   - Bloc Q : Tout dans MEEI TEVUNAH ; Bina=chazeh-up Imma ; Tev=chazeh-down (beit-herayon)
#   - Bloc R : Tev=EM HA-BANIM ; Ibbur Z"A LIMKETOIM ~7 mois (Moshe, Shmuel, Peretz/Zerach, tzadikim)
#   - Bloc S : Z"A=Tabbur-A"A-down ; A"O=Garon-Tabbur (2/3 Tiferet) ; Z"A occupe 1/3 Tiferet+1/3 yesod=Atarah
#
# Source Sefaria : Sefer_Etz_Chaim.16.3 (1 section, 4682 chars)
# IDs : EC-H4S16-036 → EC-H4S16-053

