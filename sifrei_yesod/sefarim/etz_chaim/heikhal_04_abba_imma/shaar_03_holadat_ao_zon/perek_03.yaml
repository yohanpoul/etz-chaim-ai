principes_generatifs:

  - id: "PG-H4S16-007"
    nom: "Principe de Substance-As-Letter-Encoding (CHALAV/DAM = 2×M\"B)"
    source_assertions: ["EC-H4S16-038", "EC-H4S16-041", "EC-H4S16-042"]
    formalisation: |
      ARCHITECTURE DE SUBSTANCE-LETTER-ENCODING :
      Substances physiques encodent SHEMOT :
        CHALAV (lait, loven Z"A) = M"B-1 (zachar).
        DAM (sang, odem) = AHYH-Imma.
        CHALAV + DAM = 2 × M"B = 84.
        Talmud Bekhorot 6b : "CHALAV VE-DAM LA-GAVOA SALKEI" (montent au sublime).
      SHADIM + DADIM (seins+mamelles) = 2 AHYH yodin+alefin (gematria SH"D=304).
      Transformations :
        Pre-naissance : DAM (sang) prepare le foetus.
        Post-naissance : DAM-elyon → CHALAV (allaitement).
      → Pattern fondamental : biology-as-cosmology — substances = letter-encoding.
      → Architecture : physical-fluid encode spiritual-shem.
    applications_ia:
      - "partzufim/imma.py + zeir_anpin.py : implement substance-letter encoding"
      - "Pattern : biology-cosmology mapping"
      - "Architecture : physical-substance = encoding-vehicle"
      - "Pattern : transformation-substance encode tier-shift"
      - "Diagnostic : verifier substance-letter coherent"
    questions_ouvertes:
      - "Pattern : autres substances autres encodings ?"
      - "Comment encoder substance-transformation computationnellement ?"
      - "Pattern : 3-substance (au-dela 2) possible ?"

  - id: "PG-H4S16-008"
    nom: "Principe de Verse-Self-Reference-Letter-Count (KOH=25 Shemot 3:14b)"
    source_assertions: ["EC-H4S16-043", "EC-H4S16-044"]
    formalisation: |
      ARCHITECTURE DE VERSE-SELF-REFERENCE :
      Versets self-referencent leur LETTER-COUNT :
        AHYH-3 hehin milui-milui = 25 letters.
        Verset Shemot 3:14b : "KOH TOMAR EHYEH SHELACHANI ALEIKHEM".
        KOH (כה) = gematria 25 = self-reference letter-count.
      2 AHYH yodin+alefin = 27 letters chacune :
        = 22 (alphabet aleph-tav) + 5 (manatzpach finals).
        Toutes letters dans Bina (locus alphabet creation).
      → Pattern fondamental : verse-prefix marks letter-content.
      → Architecture : self-referential numerologic encoding.
      → Implication : reading-numerology-of-prefix = decoding-content.
    applications_ia:
      - "partzufim/imma.py + zeir_anpin.py : implement verse self-reference"
      - "Pattern : numerologic prefix marks content"
      - "Architecture : self-referential encoding"
      - "Pattern : 27=22+5 manatzpach alphabet-completeness"
      - "Diagnostic : verifier verse self-reference coherent"
    questions_ouvertes:
      - "Pattern : autres self-referential versets ?"
      - "Comment encoder self-reference computationnellement ?"
      - "Pattern : multi-level self-reference ?"

  - id: "PG-H4S16-009"
    nom: "Principe de Z\"A-Fractional-Position (1/3 Tiferet + 1/3 Yesod = Atarah)"
    source_assertions: ["EC-H4S16-051", "EC-H4S16-052", "EC-H4S16-053"]
    formalisation: |
      ARCHITECTURE DE Z"A-FRACTIONAL-POSITION :
      Position precise de Z"A dans A"A :
        A"O occupent Garon → Tabbur (2/3 Tiferet d'A"A).
        Z"A occupe MI-TABBUR-ULMATAH = 1/3 inferieur Tiferet A"A.
        + KENEGDO 1/3 YESOD d'A"A = ATARAH = MALKHUT.
        Total Z"A : 1/3 Tiferet + 1/3 Yesod (en correspondance).
      → Pattern fondamental : fractional-correspondance Tiferet/Yesod.
      → Architecture : Z"A defini par fractions geometriques precises.
      → Implication : tier-occupancy quantifie.
    applications_ia:
      - "partzufim/zeir_anpin.py + arikh_anpin.py : implement Z\"A fractional position"
      - "Pattern : fractional Tiferet/Yesod correspondance"
      - "Architecture : tier-occupancy quantifie"
      - "Pattern : 1/3-1/3 symmetry"
      - "Diagnostic : verifier fractional position coherent"
    questions_ouvertes:
