      relevance: "Architecture : intermediate locus creation. Pattern Tevunah=locus."

  - id: "EC-H4S16-049"
    source_he: "בינה התפשטותה עד החזה והתבונה מן החזה ולמטה והנה מקום בית הריון האשה והרחם שלה הוא למטה מהחזה ששם מקום התבונה הרי מבואר איך ההריון הזה הוא בתבונה לכן היא נק' אם הבנים"
    source_ref: "Heikhal 4, Sha'ar 3:3"
    assertion: |
      Position anatomique :
      → BINA = chazeh-up.
      → TEVUNAH = chazeh-down.
      → BEIT HA-HERAYON (lieu de gestation) + RECHEM (utérus) = below-chazeh = lieu Tevunah.
      → HERAYON dans Tevunah ; donc Tev = EM HA-BANIM (mere des fils).
      → Architecture : anatomical-locus-determines-fonction.
      → Pattern : utérus-position determines maternal-tier.
    type: déduction_logique
    concepts:
      - {id: bina_chazeh_up_tev_chazeh_down_beit_herayon_rechem_em_ha_banim, role: bina_chazeh_up_tev_chazeh_down_beit_herayon_rechem_lieu_tev_em_ha_banim}
    mapping:
      modules: ["partzufim/imma.py", "[PLANNED] partzufim/tevunah.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : anatomical locus function. Pattern position determines role."

  - id: "EC-H4S16-050"
    source_he: "עיבור זה של ז\"א למקוטעים היה שהם ז' חדשים ופחות מעט כמו שנולד משה ושמואל ופרץ וזרח וכמה צדיקים"
    source_ref: "Heikhal 4, Sha'ar 3:3"
    assertion: |
      IBBUR Z"A LIMKETOIM (mensualites partielles) :
      → 7 mois et un peu (PAS 9 complets).
      → Comme la naissance de :
        MOSHE.
        SHMUEL.
        PERETZ + ZERACH (jumeaux de Tamar — Bereshit 38:27-30).
        Plusieurs autres TZADIKIM (justes).
      → Architecture : prematuration-as-cosmologic-marker.
      → Pattern : 7+ mois = tzadik-birth-encoding.
    type: déduction_scripturaire
    concepts:
      - {id: ibbur_z_a_limketoim_7_mois_moshe_shmuel_peretz_zerach_tzadikim, role: ibbur_z_a_limketoim_7_chodshim_un_peu_moshe_shmuel_peretz_zerach_tzadikim}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Architecture : prematuration cosmologic. Pattern tzadik birth-encoding."

  - id: "EC-H4S16-051"
    source_he: "סוד עטרת היסוד הוא שליש שיעור של היסוד והוא סוד המלכות. אמנם שיעור ז\"א הוא מטבור ולמטה דא\"א"
    source_ref: "Heikhal 4, Sha'ar 3:3"
    assertion: |
      ATARAH-yesod = SHELISH (1/3) du yesod = sod MALKHUT.
      → SHIUR (mesure) Z"A = MI-TABBUR ULMATAH (de Tabbur en bas) d'A"A.
      → Architecture : Z"A occupies lower-half de A"A.
      → Pattern : Tabbur-as-boundary.
    type: axiome_explicite
    concepts:
      - {id: atarah_1_3_yesod_malkhut_z_a_tabbur_aa_down, role: atarah_yesod_shelish_egal_malkhut_z_a_shiur_tabbur_aa_ulematah}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : Z\"A lower-half. Pattern Tabbur boundary."

  - id: "EC-H4S16-052"
    source_he: "או\"א אם היה שיעורם מראש א\"א היה סופם עד החזה כמו לאה בז\"א וכמו ז\"א בתבונה שיוצא מהחזה אך או\"א מתחילין מהגרון דא\"א לכן סיומם הוא למטה בסוף ב' שלישי של הת\"ת שהוא הטבור"
    source_ref: "Heikhal 4, Sha'ar 3:3"
    assertion: |
      A"O extension :
      → Si AVAIENT commence depuis ROSH A"A : leur fin = chazeh (comme Leah dans Z"A, comme Z"A sortant de chazeh dans Tevunah).
      → MAIS A"O commencent au GARON A"A.
      → Donc fin = sefer 2/3 du Tiferet = TABBUR.
      → Architecture : start-position determines end-position by full-koma.
      → Pattern : Garon-Tabbur range pour A"O.
    type: déduction_logique
    concepts:
      - {id: ao_garon_aa_jusqu_tabbur_2_3_tiferet_aa, role: ao_commencent_garon_aa_terminent_2_3_tiferet_egal_tabbur_aa_full_koma}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : start determines end. Pattern Garon-Tabbur range."

  - id: "EC-H4S16-053"
    source_he: "אין לז\"א בת\"ת של א\"א רק שליש לבד וכנגד שליש זה שהוא לוקח מת\"ת דא\"א כנגדו לוקח המלכות שליש א' מן היסוד דא\"א שהוא סוד העטרה"
    source_ref: "Heikhal 4, Sha'ar 3:3"
    assertion: |
      Z"A occupies precisely :
      → 1/3 du TIFERET d'A"A (le 1/3 inferieur, sous le Tabbur).
      → + KENEGDO (en correspondance) : 1/3 du YESOD d'A"A = sod ATARAH.
      → C'est la MALKHUT (de Z"A).
      → Architecture : 1/3-Tiferet + 1/3-Yesod = Z"A-Malkhut shi'ur.
      → Pattern : fractional-correspondance Tiferet/Yesod.
    type: déduction_logique
    concepts:
      - {id: z_a_1_3_tiferet_aa_plus_1_3_yesod_atarah_malkhut, role: z_a_1_3_tiferet_aa_inferieur_plus_kenegdo_1_3_yesod_atarah_malkhut_shi_ur}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "arikh_anpin"]
      relevance: "Architecture : fractional Z\"A measurement. Pattern Tiferet/Yesod correspondance."


