  sujet_principal: |
    Sha'ar HoladaT A"O VE-ZON (Heikhal 4, Sefer Etz Chaim 16). 7 perakim systematiques sur :
    - Hakdamah HOLADAT A"O+Zon
    - 42 ZIVVUGIM (Zohar Bereshit 15)
    - Tipah du SHEM AB ; sod YH"V (chab"d)
    - 3 YH"V (AB+MaH+BaN) = 63 = SaG ; YH"V SaG=48 → MaKOM=186 (Shemot 33:21)
    - CHIKH (palais) = yesod Chokhmah = ChG"T 28+14 letters = 42
    - GARON = Bina (par rapport au reste du corps)
    - SaG 2 metziut : milui yodin (Abba) + milui alefin (Imma) → A"O kechada nafkin
    - ZON inegaux MaH+BaN (vs A"O qui sont SaG seul kechada)
    - Sods CHAKAL TAPUCHIN (138) ; KI CHELEK HASHEM AMO (Devarim 32:9)
