  - id: "EC-H4S16-062"
    source_he: "סוד הזווג הזה שבפה נמצא בכל מציאות אצילות בין בא\"א בין באו\"א בין בזו\"נ והם בסוד נשיקין הקודמין אל הזווג"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      ZIVVUG-PEH UNIVERSEL :
      → Trouve dans TOUT atzilut : A"A, A"O, Z"O"N.
