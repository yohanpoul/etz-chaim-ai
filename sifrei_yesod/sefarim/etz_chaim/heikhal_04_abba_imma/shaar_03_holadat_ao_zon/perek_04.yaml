  - id: "EC-H4S16-063"
    source_he: "מתחלה המעוררת היא הנוקבא וז\"ס הנרמז במסכת כתובות ה\"ד לאלתר בעוד שהרוק לתוך פיה כי מבשרי אחזה אלוה כי כשאדם מזדווג באשתו בהכרח מתמצה הרוק בתוך פיהם"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      Initiation femele :
      → ME-TCHILAH (au commencement) NUKVA = ME'ORERET (eveille).
      → Sod KETUBOT 5d : "LE-ALTAR BE-OD SHE-HA-ROUK BE-TOKH PIHA" (immediat tant que la salive est dans sa bouche).
      → "MI-BESARI ECHEZEH ELOHA" (Iyov 19:26).
      → ROUK MITMATZE (saliva sort/jaillit) dans bouches lors zivvug.
      → Architecture : embodied-evidence pour cosmologic-mechanism.
      → Pattern : female-initiation precedes intimacy.
    type: déduction_scripturaire
    concepts:
