      tables: ["zivvug_states"]
      partzufim: ["arikh_anpin"]
      relevance: "Architecture : 2 zivvug loci. Pattern oral+yesod zivvug."

  - id: "EC-H4S16-068"
    source_he: "להוליד או\"א הספיק להם זווג הנשיקין והוא זווג הפה כנ\"ל"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      Pour HOLADAT A"O :
      → SUFFIT zivvug-NESHIKIN = zivvug-PEH d'A"A.
      → Pas besoin zivvug-yesod (qui est pour ZON).
      → Architecture : tier-appropriate zivvug type.
      → Pattern : higher-tier suffit oral-zivvug.
    type: déduction_logique
    concepts:
      - {id: holadat_ao_suffit_zivvug_neshikin_peh_aa, role: holadat_ao_suffit_zivvug_neshikin_peh_aa_pas_besoin_yesod}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : tier-appropriate zivvug. Pattern oral-suffit-higher."

  - id: "EC-H4S16-069"
    source_he: "או\"א הם נכללין במזלא תיקון ח' וי\"ג (די\"ג) ת\"ד כי הלא תליין בשקולא עד טבורא"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      A"O kelulin dans MAZAL :
      → MAZAL T"D 8 (Notzer Chesed) + MAZAL T"D 13 (Ve-Nakeh).
      → "TLEYAN BE-SHEKULA AD TABBURA" (suspendus en equilibre jusqu'au Tabbur).
      → Architecture : A"O suspended sous mazalot (extensions dikna).
      → Pattern : tier-suspension-from-higher-mazalot.
      cf. EC-H4S14-088..089 (perek 03b) sur Mazal 8+13.
    type: axiome_explicite
    concepts:
      - {id: ao_kelulin_mazal_t_d_8_13_tleyan_be_shekula_ad_tabbura, role: ao_kelulin_mazal_t_d_8_13_notzer_chesed_ve_nakeh_tleyan_be_shekula_ad_tabbura}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : tier-suspension. Pattern mazalot-extension dikna."

  - id: "EC-H4S16-070"
    source_he: "לפעמים אין או\"א שלימים רק חסירים מנה\"i... אך כאשר נעשה הזווג הזה של הפה דא\"א אז נעשו כל התקונים של הד' העומדין בין תיקון ח' לתיקון י\"ג וכולם נתחברו יחד ונכללין בהם או\"א"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      Etat A"O :
      → PARFOIS A"O EIN SHELEMIM (pas complets) — CHESERIM (manquent) NHY.
      → Quand zivvug-PEH d'A"A se fait :
        Tous TIKKUNIM des 4 entre Mazal 8 et Mazal 13 sont assembles+kollel A"O.
      → Architecture : zivvug-event upgrades A"O par 4-tikkunim.
      → Pattern : event-driven A"O completion.
    type: interprétation_lurianique
    concepts:
      - {id: ao_parfois_cheserim_nhy_zivvug_peh_aa_4_tikkunim_mazal_8_13_kollel, role: ao_parfois_cheserim_nhy_zivvug_peh_aa_4_tikkunim_entre_mazal_8_13_kollel_ao}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : event-driven completion. Pattern 4-tikkunim upgrade."

  - id: "EC-H4S16-071"
    source_he: "הגרון סוד גולגלת דילהון... כשזוקף ראשו אז מתראה הגרון וכשהזווג עליון דפה דא\"א נעשה בסוד נשיקין אז יורד למטה מסיום הפה בסוד כפיפת ראש ואז נכלל הגרון בהם ממש"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      GARON dynamic :
      → = sod GULGOLET (crane) DEYHON (de eux — A"O).
      → Quand humain incline rosh → garon couvert (kefoul = courbe).
      → Quand redresse → garon revele.
      → Lors zivvug-PEH-A"A en sod NESHIKIN → DESCENT en sod KEFIPAT-ROSH (inclinaison de tete).
      → Garon kollel (inclus) DANS A"O MAMASH (litteralement) = sod ROSH d'A"O.
      → Architecture : anatomical-posture encode cosmic-event.
      → Pattern : kefipat-rosh = inclination during zivvug.
    type: interprétation_lurianique
    concepts:
      - {id: garon_gulgolet_ao_kefipat_rosh_descend_neshikin_kollel_rosh_ao, role: garon_sod_gulgolet_deyhon_kefipat_rosh_descend_neshikin_kollel_rosh_ao_mamash}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : anatomical-posture cosmic-event. Pattern kefipat-rosh inclination."

  - id: "EC-H4S16-072"
    source_he: "מאותו שפע המתרבה אז מכחם מתארך גוף או\"א ונה\"י שבהם כי אותו החלק הג' מת\"ת דא\"א שנשאר... נעשה ממנו חלק הגוף לאבא כולל חג\"ת וחלק הגוף לאמא"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      SHEFA-MIT'RAVE (flux abondant) post-zivvug-peh :
      → ALLONGE GUF d'A"O + forme NHY.
      → 1/3 du TIFERET d'A"A (qui reste apres 2 chalakim → 2 daat A"O) :
        → Forme corps ABBA (ChGT).
        → Forme corps IMMA (ChGT).
      → MI-RIBUI HA-SHEFA (de l'abondance du flux) → 3 autres NHY a Abba+Imma.
      → Architecture : flux-abundance enables tier-extension.
      → Pattern : 1/3 Tiferet provides ChGT pour A"O.
    type: interprétation_lurianique
    concepts:
      - {id: shefa_mit_rave_allonge_guf_ao_nhy_1_3_tiferet_aa_chgt_abba_imma, role: shefa_mit_rave_post_zivvug_peh_allonge_guf_ao_nhy_1_3_tiferet_aa_chgt_corps_abba_imma}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : flux-abundance tier-extension. Pattern fractional 1/3 Tiferet."


