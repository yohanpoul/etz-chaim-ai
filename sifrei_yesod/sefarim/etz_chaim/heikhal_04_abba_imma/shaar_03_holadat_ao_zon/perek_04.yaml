  - id: "EC-H4S16-060"
    source_he: "נרמז באדר\"ז רצ\"ה אשא ומיא מתקנין ויאן ביורוי ע\"י לישן ממלל רברבן"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      ADRA ZUTA fol. 295 :
      → "ESHA U-MAYA MITKANIN VE-YAEN BIYUREI AL-YEDEI LISHAN MAMLEL RAVRAVAN"
