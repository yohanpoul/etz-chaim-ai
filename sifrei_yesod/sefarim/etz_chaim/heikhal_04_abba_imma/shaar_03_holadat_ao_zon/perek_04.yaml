      relevance: "Architecture : sefirah → mochin. Pattern Chesed-Abba Gevurah-Imma."

  - id: "EC-H4S16-067"
    source_he: "יש בו ב' זווגים א' בסוד הפה שלו אחע\"ה וגיכ\"ק והב' בסוד יסוד שלו כי גם הוא כלול מב' מזכר ונוקבא"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      A"A a 2 ZIVVUGIM internes :
      → ZIVVUG-1 : sod PEH (ACHE'H + GIKQ).
      → ZIVVUG-2 : sod YESOD — kelul de zachar+nukva (yesod meme bipolaire).
      → Architecture : 2 zivvug-loci dans A"A meme.
      → Pattern : oral-zivvug + yesod-zivvug.
    type: axiome_explicite
    concepts:
      - {id: aa_2_zivvugim_peh_ache_h_gikq_yesod_zachar_nukva, role: aa_2_zivvugim_peh_ache_h_gikq_plus_yesod_kelul_zachar_nukva}
    mapping:
