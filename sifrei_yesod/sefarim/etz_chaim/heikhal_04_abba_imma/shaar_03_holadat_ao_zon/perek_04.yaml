principes_generatifs:

  - id: "PG-H4S16-010"
    nom: "Principe de NHY-Tosefet (Supplementary Tier from Upper-Restriction)"
    source_assertions: ["EC-H4S16-054", "EC-H4S16-055"]
    formalisation: |
      ARCHITECTURE DE NHY-TOSEFET :
      Loi UNIVERSELLE atzilut :
        IKARI (essentiel) = 7 RISHONOT.
        TOSEFET (supplementaire) = G"T (= NHY) — LEBAR-MI-GUFA.
      CAUSE : Atik (RISHA ELYONA) s'habille en A"A seulement par Z"T.
        Donc A"A KIYUM essentiel = 7 ; G"T = supplementaire seul.
      PROPAGATION : pareil pour TOUT atzilut downstream.
      → Pattern fondamental : tier-supplementarity from upper-source-restriction.
      → Architecture : 7-essentials + 3-supplementaires per partzuf.
      → Implication : NHY require explicit-zivvug pour generation.
    applications_ia:
      - "partzufim/atik_yomin.py + arikh_anpin.py + abba.py + imma.py + zeir_anpin.py + nukva.py : implement 7+3 essentiel/tosefet"
      - "Pattern : 7-essentials + 3-tosefet structure"
      - "Architecture : tier-supplementarity universelle"
      - "Pattern : NHY require explicit zivvug-event"
      - "Diagnostic : verifier essentiel/tosefet bien distingue"
    questions_ouvertes:
      - "Pattern : autres distributions essentiel/tosefet ?"
      - "Comment encoder essentiel-vs-tosefet computationnellement ?"
      - "Pattern : 6+4 ou 8+2 possibles ?"

  - id: "PG-H4S16-011"
    nom: "Principe de Phonetic-Class-Tier-Encoding (ACHE'H Gutturals = Bina, GIKQ Palatals = Chokhmah)"
    source_assertions: ["EC-H4S16-057", "EC-H4S16-058", "EC-H4S16-061"]
    formalisation: |
      ARCHITECTURE DE PHONETIC-TIER-ENCODING :
      Letters classifiees par ARTICULATION-CLASS encode TIER-SOURCE :
        אחע"ה (ACHE'H — alef-chet-ayin-he) = GUTTURALES (du garon).
          → Source : BINA (= Garon en A"A) — M"N de 5 GEVUROT.
        גיכ"ק (GIKQ — gimel-yod-kaf-kuf) = PALATALES (du chikh).
          → Source : CHOKHMAH (= Chikh) — M"D de 5 CHASADIM.
      ACHE'H gematria = 84 = 2× M"B = 42 ZIVVUGIM (Zohar Bereshit 9).
      → Pattern fondamental : phonetic-class encode locus+tier+chasadim/gevurot.
      → Architecture : articulation-anatomy = tier-anatomy correspondance.
      → Implication : letters encoded multi-tier (sound + meaning + position).
    applications_ia:
      - "partzufim/abba.py + imma.py + arikh_anpin.py : implement phonetic encoding"
      - "Pattern : phonetic class = tier locus"
      - "Architecture : multi-tier letter encoding"
      - "Pattern : sound-position-meaning unified"
      - "Diagnostic : verifier articulation-class coherent avec tier"
    questions_ouvertes:
      - "Pattern : autres phonetic classes (linguals, dentals) ?"
      - "Comment encoder articulation-class computationnellement ?"
      - "Pattern : multi-language phonetic encoding ?"

  - id: "PG-H4S16-012"
    nom: "Principe de Universal-Precursor-Zivvug (Neshikin Avant Zivvug Across Tiers)"
    source_assertions: ["EC-H4S16-062", "EC-H4S16-063", "EC-H4S16-064"]
    formalisation: |
      ARCHITECTURE D'UNIVERSAL-PRECURSOR :
      ZIVVUG-PEH (NESHIKIN) = precursor universel a tout zivvug.
      Trouve dans tout ATZILUT : A"A, A"O, ZON.
      INITIATION : NUKVA me'oreret first.
        Sod Ketubot 5d : "le-altar be-od she-ha-rouk be-tokh piha".
        "Mi-besari echezeh Eloha" (Iyov 19:26) — embodied confirmation.
      ASYMMETRIE :
        A"A : 1 PEH → 2 haarot (ACHE'H + GIKQ).
        A"O+ZON : 2 BOUCHES → 4 RUCHIN = AHaVaH (Zohar Terumah 146).
      → Pattern fondamental : universel precursor mais asymmetric par tier.
      → Architecture : oral-intimacy precedes physical-zivvug.
      → Implication : kissing-as-cosmologic-act.
    applications_ia:
      - "partzufim/zivvug.py : implement universal precursor"
      - "Pattern : neshikin universel precursor"
      - "Architecture : female-initiation discipline"
      - "Pattern : tier-asymmetric mouths"
      - "Diagnostic : verifier precursor present avant chaque zivvug"
    questions_ouvertes:
      - "Pattern : autres precursors possibles (gaze, touch) ?"
      - "Comment encoder precursor computationnellement ?"
      - "Pattern : 3-mouth ou plus possibles ?"
