      relevance: "Architecture : transcendent source. Pattern non-classifiable."

  - id: "EC-H4S16-066"
    source_he: "מחסד דא\"א נתהווה מוחין דאבא ומגבורה דא\"א נתהוה מוחין דאמא"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
