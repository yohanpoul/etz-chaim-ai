      → Sod : "ZAR'A DE-AZDAR'A BE-42 ZIVVUGIM" (semence semee en 42 zivvugim).
      → Architecture : letter-cluster encode 42-zivvugim cosmologique.
      → Pattern : phonetic-cluster = numerologic-foundation.
    type: déduction_scripturaire
    concepts:
