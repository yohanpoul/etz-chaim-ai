  - id: "EC-H4S16-055"
    source_he: "אין קיום לא\"א רק לז' ראשונות שבו והג\"ת שהם נה\"י אינן יכולין לבא רק בסוד תוספת... וכעד\"ז כל האצילות"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      A"A KIYUM (existence essentielle) :
      → Seulement 7 RISHONOT (= Z"T d'Atik s'habillant).
      → G"T (= NHY) viennent SEULEMENT en TOSEFET.
      → PAREIL pour TOUT ATZILUT.
      → Architecture : universal-rule essentiel-vs-supplementaire.
      → Pattern : 7-essentials + 3-tosefet par partzuf.
    type: axiome_explicite
    concepts:
      - {id: aa_kiyum_7_rishonot_g_t_nhy_tosefet_universel_atzilut, role: aa_kiyum_7_rishonot_g_t_nhy_tosefet_universel_tout_atzilut_meme_pattern}
