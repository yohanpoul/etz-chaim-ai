# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 3 — Sha'ar Holadat A"O ve-Zon (שער הולדת או״א וזו״ן)
# Perek: 4 — NHY=tosefet ; ACHE'H+GIKQ peh A"A ; LASHON daat-makhria.
#            ESHA+MAYA Adra. AHaVaH 4 ruchin. RDLA. Mazal T"D 8+13.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_04 :
#   - Bloc A : NHY=TOSEFET (addition) ; pas IKARIM ; LEBAR-MI-GUFA
#   - Bloc B : RDLA Atik s'habille A"A seulement Z"T ; A"A IKAR=7, NHY=tosefet
#   - Bloc C : Pareil tout atzilut
#   - Bloc D : Pour A"O obtain NHY : zivvug ELYON DE-PEH A"A
#   - Bloc E : BINA (=Garon) M"N letters אחע"ה (gutturals, 5 Gevurot)
#   - Bloc F : CHIKH (=Chokhmah) M"D letters גיכ"ק (palatales, 5 Chasadim)
#   - Bloc G : Zivvug via DAAT-MAKHRIA = LASHON ; sod BRIT HA-LASHON
#   - Bloc H : Adra Zuta 295 : "ESHA U-MAYA MITKANIN AL-YEDEI LISHAN MAMLEL RAVRAVAN"
#   - Bloc I : ACHE'H = 84 = 2×M"B = 42 ZIVVUGIM (Bereshit ch9) ; "ZAR'A DE-AZDAR'A BE-42 ZIVVUGIM"
#   - Bloc J : Zivvug-peh dans tout atzilut (A"A, A"O, ZON) ; sod NESHIKIN avant zivvug
#   - Bloc K : NUKVA ME'ORERET first ; Ketubot 5d "le-altar be-od she-ha-rouk be-tokh piha"
#   - Bloc L : NESHIKIN = zivvug RUCHANI tres profond
#   - Bloc M : DIFFERENCE — A"A 1 peh (2 haarot ACHE'H+GIKQ) ; A"O+ZON 2 bouches (4 letters AHaVaH=4 RUCHIN Zohar Terumah 146)
#   - Bloc N : RDLA (Reisha de-Lo Ityada)=au-dessus atzilut ; 9S MEKORIYOT A"A "lau inun nehorin lau inun ruchin" (Adra)
#   - Bloc O : CHESED A"A → mochin Abba ; GEVURAH A"A → mochin Imma ; 2 zivvugim A"A (peh + yesod)
#   - Bloc P : A"O kelulin MAZAL T"D 8+13 (TLEYAN BE-SHEKULA AD TABBURA) ; parfois CHESERIM NHY
#   - Bloc Q : Quand zivvug-peh-A"A → 4 tikkunim entre mazalot mitchabrim+kollel rosh A"O → mochin
#   - Bloc R : Garon=sod GULGOLET A"O ; KEFIPAT-ROSH ; kollel rosh A"O+NHY=tete Z"A
#   - Bloc S : SHEFA-MIT'RAVE allonge guf A"O + forme NHY ; 1/3 Tiferet A"A → ChGT A"O ; surplus → NHY
#
# Source Sefaria : Sefer_Etz_Chaim.16.4 (1 section, 4193 chars)
# IDs : EC-H4S16-054 → EC-H4S16-072

