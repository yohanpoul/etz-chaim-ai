      tables: ["zivvug_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : tier-asymmetric coupling. Source Zohar Terumah 146."

  - id: "EC-H4S16-065"
    source_he: "רדל\"א הוא למעלה מכל האצילות ותחתיו הם סוד ט\"ס דלאו אינון נהורין ולאו אינן רוחין והם סוד ט\"ס מקורית דא\"א המתפשטים בכל האצילות"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      RDLA (REISHA DE-LO ITYADA — la tete inconnaissable) :
