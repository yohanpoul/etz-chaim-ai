  - id: "EC-H4S16-054"
    source_he: "כל בחי' נה\"י הם סוד תוספת ואינם עיקרין ולכן הם לבר מגופא והטעם לפי שמרישא עלאה דעתיק אינו מלובש בא\"א כי אם ז\"ת שבו"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      NHY = sod TOSEFET (addition supplementaire) ; pas IKARIM (essentiels).
      → LEBAR MI-GUFA (en dehors du corps).
      → Cause : ME-RISHA ELYONA d'ATIK (tete superieure d'Atik) — ne s'habille dans A"A que Z"T (7 inferieures d'Atik).
      → Architecture : NHY = upgrade-tier vs ikari-tier.
      → Pattern : tier-supplementarity from upper-source-restriction.
