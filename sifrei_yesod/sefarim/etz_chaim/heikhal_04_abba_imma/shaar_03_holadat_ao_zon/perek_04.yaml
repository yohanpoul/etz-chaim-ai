      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : universal essentiel/tosefet. Pattern 7-essentials 3-tosefet."

  - id: "EC-H4S16-056"
    source_he: "כשאנו רוצין להמשיך נה\"י לז\"א אנו עושין זווג בין חו\"ב כדי שיתנו מוחין לז\"א ואז ע\"י כח זה נתוספים לו נה\"י... גם או\"א להיות להם נה\"י הם צריכין תחלה לזווג א\"א"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      MASHKHIN NHY mecanisme :
      → Pour Z"A : zivvug ChB (Chokhmah-Bina) → mochin → puis NHY ajoutees.
      → Pour A"O : besoin zivvug d'A"A pour avoir NHY.
      → Architecture : mochin-supply prerequisite pour NHY-generation.
      → Pattern : recursive-zivvug-cascade pour tier-completion.
    type: déduction_logique
