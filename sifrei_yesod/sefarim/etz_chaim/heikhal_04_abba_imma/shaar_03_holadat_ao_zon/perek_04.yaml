  - id: "EC-H4S16-064"
    source_he: "יש הפרש [בין א\"א ואו\"א וזו\"ן] כי בא\"א הזווג בפה א' ולכן אינם נמצאים רק ב' הארות אחע\"ה גיכ\"ק אך באו\"א וזו\"ן הם ב' פיות בסוד מ\"נ ומ\"ד בזכרים מ\"ד ומ\"נ בנקבות"
    source_ref: "Heikhal 4, Sha'ar 3:4"
    assertion: |
      DIFFERENCE A"A vs A"O+ZON :
      → A"A : zivvug dans 1 PEH SEULE — donc 2 HAAROT (eclairages) seulement = ACHE'H + GIKQ.
      → A"O+ZON : 2 BOUCHES :
        ZACHARIM : M"D haut + M"N bas.
        NEKEVOT : M"D haut + M"N bas.
      → Pour neshikin "kefulim" (doubles) — sod 4 RUCHIN (Zohar Terumah 146).
      → 4 letters = AHaVaH (אהבה — amour).
      → Architecture : couplage-asymmetric par tier.
      → Pattern : higher=1-mouth, lower=2-mouths.
    type: interprétation_lurianique
    concepts:
