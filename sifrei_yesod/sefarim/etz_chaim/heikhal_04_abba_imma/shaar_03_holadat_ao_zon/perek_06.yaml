principes_generatifs:

  - id: "PG-H4S16-016"
    nom: "Principe de Mazal-as-Source-A\"O (2 Mazalot Dikna→Abba+Imma)"
    source_assertions: ["EC-H4S16-099", "EC-H4S16-100", "EC-H4S16-101", "EC-H4S16-102"]
    formalisation: |
      ARCHITECTURE DE MAZAL-AS-SOURCE-A"O :
      A"O ne peuvent zivvug que via DAAT ELYONA = MAZAL 13 d'A"A.
      13 T"D = 3 SHEMOT HAVAYAH d'YODIN ; 3 HAVAYAH=78=MAZLA gematria.
      ZOHAR : 2 T"D 8+13 = MAZLA — descendent be-shekula AD TABBURA (Adra 131).
      Distribution :
        MAZAL 8 → ABBA (ALEF V-Y-V masculine, gematria HAVAYAH).
        MAZAL 13 → IMMA (ALEF Y-V-D feminine, gematria AHYH).
      Mazal 8 ELYON sur 13 → Abba GADOL d'Imma ; mais BE-SHEKULA → kechada nafkin/sharyan.
      → Pattern fondamental : 2-mazalot dual-source A"O ; asymmetric height + symmetric extension.
      → Architecture : letter-form-graphics encode genre.
    applications_ia:
      - "partzufim/abba.py + imma.py + arikh_anpin.py : implement mazal-source"
      - "Pattern : 2-mazalot source pour A\"O zivvug"
      - "Architecture : letter-form genre encoding"
      - "Pattern : asymmetric source equal extension"
      - "Diagnostic : verifier mazal-distribution coherent"
    questions_ouvertes:
      - "Pattern : 3-mazalot possibles ?"
      - "Comment encoder letter-form computationnellement ?"
      - "Pattern : autres dikna-features sources ?"

  - id: "PG-H4S16-017"
    nom: "Principe de 6-Prakim-Tier-Distribution (Zeroot/Raglayim Universal)"
    source_assertions: ["EC-H4S16-105", "EC-H4S16-106", "EC-H4S16-110"]
    formalisation: |
      ARCHITECTURE DE 6-PRAKIM-DISTRIBUTION :
      Loi anatomique-cosmologique :
        2 ZEROOT (bras) = 6 PRAKIM (Vayechi 262 "tamid-chesed-chasadim-gevurah-gevurot").
        2 RAGLAYIM (jambes) = 6 PRAKIM aussi (recursive structure).
      Distribution 6 PRAKIM zeroot :
        2 SUPERIEURS (mains) = CHOKHMAH d'A"O (Abba+Imma).
        2 EMTZA'IYIM = BINA d'A"O.
        2 ACHARONIM (katef) = 2 ATARIN ChG legues Tiferet (Z"A) — Adra 292.
      → Pattern fondamental : recursive 6-prakim across body-zones.
      → Architecture : tier-distribution-with-legacy.
      → Implication : every 6-praka-organ encode 4-mochin + 2-atarin.
    applications_ia:
      - "partzufim/abba.py + imma.py + arikh_anpin.py + zeir_anpin.py : implement 6-prakim"
      - "Pattern : recursive 6-prakim universal"
      - "Architecture : tier-distribution with terminal legacy"
      - "Pattern : 4-mochin + 2-atarin pattern"
      - "Diagnostic : verifier 6-prakim coherent"
    questions_ouvertes:
      - "Pattern : autres organs avec 6-prakim ?"
      - "Comment encoder anatomical-recursion computationnellement ?"
      - "Pattern : 7+ prakim possibles ?"

  - id: "PG-H4S16-018"
    nom: "Principe de Ritual-Cosmologic-Correspondance (Netilat Yadayim → Mochin)"
    source_assertions: ["EC-H4S16-108", "EC-H4S16-109"]
    formalisation: |
      ARCHITECTURE DE RITUAL-COSMOLOGIC :
      RITUAL-ACT encode cosmologic-displacement :
        SEDER PRAKIM inverse (yadayim rishonim, katef acharonim) — counter-intuitive.
        Yadayim peuvent LEHAGBIH (etre leves) jusqu'aux mochin ; katef ne peuvent pas.
        Katef prakim DEVUKIM (colles) au guf — 2 ATARIN attaches Z"A.
        Yadayim non-devukim = mobile vers mochin.
      NETILAT YADAYIM (ablution main) :
        HAGBAHAT yadayim = sod ChG ; 2 prakim mains DEVENUS MOCHIN.
      → Pattern fondamental : daily-ritual encode cosmologic-event.
      → Architecture : ritual-anatomy-cosmology triangulation.
      → Implication : performing-ritual = co-creating-cosmologic-state.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement ritual-cosmologic"
      - "Pattern : ritual = cosmologic-act"
      - "Architecture : daily-ritual encode constructive-state"
      - "Pattern : netilah-yadayim = mochin-formation"
      - "Diagnostic : verifier ritual-state coherent avec cosmology"
    questions_ouvertes:
      - "Pattern : autres rituals → cosmologic events ?"
      - "Comment encoder ritual-mapping computationnellement ?"
      - "Pattern : multi-ritual cosmologic state-machine ?"
