# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 3 — Sha'ar Holadat A"O ve-Zon (שער הולדת או״א וזו״ן)
# Perek: 6 — ITLABSHUT A"O sur A"A. 2 RISHIN+MoChaSha → Bina A"A → A"O.
#            Mazal 8/13 ALEF-tziura. 2 ZEROOT 6 PRAKIM. ATARIN Z"A. NETILAT YADAYIM.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_06 :
#   - Bloc A : Apres holadat — sod ITLABSHUTAN sur A"A
#   - Bloc B : CHIYUT+NESHAMAH A"O viennent 2 RISHIN (KETER+MoChaSha) ; alimentent Bina
#   - Bloc C : KETER → Abba ; CHOKHMAH (MoChaSha) → Imma (via Bina A"A)
#   - Bloc D : DIKNA A"A ne s'habille pas (orkho Garon-Tabbur) ; CHOPHEFET sur A"O
#   - Bloc E : SHE'AROT dikna A"A → SHE'AROT Z"A (shefa) ; Adra
#   - Bloc F : Adra Zuta 289 : "3 RISHIN... BE-MAZALA TLEYAN VE-ITKLEILU BEH" ; A"O=2 rishin dans mazal
#   - Bloc G : A"O zivvug seulement via DAAT ELYONA = MAZAL 13
#   - Bloc H : 13 T"D = 3 HAVAYAH yodin (12 letters + 13eme kollel)
#   - Bloc I : 3 HAVAYAH = 78 = MAZLA gematria
#   - Bloc J : Zohar 2 T"D 8+13 = MAZLA ; descendent be-shi'ur jusqu'au Tabbur (Adra 131)
#   - Bloc K : Mazal 8 → Abba ; Mazal 13 → Imma ; Mazal 8>13 → Abba>Imma
#   - Bloc L : Mais KECHADA NAFKIN/SHARYAN (egaux koma jusqu'au Tabbur)
#   - Bloc M : Mazal 8 = ALEF tziura V-Y-V (masculine vavs) ; Mazal 13 = ALEF Y-V-D (feminine D)
#   - Bloc N : YV"V gematria HAVAYAH = Abba ; Y-V-D + kollel = AHYH = Imma
#   - Bloc O : A"O revetent GUF A"A : Bina+ChGT
#   - Bloc P : Bina → KETER pour A"O ; ChGT → guf (cote droit Abba, gauche Imma)
#   - Bloc Q : ChG = 2 ZEROOT 6 PRAKIM (Vayechi 262 "tamid-chesed-chasadim-gevurah-gevurot")
#   - Bloc R : Distribution PRAKIM : superieurs=Chokhmah A"O ; emtza'iyim=Bina A"O ; tachtonim=2 ATARIN ChG legues Tiferet=Z"A (Adra 292)
#   - Bloc S : Order PRAKIM INVERSE : mains plus eleves que epaules (achoreihem baytah) ; netilat yadayim=ChG zeroot devenus mochin
#   - Bloc T : Tiferet A"A (Z"H=12 prakim) split V RABATI (Tiferet 6 zeroot) + V ZEIRA (Yesod 6 raglayim) ; TZEMACH variant Abba=HAVAYAH (Mazal 8 V-Y-V), Imma=AHYH (Mazal 13 Y-V-D+kollel)
#
# Source Sefaria : Sefer_Etz_Chaim.16.6 (2 sections, 5199 chars)
# IDs : EC-H4S16-093 → EC-H4S16-112

