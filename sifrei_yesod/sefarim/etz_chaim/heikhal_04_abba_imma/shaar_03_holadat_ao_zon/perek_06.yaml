    source_he: "ב' פרקים עליונים הם חכמה דאבא וחכמה דאמא מזרוע ימין לאבא ומזרוע שמאל לאמא וב\"פ האמצעים הם בינה לאבא ובינה לאמא... נשארו ב\"פ א' מזרוע ימין חסד וא' מזרוע שמאל גבורה והם ב' עיטרין חו\"ג דאחסינהו או\"א לברייהו ת\"ת כנזכר באדרא רצ\"ב"
    source_ref: "Heikhal 4, Sha'ar 3:6 §1"
    assertion: |
      Distribution 6 PRAKIM :
      → 2 SUPERIEURS = CHOKHMAH d'Abba (zeroa-yamin) + CHOKHMAH d'Imma (zeroa-smol).
      → 2 EMTZA'IYIM = BINA d'Abba (Chesed) + BINA d'Imma (Gevurah).
      → 2 ACHARONIM (proches katef) = 2 ATARIN ChG = ACHASINHU A"O LE-BERAYHU TIFERET (=Z"A) — Adra fol. 292.
      → Architecture : 6-prakim → 4-mochin-A"O + 2-atarin legacy.
      → Pattern : tier-distribution avec terminal-legacy.
    type: interprétation_lurianique
    concepts:
      - {id: 6_prakim_chokhmah_bina_ao_2_atarin_chg_z_a_adra_292, role: 6_prakim_2_sup_chokhmah_ao_2_emtza_bina_ao_2_acharon_atarin_chg_legues_tiferet_z_a_adra_292}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : tier-distribution legacy. Source Adra 292."

  - id: "EC-H4S16-107"
    source_he: "סדר ו' פרקין אלו הם היפך מה שנראה והנה הראשונים הם ב' ידים ואח\"כ האמצעים ואח\"כ האחרונים והם סמוכים לכתף"
    source_ref: "Heikhal 4, Sha'ar 3:6 §1"
    assertion: |
      SEDER PRAKIM = HEFEKH (inverse) de l'apparence :
      → RISHONIM (premiers) = 2 YADAYIM (mains).
      → EMTZA'IM = avant-bras.
      → ACHARONIM = SEMUKHIM LA-KATEF (proche epaule) — fixes au corps.
      → Architecture : ordering-counter-intuitive.
      → Pattern : 1st-from-extremity, last-attached-to-body.
    type: axiome_explicite
    concepts:
      - {id: seder_prakim_inverse_yadayim_premiers_acharonim_katef_dvuk_guf, role: seder_prakim_inverse_yadayim_rishonim_acharonim_semukhim_katef_dvukim_guf}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : counter-intuitive ordering. Pattern extremity-first."

  - id: "EC-H4S16-108"
    source_he: "מעלה א'... כל אחוריהם ביתה משא\"כ בראשי הכתפים שהם פנים ואחור... מעלה ב' כי הנה הידים יש יכולת באדם להגביהן עד המוחין משא\"כ בפרקין הסמוכים לכתף"
    source_ref: "Heikhal 4, Sha'ar 3:6 §1"
    assertion: |
      Causes pour SEDER inverse :
      → MA'ALAH 1 : "VE-KOL ACHOREIHEM BAYTAH" (toutes leurs faces vers la maison) — yadayim ont seulement back-orientation, alors que katef = panim+achor 2 sides.
      → MA'ALAH 2 : YADAYIM peuvent etre LEHAGBIH (eleves) jusqu'aux mochin.
        KATEF prakim adjacent ne peuvent pas.
      → Architecture : functional-mobility encode tier-elevation.
      → Pattern : mobility = elevation-capacity.
    type: déduction_logique
    concepts:
      - {id: yadayim_2_maalot_achoreihem_baytah_lehagbih_mochin_vs_katef, role: yadayim_2_maalot_achoreihem_baytah_lehagbih_jusqu_mochin_vs_katef_pas_mobile}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : mobility-elevation. Pattern functional-anatomy."

  - id: "EC-H4S16-109"
    source_he: "כל הפרקים הסמוכים לכתף הם דבוקים ממש בגוף כי הם סוד ב' עטרין הדבוקים בזעיר אנפין... ובזה תבין סוד הגבהת ידים בעת הנטילה שהם סוד חו\"ג ב\"פ הידים הנעשין מוחין"
    source_ref: "Heikhal 4, Sha'ar 3:6 §1"
    assertion: |
      Cause additionnelle :
      → Prakim adjacent katef = DEVOUKIM MAMASH BA-GUF (vraiment colles au corps).
      → Sod : 2 ATARIN qui sont DEVOUKIM en Z"A.
      → Autres prakim NON-DEVOUKIM, peuvent monter aux mochin.
      → Sod NETILAT YADAYIM (ablution rituelle des mains) :
        HAGBAHAT (lever) yadayim = sod ChG, 2 prakim mains DEVENUS MOCHIN.
      → Architecture : ritual-act encode cosmologic-displacement.
      → Pattern : netilah = mochin-formation par yadayim-elevation.
    type: interprétation_lurianique
    concepts:
      - {id: prakim_katef_dvukim_atarin_z_a_yadayim_mobile_netilat_yadayim_chg_mochin, role: prakim_katef_dvukim_2_atarin_z_a_yadayim_mobile_netilat_yadayim_hagbahat_chg_devenus_mochin}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "zeir_anpin"]
      relevance: "Architecture : ritual cosmologic. Pattern netilah-mochin."

  - id: "EC-H4S16-110"
    source_he: "תוך חג\"ת המקוריים שהם כחב\"ד דאו\"א יש נה\"י דעתיק וכבר ידעת כי גם בשוקיים יש ששה פרקין"
    source_ref: "Heikhal 4, Sha'ar 3:6 §1"
    assertion: |
      Recursion structure :
      → ChGT MEKORIYIM (sources) = KCHaBD d'A"O.
      → Dans eux : NHY d'ATIK.
      → Aussi 6 PRAKIM dans SHOKAYIM (jambes) — pareil structure.
      → Architecture : recursive-6-prakim across body-zones.
      → Pattern : zeroot+raglayim = 6-prakim each.
    type: axiome_explicite
    concepts:
      - {id: chgt_mekoriyim_kchabd_ao_nhy_atik_shokayim_6_prakim_recursion, role: chgt_mekoriyim_kchabd_ao_nhy_atik_dedans_shokayim_aussi_6_prakim_recursion}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "atik_yomin"]
      relevance: "Architecture : recursive 6-prakim. Pattern body-zones uniformity."

  - id: "EC-H4S16-111"
    source_he: "חצי ת\"ת דא\"א שבאו\"א ממנו נעשה ב' דעות לאו\"א... והת\"ת נקרא זה נגד י\"ב פרקין שבו כמנין ז\"ה שהוא י\"ב ונחלקין לב' ו' זעירא ו' רבתי"
    source_ref: "Heikhal 4, Sha'ar 3:6 §1"
    assertion: |
      Tiferet A"A decomposition :
      → CHATZI TIFERET d'A"A dans A"O → forme 2 DAAT pour A"O.
      → TIFERET nommee "ZE" (זה — ce/celui) = 12 (zayin+he = 7+5 = 12).
      → 12 PRAKIM dans Tiferet (correspondant gematria ZH).
      → SPLIT en 2 :
        V RABATI (V grand) = V"K Tiferet (6 prakim 2 zeroot).
        V ZEIRA (V petit) = V"K Yesod (6 prakim 2 raglayim).
      → Architecture : Tiferet-as-12-prakim-encoding "ZE".
      → Pattern : 12 = 6-zeroot + 6-raglayim split.
    type: déduction_scripturaire
    concepts:
      - {id: chatzi_tiferet_aa_2_daat_ao_zh_12_prakim_v_rabati_v_zeira_split, role: chatzi_tiferet_aa_devient_2_daat_ao_zh_12_prakim_v_rabati_zeroot_v_zeira_raglayim}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma"]
      relevance: "Architecture : 12-prakim split. Pattern V-rabati V-zeira."

  - id: "EC-H4S16-112"
    source_he: "ת\"ת ו' רבתי ו\"ק שבו שהם נגד ו\"פ דב' דרועין והיסוד ו' זעירא ו\"ק שבו נגד ו' פרקי רגלים"
    source_ref: "Heikhal 4, Sha'ar 3:6 §1"
    assertion: |
      Decomposition finale :
      → TIFERET = V RABATI = V"K (6 sefirot) — correspond 6 PRAKIM des 2 ZEROOT.
      → YESOD = V ZEIRA = V"K — correspond 6 PRAKIM des 2 RAGLAYIM.
      → Architecture : 2-V-letter encoding 2-organ-zones.
      → Pattern : letter-size encode organ-position (Tiferet=upper, Yesod=lower).
    type: axiome_explicite
    concepts:
      - {id: tiferet_v_rabati_6_prakim_zeroot_yesod_v_zeira_6_prakim_raglayim, role: tiferet_v_rabati_v_k_6_prakim_2_zeroot_yesod_v_zeira_v_k_6_prakim_2_raglayim_letter_size}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : 2-V letter organ-encoding. Pattern letter-size organ."


