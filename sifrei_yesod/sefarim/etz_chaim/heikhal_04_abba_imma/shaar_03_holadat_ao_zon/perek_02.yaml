  - id: "EC-H4S16-029"
    source_he: "ג\"פ הם נקרא אהי\"ה אשר אהי\"ה ביודי\"ן בההי\"ן באלפי\"ן כי בג\"ר נקרא אשר בחי' כתר וב' אהי\"ה הם חו\"ב וג' אמצעיות ב' אהי\"ה הם חו\"ג ואשר בת\"ת"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
      3 fois "EHYEH ASHER EHYEH" — distribution Z"A :
      → G"R : ASHER=Keter ; 2 AHYH=Chokhmah+Bina (yodin).
      → 3 EMTZA'IYOT : 2 AHYH=Chesed+Gevurah (alefin) ; ASHER=Tiferet.
      → 3 ACHARONOT : 2 AHYH=Netzach+Hod (hehin) ; ASHER=Yesod.
