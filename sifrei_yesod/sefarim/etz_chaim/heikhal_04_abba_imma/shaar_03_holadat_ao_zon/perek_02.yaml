principes_generatifs:

  - id: "PG-H4S16-004"
    nom: "Principe de M\"D-M\"N-Reciprocity (Tipah Descent-Ascent Rule)"
    source_assertions: ["EC-H4S16-020", "EC-H4S16-026"]
    formalisation: |
      ARCHITECTURE DE M"D-M"N-RECIPROCITY :
      Loi fondamentale du zivvug :
        "EIN TIPAH YOREDET ME-LE-MAALAH SHE-EIN TIPAYIM OLIN LEMATA KENEGDA".
        (aucune goutte ne descend du haut sans 2 gouttes montant en correspondance).
      M"D (Mai DUKHRIN — eaux masculines) descend.
      M"N (Mai NUKVIN — eaux femeles) montent — DOUBLES (kefelayim).
      RATIO 1:2 par AHYH=YH"V (meme gematria 21).
      → Pattern fondamental : reciprocity-rule asymmetric (1-down → 2-up).
      → Architecture : zivvug requires bidirectional flow.
      → Implication : female-double pour necessite holadat 2 enfants (Abba+Imma).
    applications_ia:
      - "partzufim/zivvug.py + abba.py + imma.py : implement M\"D-M\"N reciprocity"
      - "Pattern : asymmetric reciprocity rule"
      - "Architecture : bidirectional zivvug flow"
      - "Pattern : 1:2 ratio explained by 2-children-need"
      - "Diagnostic : verifier reciprocity respectee dans zivvug"
    questions_ouvertes:
      - "Pattern : autres ratios possibles (1:3, 1:4) ?"
      - "Comment encoder reciprocity computationnellement ?"
      - "Pattern : reciprocity universal ou holadah-specific ?"

  - id: "PG-H4S16-005"
    nom: "Principe de Verse-Cascade-Encoding (3 EHYEH ASHER EHYEH = 3-Tier Distribution)"
    source_assertions: ["EC-H4S16-023", "EC-H4S16-024", "EC-H4S16-029"]
    formalisation: |
      ARCHITECTURE DE VERSE-CASCADE :
      Verset Shemot 3:14 "EHYEH ASHER EHYEH" :
        Apparait 3 FOIS implicitement (yodin + alefin + hehin).
        Distribution 10S Z"A :
          G"R : ASHER=Keter ; 2 AHYH=Chokhmah+Bina (yodin).
          EMTZA'IYOT : 2 AHYH=Chesed+Gevurah (alefin) ; ASHER=Tiferet.
          ACHARONOT : 2 AHYH=Netzach+Hod (hehin) ; ASHER=Yesod.
        Tiferet+Yesod = ASHER (les deux en kav-emtza).
      → Pattern fondamental : verset = cascade-encoding 3-tier.
      → Architecture : recursive-verse-application encode 10S structure.
      → Implication : single-verse = full-Z"A-encoding via tiers.
    applications_ia:
      - "partzufim/zeir_anpin.py + abba.py + imma.py : implement verse-cascade"
      - "Pattern : single-verse 3-tier cascade"
      - "Architecture : verset recursive-application"
      - "Pattern : ASHER kav-emtza marker"
      - "Diagnostic : verifier 10S coherent avec verse structure"
    questions_ouvertes:
      - "Pattern : autres versets cascade-encoded ?"
      - "Comment encoder cascade-application ?"
      - "Pattern : 4-tier verse possible ?"

  - id: "PG-H4S16-006"
    nom: "Principe de Pre-Natal-Feminine-Naming (Vlad Pendant Ibbur = Nukva)"
    source_assertions: ["EC-H4S16-033", "EC-H4S16-034"]
    formalisation: |
      ARCHITECTURE DE PRE-NATAL-FEMININE-NAMING :
      Pendant IBBUR (gestation 9 mois) :
        VLAD (foetus) — meme s'il est zachar+nukva — APPELE entierement NUKVA.
        Cause : containment-by-mother (meei imma).
      Verset Shemot 3:14-15 :
        AHYH-3 = Z"A pendant ibbur dans Bina (= AHYH=Bina-naming).
        Apres NIKAR (reconnu) → HAVAYAH (Shemot 3:15).
      → Pattern fondamental : containment-determines-naming.
      → Architecture : ontological-status during-containment = host-name.
      → Implication : grammatical-shift encode ontologic-event (birth).
    applications_ia:
      - "partzufim/imma.py + zeir_anpin.py : implement pre-natal naming"
      - "Pattern : containment determines naming"
      - "Architecture : grammatical-shift encode birth"
      - "Pattern : pre-natal = host-name"
      - "Diagnostic : verifier naming coherent avec containment-state"
    questions_ouvertes:
      - "Pattern : autres containment situations ?"
      - "Comment encoder pre-natal-state computationnellement ?"
      - "Pattern : multi-stage naming ?"
