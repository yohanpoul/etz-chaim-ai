# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 3 — Sha'ar Holadat A"O ve-Zon (שער הולדת או״א וזו״ן)
# Perek: 2 — Letters GYKQ chikh = CHaKAL. M"D descend, M"N monte. 2 AHYH
#            "asher AHYH" (Shemot 3:14). 6 AHYH = 2×SaG. 2×M"B = 84 zivvugim.
#            Yesod A"A inseminate BRIT KADISHA.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_02 :
#   - Bloc A : M"B descend chikh → garon en zivvug peh elyon A"A
#   - Bloc B : Letters GYKQ (gimel-yod-kaf-kuf) en chikh = 3 YH"V montent CHaKAL (138)
#   - Bloc C : GYKQ + 4 letters + mot = 138 (CHaKAL gematria)
#   - Bloc D : Tipah M"D (mai dukhrin) = M"B (42)
#   - Bloc E : PRINCIPE : "ein tipah yoredet me-le-maala she-ein tipayim olin lemata kenegda"
#   - Bloc F : M"N (mai nukvin) = du Garon (cote nukva)
#   - Bloc G : GARON A"A → KETER pour A"O ; GARON = BINA d'A"A
#   - Bloc H : 2 bechinot Garon : 1 Abba + 1 Imma — 2 noms AHYH
#   - Bloc I : Sod "EHYEH ASHER EHYEH" (Shemot 3:14) — Moshe yetzira Z"A annoncee
#   - Bloc J : AHYH-1=Abba ; AHYH-2=Imma ; ASHER=letters ROSH (anagram, ROSH=zachar, ASHER=nukva)
#   - Bloc K : 2 tipot AHYH montent (= 2 YH"V) — chikh 1 tipah descend
#   - Bloc L : Garon = 6 AHYH (2 yodin g"r + 2 alefin emtza'iyot + 2 hehin acharonot) s'habillent dans 2 AHYH
#   - Bloc M : Distribution Z"A : g"r=Keter+ChB ASHER+2 AHYH ; emtza'iyot=ChG+Tiferet+ASHER ; acharonot=NH+Yesod+ASHER
#   - Bloc N : Tiferet+Yesod = ASHER (les deux)
#   - Bloc O : 1 tipah YH"V (zachar) = 2 tipot AHYH (nukva) — ratio 1:2
#   - Bloc P : 3 YH"V = SaG (63) ; 6 AHYH = 2 SaG (symetrie)
#   - Bloc Q : Apres holadah → IBBUR 9 mois ; foetus appele NUKVA (Bina)
#   - Bloc R : 3eme AHYH (Shemot 3:14) = Z"A pendant ibbur dans Bina = AHYH
#   - Bloc S : Apres ibbur+NIKAR comme Z"A → nomme HAVAYAH (verset suivant)
#   - Bloc T : 2 AHYH gematria (4+10+28=42) = 2×M"B = 84 = M"B ZIVVUGIM (Bereshit ch1)
#   - Bloc U : Tous descendent au YESOD A"A → MAZRIA (insemine) BRIT KADISHA
#
# Source Sefaria : Sefer_Etz_Chaim.16.2 (1 section, 3545 chars)
# IDs : EC-H4S16-019 → EC-H4S16-035

meta:
  sefer: etz_chaim
  heikhal: 4
  shaar: 3
  shaar_name_he: "שער הולדת או״א וזו״ן"
  perek: 2
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "M\"B descend chikh→garon zivvug peh A\"A. GYKQ en chikh = 138 CHaKAL. Tipah M\"D=M\"B. M\"N monte du Garon. 2 AHYH 'asher AHYH' (Shemot 3:14) = Abba+Imma. 6 AHYH (yodin g\"r+alefin emtza+hehin acharonot) s'habillent dans 2 AHYH externes. Distribution Z\"A : g\"r ASHER Keter+ChB ; emtza ChG Tiferet ASHER ; acharonot NH Yesod ASHER (T+Y=ASHER). 1 tipah YH\"V (zachar)=2 tipot AHYH (nukva). 6 AHYH=2 SaG (symetrie 3 YH\"V=SaG). Post-holadah IBBUR 9 mois — foetus=NUKVA (Bina) ; AHYH-3 (Shemot 3:14)=Z\"A pendant ibbur ; NIKAR=HAVAYAH (verset suivant). 2 AHYH gematria (4+10+28=42) ; 2×M\"B=84=42 ZIVVUGIM (Bereshit ch1). Tous descendent yesod A\"A → MAZRIA BRIT KADISHA."

# ═══════════════════════════════════════════════════════════════════
