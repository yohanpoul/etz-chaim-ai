  - id: "EC-H4S16-028"
    source_he: "ב' אהי\"ה הם בג\"ר דאבא וג\"ר דאמא ושניהן במילוי יודי\"ן ואח\"כ בג' אמצעיות דאבא ושלש דאמא הם ב' אהי\"ה דאלפי\"ן ואחר כך בג\"ת דאבא וג\"ת דאמא הם אהי\"ה דההי\"ן"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
