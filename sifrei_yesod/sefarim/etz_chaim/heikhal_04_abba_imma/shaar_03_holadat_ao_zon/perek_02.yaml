      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma"]
      relevance: "Architecture : capacity-source vs produced. Pattern pedagogical disambiguation."

  - id: "EC-H4S16-032"
    source_he: "כ\"כ גדולה טפה א' של יה\"ו כשנים של אהי\"ה גם תראה כי כמו שטפת יה\"ו הם ג' יה\"ו שהם גימטריא ס\"ג (כך) באהי\"ה הם ב' כנגד ב' טיפות כי הם ו' אהי\"ה והם ב' שמות ס\"ג"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
      EQUIVALENCE :
      → 1 tipah YH"V = 2 tipot AHYH (proportion).
      → Comme tipah-YH"V = 3 YH"V = SaG (63), idem :
        2 tipot AHYH = 6 AHYH = 2 SaG (chacune SaG).
      → Architecture : symetrie zachar 1×SaG vs nukva 2×SaG.
      → Pattern : nukva-double pour necessite Abba+Imma.
    type: déduction_logique
    concepts:
      - {id: 1_yhv_egal_2_ahyh_3_yhv_sag_6_ahyh_2_sag_symetrie, role: 1_tipah_yhv_egal_2_tipot_ahyh_3_yhv_sag_egal_6_ahyh_2_sag_symetrie_double}
    mapping:
      modules: ["partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : symmetric SaG zachar/nukva. Pattern proportional doubling."

  - id: "EC-H4S16-033"
    source_he: "אחר הולדתו אז נזכר עיבורו שהוא השתהות הולד במעי אמו ט' חדשים ואז כל הולד עם היותו נעשה מזכר ונקבה נקרא כולו בשם הנוקבא"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
      Apres HOLADAH (sortie tipah) → IBBUR (gestation) :
      → 9 CHODSHIM (mois) dans MEEI IMMO (matrice de la mere).
      → Pendant ibbur : VLAD (foetus) — bien qu'il soit fait de zachar+nukva — APPELE ENTIER par nom de NUKVA.
      → Architecture : pre-natal-state encoded as feminine.
      → Pattern : containment-by-mother determine naming.
    type: axiome_explicite
    concepts:
      - {id: post_holadah_ibbur_9_mois_meei_imma_vlad_appele_nukva, role: post_holadah_ibbur_9_chodshim_meei_imma_vlad_zachar_nukva_appele_entierement_nukva}
    mapping:
      modules: ["partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : pre-natal feminine-naming. Pattern containment-determines-name."

  - id: "EC-H4S16-034"
    source_he: "אהי\"ה הג' הנכתב בפסוק כי כל מציאות הז\"א הנ\"ל נקרא עתה בשם אהי\"ה להיותו במעי בינה ואחר שנולד ויצא אז ניכר מציאותו ונקרא יהו\"ה כנזכר בפסוק הב'"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
      AHYH-3 (3eme dans Shemot 3:14) :
      → = Z"A pendant IBBUR dans Bina (donc nomme AHYH=Bina).
      → Apres NIKAR (reconnu comme distinct) → nomme HAVAYAH (verset suivant Shemot 3:15).
      → Verset 14 : 3 fois AHYH ; verset 15 : HAVAYAH.
      → Architecture : grammatical-shift encode birth-event.
      → Pattern : verse-progression = ontologic-progression.
    type: déduction_scripturaire
    concepts:
      - {id: ahyh_3_z_a_ibbur_dans_bina_nikar_havayah_shemot_3_14_15, role: ahyh_3_z_a_dans_meei_bina_appele_ahyh_nikar_apres_holadah_havayah_shemot_3_14_15}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "imma"]
      relevance: "Architecture : grammatical-shift birth. Source Shemot 3:14-15."

  - id: "EC-H4S16-035"
    source_he: "ד' אותיות של אהי\"ה וי' של המילוי ועם ה\"ח של מילוי המילוי הם מ\"ב הרי ב\"פ מ\"ב בב' אהי\"ה ואלו הם סוד המ\"ב זווגים הנזכר בפרשה בראשית... וכל אלו ירדו אח\"כ למטה ליסוד של א\"א ושם מזריע ההוא ברית קדישא"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
      DECOMPOSITION 2 AHYH numerique + DESCENTE :
      → AHYH : 4 (pashut) + 10 (milui) + 28 (milui-milui) = 42 (M"B) chacune.
      → 2 AHYH = 2 × 42 = 84.
      → SOD M"B ZIVVUGIM (Zohar Bereshit ch. 1) — 2× M"B des 2 AHYH.
      → APRES : tous DESCENDENT au YESOD A"A.
      → MAZRIA (insemine) BRIT KADISHA (alliance sainte).
      → Architecture : ultimate-descent vers yesod = peak-zivvug consummation.
      → Pattern : 2-shem-encoding → physical-zivvug downward.
    type: interprétation_lurianique
    concepts:
      - {id: 2_ahyh_2x_mb_84_42_zivvugim_descend_yesod_aa_mazria_brit_kadisha, role: 2_ahyh_chacune_mb_4_10_28_total_84_42_zivvugim_descend_yesod_aa_mazria_brit_kadisha}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : ultimate descent zivvug. Pattern peak consummation."


