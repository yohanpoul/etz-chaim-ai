      relevance: "Architecture : direction-inverse genre. Pattern ascent female descent male."

  - id: "EC-H4S16-031"
    source_he: "אל תטעה במה שאמרתי שכל האהי\"ה הללו הם באבא ואמא כי כולם הם בגרון של א\"א עצמו אך הכוונה לומר כי לפי שמן הגרון הזה היה בו כח להוציא או\"א"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
      AVERTISSEMENT contre erreur :
      → "AL TIT'EH" (ne te trompes pas) — tous ces AHYH sont dans le GARON d'A"A LUI-MEME.
      → PAS dans Abba+Imma.
      → INTENTION : Garon a la KOACH (force) pour produire A"O.
      → Architecture : capacity-source != produced-entity.
      → Pattern : explicit-disambiguation pedagogical.
    type: axiome_explicite
    concepts:
      - {id: avertissement_ahyh_dans_garon_aa_pas_abba_imma_capacity_source, role: avertissement_al_titeh_ahyh_dans_garon_aa_pas_dans_abba_imma_capacity_source_produit}
    mapping:
