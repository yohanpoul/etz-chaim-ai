      → 2 AHYH d'YODIN : G"R d'Abba + G"R d'Imma.
      → 2 AHYH d'ALEFIN : 3 emtza'iyot d'Abba + 3 emtza'iyot d'Imma.
      → 2 AHYH d'HEHIN : 3 acharonot (G"T) d'Abba + 3 d'Imma.
      → Architecture : 3-tier × 2-genre = 6 AHYH distinctes.
      → Pattern : matrix-decomposition tier × parent.
    type: axiome_explicite
    concepts:
