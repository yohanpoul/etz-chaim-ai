      relevance: "Architecture : recursive-verse 3-tier. Pattern verse-cascade encoding."

  - id: "EC-H4S16-030"
    source_he: "הת\"ת ויסוד שניהן נקראו אשר... כולם נכללו באהיה אשר אהיה העליונים של יודי\"ן כי אלו עולין מלמטה למעלה אך ביה\"ו הוא להיפך שנכללין ביה\"ו האחרון של ההי\"ן שיורדין מלמעלה למטה"
    source_ref: "Heikhal 4, Sha'ar 3:2"
    assertion: |
      INVERSE direction :
