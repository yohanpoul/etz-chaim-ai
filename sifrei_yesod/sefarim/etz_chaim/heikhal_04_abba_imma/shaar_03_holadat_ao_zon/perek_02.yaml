  - id: "EC-H4S16-024"
    source_he: "אהי\"ה הא' בסוד אבא ואהי\"ה הב' בסוד אמא ואשר (הם) אותיות ראש באמצע ב' שמות אהי\"ה להורות כי גרון זה נעשה ראש לב' אהי\"ה הנ\"ל"
