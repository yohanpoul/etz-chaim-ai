      → CHIKH 10S → 3 YH"V s'habillent YH"V acharon (= M"B).
      → GARON KEFLAYIM (double) → 6 AHYH s'habillent dans 2 AHYH (yodin externes).
      → 6 AHYH = 2 (g"r yodin) + 2 (emtza'iyot alefin) + 2 (acharonot hehin).
