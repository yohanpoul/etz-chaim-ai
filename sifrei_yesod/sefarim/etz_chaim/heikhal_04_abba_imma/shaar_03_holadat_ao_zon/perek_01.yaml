# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 3 — Sha'ar Holadat A"O ve-Zon (שער הולדת או״א וזו״ן)
# Perek: 1 — HAKDAMAH HOLADAT A"O+Zon. 42 ZIVVUGIM (Zohar Bereshit 15). Tipah=YH"V.
#            CHIKH+GARON. 3 YH"V=SaG=63. KaL+SaG=MaKOM=186 (Shemot 33:21).
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_01 :
#   - Bloc A (§1) : Title — Sha'ar 3 H4 = SHA'AR HOLADAT A"O VE-ZON ; 7 perakim
#   - Bloc B (§2) : HAKDAMAH — fondee sur 42 ZIVVUGIM (Zohar Bereshit 15)
#   - Bloc C (§2) : Z"A 3 bechinot ; ibbur rishon = 3 kelilin be-3
#   - Bloc D (§2) : Ibbur via NHY A"A montent dans ChGT, dans yesod A"A meme zivvug avec atarah
#   - Bloc E (§2) : Zivvug elyon dans PEH d'A"A — sod ROUK (saliva) avant nesikim avant zivvug
#   - Bloc F (§2) : CHIKH=CHOKHMAH ; GARON=BINA (par rapport au reste corps)
#   - Bloc G (§2) : CHOKHMAH d'A"A=10S kelulot dans rosh seul ; yesod=CHIKH ; zivvug avec GARON
#   - Bloc H (§2) : 4 noms AB-SaG-MaH-BaN dans yod
#   - Bloc I (§2) : Chikh+Garon zivvugu → tipah du SHEM AB ; enrobe SaG (Bina) — A"O sortent
#   - Bloc J (§2) : Keter A"O commence Garon A"A
#   - Bloc K (§2) : SaG 2 metziut : milui yodin (Abba=yod du SaG) + milui alefin (Imma=alef du SaG) → KECHADA NAFKIN
#   - Bloc L (§2) : ZON inegaux ; SHEM AB pour tipah, puis MaH+BaN (racine ZON)
#   - Bloc M (§2) : A"O=SaG seul ; ZON=2 shemot MaH+BaN — donc inegaux
#   - Bloc N (§2) : Tipah=sod YH"V (chab"d) ; kelulah de 3 YH"V (AB+MaH+BaN) ; 3×YH"V=63=SaG
#   - Bloc O (§2) : YH"V AB=57 (alma tinyana 57 olamim, Adra Naso) ; YH"V MaH=39 (TaL)
#   - Bloc P (§2) : 57+39=96 (TZaV, alma 3eme=96 olamim Adra Naso)
#   - Bloc Q (§2) : YH"V premier ne'elam dans YH"V-2 MaH (g"r emtza'iyot)
#   - Bloc R (§2) : Descendent s'habillent YH"V acharon BaN=42 (M"B) — 3 acharonot
#   - Bloc S (§2) : Tous s'habillent YH"V acharon=M"B → tipah appellee 42 ZIVVUGIM
#   - Bloc T (§2) : ChIKh letters = KaCh (28) + 14 letters milui = 42 (M"B)
#   - Bloc U (§2) : 96+42=138 (KaL) sod "KI CHELEK HASHEM AMO" (Devarim 32:9) = CHAKAL TAPUCHIN
#   - Bloc V (§2) : +YH"V SaG (48) → 186 = MaKOM ; sod "HINEH MAKOM ITI" (Shemot 33:21)
#
# Source Sefaria : Sefer_Etz_Chaim.16.1 (2 sections, 2496 chars)
