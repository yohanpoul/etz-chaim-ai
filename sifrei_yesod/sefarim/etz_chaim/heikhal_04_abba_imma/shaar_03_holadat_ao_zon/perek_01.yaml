  - id: "EC-H4S16-016"
    source_he: "ענין הח\"ך הרמוז בסוד החכמה כי אותיות ח\"ך הם כח ולעולם הכ\"ח הם סוד מ\"ב כנודע כי הח\"ך עם י\"ד אותיות גימטריא מ\"ב"
