      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : organ-as-instrument. Sources Zohar Emor + Tehilim 118:5."

  - id: "EC-H4S16-091"
    source_he: "אופן כללות נה\"י בחג\"ת דאו\"א הוא עד\"ז... נצח הכלול מהוד עלה לאבא והוד כלול מנצח עלה לאמא ואז מכח ב' בחי' אלו שבכל א' וא' נמשכו הדדים מרוב האור"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      KELALUT NHY-A"A dans ChGT-A"O (detail) :
      → 1/2 Tiferet d'A"A reste en bas (NHY-A"A locale).
      → L'autre 1/2 monte dans Tiferet d'A"O.
      → NETZACH kollel-de-Hod monte vers ABBA.
      → HOD kollel-de-Netzach monte vers IMMA.
      → 2 BECHINOT dans chacun (Abba+Imma) → DADIM emergent (de l'abondance d'or).
      → YESOD se split : 1/2 vers Yesod-Abba + 1/2 vers Yesod-Imma.
      → Architecture : detailed mapping NHY-A"A → ChGT-A"O components.
      → Pattern : cross-kollel transfer Netzach↔Hod.
    type: interprétation_lurianique
    concepts:
      - {id: kelalut_nhy_aa_chgt_ao_netzach_abba_hod_imma_yesod_split_dadim, role: kelalut_nhy_aa_chgt_ao_netzach_kollel_hod_abba_hod_kollel_netzach_imma_yesod_split_1_2_dadim}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "abba", "imma"]
      relevance: "Architecture : cross-kollel transfer. Pattern Netzach-Abba Hod-Imma."

  - id: "EC-H4S16-092"
    source_he: "באדם דהיינו אבא יהיה בלי חלב וזה לפי שאין הדבר שם רק לפי שעה בסוד טפת הזרע אך בסוד בינה ששם נתהוו כל איברי הגוף דז\"א היתה הארה גדולה בהתפשטותו וממנו נמשך החלב לכן היו ב' דדים לכל א' נגד ב' בחי' שבכל א' מהם"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      Asymmetric dadim-chalav explained :
      → ADAM (=ABBA) : dadim BLI CHALAV (sans lait).
      → Cause : tipah-zerah seulement TEMPORAIRE.
      → BINA (=IMMA) : tous IVREI HA-GUF d'Z"A se forment ; HAARAH GADOLAH ; CHALAV nimshakh.
      → 2 DADIM par chacun = 2 BECHINOT (Netzach+Hod kollel-distinguishe).
      → Architecture : function-locus-determines-substance-presence.
      → Pattern : passive-organ vs active-organ asymmetry.
    type: déduction_logique
    concepts:
      - {id: abba_dadim_no_chalav_temporaire_imma_chalav_haarah_grande_2_dadim_chacun, role: abba_dadim_bli_chalav_temporaire_tipah_imma_chalav_haarah_gadolah_2_dadim_chacun_bechinot}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : function-substance asymmetry. Pattern passive vs active."


