      → YESOD d'ABBA APIK (sort) une TIPAH (goutte).
      → A'EIL-LAH (entre) dans IMMA.
      → DANS MEEI d'IMMA (matrice) — IT'AVIDA (devient) Z"A = V ZEIRA, 3 KELIL BE-3 SEUL.
