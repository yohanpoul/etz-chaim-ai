    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : 2 Adam types. Source Zohar Terumah 167."

  - id: "EC-H4S16-087"
    source_he: "כל אדם נרמזין בו כל הי\"ס מא\"א עד הנוקבא וא\"כ כשנצייר צורת דדים לא נצטייר בציור בינה לבדה או נוקבא לבד רק במציאת כוללת כל אורך י\"ס"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      SHE'ELAH dadim chazeh — REPONSE :
      → ADAM (humain) RAMUZIN-BO (allusionne) TOUS 10S — d'A"A jusqu'a NUKVA.
      → Pas Tiferet+Malkhut SEULS.
      → Quand on TZAYER (figure) tzurat dadim — c'est sur l'ENSEMBLE du shi'ur 10S.
      → Architecture : human-anatomy encode complete-cosmic-shi'ur.
      → Pattern : complete-tier-mapping pour humain.
    type: déduction_logique
    concepts:
      - {id: adam_complete_10s_aa_jusqu_nukva_dadim_kollel_shi_ur_total, role: adam_ramuzin_complete_10s_aa_nukva_dadim_kollel_shi_ur_total_pas_tiferet_seul}
