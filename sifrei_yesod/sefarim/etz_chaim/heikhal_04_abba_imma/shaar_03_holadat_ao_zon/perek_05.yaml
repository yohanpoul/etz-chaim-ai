    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      DAM ↔ CHALAV transformation :
      → CHALAV = ELU'AT ha-DAM (elevation du sang) — MITHAPEKH (transforme) en lait + se sucre.
