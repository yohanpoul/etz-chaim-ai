  - id: "EC-H4S16-090"
    source_he: "יסוד דא\"א זהו סוד השופר שהוא צר וגם אמרו עליו מן המצר ואמרו בזוהר אמור דשופר זה אפיק קול והוא אש ומים רוח והוא ענין זווג א\"א להוציא ז\"א ג' כליל בג' חסד דין רחמים אמ\"ר והוא סוד ו' זעירא קול דנפיק משופר"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      YESOD A"A = sod SHOFAR (cor) :
      → TZAR (etroit) — sod "MIN HA-METZAR" (Tehilim 118:5 — du etroit).
      → ZOHAR EMOR : "SHOFAR APIK KOL" (le shofar emet voix).
      → KOL = ESH+MAYIM+RUACH (feu+eau+esprit).
      → INYAN ZIVVUG d'A"A pour faire sortir Z"A : 3 KELIL BE-3 = CHESED+DIN+RACHAMIM = AMaR (אמ"ר).
      → V ZEIRA = KOL DE-NAFIK (qui sort) du shofar.
      → Architecture : yesod-as-shofar-anatomy.
      → Pattern : organ-as-instrument cosmologic.
    type: déduction_scripturaire
    concepts:
      - {id: yesod_aa_shofar_min_ha_metzar_amar_kol_z_a_v_zeira, role: yesod_aa_shofar_zohar_emor_min_ha_metzar_tehilim_118_5_amar_chesed_din_rachamim_kol_v_zeira_z_a}
    mapping:
