  - id: "EC-H4S16-082"
    source_he: "אותן של זכר הם קטנים ואין בו חלב ושל אשה גדולות ויש להם חלב והטעם כי בהיות ז\"א תוך חזה אבא לא היה כי אם מציאת טפה קטנה אך בהיותו בחזה אמא שם מתגדל בסוד העיבור עד שנעשה ו' כלול בתוך ג'"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      Asymmetric DADIM :
      → ZACHAR : dadim PETITS, PAS de chalav.
      → ASHA : dadim GRANDS, AVEC chalav.
      → Cause :
        Z"A dans CHAZEH ABBA = TIPAH PETITE seulement.
        Z"A dans CHAZEH IMMA = MITGADAL en sod IBBUR jusqu'a V kollel-3.
      → Donc dadim-Imma s'agrandissent + chalav (de l'abondance d'or).
      → Architecture : duration-of-stay determines anatomic-extent.
      → Pattern : gestation-amount = breast-development.
    type: déduction_logique
    concepts:
