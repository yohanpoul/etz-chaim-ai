  - id: "EC-H4S16-086"
    source_he: "מה שבארנו חילוק בין הולדת או\"א ובריאותן לבריאת זו\"ן זה נרמז בזהר פרשת תרומה דף קס\"ז... אדם קדמאה אגליף ציורא דיליה גו משחתא וכו' שפי' כי א\"ק הוא מציאת... או\"א ואגליף בסוד הזרעת הטפה ציורא דיליה גו משחתא שהם או\"א תוך שערות רישא דא\"א ודיקנא יקירא דיליה הנקרא משחתא אך אדם תניינא ז\"א היה ע\"י זיווג נה\"י דא\"א תוץ בינה"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      CHILUK A"O (Adam Kadma) vs Z"A (Adam Tinyana) — Zohar Terumah 167 :
      → ADAM KADMA = A"O ; AGLIF (sculpte) ZURATA DILEH GU MASHCHATA :
        = A"O dans SE'AROT ROSH d'A"A + DIKNA YAKIRA (= MASHCHATA, onction).
        Via zivvug-PEH (HAZRA'AT-TIPAH).
      → ADAM TINYANA = Z"A — via zivvug NHY-A"A TOKH BINA.
      → Architecture : 2-Adam-types par zivvug-mecanisme distinct.
      → Pattern : Kadma-via-peh ; Tinyana-via-NHY-Bina.
    type: déduction_scripturaire
    concepts:
