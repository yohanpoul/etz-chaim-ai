      partzufim: ["arikh_anpin", "abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : human complete tier-mapping. Pattern 10S complete."

  - id: "EC-H4S16-088"
    source_he: "כשנתעלו נה\"י דא\"א בחג\"ת דאו\"א... חג\"ת דאו\"a הם באמצעית ממש כי כח\"ב למעלה ונה\"י למטה וחג\"ת באמצע והנה שיעור או\"א בחצי גוף העליון דא\"א מגרון עד חצי לב ואם תעריך דדי אשה תמצאם שהם ממש במקום הזה באמצע חצי גוף עליון שמן הצואר עד טבורא דלבא"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      Position dadim explained :
      → ChGT d'A"O = AU MILIEU (KCHaBD haut, NHY bas, ChGT centre).
      → Shi'ur A"O dans CHATZI-GUF-ELYON d'A"A = de Garon a Tabbura de-Liba (chazeh).
      → Dadim-asha = exactement DANS CETTE ZONE = milieu chatzi-guf-elyon = TZAVAR (cou) jusqu'a TABBURA DE-LIBA.
      → Architecture : anatomical-position correspondance ChGT-A"O.
      → Pattern : breast-position = mid-upper-body locus.
    type: déduction_logique
    concepts:
