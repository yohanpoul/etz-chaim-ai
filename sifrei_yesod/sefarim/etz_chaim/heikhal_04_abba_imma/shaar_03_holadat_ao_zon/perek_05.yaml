  - id: "EC-H4S16-081"
    source_he: "סוד הדדים של אשה... כי אותו אור הגדול שנתוסף עתה אל נה\"י דא\"א... זה נתהווה תחלה בחג\"ת אבא ואח\"כ בחג\"ת אמא... והאירה דרך שם בחזה דאו\"א לכן יש דדים בזכר ונקבה"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      SOD DADIM (mamelles) :
      → Or-grand ajoute aux NHY-A"A pour zivvug → manifest D'ABORD dans ChGT d'ABBA, puis ChGT d'IMMA.
