# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 3 — Sha'ar Holadat A"O ve-Zon (שער הולדת או״א וזו״ן)
# Perek: 5 — HOLADAT Z"A : 2 zivvugim. NHY-A"A=3 TIPIN-DE-SEGOL=ADAM TACHTON.
#            DADIM = haarah perce CHAZEH. CHALAV=ELU'AT-DAM. V ZEIRA→V GADOL.
#            Adam Kadma vs Tinyana (Zohar Terumah 167). KELALUT NHY-A"A ChGT-A"O.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_05 :
#   - Bloc A : HOLADAT Z"A 2 zivvugim — Z1 via A"A (emergence) ; Z2 via A"O (mochin)
#   - Bloc B : Z"A revet A"A de TABBURA DE-LIBA jusqu'a fin yesod A"A ; 1/2 Tiferet → GULGOLET Z"A
#   - Bloc C : 3 Mochin Z"A=NHY d'A"A ; Tosefta Beshalach 54 "ad lo ishtkach avira dakhya"
#   - Bloc D : Z"A pendant ibbur Imma : V ZEIRA=3 NHY ; 3 montent ChGT-A"O kollel 3 d'A"A
#   - Bloc E : 3 KELILIN BE-3 (Tikkunim+Tosefta)
#   - Bloc F : Tipot allongent dans Imma → 3 autres bechinot ; sort V"K (Chesed-Yesod)
#   - Bloc G : Adra 2 ATARIN A"A (ChG) lieu=A"O
#   - Bloc H : Zivvug-2 A"A au YESOD (kollel zachar+nukva)
#   - Bloc I : Pour ZON via A"O : NHY-A"A montent ChGT-A"O (pas ChGT-A"A) → 3 KELILIN 3
#   - Bloc J : NHY A"A=3 TIPIN DE-SEGOL (Tikkunim) → ADAM TACHTON=Z"A
#   - Bloc K : YESOD Abba apik tipah → Imma → meei → Z"A V"K kollel 3 + PESIAH LEBAR=Nukva
#   - Bloc L : SOD DADIM : tipah via yesod Abba manifest CHGT Abba+Imma → haarah perce CHAZEH → DADIM
#   - Bloc M : Zachar dadim petits sans chalav ; nukva dadim grands+chalav
#   - Bloc N : Z"A chazeh-Abba=tipah petite ; chazeh-Imma=ibbur+gadlut V"K → dadim+chalav
#   - Bloc O : CHALAV=ELU'AT ha-DAM ; NHY-bas=DAM (dinim, lebar-gufa) ; mitchalef CHALAV en montant
#   - Bloc P : Z"A sortit=TINOK YONEK → grand V GADOL V"K (Vav du Shem)
#   - Bloc Q : Dans Bina V ZEIRA kollel 3 dans HE — pas dimui-rosh
#   - Bloc R : CHILUK A"O (zivvug-PEH neshikin Adam Kadma Zohar Terumah 167) vs Z"A (zivvug NHY-A"A tokh Bina, Adam Tinyana)
#   - Bloc S : SHE'ELAH dadim chazeh — ADAM 10S complete ; A"O=chazeh-up=lieu dadim ; behemot 1S → dadim beten
#   - Bloc T : KELALUT NHY-A"A dans ChGT-A"O : Netzach kollel Hod → Abba ; Hod kollel Netzach → Imma ; Yesod split 1/2-1/2
#
# Source Sefaria : Sefer_Etz_Chaim.16.5 (1 section, 6509 chars)
# IDs : EC-H4S16-073 → EC-H4S16-092

