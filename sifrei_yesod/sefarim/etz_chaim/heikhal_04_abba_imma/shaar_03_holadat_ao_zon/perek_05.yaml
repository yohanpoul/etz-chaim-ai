      relevance: "Architecture : motion-substance. Pattern ascent-sweetening."

  - id: "EC-H4S16-084"
    source_he: "יצא ז\"א לחוץ דמיון תינוק היונק ומרוב אותו חלב נתגדל ונעשה ו' גדולה בו\"ק לבד שהוא ו' דשמא קדישא"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
