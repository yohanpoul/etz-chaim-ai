      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : anatomy ChGT correspondance. Pattern mid-upper-body."

  - id: "EC-H4S16-089"
    source_he: "בבהמות וחיות שהם בסוד מין א' לבד ואינו כולל כמו האדם לכן באו בהם הדדים בבטנם ממש"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      BEHEMOT (animaux) + CHAYOT :
      → Sod MIN ECHAD (une seule espece-tier).
      → Ne sont PAS COMPLETS comme ADAM.
      → Donc DADIM dans BETEN (ventre) MAMASH (litteralement) — pas chazeh.
