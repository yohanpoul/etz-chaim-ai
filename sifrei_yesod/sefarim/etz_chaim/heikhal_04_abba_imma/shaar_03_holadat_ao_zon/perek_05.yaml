  - id: "EC-H4S16-080"
    source_he: "יסוד אבא אפיק טפה חדא ואעיל לה באמא ותמן במעוי דאמא אתעביד ז\"א ו' זעירא ג' כליל בג' לחוד... ובסופו של ו' פסיעה לבר סוד נוקבא עמו"
