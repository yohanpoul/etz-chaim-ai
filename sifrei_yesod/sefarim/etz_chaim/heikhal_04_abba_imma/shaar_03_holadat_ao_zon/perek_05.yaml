  - id: "EC-H4S16-085"
    source_he: "בתוך בינה היה סוד ו' זעירא כלול מג' תוך ה' דבינה אמא עלאה ולכן אין שום דמות ראש לזו הו'"
    source_ref: "Heikhal 4, Sha'ar 3:5"
    assertion: |
      V ZEIRA pre-natal :
      → Dans BINA = sod V ZEIRA KOLLEL DE-3 dans HE-Bina-IMMA-elyona.
      → Pas de DIMUI ROSH (apparence de tete) — V courbe sans tete.
      → Architecture : letter-form encode pre-natal V"K-only state.
      → Pattern : no-head V = no-mochin yet.
      cf. EC-H4S15-205 (perek 4 Sha'ar 2) sur Vav sans tete dans HE.
