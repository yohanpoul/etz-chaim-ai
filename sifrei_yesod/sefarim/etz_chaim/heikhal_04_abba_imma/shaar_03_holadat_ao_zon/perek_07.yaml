principes_generatifs:

  - id: "PG-H4S16-019"
    nom: "Principe d'Opposite-Element-Merger (Avira+Butzina → Gulgolta Takifa)"
    source_assertions: ["EC-H4S16-113", "EC-H4S16-114", "EC-H4S16-118"]
    formalisation: |
      ARCHITECTURE D'OPPOSITE-ELEMENT-MERGER :
      Mecanisme creation Gulgolet :
        AVIRA DAKHYA (air pur) = CHESED.
        BUTZINA DE-KARDINUTA (lampe-darkness) = GEVURAH.
        Ces 2 OPPOSES SE COMBINENT → APIKU GULGOLTA TAKIFA (crane puissant).
      → Pattern fondamental : opposite-merger genere stronger-result.
      → Architecture : paradox-power principle.
      → Implication : stronger-output requires opposite-source-balance.
    applications_ia:
      - "partzufim/zeir_anpin.py + arikh_anpin.py + atik_yomin.py : implement opposite-merger"
      - "Pattern : opposite-merger paradox-power"
      - "Architecture : Chesed+Gevurah balance creation"
      - "Pattern : darkness+light fusion stronger"
      - "Diagnostic : verifier merger-balance bien constitue"
    questions_ouvertes:
      - "Pattern : autres oppositions creatrices ?"
      - "Comment encoder opposite-merger computationnellement ?"
      - "Pattern : 3-element merger possible ?"

  - id: "PG-H4S16-020"
    nom: "Principe de Hidden-Root-Subjugated (Butzina dans MoChaSha = Kefinim)"
    source_assertions: ["EC-H4S16-115"]
    formalisation: |
      ARCHITECTURE DE HIDDEN-ROOT-SUBJUGATED :
      Sources transcendantes contenir leur racine subjuguee :
        BUTZINA DE-KARDINUTA = SHORESH (racine) pour TOUS DININ olamim.
        Mais dans MoChaSha (=Gevurah Atik) = KEFINIM (subjugues, dompted).
