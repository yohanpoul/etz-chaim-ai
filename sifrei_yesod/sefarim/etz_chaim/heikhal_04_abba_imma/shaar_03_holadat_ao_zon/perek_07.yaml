# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 3 — Sha'ar Holadat A"O ve-Zon (שער הולדת או״א וזו״ן)
# Perek: 7 — DERNIER perek (7/7) Sha'ar Holadat. ITLABSHUT Z"A sur NHY-A"A.
#            BUTZINA+AVIRA DAKHYA → GULGOLET Z"A. RECAP : Bina→Keter A"O,
#            ChGT→Makifim Z"A, NHY→Pnimim Z"A. Variante MOHARCHA"V chatzi/shelish.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_07 :
#   - Bloc A : Order ITLABSHUT Z"A sur NHY-A"A
#   - Bloc B : CHATZI TIFERET MEKORI → GULGOLET Z"A (Adra)
#   - Bloc C : NIT'CHABRU AVIRA DAKHYA + BUTZINA DE-KARDINUTA → APIKU GULGOLTA TAKIFA
#   - Bloc D : MoChaSha=GEVURAH d'Atik ; NIRSHAM-bah BUTZINA DE-KARDINUTA (source dinim)
#   - Bloc E : BUTZINA DE-KARDINUTA = source DININ olamim ; KEFINIM (subjugues) dans MoChaSha
#   - Bloc F : CHESED Atik=GULGOLET ; GEVURAH Atik=MOCHA → CHESED→Abba, GEVURAH→Imma
#   - Bloc G : AVIRA DAKHYA=CHESED ; BUTZINA DE-KARDINUTA=GEVURAH
#   - Bloc H : Gulgolet Z"A formee de Tiferet A"A ; ChG nit'chabru → apiku gulgolta de back-Tiferet
#   - Bloc I : RECAP : Bina d'A"A→Keter A"O ; ChGT d'A"A→Mochin Makifim Z"A ; NHY d'A"A→Mochin Pnimim Z"A (s'etendent comme NHY-A"O)
#   - Bloc J : (§2) Variante MOHARCHA"V Mevo Sha'arim 112b — chatzi-tachton vs shelish-tachton Tiferet A"A donne Z"A
#   - Bloc K : Resolution suggeree : 1/3 quand mochin Imma seul ; 1/2 quand mochin Abba aussi (parallele Tiferet Imma dans Keter Z"A)
#
# Source Sefaria : Sefer_Etz_Chaim.16.7 (2 sections, 1123 chars) — DERNIER perek Sha'ar 3
# IDs : EC-H4S16-113 → EC-H4S16-123

