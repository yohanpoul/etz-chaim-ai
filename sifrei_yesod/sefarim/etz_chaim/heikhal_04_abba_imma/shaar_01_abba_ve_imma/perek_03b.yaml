      partzufim: ["abba", "imma"]
      relevance: "Architecture : column-purity. Pattern lateral pure-source distribution."

  - id: "EC-H4S14-093"
    source_he: "יען כי ב' אלו בימין דא\"א כי שם החסדים דמ\"ה וב' אלו בשמאל דא\"א ששם הגבורה דב\"ן"
    source_ref: "Heikhal 4, Sha'ar 1:3 §3"
    assertion: |
      RAISON de la column-purity :
      → 2 partzufim (Abba+YISSO) en YAMIN d'A"A — la sont CHASADIM d'MaH.
      → 2 partzufim (Bina+Tevunah) en SMOL d'A"A — la est GEVURAH d'BaN.
      → Position (cote) determine source-MaH/BaN.
      → Architecture : geographic-determinism MaH/BaN.
      → Pattern : location-source coupling fixed.
    type: déduction_logique
    concepts:
      - {id: column_purity_par_position_yamin_chasadim_mah_smol_gevurah_ban, role: column_purity_par_position_yamin_aa_chasadim_mah_smol_aa_gevurah_ban_geographic_determinism}
