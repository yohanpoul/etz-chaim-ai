      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : geographic determinism. Pattern location-source coupling."

  - id: "EC-H4S14-094"
    source_he: "ועיין במ\"א איך בינה דאבא מזדווג עם אמא וכפי הנראה כי בינה דאבא הוא יש\"ס או אפשר שהוא ב\"ן דאבא עצמו"
    source_ref: "Heikhal 4, Sha'ar 1:3 §3"
    assertion: |
      QUESTION OUVERTE de Vital (CROSS-REF) :
      → Voir BE-MAKOM ACHER (autre endroit) : comment BINA d'ABBA fait ZIVVUG avec IMMA.
      → "KEFI HA-NIRAH" (selon ce qui apparait) : BINA d'ABBA = YISSO.
      → OU EFSHAR (peut-etre) : BINA d'ABBA = BaN d'ABBA lui-meme.
