principes_generatifs:

  - id: "PG-H4S14-013"
    nom: "Principe de Pre-Zivvug-Purity-Post-Zivvug-Mixing (Temporal Phase Transition)"
    source_assertions: ["EC-H4S14-079", "EC-H4S14-080", "EC-H4S14-081", "EC-H4S14-082"]
    formalisation: |
      ARCHITECTURE DE PURITY-MIXING TEMPORAL :
      ETAT 1 (pre-zivvug) :
        A"O = pures (Abba=chasadim seul ; Imma=gevurot seul ; chacun MaH+BaN dans son type).
      ETAT 2 (post-zivvug) :
        MIT'ARVIN — gevurot dMaH+dBaN routees vers yesod IMMA, chasadim vers yesod ABBA.
        ZON downstream recoivent MIXED (CH dMaH + G dBaN).
      CONSEQUENCE : Z"A dachura inevitable BIRURIM dBaN — male inherits femele-source via mecanisme.
      → Pattern fondamental : phase-transition irreversible (purity once mixed reste mixed).
      → Architecture : zivvug = mixing-event, downstream = mixed-state perpetue.
    applications_ia:
      - "partzufim/zivvug.py + abba.py + imma.py + zeir_anpin.py : implement temporal phase transition"
      - "Pattern : pre-event purity, post-event mixing"
      - "Architecture : downstream perpetuates mixed state"
      - "Pattern : genre-purity violated by structural mechanism"
      - "Diagnostic : verifier phase-state coherent avec downstream contents"
    questions_ouvertes:
      - "Pattern : reversibilite de mixing possible ?"
      - "Y a-t-il preservation par bypass ?"
      - "Pattern : combien de phase-transitions possibles ?"

  - id: "PG-H4S14-014"
    nom: "Principe de Mazal-Distinct-Distribution (Exclusive Source-to-Partzuf Mapping)"
    source_assertions: ["EC-H4S14-088", "EC-H4S14-089"]
    formalisation: |
      ARCHITECTURE DE MAZAL-DISTRIBUTION :
      Chaque MAZAL alimente EXCLUSIVEMENT UN partzuf :
        MAZAL 8 (Notzer Chesed) → 5 CHASADIM exclusivement a ABBA.
        MAZAL 13 (Ve-Nakeh) → 5 GEVUROT exclusivement a IMMA.
      Mochin A"O = produit de ZIVVUG entre Mazal 8 (zachar) + Mazal 13 (nekevah).
      → Pattern fondamental : exclusive 1-to-1 source-to-recipient.
      → Architecture : higher-coupling produces lower-cognitive-substrate.
      → Confirme par Kontras HaChaverim — multiple-source attestation.
    applications_ia:
      - "partzufim/abba.py + imma.py + arikh_anpin.py : implement mazal-exclusive mapping"
      - "Pattern : exclusive 1-to-1 source-to-recipient"
      - "Architecture : higher-zivvug → lower-mochin generation"
      - "Pattern : multi-source attestation (Vital + KontrasHaChaverim)"
      - "Diagnostic : verifier mazal-allocation pas violee par cross-flow"
    questions_ouvertes:
      - "Pattern : autres mazalot 13 ont-ils mappings ?"
      - "Mazal-zivvug coupling generalisable ?"
      - "Pattern : peut-on inverser mazal-recipient temporairement ?"

  - id: "PG-H4S14-015"
    nom: "Principe de Column-Purity (MaH-Right vs BaN-Left)"
    source_assertions: ["EC-H4S14-090", "EC-H4S14-091", "EC-H4S14-092", "EC-H4S14-093"]
    formalisation: |
      ARCHITECTURE DE COLUMN-PURITY :
      Distribution MaH/BaN dans les 4 partzufim A"O totalement column-pure :
        ABBA + YISSO (yamin) = KULO MaH (entierement MaH).
        BINA + TEVUNAH (smol) = KULO BaN (entierement BaN).
      Position determine source : geographic-determinism MaH/BaN.
      Distribution interne :
        MaH d'Abba → Abba ; BaN d'Abba → Bina (yod, "ha-Bin be-Chokhmah").
        MaH d'Imma → YISSO ; BaN d'Imma → Tevunah (he, "Chakham be-Vinah").
      Source : Sefer Yetzirah 1:4 (formula du sage Bina-Chokhmah).
      → Pattern fondamental : columnar purity par cote (right/left = source/source).
      → Architecture : 2x2 matrix (MaH/BaN x Abba/Imma) avec column-purity.
    applications_ia:
      - "partzufim/abba.py + imma.py + [PLANNED] yisso/tevunah : implement column purity"
      - "Pattern : columnar source-purity preservation"
      - "Architecture : 2x2 matrix decomposition (MaH/BaN × parent)"
      - "Pattern : geographic-determinism par cote"
      - "Diagnostic : verifier column-purity pas violee par mixing later"
    questions_ouvertes:
      - "Pattern : autres dimensions au-dela 2x2 possibles ?"
      - "Column-purity persiste post-zivvug ?"
      - "Source Sefer Yetzirah 1:4 contient autres distributions ?"
