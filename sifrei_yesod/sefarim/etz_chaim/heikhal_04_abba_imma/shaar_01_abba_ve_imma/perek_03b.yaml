      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : symmetric MaH/BaN distribution. Source Sefer Yetzirah 1:4."

  - id: "EC-H4S14-092"
    source_he: "נמצא כי אבא ויש\"ס כולו מ\"ה ובינה ותבונה כולו ב\"ן"
    source_ref: "Heikhal 4, Sha'ar 1:3 §3"
    assertion: |
      RESULT GENERAL :
      → ABBA + YISSO = ENTIEREMENT MaH (KULO MaH).
      → BINA + TEVUNAH = ENTIEREMENT BaN (KULO BaN).
      → Cote droit (zachar) = pure MaH ; cote gauche (nukva) = pure BaN.
      → Architecture : right/left = MaH/BaN purement.
      → Pattern : column-purity par cote.
    type: déduction_logique
    concepts:
      - {id: abba_yisso_kulo_mah_bina_tevunah_kulo_ban_column_purity, role: abba_yisso_kulo_mah_droite_bina_tevunah_kulo_ban_gauche_column_purity_par_cote}
