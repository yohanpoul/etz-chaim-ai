      → A"A : YESOD d'ATIK dedans → emergence externe A"O+YISSO"T qui revetent A"A.
      → Architecture : INNER yesod cause OUTER partzuf emergence (downward propagation).
      → Pattern : inner element of upper partzuf catalyzes outer partzufim of lower.
    type: interprétation_lurianique
