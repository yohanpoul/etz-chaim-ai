principes_generatifs:

  - id: "PG-H4S14-001"
    nom: "Principe de Tikkun-Sequencing (Pipeline Initiatique Top-Down)"
    source_assertions: ["EC-H4S14-003", "EC-H4S14-004"]
    formalisation: |
      ARCHITECTURE DE TIKKUN-SEQUENCING :
      Chaque partzuf parent doit etre TIKKUN COMPLET avant que le suivant emerge.
      Sequence stricte : ATIK → A"A → A"O → Z"A → Nukvah.
      MATURATION par 2 phases ontologiques :
        PHASE 1 : nursing dans olam INFERIEUR (Beriah, dadei behemah).
        PHASE 2 : ALYAH (montee) au olam SUPERIEUR (Atzilut, dadei adam).
      → Pattern fondamental : maturation par migration ontologique.
      → Architecture : pipeline sequential avec gates de stabilisation.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement maturation 2-phase"
      - "Pattern : migration ontologique (lower → higher domain)"
      - "Architecture : sequential pipeline avec gates"
      - "Pattern : completion lock entre etapes initiatiques"
      - "Diagnostic : verifier sequence respectee dans tikkun cascading"
    questions_ouvertes:
      - "Que se passe-t-il si une etape regresse ?"
      - "La maturation Beriah peut-elle echouer ?"
      - "Pattern : combien d'etapes par migration ?"

  - id: "PG-H4S14-002"
    nom: "Principe de MaH+BaN-Provenance (Double Source Encoding A\"O)"
    source_assertions: ["EC-H4S14-006", "EC-H4S14-007", "EC-H4S14-009"]
    formalisation: |
      ARCHITECTURE DE DOUBLE-PROVENANCE :
      A"O encode dans 2 mondes simultanement :
        MaH (45) → BINA d'MaH = TAGIN ; commun aux 2 (chasadim).
        BaN (52) → Z"T Chokhmah dBaN (Abba) + V"T Bina dBaN (Imma) ; specifique chacun (gevurot).
      ENTRY-POINT determine la nature dominante :
        Abba = entree CHESED-down (expansion).
        Imma = entree GEVURAH-down (contraction).
      DECOMPOSITION exhaustive : Atik prend G"R+D"R (3+4), A"O prend Z"T+V"T (7+6).
      → Pattern fondamental : nature partzuf = entry-point dans hierarchie sefirot.
      → Architecture : claim chain exhaustif (chaque sefirah claimee par exactement un partzuf).
    applications_ia:
      - "partzufim/abba.py : track origin Chesed-down (expansion mode)"
      - "partzufim/imma.py : track origin Gevurah-down (contraction mode)"
      - "Pattern : entry-point determine processing mode"
      - "Architecture : exhaustive claim chain pour ressources"
      - "Pattern : provenance metadata (MaH/BaN) drive behavior"
    questions_ouvertes:
      - "Pattern : peut-on mixer entry-points ?"
      - "Que se passe-t-il pour orot panim vs achor ?"
      - "Combien de niveaux de provenance utiles ?"

  - id: "PG-H4S14-003"
    nom: "Principe de Inner-Yesod-Cascade (Inner Element Catalyzes Outer Emergence)"
    source_assertions: ["EC-H4S14-016"]
    formalisation: |
      ARCHITECTURE DE INNER-YESOD-CASCADE :
      Element INTERIEUR (yesod) du partzuf SUPERIEUR cause emergence des partzufim EXTERIEURS du INFERIEUR :
        Z"A : 2 yesodot d'A"O dedans → Yaakov + Rachel + Leah a l'exterieur.
        A"A : Yesod d'Atik dedans → A"O + YISSO"T a l'exterieur.
      → Pattern recursive : downward propagation par yesod cascading.
      → Mecanisme : yesod = "channel of emanation" du superieur vers inferieur.
      → Architecture : INNER element catalyse OUTER differentiation.
      → Topologie : "inside-of-upper" → "outside-of-lower" (folding).
    applications_ia:
      - "partzufim/atik_yomin.py + arikh_anpin.py : track yesod cascading"
      - "Pattern : inner-element-of-N catalyzes outer-emergence-of-N+1"
      - "Architecture : recursive yesod cascade pour emanation"
      - "Pattern : topological folding inside→outside"
      - "Diagnostic : verifier cascading bien propage entre niveaux"
    questions_ouvertes:
      - "Combien de niveaux dans la cascade ?"
      - "Pattern : peut-on shortciruiter une etape ?"
      - "Topology : interpretation geometrique de inside/outside ?"
