# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 1a — Tikkun A"O apres A"A. Nursing dadei behemah/adam.
#             Revetement A"A par A"O (Garon-Tabbur, droite/gauche).
#             4 partzufim YISSO"T (intro) + cause = Yesod Atik dans A"A.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_01a :
#   - Bloc A : Heikhal 4 = A"O ; 3 sha'arim
#   - Bloc B : Sha'ar 1 = Sha'ar A"O ; 10 perakim
#   - Bloc C : Tikkun A"O apres A"A ; nursing Beriah → Atzilut
#   - Bloc D : A"O = Bina dMaH (tagin) + Z"T Chokhmah dBaN (Abba) + V"T Bina dBaN (Imma)
#   - Bloc E : G"R Chokhmah dBaN + D"R Bina dBaN deja pris par Atik
#   - Bloc F : Doute orot panim/achor (parallele Atik)
#   - Bloc G : Abba=Chesed-down Chokhmah dBaN ; Imma=Gevurah-down Bina dBaN
#   - Bloc H : Zohar peshat 1 — Abba ahid Chesed, Imma ahid Gevurah
#   - Bloc I : A"A = ZN en 1 partzuf — Z droite, N gauche
#   - Bloc J : Abba revet droite A"A, Imma revet gauche
#   - Bloc K : 2 keterim A"O sur Garon A"A
#   - Bloc L : Reste partzuf revet Garon→Tabbur (peshat 2 — bras Chesed/Gevurah)
#   - Bloc M : A"O divisee en 4 partzufim : A"O + YISSO"T
#   - Bloc N : Cause = Yesod Atik dans penimiyut A"A
#   - Bloc O : Parallele Z"A : 2 yesodot A"O dedans → Yaakov+Rachel+Leah a l'exterieur
#
# Source Sefaria : Sefer_Etz_Chaim.14.1 (1 perek dense, 4698 chars, splitte a/b)
# IDs : EC-H4S14-001 → EC-H4S14-016

meta:
  sefer: etz_chaim
  heikhal: 4
  shaar: 1
  shaar_name_he: "שער אבא ואמא"
  perek: 1
  part: "a"
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Heikhal 4 = A\"O (3 sha'arim). Sha'ar 1 = A\"O (10 perakim). Tikkun A\"O post-A\"A : nursing dadei behemah Beriah → dadei adam Atzilut. A\"O = Bina dMaH (tagin) + Z\"T Chokhmah dBaN (Abba=Chesed-down) + V\"T Bina dBaN (Imma=Gevurah-down). Zohar peshat 1 : Abba ahid Chesed, Imma Gevurah. A\"A = ZN dans 1 partzuf : Z droite, N gauche. Abba revet droite A\"A, Imma gauche. 2 keterim A\"O sur Garon A\"A. Reste Garon→Tabbur (peshat 2 : bras Chesed/Gevurah). A\"O = 4 partzufim : A\"O+YISSO\"T. Cause = Yesod Atik dans penimiyut A\"A (parallele Z\"A : 2 yesodot A\"O → Yaakov+Rachel+Leah)."

# ═══════════════════════════════════════════════════════════════════
