principes_generatifs:

  - id: "PG-H4S14-034"
    nom: "Principe de Recursive-Sefirah-Internal-10S (Each Shem Contains 10 Inner)"
    source_assertions: ["EC-H4S14-215", "EC-H4S14-216", "EC-H4S14-217"]
    formalisation: |
      ARCHITECTURE DE RECURSIVE-INTERNAL-10S :
      Chaque SHEM dans une sefirah inclut TOUS 10 sefirot INTERNES :
        Letters/parts du shem distribues sur 10 positions internes.
        EXEMPLE Keter Abba : kotzo→K, yod→Ch, he→B, vav→V"K, he→M.
        EXEMPLE Chokhmah : kotzo→K, yod→Ch, hi→B, vav→V"K, hi→M (pour 10-letter milui).
      → Pattern fondamental : recursive-self-decomposition par shem-letters.
      → Architecture : sefirah-internal 10S structure universelle.
      → Implication : depth-encoding via letter-distribution.
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement internal 10S"
      - "Pattern : letter-position encode internal sefirah-position"
      - "Architecture : recursive self-decomposition per shem"
      - "Pattern : letter-progression = sefirah-progression"
      - "Diagnostic : verifier each shem distribute properly"
    questions_ouvertes:
      - "Pattern : autres distributions possibles (non-canonical) ?"
      - "Comment encoder distribution computationnellement ?"
      - "Pattern : recursion-depth limit ?"

  - id: "PG-H4S14-035"
    nom: "Principe de Count-vs-Sum-Encoding (Otiyot vs Chesbon)"
    source_assertions: ["EC-H4S14-219", "EC-H4S14-223", "EC-H4S14-224"]
    formalisation: |
      ARCHITECTURE DE COUNT-VS-SUM-ENCODING :
      2 modes encoding distincts :
        BECHINAT OTIYOT (count-mode) : combien de letters ?
        CHESBON / MISPAR (sum-mode) : combien vaut chaque lettre, sommee ?
      Distribution :
        COUNT-mode → tier-superior (G"R, etc).
        SUM-mode → CHESBON TOUJOURS dans MALKHUT (universel be-kol makom).
      → Pattern fondamental : 2 modes encoding par tier-position.
      → Architecture : explicit-mode-distinction pedagogical.
      → Implication : Malkhut = aggregator vers gematria-sum.
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement 2 encoding modes"
      - "Pattern : count-mode vs sum-mode distinct"
      - "Architecture : Malkhut = sum aggregator"
      - "Pattern : tier-determines-encoding-mode"
      - "Diagnostic : verifier chesbon localized Malkhut"
    questions_ouvertes:
      - "Pattern : 3eme mode (par exemple ratio) ?"
      - "Comment encoder mode-switch computationnellement ?"
      - "Pattern : exception au principe Malkhut-chesbon ?"

  - id: "PG-H4S14-036"
    nom: "Principe de Co-Numeric-Rider-Vehicle (28+28 Throne+Adam)"
    source_assertions: ["EC-H4S14-230", "EC-H4S14-231", "EC-H4S14-232"]
    formalisation: |
      ARCHITECTURE DE CO-NUMERIC-RIDER-VEHICLE :
      Symmetrique pair RIDER+VEHICLE numerique :
        KISSEH (trone) = 28 letters (= ha-Kisseh atzmo, locus surplus dans Malkhut A"O).
        ROKHEV AL HA-KISSEH = 28 letters MILUI-DU-MILUI HAVAYAH d'YODIN (Adam rider).
        Total : 28+28 = 56 letters.
      DISTINCTION CRUCIALE :
        Throne = CHESBON-mode (acharonim Malkhut).
        Rider = COUNT-mode (otiyot pas chesbon).
      → Pattern fondamental : rider-vehicle co-numerique mais distincts en mode.
      → Architecture : symmetric-pair avec mode-distinction.
      → Source : Zohar Kedoshim Raya Mehemna 82.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement co-numeric rider-vehicle"
      - "Pattern : symmetric pair distinct modes"
      - "Architecture : 4-leg throne carries rider"
      - "Pattern : numeric coincidence reveals structural pairing"
      - "Diagnostic : verifier 28+28 coherent"
    questions_ouvertes:
      - "Pattern : autres co-numeric pairs ?"
      - "Comment encoder rider/throne separation ?"
      - "Pattern : autre source-origin pour metaphore ?"
