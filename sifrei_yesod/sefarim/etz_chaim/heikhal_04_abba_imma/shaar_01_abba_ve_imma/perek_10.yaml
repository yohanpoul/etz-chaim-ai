      → י (yod seul) → KETER ; י"ה (yh) → CHOKHMAH+BINA.
      → יה"ו (yhv) → ChGT ; יהו"ה (yhvh) → NHY+MALKHUT (4 letters → 4 dernieres).
      → Architecture : letter-position encode internal-sefirah-position.
      → Pattern : letter-progression = sefirah-progression.
    type: axiome_explicite
    concepts:
