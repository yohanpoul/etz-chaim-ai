# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 10 — DERNIER perek du Sha'ar Abba ve-Imma (10/10).
#             Chaque shem inclut 10S internes par lettre. AB/SaG/MaH/BaN places.
#             G"R = M"B letters (4+10+28). CHESBON dans Malkhut. 28 letters
#             milui-milui = ROKHEV AL HA-KISSEH (Zohar Kedoshim Ra"M 82).
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_10 :
#   - Bloc A : Renvoi perek 7 — chaque shem inclut tous 10S de la sefirah
#   - Bloc B : Exemple Keter Abba HAVAYAH simple — 10S internes par lettre
#   - Bloc C : Achor Keter — y/yh/yhv/yhvh distribues 10S
#   - Bloc D : Chokhmah Abba 10 letters yod-vav-dalet milui distribuees 10S
#   - Bloc E : Distribution canonique : AB Chokhmah, SaG Bina, MaH Z"A, BaN Nukva
#   - Bloc F : G"R chacun = M"B letters (4+10+28) — bechinat OTIYOT pas chesbon
#   - Bloc G : 4 letters pashut dans KETER ; 10 milui dans CHOKHMAH ; 28 milui-milui dans BINA
#   - Bloc H : Z"T = 1 HAVAYAH milui yodin (10 letters cumulees Z"T entier)
#   - Bloc I : Sidur shemot — sefirah classification : MISPAR (count) vs CHESBON (gematria sum)
#   - Bloc J : CHESBON-bechinah TOUJOURS dans MALKHUT (universel)
#   - Bloc K : Malkhut Abba = chesbon HAVAYAH AB = 72 ; Malkhut Imma = chesbon SaG = 63
#   - Bloc L : Idem TOUS shemot du monde — chesbon dans Malkhut
#   - Bloc M : Panim+achor d'A"O : AB+KS"A = REGEL ; DPK+TKM"D = TaSHKaH ; dans Malkhut A"O
#   - Bloc N : CHESBON 28 LETTERS extras = 728 - (3×233) ; issus 'yod-he-yod' (3 bechinot yod milui)
#   - Bloc O : Ces 28 plus eleves que le reste (3 ou 4 ×REGEL)
#   - Bloc P : Mais s'habillent en 4 RAGLAIM (= 4 raglei kisseh) — sod ZOHAR KEDOSHIM Ra"M 82
#   - Bloc Q : 28 letters = HA-KISSEH ATZMO
#   - Bloc R : ROKHEV AL HA-KISSEH = 28 letters MILUI-MILUI HAVAYAH d'YODIN ; pas par chesbon
#
# Source Sefaria : Sefer_Etz_Chaim.14.10 (1 section, 2049 chars) — DERNIER perek Sha'ar 1
# IDs : EC-H4S14-215 → EC-H4S14-232

meta:
  sefer: etz_chaim
  heikhal: 4
  shaar: 1
  shaar_name_he: "שער אבא ואמא"
  perek: 10
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "DERNIER perek du Sha'ar Abba ve-Imma. Chaque shem inclut 10S internes (kotzo/yod/he/vav/he distribues). Distribution canonique : AB Chokhmah, SaG Bina, MaH Z\"A, BaN Nukva. G\"R = M\"B letters (4+10+28) — bechinat OTIYOT (count), vs CHESBON (gematria sum). 4 pashut dans KETER, 10 milui dans CHOKHMAH, 28 milui-milui dans BINA. Z\"T=1 HAVAYAH (10 letters cumulees). CHESBON-bechinah TOUJOURS dans MALKHUT. Malkhut Abba = AB(72), Malkhut Imma = SaG(63). Panim+achor : AB+KS\"A=REGEL ; DPK+TKM\"D=TaSHKaH. 28 letters extras au-dela 3×REGEL = HA-KISSEH ATZMO ; ROKHEV AL HA-KISSEH = 28 letters MILUI-MILUI (Zohar Kedoshim Ra\"M 82)."

