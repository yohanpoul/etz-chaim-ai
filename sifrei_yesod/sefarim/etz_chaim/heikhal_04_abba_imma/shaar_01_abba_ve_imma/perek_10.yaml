    source_ref: "Heikhal 4, Sha'ar 1:10"
    assertion: |
      KETER d'Abba — distribution PANIM (HAVAYAH simple) :
      → KOTZO de YOD → KETER interne.
      → YOD (י) → CHOKHMAH ; HE (ה) → BINA ; VAV (ו) → V"K ; HE (ה) → MALKHUT.
