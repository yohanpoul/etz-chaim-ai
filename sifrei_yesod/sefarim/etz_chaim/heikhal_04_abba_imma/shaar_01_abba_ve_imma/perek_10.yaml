  - id: "EC-H4S14-229"
    source_he: "אמנם אלו הכ\"ח מתלבשים בד' רגלים אלו שהם סוד ד' רגלי הכסא הזה שהוא באו\"א כנ\"ל הנרמז פ' קדושים בר\"מ דף פ\"ב"
