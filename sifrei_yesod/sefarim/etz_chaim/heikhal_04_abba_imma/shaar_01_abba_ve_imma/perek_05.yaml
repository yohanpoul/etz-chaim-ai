      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "abba", "nukva"]
      relevance: "Architecture : Z\"A-Chokhmah mirror identity. Pattern downstream-essence-mirror."

  - id: "EC-H4S14-131"
    source_he: "או אפשר שגם הנוקבא תהיה בחי' כ\"ח אותיות המילוי דמיון הבינה. אמנם המלכות של זו\"ן הם יהיה מספר ע\"ד הנ\"ל בחו\"ב וצ\"ע"
    source_ref: "Heikhal 4, Sha'ar 1:5"
    assertion: |
      VARIANTE doctrinale :
      → OU EFSHAR (peut-etre) : Nukva = 28 letters MILUI-HA-MILUI comme BINA.
      → Mais MALKHUT de ZON = MISPAR comme dans CHB (Chokhmah-Bina).
      → TZARIKH IYUN (necessite reflexion plus).
      → Architecture : doctrinal-uncertainty preservee — 2 lectures alternatives.
      → Pattern : Nukva-mirror peut etre Chokhmah ou Bina.
    type: axiome_explicite
    concepts:
      - {id: variante_nukva_28_letters_bina_malkhut_zon_mispar_chb_tzarikh_iyun, role: variante_nukva_28_letters_milui_ha_milui_bina_malkhut_zon_mispar_chb_tzarikh_iyun}
    mapping:
