    source_he: "והנה הז\"ת של אבא כל הז' אין להם אלא הוי\"ה א' דע\"ב דיודין"
    source_ref: "Heikhal 4, Sha'ar 1:5"
    assertion: |
      Z"T d'Abba (7 inferieures) :
      → Tous les 7 ensemble = HAVAYAH UN SEUL d'AB-yodin.
      → Pas chacun une HAVAYAH separee.
      → RAISON : Z"T = un PARTZUF UN seul (Z"A d'Abba).
      → CONTRASTE : G"R = chaque sefirah = un partzuf separe.
      → Architecture : Z"T-united-partzuf vs G"R-separate-partzufim.
      → Pattern : tier-composition differs (collective vs individual).
    type: axiome_explicite
    concepts:
      - {id: zt_abba_havayah_un_partzuf_un_za_abba_vs_gr_separes, role: zt_abba_un_havayah_ab_yodin_un_partzuf_un_seul_za_abba_vs_gr_3_partzufim_separes}
