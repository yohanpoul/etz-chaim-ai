      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : naming-hierarchy par position. Pattern Imma-Tevunah AHYH echo."

  - id: "EC-H4S14-133"
    source_he: "ואח\"כ בז\"א שם מ\"ה דאלפין על דרך הנ\"ל ובנוקבא שם ב\"ן דההין על דרך הנ\"ל"
    source_ref: "Heikhal 4, Sha'ar 1:5"
    assertion: |
      Mapping ZON :
      → Z"A = SHEM MaH d'ALEFIN (45 — milui ALEF).
      → NUKVA = SHEM BaN d'HEHIN (52 — milui HE).
      → Architecture : ZON encoded distinct shemot ; Z"A=MaH, Nukva=BaN.
