      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture : 4-partzuf ZON. Pattern symmetric milui-type."

  - id: "EC-H4S14-135"
    source_he: "ונחזור לעיל כי או\"א הם הוי\"ה דע\"ב ואהי\"ה דיודי\"ן ויש\"ס ותבונה הם שם ס\"ג ואהי\"ה דיודין כנ\"ל עכ\"מ"
    source_ref: "Heikhal 4, Sha'ar 1:5"
    assertion: |
      REPRISE finale (cloture perek) :
      → A"O = HAVAYAH d'AB (72) + AHYH d'YODIN.
      → YISSO + Tevunah = HAVAYAH d'SaG (63) + AHYH d'YODIN.
      → Marqueur fin : "AKH"M" (akh-kafan-mem? = abreviation cloture).
      → Architecture : closing-summary frame.
