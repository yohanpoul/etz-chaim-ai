      tables: ["partzufim_states"]
      partzufim: ["nukva", "imma"]
      relevance: "Architecture : doctrinal variants preserved. Pattern Nukva-mirror options."

  - id: "EC-H4S14-132"
    source_he: "והנה כל (שם) זה באבא דאבא. אמנם באמא דאבא הוא שם אהי\"ה דיודין ע\"ד הנ\"ל ואח\"כ ביש\"ס שם ס\"ג ובתבונה שם אהי\"ה דיודין על דרך הנ\"ל"
    source_ref: "Heikhal 4, Sha'ar 1:5"
    assertion: |
      Mapping AVANCE A"O+YISSO"T :
      → ABBA d'ABBA = HAVAYAH AB d'YODIN (deja decrit).
      → IMMA d'ABBA = AHYH d'YODIN.
      → YISSO = HAVAYAH SaG (63).
      → TEVUNAH = AHYH d'YODIN.
      → Architecture : naming-hierarchy par partzuf-position.
      → Pattern : Imma+Tevunah partagent AHYH-yodin (echo).
    type: axiome_explicite
    concepts:
      - {id: mapping_abba_dabba_ab_imma_dabba_ahyh_yodin_yisso_sag_tevunah_ahyh_yodin, role: mapping_abba_dabba_ab_imma_dabba_ahyh_yodin_yisso_sag_tevunah_ahyh_yodin_naming_hierarchy}
    mapping:
