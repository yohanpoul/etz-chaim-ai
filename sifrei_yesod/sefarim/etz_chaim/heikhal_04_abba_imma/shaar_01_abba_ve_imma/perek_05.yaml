      tables: ["partzufim_states"]
      partzufim: ["abba", "zeir_anpin"]
      relevance: "Architecture : Z\"T-united vs G\"R-separate. Pattern tier composition mode."

  - id: "EC-H4S14-130"
    source_he: "ונ\"ל שכיון שגם שם הם דו\"נ א\"כ ו\"ת לבד יהיה שם ע\"ב דיודין בבחי' אותיות ונוקבא השביעית יהיה בחינת מספר ע\"ב ע\"ד הנ\"ל והענין כי ז\"א וחכמה הכל א' וכמו שהחכמה י' אותיות דע\"ב כן הז\"א"
    source_ref: "Heikhal 4, Sha'ar 1:5"
    assertion: |
      NL"H (note de Vital) — Z"T = ZN aussi :
      → V"T (6 superieures Z"A) = AB-yodin en LETTERS.
      → NUKVAH 7eme = AB en MISPAR.
      → Cause : Z"A et CHOKHMAH HA-KOL ECHAD (sont un — meme essence).
      → Comme Chokhmah a 10 letters AB, Z"A pareil.
      → Architecture : Z"A-mirror-Chokhmah identite.
      → Pattern : downstream-mirror upstream essence.
    type: déduction_logique
    concepts:
      - {id: za_chokhmah_echad_zt_vt_letters_nukva_7eme_mispar, role: za_chokhmah_kol_echad_zt_vt_letters_ab_yodin_nukva_7eme_mispar_ab_mirror}
