# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 5 — Distribution SHEMOT (HAVAYAH+AHYH) entre 4 partzufim A"O+YISSO"T.
#            Z"T = HAVAYAH simple ; G"R = M"B letters (4-10-28). Calcul detaille
#            Keter+Chokhmah+Bina d'Abba avec milui+ribua+mispar. Principe :
#            milui augmente DIN, pashtut = takhlit rachamim.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_05 :
#   - Bloc A : Abba klalut A"O = HAVAYAH AB + AHYH YODIN (panim+achor)
#   - Bloc B : Imma kollelet YISSO+Tevunah = HAVAYAH SaG + AHYH YODIN
#   - Bloc C : Cela dans Z"T ; G"R = M"B letters (formula 4+10+28)
#   - Bloc D : Sum M"B aussi dans Malkhut de chacun ; pareil MaH, BaN, ZON
#   - Bloc E : Exemple AB — 4 madregot dans Keter Abba seul (panim+achor x 2)
#   - Bloc F : Keter Abba panim 9 rishonot = HAVAYAH simple (4 letters distribuees 9 places)
#   - Bloc G : Achorayim Keter = ribua pashut (10+15+21+26 letters cumulees)
#   - Bloc H : Malkhut Keter — panim mispar 26, achorayim mispar 72
#   - Bloc I : Chokhmah Abba — panim 9 = 10 letters milui AB-yodin ; achor ribua 26
#   - Bloc J : Chokhmah Abba — Malkhut panim mispar AB=72 ; Malkhut achor mispar ribua=184
#   - Bloc K : Bina Abba — panim 9 = 28 letters milui-ha-milui ; achor ribua 156
#   - Bloc L : Bina Abba — Malkhut panim mispar 28=610 ; Malkhut achor mispar ribua-achor=2172
#   - Bloc M : PRINCIPE — plus HAVAYAH milui, plus DIN ; pashtut = takhlit ha-rachamim
#   - Bloc N : G"R 3 partzufim panim = 42 letters = SHEM M"B "DE-IHI BE-RISHA" (Tikkunim 132)
#   - Bloc O : 3 Malkhuyot G"R aussi M"B letters mispar = "EYNAYIKH BREKHOT" (Zohar Pinchas)
#   - Bloc P : Z"T Abba tous 7 = HAVAYAH UN AB-yodin (Z"A Abba un seul partzuf) ; vs G"R chacun
#   - Bloc Q : Note Z"A+Chokhmah identite (miror) ; ou Nukva 7eme = bechinat mispar AB
#   - Bloc R : Variante Nukva = 28 letters comme Bina ; Malkhut ZON = mispar ChB ; TZARIKH IYUN
#   - Bloc S : Mapping global Imma d'Abba=AHYH-yodin ; YISSO=SaG ; Tevunah=AHYH-yodin
#   - Bloc T : Mapping ZON — Z"A=MaH-alefin ; Nukva=BaN-hehin (variante : Leah/Yaakov/Rachel)
#   - Bloc U : Reprise — A"O=AB+AHYH-yodin ; YISSO+Tevunah=SaG+AHYH-yodin ; §2 N"L variante "AD"
#
# Source Sefaria : Sefer_Etz_Chaim.14.5 (2 sections, 2803 chars)
# IDs : EC-H4S14-116 → EC-H4S14-136

