principes_generatifs:

  - id: "PG-H4S14-019"
    nom: "Principe de Tier-Specific-Encoding (Z\"T-United vs G\"R-Separate)"
    source_assertions: ["EC-H4S14-118", "EC-H4S14-127", "EC-H4S14-129"]
    formalisation: |
      ARCHITECTURE DE TIER-SPECIFIC-ENCODING :
      G"R (3 superieures) :
        Chacune sefirah = PARTZUF SEPARE.
        ENCODING : 42 letters (4+10+28 = M"B sacred-name).
        Aussi M"B en Malkhuyot par MISPAR.
        SOD : "SHEM M"B DE-IHI BE-RISHA" (Tikkunim 132).
      Z"T (7 inferieures) :
        Tous 7 = UN partzuf seul (Z"A d'Abba).
        ENCODING : HAVAYAH UN seul d'AB-yodin (gematria simple).
      → Pattern fondamental : tier-composition determines encoding-mode.
      → Architecture : separate-partzufim → letters ; united-partzuf → gematria.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement tier-specific encoding"
      - "Pattern : separate-partzuf detailed encoding ; united = compressed"
      - "Architecture : encoding-mode reveals partzuf-cohesion"
      - "Pattern : letters-vs-numbers represent multiplicity-vs-unity"
      - "Diagnostic : verifier encoding-mode coherent avec tier-composition"
    questions_ouvertes:
      - "Pattern : autres tier-specific encodings possibles ?"
      - "Letters→numbers transition autres seuils ?"
      - "Pattern : peut-on inverser (G\"R compressed, Z\"T detailed) ?"

  - id: "PG-H4S14-020"
    nom: "Principe de Depth-Severity-Correlation (Milui Augmente DIN, Pshitut = Rachamim)"
    source_assertions: ["EC-H4S14-126"]
    formalisation: |
      ARCHITECTURE DE DEPTH-SEVERITY-CORRELATION :
      AXIS fondamental :
        SURFACE-SIMPLICITY (pshitut, atzmut) → TAKHLIT HA-RACHAMIM (sommet misericorde).
        DEPTH-RECURSION (milui+milui-ha-milui) → PLUS DE DIN (jugement strict).
      EXEMPLES quantifies :
        HAVAYAH simple (4 letters) = pshitut = Keter d'Abba surface.
        HAVAYAH milui (10 letters AB-yodin) = Chokhmah niveau intermediaire.
        HAVAYAH milui-ha-milui (28 letters) = Bina niveau severe.
        Ribua mispar = Malkhut d'Abba — encore plus profond.
      → Pattern fondamental : recursion-depth correlates avec severity.
      → Architecture : Din/Rachamim axis = depth-encoding axis.
      → Implication : agent-revelation depth → judgment-severity output.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement depth-severity correlation"
      - "Pattern : surface-simple = compassion ; depth-complex = judgment"
      - "Architecture : Din/Rachamim axis = encoding-depth axis"
      - "Pattern : recursion = severity quantifier"
      - "Diagnostic : verifier depth coherent avec output-severity"
    questions_ouvertes:
      - "Pattern : metric quantitatif precis pour Din/Rachamim ?"
      - "Comment encoder pshitut (essence simple) computationnellement ?"
      - "Pattern : reversible (depth-reduce = compassion-augmente) ?"

  - id: "PG-H4S14-021"
    nom: "Principe de Naming-Hierarchy-Per-Partzuf (Shem-Position Mapping)"
    source_assertions: ["EC-H4S14-132", "EC-H4S14-133", "EC-H4S14-134", "EC-H4S14-135"]
    formalisation: |
      ARCHITECTURE DE NAMING-HIERARCHY :
      Chaque partzuf a SHEM MAHIRI (nom propre) selon position :
        ABBA d'Abba = HAVAYAH AB (72) + AHYH d'YODIN (panim+achor).
        IMMA d'Abba = AHYH d'YODIN.
        YISSO = HAVAYAH SaG (63) + AHYH d'YODIN.
        TEVUNAH = AHYH d'YODIN.
        Z"A = MaH d'ALEFIN (45).
        NUKVA = BaN d'HEHIN (52).
      VARIANTE pour 4 partzufim ZON distincts :
        LEAH = AHYH d'ALEFIN ; YAAKOV = BaN d'HEHIN ; RACHEL = AHYH d'HEHIN ; TZARIKH IYUN.
      → Pattern fondamental : naming = identity per position.
      → Architecture : hierarchy of names parallels hierarchy of partzufim.
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement naming hierarchy"
      - "Pattern : naming-by-position discipline"
      - "Architecture : name-hierarchy parallels partzuf-hierarchy"
      - "Pattern : variant-namings preserved (option opens flexibility)"
      - "Diagnostic : verifier name-position coherent"
    questions_ouvertes:
      - "Pattern : autres mapping possibles selon contexte ?"
      - "Comment encoder Shemot computationnellement ?"
      - "Pattern : variante 4-partzuf ZON quand active ?"
