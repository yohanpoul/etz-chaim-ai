      relevance: "Architecture : ZON shemot distinct. Pattern Z=MaH N=BaN consistant."

  - id: "EC-H4S14-134"
    source_he: "או אפשר כי הז\"א הוא שם מ\"ה דאלפין ובנוקבא לאה אהי\"ה דאלפין ע\"ד הנ\"ל וביעקב שם ב\"n דההי\"ן על דרך הנ\"ל וברחל שם אהי\"ה דההי\"ן ע\"ד הנ\"ל וצ\"ע"
    source_ref: "Heikhal 4, Sha'ar 1:5"
    assertion: |
      VARIANTE Mapping ZON 4 partzufim distincts :
      → Z"A = MaH d'ALEFIN.
      → LEAH = AHYH d'ALEFIN.
      → YAAKOV = BaN d'HEHIN.
      → RACHEL = AHYH d'HEHIN.
      → TZARIKH IYUN.
      → Architecture : 4-partzuf distinct mapping (Z"A+Leah+Yaakov+Rachel).
      → Pattern : symmetrie zachar/nekevah par milui-type.
    type: axiome_explicite
    concepts:
