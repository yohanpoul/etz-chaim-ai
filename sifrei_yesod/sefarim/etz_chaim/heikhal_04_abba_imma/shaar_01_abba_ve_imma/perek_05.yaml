      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : pedagogical bookend. Pattern closing summary."

  - id: "EC-H4S14-136"
    source_he: "נל\"ח שצ\"ל ע\"ד וכן איתא לקמן בפ\"ז"
    source_ref: "Heikhal 4, Sha'ar 1:5 §2"
    assertion: |
      §2 NIL'AD CHANUKAH (variante editoriale) :
      → SHE-TZARIKH LOMAR (qu'il faut lire) "AD" (au lieu d'autre chose).
