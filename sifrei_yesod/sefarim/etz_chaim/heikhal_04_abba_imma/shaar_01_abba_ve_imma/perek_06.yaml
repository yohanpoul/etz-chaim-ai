# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 6 — Drush RAFA"H NITZOTZIN. Imma=VaV-DaLeT milui YoD. 6 rishonot=60(AYIN)=IMMA STIMA'AH ;
#            4 D"T=MEM SETUMAH (Malkhut). Achor higher → panim lower. AHYH penimiyut, ELOKIM
#            chitzoniyut. He-rishonah=TEVUNAH (dalet-sur-vav). TZELEM (mem-lamed-tzadi) tevunah
#            dans Z"A. BUKHU temura AHYH eclaire 120 ELOKIM (4×30=TNHY). 5×86+22=452=TEVUNAH.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_06 :
#   - Bloc A : Renvoi drush RAFA"H (288) NITZOTZIN ; A"O panim+achor 2 bechinot
#   - Bloc B : Bechinot 1 = panim+achor 9S elyonot ; Bechinot 2 = Malkhut panim+achor
#   - Bloc C : Imma 10S ; 9S rishonot panim+achor occupent toute koma
#   - Bloc D : Malkhut Imma commence chazeh-down ; seulement 6 rishonot manifestes
#   - Bloc E : Imma = vav-dalet milui yod (sod HA-BIN BE-CHOKHMAH)
#   - Bloc F : 6 rishonot kelul 10 = 60 (AYIN) = IMMA STIMA'AH
#   - Bloc G : 4 D"T revetent Malkhut Imma → mochin Tevunah ; 4 D"T = MEM SETUMAH
#   - Bloc H : Vav (6) a tete (10S) ; Dalet Malkhut nommee D selon 4 D"T s'y revetants
#   - Bloc I : PRINCIPE — achor higher devient panim lower (recursive transfer)
#   - Bloc J : Achor ChB Malkhut Imma (AHYH) = 544+2156 ; Achor Keter Malkhut = 44 (total ChB achor)
#   - Bloc K : Ces achor deviennent panim Tevunah elle-meme (pas Malkhut Tevunah)
#   - Bloc L : AHYH = penimiyut ; ELOKIM = chitzoniyut ; chacun 4 bechinot panim/achor
#   - Bloc M : AHYH letters/ribuim ; Malkhut = chesbon (mispar)
#   - Bloc N : He-rishona HAVAYAH = TEVUNAH ; tzura dalet-sur-vav (ה composee D+V)
#   - Bloc O : TZELEM Z"A (mem-lamed-tzadi) — Tevunah pieces 3-3-3 sefirot dans Z"A
#   - Bloc P : Mem = 3 sup ; Lamed = 3 milieu ; Tzadi = 3 inf
#   - Bloc Q : Bina+Tevunah ensemble : He-rishona monte vav-dalet (autre He), achor pour elle
#   - Bloc R : Mochin penimim quand monte ; makifim (dalet+vav separes, sans tete) quand descend (ROVETZET)
#   - Bloc S : Split Bina+Tevunah : achor Malkhut Bina = panim Tevunah (D"R+V"K)
#   - Bloc T : ELOKIM chitzoniyut Bina = BUKHU (=22) temura AHYH ; eclaire 120 tzeirufim
#   - Bloc U : 120/4 = 30 Lamed each → TNHY chazeh-down (T 30, N 30, H 30, Y 30) ; "kav ha-midah" = D"L (4×L)
#   - Bloc V : Achor ELOKIM Malkhut Bina descendent → panim Tevunah (parallele AHYH)
#   - Bloc W : Tevunah 9S+Malkhut ; ELOKIM achor manifestes Z"T+GEVURAH (Tevunah inf, dinim revelees)
#   - Bloc X : 120 ELOKIM splittees en 5 letters × 24 = 5 noms ELOKIM ; 5×86+22=452=TEVUNAH gematria
#
# Source Sefaria : Sefer_Etz_Chaim.14.6 (1 section, 5387 chars)
