    source_he: "אז אלו הק\"ך צרופי דאלקים נחלקים בה לה' חלקים נגד ה' אותיות אלקים ונחלקין כ\"ד בכל ספי' מהם כ\"ד המתחלת בא' וכ\"ד המתחילין בל' כו' וכל הכ\"ד מהם הוא שם אלקים א' הרי ה' אלקים והם ת\"ל ועם בוכ\"ו המאיר בהם הרי גימטריא תבונה עם הכולל"
    source_ref: "Heikhal 4, Sha'ar 1:6"
