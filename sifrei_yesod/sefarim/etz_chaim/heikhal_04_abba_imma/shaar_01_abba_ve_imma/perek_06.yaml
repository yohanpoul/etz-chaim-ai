    source_he: "במלכות של בינה הנקרא ד' של הבינה להיותה עומדת בד\"ת דבינה שם בחיצוניות הם שמות ק\"ך צרופים אלקים כנ\"ל ואז מתפשטת בהם הארת בוכ\"ו כנ\"ל ונחלקים לד' בחי' ג\"כ והם ל' צרופים בת\"ת ל' בנצח ל' בהוד ל' ביסוד והם מהחזה דבינה ולמטה שהם תנה\"i"
