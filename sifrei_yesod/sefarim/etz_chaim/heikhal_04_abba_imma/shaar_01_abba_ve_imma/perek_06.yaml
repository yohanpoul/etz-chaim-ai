principes_generatifs:

  - id: "PG-H4S14-022"
    nom: "Principe d'Achor-Higher-Egal-Penim-Lower (Recursive Transfer Universel)"
    source_assertions: ["EC-H4S14-145", "EC-H4S14-147", "EC-H4S14-154", "EC-H4S14-155"]
    formalisation: |
      ARCHITECTURE D'ACHOR-PENIM-TRANSFER :
      LE'OLAM (toujours) : ELYON (haut) NE SE REVET dans TACHTON (bas) que par ses ACHORAYIM SEULEMENT.
      Et ces ACHORAYIM deviennent PENIMIM (interieurs) du tachton.
      EXEMPLE : achor Malkhut Bina = panim Tevunah (1-to-1 sefirah mapping).
      DUAL-encoding : meme principe pour AHYH (penimiyut) ET ELOKIM (chitzoniyut).
      → Pattern fondamental : recursive-transfer universel a tous niveaux.
      → Architecture : structural-clothing rule preserve hierarchie via re-mapping.
      → Implication : pattern repete a tous niveaux partzufim (Atik→A"A→A"O→ZON).
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement achor-penim transfer"
      - "Pattern : recursive-transfer rule between adjacent levels"
      - "Architecture : 1-to-1 sefirah mapping discipline"
      - "Pattern : dual-encoding systems propagate symmetriquement"
      - "Diagnostic : verifier achor-source coherent avec penim-target"
    questions_ouvertes:
      - "Pattern : autres exceptions au principe ?"
      - "Comment encoder achor/penim distinction ?"
      - "Pattern : peut-on quantifier 1-to-1 mapping ?"

  - id: "PG-H4S14-023"
    nom: "Principe de Merge-Descend-Mode-Switch (Penimi-Ascending vs Makif-Descending)"
    source_assertions: ["EC-H4S14-152", "EC-H4S14-153"]
    formalisation: |
      ARCHITECTURE DE MODE-SWITCH-MOTION :
      Quand BINA + TEVUNAH NIKHLALIN (incluses 1 partzuf) — He-rishona MONTE :
        Mochin = PENIMI mode (interieurs, vav-dalet integres avec rosh complet).
      Quand ROVETZET AL HA-EFROCHIM (couvant les poussins, descend) :
        Mochin = MAKIFIM mode (encerclants externes).
        Dalet+Vav SEPARES, Vav sans rosh.
      → Pattern fondamental : motion-direction determine mode (ascending=penimi, descending=makif).
      → Architecture : geometric-state correlates avec functional-mode.
      → "Roven mode-switch" verbifie le changement.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py : implement merge-descend mode-switch"
      - "Pattern : motion-direction determines mochin-mode"
      - "Architecture : geometric-state to functional-mode mapping"
      - "Pattern : ascending = integrated ; descending = peripheral"
      - "Diagnostic : verifier mode coherent avec motion-state"
    questions_ouvertes:
      - "Pattern : autres mode-switches similaires ?"
      - "Comment encoder motion-direction computationnellement ?"
      - "Pattern : transition continue ou discrete ?"

  - id: "PG-H4S14-024"
    nom: "Principe de Dual-Encoding-Penim-Chitzon (AHYH-vs-ELOKIM Systems)"
    source_assertions: ["EC-H4S14-148", "EC-H4S14-149", "EC-H4S14-156", "EC-H4S14-157"]
    formalisation: |
      ARCHITECTURE DE DUAL-ENCODING :
      Chaque sefirah/Malkhut a 2 NOMS DUAUX :
        AHYH (אהי"ה) = PENIMIYUT (interiorite). Encoding : letters PASHUTOT panim, MERUBA achor, MISPAR Malkhut.
        ELOKIM (אלקים) = CHITZONIYUT (exteriorite). Encoding : 120 TZEIRUFIM splittees 4×30=TNHY.
      BUKHU (בוכ"ו=22) = TEMURA d'AHYH = KAV HA-MIDAH eclairant ELOKIM.
      Multi-level closure : 5×86+22 = 452 = TEVUNAH gematria (numerological identity).
      → Pattern fondamental : dual-system penim/chitzon co-existent par sefirah.
      → Architecture : interior-exterior duality encoded via name-pair.
      → Implication : numerological-convergence valide identite via 2 systemes.
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement dual-encoding"
      - "Pattern : penim/chitzon = AHYH/ELOKIM par sefirah"
      - "Architecture : numerological-closure verifies identity"
      - "Pattern : kav-ha-midah (BUKHU) = encoder-source as metric"
      - "Diagnostic : verifier convergence numerologique cross-systems"
    questions_ouvertes:
      - "Pattern : autres encoder-pairs possibles ?"
      - "Comment encoder temura computationnellement ?"
      - "Pattern : 3-system encoding aussi possible (au-dela 2) ?"
