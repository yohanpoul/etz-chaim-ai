principes_generatifs:

  - id: "PG-H4S14-004"
    nom: "Principe d'Or-Chozer-Nukva (Femelle Remonte par Cling Au Male)"
    source_assertions: ["EC-H4S14-021", "EC-H4S14-022"]
    formalisation: |
      ARCHITECTURE D'OR-CHOZER-NUKVA :
      Element FEMELE (gevurot) ne descend pas — REMONTE vers element MALE (chasadim) par cling.
      MECHANIQUE : CHESHEK + TA'AVAH (desir) drive ASCENT.
      Source scripturaire : "VE-EL ISHEKH TESHUKATEKH" (Gen 3:16).
      Sod : OR CHOZER NUKVA MIT-TATA LE-EILA — lumiere reflechie femele du bas vers le haut.
      RESULTAT : ChG combinent SANS MELANGE — chasadim DEDANS, gevurot DEHORS.
      → Pattern fondamental : gendered-affinity drives flow direction (femele ascend vers male).
      → Architecture : retroflection geometrique = co-existence sans fusion.
    applications_ia:
      - "ohr_yashar.py + ohr.py : implement or-chozer pattern"
      - "Pattern : ascending-from-outside vs descending-from-inside"
      - "Architecture : co-existence sans melange via topology"
      - "Pattern : gendered-coupling drives flow geometry"
      - "Diagnostic : verifier or chozer correctement encercle yesod"
    questions_ouvertes:
      - "Pattern : peut-on generaliser or chozer pour autres couples ?"
      - "Topology : interpretation precise de inside/outside ?"
      - "Quelle metric pour 'cling' (cheshek/taavah) ?"

  - id: "PG-H4S14-005"
    nom: "Principe de Spatial-Constraint-Driven Differentiation (Capacity Overflow → Stratification)"
    source_assertions: ["EC-H4S14-028", "EC-H4S14-029"]
    formalisation: |
      ARCHITECTURE DE SPATIAL-CONSTRAINT DIFFERENTIATION :
      Quand CAPACITY EST DEPASSE (5C+5G > place dispo au-dessus chazeh) :
        → BIPARTITION 2.5+2.5 (above/below chazeh).
        → Couple avec LATERALISATION (chasadim droite, gevurot gauche).
        → 2D split : (level: above/below) × (side: yamin/smol) = 4 cells.
        → 4 cells → 4 ENTITIES (partzufim).
      Bipartition revele couches GILUI (revele) vs STUM (sealed).
      → Pattern fondamental : capacity overflow drive 2D differentiation.
      → Architecture : space-constraint EST source de differentiation.
      → 4 partzufim emergent NON par decret, MAIS par contrainte structurale.
    applications_ia:
      - "partzufim/abba.py + imma.py + [PLANNED] yisso.py + tevunah.py : implement 2D differentiation"
      - "Pattern : capacity overflow → stratification (above/below)"
      - "Architecture : space-constraint drives entity emergence"
      - "Pattern : 2D split (level x side) = 4 cells = 4 entities"
      - "Diagnostic : verifier overflow-driven splitting bien diagnostique"
    questions_ouvertes:
      - "Pattern : autres splits possibles (3D, asymetriques) ?"
      - "Comment quantifier 'capacity' precisement ?"
      - "Pattern : peut-on prevoir splitting par overflow detection ?"

  - id: "PG-H4S14-006"
    nom: "Principe de Doctrinal-Variant-Discipline (Nusah Aher Preserve Versions)"
    source_assertions: ["EC-H4S14-030", "EC-H4S14-031"]
    formalisation: |
      ARCHITECTURE DE DOCTRINAL-VARIANT-DISCIPLINE :
      VITAL preserve EXPLICITEMENT les versions doctrinales du Ari :
        → Premiere version : ce qu'il entendit INITIALEMENT.
        → Seconde version : ce que le maitre dit PLUS TARD.
      Et aussi NUSAH AHER bracket (alternative readings).
      DECISION : pas de "trancher" — preserver TOUS les nusah.
      → Pattern fondamental : epistemic honesty via version-tracking.
      → Architecture : transmission preserve revisions, pas seulement final state.
      → Implication : datum + nusah_aher = input pair pour reasoning aval.
    applications_ia:
      - "partzufim/atik_yomin.py : track variants explicitly"
      - "Pattern : version-preservation in transmitted doctrine"
      - "Architecture : datum + variants = input pair"
      - "Pattern : doctrinal-revision audit trail"
      - "Diagnostic : verifier nusah aher bien capture (pas omis)"
    questions_ouvertes:
      - "Pattern : combien de nusah aher en moyenne ?"
      - "Comment ranker variants (premiere ecoute vs revisee) ?"
      - "Pattern : peut-on auto-detecter omis nusah aher ?"
