# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 1b — Mecanisme Yesod Atik dechura. Gevurot first, chasadim push,
#             or chozer mi-tata le-eila. 5C+5G split → 4 partzufim
#             (Abba/Imma/YISSO/Tevunah). Nusah aher : 2.5C satum yesod Atik.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_01b :
#   - Bloc P : ChG yesod Atik magnetisent orot+kelim A"O → partzufim
#   - Bloc Q : Yesod Atik = dechura (male) — narrow + long, no place for ChG
#   - Bloc R : Gevurot entrent first (atara Gevurah dans 4eme mocha tachton)
#   - Bloc S : Chasadim arrive, push gevurot dehors via peh yesod → gufa A"A
#   - Bloc T : Gevurot ne descendent pas — cling chasadim ("el ishekh teshukatekh")
#   - Bloc U : Or chozer — gevurot remontent autour yesod Atik (nukva mi-tata le-eila)
#   - Bloc V : ChG combinent : chasadim dedans, gevurot dehors ; au-dessus chazeh A"A
#   - Bloc W : Q-A : Z"A separe (gevurot descendent yesod Z"A opposite Da'at nukva) vs A"A joined
#   - Bloc X : Aussi — chasadim de MaH d'Atik, gevurot de BaN d'Atik ; MaH+BaN bound
#   - Bloc Y : Chasadim sortent peh, manifestent A"A ; trouvent gevurot encerclant yesod (2.5+2.5)
#   - Bloc Z : Chasadim droite (MaH cote) push gevurot gauche ; pas place 5C+5G au-dessus chazeh
#   - Bloc AA: 2.5G+2.5G repartis (upper above chazeh / lower below) sur ligne gauche ; idem 2.5C+2.5C droite
#   - Bloc BB: 4 domains → 4 partzufim Abba/Imma/YISSO/Tevunah
#   - Bloc CC: NUSAH AHER — Mori dit later autrement
#   - Bloc DD: Variant : 2.5C SATUM yesod Atik, 2.5C GILUI descend ; 5G GILUI external (sous-variante : 2.5G satum + 2.5G gilui)
#
# Source Sefaria : Sefer_Etz_Chaim.14.1 (suite §3)
# IDs : EC-H4S14-017 → EC-H4S14-031

meta:
  sefer: etz_chaim
  heikhal: 4
  shaar: 1
  shaar_name_he: "שער אבא ואמא"
  perek: 1
  part: "b"
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Mecanisme detaille emergence des 4 partzufim A\"O+YISSO\"T. Yesod Atik = dechura (male) narrow+long, no place pour ChG dedans. Gevurot entrent first (atara Gevurah dans 4eme mocha tachton). Chasadim arrivent, pushent gevurot dehors via peh d'yesod. Gevurot remontent autour yesod (or chozer, nukva mi-tata le-eila — pas de descente car cling chasadim, sod 'el ishekh teshukatekh'). ChG combine : chasadim dedans, gevurot dehors, tous au-dessus chazeh A\"A. Q-A : Z\"A vs A\"A — separe vs joined. Chasadim de MaH d'Atik, gevurot de BaN d'Atik, bound. Final : 5C+5G splitent en 2.5+2.5 chacun → 4 partzufim (Abba CH-up-right, Imma G-up-left, YISSO CH-down-right, Tevunah G-down-left). NUSAH AHER : 2.5C satum yesod Atik, 2.5C gilui descend ; 5G gilui external left."

# ═══════════════════════════════════════════════════════════════════
