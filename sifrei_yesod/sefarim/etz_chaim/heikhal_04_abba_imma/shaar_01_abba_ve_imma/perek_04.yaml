assertions:

  - id: "EC-H4S14-095"
    source_he: "נסתפק לי ענין או\"א שכל אחד מהם לוקח מ\"ה וב\"ן ואח\"כ נתחלקו לד' פרצופים"
    source_ref: "Heikhal 4, Sha'ar 1:4 §1"
    assertion: |
      NISTAPEK LI (j'ai un doute) — VITAL :
      → A"O chacun PREND MaH + BaN.
      → APRES : se DIVISENT en 4 PARTZUFIM.
      → Doute : COMMENT precisement la distribution se fait ?
      → Architecture : explicit-doctrinal-uncertainty marker.
      → Pattern : Vital tracks ses propres incertitudes en corpus.
    type: axiome_explicite
    concepts:
      - {id: nistapek_vital_4_partzufim_distribution, role: nistapek_vital_doute_doctrinal_4_partzufim_distribution_mah_ban}
    mapping:
