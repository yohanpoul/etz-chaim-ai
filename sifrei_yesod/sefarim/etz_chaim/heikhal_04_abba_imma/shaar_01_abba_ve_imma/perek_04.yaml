# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 4 — NISTAPEK Vital sur 4 partzufim distribution. Kontras d'A"K
#            distribution chiffree MaH/BaN. Hevel yesod Atik → 2 rosh A"O.
#            A"O CHELAKIM (sans se'arot). Mochin ZON. "Borei shamayim ve-notehem".
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_04 :
#   - Bloc A (§1) : NISTAPEK Vital sur 4 partzufim distribution
#   - Bloc B (§1) : LECTURE A — Abba+YISSO=MaH+BaN d'Abba ; Bina+Tevunah=MaH+BaN d'Imma
#   - Bloc C (§1) : LECTURE B — MaH+BaN d'MaH=A"O ; MaH+BaN d'BaN=YISSO+Tevunah (HA-BIN BE-CHOKHMAH)
#   - Bloc D (§1) : LECTURE B confirme — zacharim toujours MaH, nekevot BaN ; zivvug=tikkun BaN via MaH ; TZARIKH IYUN
#   - Bloc E (§2) : Kontras d'A"K — A"O Bina dMaH, Abba Z"T Chokhmah dBaN, Imma V"T Bina dBaN
#   - Bloc F (§2) : Z"A 6S dMaH + 6S dBaN (sauf KETARIM dBaN)
#   - Bloc G (§2) : Nukva Malkhut dMaH + Malkhut dBaN (sauf KETER dBaN)
#   - Bloc H (§2) : ZN nifradim car chacun a MaH+BaN — autonomes
#   - Bloc I (§2) : Atik+A"A : Z+N pas separes — un seul partzuf
#   - Bloc J (§2) : Atik raison — Zachar=KETER MaH seul ; Nukva=H-rishonot KETER BaN + G"R Chokhmah BaN + D"R Bina BaN + 7 ketarim Z"T BaN
#   - Bloc K (§2) : Imma+Nukva Z"A separables — partzuf=MaH+BaN ; appellees NUKVIM MAMASH partzufim gemurim
#   - Bloc L (§2) : A"A : zachar=Chokhmah MaH seul ; nukva=HE-TACHTONAH KETER BaN seul
#   - Bloc M (§2) : Note Atik : G"R Chokhmah BaN + D"R Bina BaN — doute panim+achor ou achor seul
#   - Bloc N (§3) : M"K — yesod Atik (var A"A) emet HEVEL → 2 ROSH d'A"O
#   - Bloc O (§3) : Rosh A"O atteignent DIKNA A"A ; BE-MAZALA ITKLILIN
#   - Bloc P (§3) : Donc orot A"O pas besoin or chozer mi-mata le-maala via se'arot — vs G"R A"A
#   - Bloc Q (§3) : Kavanatam — donner MOCHIN aux enfants ZON ; cheshek+ahavah
#   - Bloc R (§3) : Sod "Ve-shamayim lo zaku be-einav" (Iyov 15:15) — A"O voient Z"A toujours imperfect
#   - Bloc S (§3) : Donnent ATAROT ; sod "Borei shamayim ve-notehem" (Yeshayahu 42:5)
#   - Bloc T (§3) : Or ascendant descend → mochin ZON ; A"O CHELAKIM (lisses) sans se'arot
#   - Bloc U (§3) : SE'AROT=takhlit OR MAKIF ; ITKLILIN MAZAL MAKIF → pas besoin ; "Ve-achar ori nikfu zot" (Iyov 19:26)
#
# Source Sefaria : Sefer_Etz_Chaim.14.4 (3 sections, 2403 chars)
