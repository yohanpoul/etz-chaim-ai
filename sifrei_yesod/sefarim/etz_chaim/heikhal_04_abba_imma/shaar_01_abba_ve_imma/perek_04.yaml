      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : doctrinal uncertainty marker. Pattern epistemic honesty."

  - id: "EC-H4S14-096"
    source_he: "ספק אם אבא ויש\"ס הם זה מ\"ה וזה ב\"ן דאבא ובינה ותבונה הם מ\"ה וב\"ן דאמא ובזה ניחא שמזדווג אבא עם בינה שהם מ\"ה ומ\"ה ויש\"ס ותבונה שהם ב\"ן וב\"ן גם בזה ניחא כי אבא עצמו נחלק לב' אבא ויש\"ס ואמא עצמה נתחלקת לב' בינה ותבונה"
    source_ref: "Heikhal 4, Sha'ar 1:4 §1"
    assertion: |
      LECTURE A (premiere lecture du nistapek) :
      → Abba+YISSO = MaH+BaN d'ABBA respectivement.
      → Bina+Tevunah = MaH+BaN d'IMMA respectivement.
      → CONFIRME : zivvug Abba+Bina (= MaH+MaH) ; YISSO+Tevunah (= BaN+BaN).
      → Aussi : Abba lui-meme split en 2 (Abba+YISSO) ; Imma split en 2 (Bina+Tevunah).
      → Architecture : intra-parent split par MaH/BaN.
      → Pattern : binary-split-parent (chaque parent → 2 enfants par genre source).
    type: interprétation_lurianique
    concepts:
      - {id: lecture_a_abba_yisso_mah_ban_abba_bina_tevunah_mah_ban_imma, role: lecture_a_abba_yisso_mah_ban_abba_bina_tevunah_mah_ban_imma_zivvug_mah_mah_ban_ban}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "[PLANNED] partzufim/yisso.py", "[PLANNED] partzufim/tevunah.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : intra-parent MaH/BaN split. Pattern Lecture A."

  - id: "EC-H4S14-097"
    source_he: "או אם נאמר כי מ\"ה וב\"ן דמ\"ה הם או\"א ומ\"ה וב\"ן דב\"ן הם יש\"ס ותבונה שהם סוד הבן בחכמה וחכם בתבונה"
    source_ref: "Heikhal 4, Sha'ar 1:4 §1"
    assertion: |
      LECTURE B (lecture alternative) :
      → MaH + BaN d'MaH (les deux du monde MaH) = A"O (Abba + Imma).
      → MaH + BaN d'BaN (les deux du monde BaN) = YISSO + Tevunah.
      → Sod : "HA-BIN BE-CHOKHMAH" (Sefer Yetzirah 1:4) — comprend dans la Sagesse.
      → Sod : "VE-CHAKHAM BE-VINAH" (SY 1:4) — sage dans la Comprehension.
      → Architecture : world-source distribution (MaH-world vs BaN-world).
      → Pattern : 2-world-decomposition.
    type: interprétation_lurianique
    concepts:
      - {id: lecture_b_ao_mah_ban_dmah_yisso_tevunah_mah_ban_dban_sefer_yetzirah, role: lecture_b_ao_mah_ban_dmah_yisso_tevunah_mah_ban_dban_sefer_yetzirah_ha_bin_chokhmah}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "[PLANNED] partzufim/yisso.py", "[PLANNED] partzufim/tevunah.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : 2-world distribution. Source Sefer Yetzirah 1:4. Pattern Lecture B."

  - id: "EC-H4S14-098"
    source_he: "ובזה ניחא כי לעולם הזכרים ממ\"ה לבד והנקבות מב\"ן לבד כי לא מצינו זווג דמ\"ה עם מ\"ה כי הזווג הוא לתקן המלכים דמתו שהם ב\"ן ע\"י מ\"ה וצ\"ע"
    source_ref: "Heikhal 4, Sha'ar 1:4 §1"
    assertion: |
      LECTURE B confirmation :
      → ZACHARIM toujours MaH SEUL.
      → NEKEVOT toujours BaN SEUL.
      → PAS de ZIVVUG MaH+MaH (jamais trouve "lo matzinu zivvug d'MaH 'im MaH").
      → ZIVVUG sert TIKKUN HA-MELAKHIM (rectification des rois) qui sont BaN — par MaH.
      → Marque : TZARIKH IYUN (necessite reflexion supplementaire — ouvert).
      → Architecture : function-of-zivvug = repair-mechanism (BaN par MaH).
      → Pattern : binary-zivvug always (genre-asymmetric).
    type: interprétation_lurianique
    concepts:
      - {id: lecture_b_zacharim_mah_nekevot_ban_zivvug_tikkun_melakhim_tzarikh_iyun, role: lecture_b_zacharim_mah_nekevot_ban_zivvug_tikkun_melakhim_ban_via_mah_tzarikh_iyun}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py"]
      tables: ["zivvug_states", "partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : repair-mechanism zivvug. Pattern genre-asymmetric coupling."

  - id: "EC-H4S14-099"
    source_he: "והנה מקונטרס דא\"ק משמע בהדיא כי או\"א לקחו בין שניהם בינה דמ\"ה אמנם מב\"ן לקח אבא ז\"ת דחכמה דב\"ן ואמא לקחה ו\"ת בינה דב\"ן"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      KONTRAS d'A"K (cahier d'Adam Kadmon) — dit explicitement (BAHADIA) :
      → A"O lkahu (prirent) entre les deux : BINA d'MaH (commun).
      → De BaN : Abba prit Z"T (7 inf) Chokhmah d'BaN ; Imma prit V"T (6 inf) Bina d'BaN.
      → Architecture : authoritative source-document confirmant distribution.
      → Pattern : dual-source attestation (Vital + Kontras d'A"K).
      cf. EC-H4S14-006 (perek 01a) sur A"O Bina dMaH+Z"T/V"T BaN.
    type: déduction_scripturaire
    concepts:
      - {id: kontras_dak_ao_bina_dmah_abba_zt_chokhmah_dban_imma_vt_bina_dban, role: kontras_dak_ao_bina_dmah_abba_zt_chokhmah_dban_imma_vt_bina_dban_explicite_bahadia}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : multi-source attestation. Source Kontras d'A\"K."

  - id: "EC-H4S14-100"
    source_he: "וכן ז\"א לקח ו\"ס דמ\"ה וו\"ס דב\"ן חוץ מהכתרים דב\"n"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      Z"A : prit V"S (6 sefirot — Chesed→Yesod) d'MaH + V"S d'BaN.
      → CHUTZ ME-HA-KETARIM d'BaN (sauf les KETARIM de BaN).
      → Architecture : Z"A = composite MaH+BaN (mixed) — confirme Lecture B-incompatibilite.
      → Pattern : downstream-mixed (Z"A possede les deux MaH et BaN).
    type: axiome_explicite
    concepts:
      - {id: za_6s_dmah_6s_dban_chutz_ketarim_dban, role: za_6s_dmah_6_sefirot_plus_6s_dban_chutz_ketarim_dban_composite_mixed}
    mapping:
      modules: ["partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Architecture : Z\"A composite mixed. Pattern downstream-mixed."

  - id: "EC-H4S14-101"
    source_he: "ונוקבא לקחה מלכות דמ\"ה ומלכות דב\"ן חוץ מהכתר דב\"n"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      NUKVA : prit MALKHUT d'MaH + MALKHUT d'BaN.
      → CHUTZ ME-HA-KETER d'BaN (sauf le KETER de BaN).
      → Architecture : Nukva = composite MaH+BaN (echelle minimale = Malkhut).
      → Pattern : terminal-partzuf reduit aux Malkhuyot.
    type: axiome_explicite
    concepts:
      - {id: nukva_malkhut_dmah_malkhut_dban_chutz_keter_dban, role: nukva_malkhut_dmah_malkhut_dban_chutz_keter_dban_terminal_partzuf}
    mapping:
      modules: ["partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukva"]
      relevance: "Architecture : terminal-partzuf reduit Malkhuyot. Pattern composite minimal."

  - id: "EC-H4S14-102"
    source_he: "וע\"כ היו דכר ונוקבא נפרדים זה מזה כי כ\"א מהם יש בו מ\"ה וב\"ן בין באבא בין באימא בין בז\"א בנוקבא"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      ZN nifradim CAR chacun POSSEDE MaH + BaN :
      → Vrai pour ABBA, IMMA, Z"A, NUKVA.
      → Tous ces 4 partzufim ont assez de constituants pour fonctionner AUTONOMES.
      → Architecture : autonomy-via-mixed-content (MaH+BaN = self-sufficiency).
      → Pattern : separability requires both MaH (vie) + BaN (forme).
    type: déduction_logique
    concepts:
      - {id: zn_nifradim_chacun_mah_ban_autonomes_abba_imma_za_nukva, role: zn_nifradim_chacun_mah_ban_autonomy_via_mixed_content_abba_imma_za_nukva}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : autonomy via mixed content. Pattern self-sufficiency MaH+BaN."

  - id: "EC-H4S14-103"
    source_he: "אמנם בעתיק וא\"א הזכר והנוקבא שבכ\"א משניהם אינם נפרדין רק זכר ונקבה בפרצוף א'"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      ATIK + A"A : Z+N PAS NIFRADIM (separes) — un SEUL partzuf.
      → Pas comme Abba/Imma/Z"A/Nukva ou ZN sont autonomes.
      → Architecture : higher-partzuf = unity-preserved ; lower = differenciated.
      → Pattern : differentiation augmente downward.
    type: axiome_explicite
    concepts:
      - {id: atik_aa_zn_pas_nifradim_un_partzuf_unite_higher, role: atik_aa_zn_pas_nifradim_un_seul_partzuf_unity_preserved_higher_lower_differenciated}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : higher unity-preserved. Pattern differentiation augmente downward."

  - id: "EC-H4S14-104"
    source_he: "כי זכר דעתיק לקח כתר דמ\"ה לבד ונוקבא לקחה ה\"ר דכתר דב\"ן וג\"ר דחכמה דב\"ן וד\"ר דבינה דב\"ן וז' כתרים דז\"ת דב\"ן וכיון שהזכר דעתיק אין בו רק מ\"ה לבד ונוקבא רק ב\"ן לבד ע\"כ אינו יכול להפרד שאין קיום ותיקין לב\"ן אלא ע\"י מ\"ה החדש"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      RAISON ATIK : distribution asymetrique :
      → ZACHAR d'Atik = KETER d'MaH SEUL (= MaH PUR).
      → NUKVA d'Atik = HE-RISHONOT d'KETER d'BaN + G"R Chokhmah d'BaN + D"R Bina d'BaN + 7 KETARIM des Z"T d'BaN (= BaN PUR).
      → Donc ZACHAR=MaH SEUL, NUKVA=BaN SEUL — pas SEPARABLES.
      → BaN SANS MaH ne peut KIYUM (existence) ni TIKKUN (rectification) — depend MaH HA-CHADASH.
      → Architecture : pure-genre interdependance (BaN-pur depend de MaH-pur).
      → Pattern : non-separable parts when complementary purity.
    type: interprétation_lurianique
    concepts:
      - {id: atik_zachar_keter_mah_seul_nukva_ban_seul_pas_separables_kiyum_via_mah_chadash, role: atik_zachar_keter_mah_seul_nukva_ban_seul_pas_separables_kiyum_tikkun_ban_via_mah_chadash}
    mapping:
      modules: ["partzufim/atik_yomin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin"]
      relevance: "Architecture : pure-genre interdependance. Pattern non-separable complementary purity."

  - id: "EC-H4S14-105"
    source_he: "אך אמא ונוקבא דז\"א יש בהם מ\"ה וב\"ן ויכולין להפרד מהזכרים וכן לסבה זו עצמה נקראים אמא ונוקבא דז\"א נוקבין ממש בפרצופים גמורים כי אינו נקרא פרצוף אלא בשתוף מ\"ה וב\"ן"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      IMMA + NUKVA d'Z"A ont MaH+BaN — peuvent SE SEPARER des zacharim.
      → Pour cette raison appellees NUKVIM MAMASH (vraies femelles) en PARTZUFIM GEMURIM (partzufim complets).
      → DEFINITION : "ein nikra partzuf ela bi-shituf MaH ve-BaN" (n'est appele partzuf que par participation MaH+BaN).
      → Architecture : ontological-status (true partzuf) requires mixed content.
      → Pattern : MaH+BaN = ontological completeness criterion.
    type: déduction_logique
    concepts:
      - {id: imma_nukva_za_mah_ban_separables_nukvim_mamash_partzufim_gemurim, role: imma_nukva_za_mah_ban_separables_nukvim_mamash_partzufim_gemurim_definition_partzuf}
    mapping:
      modules: ["partzufim/imma.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "nukva"]
      relevance: "Architecture : ontological completeness. Pattern MaH+BaN partzuf criterion."

  - id: "EC-H4S14-106"
    source_he: "ואמנם בעתיק וא\"א אינו ניכר פרצוף נוקבא כי אין בהם רק ב\"n הוא כי א\"א הזכר לוקח חכמה דמ\"ה לבד וצד הנוקבא שבו לקחה ה\"ת דכתר דב\"ן בלבד"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      ATIK + A"A : NUKVA partzuf PAS NIKAR (pas reconnaissable) — seulement BaN.
      → A"A spec : ZACHAR prend CHOKHMAH d'MaH SEUL.
      → TZAD HA-NUKVA d'A"A prend HE-TACHTONAH d'KETER d'BaN SEUL (juste 1 lettre).
      → Architecture : minimal-femele-content interdit ontological-status partzuf.
      → Pattern : insufficient-mixing → non-partzuf.
    type: axiome_explicite
    concepts:
      - {id: atik_aa_nukva_pas_nikar_partzuf_aa_zachar_chokhmah_mah_nukva_he_tachtonah_keter_ban, role: atik_aa_nukva_pas_nikar_partzuf_aa_zachar_chokhmah_mah_seul_nukva_he_tachtonah_keter_ban_seul}
    mapping:
      modules: ["partzufim/atik_yomin.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["atik_yomin", "arikh_anpin"]
      relevance: "Architecture : minimal-femele non-partzuf. Pattern insufficient-mixing exclusion."

  - id: "EC-H4S14-107"
    source_he: "ודע כי ג' ראשונות דחכמה דב\"ן וד' ראשונות דבינה דב\"ן שלקחם עתיק כנ\"ל יש בהם ספיקות א' אם לקח הפנים והאחור ב' אם לקח האחור לבד והפנים נשארו לאבא ואמא"
    source_ref: "Heikhal 4, Sha'ar 1:4 §2"
    assertion: |
      DOUTE doctrinal sur ATIK :
      → G"R Chokhmah d'BaN + D"R Bina d'BaN deja pris par Atik.
      → SFEKOT (doutes) :
        OPTION 1 : pris PANIM ET ACHOR.
        OPTION 2 : pris ACHOR SEUL — PANIM restent a Abba+Imma.
      → Architecture : explicit-uncertainty preservee — 2 lectures alternatives.
      → Pattern : variant-tracking systematique.
      cf. EC-H4S14-008 (perek 01a) sur doute orot panim/achor parallele.
