  - id: "EC-H4S14-108"
    source_he: "מ\"ק כבר בארנו כי מן יסוד דעתיק (נ\"א א\"א) יוצא הבל ונחלק ב' ראשים לאו\"א"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      MEM-KOF (matzati komenta — note trouvee) :
      → Du YESOD d'ATIK (variante : A"A) sort HEVEL (souffle, vapeur).
      → Se DIVISE en 2 ROSHIM (tetes) pour A"O.
      → Variante (Nusah Aher) : "A"A" au lieu de "Atik" — ambigu.
      → Architecture : pneumatic-emergence des tetes parents.
      → Pattern : single-breath → bifurcated-heads.
    type: axiome_explicite
    concepts:
      - {id: hevel_yesod_atik_var_aa_2_rosh_ao_pneumatic_emergence, role: hevel_sort_yesod_atik_variante_aa_se_divise_2_roshim_ao_pneumatic_bifurcation}
