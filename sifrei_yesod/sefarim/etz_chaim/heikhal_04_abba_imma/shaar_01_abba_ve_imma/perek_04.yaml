      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : direct-mazal exempts retroflection. Pattern shortcut via higher coupling."

  - id: "EC-H4S14-110"
    source_he: "ואמנם כוונתם לתת מוחין אל בניהם זו\"ן מחמת חשקם ואהבתם אל בניהם בסוד ושמים לא זכו בעיניו כי ז\"א נקרא שמים לא זכו בעיניהם של או\"א"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      KAVANATAM (intention d'A"O) :
      → Donner MOCHIN aux ENFANTS Z"O"N.
      → Cause : CHESHEK + AHAVAH (desir, amour) pour leurs enfants.
      → Sod : "VE-SHAMAYIM LO ZAKU BE-EINAV" (Iyov 15:15 — et les cieux ne sont pas purs a Ses yeux).
      → Z"A = SHAMAYIM (cieux) — pas pur aux YEUX d'A"O.
      → Architecture : parental-perfectionism drives downstream-rectification.
      → Pattern : love-as-discontent-driver.
    type: déduction_scripturaire
    concepts:
      - {id: kavanat_ao_mochin_zon_cheshek_ahavah_iyov_15_15_shamayim_lo_zaku, role: kavanat_ao_donner_mochin_zon_cheshek_ahavah_sod_iyov_15_15_shamayim_lo_zaku_be_einav}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : parental discontent drives rectification. Source Iyov 15:15."

  - id: "EC-H4S14-111"
    source_he: "ותמיד נראה להם שעדיין צריך תיקון יותר ולכן מתקנים אותם תמיד ומנחילין להם עטרות שז\"ס בורא שמים ונוטיהם"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      A"O voient Z"A toujours BESOIN de TIKKUN PLUS (TZARIKH TIKKUN YOTER).
      → Donc TIKKUN TAMID (rectifient toujours).
      → MANCHILIN ATAROT (font heriter des couronnes).
      → Sod : "BOREI SHAMAYIM VE-NOTEHEM" (Yeshayahu 42:5 — createur des cieux et leur etend).
      → Architecture : continuous-rectification driven by parental-evaluation.
      → Pattern : ongoing-improvement loop.
    type: déduction_scripturaire
    concepts:
      - {id: ao_tikkun_tamid_zon_atarot_borei_shamayim_ve_notehem, role: ao_voient_zon_tikkun_yoter_tikkun_tamid_atarot_borei_shamayim_ve_notehem_yeshayahu_42_5}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "zeir_anpin"]
      relevance: "Architecture : continuous rectification loop. Source Yeshayahu 42:5."

  - id: "EC-H4S14-112"
    source_he: "והאור שהיה ראוי לעלות וליצא דרך השערות יורדין למטה להיות מוחין לזו\"ן לכן או\"א הם חלקים בלא שערות לא כמו א\"א וז\"א"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      Or qui DEVAIT MONTER+SORTIR via SE'AROT — DESCEND a la place.
      → Devient MOCHIN pour Z"O"N.
      → DONC : A"O sont CHELAKIM (lisses) BE-LO SE'AROT (sans cheveux).
      → Pas comme A"A et Z"A (qui ont se'arot).
      → Architecture : redirected-flow downstream replace upstream.
      → Pattern : redirected-resource leaves trace (CHELAKIM).
    type: axiome_explicite
    concepts:
      - {id: ao_chelakim_sans_se_arot_or_redirige_mochin_zon_vs_aa_za, role: ao_chelakim_sans_se_arot_or_qui_devait_monter_redirige_descend_mochin_zon_vs_aa_za_avec_se_arot}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : redirected-flow visible signature. Pattern redirected-resource trace."

  - id: "EC-H4S14-113"
    source_he: "כי השערות הם תכליתן לאור המקיף כנודע וכיון דאתכלילין במזלא המקיף אותן אין להם צורך לשערות שלהם לכן יורדין האורות ההם להיות מוחין לזו\"n"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      RAISON detaillee :
      → SE'AROT = TAKHLIT (but) pour OR MAKIF (lumiere encerclante).
      → A"O ITKLILIN (incorpores) dans MAZAL MAKIF qui les encercle.
      → Donc PAS BESOIN de leurs propres se'arot.
      → Orot redirigees descendent → mochin pour Z"O"N.
      → Architecture : substitution-by-higher-coupling — mazal makif remplace se'arot makif.
      → Pattern : delegation-to-higher-source.
    type: déduction_logique
    concepts:
      - {id: se_arot_takhlit_or_makif_ao_itklilin_mazal_makif_substitution, role: se_arot_takhlit_or_makif_ao_itklilin_be_mazala_makif_substitution_pas_besoin_propres_se_arot}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : substitution-by-higher-coupling. Pattern delegation upward."

  - id: "EC-H4S14-114"
    source_he: "וסוד השערות שהם לבחי' או\"מ הוא סוד ואחר עורי נקפו זאת פי' כי השערות היוצאין מאחורי העור מבחוץ הם בחי' המקיפים וזהו נקפו"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      SOD des SE'AROT comme OR MAKIF (OM) :
      → Verset (Iyov 19:26) : "VE-ACHAR ORI NIKFU ZOT" (apres ma peau, ceci s'arrache).
      → "ORI" interpretation : peau (ou lumiere — double sens).
      → Se'arot SORTANT ME-ACHOREI HA-OR ME-BACHUTZ (de l'arriere de la peau de l'exterieur)
        = bechinat HA-MAKIFIM (les encerclants).
      → "NIKFU" (s'arrachent) marque le sortant — signature des makifim externes.
      → Architecture : etymological-evidence pour structure spirituelle.
      → Pattern : verb-rooted symbolic identification.
    type: déduction_scripturaire
    concepts:
      - {id: sod_se_arot_om_or_makif_iyov_19_26_ve_achar_ori_nikfu_zot, role: sod_se_arot_or_makif_iyov_19_26_se_arot_me_achorei_ha_or_makifim_externes}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py", "ohr.py"]
      tables: ["partzufim_states", "ohr_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : etymological evidence spiritual structure. Source Iyov 19:26."

  - id: "EC-H4S14-115"
    source_he: "ואחר עורי נקפו זאת"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      CLOTURE perek 4 : verset complete encadrant la doctrine — "VE-ACHAR ORI NIKFU ZOT" (Iyov 19:26).
      → Marque doctrine : se'arot externes = ohr makif visible.
      → Synthese : A"O without se'arot car itklilin mazal makif ; Z"A+A"A avec se'arot car indigenous ohr makif.
      → Architecture : rhetoric-closure-by-scripture.
      → Pattern : verse-as-doctrinal-anchor pour closure perek.
    type: déduction_scripturaire
    concepts:
      - {id: cloture_perek_4_iyov_19_26_se_arot_om_visible, role: cloture_perek_4_iyov_19_26_ve_achar_ori_nikfu_zot_se_arot_om_visible_synthese}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : rhetorical closure. Pattern verse-as-anchor."


