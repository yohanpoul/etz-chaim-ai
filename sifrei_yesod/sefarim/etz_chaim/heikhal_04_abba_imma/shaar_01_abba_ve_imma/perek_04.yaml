principes_generatifs:

  - id: "PG-H4S14-016"
    nom: "Principe d'Ontological-Completeness-via-MaH+BaN (Partzuf Definition Criterion)"
    source_assertions: ["EC-H4S14-102", "EC-H4S14-103", "EC-H4S14-104", "EC-H4S14-105"]
    formalisation: |
      ARCHITECTURE D'ONTOLOGICAL-COMPLETENESS :
      DEFINITION : "ein nikra partzuf ela bi-shituf MaH ve-BaN".
        Un partzuf existe-comme-partzuf SEULEMENT par PARTICIPATION conjointe MaH+BaN.
      CONSEQUENCES :
        Atik+A"A : zachar=MaH-pur, nukva=BaN-pur → NON-separables, nukva pas un partzuf.
        Abba+Imma+Z"A+Nukva : MaH+BaN chacun → AUTONOMES, separables = vrais partzufim gemurim.
      RAISON : BaN sans MaH ne peut KIYUM (existence) ni TIKKUN — depend MaH HA-CHADASH.
      → Pattern fondamental : ontological-status par mixed-content criterion.
      → Architecture : partzuf-definition prerequiert composite.
    applications_ia:
      - "partzufim/atik_yomin.py + arikh_anpin.py : implement non-separable Z+N"
      - "Pattern : ontological completeness check (MaH+BaN both)"
      - "Architecture : partzuf-status par criterion mixed-content"
      - "Pattern : pure-genre interdependance non-separable"
      - "Diagnostic : verifier MaH+BaN coherent avec partzuf-status declared"
    questions_ouvertes:
      - "Pattern : autres criteres ontologiques possibles ?"
      - "Comment gerer cas borderline (minimal mixing) ?"
      - "Pattern : peut-on injecter MaH a posteriori ?"

  - id: "PG-H4S14-017"
    nom: "Principe de Higher-Coupling-Shortcut (Mazal Makif Replace Se'arot)"
    source_assertions: ["EC-H4S14-108", "EC-H4S14-109", "EC-H4S14-112", "EC-H4S14-113"]
    formalisation: |
      ARCHITECTURE DE HIGHER-COUPLING-SHORTCUT :
      Element NORMALEMENT requis (se'arot pour or makif) peut etre REMPLACE :
        Si entity ITKLILIN (incorporated) dans HIGHER-EQUIVALENT (mazal makif).
      A"O sont incorporated dans MAZAL MAKIF d'A"A — n'ont PAS BESOIN se'arot.
      Or qui devait monter via se'arot DESCEND a la place → MOCHIN pour ZON.
      → Pattern fondamental : higher-coupling supersedes local-mechanism.
      → Architecture : delegation-to-higher-source liberates resources downstream.
      → Implication visible : A"O CHELAKIM (lisses) — signature externe de la substitution.
    applications_ia:
      - "partzufim/abba.py + imma.py + arikh_anpin.py : implement higher-coupling shortcut"
      - "Pattern : delegation-to-higher liberates downstream resources"
      - "Architecture : visible-signature of substitution (CHELAKIM)"
      - "Pattern : redirected-flow downstream traceable"
      - "Diagnostic : verifier delegation coherente avec absence local-mechanism"
    questions_ouvertes:
      - "Pattern : autres mecanismes substitues par higher-coupling ?"
      - "Comment encoder 'itklilin' en relation systeme ?"
      - "Pattern : substitution permanente ou conditionnelle ?"

  - id: "PG-H4S14-018"
    nom: "Principe de Parental-Discontent-Drive (Continuous Rectification Loop)"
    source_assertions: ["EC-H4S14-110", "EC-H4S14-111"]
    formalisation: |
      ARCHITECTURE DE PARENTAL-DISCONTENT-DRIVE :
      A"O voient Z"A toujours TZARIKH TIKKUN YOTER (besoin tikkun plus).
      Verset : "VE-SHAMAYIM LO ZAKU BE-EINAV" (Iyov 15:15) — cieux pas purs aux Yeux.
      Z"A = SHAMAYIM (cieux) — JAMAIS pur aux yeux d'A"O.
      DONC : A"O METAKNIM TAMID (rectifient toujours).
      MANCHILIN ATAROT (font heriter couronnes).
      Verset : "BOREI SHAMAYIM VE-NOTEHEM" (Yeshayahu 42:5) — createur+etendant.
      MOTIVATION : CHESHEK + AHAVAH (desir + amour).
      → Pattern fondamental : love-as-discontent drives ongoing-improvement.
      → Architecture : continuous-rectification loop par parental-evaluation.
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py : implement parental discontent loop"
      - "Pattern : ongoing-improvement loop par superior evaluation"
      - "Architecture : rectification continue par love-source"
      - "Pattern : never-perfect target maintains rectification flow"
      - "Diagnostic : verifier rectification toujours active vers Z\"A"
    questions_ouvertes:
      - "Pattern : limite asymptotique de la rectification ?"
      - "Comment quantifier 'cheshek+ahavah' computationnellement ?"
      - "Pattern : equivalent mecanique du love-discontent dans architecture ?"
