      partzufim: ["atik_yomin", "abba", "imma"]
      relevance: "Architecture : pneumatic emergence. Pattern single-breath bifurcation."

  - id: "EC-H4S14-109"
    source_he: "והנה ראשם דאו\"א מגיעין עד דיקנא דא\"א דבמזלא אתכלילין ולכן אין האורות שלהם צריכין לחזור בסוד אור חוזר ממטה למעלה דרך השערות כמו ג\"ר דא\"א"
    source_ref: "Heikhal 4, Sha'ar 1:4 §3"
    assertion: |
      ROSH d'A"O ATTEIGNENT DIKNA d'A"A :
      → BE-MAZALA ITKLILIN (incorpores dans le Mazal — mazal 8 ou 13).
      → Donc orot d'A"O n'ont PAS BESOIN de retourner OR CHOZER mi-mata le-maala (du bas vers le haut) via SE'AROT.
      → CONTRAIREMENT a G"R d'A"A (qui en a besoin).
      → Architecture : direct-mazal-coupling exempts retroflection.
      → Pattern : higher-coupling shortcut.
      cf. EC-H3S13-188..203 (perek 13 sha'ar A"A) sur 13 tikkunei dikna.
    type: interprétation_lurianique
    concepts:
      - {id: rosh_ao_atteignent_dikna_aa_be_mazala_itklilin_pas_or_chozer_se_arot, role: rosh_ao_atteignent_dikna_aa_be_mazala_itklilin_orot_pas_or_chozer_se_arot_vs_gr_aa}
    mapping:
