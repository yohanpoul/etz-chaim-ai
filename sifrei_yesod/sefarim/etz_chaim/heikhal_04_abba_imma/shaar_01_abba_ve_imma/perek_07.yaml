  - id: "EC-H4S14-173"
    source_he: "ה' חלוקים יש בין או\"א לזו\"נ והם מבוארים בזוהר א' או\"א כחדא נפקין פי' שהם שוין בקומתן משא\"כ בזו\"ן כי הנוקבא לא יצאת רק אחר שהוא יצא עד חצי ת\"ת שבו ואח\"כ יצאה היא משם ולמטה"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      5 CHILUKIM (differences) entre A"O et ZON — MEVUARIM dans le ZOHAR.
      CHILUK 1 : A"O "KECHADA NAFKIN" (sortent ensemble) — egaux en KOMAH.
      → Z"A+Nukva : Nukva sort APRES Z"A (jusqu'a CHATZI TIFERET) puis elle sort en bas.
      → Architecture : simultaneous-emergence vs delayed-emergence.
      → Pattern : kechada-nafkin = synchronous; ZON = asynchronous.
    type: déduction_scripturaire
    concepts:
      - {id: chiluk_1_ao_kechada_nafkin_egaux_komah_zon_delayed, role: chiluk_1_ao_kechada_nafkin_egaux_komah_zon_nukva_post_chatzi_tiferet_z_a}
    mapping:
