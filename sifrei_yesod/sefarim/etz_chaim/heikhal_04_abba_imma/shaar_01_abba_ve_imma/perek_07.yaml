      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : simultaneous vs delayed emergence. Pattern temporal asymmetry."

  - id: "EC-H4S14-174"
    source_he: "ב' כי או\"א אחר התקון כנזכר באדרא היו תמיד פב\"פ משא\"כ בזו\"ן ובערך זה אמרו כחדא שריין"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      CHILUK 2 : A"O apres TIKKUN (Adra) sont TOUJOURS PB"P (panim be-panim — face a face).
      → Z"O"N : pas toujours PB"P.
      → Sod : "KECHADA SHARYAN" (Zohar — ils demeurent ensemble).
