    source_he: "ואמנם אחר שכבר נגדל ז\"א צד הזכרות והנקבות שבו אז מסתלקים המוחין ובאים המוחין דבינה וגבורה דאו\"א לבדם תוך נוקבא ונגדלת לגמרי והרי נשלמו כל אלו המוחין הנקרא בחי' אב\"א ואח\"כ באים המוחין חדשים דפב\"פ"
