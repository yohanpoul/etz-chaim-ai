# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 7 — Madregot panim+achor sefirah par sefirah (Keter/Chokhmah/Bina d'Abba+Imma).
#            ADAM ROKHEV AL HA-KISSEH (28 letters). Mochin Ch+B Abba dans Z"A+Malkhut Z"A.
#            ChC+BG distribution. Mochin A"BA → PB"P. 5 CHILUKIM A"O vs ZON (Zohar).
#            Sod 100/20/7 (Chayei Sarah 123a). 2 zivvugim. "Lo yadon ruchi ba-adam".
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_07 :
#   - Bloc A (§1) : Madregot panim+achor (pashutot+milui)
#   - Bloc B (§1) : Keter A"O panim HAVAYAH+AHYH simples ; achor 10 letters cumulees ; Malkhut mispar 26/21+72/44
#   - Bloc C (§1) : Chokhmah A"O panim 10 milui letters ; achor 26 ; Malkhut mispar 72/161+184/544
#   - Bloc D (§1) : Bina A"O panim 28/27 milui-ha-milui ; achor 74/70 ; Malkhut mispar 610/812+2172/2156
#   - Bloc E (§1) : Z"T=1 HAVAYAH ; Vital note "be-VoT" = 6 lower seulement
#   - Bloc F (§1) : ADAM ROKHEV AL KISSEH — 28 letters ; panim=REGEL ; achor=TaSHKaH (728)
#   - Bloc G (§1) : Mochin Ch+B Abba s'habillent Z"A ; Chokhmah=Z"A self, Bina=Malkhut Z"A (kisseh)
#   - Bloc H (§1) : ChC Abba+Imma → NHY Z"A ; BG Abba+Imma → NHY Nukva interne
#   - Bloc I (§1) : A"O kelul MaH+BaN apres melange (avant pures)
#   - Bloc J (§1) : Apres yenikah+gadlut : ohr Malkhut → achor Z"A pour Nukva
#   - Bloc K (§1) : Z"A complete : mochin se retirent ; nouveaux mochin BG seul A"O → Nukva = mochin A"BA
#   - Bloc L (§1) : Apres : nouveaux mochin PB"P → both grow
#   - Bloc M (§2) : CHILUK 1 — A"O kechada nafkin egaux koma ; ZON Nukva sort apres chetzi tiferet
#   - Bloc N (§2) : CHILUK 2 — A"O toujours PB"P ; ZON pas — KECHADA SHARYAN
#   - Bloc O (§2) : CHILUK 3 — A"O zivvug TADIR ; ZON pas — VE-LO MITPARSHIN
#   - Bloc P (§2) : CHILUK 4 — A"O toujours RACHAMIM ; Bina dinin uniquement apres ZON sortent
#   - Bloc Q (§2) : Sod 100/20/7 (Chayei Sarah 123a) — Keter+A"O=120 SHANAH (singulier) ; ZON=7 SHANIM (pluriel R+D)
#   - Bloc R (§2) : CHILUK 5 — A"O CHIBUK toujours (Zohar) ; CHAD GUFA MAMASH MITDABKIN
#   - Bloc S (§2) : 2 zivvugim (neshamot+chiyut) ; A"O chiyut-zivvug JAMAIS interrompu
#   - Bloc T (§2) : "Lo yadon ruchi ba-adam" (Bereshit 6:3) — Z"A pas chiyut elyon toujours
#
