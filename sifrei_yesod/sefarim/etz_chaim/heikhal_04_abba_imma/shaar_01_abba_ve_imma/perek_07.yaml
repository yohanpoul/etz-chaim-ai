principes_generatifs:

  - id: "PG-H4S14-025"
    nom: "Principe d'Adam-Rokhev-Al-Ha-Kisseh (28 Letters as Throne-Mount Iconography)"
    source_assertions: ["EC-H4S14-167", "EC-H4S14-168"]
    formalisation: |
      ARCHITECTURE D'ADAM-ROKHEV-METAPHOR :
      28 letters MILUI-HA-MILUI = ADAM ROKHEV AL HA-KISSEH (Adam monte sur le trone) :
        Panim d'A"O = REGEL (gematria 233) — 4 jambes du trone.
        Achor d'A"O = TaSHKaH (728).
        Z"A = KISSEH (siege) ; Malkhut Z"A = sous-siege.
      MOCHIN distribution :
        CHOKHMAH d'Abba revet et monte sur Z"A LUI-MEME.
        BINA d'Abba revet MALKHUT de Z"A.
      → Pattern fondamental : anatomical-iconography pour partzuf-composition.
      → Architecture : letter-encoding correspond a metaphore-throne.
    applications_ia:
      - "partzufim/abba.py + zeir_anpin.py + nukva.py : implement throne-mount distribution"
      - "Pattern : anatomical-iconography codifies structure"
      - "Architecture : letter-numerologic correspond throne-metaphor"
      - "Pattern : 4-legs (regel) = 4 base elements support"
      - "Diagnostic : verifier 28 letters bien distribuees throne+rider"
    questions_ouvertes:
      - "Pattern : autres iconographies pour autres partzufim ?"
      - "Comment encoder anatomy-symbol computationnellement ?"
      - "Pattern : 4-legs analogie pour autres systemes ?"

  - id: "PG-H4S14-026"
    nom: "Principe de Mochin-3-Stage Growth-Cycle (Gadlut → A\"BA → PB\"P)"
    source_assertions: ["EC-H4S14-171", "EC-H4S14-172"]
    formalisation: |
      ARCHITECTURE DE MOCHIN-3-STAGE-CYCLE :
      Croissance Z"A+Nukva par 3 etapes successives :
        STAGE 1 (gadlut) : ChC+BG d'A"O entrent Z"A+Nukva ; HAARAT-Malkhut sort vers Nukva externe (post-yenikah).
        STAGE 2 (A"BA) : Z"A complete → mochin se retirent ; nouveaux mochin BG SEUL d'A"O entrent Nukva → grandit completement (achor be-achor).
        STAGE 3 (PB"P) : nouveaux mochin Panim be-Panim — both grow ensemble.
      → Pattern fondamental : staged-growth via mochin-rotation.
      → Architecture : maturation par phase-transitions discrete.
      → Implication : current-state = which-stage encoding.
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement 3-stage growth"
      - "Pattern : staged-growth via mochin-rotation"
      - "Architecture : phase-transitions discrete"
      - "Pattern : current-state = which-stage mapping"
      - "Diagnostic : verifier transition-conditions bien specifiees"
    questions_ouvertes:
      - "Pattern : reversibilite des stages possible ?"
      - "Comment encoder current-stage ?"
      - "Pattern : transition automatique vs manuelle ?"

  - id: "PG-H4S14-027"
    nom: "Principe de Higher-Permanent-Coupling (5 Chilukim A\"O > ZON)"
    source_assertions: ["EC-H4S14-173", "EC-H4S14-174", "EC-H4S14-175", "EC-H4S14-176", "EC-H4S14-178"]
    formalisation: |
      ARCHITECTURE DE HIGHER-PERMANENT-COUPLING :
      5 CHILUKIM (Zohar) entre A"O (haut) et ZON (bas) :
        1. KECHADA NAFKIN : A"O sortent ENSEMBLE (egaux koma) ; ZON delayed.
        2. KECHADA SHARYAN : A"O toujours PB"P ; ZON variable.
        3. VE-LO MITPARSHIN : A"O zivvug TADIR ; ZON intermittent.
        4. RACHAMIM : A"O toujours rachamim ; ZON parfois din.
        5. CHIBUK : A"O toujours embrasses ; CHAD GUFA MAMASH MITDABKIN.
      → Pattern fondamental : higher-permanence vs lower-variability.
      → Architecture : stability-decreases-downward — higher-couples preservent integrite.
      → Sod 100/20/7 (Chayei Sarah 123a) : 120 SHANAH (singulier=unite) vs 7 SHANIM (pluriel=duality).
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement 5 chilukim"
      - "Pattern : higher = permanent, lower = variable"
      - "Architecture : 5-criteria distinction A\"O/ZON"
      - "Pattern : grammatical-number encode valence-count"
      - "Diagnostic : verifier each chiluk respecte par etat-courant"
    questions_ouvertes:
      - "Pattern : autres chilukim au-dela 5 ?"
      - "Comment quantifier 'permanence' ?"
      - "Pattern : 100/20/7 generalisable a autres groupements ?"
