    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : permanent vs variable orientation. Pattern stability hierarchy."

  - id: "EC-H4S14-175"
    source_he: "ג' כי או\"א זווגם תדיר משא\"כ בזו\"ן ובערך זה אמרו ולא מתפרשין"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      CHILUK 3 : A"O ZIVVUG TADIR (continu).
      → ZON : pas continu.
      → Sod : "VE-LO MITPARSHIN" (Zohar — ils ne se separent pas).
      → Architecture : continuous-coupling higher vs intermittent lower.
      → Pattern : permanent-zivvug = chiyut-mondes ; lower can pause.
    type: déduction_scripturaire
    concepts:
      - {id: chiluk_3_ao_zivvug_tadir_zon_intermittent_ve_lo_mitparshin, role: chiluk_3_ao_zivvug_tadir_continu_zon_intermittent_zohar_ve_lo_mitparshin}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : continuous vs intermittent coupling. Pattern permanent zivvug."

  - id: "EC-H4S14-176"
    source_he: "ד' שאו\"א לעולם רחמים כי אפילו בינה שדינין מתערין מינה אינה אלא אחר צאת זו\"נ ממנה אבל בהיותה למעלה הכל היא רחמים אבל זו\"ן לפעמים הוא רחמים ולפעמים הוא דין"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      CHILUK 4 : A"O LE-OLAM RACHAMIM (toujours misericorde).
      → MEME BINA (de qui DININ MIT'ARIN) — seulement APRES ZON sortent d'elle.
      → Quand Bina BE-MA'ALAH (en haut, dans A"O) : tout est RACHAMIM.
      → ZON : parfois RACHAMIM, parfois DIN.
      → Architecture : higher-domain-rachamim ; lower-domain bivalent.
      → Pattern : domain-dependent valence du juger.
    type: interprétation_lurianique
    concepts:
      - {id: chiluk_4_ao_toujours_rachamim_bina_dinin_apres_zon_sortent_zon_bivalent, role: chiluk_4_ao_le_olam_rachamim_bina_dinin_apres_zon_sortent_zon_parfois_rachamim_din}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : higher rachamim, lower bivalent. Pattern domain-dependent valence."

  - id: "EC-H4S14-177"
    source_he: "וז\"ס הנזכר פ' חיי שרה דקכ\"ג ע\"א ק' שנה כ' שנה וז' שנים כי בכתר ואו\"א הם ק\"ך שנה והיינו ק' בכתר וך' באו\"א הנה הם כולם בסוד שנה אך הזו\"נ שהם ז\"ת ז' שנים הנה הם שנים ולא שנה משום דאית בהו דין. ורחמים"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      Sod CHAYEI SARAH 123a (Zohar) : "100 SHANAH 20 SHANAH ve-7 SHANIM" (ages Sarah).
      → 100 (KETER) + 20 (A"O) = 120 SHANAH.
      → SINGULIER "shanah" → unite (rachamim).
      → ZON = 7 SHANIM (PLURIEL) — il y a DIN+RACHAMIM (deux valences).
      → Architecture : grammatical-number encode unity-vs-plurality of valences.
      → Pattern : singular = single-valence ; plural = multi-valence.
    type: déduction_scripturaire
    concepts:
      - {id: sod_chayei_sarah_123_100_20_7_shanah_singulier_shanim_pluriel, role: sod_chayei_sarah_123a_100_keter_20_ao_120_shanah_singulier_zon_7_shanim_pluriel_din_rachamim}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : grammatical-number encode valence-count. Source Chayei Sarah 123a."

  - id: "EC-H4S14-178"
    source_he: "ה' כי באו\"א לעולם יש חיבוק כנזכר בזוהר כתרין רחימין דאינון מתחבקין. עוד יש חילוק אחר והוא כי או\"א חד גופא ממש מתדבקין דא בדא"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      CHILUK 5 : A"O LE-OLAM CHIBUK (etreinte).
      → Zohar : "TARIN RECHIMIN DE-INUN MITCHABKIN" (deux amants qui s'embrassent).
      → BONUS : CHAD GUFA MAMASH MITDABKIN (un seul corps litteralement, attaches).
      → Architecture : bodily-unity expression d'A"O.
      → Pattern : maximum-coupling level higher partzufim.
    type: déduction_scripturaire
    concepts:
      - {id: chiluk_5_ao_chibuk_tarin_rechimin_chad_gufa_mamash_mitdabkin, role: chiluk_5_ao_le_olam_chibuk_zohar_tarin_rechimin_mitchabkin_chad_gufa_mamash_mitdabkin}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : bodily-unity higher. Pattern maximum-coupling."

  - id: "EC-H4S14-179"
    source_he: "כבר הודעתיך שיש ב' מיני זווגים א' להוריד נשמות חדשות ואחד לתת חיות לעולמות התחתונים ואמנם הזווג שהוא כדי לתת חיות זה אינו נפסק לעולם מאו\"א כדי שלא יתבטלו העולמות ח\"ו אבל בזו\"נ אפי' הזווג זה נפסק לפעמים"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      2 SORTES de ZIVVUG :
      → A : pour FAIRE DESCENDRE NESHAMOT CHADASHOT (nouvelles ames).
      → B : pour donner CHIYUT (vie) aux OLAMOT TACHTONIM (mondes inferieurs).
      → A"O : zivvug-CHIYUT JAMAIS interrompu — sinon mondes ANNULES (chas ve-shalom).
      → ZON : meme zivvug-chiyut peut s'interrompre PARFOIS.
      → Architecture : 2 fonctions zivvug ; A"O permanent, ZON facultatif.
      → Pattern : function-distinguish + duration-distinguish.
    type: axiome_explicite
    concepts:
      - {id: 2_zivvugim_neshamot_chiyut_ao_chiyut_jamais_interrompu_zon_facultatif, role: 2_zivvugim_neshamot_chadashot_chiyut_olamot_ao_chiyut_jamais_interrompu_zon_facultatif}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py", "olamot.py"]
      tables: ["zivvug_states", "olamot_config"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : 2 zivvug functions. Pattern duration-distinguish."

  - id: "EC-H4S14-180"
    source_he: "וז\"ס לא ידון רוחי באדם ר\"ל לא ימשוך רוח חיות העליון באדם שהוא ז\"א לעולם כי אם ימשוך זה לעולם יאריכו ימים ויהיו רשעים אך בראותן שהם מתים בקצרות שנים אז עי\"ז יחזרו בתשובה לכן אין רוח חיות זה נמשך תמיד בז\"a"
    source_ref: "Heikhal 4, Sha'ar 1:7 §2"
    assertion: |
      Sod "LO YADON RUCHI BA-ADAM" (Bereshit 6:3 — Mon esprit ne contendra pas a jamais avec l'homme).
      → Interpretation : Z"A (= ADAM) ne peut recevoir RUACH CHIYUT ELYON (souffle de vie superieur) toujours.
      → Si toujours : YA'ARIKHU YAMIM (vivront longtemps) ET seront RESHA'IM (mechants).
      → MAIS voyant qu'ils MORT BE-KITZRUT SHANIM (jeunes) → CHOZRIM BI-TESHUVAH (reviennent en repentance).
      → Pedagogie divine : interruption-de-vie evite mechancete.
      → Architecture : finite-life as moral-corrective.
      → Pattern : pedagogical-mortality drives teshuvah.
    type: déduction_scripturaire
    concepts:
      - {id: sod_lo_yadon_ruchi_ba_adam_z_a_chiyut_pas_toujours_teshuvah, role: sod_lo_yadon_ruchi_ba_adam_bereshit_6_3_z_a_chiyut_elyon_pas_toujours_pedagogical_mortality_teshuvah}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/zivvug.py"]
      tables: ["partzufim_states", "zivvug_states"]
      partzufim: ["zeir_anpin"]
      relevance: "Architecture : pedagogical mortality. Source Bereshit 6:3. Pattern moral teleology."


