      → Nouveaux MOCHIN viennent : SEULEMENT B+G d'A"O (sans Ch+C) → entrent dans NUKVA seule.
      → Nukva NIGDELET LE-GAMRI (grandit completement).
      → Ces mochin = bechinat A"BA (achor be-achor).
      → Apres : nouveaux MOCHIN PB"P (panim be-panim) — both grow.
      → Architecture : mochin-cycle (gadlut1 → A"BA → PB"P) maturation phases.
      → Pattern : 3-stage growth-cycle.
    type: axiome_explicite
    concepts:
