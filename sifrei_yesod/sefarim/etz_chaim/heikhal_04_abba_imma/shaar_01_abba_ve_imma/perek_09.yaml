      → Contient 3 HEHIN (ה ה ה).
      Variante (Nusah Aher) : "3 SHEMOT SaG" au lieu de 3 HEHIN.
      → 1 HE = G"R de Bina-de-Tevunah.
      → 1 HE = V"K (Z"A interne) de Bina-de-Tevunah.
      → 1 HE = MALKHUT de Bina-de-Tevunah.
