    assertion: |
      HE = gematria de 3 HEHIN (3 × 5 = 15) :
      → YOD du MILUI (ה composee : ד+ו ou similaire) DEVIENT 2 HEHIN.
      → Plus la HE elle-meme = 3 HEHIN total.
      → Cause : 3 KAVIM (lignes) dans la TZURAT HE.
      → He = 3-stroke letter.
      → Architecture : letter-strokes encode tier-count.
      → Pattern : iconographic-strokes = numerologic decomposition.
