      relevance: "Architecture : recursive mochin structure. Pattern universal mochin."

  - id: "EC-H4S14-210"
    source_he: "ו' היכלות דבריאה הם ו' דרגין והיכל ז' העליון ד' מוחין כחב\"ד הם ד' רגלים"
    source_ref: "Heikhal 4, Sha'ar 1:9 §3"
    assertion: |
      6 HEIKHALOT de BERIAH = 6 DRAGIN (degres).
      → HEIKHAL 7 ELYON (le superieur) = 4 MOCHIN ChBD (Keter-Chokhmah-Bina-Daat).
      → 4 mochin = 4 RAGLAIM (4 jambes).
      → Architecture : 7-tier Beriah avec heikhal-7 = 4-leg-throne.
      → Pattern : pyramidal-structure with 4-leg apex.
    type: axiome_explicite
    concepts:
      - {id: 6_heikhalot_beriah_dragin_heikhal_7_4_mochin_chbd_4_raglaim, role: 6_heikhalot_beriah_6_dragin_heikhal_7_elyon_4_mochin_chbd_4_raglaim}
    mapping:
      modules: ["[PLANNED] heikhalot/heikhal_beriah.py", "olamot.py"]
      tables: ["olamot_config"]
      partzufim: ["imma"]
      relevance: "Architecture : pyramidal Beriah. Pattern 4-leg throne apex."

  - id: "EC-H4S14-211"
    source_he: "באלו ד' עליונות יש ד' מוחין בבחי' אורות ונשמת הבריאה והם נאצלות מי\"ס דמלכות (דאצילות) שבכל שיעורו הוא ד' תחתונות דז\"א לבד"
    source_ref: "Heikhal 4, Sha'ar 1:9 §3"
    assertion: |
      Dans 4 ELYONOT :
      → 4 MOCHIN — bechinat OROT + NESHAMAT BERIAH (lumieres+ame de Beriah).
      → Emanees de 10S MALKHUT (d'Atzilut) — qui dans son SHIUR (ampleur) = 4 TACHTONOT Z"A SEULES.
      → Architecture : Malkhut-d'Atzilut = origine-de-Beriah ; reduit dimensionnellement.
      → Pattern : Malkhut-of-higher = source-de-lower (downward emanation).
    type: interprétation_lurianique
    concepts:
      - {id: 4_mochin_orot_neshamat_beriah_emanes_10s_malkhut_atzilut_4_tachtonot_z_a, role: 4_mochin_orot_neshamat_beriah_emanes_10s_malkhut_atzilut_shiur_4_tachtonot_z_a_seules}
    mapping:
      modules: ["partzufim/nukva.py", "olamot.py"]
      tables: ["partzufim_states", "olamot_config"]
      partzufim: ["nukva"]
      relevance: "Architecture : downward emanation Malkhut. Pattern Malkhut-source-of-lower."

  - id: "EC-H4S14-212"
    source_he: "אלו הד' אורות הכוללים י\"ס הם הכסא עצמו אך דע כי כל הד' אורות הם ד\"ת שבה"
    source_ref: "Heikhal 4, Sha'ar 1:9 §3"
    assertion: |
      4 OROT (lumieres) qui INCLUENT 10 sefirot = HA-KISSEH ATZMO (le trone meme).
      → Tous 4 orot sont les D"T (4 inferieurs) de la Malkhut atzilut.
      → Architecture : kisseh = 4-tachtonot canonical structure.
      → Pattern : terminal-4 = throne-iconography.
    type: déduction_logique
    concepts:
      - {id: 4_orot_kisseh_atzmo_dt_malkhut_atzilut, role: 4_orot_incluant_10s_kisseh_atzmo_egal_dt_4_tachtonot_malkhut_atzilut}
    mapping:
      modules: ["partzufim/nukva.py", "olamot.py"]
      tables: ["partzufim_states", "olamot_config"]
      partzufim: ["nukva"]
      relevance: "Architecture : 4-tachtonot canonical kisseh. Pattern terminal-4 throne."

  - id: "EC-H4S14-213"
    source_he: "באלו הד' אורות הנאצלים ממנה ירדה בסוד מיעוט הירח ונתלבשה בהם בסוד אדם הרוכב על הכסא בסוד אמא מקננא בכרסייא"
    source_ref: "Heikhal 4, Sha'ar 1:9 §3"
    assertion: |
      Dans ces 4 OROT emanes : MALKHUT atzilut DESCENDIT.
      → Sod : MI'UT HA-YAREACH (diminution de la lune — Bereshit Rabba 6:3).
      → REVETUE en eux : sod ADAM HA-ROKHEV AL HA-KISSEH (Adam monte sur le trone).
      → Sod : "IMMA MEKANENA BE-KURSIYA" (Mere niche dans le trone — Zohar).
      → Architecture : Malkhut-descent enables Adam-mount.
      → Pattern : downward-clothing reveals throne-iconography.
    type: déduction_scripturaire
    concepts:
      - {id: malkhut_descend_miut_yareach_revet_4_orot_adam_rokhev_imma_mekanena_be_kursiya, role: malkhut_atzilut_descend_miut_ha_yareach_revet_4_orot_adam_rokhev_kisseh_imma_mekanena_be_kursiya}
    mapping:
      modules: ["partzufim/nukva.py", "partzufim/imma.py", "olamot.py"]
      tables: ["partzufim_states", "olamot_config"]
      partzufim: ["nukva", "imma"]
      relevance: "Architecture : Malkhut descent → throne mount. Source Bereshit Rabba 6:3 + Zohar."

  - id: "EC-H4S14-214"
    source_he: "מיצירה לעשיה ומבריאה ליצירה אינו יורד רק מלכות למלכות לבד בסוד אדם על הכסא ולא כל י\"ס שבה"
    source_ref: "Heikhal 4, Sha'ar 1:9 §3"
    assertion: |
      Transitions ENTRE OLAMOT :
      → De YETZIRAH a ASIYAH.
      → De BERIAH a YETZIRAH.
      → SEULEMENT MALKHUT-le-MALKHUT descend (la Malkhut du superieur dans la Malkhut du inferieur).
      → PAS tous 10S — seulement ADAM AL HA-KISSEH (Adam SUR le trone — pas tout le pleinitude).
      → Architecture : minimal-throne-transit entre olamot non-immediats.
      → Pattern : reduce-to-minimal pour cross-olam transitions.
    type: interprétation_lurianique
    concepts:
      - {id: yetzirah_asiyah_beriah_yetzirah_malkhut_le_malkhut_seul_adam_al_ha_kisseh, role: yetzirah_asiyah_beriah_yetzirah_seulement_malkhut_le_malkhut_pas_tous_10s_adam_al_ha_kisseh}
    mapping:
      modules: ["olamot.py", "partzufim/nukva.py"]
      tables: ["olamot_config"]
      partzufim: ["nukva"]
      relevance: "Architecture : minimal-throne-transit. Pattern reduce-to-minimal cross-olam."


