# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 9 — SIDUR BINA VE-TEVUNAH AL MATKONATAM. Imma=SaG nukva d'Abba=AB.
#            SaG split en 4 (2 AHYH yodin + 1 alefin + 1 hehin). 3 HEHIN par He-rishona.
#            Vav SaG=V"K Z"A Tevunah. Mochin pnim+makif. Heikhal 7 Beriah=4 mochin
#            =Adam rokhev al ha-kisseh. Yetzirah/Asiyah : Malkhut le-Malkhut seul.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_09 :
#   - Bloc A (§1) : Title — SIDUR BINA VE-TEVUNAH AL MATKONATAM
#   - Bloc B (§2) : Imma elyona = HAVAYAH SaG ; nukva d'Abba (HAVAYAH AB) ; nikud ELOKIM
#   - Bloc C (§2) : SaG split en 4 bechinot par 4 letters : 2 AHYH d'YODIN + 1 d'ALEFIN + 1 d'HEHIN
#   - Bloc D (§2) : He-rishona HAVAYAH englobe atzilut entier ; Abba=Yod, Imma=He-rishona
#   - Bloc E (§2) : Imma 10S ; split en 2 : Bechinah 1=milui VaD du yod (Imma elyona AHYH yodin) ; Bechinah 2=He-rishona (Tevunah SaG)
#   - Bloc F (§2) : Bina=9S rishonot ; Tevunah=Malkhut Bina ; revet Bina chazeh-down (parallel Rachel/Z"A)
#   - Bloc G (§2) : Bina + Tevunah ont chacun PNIMIYUT + CHITZONIYUT (universel)
#   - Bloc H (§2) : Tevunah = SaG complete : 9S avec pnim+chitzon
#   - Bloc I (§2) : G"R Tevunah = 3 partzufim ChBD ; He-yod rishonah SaG-kollel
#   - Bloc J (§2) : 3 HEHIN dans He-rishona : 1 G"R, 1 V"K, 1 Malkhut (3-kav ChBD)
#   - Bloc K (§2) : Yod du milui He divisee en 2 HEHIN (V"K = ChGT + NHY)
#   - Bloc L (§2) : Vav d'SaG-kollel = V"K Z"A Tevunah ; 2 nikudim tachton yod → mochin (pnim+chitzon)
#   - Bloc M (§2) : Total 13 pnim + 13 chitzon ; mochin pnim+makif comme Z"A
#   - Bloc N (§3) : 6 heikhalot Beriah = 6 dragin ; Heikhal 7 elyon = 4 mochin ChBD = 4 raglaim
#   - Bloc O (§3) : 4 mochin = orot+neshamat Beriah ; emanes 10S Malkhut atzilut (4 tachtonot Z"A)
#   - Bloc P (§3) : 4 orot = HA-KISSEH atzmo ; 4 orot = 4 D"T
#   - Bloc Q (§3) : Malkhut atzilut descend mi'ut ha-yareach revet = sod ADAM ROKHEV AL HA-KISSEH = IMMA MEKANENA BE-KURSIYA
#   - Bloc R (§3) : Yetzirah/Asiyah + Beriah/Yetzirah : SEULEMENT Malkhut le-Malkhut (pas tous 10S)
#
# Source Sefaria : Sefer_Etz_Chaim.14.9 (3 sections, 6286 chars)
# IDs : EC-H4S14-196 → EC-H4S14-214

