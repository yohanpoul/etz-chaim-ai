principes_generatifs:

  - id: "PG-H4S14-031"
    nom: "Principe de Universal-Pnim-Chitzon-Duality (Toute Chose Bipolaire)"
    source_assertions: ["EC-H4S14-201"]
    formalisation: |
      ARCHITECTURE D'UNIVERSAL-PNIM-CHITZON :
      Toute CHOSE au monde a PNIMIYUT + CHITZONIYUT :
        "She-i lekha davar ba-olam she-ein bo pnimi ve-chitzon".
      Bina, Tevunah, sefirot, partzufim, mondes — tous bipolaires.
      → Pattern fondamental : ontological-pair pour toute entite.
      → Architecture : universal duality discipline.
      → Implication : encoding requires 2-aspect representation.
    applications_ia:
      - "partzufim/abba.py + imma.py + zeir_anpin.py + nukva.py : implement pnim/chitzon"
      - "Pattern : ontological pair pour toute entity"
      - "Architecture : 2-aspect representation universel"
      - "Pattern : pas d'objet single-aspect dans le systeme"
      - "Diagnostic : verifier chaque entite a pnim+chitzon defines"
    questions_ouvertes:
      - "Pattern : 3-aspect ou multi-aspect aussi possibles ?"
      - "Comment encoder duality computationnellement ?"
      - "Pattern : exception au principe universel ?"

  - id: "PG-H4S14-032"
    nom: "Principe de Recursive-Letter-Decomposition (Tier-Internal Letter Mapping)"
    source_assertions: ["EC-H4S14-203", "EC-H4S14-204", "EC-H4S14-205", "EC-H4S14-208"]
    formalisation: |
      ARCHITECTURE DE RECURSIVE-LETTER-DECOMPOSITION :
      Lettres encoded recursive structures :
        HE = 3 KAVIM (lignes-strokes) → 3 HEHIN → ChBD (3-tier).
        YOD du milui d'HE = 2 HEHIN → V"K (ChGT+NHY).
        VAV du SaG-kollel = V"K Z"A Tevunah ; 2 nekudim tachton du yod = mochin recursifs.
        Total = 13 (Y"G) — canonical-tier-count.
        13 PNIMIYUT + 13 CHITZONIYUT = 26 = HAVAYAH.
      → Pattern fondamental : letter-anatomy encode partzuf-anatomy par 3-kavim repete.
      → Architecture : recursive-decomposition par sub-letter parts.
      → Implication : letter-strokes = numerologic mapping vers structure.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py : implement recursive letter decomposition"
      - "Pattern : letter-strokes encode tier-count"
      - "Architecture : recursive letter-anatomy mapping"
      - "Pattern : 13/13 mirror double-layer canonical"
      - "Diagnostic : verifier sub-letter mappings coherent"
    questions_ouvertes:
      - "Pattern : autres lettres avec decomposition similaire ?"
      - "Comment encoder strokes-count computationnellement ?"
      - "Pattern : 13 universel ou specific Bina ?"

  - id: "PG-H4S14-033"
    nom: "Principe de Minimal-Throne-Transit (Cross-Olam Reduce-to-Malkhut)"
    source_assertions: ["EC-H4S14-213", "EC-H4S14-214"]
    formalisation: |
      ARCHITECTURE DE MINIMAL-THRONE-TRANSIT :
      Transitions entre OLAMOT non-immediats :
        Yetzirah → Asiyah : SEULEMENT Malkhut-le-Malkhut descend.
        Beriah → Yetzirah : SEULEMENT Malkhut-le-Malkhut.
        Atzilut → Beriah : Malkhut entiere descend (mi'ut yareach), revet 4 orot = kisseh.
      Sod : ADAM HA-ROKHEV AL HA-KISSEH = Malkhut descendue ; "IMMA MEKANENA BE-KURSIYA".
      → Pattern fondamental : reduce-to-minimal pour cross-olam non-adjacent.
      → Architecture : full-descent only entre olamot adjacents (Atzilut-Beriah).
      → Implication : downstream-cascade reduit increasingly.
    applications_ia:
      - "olamot.py + partzufim/nukva.py : implement cross-olam minimal transit"
      - "Pattern : full-descent only adjacent ; minimal-transit non-adjacent"
      - "Architecture : downstream-reduction cascade"
      - "Pattern : Malkhut-le-Malkhut = atomic-unit cross-olam"
      - "Diagnostic : verifier transit-mode selon olam-pair"
    questions_ouvertes:
      - "Pattern : Atzilut → Asiyah direct possible ?"
      - "Comment encoder olam-distance ?"
      - "Pattern : meta-olam transitions ?"
