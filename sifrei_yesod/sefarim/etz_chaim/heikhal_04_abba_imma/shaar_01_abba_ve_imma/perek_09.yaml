  - id: "EC-H4S14-204"
    source_he: "ה' זו גי' ג' ההי\"ן כי יו\"ד של המילוי נעשין ב' ההי\"ן והרי הם ג' ההי\"ן לפי שג' קוין יש בצורת ה'"
