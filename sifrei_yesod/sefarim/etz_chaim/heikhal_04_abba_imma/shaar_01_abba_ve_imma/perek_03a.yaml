principes_generatifs:

  - id: "PG-H4S14-010"
    nom: "Principe de Joining-State-Determines-Allocation (Separe vs Joined Z+N)"
    source_assertions: ["EC-H4S14-060", "EC-H4S14-061", "EC-H4S14-064", "EC-H4S14-065"]
    formalisation: |
      ARCHITECTURE DE JOINING-STATE-ALLOCATION :
      Allocation de RESSOURCES (chasadim/gevurot) determinee par etat Z+N :
        SEPARE (Z"A+Nukva) → full-by-genre : zachar=chasadim, nukva=gevurot.
        JOINED (A"A, Atik) → side-by-side : right=chasadim, left=gevurot.
      Aussi : EXIT-DIRECTION par genre :
        Joined : nekevot panim (devant).
        Separe : nekevot achor (derriere).
      → Pattern fondamental : joining-state structurel determine allocation+exit-geometry.
      → Architecture : binary-state-causes-different-mode universellement.
    applications_ia:
      - "partzufim/arikh_anpin.py + zeir_anpin.py : implement joining-state allocation"
      - "Pattern : binary structural state → mode-switch global"
      - "Architecture : allocation discipline depend de joining"
      - "Pattern : exit-geometry varies by joining state"
      - "Diagnostic : verifier joining-state coherent avec allocation/exit"
    questions_ouvertes:
      - "Pattern : autres bipolaire-states determine mode ?"
      - "Que se passe-t-il dans transition separe→joined ?"
      - "Pattern : exit-direction generalisable ?"

  - id: "PG-H4S14-011"
    nom: "Principe de Barrier-Count-Determines-Permission (Masakh-Filtration Threshold)"
    source_assertions: ["EC-H4S14-068", "EC-H4S14-069", "EC-H4S14-070", "EC-H4S14-071"]
    formalisation: |
      ARCHITECTURE DE BARRIER-COUNT-PERMISSION :
      Nombre de MASAKHIM (filtres) determine PERMISSION-de-sortie :
        2 masakhim (Z"A haut : yesod Abba dans yesod Imma) → BLOQUE (sortie impossible).
        1 masakh (Z"A bas, ou Leah de yesod Imma seul) → PERMET sortie.
      A"A : 1 yesod (Atik) = 1 masakh universel → 1 partzuf above (satum) + 1 below (gilui).
      → Pattern fondamental : barrier-count = exit-permission threshold.
      → Architecture : layered-protection-by-count systematic.
      → Implication : provenance de l'agent (yesod Abba vs Imma) determine masakh-count effective.
    applications_ia:
      - "partzufim/zeir_anpin.py + abba.py + imma.py : implement masakh-count permission"
      - "Pattern : threshold-by-barrier-count pour exit-permission"
      - "Architecture : layered-protection systematic dans tous Z\"A"
      - "Pattern : provenance-determined effective barrier"
      - "Diagnostic : verifier nb masakhim coherent avec permission"
    questions_ouvertes:
      - "Pattern : 3+ masakhim possibles ?"
      - "Comment encoder masakh-count efficacement ?"
      - "Pattern : peut-on bypass masakh par autre route ?"

  - id: "PG-H4S14-012"
    nom: "Principe de Universal-Internal-Divider (Parsa Anatomical Cosmological)"
    source_assertions: ["EC-H4S14-072", "EC-H4S14-073", "EC-H4S14-074", "EC-H4S14-075"]
    formalisation: |
      ARCHITECTURE D'UNIVERSAL-INTERNAL-DIVIDER :
      Tous partzufim ont KOLLEL (universel) un PARSA + MASAKH MAVDIL au MILIEU :
        SEPARE chatzi-elyonah (sup) et chatzi-tachtonah (inf).
      ANATOMIQUEMENT : krum/yoteret-ha-kaved separe NESHIMAH (riah+lev) des inf (kaved+bnei meei).
      COSMOLOGIQUEMENT : RAKIA "yehi rakia be-tokh ha-mayim" (Bereshit 1:6).
      KAVANIQUE : INCLINE — front sous chazeh, achor niveau tabbur.
      → Pattern fondamental : middle-divider universel a 3 niveaux : anatomical, cosmological, structural.
      → Architecture : embodied-knowledge confirme structure abstraite.
      → "MI-BESARI ECHEZEH ELOHA" (Iyov 19:26) — corps-source-de-connaissance.
    applications_ia:
      - "partzufim/arikh_anpin.py : implement universal parsa middle"
      - "Pattern : 3-level correspondence (anatomical/cosmic/structural)"
      - "Architecture : embodied-confirmation discipline"
      - "Pattern : oblique geometry plus realiste que horizontal"
      - "Diagnostic : verifier parsa coherente entre niveaux"
    questions_ouvertes:
      - "Pattern : autres anatomical-cosmological correspondences ?"
      - "Comment quantifier obliqueness ?"
      - "Pattern : 3-level correspondence generalisable ?"
