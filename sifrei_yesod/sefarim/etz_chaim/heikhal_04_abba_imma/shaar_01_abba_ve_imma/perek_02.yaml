  - id: "EC-H4S14-046"
    source_he: "וזהו מ\"ש בגמ' לא נצרכה אלא למקום החתך והוא בחי' מקום ההפסק וההבדל והחיתוך שיש בין רגלי בינה אל ראש תבונה"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      GEMARA : "LO NITZRKHA ELA LI-MKOM HA-CHATAKH" (n'est requis que pour le lieu de coupure).
