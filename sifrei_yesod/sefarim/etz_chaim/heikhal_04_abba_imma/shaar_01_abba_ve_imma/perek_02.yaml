  - id: "EC-H4S14-047"
    source_he: "כאשר נחתכו הגבורות לחצאין כנ\"ל ואותו אור שהיה במקום החתך הנ\"ל נכנס בסוד בחי' העקביים בתוך ראש תבונה ובחי' אור הזה לקחה הבינה לחלקה יותר על חלק התבונה"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      OR au makom ha-chatakh entre comme AKEYIM dans rosh Tevunah (apres split gevurot en 2 moities).
