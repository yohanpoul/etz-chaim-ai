# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 2 — Distinction des 4 partzufim. CH"G premiers (situm) vs nouveaux (gilui).
#            Position : A"O Garon→Chazeh, YISSO/Tevunah Chazeh→Tabbur.
#            Akeyim Bina dans rosh Tevunah. Bina = gevurot revelees = ESHET HAYIL.
#            Q-A : pourquoi A"O > YISSO/Tevunah malgre gilui plus grand des tachtonim.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_02 :
#   - Bloc A : Q ouverture — comment distinguer 4 partzufim si tout en gilui ?
#   - Bloc B : Reponse — seuls CH"G PREMIERS (tikkun initial A"O) suivent ce pattern + HAGDALAT A"A
#   - Bloc C : Apres tikkun initial, NOUVEAUX CH"G (zivvugim) descendent rapidement, pas pattern
#   - Bloc D : CH"G premiers en haut recoivent eclairage des nouveaux via MASAKH yesod en SITUM
#   - Bloc E : CH"G inferieurs (bas) recoivent eclairage en GILUI GAMUR
#   - Bloc F : Cette difference (situm/gilui) distingue les 4 partzufim (haut vs bas)
#   - Bloc G : Position A"O — Garon → fin yesod Atik = 1/3 sup Tiferet A"A = CHAZEH
#   - Bloc H : Position YISSO+Tevunah — Chazeh → Tabbur (~1/2 Tiferet A"A)
#   - Bloc I : 4 partzufim revetent A"A de TOUS cotes (droite/gauche/arriere/devant)
#   - Bloc J : Akeyim Leah dans rosh Rachel → ici akeyim Bina dans rosh Tevunah (pas Abba/YISSO)
#   - Bloc K : Raison — gevurot sortirent first, tous revelees egalement, lien fort
#   - Bloc L : Lien persiste via akeyim apres split en 2 partzufim
#   - Bloc M : Gemara "lo nitzrkha ela li-mkom ha-chatakh" — lieu coupure rgly Bina/rosh Tevunah
#   - Bloc N : Or au makom ha-chatakh = akeyim dans rosh Tevunah → Bina prend supplement
#   - Bloc O : Bina = ESHET HAYIL ATERET BA'LA (gevurot revelees) ; Abba TAMIR VE-GANIZ
#   - Bloc P : "Tova tokhachah megulah me-ahavah mesuteret" — gevurot > chasadim (revele)
#   - Bloc Q : "Atarot be-rosheihem" Le'atid Lavo = Bina = olama de-atei
#   - Bloc R : "Mi yemalel gevurot Hashem" + "bi-gvurot shemonim" — Bina=gevurot
#   - Bloc S : "Binah dinim mit'arin minah" (Zohar Acharei, Vayikra)
#   - Bloc T : Bina entiere batie gevurot SEULES (vs Rachel/Leah qui ont chasadim aussi)
#   - Bloc U : "Ani Binah li gevurah" (Mishlei 8:14) — Bina prend Gevurah dBaN de A"A
#   - Bloc V : Q (mekom she'elah) — si gilui=greater, YISSO/Tevunah > A"O ?
#   - Bloc W : Reponse 1 — gevurot tachtonim REMONTERENT a Bina elyonim, illuminerent la
#   - Bloc X : Reponse 2 — moitie sup ChG → A"O ; moitie inf doit aussi illuminer reste A"A + ZON
#   - Bloc Y : Donc YISSO/Tevunah recoivent eclairage LIMITEE ; A"O grands et eleves
#
# Source Sefaria : Sefer_Etz_Chaim.14.2 (1 perek dense, 3889 chars)
