  - id: "EC-H4S14-054"
    source_he: "גם ז\"ס הפסוק אני בינה לי גבורה כי היא לוקחת הגבורה דב\"ן דא\"א ומשם נבנית"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      Verset MISHLEI 8:14 : "ANI BINAH LI GEVURAH" (je suis Binah, a moi la Gevurah).
      → Bina prend GEVURAH d'BaN d'A"A — base de sa construction.
      → Self-declaration scripturaire de l'identite.
      → Architecture : provenance scripturairement certifiee.
      → Pattern : autobiographic-verse identifies source.
