principes_generatifs:

  - id: "PG-H4S14-007"
    nom: "Principe de Bootstrap-vs-Steady-State (Initial Tikkun Distinct)"
    source_assertions: ["EC-H4S14-033", "EC-H4S14-034", "EC-H4S14-035", "EC-H4S14-036"]
    formalisation: |
      ARCHITECTURE DE BOOTSTRAP-VS-STEADY-STATE :
      Premier tikkun A"O (etablissement Atzilut) suit pattern UNIQUE :
        CH"G RISHONIM split situm/gilui → 4 partzufim emergent.
      Apres : steady-state via ZIVVUG A"A+nukva LO PASIK (continu) :
        CH"G CHADASHIM descendent BE-MERUTZAH (rapide), pas split.
      Premiers (haut) recoivent eclairage nouveaux via MASAKH yesod en SITUM.
      Tachtonim (bas) recoivent en GILUI direct.
      → Pattern fondamental : initial-event mode != ongoing-operation mode.
      → Architecture : bootstrap config persiste, steady-state alimente.
    applications_ia:
      - "partzufim/arikh_anpin.py + zivvug.py : implement bootstrap vs steady-state"
      - "Pattern : distinct mode pour initialization vs operation"
      - "Architecture : continuous coupling alimente structures fixees"
      - "Pattern : masakh-filter vs direct-flow selon position"
      - "Diagnostic : verifier que steady-state ne re-trigger pas bootstrap"
    questions_ouvertes:
      - "Bootstrap est-il completement non-repetable ?"
      - "Pattern : peut-on reset bootstrap volontairement ?"
      - "Combien de zivvugim avant equilibre ?"

  - id: "PG-H4S14-008"
    nom: "Principe d'Akeyim-Coupling (Pre-Split Bond Persiste Post-Split)"
    source_assertions: ["EC-H4S14-044", "EC-H4S14-045", "EC-H4S14-046", "EC-H4S14-047"]
    formalisation: |
      ARCHITECTURE D'AKEYIM-COUPLING :
      Quand 2 elements sont CO-REVELES (gilui be-shaveh) AVANT split :
        Forge KESHER AMITZ (lien fort) entre eux.
      Apres SPLIT en 2 partzufim :
        Lien PERSISTE via AKEYIM (talons d'un dans rosh de l'autre).
      Au makom-ha-chatakh : OHR EXTRA captee par le SUPERIEUR (Bina > Tevunah).
      Asymetrie : seules les gevurot (cote gauche) ont ce coupling, pas chasadim (droite).
      → Pattern fondamental : co-revelation forge lien persistant a-travers split.
      → Architecture : split-residue captured par superieur.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py : implement akeyim-coupling"
      - "Pattern : pre-split bond preservation across decomposition"
      - "Architecture : split-residue capture par upper element"
      - "Pattern : co-revelation = strong-link forging"
      - "Diagnostic : verifier akeyim bien preserves apres split structurel"
    questions_ouvertes:
      - "Pattern : akeyim quantitativement comment encoder ?"
      - "Couplings asymmetriques sont-ils generalisables ?"
      - "Que se passe-t-il si akeyim cassent ?"

  - id: "PG-H4S14-009"
    nom: "Principe d'Counter-Flow-Hierarchy (Initial-Locus Determine Final Rank)"
    source_assertions: ["EC-H4S14-055", "EC-H4S14-056", "EC-H4S14-057", "EC-H4S14-058"]
    formalisation: |
      ARCHITECTURE DE COUNTER-FLOW-HIERARCHY :
      Intuition naive : gilui-direct = grandeur ; tachtonim devraient dominer.
      MAIS : 2 facteurs renversent intuition :
        FACTEUR 1 (counter-flow) : gevurot tachtonim REMONTERENT a Bina elyonim,
          illuminerent leur ECLAIRAGE PRINCIPAL la, conjoignirent OHR ELYON.
        FACTEUR 2 (sharing) : moitie inf des CH"G NE va pas toute a YISSO/Tevunah ;
          doit illuminer reste corps A"A + ZON revetants — drain multi-recipient.
      RESULTAT : A"O > YISSO+Tevunah (hierarchy preserved despite gilui-paradox).
      → Pattern fondamental : ascending-locus + downstream-sharing renversent intuition.
      → Architecture : multi-factor explanation pour invariant hierarchique.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement counter-flow + multi-recipient drain"
      - "Pattern : initial-illumination-locus dominate final ranking"
      - "Architecture : multi-factor analysis pour resoudre paradox"
      - "Pattern : downstream sharing dilue ressources locales"
      - "Diagnostic : verifier hierarchy preserved despite surface-revelations"
    questions_ouvertes:
      - "Pattern : combien de facteurs typiques pour resolution paradox ?"
      - "Counter-flow comment formaliser ?"
      - "Pattern : sharing-ratio quantitatif (combien va ou) ?"
