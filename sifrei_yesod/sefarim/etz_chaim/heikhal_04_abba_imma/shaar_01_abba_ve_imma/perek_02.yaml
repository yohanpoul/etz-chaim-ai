      relevance: "Architecture : provenance certifiee scripture. Source Mishlei 8:14."

  - id: "EC-H4S14-055"
    source_he: "והנה עתה יש מקום שאלה והוא כי אם הטעם של מעלת הבינה על החכמה הוא גילוי הגבורות ואם כן היה מהראוי שיהיו יש\"ס ותבונה עם היותן תחתונים גדולים במעלה על או\"א לפי שהתחתונים הם בגלוי והעליונים הם במקום הסתום"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      MEKOM SHE'ELAH (lieu de question) :
      → SI elevation Bina > Chokhmah = GILUI des gevurot,
      → ALORS YISSO+Tevunah (tachtonim, en gilui) DEVRAIENT etre > A"O (elyonim, en stum).
      → MAIS empiriquement A"O > YISSO/Tevunah.
      → Architecture : apparent-paradox declenche raffinement doctrinal.
      → Pattern : counter-argument identification.
    type: axiome_explicite
    concepts:
      - {id: mekom_she_elah_yisso_tevunah_pourquoi_pas_plus_grand_que_ao, role: mekom_she_elah_si_gilui_egal_grandeur_yisso_tevunah_doivent_etre_plus_grand_que_ao_paradox}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : counter-argument trigger. Pattern doctrinal-refinement."

  - id: "EC-H4S14-056"
    source_he: "אבל הענין כך הוא כי הנה אם כאשר יצאו הגבורות תחילה היו מתפשטין ויורדין תכף למטה במקום הגלוי אז ודאי שהיו מאירין למטה במקום הגלוי והיו יותר גדולים תחתונים מן העליונים אמנם אפילו הגבורות התחתונים עלו למעלה במקום בינה עליונים והאירו שם עיקר הארתן ונצטרף עם האור העליון ואז היו העליונים יותר מעולים וגבוהים מהתחתונים של מטה"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      REPONSE 1 : si gevurot avaient descendu DIRECT au gilui → tachtonim auraient ete plus grands.
      → MAIS gevurot tachtonim ALU LE-MA'ALAH (REMONTERENT) au makom Bina elyonim.
      → ILLUMINERENT LA leur ECLAIRAGE PRINCIPAL (ikkar haaratan).
      → CONJOINTS (nitztaref) avec OHR ELYON.
      → Resultat : ELYONIM plus me'ulim ve-gevohim (eleves+hauts) que tachtonim.
      → Architecture : initial-illumination-locus determine final hierarchy.
      → Pattern : counter-flow (ascension) renverse intuition naive.
    type: interprétation_lurianique
    concepts:
      - {id: gevurot_tachtonim_alu_le_maalah_illuminerent_bina_elyonim_nitzaref_ohr_elyon, role: gevurot_tachtonim_alu_le_maalah_illuminerent_bina_elyonim_ikkar_haaratan_nitztaref_ohr_elyon}
    mapping:
      modules: ["partzufim/imma.py", "partzufim/abba.py", "ohr.py"]
      tables: ["partzufim_states", "ohr_states"]
      partzufim: ["imma", "abba"]
      relevance: "Architecture : counter-flow renverse hierarchy. Pattern initial-locus dominance."

  - id: "EC-H4S14-057"
    source_he: "גם ט\"א כי המחצית של הגבורות והחסדים העליונים כל בחי' נתינתן לאו\"א אבל מחצית התחתונים שמהם נעשו יש\"ס ותבונה אין כל הארתן ניתנת להם לבדם כי גם הם צריכות להתפשט ולתת הארה לשאר התפשטות הגוף מטבורו ולמטה והירכיים והיסוד דא\"א וגם הם צריכין להאיר אל זו\"ן המלבישים את א\"א מהטבור ולמטה"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      REPONSE 2 (TA'AM ACHER — autre raison) :
      → MOITIE SUPERIEURE des CH"G : KOL bechinah de natinatam (toute leur donnation) DONNEE a A"O.
      → MOITIE INFERIEURE : NE va PAS toute a YISSO/Tevunah.
      → Cette moitie inf doit AUSSI :
        - illuminer reste-corps A"A (Tabbur+down, irkhayim, yesod d'A"A).
        - illuminer ZON revetants A"A de Tabbur+down.
      → Architecture : downstream resource sharing dilue YISSO/Tevunah.
      → Pattern : multi-recipient drain reduit ration individuelle.
    type: déduction_logique
    concepts:
      - {id: moitie_inf_chg_dilue_yisso_tevunah_doit_illuminer_reste_aa_zon, role: moitie_inferieure_chg_dilue_yisso_tevunah_doit_aussi_illuminer_reste_aa_zon_partage}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py", "partzufim/arikh_anpin.py"]
      tables: ["partzufim_states", "ohr_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva", "arikh_anpin"]
      relevance: "Architecture : multi-recipient drain. Pattern downstream sharing dilution."

  - id: "EC-H4S14-058"
    source_he: "ונמצא שלא נשאר מהארתן אל יש\"ס ותבונה רק הארה מועטת ובזה נמצא שאו\"א גדולים ומעולים מהם"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      CONCLUSION : YISSO+Tevunah recoivent HAARAH MU'ATAH (eclairage minoritaire).
      → A"O = GEDOLIM + ME'ULIM (grands + eleves) MEHEM (sur eux).
      → Resoud le mekom-she'elah : 2 raisons (counter-flow + sharing) → A"O domine.
      → Architecture : hierarchy preserved despite gilui-paradox.
      → Pattern : multi-factor explanation pour invariant hierarchique.
    type: déduction_logique
    concepts:
      - {id: ao_gedolim_meulim_yisso_tevunah_haarah_muatah, role: conclusion_ao_gedolim_meulim_yisso_tevunah_haarah_muatah_hierarchy_preserved}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : hierarchy preserved. Pattern multi-factor explanation."


