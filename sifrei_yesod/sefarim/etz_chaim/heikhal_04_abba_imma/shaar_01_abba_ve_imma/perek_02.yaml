  note: "Distinction des 4 partzufim apres tikkun initial. Seuls CH\"G PREMIERS (etablissement Atzilut) suivent pattern situm/gilui. Nouveaux CH\"G via zivvugim ulterieurs descendent rapidement. CH\"G premiers haut = situm (recoivent via masakh) ; bas = gilui. Difference situm/gilui distingue 4 partzufim. Position : A\"O Garon→Chazeh (1/3 sup Tiferet A\"A), YISSO/Tevunah Chazeh→Tabbur. Tous cotes (droite/gauche/arriere/devant). Akeyim Bina dans rosh Tevunah (parallele Leah/Rachel) — gevurot sortirent first, lien fort. Gemara 'lo nitzrkha ela li-mkom ha-chatakh'. Bina = ESHET HAYIL ATERET BA'LA (gevurot revelees) ; Abba TAMIR VE-GANIZ. 'Tova tokhachah megulah me-ahavah mesuteret'. Bina = ATARET LE'ATID LAVO. 'Mi yemalel gevurot' + 'bi-gvurot shemonim'. 'Binah dinim mit'arin minah' (Zohar). Bina entiere batie gevurot SEULES (vs Rachel/Leah). 'Ani Binah li gevurah' (Mishlei 8:14). Q-A : YISSO/Tevunah malgre gilui plus grand restent moindres car gevurot tachtonim REMONTERENT illuminer Bina, et moitie inf doit illuminer reste A\"A + ZON."

