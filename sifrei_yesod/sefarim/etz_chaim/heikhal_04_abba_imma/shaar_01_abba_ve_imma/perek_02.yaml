      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : scripture identity. Sources Ps 106:2 + Ps 90:10."

  - id: "EC-H4S14-052"
    source_he: "וכן אמרו בזוהר כי הבינה דינין מתערין מינה כנזכר פ' אחרי מות ופ' ויקרא וכן בהרבה מקומות"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      ZOHAR : "BINAH DININ MIT'ARIN MINAH" (Bina, des jugements s'eveillent d'elle).
      → Cite : Acharei Mot, Vayikra, et harbeh mekomot (beaucoup d'endroits).
      → DININ (jugements) = manifestations gevurot.
