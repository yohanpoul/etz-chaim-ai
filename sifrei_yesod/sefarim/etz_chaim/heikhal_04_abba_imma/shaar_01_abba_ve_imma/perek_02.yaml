  - id: "EC-H4S14-051"
    source_he: "גם בזה תבין מ\"ש בזוהר על פסוק מי ימלל גבורות ה' כי בינה נקרא גבורות בסוד ואם בגבורות שמונים שנה"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      Versets ZOHAR sur BINA = GEVUROT :
      → "MI YEMALEL GEVUROT HASHEM" (Tehilim 106:2 — qui exprimera les hautes-faits du Seigneur).
      → "VE-IM BI-GVUROT SHEMONIM SHANAH" (Tehilim 90:10 — et si dans les hauteurs 80 ans).
      → Bina = OLAM HA-BA = 80 ans (gematria PE = 80).
      → Architecture : Bina = source des gevurot par identite scripturaire.
      → Pattern : multi-source convergence sur Bina-gevurot equation.
    type: déduction_scripturaire
    concepts:
      - {id: bina_egal_gevurot_mi_yemalel_bi_gvurot_shemonim_shanah, role: bina_egal_gevurot_mi_yemalel_gevurot_hashem_bi_gvurot_shemonim_shanah_zohar}
