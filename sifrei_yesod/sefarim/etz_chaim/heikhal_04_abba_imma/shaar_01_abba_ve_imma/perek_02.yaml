  - id: "EC-H4S14-048"
    source_he: "והנה תבין עתה למה הבינה נקראת אשת חיל עטרת בעלה והטעם הוא כי היא נעשית מבחי' גבורות אשר הם מגולות כולם בגלוי יותר מן החסדים כנ\"ל אבל אבא שהוא מן החסדים שאינם כ\"כ בגלוי אמרו עליו בזוהר וע\"ד אבא טמיר וגניז יתיר"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      BINA = "ESHET HAYIL ATERET BA'LA" (Mishlei 12:4 — femme de valeur, couronne de son mari) :
      → Faite de GEVUROT magulot (revelees) PLUS que les CHASADIM.
      → ABBA = de CHASADIM (peu reveles) — Zohar : "ABBA TAMIR VE-GANIZ YATIR" (cache et secret au plus haut).
      → Architecture : revelation-degree = elevation status.
      → Pattern : couronne metaphorique = surface-emergence dominance.
