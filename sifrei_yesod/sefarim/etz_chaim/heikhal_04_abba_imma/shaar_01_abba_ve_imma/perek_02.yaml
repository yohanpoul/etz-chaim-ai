  - id: "EC-H4S14-044"
    source_he: "וטעם הדבר הוא לפי שהגבורות יצאו תחלה מהיסוד ונתגלו ואח\"כ יצאו החסדים ואז הוא הגילוי בשוה לכל הגבורות ולכן נתקשרו הגבורות קשר אמיץ העליונים עם התחתונים"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      RAISON de l'asymetrie :
      → Gevurot sortirent FIRST de yesod, REVELEES.
      → Puis chasadim sortirent.
      → Au moment des gevurot : GILUI BE-SHAVEH le-KOL ha-GEVUROT (revelation EGALE pour toutes les gevurot).
      → Donc : NITKASHRU les gevurot KESHER AMITZ (lien fort) entre ELYONIM et TACHTONIM.
      → Architecture : temporal-precedence creee bond unforming.
      → Pattern : co-revelation forge structural coupling.
