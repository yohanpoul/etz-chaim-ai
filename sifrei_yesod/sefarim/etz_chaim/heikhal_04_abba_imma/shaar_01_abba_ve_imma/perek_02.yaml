  - id: "EC-H4S14-053"
    source_he: "והטעם הוא לפי שכולה אינה נעשית ונבנית אלא מגבורות לבדם משא\"כ ברחל ולאה שאע\"פ שהם נקראים נקבות יש בהם ג\"כ חסדים"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      RAISON : Bina entierement BATIE de GEVUROT SEULES (KULAH MI-GEVUROT LEVADAM).
      → CONTRAST : Rachel + Leah, bien que NEKEVOT (femelles), contiennent AUSSI CHASADIM.
      → Architecture : Bina = pure-gevurot (unalloyed) ; Rachel/Leah = mixed.
      → Pattern : purity-of-source distingue partzufim femelles.
    type: axiome_explicite
    concepts:
