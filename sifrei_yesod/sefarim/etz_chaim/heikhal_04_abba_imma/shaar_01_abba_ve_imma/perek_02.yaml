  - id: "EC-H4S14-045"
    source_he: "ולכן אע\"פ שאח\"כ נחלקו לב' פרצופים נשאר ביניהן קשר אמיץ וחזק ע\"י עקביים הנ\"ל. אשר על ידם מתקשרים הבינה עם תבונה"
