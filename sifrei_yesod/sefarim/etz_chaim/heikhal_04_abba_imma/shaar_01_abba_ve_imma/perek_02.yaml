  - id: "EC-H4S14-050"
    source_he: "ולכן נקראת בינה עטרת בעלה כנ\"ל כי משרז\"ל לע\"ל צדיקים יושבים ועטרותיהן בראשיהם היא הבינה הנקרא לע\"ל ועלמא דאתי"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      ATERET BA'LA — Mishna (Berakhot 17a) : "LE'ATID LAVO TZADIKIM YOSHVIM VE-ATAROTEIHEN BE-ROSHEIHEM"
        (au futur, les justes assis avec couronnes sur leurs tetes).
      → BINA = LE'ATID LAVO + OLAMA DE-ATEI (monde futur).
      → Donc en temps de domination de ZON (avec olam ha-ba) :
        chasadim zacharim = TZADIKIM YOSHVIM ; gevurot = ATAROTEIHEM (couronnes).
      → Architecture : eschatologic future = revelation-mode dominant.
      → Pattern : Bina = futur revele.
    type: déduction_scripturaire
