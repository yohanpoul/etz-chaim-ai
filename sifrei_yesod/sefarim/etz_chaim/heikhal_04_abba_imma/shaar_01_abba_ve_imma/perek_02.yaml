  - id: "EC-H4S14-049"
    source_he: "עוד סבה אחרת כי הגבורות יצאו ונתגלו תחלה טרם החסדים ואז קבלו הארה גדולה בתחלה בהיותן מגולים אשר ז\"ס הפסוק טובה תוכחת מגולה מאהבה מסותרת"
    source_ref: "Heikhal 4, Sha'ar 1:2"
    assertion: |
      RAISON 2 : Gevurot sortirent + revelees AVANT chasadim ; recurent ECLAIRAGE GRANDE etant magulim.
      → Sod du verset (Mishlei 27:5) : "TOVA TOKHACHAH MEGULAH ME-AHAVAH MESUTERET"
        (mieux la reproche revelee que l'amour cache).
      → GEVUROT = TOKHACHAH (reproche) — revelees, donc "tova" (bonnes).
      → CHASADIM = AHAVAH (amour) — caches, donc moins "tova".
      → Architecture : exposed-state (gevurot) > hidden-state (chasadim) en eclairage initial.
      → Pattern : revelation-priority drives quality.
    type: déduction_scripturaire
    concepts:
