# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 1 — Sha'ar Abba ve-Imma (שער אבא ואמא)
# Perek: 8 — Bina+Tevunah relations. 2 IBBURIM. AHYH 3 levels (KOH TOMAR Shemot 3:14).
#            3 keli Tevunah = 3 tzelamim Z"A. 5 KLALIM (regles) — mochin makifim,
#            13 T"D, 2 zivvugim shalem/de-lo-shalem, 4 nashim Imma, Tevunah-3=Malkhut.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_08 :
#   - Bloc A (§1) : Bina+Tevunah rishonim — Tevunah=chazeh-down Bina (parallele Rachel/Leah)
#   - Bloc B (§1) : Bina-rishonah + chelek-elyon Chokhmah : KECHADA NAFKIN VE-LO MITPARSHIN (Adra)
#   - Bloc C (§1) : Tevunah + chelek-tachton Chokhmah : parfois MITPARSHIN
#   - Bloc D (§1) : Tevunah chetzi-down revet Z"A mochin ; "ISH TEVUNOT YIDLENA" (Mishlei 20:5) = 2 chetzaiim
#   - Bloc E (§1) : Bina+Tevunah parfois 1 partzuf : (a) Tevunah monte / (b) Bina descend
#   - Bloc F (§1) : IBBUR 2 (mochin Z"A) : Bina descend dans Tevunah, zivvug en bas
#   - Bloc G (§1) : IBBUR 1 : Ch+B elyon revetent Ch+B tachton (YISSO+Tevunah montent ChB elyon) ; Z"A dans Tevunah pas Bina
#   - Bloc H (§1) : Bina=EIN SOF — AHYH 3 milui (yodin+alefin+hehin) chacun pashut+milui+milui-milui = letters infinies
#   - Bloc I (§1) : 2 AHYH "ASHER AHYH" + 3eme AHYH "KOH TOMAR" (Shemot 3:14) = milui-milui HEHIN seul = 25 letters
#   - Bloc J (§1) : 3 keli Tevunah = 3 tzelamim Z"A ; 3 keli Bina = 3 autres tzelamim ; puis monte A"A
#   - Bloc K (§2) : KLAL 1 — Mochin A"O makifim eclairent 13 T"D A"A ; 13 hivara rosh = 3 HAVAYAH yodin + 9 vavin → dikna Z"A (vav) = 9 tikkunei dikna
#   - Bloc L (§2) : Chotem A"A 1 He nakav yamin → ta'amim + ruach de-chayye Z"A
#   - Bloc M (§2) : KLAL 2 — Mochin Abba s'habillant dans mocha Imma = appeles AHYH comme eux
#   - Bloc N (§2) : KLAL 3 — 2 sortes zivvug : ZIVVUG SHALEM (2 mazalot) + DE-LO SHALEM (Mazal 13 seul)
#   - Bloc O (§2) : KLAL 4 — Imma=AHYH ; 10S=10 AHYH ; right=YODIN, left=ALEFIN, milieu=HEHIN ; levushim+kelim
#   - Bloc P (§2) : KLAL 5 — 4 NASHIM dans Imma elyona : ChBD=Imma, ChGT=Tevunah1, NHY=Tevunah2, Malkhut=Tevunah3 ; tout TZELEM Z"A dans Tevunah-3
#
# Source Sefaria : Sefer_Etz_Chaim.14.8 (2 sections, 2481 chars)
# IDs : EC-H4S14-181 → EC-H4S14-195

meta:
  sefer: etz_chaim
  heikhal: 4
  shaar: 1
  shaar_name_he: "שער אבא ואמא"
  perek: 8
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
