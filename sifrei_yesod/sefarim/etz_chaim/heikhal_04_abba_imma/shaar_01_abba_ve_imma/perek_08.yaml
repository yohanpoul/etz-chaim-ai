  version: 1
  strates: ["base"]
  note: "Bina+Tevunah relations — Tevunah=chazeh-down Bina (parallele Rachel/Leah). Bina-rishonah+Chokhmah-haut KECHADA NAFKIN ; Tevunah+Chokhmah-bas parfois mitparshin. Tevunah chetzi-down revet Z\"A mochin ('ISH TEVUNOT YIDLENA' Mishlei 20:5). 2 IBBURIM : IBBUR 1 = Ch+B elyon revetent Ch+B tachton (YISSO+Tevunah) ; IBBUR 2 = Bina descend dans Tevunah, zivvug en bas. Bina=EIN SOF (AHYH 3 milui infinis). 'KOH TOMAR' (Shemot 3:14) = 3eme AHYH milui-milui HEHIN. 3 keli Tevunah = 3 tzelamim Z\"A. 5 KLALIM : (1) Mochin A\"O makifim eclairent 13 T\"D A\"A ; (2) Mochin Abba dans mocha Imma = AHYH ; (3) 2 zivvugim shalem/de-lo-shalem ; (4) Imma=AHYH 10S yodin/alefin/hehin par cote ; (5) 4 NASHIM Imma : ChBD=Imma, ChGT=Tevunah1, NHY=Tevunah2, Malkhut=Tevunah3."

