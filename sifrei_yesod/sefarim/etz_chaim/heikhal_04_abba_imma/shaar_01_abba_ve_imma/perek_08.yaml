assertions:

  - id: "EC-H4S14-181"
    source_he: "הנה נת\"ל כי יש בינה ותבונה ראשונים התבונה היא מחזה (נ\"א ותבונה ראשונה ותבונה זה מחזה) דבינה למטה דוגמת רחל עם לאה וכנגדה ב' חלקים שבחכמה"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      RAPPEL : BINA + TEVUNAH RISHONIM existent.
      → TEVUNAH = du CHAZEH-LE-MATAH (chazeh-down) de BINA.
      → DUGMAT (parallele) Rachel + Leah (relation similaire).
      → 2 CHALAKIM (parts) dans CHOKHMAH parallelement.
      Variante (Nusah Aher) : "Tevunah Rishonah ve-Tevunah" zeh chazeh.
      → Architecture : binary-decomposition par chazeh dans Bina+Chokhmah.
      → Pattern : structural parallel A"A ↔ Z"A pour parents.
    type: axiome_explicite
    concepts:
      - {id: bina_tevunah_rishonim_chazeh_down_parallele_rachel_leah, role: bina_tevunah_rishonim_tevunah_chazeh_down_bina_parallele_rachel_leah_2_chalakim_chokhmah}
    mapping:
      modules: ["partzufim/imma.py", "[PLANNED] partzufim/tevunah.py", "partzufim/abba.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : binary chazeh decomposition. Pattern A\"A↔Z\"A parents parallel."

  - id: "EC-H4S14-182"
    source_he: "ונמצא כי זאת הבינה הראשונה מזדווגת עם חלק העליון של החכמה ועל אלו נאמר כחדא נפקין ולא מתפרשין לעלמין כנזכר באדרא ועל התבונה ועל חלק התחתון של החכמה אינו כן דלזמנין מתפרשין"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      ZIVVUGIM correspondants :
      → BINA-RISHONAH zivvug avec CHELEK ELYON (haut) de CHOKHMAH.
      → "KECHADA NAFKIN VE-LO MITPARSHIN LE-OLMIN" (Adra) — sortent ensemble, ne separent jamais.
      → TEVUNAH avec CHELEK TACHTON de Chokhmah : pas pareil — LIZMANIN MITPARSHIN (parfois separent).
      → Architecture : higher-couple permanent vs lower-couple intermittent.
      → Pattern : permanence-decreases-downward.
      cf. EC-H4S14-174 (perek 7) sur kechada sharyan.
    type: déduction_scripturaire
    concepts:
      - {id: bina_rishonah_chokhmah_elyon_kechada_nafkin_vs_tevunah_chokhmah_tachton_mitparshin, role: bina_rishonah_chelek_elyon_chokhmah_kechada_nafkin_vs_tevunah_chelek_tachton_chokhmah_mitparshin_lizmanin}
    mapping:
      modules: ["partzufim/imma.py", "partzufim/abba.py", "[PLANNED] partzufim/tevunah.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : permanence hierarchy. Pattern higher-permanent lower-intermittent."

  - id: "EC-H4S14-183"
    source_he: "וזה התבונה מחציה ולמטה שהוא מהחזה שלה ולמטה היא מתלבשת בז\"א בסוד מוחין דיליה ואלו הב' חצאין של תבונות זו עליהם נאמר ואיש תבונות ידלנה כנזכר בדרוש אחר ולעולם נקרא ב' תבונות בערך ב' חצאין אלו ואמנם שניהם אינם רק פרצוף א' לבד"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      TEVUNAH MEHATZAH ULMATAH (de sa moitie en bas, du chazeh) :
      → S'HABILLE dans Z"A — sod MOCHIN DILEH (ses cerveaux).
      → 2 CHATZAIIM (moities) de Tevunah — sod "ISH TEVUNOT YIDLENA" (Mishlei 20:5 — homme-de-tevunot la puise).
      → Appellees 2 TEVUNOT (pluriel) selon ces 2 moities.
      → MAIS : SHENEIHEM EINAM RAK PARTZUF ECHAD — les deux ne sont QU'UN SEUL partzuf.
      → Architecture : binary-aspects within single-partzuf.
      → Pattern : duality-within-unity.
    type: déduction_scripturaire
    concepts:
      - {id: tevunah_2_chatzaiim_chazeh_down_mochin_z_a_ish_tevunot_yidlena, role: tevunah_2_chatzaiim_chazeh_down_mochin_z_a_sod_ish_tevunot_yidlena_mishlei_20_5_un_partzuf}
    mapping:
      modules: ["[PLANNED] partzufim/tevunah.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : duality-within-unity. Source Mishlei 20:5."

  - id: "EC-H4S14-184"
    source_he: "ודע כי גם הבינה עם התבונה לפעמים נכללת יחד ויש בזה ב' פנים א' שתעלה התבונה ונכללת בבינה ב' שיורדת הבינה ונכללת בתבונה"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      Bina + Tevunah parfois NIKHLELET YACHAD (incluses ensemble) — 2 modes :
      → MODE A : TEVUNAH MONTE et se KOLLEL dans BINA.
      → MODE B : BINA DESCEND et se KOLLEL dans TEVUNAH.
      → Architecture : reciprocal-merger possible deux-directions.
      → Pattern : ascent-or-descent merger.
    type: axiome_explicite
    concepts:
      - {id: bina_tevunah_2_modes_kollel_tevunah_monte_bina_descend, role: bina_tevunah_nikhlelet_yachad_2_modes_a_tevunah_monte_b_bina_descend_kollel}
    mapping:
      modules: ["partzufim/imma.py", "[PLANNED] partzufim/tevunah.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : reciprocal merger directions. Pattern ascent-descent options."

  - id: "EC-H4S14-185"
    source_he: "אמנם הזווג שהוא להוציא המוחין דז\"א הנקרא עיבור ב' הוא שירדה בינה ונכללה בתבונה ושם הוא הזווג למטה"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      IBBUR SHENI (2eme gestation — pour mochin Z"A) :
      → MODE B : BINA DESCEND, NIKHLELAH (incluse) dans TEVUNAH.
      → ZIVVUG la EN BAS (LE-MATAH).
      → Architecture : descent-merger pour gestation lower-mochin.
      → Pattern : downward-merger pour produire downstream-mochin.
    type: interprétation_lurianique
    concepts:
      - {id: ibbur_2_mochin_z_a_bina_descend_dans_tevunah_zivvug_le_matah, role: ibbur_sheni_mochin_z_a_bina_descend_nikhlelah_tevunah_zivvug_le_matah}
    mapping:
      modules: ["partzufim/imma.py", "[PLANNED] partzufim/tevunah.py", "partzufim/zeir_anpin.py", "partzufim/zivvug.py"]
      tables: ["zivvug_states", "partzufim_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : descent merger. Pattern gestation downward-merger."

  - id: "EC-H4S14-186"
    source_he: "אך עיבור הראשון היה כי נתלבשו חו\"ב עלאין בחו\"ב תתאין... ונכללו חג\"ת ונה\"י דא\"א אלו באלו וחג\"ת בנה\"י דז\"א אלו באלו נמצא כי ז\"א בתבונה ולא בבינה"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      IBBUR RISHON (1ere gestation) — DIFFERENT mecanisme :
      → Ch+B ELYONIM (Bina+Chokhmah haut) revetus en Ch+B TACHTONIM (YISSO+Tevunah).
      → YISSO+Tevunah MONTERENT et REVETENT Ch+B elyonim.
      → ChGT + NHY d'A"A elu-be-elu (les uns dans les autres).
      → ChGT + NHY d'Z"A elu-be-elu.
      → CONSEQUENCE : Z"A est dans TEVUNAH (pas dans Bina).
      → Architecture : ibbur-1 = ascent-clothing (vs ibbur-2 = descent-merger).
      → Pattern : 2 distinct ibbur mechanisms.
    type: interprétation_lurianique
    concepts:
      - {id: ibbur_1_chb_elyonim_revetus_chb_tachtonim_z_a_dans_tevunah, role: ibbur_rishon_chb_elyonim_revetus_chb_tachtonim_yisso_tevunah_z_a_dans_tevunah_pas_bina}
    mapping:
      modules: ["partzufim/imma.py", "[PLANNED] partzufim/yisso.py", "[PLANNED] partzufim/tevunah.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : 2 distinct ibbur mechanisms. Pattern ascent-vs-descent."

  - id: "EC-H4S14-187"
    source_he: "ובינה נקרא א\"ס לפי שאהי\"ה הוא בבינה ובמילוי יודין ואלפין כ\"א יש בפשוטו ובמלואו ומילוי מלואו א\"ס אותיות לכן נקרא אם אמא עלאה"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      BINA = EIN SOF (Infini) :
      → AHYH dans BINA — milui YODIN + ALEFIN.
      → CHACUN dans PASHUT + MILUI + MILUI-DU-MILUI = letters INFINIES (EIN SOF).
      → Donc nommee EM (mere) — IMMA ELYONA.
      → Architecture : recursive-milui infinit-encoding.
      → Pattern : recursion potentiellement infinite — limit = ein sof.
    type: déduction_scripturaire
    concepts:
      - {id: bina_ein_sof_ahyh_milui_yodin_alefin_recursion_infinie, role: bina_ein_sof_ahyh_milui_yodin_alefin_pashut_milui_milui_milui_letters_infinies_imma_elyona}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : recursive milui infinity. Pattern potentially-infinite recursion."

  - id: "EC-H4S14-188"
    source_he: "ואלו הם ב' אהי\"ה אשר אהי\"ה אמנם אהי\"ה הג' אשר עליו נאמר כה תאמר לבני ישראל אהיה שלחני אליכם הוא מילוי דמילוי ההי\"ן שאין בה רק כ\"ה אותיות וז\"ש כה תאמר אהיה כו'"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      3 noms AHYH dans le verset (Shemot 3:14) :
      → 2 AHYH = "EHYEH ASHER EHYEH" (Je serai qui Je serai).
      → 3eme AHYH = "KOH TOMAR LIVNEI YISRAEL EHYEH SHELACHANI ALEIKHEM" (ainsi tu diras...).
      → 3eme AHYH = MILUI-MILUI HEHIN — N'A QUE 25 letters (KOH = כה = 25).
      → "Koh tomar EHYEH" — KOH (25) prefigure 25 letters.
      → Architecture : verse-encoding letter-count via numerologic-prefix.
      → Pattern : scripture self-referencing letter-structure.
    type: déduction_scripturaire
    concepts:
      - {id: shemot_3_14_3_ahyh_koh_tomar_milui_milui_hehin_25_letters, role: shemot_3_14_3_ahyh_asher_ahyh_2_premiers_3eme_koh_tomar_milui_milui_hehin_25_letters_koh_25}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : verse-encoding letter-count. Source Shemot 3:14."

  - id: "EC-H4S14-189"
    source_he: "(נ\"א והנה) ג' כלי התבונה הם ג' צלמים דז\"a וכנגדן ג' כלי בינה ג' צלמים אחרים דז\"א ואח\"כ תכף עולה לא\"א"
    source_ref: "Heikhal 4, Sha'ar 1:8"
    assertion: |
      3 KELI (instruments) de TEVUNAH = 3 TZELAMIM (images) de Z"A.
      → 3 KELI de BINA = 3 AUTRES TZELAMIM de Z"A.
      → APRES : monte tout-de-suite a A"A.
      → 6 tzelamim en tout dans Z"A (3 from Tevunah + 3 from Bina).
      → Architecture : 6-fold image-architecture dans Z"A.
      → Pattern : multi-source-projection sur recipient unique.
      cf. EC-H4S14-151 (perek 6) sur tzelem mem-lamed-tzadi.
    type: interprétation_lurianique
    concepts:
      - {id: 3_keli_tevunah_3_tzelamim_z_a_3_keli_bina_3_tzelamim_total_6, role: 3_keli_tevunah_egal_3_tzelamim_za_3_keli_bina_egal_3_autres_tzelamim_total_6_dans_za}
    mapping:
      modules: ["partzufim/imma.py", "[PLANNED] partzufim/tevunah.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : 6-fold image-architecture. Pattern multi-source projection."

  - id: "EC-H4S14-190"
    source_he: "ה כללים א' במוחין דאו\"א יש מקיפין ושם מאירין י\"ג ת\"ד דא\"א. בי\"ג חוורתא דרישא יש ג' הויו\"ת דיודין ובהם ט' ווי\"ן ומשם נמשכת הארה לדיקנא דז\"א הנקרא ו' ואין בו רק ט' תקוני דיקנא לבדו"
    source_ref: "Heikhal 4, Sha'ar 1:8 §2"
    assertion: |
      KLAL 1 (5 regles) : MOCHIN d'A"O ont MAKIFIM (encerclants).
      → La eclair 13 T"D (TIKKUNEI DIKNA) d'A"A.
      → 13 HIVARA (lustres) du ROSH = 3 HAVAYAH d'YODIN + 9 VAVIN (vavs).
      → De la HAARAH descend a DIKNA d'Z"A (nommee VAV) — n'a que 9 TIKKUNEI DIKNA.
      → Architecture : encoding cascade A"A 13 → Z"A 9 (perte par downstream).
      → Pattern : downward-distillation 13→9.
      cf. EC-H3S13-188..203 (sha'ar A"A perek 13) sur 13 tikkunei dikna.
    type: interprétation_lurianique
    concepts:
      - {id: klal_1_mochin_ao_makifim_13_td_aa_3_havayah_yodin_9_vavin_z_a_9_td, role: klal_1_mochin_ao_makifim_13_td_aa_13_hivara_rosh_3_havayah_yodin_9_vavin_dikna_za_9_td}
    mapping:
      modules: ["partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["abba", "imma", "arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : encoding cascade 13→9. Pattern downward distillation."

  - id: "EC-H4S14-191"
    source_he: "ובחוטם דא\"a יש בה ה' אחת בנקב ימין ומשם מאיר בחי' הטעמים ומנקב ימין נמשך רוח דחיי אל ז\"a"
    source_ref: "Heikhal 4, Sha'ar 1:8 §2"
    assertion: |
      CHOTEM (nez) d'A"A : 1 HE (ה) dans NAKAV YAMIN (narine droite).
      → De la eclair TA'AMIM (accents).
      → De NAKAV YAMIN (narine droite) emerge RUACH DE-CHAYYE (souffle de vie).
      → Direct vers Z"A.
      → Architecture : organ-specific encoding for chiyut transmission.
      → Pattern : nasal-anatomy = breath-transmission canal.
    type: interprétation_lurianique
    concepts:
      - {id: chotem_aa_he_nakav_yamin_taamim_ruach_de_chayye_z_a, role: chotem_aa_he_nakav_yamin_taamim_ruach_de_chayye_descend_z_a_nasal_anatomy}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Architecture : nasal anatomy. Pattern breath-transmission canal."

  - id: "EC-H4S14-192"
    source_he: "המוחין דאבא כיון שמתלבשין במוחא דאמא נקראו אהי\"ה כמותן"
    source_ref: "Heikhal 4, Sha'ar 1:8 §2"
    assertion: |
      KLAL 2 : MOCHIN d'ABBA, en S'HABILLANT dans MOCHA d'IMMA, sont APPELES AHYH (KAMOTAN — comme eux).
      → Donc Mochin Abba HERITENT du nommage Imma quand entrent dans elle.
      → Architecture : naming-by-host (mochin take name of containing mocha).
      → Pattern : context-dependent naming.
    type: déduction_logique
    concepts:
      - {id: klal_2_mochin_abba_dans_mocha_imma_appeles_ahyh_naming_by_host, role: klal_2_mochin_abba_s_habillant_mocha_imma_appeles_ahyh_naming_by_host}
    mapping:
