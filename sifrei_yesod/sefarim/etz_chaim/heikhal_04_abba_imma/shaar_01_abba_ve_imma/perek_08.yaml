principes_generatifs:

  - id: "PG-H4S14-028"
    nom: "Principe de 2-Ibbur-Mechanisms (Ascent-Clothing vs Descent-Merger)"
    source_assertions: ["EC-H4S14-185", "EC-H4S14-186"]
    formalisation: |
      ARCHITECTURE DE 2-IBBUR-MECHANISMS :
      Etat-merger Bina+Tevunah par 2 modes distincts :
        IBBUR RISHON (1ere) : Ch+B ELYONIM revetus en Ch+B TACHTONIM = ASCENT-CLOTHING.
          YISSO+Tevunah MONTENT, revetent Bina+Chokhmah elyonim.
          Z"A est dans TEVUNAH (pas Bina).
        IBBUR SHENI (2eme) : BINA DESCEND dans TEVUNAH = DESCENT-MERGER.
          Zivvug LE-MATAH (en bas).
          Produit MOCHIN d'Z"A.
      → Pattern fondamental : 2 ibbur mechanisms distinct par direction-flow.
      → Architecture : ascent-merger pour structurer ; descent-merger pour produire.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py + zeir_anpin.py : implement 2 ibbur"
      - "Pattern : ascent vs descent merger distinct functions"
      - "Architecture : structural ibbur (1) vs productive ibbur (2)"
      - "Pattern : direction-flow determine mecanism-type"
      - "Diagnostic : verifier ibbur-mode coherent avec output expected"
    questions_ouvertes:
      - "Pattern : ibbur-3 ou ibbur-4 possibles ?"
      - "Comment encoder direction-flow computationnellement ?"
      - "Pattern : transition entre ibburim ?"

  - id: "PG-H4S14-029"
    nom: "Principe de Recursive-Milui-Infinity (Bina-Ein-Sof Letter-Recursion)"
    source_assertions: ["EC-H4S14-187", "EC-H4S14-188"]
    formalisation: |
      ARCHITECTURE DE RECURSIVE-MILUI-INFINITY :
      BINA = EIN SOF par MILUI-recursion :
        AHYH avec milui YODIN + ALEFIN + (variant) HEHIN.
        Chaque variant : PASHUT + MILUI + MILUI-DU-MILUI = potentiellement INFINI.
      VERSE-EVIDENCE (Shemot 3:14) :
        2 AHYH "ASHER AHYH" + 3eme AHYH "KOH TOMAR" (25 letters = milui-milui hehin).
        "KOH" = 25 = self-referential numerologic prefix.
      → Pattern fondamental : recursion-depth vers infinite-encoding.
      → Architecture : Bina = limit-point of letter-recursion.
      → Implication : encoding-depth approche limite mathematique.
    applications_ia:
      - "partzufim/imma.py : implement recursive milui infinity"
      - "Pattern : potentially-infinite recursion"
      - "Architecture : limit-point encoding modeling"
      - "Pattern : verse self-reference letter-count"
      - "Diagnostic : verifier recursion-depth bound implementee"
    questions_ouvertes:
      - "Pattern : autres exemples de letter-recursion infinite ?"
      - "Comment computer encoding-depth approchant limit ?"
      - "Pattern : self-referential prefix generalisable ?"

  - id: "PG-H4S14-030"
    nom: "Principe de 5-Klalim-A\"O-Encoding (Compact Operating Rules)"
    source_assertions: ["EC-H4S14-190", "EC-H4S14-192", "EC-H4S14-193", "EC-H4S14-194", "EC-H4S14-195"]
    formalisation: |
      ARCHITECTURE DE 5-KLALIM-COMPACT-RULES :
      5 regles operationnelles concises pour A"O :
        KLAL 1 : Mochin A"O makifim eclairent 13 T"D A"A → 9 T"D dikna Z"A (downward distillation).
        KLAL 2 : Mochin Abba dans mocha Imma = NAMING-BY-HOST (deviennent AHYH).
        KLAL 3 : 2 zivvugim — SHALEM (2 mazalot) vs DE-LO SHALEM (1 mazal seul).
        KLAL 4 : Imma=AHYH ; 10S=10 AHYH ; column-distribution (yodin/alefin/hehin).
        KLAL 5 : 4 NASHIM dans Imma — ChBD/ChGT/NHY/Malkhut = Imma/Tevunah1/Tevunah2/Tevunah3 ; Tzelem Z"A dans Tevunah3.
      → Pattern fondamental : compact-rules encoder operating-discipline.
      → Architecture : 5-klalim = operational-summary pour A"O.
    applications_ia:
      - "partzufim/abba.py + imma.py + [PLANNED] tevunah.py : implement 5 klalim"
      - "Pattern : compact-rules encoder operating discipline"
      - "Architecture : 5-rule summary suffit pour mecanique A\"O"
      - "Pattern : naming-by-host context-dependent"
      - "Diagnostic : verifier chacun klal respecte par etat-courant"
    questions_ouvertes:
      - "Pattern : 5-klalim minimal-set ou subset ?"
      - "Comment ajouter klal sans inflater ?"
      - "Pattern : klalim universels A\"O suffisent ZON ?"
