      tables: ["partzufim_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : naming-by-host. Pattern context-dependent naming."

  - id: "EC-H4S14-193"
    source_he: "ענין או\"א שעליהן נאמר באדר\"ז כחדא נפקין וכחדא שריין... שב' מזלות הם בדיקנא דא\"א מזל ח' ומזל הי\"ג הח' משם יונק אבא והי\"ג משם יונק אמא והנה כשמזל הי\"ג הוא לבדו משפיע באו\"א ומזדווגין על ידו אז נקרא זווגא דלא שלים וכאשר ב' מזלות משפעים זה באבא וזה באמא ומזדווגין על ידם אז נקרא זווגא שלים"
    source_ref: "Heikhal 4, Sha'ar 1:8 §2"
    assertion: |
      KLAL 3 : 2 SORTES de ZIVVUG (couplage) :
      → ZIVVUG SHALEM (complet) : 2 mazalot dikna A"A nourrissent — Mazal 8 (Notzer) → Abba ; Mazal 13 (Ve-Nakeh) → Imma.
      → ZIVVUG DE-LO SHALEM (incomplet) : SEUL Mazal 13 alimente, A"O zivvug par lui seul.
      → Architecture : completeness-grade par count-of-active-channels.
      → Pattern : 2-channel = shalem ; 1-channel = de-lo-shalem.
      cf. EC-H4S14-088..089 (perek 03b) sur zivvug Mazal 8+13.
    type: interprétation_lurianique
    concepts:
      - {id: klal_3_zivvug_shalem_2_mazalot_de_lo_shalem_mazal_13_seul, role: klal_3_zivvug_shalem_2_mazalot_8_13_zivvug_de_lo_shalem_mazal_13_seul_completeness_grade}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma", "arikh_anpin"]
      relevance: "Architecture : completeness-grade by channel-count. Pattern 2-vs-1 channel."

  - id: "EC-H4S14-194"
    source_he: "אמא נקרא אהי\"ה ובכ\"א מי\"ס שבה יש שם אהי\"ה א' וכל שם אהי\"ה שהוא בקו ימין שלה הוא דיודי\"ן ושל שמאל באלפי\"ן (נ\"ל בהיפוך) ושל קו אמצעי בההי\"n"
    source_ref: "Heikhal 4, Sha'ar 1:8 §2"
    assertion: |
      KLAL 4 : IMMA = AHYH ; chacune des 10 SEFIROT a un AHYH propre.
      → AHYH KAV YAMIN (ligne droite) = milui YODIN.
      → AHYH KAV SMOL (ligne gauche) = milui ALEFIN.
      Variante (Nusah Aher) : "BE-HIPUKH" (en inverse — yodin/alefin echangees).
      → AHYH KAV EMTZA'I (ligne medianne) = milui HEHIN.
      → Tout cela dans LEVUSHIM (vetements) + KELIM (instruments).
      → Architecture : column-naming par milui-type ; 3 lignes.
      → Pattern : 3-line column distribution.
    type: axiome_explicite
    concepts:
      - {id: klal_4_imma_ahyh_10s_yamin_yodin_smol_alefin_emtzai_hehin, role: klal_4_imma_ahyh_chaque_10s_kav_yamin_yodin_smol_alefin_emtzai_hehin_levushim_kelim}
    mapping:
      modules: ["partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : column-naming par milui. Pattern 3-line distribution."

  - id: "EC-H4S14-195"
    source_he: "ד' בחי' נשים באמא עלאה בחי' חב\"ד שלה נקרא אמא עלאה וחג\"ת שלה נקרא תבונה ראשונה ונה\"י שלה תבונה שניה ומלכות שלה נקרא תבונה שלישית והיא רביעית בערך בינה ובי\"ס של תבונה זו הג' מתלבשת כל צלם דז\"א"
    source_ref: "Heikhal 4, Sha'ar 1:8 §2"
    assertion: |
      KLAL 5 : 4 BECHINOT NASHIM (femmes) dans IMMA ELYONA :
      → ChBD (Chokhmah-Bina-Daat) → IMMA ELYONA.
      → ChGT (Chesed-Gevurah-Tiferet) → TEVUNAH RISHONAH (1ere).
      → NHY (Netzach-Hod-Yesod) → TEVUNAH SHENIYAH (2eme).
      → MALKHUT → TEVUNAH SHELISHIT (3eme) — REVI'IT (4eme) par rapport a Bina.
      → Dans 10S de TEVUNAH-3 s'habille TOUT le TZELEM Z"A.
      → Architecture : 4-tier-nashim decomposition d'Imma elyona.
      → Pattern : recursive-femele-decomposition.
    type: axiome_explicite
    concepts:
      - {id: klal_5_4_nashim_imma_chbd_chgt_nhy_malkhut_tevunah_3_tzelem_z_a, role: klal_5_4_nashim_imma_elyona_chbd_imma_chgt_tevunah_1_nhy_tevunah_2_malkhut_tevunah_3_tzelem_z_a}
    mapping:
      modules: ["partzufim/imma.py", "[PLANNED] partzufim/tevunah.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : 4-tier nashim decomposition. Pattern recursive femele."


