  sujet_principal: |
    Sha'ar HaZivvugim (Heikhal 4, Sefer Etz Chaim 15). 6 perakim systematiques sur :
    - 2 sortes zivvug A"O : PNIMI (neshamot) + CHITZON (malachim)
    - Sub-distinctions : PB"P shaveh OU hirkhanat ha-rosh
    - 2 buts : neshamot chadashot OR chiyut+mochin pour yeshanot
    - Apres CHURBAN : pas zivvug-pnimi pour neshamot chadashot ni A"O ni ZON
    - ZIVVUG SHALEM (2 mazalot dikna) vs ZIVVUGA DE-LO SHALEM (Mazal 13 seul)
    - AMA ROVETZET AL HA-EFROCHIM (Imma descend, couve)
    - 3 YICHUDIM ZON N"R : YHVH-AHYH (gadlut/Bina), YHVH-ELOKIM (yenikah), YHVH-ADNI (ibbur amidah lechash)
    - MITZVAT SHILUACH HA-KEN (Devarim 22:6-7) — sod ha-zivvug
