#   - Bloc J : Achor Bina ELOKIM-aspect visible SEULEMENT achor chetzi-down=4 sefirot TNHY
#   - Bloc K : ELOKIM=120 TZEIRUFIM split 4 chalakim × 30 each (4 noms ELOKIM)
#   - Bloc L : Bina nommee SAMEKH (=120 par autre lecture) car 120 tzeirufim
#   - Bloc M : "Orekh ha-yeriah 30 ba-amah ve-rochav 4" (Shemot 26:8) = 30×4=120 ELOKIM
#   - Bloc N : BUKHU=temura AHYH gematria D"L=4×30=120 ; eclairant achor
#   - Bloc O : Moshe kollel 120 tzeirufim ; 4 ELOKIM × 86 + 1 kollel = MoSHe gematria
#   - Bloc P : "BSHGM HU BaSaR HAYU YAMAV 120 SHANAH" (Bereshit 6:3) ; Tikkunim "BeShaGaM=MoSHe"
#   - Bloc Q : Moshe zakha la-Bina — bechinah complete (120 ans)
#   - Bloc R : Achor A"O elyonim s'etendent → YISSO+Tev panim=2 RIBUIM (184 KP"D + 544 TKM"D)
#   - Bloc S : Toujours panim=YOSHER, achor=CHESBON (mispar/ribua)
#   - Bloc T : YISSO+Tev panim=2 ribuim=TaSHKaH (728) ; A"O panim=REGEL (233) — achor-haut=panim-bas
#   - Bloc U : 184=PoKeD MIKEDeM (Bereshit 3:24 "vayishkan miKEDEM le-Gan Eden")
#   - Bloc V : 544=KaDMaT (Bereshit 2:8 "Kadmat Eden") ; "Achor ve-kedem tzartani" (Tehilim 139:5)
#
