# STRUCTURE §perek_06 :
#   - Bloc A : HAKDAMAT KLALUT — tachton monte chez elyon : elyon=panim, tachton=achor
#   - Bloc B : Tevunah sort ACHOR Bina elyona = SHEMOT ELOKIM (tous achor=ELOKIM)
#   - Bloc C : Zohar Acharei Mot 85 — Bina=RACHAMIM bilchodoi, mi-stra'ah(achor)=DININ MIT'ARIN
#   - Bloc D : Bina nommee ELOKIM dans Zohar = dans Tevunah-1 (sort achor=ELOKIM)
#   - Bloc E : Tev en bas → chitzonim achiza ; monte vers achor Bina elyon → pas d'achiza
#   - Bloc F : "SOMECH HASHEM LE-KOL HA-NOFLIM" (Tehilim 145:14) — NOFLIM=Tev+Z"A+Nukva
#   - Bloc G : Ne montent que par Bina-elyon=SAMEKH (sodtient les nofels)
