# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 2 — Sha'ar HaZivvugim (שער הזווגים)
# Perek: 5 — DALET-OKETZ-YISSO. 22 letters Chokhmah → Bina. Reverse YOD/HE
#            (niglet/ne'elemet). 2 CHESED (Tehilim 42:9). Garon=Bina A"A.
#            SAMEKH/MEM SETUMAH gematria. OLAM HA-BA (Tev) vs LE-ATID LAVO (Bina).
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_05 :
#   - Bloc A : DALET sur VAV en HE-rishona — OKETZ (epine) derriere = forme YOD = YISSO
#   - Bloc B : DALET divisee 3 chalakim : Yod-milieu + 2 VAVIN ; gematria 22 letters
#   - Bloc C : 22 letters = donnees par CHOKHMAH a BINA (alef-bet creation)
#   - Bloc D : YOD : Chokhmah niglet, Bina ne'elemet ; HE : Bina niglet, Chokhmah ne'elemet (REVERSE)
#   - Bloc E : RAISON : 2 keterim A"O sur GARON A"A (ou est BINA d'A"A)
#   - Bloc F : "Yomam yetzaveh Hashem chasdo" (Tehilim 42:9) — 2 chesed : ELYON (rosh dektafin) + standard
#   - Bloc G : CHESED-elyon = YOMA DE-CHULHU (Zohar) ; toujours cote-zachar
#   - Bloc H : Or-Garon → s'habille CHESED-elyon ; sortant : ABBA=CHESED ; BINA=GARON
#   - Bloc I : Garon plus haut que Chesed → Imma (Garon) plus elevee — donc ne'elemet dans Yod
#   - Bloc J : Quand 2 zeroot A"A se manifestent : Chesed dans Gevurah → YISSO+Tevunah ; Abba TAMIR > Bina ; HE inverse
#   - Bloc K : Adra Zuta 290 — "le-vatar ishtkachu de-Chokhmah=Abba Bina=Imma" apres atpasht zeroot
#   - Bloc L : 3 chalakim Bina = Bina + Tev-1 + Tev-2 — UN partzuf
#   - Bloc M : IBBUR RISHON Z"A (3 kollel be-3) = dans Tev-1 (He-rishona)
#   - Bloc N : Tev-1 = chazeh-down partzuf-kollel = BETEN (ventre) ou foetus se forme
#   - Bloc O : Bina elyona = PAS HERIYON ni IBBUR
#   - Bloc P : Bina=SAMEKH (60) car 6S ChBD ChG × kelul 10
#   - Bloc Q : Tev-1=MEM SETUMAH (40) car 4 tachtonot × kelul 10 ; "yetiva revia al banin" Zohar
#   - Bloc R : Tev-1=OLAMA DE-ATEI (monde futur perpetuel) ; Bina=LE-ATID LAVO (reste en haut)
#   - Bloc S : Mochin elyon Z"A dans NHY Bina = LE-ATID LAVO ; NHY Tevunah = TOUJOURS-OLAM-HA-BA
#   - Bloc T : Sefer Bahir : R. Rachumai "OLAM SHE-KVAR BA" (deja venu) — perpetuel
#
# Source Sefaria : Sefer_Etz_Chaim.15.5 (1 section, 2867 chars)
# IDs : EC-H4S15-071 → EC-H4S15-088

