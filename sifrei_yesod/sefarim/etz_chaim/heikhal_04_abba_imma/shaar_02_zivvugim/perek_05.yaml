      relevance: "Architecture : eschatologic 2-tier. Pattern continu vs ultime."

  - id: "EC-H4S15-088"
    source_he: "בס' הבהיר ששאלו התלמידים לר' רחומאי מהו עולם הבא א\"ל עולם שכבר בא"
    source_ref: "Heikhal 4, Sha'ar 2:5"
    assertion: |
      Sefer HA-BAHIR — disciples questionnent R. RACHUMAI :
