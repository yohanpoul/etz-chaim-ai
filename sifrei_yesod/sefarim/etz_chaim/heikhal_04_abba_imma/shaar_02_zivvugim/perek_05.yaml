  strates: ["base"]
  note: "DALET sur VAV en HE-rishona = OKETZ derriere = YISSO. DALET 3 chalakim (Yod+2 VAVIN) = 22 letters Chokhmah → Bina. REVERSE YOD vs HE : YOD Chokhmah niglet/Bina ne'elemet ; HE Bina niglet/Chokhmah ne'elemet. RAISON : 2 keterim A\"O sur GARON A\"A (=Bina A\"A) ; Imma vient de Garon (plus haut que Chesed=Abba). 2 CHESED (Tehilim 42:9) : elyon ROSH DEKTAFIN (yoma de-chulhu Zohar) + standard. Apres atpasht zeroot : Chesed dans Gevurah → YISSO+Tev ; Abba TAMIR > Bina (Adra Zuta 290). 3 chalakim Bina+Tev-1+Tev-2=un partzuf. IBBUR RISHON Z\"A=Tev-1 (He-rishona, beten). Bina=SAMEKH (60=6S ChBD ChG) ; Tev-1=MEM SETUMAH (40=4 tachtonot) ; YETIVA REVIA AL BANIN. Tev-1=OLAMA DE-ATEI (perpetuel) vs Bina=LE-ATID LAVO. Sefer Bahir R. Rachumai OLAM SHE-KVAR BA."

