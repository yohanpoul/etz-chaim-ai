  - id: "EC-H4S15-086"
    source_he: "תבונה ראשונה עה\"ב והטעם כי הנקבות נקראות עולם... וזה התבונה נקרא עולם הבא עלמא דאתי לפי שהיא יורדת למטה ומתגלית תמיד"
    source_ref: "Heikhal 4, Sha'ar 2:5"
    assertion: |
      TEVUNAH-1 = OLAM HA-BA (monde a venir) :
