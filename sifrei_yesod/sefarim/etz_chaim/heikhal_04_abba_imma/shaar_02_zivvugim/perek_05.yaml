  - id: "EC-H4S15-087"
    source_he: "בינה נקראת לע\"ל כי המוחין עליונים דז\"א המלובשים בנה\"י דבינה עליונה הם עתידין לבא אח\"כ... ומוחין דנצח הוד יסוד דתבונה הם נמשכין בו תמיד"
    source_ref: "Heikhal 4, Sha'ar 2:5"
    assertion: |
      DISTINCTION OLAM HA-BA vs LE-ATID LAVO :
      → BINA elyona = LE-ATID LAVO (futur ultime).
      → Mochin elyonim Z"A dans NHY de Bina elyona = ATIDIN LAVO ACHAR KAKH (a venir plus tard) — quand Z"A grandit a niveau Bina.
      → Mochin de NHY de TEVUNAH = TAMID NIMSHAKHIN (continuellement traines).
      → OLAM HA-BA = continu (Tevunah) ; LE-ATID LAVO = a venir une fois (Bina).
      → Architecture : 2-tier eschatologie (continu vs ultime).
      → Pattern : eschatologic-tier-distinction.
