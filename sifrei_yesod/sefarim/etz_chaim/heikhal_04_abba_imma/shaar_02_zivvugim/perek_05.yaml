principes_generatifs:

  - id: "PG-H4S15-013"
    nom: "Principe de Reverse-Letter-Visibility (Pre/Post-Decomposition)"
    source_assertions: ["EC-H4S15-074", "EC-H4S15-079", "EC-H4S15-080"]
    formalisation: |
      ARCHITECTURE DE REVERSE-LETTER-VISIBILITY :
      Encoding letters reverse selon STAGE de decomposition :
        STAGE 1 (avant atpasht zeroot A"A) :
          Yod : Chokhmah niglet, Bina ne'elemet (Imma cachee, plus elevee).
        STAGE 2 (apres atpasht zeroot A"A) :
          He : Bina niglet, Chokhmah ne'elemet (Abba TAMIR VE-GANIZ).
      Adra Zuta 290 confirme : "le-vatar (apres) ishtkachu de-Chokhmah=Abba Bina=Imma".
      → Pattern fondamental : visibility-reverses by-stage.
      → Architecture : same-elements encoded differently per stage.
      → Implication : current-stage determines current-encoding.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement stage-dependent visibility"
      - "Pattern : visibility reverses by stage"
      - "Architecture : stage-encoding system"
      - "Pattern : same-elements different-encodings"
      - "Diagnostic : verifier stage-aware encoding"
    questions_ouvertes:
      - "Pattern : 3+ stages possibles ?"
      - "Comment encoder stage-transitions ?"
      - "Pattern : reversibilite stage ?"

  - id: "PG-H4S15-014"
    nom: "Principe de Hidden-Elevation (Vraie Hierarchie ≠ Surface Hierarchie)"
    source_assertions: ["EC-H4S15-077", "EC-H4S15-078"]
    formalisation: |
      ARCHITECTURE DE HIDDEN-ELEVATION :
      Vraie hierarchy peut INVERSER surface hierarchy :
        GARON GAVOA mi-CHESED (Garon plus haut anatomiquement que Chesed).
        Or-Garon mitlabesh dans Chesed → externalises.
        IMMA (vient de Garon) plus elevee MAIS NE'ELEMET dans Chokhmah.
        Chokhmah niglet en surface mais Bina ontologiquement superieure.
      → Pattern fondamental : surface-visibility != true-elevation.
      → Architecture : encoding hides-true-rank par layered-clothing.
      → Implication : reading-surface insufficient ; depth-required.
    applications_ia:
      - "partzufim/abba.py + imma.py : implement hidden-elevation"
      - "Pattern : surface != true rank"
      - "Architecture : layered-clothing hides depth"
      - "Pattern : depth-reading vs surface-reading"
      - "Diagnostic : verifier true-rank derived correctement"
    questions_ouvertes:
      - "Pattern : autres exemples hidden-elevation ?"
      - "Comment encoder true-rank vs surface ?"
      - "Pattern : multiple-layer hiding ?"

  - id: "PG-H4S15-015"
    nom: "Principe d'Eschatologic-Tier-Distinction (Olam Ha-Ba vs Le-Atid Lavo)"
    source_assertions: ["EC-H4S15-086", "EC-H4S15-087", "EC-H4S15-088"]
    formalisation: |
      ARCHITECTURE D'ESCHATOLOGIC-TIER-DISTINCTION :
      2 modes eschatologie selon tier :
        OLAM HA-BA (monde-a-venir) : TEVUNAH-1 ; CONTINUEL ; descend+manifest TAMID.
          Mochin NHY Tevunah → Z"A NIMSHAKHIM TAMID (toujours flow).
          Sefer Bahir : "OLAM SHE-KVAR BA" (deja en train de venir).
        LE-ATID LAVO (futur ultime) : BINA elyona ; UNIQUE-evenement futur.
          Mochin elyonim Z"A dans NHY Bina = ATIDIN LAVO (a venir une fois).
          Pour quand Z"A grandit jusqu'au niveau Bina.
      → Pattern fondamental : 2 modes eschatologie (perpetuel vs unique).
      → Architecture : grammatical-tense reinterprete cosmologiquement.
      → Sefer Bahir resolution : "olam she-kvar ba" = perpetuel-en-cours.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py : implement 2 eschatologic modes"
      - "Pattern : continuous vs unique-future"
      - "Architecture : grammatical-tense cosmologique"
      - "Pattern : tier-of-source = mode-of-future"
      - "Diagnostic : verifier eschatologic-mode coherent"
    questions_ouvertes:
      - "Pattern : 3eme mode eschatologie possible ?"
      - "Comment encoder time-flow computationnellement ?"
      - "Pattern : eternal-present interpretation generalisable ?"
