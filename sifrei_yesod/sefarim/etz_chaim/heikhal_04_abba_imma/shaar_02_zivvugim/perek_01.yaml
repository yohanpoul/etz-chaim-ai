      relevance: "Architecture : 2 zivvugim hierarchical. Pattern structural hierarchy."

  - id: "EC-H4S15-008"
    source_he: "כאשר אמא הנה\"י שלה מתלבשין המוחין דז\"א בתוכם ואח\"כ מתלבשים הנה\"י דאמא תוך ז\"א ואז נקרא ואם רובצת על האפרוחים"
