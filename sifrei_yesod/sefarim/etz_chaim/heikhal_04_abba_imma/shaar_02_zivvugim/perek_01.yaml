      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : nested-clothing. Pattern recursive-clothing maternal-descent."

  - id: "EC-H4S15-009"
    source_he: "זה הזווג הב' נחלק לב' אופני הא' כאשר אמא מתלבשת בז\"א לבד והב' כאשר אמא מתלבשת במלכות עצמה נוקבא דז\"א ושניהן נקרא זווג אחד"
    source_ref: "Heikhal 4, Sha'ar 2:1 §3"
    assertion: |
      ZIVVUG-2 (rovetzet) split en 2 OFANIM (sub-modes) :
      → MODE A : Imma s'habille dans Z"A SEUL.
      → MODE B : Imma s'habille dans MALKHUT (= Nukva d'Z"A).
      → SHENEIHEM NIKRA ZIVVUG ECHAD (les 2 = un seul zivvug).
      → Architecture : sub-decomposition par destinaire (Z"A vs Nukva).
      → Pattern : same-zivvug, different-host.
    type: axiome_explicite
    concepts:
      - {id: zivvug_rovetzet_2_sub_modes_imma_dans_z_a_seul_ou_malkhut_z_a, role: zivvug_rovetzet_2_sub_modes_a_imma_dans_z_a_seul_b_imma_dans_malkhut_z_a_un_seul_zivvug}
