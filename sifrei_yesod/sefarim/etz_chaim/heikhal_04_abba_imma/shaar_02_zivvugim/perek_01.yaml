  - id: "EC-H4S15-004"
    source_he: "ועד\"ז ד' בחי' כיוצא באלו זווג זו\"נ והנה לעולם בחי' זווג חיצון למלאכים וזווג פנימי לנשמות"
    source_ref: "Heikhal 4, Sha'ar 2:1 §2"
    assertion: |
      ZON aussi a 4 BECHINOT zivvug similaires.
      → ZIVVUG CHITZON → MALACHIM (anges, formations exterieures).
      → ZIVVUG PNIMI → NESHAMOT (ames, productions interieures).
      → Architecture : depth-of-zivvug determines product-type.
      → Pattern : pnim-zivvug = soul-production ; chitzon-zivvug = angel-production.
    type: axiome_explicite
    concepts:
      - {id: zivvug_chitzon_malachim_zivvug_pnimi_neshamot_zon_4_bechinot, role: zivvug_chitzon_malachim_zivvug_pnimi_neshamot_zon_4_bechinot_kechain_ao}
    mapping:
