  - id: "EC-H4S15-007"
    source_he: "מ\"ב דע כי יש ב' מיני זווג אל או\"א הא' בהיותן שניהן שוין למעלה במקומן שוין בקומתן פב\"פ אשר זה נקרא בחי' זווג או\"א עלאין והב' הוא בחי' אמא רביעא על בנין"
