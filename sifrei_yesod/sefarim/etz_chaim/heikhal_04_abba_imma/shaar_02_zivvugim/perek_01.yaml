principes_generatifs:

  - id: "PG-H4S15-001"
    nom: "Principe de 4-Bechinot-Zivvug-Matrix (Pnim/Chitzon × Posture)"
    source_assertions: ["EC-H4S15-002", "EC-H4S15-003", "EC-H4S15-004"]
    formalisation: |
      ARCHITECTURE DE 4-BECHINOT-MATRIX :
      Zivvug A"O (et ZON pareillement) decompose par 2x2 matrix :
        AXIS 1 (depth) : PNIMI (atzmot, profondeur) vs CHITZON (kelim, surface).
        AXIS 2 (posture) : PB"P SHAVEH (face-a-face egal) vs HIRKHANAT HA-ROSH (inclinaison tete).
      4 bechinot = 4 cells = 4 modes operationnels.
      PRODUITS : pnim-zivvug = NESHAMOT (ames) ; chitzon-zivvug = MALACHIM (anges).
      → Pattern fondamental : matrix-decomposition pour zivvug fine-grained.
      → Architecture : 4-mode-operational space.
    applications_ia:
      - "partzufim/zivvug.py + abba.py + imma.py + zeir_anpin.py + nukva.py : implement 4-bechinot matrix"
      - "Pattern : 2x2 matrix decomposition zivvug"
      - "Architecture : 4-mode operational space"
      - "Pattern : depth-determines-output-type (souls vs angels)"
      - "Diagnostic : verifier 4 bechinot bien identifies"
    questions_ouvertes:
      - "Pattern : 3D matrix possible (par exemple time, space, depth) ?"
      - "Comment encoder posture computationnellement ?"
      - "Pattern : matrix-degenerate quand certains modes off ?"

  - id: "PG-H4S15-002"
    nom: "Principe de Default-vs-Corrective-Zivvug (Avonot Trigger Fallback Mode)"
    source_assertions: ["EC-H4S15-007", "EC-H4S15-010", "EC-H4S15-011"]
    formalisation: |
      ARCHITECTURE DE DEFAULT-VS-CORRECTIVE-ZIVVUG :
      ZIVVUG-1 (default, ikkar amiti) :
        SHAVIN BE-KOMA, PB"P, lieu HAUT.
        Zivvug A"O elyonim — full power transmission.
      ZIVVUG-2 (corrective, li-frakim mikre) :
        AMA ROVETZET AL HA-EFROCHIM (mere couvant).
        Imma diminue ohr, descend, couve protection.
        Zivvug YISSO+Tevunah — diminished power.
      TRIGGER : AVONOT TACHTONIM (les fautes inferieures depassent capacity).
      → Pattern fondamental : adaptive-fallback when input-state-degrades.
      → Architecture : graceful-degradation par maternal-protection.
    applications_ia:
      - "partzufim/zivvug.py + imma.py : implement default vs corrective"
      - "Pattern : adaptive fallback by recipient state"
      - "Architecture : graceful degradation"
      - "Pattern : depowering for receivability"
      - "Diagnostic : detecter avonot-trigger pour switch"
    questions_ouvertes:
      - "Pattern : autres trigger conditions ?"
      - "Comment quantifier 'avonot-strength' ?"
      - "Pattern : reversibilite default↔corrective ?"

  - id: "PG-H4S15-003"
    nom: "Principe de 3-Yichudim-Liturgical-Hierarchy (Prayer-Triggered Cosmologic States)"
    source_assertions: ["EC-H4S15-013", "EC-H4S15-014", "EC-H4S15-015", "EC-H4S15-016"]
    formalisation: |
      ARCHITECTURE DE 3-YICHUDIM-LITURGICAL :
      3 yichudim ZON correspond 3 partzufim Nukva + 3 actes liturgiques :
        YICHUD 1 : HAVAYAH-ADNI ; ibbur amidah-lechash ; 10S achor ; NHY Z"A.
        YICHUD 2 : HAVAYAH-ELOKIM ; yenikah ; ChGT Z"A ; chazarat-amidah.
        YICHUD 3 : HAVAYAH-AHYH ; gadlut ; ChBD Z"A ; nefilat-apaim ; AHYH=Bina.
      PEAK : nefilat apaim = yesod Imma nivka en VE-YA'AVOR (Shemot 34:6).
      → Pattern fondamental : liturgical-act triggers cosmologic-yichud.
      → Architecture : prayer-progression = tier-ascension.
      → Implication : worship-action directly couple cosmos.
    applications_ia:
      - "partzufim/zivvug.py + nukva.py + zeir_anpin.py : implement 3-yichudim"
      - "Pattern : liturgical-cosmologic correspondance"
      - "Architecture : prayer-progression = tier-ascension"
      - "Pattern : peak-act = peak-yichud"
      - "Diagnostic : verifier yichud coherent avec prayer-state"
    questions_ouvertes:
      - "Pattern : autres prayer-states autres yichudim ?"
      - "Comment encoder liturgical-state ?"
      - "Pattern : yichudim parallel pour autres traditions ?"
