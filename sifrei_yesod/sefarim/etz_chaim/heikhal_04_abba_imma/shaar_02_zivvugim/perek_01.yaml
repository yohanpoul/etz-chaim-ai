  note: "Intro Sha'ar HaZivvugim (Sefer 15, 6 perakim). 2 sortes zivvug A\"O : PNIMI (atzmot, neshamot) + CHITZON (kelim, malachim). 4 bechinot total (PB\"P shaveh + hirkhanat ha-rosh). 2 buts : neshamot chadashot OR chiyut+mochin yeshanot. Apres CHURBAN : pas zivvug-pnimi neshamot chadashot ni A\"O ni ZON (sod LO ABA BA-IR Hoshea 11:9). 2 sortes zivvug : SHAVIN BE-KOMA PB\"P (A\"O elyonim) vs AMA ROVETZET AL HA-EFROCHIM (YISSO+Tevunah, occasionnel). ZIVVUGA SHALEM (Zohar Acharei 61b) vs DE-LO SHALEM. 3 YICHUDIM ZON N\"R : YHVH-AHYH (gadlut/Bina, nefilat apaim), YHVH-ELOKIM (yenikah/ChGT), YHVH-ADNI (ibbur amidah lechash/10S achor)."

