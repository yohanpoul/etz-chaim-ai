      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : protective descent. Pattern maternal-protection via depowering."

  - id: "EC-H4S15-012"
    source_he: "זווג אחד הוא נקרא זווגא שלים כנזכר זוהר פרשת אחרי דס\"א ע\"ב והזווג הב' נקרא זווגא דלא שלים"
    source_ref: "Heikhal 4, Sha'ar 2:1 §3"
    assertion: |
      2 GRADES zivvug :
      → ZIVVUGA SHALEM (couplage complet) — Zohar Acharei 61b.
      → ZIVVUGA DE-LO SHALEM (couplage incomplet).
      → Architecture : completeness-grade par integrite-mecanisme.
      → Pattern : 2-grade zivvug-completeness.
      cf. EC-H4S14-193 (perek 8) sur zivvug shalem 2 mazalot vs de-lo-shalem 1.
    type: déduction_scripturaire
    concepts:
