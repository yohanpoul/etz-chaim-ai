      relevance: "Architecture : depth determines product type. Pattern angel/soul-production."

  - id: "EC-H4S15-005"
    source_he: "עוד יש בחי' אחרת בסוד הזווג אם לברוא נשמות חדשות או לחיות הנשמות שכבר יצאו לחדש להם מוחין"
