      tables: ["zivvug_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : 2 functions creation/maintenance. Pattern dual-purpose zivvug."

  - id: "EC-H4S15-006"
    source_he: "אחר החורבן שאין זווג לזו\"נ להוציא נשמות חדשות גם באו\"א לא יש זווג לנשמות חדשות וז\"ס לא אבא בעיר"
