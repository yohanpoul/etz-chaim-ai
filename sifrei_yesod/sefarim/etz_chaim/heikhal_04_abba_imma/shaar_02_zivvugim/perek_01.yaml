      partzufim: ["imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : sub-decomposition par destinaire. Pattern same-different host."

  - id: "EC-H4S15-010"
    source_he: "זווג (הא') הנ\"ל שהוא בהיותן למעלה שוין בקומתן זהו עיקר הזווג שלהם האמיתי אבל זווג הב' נקרא זווג לפרקים של מקרה והוא כאשר גברו עונות של התחתונים"
    source_ref: "Heikhal 4, Sha'ar 2:1 §3"
    assertion: |
      DISTINCTION fondamentale :
      → ZIVVUG-1 (haut, shavin be-koma) = IKKAR HA-ZIVVUG HA-AMITI (le couplage essentiel-vrai).
      → ZIVVUG-2 (rovetzet) = ZIVVUG LI-FRAKIM SHEL MIKRE (couplage occasionnel par accident).
      → CAUSE : GAVRU AVONOT TACHTONIM (les fautes inferieures se sont renforcees) — pas la force pour recevoir hashpa'a elyona.
      → Architecture : default-essential vs occasional-corrective.
      → Pattern : ZIVVUG-2 triggered by lower-state-deterioration.
    type: interprétation_lurianique
    concepts:
      - {id: zivvug_1_ikkar_amiti_zivvug_2_li_frakim_mikre_avonot_tachtonim, role: zivvug_1_ikkar_ha_zivvug_amiti_default_zivvug_2_li_frakim_mikre_corrective_avonot_tachtonim}
    mapping:
      modules: ["partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : default vs corrective. Pattern lower-state triggers fallback."

  - id: "EC-H4S15-011"
    source_he: "צריכה האם העליונה למעט אורה כדי שנוכל (שיוכלו) לקבלו ואז יורדת למטה להיותה רובצת על בניה כדרך העוף והנשר המתרחפת על בניה שלא יטרפוה עופות נכרים ורובצת עליהם לשומרם"
    source_ref: "Heikhal 4, Sha'ar 2:1 §3"
    assertion: |
      MECHANIQUE descente Imma : IMMA ELYONA doit ME'AET (diminuer) son OHR pour receivability.
      → Descend = ROVETZET sur enfants ; image OF/NESHER MITRACHEFET (planant) sur enfants.
      → Protege contre OFOT NOKHRIM (oiseaux etrangers) qui pourraient TROFEHU (arracher).
      → ROVETZET = SHIMRAM (les preserver).
      → Architecture : protective-descent-mechanism par diminution + couvaison.
      → Pattern : maternal-protection via depowering.
      cf. EC-H4S14-153 (perek 6) sur rovetzet al ha-efrochim.
    type: interprétation_lurianique
    concepts:
      - {id: imma_meaet_ohr_descend_rovetzet_of_nesher_protege_predateurs, role: imma_meaet_ohr_descend_rovetzet_of_nesher_mitrachefet_protege_ofot_nokhrim_shimram}
    mapping:
