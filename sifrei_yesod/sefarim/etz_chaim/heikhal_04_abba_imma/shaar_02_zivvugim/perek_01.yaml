  - id: "EC-H4S15-003"
    source_he: "וזהו בב' בחי' או כשהם פב\"פ שוה או בהרכנת הראש כמבואר אצלינו וב' בחי' אלו בפנימיות שהוא העצמות וב' בחינות אלו בסוד החיצוניות שהם (י') הכלים הרי הם ד' בחי' זווג או\"א"
    source_ref: "Heikhal 4, Sha'ar 2:1 §2"
    assertion: |
      Chacune des 2 sortes (pnimi+chitzon) a 2 SUB-BECHINOT :
      → PB"P SHAVEH (face-a-face egal — meme stature).
      → HIRKHANAT HA-ROSH (inclinaison de la tete).
      → Total : 4 BECHINOT zivvug A"O.
      → Architecture : 2x2 matrix (depth × posture) = 4 modes.
      → Pattern : matrix-decomposition pour zivvug fine-grained.
