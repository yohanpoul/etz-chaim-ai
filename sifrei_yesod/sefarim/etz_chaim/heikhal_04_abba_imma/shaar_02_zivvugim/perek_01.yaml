# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 2 — Sha'ar HaZivvugim (שער הזווגים)
# Perek: 1 — Intro Sha'ar 2. 2 sortes zivvug A"O : PNIMI/CHITZON. 4 bechinot.
#            Apres CHURBAN. ZIVVUG SHALEM. 3 YICHUDIM ZON N"R (YHVH-AHYH/ELOKIM/ADNI).
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_01 :
#   - Bloc A (§1) : Title — Sha'ar 2 H4 = Sha'ar HaZivvugim ; 6 perakim
#   - Bloc B (§2) : 2 sortes zivvug A"O d'Atzilut : PNIMI (atzmot) + CHITZON (kelim)
#   - Bloc C (§2) : Chacun 2 sub-bechinot : PB"P shaveh OR hirkhanat ha-rosh = 4 bechinot total
#   - Bloc D (§2) : Idem ZON 4 bechinot ; chitzon→malachim ; pnimi→neshamot
#   - Bloc E (§2) : 2 buts zivvug : neshamot chadashot OR chiyut+mochin yeshanot
#   - Bloc F (§2) : Apres CHURBAN : pas zivvug-pnimi pour neshamot chadashot ni A"O ni ZON ; sod LO ABA BA-IR (Hoshea 11:9)
#   - Bloc G (§3) : 2 sortes zivvug A"O : (a) SHAVIN BE-KOMA PB"P = A"O ELYONIM ; (b) AMA ROVETZET AL HA-EFROCHIM = YISSO+TEVUNAH
#   - Bloc H (§3) : Mecanisme rovetzet : Imma NHY descend dans Z"A ; mochin ChBD Z"A dans NHY Imma
#   - Bloc I (§3) : Zivvug rovetzet split 2 sub-modes : Imma dans Z"A SEUL OR Imma dans Malkhut Z"A
#   - Bloc J (§3) : Distinction : elyon = IKKAR ha-zivvug-EMET ; bas = LI-FRAKIM MIKRE (occasionnel)
#   - Bloc K (§3) : Cause zivvug bas : avonot empechent hashpa'a elyona → Imma diminue ohr, rovetzet
#   - Bloc L (§3) : Image : OF/NESHER couve enfants, protege contre predateurs
#   - Bloc M (§3) : ZIVVUGA SHALEM (Zohar Acharei 61b) vs ZIVVUGA DE-LO SHALEM
#   - Bloc N (§4) : 3 YICHUDIM ZON appeles N"R : (a) YHVH-AHYH ; (b) YHVH-ELOKIM ; (c) YHVH-ADNI
#   - Bloc O (§4) : Correspondance 3 partzufim Nukva — 10S achor=ibbur=YHVH-ADNI ; ChGT yenikah=YHVH-ELOKIM ; ChBD gadlut=YHVH-AHYH
#   - Bloc P (§4) : ChBD gadlut = NEFILAT APAIM ; sod VE-YA'AVOR (yesod Imma nivka)
#   - Bloc Q (§4) : Variante (Nusah Aher) : Shacharit Shabbat seul ; chaque amida+chazara = zivvug ; nefilat apaim = elyon
#
# Source Sefaria : Sefer_Etz_Chaim.15.1 (4 sections, 4801 chars)
