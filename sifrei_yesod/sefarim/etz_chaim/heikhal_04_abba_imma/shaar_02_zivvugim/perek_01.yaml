    assertion: |
      AUTRE BECHINAH dans le zivvug — 2 BUTS distincts :
      → CREER NESHAMOT CHADASHOT (nouvelles ames).
      → DONNER CHIYUT (vie) aux NESHAMOT YESHANOT (deja sorties) + nouveaux MOCHIN.
      → Architecture : 2 functions zivvug (creation vs maintenance).
      → Pattern : creation-mode vs maintenance-mode.
      cf. EC-H4S14-179 (perek 7) sur 2 zivvugim neshamot+chiyut.
    type: axiome_explicite
    concepts:
      - {id: 2_buts_zivvug_neshamot_chadashot_chiyut_yeshanot_mochin, role: 2_buts_zivvug_creation_neshamot_chadashot_vs_maintenance_chiyut_yeshanot_mochin}
