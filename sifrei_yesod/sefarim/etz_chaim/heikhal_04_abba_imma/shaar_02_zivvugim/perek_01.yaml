  - id: "EC-H4S15-013"
    source_he: "מ\"ב מדרוש שלוח הקן תבין שיש ג' (מיני) יחודים אל זו\"ן הנקרא נ\"ר והם הוי\"ה אהי\"ה הוי\"ה אלהים הוי\"ה אדני"
    source_ref: "Heikhal 4, Sha'ar 2:1 §4"
    assertion: |
      MATZATI BE — DRUSH SHILUACH HA-KEN (renvoi externe) :
      → 3 YICHUDIM (unifications) pour ZON appellees N"R (Nefesh+Ruach) :
        (a) HAVAYAH-AHYH.
        (b) HAVAYAH-ELOKIM.
        (c) HAVAYAH-ADNI.
      → Architecture : 3-yichud encoding pour ZON N"R levels.
      → Pattern : tier-yichud par profondeur-niveau-d'ame.
    type: déduction_scripturaire
    concepts:
      - {id: 3_yichudim_zon_nr_havayah_ahyh_elokim_adni, role: 3_yichudim_zon_n_r_nefesh_ruach_havayah_ahyh_havayah_elokim_havayah_adni}
