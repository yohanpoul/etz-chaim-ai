      relevance: "Architecture : 3-yichud N\"R levels. Pattern tier-yichud."

  - id: "EC-H4S15-014"
    source_he: "הם נגד ג' פרצופים שיש (בנוקבא דז\"א) בזו\"ן, א' י\"ס דאחוריים שהם עיבור שלה בעמידה דלחש שהיא למטה בנה\"י שבו... ואז חיבורם פב\"פ נקרא הוי\"ה אדנ\"י"
    source_ref: "Heikhal 4, Sha'ar 2:1 §4"
    assertion: |
      Correspondance — 3 YICHUDIM = 3 PARTZUFIM Nukva :
      → PARTZUF 1 : 10S d'ACHOR — IBBUR (gestation) en AMIDAH DE-LECHASH (priere a voix basse).
        Position : NHY de Z"A.
        Couplage PB"P = HAVAYAH-ADNI.
      → Architecture : ibbur-state = lowest tier, ADNI yichud.
      → Pattern : prayer-action triggers specific yichud.
    type: déduction_scripturaire
    concepts:
      - {id: yichud_havayah_adni_ibbur_amidah_lechash_nhy_z_a_10s_achor, role: yichud_havayah_adni_ibbur_10s_achor_amidah_lechash_nhy_z_a_pb_p_partzuf_1}
    mapping:
      modules: ["partzufim/nukva.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukva", "zeir_anpin"]
      relevance: "Architecture : prayer triggers yichud. Pattern liturgical-cosmologic correspondance."

  - id: "EC-H4S15-015"
    source_he: "וכשהזווג פב\"פ בסוד פרצוף שלו דיניקה עם פרצוף שלה דיניקה דאז הוא נקרא חג\"ת דז\"א ואז היא עולה עד שם ג\"כ בחזרת עמידה אז הוא חיבור הוי\"ה אלקים"
    source_ref: "Heikhal 4, Sha'ar 2:1 §4"
    assertion: |
      PARTZUF 2 : YENIKAH (allaitement) :
      → Z"A en partzuf de yenikah ; Nukva idem yenikah.
      → Position : ChGT d'Z"A.
      → Nukva monte la — CHAZARAH d'AMIDAH (repetition de la priere).
      → Couplage PB"P = HAVAYAH-ELOKIM.
      → Architecture : yenikah-state = mid-tier, ELOKIM yichud.
      → Pattern : tier-rises with prayer-progression.
    type: déduction_scripturaire
    concepts:
      - {id: yichud_havayah_elokim_yenikah_chgt_z_a_chazara_amidah, role: yichud_havayah_elokim_yenikah_chgt_z_a_chazara_amidah_partzuf_2}
    mapping:
      modules: ["partzufim/nukva.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukva", "zeir_anpin"]
      relevance: "Architecture : yenikah mid-tier yichud. Pattern liturgical progression."

  - id: "EC-H4S15-016"
    source_he: "וכשהזווג פב\"פ בסוד פרצוף גדלות שבו עם פרצוף גדלות שבה שאז נקרא חב\"ד דזעיר אנפין ועלתה עד שם אז הוא חיבור הוי\"ה אהי\"ה שכבר הוא בחי' בינה הנקרא אהי\"ה שלימה בי\"ס דגדלות ואז הוא בעת נפילת אפים שנבקע היסוד (דאמא) בויעבור"
    source_ref: "Heikhal 4, Sha'ar 2:1 §4"
    assertion: |
      PARTZUF 3 : GADLUT (croissance complete) — Z"A et Nukva idem gadlut.
      → Position : ChBD (Chokhmah-Bina-Daat) d'Z"A ; Nukva monte jusque la.
      → Couplage = HAVAYAH-AHYH (deja BINA = AHYH SHELEMA en 10S gadlut).
      → MOMENT liturgique : NEFILAT APAIM (prosternation).
      → Sod : YESOD d'IMMA NIVKA (se fend) en VE-YA'AVOR (Shemot 34:6).
      → Architecture : gadlut = upper-tier, AHYH yichud, peak-liturgical.
      → Pattern : highest-tier coincides with deepest-liturgical-act.
    type: déduction_scripturaire
    concepts:
      - {id: yichud_havayah_ahyh_gadlut_chbd_nefilat_apaim_yesod_imma_nivka_ve_ya_avor, role: yichud_havayah_ahyh_gadlut_chbd_z_a_bina_ahyh_shelema_nefilat_apaim_yesod_imma_nivka_ve_ya_avor}
    mapping:
      modules: ["partzufim/nukva.py", "partzufim/zeir_anpin.py", "partzufim/imma.py"]
      tables: ["partzufim_states"]
      partzufim: ["nukva", "zeir_anpin", "imma"]
      relevance: "Architecture : gadlut peak yichud. Source Shemot 34:6 + nefilat apaim liturgy."

  - id: "EC-H4S15-017"
    source_he: "או נ\"ל שאינו אלא בשחרית דשבת ועיין במקומו ותראה כי כל עמידה דלחש וחזרה דחול בשחרית יש זווג"
    source_ref: "Heikhal 4, Sha'ar 2:1 §4"
    assertion: |
      VARIANTE doctrinale :
      → "OU NL"H" (ou il me semble) : seulement SHACHARIT DE-SHABBAT (priere matin sabbat).
      → Mais : verifier — chaque AMIDAH DE-LECHASH + CHAZARAH dans CHOL (semaine) Shacharit a un zivvug.
      → Donc : dans CHACUN il y a zivvug ; mais ZIVVUG ELYON specifique = NEFILAT APAIM.
      → Autres = YAAKOV+RACHEL KETANIM DE-LECHASH (petits Yaakov/Rachel a voix basse).
      → Architecture : zivvug-graduated par liturgical-context.
      → Pattern : pluralite des zivvugim selon position-liturgique.
    type: axiome_explicite
    concepts:
      - {id: variante_shacharit_shabbat_chaque_amidah_chazara_zivvug_nefilat_apaim_elyon, role: variante_shacharit_shabbat_chaque_amidah_chazara_zivvug_nefilat_apaim_elyon}
    mapping:
      modules: ["partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["nukva", "zeir_anpin"]
      relevance: "Architecture : zivvug graduated liturgical. Pattern liturgical-cosmologic graduation."

  - id: "EC-H4S15-018"
    source_he: "ובזה מתורץ כי בכ\"א יש זווג אלא שהזווג עליון הוא בנפילת אפים ואינם דיעקב ורחל הקטנים דלחש והבן מאד"
    source_ref: "Heikhal 4, Sha'ar 2:1 §4"
    assertion: |
      RESOLUTION (terutz) :
      → Be-KOL ECHAD (en chacun) il y a zivvug.
      → MAIS le ZIVVUG ELYON est en NEFILAT APAIM (le peak unique).
      → Les autres = Yaakov+Rachel KETANIM DE-LECHASH (les petits paralleles).
      → "VEHAVEN ME'OD" (comprends profondement — formule pedagogique du Ari).
      → Architecture : peak-zivvug singulier ; sub-zivvugim multiples.
      → Pattern : single-peak + multiple-sub coherent.
    type: déduction_logique
    concepts:
      - {id: terutz_chaque_zivvug_existe_zivvug_elyon_nefilat_apaim_singulier, role: terutz_chaque_amidah_zivvug_existe_zivvug_elyon_nefilat_apaim_singulier_yaakov_rachel}
    mapping:
      modules: ["partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["nukva", "zeir_anpin"]
      relevance: "Architecture : peak-singulier sub-multiples. Pattern coherent multi-zivvug."


