      → Imma DESCEND sous shiur-koma d'Abba ; SHAFLAH ATZMAH (s'abaisse).
      → Architecture : nested-clothing avec descent maternelle.
      → Pattern : recursive-clothing (mochin in NHY in Z"A).
    type: interprétation_lurianique
    concepts:
      - {id: mecanisme_rovetzet_mochin_z_a_dans_nhy_imma_dans_z_a, role: mecanisme_rovetzet_mochin_z_a_dans_nhy_imma_puis_nhy_imma_dans_z_a_em_rovetzet_efrochim}
    mapping:
