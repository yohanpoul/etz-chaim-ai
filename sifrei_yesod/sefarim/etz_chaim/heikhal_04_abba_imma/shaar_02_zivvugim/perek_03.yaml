  - id: "EC-H4S15-037"
    source_he: "הם חלשים בבחי' ו\"ק הנקרא אפרוחים והם קטנים וצריכין עדיין לאמא וצריכה אמא לרבוץ עליהם לשומרם מן החיצונים ואז גם אבא יורד עמה ומרכין ראשו"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      DETAIL faiblesse :
      → CHALASHIM (faibles) en V"K — appellees EFROCHIM (poussins).
      → KETANIM (petits) — TZRIKHIN ADAYIN LA-IMA (besoin encore de la mere).
      → IMMA doit ROVETZET (couver) pour SHIMRAM (proteger) MIN HA-CHITZONIM.
      → ABBA aussi YORED (descend), MARKHIN ROSH (incline tete).
      → Architecture : maternal-protection mecanisme due a infant-vulnerability.
      → Pattern : protective-descent triggered by recipient-weakness.
    type: axiome_explicite
    concepts:
      - {id: efrochim_zon_vk_chalashim_imma_rovetzet_shimram_chitzonim, role: efrochim_zon_vk_chalashim_ketanim_tzrikhin_imma_rovetzet_shimram_chitzonim_abba_markhin_rosh}
    mapping:
