  - id: "EC-H4S15-048"
    source_he: "ב' מיני יחודים הם של הוי\"ה אלקי\"ם הא' הוא כי ענין זווג או\"א לעולם הוא כדי לתת מוחין אל הבנים ובעת נתינת המוחין נקרא זו\"ן הוי\"ה אלקים"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      2 MINEI YICHUDIM HAVAYAH-ELOKIM :
      → YICHUD A : zivvug A"O = donner mochin Z"N → Z"N nommees HAVAYAH-ELOKIM.
        - A"BA : Z"A SEUL HAVAYAH-ELOKIM (mochin first to him).
        - PB"P : 2 ENSEMBLE = YICHUD HAVAYAH-ELOKIM.
      → Architecture : taxonomy 2 yichudim (event-based + configuration-based).
      → Pattern : multi-yichud-types per cosmologic-state.
      cf. EC-H4S15-031..033 (perek 2) sur HAVAYAH-ELOKIM A"BA/PB"P.
    type: axiome_explicite
    concepts:
      - {id: 2_yichudim_havayah_elokim_yichud_a_zivvug_ao_mochin_zn_aba_pb_p, role: 2_minei_yichudim_havayah_elokim_yichud_a_zivvug_ao_mochin_zn_aba_z_a_seul_pb_p_2_ensemble}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["zivvug_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture : multi-yichud taxonomy. Pattern state-based naming."

  - id: "EC-H4S15-049"
    source_he: "ויחוד הב' של הוי\"ה אלקים הוא ג\"כ כמ\"ש לעיל כי בזה הזווג הב' התחתון דאו\"א יש ב' מציאות או כשיורדת בז\"א... או כשיורדת במלכות"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      YICHUD B : 2 METZIOTI (realites) du zivvug-rovetzet :
      → REALITE 1 : Imma DESCEND dans Z"A — entre dans lui — NHY deviennent mochin.
      → REALITE 2 : Imma DESCEND dans MALKHUT — pas dedans, reste OR MAKIF (encerclant).
      → Architecture : 2 different-targets pour Imma-descent.
      → Pattern : same-action different-recipients.
