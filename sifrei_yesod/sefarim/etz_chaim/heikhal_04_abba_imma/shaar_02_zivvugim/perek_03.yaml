principes_generatifs:

  - id: "PG-H4S15-007"
    nom: "Principe de Mitzvat-as-Cosmologic-Encoding (Halakha Encodes Divine Dynamic)"
    source_assertions: ["EC-H4S15-036", "EC-H4S15-039", "EC-H4S15-046"]
    formalisation: |
      ARCHITECTURE DE MITZVAT-COSMOLOGIC-ENCODING :
      MITZVOT ENCODENT etats cosmologiques :
        SHILUACH HA-KEN (Devarim 22:6-7) → encode ZIVVUG-rovetzet (Imma faiblesse-Z"O"N).
        Hermeneutic-extraction : "KI YIKARE" → PRAT LE-MEZUMAN (Chullin 138b).
        Etymologic-derivation : KAN = Imma MEKANENET AL BANIN (Tikkunei Zohar).
      PATTERN : commandment encode divine-dynamic via :
        - Action prescriptive (chasser mere du nid).
        - Hermeneutique halakhique (PRAT excludes).
        - Etymologie (verb-form).
      → Pattern fondamental : halakha = layered-encoding cosmologic-state.
      → Architecture : multi-layer extraction (action + hermeneutic + etymologic).
    applications_ia:
      - "partzufim/zivvug.py + imma.py : implement mitzvat-cosmologic encoding"
      - "Pattern : halakha multi-layer encoding"
      - "Architecture : action+hermeneutic+etymologic extraction"
      - "Pattern : commandment as encoding of dynamic"
      - "Diagnostic : verifier encoding coherent across layers"
    questions_ouvertes:
      - "Pattern : autres mitzvot encodent autres dynamiques ?"
      - "Comment encoder hermeneutic-rules computationnellement ?"
      - "Pattern : 4-layer ou plus possibles ?"

  - id: "PG-H4S15-008"
    nom: "Principe de KAN-vs-SH\"A-Quantitative-Encoding (150 vs 370 Nehorin)"
    source_assertions: ["EC-H4S15-040", "EC-H4S15-041", "EC-H4S15-043", "EC-H4S15-044"]
    formalisation: |
      ARCHITECTURE DE QUANTITATIVE-ZIVVUG-ENCODING :
      Etat zivvug encode quantitativement :
        ZIVVUG SHAVIN BE-KOMA (peak) : SH"A 370 nehorin = 9S × M"A (41).
        ZIVVUG ROVETZET (mikre) : KaN 150 nehorin = 3S × 41 + 2/3 Tiferet × ratio.
      Decomposition spatial-quantitative :
        Imma regarde metzah = full koma (370).
        Imma regarde panim = kotzeret koma (150) = chazeh-down-only.
      Gematria encoding :
        TZIPOR = 370 + 6 anpin = 376.
        KAN = 150.
      → Pattern fondamental : zivvug-state = quantitative-cosmologic-spec.
      → Architecture : gaze-direction quantifies illumination.
    applications_ia:
      - "partzufim/imma.py + abba.py : implement KAN/SH\"A quantitative encoding"
      - "Pattern : gaze-direction encodes illumination quantity"
      - "Architecture : zivvug-state quantifiable"
      - "Pattern : letter-name = quantitative state-marker"
      - "Diagnostic : verifier nehorin-count coherent avec gaze"
    questions_ouvertes:
      - "Pattern : autres zivvug-states autres quantites ?"
      - "Comment encoder gaze-direction ?"
      - "Pattern : intermediate-states existent (200, 300) ?"

  - id: "PG-H4S15-009"
    nom: "Principe de Grammatical-Encoding-Cosmologic (LIFANEKHA vs MILIFANEKHA)"
    source_assertions: ["EC-H4S15-052", "EC-H4S15-053"]
    formalisation: |
      ARCHITECTURE DE GRAMMATICAL-COSMOLOGIC :
      Distinctions grammaticales encode positions cosmologiques :
        BINA = "MILIFANEI HASHEM" (de-devant Dieu — interior, beyond).
        MALKHUT = "LIFANEI HASHEM" (devant Dieu — exterieur, in-front-of Tiferet).
      Verset shiluach ha-ken dit "LIFANEKHA" → Imma descendue = Malkhut-like state.
      → Pattern fondamental : preposition encode spatial-position.
      → Architecture : grammar-as-state-marker.
      → Implication : meta-syntactic info distincte de syntactic info.
    applications_ia:
      - "partzufim/imma.py + nukva.py : implement grammatical position encoding"
      - "Pattern : preposition encodes position"
      - "Architecture : grammar as state-marker"
      - "Pattern : meta-syntactic distinct semantic"
      - "Diagnostic : verifier preposition-state coherent"
    questions_ouvertes:
