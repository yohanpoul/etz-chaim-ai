      tables: ["partzufim_states"]
      partzufim: ["imma", "abba"]
      relevance: "Architecture : descent asymmetric. Pattern female descent encodes mikre."

  - id: "EC-H4S15-046"
    source_he: "מה שקרא לזווג זה קן צפור לשון ק\"ן ר\"ל כי עתה בזווג זה נקרא מקננא על בנין כי הבן שהוא ז\"א נקרא צפור והיא מקננת עליו"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      Etymologie KAN-TZIPUR :
      → "K"N" lashon (langage) MEKANENA AL BANIN (qui niche sur les fils).
      → Z"A = TZIPOR (oiseau-fils).
      → Imma se "niche" sur Z"A.
      → Source : Tikkunei Zohar.
      → Architecture : nesting-iconography pour zivvug-mikre.
      → Pattern : verb-naming encode dynamic-relation.
    type: déduction_scripturaire
    concepts:
      - {id: kan_lashon_mekanena_al_banin_z_a_tzipor_tikkunei_zohar, role: kan_lashon_mekanena_al_banin_tikkunei_zohar_z_a_tzipor_imma_mekanenet}
    mapping:
      modules: ["partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : nesting iconography. Source Tikkunei Zohar."

  - id: "EC-H4S15-047"
    source_he: "לא אמרו בתיקונים דאמא יתבא על בנין רק מקננת על בנין כי לשון קינון מורה על הזווג שמזדווגת אז עם אבא בהיותה היא אם על הבנים שהוא הזווג הזה הב' הנ\"ל הנקרא מקרה לפרקים"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      DISTINCTION TIKKUNIM :
      → PAS "AMA YETIVA AL BANIN" (mere assise sur fils).
      → MAIS "MEKANENET AL BANIN" (qui niche sur fils).
      → KINUN (nicher) → ZIVVUG-mode specifique en IMMA-AL-BANIM.
      → Marque ZIVVUG-2 = MIKRE LI-FRAKIM.
      → Architecture : verb-distinction encode mode-distinction.
      → Pattern : kinun-vs-yetiva = active-zivvug-vs-stationary.
    type: déduction_scripturaire
    concepts:
