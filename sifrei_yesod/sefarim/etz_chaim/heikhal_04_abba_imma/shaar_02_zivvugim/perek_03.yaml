      tables: ["zivvug_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : hermeneutic precondition. Source Chullin 138b-139b."

  - id: "EC-H4S15-040"
    source_he: "ק\"ן צפו\"ר... כאשר הזווג הוא למעלה שוין בקומתן אז יש להם ש\"ע נהורין כמנין צפור"
