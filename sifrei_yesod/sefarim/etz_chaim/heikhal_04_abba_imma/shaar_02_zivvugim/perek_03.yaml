      relevance: "Architecture : peak-config peak-state. Pattern full-correspondance."

  - id: "EC-H4S15-044"
    source_he: "בהיות אמא מסתכלת בפנים דא\"א ואז האמא היא קצרת הקומה מהחזה דאבא ולמטה לבד עד סוף נה\"י שלו הם ג' ספי' כל א' כלולה ממ\"א הם קכ\"ג וב' שלישי ת\"ת הם כ\"ז ועם קכ\"ג הרי ק\"ן רבוא"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      Imma regarde PANIM A"A (kotzeret-koma — pas metzah) :
      → De CHAZEH d'Abba ulematah jusqu'a fin NHY = 3 sefirot × 41 = 123 (KKa"G).
      → + 2/3 TIFERET = 27 (KaZ).
      → 123 + 27 = 150 (KaN) RIVVA.
      → Architecture : restricted-gaze restricted-state.
      → Pattern : kotzer-haKomah quantifie precisement.
    type: déduction_logique
    concepts:
