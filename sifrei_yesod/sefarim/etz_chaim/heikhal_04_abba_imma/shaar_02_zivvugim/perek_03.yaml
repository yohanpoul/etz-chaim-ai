      tables: ["partzufim_states"]
      partzufim: ["imma"]
      relevance: "Architecture : restricted gaze quantified. Pattern kotzer-haKomah encoding."

  - id: "EC-H4S15-045"
    source_he: "ק\"ן צפור שבזווג של מקרה הזה אין לה רק ק\"ן רבוא נהורין... וכל זה הוא באמא לפי שיורדת למטה משא\"כ באבא"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      KAN-TZIPUR = encoding zivvug-mikre :
      → Imma SEULEMENT 150 RIVVA NEHORIN (sur SH"A=370).
      → Tout cela en IMMA (qui descend) — PAS en ABBA.
      → Architecture : descent-asymmetric (Imma descend, Abba reste).
      → Pattern : female-descent encodes mikre-mode.
    type: axiome_explicite
    concepts:
      - {id: kan_tzipur_zivvug_mikre_imma_150_rivva_descend_pas_abba, role: kan_tzipur_zivvug_mikre_imma_150_rivva_descend_pas_abba_descent_asymmetric}
    mapping:
