# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 2 — Sha'ar HaZivvugim (שער הזווגים)
# Perek: 3 — Drush MITZVAT SHILUACH HA-KEN. KAN-TZIPUR=150 vs SH"A=370. KAN-TZIPUR
#            = zivvug-mikre rovetzet (Imma kotzeret koma). 2 YICHUDIM HAVAYAH-ELOKIM.
#            DEREKH (224) = 2× HAVAYAH-ELOKIM. LIFANEKHA vs MILIFANEKHA.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_03 :
#   - Bloc A : Drush SHILUACH HA-KEN (Devarim 22:6-7) — "Ki yikare KAN TZIPOR"
#   - Bloc B : Zivvug rovetzet montre faiblesse Z"N (V"K=efrochim, ketanim)
#   - Bloc C : Imma rovezet pour shimram (proteger) chitzonim ; Abba markhin rosh
#   - Bloc D : Pas zivvug-ikari mais zivvug-mikre (occasionnel)
#   - Bloc E : "Ki yikare" → PRAT LE-MEZUMAN (excluant zivvug-prepare ikari) — Chullin 138a
#   - Bloc F : "SHE-YIH'YU TZRIKHIN LE-IMAM" (fils besoin de mere)
#   - Bloc G : KAN-TZIPUR = encoding zivvug-mikre (150 rivva) vs SH"A=370 zivvug-shavin
#   - Bloc H : SH"A nehorin = 9S × 41 (M"A) = 369~370 (cf. perek 14 H3S13)
#   - Bloc I : PB"P shavin be-koma : Imma+Abba regardent metzah A"A → zivvug elyon → Imma 9S × M"A = 370 rivva
#   - Bloc J : Imma regarde PANIM A"A (kotzeret) : 3S × 41 + 2/3 Tiferet (chazeh-down) = 150 rivva
#   - Bloc K : KAN-TZIPUR = 150 RIVVA seul ; en Imma (qui descend) pas Abba
#   - Bloc L : "KAN" : Imma MEKANENA AL BANIN (Tikkunei Zohar) ; Z"A=TZIPOR
#   - Bloc M : Tikkunim : MEKANENET AL BANIN pas YETIVA AL BANIN — "kinun" marque zivvug-mikre
#   - Bloc N : "LIFANEKHA" vs "MILIFANEKHA" — Bina=mi-lifanai (interior) ; Malkhut=lifanav (Tiferet side)
#   - Bloc O : "LIFANEKHA" zivvug-2 : Imma descend Z"A devient Malkhut → "LIFANEKHA"
#   - Bloc P : 2 YICHUDIM HAVAYAH-ELOKIM (renvoi) — yichud A zivvug A"O mochin Z"N
#   - Bloc Q : Yichud B : 2 metzioti zivvug-rovetzet — Imma dans Z"A (mochin) OR Malkhut (makif)
#   - Bloc R : Dans Z"A : Z"A seul HAVAYAH-ELOKIM ; sur Malkhut : ZN ensemble HE-ELOKIM
#   - Bloc S : Total 2 yichudim = DEREKH (224 = 2 × 112 = 2 × HAVAYAH-ELOKIM)
#
# Source Sefaria : Sefer_Etz_Chaim.15.3 (1 section, 4926 chars)
# IDs : EC-H4S15-036 → EC-H4S15-053

