      tables: ["partzufim_states"]
      partzufim: ["imma", "zeir_anpin", "abba"]
      relevance: "Architecture : maternal protection. Pattern protective descent triggered."

  - id: "EC-H4S15-038"
    source_he: "אין זה הזווג העקרי של או\"א אלא זווג המקרה כאשר הבנים בסוד יניקה צריכין לאמא"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      Distinction explicite :
      → Pas ZIVVUG IKARI (essentiel) d'A"O.
      → Mais ZIVVUG HA-MIKRE (occasionnel) — quand banim sont en YENIKAH-mode et besoin Imma.
      → Architecture : default-zivvug vs occasional-fallback.
      → Pattern : zivvug-mode triggered by recipient-tier.
