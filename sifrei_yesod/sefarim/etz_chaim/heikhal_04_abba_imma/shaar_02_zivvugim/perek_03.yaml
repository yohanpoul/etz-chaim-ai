  - id: "EC-H4S15-043"
    source_he: "כאשר הזווג דאו\"א עלאין בהיותן פב\"פ שוין בקומתן ואז מסתכלין במצח דא\"א... ושם מלבישין הכתרים שלהם את הגרון דא\"א ומשם נמשך הזווג העליון דאו\"א ואז קומה דאמא שיעורה ט\"ס כל א' כלולה ממ\"א הרי ש\"ע רבוא"
    source_ref: "Heikhal 4, Sha'ar 2:3"
    assertion: |
      Zivvug A"O ELYONIM PB"P shavin :
      → MISTAKLIM dans METZAH d'A"A (regardent metzah).
      → KETERIM revetent GARON d'A"A.
      → Zivvug ELYON descend → Imma KOMAH = 9S × M"A (41) = 370 RIVVA.
      → Architecture : peak-state = full-koma + full-illumination.
      → Pattern : peak-config corresponds peak-quantitative-state.
    type: interprétation_lurianique
    concepts:
