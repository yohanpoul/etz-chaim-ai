  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "Toelet (utilite) des zivvugim. Zivvug elyon shalem = mochin gadlut Z\"O\"N atzilut + neshamot chadashot tzadikim + haarah BIY\"A. Olam Beriah : A\"A+Abba V\"K ; Imma+ZON 10S. HAKDAMAH inverse-scaling : haarah ketanah lemaala = gedolah lematah. Zivvug rovetzet (li-frakim) = yenikah V\"K seul. Imma rovetzet allaite. ZN atzilut yenikah-mode HAVAYAH-ELOKIM ; A\"BA Z\"A seul=HAVAYAH-ELOKIM ; PB\"P=yichud les 2. GADPIN=mochin makifim yenikah."

