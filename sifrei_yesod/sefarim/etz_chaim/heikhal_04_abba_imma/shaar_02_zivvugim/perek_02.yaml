# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 2 — Sha'ar HaZivvugim (שער הזווגים)
# Perek: 2 — Toelet zivvugim. Inverse-scaling BIY"A (haarah ketanah lemaala = gedolah lematah).
#            Olam Beriah : A"A/Abba V"K ; Imma/ZON 10S. Yenikah-mode HAVAYAH-ELOKIM.
#            GADPIN = mochin makifim yenikah.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_02 :
#   - Bloc A (§1) : Toelet (utilite) zivvugim — explication du benefice
#   - Bloc B (§1) : Zivvug elyon shalem → mochin gamurim gadlut Z"O"N atzilut → neshamot tzadikim pnimi olamot + haarah BIY"A
#   - Bloc C (§1) : Olam Beriah : A"A+Abba = seulement V"K ; Imma+ZON Beriah = 10S full partzuf
#   - Bloc D (§1) : HAKDAMAH — haarah ketanah lemaala = gedolah lematah (inverse-scaling)
#   - Bloc E (§1) : Apres gadlut : Abba Beriah devient aussi partzuf shalem
#   - Bloc F (§1) : Avant : Abba Beriah V"K seulement (yenikah)
#   - Bloc G (§1) : Zivvug rovetzet (li-frakim) : pas mochin-gadlut → seulement YENIKAH V"K
#   - Bloc H (§1) : Imma rovetzet = allaite (yenikah) au lieu de gadlut
#   - Bloc I (§1) : Z"O"N atzilut en yenikah-mode V"K ; Abba Beriah encore V"K
#   - Bloc J (§1) : Zivvug Abba+Imma Beriah → mochin gamurim Z"O"N Beriah (echelle inverse)
#   - Bloc K (§1) : ZN atzilut en G×G → yenikah V"K pour Z"O"N Beriah
#   - Bloc L (§1) : 2 sub-modes zivvug rovetzet : (a) Imma dans Z"A seul ; (b) Imma dans Nukva
#   - Bloc M (§1) : Zivvug A"O = donner mochin Z"O"N (yenikah ou gadlut)
#   - Bloc N (§1) : Yenikah-state ZN = HAVAYAH-ELOKIM (lui=HAVAYAH, elle=ELOKIM)
#   - Bloc O (§1) : ZN A"BA : Z"A seul = HAVAYAH-ELOKIM ; mochin va d'abord a lui
#   - Bloc P (§1) : Quand PB"P : mochin descend aux deux = YICHUD HAVAYAH-ELOKIM
#   - Bloc Q (§2) : NL"D"Ch — GADPIN (ailes) = MOCHIN MAKIFIM de YENIKAH
#
# Source Sefaria : Sefer_Etz_Chaim.15.2 (2 sections, 4930 chars)
# IDs : EC-H4S15-019 → EC-H4S15-035

meta:
  sefer: etz_chaim
