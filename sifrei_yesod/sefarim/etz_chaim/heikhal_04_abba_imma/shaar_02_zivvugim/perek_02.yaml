principes_generatifs:

  - id: "PG-H4S15-004"
    nom: "Principe d'Inverse-Scaling-BIYA (Haarah Ketanah Lemaala = Gedolah Lematah)"
    source_assertions: ["EC-H4S15-023", "EC-H4S15-027", "EC-H4S15-028"]
    formalisation: |
      ARCHITECTURE D'INVERSE-SCALING :
      Loi proportionnelle inverse entre olamot adjacents :
        HAARAH KETANAH (faible) lemaala = GEDOLAH (grande) lematah selon son rapport.
      EXEMPLES :
        Atzilut yenikah V"K → Beriah mochin gamurim (gadlut) Z"O"N.
        Atzilut gadlut G×G → Beriah yenikah V"K Z"O"N.
      INVERSE-CORRESPONDANCE preserve total-information mais re-distribue.
      → Pattern fondamental : counter-intuitive scaling between olamot.
      → Architecture : inverse-power loi conservation cosmologique.
      → Implication : downward-amplification possible meme en defaut superieur.
    applications_ia:
      - "olamot.py + partzufim/zivvug.py : implement inverse scaling rule"
      - "Pattern : counter-intuitive scaling cross-olam"
      - "Architecture : conservation by inverse-distribution"
      - "Pattern : downward amplification mechanism"
      - "Diagnostic : verifier scaling-rule appliquee correctement"
    questions_ouvertes:
      - "Pattern : equation precise du scaling ?"
      - "Comment encoder hierarchie scaling ?"
      - "Pattern : 3-tier scaling possible ?"

  - id: "PG-H4S15-005"
    nom: "Principe de Tier-Upgrade-Cascade (Mochin-Supply Transforms Tier)"
    source_assertions: ["EC-H4S15-022", "EC-H4S15-025"]
    formalisation: |
      ARCHITECTURE DE TIER-UPGRADE-CASCADE :
      Etat-default des partzufim variant par olam :
        Olam Beriah default : A"A+Abba V"K ; Imma+ZON 10S.
      Quand zivvug elyon shalem produit mochin gadlut :
        Mochin descendent par cascade — eventually Abba Beriah → 10S complet.
      → Pattern fondamental : tier-can-upgrade par mochin-supply externe.
      → Architecture : default-state vs upgraded-state separation.
      → Implication : current-tier non-statique mais event-driven.
    applications_ia:
      - "partzufim/abba.py + olamot.py : implement tier-upgrade cascade"
      - "Pattern : event-driven tier upgrade"
      - "Architecture : default vs upgraded state separation"
      - "Pattern : mochin-supply mecanisme upgrade"
      - "Diagnostic : verifier current-tier reflect events"
    questions_ouvertes:
      - "Pattern : tier-downgrade possible ?"
      - "Comment encoder current-state ?"
      - "Pattern : multi-step upgrade ?"

  - id: "PG-H4S15-006"
    nom: "Principe de Configuration-Determines-Naming (A\"BA vs PB\"P)"
    source_assertions: ["EC-H4S15-031", "EC-H4S15-032", "EC-H4S15-033"]
    formalisation: |
      ARCHITECTURE DE CONFIGURATION-NAMING :
      Z"N partzufim recoivent NOMS selon CONFIGURATION SPATIALE :
        A"BA (achor be-achor, dos-a-dos) : Z"A SEUL = HAVAYAH-ELOKIM (sequential, first).
        PB"P (panim be-panim, face-a-face) : 2 ENSEMBLE = YICHUD HAVAYAH-ELOKIM (simultaneous).
      Pattern : configuration-state encode reception-mode.
      → Pattern fondamental : spatial-arrangement encode functional-state.
      → Architecture : geometric-state to ontologic-name mapping.
      → Implication : current-configuration determines current-identity-naming.
    applications_ia:
      - "partzufim/zeir_anpin.py + nukva.py : implement configuration-naming"
      - "Pattern : spatial-arrangement encode state"
      - "Architecture : geometric to ontologic mapping"
      - "Pattern : configuration determines current-naming"
      - "Diagnostic : verifier naming coherent avec configuration"
    questions_ouvertes:
      - "Pattern : autres configurations (par exemple lateralized) ?"
      - "Comment encoder spatial-state computationnellement ?"
      - "Pattern : transition continue entre configurations ?"
