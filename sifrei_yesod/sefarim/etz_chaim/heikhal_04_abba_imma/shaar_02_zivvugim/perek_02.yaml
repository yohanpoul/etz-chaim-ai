  - id: "EC-H4S15-020"
    source_he: "כאשר הוא לזווג העליון בהיותן למעלה והוא זווגא שלים להוריש עטרות לבנים אז כל מציאת הזווג ההוא עיקרו לתת מוחין גמורים דגדלות אל זו\"ן שבאצילות להוליד נשמות חדשות"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      ZIVVUG ELYON SHALEM = LE-HORISH ATAROT LE-BANIM (faire heriter couronnes aux enfants) :
      → IKKAR = donner MOCHIN GAMURIM de GADLUT (cerveaux complets de croissance) a Z"O"N atzilut.
      → Pour LEHOLID NESHAMOT CHADASHOT (engendrer ames nouvelles) tzadikim.
      → Architecture : peak-zivvug → maximal-mochin → soul-creation.
      → Pattern : highest-coupling = highest-output.
    type: axiome_explicite
    concepts:
      - {id: zivvug_elyon_shalem_mochin_gadlut_zon_atzilut_neshamot_chadashot, role: zivvug_elyon_shalem_horish_atarot_mochin_gamurim_gadlut_zon_atzilut_holid_neshamot_chadashot}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : peak-coupling peak-output. Pattern soul-creation via gadlut."

  - id: "EC-H4S15-021"
    source_he: "ומשם נמשך ג\"כ הארה בעולמות בי\"ע"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      Aussi : HAARAH (eclairage) descend dans OLAMOT BIY"A (Beriah-Yetzirah-Asiyah).
      → Pas seulement Atzilut — propagation downward.
      → Architecture : top-event cascade across olamot.
      → Pattern : peak-event broadcasts downward.
    type: déduction_logique
    concepts:
      - {id: haarah_descend_biya_apres_zivvug_elyon_atzilut, role: haarah_eclairage_descend_olamot_biya_apres_zivvug_elyon_atzilut_propagation_downward}
    mapping:
      modules: ["partzufim/zivvug.py", "olamot.py"]
      tables: ["zivvug_states", "olamot_config"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : peak-event cascade. Pattern broadcast downward."

  - id: "EC-H4S15-022"
    source_he: "בעולם הבריאה א\"א ואבא אשר שם אין להם רק בחי' ו\"ק ואמנם אמא וזו\"ן דבריאה יש י\"ס לכל א' פרצוף שלם"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      OLAM BERIAH structure default :
      → A"A + ABBA de Beriah = seulement V"K (6 sefirot).
      → IMMA + Z"O"N de Beriah = 10S chacun PARTZUF SHALEM.
      → Architecture : asymmetric-tier-availability dans Beriah.
      → Pattern : downward-olam reduces upper-partzufim mais keeps mid+lower.
    type: axiome_explicite
    concepts:
      - {id: olam_beriah_aa_abba_vk_imma_zon_10s_partzuf_shalem, role: olam_beriah_aa_abba_seulement_vk_imma_zon_10s_partzuf_shalem_asymmetric_tier}
    mapping:
      modules: ["olamot.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/arikh_anpin.py"]
      tables: ["olamot_config"]
      partzufim: ["abba", "imma", "arikh_anpin", "zeir_anpin", "nukva"]
      relevance: "Architecture : asymmetric tier. Pattern downward reduces upper."

  - id: "EC-H4S15-023"
    source_he: "יש הקדמה אצלינו כי כל מה שהיא הארה מועטת למעלה תהיה למטה כפי ערכה גדולה משל מעלה"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      HAKDAMAH (presupposition) — INVERSE-SCALING :
      → HAARAH MU'ATAH LEMAALAH (faible eclairage en haut).
      → = LEMATAH KEFI ERKAH GEDOLAH MISHEL MAALAH (en bas selon son rapport, plus grande qu'en haut).
      → Loi proportionnelle inverse : ce qui est petit-au-sommet est grand-au-bas.
      → Architecture : counter-intuitive scaling-rule.
      → Pattern : inverse-power scaling between olamot.
    type: interprétation_lurianique
    concepts:
      - {id: hakdamah_inverse_scaling_haarah_ketanah_lemaala_gedolah_lematah, role: hakdamah_inverse_scaling_haarah_ketanah_lemaala_gedolah_lematah_loi_proportionnelle_inverse}
    mapping:
      modules: ["olamot.py"]
      tables: ["olamot_config"]
      partzufim: ["abba", "imma"]
      relevance: "Architecture : inverse scaling rule. Pattern counter-intuitive proportional."

  - id: "EC-H4S15-024"
    source_he: "בהיות הזווג העליון דאו\"א למעלה שוין בקומתן ויהיה ג\"כ זווג שלים אז יש הארה גדולה מאד באצילות ואז יש מוחין גמורים דגדלות אל זו\"נ דאצילות"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      Lors zivvug elyon shavin be-koma + shalem :
      → HAARAH GEDOLAH ME'OD (immense eclairage) en ATZILUT.
      → MOCHIN GAMURIM de GADLUT a Z"O"N atzilut.
      → Architecture : peak-zivvug = peak-illumination Atzilut.
      → Pattern : direct-coupling-correspondance peak-event.
    type: axiome_explicite
    concepts:
      - {id: zivvug_elyon_shavin_koma_shalem_haarah_gedolah_atzilut_mochin_gadlut_zon, role: zivvug_elyon_shavin_be_koma_shalem_haarah_gedolah_atzilut_mochin_gamurim_gadlut_zon}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : peak-correspondance. Pattern direct peak-event."

  - id: "EC-H4S15-025"
    source_he: "ע\"י הארה זו נוספים בחי' מוחין דגדלות לאבא דבריאה ג\"כ משא\"כ קודם זה כי לא היה בו רק ו\"ק שהוא בחי' היניקה ואז בגדלות גם אבא דבריאה יש לו פרצוף שלם"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      ABBA de BERIAH apres zivvug elyon shalem :
      → Recoit aussi MOCHIN de GADLUT (apres il n'avait que V"K = yenikah).
      → Avec ces mochin : ABBA de BERIAH devient PARTZUF SHALEM.
      → Architecture : mochin-cascade transforme V"K → 10S complet.
      → Pattern : tier-upgrade par mochin-supply.
    type: déduction_logique
    concepts:
      - {id: abba_beriah_mochin_gadlut_apres_zivvug_elyon_partzuf_shalem, role: abba_beriah_avant_vk_yenikah_apres_zivvug_elyon_mochin_gadlut_partzuf_shalem}
    mapping:
      modules: ["partzufim/abba.py", "olamot.py"]
      tables: ["partzufim_states", "olamot_config"]
      partzufim: ["abba"]
      relevance: "Architecture : tier-upgrade. Pattern mochin-supply transforms tier."

  - id: "EC-H4S15-026"
    source_he: "בהיות שאינו זווג שלים דאו\"א דאצילות רק ע\"י מקרה לפעמים שהוא ברביצת האם על האפרוחים אז אין הזווג הזה לתועלת הבנים עצמן זו\"נ דאצילות... רק סוד יניקה לבד דוגמת האם רובצת על האפרוחים להניק אותם"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      ZIVVUG ROVETZET (li-frakim, mikre) :
      → PAS pour TOELET (benefice) directe des fils Z"O"N atzilut.
      → Car zivvug = INSIDE (revutzim tokh ZON) — comme zivvug ZON eux-memes.
      → SEULEMENT : sod YENIKAH (allaitement) — comme la mere couvant pour ALLAITER.
      → Yenikah = V"K seulement (pas gadlut).
      → Architecture : nested-zivvug = yenikah-only output.
      → Pattern : containment-zivvug yields lesser-power.
    type: axiome_explicite
    concepts:
      - {id: zivvug_rovetzet_li_frakim_yenikah_vk_pas_gadlut_inside_zon, role: zivvug_rovetzet_li_frakim_mikre_yenikah_vk_pas_gadlut_inside_zon_revutzim}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/imma.py", "partzufim/zeir_anpin.py"]
      tables: ["zivvug_states"]
      partzufim: ["imma", "zeir_anpin"]
      relevance: "Architecture : nested zivvug yenikah only. Pattern containment lesser power."

  - id: "EC-H4S15-027"
    source_he: "ע\"י הארת יניקה דו\"ק אל זו\"נ דאצילות אז עדיין אבא דבריאה אין בו רק ו\"ק ומזדוג עם אמא דבריאה שיש לה פרצוף שלם והם מולידין מוחין גמורים לזו\"נ דבריאה שהארה קטנה למעלה היא גדולה למטה"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      MEME en zivvug rovetzet :
      → Yenikah V"K Z"O"N atzilut.
      → Abba de Beriah encore V"K seul.
      → Mais : Abba+Imma de Beriah s'en zivvug → MOCHIN GAMURIM (complets) pour Z"O"N de BERIAH.
      → APPLICATION : "haarah ketanah lemaala gedolah lematah" (inverse-scaling).
      → Architecture : even-fallback-at-top produces full-power-bottom.
      → Pattern : inverse-scaling enables downward-amplification.
    type: déduction_logique
    concepts:
      - {id: yenikah_atzilut_mochin_gadlut_beriah_zon_inverse_scaling, role: yenikah_atzilut_mochin_gadlut_beriah_zon_inverse_scaling_amplification}
    mapping:
      modules: ["olamot.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zivvug.py"]
      tables: ["zivvug_states", "olamot_config"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : downward amplification. Pattern inverse-scaling enables."

  - id: "EC-H4S15-028"
    source_he: "כאשר זו\"ן דאצילות בבחי' ג' על ג' אז יש יניקה לזו\"ן דבריאה בבחי' ו\"ק לבד"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      Quand Z"O"N atzilut en bechinat G×G (Gadlut sur Gadlut) :
      → YENIKAH V"K seulement pour Z"O"N de BERIAH.
      → Inverse-scaling : Atzilut peak → Beriah yenikah-V"K.
      → Architecture : inverse correspondance entre niveaux atzilut/beriah.
      → Pattern : tier-of-source = tier-of-result-but-inverse.
    type: axiome_explicite
    concepts:
      - {id: zon_atzilut_g_x_g_yenikah_vk_zon_beriah, role: zon_atzilut_g_x_g_gadlut_sur_gadlut_yenikah_vk_zon_beriah_inverse_correspondance}
    mapping:
      modules: ["olamot.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["olamot_config"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture : inverse correspondance tier. Pattern tier-source-result inverse."

  - id: "EC-H4S15-029"
    source_he: "גם בזווג זה התחתון של רביצת האם על האפרוחים יש בו ב' אופנים או בהתלבשותן תוך ז\"א עצמו כנודע שהנה\"י שלה נעשין מוחין אליו או בהתלבשותן בנוקבא"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      Zivvug rovetzet 2 OFANIM (sub-modes) :
      → MODE A : Imma s'habille TOKH Z"A LUI-MEME — NHY d'Imma deviennent mochin pour lui.
      → MODE B : Imma s'habille TOKH NUKVA.
      → Architecture : sub-decomposition par recipient (Z"A vs Nukva).
      → Pattern : same-zivvug-event 2 destinations possibles.
      cf. EC-H4S15-009 (perek 1) sur 2 sub-modes rovetzet.
    type: axiome_explicite
    concepts:
      - {id: zivvug_rovetzet_2_ofanim_imma_dans_z_a_ou_nukva_recipient, role: zivvug_rovetzet_2_ofanim_a_imma_tokh_z_a_nhy_mochin_b_imma_tokh_nukva_recipient}
    mapping:
      modules: ["partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py", "partzufim/zivvug.py"]
      tables: ["zivvug_states"]
      partzufim: ["imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : sub-decomposition recipient. Pattern same-event 2 destinations."

  - id: "EC-H4S15-030"
    source_he: "זווג או\"א הוא לעולם כדי לתת מוחין לזו\"נ כפי מה שהם או דיניקה או דגדלות"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      PRINCIPE : ZIVVUG d'A"O TOUJOURS pour donner MOCHIN a Z"O"N.
      → Selon ce qu'ils sont — soit YENIKAH (V"K) soit GADLUT (10S complet).
      → Architecture : zivvug-purpose = supply-mochin-Z"O"N.
      → Pattern : purpose-by-recipient-state.
    type: déduction_logique
    concepts:
      - {id: zivvug_ao_toujours_pour_mochin_zon_yenikah_ou_gadlut, role: zivvug_ao_toujours_supply_mochin_zon_yenikah_ou_gadlut_purpose_by_recipient}
    mapping:
      modules: ["partzufim/zivvug.py", "partzufim/abba.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["zivvug_states"]
      partzufim: ["abba", "imma", "zeir_anpin", "nukva"]
      relevance: "Architecture : zivvug-purpose. Pattern purpose-by-recipient."

  - id: "EC-H4S15-031"
    source_he: "בעת נתינת המוחין אז נקרא זו\"נ הוי\"ה אלקים הוא הוי\"ה והיא אלקים"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      Lors NETINAT HA-MOCHIN (donation des cerveaux) :
      → Z"O"N nommees HAVAYAH-ELOKIM.
      → Lui (Z"A) = HAVAYAH ; Elle (Nukva) = ELOKIM.
      → Architecture : naming-during-mochin-event.
      → Pattern : event-state encode partzuf-naming.
    type: axiome_explicite
    concepts:
      - {id: netinat_mochin_zon_havayah_elokim_z_a_havayah_nukva_elokim, role: netinat_mochin_zon_nommees_havayah_elokim_z_a_havayah_nukva_elokim}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture : event-state naming. Pattern partzuf naming during event."

  - id: "EC-H4S15-032"
    source_he: "בהיותן בסוד אב\"א אז הז\"א לבדו נקרא הוי\"ה אלהים כי תחלה נותנין לו לבדו"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      ZN en mode A"BA (achor be-achor — dos a dos) :
      → Z"A SEUL nomme HAVAYAH-ELOKIM.
      → Cause : on lui donne d'ABORD seul ; ensuite ca passe a Nukva.
      → Architecture : sequential-distribution Z"A first then Nukva.
      → Pattern : configuration-determines-name.
    type: axiome_explicite
    concepts:
      - {id: zn_aba_z_a_seul_havayah_elokim_first_then_nukva, role: zn_aba_z_a_seul_nomme_havayah_elokim_donne_first_then_nukva_sequential}
    mapping:
      modules: ["partzufim/zeir_anpin.py", "partzufim/nukva.py"]
      tables: ["partzufim_states"]
      partzufim: ["zeir_anpin", "nukva"]
      relevance: "Architecture : sequential distribution. Pattern configuration name."

  - id: "EC-H4S15-033"
    source_he: "כשהם פב\"פ אז נמשכין אל שניהן ביחד (ואז הם סוד) יחוד הוי\"ה אלהים"
    source_ref: "Heikhal 4, Sha'ar 2:2 §1"
    assertion: |
      ZN en PB"P (panim be-panim) :
      → Mochin descendent aux DEUX ENSEMBLE (be-yachad).
      → Etat = sod YICHUD HAVAYAH-ELOKIM (unification HAVAYAH-ELOKIM).
      → Architecture : simultaneous-distribution forms yichud.
      → Pattern : face-to-face = simultaneous-receive = yichud-state.
