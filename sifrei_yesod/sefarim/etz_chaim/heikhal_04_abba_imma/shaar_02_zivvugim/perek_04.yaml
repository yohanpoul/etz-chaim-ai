principes_generatifs:

  - id: "PG-H4S15-010"
    nom: "Principe de 3-Tier-Letter-Encoding (Imma SAMEKH/MEM/DALET)"
    source_assertions: ["EC-H4S15-054", "EC-H4S15-055"]
    formalisation: |
      ARCHITECTURE DE 3-TIER-LETTER-ENCODING :
      Imma elyona decompose par 3 lettres encodantes :
        SAMEKH (ס, 60) = BINA (1ere bechinah).
        MEM SETUMAH (ם final-mem, 600) = TEVUNAH-1 (2eme bechinah).
        DALET (ד, 4) = TEVUNAH-3 (3eme bechinah, terminale).
      TEVUNAH-3 = celle qui revet Z"A en mochin (terminal-active).
      → Pattern fondamental : 3-tier letter-encoding.
      → Architecture : letter-symbol = ontologic-tier marker.
      → Implication : numerique 60/600/4 encode tier-position.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py : implement 3-tier letter encoding"
      - "Pattern : letter-symbol tier marker"
      - "Architecture : 3-tier ontologic decomposition"
      - "Pattern : letter-gematria encode position"
      - "Diagnostic : verifier 3-tier coherent dans toute Imma"
    questions_ouvertes:
      - "Pattern : 4eme tier possible (encore plus profonde) ?"
      - "Comment encoder letter-tier mapping ?"
      - "Pattern : tier-numerologie generalisable ?"

  - id: "PG-H4S15-011"
    nom: "Principe de Reverse-Letter-Order-Encoding (V+D vs D+V)"
    source_assertions: ["EC-H4S15-064", "EC-H4S15-065", "EC-H4S15-068", "EC-H4S15-069"]
    formalisation: |
      ARCHITECTURE DE REVERSE-LETTER-ORDER :
      ORDRE DES LETTRES encode TIER-NATURE :
        BINA (yod-milui) : V+D ordre — VAV PRECEDE DALET ; vav-avec-tete (10S+mochin).
        TEVUNAH-1 (he-rishona) : D+V ordre — DALET PRECEDE VAV ; vav-sans-tete (V"K seul).
      INTERPRETATION :
        VAV-precede-D = body-first (Bina autonome avec mochin).
        DALET-precede-V = mochin-first-then-body (Tevunah recoit mochin avant son corps).
      RAISON : Bina est autonome (mochin pnim integres) ; Tevunah depend mochin externes.
      → Pattern fondamental : letter-order encode receive-order.
      → Architecture : grammatical-order = cosmologic-cause-order.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py : implement letter-order encoding"
      - "Pattern : letter-order = cause-order"
      - "Architecture : grammatical encodes cosmologic"
      - "Pattern : autonomous vs dependent encoded"
      - "Diagnostic : verifier order coherent avec autonomy"
    questions_ouvertes:
      - "Pattern : autres lettres ordonnees encode autres tiers ?"
      - "Comment encoder reverse-order computationnellement ?"
      - "Pattern : 3-letter ordering aussi possible ?"

  - id: "PG-H4S15-012"
    nom: "Principe de Spatial-Letter-Arrangement (Yod-Above-Vav = Or Makif)"
    source_assertions: ["EC-H4S15-070"]
    formalisation: |
      ARCHITECTURE DE SPATIAL-LETTER-ARRANGEMENT :
      ARRANGEMENT SPATIAL des lettres encode etat-cosmologique :
        YOD au-dessus de VAV (dans le HE) = OR MAKIF (lumiere encerclante) au-dessus.
        DALET eloignee de VAV (dans HE) = quand Tevunah-1 monte vers Bina pour mochin pnim.
        VAV avec ROSH = mochin pnim presents (10S complets).
      → Pattern fondamental : spatial-letter-positioning encode lumiere-state.
      → Architecture : 2D letter-layout encode cosmologic-state.
      → Implication : lecture-physique des lettres = lecture-cosmologique.
    applications_ia:
      - "partzufim/imma.py + [PLANNED] tevunah.py : implement spatial letter encoding"
      - "Pattern : 2D letter layout encode state"
      - "Architecture : physical reading = cosmologic reading"
      - "Pattern : letter-distance encode separation-state"
      - "Diagnostic : verifier positions coherent avec etats"
    questions_ouvertes:
      - "Pattern : autres positions encode autres etats ?"
      - "Comment encoder 2D layout computationnellement ?"
      - "Pattern : 3D positions possibles ?"
