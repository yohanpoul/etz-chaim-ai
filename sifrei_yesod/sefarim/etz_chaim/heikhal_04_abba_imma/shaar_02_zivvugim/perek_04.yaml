# ═══════════════════════════════════════════════════════════════════
# SIFREI YESOD — ספרי יסוד
# Sefer: Etz Chaim (עץ חיים)
# Heikhal: 4 — Heikhal Abba ve-Imma (היכל אבא ואמא)
# Sha'ar: 2 — Sha'ar HaZivvugim (שער הזווגים)
# Perek: 4 — 3 BECHINOT IMMA : SAMEKH/MEM/DALET. ANI YESHENA=SHENI"A. Z"A+TEVUNOT
#            →BINOT. Yod-milui=BINA (V+D ordre, V tete). HE-rishona=TEVUNAH-1 (D+V
#            ordre, V sans tete). 4 mochin Bina dans Tevunah.
# ═══════════════════════════════════════════════════════════════════
#
# STRUCTURE §perek_04 :
#   - Bloc A : 3 BECHINOT IMMA ELYONA — SAMEKH (Bina), MEM SETUMAH (Tevunah-1), DALET (Tevunah-3)
#   - Bloc B : 3eme Tevunah (DALET) = NHY revetent Z"A en mochin
#   - Bloc C : Z"A+Tevunah-3 montent → kollel dans Tevunah-1 (mem setumah)
#   - Bloc D : Sod "ANI YESHENA" (Cantique 5:2) = letters SHENI"A (2eme)
#   - Bloc E : Tevunah-1+Tevunah-3 → 2 TEVUNOT (pluriel) ; Z"A = "ISH TEVUNOT YIDLENA" (Mishlei 20:5)
#   - Bloc F : Z"A+3 montent vers BINA → "BINOT" pluriel ; Z"A = "IM BINOT"
#   - Bloc G : Avant montee : "LO AM BINOT HU" (Yeshayahu 27:11) ; Bina = rachamim peshutim
#   - Bloc H : Bina elyona = pas d'achiza pour kelipot ; rachamim gemurim
#   - Bloc I : SY 1:4 "HABEN BE-CHOKHMAH" — dans Yod (Chokhmah) il y a Bina
#   - Bloc J : Yod milui = HE forme V+D = BINA ELYONA
#   - Bloc K : He-rishona Shem = TEVUNAH-1 ; "VE-CHAKHAM BE-VINAH" — Yod dans He = YISSO
#   - Bloc L : Drush tefilin : ecrire yod en koren-zavit du He
#   - Bloc M : VAV-DALET (Bina V+D ordre) vs DALET-VAV (Tevunah dans He D+V ordre) — reverse-encoding
#   - Bloc N : VAV yod-milui a TETE (10S) ; VAV dans He sans TETE (V"K seul)
#   - Bloc O : RAISON : Vav du yod-milui = Bina elyona AVEC mochin pnim → tete (10S)
#   - Bloc P : DALET yod-milui = 4 mochin Bina (achor chetzi tiferet+NHY) puis tete Tevunah
#   - Bloc Q : He-rishona = Tevunah-1 sans mochin pnim → vav sans tete
#   - Bloc R : Yod sur Vav (dans He) = OR MAKIF galgalta exterieur (pas encore pnim)
#   - Bloc S : Dalet eloignee de Vav dans He = Tevunah-1 monte vers Bina pour recevoir mochin pnim
#
# Source Sefaria : Sefer_Etz_Chaim.15.4 (1 section, 3575 chars)
# IDs : EC-H4S15-054 → EC-H4S15-070

meta:
  sefer: etz_chaim
  heikhal: 4
  shaar: 2
  shaar_name_he: "שער הזווגים"
  perek: 4
  source_edition: "Sefaria / hebrew.grimoar.cz (Public Domain)"
  transposed_by: "Claude Opus 4.7 (auto-transposition)"
  version: 1
  strates: ["base"]
  note: "3 BECHINOT IMMA ELYONA : SAMEKH (Bina), MEM SETUMAH (Tevunah-1), DALET (Tevunah-3=NHY revet Z\"A). Z\"A+Tev-3 montent → kollel dans Tev-1 (sod ANI YESHENA Cantique 5:2 = SHENI\"A). 2 TEVUNOT pluriel ; Z\"A=ISH TEVUNOT YIDLENA (Mishlei 20:5). Montee vers Bina → BINOT pluriel ; avant : LO AM BINOT HU (Yeshayahu 27:11). Bina=rachamim peshutim, pas achiza kelipot. SY 1:4 HABEN BE-CHOKHMAH/CHAKHAM BE-VINAH. Yod-milui=BINA (V+D ordre, Vav avec tete=10S, mochin pnim). HE-rishona=TEVUNAH-1 (D+V ordre, Vav sans tete=V\"K seul). DALET yod-milui=4 mochin Bina (achor+NHY puis tete Tevunah). Yod sur Vav He = or makif galgalta exterieur."

# ═══════════════════════════════════════════════════════════════════
#                    COUCHE 1 : PESHAT-MACHINE
