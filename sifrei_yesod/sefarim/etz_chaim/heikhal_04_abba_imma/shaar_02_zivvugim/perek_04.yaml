      relevance: "Architecture : separated vs combined. Pattern tier-cohesion encoding."

  - id: "EC-H4S15-069"
    source_he: "אין לו' שבתוך הה' צורת ראש לפי שהוא בחי' ו\"ק לבד בלי ראש והד' הם ד' מוחין של התבונה עצמה לכן קדמה ד' על ו'"
    source_ref: "Heikhal 4, Sha'ar 2:4"
    assertion: |
      Pourquoi VAV dans HE n'a pas de TETE :
      → C'est V"K seul SANS ROSH.
      → DALET dans HE = 4 MOCHIN de Tevunah elle-meme.
      → Donc DALET PRECEDE VAV dans HE (mochin avant V"K).
