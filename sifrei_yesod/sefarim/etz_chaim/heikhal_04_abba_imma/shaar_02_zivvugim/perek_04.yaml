      relevance: "Architecture : intermediate routing. Pattern mochin-cascade."

  - id: "EC-H4S15-068"
    source_he: "ה' ראשונה של הוי\"ה שהוא צורת ד\"ו והוא גימטריא י' כולם בחי' התבונה ראשונה עצמה לכן שם בב' אותיות ו\"ד הם ב' אותיות נפרדין אבל ב' אותיות ד\"ו אלו של התבונה הם כלולין באות א' שהוא אות ה'"
    source_ref: "Heikhal 4, Sha'ar 2:4"
    assertion: |
      HE-RISHONA = TZURAT D"V (forme dalet-vav) ; gematria = 5 (ה) ou 10 (ד+ו).
      → TOUTES = bechinat TEVUNAH-1 ELLE-MEME.
      → Dans yod-milui : V+D sont 2 NIFRADIN (lettres separees).
      → Dans HE : D+V sont KELULIN (combines) en UNE SEULE LETTRE = HE.
      → Architecture : separated-vs-combined letters encode tier-cohesion.
      → Pattern : separation-mark distinct vs unified.
