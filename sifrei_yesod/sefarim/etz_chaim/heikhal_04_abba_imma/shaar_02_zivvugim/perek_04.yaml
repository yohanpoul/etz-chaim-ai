      relevance: "Architecture : letter-precedence encodes order. Pattern receive-sequence."

  - id: "EC-H4S15-070"
    source_he: "אות י' שע\"ג הו' הוא בחי' או\"מ מלמעלה בגלגלתא מבחוץ ולכן נתרחקה זו הד' מן הו'"
    source_ref: "Heikhal 4, Sha'ar 2:4"
    assertion: |
      YOD au-dessus du VAV dans le HE :
      → bechinat OR MAKIF (lumiere encerclante) miMA'ALAH (du dessus) en GALGALTA (crane) MIBA-CHUTZ (de l'exterieur).
      → DALET ELOIGNE de VAV dans HE — quand Tevunah-1 monte vers Bina pour recevoir mochin pnim.
      → Architecture : letter-spacing encode pnim/makif distinction.
