  doctrinal_function: |
    Canal ontologique ET anticipation structurelle de Ze'ir Anpin.
    Les 13 Tikkunim = 13 voies de l'Unité/Amour (13 = Echad = Ahavah) depuis A"A.
    Mazal Elyon (T8 = Notzer Chesed) alimente Abba Ila'ah.
    Mazal Tahton (T13 = Ve-Nakeh) alimente Imma Ila'ah.
    Les 11 autres Tikkunim articulent le flux entre ces deux Mazalot.
    Betisha (frappe) entre Mazal Elyon et Mazal Tahton → production 5H + 5G (EC-K5-003).

  philological_warning: |
    Le Zohar NOMME les Tikkunim seulement par leur ordre anatomique
    (tikkuna kadma'ah ... tikkuna telisar). L'appariement avec Exode 34:6-7
    est élaboration Lourianique ultérieure (Vital, s'appuyant sur Cordovero).
    Trois découpages concurrents : Rabbenu Tam / Abudraham / Arizal.

    DIVERGENCE EMPIRIQUE DOCUMENTÉE (Sprint 10, 2026-04-20) :
    Sefaria Mantua SAUTE le Tikkun 11 — section Sefaria 21 passe directement
    de T10 (section 20) à T12 (section 21, "tiqquna dit'reysar"). T11 peut
    être fusionné avec T10 ou T12 dans cette édition, ou absent.
    → Résolution : verification Pritzker Matt Vol 8 p. 318+ requise.
    → T11 YAML aura philological_confidence.topography=low tant que non résolu.

