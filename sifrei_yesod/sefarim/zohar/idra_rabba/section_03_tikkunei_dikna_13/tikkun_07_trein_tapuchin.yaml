  - id: "Z-IR-T07-002"
    source_aramaic: "פָּתַח רַבִּי שִׁמְעוֹן וְאָמַר, כְּתַפּוּחַ בַּעֲצֵי הַיַּעַר ... וּתְרֵין תַּפּוּחִין אִלֵּין, דְּאִינּוּן תִּקּוּנָא ז', אִינּוּן כְּלָלָא דְּכָל שִׁיתָא תִּקּוּנִין דַּאֲמֵינָא. וּבְגִינֵיהוֹן אִתְקָיָּים בְּאוֹר פְּנֵי מֶלֶךְ חַיִּים."
    source_edition: "Sefaria Mantua 1558 (CC-BY 3.0)"
    source_ref: "Zohar III Naso, Idra Rabba, section Sefaria 17, mi-section"
    zohar_folio: "Zohar III Naso 132b-133a"
    translation_fr: |
      Rabbi Shimon ouvrit et dit : « COMME UN POMMIER parmi les arbres
      de la forêt... » (Cantique 2:3). Comme cette pomme contient trois
      couleurs, ainsi le Saint Béni-Soit-Il : les deux pommes contiennent
      six couleurs. Et ces DEUX POMMES qui sont le 7e Tikkun, ELLES SONT
      L'INCLUSION DE TOUS LES SIX TIKKUNIM PRÉCÉDENTS dont j'ai parlé.
      Et par elles s'accomplit : « DANS LA LUMIÈRE DU VISAGE DU ROI —
      VIE » (Proverbes 16:15).
    assertion: |
      DOCTRINE CENTRALE DE T7 : les 2 pommes SONT L'INCLUSION DES 6
      TIKKUNIM PRÉCÉDENTS ("kelala de-kol shita tiqqunin"). Le 7 est
      donc au centre anatomique et aussi au centre doctrinal — il
      CONTIENT les 6 premiers. Rashbi cite :
      - Cantique 2:3 (ke-tapuach ba-atzei ha-ya'ar) : 1 pomme = 3 couleurs
      - Proverbes 16:15 (ba-or penei melekh chayim) : lumière du visage
      Les 2 pommes (T7) = 6 couleurs = inclusion des 6 précédents.
      Connexion à la BÉNÉDICTION SACERDOTALE (Nombres 6:25 "ya'er YHWH
      panav elekha") — le "visage rayonnant" de A"A vers Z"A.
    type: axiome_explicite
