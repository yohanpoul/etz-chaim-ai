      et apparaissent DEUX POMMES (trein tapuchin) dans le propitiatoire
      des aromates (tikruvta di-vusma), BELLES et PLAISANTES à voir.
    assertion: |
      T7 = CENTRE DES 13 TIKKUNIM. Topographie : les cheveux sont
      INTERROMPUS (joues découvertes sans poil), faisant apparaître
      DEUX POMMES (les 2 joues), belles et splendides. C'est une
      topographie d'INTERRUPTION SIGNIFIANTE — le vide des cheveux
      révèle les 2 pommes qui sont source de LUMIÈRE.
