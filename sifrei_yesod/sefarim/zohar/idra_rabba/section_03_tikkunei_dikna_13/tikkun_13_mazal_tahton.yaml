  - id: "Z-IR-T13-002"
    source_aramaic: "וְהַאי תִּקּוּנָא דִּתְלֵיסָר, הוּא תִּקּוּנָא יָאֶה, דְּבֵיהּ אֲחִידָן כֹּלָּא. כֻּלְּהוּ מִתְכַּסְּפִין לְמִזְקַף רֵישָׁא לָקֳבְלֵיהּ. מִנֵּיהּ תַּלְיָין כָּל אִינּוּן דְּבִזְעֵיר אַפִּין אֲחִידָן. מִנֵּיהּ תַּלְיָין עִלָּאִין וְתַתָּאִין, וְכָל גִּנְזִין עִלָּאִין וְתַתָּאִין גְּנִיזִין בֵּיהּ, וּבֵיהּ כְּלִילָן. וְאִיהוּ מַזָּלָא דְּמִתְזַלָא מִנֵּיהּ כֹּלָּא, דָּא הוּא תִּקּוּנָא שְׁלֵימָתָא, דְּאַשְׁלִים לְכָל תִּקּוּנִין, דָּא אַשְׁלִים לְכֹלָּא."
    source_edition: "Sefaria Mantua 1558 (CC-BY 3.0)"
    source_ref: "Zohar III Naso, Idra Rabba, section Sefaria 22, mi-section"
    zohar_folio: "Zohar III Naso 134b-135a"
    translation_fr: |
      Et CE TREIZIÈME TIKKUN, il est le TIKKUN BEAU, auquel tout adhère.
      Tous se couvrent d'effroi de lever la tête en face de lui. De lui
      sont suspendus tous ceux qui adhèrent à Z"A. De lui sont suspendus
      les SUPÉRIEURS ET LES INFÉRIEURS, et tous les trésors supérieurs
      et inférieurs y sont cachés, tous y sont inclus. Il est le MAZAL
      D'OÙ TOUT FLUCTUE. C'est le TIKKUN ULTIME qui complète tous les
      Tikkunim — celui-ci complète tout.
    assertion: |
      T13 = TIKKUN ULTIME DE COMPLÉTUDE. Le Zohar le nomme explicitement :
      (1) "tiqquna ya'eh" (Tikkun beau)
      (2) "beih achidan kola" (tout y adhère)
      (3) "mazla de-mitzla mi-neiha kola" — LE MAZAL D'OÙ TOUT FLUCTUE
          (étymologie מזל ↔ נזל = fluer, confirmée dans le texte même)
      (4) "tiqquna shleimata de-ashlim le-kol tiqqunin" — Tikkun parfait
          qui complète tous les autres Tikkunim
      RELATION AVEC T8 : T8 est "Mazal" (source), T13 est "Mazla de-mitzla
      **mi-neiha** kola" (Mazal d'où tout fluctue). T13 est plus englobant.
      T13 EST TOUS LES AUTRES TIKKUNIM INCLUS ("da ashlim le-kola").
      Ceux de Z"A y sont suspendus. Supérieurs et inférieurs aussi.
    type: axiome_explicite
    epistemic_level: E1
    concepts:
