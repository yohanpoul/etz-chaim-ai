  - id: "Z-IR-T13-001"
    source_aramaic: "תִּקּוּנָא דִּתְלֵיסָר. תַּלְיָין שַׂעְרֵי דִּתְחוֹת דִּיקְנָא מִכָּאן וּמִכָּאן, בִּיקָרָא יָאָה, וּבִיקָרָא שַׁפִּירָא, וְחַפְּיָין עַד טַבּוּרָא וְלָא אִתְחַזְיָין מֵאַנְפֵּי תַּקְרוּבָא דְּבוּסְמָא, בַּר אִינּוּן תַּפּוּחִין שַׁפִּירָן חִוָּורִין."
    source_edition: "Sefaria Mantua 1558 (CC-BY 3.0, cache local zohar_idra_rabba_22.json)"
    source_ref: "Zohar III Naso, Idra Rabba, section Sefaria 22 (folio Vilna ~134b)"
    zohar_folio: "Zohar III Naso 134b"
    translation_fr: |
      TREIZIÈME TIKKUN. Des cheveux pendent sous la barbe, d'un côté et
      de l'autre, dans une GLOIRE BELLE et une GLOIRE SPLENDIDE. Ils
      couvrent jusqu'au NOMBRIL, et ne se voient pas du visage
      du PROPITIATOIRE DES AROMATES, sauf ces POMMES SPLENDIDES BLANCHES.
    assertion: |
      TREIZIÈME TIKKUN — topographie. Les cheveux pendent sous la
      barbe des deux côtés, "be-yekara ya'eh u-vi-yekara shappira"
      (dans une double gloire belle et splendide), couvrent jusqu'au
      TABURA (nombril), ne sont pas visibles depuis le propitiatoire
      des aromates, sauf les "pommes blanches splendides"
      (tapuchin shapirin chivarin) — imagerie zoharique dense.
    type: axiome_explicite
    epistemic_level: E1
    concepts:
