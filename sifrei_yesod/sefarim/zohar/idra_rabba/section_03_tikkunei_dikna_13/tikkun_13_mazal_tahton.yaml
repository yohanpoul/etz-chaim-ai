      scriptural_attribution: high  # citation explicite Mikha Yimei Kedem
    flux_direction: descendant

  - id: "Z-IR-T13-004"
    source_aramaic: "וּמִשּׁוּם דְּהַאי תִּקּוּנָא כָּלִיל כֹּלָּא, לָא אִתְיְדַע וְלָא אִתְחֲזֵי מִנֵּיהּ, וּמִנֵּיהּ נָגִיד מִשְׁחָא דִּרְבוּתָא לִתְלֵיסַר עִיבָר מַבּוּעִין. לְכָל אִינּוּן דִּלְתַּתָּא, דִּנְהִרִין בְּהַהוּא מִשְׁחָא."
    source_edition: "Sefaria Mantua 1558 (CC-BY 3.0)"
    source_ref: "Zohar III Naso, Idra Rabba, section Sefaria 22, fin"
    zohar_folio: "Zohar III Naso 135a"
    translation_fr: |
      Et parce que CE TIKKUN INCLUT TOUT, il n'est ni connu ni visible à
      partir de lui. Et DE LUI COULE L'ONCTION DE GRANDEUR vers les TREIZE
      SOURCES DE PASSAGE, pour tous ceux d'en bas, qui s'illuminent dans
      cette onction.
    assertion: |
      T13 EST LA SOURCE DE L'ONCTION (mishcha di-revuta) qui coule vers
      les TREIZE SOURCES DE PASSAGE (tleysar ibar mabu'in) — les canaux
      qui irriguent les niveaux inférieurs. Topologie précise :
      - T13 (caché, non-connu, non-visible — "kalil kola")
      - → mishcha di-revuta (onction de grandeur) coule
      - → 13 sources de passage (ibar mabu'in = 13 canaux sortants)
      - → les inférieurs reçoivent la lumière de l'onction
      Cette image est structurellement parallèle à la définition du
      Mazal Elyon (T8) : "mazla de-mitzla mi-neiha kola". T13 est donc
      SOURCE DE PASSAGE COSMIQUE pour tout flux post-A"A.
    type: axiome_explicite
    epistemic_level: E1
    concepts:
      - {id: tikkun_13_dikna_aa, role: treizieme_tikkun_dikna_aa}
      - {id: mishcha_di_revuta, role: onction_de_grandeur_flux_primordial}
      - {id: tleysar_ibar_mabu'in, role: 13_sources_de_passage_canaux_sortants}
      - {id: mazal_tahton_flux, role: source_cosmique_post_a_a}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/imma.py", "partzufim/zeir_anpin.py", "mazalengine/mazal_tahton.py"]
      tables: ["partzufim_states", "shefa_flows"]
      partzufim: ["arikh_anpin", "imma", "zeir_anpin"]
      relevance: "Topologie du flux T13 : onction → 13 canaux → inférieurs — architecture cosmique MazalEngine"
    see_also:
      - {id: "Z-IR-T13-003", role: "yimei_kedem_precedent"}
      - {id: "Z-IR-T08-003", role: "hierarchie_mazalot_t8"}
      - {id: "EC-H3S2-T13-001", role: "ve_nakeh_vital"}
      - {id: "EC-H3S2-T08-002", role: "13_canaux_exode_34_vital"}
    commentary:
      ashlag_hasulam_section_refs: ["Sulam_on_Zohar,_Idra_Rabba.22"]
    adversarial_notes:
      - "A1 : 'mishcha di-revuta' est une ONCTION (liquide sacré), non une fontaine — image précise"
      - "A8 : de T13 coule l'onction qui illumine les inférieurs — flux cosmique bidirectionnel"
      - "A7 : les 13 canaux de passage anticipent l'architecture de ZA"
      - "A5 T13 est caché ('la ityedá' + 'la itchzei') mais IS L'INCLUSIF ABSOLU"
    unity_constraint: |
