      topography: high
      scriptural_attribution: high  # "mazla de-mitzla" est définition zoharique littérale
    flux_direction: bidirectional

  - id: "Z-IR-T13-003"
    source_aramaic: "תָּאנָא, אִלֵּין תִּקּוּנִין אִקְרוּן יְמֵי קֶדֶם, יוֹמִין קַדְמָאִין דְּקַדְמָאֵי. וְאִינּוּן דְּאִשְׁתְּכָחוּ בִּזְעֵיר אַפִּין, אִקְרוּן יְמֵי עוֹלָם. וְתָאנָא, אִלֵּין יְמֵי קֶדֶם, כֻּלְּהוּ מִתְתָּקְנָן בְּתִקּוּנָא דְּדִיקְנָא דְּעַתִּיקָא דְּעַתִּיקִין."
    source_edition: "Sefaria Mantua 1558 (CC-BY 3.0)"
    source_ref: "Zohar III Naso, Idra Rabba, section Sefaria 22"
    zohar_folio: "Zohar III Naso 134b-135a"
    translation_fr: |
      Nous avons appris : ces Tikkunim sont appelés YIMEI KEDEM (jours anciens),
      JOURS ANCIENS DES ANCIENS. Et ceux qui se trouvent dans Z"A sont appelés
      YIMEI OLAM (jours du monde, Isaïe 63:9). Et nous avons appris : ces
      YIMEI KEDEM, tous se rectifient dans le Tikkun de la Barbe de
      l'ANCIEN DES ANCIENS.
    assertion: |
      DÉNOMINATION DOCTRINALE DES 13 TIKKUNIM = YIMEI KEDEM (jours anciens).
      C'est le 13ème mot de la liste de Mikha 7:18-20 ("mi-yemey kedem" = v.20
      final). Cela CONFIRME que le Zohar lui-même apparie les 13 Tikkunim aux
      mots de MIKHA 7, en commençant par v.18 ("mi El kamokha") et en terminant
      par v.20 ("mi-yemey kedem"). Les 13 attributs de Mikha = les 13 Tikkunim
      de la Dikna d'A"A. Distinction établie :
      - A"A : 13 Tikkunim = "yimei kedem" (jours anciens d'avant les temps)
      - Z"A : 9 Tikkunim = "yimei olam" (jours du monde, Is 63:9)
      - Les 9 de Z"A s'illuminent des 13 de A"A ; alors Z"A est nommé par les 13.
    type: axiome_explicite
    epistemic_level: E1
    concepts:
      - {id: tikkun_13_dikna_aa, role: treizieme_tikkun_dikna_aa}
      - {id: yimei_kedem, role: 13_tikkunim_noms_zoharique}
      - {id: yimei_olam_za, role: 9_tikkunim_de_za_isaie_63_9}
      - {id: mikha_7_18_20_confirmed, role: source_scripturaire_des_13}
      - {id: dikna_atika_de_atikin, role: barbe_de_ancien_des_anciens}
    mapping:
      modules: ["partzufim/arikh_anpin.py", "partzufim/zeir_anpin.py", "mazalengine/mazal_tahton.py"]
      tables: ["partzufim_states"]
      partzufim: ["arikh_anpin", "zeir_anpin"]
      relevance: "Doctrine des 2 couches Yimei Kedem (A\"A) / Yimei Olam (Z\"A) — base architecture MazalEngine multi-Partzuf"
    see_also:
      - {id: "Z-IR-T13-002", role: "mazla_de_mitzla_precedent"}
      - {id: "Z-IR-T08-004", role: "mikha_7_19_T8"}
      - {id: "EC-H3S2-T08-001", role: "vital_confirme_mikha_7"}
      - {id: "EC-H3S2-T13-001", role: "vital_ve_nakeh_t13"}
    commentary:
      ashlag_hasulam_section_refs: ["Sulam_on_Zohar,_Idra_Rabba.22"]
    adversarial_notes:
      - "CONFIRMATION P1 : Zohar cite Mikha 7:20 (yimei kedem) comme T13 — scripture primaire est Mikha, pas Exode"
      - "A7 distinction Yimei Kedem (A\"A) vs Yimei Olam (Z\"A) : T13 anticipe Z\"A"
      - "A5 les 13 sont UN passage scripturaire continu (Mikha 7:18-20)"
    unity_constraint: |
      Les 13 Tikkunim forment UN passage scripturaire (Mikha 7:18-20)
      lu comme UN objet doctrinal, non 13 fragments.
