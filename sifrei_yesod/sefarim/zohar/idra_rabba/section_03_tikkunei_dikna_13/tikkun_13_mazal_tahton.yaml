      - {id: tiqquna_ya'eh, role: tikkun_beau}
      - {id: mazla_de_mitzla, role: etymologie_mazal_flux_confirmee}
      - {id: tiqquna_shleimata, role: tikkun_ultime_complet}
      - {id: mazal_tahton, role: role_mazal_inferieur_dans_vital}
      - {id: ashlim_le_kola, role: complete_tous_les_autres_tikkunim}
