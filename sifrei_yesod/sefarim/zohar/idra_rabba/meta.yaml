  doctrinal_function: |
    Grande assemblée de Rashbi et ses 9 disciples (Chevraia).
    Dévoile la structure des Partzufim supérieurs, en particulier :
    - Arikh Anpin (Ancien des Jours) — Gulgalta, Metzach, Eynin, Chotma, Dikna
    - Ze'ir Anpin (Petit Visage) — préparé par les flux d'A"A via la Dikna
    La Dikna (sections 11-22 Sefaria, folios 131b-135a) est le canal central
    de transmission des 13 voies de l'Unité (Echad=Ahavah=13) vers ZA.

