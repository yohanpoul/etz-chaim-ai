meta:
  sefer: zohar
  parashah: Naso
  idra: rabba
  folio_range: "Zohar III 127b-145a (Vilna)"
  constructed_from:
    - "Sefaria API v3 cache (sifrei_yesod/external/sefaria_cache/)"
    - "Sefaria HTML overlays (<i data-overlay='Vilna Pages'>) pour folio annotation"
  constructed_at: "2026-04-20"
  constructor: "Claude Opus 4.7 — direct Sefaria JSON inspection"

# ═══════════════════════════════════════════════════════════════════
# RÉSULTAT D'AUDIT 12.0.b — Segmentation Ashlag Sulam
# ═══════════════════════════════════════════════════════════════════
ashlag_sulam_segmentation: per_section
# Justification : Sulam on Zohar Idra Rabba est segmenté en ~220 sections
# fines, alignées sur les versets du Zohar, pas 1-à-1 sur les 13 Tikkunim.
# Un commentaire Ashlag pour un Tikkun doit agréger plusieurs sections Sulam.
# → Schéma YAML utilise `commentary.ashlag_hasulam_section_refs: [...]`
# plutôt que `ashlag_hasulam:` single field.

# ═══════════════════════════════════════════════════════════════════
