name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (strict — core modules)
        run: ruff check $(cat .github/lint-strict-paths.txt)

      - name: Ruff format check (strict — core modules)
        run: ruff format --check $(cat .github/lint-strict-paths.txt)

      - name: Ruff lint (informative — full repo, non-blocking)
        run: ruff check . || true

      - name: Mypy (non-blocking for now)
        run: mypy $(head -3 .github/lint-strict-paths.txt) || true

      - name: Public surface neutrality
        run: bash scripts/check_public_surface.sh
