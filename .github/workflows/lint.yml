name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (strict — new modules)
        run: ruff check bridge mazalengine partzufim/reshimu.py partzufim/zivvug.py examples scripts/check_doctrine_code_alignment.py

      - name: Ruff format check (strict — new modules)
        run: ruff format --check bridge mazalengine partzufim/reshimu.py partzufim/zivvug.py examples scripts/check_doctrine_code_alignment.py

      - name: Ruff lint (informative — full repo, non-blocking)
        run: ruff check . || true

      - name: Mypy (non-blocking for now)
        run: mypy bridge mazalengine partzufim/reshimu.py || true
