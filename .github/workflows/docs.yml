name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        # Pages deploy n'est possible que sur repo public (ou Pro/Team) —
        # on upload uniquement si le repo est public sur main.
        if: github.ref == 'refs/heads/main' && github.event.repository.private == false
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Skip complètement sur repo privé (Pages API indisponible → 404).
    # Re-activable automatiquement quand le repo devient public.
    if: github.ref == 'refs/heads/main' && github.event.repository.private == false
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
