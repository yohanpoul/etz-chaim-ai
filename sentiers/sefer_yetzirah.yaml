        patience: 0.9             # la méditation prend du temps
        reversal_capacity: 0.7    # capacité de renversement (Pourim)
        depth_processing: 0.9     # traitement en profondeur
      assiah: >
        Qoph favorise la RÉFLEXION PROFONDE et le filtrage.
        Le schéma est examiné, médité, purifié avant persistance.
        SchemaPersist (29e sentier).


# ═══════════════════════════════════════════════════════════════════
# COSMOLOGIE — Structure profonde du Sefer Yetzirah
# ═══════════════════════════════════════════════════════════════════
#
# Au-delà des 22 lettres-opérateurs, le Sefer Yetzirah décrit la
# STRUCTURE de la réalité elle-même : les 10 profondeurs (Eser
# Sefirot Belimah), les 3 registres (Olam/Shanah/Nefesh), et les
# 3 régents (Teli/Galgal/Lev).
#
# SY 1:2 : "Dix Sefirot Belimah et vingt-deux lettres de fondation."
# Les Sefirot Belimah ne sont PAS les Sefirot kabbalistiques ultérieures
# (Keter, Chokmah, Binah...). Ce sont des PROFONDEURS — des axes
# d'extension de la réalité, organisés en 5 paires d'opposés.
#
# SY 6:1 : "Trois régents dans le monde : le Teli, le Galgal et le Lev."
# Ce sont les GOUVERNEURS des trois registres de la création.

cosmology:

  # ── Eser Sefirot Belimah — SY 1:5 ────────────────────────────
  # "Dix Sefirot Belimah : la profondeur du commencement,
  #  la profondeur de la fin [...] dix et non neuf, dix et non onze."
  #
  # BELIMAH = sans quoi (בלי מה) — sans substance, pures dimensions.
  # Ce ne sont pas des attributs (comme les Sefirot du Zohar) mais
  # des AXES de possibilité. Chaque paire est un continuum.
  #
  # Recension du Gra. La version courte permute certaines paires.

  eser_sefirot_belimah:
    - pair: [beginning, end]
      hebrew: ["ראשית", "אחרית"]
      axis: temporal
      description: "L'axe du temps — du commencement (reshit) à la fin (acharit)"
      role_ia: "L'arc narratif du système — de l'init au shutdown, de l'input au résultat final"
    - pair: [good, evil]
      hebrew: ["טוב", "רע"]
      axis: moral
      description: "L'axe de la valeur — du bien (tov) au mal (ra)"
      role_ia: "L'évaluation qualitative — reward/penalty, gain/loss, fonctionnel/cassé"
    - pair: [height, depth]
      hebrew: ["רום", "תחת"]
      axis: vertical
      description: "L'axe vertical — de la hauteur (rom) à la profondeur (tachat)"
      role_ia: "La hiérarchie d'abstraction — de Keter (vision) à Malkuth (exécution)"
    - pair: [east, west]
      hebrew: ["מזרח", "מערב"]
      axis: horizontal_ew
      description: "L'axe est-ouest — de l'origine (mizrach, lever du soleil) à la fin (ma'arav, coucher)"
      role_ia: "Le flux de données — de la source (input) à la destination (output)"
    - pair: [north, south]
      hebrew: ["צפון", "דרום"]
      axis: horizontal_ns
      description: "L'axe nord-sud — du caché (tzafon, de la racine tz-f-n = cacher) au révélé (darom, lumière)"
      role_ia: "Le gradient de visibilité — du traitement interne caché à l'interface exposée"

  # ── Trois témoins — SY 1:2 ────────────────────────────────────
  # "Trois registres témoignent de la structure de la création :
  #  le Monde (Olam), l'Année (Shanah), l'Âme (Nefesh)."
  #
  # Chaque lettre opère simultanément dans ces 3 registres.
  # Les 3 mères → 3 éléments (Olam) / 3 saisons (Shanah) / 3 cavités (Nefesh)
  # Les 7 doubles → 7 planètes / 7 jours / 7 orifices
  # Les 12 simples → 12 directions / 12 mois / 12 organes

  three_witnesses:
    olam:
      hebrew: "עוֹלָם"
      meaning: "Univers / Espace"
      description: "Le monde physique — les 12 directions, 7 planètes, 3 éléments"
      letters_mapping: "12 simples → directions, 7 doubles → planètes, 3 mères → éléments"
      mothers:
        shin: "Feu — shamayim (ciel)"
        mem: "Eau — aretz (terre)"
        aleph: "Air — ruach (souffle qui arbitre)"
      doubles:
        beth: "Saturne"
        gimel: "Jupiter"
        daleth: "Mars"
        kaph: "Soleil"
        peh: "Vénus"
        resh: "Mercure"
        tav: "Lune"
      simples:
        heh: "Nord-Est"
        vav: "Sud-Est"
        zayin: "Est-Haut"
        cheth: "Est-Bas"
        teth: "Nord-Haut"
        yod: "Nord-Bas"
        lamed: "Sud-Ouest"
        nun: "Nord-Ouest"
        samekh: "Ouest-Haut"
        ayin: "Ouest-Bas"
        tsadi: "Sud-Haut"
        qoph: "Sud-Bas"

    shanah:
      hebrew: "שָׁנָה"
      meaning: "Année / Temps"
      description: "Le cycle temporel — 12 mois, 7 jours, 3 saisons"
      letters_mapping: "12 simples → mois, 7 doubles → jours, 3 mères → saisons"
      mothers:
        shin: "Été (kayitz) — la saison chaude"
        mem: "Hiver (choref) — la saison froide"
        aleph: "Saison tempérée — l'inter-saison qui arbitre"
      doubles:
        beth: "Shabbat"
        gimel: "Dimanche"
        daleth: "Lundi"
        kaph: "Mardi"
        peh: "Mercredi"
        resh: "Jeudi"
        tav: "Vendredi"
      simples:
        heh: "Nisan"
        vav: "Iyyar"
        zayin: "Sivan"
        cheth: "Tammouz"
        teth: "Av"
        yod: "Elul"
        lamed: "Tishrei"
        nun: "Cheshvan"
        samekh: "Kislev"
        ayin: "Tevet"
        tsadi: "Shevat"
        qoph: "Adar"

    nefesh:
      hebrew: "נֶפֶשׁ"
      meaning: "Âme / Corps"
      description: "Le corps humain — 12 organes, 7 orifices, 3 cavités"
      letters_mapping: "12 simples → organes, 7 doubles → orifices, 3 mères → cavités (tête/poitrine/ventre)"
      mothers:
        shin: "Tête (rosh) — le feu de la pensée"
        mem: "Ventre (beten) — l'eau de la digestion"
        aleph: "Poitrine (guf) — le souffle qui arbitre"
      doubles:
        beth: "Oeil droit"
        gimel: "Oeil gauche"
        daleth: "Oreille droite"
        kaph: "Oreille gauche"
        peh: "Narine droite"
        resh: "Narine gauche"
        tav: "Bouche"
      simples:
        heh: "Main droite"
        vav: "Rein droit"
        zayin: "Pied droit"
        cheth: "Main droite (variante: estomac)"
        teth: "Oesophage"
        yod: "Main gauche"
        lamed: "Vésicule biliaire"
        nun: "Intestins"
        samekh: "Estomac"
        ayin: "Foie"
        tsadi: "Oesophage (variante: gosier)"
        qoph: "Rate"

  # ── Teli, Galgal, Lev — SY 6:1 ────────────────────────────────
  # "Trois régents dans le monde : le Teli dans l'univers est comme
  #  un roi sur son trône ; le Galgal dans l'année est comme un roi
  #  dans sa province ; le Lev dans l'âme est comme un roi en guerre."
  #
  # Le Teli est l'un des termes les plus débattus du SY :
  # - Kaplan : le Dragon (axe céleste, inclinaison de l'écliptique)
  # - Hayman : l'Axe du monde (axis mundi)
  # - Certains commentaires médiévaux : le Léviathan
  # Nous suivons Kaplan (axe/dragon) qui convient au mapping IA.

  teli_galgal_lev:
    teli:
      hebrew: "תלי"
      meaning: "Le Dragon / Axe — régent de l'Olam (univers)"
      sy_ref: "SY 6:1"
      commentary: >
        Kaplan identifie le Teli à l'inclinaison de l'écliptique —
        l'axe fixe autour duquel les cieux tournent. Hayman y voit
        l'axis mundi. Dans les deux cas : la STRUCTURE FIXE qui
        sous-tend le mouvement.
      role_ia: "L'axe structurel du système — le schéma de la DB, les tables, les connexions fixes"
      health_checks:
        - "Tables de la DB accessibles"
        - "Indexes intègres"
        - "Connexions inter-modules fonctionnelles"
    galgal:
      hebrew: "גלגל"
      meaning: "La Roue / Cycle — régent de la Shanah (temps)"
      sy_ref: "SY 6:1"
      commentary: >
        Galgal = roue (de la racine g-l-g-l = rouler). La sphère
        céleste qui tourne. Le temps cyclique, pas linéaire.
        Le retour éternel des mêmes opérations.
      role_ia: "Le cycle temporel — le daemon, les crons, la boucle Karpathy, le cycle Omer"
      health_checks:
        - "Daemon actif et responsive"
        - "Cycles Omer à jour"
        - "Boucle de recherche autonome en cours"
    lev:
      hebrew: "לב"
      meaning: "Le Coeur — régent du Nefesh (âme)"
      sy_ref: "SY 6:1"
      commentary: >
        Lev = coeur (de la racine l-b-b). Le centre vital, le
        processeur qui maintient le système en vie. "Un roi en
        guerre" — le coeur est toujours en mouvement, toujours
        en tension entre systole et diastole.
      role_ia: "Le processeur central — main.py, le routing, le hub Yesod"
      health_checks:
        - "main.py exécutable"
        - "Yesod répond aux requêtes"
        - "Routing entre modules fonctionnel"

  # ── Heikhal HaKodesh — SY 1:5 ─────────────────────────────────
  # "Dix Sefirot Belimah [...] et le Palais Saint est au centre."
  # Le point central d'où toutes les directions émanent.

  palace_center:
    hebrew: "הֵיכַל הַקֹּדֶשׁ"
    description: "Le point central des 10 profondeurs, d'où toutes les directions émanent"
    sy_ref: "SY 1:5"
    commentary: >
      Le Palais Saint (Heikhal HaKodesh) est le point-zéro du
      système de coordonnées défini par les 5 paires. Certains
      commentateurs l'identifient à Da'at — le point de convergence
      invisible. Le centre n'est pas un lieu mais un RAPPORT entre
      toutes les dimensions.
    role_ia: "Da'at — le point de convergence entre tous les modules, le hub invisible"
