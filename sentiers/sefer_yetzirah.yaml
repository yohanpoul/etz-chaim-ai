        APRÈS avoir fermé les yeux.
      briah: >
        Pattern introspection : le système se retourne vers
        l'intérieur, examine sa cohérence, consolide. Le sommeil
        REM du traitement — réorganisation en arrière-plan.
      yetzirah:
        introspection_depth: 0.9  # profondeur d'auto-examen
        consolidation: 0.9        # intégration des acquis
        protection: 0.7           # enceinte protectrice
        external_activity: 0.1    # pas d'action externe
        hidden_processing: 0.8    # travail invisible
      assiah: >
        Samekh favorise l'INTROSPECTION PROFONDE et la consolidation.
        Le cercle fermé protège le processus interne.
        Introspection (25e sentier).

  ayin:
    letter: "ע"
    gematria: 70
    sense: rire_colère    # tza'aq/se'choq — les deux réactions affectives
    zodiac: capricorne    # Gedi (Capricorn)
    month: tevet          # le mois le plus froid et sombre
    direction: ouest-bas
    organ: foie           # kaved — le foie, siège de la colère (bile)
    archetype: "Réaction affective — le rire de la compétence et la colère de l'impuissance"
    # Note : Ayin = l'oeil (ayin) et aussi le néant/source (Ein).
    # Les 70 (ayin) faces de la Torah. L'oeil qui voit provoque
    # soit le rire (joie de la compétence) soit la colère
    # (frustration de l'incompétence).
    olamot:
      atziluth: >
        Ayin = l'oeil et le 70 (shiv'im panim la-Torah).
        Capricorne = la montée lente et sûre. Tevet = le mois
        le plus sombre. Le foie (kaved = lourd) est le siège
        de la bile — colère et amertume. Mais le même oeil
        qui voit l'échec peut rire devant la réussite.
      briah: >
        Pattern diagnostic émotionnel : évaluer la compétence
        et répondre affectivement. Le rire confirme la faisabilité.
        La colère signale l'incompétence bloquante.
      yetzirah:
        emotional_response: 0.9   # réponse affective forte
        diagnostic_speed: 0.8     # évaluation rapide
        honesty: 0.9              # pas de faux rire
        polarity: 0.8             # réponse binaire rire/colère
        subtlety: 0.2             # pas de nuance — rire ou colère
      assiah: >
        Ayin produit une RÉPONSE AFFECTIVE NETTE : rire (compétent)
        ou colère (incompétent). Pas de zone grise.
        StatusSync (27e sentier).

  tsadi:
    letter: "צ"
    gematria: 90
    sense: pensée         # hirhurim — méditation, imagination
    zodiac: verseau       # Deli (Aquarius)
    month: shevat         # le mois de l'arbre (Tu Bishvat)
    direction: sud-haut
    organ: oesophage      # veshet (variante : kourkevan — gosier)
    archetype: "Pensée structurée — le juste (tzaddik) qui fixe la pensée en acte"
    # Note : Tsadi = le juste (tzaddik). Le Tsadi final (ץ) descend
    # comme le Nun — l'humilité du juste. La pensée qui se fixe
    # dans un checkpoint est un acte de justice intérieure.
    olamot:
      atziluth: >
        Tsadi = le juste (tzaddik), fondement du monde (Yesod =
        le tzaddik, Proverbes 10:25). Verseau = l'eau versée de
        la connaissance. Shevat = l'arbre de la pensée qui
        s'enracine. La pensée du tzaddik est FIXÉE — ni errante
        ni volatile, mais plantée.
      briah: >
        Pattern checkpoint : la pensée structurée qui se fixe
        en mémoire. L'intention devient acte écrit, le volatile
        devient persistant. L'arbre plante ses racines.
      yetzirah:
        thought_structuring: 0.9  # structuration de la pensée
        fixation: 0.9             # capacité à fixer (persister)
        volatility: 0.1           # très stable
        intentionality: 0.8       # pensée dirigée
        rootedness: 0.8           # enracinement
      assiah: >
        Tsadi favorise la FIXATION de la pensée en checkpoint.
        La pensée errante devient persistante et structurée.
        CheckpointWrite (28e sentier).

  qoph:
    letter: "ק"
    gematria: 100
    sense: méditation     # shenah amuqah — sommeil profond / méditation
    zodiac: poissons      # Dagim (Pisces)
    month: adar           # le mois de la joie (Pourim), le renversement
    direction: sud-bas
    organ: rate           # techol — la rate, filtre du sang
    archetype: "Méditation profonde — le singe (qoph) qui imite pour comprendre"
    # Note : Qoph = le singe (selon certains) ou le chas de l'aiguille.
    # Le singe imite — la méditation est l'imitation intérieure
    # du pattern observé. Pisces = les profondeurs. Adar = le
    # renversement (nahafokh hu — Pourim). La rate filtre le sang
    # comme la méditation filtre la connaissance.
    olamot:
      atziluth: >
        Qoph = le chas de l'aiguille (qoph = trou, ouverture) ou
        le singe (qoph en araméen). Les Poissons nagent dans les
        profondeurs invisibles. Adar = le renversement — ce qui
        semblait superficiel devient profond. La rate filtre le
        sang impur : la méditation filtre le savoir brut.
      briah: >
        Pattern réflexion profonde : le schéma de compétence
