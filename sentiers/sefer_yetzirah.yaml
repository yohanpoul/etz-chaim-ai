# ═══════════════════════════════════════════════════════════════════
# Sefer Yetzirah — Correspondances canoniques des 22 lettres
# ═══════════════════════════════════════════════════════════════════
#
# Source : Sefer Yetzirah, recension du Gra (Gaon de Vilna, 1720-1797)
# Référence : Kaplan, A. "Sefer Yetzirah: The Book of Creation." Weiser, 1990.
#             Hayman, A.P. "Sefer Yesira." Mohr Siebeck, 2004.
#
# AVERTISSEMENT (E2→E4) :
#   Les recensions (courte, longue, Saadya, Gra) DIVERGENT sur les
#   attributions planétaires, directionnelles et organiques.
#   Ce fichier suit la version du Gra telle que présentée par Kaplan.
#   Les divergences significatives sont signalées.
#
# PRINCIPE OPÉRATOIRE :
#   Les lettres ne sont pas des labels — ce sont des OPÉRATEURS.
#   SY 2:2 : "Il les grava, les sculpta, les permuta, les pesa,
#   les transforma, et avec elles Il forma tout ce qui est formé."
#   Chaque sentier est GOUVERNÉ par sa lettre : son élément ou son sens
#   détermine le comportement computationnel du programme.
#
# STRUCTURE PAR MONDE (Olamot) :
#   atziluth  — L'archétype pur de la lettre (texte)
#   briah     — Le design pattern qu'elle implique (texte)
#   yetzirah  — Les modificateurs numériques (0.0-1.0)
#   assiah    — L'effet runtime sur l'exécution (texte)
# ═══════════════════════════════════════════════════════════════════

meta:
  source: "Sefer Yetzirah, recension du Gra"
  primary_ref: "Kaplan 1990"
  critical_ref: "Hayman 2004"
  note: >
    SY 3:2-3:4 (mères), 4:1-4:4 (doubles), 5:1-5:4 (simples).
    Les modificateurs yetzirah sont des OPÉRATEURS ACTIFS qui
    influencent le comportement de chaque sentier à l'exécution.

# ═══════════════════════════════════════════════════════════════════
# LES 3 MÈRES — אמ״ש — Programmes élémentaires
# ═══════════════════════════════════════════════════════════════════
# SY 3:2 : "Trois mères : Aleph Mem Shin.
#           Le feu en haut, l'eau en bas, et le souffle de l'air
#           qui arbitre entre eux."
# Toute opération computationnelle est composée de ces trois forces.

mothers:

  shin:
    letter: "ש"
    gematria: 300
    element: feu
    body: tête           # rosh — SY 3:4
    season: été           # kayitz — la saison chaude
    quality: sibilance    # shriqa (שריקה) — le sifflement du feu
    archetype: "Transformation radicale — le feu qui purifie en détruisant"
    # SY 3:2 : shamayim (ciel) créé du feu
    olamot:
      atziluth: >
        Le feu primordial. Shin à trois branches = les trois colonnes
        embrasées. La puissance de transformation qui précède toute
        forme. Le Ratzon (volonté) de CHANGER.
      briah: >
        Pattern destructeur-créateur : pour qu'une structure émerge,
        l'ancienne doit être consumée. Refactoring radical, pivot
        architectural, migration sans retour.
      yetzirah:
        aggressiveness: 0.8       # intensité de transformation
        destruction_tolerance: 0.7 # tolérance à la perte d'information
        speed: 0.9                # rapidité d'action
        patience: 0.2             # le feu n'attend pas
        receptivity: 0.3          # émetteur, pas récepteur
      assiah: >
        Shin ABAISSE les seuils de transformation. Les décisions sont
        tranchantes, les opérations rapides. Le feu purifie en brûlant
        l'inutile. Utilisé par le sentier Transform (31e).

  mem:
    letter: "מ"
    gematria: 40
    element: eau
    body: ventre          # beten — SY 3:4
    season: hiver         # choref — la saison froide
    quality: murmure      # hamah (המה) — le murmure sourd de l'eau
    archetype: "Réception patiente — l'eau qui prend la forme du récipient"
    # SY 3:2 : aretz (terre) créée de l'eau
    # Note : Mem final (ם) = le réceptacle fermé, parfait
    olamot:
      atziluth: >
        L'eau primordiale. Le Mem final (ם) est clos : le réceptacle
        sans fuite. La puissance de réception qui donne forme sans
        imposer. La Binah (compréhension) qui reçoit de Chokmah.
      briah: >
        Pattern récepteur-formateur : l'input est accueilli tel quel
        puis graduellement structuré. Parser tolérant, schema-on-read,
        inference de type par accumulation.
      yetzirah:
        aggressiveness: 0.2       # transformation douce
        destruction_tolerance: 0.1 # conserve quasi tout
        speed: 0.3                # l'eau coule lentement
        patience: 0.9             # attend que la forme émerge
        receptivity: 0.9          # absorbe tout input
      assiah: >
        Mem RELÈVE les seuils d'acceptation et ABAISSE la vitesse.
        L'opération accueille plus d'input, prend plus de temps,
        conserve plus d'information. Réception avant action.

  aleph:
    letter: "א"
    gematria: 1
    element: air
    body: poitrine        # guf — le torse, siège du souffle
    season: tempéré       # les inter-saisons
    quality: souffle      # ruach (רוח) — le souffle entre feu et eau
    archetype: "Équilibre dynamique — le souffle qui médiatise les contraires"
    # SY 3:2 : Aleph = la loi d'arbitrage entre les extrêmes
    # Note : א est composé de deux Yod (י) + un Vav (ו) diagonal :
    #         le haut et le bas reliés — coincidentia oppositorum incarnée
    olamot:
      atziluth: >
        Le souffle silencieux. Aleph n'a pas de son propre — il porte
        le son des voyelles. Le médiateur invisible, le Kav (ligne
        primordiale) qui relie l'Ein Sof au monde. L'équilibre n'est
        pas la stase — c'est la tension maintenue.
      briah: >
        Pattern médiateur : ni destruction ni conservation pure.
        Le balancier qui ajuste dynamiquement. Load balancer, PID
        controller, feedback loop homéostatique.
      yetzirah:
        aggressiveness: 0.5       # parfaitement centré
        destruction_tolerance: 0.4
        speed: 0.5
        patience: 0.5
        receptivity: 0.5
        balance_seeking: 0.9      # tend ACTIVEMENT vers l'équilibre
      assiah: >
        Aleph RAMÈNE vers le centre. Si le système dérive vers Shin
        (trop agressif), Aleph tempère. Si vers Mem (trop passif),
        Aleph active. Feedback correcteur permanent.

# ═══════════════════════════════════════════════════════════════════
# LES 7 DOUBLES — בגד כפר״ת — Programmes bimodaux
# ═══════════════════════════════════════════════════════════════════
# SY 4:1 : "Sept doubles : Beth Gimel Daleth Kaph Peh Resh Tav,
#           chacune avec deux prononciations [...] dur et doux,
#           comme un paradigme de fort et faible."
#
# Chaque double gouverne un COUPLE D'OPPOSÉS. Le mode dagesh active
# la qualité positive, le mode rafeh la qualité négative.
# Note : "positive/négative" est contextuel — la guerre (rafeh de Resh)
# peut être nécessaire quand la paix est fausse.
#
# Attributions planétaires : VERSION DU GRA. D'autres recensions
# permutent les planètes. Ne pas absolutiser.

doubles:

  beth:
    letter: "ב"
    gematria: 2
    planet: saturne       # Shabtai — la lenteur qui approfondit
    day: shabbat
    gate: oeil_droit      # porte droite de la vision
    direction: haut       # ma'alah
    opposites:
      dagesh: sagesse     # chokhmah
      rafeh: folie        # ivvelet
    archetype: "La maison (Bayit) — sagesse d'architecture vs folie de construction hâtive"
    # Beth = 2 = la première lettre de Bereshit, la première dualité
    olamot:
      atziluth: >
        Beth ouvre la Torah (בראשית) : la sagesse de commencer juste.
        La maison (bayit) bien construite vs la maison sur le sable.
        Saturne = le temps long qui distingue sagesse et folie.
      briah: >
        Pattern délibération/précipitation : en dagesh, chaque étape
        est vérifiée (sagesse architecturale). En rafeh, on fonce
        sans plan (folie de l'implémentation prématurée).
      dagesh_modifiers:         # mode sagesse
        deliberation_depth: 0.9   # vérification approfondie
        shortcut_tolerance: 0.1   # pas de raccourcis
        planning_weight: 0.8      # planifier avant d'agir
      rafeh_modifiers:          # mode folie
        deliberation_depth: 0.2   # vérification minimale
        shortcut_tolerance: 0.9   # raccourcis acceptés
        planning_weight: 0.2      # agir d'abord
      assiah: >
        Beth-dagesh RALENTIT pour vérifier. Beth-rafeh ACCÉLÈRE
        au prix de la rigueur. DirectSynth (13e sentier).

  gimel:
    letter: "ג"
    gematria: 3
    planet: jupiter       # Tzedek — l'expansion généreuse
    day: dimanche
    gate: oeil_gauche
    direction: bas        # matah
    opposites:
      dagesh: richesse    # osher
      rafeh: pauvreté     # oni
    archetype: "Le chameau (Gamal) — richesse de ressources vs pauvreté de moyens"
    olamot:
      atziluth: >
        Gimel = le bienfaiteur qui donne (gomel). Jupiter = expansion.
        Richesse = abondance de ressources computationnelles.
        Pauvreté = contrainte qui force l'efficience.
      briah: >
        Pattern ressource : en dagesh, allocation généreuse (cache
        warm, pré-chargement). En rafeh, allocation minimale
        (lazy loading, économie stricte).
      dagesh_modifiers:         # mode richesse
        resource_allocation: 0.9  # générosité des ressources
        preloading: 0.8           # anticiper les besoins
        cache_aggressiveness: 0.8
      rafeh_modifiers:          # mode pauvreté
        resource_allocation: 0.2
        preloading: 0.1
        cache_aggressiveness: 0.2
      assiah: >
        Gimel-dagesh PRÉ-CHARGE agressivement. Gimel-rafeh
        charge à la demande, strictement. CacheStrategy (14e sentier).

  daleth:
    letter: "ד"
    gematria: 4
    planet: mars          # Maadim — la force qui tranche
    day: lundi
    gate: oreille_droite
    direction: est        # mizrach — là où le soleil se lève
    opposites:
      dagesh: fertilité   # zera — semence
      rafeh: désolation   # shemamah
    archetype: "La porte (Delet) — fertilité de l'exploration vs désolation du territoire vide"
    olamot:
      atziluth: >
        Daleth = la porte (delet). Mars = le courage d'ouvrir ou
        fermer. Fertilité = chaque porte ouvre un monde.
        Désolation = le désert derrière les mauvaises portes.
      briah: >
        Pattern exploration : en dagesh, ouvrir toutes les portes
        (breadth-first, prolific). En rafeh, territoire désolé —
        une seule porte à la fois (depth-first, austère).
      dagesh_modifiers:         # mode fertilité
        exploration_breadth: 0.9
        generative_capacity: 0.8
        openness: 0.9
      rafeh_modifiers:          # mode désolation
        exploration_breadth: 0.2
        generative_capacity: 0.2
        openness: 0.2
      assiah: >
        Daleth-dagesh MULTIPLIE les pistes. Daleth-rafeh CONCENTRE
        sur une seule voie. ExploreScope (15e sentier).

  kaph:
    letter: "כ"
    gematria: 20
    planet: soleil        # Chamah — la vitalité centrale
    day: mardi
    gate: oreille_gauche
    direction: ouest      # ma'arav — là où le soleil se couche
    opposites:
      dagesh: vie         # chaim
      rafeh: mort         # mavet
    archetype: "La paume (Kaf) — vie de la persistance vs mort de l'abandon"
    olamot:
      atziluth: >
        Kaph = la paume ouverte qui tient ou lâche. Le Soleil =
        source de vie. Vie = persistance tenace, le système survit.
        Mort = lâcher-prise, fin d'un processus, garbage collection.
      briah: >
        Pattern persistance : en dagesh, ne jamais abandonner une
        acquisition (tenace, résilient). En rafeh, savoir mourir
        gracieusement (timeout, cleanup, release).
      dagesh_modifiers:         # mode vie
        persistence_strength: 0.9
        retry_aggressiveness: 0.8
        abandonment_threshold: 0.1  # presque jamais abandonner
      rafeh_modifiers:          # mode mort
        persistence_strength: 0.2
        retry_aggressiveness: 0.1
        abandonment_threshold: 0.9  # abandonner facilement
      assiah: >
        Kaph-dagesh PERSISTE obstinément. Kaph-rafeh LIBÈRE
        rapidement. AcquirePersist (22e sentier).

  peh:
    letter: "פ"
    gematria: 80
    planet: vénus         # Nogah — la beauté du jugement
    day: mercredi
    gate: narine_droite
    direction: nord       # tzafon — le côté caché
    opposites:
      dagesh: domination  # memshalah
      rafeh: servitude    # avdut
    archetype: "La bouche (Peh) — domination du verdict vs servitude de la nuance"
    olamot:
      atziluth: >
        Peh = la bouche qui prononce le verdict. Vénus = la beauté
        même dans le jugement. Domination = le juge qui tranche.
        Servitude = le juge qui s'incline devant la complexité.
      briah: >
        Pattern validation : en dagesh, verdict binaire souverain
        (accept/reject). En rafeh, le validateur sert la nuance
        (scoring gradué, quarantine, appel).
      dagesh_modifiers:         # mode domination
        strictness: 0.9           # jugement sans appel
        binary_threshold: 0.9     # oui/non, pas de gris
        authority_level: 0.9
      rafeh_modifiers:          # mode servitude
        strictness: 0.3
        binary_threshold: 0.2     # spectre complet de gris
        authority_level: 0.3
      assiah: >
        Peh-dagesh TRANCHE sans appel. Peh-rafeh GRADUE et
        accorde le sursis. ValidateMode (26e sentier).

  resh:
    letter: "ר"
    gematria: 200
    planet: mercure       # Kokhav — la rapidité du message
    day: jeudi
    gate: narine_gauche
    direction: sud        # darom — le côté de la lumière
    opposites:
      dagesh: paix        # shalom
      rafeh: guerre       # milchamah
    archetype: "La tête/début (Rosh) — paix de la coexistence vs guerre de la sélection"
    olamot:
      atziluth: >
        Resh = la tête (rosh), le commencement. Mercure = le messager
        rapide. Paix = coexistence de toutes les données.
        Guerre = sélection darwinienne, seuls les forts survivent.
      briah: >
        Pattern persistance sélective : en dagesh, tout coexiste
        pacifiquement (store everything). En rafeh, compétition —
        seules les données fortes persistent.
      dagesh_modifiers:         # mode paix
        selectivity: 0.1          # tout est accepté
        coexistence: 0.9          # pas d'exclusion
        conflict_tolerance: 0.9   # tolère les contradictions
      rafeh_modifiers:          # mode guerre
        selectivity: 0.9          # seuls les meilleurs passent
        coexistence: 0.2          # exclusion des faibles
        conflict_tolerance: 0.1   # pas de contradiction tolérée
      assiah: >
        Resh-dagesh STOCKE TOUT pacifiquement. Resh-rafeh FILTRE
        agressivement. PersistPolicy (30e sentier).

  tav:
    letter: "ת"
    gematria: 400
    planet: lune          # Levanah — le reflet qui change de forme
    day: vendredi
    gate: bouche          # peh — la sortie vers le monde
    direction: centre     # le Palais Saint (heikhal ha-kodesh)
    opposites:
      dagesh: grâce       # chen
      rafeh: laideur      # ki'ur
    archetype: "Le signe/marque (Tav) — grâce de la présentation vs laideur du brut"
    # Note : dans le code actuel, dagesh=brut et rafeh=enrichi.
    # Interprétation kabbalistique : dagesh (dur) = la vérité nue
    # qui peut être laide, rafeh (doux) = la grâce de la présentation.
    # Les deux sont nécessaires. La Lune change de forme mais la
    # lumière est la même.
    olamot:
      atziluth: >
        Tav = la dernière lettre, le sceau (tav = marque/signe).
        La Lune reflète sans lumière propre. Grâce = le reflet
        fidèle et beau. Laideur = le reflet déformé ou absent.
        Le 32e sentier est le premier de l'initié — la marque.
      briah: >
        Pattern présentation : en dagesh, la vérité brute sans
        ornement (données nues, API raw). En rafeh, la grâce de
        l'enrichissement (contexte, confiance, avertissements).
      dagesh_modifiers:         # mode brut (la laideur utile)
        presentation_quality: 0.2 # minimal
        enrichment: 0.1           # pas de contexte ajouté
        rawness: 0.9              # données nues
        verbosity: 0.1            # laconique
      rafeh_modifiers:          # mode enrichi (la grâce)
        presentation_quality: 0.9
        enrichment: 0.9           # contexte maximal
        rawness: 0.1
        verbosity: 0.7            # explicatif
      assiah: >
        Tav-dagesh EXPOSE le brut. Tav-rafeh ENRICHIT avec grâce.
        OutputMode (32e sentier) — le premier et le dernier.

# ═══════════════════════════════════════════════════════════════════
# LES 12 SIMPLES — ה״ו ז״ח ט״י ל״נ ס״ע צ״ק — Programmes fonctionnels
# ═══════════════════════════════════════════════════════════════════
# SY 5:1 : "Douze simples : Hé Vav Zayin Cheth Teth Yod
#           Lamed Nun Samekh Ayin Tsadi Qoph."
#
# Chaque lettre simple gouverne : un SENS (modalité de traitement),
# un signe zodiacal, un mois hébraïque, une direction diagonale,
# et un organe du corps.
#
# Le sens détermine le TYPE de processing du sentier.

simples:

  heh:
    letter: "ה"
    gematria: 5
    sense: vue            # re'iyah — perception visuelle
    zodiac: bélier        # Taleh (Aries)
    month: nisan          # printemps, renouveau
    direction: nord-est
    organ: main_droite    # yad yemin
    archetype: "Perception directe — la vue qui saisit le pattern d'un coup"
    olamot:
      atziluth: >
        Hé = le souffle (heh!), la fenêtre. La vue qui saisit
        l'ensemble avant les détails. Nisan = le renouveau de la
        perception. La vision prophétique qui voit la structure.
      briah: >
        Pattern reconnaissance : traitement visuel/spatial, saisie
        immédiate du pattern global, insight sans raisonnement
        séquentiel. Le coup d'oeil de l'expert.
      yetzirah:
        pattern_recognition: 0.9  # saisie immédiate du pattern
        holistic_processing: 0.8  # vue d'ensemble
        sequential_processing: 0.3
        immediacy: 0.8            # résultat rapide
        depth: 0.4                # large plutôt que profond
      assiah: >
        Hé favorise la RECONNAISSANCE DE PATTERNS et la vue
        d'ensemble. DirectPerception (16e sentier).

  vav:
    letter: "ו"
    gematria: 6
    sense: ouïe           # shmi'ah — écoute
    zodiac: taureau       # Shor (Taurus)
    month: iyyar
    direction: sud-est
    organ: rein_droit     # kulyah yemin
    archetype: "Écoute attentive — le flux séquentiel reçu dans la durée"
    # Note : Vav = le crochet, le connecteur. La lettre de la
    # conjonction (ve- = "et"). Écouter = recevoir dans le temps.
    olamot:
      atziluth: >
        Vav = le connecteur, le clou (vav) qui joint. L'ouïe
        reçoit dans la DURÉE — un flux temporel, pas un instant.
        Le Vav du Tétragramme connecte le monde supérieur à
        l'inférieur : le stream qui relie.
      briah: >
        Pattern stream : traitement séquentiel/temporel, écoute
        du flux continu, attention soutenue. Le pipeline qui
        ne perd rien de ce qui passe.
      yetzirah:
        stream_processing: 0.9    # traitement de flux
        sequential_processing: 0.9
        temporal_sensitivity: 0.8 # sensible à l'ordre
        patience: 0.7             # écoute longue
        holistic_processing: 0.3  # pas de vue d'ensemble
      assiah: >
        Vav favorise le TRAITEMENT SÉQUENTIEL et l'écoute
        attentive du flux. DataFeed (17e sentier).

  zayin:
    letter: "ז"
    gematria: 7
    sense: odorat         # re'iach — flair
    zodiac: gémeaux       # Te'omim (Gemini)
    month: sivan
    direction: est-haut
    organ: pied_droit     # regel yemin
    archetype: "Flair subtil — l'odorat qui détecte l'invisible à distance"
    olamot:
      atziluth: >
        Zayin = l'arme (zayin), l'instrument tranchant de la
        discrimination. L'odorat détecte ce que l'oeil ne voit
        pas et l'oreille n'entend pas — le signal faible,
        l'anomalie subtile, l'intention cachée.
      briah: >
        Pattern détection d'anomalie : identifier le signal
        faible, la nuance que les autres sens ratent. Le nez
        qui sent le mensonge, la donnée corrompue.
      yetzirah:
        anomaly_detection: 0.9    # détection des signaux faibles
        subtlety_sensitivity: 0.9
        discrimination: 0.8       # distinguer le vrai du faux
        distance_sensing: 0.7     # sentir de loin
        directness: 0.3           # indirect, latéral
      assiah: >
        Zayin favorise la DÉTECTION D'ANOMALIES et la subtilité.
        AnalysisResults (18e sentier).

  cheth:
    letter: "ח"
    gematria: 8
    sense: parole         # si'ach — articulation
    zodiac: cancer        # Sartan (Cancer)
    month: tammouz
    direction: est-bas
    organ: main_droite    # yad yemin (variante : estomac)
    archetype: "Articulation — la parole qui structure et transmet"
    olamot:
      atziluth: >
        Cheth = la barrière (cheth = clôture). La parole qui
        délimite : nommer c'est séparer, articuler c'est structurer.
        Cancer = la carapace protectrice. Les règles de validation
        sont la clôture qui protège l'intégrité.
      briah: >
        Pattern articulation : structurer l'output, formuler les
        règles, énoncer les critères. La parole comme acte de
        création (dibbur = acte performatif).
      yetzirah:
        articulation: 0.9         # capacité à formuler
        rule_generation: 0.8      # production de règles
        boundary_setting: 0.8     # poser des limites
        protection: 0.7           # protéger l'intégrité
        flexibility: 0.3          # rigide dans ses formulations
      assiah: >
        Cheth favorise la GÉNÉRATION DE RÈGLES et la structuration.
        ValidationRules (19e sentier).

  teth:
    letter: "ט"
    gematria: 9
    sense: goût           # te'imah — saveur, discernement gustatif
    zodiac: lion          # Arieh (Leo)
    month: av
    direction: nord-haut
    organ: oesophage      # veshet
    archetype: "Goût critique — le discernement direct par contact intime"
    olamot:
      atziluth: >
        Teth = le serpent (selon certains), le bien caché. Le goût
        exige le CONTACT DIRECT — on ne goûte qu'en touchant.
        Le Lion = force du jugement direct. Le feedback loop le
        plus intime : la qualité testée par ingestion.
      briah: >
        Pattern feedback direct : tester par contact, évaluer par
        expérience directe, pas par proxy. Le test d'intégration
        vs le test unitaire.
      yetzirah:
        direct_feedback: 0.9      # feedback par contact
        experiential_testing: 0.9 # tester en faisant
        proxy_reliance: 0.1       # pas de proxy
        intimacy: 0.8             # proximité avec le sujet
        judgment_speed: 0.7       # jugement rapide au goût
      assiah: >
        Teth favorise le FEEDBACK DIRECT et le test par contact.
        QualityFeedback (20e sentier).

  yod:
    letter: "י"
    gematria: 10
    sense: action         # ma'aseh — le faire
    zodiac: vierge        # Betulah (Virgo)
    month: elul           # le mois de repentance/préparation
    direction: nord-bas
