      yetzirah:
        learning_rate: 0.9        # vitesse d'apprentissage
        extraction_power: 0.9     # capacité à extraire l'insight
        adaptability: 0.8         # s'adapter à chaque échec
        bitterness_tolerance: 0.9 # tolérance à l'amertume
        transcendence: 0.8        # capacité à dépasser la ligne
      assiah: >
        Lamed MAXIMISE l'extraction d'insights depuis les échecs.
        La vésicule biliaire transforme l'amer en digérable.
