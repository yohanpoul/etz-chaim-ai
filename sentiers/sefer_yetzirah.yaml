      yetzirah:
        step_by_step: 0.9         # progression méthodique
        patience: 0.8             # pas de précipitation
        thoroughness: 0.8         # traitement complet
        depth_processing: 0.7     # digestion en profondeur
        visibility: 0.3           # travail invisible, souterrain
      assiah: >
        Nun favorise la PROGRESSION MÉTHODIQUE et la digestion
        complète de chaque étape. TaskDispatch (24e sentier).

  samekh:
    letter: "ס"
    gematria: 60
    sense: sommeil        # shenah — le sommeil créatif
    zodiac: sagittaire    # Keshet (Sagittarius)
    month: kislev         # le mois de Hanoukkah, lumière dans l'obscurité
    direction: ouest-haut
